M§","unit":58,"span":[186,192],"query":false,"sigla":["A","M"]}],"A":"27","tr":"Uno §I§scholastikos§/I§ che stava male stabilì col medico che, se fosse guarito, avrebbe dato una ricompensa. Quando dunque la moglie lo biasimava perché beveva vino con la febbre, disse: «Tu vuoi che io, guarito, sia costretto a dare la ricompensa al medico?!».","type":"joke","text":"Σχολαστικὸς νοσῶν συνετάξατο τῷ ἰατρῷ, εἰ θεραπευθείη, μισθὸν δώσειν. ὡς οὖν οἶνον ἐν τῷ πυρέσσειν πίνοντι αὐτῷ ἐπετίμα ἡ γυνή· Σὺ δὲ ὑγιάναντα βούλει με, ἔφη, ἀναγκασθῆναι τῷ ἰατρῷ τὸν μισθὸν δώσειν;","dawe":"27","num":"27","n":27,"wit":"AM"},{"type":"joke","tr":"Un cane morse il pollice di uno §I§scholastikos§/I§. Questo disse: «Se avesse preso il mantello, si sarebbe lacerato!».","A":"28","app":[{"id":"59","dirty":false,"lemma":"ἂν εἴη","sigla":["A","M","Minas"],"query":false,"editors":["Minas"],"span":[86,92],"unit":59,"reading":"§SIG:A§§SIG:M§ : ἂν ἦν §SIG:Minas§"}],"label":"28","wit":"AM","n":28,"dawe":"28","num":"28","text":"Σχολαστικοῦ τὸν ἀντίχειρον κύων ἔδακεν. ὁ δὲ εἶπεν· Εἰ τὸ ἱμάτιον ἐπίασεν, ἐσχισμένον ἂν εἴη."},{"type":"joke","tr":"Di due gemelli, uno morì. Uno §I§scholastikos§/I§ si imbatté dunque in quello vivo e disse: «Sei morto tu, o tuo fratello?».","A":"29","app":[{"sigla":["A","Minas"],"query":false,"span":[3,7],"unit":60,"reading":"§SIG:Minas§ : ἡμῶν §SIG:A§","editors":["Minas"],"dirty":false,"id":"60","lemma":"ὑμῶν"},{"query":false,"sigla":["A","Boissonade"],"reading":"§SIG:Boissonade§ : κλέψωσιν §SIG:A§","unit":61,"span":null,"editors":["Boissonade"],"dirty":false,"id":"61","lemma":"βλέψωσιν"},{"dirty":false,"id":"62","lemma":"","query":false,"sigla":["A","Minas"],"reading":"§SIG:Minas§ : δηλοί §SIG:A§","unit":62,"span":null,"editors":["Minas"]},{"sigla":["A","Boissonade"],"query":false,"span":null,"reading":"§SIG:Boissonade§ : νενεολκημένα §SIG:A§","unit":63,"editors":["Boissonade"],"dirty":false,"id":"63","lemma":""}],"label":"29; 29 β [et 5 γ?]","wit":"AM","n":29,"dawe":"29","num":"29","text":"Διδύμων ἀδελφῶν ὁ ἕτερος ἐτελεύτησε. σχολαστικὸς οὖν προσελθὼν τῷ ζῶντι εἶπε· Σὺ ἀπέθανες ἢ ὁ ἀδελφός σου;"},{"type":"joke","A":"30","tr":"Uno §I§scholastikos§/I§ stando per naufragare chiedeva le tavolette per scrivere il testamento.","label":"30; 93 α et 29 β","app":[{"lemma":"ᾔτει","dirty":false,"id":"64","reading":"§SIG:A§ : ἤτοι §SIG:M§","unit":64,"span":[28,32],"editors":[],"query":false,"sigla":["A","M"]}],"wit":"AM","dawe":"30","num":"30","n":30,"text":"Σχολαστικὸς ναυαγεῖν μέλλων ᾔτει πινακίδας, ἵνα διαθήκας γράψῃ."},{"type":"joke","app":[{"id":"65","dirty":false,"lemma":"ποταμὸν","query":false,"sigla":["Eberhard"],"editors":["Eberhard"],"reading":"§SIG:Eberhard§","unit":65,"span":[24,31]},{"dirty":false,"id":"66","lemma":"δέ τινος","sigla":["A","M"],"query":false,"span":[102,110],"reading":"§SIG:A§ : om. §SIG:M§","unit":66,"editors":[]}],"label":"31; 95 α et 30 β","tr":"Uno §I§scholastikos§/I§ che voleva attraversare un fiume, salì sull’imbarcazione restando in groppa al cavallo. Quando uno gli chiese perché non scendesse, disse: «Ho fretta!».","A":"31","wit":"AM","text":"Σχολαστικὸς διαπερᾶσαι ‹ποταμὸν› βουλόμενος ἀνέβη εἰς τὸ πλοῖον μετὰ τοῦ ἵππου ἐποχούμενος. Πυθομένου δέ τινος, διὰ τί οὐ κάτεισι· Σπουδάζω, ἔφη.","n":31,"dawe":"31","num":"31"},{"text":"Σχολαστικὸς ἐπὶ δεῖπνον κληθεὶς οὐκ ἤσθιεν. ἐρωτήσαντος δέ τινος τῶν κεκλημένων· Διὰ τί οὐκ ἐσθίεις; ἔφη· Ἵνα μὴ τοῦ φαγεῖν ἕνεκα δόξω παρεῖναι.","n":32,"num":"32","dawe":"32","wit":"AM","app":[],"label":"32","tr":"Uno §I§scholastikos §/I§fu invitato a una cena e non mangiava. Qualcuno degli invitati gli chiese: «Perché non mangi?» e disse: «Perché io non sembri essere venuto qui per il cibo».","A":"32","type":"joke"},{"text":"Σχολαστικοῦ υἱὸς ἐσφαίριζε. πεσούσης οὖν εἰς φρέα τῆς σφαίρας, παρακύψας καὶ ἰδὼν τὴν ἑαυτοῦ σκιὰν ᾔτει τὴν σφαῖραν. εἶτα πρὸς τὸν πατέρα κατηγόρει ὡς μὴ ἀπολαβὼν αὐτήν. ὁ δὲ προκύψας εἰς τὸ φρέαρ καὶ ἰδὼν τὴν ἑαυτοῦ σκιὰν [ᾔτει τὴν σφαῖραν]· Οἰκοδέσποτα, φησίν, ἀπόδος τῷ παιδὶ τὴν σφαῖραν.","num":"33","dawe":"33","n":33,"wit":"AM","label":"33","app":[{"dirty":false,"id":"67","lemma":"ᾔτει","sigla":["A","M"],"query":false,"span":[99,103],"reading":"§SIG:A§ : ἤτοι utroque loco §SIG:M§","unit":67,"editors":[]},{"sigla":["A","M"],"query":false,"span":[175,183],"reading":"§SIG:A§ : παρακύψας §SIG:M§","unit":68,"editors":[],"dirty":false,"id":"68","lemma":"προκύψας"},{"id":"69","dirty":false,"lemma":"ᾔτει2 … σφαῖραν","sigla":["Thierfelder"],"query":false,"editors":["Thierfelder"],"span":[224,240],"unit":69,"reading":"del. §SIG:Thierfelder§"},{"lemma":"Οἰκοδέσποτα","dirty":false,"id":"70","span":[243,254],"reading":": ἰκοδεσπότα §SIG:A§§SIG:M§","unit":70,"editors":[],"sigla":["A","M"],"query":false},{"span":[270,272],"reading":"§SIG:A§ : τὶ seu τὲ seu τὸ §SIG:M§","unit":71,"editors":[],"sigla":["A","M"],"query":false,"lemma":"τῷ","dirty":false,"id":"71"}],"A":"33","tr":"Il figlio di uno §I§scholastikos§/I§ giocava a palla. Poiché la palla era caduta nel pozzo, si chinò e, vista la propria ombra, le chiedeva la palla. Successivamente disse al padre che non l’aveva recuperata. Questi si sporse sul pozzo, vide la propria ombra e disse: «Padrone di casa, rendi la palla a mio figlio».","type":"joke"},{"n":34,"dawe":"34","num":"34","text":"Σχολαστικὸς νοσοῦντα ἑταῖρον ἐπισκεπτόμενος ἠρώτα περὶ τῆς νόσου. τοῦ δὲ μὴ ἀποκρινομένου ὀργισθείς· Ἐλπίζω, εἶπε, κἀγὼ νοσῆσαι, καὶ οὐκ ἀποκρινοῦμαί σοι.","wit":"AM","tr":"Uno §I§scholastikos §/I§che visitava un amico malato faceva domande sulla malattia. Poiché questi non rispondeva, si arrabbiò e disse: «Spero di ammalarmi anche io, e non ti risponderò».","A":"34","app":[{"dirty":false,"id":"72","lemma":"ἐπισκεπτόμενος","query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ἐπισκεπτόμενον §SIG:M§","unit":72,"span":[29,43],"editors":[]},{"dirty":false,"id":"73","lemma":"εἶπε","sigla":["A","M"],"query":false,"span":[109,113],"unit":73,"reading":"§SIG:M§ : εἶπεν §SIG:A§ac","editors":[]}],"label":"34; 5 β [et 2 γ?]","type":"joke"},{"wit":"AM","n":35,"num":"35","dawe":"35","text":"Σχολαστικὸς κλεψιμαῖα ἀμφῶτα πριάμενος, ἵνα μὴ γνωσθῶσιν, ἐπίσσωσεν αὐτά.","type":"joke","tr":"Uno §I§scholastikos§/I§ comprò delle anfore rubate e, perché non fossero riconosciute, le impeciò.","A":"35","app":[{"span":[0,11],"unit":74,"reading":"§SIG:M§ : χολαστικὸς §SIG:A§","editors":[],"sigla":["A","M"],"query":false,"lemma":"Σχολαστικὸς","dirty":false,"id":"74"},{"lemma":"ἀμφῶτα","dirty":false,"id":"75","unit":75,"reading":"§SIG:A§ : ἐμφῶτα §SIG:M§","span":[22,28],"editors":[],"query":false,"sigla":["A","M"]},{"id":"76","dirty":false,"lemma":"ἐπίσσωσεν","sigla":["A","M"],"query":false,"editors":[],"span":[58,67],"reading":"§SIG:A§ : ἐπίσωσεν §SIG:M§","unit":76},{"dirty":false,"id":"77","lemma":"#","query":false,"sigla":["Minas"],"unit":77,"reading":"τοῦ δὲ πατρὸς αὐτοῦ §SIG:Minas§","span":null,"editors":["Minas"]}],"label":"35; cf. 164 α"},{"tr":"Uno §I§scholastikos§/I§ valutava il vestiario di quelli che incontrava. Quando suo padre, dopo aver sentito da alcuni ciò, lo rimproverava, disse: «Padre, sei stato convinto di ciò da calunnie, e forse nemmeno di persona”. Quello rispose: «Me l’ha detto il tale, e tu ascolti quello, che ha un mantello da nemmeno cinquanta dracme?!».","A":"36","app":[{"id":"78","dirty":false,"lemma":"τινων","query":false,"sigla":["A","M"],"editors":[],"unit":78,"reading":"§SIG:A§ : τινος §SIG:M§","span":[72,77]},{"lemma":"Πάτερ εἶπεν","dirty":false,"id":"79","unit":79,"reading":"§SIG:A§ : εἶπε πάτερ §SIG:M§","span":[116,128],"editors":[],"query":false,"sigla":["A","M"]},{"unit":80,"reading":"§SIG:A§ : ἔννου §SIG:Dawe§ : ἄνου exarat §SIG:M§","span":[177,185],"editors":["Dawe"],"query":false,"sigla":["A","Dawe","M"],"lemma":"ἀνθρώπου","dirty":false,"id":"80"},{"span":[216,222],"reading":"§SIG:M§ : εἴρηκεν §SIG:A§ac","unit":81,"editors":[],"sigla":["A","M"],"query":false,"lemma":"εἴρηκε","dirty":false,"id":"81"},{"query":false,"sigla":["A","M","Minas"],"editors":["Minas"],"unit":82,"reading":"§SIG:Minas§ : ἔφησεν §SIG:A§§SIG:M§","span":[231,234],"id":"82","dirty":false,"lemma":"ἔφη"},{"query":false,"sigla":["A","M"],"editors":[],"unit":83,"reading":"§SIG:A§ : ἐκεῖνο §SIG:M§","span":[236,242],"id":"83","dirty":false,"lemma":"ἐκείνῳ"}],"label":"36","type":"joke","n":36,"num":"36","dawe":"36","text":"Σχολαστικὸς τῶν ἀπαντώντων τὰ ἱμάτια ἐτιμᾶτο. τούτου δὲ τοῦ πατρὸς παρά τινων τοῦτο ἀκούσαντος καὶ ἐπιτιμῶνος αὐτῷ· Πάτερ, εἶπεν, ὑπὸ διαβολῆς πέπεισαι τοῦτο, καὶ ἴσως οὐδ’ ὑπὸ ἀνθρώπου. τοῦ δὲ εἰπόντος· Ὁ δεῖνά μοι εἴρηκε Καὶ σύ, ἔφη, ἐκείνῳ προσέχεις, ὃς οὐδὲ πεντήκοντα δραχμῶν ἱμάτιον ἔχει;","wit":"AM"},{"A":"37","tr":"Uno §I§scholastikos§/I§ vendeva un cavallo. Poiché era giunto un tale e ne esaminava la dentatura, disse: «Perché osservi i suoi denti? Oh, se trottasse tanto quanto mangia!».","label":"37; 6 β","app":[{"dirty":false,"id":"84","lemma":"καταμανθάνοντος","sigla":["A","M","Thierfelder"],"query":false,"span":[52,67],"unit":84,"reading":"§SIG:Thierfelder§ coll. 165α καταμαθόντος §SIG:A§§SIG:M§","editors":["Thierfelder"]},{"lemma":"εἶπεν","dirty":false,"id":"85","span":[84,89],"reading":"§SIG:A§ : εἶπε §SIG:M§","unit":85,"editors":[],"sigla":["A","M"],"query":false}],"type":"joke","num":"37","dawe":"37","n":37,"text":"Σχολαστικὸς ἵππον ἐπίπρασκεν. ἐλθόντος δέ τινος καὶ καταμανθάνοντος αὐτοῦ τὸν βόλον εἶπεν πρὸς αὐτόν· Τί τοὺς ὀδόντας αὐτοῦ καταμανθάνεις; εἴθε ὡς τρώγει, οὕτως καὶ περιεπάτει.","wit":"AM"},{"label":"38","app":[],"A":"38","tr":"Uno §I§scholastikos§/I§, essendo il padre molto malato, chiese agli amici di portare corone di fiori per il funerale. Ma poiché l’indomani quello stava meglio, e gli amici si erano arrabbiati, disse: «Anche io mi vergogno che voi ci abbiate rimesso. Domani dunque portate le corone: comunque starà, gli farò il funerale».","type":"joke","text":"Σχολαστικὸς πρεσβύτου πατρὸς σφόδρα νοσοῦντος τοὺς ἑταίρους ἠξίωσε στεφάνους φέρειν ἐπ’ ἐκφορᾷ. τῇ δὲ ἐπιούσῃ ἡμέρᾳ βέλτιον αὐτοῦ σχόντος, ὡς ἠγανάκτουν οἱ ἑταῖροι· Κἀγώ, ἔφη, αἰσχύνομαι ζημιουμένων ὑμῶν. αὔριον οὖν φέρετε τοὺς στεφάνους· τοῦτον γὰρ ὡς ἂν ἔχῃ ἐξοίσω.","num":"38","dawe":"38","n":38,"wit":"A"},{"app":[{"editors":[],"reading":"om §SIG:M§","unit":86,"span":[16,20],"query":false,"sigla":["M"],"lemma":"ὁμοῦ","id":"86","dirty":false},{"lemma":"ἕτερος","dirty":false,"id":"87","unit":87,"reading":"§SIG:Minas§ : ἑταῖρος §SIG:A§","span":[42,48],"editors":["Minas"],"query":false,"sigla":["A","Minas"]},{"sigla":["A","M"],"query":false,"span":[71,77],"reading":"§SIG:M§ : ἀδελφε §SIG:A§","unit":88,"editors":[],"dirty":false,"id":"88","lemma":"Ἀδελφέ"},{"dirty":false,"id":"89","lemma":"ἀλεκτρυὼν","sigla":["A","M"],"query":false,"span":[100,109],"reading":"§SIG:A§ : ἀλεκτρὼν §SIG:M§ac","unit":89,"editors":[]}],"label":"39; 37 β","tr":"Due §I§scholastikoi§/I§ camminavano insieme. Quando uno dei due, avendo visto una gallina nera, dice: «Fratello, forse il gallo di questa è morto!».","A":"39","type":"joke","text":"Σχολαστικοὶ δύο ὁμοῦ ἐβάδιζον. ἰδὼν οὖν ὁ ἕτερος αὐτῶν μέλαιναν ὄρνιν· Ἀδελφέ, φησίν, ἴσως ταύτης ὁ ἀλεκτρυὼν ἀπέθανεν.","n":39,"dawe":"39","num":"39","wit":"AM"},{"tr":"Uno §I§scholastikos§/I§ che aveva perso un figlio piccolo, dopo che ebbe visto che molti erano giunti al rito funebre per la sua autorità, disse: «Mi vergogno di portare un bimbo piccolo in una folla tanto grande».","A":"40","app":[{"span":[87,95],"unit":90,"reading":"§SIG:Minas§ §SIG:Eberhard§ : ἀπουσίαν §SIG:A§§SIG:M§ : περιουσίαν §SIG:Boissonade§ : πλουσίαν ‹...› §SIG:Dawe§","editors":["Boissonade","Dawe","Eberhard","Minas"],"sigla":["A","Boissonade","Dawe","Eberhard","M","Minas"],"query":false,"lemma":"ἐξουσίαν","dirty":false,"id":"90"}],"label":"40; 33 β","type":"joke","n":40,"dawe":"40","num":"40","text":"Σχολαστικὸς μικρὸν υἱὸν ἀπολέσας, θεασάμενος πολλοὺς ἐπὶ τὸ κῆδος ἀπαντήσαντας διὰ τὴν ἐξουσίαν αὐτοῦ ἔλεγεν· Αἰδοῦμαι μικρὸν παιδίον εἰς τοσοῦτον ὄχλον ἐκφέρων.","wit":"AM"},{"type":"joke","A":"41","tr":"Uno §I§scholastikos §/I§che vendeva una casa portava in giro una pietra di questa a mo’ di dimostrazione.","label":"41; 10 β","app":[{"lemma":"περιέφερεν","dirty":false,"id":"91","span":[52,62],"reading":"§SIG:A§ : περιέφερε §SIG:M§","unit":91,"editors":[],"sigla":["A","M"],"query":false}],"wit":"AM","dawe":"41","num":"41","n":41,"text":"Σχολαστικὸς οἰκίαν πωλῶν λίθον ἀπ’ αὐτῆς εἰς δεῖγμα περιέφερεν."},{"type":"joke","A":"42","tr":"Quando due §I§scholastikoi§/I§ erano in viaggio, uno, poiché la pancia incalzava, rimase un po’ indietro. Ma avendo trovato scritto dal compagno sul cippo miliario: «Raggiungimi‹…›»","label":"42; 137 α","app":[{"id":"92","dirty":false,"lemma":"Κατάλαβέ με","sigla":["Eberhard"],"query":false,"editors":["Eberhard"],"span":[131,142],"reading":"αὐτὸς ἐπέγραψε· Καὶ σὺ μεῖνόν με suppl. §SIG:Eberhard§ coll. 137α","unit":92}],"wit":"A","num":"42","dawe":"42","n":42,"text":"Σχολαστικῶν δύο ὁδευόντων ὁ ἕτερος τῆς γαστρὸς ἀναγκαζούσης μικρὸν ἀπελείφθη. εὑρὼν δὲ ἐν τῷ μιλίῳ ἐπιγεγραμμένον παρὰ τοῦ ἑτέρου· Κατάλαβέ με ‹....›"},{"wit":"AM","text":"Σχολαστικὸς ἀκούσας παρά τινων ὅτι Ὁ πώγων σου ἤδη ἔρχεται, ἀπελθὼν εἰς τὴν πύλην ἐξεδέχετο αὐτόν. ἕτερος δὲ τὴν πρόφασιν ἐρωτήσας καὶ γνούς· Εἰκότως, εἶπε, μωροὶ νομιζόμεθα· πόθεν γὰρ οἶδας, εἰ διὰ τῆς ἑτέρας πύλης ἔρχεται;","num":"43","dawe":"43","n":43,"type":"joke","label":"43","app":[{"lemma":"ἕτερος … ἐρωτήσας","id":"93","dirty":false,"editors":[],"span":[99,130],"unit":93,"reading":"§SIG:A§ : ἑτέρου...ἐρωτήσοντος §SIG:M§","sigla":["A","M"],"query":false},{"editors":[],"span":[151,155],"reading":"§SIG:M§ : εἶπεν §SIG:A§ac","unit":94,"sigla":["A","M"],"query":false,"lemma":"εἶπε","id":"94","dirty":false}],"A":"43","tr":"Uno §I§scholastikos§/I§, poiché aveva sentito da alcuni che gli stava venendo la barba, giunse alla porta e rimase lì ad aspettarla. Un altro, dopo aver chiesto e appreso la ragione, disse: «Giustamente siamo considerati fessi! Come sai se non arriva dall’atra porta?»."},{"A":"44","tr":"Di notte, uno §I§scholastikos§/I§ che dormiva col padre, dopo essersi alzato dal letto mangiucchiava grappoli d’uva appesi in alto. Dal momento che suo padre aveva nascosta una lucerna sotto una pentola, e aveva poi rivelato improvvisamente la luce, quando lo §I§scholastikos§/I§ si era alzato, questi, rimasto immobile in piedi, russava fingendo di dormire.","label":"44; 38 β","app":[{"span":[203,208],"reading":"§SIG:Minas§ : ὀρθῶς §SIG:A§§SIG:M§","unit":95,"editors":["Minas"],"sigla":["A","M","Minas"],"query":false,"lemma":"ὀρθὸς","dirty":false,"id":"95"}],"type":"joke","dawe":"44","num":"44","n":44,"text":"Σχολαστικὸς μετὰ τοῦ πατρὸς καθεύδων, ἀνιστάμενος ἐπὶ τῆς κλίνης νυκτὸς ἔτρωγε σταφυλὰς ὑπεράνω κρεμαμένας. τοῦ δὲ πατρὸς αὐτοῦ ὑπὸ χύτραν λύχνον κρύψαντος, εἶτα, ὅτε ἀνέστη, τὸ φῶς ἄφνω δείξαντος, ὁ δὲ ὀρθὸς ἑστὼς ἔρεγχε καθεύδειν προσποιούμενος.","wit":"AM"},{"type":"joke","A":"45","tr":"Un amico che era in un viaggio all’estero scrisse ad uno §I§scholastikos§/I§ di acquistargli dei libri. Quello non se ne diede cura e, incontrato l’amico rientrato, disse: «La lettera che mi hai mandato a proposito dei libri, non l’ho ricevuta».","label":"44b","app":[{"sigla":["A","M","Minas"],"query":false,"span":[11,18],"unit":96,"reading":"§SIG:Minas§ : ἕτερος §SIG:A§§SIG:M§","editors":["Minas"],"dirty":false,"id":"96","lemma":"ἑταῖρος"}],"wit":"AM","dawe":"44b","num":"44","n":45,"text":"Σχολαστικῷ ἑταῖρος ἀποδημῶν ἔγραψεν, ἵν’ αὐτῶν βιβλία πρίηται. ὁ δὲ ὀλιγωρήσας, ἐπανελθόντι αὐτῷ ἀπαντήσας· Τὴν ἐπιστολήν, εἶπεν, ἣν περὶ τῶν βιβλίων ἀπέστειλας, οὐκ ἐδεξάμην."},{"type":"joke","app":[{"lemma":"τοσοῦτος","id":"97","dirty":false,"editors":[],"span":[98,106],"unit":97,"reading":"§SIG:M§ : τοσούτους §SIG:A§ac","sigla":["A","M"],"query":false}],"label":"45; 14 β","tr":"Uno §I§scholastikos§/I§ di notte si era messo sopra la propria nonna. Dopo aver preso botte dal padre per questo motivo, disse: «Tu, è tanto tempo che monti mia madre, e non ti sei buscato nulla da me, e ora ti arrabbi per avermi trovato una volta con tua mamma?».","A":"46","wit":"AM","text":"Σχολαστικὸς νυκτὸς ἐπανέστη τῇ μάμμῃ ἑαυτοῦ. πληγὰς δὲ διὰ τοῦτο ὑπὸ τοῦ πατρὸς λαβών· Σύ, εἶπεν, τοσοῦτος χρόνος ἐστὶν ἐξ οὗ τὴν μητέρα μου ὀχεύεις, μηδὲν ὑπ’ ἐμοῦ παθών, καὶ νῦν ὀργίζῃ ἐπὶ τῇ μητρί σου ἅπαξ με εὑρών;","n":46,"dawe":"45","num":"45"},{"n":47,"dawe":"46","num":"46","text":"Σχολαστικῷ πραγματευτὴς ἀπήγγειλεν, ὅτι τὸ χωρίον αὐτοῦ ὁ ποταμὸς ἔλαβεν. ὁ δὲ ἀνακραγὼν ἀπεκρίνατο λέγων· Βιάζεται ἡμᾶς.","wit":"AM","tr":"Un amministratore disse ad uno §I§scholastikos§/I§ che il fiume aveva preso il suo podere. Quello allora gridò e rispose: «Ci hanno sabotato!».","A":"47","app":[{"lemma":"ὅτι","dirty":false,"id":"98","reading":"§SIG:A§ : ὅτου §SIG:M§","unit":98,"span":[36,39],"editors":[],"query":false,"sigla":["A","M"]},{"lemma":"ἀνακραγὼν","dirty":false,"id":"99","span":[79,88],"reading":"§SIG:A§ : ἀνακραγῶν §SIG:M§","unit":99,"editors":[],"sigla":["A","M"],"query":false}],"label":"46; 16 β","type":"joke"},{"A":"48","tr":"Uno §I§scholastikos§/I§, trovandosi una volta nel podere, vide le greggi uscire al pascolo. E quando le vide come al solito belare, ne chiedeva la ragione. Quando l’amministratore gli disse per scherzo: «Ti salutano!», fece: «Per la mia salvezza! Per me, da’ loro le ferie e per tre giorni non portarle fuori al pascolo».","label":"47","app":[{"id":"100","dirty":false,"lemma":"χρόνου","query":false,"sigla":["A","M"],"editors":[],"unit":100,"reading":"§SIG:A§ : χρόνον §SIG:M§","span":[16,22]},{"editors":["Dawe","Thierfelder"],"span":[107,116],"unit":101,"reading":"§SIG:Thierfelder§ : βληχόμενα §SIG:A§ : γλυκόμενα §SIG:M§ : γλυκυνόμενα §SIG:Dawe§","sigla":["A","Dawe","M","Thierfelder"],"query":false,"lemma":"βληχώμενα","id":"101","dirty":false},{"editors":["Dawe"],"span":[157,170],"unit":102,"reading":"§SIG:A§§SIG:M§ : προσπαίζοντος §SIG:Dawe§","sigla":["A","Dawe","M"],"query":false,"lemma":"προσπαίξαντος","id":"102","dirty":false},{"lemma":"σοι","id":"103","dirty":false,"editors":[],"unit":103,"reading":"§SIG:A§ : om. §SIG:M§ac add. §SIG:M§1","span":[208,211],"query":false,"sigla":["A","M"]},{"query":false,"sigla":["M"],"editors":[],"reading":"ἀργίαν in ras. scr. §SIG:M§1","unit":104,"span":[240,246],"id":"104","dirty":false,"lemma":"ἀργίαν"},{"lemma":"αὐτοῖς","id":"105","dirty":false,"editors":[],"span":[247,253],"unit":105,"reading":"§SIG:A§ : αὐτῆ §SIG:M§","sigla":["A","M"],"query":false},{"id":"106","dirty":false,"lemma":"ἐξαγάγῃς","sigla":["A","M"],"query":false,"editors":[],"span":[278,286],"reading":"§SIG:A§ : ἐξαγάγεις §SIG:M§","unit":106}],"type":"joke","dawe":"47","num":"47","n":48,"text":"Σχολαστικὸς διὰ χρόνου εἰς τὸν ἀγρὸν παραγενόμενος ἐθεάσατο τὰ θρέμματα ἐξιόντα ἐπὶ βόσκησιν. καὶ ὡς εἴωθε βληχώμενα ἰδὼν ἠρώτα τὴν αἰτίαν. τοῦ δὲ οἰκονόμου προσπαίξαντος καὶ εἰπόντος· Ἀσπάζονταί σε Τὴν ἐμήν σοι σωτηρίαν, φησίν, ἐμοῦ ἕνεκα ἀργίαν αὐτοῖς δὸς καὶ τρεῖς ἡμέρας μὴ ἐξαγάγῃς αὐτὰ εἰς νομήν.","wit":"AM"},{"type":"joke","tr":"Uno §I§scholastikos§/I§ indossò delle scarpe nuove. Siccome dunque stridevano, si fermò e disse: «Non cigolate, poiché vi romperete le gambe».","A":"49","app":[{"lemma":"καινὰ","id":"107","dirty":false,"editors":[],"reading":"§SIG:A§ : κενᾶ §SIG:M§","unit":107,"span":[12,17],"query":false,"sigla":["A","M"]},{"lemma":"ὑπεδήσατο","id":"108","dirty":false,"editors":[],"reading":"§SIG:A§ : ὑποδήσατο §SIG:M§","unit":108,"span":[28,37],"query":false,"sigla":["A","M"]},{"lemma":"οὖν αὐτῶν","id":"109","dirty":false,"editors":[],"unit":109,"reading":"in ras. scr. §SIG:M§1","span":[49,58],"query":false,"sigla":["M"]},{"sigla":["A","M","Minas"],"query":false,"editors":["Minas"],"span":[71,78],"unit":110,"reading":"§SIG:Minas§ : τρίζεται §SIG:A§§SIG:M§","id":"110","dirty":false,"lemma":"τρίζετε"},{"sigla":["A","M"],"query":false,"editors":[],"span":[101,105],"reading":"§SIG:A§ : ἡμῶν §SIG:M§","unit":111,"id":"111","dirty":false,"lemma":"ὑμῶν"},{"dirty":false,"id":"112","lemma":"κλάσετε","sigla":["A","Dawe","M","Minas","Thierfelder"]," i del fatto che era stato istruito/aveva compiuto gli studi, aggiunse: «Prego di trovarti con un processo capitale, affinché io ti mostri l’avvocato che sono!».","A":"55"},{"type":"joke","label":"55; 31 β","app":[],"A":"56","tr":"Uno §I§scholastikos§/I§ buontempone essendo privo di denaro vendeva i propri libri, e scrivendo al padre diceva: «Rallegrati per noi, infatti già ci sfamano i libri/già viviamo dei nostri libri».","wit":"AM","text":"Σχολαστικὸς εὐτράπελος ἀπορῶν δαπανημάτων τὰ βιβλία ἑαυτοῦ ἐπίπρασκε· καὶ γράφων πρὸς τὸν πατέρα ἔλεγε· Σύγχαιρε ἡμῖν, ἤδη γὰρ ἡμᾶς τὰ βιβλία τρέφει.","dawe":"55","num":"55","n":56},{"tr":"Uno §I§scholastikos§/I§, un pelato e un barbiere che viaggiavano insieme e che si erano fermati in un posto isolato, stabilirono fare dei turni di veglia per quattro ore e di sorvegliare i bagagli di ciascuno. Poiché al barbiere toccò per primo di vigilare, volendo distrarsi rasò per primo lo §I§scholastikos§/I§ mentre dormiva, e dopo che furono passate le ore, lo svegliò. Lo §I§scholastikos§/I§ però, accarezzandosi la testa (come si fa) dopo il sonno, si trovò calvo e disse: «Gran canaglia il barbiere! Si è sbagliato e invece di me ha svegliato il pelato!».","A":"57","app":[{"lemma":"ὡρῶν","dirty":false,"id":"131","unit":131,"reading":"§SIG:M§ : ὁρῶν §SIG:A§","span":[248,252],"editors":[],"query":false,"sigla":["A","M"]},{"id":"132","dirty":false,"lemma":"πληρωθεισῶν","sigla":["A","M"],"query":false,"editors":[],"span":[253,264],"unit":132,"reading":"§SIG:A§ : πληρωθησῶν §SIG:M§"},{"query":false,"sigla":["A","M"],"unit":133,"reading":"§SIG:A§ : δι’ ὕπνησεν §SIG:M§","span":[265,274],"editors":[],"dirty":false,"id":"133","lemma":"διύπνισεν"},{"span":[293,298],"reading":"§SIG:A§ : ψύχων §SIG:M§","unit":134,"editors":[],"sigla":["A","M"],"query":false,"lemma":"ψήχων","dirty":false,"id":"134"},{"lemma":"ψιλόν","dirty":false,"id":"135","reading":"§SIG:A§ : ψηλὸν §SIG:M§","unit":135,"span":[341,346],"editors":[],"query":false,"sigla":["A","M"]},{"lemma":"ὁ κουρεύς","dirty":false,"id":"136","span":[369,378],"unit":136,"reading":"§SIG:A§ : κουρεύς §SIG:M§","editors":[],"sigla":["A","M"],"query":false}],"label":"56; 23 β","type":"joke","n":57,"dawe":"56","num":"56","text":"Σχολαστικὸς καὶ φαλακρὸς καὶ κουρεὺς συνοδεύοντες καὶ ἔν τινι ἐρημίᾳ μείναντες συνέθεντο πρὸς τέσσαρας ὥρας ἀγρυπνῆσαι καὶ τὰ σκεύη ἕκαστος τηρῆσαι. ὡς δὲ ἔλαχε τῷ κουρεῖ πρώτῳ φυλάξαι, μετεωρισθῆναι θέλων τὸν σχολαστικὸν καθεύδοντα ἔξυρεν καὶ τῶν ὡρῶν πληρωθεισῶν διύπνισεν. ὁ δὲ σχολαστικὸς ψήχων ὡς ἀπὸ ὕπνου τὴν κεφαλὴν καὶ εὑρὼν ἑαυτὸν ψιλόν· Μέγα κάθαρμα, φησίν, ὁ κουρεύς· πλανηθεὶς γὰρ ἀντ’ ἐμοῦ τὸν φαλακρὸν ἐξύπνισεν.","wit":"AM"},{"wit":"A","dawe":"57","num":"57","n":58,"text":"Σχολαστικῷ ἐκ δούλης τεκνώσαντι ὁ πατὴρ συνεβούλευε τὸ παιδίον ἀποκτεῖναι. ὁ δέ· Πρῶτον, ἔφη, σὺ τὰ τέκνα σου κατόρυξον, καὶ οὕτως ἐμοὶ συμβούλευε τὸν ἐμὸν ἀνελεῖν.","type":"joke","A":"58","tr":"Il padre consigliava ad uno §I§scholastikos§/I§ che stava per avere un figlio da una schiava, di uccidere il bambino. Quello allora disse: «Per prima cosa sotterra i tuoi figli, e solo allora consigliami di ammazzare il mio».","label":"57","app":[{"editors":["Minas"],"span":[136,146],"reading":"§SIG:Minas§ : συνεβούλευε §SIG:A§","unit":137,"sigla":["A","Minas"],"query":false,"lemma":"συμβούλευε","id":"137","dirty":false},{"lemma":"τὸν ἐμὸν","id":"138","dirty":false,"editors":["Boissonade","Eberhard"],"span":[147,155],"reading":"§SIG:A§ : τὸ ἐμὸν §SIG:Boissonade§ : τοὐμὸν §SIG:Eberhard§ io accetterei (preferibilmente) Eberhard, ton è maschile!","unit":138,"sigla":["A","Boissonade","Eberhard"],"query":false}]},{"type":"joke","A":"59","tr":"Un inserviente dei bagni versava acqua calda sui piedi di uno §I§scholastikos §/I§che era entrato alle terme. Quello allora disse: «Canaglia, versi acqua calda su un uomo freddo?!».","label":"58","app":[{"lemma":"Σχολαστικοῦ … παραχύτης","dirty":false,"id":"139","span":[0,47],"unit":139,"reading":"§SIG:A§§SIG:M§ : Σχολαστικὸς ... εἰσελθὼν, ὁ παραχύτης","editors":[],"sigla":["A","M"],"query":false},{"id":"140","dirty":false,"lemma":"ψυχρῷ … προσχεῖς","query":false,"sigla":["M"],"editors":[],"unit":140,"reading":"leggi bene cosa c’è in §SIG:M§","span":[97,126]},{"query":false,"sigla":["Thierfelder"],"editors":["Thierfelder"],"reading":"del. §SIG:Thierfelder§","unit":141,"span":[48,54],"id":"141","dirty":false,"lemma":"θερμὸν"}],"wit":"AM","num":"58","dawe":"58","n":59,"text":"Σχολαστικοῦ εἰς βαλανεῖον εἰσελθόντος παραχύτης θερμὸν τοῖς ποσὶ προσέχεεν. ὁ δέ· Κάθαρμα, εἶπε, ψυχρῷ ἀνθρώπῳ θερμὸν προσχεῖς;"},{"wit":"AM","text":"Σχολαστικὸς ἀκούσας τινός, ὅτι καλὴν ὄρνιν ἕωλον σιτευτὴν ἐδείπνησε, προσελθὼν τῷ σιτευταρίῳ ἔλεγεν· Ἕωλον μοι ὄρνιν θῦσον.","dawe":"59","num":"59","n":60,"type":"joke","label":"59","app":[{"unit":142,"reading":"§SIG:A§ : ἕαλον σιτευτὴν §SIG:M§ : σιτευτὴν ἕωλον §SIG:Dawe§","span":[43,57],"editors":["Dawe"],"query":false,"sigla":["A","Dawe","M"],"lemma":"ἕωλον σιτευτὴν","dirty":false,"id":"142"},{"sigla":["A","M"],"query":false,"editors":[],"span":[117,122],"unit":143,"reading":": θῦσον §SIG:A§§SIG:M§","id":"143","dirty":false,"lemma":"θῦσον"}],"A":"60","tr":"Uno §I§scholastikos§/I§ sentì un tale che aveva pranzato con una gallina allevata avanzata dal giorno prima e, giunto dall’allevatore diceva: «Cuocimi una gallina di ieri»."},{"tr":"Uno §I§scholastikos§/I§ che aveva un terreno a molte miglia, per renderlo più vicino abbatté sette miglia.","A":"61","app":[{"span":[47,51],"unit":144,"reading":"§SIG:A§ : αὐτὸς §SIG:M§","editors":[],"sigla":["A","M"],"query":false,"lemma":"αὐτὸ","dirty":false,"id":"144"},{"dirty":false,"id":"145","lemma":"ποιήσῃ","query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ποιήσει §SIG:M§","unit":145,"span":[62,68],"editors":[]},{"lemma":"μίλια","dirty":false,"id":"146","unit":146,"reading":"§SIG:A§§SIG:M§ : μιλιάρια fort. §SIG:Thierfelder§","span":[75,80],"editors":["Thierfelder"],"query":false,"sigla":["A","M","Thierfelder"]}],"label":"60","type":"joke","n":61,"num":"60","dawe":"60","text":"Σχολαστικὸς ἀπὸ πολλῶν μιλίων χωρίον ἔχων, ἵν’ αὐτὸ ἐγγύτερον ποιήσῃ, ἑπτὰ μίλια κατέβαλεν.","wit":"AM"},{"wit":"AM","num":"61","dawe":"61","n":62,"text":"Σχολαστικὸς χαμαιδιδάσκαλος ἄφνω ἀποβλέψας εἰς τὴν γωνίαν ἐβόησε· Διονύσιος ἐν τῇ γωνίᾳ ἀτακτεῖ. εἰπόντος δέ τινος, ὅτι οὔπω πάρεστιν, ὁ δὲ ἔφη· Ὅταν ἔλθῃ.","type":"joke","A":"62","tr":"Un maestro elementare §I§scholastikos §/I§alzò improvvisamente lo sguardo in un angolo e gridò: «Dionisio è indisciplinato nell’angolo!». Ma uno gli disse che non c’era ancora, e allora quello fece: «Quando arriverà».","label":"61","app":[{"lemma":"χαμαιδιδάσκαλος","dirty":false,"id":"147","span":[12,27],"reading":"§SIG:Minas§ : χαμαὶ διδάσκαλος §SIG:A§§SIG:M§","unit":147,"editors":["Minas"],"sigla":["A","M","Minas"],"query":false},{"lemma":"ἐβόησε· … γωνίᾳ","id":"148","dirty":false,"editors":[],"reading":"§SIG:A§ : om. §SIG:M§","unit":148,"span":[58,87],"query":false,"sigla":["A","M"]},{"lemma":"ἔλθῃ","dirty":false,"id":"149","span":[150,154],"unit":149,"reading":"§SIG:A§ : ἔλθοι §SIG:M§","editors":[],"sigla":["A","M"],"query":false}]},{"app":[{"lemma":"ἐτηρίδι","id":"150","dirty":false,"editors":["Minas"],"unit":150,"reading":"§SIG:Minas§ : ἐταιρίδι §SIG:A§","span":[15,22],"query":false,"sigla":["A","Minas"]},{"reading":"del. §SIG:Dawe§","unit":151,"span":[76,79],"editors":["Dawe"],"query":false,"sigla":["Dawe"],"lemma":"καὶ","dirty":false,"id":"151"}],"label":"62","tr":"Uno §I§scholastikos§/I§ alla festa che ogni mille anni si tiene a Roma vide un atleta che era stato sconfitto e che piangeva, e consolandolo disse: «Non abbatterti, tu vincerai alla celebrazione del prossimo millenario».","A":"63","type":"joke","text":"Σχολαστικὸς τῇ ἐτηρίδι, ἣ διὰ χιλίων ἐτῶν ἄγεται ἐν Ῥώμῃ, ἡττηθέντα ἀθλητὴν καὶ δακρύοντα ἰδών, παραμυθούμενος· Μὴ λυποῦ, ἔφη, τὴν γὰρ ἄλλην χιλιετηρίδα σὺ νικήσεις.","n":63,"num":"62","dawe":"62","wit":"A"},{"n":64,"num":"63","dawe":"63","text":"Σχολαστικὸς συνεκάθητο ἡγεμόνι δεξιοπήρῳ. εἰς ἐώραν οὖν ἐξελθόντος αὐτοῦ καὶ ἐπαινοῦντος ‹τὰς› ἐν τοῖς ἀριστεροῖς μέρεσιν ἀμπέλους· Ὅταν ἐπανερχώμεθα, φησί, καὶ τὰ ἄλλα μέρη ἀρέσει σοι.","wit":"AM","tr":"Uno §I§scholastikos §/I§era con un governatore cieco all’occhio destro. Quando questi era uscito per una passeggiata e lodava le viti negli appezzamenti a sinistra, disse: «Quando torneremo indietro ti piacerà anche l’altra parte».","A":"64","app":[{"id":"152","dirty":false,"lemma":"ἡγεμόνι","sigla":["A","M"],"query":false,"editors":[],"span":[23,30],"unit":152,"reading":"§SIG:A§ : ἡγεμῶνι §SIG:M§"},{"sigla":["A","M","Minas"],"query":false,"span":[46,51],"unit":153,"reading":": ἑώραν §SIG:Minas§ : εώραν §SIG:A§ : ὥραν §SIG:M§","editors":["Minas"],"dirty":false,"id":"153","lemma":"ἐώραν"},{"editors":[],"span":[52,55],"unit":154,"reading":"§SIG:M§ : οὖν οὖν §SIG:A§","sigla":["A","M"],"query":false,"lemma":"οὖν","id":"154","dirty":false},{"sigla":["Eberhard"],"query":false,"span":[90,93],"unit":155,"reading":"(o add.: scegli omogeneo!) §SIG:Eberhard§","editors":["Eberhard"],"dirty":false,"id":"155","lemma":"τὰς"},{"span":[137,149],"unit":156,"reading":"§SIG:A§ : ἐπανερχόμεθα §SIG:M§","editors":[],"sigla":["A","M"],"query":false,"lemma":"ἐπανερχώμεθα","dirty":false,"id":"156"},{"dirty":false,"id":"157","lemma":"τὰ ἄλλα","query":false,"sigla":["A","M"],"reading":"§SIG:A§ : τἄλλα §SIG:M§","unit":157,"span":[161,168],"editors":[]}],"label":"63","type":"joke"},{"tr":"Uno §I§scholastikos§/I§ comprò delle brache e, siccome le indossò a fatica dato che erano strette, si depilò.","A":"65","app":[{"lemma":"ἐπεὶ δὲ","id":"158","dirty":false,"editors":["Eberhard"],"span":[29,36],"unit":158,"reading":"§SIG:A§ : ἐπειδὴ §SIG:Eberhard§","sigla":["A","Eberhard"],"query":false},{"id":"159","dirty":false,"lemma":"ἐδρωπακίσατο","query":false,"sigla":["A","Boissonade"],"editors":["Boissonade"],"unit":159,"reading":"§SIG:Boissonade§ : ἐδροπακίσατο §SIG:A§","span":[67,79]},{"sigla":["A","Eberhard"],"query":false,"editors":["Eberhard"],"span":[29,36],"reading":"§SIG:Eberhard§ : ἐπειδή §SIG:A§","unit":160,"id":"160","dirty":false,"lemma":"ἐπεὶ δὲ"}],"label":"64; 25 β","type":"joke","n":65,"num":"64","dawe":"64","text":"Σχολαστικὸς βράκας ἀγοράσας, ἐπεὶ δὲ στενὰς οὔσας μόγις ὑπεδύσατο, ἐδρωπακίσατο.","wit":"A"},{"app":[{"sigla":["A","M"],"query":false,"editors":[],"span":[99,109],"reading":"§SIG:A§ : ὀλέσθαι §SIG:M§","unit":161,"id":"161","dirty":false,"lemma":"ἐλεύσεσθαι"}],"label":"65; 35 β","tr":"Il figlio di uno §I§scholastikos§/I§, inviato dal padre in guerra, promise che avrebbe fatto ritorno avendo la testa di un nemico. L’altro disse: «Anche se dovessi vedere te fare ritorno senza testa, mi rallegrerò».","A":"66","type":"joke","text":"Σχολαστικοῦ υἱὸς ὑπὸ τοῦ πατρὸς εἰς τὸν πόλεμον ἐκπεμπόμενος ὑπέσχετο κεφαλὴν ἑνὸς τῶν ἐχθρῶν ἔχων ἐλεύσεσθαι. ὁ δὲ ἔφη· Κἂν χωρίς σε κεφαλῆς ἐλθόντα ἴδω, εὐφρανθήσομαι.","n":66,"dawe":"65","num":"65","wit":"AM"},{"text":"Σχολαστικὸς ἐν ποταμῷ θεασάμενος ἁλιάδα σίτου μεστὴν καὶ βεβαρημένην· Ἐὰν μικρόν, εἶπεν, ὁ ποταμὸς αὐξήσῃ, βυθισθήσεται.","num":"66","dawe":"66","n":67,"wit":"AM","label":"66","app":[{"lemma":"ἁλιάδα","id":"162","dirty":false,"editors":[],"unit":162,"reading":"§SIG:A§ : ἁλιᾶ §SIG:M§","span":[33,39],"query":false,"sigla":["A","M"]},{"unit":163,"reading":"§SIG:A§ : βεβαρυμένην §SIG:M§","span":[57,68],"editors":[],"query":false,"sigla":["A","M"],"lemma":"βεβαρημένην","dirty":false,"id":"163"},{"query":false,"sigla":["A","M"],"unit":164,"reading":"§SIG:A§ : αὐξήσει §SIG:M§","span":[99,105],"editors":[],"dirty":false,"id":"164","lemma":"αὐξήσῃ"}],"A":"67","tr":"Uno §I§scholastikos§/I§ vide un battello in un fiume pieno di provviste e appesantito e disse: «Se il fiume dovesse crescere un po’, sarà sommersa!».","type":"joke"},{"wit":"AM","text":"Σχολαστικὸς ἐξ ἀποδημίας ἐπανερχομένῳ τῷ πενθερῷ ἀπαντήσας, πυνθανομένου ἐκείνου, πῶς πράττοι αὐτοῦ ὁ συμφοιτητής, ὁ δέ· Πάνυ, ἔφη, αὐτῷ καλῶς ἐστι νῦν καὶ εὐθυμεῖ· τὸν γὰρ πενθερὸν αὐτοῦ κατώρυξεν.","num":"67","dawe":"67","n":68,"type":"joke","label":"67","app":[{"query":false,"sigla":["A","Boissonade","Eberhard","M"],"unit":165,"reading":": ἐπανερχόμενος §SIG:Eberhard§ : ἀνερχόμενος §SIG:Boissonade§ : ἐξερχομένῳ §SIG:A§ : ἐξερχόμενος §SIG:M§","span":[25,37],"editors":["Boissonade","Eberhard"],"dirty":false,"id":"165","lemma":"ἐπανερχομένῳ"},{"editors":[],"span":[86,93],"unit":166,"reading":"§SIG:A§ : πράττει §SIG:M§","sigla":["A","M"],"query":false,"lemma":"πράττοι","id":"166","dirty":false},{"lemma":"αὐτοῦ","id":"167","dirty":false,"editors":["Minas"],"span":[94,99],"unit":167,"reading":"§SIG:Minas§ : ἑαυτοῦ §SIG:A§§SIG:M§","sigla":["A","M","Minas"],"query":false},{"dirty":false,"id":"168","lemma":"κατώρυξεν","query":false,"sigla":["A","M"],"reading":"§SIG:A§ : κατώρυξε §SIG:M§","unit":168,"span":[188,197],"editors":[]},{"dirty":false,"id":"169","lemma":"οὐκ","sigla":["A","Eberhard"],"query":false,"span":[185,189],"reading":"§SIG:A§ : οὐκέτι dub. §SIG:Eberhard§","unit":169,"editors":["Eberhard"]}],"A":"68","tr":"Uno §I§scholastikos§/I§ incontrò il suocero che tornava da un viaggio, e quando quello gli chiese come stesse un suo compagno di scuola, disse: «Le cose gli vanno davvero bene, ed è sereno: ha infatti seppellito suo suocero!»."},{"text":"Σχολαστικὸς γράψας δίκην ὑπέρ τινος, δημοσίᾳ προανεγίνωσκε. τοῦ δὲ συνηγορουμένου εἰπόντος, ὅτι ἄτοπον ποιεῖ τὰ ἀπόρρητα τῆς δίκης τοῖς ἀντιδίκοις φανερὰ ποιῶν· Κάθαρμα, εἶπε, μὴ γάρ τι τῶν συνεκτικῶν λέγω;","n":69,"dawe":"68","num":"68","wit":"AM","app":[{"reading":": δίκην ὑπέρ §SIG:Minas§ : διαθήκην ὑπό §SIG:A§§SIG:M§","unit":170,"span":[19,29],"editors":["Minas"],"query":false,"sigla":["A","M","Minas"],"lemma":"δίκην ὑπέρ","dirty":false,"id":"170"},{"dirty":false,"id":"171","lemma":"ἄτοπον","query":false,"sigla":["A","Eberhard","M"],"reading":"§SIG:A§§SIG:M§ : ἄτοπόν τι §SIG:Eberhard§","unit":171,"span":[96,102],"editors":["Eberhard"]}],"label":"68","tr":"Uno §I§scholastikos§/I§ compose un’orazione per un tale e ne diede una lettura pubblica in anteprima. Quando un suo assistito disse che faceva una cosa insensata a rendere manifesti gli aspetti segreti del processo agli avversari, disse: «Disgraziato, forse che non dovrei leggerne gli elementi essenziali?».","A":"69","type":"joke"},{"type":"joke","tr":"Uno §I§scholastikos§/I§, dal momento che era morto un suo compagno di scuola, era andato a far visita ai suoi genitori. Poiché il padre di quello si doleva e diceva: «Figlio, mi hai storpiato!» e la madre diceva: «Figlio, mi hai accecata!», lo §I§scholastikos§/I§ disse ai compagni: «Se da lui sono stati compiuti questi misfatti, bisognava bruciarlo addirittura vivo!».","A":"70","app":[{"span":[81,91],"reading":"§SIG:M§ : ὀδυρωμένου §SIG:A§","unit":172,"editors":[],"sigla":["A","M"],"query":false,"lemma":"ὀδυρομένου","dirty":false,"id":"172"},{"sigla":["A","Boissonade","Eberhard","M"],"query":false,"span":[114,122],"reading":"§SIG:Boissonade§ : ἠπόρησάς §SIG:A§§SIG:M§ : ἐταλαιπώρησάς §SIG:Eberhard§","unit":173,"editors":["Boissonade","Eberhard"],"dirty":false,"id":"173","lemma":"ἐπήρωσάς"},{"lemma":"ἑταίρους","id":"174","dirty":false,"editors":[],"span":[195,203],"reading":"§SIG:A§ : ἑτέρους §SIG:M§","unit":174,"sigla":["A","M"],"query":false},{"editors":["Boissonade"],"span":[258,266],"reading":"§SIG:Boissonade§ : κλαυθῆναι §SIG:A§§SIG:M§","unit":175,"sigla":["A","Boissonade","M"],"query":false,"lemma":"καυθῆναι","id":"175","dirty":false}],"label":"69","wit":"AM","n":70,"num":"69","dawe":"69","text":"Σχολαστικὸς ἀποθανόντος συμφοιτητοῦ ἐπεσκέπτετο τοὺς γονέας. τοῦ δὲ πατρὸς αὐτοῦ ὀδυρομένου καὶ λέγοντος· Τέκνον, ἐπήρωσάς με τῆς δὲ μητρὸς λεγούσης· Τέκνον, ἐτύφλωσάς με ὁ σχολαστικὸς πρὸς τοὺς ἑταίρους εἶπεν· Εἰ ταῦτα αὐτῷ πέπρακται, ἐχρῆν αὐτὸν καὶ ζῶντα καυθῆναι."},{"text":"Σχολαστικὸς νοσοῦντα φίλον ἀπῆλθεν ἐπισκέψασθαι. τῆς γυναικὸς δ’ αὐτοῦ εἰπούσης, ὅτι ἐκεῖνος ἤδη ἔξω ἐστίν· Ἐὰν οὖν ἐπανέλθῃ, φησίν, ἐρεῖς παραγεγενῆσθαί με.","dawe":"70","num":"70","n":71,"wit":"AM","label":"70","app":[{"dirty":false,"id":"176","lemma":"ἀπῆλθεν","sigla":["A","Eberhard","M"],"query":false,"span":[27,34],"reading":"§SIG:A§§SIG:M§ : ἐπῆλθεν §SIG:Eberhard§","unit":176,"editors":["Eberhard"]},{"sigla":["A","Eberhard","M"],"query":false,"editors":["Eberhard"],"span":[65,70],"reading":"§SIG:A§§SIG:M§ : αὐτῷ §SIG:Eberhard§","unit":177,"id":"177","dirty":false,"lemma":"αὐτοῦ"},{"span":[154,156],"reading":"§SIG:A§ : με; §SIG:M§","unit":178,"editors":[],"sigla":["A","M"],"query":false,"lemma":"με","dirty":false,"id":"178"}],"A":"71","tr":"Uno §I§scholastikos§/I§ andò a trovare un amico malato. Quando la moglie di questi gli disse che era ormai di là, lo §I§scholastikos§/I§, rispose: «Bene, se ritorna, gli dirai che sono venuto».","type":"joke"},{"label":"71","app":[{"dirty":false,"id":"179","lemma":"ἀκρόπτυχα","sigla":["A","Dawe"],"query":false,"span":[54,63],"reading":"§SIG:A§ : ἀβρόπτυχα §SIG:Dawe§","unit":179,"editors":["Dawe"]},{"lemma":"εἰσκομίσαι","dirty":false,"id":"180","span":[64,74],"reading":"§SIG:A§ : ἴσα κομίσασθαι §SIG:Dawe§","unit":180,"editors":["Dawe"],"sigla":["A","Dawe"],"query":false},{"lemma":"ζητῆσαι","dirty":false,"id":"181","span":[76,83],"reading":"del. §SIG:Thierfelder§ : ζητήσας §SIG:Minas§","unit":181,"editors":["Minas","Thierfelder"],"sigla":["Minas","Thierfelder"],"query":false},{"lemma":"ποῖόν … ποῖον","id":"182","dirty":false,"editors":["Eberhard"],"unit":182,"reading":"§SIG:A§ : πότερον utrubique §SIG:Eberhard§","span":[97,126],"query":false,"sigla":["A","Eberhard"]},{"id":"183","dirty":false,"lemma":"μάλ","query":false,"sigla":["A","Minas"],"editors":["Minas"],"reading":"§SIG:Minas§ : Ἀρτέμην §SIG:A§","unit":183,"span":[19,23]},{"query":false,"sigla":["A"],"unit":184,"reading":": μάλα §SIG:A§","span":null,"editors":[],"dirty":false,"id":"184","lemma":"ἡδέως"}],"A":"72","tr":"Uno §I§scholastikos, §/I§pur avendo preso un modello di lunghezza e larghezza per comprare tessuti, continuava a chiedere quale fosse la lunghezza e quale la larghezza.","type":"joke","text":"Σχολαστικὸς ὑπόδειγμα λαβὼν μήκους καὶ πλάτους ἐπὶ τῷ ἀκρόπτυχα εἰσκομίσαι [ζητῆσαι] ἐπυνθάνετο, ποῖόν ἐστι τὸ μῆκος καὶ ποῖον τὸ πλάτος.","dawe":"71","num":"71","n":72,"wit":"A"},{"wit":"A","text":"Σχολαστικὸς ἐν γάμοις ἑστιαθεὶς εἶτα ἀναχωρῶν· Εὔχομαι, εἶπεν, εὐτυχῶς καὶ ἀεὶ ταῦτα ὑμᾶς ποιεῖν.","num":"72","dawe":"72","n":73,"type":"joke","label":"72","app":[],"A":"73","tr":"Uno §I§scholastikos§/I§ mangiò ad un banchetto nuziale e, quando se ne stava andando, disse: «Vi auguro di celebrare questi banchetti con felicità e ripetutamente!»."},{"type":"joke","label":"73","app":[{"unit":185,"reading":"§SIG:Thierfelder§ : Σκριβονίας","span":[11,21],"editors":["Thierfelder"],"query":false,"sigla":["Thierfelder"],"lemma":"Σκρηβωνίας","dirty":false,"id":"185"},{"editors":["Boissonade"],"span":[59,71],"unit":186,"reading":"§SIG:A§ : ἀλλ’ ἐν ἐπινόσῳ §SIG:Boissonade§ dub.","sigla":["A","Boissonade"],"query":false,"lemma":"ἀλλὰ ἐπινόσῳ","id":"186","dirty":false},{"id":"187","dirty":false,"lemma":"οἰκοδομῆσθαι","query":false,"sigla":["A","Eberhard"],"editors":["Eberhard"],"unit":187,"reading":": οἰκοδομεῖσθαι §SIG:A§pc : ῳκοδομεῖσθαι §SIG:Eberhard§","span":[77,89]}],"A":"74","tr":"Ancora lui disse che la tomba di Scribonia era bella e sontuosa, ma che era stata costruita in un luogo malsano.","wit":"A","text":"Ὁ αὐτὸς τὸ Σκρηβωνίας μνῆμα καλὸν ἔφη καὶ πολυτελὲς εἶναι, ἀλλὰ ἐπινόσῳ τόπῳ οἰκοδομῆσθαι.","dawe":"73","num":"73","n":74},{"type":"joke","label":"74","app":[{"id":"188","dirty":false,"lemma":"βλέπω","query":false,"sigla":["A","Dawe","Thierfelder"],"editors":["Dawe","Thierfelder"],"unit":188,"reading":"§SIG:A§ : ὁρῶ vid. opus esse §SIG:Thierfelder§ : βλέπει … βλέπω §SIG:Dawe§","span":[104,109]},{"sigla":["A","C"],"query":false,"editors":[],"span":[14,4377],"reading":"§SIG:A§ : εἶπε πρὸς τὸν κάπηλον §SIG:C§","unit":189,"id":"189","dirty":false,"lemma":"τὸν … Οὐκοῦν"}],"A":"75","tr":"Un tale si avvicinò ad uno §I§scholastikos§/I§ che aveva un cavallo gracilino, disse: «Il tuo cavallo vede già l’Ade». E lo §I§scholastikos§/I§ disse: «Anch’io lo vedo».","wit":"A","text":"Σχολαστικῷ λεπτὸν ἵππον ἔχοντι προσελθών τις· Ὁ ἵππος σου, ἔφη, εἰς Ἅιδου ὁρᾷ. καὶ ὁ σχολαστικός· Κἀγὼ †βλέπω†.","num":"74","dawe":"74","n":75},{"wit":"AM","n":76,"dawe":"75","num":"75","text":"Σχολαστικὸς νοσῶν, εἶτα πεινῶν, ὡς οὐδέπω τετάρτην ὥραν ἀπηγγέλη, ἀπιστῶν πρὸς ἑαυτὸν τὸ ὡρολόγιον ἐκέλευσε κομισθῆναι.","type":"joke","tr":"Uno §I§scholastikos§/I§, che era malato e peraltro affamato, quando gli fu detto che non era ancora l’ora quarta, non credendoci ordinò che gli fosse portato l’orologio.","A":"76","app":[{"lemma":"ἀπηγγέλη","id":"190","dirty":false,"editors":[],"unit":190,"reading":"§SIG:A§ : ἀπηγγέλει §SIG:M§","span":[56,64],"query":false,"sigla":["A","M"]}],"label":"75"},{"wit":"A","text":"Σχολαστικῷ εἰς τὸ Σαραπεῖον ἀνελθόντι θαλλὸν ὁ ἱερεὺς διδούς· Ἵλεώς σοι, εἶπεν, ὁ κύριος. καὶ ὁ σχολαστικός· Ἵλεως, ἔφη, ὁ κύριος τῷ † παρίω μου· ἐγὼ γὰρ ἐλεύθερός εἰμι.","num":"76","dawe":"76","n":77,"type":"joke","label":"76","app":[{"id":"191","dirty":false,"lemma":"Σαραπεῖον","sigla":["A","Minas"],"query":false,"editors":["Minas"],"span":[18,27],"unit":191,"reading":"§SIG:Minas§ : σαραπίον §SIG:A§"},{"editors":["Thierfelder"],"reading":"§SIG:Thierfelder§ : θαλὸν §SIG:A§","unit":192,"span":[38,44],"query":false,"sigla":["A","Thierfelder"],"lemma":"θαλλὸν","id":"192","dirty":false}],"A":"77","tr":"Un sacerdote consegnò un ramoscello ad uno §I§scholastikos§/I§ che entrava nel §I§Serapeion§/I§ e disse: «Il Signore ti sia benevolo!» e lo §I§scholastikos §/I§fece: «Il Signore sia benevolo al mio…cane! Io, infatti, sono un libero!»."},{"A":"78","tr":"Uno §I§scholastikos§/I§, dopo aver celebrato il funerale del figlio, incontrò il suo maestro e disse: «Perdona che mio figlio non sia venuto a scuola: è morto».","label":"77","app":[],"type":"joke","dawe":"77","num":"77","n":78,"text":"Σχολαστικὸς ἐκκομίσας τὸν υἱόν, ἀπαντήσας τῷ διδασκάλῳ αὐτοῦ· Σύγγνωθι, ἔφη, ὅτι οὐκ ἦλθεν ὁ υἱός μου εἰς τὴν σχολήν· ἀπέθανε γάρ.","wit":"AM"},{"text":"Σχολαστικὸς εἰκόνας ἀρχαῖα ζωγραφήματα ἐχούσας ἀπὸ Κορίνθου λαβὼν καὶ εἰς ναῦς ἐμβαλὼν τοῖς ναυκλήροις εἶπεν· Ἐὰν ταύτας ἀπολέσητε, καινὰς ὑμᾶς ἀπαιτήσω.","num":"78","dawe":"78","n":79,"wit":"A","label":"78","app":[{"lemma":"ἀπολέσητε","dirty":false,"id":"193","span":[121,130],"unit":193,"reading":"§SIG:Minas§ : ἀπολέσηται §SIG:A§","editors":["Minas"],"sigla":["A","Minas"],"query":false}],"A":"79","tr":"Uno §I§scholastikos§/I§, prese da Corinto dei quadri che avevano dipinti antichi e disse ai capitani: «Se li perderete, ve ne chiederò di nuovi».","type":"joke"},{"type":"joke","label":"79","app":[{"lemma":"μενέτω","id":"194","dirty":false,"editors":["Eberhard","Thierfelder"],"span":[88,95],"unit":194,"reading":"§SIG:Thierfelder§ : μένῃ §SIG:Eberhard§ : μένε §SIG:A§","sigla":["A","Eberhard","Thierfelder"],"query":false}],"A":"80","tr":"Il coppiere porse ad uno §I§scholastikos§/I§ una coppa rovente. Questi la poggiò sul tavolo e disse: «Stia così, finché non venga il tuo pedagogo e la trovi bollente».","wit":"A","text":"Σχολαστικῷ ὑπερζέουσαν κύλικα ὁ οἰνοχόος ὤρεξεν. ὁ δὲ ἐπὶ τῆς τραπέζης αὐτὴν θείς· Οὕτω μενέ‹τω›, ἔφη, μέχρι ὁ παιδαγωγός σου ἐλθὼν εὕρῃ αὐτὴν ζέουσαν.","dawe":"79","num":"79","n":80},{"text":"Σχολαστικὸς νοσῶν συνετάξατο τῷ ἰατρῷ, εἰ θεραπευθείη, μισθὸν δώσειν. ὡς οὖν οἶνον ἐν τῷ πυρέττειν πίνοντι αὐτῷ ἐπετίμα ἡ γυνή· Σὺ δὲ βούλει με ὑγιάναντα, ἔφη, ἀναγκασθῆναι τῷ ἰατρῷ τὸν μισθὸν ἐκτῖσαι;","num":"79 bis","dawe":"79 bis","n":81,"wit":"A","label":"79 bis; 27 α","app":[{"id":"195","dirty":false,"lemma":"θεραπευθείη","sigla":["A","Dawe"],"query":false,"editors":["Dawe"],"span":[42,53],"unit":195,"reading":"§SIG:Dawe§ : θεραπεύει §SIG:A§"},{"query":false,"sigla":["A","Dawe"],"editors":["Dawe"],"unit":196,"reading":"§SIG:Dawe§ : ἐκτίσαι §SIG:A§","span":[193,200],"id":"196","dirty":false,"lemma":"ἐκτῖσαι"}],"A":"81","tr":"Uno §I§scholastikos§/I§ malato si accordò col medico che, se fosse guarito, gli avrebbe dato un compenso. Quando dunque la moglie lo rimproverava perché beveva vino con la febbre, disse: «E tu vuoi che io, sano, sia costretto a pagare il medico?».","type":"joke"},{"wit":"AM","text":"Σχολαστικοῦ πλέοντος ἐκινδύνευεν ὑπὸ χειμῶνος τὸ πλοῖον. τῶν δὲ συμπλεόντων ἀπορριπτούντων ἐκ τῶν σκευῶν, ἵνα κουφισθῇ τὸ πλοῖον, κἀκείνῳ τὸ αὐτὸ ποιεῖν παραινούντων, ὁ δὲ ἔχων χειρόγραφον ἑκατὸν πεντήκοντα μυριάδων, τὰς πεντήκοντα ἀπαλείψας· Ἴδε, φησίν, ὅσοις χρήμασιν ἐπεκούφισα τὴν ναῦν.","dawe":"80","num":"80","n":82,"type":"joke","label":"80","app":[{"editors":[],"span":[76,90],"reading":"§SIG:A§ : ἀποριπτούντων §SIG:M§","unit":197,"sigla":["A","M"],"query":false,"lemma":"ἀπορριπτούντων","id":"197","dirty":false},{"lemma":"τὸ αὐτὸ","id":"198","dirty":false,"editors":["Minas"],"span":[138,145],"reading":"§SIG:Minas§ : τῷ αὐτῷ §SIG:A§§SIG:M§","unit":198,"sigla":["A","M","Minas"],"query":false},{"editors":[],"span":[232,241],"unit":199,"reading":"§SIG:A§ : ὑπαλείψας §SIG:M§","sigla":["A","M"],"query":false,"lemma":"ἀπαλείψας","id":"199","dirty":false},{"editors":["Boissonade","Dawe","Eberhard","Pontanus","Thierfelder"],"reading":"§SIG:Pontanus§ (rec. §SIG:Thierfelder§, §SIG:Dawe§) : κύμασιν §SIG:A§§SIG:M§ (def. §SIG:Boissonade§, §SIG:Eberhard§)","unit":200,"span":[261,269],"query":false,"sigla":["A","Boissonade","Dawe","Eberhard","M","Pontanus","Thierfelder"],"lemma":"χρήμασιν","id":"200","dirty":false},{"span":[234,241],"reading":": δανείσας §SIG:A§ corr. dub. §SIG:Cataudella§ cf. 157 α : χρίσας dub. §SIG:Thierfelder§ ex Aesop. fab. 57 Hausrath","unit":201,"editors":["Cataudella","Thierfelder"],"sigla":["A","Cataudella","Thierfelder"],"query":false,"lemma":"ἀλείψας","dirty":false,"id":"201"}],"A":"82","tr":"Quando uno §I§scholastikos§/I§ navigava, la barca era in pericolo per una tempesta. Mentre i compagni di viaggio gettavano giù il loro carico perché la nave fosse alleggerita, ed esortavano quello a fare lo stesso, e ὐτοῦ"}],"type":"joke","dawe":"87","num":"87","n":89,"text":"Σχολαστικὸς ἐπὶ τῆς οἰκίας σεκούτορος σχῆμα λαβὼν ἔπαιζεν. ἄφνω δέ τινος ἀπαγγείλαντος αὐτῷ παρουσίαν τοῦ πατρός, ῥίψας τὸ ὅπλον ἔλυε τὴν κνημῖδα. φθάσαντος δὲ τοῦ πατρὸς αὐτοῦ ἐπιστῆναι, ἔχων τὴν περικεφαλαίαν βιβλίον ἀνεγίνωσκεν.","wit":"A"},{"type":"joke","tr":"Uno §I§scholastikos §/I§tornava nel luogo dal quale era partito, e salendo una salita ripida si meravigliava e disse: «Qui quando passai per la prima volta in cammino, c’era una discesa: e com’è che ora è cambiato velocemente e c’è una salita?».","A":"90","app":[{"id":"230","dirty":false,"lemma":"ὡς","sigla":["Boissonade"],"query":false,"editors":["Boissonade"],"span":[110,112],"unit":230,"reading":"om. §SIG:Boissonade§"},{"editors":["Boissonade"],"reading":": παρκεῖν §SIG:A§ : ἐπαρκεῖν §SIG:M§ : παρεκεῖ §SIG:Boissonade§","unit":231,"span":[114,121],"query":false,"sigla":["A","Boissonade","M"],"lemma":"παρῄειν","id":"231","dirty":false},{"query":false,"sigla":["A","Boissonade","M"],"unit":232,"reading":"§SIG:A§§SIG:M§ : ὠδεύον §SIG:Boissonade§","span":[122,128],"editors":["Boissonade"],"dirty":false,"id":"232","lemma":"ὁδεύων"}],"label":"88","wit":"AM","n":90,"num":"88","dawe":"88","text":"Σχολαστικὸς ἐπανερχόμενος, ὅθεν ἀπεδήμησεν, καὶ ἀναβαίνων ὑψηλὴν ἀνάβασιν ἐθαύμαζε λέγων· Ἐνταῦθα ὅτε πρῶτον [ὡς] παρῄειν ὁδεύων, κατάβασις ἦν· καὶ πῶς νῦν ταχέως ἠλλάγηκαὶ ἀνάβασις γέγονε;"},{"tr":"Uno §I§scholastikos §/I§mentre navigava chiese al timoniere che ora fosse. Dal momento che quello disse che non lo sapeva, gli domandò da quanto tempo pilotasse la nave. Quando quello disse: «Tre anni», fece: «Com’è allora che io, che ho acquistato casa sei mesi fa, quando il sole scende in cortile indovino l’ora, ma tu invece non sai calcolarla dalla nave che pur governi da un tempo così ampio?».","A":"91","app":[{"id":"233","dirty":false,"lemma":"ἐπύθετο","query":false,"sigla":["A","M"],"editors":[],"unit":233,"reading":"§SIG:A§ : ἐπείθετο §SIG:M§","span":[18,25]},
