:root{--bg:#f6f1e7;--paper:#fbf8f1;--ink:#241f18;--muted:#7a6f5d;--line:#e3d9c6;--accent:#7a2e1d;--accent2:#1d4e6b;--lem:#9a3412;--lembg:#f3e2cf;--sig:#1d4e6b;--ed:#5b4a2f;--warn:#b45309;--warnbg:#fbe8cf;--alpha:#7a2e1d;--beta:#1d4e6b;--gamma:#3f6212;
--greek:"Gentium Plus Web","New Athena Unicode","Gentium Plus","Calibri","Segoe UI",sans-serif;--sans:"Aptos","Segoe UI","Calibri",system-ui,sans-serif;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--greek);line-height:1.62}
header.top{position:sticky;top:0;z-index:30;background:rgba(40,28,20,.96);color:#f3ece0;padding:.5rem 1rem;display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.18)}
header.top h1{font-size:1.12rem;margin:0;font-weight:600;white-space:nowrap}
header.top .sub{color:#cdbfa6;font-size:.78rem;font-family:var(--sans);margin-left:-.3rem;max-width:24vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recsw{display:flex;border:1px solid #5a4a39;border-radius:8px;overflow:hidden}
.recsw button{font-family:var(--sans);font-size:.85rem;border:none;background:#efe6d4;color:#241f18;padding:.34rem .7rem;cursor:pointer;font-weight:700}
.recsw button.on[data-rec="alpha"]{background:var(--alpha);color:#fff}.recsw button.on[data-rec="beta"]{background:var(--beta);color:#fff}.recsw button.on[data-rec="gamma"]{background:var(--gamma);color:#fff}
#tSync,#tTr{font-family:var(--sans);font-size:.85rem;border:1px solid #5a4a39;background:#efe6d4;color:#241f18;border-radius:8px;padding:.34rem .6rem;cursor:pointer;font-weight:600}
#tSync:hover,#tTr:hover{background:#fff}#tSync.on{background:#5b3a8a;border-color:#5b3a8a;color:#fff}#tTr.on{background:#256;border-color:#256;color:#fff}
.controls{display:flex;gap:.4rem;align-items:center;margin-left:auto;flex-wrap:wrap}
.controls input,.controls button{font-family:var(--sans);font-size:.82rem;border:1px solid #5a4a39;background:#fffdf8;color:#241f18;border-radius:6px;padding:.32rem .5rem}
.controls input{width:120px}.controls input.num{width:70px}.controls button{cursor:pointer;background:#efe6d4}.controls button:hover{background:#fff}
.wrap{display:flex;max-width:1320px;margin:0 auto}
nav.toc{width:240px;flex:0 0 240px;padding:1rem .7rem 3rem;position:sticky;top:52px;height:calc(100vh - 52px);overflow:auto;font-family:var(--sans);font-size:.83rem;border-right:1px solid var(--line)}
#resizer{flex:0 0 7px;cursor:col-resize;position:sticky;top:52px;height:calc(100vh - 52px);background:transparent;transition:background .15s}#resizer:hover,#resizer.drag{background:#cdbf9e}
nav.toc h2{font-size:.7rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin:.4rem .3rem}
nav.toc a{display:flex;justify-content:space-between;gap:.4rem;padding:.26rem .45rem;border-radius:6px;color:var(--ink);text-decoration:none;cursor:pointer}
nav.toc a:hover{background:#ece2cf}nav.toc a.drow{display:grid;grid-template-columns:3.4em 2.4em 3.2em 2.4em;align-items:baseline;gap:0 .15rem;font-variant-numeric:tabular-nums}nav.toc a.drow .da{color:var(--alpha)}nav.toc a.drow .db{color:var(--beta)}nav.toc a.drow .ddw{color:var(--muted);font-size:.74rem}nav.toc a.drow .dg{color:var(--gamma);font-size:.74rem;opacity:.85}nav.toc a .c{color:var(--muted);font-size:.76rem}
nav.toc .qbtn{margin:.6rem .3rem;display:block;width:calc(100% - .6rem);text-align:left;cursor:pointer;background:var(--warnbg);border:1px solid #e7cd9a;color:#7c4a06;border-radius:8px;padding:.5rem .6rem;font-family:var(--sans);font-size:.82rem}
main{flex:1 1 auto;min-width:0;padding:1.1rem 1.5rem 6rem;background:var(--paper)}
.meta{font-family:var(--sans);font-size:.8rem;color:var(--muted);border:1px solid var(--line);background:#fffdf8;border-radius:10px;padding:.7rem .9rem;margin-bottom:1.3rem}
.meta b{color:var(--ink)}.meta .wit{color:var(--sig);font-weight:600}.meta .gk{font-family:var(--greek);color:var(--ink)}
.stats{display:flex;gap:1rem;flex-wrap:wrap;margin-top:.5rem}.stats span{background:#f0e7d5;border-radius:20px;padding:.15rem .7rem;font-size:.76rem}
section.sec{margin:1.6rem 0}section.sec>h2{font-size:1.12rem;color:var(--accent);border-bottom:2px solid var(--line);padding-bottom:.25rem;margin:0 0 .8rem;letter-spacing:.04em}
.beta section.sec>h2{color:var(--beta)}.gamma section.sec>h2{color:var(--gamma)}
.fac{margin:0 0 1.1rem;padding:.1rem 0 .5rem;border-bottom:1px dotted var(--line)}
.fac .num{font-family:var(--sans);font-size:.74rem;color:var(--muted);font-weight:600;display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:.12rem}
.fac .num .big{font-size:.92rem;color:var(--ink)}.fac .num .conc{color:var(--muted);font-weight:400}
.fac .num .w b{background:#e7ddc9;color:#5b4a2f;border-radius:4px;padding:0 .28rem;font-size:.7rem;font-weight:700;margin-left:.15rem}
.xref{cursor:pointer;border:1px solid #b9a7d6;background:#efe7fb;color:#5b3a8a;border-radius:10px;padding:0 .45rem;font-size:.7rem;font-weight:700}.xref:hover{background:#e2d6f6}
.xref.b{border-color:#9ec3d6;background:#e7f1fb;color:#1d4e6b}.xref.g{border-color:#bcd69e;background:#eef7e2;color:#3f6212}
.fac .txt{font-size:1.16rem;text-align:justify}
.fac .txt.missing{color:#a08b6a;font-style:italic;font-family:var(--sans);font-size:.95rem}
.fac .tr{display:none;font-family:var(--sans);font-size:1rem;color:#43617a;margin:.35rem 0 0;padding:.2rem .6rem;border-left:3px solid #cdd9e3;background:#f3f6f9;border-radius:0 6px 6px 0}
.showtr .fac .tr{display:block}
.lem{cursor:pointer;border-bottom:1.5px solid var(--lem);padding:0 .02em}.lem:hover,.lem.hot{background:var(--lembg)}
.app{font-family:var(--greek);font-size:.85rem;color:#4a4234;margin:.4rem 0 0;padding:.4rem .6rem;background:#f4ede0;border-left:3px solid var(--line);border-radius:0 8px 8px 0;display:none}
.app.show{display:block}.app .ln{padding:.12rem 0;border-radius:5px;cursor:pointer}.app .ln:hover,.app .ln.hot{background:#eadfc8}

tors":[],"dirty":false,"id":"618","lemma":"ἐμὲ … μου"}],"label":"4; cf. α 4","wit":"FT","n":3,"num":"4","dawe":"4","text":"Σχολαστικοῦ ἵππον πιπράσκοντος ἠρώτησέ τις, εἰ πρωτοβόλος ἐστίν. Τοῦ δὲ φήσαντος δευτεροβόλον εἶναι, ἔφη· «Πῶς οἶδας;» Ὁ δὲ εἶπεν· «Ὅτι ἅπαξ ἐδούλευσεν ἐμὲ καὶ τὸν πατέρα μου»."},{"text":"Σχολαστικὸς φίλον συναντήσας εἶπε· «Καθ’ ὕπνους σε ἰδών, προσηγόρευσα». Ὁ δέ· «Σύγγνωθί μοι, ὅτι οὐ προσέσχον».","n":4,"dawe":"5","num":"5","wit":"FT","app":[{"dirty":false,"id":"619","lemma":"φίλον","query":false,"sigla":["F","T"],"unit":619,"reading":"§SIG:T§ : φίλῳ §SIG:F§","span":[12,17],"editors":[]},{"sigla":["F","T"],"query":false,"span":[51,55],"reading":"§SIG:F§ : εἶδον §SIG:T§a.c","unit":620,"editors":[],"dirty":false,"id":"620","lemma":"ἰδών"}],"label":"5; cf. α 5","tr":"Uno §I§scholastikos§/I§ incontrò un amico e disse: «Ti ho visto in sogno e ti ho salutato». E quello: «Scusami, ché non ci ho fatto caso».","A":"4","type":"joke"},{"type":"joke","A":"5","tr":"Uno §I§scholastikos§/I§ visitava un malato e gli faceva domande sulla salute. Ma quello non era in grado di rispondere. Allora si adirò e se ne usciva dicendo: «Spero di ammalarmi anch’io, e di non risponderti quando verrai a trovarmi».","label":"34; cf. α 34","app":[{"id":"621","dirty":false,"lemma":"ἐξήει","sigla":["F","T"],"query":false,"editors":[],"span":[103,108],"reading":"§SIG:F§(cf. G) : ἐξήλεγχεν §SIG:T§","unit":621}],"wit":"FT","dawe":"34","num":"34","n":5,"text":"Σχολαστικὸς νοσοῦντα ἐπισκεπτόμενος ἠρώτα περὶ τῆς ὑγείας. Ὁ δὲ οὐκ ἠδύνατο ἀποκριθῆναι. Ὀργισθεὶς οὖν ἐξήει λέγων· «Ἐλπίζω κἀγὼ νοσῆσαι καὶ ἐλθόντι σοι μὴ ἀποκριθῆναι»."},{"A":"6","tr":"Uno §I§scholastikos§/I§ vendeva un cavallo. Poiché era giunto un tale e ne esaminava la dentatura, disse: «Perché ne osservi i denti? Magari camminasse quanto mangia!».","label":"37; cf. α 37","app":[],"type":"joke","dawe":"37","num":"37","n":6,"text":"Σχολαστικὸς ἵππον ἐπίπρασκεν. Ἐλθόντος δέ τινος καὶ μανθάνοντος τὸν βόλον, εἶπε· «Τί τοὺς ὀδόντας αὐτοῦ τηρεῖς; Εἴθε ὡς τρώγει, καὶ περιεπάτει».","wit":"FT"},{"tr":"Uno §I§scholastikos§/I§ incontrò un medico e gli disse: «Perdonami, e non volermene, se non mi sono ammalato».","A":"7","app":[{"lemma":"ἐνόσησα","dirty":false,"id":"622","span":[79,86],"unit":622,"reading":"§SIG:T§ : ἐνόησα §SIG:F§","editors":[],"sigla":["F","T"],"query":false}],"label":"253; esclusiva di β","type":"joke","n":7,"num":"253","dawe":"253","text":"Σχολαστικὸς ἰατρῷ συναντήσας· «Συγχώρησόν μοι, εἶπε, καὶ μή μοι μέμψῃ, ὅτι οὐκ ἐνόσησα».","wit":"FT"},{"n":8,"num":"8","dawe":"8","text":"Σχολαστικὸς μῦν θέλων πιάσαι συνεχῶς τὰ βιβλία αὐτοῦ τρώγοντα, κρέας δακών, ἐν σκοτίᾳ ἐκάθισεν.","wit":"FT","tr":"Uno §I§scholastikos§/I§, volendo prendere un topo che gli rosicchiava di continuo i libri, addentò della carne e si sedette al buio.","A":"8","app":[],"label":"8; cf. α 8","type":"joke"},{"n":9,"dawe":"9","num":"9","text":"Σχολαστικὸς θέλων τὸν ἵππον αὐτοῦ διδάξαι μὴ τρώγειν πολλά, οὐ παρέβαλεν αὐτῷ τροφάς. Ἀποθανόντος δὲ τοῦ ἵππου τῷ λιμῷ, ἔλεγε· «Μεγάλως ἐζημιώθην· ὅτε γὰρ καλῶς ἔμαθε μὴ τρώγειν, τότε ἀπέθανεν».","wit":"FT","tr":"Uno §I§scholastikos§/I§, volendo insegnare al proprio cavallo a non mangiare troppo, non gli diede da mangiare. E quando il cavallo morì di fame, diceva: «Che grave perdita! Proprio quando aveva imparato bene a non mangiare, allora è morto».","A":"9","app":[{"lemma":"παρέβαλεν","dirty":false,"id":"623","span":[63,72],"reading":"§SIG:F§ : παρέβαλλεν §SIG:T§p.c.","unit":623,"editors":[],"sigla":["F","T"],"query":false},{"unit":624,"reading":"§SIG:T§(cf. α) : ἐζημίωμαι §SIG:F§","span":[136,145],"editors":[],"query":false,"sigla":["F","T"],"lemma":"ἐζημιώθην","dirty":false,"id":"624"}],"label":"9; cf. α 9","type":"joke"},{"wit":"FT","dawe":"41","num":"41","n":10,"text":"Σχολαστικὸς οἰκίαν πωλῶν, λίθον ἀπ’ αὐτῆς εἰς δεῖγμα περιέφερεν.","type":"joke","A":"10","tr":"Uno §I§scholastikos§/I§ che vendeva una casa ne portava in giro una pietra a mo’ di dimostrazione.","label":"41; cf. α 41","app":[]},{"app":[{"lemma":"καμμύσας","dirty":false,"id":"625","unit":625,"reading":"(olim §SIG:Needham§) καμύσας §SIG:T§","span":[51,59],"editors":["Needham"],"query":false,"sigla":["Needham","T"]},{"id":"626","dirty":false,"lemma":"ἐσωπτρίζετο","query":false,"sigla":["Braccini","F","T"],"editors":["Braccini"],"unit":626,"reading":"§SIG:Braccini§ : ἐσοπτρίζετο §SIG:F§§SIG:T§","span":[60,71]}],"label":"11; cf. α 11","tr":"Uno §I§scholastikos§/I§, volendo vedere se gli stesse bene dormire, chiuse gli occhi e si guardò allo specchio.","A":"11","type":"joke","text":"Σχολαστικὸς θέλων ἰδεῖν, εἰ πρέπει αὐτῷ κοιμᾶσθαι, καμμύσας ἐσωπτρίζετο.","n":11,"num":"11","dawe":"11","wit":"FT"},{"wit":"FT","n":12,"dawe":"14","num":"14","text":"Σχολαστικὸς οἰκίαν πριάμενος, καὶ διὰ τῆς θυρίδος προκύψας, ἠρώτα τοὺς παριόντας εἰ πρέπει αὐτῷ ἡ οἰκία.","type":"joke","tr":"Uno §I§scholastikos§/I§ comprò una casa, si affacciò alla finestra e chiedeva ai passanti se gli si addicesse.","A":"12","app":[],"label":"14; cf. α 14"},{"type":"joke","A":"13","tr":"Uno §I§scholastikos§/I§ vide in sogno di aver calpestato un chiodo, credette di provare dolore e si fasciò il piede. Un altro ne apprese la ragione e disse: «E perché dormi scalzo?».","label":"15; cf. α 15","app":[{"span":[54,82],"unit":627,"reading":"§SIG:T§(cf. α) : ἀλγεῖν τὸν πόδα, περιεδήσατο §SIG:F§","editors":[],"sigla":["F","T"],"query":false,"lemma":"ἀλγεῖν … περιεδήσατο","dirty":false,"id":"627"}],"wit":"FT","dawe":"15","num":"15","n":13,"text":"Σχολαστικὸς κατ’ ὄναρ ἰδὼν ἧλον πεπατηκέναι καὶ δόξας ἀλγεῖν, τὸν πόδα περιεδήσατο. Ἕτερος δὲ μαθὼν τὴν αἰτίαν, ἔφη· «Διὰ τί γὰρ ἀνυπόδητος κοιμᾶσαι;»"},{"text":"Σχολαστικὸς νυκτὶ ἐπανέστη τῇ μάμμῃ αὐτοῦ. Πληγὰς δὲ διὰ τοῦτο ὑπὸ τοῦ πατρὸς λαβών, εἶπε· «Σὺ τοσοῦτον χρόνον τὴν μητέρα μου ὀχεύεις, μηδὲν ὑπ’ ἐμοῦ παθών, καὶ σὺ ὀργίζῃ ἐπὶ τῇ μητρί σου ἅπαξ με εὑρών;»","n":14,"dawe":"45","num":"45","wit":"FT","app":[{"dirty":false,"id":"628","lemma":"μάμμῃ","query":false,"sigla":["F","T"],"unit":628,"reading":"§SIG:F§ : μάμῃ §SIG:T§","span":[30,35],"editors":[]}],"label":"45; cf. α 45","tr":"Uno §I§scholastikos§/I§ di notte saltò addosso a sua nonna. Prese le botte dal padre per questo motivo e disse: «Tu è tanto tempo che monti mia madre, e non ti sei buscato nulla da me; e ora ti arrabbi per avermi sorpreso una volta sola con tua madre?».","A":"14","type":"joke"},{"tr":"Uno §I§scholastikos§/I§ incontrò un medico e si nascose dietro un muro. E poiché qualcuno gli chiedeva la ragione, disse: «È da un pezzo che non mi ammalo, e mi vergogno di venire al cospetto del medico».","A":"15","app":[{"sigla":["F","T"],"query":false,"editors":[],"span":[12,18],"unit":629,"reading":"§SIG:T§ : ἰατρῷ §SIG:F§","id":"629","dirty":false,"lemma":"ἰατρὸν"},{"id":"630","dirty":false,"lemma":"Τινὸς","query":false,"sigla":["F","T"],"editors":[],"reading":"§SIG:T§ : τινὶ §SIG:F§","unit":630,"span":[49,54]},{"query":false,"sigla":["F","T"],"editors":[],"reading":"§SIG:T§(cf. α) : ὁ σχολαστικὸς ἔφη §SIG:F§","unit":631,"span":[80,83],"id":"631","dirty":false,"lemma":"ἔφη"},{"lemma":"τοῦ ἰατροῦ","id":"632","dirty":false,"editors":[],"span":[142,152],"reading":"§SIG:T§ : τῷ ἰατρῷ §SIG:F§","unit":632,"sigla":["F","T"],"query":false}],"label":"6; cf. α 6","type":"joke","n":15,"dawe":"6","num":"6","text":"Σχολαστικὸς ἰατρὸν συναντήσας ὑπὸ τοῖχον ἐκρύβη. Τινὸς δὲ πυθομένου τὴν αἰτίαν, ἔφη· «Καιρὸν ἔχω μὴ ἀσθενήσας, καὶ αἰσχύνομαι εἰς ὄψιν ἐλθεῖν τοῦ ἰατροῦ».","wit":"FT"},{"label":"46; cf. α 46","app":[{"lemma":"Ὁ ποταμὸς","id":"633","dirty":false,"editors":[],"reading":"§SIG:F§(cf. α) : ποταμὸς §SIG:T§","unit":633,"span":[35,44],"query":false,"sigla":["F","T"]},{"id":"634","dirty":false,"lemma":"λέγω","query":false,"sigla":["Dawe","F","T"],"editors":["Dawe"],"unit":634,"reading":"§SIG:F§§SIG:T§ : λέγει coniecerit §SIG:Dawe§ : λέγων coniecerim","span":[89,93]}],"A":"16","tr":"A uno §I§scholastikos§/I§ un agente d’affari disse che il fiume gli aveva preso il campo. E quello rispose: «E io che dico?».","type":"joke","text":"Σχολαστικῷ πραγματευτὴς εἶπεν ὅτι «Ὁ ποταμὸς ἔλαβε τὸν ἀγρόν σου». Κἀκεῖνος ἔφη· «Καὶ τί λέγω;»","num":"46","dawe":"46","n":16,"wit":"FT"},{"wit":"FT","n":17,"dawe":"254","num":"254","text":"Σχολαστικὸς Ἀμιναίαν ἔχων ἐσφράγισεν. Τοῦ δὲ δούλου κάτωθεν τρήσαντος καὶ τὸν οἶνον αἴροντος ἐθαύμαζεν, ὅτι τῶν σημάντρων σώων ὄντων ὁ οἶνος ἐλαττοῦται. Ἕτερος εἶπεν· «Ὅρα, μὴ κάτωθεν ἀφῃρέθη». Ὁ δέ· «Ἀμαθέστατε, εἶπεν, οὐ τὸ κάτωθεν λείπει, ἀλλὰ τὸ ἄνωθεν μέρος».","type":"joke","tr":"Uno §I§scholastikos§/I§, avendo un’anfora di vino Aminèo, la sigillò. Ma poiché lo schiavo, forandola di sotto, ne sottraeva il vino, si stupiva che, pur restando intatti i sigilli, il vino calasse. Un tale gli disse: «Bada che non te l’abbiano portato via di sotto». E lui: «Ignorantissimo, disse, non manca la parte di sotto, ma quella di sopra».","A":"17","app":[{"sigla":["F","T"],"query":false,"span":[26,36],"reading":"§SIG:F§ : ἐσφράγισεν αὐτήν §SIG:T§","unit":635,"editors":[],"dirty":false,"id":"635","lemma":"ἐσφράγισεν"},{"lemma":"Ἕτερος εἶπεν","id":"636","dirty":false,"editors":[],"span":[153,165],"unit":636,"reading":"§SIG:T§ : ἑτέρου δὲ εἰπόντος §SIG:F§","sigla":["F","T"],"query":false},{"query":false,"sigla":["F","T"],"unit":637,"reading":": οὐ τὸ κάτωθεν λείπει, ἀλλὰ τὸ ἄνωθεν μέρος §SIG:T§οὐ τὸ κάτωθεν μέρος, ἀλλὰ τὸ ἄνωθεν λείπει §SIG:F§","span":[220,262],"editors":[],"dirty":false,"id":"637","lemma":"οὐ … μέρος"}],"label":"254; esclusiva di β"},{"type":"joke","tr":"Uno §I§scholastikos§/I§ era in città, vide la luna e chiedeva al padre se anche le altre città avessero una luna così.","A":"18","app":[{"id":"638","dirty":false,"lemma":"Σχολαστικὸς … ὑφαπλώσας","sigla":["F","T"],"query":false,"editors":[],"span":[0,189],"reading":"§SIG:T§ : Σχολαστικὸς ὑπὸ δένδρον λάθρα ἐλθὼν καὶ ὑφαπλώσας §SIG:F§","unit":638}],"label":"49; cf. α 49","wit":"FT","n":18,"num":"49","dawe":"49","text":"Σχολαστικὸς ἐν τῇ πόλει ὤν, καὶ τὴν σελήνην ἰδών, ἐπυνθάνετο τοῦ πατρός, εἰ καὶ αἱ λοιπαὶ πόλεις ἔχουσι τοιαύτην σελήνην."},{"n":19,"dawe":"19","num":"19","text":"Σχολαστικὸς ἰδὼν στρουθοὺς ἐπὶ δένδρου, λάθρα ὑπεισελθών, ὑφαπλώσας τὸν κόλπον ἔσειε τὸ δένδρον ὡς ὑποδεξόμενος τὰ στρουθία.","wit":"FT","tr":"Uno §I§scholastikos§/I§ vide dei passeri su un albero, si avvicinò di nascosto, distese la piega dell’abito e scuoteva l’albero per raccogliere i passeri.","A":"19","app":[{"sigla":["F","T","Thierfelder"],"query":false,"span":[46,56],"reading":"§SIG:F§§SIG:T§ : ὑπελθών dub. §SIG:Thierfelder§","unit":639,"editors":["Thierfelder"],"dirty":false,"id":"639","lemma":"ὑπεισελθών"},{"unit":640,"reading":"§SIG:T§(cf. α) : ὑποδεξάμενος §SIG:F§","span":[99,111],"editors":[],"query":false,"sigla":["F","T"],"lemma":"ὑποδεξόμενος","dirty":false,"id":"640"}],"label":"19; cf. α 19","type":"joke"},{"A":"20","tr":"Uno §I§scholastikos§/I§, uscendo nel proprio campo, chiedeva se l’acqua del pozzo che si trovava lì fosse buona da bere. E poiché quelli dicevano: «È buona, e infatti anche i tuoi genitori bevevano da lì», disse: «E di che taglia avevano i colli, da poter bere a una profondità tanto grande?».","label":"51; cf. α 50","app":[{"dirty":false,"id":"641","lemma":"πιεῖν … καλὸν","sigla":["F","T"],"query":false,"span":[40,59],"unit":641,"reading":"§SIG:T§(cf. α) : εἰ πιεῖν ὕδωρ καλὸν §SIG:F§","editors":[]},{"editors":["Dawe"],"span":[102,107],"reading":"§SIG:F§§SIG:T§ : καλὸν ἦν §SIG:Dawe§","unit":642,"sigla":["Dawe","F","T"],"query":false,"lemma":"καλὸν","id":"642","dirty":false},{"editors":["Thierfelder"],"span":null,"reading":"post Τῶν δὲ γεωργῶν dub. add. §SIG:Thierfelder§","unit":643,"sigla":["Thierfelder"],"query":false,"lemma":"","id":"643","dirty":false},{"lemma":"ἔπινον … εἶχον","id":"644","dirty":false,"editors":[],"unit":644,"reading":"§SIG:T§(cf. α) : ἔπινον, φησὶ· Καὶ πηκίλους εἶχον §SIG:F§","span":[144,178],"query":false,"sigla":["F","T"]}],"type":"joke","num":"51","dawe":"51","n":20,"text":"Σχολαστικὸς ἐν τῷ ἰδίῳ ἀγρῷ ἐξιὼν ἠρώτα πιεῖν ὕδωρ εἰ καλὸν ἐν τῷ αὐτόθι φρέατι. Τῶν δὲ φησάντων ὅτι «Καλόν· καὶ γὰρ καὶ οἱ γονεῖς σου ἐξ αὐτοῦ ἔπινον», «Καὶ πηλίκους, ἔφη, εἶχον τραχήλους, ὅτι εἰς τοσοῦτον βάθος πίνειν ἐδύναντο;»","wit":"FT"},{"dawe":"52","num":"52","n":21,"text":"Σχολαστικὸς εἰς λάκκον ἐμπεσὼν συνεχῶς ἔκραζε βοήθειαν ζητῶν. Ὡς δὲ οὐδεὶς ὑπήκουεν, ἔφη· «Μωρός εἰμι, ἐὰν μὴ ἀνελθὼν πάντας τύψω, ἵνα κἂν οὕτως δραμόντες κλίμακά μοι κομίσωσιν».","wit":"FT","A":"21","tr":"Uno §I§scholastikos§/I§ cadde in una cisterna e gridava di continuo cercando aiuto. E poiché nessuno gli dava ascolto, disse: «Sono un fesso, se non risalgo e li frusto tutti, perché almeno così corrano a portarmi una scala!».","label":"52; cf. α 52","app":[{"sigla":["F","T"],"query":false,"editors":[],"span":[16,22],"reading":"§SIG:F§ : λάκον §SIG:T§","unit":645,"id":"645","dirty":false,"lemma":"λάκκον"},{"query":false,"sigla":["F","T"],"unit":646,"reading":"§SIG:T§(cf. α) : συνεχῶς κράζων βοήθειαν ἐζήτει §SIG:F§","span":[31,60],"editors":[],"dirty":false,"id":"646","lemma":"συνεχῶς … ζητῶν"},{"span":[75,83],"unit":647,"reading":"et α ὑπήκουσεν §SIG:F§ : ἐπήκουεν §SIG:T§","editors":[],"sigla":["F","T"],"query":false,"lemma":"ὑπήκουεν","dirty":false,"id":"647"},{"lemma":"ἐὰν","id":"648","dirty":false,"editors":[],"reading":"§SIG:T§(cf. α) : εἰ §SIG:F§","unit":648,"span":[103,106],"query":false,"sigla":["F","T"]}],"type":"joke"},{"app":[],"label":"22; cf. α 22","tr":"Uno §I§scholastikos§/I§ incontrò un altro §I§scholastikos§/I§ e disse: «Ho saputo che sei morto». E quello: «Ma mi vedi vivo!». E lo §I§scholastikos§/I§: «Eppure chi me l’ha detto è molto più degno di fede di te».","A":"22","type":"joke","text":"Σχολαστικὸς σχολαστικῷ συναντήσας, εἶπεν· «Ἔμαθον, ὅτι ἀπέθανες». Κἀκεῖνος· «Ἀλλ’ ὁρᾷς με, ἔφη, ζῶντα». Καὶ ὁ σχολαστικός· «Καὶ μὴν ὁ εἰπών μοι πολλῷ σοῦ ἀξιοπιστότερος ὑπάρχει».","n":22,"dawe":"22","num":"22","wit":"FT"},{"wit":"FT","dawe":"56","num":"56","n":23,"text":"Σχολαστικὸς καὶ φαλακρὸς καὶ κουρεὺς συνοδεύοντες συνέθεντο πρὸς τέσσαρας ὥρας βιγλεῦσαι. Ἔλαχεν οὖν πρῶτον τῷ κουρεῖ. Ὁ δὲ μετεωριζόμενος τὸν σχολαστικὸν κοιμώμενον ἐξύρισε καὶ τῶν ὡρῶν πληρωθεισῶν διύπνισεν. Ὁ δέ, κνηθόμενος ἀπὸ ὕπνου τὴν κεφαλήν, καὶ εὑρὼν αὐτὴν ψιλήν, ἔφη· «Μέγα κάθαρμα ὁ κουρεύς· πλανηθεὶς γὰρ ἀντὶ ἐμοῦ τὸν φαλακρὸν διύπνισεν».","type":"joke","A":"23","tr":"Uno §I§scholastikos§/I§, un pelato e un barbiere, viaggiando insieme, si accordarono per fare la guardia a turno di quattro ore. Toccò dunque per primo al barbiere. E questi, per passare il tempo, rase lo §I§scholastikos§/I§ mentre dormiva e, passate le ore, lo svegliò. Ma quello, grattandosi la testa al risveglio, se la trovò liscia e disse: «Gran canaglia di un barbiere! Per sbaglio, invece di me, ha svegliato il pelato!».","label":"56; cf. α 56","app":[{"dirty":false,"id":"649","lemma":"βιγλεῦσαι","sigla":["F","T"],"query":false,"span":[79,88],"unit":649,"reading":"§SIG:T§ : βιγλίσαι §SIG:F§","editors":[]},{"lemma":"πληρωθεισῶν","id":"650","dirty":false,"editors":[],"span":[187,198],"reading":"§SIG:T§(cf. α) : παρελθουσῶν §SIG:F§","unit":650,"sigla":["F","T"],"query":false},{"unit":651,"reading":"§SIG:F§ : κνιθόμενος §SIG:T§","span":[216,226],"editors":[],"query":false,"sigla":["F","T"],"lemma":"κνηθόμενος","dirty":false,"id":"651"},{"id":"652","dirty":false,"lemma":"ψιλήν","sigla":["F","T"],"query":false,"editors":[],"span":[266,271],"reading":"§SIG:T§(cf. α) : ἐψιλωμένην §SIG:F§","unit":652},{"id":"653","dirty":false,"lemma":"φαλακρὸν","sigla":["F","T"],"query":false,"editors":[],"span":[331,339],"unit":653,"reading":"§SIG:T§ : φαρακλὸν §SIG:F§"}]},{"A":"24","tr":"Uno §I§scholastikos§/I§ apprese che il corvo vive più di duecento anni, ne comprò uno e lo allevava per farne la prova.","label":"255; esclusiva di β","app":[],"type":"joke","dawe":"255","num":"255","n":24,"text":"Σχολαστικὸς μαθών, ὅτι ὁ κόραξ ὑπὲρ τὰ διακόσια ἔτη ζῇ, ἀγοράσας κόρακα, εἰς ἀπόπειραν ἔτρεφεν.","wit":"FT"},{"type":"joke","label":"64; cf. α 64","app":[],"A":"25","tr":"Uno §I§scholastikos§/I§ comprò delle brache; e poiché erano strette, vi applicava la pasta depilatoria.","wit":"F","text":"Σχολαστικὸς βράκας ὠνήσατο· στενῶν οὖν οὐσῶν, ἐδρωπάκιζεν αὐτάς.","dawe":"64","num":"64","n":25},{"num":"256","dawe":"256","n":26,"text":"Σχολαστικὸς εἰς χειμῶνα ναυαγῶν, καὶ τῶν συμπλεόντων ἑκάστου περιπλεκομένου σκεῦος πρὸς τὸ σωθῆναι, μίαν ἐκεῖνος τῶν ἀγκυρῶν περιεπλέξατο.","wit":"FT","A":"26","tr":"Uno §I§scholastikos§/I§, naufragando durante una tempesta, mentre ciascuno dei compagni di viaggio si avvinghiava a un qualche oggetto per mettersi in salvo, lui si abbracciò a una delle àncore.","label":"256; esclusiva di β","app":[{"dirty":false,"id":"654","lemma":"εἰς χειμῶνα","query":false,"sigla":["F","T"],"unit":654,"reading":"§SIG:T§ : ἐν χειμῶνι §SIG:F§","span":[12,23],"editors":[]},{"lemma":"περιπλεκομένου","id":"655","dirty":false,"editors":[],"unit":655,"reading":"§SIG:F§ : περιπλεκομένων §SIG:T§","span":[61,75],"query":false,"sigla":["F","T"]},{"dirty":false,"id":"656","lemma":"σκεῦος","sigla":["F","T"],"query":false,"span":[76,82],"reading":"editio princeps σκεύους §SIG:F§§SIG:T§","unit":656,"editors":[]},{"reading":"§SIG:F§ : ἐκεῖνος μίαν τῶν ἀγκυρῶν §SIG:T§","unit":657,"span":[100,124],"editors":[],"query":false,"sigla":["F","T"],"lemma":"μίαν … ἀγκυρῶν","dirty":false,"id":"657"}],"type":"joke"},{"wit":"FT","n":27,"dawe":"257","num":"257","text":"Σχολαστικὸς υἱὸν θάψας καὶ συναντήσας τῷ διδασκάλῳ αὐτοῦ, εἶπε· «Προῆλθεν ὁ παῖς;» Ὁ δέ φησιν· «Οὔ». Καὶ ὁ σχολαστικός· «Λοιπὸν οὖν, καθηγητά, τέθνηκεν».","type":"joke","tr":"Uno §I§scholastikos§/I§ seppellì il figlio, incontrò il suo maestro e disse: «È venuto il ragazzo?». E quello dice: «No». E lo §I§scholastikos§/I§: «E allora, professore, è morto».","A":"27","app":[{"id":"658","dirty":false,"lemma":"αὐτοῦ","sigla":["F","T"],"query":false,"editors":[],"span":[51,56],"reading":"§SIG:F§ : om. §SIG:T§","unit":658},{"unit":659,"reading":"§SIG:T§ : τὸν υἱὸν §SIG:F§","span":[12,16],"editors":[],"query":false,"sigla":["F","T"],"lemma":"υἱὸν","dirty":false,"id":"659"},{"id":"660","dirty":false,"lemma":"εἶπε","query":false,"sigla":["F"],"editors":[],"unit":660,"reading":"(εἶπεν scrib.) ἔφη §SIG:F§","span":[58,62]},{"id":"661","dirty":false,"lemma":"Προῆλθεν","sigla":["Boissonade","F","T"],"query":false,"editors":["Boissonade"],"span":[65,73],"reading":"§SIG:F§§SIG:T§ : Προσῆλθεν §SIG:Boissonade§","unit":661},{"sigla":["F","T"],"query":false,"span":[74,98],"reading":"§SIG:T§ : ὁ δέ, οὔ φησιν §SIG:F§","unit":662,"editors":[],"dirty":false,"id":"662","lemma":"Ὁ … Οὔ"}],"label":"257; cf. α 77"},{"wit":"FT","text":"Διδύμων ἀδελφῶν εἷς ἐτελεύτησεν. Σχολαστικὸς οὖν ἀπαντήσας τῷ ζῶντι, ἠρώτα· «Σὺ ἀπέθανες ἢ ὁ ἀδελφός σου;»","num":"29","dawe":"29","n":28,"type":"joke","label":"29; cf. α 29","app":[],"A":"28","tr":"Di due fratelli gemelli, uno morì. Uno §I§scholastikos§/I§ dunque incontrò quello vivo e gli chiedeva: «Sei morto tu, o tuo fratello?»."},{"type":"joke","app":[],"label":"30; cf. α 29","tr":"Uno §I§scholastikos§/I§, in procinto di naufragare, chiedeva delle tavolette per scrivere il testamento. E vedendo i servi che si addoloravano per il pericolo, disse: «Non affliggetevi: vi rendo liberi!».","A":"29","wit":"FT","text":"Σχολαστικὸς ναυαγεῖν μέλλων πινακίδας ᾔτει, ἵνα διαθήκας γράψῃ. Τοὺς δὲ οἰκέτας ὁρῶν ἀλγοῦντας διὰ τὸν κίνδυνον, ἔφη· «Μὴ λυπεῖσθε· ἐλευθερῶ γὰρ ὑμᾶς».","n":29,"num":"30","dawe":"30"},{"text":"Σχολαστικὸς ποταμὸν βουλόμενος περᾶσαι ἀνῆλθεν εἰς τὸ πλοῖον καβαλλάριος. Πυθομένου δέ τινος· «Διὰ τί οὐ κατέβης;» ἔφη σπουδάζειν.","n":30,"num":"31","dawe":"31","wit":"FT","app":[{"id":"663","dirty":false,"lemma":"ἀνῆλθεν","query":false,"sigla":["F","T"],"editors":[],"reading":"§SIG:T§(cf. α) : εἰσῆλθεν §SIG:F§","unit":663,"span":[39,46]},{"editors":[],"reading":"§SIG:F§ : ἔφιππος §SIG:T§","unit":664,"span":[61,72],"query":false,"sigla":["F","T"],"lemma":"καβαλλάριος","id":"664","dirty":false}],"label":"31; cf. α 31","tr":"Uno §I§scholastikos§/I§, volendo attraversare un fiume, salì sull’imbarcazione a cavallo. E poiché qualcuno gli chiese perché non scendesse, rispose che aveva fretta.","A":"30","type":"joke"},{"wit":"FT","text":"Σχολαστικὸς ἀμαθής, ἀπορῶν δαπανημάτων, τὰ βιβλία αὐτοῦ ἐπίπρασκε καὶ γράφων πρὸς τὸν πατέρα ἔλεγε· «Σύγχαιρε ἡμῖν, πάτερ, ἤδη γὰρ ἡμᾶς τὰ βιβλία τρέφει».","n":31,"dawe":"55","num":"55","type":"joke","app":[],"label":"55; cf. α 55","tr":"Uno §I§scholastikos§/I§ ignorante, a corto di denaro, vendeva i propri libri e, scrivendo al padre, diceva: «Congratulati con noi, padre, ché ormai i libri ci sfamano!».","A":"31"},{"text":"Σχολαστικὸς παιδοτρίβης περὶ μαθητοῦ ἀκούσας ὅτι νοσεῖ, τῇ δὲ ἑξῆς ὅτι πυρέττει, ὕστερον δὲ παρὰ τοῦ πατρὸς ἀκούσας ὅτι ἀπέθανεν, ἔφη· «Οὕτω προφασιζόμενοι οὐκ ἐᾶτε τοὺς παῖδας μανθάνειν».","num":"258","dawe":"258","n":32,"wit":"FT","label":"258; esclusiva di β","app":[{"lemma":"παιδοτρίβης","id":"665","dirty":false,"editors":[],"reading":"§SIG:F§ : παιδοτρίβεις §SIG:T§a.c","unit":665,"span":[12,23],"query":false,"sigla":["F","T"]}],"A":"32","tr":"Uno §I§scholastikos§/I§ maestro di ginnastica sentì dire di un allievo che era malato, il giorno seguente che aveva la febbre, e più tardi seppe dal padre che era morto, e disse: «Con tutte queste scuse non lasciate imparare i ragazzi».","type":"joke"},{"wit":"FT","text":"Σχολαστικοῦ παιδίον ἀπέθανεν. Ἰδὼν οὖν πλῆθος λαοῦ συνελθόν, ἔλεγεν· «Αἰσχύνομαι εἰς τοσοῦτον ὄχλον μικρὸν παιδίον προφέρειν».","n":33,"dawe":"40","num":"40","type":"joke","app":[{"span":[35,38],"reading":"§SIG:T§ : δὲ §SIG:F§","unit":666,"editors":[],"sigla":["F","T"],"query":false,"lemma":"οὖν","dirty":false,"id":"666"},{"sigla":["F","T"],"query":false,"editors":[],"span":[94,99],"unit":667,"reading":"§SIG:T§(cf. α) : πλῆθος §SIG:F§","id":"667","dirty":false,"lemma":"ὄχλον"}],"label":"40; cf. α 40","tr":"A uno §I§scholastikos§/I§ morì il bambino. Vide radunata una gran folla di gente e diceva: «Mi vergogno di portare un bimbo così piccolo in una folla tanto grande».","A":"33"},{"A":"34","tr":"Uno §I§scholastikos§/I§ comprò della carne e la portava a casa sua reggendola in mano. Ma un lupo balzò fuori e gliela strappò di mano. E lui disse: «Possa diventare come te, se anch’io non farò lo stesso a un altro!».","label":"259; esclusiva di β","app":[{"id":"668","dirty":false,"lemma":"αὐτὸ ἀπήρχετο","query":false,"sigla":["F","T"],"editors":[],"unit":668,"reading":"§SIG:T§ : αὐτὸς ἀπῆγεν §SIG:F§","span":[37,50]},{"query":false,"sigla":["F","T"],"editors":[],"reading":"§SIG:T§ : ἑαυτοῦ οἶκον §SIG:F§","unit":669,"span":[59,70],"id":"669","dirty":false,"lemma":"οἶκον αὐτοῦ"},{"lemma":"γένωμαι","id":"670","dirty":false,"editors":[],"reading":"§SIG:F§ : γένομαι §SIG:T§","unit":670,"span":[139,146],"query":false,"sigla":["F","T"]}],"type":"joke","num":"259","dawe":"259","n":34,"text":"Σχολαστικὸς ἀγοράσας κρέας, βαστάζων αὐτὸ ἀπήρχετο εἰς τὸν οἶκον αὐτοῦ. Λούπης δὲ ῥήξας ἥρπασεν αὐτὸ ἐκ τῆς χειρὸς αὐτοῦ. Ὁ δὲ ἔφη· «Ὡς σὺ γένωμαι, ἂν μὴ κἀγὼ ποιήσω αὐτὸ ἄλλῳ».","wit":"FT"},{"wit":"FT","n":35,"dawe":"65","num":"65","text":"Σχολαστικοῦ υἱός, ὑπὸ τοῦ πατρὸς εἰς πόλεμον ἐκπεμπόμενος, ὑπέσχετο ἑνὸς τῶν ἐχθρῶν κεφαλὴν ἀγαγεῖν. Ὁ δὲ ἔφη· «Εὔχομαι καὶ χωρὶς κεφαλῆς σε ἐλθόντα, μόνον ὑγιαίνοντα ἰδεῖν καὶ εὐφρανθῆναι».","type":"joke","tr":"Il figlio di uno §I§scholastikos§/I§, mandato in guerra dal padre, promise che avrebbe riportato la testa di un nemico. E quello disse: «Mi auguro di vederti tornare anche senza testa, purché sano e salvo, e di rallegrarmene!».","A":"35","app":[{"id":"671","dirty":false,"lemma":"ὑπὸ … ἐκπεμπόμενος","query":false,"sigla":["F","T"],"editors":[],"unit":671,"reading":"§SIG:T§(cf. α) : ἐκπεμπόμενος ὑπὸ τοῦ πατρὸς εἰς πόλεμον §SIG:F§","span":[18,57]},{"dirty":false,"id":"672","lemma":"ὑγιαίνοντα","query":false,"sigla":["F","T"],"unit":672,"reading":": ὑγιαίνοντα §SIG:F§ὑγειᾶ ὄντα §SIG:T§","span":[156,166],"editors":[]}],"label":"65; cf. α 65"},{"label":"17; cf. α 17","app":[{"query":false,"sigla":["F","T"],"editors":[],"unit":673,"reading":"§SIG:T§ : συνοψίσθη §SIG:F§","span":[107,116],"id":"673","dirty":false,"lemma":"συνωψίσθη"},{"span":[160,170],"unit":674,"reading":"§SIG:F§ : ἀπέστειλάς μοι §SIG:T§","editors":[],"sigla":["F","T"],"query":false,"lemma":"ἀπέστειλας","dirty":false,"id":"674"},{"lemma":"ὁ1 … αὐτῶν","dirty":false,"id":"675","span":[172,234],"unit":675,"reading":"§SIG:F§(cf. α) : αὐτῶν ὁ εἷς §SIG:T§","editors":[],"sigla":["F","T"],"query":false}],"A":"36","tr":"A uno §I§scholastikos§/I§ che si trovava in Grecia un amico scrisse di comprargli dei libri. Ma quello non se ne curò e, quando dopo un po’ si incontrò con l’amico, disse: «La lettera che mi avevi mandato a proposito dei libri non l’ho ricevuta».","type":"joke","text":"Σχολαστικῷ φίλος ἔγραψεν εἰς Ἑλλάδα ὄντι, βιβλία αὐτῷ ἀγοράσαι. Τοῦ δὲ ἀμελήσαντος, ὡς μετὰ χρόνον τῷ φίλῳ συνωψίσθη, εἶπε· «Τὴν ἐπιστολήν, ἣν περὶ τῶν βιβλίων ἀπέστειλας, οὐκ ἐκομισάμην».","num":"17","dawe":"17","n":36,"wit":"FT"},{"type":"joke","A":"37","tr":"Due §I§scholastikoi§/I§ camminavano. E uno dei due vide una gallina nera e disse: «Fratello, forse le è morto il gallo, e per questo si è vestita di nero!».","label":"39; cf. α 39","app":[{"lemma":"μέλαιναν ὄρνιν","dirty":false,"id":"676","span":[46,60],"reading":"§SIG:F§(cf. α) : μέλαινα ὄρνιν §SIG:T§","unit":676,"editors":[],"sigla":["F","T"],"query":false},{"lemma":"ταύτης … ἀλέκτωρ","id":"677","dirty":false,"editors":[],"reading":"§SIG:T§(cf. α) : ὁ ἀλέκτωρ ταύτης §SIG:F§","unit":677,"span":[83,99],"query":false,"sigla":["F","T"]}],"wit":"FT","dawe":"39","num":"39","n":37,"text":"Σχολαστικοὶ δύο ἐβάδιζον. Ἰδὼν δὲ ὁ εἷς αὐτῶν μέλαιναν ὄρνιν, εἶπεν· «Ἀδελφέ, ἴσως ταύτης ὁ ἀλέκτωρ ἀπέθανε, καὶ διὰ τοῦτο μέλαινα ἐνεδύσατο»."},{"wit":"FT","text":"Σχολαστικὸς μετὰ τοῦ πατρὸς κοιμώμενος, τῇ νυκτὶ ἀπὸ τῆς κλίνης ἀνιστάμενος, σταφυλὰς ἔτρωγεν ἐπάνω κρεμαμένας. Τοῦ δὲ πατρὸς σκανδαλισθέντος καὶ ὑπὸ χύτραν λαμπάδα κρύψαντος, ἐν τῷ ἐκεῖνον νυκτὶ ἀναστῆναι πρὸς τὸ ἔθος, ὁ πατὴρ ἄφνω τὸ φῶς ἔδειξεν. Κἀκεῖνος ἑστὼς καμμύων ἔρρεγχε, κοιμᾶσθαι προσποιούμενος.","n":38,"dawe":"44","num":"44","type":"joke","app":[{"lemma":"κοιμᾶσθαι","dirty":false,"id":"678","unit":678,"reading":"§SIG:T§(cf. α) : τὸ κοιμᾶσθαι §SIG:F§","span":[281,290],"editors":[],"query":false,"sigla":["F","T"]},{"editors":[],"span":[77,85],"reading":"§SIG:F§(cf. α) : τὰς σταφυλὰς §SIG:T§","unit":679,"sigla":["F","T"],"query":false,"lemma":"σταφυλὰς","id":"679","dirty":false},{"sigla":["F","T"],"query":false,"span":[190,195],"unit":680,"reading":"§SIG:F§ : τῇ νυκτὶ §SIG:T§","editors":[],"dirty":false,"id":"680","lemma":"νυκτὶ"},{"unit":681,"reading":"§SIG:F§(cf. α) : ἔτρεχε §SIG:T§","span":[272,279],"editors":[],"query":false,"sigla":["F","T"],"lemma":"ἔρρεγχε","dirty":false,"id":"681"},{"query":false,"sigla":["F","T"],"editors":[],"reading":"§SIG:T§(cf. α) : ποιούμενος §SIG:F§","unit":682,"span":[291,305],"id":"682","dirty":false,"lemma":"προσποιούμενος"}],"label":"44; cf. α 44","tr":"Uno §I§scholastikos§/I§ che dormiva col padre, alzandosi di notte dal letto, mangiava dei grappoli d’uva appesi in alto. E poiché il padre, contrariato, aveva nascosto una lucerna sotto una pentola e, quando quello di notte si alzò come al solito, mostrò all’improvviso la luce, lui, rimasto in piedi a occhi chiusi, russava fingendo di dormire.","A":"38"},{"num":"227","dawe":"227","n":39,"text":"Σχολαστικῷ ἐν καπηλείῳ πίνοντι ἐπιστάς τις εἶπεν· «Ἡ γυνή σου ἀπέθανεν». Ὁ δὲ ἔφη· «Οὐκοῦν, πραγματευτά, μέλανα οἶνόν μοι κέρνα».","wit":"FT","A":"39","tr":"Mentre uno §I§scholastikos§/I§ beveva in un’osteria, un tale gli si avvicinò e disse: «Tua moglie è morta». E quello rispose: «E allora, oste, versami del vino nero!».","label":"227; cf. α 227","app":[{"dirty":false,"id":"683","lemma":"καπηλείῳ","query":false,"sigla":["F","T"],"unit":683,"reading":"§SIG:F§ : καπελίῳ §SIG:T§","span":[14,22],"editors":[]},{"sigla":["F","T"],"query":false,"editors":[],"span":[105,111],"unit":684,"reading":"§SIG:F§ : μέλαινα §SIG:T§","id":"684","dirty":false,"lemma":"μέλανα"},{"lemma":"κέρνα","dirty":false,"id":"685","reading":"§SIG:T§ : κίρνα §SIG:F§","unit":685,"span":[122,127],"editors":[],"query":false,"sigla":["F","T"]}],"type":"joke"},{"type":"section","text":"Περὶ δυσκόλων","app":[]},{"n":40,"dawe":"184","num":"184","text":"Δυσκόλῳ ἰατρῷ λέγει τις· «Τί ἐστιν, ὅτι αἷμα χέζω καὶ χολάς;» Κἀκεῖνος ἔφη· «Ἐὰν καὶ τὰ ἔντερά σου χέσῃς, ἐγὼ οὐ χολῶ».","wit":"FT","tr":"Un tale dice a un medico burbero: «Come mai evacuo sangue e bile?». E quello rispose: «Anche se cachi via le tue budella, io non mi prendo bile!».","A":"40","app":[],"label":"184; cf. α 184","type":"joke"},{"label":"187; cf. α 187","app":[{"editors":[],"span":[35,42],"reading":"§SIG:F§(cf. α) : γέννησιν §SIG:T§","unit":686,"sigla":["F","T"],"query":false,"lemma":"γένησιν","id":"686","dirty":false}],"A":"41","tr":"Un astrologo burbero fece l’oroscopo di un bambino malaticcio, garantì che sarebbe vissuto a lungo e ne chiedeva il compenso. E poiché la madre disse: «Te lo darò domani», ribatté: «E che, se muore stanotte, perdo il mio compenso?».","type":"joke","text":"Δύσκολος ἀστρονόμος παιδὸς νοσεροῦ γένησιν εἰπών, πολυχρόνιον ἔσεσθαι ἐπαγγειλάμενος, ᾔτει τὸν μισθόν. Τῆς δὲ μητρὸς εἰπούσης· «Αὔριον δώσω» — «Τί οὖν, ἔφη, ἐὰν τῇ νυκτὶ ἀποθάνῃ, ἐγὼ τὸν μισθὸν ἀπολέσω;»","num":"187","dawe":"187","n":41,"wit":"FT"},{"type":"joke","app":[{"editors":[],"reading":"§SIG:F§(cf. α) : μέλιτος κεράμιον §SIG:T§","unit":687,"span":[9,25],"query":false,"sigla":["F","T"],"lemma":"κεράμιον μέλιτος","id":"687","dirty":false},{"dirty":false,"id":"688","lemma":"Οὕτω","sigla":["F","T"],"query":false,"span":[102,106],"unit":688,"reading":"§SIG:F§(cf. α) : Οὕτως §SIG:T§","editors":[]}],"label":"188; cf. α 188","tr":"Un burbero comprò un orcio di miele e si sentiva chiedere di continuo quanto l’avesse pagato. E allora, capovolgendo l’orcio, disse: «Così mi si versi il sangue, se ve lo dico!».","A":"42","wit":"FT","text":"Δύσκολος κεράμιον μέλιτος ἀγοράσας συνεχῶς ἠρωτᾶτο, πόσου ἠγόρασεν. Καταστρέφων οὖν τὸ κεράμιον ἔφη· «Οὕτω χυθήτω μου τὸ αἷμα, ἐὰν εἴπω ὑμῖν».","n":42,"dawe":"188","num":"188"},{"type":"joke","tr":"Mentre un burbero giocava a dadi, un tale gli saltò addosso. E quello si irritò e gli chiese se conoscesse un mestiere e perché stesse in ozio. Quando il tale rispose: «So cucire, ma non ho lavoro», stracciò il proprio mantello e disse: «Prendi, lavora e taci!».","A":"43","app":[{"lemma":"Τοῦ … Ῥάπτειν","dirty":false,"id":"689","reading":"§SIG:F§ : Τοῦ δὲ φήσαντος· καὶ διὰ τί ἀργεῖ §SIG:T§a.c","unit":689,"span":[94,119],"editors":[],"query":false,"sigla":["F","T"]}],"label":"190; cf. α 190","wit":"FT","n":43,"dawe":"190","num":"190","text":"Δυσκόλου ταυλίζοντος κατεπήδησε τις. Ὁ δὲ θυμωθεὶς ἠρώτησεν, εἰ τέχνην οἶδε καὶ διὰ τί ἀργεῖ. Τοῦ δὲ φήσαντος· «Ῥάπτειν οἶδα, ἔργον δὲ οὐκ ἔχω», διαρρήξας τὸ ἱμάτιον αὐτοῦ εἶπε· «Λάβε καὶ ἐργάζου καὶ σιώπα»."},{"type":"joke","tr":"Un tale chiamava un burbero, e quello rispose: «Non sono in casa». E quando il primo disse: «Menti, perché sento la tua voce!», ribatté: «Canaglia, se te l’avesse detto il mio servo, gli avresti creduto; e io non ti sembro più degno di fede di lui?».","A":"44","app":[{"dirty":false,"id":"690","lemma":"ἔσω","sigla":["F","T"],"query":false,"span":[47,50],"reading":"§SIG:F§(cf. α) : ἐγὼ §SIG:T§","unit":690,"editors":[]},{"lemma":"Ψεύδῃ","dirty":false,"id":"691","span":[74,79],"unit":691,"reading":"§SIG:F§(cf. α) : ψεῦδος §SIG:T§","editors":[],"sigla":["F","T"],"query":false},{"lemma":"Ὦ κάθαρμα","id":"692","dirty":false,"editors":[],"span":[113,122],"unit":692,"reading":"§SIG:T§ : Τ (cf. α) κάθαρμα §SIG:F§","sigla":["F","T"],"query":false},{"sigla":["F","T"],"query":false,"span":[169,184],"reading":"§SIG:F§(cf. α) : οὐ φαίνομαί σοι §SIG:T§","unit":693,"editors":[],"dirty":false,"id":"693","lemma":"σοι … φαίνομαι"}],"label":"193; cf. α 193","wit":"FT","n":44,"num":"193","dawe":"193","text":"Δυσκόλῳ τις ἐφώνει· ὁ δὲ ἀπεκρίνατο· «Οὐκ εἰμὶ ἔσω». Τοῦ δὲ εἰπόντος ὅτι «Ψεύδῃ· τῆς φωνῆς σου γὰρ ἀκούω», ἔφη· «Ὦ κάθαρμα, εἰ μὲν ὁ παῖς μου εἶπεν, ἐπείσθης ἄν· ἐγὼ δέ σοι οὐ φαίνομαι ἀξιοπιστότερος εἶναι;»"},{"label":"191; cf. α 191","app":[],"A":"45","tr":"Un tale chiese a un burbero: «Dove abiti?». E quello disse: «Mi sto traslocando proprio da lì!».","type":"joke","text":"Δύσκολόν τις ἠρώτα· «Ποῦ μένεις;» Ὁ δὲ ἔφη· «Κἀκεῖθεν μεταβαίνω».","dawe":"191","num":"191","n":45,"wit":"FT"},{"text":"Δύσκολος ἀπὸ σκάλας καταβαίνων ἔπεσεν. Τοῦ δὲ αὐθέντου εἰπόντος· «Ἐκεῖ τίς ἔπεσεν;» Ἔφη· «Ἐγὼ τοῦ ἐνοικίου μου. Τί πρὸς σέ;»","n":46,"dawe":"194","num":"194","wit":"FT","app":[{"dirty":false,"id":"694","lemma":"σκάλας","sigla":["F","T"],"query":false,"span":[13,19],"reading":"§SIG:T§(cf. α) : κλίμακος §SIG:F§","unit":694,"editors":[]},{"lemma":"αὐθέντου","id":"695","dirty":false,"editors":[],"unit":695,"reading":"§SIG:T§ : δεσπότου §SIG:F§","span":[46,54],"query":false,"sigla":["F","T"]},{"id":"696","dirty":false,"lemma":"Ἐγὼ","sigla":["Dawe","F","T"],"query":false,"editors":["Dawe"],"span":[90,93],"unit":696,"reading":"§SIG:F§§SIG:T§ : Ἐγὼ ἔσω §SIG:Dawe§"},{"editors":[],"reading":"om. §SIG:F§","unit":697,"span":null,"query":false,"sigla":["F"],"lemma":"","id":"697","dirty":false}],"label":"194; cf. α 194","tr":"Un burbero, mentre scendeva una scala, cadde. E poiché il padrone di casa disse: «Chi è caduto, là?», rispose: «Io, a prezzo del mio affitto! E a te che importa?».","A":"46","type":"joke"},{"label":"185; cf. α 185","app":[],"A":"47","tr":"Un medico burbero, cieco da un occhio, disse a un malato: «Come stai?». E quello: «Come vedi». E il medico disse: «Se ‹…›».","type":"joke","text":"Δύσκολος ἰατρὸς ἑτερόφθαλμος ἀρρώστῳ ἔφη· «Πῶς ἔχεις;» Ὁ δέ· «Ὡς βλέπεις». Εἶπε δέ· «Ἐάν ‹...›».","num":"185","dawe":"185","n":47,"wit":"T"},{"type":"section","text":"Περὶ φιλαργύρων","app":[]},{"type":"joke","A":"48","tr":"Un avaro, redigendo il testamento, nominò erede sé stesso.","label":"104; cf. α 104","app":[{"editors":[],"unit":698,"reading":"§SIG:F§(cf. α) : διαθήκην §SIG:T§","span":[11,19],"query":false,"sigla":["F","T"],"lemma":"διαθήκας","id":"698","dirty":false}],"wit":"FT","dawe":"104","num":"104","n":48,"text":"Φιλάργυρος διαθήκας γράφων, ἑαυτὸν κληρονόμον ἔταξεν."},{"type":"joke","tr":"A un avaro fu chiesto perché non mangiasse nient’altro che olive, e disse: «Perché l’esterno mi faccia da companatico, il nocciolo da legna; e perché, dopo aver mangiato, invece di lavarmi le mani me le strofini sulla testa e resti unto».","A":"49","app":[{"dirty":false,"id":"699","lemma":"ἀλλὰ","sigla":["F","T","Thierfelder"],"query":false,"span":[155,159],"unit":699,"reading":"§SIG:F§§SIG:T§ : ἀλλὰ εἰς §SIG:Thierfelder§","editors":["Thierfelder"]},{"editors":[],"span":[164,175],"reading":"§SIG:T§(cf. α) : κεφαλὴν §SIG:F§","unit":700,"sigla":["F","T"],"query":false,"lemma":"κεφαλήν μου","id":"700","dirty":false},{"editors":[],"span":[189,201],"reading":"§SIG:F§ : ἄλλα §SIG:T§","unit":701,"sigla":["F","T"],"query":false,"lemma":"ἠλειμμένος ὦ","id":"701","dirty":false},{"lemma":"","dirty":false,"id":"702","span":null,"unit":702,"reading":"(cf. α) λιμοξήρου §SIG:T§","editors":[],"sigla":["T"],"query":false}],"label":"105; cf. α 105","wit":"FT","n":49,"dawe":"105","num":"105","text":"Φιλάργυρος ἐρωτηθείς· «Διὰ τί οὐδὲν ἄλλο ἐσθίεις εἰ μὴ ἐλαίας;» Εἶπεν· «Ἵνα τὸ μὲν ἔξωθεν ὄψον ἔχω, τὸ δὲ ὀστοῦν ἀντὶ ξύλου· καὶ ἵνα φαγών, μὴ ἀπονίψωμαι, ἀλλὰ τὴν κεφαλήν μου ἐκμαξάμενος, ἠλειμμένος ὦ»."},{"text":"Περὶ λιμοξήρων","app":[{"sigla":["T"],"query":false,"editors":[],"span":[5,14],"reading":"(cf. α) λιμοξήρου §SIG:T§","unit":53,"id":"1427","dirty":false,"lemma":"λιμοξήρων"}],"type":"section"},{"A":"50","tr":"Un prefetto morto di fame ordinò che il suo tribunale fosse collocato accanto a un panificio.","label":"261; esclusiva di β","app":[],"type":"joke","dawe":"261","num":"261","n":50,"text":"Λιμόξηρος ὕπαρχος τὸ βῆμα αὐτοῦ ἐκέλευσε πρὸς ἀρτοκοπεῖον γενέσθαι.","wit":"FT"},{"wit":"FT","n":51,"num":"220","dawe":"220","text":"Λιμόξηρος παιδαγωγός, ἰδὼν ἄρτον ἔν τινι ὕψει κρεμάμενον, εἶπε· «Καταβαίνεις καὶ ἀπαγγέλλεις, ἢ ἀναβαίνων ἀπαρτίζω σε;»","type":"joke","tr":"Un precettore morto di fame vide un pane appeso in alto e disse: «Scendi a ripetere la lezione, o devo salire io a sistemarti?».","A":"51","app":[{"span":[81,92],"reading":"§SIG:Thierfelder§ (cf. α) ἐπαγγέλλεις §SIG:F§ : ἀπαγγέλεις §SIG:T§","unit":703,"editors":["Thierfelder"],"sigla":["F","T","Thierfelder"],"query":false,"lemma":"ἀπαγγέλλεις","dirty":false,"id":"703"},{"lemma":"ἀναβαίνων","dirty":false,"id":"704","unit":704,"reading":"(iam §SIG:Eberhard§) ἀναβαίνω §SIG:T§","span":[96,105],"editors":["Eberhard"],"query":false,"sigla":["Eberhard","T"]}],"label":"220; cf. α 228"},{"wit":"FT","num":"221","dawe":"221","n":52,"text":"Λιμόξηρος ἰατρός, ἰδὼν ἄρτον διά τινος τρύπης, ἐκσυρτικὸν ἔμπλαστρον ἐτίθει.","type":"joke","A":"52","tr":"Un medico morto di fame vide un pane attraverso un buco e vi applicava un impiastro estrattivo.","label":"221; cf. α 221","app":[{"query":false,"sigla":["F","T"],"editors":[],"reading":"§SIG:T§ : Τ (cf. α) λιμόξηρος σχολαστικὸς §SIG:F§","unit":705,"span":[0,9],"id":"705","dirty":false,"lemma":"Λιμόξηρος"}]},{"type":"joke","A":"53","tr":"Un morto di fame vide un pane posato su un architrave e disse: «Signore, o abbassi quello, o innalzi me!».","label":"223; cf. α 223","app":[{"sigla":["F","T","Thierfelder"],"query":false,"editors":["Thierfelder"],"span":[25,33],"reading":"§SIG:Thierfelder§ (cf. α) ὑπαίθρῳ §SIG:F§ : γράφεται ἐν ὑπερώῳ §SIG:F§i.m. : ὑπέρθρῳ §SIG:T§","unit":706,"id":"706","dirty":false,"lemma":"ὑπερθύρῳ"},{"editors":[],"span":[85,91],"unit":707,"reading":"§SIG:F§(cf. α) : ἐξάλειψον §SIG:T§","sigla":["F","T"],"query":false,"lemma":"ὕψωσον","id":"707","dirty":false}],"wit":"FT","dawe":"223","num":"223","n":53,"text":"Λιμόξηρος, ἰδὼν ἄρτον ἐν ὑπερθύρῳ κείμενον, ἔφη· «Κύριε, ἢ ἐκεῖνον ταπείνωσον, ἢ ἐμὲ ὕψωσον»."},{"type":"section","app":[],"text":"Περὶ ὀκνηρῶν"},{"text":"Ὀκνηρῶν δύο κοιμωμένων, εἰσελθών τις κλέπτης τὸ σαγίον αὐτῶν ἔλαβεν. Τοῦ δὲ ἑνὸς νοήσαντος καὶ εἰπόντος πρὸς τὸν ἕτερον· «Ἀνάστα, δίωξον αὐτόν», ἔφη· «Ἄφες· ὅταν ἔλθῃ λαβεῖν τὴν τύλην, κρατοῦμεν αὐτὸν οἱ δύο».","n":54,"dawe":"211","num":"211","wit":"FT","app":[{"editors":[],"reading":"§SIG:F§ : σαγεῖον §SIG:T§","unit":708,"span":[48,54],"query":false,"sigla":["F","T"],"lemma":"σαγίον","id":"708","dirty":false},{"unit":709,"reading":"(ἔλαβεν scrib.) ἥρπασε §SIG:F§","span":[61,67],"editors":[],"query":false,"sigla":["F"],"lemma":"ἔλαβεν","dirty":false,"id":"709"},{"sigla":["F","T"],"query":false,"editors":[],"span":[104,119],"unit":710,"reading":"§SIG:T§(cf. α) : τῷ ἑτέρῳ §SIG:F§","id":"710","dirty":false,"lemma":"πρὸς … ἕτερον"},{"id":"711","dirty":false,"lemma":"ὅταν","query":false,"sigla":["F","T"],"editors":[],"unit":711,"reading":"§SIG:T§(cf. α) : ἐὰν §SIG:F§","span":[157,161]},{"dirty":false,"id":"712","lemma":"τύλην","sigla":["F","T"],"query":false,"span":[178,183],"unit":712,"reading":"§SIG:T§(cf. α) : πύλην §SIG:F§","editors":[]}],"label":"211; cf. α 211","tr":"Mentre due pigri dormivano insieme, un ladro entrò e portò via il loro mantello. E quando uno dei due se ne accorse e disse all’altro: «Alzati, inseguilo!», quello rispose: «Lascia stare: quando verrà a prendere il cuscino, lo acchiapperemo in due».","A":"54","type":"joke"},{"text":"Ὀκνηρῷ υἱῷ ἐπέταξεν ὁ πατὴρ ἀπελθεῖν εἰς τὸν γείτονα καὶ χρήσασθαι ἀξίνην. Ὁ δὲ ἔφη· «Ἐγώ εἰμι ὁ γείτων· ἀξίνην οὐκ ἔχω».","n":55,"num":"212","dawe":"212","wit":"FT","app":[{"sigla":["Thierfelder"],"query":false,"span":[80,83],"unit":713,"reading":"Lacunam post ἔφη· ex α statuit §SIG:Thierfelder§","editors":["Thierfelder"],"dirty":false,"id":"713","lemma":"ἔφη"}],"label":"212; cf. α 212","tr":"Un padre ordinò al figlio pigro di andare dal vicino a farsi prestare un’accetta. E quello disse: «Sono io il vicino: di accetta non ne ho!».","A":"55","type":"joke"},{"A":"56","tr":"Un pigro doveva un denaro a un altro pigro. Lo incontrò e gli chiedeva il denaro. E quello disse: «È legato nel mio fagotto: slegalo e prendilo». E l’altro: «Lascia perdere, sono già stato pagato».","label":"213; cf. α 213","app":[{"lemma":"δηνάριον ὤφειλεν","id":"714","dirty":false,"editors":["Braccini"],"reading":"§SIG:Braccini§ (cf. α) δηνάριον ὤφειλε δοῦναι §SIG:F§ : ὤφειλε δηνάριον (δεινάριον scrib.) §SIG:T§","unit":714,"span":[15,31],"query":false,"sigla":["Braccini","F","T"]},{"reading":"§SIG:F§ : ὑπαντηκὸς §SIG:T§","unit":715,"span":[33,42],"editors":[],"query":false,"sigla":["F","T"],"lemma":"Ὑπηντηκὼς","dirty":false,"id":"715"},{"editors":[],"span":[46,50],"reading":"§SIG:F§(cf. α) : αὐτὸν §SIG:T§","unit":716,"sigla":["F","T"],"query":false,"lemma":"αὐτῷ","id":"716","dirty":false},{"dirty":false,"id":"717","lemma":"δηνάριον","query":false,"sigla":["F","T"],"reading":"§SIG:F§ : δεινάριον §SIG:T§","unit":717,"span":[60,68],"editors":[]},{"id":"718","dirty":false,"lemma":"τὸ μάπουλόν","query":false,"sigla":["F","T"],"editors":[],"reading":"§SIG:T§ : τὸν μάπουλον §SIG:F§","unit":718,"span":[87,98]}],"type":"joke","dawe":"213","num":"213","n":56,"text":"Ὀκνηρὸς ὀκνηρῷ δηνάριον ὤφειλεν. Ὑπηντηκὼς δὲ αὐτῷ, ᾔτει τὸ δηνάριον. Ὁ δέ φησιν· «Εἰς τὸ μάπουλόν μου δέδεται· λύσας ἆρον». Ὁ δέ· «Ἄπελθε, φησίν, ἐπληρώθην».","wit":"FT"},{"n":57,"dawe":"229","num":"229","text":"Ἀτυχὴς μέθυσος, ἀμπελῶνα κληρονομήσας, ἐν καιρῷ τοῦ τρυγητοῦ ἀπέθανεν.","wit":"FT","tr":"Uno sbevazzone sfortunato ereditò una vigna e morì proprio al tempo della vendemmia.","A":"57","app":[],"label":"229; cf. α 237","type":"joke"},{"app":[{"query":false,"sigla":["F","T"],"unit":719,"reading":"Ante hoc dictum, titulum Περὶ λάγνων γυναικῶν praebet §SIG:T§§SIG:F§et α nihil habent.","span":[0,9],"editors":[],"dirty":false,"id":"719","lemma":"Νεανίσκος"},{"dirty":false,"id":"720","lemma":"τὴν … ἀσελγῆ","sigla":["F"],"query":false,"span":[15,40],"reading":"(ἀσελγὴν οὖσαν εἶπε (εἶπεν scrib.) scrib.) (cf. α) τὴν γυναῖκα εἶπεν οὖσαν ἀσελγῆ §SIG:F§","unit":720,"editors":[]},{"query":false,"sigla":["F","T"],"editors":[],"unit":721,"reading":"(cf. α) : ἀφροδιάζομεν §SIG:T§ : ἀφροδιάσομεν §SIG:F§","span":[87,101],"id":"721","dirty":false,"lemma":"ἀφροδισιάζομεν"}],"label":"244; cf. α 244","tr":"Un giovane disse alla propria moglie, che era lasciva: «Signora, che facciamo? Pranziamo o facciamo l’amore?». E quella rispose: «Come vuoi: ma di pane non ne abbiamo!».","A":"58","type":"joke","text":"Νεανίσκος πρὸς τὴν ἑαυτοῦ γυναῖκα ἀσελγῆ οὖσαν εἶπε· «Κυρία, τί ποιοῦμεν; Ἀριστοῦμεν ἢ ἀφροδισιάζομεν;» Κἀκείνη ἔφη· «Ὡς θέλεις· ψωμὶν οὐκ ἔχομεν».","n":58,"num":"244","dawe":"244","wit":"FT"},{"tr":"Un giovane ospitò delle vecchiette in amore e disse ai suoi servi: «A quella che vuole versate da bere, e con quella che vuole fate l’amore». E quelle dissero: «Noi non abbiamo sete!».","A":"59","app":[{"editors":[],"span":[112,125],"unit":722,"reading":"(cf. α) : ἀφροδιάσατε §SIG:T§ : ἀφροδιάσετε §SIG:F§","sigla":["F","T"],"query":false,"lemma":"ἀφροδισιάσατε","id":"722","dirty":false},{"lemma":"…","dirty":false,"id":"723","reading":"§SIG:Braccini§ Περὶ μιγυναικῶν ἀνδρῶν §SIG:T§ : Περὶ μισογυναίου §SIG:F§","unit":723,"span":null,"editors":["Braccini"],"query":false,"sigla":["Braccini","F","T"]}],"label":"245; cf. α 245","type":"joke","n":59,"dawe":"245","num":"245","text":"Γραΐδας ἐρωτευομένας νεανίσκος ξενοδοχήσας, πρὸς τοὺς παῖδας αὐτοῦ ἔφη· «Τὴν θέλουσαν κεράσατε καὶ τὴν θέλουσαν ἀφροδισιάσατε». Κἀκεῖναι εἶπον· «Ἡμεῖς οὐ διψῶμεν».","wit":"FT"},{"app":[{"lemma":"Περὶ μισογυναίων ἀνδρῶν","id":"1670-1672","dirty":false,"editors":["Braccini"],"reading":"§SIG:Braccini§ Περὶ μιγυναικῶν ἀνδρῶν §SIG:T§ : Περὶ μισογυναίου §SIG:F§","unit":65,"span":[0,23],"query":false,"sigla":["Braccini","F","T"]}],"text":"Περὶ μισογυναίων ἀνδρῶν","type":"section"},{"text":"Μισογυναίου τὴν γυναῖκα κηδεύοντος, ἠρώτησέ τις· «Τίς ἀνεπαύσατο;» Ὁ δὲ ἔφη· «Ἐγὼ ὁ ταύτης στερηθείς».","n":60,"num":"247","dawe":"247","wit":"FT","app":[{"unit":724,"reading":"§SIG:F§(cf. α) : μισογυναίκου §SIG:T§","span":[0,11],"editors":[],"query":false,"sigla":["F","T"],"lemma":"Μισογυναίου","dirty":false,"id":"724"},{"editors":[],"span":[44,47],"unit":725,"reading":"§SIG:T§(cf. α) : τις, λέγων §SIG:F§","sigla":["F","T"],"query":false,"lemma":"τις","id":"725","dirty":false}],"label":"247; cf. α 247","tr":"Mentre un misogino seppelliva la moglie, un tale chiese: «Chi se n’è andato?». E quello rispose: «Io, che mi sono liberato di questa!».","A":"60","type":"joke"},{"wit":"FT","text":"Μισογύναιος ἀρρωστῶν καὶ τῆς γυναικὸς εἰπούσης αὐτῷ· «Ἐὰν ἀποθάνῃς, ἀπάγξομαι», ἀναβλέψας εἶπε· «Ζῶντί μοι τοῦτο χάρισαι».","dawe":"248","num":"248","n":61,"type":"joke","label":"248; cf. α 248","app":[{"editors":[],"span":[0,11],"unit":726,"reading":"§SIG:F§(cf. α) : Μισογύναικος §SIG:T§","sigla":["F","T"],"query":false,"lemma":"Μισογύναιος","id":"726","dirty":false},{"lemma":"cf","dirty":false,"id":"727","reading":"om. §SIG:T§","unit":727,"span":null,"editors":[],"query":false,"sigla":["T"]}],"A":"61","tr":"Un misogino era malato, e poiché la moglie gli disse: «Se muori, mi impiccherò», alzò lo sguardo e disse: «Fammi questo favore mentre sono ancora vivo!»."},{"type":"section","app":[],"text":"Περὶ εὐτραπέλων"},{"tr":"A un timoniere spiritoso fu chiesto che vento tirasse, e rispose: «Fave e cipolle!».","A":"62","app":[],"label":"141; cf. α 120","type":"joke","n":62,"dawe":"141","num":"141","text":"Εὐτράπελος κυβερνήτης ἐρωτηθείς, τί φυσᾷ, εἶπε· «Φάβα, καὶ κρόμμυα».","wit":"F"},{"type":"joke","label":"239; cf. α 239","app":[{"lemma":"ὀζοχνώτου","dirty":false,"id":"728","reading":"§SIG:F§ : εὐοχνώτου §SIG:T§","unit":728,"span":[60,69],"editors":[],"query":false,"sigla":["F","T"]},{"lemma":"περιπλοκάς","dirty":false,"id":"729","span":[137,147],"unit":729,"reading":"§SIG:F§(cf. α) : περιπλοκήν §SIG:T§","editors":[],"sigla":["F","T"],"query":false},{"lemma":"φίλημα","id":"730","dirty":false,"editors":["Dawe"],"span":[102,108],"unit":730,"reading":"§SIG:F§§SIG:T§ : φιλήματα §SIG:Dawe§","sigla":["Dawe","F","T"],"query":false}],"A":"63","tr":"Uno spiritoso attore tragico era amato da due donne, una dall’alito cattivo e l’altra tutta puzzolente. E mentre una diceva: «Dammi dei baci!» e l’altra: «Dammi degli abbracci!», quello gridò: «Ahimè, che fare? Sono diviso tra due mali!».","wit":"FT","text":"Εὐτράπελος τραγῳδὸς ὑπὸ δύο ἠγαπᾶτο γυναικῶν, ὀζοστόμου καὶ ὀζοχνώτου. Καὶ τῆς μὲν εἰπούσης· «Δός μοι φίλημα», τῆς δὲ εἰπούσης· «Δός μοι περιπλοκάς», ἀνεβόησεν· «Οἴμοι, τί δράσω; Δυσὶ κακοῖς μερίζομαι».","num":"239","dawe":"239","n":63},{"type":"joke","label":"143; cf. α 143","app":[{"editors":["Eberhard"],"span":[0,9],"unit":731,"reading":"§SIG:Eberhard§ : Εὐτράπελός §SIG:F§§SIG:T§","sigla":["Eberhard","F","T"],"query":false,"lemma":"Εὐτραπέλῳ","id":"731","dirty":false},{"sigla":["F","T"],"query":false,"span":[20,25],"reading":"§SIG:T§(cf. α) : ἔφη §SIG:F§","unit":732,"editors":[],"dirty":false,"id":"732","lemma":"λέγει"},{"id":"733","dirty":false,"lemma":"ποτὲ οὐ","sigla":["Dawe","Eberhard","F","T","Thierfelder"],"query":false,"editors":["Dawe","Eberhard","Thierfelder"],"span":[96,103],"unit":733,"reading":"§SIG:F§§SIG:T§ : οὔποτε §SIG:Eberhard§, fortasse recte (οὐδέποτε malle videtur §SIG:Thierfelder§) : ποτε inter cruces ponunt §SIG:Thierfelder§ §SIG:Dawe§"},{"editors":[],"unit":734,"reading":"§SIG:T§(cf. α) : λείψῃ §SIG:F§","span":[104,110],"query":false,"sigla":["F","T"],"lemma":"λείψει","id":"734","dirty":false}],"A":"64","tr":"A un medico spiritoso un tale dice: «Ho molti carbonchi!». E quello rispose: «Se hai uno scaldino, non ti mancherà mai il caldo!».","wit":"FT","text":"Εὐτραπέλῳ τις ἰατρῷ λέγει· «Πολλοὺς ἄνθρακας ἔχω». Κἀκεῖνος ἔφη· «Ἐὰν χαλκεῖον ἔχῃς, θερμόν σοί ποτὲ οὐ λείψει».","dawe":"143","num":"143","n":64},{"tr":"Uno spiritoso partì per un viaggio, si ammalò d’ernia e al ritorno veniva interrogato dalla moglie su che cosa avesse portato. E lui disse: «Per te nulla; ma per le tue cosce un bel cuscinetto».","A":"65","app":[{"query":false,"sigla":["F","T"],"editors":[],"reading":"§SIG:T§ : ἀποπηδήσας §SIG:F§","unit":735,"span":[11,21],"id":"735","dirty":false,"lemma":"ἀποδημήσας"},{"lemma":"κηλίτης","dirty":false,"id":"736","span":[26,33],"unit":736,"reading":"edd. κηλήτης §SIG:F§ : κυλίτης §SIG:T§","editors":[],"sigla":["F","T"],"query":false},{"unit":737,"reading":"ἐπανελθὼν om. §SIG:F§","span":[45,54],"editors":[],"query":false,"sigla":["F"],"lemma":"ἐπανελθὼν","dirty":false,"id":"737"},{"span":[63,80],"unit":738,"reading":"(iam §SIG:Thierfelder§ coniecit) om. §SIG:T§","editors":["Thierfelder"],"sigla":["T","Thierfelder"],"query":false,"lemma":"παρὰ … γυναικός","dirty":false,"id":"738"},{"editors":[],"span":[85,91],"unit":739,"reading":"§SIG:T§ : αὐτῇ ἔφερεν §SIG:F§","sigla":["F","T"],"query":false,"lemma":"ἤγαγεν","id":"739","dirty":false},{"id":"740","dirty":false,"lemma":"Ὁ","query":false,"sigla":["F","T"],"editors":[],"reading":"§SIG:T§ : om. §SIG:F§","unit":740,"span":[93,94]},{"lemma":"προσκε-","id":"741","dirty":false,"editors":["Eberhard"],"span":[142,148],"reading":"§SIG:F§§SIG:T§ : προσκεφαλάδιον §SIG:Eberhard§","unit":741,"sigla":["Eberhard","F","T"],"query":false}],"label":"262; esclusiva di β","type":"joke","n":65,"num":"262","dawe":"262","text":"Εὐτράπελος ἀποδημήσας καὶ κηλίτης γενόμενος, ἐπανελθὼν ἠρωτᾶτο παρὰ τῆς γυναικός, τί ἤγαγεν. Ὁ δέ· «Σοὶ μέν, εἶπεν, οὐδέν, τοῖς δὲ μηροῖς σου προσκε- φαλάδιν».","wit":"FT"},{"type":"joke","app":[{"sigla":["Dawe","F","T"],"query":false,"span":[24,50],"unit":742,"reading":"§SIG:F§§SIG:T§ : ὡραίαν νεάνιδα ὑπαλείφοντα §SIG:Dawe§","editors":["Dawe"],"dirty":false,"id":"742","lemma":"νεάνιδα … ὡραίαν"}],"label":"151b; cf. α 151 bis","tr":"Uno spiritoso vide un medico che applicava un collirio a una bella ragazza e disse: «Occhio, a non rovinare la pupa, mentre curi la pupilla!».","A":"66","wit":"FT","text":"Εὐτράπελος, ἰδὼν ἰατρὸν νεάνιδα ὑπαλείφοντα ὡραίαν, ἔφη· «Μὴ τὴν ὄψιν θεραπεύων τὸ βάθος φθείρῃς».","n":66,"dawe":"151","num":"151"},{"wit":"FT","dawe":"263","num":"263","n":67,"text":"Εὐτράπελόν τις ἐλοιδόρει, ὅτι «Σοῦ τὴν γυναῖκα δωρεὰν ἔσχον». Ὁ δὲ εἶπεν· «Ἐμοὶ μὲν ἀνάγκη τοιούτου κακοῦ ἀντέχεσθαι· σοὶ δὲ τίς ἀνάγκη;»","type":"joke","A":"67","tr":"Un tale insultava uno spiritoso, dicendogli: «Ho avuto tua moglie gratis». E quello rispose: «Io sono costretto a sopportare un simile malanno; ma tu che bisogno ne avevi?».","label":"263; esclusiva di β","app":[{"id":"743","dirty":false,"lemma":"τοιούτου","sigla":["F","T","Thierfelder"],"query":false,"editors":["Thierfelder"],"span":[91,99],"unit":743,"reading":"§SIG:F§§SIG:T§ : τοσούτου §SIG:Thierfelder§"},{"lemma":"ἀντέχεσθαι","dirty":false,"id":"744","span":[106,116],"unit":744,"reading":"§SIG:F§§SIG:T§ : ἀνέχεσθαι §SIG:Eberhard§","editors":["Eberhard"],"sigla":["Eberhard","F","T"],"query":false},{"lemma":"σοὶ δὲ","dirty":false,"id":"745","reading":"§SIG:deRhoer§ σοῦ δὲ §SIG:F§§SIG:T§","unit":745,"span":[118,124],"editors":["deRhoer"],"query":false,"sigla":["F","T","deRhoer"]}]},{"A":"68","tr":"Uno spiritoso rubò un maiale e fuggiva. Ma quando stava per essere acciuffato, lo posò a terra e, percuotendolo, diceva: «Scava da un’altra parte, e non attorno alla mia roba!».","label":"146; cf. α 146","app":[{"dirty":false,"id":"746","lemma":"Ἐπεὶ","sigla":["F","T"],"query":false,"span":[34,38],"unit":746,"reading":"§SIG:T§ : Τ (cf. α) ὡς §SIG:F§","editors":[]},{"unit":747,"reading":"§SIG:F§§SIG:T§ : αὐτὸν χαμαί §SIG:Dawe§ ex α","span":[62,67],"editors":["Dawe"],"query":false,"sigla":["Dawe","F","T"],"lemma":"αὐτόν","dirty":false,"id":"747"},{"dirty":false,"id":"748","lemma":"τύπτων … Ἀλλαχοῦ","query":false,"sigla":["F","T"],"unit":748,"reading":"§SIG:F§(cf. α) : ἔτυπτε λέγων· «Ἄλλων §SIG:T§","span":[69,92],"editors":[]},{"sigla":["F","T","Thierfelder"],"query":false,"span":[93,98],"reading":"§SIG:Thierfelder§ : ὤρυγε §SIG:F§§SIG:T§","unit":749,"editors":["Thierfelder"],"dirty":false,"id":"749","lemma":"ὄρυγε"},{"lemma":"περὶ","dirty":false,"id":"750","reading":"(cf. α) om. §SIG:T§","unit":750,"span":[106,110],"editors":[],"query":false,"sigla":["T"]}],"type":"joke","num":"146","dawe":"146","n":68,"text":"Εὐτράπελος χοῖρον κλέψας ἔφευγεν. Ἐπεὶ δὲ κατελαμβάνετο, θεὶς αὐτόν, τύπτων ἔλεγεν· «Ἀλλαχοῦ ὄρυγε καὶ μὴ περὶ τὰ ἐμά».","wit":"FT"},{"label":"151; cf. α 151","app":[{"dirty":false,"id":"751","lemma":"πορνοβοσκὸν","query":false,"sigla":["F","T"],"unit":751,"reading":"§SIG:F§ : πορνοβωσκὸν §SIG:T§","span":[16,27],"editors":[]},{"lemma":"τὴν νύκτα","id":"752","dirty":false,"editors":[],"reading":"§SIG:T§(cf. α) : τὴν γυναῖκα §SIG:F§","unit":752,"span":[69,78],"query":false,"sigla":["F","T"]}],"A":"69","tr":"Uno spiritoso vide un lenone che dava a nolo una prostituta nera e disse: «A quanto affitti la notte?».","type":"joke","text":"Εὐτράπελος ἰδὼν πορνοβοσκὸν μισθοῦντα μέλαιναν ἑταιρίδα εἶπε· «Πόσου τὴν νύκτα μισθοῖς;»","num":"151","dawe":"151","n":69,"wit":"FT"},{"text":"Εὐτράπελος ἐπὶ ἡγεμόνος ἐδικάζετο. Τοῦ δὲ νυστάζοντος, ἐβόησεν· «Ἐκκαλοῦμαι». Ὁ δὲ ἔφη· «Ἐπὶ τίνα;» Κἀκεῖνος· «Ἐπὶ σὲ γρηγοροῦντα».","n":70,"dawe":"264","num":"264","wit":"FT","app":[{"query":false,"sigla":["F","T","deRhoer"],"editors":["deRhoer"],"unit":753,"reading":"§SIG:deRhoer§ ἐγκαλοῦμεν §SIG:F§§SIG:T§","span":[65,75],"id":"753","dirty":false,"lemma":"Ἐκκαλοῦμαι"},{"lemma":"Ἐπὶ2 … γρηγοροῦντα","dirty":false,"id":"754","span":[89,129],"reading":"§SIG:deRhoer§ ἐπὶ σοῦ γρηγοροῦντος §SIG:F§ : ἐπὶ σοί γρηγοροῦντι §SIG:T§","unit":754,"editors":["deRhoer"],"sigla":["F","T","deRhoer"],"query":false},{"dirty":false,"id":"755","lemma":"λιμοξήρων","query":false,"sigla":["T"],"reading":": λιμοξήρου §SIG:T§","unit":755,"span":null,"editors":[]}],"label":"264; esclusiva di β","tr":"Uno spiritoso era sotto processo davanti al governatore. E poiché questi sonnecchiava, gridò: «Mi appello!». E quello disse: «A chi?». E lui: «A te, da sveglio!».","A":"70","type":"joke"},{"dawe":"149","num":"149","n":71,"text":"Ὕβρεως ἐν βαλανείῳ γενομένης, εὐτράπελος ῥήτωρ κατηγόρει καὶ μάρτυρας ἐκάλει τοὺς περιχύτας. Τῶν δὲ ἀποβαλλομένων ὡς μὴ ὄντων ἀξιοπίστων, ἔφη· «Εἰ μὲν ἐν τῷ δουρείῳ ἵππῳ ὑβρίσθην, παρέσχον ἂν μάρτυρας τοὺς περὶ Μενέλαον καὶ Ὀδυσσέα καὶ Διομήδην· εἰ δὲ ἐν βαλανείῳ, ἀνάγκη τοὺς περιχύτας τὸ πραχθὲν μᾶλλον εἰδέναι».","wit":"FT","A":"71","tr":"Essendoci stato un oltraggio in un bagno, uno spiritoso retore accusava e chiamava a testimoni gli inservienti. E poiché venivano respinti come non attendibili, disse: «Se l’oltraggio l’avessi subìto nel cavallo di legno, avrei prodotto come testimoni Menelao, Odisseo e Diomede coi loro compagni; ma poiché è avvenuto in un bagno, per forza sono gli inservienti a sapere meglio l’accaduto».","label":"149; cf. α 149","app":[{"query":false,"sigla":["F","T"],"reading":"§SIG:T§ : εὐτράπελον §SIG:F§","unit":756,"span":[30,40],"editors":[],"dirty":false,"id":"756","lemma":"εὐτράπελος"},{"span":[93,113],"reading":"§SIG:T§ : τοῦ δέ, αὐτοὺς ἀποβαλλομένου §SIG:F§","unit":757,"editors":[],"sigla":["F","T"],"query":false,"lemma":"Τῶν … ἀποβαλλομένων","dirty":false,"id":"757"},{"id":"758","dirty":false,"lemma":"ἀξιοπίστων","query":false,"sigla":["T"],"editors":[],"unit":758,"reading":"ἀξιοπίστων om. §SIG:T§","span":[126,136]},{"reading":"§SIG:F§(cf. α) : δουρίῳ §SIG:T§","unit":759,"span":[157,164],"editors":[],"query":false,"sigla":["F","T"],"lemma":"δουρείῳ","dirty":false,"id":"759"},{"id":"760","dirty":false,"lemma":"ὑβρίσθην","query":false,"sigla":["F","T"],"editors":[],"unit":760,"reading":"§SIG:F§(cf. α) : ἦν §SIG:T§","span":[170,178]},{"query":false,"sigla":["T"],"unit":761,"reading":"(cf. α) om. §SIG:T§","span":[201,210],"editors":[],"dirty":false,"id":"761","lemma":"τοὺς περὶ"},{"sigla":["F","T"],"query":false,"span":[220,244],"reading":"§SIG:T§(cf. α) : καὶ Διομήδην καὶ Ὀδυσσέα §SIG:F§","unit":762,"editors":[],"dirty":false,"id":"762","lemma":"καὶ2 … Διομήδην"},{"dirty":false,"id":"763","lemma":"τὸ … μᾶλλον","sigla":["F","T"],"query":false,"span":[272,304],"unit":763,"reading":"§SIG:T§(cf. α) : μᾶλλον τὸ πραχθὲν §SIG:F§","editors":[]}],"type":"joke"},{"A":"72","tr":"Due spiritosi, mal sopportando l’un l’altro di dover uccidere i propri genitori, uno disse all’altro: «Se lo facciamo di nostra mano, rischiamo di essere considerati parricidi. Piuttosto tu ammazza il mio, e io il tuo: così sfuggiremo alla cattiva fama!».","label":"152; cf. α 152","app":[{"editors":["Thierfelder"],"span":[42,57],"reading":"§SIG:T§(cf. α) : ἐπὶ τῷ φονεῦσαι §SIG:F§ : ἐπὶ τῷ ζῆν §SIG:Thierfelder§","unit":764,"sigla":["F","T","Thierfelder"],"query":false,"lemma":"ἐπὶ … φονεῦσαι","id":"764","dirty":false},{"lemma":"πατραλοῖαι","id":"765","dirty":false,"editors":[],"unit":765,"reading":"§SIG:T§ : πατραλοῖαι μᾶλλον §SIG:F§","span":[137,147],"query":false,"sigla":["F","T"]},{"dirty":false,"id":"766","lemma":"λογισθῆναι μέλλομεν","sigla":["F","T"],"query":false,"span":[148,167],"unit":766,"reading":"§SIG:F§ : λογισθῆναι ἔχομεν §SIG:T§","editors":[]},{"editors":["Dawe","deRhoer"],"unit":767,"reading":"(olim §SIG:deRhoer§) ἐκφύγομεν §SIG:T§ : ἐκφεύγομεν §SIG:Dawe§.","span":[236,245],"query":false,"sigla":["Dawe","T","deRhoer"],"lemma":"ἐκφύγωμεν","id":"767","dirty":false},{"lemma":"μισογυναίων ἀνδρῶν","id":"768","dirty":false,"editors":[],"reading":": Περὶ μισογυναίου §SIG:F§","unit":768,"span":null,"query":false,"sigla":["F"]}],"type":"joke","num":"152","dawe":"152","n":72,"text":"Δύο εὐτραπέλων πρὸς ἀλλήλους δυσφορούντων ἐπὶ τὸ φονεῦσαι τοὺς ἑαυτῶν γονεῖς, ἔφη ὁ εἷς πρὸς τὸν ἕτερον· «Ἐὰν αὐτοχείρως τοῦτο πράξωμεν, πατραλοῖαι λογισθῆναι μέλλομεν. Ἀλλὰ σὺ μᾶλλον διαχείρισαι τὸν ἐμόν, κἀγὼ τὸν σόν· καὶ κακῆς φήμης ἐκφύγωμεν».","wit":"FT"}],"editors":["Boissonade","Braccini","Dawe","Eberhard","Thierfelder"],"witnesses":["F","T"],"stats":{"jokes":72,"queries":[],"dirty":[],"app_total":160,"sections":7,"app_linked":136}},"alpha":{"units":[{"type":"titulus","text":"Φιλόγελως ἐκ τῶν Ἱεροκλέους καὶ Φιλαγρίου γραμματικοῦ","app":[{"id":"2-8","dirty":false,"lemma":"Φιλόγελως … γραμματικοῦ","query":false,"sigla":["M"],"editors":[],"unit":0,"reading":"εκ του Φιλογέλους: περί Σχολαστικών §SIG:M§","span":[0,53]}]},{"text":"σχολαστικοί","app":[],"type":"section"},{"n":1,"num":"1","dawe":"1","text":"Σχολαστικὸς ἀργυροκόπῳ ἐπέταξε λύχνον ποιῆσαι. τοῦ δὲ ἐξετάσαντος, πηλίκον ποιήσει, ἀπεκρίνατο· Ὡς πρὸς ὀκτὼ ἀνθρώπους.","wit":"AM","tr":"Uno §I§scholastikos§/I§ commissionò ad un artigiano dell’argento di realizzare una lucerna. A quello che chiedeva quanto l’avrebbe dovuta fare grande, rispondeva: «tipo per otto persone».","A":"1","app":[{"id":"1","dirty":false,"lemma":"Φιλόγελως … γραμματικοῦ","sigla":["A","M"],"query":false,"editors":[],"span":null,"reading":"§SIG:A§ : εκ του Φιλογέλους: περί Σχολαστικών §SIG:M§","unit":1}],"label":"1; 1 β","type":"joke"},{"A":"2","tr":"Uno §I§scholastikos§/I§, tuffandosi, per poco non affogò: giurò che non sarebbe più entrato in acqua, se non avesse prima imparato bene a nuotare.","label":"2; 2 β","app":[{"reading":"§SIG:A§ : ἐπνίγει §SIG:M§","unit":2,"span":[33,39],"editors":[],"query":false,"sigla":["A","M"],"lemma":"ἐπνίγη","dirty":false,"id":"2"}],"type":"joke","dawe":"2","num":"2","n":2,"text":"Σχολαστικὸς κολυμβῶν παρὰ μικρὸν ἐπνίγη· ὤμοσε δὲ εἰς ὕδωρ μὴ εἰσελθεῖν, ἐὰν μὴ μάθῃ πρῶτον καλῶς κολυμβᾶν.","wit":"AM"},{"tr":"Un tale si recò da un medico §I§scholastikos§/I§ e disse «dottore, quando mi sveglio dal sonno sono annebbiato per mezz’ora, e poi mi riprendo» e il medico «svegliati mezz’ora dopo».","A":"3","app":[{"lemma":"ἰατρῷ","id":"3","dirty":false,"editors":[],"span":[15,20],"reading":"§SIG:M§ : ἰητρῷ §SIG:A§ cf. app. crit. 6, 7, 27","unit":3,"sigla":["A","M"],"query":false}],"label":"3; 183 α","type":"joke","n":3,"num":"3","dawe":"3","text":"Σχολαστικῷ τις ἰατρῷ προσελθὼν εἶπεν· Ἰατρέ, ὅταν ἀναστῶ ἐκ τοῦ ὕπνου, ἡμιώριον ἐσκότωμαι καὶ εἶθ’ οὕτως ἀποκαθίσταμαι. καὶ ὁ ἰατρός· Μετὰ τὸ ἡμιώριον ἐγείρου.","wit":"AM"},{"tr":"Uno §I§scholastikos§/I§ vendeva un cavallo, e un tale gli domandò se fosse di primo ricambio. Quando quello disse che era di secondo ricambio, fece: «Come lo sai?» e quello rispose «Perché una volta ha disarcionato me, e una volta ha fatto cadere mio padre».","A":"4","app":[{"span":[12,17],"unit":4,"reading":"§SIG:A§ : ἵππου §SIG:M§","editors":[],"sigla":["A","M"],"query":false,"lemma":"ἵππον","dirty":false,"id":"4"},{"lemma":"πρωτοβόλος","id":"5","dirty":false,"editors":["Boissonade"],"span":[47,57],"reading":"§SIG:Boissonade§ : πρωτόβολος §SIG:A§","unit":5,"sigla":["A","Boissonade"],"query":false}],"label":"4; 3 β; cf. 161 α","type":"joke","n":4,"dawe":"4","num":"4","text":"Σχολαστικοῦ ἵππον πιπράσκοντος ἠρώτησέ τις, εἰ πρωτοβόλος ἐστίν. τοῦ δὲ εἰπόντος δευτεροβόλον εἶναι, εἶπε· Πῶς οἶδας; ὁ δὲ ἀπεκρίνατο· Ὅτι ἅπαξ ἐμὲ ἔβαλε κάτω καὶ ἅπαξ τὸν πατέρα μου.","wit":"AM"},{"A":"5","tr":"Un tale si imbattè in uno §I§scholastikos §/I§e gli disse: «Signor§I§ scholastikos§/I§, ti ho visto in sogno!» e quello: «Per gli dèi! Siccome ero impegnato, non ci ho fatto caso».","label":"5; 4 β","app":[{"dirty":false,"id":"6","lemma":"Μὰ","query":false,"sigla":["A","M"],"reading":"§SIG:A§ : μα §SIG:M§","unit":6,"span":[76,78],"editors":[]},{"lemma":"προσέσχον","dirty":false,"id":"7","span":[109,118],"unit":7,"reading":"§SIG:A§ : προσέχων §SIG:M§","editors":[],"sigla":["A","M"],"query":false}],"type":"joke","dawe":"5","num":"5","n":5,"text":"Σχολαστικῷ τις ἀπαντήσας ἔφη· Κύριε σχολαστικέ, καθ’ ὕπνους σε εἶδον. ὁ δέ· Μὰ τοὺς θεούς, εἶπεν, ἀσχολῶν οὐ προσέσχον.","wit":"AM"},{"type":"joke","label":"6; 15 β","app":[{"lemma":"ἰατρὸν","dirty":false,"id":"8","unit":8,"reading":"§SIG:M§ : ἰητρὸν §SIG:A§ cf. app. crit. 3","span":[42,48],"editors":[],"query":false,"sigla":["A","M"]},{"id":"9","dirty":false,"lemma":"αὐτὸ","query":false,"sigla":["A","M","Minas"],"editors":["Minas"],"reading":"§SIG:A§§SIG:M§ : τοῦτο §SIG:Minas§","unit":9,"span":[113,117]}],"A":"6","tr":"Uno §I§scholastikos§/I§ vedendo arrivare il proprio medico di fiducia si preoccupava di non farsi vedere da quello. Un suo amico gli domandò perché facesse ciò, e rispose: «È molto tempo che non mi ammalo più, e mi vergogno con lui».","wit":"AM","text":"Σχολαστικὸς ἰδὼν τὸν κατὰ συνήθειαν αὐτοῦ ἰατρὸν ἐρχόμενον περιεστέλλετο αὐτῷ ὀφθῆναι. ἐπερωτηθεὶς δὲ παρά τινος αὐτοῦ ἑταίρου, διὰ τί αὐτὸ ποιεῖ, ἀπεκρίθη· Πολὺς χρόνος ἐστὶν ἀφ’ οὗ οὐκ ἐνόσησα, καὶ ἐντρέπομαι αὐτόν.","num":"6","dawe":"6","n":6},{"wit":"AM","n":7,"dawe":"7","num":"7","text":"Σχολαστικῷ τὴν σταφυλὴν τμηθέντι παρήγγειλεν ὁ ἰατρὸς μὴ λαλεῖν. ὁ δὲ τῷ δούλῳ αὐτοῦ ἐπέταξεν ἀντασπάζεσθαι ἀντ’ αὐτοῦ τοὺς προσαγορεύοντας. εἶτα αὐτὸς πρὸς ἕκαστον ἔλεγε· Μὴ πρὸς ὕβριν αὐτὸ δέξῃ, εἰ ὁ δοῦλός μου ἀντ’ ἐμοῦ ἀσπάζεταί σε· ἐκέλευσε γάρ με ὁ ἰατρὸς μὴ λαλεῖν.","type":"joke","tr":"Il medico ordinò ad uno §I§scholastikos§/I§ cui era stata amputata l’ugola, di non parlare. Questo allora diede disposizione al proprio servo di rispondere al suo posto a quelli che lo salutavano. Poi proprio lui diceva a ciascuno: «Non prenderlo come una mancanza di rispetto, se ti saluta il mio schiavo al posto mio: il dottore mi ha infatti comandato di non parlare».","A":"7","app":[{"editors":[],"unit":10,"reading":"§SIG:M§ : ἰητρὸς utroque loco §SIG:A§ cf. app. crit. 3","span":[47,53],"query":false,"sigla":["A","M"],"lemma":"ἰατρὸς","id":"10","dirty":false},{"lemma":"ἔταξεν","id":"11","dirty":false,"editors":[],"span":[87,93],"reading":"§SIG:A§ : ἔταξε §SIG:M§","unit":11,"sigla":["A","M"],"query":false},{"lemma":"ἢ","dirty":false,"id":"12","span":[173,174],"unit":12,"reading":"§SIG:A§ : εἰ μὴ §SIG:Minas§","editors":["Minas"],"sigla":["A","Minas"],"query":false},{"reading":": ἀνταυτοῦ §SIG:A§","unit":13,"span":[108,118],"editors":[],"query":false,"sigla":["A"],"lemma":"ἀντ αὐτοῦ","dirty":false,"id":"13"},{"lemma":"","id":"14","dirty":false,"editors":["Boissonade"],"reading":"§SIG:A§§SIG:M§ : ΣΙΔΩΝΙΟΙ §SIG:Boissonade§","unit":14,"span":null,"query":false,"sigla":["A","Boissonade","M"]}],"label":"7"},{"num":"8","dawe":"8","n":8,"text":"Σχολαστικ rd§, πατροκτόνον prop. §SIG:Thierfelder§","unit":25,"span":[17,27],"editors":["Eberhard","Thierfelder"],"query":false,"sigla":["Eberhard","Thierfelder"],"lemma":"πατραλοῖαι","dirty":false,"id":"25"},{"id":"26","dirty":false,"lemma":"ἀποπνίξει","query":false,"sigla":["A","M"],"editors":[],"unit":26,"reading":"§SIG:A§ : ἀποπνίξαι §SIG:M§","span":[118,127]}],"label":"13; cf. 158 α","tr":"Due §I§scholastikoi §/I§si lamentavano l’un l’altro del fatto che i loro padri fossero in vita. Quando uno dei due disse: «Vuoi dunque che ciascuno ammazzi il proprio padre?», l’altro rispose: «Non sia mai, ché non abbiamo la reputazione di parricidi! Ma se vuoi, ammazza tu il mio, e io il tuo».","A":"13"},{"type":"joke","tr":"Uno §I§scholastikos §/I§che comprava una casa, sportosi allora alla finestra chiedeva ai passanti se gli si addicesse.","A":"14","app":[],"label":"14; 12 β","wit":"A","n":14,"num":"14","dawe":"14","text":"Σχολαστικὸς οἰκίας πριάμενος, εἶτα διὰ τῆς θυρίδος παρακύψας ἠρώτα τοὺς παρερχομένους, εἰ πρέπει αὐτῷ."},{"text":"Σχολαστικὸς καθ’ ὕπνους ἧλον πεπατηκέναι δόξας τὸν πόδα περιέδησεν. ἑταῖρος δὲ αὐτοῦ πυθόμενος τὴν αἰτίαν καὶ γνούς· Δικαίως, ἔφη, μωροὶ καλούμεθα. διὰ τί γὰρ ἀνυπόδητος κοιμᾶσαι;","n":15,"num":"15","dawe":"15","wit":"AM","app":[{"editors":[],"unit":27,"reading":"§SIG:A§ : om. §SIG:M§","span":[12,23],"query":false,"sigla":["A","M"],"lemma":"καθ ὕπνους","id":"27","dirty":false},{"lemma":"δόξας τὸν","dirty":false,"id":"28","reading":": δόξας, τὸν §SIG:A§§SIG:M§","unit":28,"span":[41,50],"editors":[],"query":false,"sigla":["A","M"]},{"dirty":false,"id":"29","lemma":"κοιμᾶσαι","query":false,"sigla":["A","M"],"unit":29,"reading":"§SIG:A§ : κοιμᾶσε §SIG:M§","span":[170,178],"editors":[]},{"reading":": ἄκτον §SIG:A§ac","unit":30,"span":[60,66],"editors":[],"query":false,"sigla":["A"],"lemma":"ἔδησεν","dirty":false,"id":"30"},{"lemma":"τὴν … καταφιλῶν","dirty":false,"id":"31","span":[95,34530],"reading":"§SIG:A§ : τὴν γυναῖκα αὐτοῦ συνεχῶς §SIG:C§","unit":31,"editors":[],"sigla":["A","C"],"query":false}],"label":"15; 13 β","tr":"Uno §I§scholastikos§/I§, credendo di aver calpestato un chiodo in sogno, si fasciò il piede. Un suo amico, chiesta e saputane la ragione, disse: «Giustamente siamo chiamati scemi! Perché infatti dormi scalzo?!».","A":"15","type":"joke"},{"type":"joke","label":"16","app":[{"lemma":"ἀπολέσαντι","dirty":false,"id":"32","reading":": ἀπολέσαντα §SIG:A§ : ἀπωλέσαντα §SIG:M§","unit":32,"span":[225,235],"editors":[],"query":false,"sigla":["A","M"]},{"id":"33","dirty":false,"lemma":"πρόσσχες","query":false,"sigla":["A","M","Thierfelder"],"editors":["Thierfelder"],"unit":33,"reading":"§SIG:Thierfelder§ : πρόσχες §SIG:A§§SIG:M§","span":[322,330]}],"A":"16","tr":"Uno §I§scholastikos§/I§ che cercava un suo libro da molti giorni e non lo trovava, quando si era trovato a mangiare della lattuga, si voltò e vide il libro giacere in un angolo. Successivamente, incontrato un amico che si lamentava perché aveva perso la sua muta di vestiti, disse: «Non abbatterti, ma compra della lattuga, e mentre la mangi voltati e va’ nell’angolo, e la troverai».","wit":"AM","text":"Σχολαστικὸς βιβλίον αὐτοῦ ἐπιζητῶν ἐπὶ πολλὰς ἡμέρας καὶ μὴ εὑρίσκων, ὡς κατὰ τύχην μαρούλια ἤσθιεν, ἐπιστραφεὶς ἐπί τινος γωνίας εἶδε κείμενον τὸ βιβλίον. ὕστερον δὲ φίλῳ ἀπαντήσας ὀδυρομένῳ, ὡς τὴν στολὴν τῶν ἱματίων αὐτοῦ ἀπολέσαντι· Μὴ δυσφόρει, ἔφη, ἀλλὰ μαρούλια ἀγοράσας καὶ ἐσθίων αὐτὰ πρὸς τὴν γωνίαν ἐπιστραφεὶς πρόσσχες, καὶ εὑρήσεις αὐτά.","dawe":"16","num":"16","n":16},{"text":"Σχολαστικῷ ἑταῖρος ἀποδημῶν ἔγραψεν, ἵνα αὐτῷ βιβλία ἀγοράσῃ. ὁ δὲ ἀμελήσας, ἐπανελθόντι αὐτῷ ἀπαντήσας· Τὴν ἐπιστολήν, εἶπεν, ἣν περὶ τῶν βιβλίων ἀπέστειλας, οὐκ ἐδεξάμην.","num":"17","dawe":"17","n":17,"wit":"AM","label":"17; 36 β","app":[{"lemma":"ἀγοράσῃ","id":"34","dirty":false,"editors":[],"unit":34,"reading":"§SIG:A§ : ἀγοράσει §SIG:M§","span":[53,60],"query":false,"sigla":["A","M"]},{"sigla":["A","M"],"query":false,"editors":[],"span":[94,103],"unit":35,"rea ρος ἦν.","n":22,"dawe":"22","num":"22"},{"wit":"AM","text":"Σχολαστικὸς κατὰ πρώτην ἄνοιξιν τοῦ βαλανείου εἰσελθὼν καὶ μηδένα εὑρὼν ἔσω λέγει πρὸς τὸν δοῦλον αὐτοῦ· Ἐξ ὧν βλέπω, [μὴ] οὐ λούει τὸ βαλανεῖον.","n":23,"dawe":"23","num":"23","type":"joke","app":[{"editors":[],"unit":45,"reading":"§SIG:A§ : μὴδ’ ἕνα §SIG:M§","span":[59,65],"query":false,"sigla":["A","M"],"lemma":"μηδένα","id":"45","dirty":false},{"sigla":["Thierfelder"],"query":false,"editors":["Thierfelder"],"span":[119,121],"reading":"del. §SIG:Thierfelder§ coll. 135α, sed cf. K.G. I 224 n.7","unit":46,"id":"46","dirty":false,"lemma":"μὴ"},{"query":false,"sigla":["M"],"editors":[],"unit":47,"reading":"fort. delendum cf. 135α. Post βαλανεῖον notam interrogationis §SIG:M§","span":[132,144],"id":"47","dirty":false,"lemma":"τὸ βαλανεῖον"}],"label":"23; 135 α","tr":"Uno §I§scholastikos §/I§entra alla prima apertura delle terme e non trovando nessuno all’interno dice al proprio servo: «Da ciò che vedo, il bagno non lava».","A":"23"},{"wit":"AM","text":"Σχολαστικὸς μαχόμενος τῷ πατρὶ λέγει πρὸς αὐτόν· Κακὲ δοῦλε, οὐχ ὁρᾷς, οἶά με ἐζημίωσας; εἰ γὰρ σὺ μὴ ἐγεννήθης, ἐγὼ ἂν τὸν πάππον μου ἐκληρονόμησα.","n":24,"dawe":"24","num":"24","type":"joke","app":[{"sigla":["A","M"],"query":false,"span":[71,74],"reading":"§SIG:A§ : οἵα §SIG:M§","unit":48,"editors":[],"dirty":false,"id":"48","lemma":"οἶά"},{"lemma":"ἐγεννήθης","dirty":false,"id":"49","unit":49,"reading":"§SIG:A§ : ἐγενήθης §SIG:M§ac","span":[102,111],"editors":[],"query":false,"sigla":["A","M"]}],"label":"24 [cf. 4 γ?]","tr":"Uno §I§scholastikos §/I§litigando col padre gli dice: «Brutto schiavo, non vedi come mi hai rovinato? Se tu non fossi nato, io erditerei la fortuna di mio nonno!».","A":"24"},{"app":[{"editors":[],"unit":50,"reading":"§SIG:A§ : ἱκετῶν §SIG:M§","span":[56,63],"query":false,"sigla":["A","M"],"lemma":"οἰκετῶν","id":"50","dirty":false},{"lemma":"ὑμᾶς","id":"51","dirty":false,"editors":["Boissonade"],"reading":"§SIG:Boissonade§ : ἡμᾶς §SIG:A
