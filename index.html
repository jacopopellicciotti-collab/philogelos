ών τις σωφρόνως μειδιάσει.","type":"titulus"},{"app":[],"type":"section","text":"Περὶ σχολαστικῶν"},{"type":"joke","tr":"Uno §I§scholastikos§/I§ commissionò ad un artigiano dell’argento di realizzare una lucerna. A quello che chiedeva di che grandezza, disse: «Per otto persone».","text":"Σχολαστικὸς ἀργυροκόπῳ ἐπέταξε λύχνον ποιῆσαι. Tοῦ δὲ ἐρωτήσαντος πηλίκου μεγέθους, εἶπεν αὐτῷ· «Πρὸς ὀκτὼ ἀνθρώπους».","num":"1","app":[{"lemma":"Ἐκ … μειδιάσει","editors":[],"unit":611,"id":"611","dirty":false,"span":null,"query":false,"sigla":["F","T"],"reading":"Braccini : Ἐκ τοῦ Ἱεροκλέους συντάγματος Φιλόγελως ὧπερ ἐντυχὼν σωφρώνως μειδιάσῃς §SIG:F§ : om. §SIG:T§"},{"editors":[],"lemma":"πηλίκου","id":"612","unit":612,"query":false,"span":[66,73],"dirty":false,"reading":": πηκίλου §SIG:F§","sigla":["F"]}],"label":"1; cf. α 1","dawe":"1","A":"1","n":1,"wit":"F"},{"num":"2","text":"Σχολαστικὸς κολυμβᾶν βουλόμενος παρὰ μικρὸν ἐπνίγη· ὤμοσεν οὖν μὴ ἅψασθαι ὕδατος, ἐὰν μὴ πρῶτον μάθῃ κολυμβᾶν.","tr":"Uno §I§scholastikos§/I§, volendo nuotare, per poco non affogò; giurò allora di non toccare più l’acqua, se non avesse prima imparato a nuotare.","type":"joke","label":"2; cf. α 2","app":[{"unit":613,"id":"613","editors":[],"lemma":"ἐπνίγη","reading":"§SIG:F§ : ἐπνίγει §SIG:T§","sigla":["F","T"],"query":false,"span":[44,50],"dirty":false},{"sigla":["F","Koraes","T"],"reading":"§SIG:F§§SIG:T§ : ἅψεσθαι §SIG:Koraes§","dirty":false,"span":[66,73],"query":false,"unit":614,"id":"614","lemma":"ἅψασθαι","editors":["Koraes"]},{"reading":"§SIG:T§(cf. α) : πρότερον §SIG:F§","sigla":["F","T"],"query":false,"span":[89,95],"dirty":false,"unit":615,"id":"615","editors":[],"lemma":"πρῶτον"}],"wit":"FT","A":"2","n":2,"dawe":"2"},{"A":"3","n":3,"dawe":"4","wit":"FT","label":"4; cf. α 4","app":[{"editors":[],"lemma":"εἶπεν","unit":616,"id":"616","query":false,"dirty":false,"span":[124,129],"reading":"§SIG:T§(cf. α) : ἔφη §SIG:F§","sigla":["F","T"]},{"editors":[],"lemma":"ἐδούλευσεν","unit":617,"id":"617","query":false,"span":[141,151],"dirty":false,"reading":"§SIG:F§§SIG:T§ : ἐβόλευσεν editio princeps","sigla":["F","T"]},{"id":"618","unit":618,"editors":[],"lemma":"ἐμὲ … μου","reading":"§SIG:T§ καὶ ἐμὲ καὶ τὸν πατέρα μου §SIG:F§","sigla":["F","T"],"query":false,"dirty":false,"span":[152,174]}],"text":"Σχολαστικοῦ ἵππον πιπράσκοντος ἠρώτησέ τις, εἰ πρωτοβόλος ἐστίν. Tοῦ δὲ φήσαντος δευτεροβόλον εἶναι, ἔφη· «Πῶς οἶδας;» Ὁ δὲ εἶπεν· «Ὅτι ἅπαξ ἐδούλευσεν ἐμὲ καὶ τὸν πατέρα μου».","type":"joke","tr":"Uno §I§scholastikos§/I§ vendeva un cavallo, e un tale gli domandò se fosse di primo dente. Quando quello disse che era di secondo dente, fece: «Come lo sai?». E quello rispose: «Perché una volta ha disarcionato me e mio padre».","num":"4"},{"app":[{"sigla":["F","T"],"reading":"§SIG:T§ : φίλῳ §SIG:F§","dirty":false,"span":[12,17],"query":false,"id":"619","unit":619,"lemma":"φίλον","editors":[]},{"query":false,"span":[51,55],"dirty":false,"reading":"§SIG:F§ : εἶδον §SIG:T§a.c","sigla":["F","T"],"editors":[],"lemma":"ἰδών","unit":620,"id":"620"}],"label":"5; cf. α 5","wit":"FT","dawe":"5","n":4,"A":"4","num":"5","tr":"Uno §I§scholastikos§/I§ incontrò un amico e disse: «Ti ho visto in sogno e ti ho salutato». E quello: «Scusami, ché non ci ho fatto caso».","type":"joke","text":"Σχολαστικὸς φίλον συναντήσας εἶπε· «Καθ’ ὕπνους σε ἰδών, προσηγόρευσα». Ὁ δέ· «Σύγγνωθί μοι, ὅτι οὐ προσέσχον»."},{"app":[{"editors":[],"lemma":"ἐξήει","unit":621,"id":"621","query":false,"span":[103,108],"dirty":false,"reading":"§SIG:F§(cf. G) : ἐξήλεγχεν §SIG:T§","sigla":["F","T"]}],"label":"34; cf. α 34","wit":"FT","dawe":"34","A":"5","n":5,"num":"34","tr":"Uno §I§scholastikos§/I§ visitava un malato e gli faceva domande sulla salute. Ma quello non era in grado di rispondere. Allora si adirò e se ne usciva dicendo: «Spero di ammalarmi anch’io, e di non risponderti quando verrai a trovarmi».","type":"joke","text":"Σχολαστικὸς νοσοῦντα ἐπισκεπτόμενος ἠρώτα περὶ τῆς ὑγείας. Ὁ δὲ οὐκ ἠδύνατο ἀποκριθῆναι. Ὀργισθεὶς οὖν ἐξήει λέγων· «Ἐλπίζω κἀγὼ νοσῆσαι καὶ ἐλθόντι σοι μὴ ἀποκριθῆναι»."},{"app":[],"label":"37; cf. α 37","wit":"FT","dawe":"37","n":6,"A":"6","num":"37","type":"joke","tr":"Uno §I§scholastikos§/I§ vendeva un cavallo. Poiché era giunto un tale e ne esaminava la dentatura, disse: «Perché ne osservi i denti? Magari camminasse quanto mangia!».","text":"Σχολαστικὸς ἵππον ἐπίπρασκεν. Ἐλθόντος δέ τινος καὶ μανθάνοντος τὸν βόλον, εἶπε· «Τί τοὺς ὀδόντας αὐτοῦ τηρεῖς; Eἴθε ὡς τρώγει, καὶ περιεπάτει»."},{"text":"Σχολαστικὸς ἰατρῷ συναντήσας· «Συγχώρησόν μοι, εἶπε, καὶ μή μοι μέμψῃ, ὅτι οὐκ ἐνόσησα».","tr":"Uno §I§scholastikos§/I§ incontrò un medico e gli disse: «Perdonami, e non volermene, se non mi sono ammalato».","type":"joke","num":"253","label":"253; esclusiva di β","app":[{"reading":"§SIG:T§ : ἐνόησα §SIG:F§","sigla":["F","T"],"query":false,"dirty":false,"span":[79,86],"unit":622,"id":"622","editors":[],"lemma":"ἐνόσησα"}],"A":"7","n":7,"dawe":"253","wit":"FT"},{"text":"Σχολαστικὸς μῦν θέλων πιάσαι συνεχῶς τὰ βιβλία αὐτοῦ τρώγοντα, κρέας δακών, ἐν σκοτίᾳ ἐκάθισεν.","tr":"Uno §I§scholastikos§/I§, volendo prendere un topo che gli rosicchiava di continuo i libri, addentò della carne e si sedette al buio.","type":"joke","num":"8","label":"8; cf. α 8","app":[],"A":"8","n":8,"dawe":"8","wit":"FT"},{"num":"9","text":"Σχολαστικὸς θέλων τὸν ἵππον αὐτοῦ διδάξαι μὴ τρώγειν πολλά, οὐ παρέβαλεν αὐτῷ τροφάς. Ἀποθανόντος δὲ τοῦ ἵππου τῷ λιμῷ, ἔλεγε· «Μεγάλως ἐζημιώθην· ὅτε γὰρ καλῶς ἔμαθε μὴ τρώγειν, τότε ἀπέθανεν».","type":"joke","tr":"Uno §I§scholastikos§/I§, volendo insegnare al proprio cavallo a non mangiare troppo, non gli diede da mangiare. E quando il cavallo morì di fame, diceva: «Che grave perdita! Proprio quando aveva imparato bene a non mangiare, allora è morto».","label":"9; cf. α 9","app":[{"lemma":"παρέβαλεν","editors":[],"unit":623,"id":"623","dirty":false,"span":[63,72],"query":false,"sigla":["F","T"],"reading":"§SIG:F§ : παρέβαλλεν §SIG:T§p.c."},{"sigla":["F","T"],"reading":"§SIG:T§(cf. α) : ἐζημίωμαι §SIG:F§","span":[136,145],"dirty":false,"query":false,"unit":624,"id":"624","lemma":"ἐζημιώθην","editors":[]}],"wit":"FT","A":"9","n":9,"dawe":"9"},{"num":"41","text":"Σχολαστικὸς οἰκίαν πωλῶν, λίθον ἀπ’ αὐτῆς εἰς δεῖγμα περιέφερεν.","type":"joke","tr":"Uno §I§scholastikos§/I§ che vendeva una casa ne portava in giro una pietra a mo’ di dimostrazione.","wit":"FT","A":"10","n":10,"dawe":"41","label":"41; cf. α 41","app":[]},{"text":"Σχολαστικὸς θέλων ἰδεῖν, εἰ πρέπει αὐτῷ κοιμᾶσθαι, καμμύσας ἐσωπτρίζετο.","tr":"Uno §I§scholastikos§/I§, volendo vedere se gli stesse bene dormire, chiuse gli occhi e si guardò allo specchio.","type":"joke","num":"11","label":"11; cf. α 11","app":[{"query":false,"dirty":false,"span":[51,59],"reading":"(olim §SIG:Needham§) καμύσας §SIG:T§","sigla":["Needham","T"],"editors":["Needham"],"lemma":"καμμύσας","unit":625,"id":"625"},{"reading":"§SIG:Braccini§ : ἐσοπτρίζετο §SIG:F§§SIG:T§","sigla":["Braccini","F","T"],"query":false,"span":[60,71],"dirty":false,"unit":626,"id":"626","editors":["Braccini"],"lemma":"ἐσωπτρίζετο"}],"n":11,"A":"11","dawe":"11","wit":"FT"},{"dawe":"14","n":12,"A":"12","wit":"FT","app":[],"label":"14; cf. α 14","type":"joke","tr":"Uno §I§scholastikos§/I§ comprò una casa, si affacciò alla finestra e chiedeva ai passanti se gli si addicesse.","text":"Σχολαστικὸς οἰκίαν πριάμενος, καὶ διὰ τῆς θυρίδος προκύψας, ἠρώτα τοὺς παριόντας εἰ πρέπει αὐτῷ ἡ οἰκία.","num":"14"},{"num":"15","text":"Σχολαστικὸς κατ’ ὄναρ ἰδὼν ἧλον πεπατηκέναι καὶ δόξας ἀλγεῖν, τὸν πόδα περιεδήσατο. Ἕτερος δὲ μαθὼν τὴν αἰτίαν, ἔφη· «Διὰ τί γὰρ ἀνυπόδητος κοιμᾶσαι;»","tr":"Uno §I§scholastikos§/I§ vide in sogno di aver calpestato un chiodo, credette di provare dolore e si fasciò il piede. Un altro ne apprese la ragione e disse: «E perché dormi scalzo?».","type":"joke","wit":"FT","n":13,"A":"13","dawe":"15","label":"15; cf. α 15","app":[{"editors":[],"lemma":"ἀλγεῖν … περιεδήσατο","unit":627,"id":"627","query":false,"span":[54,82],"dirty":false,"reading":"§SIG:T§(cf. α) : ἀλγεῖν τὸν πόδα, περιεδήσατο §SIG:F§","sigla":["F","T"]}]},{"wit":"FT","dawe":"45","n":14,"A":"14","app":[{"lemma":"μάμμῃ","editors":[],"id":"628","unit":628,"span":[30,35],"dirty":false,"query":false,"sigla":["F","T"],"reading":"§SIG:F§ : μάμῃ §SIG:T§"}],"label":"45; cf. α 45","num":"45","type":"joke","tr":"Uno §I§scholastikos§/I§ di notte saltò addosso a sua nonna. Prese le botte dal padre per questo motivo e disse: «Tu è tanto tempo che monti mia madre, e non ti sei buscato nulla da me; e ora ti arrabbi per avermi sorpreso una volta sola con tua madre?».","text":"Σχολαστικὸς νυκτὶ ἐπανέστη τῇ μάμμῃ αὐτοῦ. Πληγὰς δὲ διὰ τοῦτο ὑπὸ τοῦ πατρὸς λαβών, εἶπε· «Σὺ τοσοῦτον χρόνον τὴν μητέρα μου ὀχεύεις, μηδὲν ὑπ’ ἐμοῦ παθών, καὶ σὺ ὀργίζῃ ἐπὶ τῇ μητρί σου ἅπαξ με εὑρών;»"},{"tr":"Uno §I§scholastikos§/I§ incontrò un medico e si nascose dietro un muro. E poiché qualcuno gli chiedeva la ragione, disse: «È da un pezzo che non mi ammalo, e mi vergogno di venire al cospetto del medico».","type":"joke","text":"Σχολαστικὸς ἰατρὸν συναντήσας ὑπὸ τοῖχον ἐκρύβη. Τινὸς δὲ πυθομένου τὴν αἰτίαν, ἔφη· «Καιρὸν ἔχω μὴ ἀσθενήσας, καὶ αἰσχύνομαι εἰς ὄψιν ἐλθεῖν τοῦ ἰατροῦ».","num":"6","app":[{"query":false,"span":[12,18],"dirty":false,"reading":"§SIG:T§ : ἰατρῷ §SIG:F§","sigla":["F","T"],"editors":[],"lemma":"ἰατρὸν","id":"629","unit":629},{"lemma":"Τινὸς","editors":[],"id":"630","unit":630,"dirty":false,"span":[49,54],"query":false,"sigla":["F","T"],"reading":"§SIG:T§ : τινὶ §SIG:F§"},{"reading":"§SIG:T§(cf. α) : ὁ σχολαστικὸς ἔφη §SIG:F§","sigla":["F","T"],"query":false,"dirty":false,"span":[80,83],"unit":631,"id":"631","editors":[],"lemma":"ἔφη"},{"dirty":false,"span":[142,152],"query":false,"sigla":["F","T"],"reading":"§SIG:T§ : τῷ ἰατρῷ §SIG:F§","lemma":"τοῦ ἰατροῦ","editors":[],"id":"632","unit":632}],"label":"6; cf. α 6","dawe":"6","n":15,"A":"15","wit":"FT"},{"text":"Σχολαστικῷ πραγματευτὴς εἶπεν ὅτι «Ὁ ποταμὸς ἔλαβε τὸν ἀγρόν σου». Kἀκεῖνος ἔφη· «Καὶ τί λέγω;»","type":"joke","tr":"A uno §I§scholastikos§/I§ un agente d’affari disse che il fiume gli aveva preso il campo. E quello rispose: «E io che dico?».","num":"46","label":"46; cf. α 46","app":[{"editors":[],"lemma":"Ὁ ποταμὸς","unit":633,"id":"633","query":false,"dirty":false,"span":[35,44],"reading":"§SIG:F§(cf. α) : ποταμὸς §SIG:T§","sigla":["F","T"]},{"lemma":"λέγω","editors":["Dawe"],"id":"634","unit":634,"dirty":false,"span":[89,93],"query":false,"sigla":["Dawe","F","T"],"reading":"§SIG:F§§SIG:T§ : λέγει coniecerit §SIG:Dawe§ : λέγων coniecerim"}],"n":16,"A":"16","dawe":"46","wit":"FT"},{"text":"Σχολαστικὸς Ἀμιναίαν ἔχων ἐσφράγισεν. Tοῦ δὲ δούλου κάτωθεν τρήσαντος καὶ τὸν οἶνον αἴροντος ἐθαύμαζεν, ὅτι τῶν σημάντρων σώων ὄντων ὁ οἶνος ἐλαττοῦται. Ἕτερος εἶπεν· «Ὅρα, μὴ κάτωθεν ἀφῃρέθη». Ὁ δέ· «Ἀμαθέστατε, εἶπεν, οὐ τὸ κάτωθεν λείπει, ἀλλὰ τὸ ἄνωθεν μέρος».","tr":"Uno §I§scholastikos§/I§, avendo un’anfora di vino Aminèo, la sigillò. Ma poiché lo schiavo, forandola di sotto, ne sottraeva il vino, si stupiva che, pur restando intatti i sigilli, il vino calasse. Un tale gli disse: «Bada che non te l’abbiano portato via di sotto». E lui: «Ignorantissimo, disse, non manca la parte di sotto, ma quella di sopra».","type":"joke","num":"254","n":17,"A":"17","dawe":"254","wit":"FT","label":"254; esclusiva di β","app":[{"id":"635","unit":635,"lemma":"ἐσφράγισεν","editors":[],"sigla":["F","T"],"reading":"§SIG:F§ : ἐσφράγισεν αὐτήν §SIG:T§","dirty":false,"span":[26,36],"query":false},{"editors":[],"lemma":"Ἕτερος εἶπεν","id":"636","unit":636,"query":false,"dirty":false,"span":[153,165],"reading":"§SIG:T§ : ἑτέρου δὲ εἰπόντος §SIG:F§","sigla":["F","T"]},{"query":false,"span":[220,262],"dirty":false,"reading":": οὐ τὸ κάτωθεν λείπει, ἀλλὰ τὸ ἄνωθεν μέρος §SIG:T§οὐ τὸ κάτωθεν μέρος, ἀλλὰ τὸ ἄνωθεν λείπει §SIG:F§","sigla":["F","T"],"editors":[],"lemma":"οὐ … μέρος","unit":637,"id":"637"}]},{"type":"joke","tr":"Uno §I§scholastikos§/I§ era in città, vide la luna e chiedeva al padre se anche le altre città avessero una luna così.","text":"Σχολαστικὸς ἐν τῇ πόλει ὤν, καὶ τὴν σελήνην ἰδών, ἐπυνθάνετο τοῦ πατρός, εἰ καὶ αἱ λοιπαὶ πόλεις ἔχουσι τοιαύτην σελήνην.","num":"49","app":[{"reading":"§SIG:T§ : Σχολαστικὸς ὑπὸ δένδρον λάθρα ἐλθὼν καὶ ὑφαπλώσας §SIG:F§","sigla":["F","T"],"query":false,"dirty":false,"span":[0,189],"unit":638,"id":"638","editors":[],"lemma":"Σχολαστικὸς … ὑφαπλώσας"}],"label":"49; cf. α 49","dawe":"49","A":"18","n":18,"wit":"FT"},{"type":"joke","tr":"Uno §I§scholastikos§/I§ vide dei passeri su un albero, si avvicinò di nascosto, distese la piega dell’abito e scuoteva l’albero per raccogliere i passeri.","text":"Σχολαστικὸς ἰδὼν στρουθοὺς ἐπὶ δένδρου, λάθρα ὑπεισελθών, ὑφαπλώσας τὸν κόλπον ἔσειε τὸ δένδρον ὡς ὑποδεξόμενος τὰ στρουθία.","num":"19","dawe":"19","n":19,"A":"19","wit":"FT","app":[{"unit":639,"id":"639","lemma":"ὑπεισελθών","editors":["Thierfelder"],"sigla":["F","T","Thierfelder"],"reading":"§SIG:F§§SIG:T§ : ὑπελθών dub. §SIG:Thierfelder§","span":[46,56],"dirty":false,"query":false},{"id":"640","unit":640,"editors":[],"lemma":"ὑποδεξόμενος","reading":"§SIG:T§(cf. α) : ὑποδεξάμενος §SIG:F§","sigla":["F","T"],"query":false,"dirty":false,"span":[99,111]}],"label":"19; cf. α 19"},{"num":"51","text":"Σχολαστικὸς ἐν τῷ ἰδίῳ ἀγρῷ ἐξιὼν ἠρώτα πιεῖν ὕδωρ εἰ καλὸν ἐν τῷ αὐτόθι φρέατι. Tῶν δὲ φησάντων ὅτι «Καλόν· καὶ γὰρ καὶ οἱ γονεῖς σου ἐξ αὐτοῦ ἔπινον», «Καὶ πηλίκους, ἔφη, εἶχον τραχήλους, ὅτι εἰς τοσοῦτον βάθος πίνειν ἐδύναντο;»","type":"joke","tr":"Uno §I§scholastikos§/I§, uscendo nel proprio campo, chiedeva se l’acqua del pozzo che si trovava lì fosse buona da bere. E poiché quelli dicevano: «È buona, e infatti anche i tuoi genitori bevevano da lì», disse: «E di che taglia avevano i colli, da poter bere a una profondità tanto grande?».","wit":"FT","n":20,"A":"20","dawe":"51","label":"51; cf. α 50","app":[{"unit":641,"id":"641","editors":[],"lemma":"πιεῖν … καλὸν","reading":"§SIG:T§(cf. α) : εἰ πιεῖν ὕδωρ καλὸν §SIG:F§","sigla":["F","T"],"query":false,"span":[40,59],"dirty":false},{"editors":["Dawe"],"lemma":"καλὸν","unit":642,"id":"642","query":false,"dirty":false,"span":[102,107],"reading":"§SIG:F§§SIG:T§ : καλὸν ‹ἦν› §SIG:Dawe§","sigla":["Dawe","F","T"]},{"id":"643","unit":643,"editors":[],"lemma":"ἔπινον … εἶχον","reading":"§SIG:T§(cf. α) : ἔπινον, φησὶ· Καὶ πηκίλους εἶχον §SIG:F§","sigla":["F","T"],"query":false,"span":[144,178],"dirty":false}]},{"num":"52","tr":"Uno §I§scholastikos§/I§ cadde in una cisterna e gridava di continuo cercando aiuto. E poiché nessuno gli dava ascolto, disse: «Sono un fesso, se non risalgo e li frusto tutti, perché almeno così corrano a portarmi una scala!».","type":"joke","text":"Σχολαστικὸς εἰς λάκκον ἐμπεσὼν συνεχῶς ἔκραζε βοήθειαν ζητῶν. Ὡς δὲ οὐδεὶς ὑπήκουεν, ἔφη· «Μωρός εἰμι, ἐὰν μὴ ἀνελθὼν πάντας τύψω, ἵνα κἂν οὕτως δραμόντες κλίμακά μοι κομίσωσιν».","app":[{"id":"644","unit":644,"editors":[],"lemma":"λάκκον","reading":"§SIG:F§ : λάκον §SIG:T§","sigla":["F","T"],"query":false,"dirty":false,"span":[16,22]},{"span":[31,60],"dirty":false,"query":false,"sigla":["F","T"],"reading":"§SIG:T§(cf. α) : συνεχῶς κράζων βοήθειαν ἐζήτει §SIG:F§","lemma":"συνεχῶς … ζητῶν","editors":[],"id":"645","unit":645},{"id":"646","unit":646,"editors":[],"lemma":"ὑπήκουεν","reading":"et α ὑπήκουσεν §SIG:F§ : ἐπήκουεν §SIG:T§","sigla":["F","T"],"query":false,"dirty":false,"span":[75,83]},{"id":"647","unit":647,"lemma":"ἐὰν","editors":[],"sigla":["F","T"],"reading":"§SIG:T§(cf. α) : εἰ §SIG:F§","span":[103,106],"dirty":false,"query":false}],"label":"52; cf. α 52","wit":"FT","dawe":"52","A":"21","n":21},{"wit":"FT","dawe":"22","A":"22","n":22,"app":[],"label":"22; cf. α 22","num":"22","type":"joke","tr":"Uno §I§scholastikos§/I§ incontrò un altro §I§scholastikos§/I§ e disse: «Ho saputo che sei morto». E quello: «Ma mi vedi vivo!». E lo §I§scholastikos§/I§: «Eppure chi me l’ha detto è molto più degno di fede di te».","text":"Σχολαστικὸς σχολαστικῷ συναντήσας, εἶπεν· «Ἔμαθον, ὅτι ἀπέθανες». Kἀκεῖνος· «Ἀλλ’ ὁρᾷς με, ἔφη, ζῶντα». Kαὶ ὁ σχολαστικός· «Καὶ μὴν ὁ εἰπών μοι πολλῷ σοῦ ἀξιοπιστότερος ὑπάρχει»."},{"type":"joke","tr":"Uno §I§scholastikos§/I§, un pelato e un barbiere, viaggiando insieme, si accordarono per fare la guardia a turno di quattro ore. Toccò dunque per primo al barbiere. E questi, per passare il tempo, rase lo §I§scholastikos§/I§ mentre dormiva e, passate le ore, lo svegliò. Ma quello, grattandosi la testa al risveglio, se la trovò liscia e disse: «Gran canaglia di un barbiere! Per sbaglio, invece di me, ha svegliato il pelato!».","text":"Σχολαστικὸς καὶ φαλακρὸς καὶ κουρεὺς συνοδεύοντες συνέθεντο πρὸς τέσσαρας ὥρας βιγλεῦσαι. Ἔλαχεν οὖν πρῶτον τῷ κουρεῖ. Ὁ δὲ μετεωριζόμενος τὸν σχολαστικὸν κοιμώμενον ἐξύρισε καὶ τῶν ὡρῶν πληρωθεισῶν διύπνισεν. Ὁ δέ, κνηθόμενος ἀπὸ ὕπνου τὴν κεφαλήν, καὶ εὑρὼν αὐτὴν ψιλήν, ἔφη· «Μέγα κάθαρμα ὁ κουρεύς· πλανηθεὶς γὰρ ἀντὶ ἐμοῦ τὸν φαλακρὸν διύπνισεν».","num":"56","dawe":"56","A":"23","n":23,"wit":"FT","app":[{"lemma":"βιγλεῦσαι","editors":[],"id":"648","unit":648,"span":[79,88],"dirty":false,"query":false,"sigla":["F","T"],"reading":"§SIG:T§ : βιγλίσαι §SIG:F§"},{"editors":[],"lemma":"πληρωθεισῶν","id":"649","unit":649,"query":false,"dirty":false,"span":[187,198],"reading":"§SIG:T§(cf. α) : παρελθουσῶν §SIG:F§","sigla":["F","T"]},{"dirty":false,"span":[216,226],"query":false,"sigla":["F","T"],"reading":"§SIG:F§ : κνιθόμενος §SIG:T§","lemma":"κνηθόμενος","editors":[],"unit":650,"id":"650"},{"lemma":"ψιλήν","editors":[],"unit":651,"id":"651","dirty":false,"span":[266,271],"query":false,"sigla":["F","T"],"reading":"§SIG:T§(cf. α) : ἐψιλωμένην §SIG:F§"},{"query":false,"dirty":false,"span":[331,339],"reading":"§SIG:T§ : φαρακλὸν §SIG:F§","sigla":["F","T"],"editors":[],"lemma":"φαλακρὸν","id":"652","unit":652}],"label":"56; cf. α 56"},{"A":"24","n":24,"dawe":"255","wit":"FT","label":"255; esclusiva di β","app":[],"text":"Σχολαστικὸς μαθών, ὅτι ὁ κόραξ ὑπὲρ τὰ διακόσια ἔτη ζῇ, ἀγοράσας κόρακα, εἰς ἀπόπειραν ἔτρεφεν.","type":"joke","tr":"Uno §I§scholastikos§/I§ apprese che il corvo vive più di duecento anni, ne comprò uno e lo allevava per farne la prova.","num":"255"},{"num":"64","type":"joke","tr":"Uno §I§scholastikos§/I§ comprò delle brache; e poiché erano strette, vi applicava la pasta depilatoria.","text":"Σχολαστικὸς βράκας ὠνήσατο· στενῶν οὖν οὐσῶν, ἐδρωπάκιζεν αὐτάς.","app":[],"label":"64; cf. α 64","wit":"F","dawe":"64","A":"25","n":25},{"num":"256","text":"Σχολαστικὸς εἰς χειμῶνα ναυαγῶν, καὶ τῶν συμπλεόντων ἑκάστου περιπλεκομένου σκεῦος πρὸς τὸ σωθῆναι, μίαν ἐκεῖνος τῶν ἀγκυρῶν περιεπλέξατο.","type":"joke","tr":"Uno §I§scholastikos§/I§, naufragando durante una tempesta, mentre ciascuno dei compagni di viaggio si avvinghiava a un qualche oggetto per mettersi in salvo, lui si abbracciò a una delle àncore.","label":"256; esclusiva di β","app":[{"unit":653,"id":"653","lemma":"εἰς χειμῶνα","editors":[],"sigla":["F","T"],"reading":"§SIG:T§ : ἐν χειμῶνι §SIG:F§","span":[12,23],"dirty":false,"query":false},{"lemma":"περιπλεκομένου","editors":[],"unit":654,"id":"654","span":[61,75],"dirty":false,"query":false,"sigla":["F","T"],"reading":"§SIG:F§ : περιπλεκομένων §SIG:T§"},{"sigla":["F","T"],"reading":"editio princeps σκεύους §SIG:F§§SIG:T§","span":[76,82],"dirty":false,"query":false,"id":"655","unit":655,"lemma":"σκεῦος","editors":[]},{"reading":"§SIG:F§ : ἐκεῖνος μίαν τῶν ἀγκυρῶν §SIG:T§","sigla":["F","T"],"query":false,"dirty":false,"span":[100,124],"id":"656","unit":656,"editors":[],"lemma":"μίαν … ἀγκυρῶν"}],"wit":"FT","n":26,"A":"26","dawe":"256"},{"tr":"Uno §I§scholastikos§/I§ seppellì il figlio, incontrò il suo maestro e disse: «È venuto il ragazzo?». E quello dice: «No». E lo §I§scholastikos§/I§: «E allora, professore, è morto».","type":"joke","text":"Σχολαστικὸς υἱὸν θάψας καὶ συναντήσας τῷ διδασκάλῳ αὐτοῦ, εἶπε· «Προῆλθεν ὁ παῖς;» Ὁ δέ φησιν· «Οὔ». Kαὶ ὁ σχολαστικός· «Λοιπὸν οὖν, καθηγητά, τέθνηκεν».","num":"257","dawe":"257","A":"27","n":27,"wit":"FT","app":[{"editors":[],"lemma":"αὐτοῦ","unit":657,"id":"657","query":false,"span":[51,56],"dirty":false,"reading":"§SIG:F§ : om. §SIG:T§","sigla":["F","T"]},{"editors":[],"lemma":"υἱὸν","unit":658,"id":"658","query":false,"dirty":false,"span":[12,16],"reading":"§SIG:T§ : τὸν υἱὸν §SIG:F§","sigla":["F","T"]},{"editors":[],"lemma":"εἶπε","unit":659,"id":"659","query":false,"span":[58,62],"dirty":false,"reading":"(εἶπεν scrib.) ἔφη §SIG:F§","sigla":["F"]},{"span":[65,73],"dirty":false,"query":false,"sigla":["Boissonade","F","T"],"reading":"§SIG:F§§SIG:T§ : Προσῆλθεν §SIG:Boissonade§","lemma":"Προῆλθεν","editors":["Boissonade"],"id":"660","unit":660},{"dirty":false,"span":[74,98],"query":false,"sigla":["F","T"],"reading":"§SIG:T§ : ὁ δέ, οὔ φησιν §SIG:F§","lemma":"Ὁ … Οὔ","editors":[],"unit":661,"id":"661"}],"label":"257; cf. α 77"},{"dawe":"29","A":"28","n":28,"wit":"FT","app":[],"label":"29; cf. α 29","type":"joke","tr":"Di due fratelli gemelli, uno morì. Uno §I§scholastikos§/I§ dunque incontrò quello vivo e gli chiedeva: «Sei morto tu, o tuo fratello?».","text":"Διδύμων ἀδελφῶν εἷς ἐτελεύτησεν. Σχολαστικὸς οὖν ἀπαντήσας τῷ ζῶντι, ἠρώτα· «Σὺ ἀπέθανες ἢ ὁ ἀδελφός σου;»","num":"29"},{"num":"30","text":"Σχολαστικὸς ναυαγεῖν μέλλων πινακίδας ᾔτει, ἵνα διαθήκας γράψῃ. Tοὺς δὲ οἰκέτας ὁρῶν ἀλγοῦντας διὰ τὸν κίνδυνον, ἔφη· «Μὴ λυπεῖσθε· ἐλευθερῶ γὰρ ὑμᾶς».","type":"joke","tr":"Uno §I§scholastikos§/I§, in procinto di naufragare, chiedeva delle tavolette per scrivere il testamento. E vedendo i servi che si addoloravano per il pericolo, disse: «Non affliggetevi: vi rendo liberi!».","label":"30; cf. α 29","app":[],"wit":"FT","A":"29","n":29,"dawe":"30"},{"wit":"FT","dawe":"31","A":"30","n":30,"app":[{"lemma":"ἀνῆλθεν","editors":[],"unit":662,"id":"662","span":[39,46],"dirty":false,"query":false,"sigla":["F","T"],"reading":"§SIG:T§(cf. α) : εἰσῆλθεν §SIG:F§"},{"id":"663","unit":663,"lemma":"καβαλλάριος","editors":[],"sigla":["F","T"],"reading":"§SIG:F§ : ἔφιππος §SIG:T§","span":[61,72],"dirty":false,"query":false}],"label":"31; cf. α 31","num":"31","tr":"Uno §I§scholastikos§/I§, volendo attraversare un fiume, salì sull’imbarcazione a cavallo. E poiché qualcuno gli chiese perché non scendesse, rispose che aveva fretta.","type":"joke","text":"Σχολαστικὸς ποταμὸν βουλόμενος περᾶσαι ἀνῆλθεν εἰς τὸ πλοῖον καβαλλάριος. Πυθομένου δέ τινος· «Διὰ τί οὐ κατέβης;» ἔφη σπουδάζειν."},{"num":"55","tr":"Uno §I§scholastikos§/I§ ignorante, a corto di denaro, vendeva i propri libri e, scrivendo al padre, diceva: «Congratulati con noi, padre, ché ormai i libri ci sfamano!».","type":"joke","text":"Σχολαστικὸς ἀμαθής, ἀπορῶν δαπανημάτων, τὰ βιβλία αὐτοῦ ἐπίπρασκε καὶ γράφων πρὸς τὸν πατέρα ἔλεγε· «Σύγχαιρε ἡμῖν, πάτερ, ἤδη γὰρ ἡμᾶς τὰ βιβλία τρέφει».","app":[],"label":"55; cf. α 55","wit":"FT","dawe":"55","n":31,"A":"31"},{"app":[{"query":false,"dirty":false,"span":[12,23],"reading":"§SIG:F§ : παιδοτρίβεις §SIG:T§a.c","sigla":["F","T"],"editors":[],"lemma":"παιδοτρίβης","id":"664","unit":664}],"label":"258; esclusiva di β","dawe":"258","n":32,"A":"32","wit":"FT","tr":"Uno §I§scholastikos§/I§ maestro di ginnastica sentì dire di un allievo che era malato, il giorno seguente che aveva la febbre, e più tardi seppe dal padre che era morto, e disse: «Con tutte queste scuse non lasciate imparare i ragazzi».","type":"joke","text":"Σχολαστικὸς παιδοτρίβης περὶ μαθητοῦ ἀκούσας ὅτι νοσεῖ, τῇ δὲ ἑξῆς ὅτι πυρέττει, ὕστερον δὲ παρὰ τοῦ πατρὸς ἀκούσας ὅτι ἀπέθανεν, ἔφη· «Οὕτω προφασιζόμενοι οὐκ ἐᾶτε τοὺς παῖδας μανθάνειν».","num":"258"},{"label":"40; cf. α 40","app":[{"query":false,"span":[35,38],"dirty":false,"reading":"§SIG:T§ : δὲ §SIG:F§","sigla":["F","T"],"editors":[],"lemma":"οὖν","id":"665","unit":665},{"span":[94,99],"dirty":false,"query":false,"sigla":["F","T"],"reading":"§SIG:T§(cf. α) : πλῆθος §SIG:F§","lemma":"ὄχλον","editors":[],"id":"666","unit":666}],"A":"33","n":33,"dawe":"40","wit":"FT","text":"Σχολαστικοῦ παιδίον ἀπέθανεν. Ἰδὼν οὖν πλῆθος λαοῦ συνελθόν, ἔλεγεν· «Αἰσχύνομαι εἰς τοσοῦτον ὄχλον μικρὸν παιδίον προφέρειν».","type":"joke","tr":"A uno §I§scholastikos§/I§ morì il bambino. Vide radunata una gran folla di gente e diceva: «Mi vergogno di portare un bimbo così piccolo in una folla tanto grande».","num":"40"},{"wit":"FT","n":34,"A":"34","dawe":"259","label":"259; esclusiva di β","app":[{"lemma":"αὐτὸ ἀπήρχετο","editors":[],"id":"667","unit":667,"dirty":false,"span":[37,50],"query":false,"sigla":["F","T"],"reading":"§SIG:T§ : αὐτὸς ἀπῆγεν §SIG:F§"},{"query":false,"span":[59,70],"dirty":false,"reading":"§SIG:T§ : ἑαυτοῦ οἶκον §SIG:F§","sigla":["F","T"],"editors":[],"lemma":"οἶκον αὐτοῦ","unit":668,"id":"668"},{"lemma":"γένωμαι","editors":[],"unit":669,"id":"669","span":[139,146],"dirty":false,"query":false,"sigla":["F","T"],"reading":"§SIG:F§ : γένομαι §SIG:T§"}],"num":"259","text":"Σχολαστικὸς ἀγοράσας κρέας, βαστάζων αὐτὸ ἀπήρχετο εἰς τὸν οἶκον αὐτοῦ. Λούπης δὲ ῥήξας ἥρπασεν αὐτὸ ἐκ τῆς χειρὸς αὐτοῦ. Ὁ δὲ ἔφη· «Ὡς σὺ γένωμαι, ἂν μὴ κἀγὼ ποιήσω αὐτὸ ἄλλῳ».","type":"joke","tr":"Uno §I§scholastikos§/I§ comprò della carne e la portava a casa sua reggendola in mano. Ma un lupo balzò fuori e gliela strappò di mano. E lui disse: «Possa diventare come te, se anch’io non farò lo stesso a un altro!»."},{"num":"65","text":"Σχολαστικοῦ υἱός, ὑπὸ τοῦ πατρὸς εἰς πόλεμον ἐκπεμπόμενος, ὑπέσχετο ἑνὸς τῶν ἐχθρῶν κεφαλὴν ἀγαγεῖν. Ὁ δὲ ἔφη· «Εὔχομαι καὶ χωρὶς κεφαλῆς σε ἐλθόντα, μόνον ὑγιαίνοντα ἰδεῖν καὶ εὐφρανθῆναι».","type":"joke","tr":"Il figlio di uno §I§scholastikos§/I§, mandato in guerra dal padre, promise che avrebbe riportato la testa di un nemico. E quello disse: «Mi auguro di vederti tornare anche senza testa, purché sano e salvo, e di rallegrarmene!».","label":"65; cf. α 65","app":[{"dirty":false,"span":[18,57],"query":false,"sigla":["F","T"],"reading":"§SIG:T§(cf. α) : ἐκπεμπόμενος ὑπὸ τοῦ πατρὸς εἰς πόλεμον §SIG:F§","lemma":"ὑπὸ … ἐκπεμπόμενος","editors":[],"id":"670","unit":670},{"dirty":false,"span":[156,166],"query":false,"sigla":["F","T"],"reading":": ὑγιαίνοντα §SIG:F§ὑγειᾶ ὄντα §SIG:T§","lemma":"ὑγιαίνοντα","editors":[],"unit":671,"id":"671"}],"wit":"FT","A":"35","n":35,"dawe":"65"},{"wit":"FT","n":36,"A":"36","dawe":"17","label":"17; cf. α 17","app":[{"dirty":false,"span":[107,116],"query":false,"sigla":["F","T"],"reading":"§SIG:T§ : συνοψίσθη §SIG:F§","lemma":"συνωψίσθη","editors":[],"unit":672,"id":"672"},{"reading":"§SIG:F§ : ἀπέστειλάς μοι §SIG:T§","sigla":["F","T"],"query":false,"span":[160,170],"dirty":false,"id":"673","unit":673,"editors":[],"lemma":"ἀπέστειλας"},{"unit":674,"id":"674","editors":[],"lemma":"ὁ1 … αὐτῶν","reading":"§SIG:F§(cf. α) : αὐτῶν ὁ εἷς §SIG:T§","sigla":["F","T"],"query":false,"dirty":false,"span":[172,234]}],"num":"17","text":"Σχολαστικῷ φίλος ἔγραψεν εἰς Ἑλλάδα ὄντι, βιβλία αὐτῷ ἀγοράσαι. Tοῦ δὲ ἀμελήσαντος, ὡς μετὰ χρόνον τῷ φίλῳ συνωψίσθη, εἶπε· «Τὴν ἐπιστολήν, ἣν περὶ τῶν βιβλίων ἀπέστειλας, οὐκ ἐκομισάμην».","type":"joke","tr":"A uno §I§scholastikos§/I§ che si trovava in Grecia un amico scrisse di comprargli dei libri. Ma quello non se ne curò e, quando dopo un po’ si incontrò con l’amico, disse: «La lettera che mi avevi mandato a proposito dei libri non l’ho ricevuta»."},{"label":"39; cf. α 39","app":[{"lemma":"μέλαιναν ὄρνιν","editors":[],"id":"675","unit":675,"dirty":false,"span":[46,60],"query":false,"sigla":["F","T"],"reading":"§SIG:F§(cf. α) : μέλαινα ὄρνιν §SIG:T§"},{"span":[83,99],"dirty":false,"query":false,"sigla":["F","T"],"reading":"§SIG:T§(cf. α) : ὁ ἀλέκτωρ ταύτης §SIG:F§","lemma":"ταύτης … ἀλέκτωρ","editors":[],"unit":676,"id":"676"}],"wit":"FT","n":37,"A":"37","dawe":"39","num":"39","text":"Σχολαστικοὶ δύο ἐβάδιζον. Ἰδὼν δὲ ὁ εἷς αὐτῶν μέλαιναν ὄρνιν, εἶπεν· «Ἀδελφέ, ἴσως ταύτης ὁ ἀλέκτωρ ἀπέθανε, καὶ διὰ τοῦτο μέλαινα ἐνεδύσατο».","tr":"Due §I§scholastikoi§/I§ camminavano. E uno dei due vide una gallina nera e disse: «Fratello, forse le è morto il gallo, e per questo si è vestita di nero!».","type":"joke"},{"app":[{"dirty":false,"span":[281,290],"query":false,"sigla":["F","T"],"reading":"§SIG:T§(cf. α) : τὸ κοιμᾶσθαι §SIG:F§","lemma":"κοιμᾶσθαι","editors":[],"id":"677","unit":677},{"lemma":"σταφυλὰς","editors":[],"id":"678","unit":678,"span":[77,85],"dirty":false,"query":false,"sigla":["F","T"],"reading":"§SIG:F§(cf. α) : τὰς σταφυλὰς §SIG:T§"},{"editors":[],"lemma":"νυκτὶ","id":"679","unit":679,"query":false,"dirty":false,"span":[190,195],"reading":"§SIG:F§ : τῇ νυκτὶ §SIG:T§","sigla":["F","T"]},{"reading":"§SIG:F§(cf. α) : ἔτρεχε §SIG:T§","sigla":["F","T"],"query":false,"span":[272,279],"dirty":false,"id":"680","unit":680,"editors":[],"lemma":"ἔρρεγχε"},{"dirty":false,"span":[291,305],"query":false,"sigla":["F","T"],"reading":"§SIG:T§(cf. α) : ποιούμενος §SIG:F§","lemma":"προσποιούμενος","editors":[],"unit":681,"id":"681"}],"label":"44; cf. α 44","dawe":"44","n":38,"A":"38","wit":"FT","type":"joke","tr":"Uno §I§scholastikos§/I§ che dormiva col padre, alzandosi di notte dal letto, mangiava dei grappoli d’uva appesi in alto. E poiché il padre, contrariato, aveva nascosto una lucerna sotto una pentola e, quando quello di notte si alzò come al solito, mostrò all’improvviso la luce, lui, rimasto in piedi a occhi chiusi, russava fingendo di dormire.","text":"Σχολαστικὸς μετὰ τοῦ πατρὸς κοιμώμενος, τῇ νυκτὶ ἀπὸ τῆς κλίνης ἀνιστάμενος, σταφυλὰς ἔτρωγεν ἐπάνω κρεμαμένας. Tοῦ δὲ πατρὸς σκανδαλισθέντος καὶ ὑπὸ χύτραν λαμπάδα κρύψαντος, ἐν τῷ ἐκεῖνον νυκτὶ ἀναστῆναι πρὸς τὸ ἔθος, ὁ πατὴρ ἄφνω τὸ φῶς ἔδειξεν. Kἀκεῖνος ἑστὼς καμμύων ἔρρεγχε, κοιμᾶσθαι προσποιούμενος.","num":"44"},{"label":"227; cf. α 227","app":[{"reading":"§SIG:F§ : καπελίῳ §SIG:T§","sigla":["F","T"],"query":false,"dirty":false,"span":[14,22],"unit":682,"id":"682","editors":[],"lemma":"καπηλείῳ"},{"unit":683,"id":"683","lemma":"μέλανα","editors":[],"sigla":["F","T"],"reading":"§SIG:F§ : μέλαινα §SIG:T§","span":[105,111],"dirty":false,"query":false},{"id":"684","unit":684,"lemma":"κέρνα","editors":[],"sigla":["F","T"],"reading":"§SIG:T§ : κίρνα §SIG:F§","dirty":false,"span":[122,127],"query":false}],"n":39,"A":"39","dawe":"227","wit":"FT","text":"Σχολαστικῷ ἐν καπηλείῳ πίνοντι ἐπιστάς τις εἶπεν· «Ἡ γυνή σου ἀπέθανεν». Ὁ δὲ ἔφη· «Οὐκοῦν, πραγματευτά, μέλανα οἶνόν μοι κέρνα».","tr":"Mentre uno §I§scholastikos§/I§ beveva in un’osteria, un tale gli si avvicinò e disse: «Tua moglie è morta». E quello rispose: «E allora, oste, versami del vino nero!».","type":"joke","num":"227"},{"type":"section","text":"Περὶ δυσκόλων","app":[]},{"num":"184","text":"Δυσκόλῳ ἰατρῷ λέγει τις· «Τί ἐστιν, ὅτι αἷμα χέζω καὶ χολάς;» Kἀκεῖνος ἔφη· «Ἐὰν καὶ τὰ ἔντερά σου χέσῃς, ἐγὼ οὐ χολῶ».","tr":"Un tale dice a un medico burbero: «Come mai evacuo sangue e bile?». E quello rispose: «Anche se cachi via le tue budella, io non mi prendo bile!».","type":"joke","label":"184; cf. α 184","app":[],"wit":"FT","A":"40","n":40,"dawe":"184"},{"num":"187","type":"joke","tr":"Un astrologo burbero fece l’oroscopo di un bambino malaticcio, garantì che sarebbe vissuto a lungo e ne chiedeva il compenso. E poiché la madre disse: «Te lo darò domani», ribatté: «E che, se muore stanotte, perdo il mio compenso?».","text":"Δύσκολος ἀστρονόμος παιδὸς νοσεροῦ γένησιν εἰπών, πολυχρόνιον ἔσεσθαι ἐπαγγειλάμενος, ᾔτει τὸν μισθόν. Tῆς δὲ μητρὸς εἰπούσης· «Αὔριον δώσω» — «Τί οὖν, ἔφη, ἐὰν τῇ νυκτὶ ἀποθάνῃ, ἐγὼ τὸν μισθὸν ἀπολέσω;»","app":[{"dirty":false,"span":[35,42],"query":false,"sigla":["F","T"],"reading":"§SIG:F§(cf. α) : γέννησιν §SIG:T§","lemma":"γένησιν","editors":[],"unit":685,"id":"685"}],"label":"187; cf. α 187","wit":"FT","dawe":"187","A":"41","n":41},{"type":"joke","tr":"Un burbero comprò un orcio di miele e si sentiva chiedere di continuo quanto l’avesse pagato. E allora, capovolgendo l’orcio, disse: «Così mi si versi il sangue, se ve lo dico!».","text":"Δύσκολος κεράμιον μέλιτος ἀγοράσας συνεχῶς ἠρωτᾶτο, πόσου ἠγόρασεν. Kαταστρέφων οὖν τὸ κεράμιον ἔφη· «Οὕτω χυθήτω μου τὸ αἷμα, ἐὰν εἴπω ὑμῖν».","num":"188","app":[{"editors":[],"lemma":"κεράμιον μέλιτος","id":"686","unit":686,"query":false,"dirty":false,"span":[9,25],"reading":"§SIG:F§(cf. α) : μέλιτος κεράμιον §SIG:T§","sigla":["F","T"]},{"unit":687,"id":"687","lemma":"Οὕτω","editors":[],"sigla":["F","T"],"reading":"§SIG:F§(cf. α) : Οὕτως §SIG:T§","span":[102,106],"dirty":false,"query":false}],"label":"188; cf. α 188","dawe":"188","A":"42","n":42,"wit":"FT"},{"text":"Δυσκόλου ταυλίζοντος κατεπήδησε τις. Ὁ δὲ θυμωθεὶς ἠρώτησεν, εἰ τέχνην οἶδε καὶ διὰ τί ἀργεῖ. Τοῦ δὲ φήσαντος· «Ῥάπτειν οἶδα, ἔργον δὲ οὐκ ἔχω», διαρρήξας τὸ ἱμάτιον αὐτοῦ εἶπε· «Λάβε καὶ ἐργάζου καὶ σιώπα».","tr":"Mentre un burbero giocava a dadi, un tale gli saltò addosso. E quello si irritò e gli chiese se conoscesse un mestiere e perché stesse in ozio. Quando il tale rispose: «So cucire, ma non ho lavoro», stracciò il proprio mantello e disse: «Prendi, lavora e taci!».","type":"joke","num":"190","n":43,"A":"43","dawe":"190","wit":"FT","label":"190; cf. α 190","app":[{"sigla":["F","T"],"reading":"§SIG:F§ : Τοῦ δὲ φήσαντος· καὶ διὰ τί ἀργεῖ §SIG:T§a.c","dirty":false,"span":[94,119],"query":false,"id":"688","unit":688,"lemma":"Τοῦ … Ῥάπτειν","editors":[]}]},{"text":"Δυσκόλῳ τις ἐφώνει· ὁ δὲ ἀπεκρίνατο· «Οὐκ εἰμὶ ἔσω». Tοῦ δὲ εἰπόντος ὅτι «Ψεύδῃ· τῆς φωνῆς σου γὰρ ἀκούω», ἔφη· «Ὦ κάθαρμα, εἰ μὲν ὁ παῖς μου εἶπεν, ἐπείσθης ἄν· ἐγὼ δέ σοι οὐ φαίνομαι ἀξιοπιστότερος εἶναι;»","type":"joke","tr":"Un tale chiamava un burbero, e quello rispose: «Non sono in casa». E quando il primo disse: «Menti, perché sento la tua voce!», ribatté: «Canaglia, se te l’avesse detto il mio servo, gli avresti creduto; e io non ti sembro più degno di fede di lui?».","num":"193","n":44,"A":"44","dawe":"193","wit":"FT","label":"193; cf. α 193","app":[{"unit":689,"id":"689","editors":[],"lemma":"ἔσω","reading":"§SIG:F§(cf. α) : ἐγὼ §SIG:T§","sigla":["F","T"],"query":false,"dirty":false,"span":[47,50]},{"unit":690,"id":"690","editors":[],"lemma":"Ψεύδῃ","reading":"§SIG:F§(cf. α) : ψεῦδος §SIG:T§","sigla":["F","T"],"query":false,"dirty":false,"span":[74,79]},{"editors":[],"lemma":"Ὦ κάθαρμα","id":"691","unit":691,"query":false,"span":[113,122],"dirty":false,"reading":"§SIG:T§ : Τ (cf. α) κάθαρμα §SIG:F§","sigla":["F","T"]},{"dirty":false,"span":[169,184],"query":false,"sigla":["F","T"],"reading":"§SIG:F§(cf. α) : οὐ φαίνομαί σοι §SIG:T§","lemma":"σοι … φαίνομαι","editors":[],"unit":692,"id":"692"}]},{"n":45,"A":"45","dawe":"191","wit":"FT","label":"191; cf. α 191","app":[],"text":"Δύσκολόν τις ἠρώτα· «Ποῦ μένεις;» Ὁ δὲ ἔφη· «Kἀκεῖθεν μεταβαίνω».","type":"joke","tr":"Un tale chiese a un burbero: «Dove abiti?». E quello disse: «Mi sto traslocando proprio da lì!».","num":"191"},{"label":"194; cf. α 194","app":[{"lemma":"σκάλας","editors":[],"id":"693","unit":693,"span":[13,19],"dirty":false,"query":false,"sigla":["F","T"],"reading":"§SIG:T§(cf. α) : κλίμακος §SIG:F§"},{"unit":694,"id":"694","editors":[],"lemma":"αὐθέντου","reading":"§SIG:T§ : δεσπότου §SIG:F§","sigla":["F","T"],"query":false,"dirty":false,"span":[46,54]},{"id":"695","unit":695,"editors":["Dawe"],"lemma":"Ἐγὼ","reading":"§SIG:F§§SIG:T§ : Ἐγὼ ‹ἔσω› §SIG:Dawe§","sigla":["Dawe","F","T"],"query":false,"dirty":false,"span":[90,93]},{"lemma":"","editors":[],"id":"696","unit":696,"span":null,"dirty":false,"query":false,"sigla":["F"],"reading":"om. §SIG:F§"}],"wit":"FT","n":46,"A":"46","dawe":"194","num":"194","text":"Δύσκολος ἀπὸ σκάλας καταβαίνων ἔπεσεν. Tοῦ δὲ αὐθέντου εἰπόντος· «Ἐκεῖ τίς ἔπεσεν;» Ἔφη· «Ἐγὼ τοῦ ἐνοικίου μου. Τί πρὸς σέ;»","tr":"Un burbero, mentre scendeva una scala, cadde. E poiché il padrone di casa disse: «Chi è caduto, là?», rispose: «Io, a prezzo del mio affitto! E a te che importa?».","type":"joke"},{"n":47,"A":"47","dawe":"185","wit":"T","label":"185; cf. α 185","app":[],"text":"Δύσκολος ἰατρὸς ἑτερόφθαλμος ἀρρώστῳ ἔφη· «Πῶς ἔχεις;» Ὁ δέ· «Ὡς βλέπεις». Εἶπε δέ· «Ἐάν ‹...›».","tr":"Un medico burbero, cieco da un occhio, disse a un malato: «Come stai?». E quello: «Come vedi». E il medico disse: «Se ‹…›».","type":"joke","num":"185"},{"app":[],"text":"Περὶ φιλαργύρων","type":"section"},{"app":[{"editors":[],"lemma":"διαθήκας","id":"697","unit":697,"query":false,"span":[11,19],"dirty":false,"reading":"§SIG:F§(cf. α) : διαθήκην §SIG:T§","sigla":["F","T"]}],"label":"104; cf. α 104","dawe":"104","n":48,"A":"48","wit":"FT","tr":"Un avaro, redigendo il testamento, nominò erede sé stesso.","type":"joke","text":"Φιλάργυρος διαθήκας γράφων, ἑαυτὸν κληρονόμον ἔταξεν.","num":"104"},{"num":"105","tr":"A un avaro fu chiesto perché non mangiasse nient’altro che olive, e disse: «Perché l’esterno mi faccia da companatico, il nocciolo da legna; e perché, dopo aver mangiato, invece di lavarmi le mani me le strofini sulla testa e resti unto».","type":"joke","text":"Φιλάργυρος ἐρωτηθείς· «Διὰ τί οὐδὲν ἄλλο ἐσθίεις εἰ μὴ ἐλαίας;» Eἶπεν· «Ἵνα τὸ μὲν ἔξωθεν ὄψον ἔχω, τὸ δὲ ὀστοῦν ἀντὶ ξύλου· καὶ ἵνα φαγών, μὴ ἀπονίψωμαι, ἀλλὰ τὴν κεφαλήν μου ἐκμαξάμενος, ἠλειμμένος ὦ».","wit":"FT","dawe":"105","A":"49","n":49,"app":[{"query":false,"span":[155,159],"dirty":false,"reading":"§SIG:F§§SIG:T§ : ἀλλὰ ‹εἰς› §SIG:Thierfelder§","sigla":["F","T","Thierfelder"],"editors":["Thierfelder"],"lemma":"ἀλλὰ","unit":698,"id":"698"},{"reading":"§SIG:T§(cf. α) : κεφαλὴν §SIG:F§","sigla":["F","T"],"query":false,"dirty":false,"span":[164,175],"unit":699,"id":"699","editors":[],"lemma":"κεφαλήν μου"},{"reading":"§SIG:F§ : ἄλλα §SIG:T§","sigla":["F","T"],"query":false,"span":[189,201],"dirty":false,"id":"700","unit":700,"editors":[],"lemma":"ἠλειμμένος ὦ"},{"span":null,"dirty":false,"query":false,"sigla":["T"],"reading":"(cf. α) λιμοξήρου §SIG:T§","lemma":"","editors":[],"unit":701,"id":"701"}],"label":"105; cf. α 105"},{"text":"Περὶ λιμοξήρων","type":"section","app":[{"lemma":"λιμοξήρων","editors":[],"id":"1427","unit":53,"dirty":false,"span":[5,14],"query":false,"sigla":["T"],"reading":"(cf. α) λιμοξήρου §SIG:T§"}]},{"num":"261","text":"Λιμόξηρος ὕπαρχος τὸ βῆμα αὐτοῦ ἐκέλευσε πρὸς ἀρτοκοπεῖον γενέσθαι.","tr":"Un prefetto morto di fame ordinò che il suo tribunale fosse collocato accanto a un panificio.","type":"joke","wit":"FT","n":50,"A":"50","dawe":"261","label":"261; esclusiva di β","app":[]},{"app":[{"sigla":["F","T","Thierfelder"],"reading":"§SIG:Thierfelder§ (cf. α) ἐπαγγέλλεις §SIG:F§ : ἀπαγγέλεις §SIG:T§","span":[81,92],"dirty":false,"query":false,"unit":702,"id":"702","lemma":"ἀπαγγέλλεις","editors":["Thierfelder"]},{"unit":703,"id":"703","editors":["Eberhard"],"lemma":"ἀναβαίνων","reading":"(iam §SIG:Eberhard§) ἀναβαίνω §SIG:T§","sigla":["Eberhard","T"],"query":false,"dirty":false,"span":[96,105]}],"label":"220; cf. α 228","wit":"FT","dawe":"220","A":"51","n":51,"num":"220","type":"joke","tr":"Un precettore morto di fame vide un pane appeso in alto e disse: «Scendi a ripetere la lezione, o devo salire io a sistemarti?».","text":"Λιμόξηρος παιδαγωγός, ἰδὼν ἄρτον ἔν τινι ὕψει κρεμάμενον, εἶπε· «Καταβαίνεις καὶ ἀπαγγέλλεις, ἢ ἀναβαίνων ἀπαρτίζω σε;»"},{"tr":"Un medico morto di fame vide un pane attraverso un buco e vi applicava un impiastro estrattivo.","type":"joke","text":"Λιμόξηρος ἰατρός, ἰδὼν ἄρτον διά τινος τρύπης, ἐκσυρτικὸν ἔμπλαστρον ἐτίθει.","num":"221","app":[{"unit":704,"id":"704","lemma":"Λιμόξηρος","editors":[],"sigla":["F","T"],"reading":"§SIG:T§ : Τ (cf. α) λιμόξηρος σχολαστικὸς §SIG:F§","dirty":false,"span":[0,9],"query":false}],"label":"221; cf. α 221","dawe":"221","n":52,"A":"52","wit":"FT"},{"text":"Λιμόξηρος, ἰδὼν ἄρτον ἐν ὑπερθύρῳ κείμενον, ἔφη· «Κύριε, ἢ ἐκεῖνον ταπείνωσον, ἢ ἐμὲ ὕψωσον».","type":"joke","tr":"Un morto di fame vide un pane posato su un architrave e disse: «Signore, o abbassi quello, o innalzi me!».","num":"223","n":53,"A":"53","dawe":"223","wit":"FT","label":"223; cf. α 223","app":[{"lemma":"ὑπερθύρῳ","editors":["Thierfelder"],"unit":705,"id":"705","span":[25,33],"dirty":false,"query":false,"sigla":["F","T","Thierfelder"],"reading":"§SIG:Thierfelder§ (cf. α) ὑπαίθρῳ §SIG:F§ : γράφεται ἐν ὑπερώῳ §SIG:F§i.m. : ὑπέρθρῳ §SIG:T§"},{"id":"706","unit":706,"lemma":"ὕψωσον","editors":[],"sigla":["F","T"],"reading":"§SIG:F§(cf. α) : ἐξάλειψον §SIG:T§","span":[85,91],"dirty":false,"query":false}]},{"text":"Περὶ ὀκνηρῶν","type":"section","app":[]},{"text":"Ὀκνηρῶν δύο κοιμωμένων, εἰσελθών τις κλέπτης τὸ σαγίον αὐτῶν ἔλαβεν. Tοῦ δὲ ἑνὸς νοήσαντος καὶ εἰπόντος πρὸς τὸν ἕτερον· «Ἀνάστα, δίωξον αὐτόν», ἔφη· «Ἄφες· ὅταν ἔλθῃ λαβεῖν τὴν τύλην, κρατοῦμεν αὐτὸν οἱ δύο».","tr":"Mentre due pigri dormivano insieme, un ladro entrò e portò via il loro mantello. E quando uno dei due se ne accorse e disse all’altro: «Alzati, inseguilo!», quello rispose: «Lascia stare: quando verrà a prendere il cuscino, lo acchiapperemo in due».","type":"joke","num":"211","A":"54","n":54,"dawe":"211","wit":"FT","label":"211; cf. α 211","app":[{"id":"707","unit":707,"lemma":"σαγίον","editors":[],"sigla":["F","T"],"reading":"§SIG:F§ : σαγεῖον §SIG:T§","dirty":false,"span":[48,54],"query":false},{"query":false,"span":[61,67],"dirty":false,"reading":"(ἔλαβεν scrib.) ἥρπασε §SIG:F§","sigla":["F"],"editors":[],"lemma":"ἔλαβεν","unit":708,"id":"708"},{"editors":[],"lemma":"πρὸς … ἕτερον","id":"709","unit":709,"query":false,"dirty":false,"span":[104,119],"reading":"§SIG:T§(cf. α) : τῷ ἑτέρῳ §SIG:F§","sigla":["F","T"]},{"sigla":["F","T"],"reading":"§SIG:T§(cf. α) : ἐὰν §SIG:F§","span":[157,161],"dirty":false,"query":false,"id":"710","unit":710,"lemma":"ὅταν","editors":[]},{"dirty":false,"span":[178,183],"query":false,"sigla":["F","T"],"reading":"§SIG:T§(cf. α) : πύλην §SIG:F§","lemma":"τύλην","editors":[],"id":"711","unit":711}]},{"label":"212; cf. α 212","app":[{"id":"712","unit":712,"editors":["Thierfelder"],"lemma":"ἔφη","reading":"Lacunam post ἔφη· ex α statuit §SIG:Thierfelder§","sigla":["Thierfelder"],"query":false,"span":[80,83],"dirty":false}],"wit":"FT","n":55,"A":"55","dawe":"212","num":"212","text":"Ὀκνηρῷ υἱῷ ἐπέταξεν ὁ πατὴρ ἀπελθεῖν εἰς τὸν γείτονα καὶ χρήσασθαι ἀξίνην. Ὁ δὲ ἔφη· «Ἐγώ εἰμι ὁ γείτων· ἀξίνην οὐκ ἔχω».","tr":"Un padre ordinò al figlio pigro di andare dal vicino a farsi prestare un’accetta. E quello disse: «Sono io il vicino: di accetta non ne ho!».","type":"joke"},{"wit":"FT","dawe":"213","A":"56","n":56,"app":[{"reading":"§SIG:Braccini§ (cf. α) δηνάριον ὤφειλε δοῦναι §SIG:F§ : ὤφειλε δηνάριον (δεινάριον scrib.) §SIG:T§","sigla":["Braccini","F","T"],"query":false,"span":[15,31],"dirty":false,"id":"713","unit":713,"editors":["Braccini"],"lemma":"δηνάριον ὤφειλεν"},{"id":"714","unit":714,"editors":[],"lemma":"Ὑπηντηκὼς","reading":"§SIG:F§ : ὑπαντηκὸς §SIG:T§","sigla":["F","T"],"query":false,"dirty":false,"span":[33,42]},{"editors":[],"lemma":"αὐτῷ","id":"715","unit":715,"query":false,"span":[46,50],"dirty":false,"reading":"§SIG:F§(cf. α) : αὐτὸν §SIG:T§","sigla":["F","T"]},{"id":"716","unit":716,"lemma":"δηνάριον","editors":[],"sigla":["F","T"],"reading":"§SIG:F§ : δεινάριον §SIG:T§","span":[60,68],"dirty":false,"query":false},{"reading":"§SIG:T§ : τὸν μάπουλον §SIG:F§","sigla":["F","T"],"query":false,"span":[87,98],"dirty":false,"unit":717,"id":"717","editors":[],"lemma":"τὸ μάπουλόν"}],"label":"213; cf. α 213","num":"213","type":"joke","tr":"Un pigro doveva un denaro a un altro pigro. Lo incontrò e gli chiedeva il denaro. E quello disse: «È legato nel mio fagotto: slegalo e prendilo». E l’altro: «Lascia perdere, sono già stato pagato».","text":"Ὀκνηρὸς ὀκνηρῷ δηνάριον ὤφειλεν. Ὑπηντηκὼς δὲ αὐτῷ, ᾔτει τὸ δηνάριον. Ὁ δέ φησιν· «Εἰς τὸ μάπουλόν μου δέδεται· λύσας ἆρον». Ὁ δέ· «Ἄπελθε, φησίν, ἐπληρώθην»."},{"num":"229","text":"Ἀτυχὴς μέθυσος, ἀμπελῶνα κληρονομήσας, ἐν καιρῷ τοῦ τρυγητοῦ ἀπέθανεν.","type":"joke","tr":"Uno sbevazzone sfortunato ereditò una vigna e morì proprio al tempo della vendemmia.","wit":"FT","n":57,"A":"57","dawe":"229","label":"229; cf. α 237","app":[]},{"tr":"Un giovane disse alla propria moglie, che era lasciva: «Signora, che facciamo? Pranziamo o facciamo l’amore?». E quella rispose: «Come vuoi: ma di pane non ne abbiamo!».","type":"joke","text":"Νεανίσκος πρὸς τὴν ἑαυτοῦ γυναῖκα ἀσελγῆ οὖσαν εἶπε· «Κυρία, τί ποιοῦμεν; Ἀριστοῦμεν ἢ ἀφροδισιάζομεν;» Κἀκείνη ἔφη· «Ὡς θέλεις· ψωμὶν οὐκ ἔχομεν».","num":"244","dawe":"244","n":58,"A":"58","wit":"FT","app":[{"query":false,"dirty":false,"span":[0,9],"reading":"Ante hoc dictum, titulum Περὶ λάγνων γυναικῶν praebet §SIG:T§§SIG:F§et α nihil habent.","sigla":["F","T"],"editors":[],"lemma":"Νεανίσκος","unit":718,"id":"718"},{"unit":719,"id":"719","editors":[],"lemma":"τὴν … ἀσελγῆ","reading":"(ἀσελγὴν οὖσαν εἶπε (εἶπεν scrib.) scrib.) (cf. α) τὴν γυναῖκα εἶπεν οὖσαν ἀσελγῆ §SIG:F§","sigla":["F"],"query":false,"dirty":false,"span":[15,40]},{"query":false,"dirty":false,"span":[87,101],"reading":"(cf. α) : ἀφροδιάζομεν §SIG:T§ : ἀφροδιάσομεν §SIG:F§","sigla":["F","T"],"editors":[],"lemma":"ἀφροδισιάζομεν","id":"720","unit":720}],"label":"244; cf. α 244"},{"label":"245; cf. α 245","app":[{"query":false,"span":[112,125],"dirty":false,"reading":"(cf. α) : ἀφροδιάσατε §SIG:T§ : ἀφροδιάσετε §SIG:F§","sigla":["F","T"],"editors":[],"lemma":"ἀφροδισιάσατε","unit":721,"id":"721"},{"reading":"§SIG:Braccini§ Περὶ μιγυναικῶν ἀνδρῶν §SIG:T§ : Περὶ μισογυναίου §SIG:F§","sigla":["Braccini","F","T"],"query":false,"span":null,"dirty":false,"unit":722,"id":"722","editors":["Braccini"],"lemma":"…"}],"wit":"FT","n":59,"A":"59","dawe":"245","num":"245","text":"Γραΐδας ἐρωτευομένας νεανίσκος ξενοδοχήσας, πρὸς τοὺς παῖδας αὐτοῦ ἔφη· «Τὴν θέλουσαν κεράσατε καὶ τὴν θέλουσαν ἀφροδισιάσατε». Kἀκεῖναι εἶπον· «Ἡμεῖς οὐ διψῶμεν».","tr":"Un giovane ospitò delle vecchiette in amore e disse ai suoi servi: «A quella che vuole versate da bere, e con quella che vuole fate l’amore». E quelle dissero: «Noi non abbiamo sete!».","type":"joke"},{"app":[{"reading":"§SIG:Braccini§ Περὶ μιγυναικῶν ἀνδρῶν §SIG:T§ : Περὶ μισογυναίου §SIG:F§","sigla":["Braccini","F","T"],"query":false,"dirty":false,"span":[0,23],"id":"1670-1672","unit":65,"editors":["Braccini"],"lemma":"Περὶ μισογυναίων ἀνδρῶν"}],"type":"section","text":"Περὶ μισογυναίων ἀνδρῶν"},{"dawe":"247","n":60,"A":"60","wit":"FT","app":[{"editors":[],"lemma":"Μισογυναίου","id":"723","unit":723,"query":false,"dirty":false,"span":[0,11],"reading":"§SIG:F§(cf. α) : μισογυναίκου §SIG:T§","sigla":["F","T"]},{"unit":724,"id":"724","editors":[],"lemma":"τις","reading":"§SIG:T§(cf. α) : τις, λέγων §SIG:F§","sigla":["F","T"],"query":false,"dirty":false,"span":[44,47]}],"label":"247; cf. α 247","tr":"Mentre un misogino seppelliva la moglie, un tale chiese: «Chi se n’è andato?». E quello rispose: «Io, che mi sono liberato di questa!».","type":"joke","text":"Μισογυναίου τὴν γυναῖκα κηδεύοντος, ἠρώτησέ τις· «Τίς ἀνεπαύσατο;» Ὁ δὲ ἔφη· «Ἐγὼ ὁ ταύτης στερηθείς».","num":"247"},{"text":"Μισογύναιος ἀρρωστῶν καὶ τῆς γυναικὸς εἰπούσης αὐτῷ· «Ἐὰν ἀποθάνῃς, ἀπάγξομαι», ἀναβλέψας εἶπε· «Ζῶντί μοι τοῦτο χάρισαι».","type":"joke","tr":"Un misogino era malato, e poiché la moglie gli disse: «Se muori, mi impiccherò», alzò lo sguardo e disse: «Fammi questo favore mentre sono ancora vivo!».","num":"248","n":61,"A":"61","dawe":"248","wit":"FT","label":"248; cf. α 248","app":[{"reading":"§SIG:F§(cf. α) : Μισογύναικος §SIG:T§","sigla":["F","T"],"query":false,"dirty":false,"span":[0,11],"unit":725,"id":"725","editors":[],"lemma":"Μισογύναιος"},{"query":false,"span":null,"dirty":false,"reading":"om. §SIG:T§","sigla":["T"],"editors":[],"lemma":"cf","unit":726,"id":"726"}]},{"app":[],"text":"Περὶ εὐτραπέλων","type":"section"},{"dawe":"141","n":62,"A":"62","wit":"F","app":[],"label":"141; cf. α 120","type":"joke","tr":"A un timoniere spiritoso fu chiesto che vento tirasse, e rispose: «Fave e cipolle!».","text":"Εὐτράπελος κυβερνήτης ἐρωτηθείς, τί φυσᾷ, εἶπε· «Φάβα, καὶ κρόμμυα».","num":"141"},{"num":"239","tr":"Uno spiritoso attore tragico era amato da due donne, una dall’alito cattivo e l’altra tutta puzzolente. E mentre una diceva: «Dammi dei baci!» e l’altra: «Dammi degli abbracci!», quello gridò: «Ahimè, che fare? Sono diviso tra due mali!».","type":"joke","text":"Εὐτράπελος τραγῳδὸς ὑπὸ δύο ἠγαπᾶτο γυναικῶν, ὀζοστόμου καὶ ὀζοχνώτου. Kαὶ τῆς μὲν εἰπούσης· «Δός μοι φίλημα», τῆς δὲ εἰπούσης· «Δός μοι περιπλοκάς», ἀνεβόησεν· «Οἴμοι, τί δράσω; Δυσὶ κακοῖς μερίζομαι».","app":[{"sigla":["F","T"],"reading":"§SIG:F§ : εὐοχνώτου §SIG:T§","span":[60,69],"dirty":false,"query":false,"id":"727","unit":727,"lemma":"ὀζοχνώτου","editors":[]},{"sigla":["F","T"],"reading":"§SIG:F§(cf. α) : περιπλοκήν §SIG:T§","dirty":false,"span":[137,147],"query":false,"unit":728,"id":"728","lemma":"περιπλοκάς","editors":[]},{"reading":"§SIG:F§§SIG:T§ : φιλήματα §SIG:Dawe§","sigla":["Dawe","F","T"],"query":false,"dirty":false,"span":[102,108],"unit":729,"id":"729","editors":["Dawe"],"lemma":"φίλημα"}],"label":"239; cf. α 239","wit":"FT","dawe":"239","A":"63","n":63},{"num":"143","text":"Εὐτραπέλῳ τις ἰατρῷ λέγει· «Πολλοὺς ἄνθρακας ἔχω». Κἀκεῖνος ἔφη· «Ἐὰν χαλκεῖον ἔχῃς, θερμόν σοί ποτὲ οὐ λείψει».","tr":"A un medico spiritoso un tale dice: «Ho molti carbonchi!». E quello rispose: «Se hai uno scaldino, non ti mancherà mai il caldo!».","type":"joke","label":"143; cf. α 143","app":[{"editors":["Eberhard"],"lemma":"Εὐτραπέλῳ","unit":730,"id":"730","query":false,"span":[0,9],"dirty":false,"reading":"§SIG:Eberhard§ : Εὐτράπελός §SIG:F§§SIG:T§","sigla":["Eberhard","F","T"]},{"lemma":"λέγει","editors":[],"unit":731,"id":"731","span":[20,25],"dirty":false,"query":false,"sigla":["F","T"],"reading":"§SIG:T§(cf. α) : ἔφη §SIG:F§"},{"editors":["Dawe","Eberhard","Thierfelder"],"lemma":"ποτὲ οὐ","unit":732,"id":"732","query":false,"dirty":false,"span":[96,103],"reading":"§SIG:F§§SIG:T§ : οὔποτε §SIG:Eberhard§, fortasse recte (οὐδέποτε malle videtur §SIG:Thierfelder§) : ποτε inter cruces ponunt §SIG:Thierfelder§ §SIG:Dawe§","sigla":["Dawe","Eberhard","F","T","Thierfelder"]},{"id":"733","unit":733,"editors":[],"lemma":"λείψει","reading":"§SIG:T§(cf. α) : λείψῃ §SIG:F§","sigla":["F","T"],"query":false,"dirty":false,"span":[104,110]}],"wit":"FT","n":64,"A":"64","dawe":"143"},{"tr":"Uno spiritoso partì per un viaggio, si ammalò d’ernia e al ritorno veniva interrogato dalla moglie su che cosa avesse portato. E lui disse: «Per te nulla; ma per le tue cosce un bel cuscinetto».","type":"joke","text":"Εὐτράπελος ἀποδημήσας καὶ κηλίτης γενόμενος, ἐπανελθὼν ἠρωτᾶτο παρὰ τῆς γυναικός, τί ἤγαγεν. Ὁ δέ· «Σοὶ μέν, εἶπεν, οὐδέν, τοῖς δὲ μηροῖς σου προσκε- φαλάδιν».","num":"262","dawe":"262","n":65,"A":"65","wit":"FT","app":[{"query":false,"span":[11,21],"dirty":false,"reading":"§SIG:T§ : ἀποπηδήσας §SIG:F§","sigla":["F","T"],"editors":[],"lemma":"ἀποδημήσας","id":"734","unit":734},{"lemma":"κηλίτης","editors":[],"id":"735","unit":735,"span":[26,33],"dirty":false,"query":false,"sigla":["F","T"],"reading":"edd. κηλήτης §SIG:F§ : κυλίτης §SIG:T§"},{"sigla":["F"],"reading":"ἐπανελθὼν om. §SIG:F§","span":[45,54],"dirty":false,"query":false,"id":"736","unit":736,"lemma":"ἐπανελθὼν","editors":[]},{"id":"737","unit":737,"editors":["Thierfelder"],"lemma":"παρὰ … γυναικός","reading":"(iam §SIG:Thierfelder§ coniecit) om. §SIG:T§","sigla":["T","Thierfelder"],"query":false,"dirty":false,"span":[63,80]},{"lemma":"ἤγαγεν","editors":[],"unit":738,"id":"738","span":[85,91],"dirty":false,"query":false,"sigla":["F","T"],"reading":"§SIG:T§ : αὐτῇ ἔφερεν §SIG:F§"},{"sigla":["F","T"],"reading":"§SIG:T§ : om. §SIG:F§","dirty":false,"span":[93,94],"query":false,"id":"739","unit":739,"lemma":"Ὁ","editors":[]},{"reading":"§SIG:F§§SIG:T§ : προσκεφαλάδιον §SIG:Eberhard§","sigla":["Eberhard","F","T"],"query":false,"dirty":false,"span":[142,148],"id":"740","unit":740,"editors":["Eberhard"],"lemma":"προσκε-"}],"label":"262; esclusiva di β"},{"type":"joke","tr":"Uno spiritoso vide un medico che applicava un collirio a una bella ragazza e disse: «Occhio, a non rovinare la pupa, mentre curi la pupilla!».","text":"Εὐτράπελος, ἰδὼν ἰατρὸν νεάνιδα ὑπαλείφοντα ὡραίαν, ἔφη· «Μὴ τὴν ὄψιν θεραπεύων τὸ βάθος φθείρῃς».","num":"151","app":[{"span":[24,50],"dirty":false,"query":false,"sigla":["Dawe","F","T"],"reading":"§SIG:F§§SIG:T§ : ὡραίαν νεάνιδα ὑπαλείφοντα §SIG:Dawe§","lemma":"νεάνιδα … ὡραίαν","editors":["Dawe"],"id":"741","unit":741}],"label":"151b; cf. α 151 bis","dawe":"151","A":"66","n":66,"wit":"FT"},{"num":"263","type":"joke","tr":"Un tale insultava uno spiritoso, dicendogli: «Ho avuto tua moglie gratis». E quello rispose: «Io sono costretto a sopportare un simile malanno; ma tu che bisogno ne avevi?».","text":"Εὐτράπελόν τις ἐλοιδόρει, ὅτι «Σοῦ τὴν γυναῖκα δωρεὰν ἔσχον». Ὁ δὲ εἶπεν· «Ἐμοὶ μὲν ἀνάγκη τοιούτου κακοῦ ἀντέχεσθαι· σοὶ δὲ τίς ἀνάγκη;»","wit":"FT","dawe":"263","A":"67","n":67,"app":[{"sigla":["F","T","Thierfelder"],"reading":"§SIG:F§§SIG:T§ : τοσούτου §SIG:Thierfelder§","span":[91,99],"dirty":false,"query":false,"id":"742","unit":742,"lemma":"τοιούτου","editors":["Thierfelder"]},{"unit":743,"id":"743","lemma":"ἀντέχεσθαι","editors":["Eberhard"],"sigla":["Eberhard","F","T"],"reading":"§SIG:F§§SIG:T§ : ἀνέχεσθαι §SIG:Eberhard§","span":[106,116],"dirty":false,"query":false},{"query":false,"dirty":false,"span":[118,124],"reading":"§SIG:deRhoer§ σοῦ δὲ §SIG:F§§SIG:T§","sigla":["F","T","deRhoer"],"editors":["deRhoer"],"lemma":"σοὶ δὲ","id":"744","unit":744}],"label":"263; esclusiva di β"},{"type":"joke","tr":"Uno spiritoso rubò un maiale e fuggiva. Ma quando stava per essere acciuffato, lo posò a terra e, percuotendolo, diceva: «Scava da un’altra parte, e non attorno alla mia roba!».","text":"Εὐτράπελος χοῖρον κλέψας ἔφευγεν. Ἐπεὶ δὲ κατελαμβάνετο, θεὶς αὐτόν, τύπτων ἔλεγεν· «Ἀλλαχοῦ ὄρυγε καὶ μὴ περὶ τὰ ἐμά».","num":"146","app":[{"lemma":"Ἐπεὶ","editors":[],"unit":745,"id":"745","dirty":false,"span":[34,38],"query":false,"sigla":["F","T"],"reading":"§SIG:T§ : Τ (cf. α) ὡς §SIG:F§"},{"reading":"§SIG:F§§SIG:T§ : αὐτὸν ‹χαμαί› §SIG:Dawe§ ex α","sigla":["Dawe","F","T"],"query":false,"dirty":false,"span":[62,67],"unit":746,"id":"746","editors":["Dawe"],"lemma":"αὐτόν"},{"sigla":["F","T"],"readin function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function deacc(s){return s.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase();}
function greekCaps(s){return (s||'').replace(/[^\s]+/g,function(w){var d=Array.from(w.normalize('NFD')),bc=0,r=[];for(var k=0;k<d.length;k++){var ch=d[k];if(/[̀-ͯ]/.test(ch)){if(bc===1)r.push(ch);}else{bc++;r.push(ch);}}return r.join('').normalize('NFC').toUpperCase();});}
function rR(r){let h=esc(r);h=h.replace(/§SIG:([^§]*)§/g,'<span class="sig">$1</span>');EDALL.forEach(e=>{h=h.replace(new RegExp('\\b'+e+'\\b','g'),'<span class="ed">'+e+'</span>');});return h;}
function rTr(s){return esc(s).replace(/§I§/g,'<i>').replace(/§\/I§/g,'</i>');}
function buildText(u){const apps=(u.app||[]).filter(a=>a.span).slice().sort((a,b)=>a.span[0]-b.span[0]||a.span[1]-b.span[1]);const inl=[];let last=-1;for(const a of apps){if(a.span[0]>=last){inl.push(a);last=a.span[1];}}let out='',pos=0;const t=u.text||'';for(const a of inl){out+=esc(t.slice(pos,a.span[0]));out+='<span class="lem" data-app="'+a.id+'">'+esc(t.slice(a.span[0],a.span[1]))+'</span>';pos=a.span[1];}out+=esc(t.slice(pos));return out;}
function appLine(a){let bd='';if(a.query)bd='<span class="badge q">note</span>';if(a.dirty)bd+='<span class="badge d">‡</span>';return '<div class="'+(a.query?'ln q':'ln')+'" data-app="'+a.id+'"><span class="lm">'+esc(a.lemma)+'</span> '+(a.reading?rR(a.reading):'')+bd+'</div>';}
function idOf(u,rec){return rec+'_fac'+u.A;}
function conc(u,rec){let c=u.dawe?('Dawe '+esc(u.dawe)):'';
 if(rec==='alpha'&&aToB[u.A])c+=(c?' · ':'')+'β '+aToB[u.A].join(', ');
 if(rec==='beta'&&bToA[u.A])c+=(c?' · ':'')+'α '+bToA[u.A].join(', ');
 if(rec==='gamma'){if(u.cf_a&&u.cf_a.length)c+=(c?' · ':'')+'α '+u.cf_a.join(', ');if(u.cf_b&&u.cf_b.length)c+=' · β '+u.cf_b.join(', ');}
 return c;}
function xref(u,rec){let h='';
 if(rec==='alpha'&&aToB[u.A])h=aToB[u.A].map(b=>'<span class="xref b" data-go="beta_fac'+b+'">→ β '+esc(b)+'</span>').join(' ');
 if(rec==='beta'&&bToA[u.A])h=bToA[u.A].map(a=>'<span class="xref" data-go="alpha_fac'+a+'">→ α '+esc(a)+'</span>').join(' ');
 if(rec==='gamma'){h=(u.cf_a||[]).map(a=>'<span class="xref" data-go="alpha_fac'+a+'">→ α '+esc(a)+'</span>').join(' ')+' '+(u.cf_b||[]).map(b=>'<span class="xref b" data-go="beta_fac'+b+'">→ β '+esc(b)+'</span>').join(' ');}
 return h;}
function facHTML(u,rec){const id=idOf(u,rec);const wits=(u.wit||'').split('').map(c=>'<b>'+c+'</b>').join('');
 const col={alpha:'α',beta:'β',gamma:'γ'}[rec];
 let h='<div class="fac" id="'+id+'" data-n="'+esc(u.A)+'" data-s="'+deacc((u.text||'')+' '+(u.tr||'').replace(/§\/?I§/g,''))+'">';
 h+='<div class="num"><span class="big">'+col+' '+esc(u.A)+'</span><span class="conc">'+conc(u,rec)+'</span><span class="w">'+wits+'</span> '+xref(u,rec)+'</div>';
 if(u.greek_missing)h+='<div class="txt missing">[testo greco non recuperabile dal PDF di γ; vedi traduzione]</div>';
 else h+='<div class="txt">'+buildText(u)+'</div>';
 const apps=(u.app||[]).slice().sort((a,b)=>((a.span?a.span[0]:1e9)-(b.span?b.span[0]:1e9)));
 if(apps.length)h+='<div class="app show">'+apps.map(appLine).join('')+'</div>';
 if(u.tr)h+='<div class="tr">'+rTr(u.tr)+'</div>';
 return h+'</div>';}
function metaHTML(rec){const R=RECS[rec];const nm={alpha:'α (numbering after codex A)',beta:'β · Braccini',gamma:'γ (cod. G, marginal)'}[rec];
 let extra='';
 return '<div class="meta"><b class="gk">'+esc(R.title)+'</b><br>Redaction <b>'+nm+'</b> · Witnesses: <span class="wit">'+R.witnesses.join(' · ')+'</span>'+(R.editors&&R.editors.length?' · Editors: '+R.editors.join(', '):'')+extra+'<div class="stats"><span>'+R.stats.jokes+' facetiae</span><span>'+R.stats.sections+' sections</span><span>'+R.stats.app_total+' apparatus entries</span><span>'+DB.doublets.length+' α/β doublets</span></div></div>';}
function renderRead(rec){state.rec=rec;state.mode='read';elSub.textContent={alpha:'redaction α',beta:'redaction β · Braccini',gamma:'redaction γ · cod. G'}[rec];
 let html=metaHTML(rec),secN=0,open=false;const secIdx=[];

   else if(u.type==='joke'){if(secIdx.length)secIdx[secIdx.length-1].n++;html+=facHTML(u,rec);}}

 let t='<h2>Doublets (α · β · γ)</h2>';const bToG={},aToG={};RECS.gamma.units.forEach(u=>{if(u.type!=='joke')return;(u.cf_b||[]).forEach(b=>{bToG[b]=u.num;});(u.cf_a||[]).forEach(a=>{aToG[a]=u.num;});});DB.doublets.forEach(d=>{const dw=(byA.beta[d.b]&&byA.beta[d.b].dawe)||'';let g=bToG[d.b]||'';if(!g){for(const a of d.a){if(aToG[a]){g=aToG[a];break;}}}t+='<a class="drow" data-go="pair_'+d.a[0]+'_'+d.b+'"><span class="da">α '+esc(d.a[0])+'</span><span class="ddw">'+(dw?'('+esc(dw)+')':'')+'</span><span class="db">β '+esc(d.b)+'</span><span class="dg">'+(g?'γ '+esc(g):'')+'</span></a>';});elToc.innerHTML=t;syncBtns();}
