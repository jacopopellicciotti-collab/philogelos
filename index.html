:root{--bg:#f6f1e7;--paper:#fbf8f1;--ink:#241f18;--muted:#7a6f5d;--line:#e3d9c6;--accent:#7a2e1d;--accent2:#1d4e6b;--lem:#9a3412;--lembg:#f3e2cf;--sig:#1d4e6b;--ed:#5b4a2f;--warn:#b45309;--warnbg:#fbe8cf;--alpha:#7a2e1d;--beta:#1d4e6b;--gamma:#3f6212;
--greek:"Gentium Plus Web","New Athena Unicode","Gentium Plus","Calibri","Segoe UI",sans-serif;--sans:"Aptos","Segoe UI","Calibri",system-ui,sans-serif;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--greek);line-height:1.62}
header.top{position:sticky;top:0;z-index:30;background:rgba(40,28,20,.96);color:#f3ece0;padding:.5rem 1rem;display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.18)}
header.top h1{font-size:1.12rem;margin:0;font-weight:600;white-space:nowrap}
header.top .sub{color:#cdbfa6;font-size:.78rem;font-family:var(--sans);margin-left:-.3rem;max-width:24vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recsw{display:flex;border:1px solid #5a4a39;border-radius:8px;overflow:hidden}
.recsw button{font-family:var(--sans);font-size:.85rem;border:none;background:#efe6d4;color:#241f18;padding:.34rem .7rem;cursor:pointer;font-weight:700}
.recsw button.on[data-rec="alpha"]{background:var(--alpha);color:#fff}.recsw button.on[data-rec="beta"]{background:var(--beta);color:#fff}.recsw button.on[data-rec="gamma"]{background:var(--gamma);color:#fff}
#tSync,#tTr{font-family:var(--sans);font-size:.85rem;border:1px solid #5a4a39;background:#efe6d4;color:#241f18;border-radius:8px;padding:.34rem .6rem;cursor:pointer;font-weight:600}
#tSync:hover,#tTr:hover{background:#fff}#tSync.on{background:#5b3a8a;border-color:#5b3a8a;color:#fff}#tTr.on{background:#256;border-color:#256;color:#fff}
.controls{display:flex;gap:.4rem;align-items:center;margin-left:auto;flex-wrap:wrap}
.controls input,.controls button{font-family:var(--sans);font-size:.82rem;border:1px solid #5a4a39;background:#fffdf8;color:#241f18;border-radius:6px;padding:.32rem .5rem}
.controls input{width:120px}.controls input.num{width:70px}.controls button{cursor:pointer;background:#efe6d4}.controls button:hover{background:#fff}
.wrap{display:flex;max-width:1320px;margin:0 auto}
nav.toc{width:240px;flex:0 0 240px;padding:1rem .7rem 3rem;position:sticky;top:52px;height:calc(100vh - 52px);overflow:auto;font-family:var(--sans);font-size:.83rem;border-right:1px solid var(--line)}
#resizer{flex:0 0 7px;cursor:col-resize;position:sticky;top:52px;height:calc(100vh - 52px);background:transparent;transition:background .15s}#resizer:hover,#resizer.drag{background:#cdbf9e}
nav.toc h2{font-size:.7rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin:.4rem .3rem}
nav.toc a{display:flex;justify-content:space-between;gap:.4rem;padding:.26rem .45rem;border-radius:6px;color:var(--ink);text-decoration:none;cursor:pointer}
nav.toc a:hover{background:#ece2cf}nav.toc a.drow{display:grid;grid-template-columns:3.4em 2.4em 3.2em 2.4em;align-items:baseline;gap:0 .15rem;font-variant-numeric:tabular-nums}nav.toc a.drow .da{color:var(--alpha)}nav.toc a.drow .db{color:var(--beta)}nav.toc a.drow .ddw{color:var(--muted);font-size:.74rem}nav.toc a.drow .dg{color:var(--gamma);font-size:.74rem;opacity:.85}nav.toc a .c{color:var(--muted);font-size:.76rem}
nav.toc .qbtn{margin:.6rem .3rem;display:block;width:calc(100% - .6rem);text-align:left;cursor:pointer;background:var(--warnbg);border:1px solid #e7cd9a;color:#7c4a06;border-radius:8px;padding:.5rem .6rem;font-family:var(--sans);font-size:.82rem}
main{flex:1 1 auto;min-width:0;padding:1.1rem 1.5rem 6rem;background:var(--paper)}
.meta{font-family:var(--sans);font-size:.8rem;color:var(--muted);border:1px solid var(--line);background:#fffdf8;border-radius:10px;padding:.7rem .9rem;margin-bottom:1.3rem}
.meta b{color:var(--ink)}.meta .wit{color:var(--sig);font-weight:600}.meta .gk{font-family:var(--greek);color:var(--ink)}
.stats{display:flex;gap:1rem;flex-wrap:wrap;margin-top:.5rem}.stats span{background:#f0e7d5;border-radius:20px;padding:.15rem .7rem;font-size:.76rem}
section.sec{margin:1.6rem 0}section.sec>h2{font-size:1.12rem;color:var(--accent);border-bottom:2px solid var(--line);padding-bottom:.25rem;margin:0 0 .8rem;letter-spacing:.04em}
.beta section.sec>h2{color:var(--beta)}.gamma section.sec>h2{color:var(--gamma)}
.fac{margin:0 0 1.1rem;padding:.1rem 0 .5rem;border-bottom:1px dotted var(--line)}
.fac .num{font-family:var(--sans);font-size:.74rem;color:var(--muted);font-weight:600;display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:.12rem}
.fac .num .big{font-size:.92rem;color:var(--ink)}.fac .num .conc{color:var(--muted);font-weight:400}
.fac .num .w b{background:#e7ddc9;color:#5b4a2f;border-radius:4px;padding:0 .28rem;font-size:.7rem;font-weight:700;margin-left:.15rem}
.xref{cursor:pointer;border:1px solid #b9a7d6;background:#efe7fb;color:#5b3a8a;border-radius:10px;padding:0 .45rem;font-size:.7rem;font-weight:700}.xref:hover{background:#e2d6f6}
.xref.b{border-color:#9ec3d6;background:#e7f1fb;color:#1d4e6b}.xref.g{border-color:#bcd69e;background:#eef7e2;color:#3f6212}
.fac .txt{font-size:1.16rem;text-align:justify}
.fac .txt.missing{color:#a08b6a;font-style:italic;font-family:var(--sans);font-size:.95rem}
.fac .tr{display:none;font-family:var(--sans);font-size:1rem;color:#43617a;margin:.35rem 0 0;padding:.2rem .6rem;border-left:3px solid #cdd9e3;background:#f3f6f9;border-radius:0 6px 6px 0}
.showtr .fac .tr{display:block}
.lem{cursor:pointer;border-bottom:1.5px solid var(--lem);padding:0 .02em}.lem:hover,.lem.hot{background:var(--lembg)}
.app{font-family:var(--greek);font-size:.85rem;color:#4a4234;margin:.4rem 0 0;padding:.4rem .6rem;background:#f4ede0;border-left:3px solid var(--line);border-radius:0 8px 8px 0;display:none}
.app.show{display:block}.app .ln{padding:.12rem 0;border-radius:5px;cursor:pointer}.app .ln:hover,.app .ln.hot{background:#eadfc8}

avrebbe dovuta fare grande, rispondeva: «tipo per otto persone».","num":"1","label":"1; 1 β","app":[{"reading":"§SIG:A§ : εκ του Φιλογέλους: περί Σχολαστικών §SIG:M§","sigla":["A","M"],"query":false,"span":null,"dirty":false,"unit":1,"id":"1","editors":[],"lemma":"Φιλόγελως … γραμματικοῦ"}],"A":"1","n":1,"dawe":"1","wit":"AM"},{"num":"2","text":"Σχολαστικὸς κολυμβῶν παρὰ μικρὸν ἐπνίγη· ὤμοσε δὲ εἰς ὕδωρ μὴ εἰσελθεῖν, ἐὰν μὴ μάθῃ πρῶτον καλῶς κολυμβᾶν.","tr":"Uno §I§scholastikos§/I§, tuffandosi, per poco non affogò: giurò che non sarebbe più entrato in acqua, se non avesse prima imparato bene a nuotare.","type":"joke","wit":"AM","n":2,"A":"2","dawe":"2","label":"2; 2 β","app":[{"sigla":["A","M"],"reading":"§SIG:A§ : ἐπνίγει §SIG:M§","dirty":false,"span":[33,39],"query":false,"unit":2,"id":"2","lemma":"ἐπνίγη","editors":[]}]},{"num":"3","text":"Σχολαστικῷ τις ἰατρῷ προσελθὼν εἶπεν· Ἰατρέ, ὅταν ἀναστῶ ἐκ τοῦ ὕπνου, ἡμιώριον ἐσκότωμαι καὶ εἶθ’ οὕτως ἀποκαθίσταμαι. καὶ ὁ ἰατρός· Μετὰ τὸ ἡμιώριον ἐγείρου.","tr":"Un tale si recò da un medico §I§scholastikos§/I§ e disse «dottore, quando mi sveglio dal sonno sono annebbiato per mezz’ora, e poi mi riprendo» e il medico «svegliati mezz’ora dopo».","type":"joke","wit":"AM","n":3,"A":"3","dawe":"3","label":"3; 183 α","app":[{"editors":[],"lemma":"ἰατρῷ","id":"3","unit":3,"query":false,"span":[15,20],"dirty":false,"reading":"§SIG:M§ : ἰητρῷ §SIG:A§ cf. app. crit. 6, 7, 27","sigla":["A","M"]}]},{"num":"4","type":"joke","tr":"Uno §I§scholastikos§/I§ vendeva un cavallo, e un tale gli domandò se fosse di primo ricambio. Quando quello disse che era di secondo ricambio, fece: «Come lo sai?» e quello rispose «Perché una volta ha disarcionato me, e una volta ha fatto cadere mio padre».","text":"Σχολαστικοῦ ἵππον πιπράσκοντος ἠρώτησέ τις, εἰ πρωτοβόλος ἐστίν. τοῦ δὲ εἰπόντος δευτεροβόλον εἶναι, εἶπε· Πῶς οἶδας; ὁ δὲ ἀπεκρίνατο· Ὅτι ἅπαξ ἐμὲ ἔβαλε κάτω καὶ ἅπαξ τὸν πατέρα μου.","wit":"AM","dawe":"4","n":4,"A":"4","app":[{"query":false,"spa ὴ λαλεῖν. ὁ δὲ τῷ δούλῳ αὐτοῦ ἐπέταξεν ἀντασπάζεσθαι ἀντ’ αὐτοῦ τοὺς προσαγορεύοντας. εἶτα αὐτὸς πρὸς ἕκαστον ἔλεγε· Μὴ πρὸς ὕβριν αὐτὸ δέξῃ, εἰ ὁ δοῦλός μου ἀντ’ ἐμοῦ ἀσπάζεταί σε· ἐκέλευσε γάρ με ὁ ἰατρὸς μὴ λαλεῖν.","type":"joke","tr":"Il medico ordinò ad uno §I§scholastikos§/I§ cui era stata amputata l’ugola, di non parlare. Questo allora diede disposizione al proprio servo di rispondere al suo posto a quelli che lo salutavano. Poi proprio lui diceva a ciascuno: «Non prenderlo come una mancanza di rispetto, se ti saluta il mio schiavo al posto mio: il dottore mi ha infatti comandato di non parlare».","num":"7","label":"7","app":[{"sigla":["A","M"],"reading":"§SIG:M§ : ἰητρὸς utroque loco §SIG:A§ cf. app. crit. 3","dirty":false,"span":[47,53],"query":false,"id":"10","unit":10,"lemma":"ἰατρὸς","editors":[]},{"reading":"§SIG:A§ : ἔταξε §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[87,93],"id":"11","unit":11,"editors":[],"lemma":"ἔταξεν"},{"lemma":"ἢ","editors":["Minas"],"id":"12","unit":12,"dirty":false,"span":[173,174],"query":false,"sigla":["A","Minas"],"reading":"§SIG:A§ : εἰ μὴ §SIG:Minas§"},{"sigla":["A"],"reading":": ἀνταυτοῦ §SIG:A§","dirty":false,"span":[108,118],"query":false,"id":"13","unit":13,"lemma":"ἀντ αὐτοῦ","editors":[]},{"lemma":"","editors":["Boissonade"],"id":"14","unit":14,"span":null,"dirty":false,"query":false,"sigla":["A","Boissonade","M"],"reading":"§SIG:A§§SIG:M§ : ΣΙΔΩΝΙΟΙ §SIG:Boissonade§"}],"n":7,"A":"7","dawe":"7","wit":"AM"},{"text":"Σχολαστικὸς θέλων πιάσαι μῦν τὸν τὰ βιβλία αὐτοῦ τρώγοντα κρέας δακὼν ἐν τῇ σκοτίᾳ ἐκάθετο.","tr":"Uno §I§scholastikos§/I§ volendo prendere il topo che mangiava i suoi libri, addentò della carne e si sedette al buio.","type":"joke","num":"8","A":"8","n":8,"dawe":"8","wit":"AM","label":"8; 8 β","app":[{"span":[12,28],"dirty":false,"query":false,"sigla":["A","Dawe","M"],"reading":"§SIG:A§§SIG:M§ : θέλων μῦν πιάσαι §SIG:Dawe§","lemma":"θέλων … μῦν","editors":["Dawe"],"id":"15","unit":15},{"dirty":false,"span":[64,69],"query":false,"sigla":["A","Dawe","M"],"reading":"§SIG:A§§SIG:M§ : δακεῖν §SIG:Dawe§","lemma":"δακὼν","editors":["Dawe"],"unit":16,"id":"16"},{"reading":": σκοτία §SIG:A§ : σκοτεία §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[73,82],"unit":17,"id":"17","editors":[],"lemma":"τῇ σκοτίᾳ"}]},{"num":"9","type":"joke","tr":"Uno §I§scholastikos§/I§ voleva insegnare al proprio asino a non mangiare e non gli diede cibo. Quando l’asino morì, diceva: «Sono proprio rovinato! Quando aveva appena imparato a non mangiare, allora è morto»!","text":"Σχολαστικὸς θέλων αὐτοῦ τὸν ὄνον διδάξαι μὴ τρώγειν οὐ παρέβαλεν αὐτῷ τροφάς. ἀποθανόντος δὲ τοῦ ὄνου ἀπὸ λιμοῦ ἔλεγε· Μεγάλα ἐζημιώθην· ὅτε γὰρ ἔμαθε μὴ τρώγειν, τότε ἀπέθανεν.","app":[{"editors":[],"lemma":"ἀπέθανεν","id":"18","unit":18,"query":false,"dirty":false,"span":[168,176],"reading":"§SIG:A§ : ἀπέθανε §SIG:M§","sigla":["A","M"]}],"label":"9; 9 β","wit":"AM","dawe":"9","n":9,"A":"9"},{"num":"10","text":"Σχολαστικὸς ἵππον πιπράσκων ἠρωτήθη, μὴ δειλὸς εἴη. ὁ δὲ εἶπεν· Οὐ μὰ τὴν τοῦ πατρός μου σωτηρίαν· ἐν τῷ σταύλῳ γὰρ μόνος ἔστηκεν.","type":"joke","tr":"A uno §I§scholastikos§/I§ che vendeva un cavallo fu chiesto se non fosse pauroso. Quello allora disse: «No, per la salvezza di mio padre: nella stalla, infatti, è stato da solo».","label":"10; cf. 163 α","app":[{"reading":"§SIG:A§ : δηλὸς §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[40,46],"unit":19,"id":"19","editors":[],"lemma":"δειλὸς"},{"lemma":"τὴν","editors":["Minas"],"id":"20","unit":20,"dirty":false,"span":[70,73],"query":false,"sigla":["Minas"],"reading":"§SIG:Minas§ coll. 49 β"}],"wit":"AM","A":"10","n":10,"dawe":"10"},{"app":[{"sigla":["A","M","Needham"],"reading":"§SIG:Needham§ : καμύσας §SIG:A§§SIG:M§","span":[51,61],"dirty":false,"query":false,"unit":21,"id":"21","lemma":"καμμύσας","editors":["Needham"]},{"span":[62,73],"dirty":false,"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ἐνοπτρίζετο §SIG:M§","lemma":"ἐνωπτρίζετο","editors":[],"id":"22","unit":22}],"label":"11; 11 β","dawe":"11","A":"11","n":11,"wit":"AM","type":"joke","tr":"Uno §I§scholastikos§/I§ volendo vedere se per lui fosse decoroso dormire, chiuse gli occhi e si osservò allo specchio.","text":"Σχολαστικὸς θέλων ἰδεῖν, εἰ πρέποι αὐτῷ κοιμᾶσθαι, καμ‹μ›ύσας ἐνωπτρίζετο.","num":"11"},{"wit":"AM","dawe":"12","A":"12","n":12,"app":[{"query":false,"span":[62,70],"dirty":false,"reading":"§SIG:A§ : ἀγόρασαί §SIG:M§","sigla":["A","M"],"editors":[],"lemma":"ἀγοράσαι","id":"23","unit":23},{"lemma":"ἑκάτερον","editors":["Eberhard"],"id":"24","unit":24,"span":[77,85],"dirty":false,"query":false,"sigla":["A","Eberhard","M"],"reading":"§SIG:Eberhard§ : ἐκ §SIG:A§§SIG:M§"}],"label":"12","num":"12","tr":"Ad uno §I§scholastikos§/I§ che partiva per un viaggio un suo amico disse: «Ti chiedo di comprarmi due schiavi, entrambi di quindici anni». Quello allora disse: «Se non li trovo così, te ne prenderò uno di trenta anni».","type":"joke","text":"Σχολαστικῷ ἀποδημοῦντι φίλος αὐτοῦ ἔλεγεν· Ἀξιῶ σε δύο παῖδας ἀγοράσαι μοι, ‹ἑκάτερον› πεντεκαίδεκα ἐτῶν. ὁ δὲ εἶπεν· Ἐὰν τοιούτους μὴ εὕρω, ἀγοράσω σοι ἕνα τριάκοντα ἐτῶν."},{"app":[{"unit":25,"id":"25","lemma":"πατραλοῖαι","editors":["Eberhard","Thierfelder"],"sigla":["Eberhard","Thierfelder"],"reading":"del. §SIG:Eberhard§, πατροκτόνον prop. §SIG:Thierfelder§","dirty":false,"span":[17,27],"query":false},{"dirty":false,"span":[118,127],"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ἀποπνίξαι §SIG:M§","lemma":"ἀποπνίξει","editors":[],"unit":26,"id":"26"}],"label":"13; cf. 158 α","wit":"AM","dawe":"13","A":"13","n":13,"num":"13","type":"joke","tr":"Due §I§scholastikoi §/I§si lamentavano l’un l’altro del fatto che i loro padri fossero in vita. Quando uno dei due disse: «Vuoi dunque che ciascuno ammazzi il proprio padre?», l’altro rispose: «Non sia mai, ché non abbiamo la reputazione di parricidi! Ma se vuoi, ammazza tu il mio, e io il tuo».","text":"Σχολαστικοὶ δύο [πατραλοῖαι] ἐδυσφόρουν πρὸς ἀλλήλους ἐπὶ τῷ τοὺς πατέρας αὐτῶν ζῆν. τοῦ δὲ ἑνὸς εἰπόντος· Θέλεις οὖν ἀποπνίξει ἕκαστος ἡμῶν τὸν ἴδιον; Μὴ γένοιτο, εἶπεν ὁ ἄλλος, ἵνα μὴ πατραλοῖαι ἀκούσωμεν. ἀλλ’ εἰ βούλει, σὺ τὸν ἐμὸν σφάξον, κἀγὼ τὸν σόν."},{"app":[],"label":"14; 12 β","wit":"A","dawe":"14","n":14,"A":"14","num":"14","type":"joke","tr":"Uno §I§scholastikos §/I§che comprava una casa, sportosi allora alla finestra chiedeva ai passanti se gli si addicesse.","text":"Σχολαστικὸς οἰκίας πριάμενος, εἶτα διὰ τῆς θυρίδος παρακύψας ἠρώτα τοὺς παρερχομένους, εἰ πρέπει αὐτῷ."},{"num":"15","text":"Σχολαστικὸς καθ’ ὕπνους ἧλον πεπατηκέναι δόξας τὸν πόδα περιέδησεν. ἑταῖρος δὲ αὐτοῦ πυθόμενος τὴν αἰτίαν καὶ γνούς· Δικαίως, ἔφη, μωροὶ καλούμεθα. διὰ τί γὰρ ἀνυπόδητος κοιμᾶσαι;","tr":"Uno §I§scholastikos§/I§, credendo di aver calpestato un chiodo in sogno, si fasciò il piede. Un suo amico, chiesta e saputane la ragione, disse: «Giustamente siamo chiamati scemi! Perché infatti dormi scalzo?!».","type":"joke","label":"15; 13 β","app":[{"id":"27","unit":27,"editors":[],"lemma":"καθ ὕπνους","reading":"§SIG:A§ : om. §SIG:M§","sigla":["A","M"],"query":false,"span":[12,23],"dirty":false},{"editors":[],"lemma":"δόξας τὸν","unit":28,"id":"28","query":false,"span":[41,50],"dirty":false,"reading":": δόξας, τὸν §SIG:A§§SIG:M§","sigla":["A","M"]},{"id":"29","unit":29,"editors":[],"lemma":"κοιμᾶσαι","reading":"§SIG:A§ : κοιμᾶσε §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[170,178]},{"id":"30","unit":30,"editors":[],"lemma":"ἔδησεν","reading":": ἄκτον §SIG:A§ac","sigla":["A"],"query":false,"span":[60,66],"dirty":false},{"unit":31,"id":"31","editors":[],"lemma":"τὴν … καταφιλῶν","reading":"§SIG:A§ : τὴν γυναῖκα αὐτοῦ συνεχῶς §SIG:C§","sigla":["A","C"],"query":false,"span":[95,34527],"dirty":false}],"wit":"AM","A":"15","n":15,"dawe":"15"},{"num":"16","text":"Σχολαστικὸς βιβλίον αὐτοῦ ἐπιζητῶν ἐπὶ πολλὰς ἡμέρας καὶ μὴ εὑρίσκων, ὡς κατὰ τύχην μαρούλια ἤσθιεν, ἐπιστραφεὶς ἐπί τινος γωνίας εἶδε κείμενον τὸ βιβλίον. ὕστερον δὲ φίλῳ ἀπαντήσας ὀδυρομένῳ, ὡς τὴν στολὴν τῶν ἱματίων αὐτοῦ ἀπολέσαντι· Μὴ δυσφόρει, ἔφη, ἀλλὰ μαρούλια ἀγοράσας καὶ ἐσθίων αὐτὰ πρὸς τὴν γωνίαν ἐπιστραφεὶς πρόσσχες, καὶ εὑρήσεις αὐτά.","type":"joke","tr":"Uno §I§scholastikos§/I§ che cercava un suo libro da molti giorni e non lo trovava, quando si era trovato a mangiare della lattuga, si voltò e vide il libro giacere in un angolo. Successivamente, incontrato un amico che si lamentava perché aveva perso la sua muta di vestiti, disse: «Non abbatterti, ma compra della lattuga, e mentre la mangi voltati e va’ nell’angolo, e la troverai».","wit":"AM","A":"16","n":16,"dawe":"16","label":"16","app":[{"span":[225,235],"dirty":false,"query":false,"sigla":["A","M"],"reading":": ἀπολέσαντα §SIG:A§ : ἀπωλέσαντα §SIG:M§","lemma":"ἀπολέσαντι","editors":[],"unit":32,"id":"32"},{"dirty":false,"span":[322,330],"query":false,"sigla":["A","M","Thierfelder"],"reading":"§SIG:Thierfelder§ : πρόσχες §SIG:A§§SIG:M§","lemma":"πρόσσχες","editors":["Thierfelder"],"id":"33","unit":33}]},{"app":[{"id":"34","unit":34,"editors":[],"lemma":"ἀγοράσῃ","reading":"§SIG:A§ : ἀγοράσει §SIG:M§","sigla":["A","M"],"query":false,"span":[53,60],"dirty":false},{"sigla":["A","M"],"reading":"§SIG:A§ : om. §SIG:M§","span":[94,103],"dirty":false,"query":false,"id":"35","unit":35,"lemma":"ἀπαντήσας","editors":[]},{"sigla":["A","M"],"reading":"cf. 45α τὴν περί τῶν βιβλίων ἐπιστολήν, εἶπεν, ἣν οὐκ ἐδεξάμην ἀπέστειλας §SIG:A§§SIG:M§","dirty":false,"span":[106,171],"query":false,"unit":36,"id":"36","lemma":"ἣν … ἐδεξάμην","editors":[]}],"label":"17; 36 β","wit":"AM","dawe":"17","A":"17","n":17,"num":"17","tr":"Un amico che era in un viaggio all’estero scrisse ad uno §I§scholastikos§/I§ di acquistargli dei libri. Quello non se ne diede cura e, incontrato l’amico rientrato, disse: «La lettera che mi hai mandato a proposito dei libri, non l’ho ricevuta».","type":"joke","text":"Σχολαστικῷ ἑταῖρος ἀποδημῶν ἔγραψεν, ἵνα αὐτῷ βιβλία ἀγοράσῃ. ὁ δὲ ἀμελήσας, ἐπανελθόντι αὐτῷ ἀπαντήσας· Τὴν ἐπιστολήν, εἶπεν, ἣν περὶ τῶν βιβλίων ἀπέστειλας, οὐκ ἐδεξάμην."},{"num":"18","type":"joke","tr":"Un tale incontrò uno §I§scholastikos§/I§ e disse: «Lo schiavo che mi hai venduto è morto». «Per gli dèi!» disse lo §I§scholastikos§/I§, «quando era da me, non ha mai fatto niente del genere!».","text":"Σχολαστικῷ τις ἀπαντήσας εἶπεν·Ὁ δοῦλος, ὃν ἐπώλησάς μοι, ἀπέθανε. Μὰ τοὺς θεούς, ἔφη, παρ’ ἐμοὶ ὅτε ἦν, τοιοῦτον οὐδὲν ἐποίησεν.","wit":"AM","dawe":"18","A":"18","n":18,"app":[{"reading":"§SIG:A§ : ἐποίησε §SIG:M§","sigla":["A","M"],"query":false,"span":[120,128],"dirty":false,"id":"37","unit":37,"editors":[],"lemma":"ἐποίησεν"}],"label":"18"},{"num":"19","tr":"Uno §I§scholastikos§/I§ che aveva visto molti passeri appollaiati su un albero, distese la piega dell’abito e scuoteva l’albero per raccogliere i passeri.","type":"joke","text":"Σχολαστικὸς ἰδὼν πολλοὺς στρουθοὺς ἐπὶ δένδρου ἑστῶτας, ἁπλώσας τὸν κόλπον ἔσειε [καὶ] τὸ δένδρον ὡς ὑποδεξόμενος τοὺς στρουθούς.","app":[{"editors":["Minas"],"lemma":"ἔσειε καὶ","unit":38,"id":"38","query":false,"dirty":false,"span":[75,85],"reading":"§SIG:A§§SIG:M§ : ἔσειε §SIG:Minas§","sigla":["A","M","Minas"]}],"label":"19; 19 β","wit":"AM","dawe":"19","A":"19","n":19},{"label":"20","app":[{"span":[28,51],"dirty":false,"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ἀλλήλως ἀποκαθιστῶντας §SIG:M§","lemma":"ἀλλήλους ἀποκαθιστῶντες","editors":[],"unit":39,"id":"39"}],"n":20,"A":"20","dawe":"20","wit":"AM","text":"Σχολαστικοὶ δύο ἀπὸ δείπνου ἀλλήλους ἀποκαθιστῶντες κατὰ τιμὴν οὐκ ἐκοιμήθησαν.","type":"joke","tr":"Due §I§scholastikoi §/I§che si erano accompagnati a vicenda di ritorno da una cena, per ossequio/riverenza/cortesia non si coricarono/andarono a dormire.","num":"20"},{"type":"joke","tr":"Uno §I§scholastikos§/I§ che voleva dormire, poiché non aveva un cuscino ordinò allo schiavo di mettergli sotto un vaso. Quando quello diceva che era duro, gli ordinò di riempirlo di piume.","text":"Σχολαστικὸς καθευδῆσαι βουλόμενος, μὴ ἔχων προσκεφάλαιον ἐκέλευσε τῷ δούλῳ κεράμιον ὑποθεῖναι. τοῦ δὲ εἰπόντος, ὅτι σκληρόν ἐστι, πτερῶν αὐτὸ γεμισθῆναι ἐκέλευσεν.","num":"21","dawe":"21","A":"21","n":21,"wit":"AM","app":[{"span":[84,93],"dirty":false,"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ὑποθῆναι §SIG:M§","lemma":"ὑποθεῖναι","editors":[],"id":"40","unit":40},{"reading":": πτερὸν §SIG:A§§SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[130,136],"unit":41,"id":"41","editors":[],"lemma":"πτερῶν"},{"sigla":["A","Eberhard","M","Minas"],"reading":"§SIG:Eberhard§ : αὐτῷ §SIG:A§§SIG:M§ : om. §SIG:Minas§","span":[137,141],"dirty":false,"query":false,"id":"42","unit":42,"lemma":"αὐτὸ","editors":["Eberhard","Minas"]},{"unit":43,"id":"43","lemma":"ἐκέλευσεν","editors":[],"sigla":["A","M"],"reading":"§SIG:A§ : ἐκέλευσε §SIG:M§","span":[153,162],"dirty":false,"query":false}],"label":"21"},{"n":22,"A":"22","dawe":"22","wit":"AM","label":"22; 22 β [et 3 γ?]","app":[{"editors":[],"lemma":"πολὺ σοῦ","id":"44","unit":44,"query":false,"dirty":false,"span":[148,156],"reading":"§SIG:A§ : πολύ σου §SIG:M§","sigla":["A","M"]}],"text":"Σχολαστικὸς ἀπαντήσας τινὶ φίλῳ αὐτοῦ εἶπεν· Ἤκουσα, ὅτι ἀπέθανες. ὁ δὲ ἀπεκρίνατο· Ἀλλ’ ὁρᾷς με ζῶντα. καὶ ὁ σχολαστικός· Καὶ μὴν ὁ εἰπών μοι κατὰ πολὺ σοῦ ἀξιοπιστότερος ἦν.","type":"joke","tr":"Uno §I§scholastikos§/I§ incontrò un suo amico e disse: «Ho sentito che sei morto». Quello rispose: «Ma mi vedi vivo!» e lo §I§scholastikos§/I§: «Ma quello che me l’ha detto è molto più credibile di te».","num":"22"},{"num":"23","type":"joke","tr":"Uno §I§scholastikos §/I§entra alla prima apertura delle terme e non trovando nessuno all’interno dice al proprio servo: «Da ciò che vedo, il bagno non lava».","text":"Σχολαστικὸς κατὰ πρώτην ἄνοιξιν τοῦ βαλανείου εἰσελθὼν καὶ μηδένα εὑρὼν ἔσω λέγει πρὸς τὸν δοῦλον αὐτοῦ· Ἐξ ὧν βλέπω, [μὴ] οὐ λούει τὸ βαλανεῖον.","app":[{"query":false,"dirty":false,"span":[59,65],"reading":"§SIG:A§ : μὴδ’ ἕνα §SIG:M§","sigla":["A","M"],"editors":[],"lemma":"μηδένα","unit":45,"id":"45"},{"lemma":"μὴ","editors":["Thierfelder"],"id":"46","unit":46,"span":[119,121],"dirty":false,"query":false,"sigla":["Thierfelder"],"reading":"del. §SIG:Thierfelder§ coll. 135α, sed cf. K.G. I 224 n.7"},{"sigla":["M"],"reading":"fort. delendum cf. 135α. Post βαλανεῖον notam interrogationis §SIG:M§","dirty":false,"span":[132,144],"query":false,"id":"47","unit":47,"lemma":"τὸ βαλανεῖον","editors":[]}],"label":"23; 135 α","wit":"AM","dawe":"23","n":23,"A":"23"},{"num":"24","text":"Σχολαστικὸς μαχόμενος τῷ πατρὶ λέγει πρὸς αὐτόν· Κακὲ δοῦλε, οὐχ ὁρᾷς, οἶά με ἐζημίωσας; εἰ γὰρ σὺ μὴ ἐγεννήθης, ἐγὼ ἂν τὸν πάππον μου ἐκληρονόμησα.","type":"joke","tr":"Uno §I§scholastikos §/I§litigando col padre gli dice: «Brutto schiavo, non vedi come mi hai rovinato? Se tu non fossi nato, io erditerei la fortuna di mio nonno!».","wit":"AM","A":"24","n":24,"dawe":"24","label":"24 [cf. 4 γ?]","app":[{"dirty":false,"span":[71,74],"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : οἵα §SIG:M§","lemma":"οἶά","editors":[],"id":"48","unit":48},{"reading":"§SIG:A§ : ἐγενήθης §SIG:M§ac","sigla":["A","M"],"query":false,"span":[102,111],"dirty":false,"unit":49,"id":"49","editors":[],"lemma":"ἐγεννήθης"}]},{"type":"joke","tr":"Uno §I§scholastikos §/I§in una navigazione, poiché c’era una violenta tempesta e i servi si lamentavano, disse: «Non piangete: infatti vi ho reso tutti liberi nel testamento».","text":"Σχολαστικὸς ἐν τῷ πλέειν χειμῶνος ὄντος σφοδροῦ καὶτῶν οἰκετῶν κλαιόντων· Μὴ κλαίετε, ἔφη· πάντας γὰρ ὑμᾶς ἐν διαθήκαις ἐλευθέρους ἀφῆκα.","num":"25","dawe":"25","n":25,"A":"25","wit":"AM","app":[{"sigla":["A","M"],"reading":"§SIG:A§ : ἱκετῶν §SIG:M§","dirty":false,"span":[55,62],"query":false,"id":"50","unit":50,"lemma":"οἰκετῶν","editors":[]},{"sigla":["A","Boissonade","M"],"reading":"§SIG:Boissonade§ : ἡμᾶς §SIG:A§§SIG:M§","span":[102,106],"dirty":false,"query":false,"id":"51","unit":51,"lemma":"ὑμᾶς","editors":["Boissonade"]}],"label":"25"},{"num":"26","tr":"Uno §I§scholastikos§/I§ cercava dove costruirsi una dimora, e quando certi gli dicevano che lì era bello, disse: «Ma il luogo è malsano».","type":"joke","text":"Σχολαστικὸς ἐρευνῶν, ποῦ ὀφείλει κτίσαι ἑαυτῷ οἴκημα [ἤγουν μνῆμα], εἰπόντων δὲ τινῶν, ὅτι καλὸν εἴη ὧδέ που, ἔφη· Ἀλλὰ νοσώδης ὁ τόπος.","app":[{"editors":[],"lemma":"κτίσαι","id":"52","unit":52,"query":false,"dirty":false,"span":[33,39],"reading":"§SIG:A§ : κτῆσαι §SIG:M§","sigla":["A","M"]},{"lemma":"ἤγουν μνῆμα","editors":["Boissonade"],"unit":53,"id":"53","span":[54,65],"dirty":false,"query":false,"sigla":["Boissonade"],"reading":"glossam agnovit §SIG:Boissonade§"},{"reading":"ἀν εἴη prop. §SIG:Dawe§","sigla":["Dawe"],"query":false,"span":[97,100],"dirty":false,"unit":54,"id":"54","editors":["Dawe"],"lemma":"εἴη"}],"label":"26","wit":"AM","dawe":"26","A":"26","n":26},{"tr":"Uno §I§scholastikos§/I§ che stava male stabilì col medico che, se fosse guarito, avrebbe dato una ricompensa. Quando dunque la moglie lo biasimava perché beveva vino con la febbre, disse: «Tu vuoi che io, guarito, sia costretto a dare la ricompensa al medico?!».","type":"joke","text":"Σχολαστικὸς νοσῶν συνετάξατο τῷ ἰατρῷ, εἰ θεραπευθείη, μισθὸν δώσειν. ὡς οὖν οἶνον ἐν τῷ πυρέσσειν πίνοντι αὐτῷ ἐπετίμα ἡ γυνή· Σὺ δὲ ὑγιάναντα βούλει με, ἔφη, ἀναγκασθῆναι τῷ ἰατρῷ τὸν μισθὸν δώσειν;","num":"27","dawe":"27","A":"27","n":27,"wit":"AM","app":[{"reading":"§SIG:A§ : δόσειν §SIG:M§","sigla":["A","M"],"query":false,"span":[62,68],"dirty":false,"id":"55","unit":55,"editors":[],"lemma":"δώσειν"},{"reading":"§SIG:A§ : πυρέσειν §SIG:M§ : πυρέττειν §SIG:Thierfelder§ cf. 81 α, 194 α, 30 β","sigla":["A","M","Thierfelder"],"query":false,"span":[89,98],"dirty":false,"id":"56","unit":56,"editors":["Thierfelder"],"lemma":"πυρέσσειν"},{"lemma":"ἔφη","editors":[],"id":"57","unit":57,"dirty":false,"span":[155,158],"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : έχειν §SIG:M§"},{"id":"58","unit":58,"editors":[],"lemma":"μισθὸν","reading":"§SIG:A§ : μιστὸν §SIG:M§","sigla":["A","M"],"query":false,"span":[186,192],"dirty":false}],"label":"27; 81 α"},{"wit":"AM","n":28,"A":"28","dawe":"28","label":"28","app":[{"lemma":"ἂν εἴη","editors":["Minas"],"unit":59,"id":"59","dirty":false,"span":[86,92],"query":false,"sigla":["A","M","Minas"],"reading":"§SIG:A§§SIG:M§ : ἂν ἦν §SIG:Minas§"}],"num":"28","text":"Σχολαστικοῦ τὸν ἀντίχειρον κύων ἔδακεν. ὁ δὲ εἶπεν· Εἰ τὸ ἱμάτιον ἐπίασεν, ἐσχισμένον ἂν εἴη.","type":"joke","tr":"Un cane morse il pollice di uno §I§scholastikos§/I§. Questo disse: «Se avesse preso il mantello, si sarebbe lacerato!»."},{"app":[{"reading":"§SIG:Minas§ : ἡμῶν §SIG:A§","sigla":["A","Minas"],"query":false,"span":[3,7],"dirty":false,"unit":60,"id":"60","editors":["Minas"],"lemma":"ὑμῶν"},{"query":false,"dirty":false,"span":null,"reading":"§SIG:Boissonade§ : κλέψωσιν §SIG:A§","sigla":["A","Boissonade"],"editors":["Boissonade"],"lemma":"βλέψωσιν","unit":61,"id":"61"},{"unit":62,"id":"62","editors":["Minas"],"lemma":"","reading":"§SIG:Minas§ : δηλοί §SIG:A§","sigla":["A","Minas"],"query":false,"span":null,"dirty":false},{"editors":["Boissonade"],"lemma":"","unit":63,"id":"63","query":false,"dirty":false,"span":null,"reading":"§SIG:Boissonade§ : νενεολκημένα §SIG:A§","sigla":["A","Boissonade"]}],"label":"29; 29 β [et 5 γ?]","dawe":"29","A":"29","n":29,"wit":"AM","type":"joke","tr":"Di due gemelli, uno morì. Uno §I§scholastikos§/I§ si imbatté dunque in quello vivo e disse: «Sei morto tu, o tuo fratello?».","text":"Διδύμων ἀδελφῶν ὁ ἕτερος ἐτελεύτησε. σχολαστικὸς οὖν προσελθὼν τῷ ζῶντι εἶπε· Σὺ ἀπέθανες ἢ ὁ ἀδελφός σου;","num":"29"},{"label":"30; 93 α et 29 β","app":[{"query":false,"span":[28,32],"dirty":false,"reading":"§SIG:A§ : ἤτοι §SIG:M§","sigla":["A","M"],"editors":[],"lemma":"ᾔτει","unit":64,"id":"64"}],"wit":"AM","n":30,"A":"30","dawe":"30","num":"30","text":"Σχολαστικὸς ναυαγεῖν μέλλων ᾔτει πινακίδας, ἵνα διαθήκας γράψῃ.","type":"joke","tr":"Uno §I§scholastikos§/I§ stando per naufragare chiedeva le tavolette per scrivere il testamento."},{"wit":"AM","A":"31","n":31,"dawe":"31","label":"31; 95 α et 30 β","app":[{"query":false,"span":[24,31],"dirty":false,"reading":"§SIG:Eberhard§","sigla":["Eberhard"],"editors":["Eberhard"],"lemma":"ποταμὸν","unit":65,"id":"65"},{"editors":[],"lemma":"δέ τινος","unit":66,"id":"66","query":false,"dirty":false,"span":[102,110],"reading":"§SIG:A§ : om. §SIG:M§","sigla":["A","M"]}],"num":"31","text":"Σχολαστικὸς διαπερᾶσαι ‹ποταμὸν› βουλόμενος ἀνέβη εἰς τὸ πλοῖον μετὰ τοῦ ἵππου ἐποχούμενος. Πυθομένου δέ τινος, διὰ τί οὐ κάτεισι· Σπουδάζω, ἔφη.","type":"joke","tr":"Uno §I§scholastikos§/I§ che voleva attraversare un fiume, salì sull’imbarcazione restando in groppa al cavallo. Quando uno gli chiese perché non scendesse, disse: «Ho fretta!»."},{"tr":"Uno §I§scholastikos §/I§fu invitato a una cena e non mangiava. Qualcuno degli invitati gli chiese: «Perché non mangi?» e disse: «Perché io non sembri essere venuto qui per il cibo».","type":"joke","text":"Σχολαστικὸς ἐπὶ δεῖπνον κληθεὶς οὐκ ἤσθιεν. ἐρωτήσαντος δέ τινος τῶν κεκλημένων· Διὰ τί οὐκ ἐσθίεις; ἔφη· Ἵνα μὴ τοῦ φαγεῖν ἕνεκα δόξω παρεῖναι.","num":"32","dawe":"32","A":"32","n":32,"wit":"AM","app":[],"label":"32"},{"type":"joke","tr":"Il figlio di uno §I§scholastikos§/I§ giocava a palla. Poiché la palla era caduta nel pozzo, si chinò e, vista la propria ombra, le chiedeva la palla. Successivamente disse al padre che non l’aveva recuperata. Questi si sporse sul pozzo, vide la propria ombra e disse: «Padrone di casa, rendi la palla a mio figlio».","text":"Σχολαστικοῦ υἱὸς ἐσφαίριζε. πεσούσης οὖν εἰς φρέα τῆς σφαίρας, παρακύψας καὶ ἰδὼν τὴν ἑαυτοῦ σκιὰν ᾔτει τὴν σφαῖραν. εἶτα πρὸς τὸν πατέρα κατηγόρει ὡς μὴ ἀπολαβὼν αὐτήν. ὁ δὲ προκύψας εἰς τὸ φρέαρ καὶ ἰδὼν τὴν ἑαυτοῦ σκιὰν [ᾔτει τὴν σφαῖραν]· Οἰκοδέσποτα, φησίν, ἀπόδος τῷ παιδὶ τὴν σφαῖραν.","num":"33","app":[{"unit":67,"id":"67","editors":[],"lemma":"ᾔτει","reading":"§SIG:A§ : ἤτοι utroque loco §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[99,103]},{"dirty":false,"span":[175,183],"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : παρακύψας §SIG:M§","lemma":"προκύψας","editors":[],"unit":68,"id":"68"},{"editors":["Thierfelder"],"lemma":"ᾔτει2 … σφαῖραν","unit":69,"id":"69","query":false,"span":[224,240],"dirty":false,"reading":"del. §SIG:Thierfelder§","sigla":["Thierfelder"]},{"dirty":false,"span":[243,254],"query":false,"sigla":["A","M"],"reading":": ἰκοδεσπότα §SIG:A§§SIG:M§","lemma":"Οἰκοδέσποτα","editors":[],"unit":70,"id":"70"},{"editors":[],"lemma":"τῷ","id":"71","unit":71,"query":false,"dirty":false,"span":[270,272],"reading":"§SIG:A§ : τὶ seu τὲ seu τὸ §SIG:M§","sigla":["A","M"]}],"label":"33","dawe":"33","n":33,"A":"33","wit":"AM"},{"num":"34","tr":"Uno §I§scholastikos §/I§che visitava un amico malato faceva domande sulla malattia. Poiché questi non rispondeva, si arrabbiò e disse: «Spero di ammalarmi anche io, e non ti risponderò».","type":"joke","text":"Σχολαστικὸς νοσοῦντα ἑταῖρον ἐπισκεπτόμενος ἠρώτα περὶ τῆς νόσου. τοῦ δὲ μὴ ἀποκρινομένου ὀργισθείς· Ἐλπίζω, εἶπε, κἀγὼ νοσῆσαι, καὶ οὐκ ἀποκρινοῦμαί σοι.","app":[{"unit":72,"id":"72","editors":[],"lemma":"ἐπισκεπτόμενος","reading":"§SIG:A§ : ἐπισκεπτόμενον §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[29,43]},{"sigla":["A","M"],"reading":"§SIG:M§ : εἶπεν §SIG:A§ac","span":[109,113],"dirty":false,"query":false,"unit":73,"id":"73","lemma":"εἶπε","editors":[]}],"label":"34; 5 β [et 2 γ?]","wit":"AM","dawe":"34","n":34,"A":"34"},{"A":"35","n":35,"dawe":"35","wit":"AM","label":"35; cf. 164 α","app":[{"unit":74,"id":"74","editors":[],"lemma":"Σχολαστικὸς","reading":"§SIG:M§ : χολαστικὸς §SIG:A§","sigla":["A","M"],"query":false,"span":[0,11],"dirty":false},{"reading":"§SIG:A§ : ἐμφῶτα §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[22,28],"unit":75,"id":"75","editors":[],"lemma":"ἀμφῶτα"},{"editors":[],"lemma":"ἐπίσσωσεν","id":"76","unit":76,"query":false,"span":[58,67],"dirty":false,"reading":"§SIG:A§ : ἐπίσωσεν §SIG:M§","sigla":["A","M"]},{"unit":77,"id":"77","editors":["Minas"],"lemma":"#","reading":"τοῦ δὲ πατρὸς αὐτοῦ §SIG:Minas§","sigla":["Minas"],"query":false,"span":null,"dirty":false}],"text":"Σχολαστικὸς κλεψιμαῖα ἀμφῶτα πριάμενος, ἵνα μὴ γνωσθῶσιν, ἐπίσσωσεν αὐτά.","type":"joke","tr":"Uno §I§scholastikos§/I§ comprò delle anfore rubate e, perché non fossero riconosciute, le impeciò.","num":"35"},{"label":"36","app":[{"dirty":false,"span":[72,77],"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : τινος §SIG:M§","lemma":"τινων","editors":[],"id":"78","unit":78},{"editors":[],"lemma":"Πάτερ εἶπεν","unit":79,"id":"79","query":false,"span":[116,128],"dirty":false,"reading":"§SIG:A§ : εἶπε πάτερ §SIG:M§","sigla":["A","M"]},{"editors":["Dawe"],"lemma":"ἀνθρώπου","unit":80,"id":"80","query":false,"dirty":false,"span":[177,185],"reading":"§SIG:A§ : ἔννου §SIG:Dawe§ : ἄνου exarat §SIG:M§","sigla":["A","Dawe","M"]},{"reading":"§SIG:M§ : εἴρηκεν §SIG:A§ac","sigla":["A","M"],"query":false,"dirty":false,"span":[216,222],"id":"81","unit":81,"editors":[],"lemma":"εἴρηκε"},{"sigla":["A","M","Minas"],"reading":"§SIG:Minas§ : ἔφησεν §SIG:A§§SIG:M§","dirty":false,"span":[231,234],"query":false,"id":"82","unit":82,"lemma":"ἔφη","editors":["Minas"]},{"editors":[],"lemma":"ἐκείνῳ","id":"83","unit":83,"query":false,"dirty":false,"span":[236,242],"reading":"§SIG:A§ : ἐκεῖνο §SIG:M§","sigla":["A","M"]}],"A":"36","n":36,"dawe":"36","wit":"AM","text":"Σχολαστικὸς τῶν ἀπαντώντων τὰ ἱμάτια ἐτιμᾶτο. τούτου δὲ τοῦ πατρὸς παρά τινων τοῦτο ἀκούσαντος καὶ ἐπιτιμῶνος αὐτῷ· Πάτερ, εἶπεν, ὑπὸ διαβολῆς πέπεισαι τοῦτο, καὶ ἴσως οὐδ’ ὑπὸ ἀνθρώπου. τοῦ δὲ εἰπόντος· Ὁ δεῖνά μοι εἴρηκε Καὶ σύ, ἔφη, ἐκείνῳ προσέχεις, ὃς οὐδὲ πεντήκοντα δραχμῶν ἱμάτιον ἔχει;","type":"joke","tr":"Uno §I§scholastikos§/I§ valutava il vestiario di quelli che incontrava. Quando suo padre, dopo aver sentito da alcuni ciò, lo rimproverava, disse: «Padre, sei stato convinto di ciò da calunnie, e forse nemmeno di persona”. Quello rispose: «Me l’ha detto il tale, e tu ascolti quello, che ha un mantello da nemmeno cinquanta dracme?!».","num":"36"},{"app":[{"id":"84","unit":84,"editors":["Thierfelder"],"lemma":"καταμανθάνοντος","reading":"§SIG:Thierfelder§ coll. 165α καταμαθόντος §SIG:A§§SIG:M§","sigla":["A","M","Thierfelder"],"query":false,"dirty":false,"span":[52,67]},{"editors":[],"lemma":"εἶπεν","id":"85","unit":85,"query":false,"span":[84,89],"dirty":false,"reading":"§SIG:A§ : εἶπε §SIG:M§","sigla":["A","M"]}],"label":"37; 6 β","wit":"AM","dawe":"37","A":"37","n":37,"num":"37","tr":"Uno §I§scholastikos§/I§ vendeva un cavallo. Poiché era giunto un tale e ne esaminava la dentatura, disse: «Perché osservi i suoi denti? Oh, se trottasse tanto quanto mangia!».","type":"joke","text":"Σχολαστικὸς ἵππον ἐπίπρασκεν. ἐλθόντος δέ τινος καὶ καταμανθάνοντος αὐτοῦ τὸν βόλον εἶπεν πρὸς αὐτόν· Τί τοὺς ὀδόντας αὐτοῦ καταμανθάνεις; εἴθε ὡς τρώγει, οὕτως καὶ περιεπάτει."},{"wit":"A","A":"38","n":38,"dawe":"38","label":"38","app":[],"num":"38","text":"Σχολαστικὸς πρεσβύτου πατρὸς σφόδρα νοσοῦντος τοὺς ἑταίρους ἠξίωσε στεφάνους φέρειν ἐπ’ ἐκφορᾷ. τῇ δὲ ἐπιούσῃ ἡμέρᾳ βέλτιον αὐτοῦ σχόντος, ὡς ἠγανάκτουν οἱ ἑταῖροι· Κἀγώ, ἔφη, αἰσχύνομαι ζημιουμένων ὑμῶν. αὔριον οὖν φέρετε τοὺς στεφάνους· τοῦτον γὰρ ὡς ἂν ἔχῃ ἐξοίσω.","tr":"Uno §I§scholastikos§/I§, essendo il padre molto malato, chiese agli amici di portare corone di fiori per il funerale. Ma poiché l’indomani quello stava meglio, e gli amici si erano arrabbiati, disse: «Anche io mi vergogno che voi ci abbiate rimesso. Domani dunque portate le corone: comunque starà, gli farò il funerale».","type":"joke"},{"text":"Σχολαστικοὶ δύο ὁμοῦ ἐβάδιζον. ἰδὼν οὖν ὁ ἕτερος αὐτῶν μέλαιναν ὄρνιν· Ἀδελφέ, φησίν, ἴσως ταύτης ὁ ἀλεκτρυὼν ἀπέθανεν.","tr":"Due §I§scholastikoi§/I§ camminavano insieme. Quando uno dei due, avendo visto una gallina nera, dice: «Fratello, forse il gallo di questa è morto!».","type":"joke","num":"39","n":39,"A":"39","dawe":"39","wit":"AM","label":"39; 37 β","app":[{"lemma":"ὁμοῦ","editors":[],"id":"86","unit":86,"span":[16,20],"dirty":false,"query":false,"sigla":["M"],"reading":"om §SIG:M§"},{"editors":["Minas"],"lemma":"ἕτερος","unit":87,"id":"87","query":false,"span":[42,48],"dirty":false,"reading":"§SIG:Minas§ : ἑταῖρος §SIG:A§","sigla":["A","Minas"]},{"span":[71,77],"dirty":false,"query":false,"sigla":["A","M"],"reading":"§SIG:M§ : ἀδελφε §SIG:A§","lemma":"Ἀδελφέ","editors":[],"unit":88,"id":"88"},{"lemma":"ἀλεκτρυὼν","editors":[],"id":"89","unit":89,"dirty":false,"span":[100,109],"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ἀλεκτρὼν §SIG:M§ac"}]},{"dawe":"40","A":"40","n":40,"wit":"AM","app":[{"unit":90,"id":"90","editors":["Boissonade","Dawe","Eberhard","Minas"],"lemma":"ἐξουσίαν","reading":"§SIG:Minas§ §SIG:Eberhard§ : ἀπουσίαν §SIG:A§§SIG:M§ : περιουσίαν §SIG:Boissonade§ : πλουσίαν ‹...› §SIG:Dawe§","sigla":["A","Boissonade","Dawe","Eberhard","M","Minas"],"query":false,"span":[87,95],"dirty":false}],"label":"40; 33 β","type":"joke","tr":"Uno §I§scholastikos§/I§ che aveva perso un figlio piccolo, dopo che ebbe visto che molti erano giunti al rito funebre per la sua autorità, disse: «Mi vergogno di portare un bimbo piccolo in una folla tanto grande».","text":"Σχολαστικὸς μικρὸν υἱὸν ἀπολέσας, θεασάμενος πολλοὺς ἐπὶ τὸ κῆδος ἀπαντήσαντας διὰ τὴν ἐξουσίαν αὐτοῦ ἔλεγεν· Αἰδοῦμαι μικρὸν παιδίον εἰς τοσοῦτον ὄχλον ἐκφέρων.","num":"40"},{"num":"41","type":"joke","tr":"Uno §I§scholastikos §/I§che vendeva una casa portava in giro una pietra di questa a mo’ di dimostrazione.","text":"Σχολαστικὸς οἰκίαν πωλῶν λίθον ἀπ’ αὐτῆς εἰς δεῖγμα περιέφερεν.","app":[{"editors":[],"lemma":"περιέφερεν","unit":91,"id":"91","query":false,"span":[52,62],"dirty":false,"reading":"§SIG:A§ : περιέφερε §SIG:M§","sigla":["A","M"]}],"label":"41; 10 β","wit":"AM","dawe":"41","n":41,"A":"41"},{"wit":"A","A":"42","n":42,"dawe":"42","label":"42; 137 α","app":[{"span":[28,279],"dirty":false,"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ἑτέρου...ἐρωτήσοντος §SIG:M§","lemma":"ἕτερος … ἐρωτήσας","editors":[],"id":"92","unit":92}],"num":"42","text":"Σχολαστικῶν δύο ὁδευόντων ὁ ἕτερος τῆς γαστρὸς ἀναγκαζούσης μικρὸν ἀπελείφθη. εὑρὼν δὲ ἐν τῷ μιλίῳ ἐπιγεγραμμένον παρὰ τοῦ ἑτέρου· Κατάλαβέ με ‹....›","type":"joke","tr":"Quando due §I§scholastikoi§/I§ erano in viaggio, uno, poiché la pancia incalzava, rimase un po’ indietro. Ma avendo trovato scritto dal compagno sul cippo miliario: «Raggiungimi‹…›»"},{"app":[{"reading":"§SIG:M§ : εἶπεν §SIG:A§ac","sigla":["A","M"],"query":false,"span":[150,154],"dirty":false,"id":"93","unit":93,"editors":[],"lemma":"εἶπε"},{"id":"94","unit":94,"lemma":"πύλης ἔρχεται","editors":["Eberhard"],"sigla":["Eberhard"],"reading":"‹αὐτός ἐπέγραψε· Καὶ σὺ μεῖνόν με› §SIG:Eberhard§ coll. 137α","dirty":false,"span":[209,222],"query":false}],"label":"43","wit":"AM","dawe":"43","n":43,"A":"43","num":"43","tr":"Uno §I§scholastikos§/I§, poiché aveva sentito da alcuni che gli stava venendo la barba, giunse alla porta e rimase lì ad aspettarla. Un altro, dopo aver chiesto e appreso la ragione, disse: «Giustamente siamo considerati fessi! Come sai se non arriva dall’atra porta?».","type":"joke","text":"Σχολαστικὸς ἀκούσας παρά τινων ὅτι Ὁ πώγων σου ἤδη ἔρχεται ἀπελθὼν εἰς τὴν πύλην ἐξεδέχετο αὐτόν. ἕτερος δὲ τὴν πρόφασιν ἐρωτήσας καὶ γνούς· Εἰκότως, εἶπε, μωροὶ νομιζόμεθα· πόθεν γὰρ οἶδας, εἰ διὰ τῆς ἑτέρας πύλης ἔρχεται;"},{"dawe":"44","A":"44","n":44,"wit":"AM","app":[{"span":[203,208],"dirty":false,"query":false,"sigla":["A","M","Minas"],"reading":"§SIG:Minas§ : ὀρθῶς §SIG:A§§SIG:M§","lemma":"ὀρθὸς","editors":["Minas"],"unit":95,"id":"95"}],"label":"44; 38 β","tr":"Di notte, uno §I§scholastikos§/I§ che dormiva col padre, dopo essersi alzato dal letto mangiucchiava grappoli d’uva appesi in alto. Dal momento che suo padre aveva nascosta una lucerna sotto una pentola, e aveva poi rivelato improvvisamente la luce, quando lo §I§scholastikos§/I§ si era alzato, questi, rimasto immobile in piedi, russava fingendo di dormire.","type":"joke","text":"Σχολαστικὸς μετὰ τοῦ πατρὸς καθεύδων, ἀνιστάμενος ἐπὶ τῆς κλίνης νυκτὸς ἔτρωγε σταφυλὰς ὑπεράνω κρεμαμένας. τοῦ δὲ πατρὸς αὐτοῦ ὑπὸ χύτραν λύχνον κρύψαντος, εἶτα, ὅτε ἀνέστη, τὸ φῶς ἄφνω δείξαντος, ὁ δὲ ὀρθὸς ἑστὼς ἔρεγχε καθεύδειν προσποιούμενος.","num":"44"},{"num":"44","tr":"Un amico che era in un viaggio all’estero scrisse ad uno §I§scholastikos§/I§ di acquistargli dei libri. Quello non se ne diede cura e, incontrato l’amico rientrato, disse: «La lettera che mi hai mandato a proposito dei libri, non l’ho ricevuta».","type":"joke","text":"Σχολαστικῷ ἑταῖρος ἀποδημῶν ἔγραψεν, ἵν’ αὐτῶν βιβλία πρίηται. ὁ δὲ ὀλιγωρήσας, ἐπανελθόντι αὐτῷ ἀπαντήσας· Τὴν ἐπιστολήν, εἶπεν, ἣν περὶ τῶν βιβλίων ἀπέστειλας, οὐκ ἐδεξάμην.","app":[{"span":[11,18],"dirty":false,"query":false,"sigla":["A","M","Minas"],"reading":"§SIG:Minas§ : ἕτερος §SIG:A§§SIG:M§","lemma":"ἑταῖρος","editors":["Minas"],"unit":96,"id":"96"}],"label":"44b","wit":"AM","dawe":"44b","n":45,"A":"45"},{"dawe":"45","n":46,"A":"46","wit":"AM","app":[{"reading":"§SIG:M§ : τοσούτους §SIG:A§ac","sigla":["A","M"],"query":false,"dirty":false,"span":[98,106],"unit":97,"id":"97","editors":[],"lemma":"τοσοῦτος"}],"label":"45; 14 β","type":"joke","tr":"Uno §I§scholastikos§/I§ di notte si era messo sopra la propria nonna. Dopo aver preso botte dal padre per questo motivo, disse: «Tu, è tanto tempo che monti mia madre, e non ti sei buscato nulla da me, e ora ti arrabbi per avermi trovato una volta con tua mamma?».","text":"Σχολαστικὸς νυκτὸς ἐπανέστη τῇ μάμμῃ ἑαυτοῦ. πληγὰς δὲ διὰ τοῦτο ὑπὸ τοῦ πατρὸς λαβών· Σύ, εἶπεν, τοσοῦτος χρόνος ἐστὶν ἐξ οὗ τὴν μητέρα μου ὀχεύεις, μηδὲν ὑπ’ ἐμοῦ παθών, καὶ νῦν ὀργίζῃ ἐπὶ τῇ μητρί σου ἅπαξ με εὑρών;","num":"45"},{"num":"46","tr":"Un amministratore disse ad uno §I§scholastikos§/I§ che il fiume aveva preso il suo podere. Quello allora gridò e rispose: «Ci hanno sabotato!».","type":"joke","text":"Σχολαστικῷ πραγματευτὴς ἀπήγγειλεν, ὅτι τὸ χωρίον αὐτοῦ ὁ ποταμὸς ἔλαβεν. ὁ δὲ ἀνακραγὼν ἀπεκρίνατο λέγων· Βιάζεται ἡμᾶς.","wit":"AM","dawe":"46","A":"47","n":47,"app":[{"sigla":["A","M"],"reading":"§SIG:A§ : ὅτου §SIG:M§","span":[36,39],"dirty":false,"query":false,"id":"98","unit":98,"lemma":"ὅτι","editors":[]},{"reading":"§SIG:A§ : ἀνακραγῶν §SIG:M§","sigla":["A","M"],"query":false,"span":[79,88],"dirty":false,"unit":99,"id":"99","editors":[],"lemma":"ἀνακραγὼν"}],"label":"46; 16 β"},{"tr":"Uno §I§scholastikos§/I§, trovandosi una volta nel podere, vide le greggi uscire al pascolo. E quando le vide come al solito belare, ne chiedeva la ragione. Quando l’amministratore gli disse per scherzo: «Ti salutano!», fece: «Per la mia salvezza! Per me, da’ loro le ferie e per tre giorni non portarle fuori al pascolo».","type":"joke","text":"Σχολαστικὸς διὰ χρόνου εἰς τὸν ἀγρὸν παραγενόμενος ἐθεάσατο τὰ θρέμματα ἐξιόντα ἐπὶ βόσκησιν. καὶ ὡς εἴωθε βληχώμενα ἰδὼν ἠρώτα τὴν αἰτίαν. τοῦ δὲ οἰκονόμου προσπαίξαντος καὶ εἰπόντος· Ἀσπάζονταί σε Τὴν ἐμήν σοι σωτηρίαν, φησίν, ἐμοῦ ἕνεκα ἀργίαν αὐτοῖς δὸς καὶ τρεῖς ἡμέρας μὴ ἐξαγάγῃς αὐτὰ εἰς νομήν.","num":"47","dawe":"47","n":48,"A":"48","wit":"AM","app":[{"unit":100,"id":"100","lemma":"χρόνου","editors":[],"sigla":["A","M"],"reading":"§SIG:A§ : χρόνον §SIG:M§","span":[16,22],"dirty":false,"query":false},{"lemma":"βληχώμενα","editors":["Dawe","Thierfelder"],"id":"101","unit":101,"span":[107,116],"dirty":false,"query":false,"sigla":["A","Dawe","M","Thierfelder"],"reading":"§SIG:Thierfelder§ : βληχόμενα §SIG:A§ : γλυκόμενα §SIG:M§ : γλυκυνόμενα §SIG:Dawe§"},{"lemma":"προσπαίξαντος","editors":["Dawe"],"unit":102,"id":"102","span":[157,170],"dirty":false,"query":false,"sigla":["A","Dawe","M"],"reading":"§SIG:A§§SIG:M§ : προσπαίζοντος §SIG:Dawe§"},{"reading":"§SIG:A§ : om. §SIG:M§ac add. §SIG:M§1","sigla":["A","M"],"query":false,"dirty":false,"span":[208,211],"id":"103","unit":103,"editors":[],"lemma":"σοι"},{"dirty":false,"span":[240,246],"query":false,"sigla":["M"],"reading":"ἀργίαν in ras. scr. §SIG:M§1","lemma":"ἀργίαν","editors":[],"id":"104","unit":104},{"sigla":["A","M"],"reading":"§SIG:A§ : αὐτῆ §SIG:M§","dirty":false,"span":[247,253],"query":false,"id":"105","unit":105,"lemma":"αὐτοῖς","editors":[]},{"query":false,"dirty":false,"span":[278,286],"reading":"§SIG:A§ : ἐξαγάγεις §SIG:M§","sigla":["A","M"],"editors":[],"lemma":"ἐξαγάγῃς","unit":106,"id":"106"}],"label":"47"},{"num":"48","tr":"Uno §I§scholastikos§/I§ indossò delle scarpe nuove. Siccome dunque stridevano, si fermò e disse: «Non cigolate, poiché vi romperete le gambe».","type":"joke","text":"Σχολαστικὸς καινὰ ὑποδήματα ὑπεδήσατο. Τριζόντων οὖν αὐτῶν ἐπισχών· Μὴ τρίζετε, εἶπεν, ἐπεὶ τὰ σκέλη ὑμῶν κλάσετε.","app":[{"editors":[],"lemma":"καινὰ","id":"107","unit":107,"query":false,"dirty":false,"span":[12,17],"reading":"§SIG:A§ : κενᾶ §SIG:M§","sigla":["A","M"]},{"editors":[],"lemma":"ὑπεδήσατο","unit":108,"id":"108","query":false,"dirty":false,"span":[28,37],"reading":"§SIG:A§ : ὑποδήσατο §SIG:M§","sigla":["A","M"]},{"query":false,"span":[49,58],"dirty":false,"reading":"in ras. scr. §SIG:M§1","sigla":["M"],"editors":[],"lemma":"οὖν αὐτῶν","unit":109,"id":"109"},{"editors":["Minas"],"lemma":"τρίζετε","unit":110,"id":"110","query":false,"dirty":false,"span":[71,78],"reading":"§SIG:Minas§ : τρίζεται §SIG:A§§SIG:M§","sigla":["A","M","Minas"]},{"lemma":"ὑμῶν","editors":[],"id":"111","unit":111,"span":[101,105],"dirty":false,"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ἡμῶν §SIG:M§"},{"query":false,"span":[106,113],"dirty":false,"reading":"§SIG:Minas§ (sec. §SIG:Thierfelder§) : κλάσητε §SIG:A§§SIG:M§ : ὀκλάζεται (cum ἡμῶν §SIG:M§) §SIG:Dawe§","sigla":["A","Dawe","M","Minas","Thierfelder"],"editors":["Dawe","Minas","Thierfelder"],"lemma":"κλάσετε","unit":112,"id":"112"}],"label":"48","wit":"AM","dawe":"48","n":49,"A":"49"},{"num":"49","type":"joke","tr":"Uno §I§scholastikos§/I§ vedendo la luna chiedeva al padre se anche nelle altre città ci fossero lune tali.","text":"Σχολαστικὸς τὴν σελήνην ἰδὼν ἐπυνθάνετο τοῦ πατρός, εἰ καὶ ἐν ταῖς ἄλλαις πόλεσιν τοιαῦται σελῆναί εἰσιν.","app":[{"lemma":"ἐν","editors":[],"id":"113","unit":113,"dirty":false,"span":[59,61],"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : om. §SIG:M§"},{"editors":[],"lemma":"πόλεσιν","id":"114","unit":114,"query":false,"span":[74,81],"dirty":false,"reading":"§SIG:A§ : πολέσι §SIG:M§","sigla":["A","M"]},{"reading":"§SIG:A§ : εἰσί §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[99,104],"unit":115,"id":"115","editors":[],"lemma":"εἰσιν"}],"label":"49; 18 β","wit":"AM","dawe":"49","A":"50","n":50},{"num":"50","type":"joke","tr":"Un prestasoldi §I§scholastikos §/I§prescriveva ad un armatore con lui indebitato di portare un sarcofago per lui, e due da bambini per i suoi figlioletti di otto anni, della misura giusta adatta alla loro crescita.","text":"Σχολαστικὸς δανειστὴς ναυκλήρῳ χρεώστῃ ἐνετέλλετο σορὸν αὐτῷ κομίσαι καὶ δύο παιδικὰς τοῖς ὀκταέτεσι παιδίοις αὐτοῦ, δικαίου μέτρου ὡς εἰς αὔξησιν.","app":[{"span":[31,38],"dirty":false,"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : χρεώστης §SIG:M§","lemma":"χρεώστῃ","editors":[],"id":"116","unit":116},{"editors":[],"lemma":"αὐτῷ","id":"117","unit":117,"query":false,"dirty":false,"span":[56,60],"reading":"§SIG:A§ : σωρὸν αὐτὸ §SIG:M§","sigla":["A","M"]},{"id":"118","unit":118,"lemma":"παιδικὰς","editors":["Kurtz"],"sigla":["A","Kurtz","M"],"reading":"§SIG:Kurtz§ : παιδίσκας §SIG:A§§SIG:M§","dirty":false,"span":[77,85],"query":false},{"id":"119","unit":119,"lemma":"μέτρου","editors":[],"sigla":["A","M"],"reading":"§SIG:A§ : μέτρον §SIG:M§","span":[125,131],"dirty":false,"query":false}],"label":"50; 20 β","wit":"AM","dawe":"50","A":"51","n":51},{"n":52,"A":"52","dawe":"51","wit":"AM","label":"51","app":[{"span":[56,58],"dirty":false,"query":false,"sigla":["Dawe"],"reading":"del. §SIG:Dawe§","lemma":"ἦν","editors":["Dawe"],"id":"120","unit":120},{"lemma":"ἐντεῦθεν","editors":[],"unit":121,"id":"121","span":[126,134],"dirty":false,"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ἐνταῦθα §SIG:M§"},{"reading":"§SIG:A§ : τοσούτου §SIG:M§pc","sigla":["A","M"],"query":false,"dirty":false,"span":[188,196],"id":"122","unit":122,"editors":[],"lemma":"τοσούτου"}],"text":"Σχολαστικὸς ἰδὼν ἐν τῷ ἀγρῷ αὐτοῦ φρέαρ ἠρώτα, εἰ καλὸν ἦν τὸ ὕδωρ. τῶν δὲ γεωργῶν εἰπόντων, ὅτι Καλόν· καὶ γὰρ οἱ γονεῖς σου ἐντεῦθεν ἔπινον Καὶ πηλίκους, φησίν, εἶχον τραχήλους, ἵνα ἀπὸ τοσούτου βάθους πίνειν ἐδύναντο;","tr":"Uno §I§scholastikos§/I§ vide un pozzo nel proprio campo e chiedeva se l’acqua fosse buona. I contadini dissero che era buona, «E infatti i tuoi genitori bevevano da lì», e disse: «E avevano colli di quale taglia, perché potessero bere da una profondità tanto grande?».","type":"joke","num":"51"},{"app":[{"unit":123,"id":"123","lemma":"λάκκον","editors":[],"sigla":["A","M"],"reading":"§SIG:A§ : βάθος §SIG:M§","dirty":false,"span":[16,22],"query":false},{"dirty":false,"span":[107,117],"query":false,"sigla":["A","M"],"reading":": μωρὸς εἰμὶ §SIG:A§§SIG:M§","lemma":"Μωρός εἰμι","editors":[],"id":"124","unit":124},{"sigla":["A","M"],"reading":"coll. β 21 : αὐτῷ §SIG:M§ : αὐτό §SIG:A§","dirty":false,"span":[156,160],"query":false,"id":"125","unit":125,"lemma":"οὕτω","editors":[]}],"label":"52; 21 β","dawe":"52","n":53,"A":"53","wit":"AM","tr":"Uno §I§scholastikos§/I§ caduto in una cisterna, gridava di continuo chiamando per sé dei soccorritori. Ma poiché nessuno lo ascoltava, disse a sé stesso: «Sono un fesso, se non risalgo e li frusto tutti, perché almeno così mi ascoltino e mi portino una scala!».","type":"joke","text":"Σχολαστικὸς εἰς λάκκον πεσὼν συνεχῶς ἐβόα ἀνακαλῶν ἑαυτῷ βοηθούς. ὡς δ’ οὐδεὶς ὑπήκουε, λέγει πρὸς ἑαυτόν· Μωρός εἰμι, ἐὰν μὴ ἀνελθὼν πάντας μαστιγώσω, ἵνα οὕτω γοῦν μοι ὑπακούσωσι καὶ κλίμακα κομίσωσιν.","num":"52"},{"label":"53","app":[{"lemma":"Σύ","editors":["Eberhard"],"id":"126","unit":126,"span":[12,14],"dirty":false,"query":false,"sigla":["A","Eberhard","M"],"reading":"§SIG:Eberhard§ : εὖ §SIG:A§§SIG:M§"},{"unit":127,"id":"127","editors":[],"lemma":"μητέρα","reading":"§SIG:A§ : μητέραν §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[145,151]}],"wit":"AM","A":"54","n":54,"dawe":"53","num":"53","text":"Σχολαστικὸς συνδειπνῶν τῷ πατρὶ παρακειμένης θριδακίνης μεγάλης καὶ ἐχούσης πολλοὺς θύρσους καλούς· Σύ, πάτερ, ἔφη, φάγε τὰ τέκνα, καὶ ἡμεῖς τὴν μητέρα.)","tr":"Uno §I§scholastikos§/I§ che pranzava col padre, visto che c’era un grde cespo di lattuga che aveva molte belle puntarelle, disse: «Tu, padre, mangia i figli, e noi mangiamo la madre».","type":"joke"},{"type":"joke","tr":"Uno §I§scholastikos§/I§ che scriveva al padre da Atene vantandosi del fatto che era stato istruito/aveva compiuto gli studi, aggiunse: «Prego di trovarti con un processo capitale, affinché io ti mostri l’avvocato che sono!».","text":"Σχολαστικὸς γράφων πρὸς τὸν πατέρα ἀπὸ τῶν Ἀθηνῶν καὶ ἐναβρυνόμενος, ὅτι πεπαίδευται, προσέθηκεν· Εὔχομαι δέ σε εὑρεῖν κεφαλικὴν ἔχοντα δίκην, ἵνα σοι δείξω τὸν ῥήτορα.","num":"54","app":[{"dirty":false,"span":[54,67],"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ἐν ἀμβρυνόμενος§SIG:M§","lemma":"ἐναβρυνόμενος","editors":[],"unit":128,"id":"128"},{"editors":["Minas"],"lemma":"κεφαλικὴν","id":"129","unit":129,"query":false,"span":[119,128],"dirty":false,"reading":"§SIG:Minas§ : κεφαληκὴν §SIG:A§","sigla":["A","Minas"]},{"editors":["Minas"],"lemma":"ἔχοντα","id":"130","unit":130,"query":false,"dirty":false,"span":[129,135],"reading":"§SIG:A§§SIG:M§ : φεύγοντα §SIG:Minas§","sigla":["A","M","Minas"]}],"label":"54","dawe":"54","n":55,"A":"55","wit":"AM"},{"num":"55","text":"Σχολαστικὸς εὐτράπελος ἀπορῶν δαπανημάτων τὰ βιβλία ἑαυτοῦ ἐπίπρασκε· καὶ γράφων πρὸς τὸν πατέρα ἔλεγε· Σύγχαιρε ἡμῖν, ἤδη γὰρ ἡμᾶς τὰ βιβλία τρέφει.","type":"joke","tr":"Uno §I§scholastikos§/I§ buontempone essendo privo di denaro vendeva i propri libri, e scrivendo al padre diceva: «Rallegrati per noi, infatti già ci sfamano i libri/già viviamo dei nostri libri».","wit":"AM","n":56,"A":"56","dawe":"55","label":"55; 31 β","app":[]},{"type":"joke","tr":"Uno §I§scholastikos§/I§, un pelato e un barbiere che viaggiavano insieme e che si erano fermati in un posto isolato, stabilirono fare dei turni di veglia per quattro ore e di sorvegliare i bagagli di ciascuno. Poiché al barbiere toccò per primo di vigilare, volendo distrarsi rasò per primo lo §I§scholastikos§/I§ mentre dormiva, e dopo che furono passate le ore, lo svegliò. Lo §I§scholastikos§/I§ però, accarezzandosi la testa (come si fa) dopo il sonno, si trovò calvo e disse: «Gran canaglia il barbiere! Si è sbagliato e invece di me ha svegliato il pelato!».","text":"Σχολαστικὸς καὶ φαλακρὸς καὶ κουρεὺς συνοδεύοντες καὶ ἔν τινι ἐρημίᾳ μείναντες συνέθεντο πρὸς τέσσαρας ὥρας ἀγρυπνῆσαι καὶ τὰ σκεύη ἕκαστος τηρῆσαι. ὡς δὲ ἔλαχε τῷ κουρεῖ πρώτῳ φυλάξαι, μετεωρισθῆναι θέλων τὸν σχολαστικὸν καθεύδοντα ἔξυρεν καὶ τῶν ὡρῶν πληρωθεισῶν διύπνισεν. ὁ δὲ σχολαστικὸς ψήχων ὡς ἀπὸ ὕπνου τὴν κεφαλὴν καὶ εὑρὼν ἑαυτὸν ψιλόν· Μέγα κάθαρμα, φησίν, ὁ κουρεύς· πλανηθεὶς γὰρ ἀντ’ ἐμοῦ τὸν φαλακρὸν ἐξύπνισεν.","num":"56","app":[{"unit":131,"id":"131","lemma":"ὡρῶν","editors":[],"sigla":["A","M"],"reading":"§SIG:M§ : ὁρῶν §SIG:A§","dirty":false,"span":[248,252],"query":false},{"unit":132,"id":"132","lemma":"πληρωθεισῶν","editors":[],"sigla":["A","M"],"reading":"§SIG:A§ : πληρωθησῶν §SIG:M§","dirty":false,"span":[253,264],"query":false},{"editors":[],"lemma":"διύπνισεν","id":"133","unit":133,"query":false,"span":[265,274],"dirty":false,"reading":"§SIG:A§ : δι’ ὕπνησεν §SIG:M§","sigla":["A","M"]},{"reading":"§SIG:A§ : ψύχων §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[293,298],"unit":134,"id":"134","editors":[],"lemma":"ψήχων"},{"dirty":false,"span":[341,346],"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ψηλὸν §SIG:M§","lemma":"ψιλόν","editors":[],"unit":135,"id":"135"},{"reading":"§SIG:A§ : κουρεύς §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[369,378],"unit":136,"id":"136","editors":[],"lemma":"ὁ κουρεύς"}],"label":"56; 23 β","dawe":"56","n":57,"A":"57","wit":"AM"},{"num":"57","type":"joke","tr":"Il padre consigliava ad uno §I§scholastikos§/I§ che stava per avere un figlio da una schiava, di uccidere il bambino. Quello allora disse: «Per prima cosa sotterra i tuoi figli, e solo allora consigliami di ammazzare il mio».","text":"Σχολαστικῷ ἐκ δούλης τεκνώσαντι ὁ πατὴρ συνεβούλευε τὸ παιδίον ἀποκτεῖναι. ὁ δέ· Πρῶτον, ἔφη, σὺ τὰ τέκνα σου κατόρυξον, καὶ οὕτως ἐμοὶ συμβούλευε τὸν ἐμὸν ἀνελεῖν.","wit":"A","dawe":"57","n":58,"A":"58","app":[{"query":false,"span":[136,146],"dirty":false,"reading":"§SIG:Minas§ : συνεβούλευε §SIG:A§","sigla":["A","Minas"],"editors":["Minas"],"lemma":"συμβούλευε","unit":137,"id":"137"},{"dirty":false,"span":[147,155],"query":false,"sigla":["A","Boissonade","Eberhard"],"reading":"§SIG:A§ : τὸ ἐμὸν §SIG:Boissonade§ : τοὐμὸν §SIG:Eberhard§ io accetterei (preferibilmente) Eberhard, ton è maschile!","lemma":"τὸν ἐμὸν","editors":["Boissonade","Eberhard"],"id":"138","unit":138}],"label":"57"},{"tr":"Un inserviente dei bagni versava acqua calda sui piedi di uno §I§scholastikos §/I§che era entrato alle terme. Quello allora disse: «Canaglia, versi acqua calda su un uomo freddo?!».","type":"joke","text":"Σχολαστικοῦ εἰς βαλανεῖον εἰσελθόντος παραχύτης θερμὸν τοῖς ποσὶ προσέχεεν. ὁ δέ· Κάθαρμα, εἶπε, ψυχρῷ ἀνθρώπῳ θερμὸν προσχεῖς;","num":"58","dawe":"58","n":59,"A":"59","wit":"AM","app":[{"unit":139,"id":"139","lemma":"Σχολαστικοῦ … παραχύτης","editors":[],"sigla":["A","M"],"reading":"§SIG:A§§SIG:M§ : Σχολαστικὸς ... εἰσελθὼν, ὁ παραχύτης","dirty":false,"span":[0,47],"query":false},{"id":"140","unit":140,"lemma":"ψυχρῷ … προσχεῖς","editors":[],"sigla":["M"],"reading":"leggi bene cosa c’è in §SIG:M§","span":[97,126],"dirty":false,"query":false},{"unit":141,"id":"141","editors":["Thierfelder"],"lemma":"θερμὸν","reading":"del. §SIG:Thierfelder§","sigla":["Thierfelder"],"query":false,"dirty":false,"span":[48,54]}],"label":"58"},{"label":"59","app":[{"id":"142","unit":142,"editors":["Dawe"],"lemma":"ἕωλον σιτευτὴν","reading":"§SIG:A§ : ἕαλον σιτευτὴν §SIG:M§ : σιτευτὴν ἕωλον §SIG:Dawe§","sigla":["A","Dawe","M"],"query":false,"span":[43,57],"dirty":false},{"lemma":"θῦσον","editors":[],"id":"143","unit":143,"span":[117,122],"dirty":false,"query":false,"sigla":["A","M"],"reading":": θῦσον §SIG:A§§SIG:M§"}],"A":"60","n":60,"dawe":"59","wit":"AM","text":"Σχολαστικὸς ἀκούσας τινός, ὅτι καλὴν ὄρνιν ἕωλον σιτευτὴν ἐδείπνησε, προσελθὼν τῷ σιτευταρίῳ ἔλεγεν· Ἕωλον μοι ὄρνιν θῦσον.","type":"joke","tr":"Uno §I§scholastikos§/I§ sentì un tale che aveva pranzato con una gallina allevata avanzata dal giorno prima e, giunto dall’allevatore diceva: «Cuocimi una gallina di ieri».","num":"59"},{"text":"Σχολαστικὸς ἀπὸ πολλῶν μιλίων χωρίον ἔχων, ἵν’ αὐτὸ ἐγγύτερον ποιήσῃ, ἑπτὰ μίλια κατέβαλεν.","type":"joke","tr":"Uno §I§scholastikos§/I§ che aveva un terreno a molte miglia, per renderlo più vicino abbatté sette miglia.","num":"60","label":"60","app":[{"query":false,"dirty":false,"span":[47,51],"reading":"§SIG:A§ : αὐτὸς §SIG:M§","sigla":["A","M"],"editors":[],"lemma":"αὐτὸ","unit":144,"id":"144"},{"reading":"§SIG:A§ : ποιήσει §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[62,68],"id":"145","unit":145,"editors":[],"lemma":"ποιήσῃ"},{"sigla":["A","M","Thierfelder"],"reading":"§SIG:A§§SIG:M§ : μιλιάρια fort. §SIG:Thierfelder§","span":[75,80],"dirty":false,"query":false,"id":"146","unit":146,"lemma":"μίλια","editors":["Thierfelder"]}],"A":"61","n":61,"dawe":"60","wit":"AM"},{"type":"joke","tr":"Un maestro elementare §I§scholastikos §/I§alzò improvvisamente lo sguardo in un angolo e gridò: «Dionisio è indisciplinato nell’angolo!». Ma uno gli disse che non c’era ancora, e allora quello fece: «Quando arriverà».","text":"Σχολαστικὸς χαμαιδιδάσκαλος ἄφνω ἀποβλέψας εἰς τὴν γωνίαν ἐβόησε· Διονύσιος ἐν τῇ γωνίᾳ ἀτακτεῖ. εἰπόντος δέ τινος, ὅτι οὔπω πάρεστιν, ὁ δὲ ἔφη· Ὅταν ἔλθῃ.","num":"61","dawe":"61","n":62,"A":"62","wit":"AM","app":[{"unit":147,"id":"147","editors":["Minas"],"lemma":"χαμαιδιδάσκαλος","reading":"§SIG:Minas§ : χαμαὶ διδάσκαλος §SIG:A§§SIG:M§","sigla":["A","M","Minas"],"query":false,"dirty":false,"span":[12,27]},{"sigla":["A","M"],"reading":"§SIG:A§ : om. §SIG:M§","span":[58,87],"dirty":false,"query":false,"unit":148,"id":"148","lemma":"ἐβόησε· … γωνίᾳ","editors":[]},{"lemma":"ἔλθῃ","editors":[],"unit":149,"id":"149","span":[150,154],"dirty":false,"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ἔλθοι §SIG:M§"}],"label":"61"},{"app":[{"reading":"§SIG:Minas§ : ἐταιρίδι §SIG:A§","sigla":["A","Minas"],"query":false,"span":[15,22],"dirty":false,"unit":150,"id":"150","editors":["Minas"],"lemma":"ἐτηρίδι"},{"query":false,"dirty":false,"span":[76,79],"reading":"del. §SIG:Dawe§","sigla":["Dawe"],"editors":["Dawe"],"lemma":"καὶ","id":"151","unit":151}],"label":"62","wit":"A","dawe":"62","A":"63","n":63,"num":"62","type":"joke","tr":"Uno §I§scholastikos§/I§ alla festa che ogni mille anni si tiene a Roma vide un atleta che era stato sconfitto e che piangeva, e consolandolo disse: «Non abbatterti, tu vincerai alla celebrazione del prossimo millenario».","text":"Σχολαστικὸς τῇ ἐτηρίδι, ἣ διὰ χιλίων ἐτῶν ἄγεται ἐν Ῥώμῃ, ἡττηθέντα ἀθλητὴν καὶ δακρύοντα ἰδών, παραμυθούμενος· Μὴ λυποῦ, ἔφη, τὴν γὰρ ἄλλην χιλιετηρίδα σὺ νικήσεις."},{"n":64,"A":"64","dawe":"63","wit":"AM","label":"63","app":[{"sigla":["A","M"],"reading":"§SIG:A§ : ἡγεμῶνι §SIG:M§","dirty":false,"span":[23,30],"query":false,"unit":152,"id":"152","lemma":"ἡγεμόνι","editors":[]},{"span":[46,51],"dirty":false,"query":false,"sigla":["A","M","Minas"],"reading":": ἑώραν §SIG:Minas§ : εώραν §SIG:A§ : ὥραν §SIG:M§","lemma":"ἐώραν","editors":["Minas"],"unit":153,"id":"153"},{"span":[52,55],"dirty":false,"query":false,"sigla":["A","M"],"reading":"§SIG:M§ : οὖν οὖν §SIG:A§","lemma":"οὖν","editors":[],"id":"154","unit":154},{"unit":155,"id":"155","editors":["Eberhard"],"lemma":"τὰς","reading":"(o add.: scegli omogeneo!) §SIG:Eberhard§","sigla":["Eberhard"],"query":false,"dirty":false,"span":[90,93]},{"reading":"§SIG:A§ : ἐπανερχόμεθα §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[137,149],"unit":156,"id":"156","editors":[],"lemma":"ἐπανερχώμεθα"},{"sigla":["A","M"],"reading":"§SIG:A§ : τἄλλα §SIG:M§","dirty":false,"span":[161,168],"query":false,"id":"157","unit":157,"lemma":"τὰ ἄλλα","editors":[]}],"text":"Σχολαστικὸς συνεκάθητο ἡγεμόνι δεξιοπήρῳ. εἰς ἐώραν οὖν ἐξελθόντος αὐτοῦ καὶ ἐπαινοῦντος ‹τὰς› ἐν τοῖς ἀριστεροῖς μέρεσιν ἀμπέλους· Ὅταν ἐπανερχώμεθα, φησί, καὶ τὰ ἄλλα μέρη ἀρέσει σοι.","type":"joke","tr":"Uno §I§scholastikos §/I§era con un governatore cieco all’occhio destro. Quando questi era uscito per una passeggiata e lodava le viti negli appezzamenti a sinistra, disse: «Quando torneremo indietro ti piacerà anche l’altra parte».","num":"63"},{"wit":"A","dawe":"64","n":65,"A":"65","app":[{"query":false,"span":[29,36],"dirty":false,"reading":"§SIG:A§ : ἐπειδὴ §SIG:Eberhard§","sigla":["A","Eberhard"],"editors":["Eberhard"],"lemma":"ἐπεὶ δὲ","unit":158,"id":"158"},{"unit":159,"id":"159","editors":["Boissonade"],"lemma":"ἐδρωπακίσατο","reading":"§SIG:Boissonade§ : ἐδροπακίσατο §SIG:A§","sigla":["A","Boissonade"],"query":false,"span":[67,79],"dirty":false},{"lemma":"ἐπεὶ δὲ","editors":["Eberhard"],"id":"160","unit":160,"span":[29,36],"dirty":false,"query":false,"sigla":["A","Eberhard"],"reading":"§SIG:Eberhard§ : ἐπειδή §SIG:A§"}],"label":"64; 25 β","num":"64","type":"joke","tr":"Uno §I§scholastikos§/I§ comprò delle brache e, siccome le indossò a fatica dato che erano strette, si depilò.","text":"Σχολαστικὸς βράκας ἀγοράσας, ἐπεὶ δὲ στενὰς οὔσας μόγις ὑπεδύσατο, ἐδρωπακίσατο."},{"dawe":"65","A":"66","n":66,"wit":"AM","app":[{"editors":[],"lemma":"ἐλεύσεσθαι","id":"161","unit":161,"query":false,"dirty":false,"span":[99,109],"reading":"§SIG:A§ : ὀλέσθαι §SIG:M§","sigla":["A","M"]}],"label":"65; 35 β","type":"joke","tr":"Il figlio di uno §I§scholastikos§/I§, inviato dal padre in guerra, promise che avrebbe fatto ritorno avendo la testa di un nemico. L’altro disse: «Anche se dovessi vedere te fare ritorno senza testa, mi rallegrerò».","text":"Σχολαστικοῦ υἱὸς ὑπὸ τοῦ πατρὸς εἰς τὸν πόλεμον ἐκπεμπόμενος ὑπέσχετο κεφαλὴν ἑνὸς τῶν ἐχθρῶν ἔχων ἐλεύσεσθαι. ὁ δὲ ἔφη· Κἂν χωρίς σε κεφαλῆς ἐλθόντα ἴδω, εὐφρανθήσομαι.","num":"65"},{"app":[{"editors":[],"lemma":"ἁλιάδα","id":"162","unit":162,"query":false,"span":[33,39],"dirty":false,"reading":"§SIG:A§ : ἁλιᾶ §SIG:M§","sigla":["A","M"]},{"unit":163,"id":"163","editors":[],"lemma":"βεβαρημένην","reading":"§SIG:A§ : βεβαρυμένην §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[57,68]},{"span":[99,105],"dirty":false,"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : αὐξήσει §SIG:M§","lemma":"αὐξήσῃ","editors":[],"unit":164,"id":"164"}],"label":"66","wit":"AM","dawe":"66","n":67,"A":"67","num":"66","type":"joke","tr":"Uno §I§scholastikos§/I§ vide un battello in un fiume pieno di provviste e appesantito e disse: «Se il fiume dovesse crescere un po’, sarà sommersa!».","text":"Σχολαστικὸς ἐν ποταμῷ θεασάμενος ἁλιάδα σίτου μεστὴν καὶ βεβαρημένην· Ἐὰν μικρόν, εἶπεν, ὁ ποταμὸς αὐξήσῃ, βυθισθήσεται."},{"wit":"AM","n":68,"A":"68","dawe":"67","label":"67","app":[{"query":false,"dirty":false,"span":[25,37],"reading":": ἐπανερχόμενος §SIG:Eberhard§ : ἀνερχόμενος §SIG:Boissonade§ : ἐξερχομένῳ §SIG:A§ : ἐξερχόμενος §SIG:M§","sigla":["A","Boissonade","Eberhard","M"],"editors":["Boissonade","Eberhard"],"lemma":"ἐπανερχομένῳ","unit":165,"id":"165"},{"span":[86,93],"dirty":false,"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : πράττει §SIG:M§","lemma":"πράττοι","editors":[],"unit":166,"id":"166"},{"span":[94,99],"dirty":false,"query":false,"sigla":["A","M","Minas"],"reading":"§SIG:Minas§ : ἑαυτοῦ §SIG:A§§SIG:M§","lemma":"αὐτοῦ","editors":["Minas"],"unit":167,"id":"167"},{"editors":[],"lemma":"κατώρυξεν","unit":168,"id":"168","query":false,"span":[188,197],"dirty":false,"reading":"§SIG:A§ : κατώρυξε §SIG:M§","sigla":["A","M"]},{"unit":169,"id":"169","lemma":"οὐκ","editors":["Eberhard"],"sigla":["A","Eberhard"],"reading":"§SIG:A§ : οὐκέτι dub. §SIG:Eberhard§","span":[185,189],"dirty":false,"query":false}],"num":"67","text":"Σχολαστικὸς ἐξ ἀποδημίας ἐπανερχομένῳ τῷ πενθερῷ ἀπαντήσας, πυνθανομένου ἐκείνου, πῶς πράττοι αὐτοῦ ὁ συμφοιτητής, ὁ δέ· Πάνυ, ἔφη, αὐτῷ καλῶς ἐστι νῦν καὶ εὐθυμεῖ· τὸν γὰρ πενθερὸν αὐτοῦ κατώρυξεν.","tr":"Uno §I§scholastikos§/I§ incontrò il suocero che tornava da un viaggio, e quando quello gli chiese come stesse un suo compagno di scuola, disse: «Le cose gli vanno davvero bene, ed è sereno: ha infatti seppellito suo suocero!».","type":"joke"},{"num":"68","type":"joke","tr":"Uno §I§scholastikos§/I§ compose un’orazione per un tale e ne diede una lettura pubblica in anteprima. Quando un suo assistito disse che faceva una cosa insensata a rendere manifesti gli aspetti segreti del processo agli avversari, disse: «Disgraziato, forse che non dovrei leggerne gli elementi essenziali?».","text":"Σχολαστικὸς γράψας δίκην ὑπέρ τινος, δημοσίᾳ προανεγίνωσκε. τοῦ δὲ συνηγορουμένου εἰπόντος, ὅτι ἄτοπον ποιεῖ τὰ ἀπόρρητα τῆς δίκης τοῖς ἀντιδίκοις φανερὰ ποιῶν· Κάθαρμα, εἶπε, μὴ γάρ τι τῶν συνεκτικῶν λέγω;","wit":"AM","dawe":"68","n":69,"A":"69","app":[{"query":false,"dirty":false,"span":[19,29],"reading":": δίκην ὑπέρ §SIG:Minas§ : διαθήκην ὑπό §SIG:A§§SIG:M§","sigla":["A","M","Minas"],"editors":["Minas"],"lemma":"δίκην ὑπέρ","id":"170","unit":170},{"sigla":["A","Eberhard","M"],"reading":"§SIG:A§§SIG:M§ : ἄτοπόν ‹τι› §SIG:Eberhard§","span":[96,102],"dirty":false,"query":false,"id":"171","unit":171,"lemma":"ἄτοπον","editors":["Eberhard"]}],"label":"68"},{"dawe":"69","n":70,"A":"70","wit":"AM","app":[{"lemma":"ὀδυρομένου","editors":[],"unit":172,"id":"172","dirty":false,"span":[81,91],"query":false,"sigla":["A","M"],"reading":"§SIG:M ndo la moglie di questi gli disse che era ormai di là, lo §I§scholastikos§/I§, rispose: «Bene, se ritorna, gli dirai che sono venuto».","text":"Σχολαστικὸς νοσοῦντα φίλον ἀπῆλθεν ἐπισκέψασθαι. τῆς γυναικὸς δ’ αὐτοῦ εἰπούσης, ὅτι ἐκεῖνος ἤδη ἔξω ἐστίν· Ἐὰν οὖν ἐπανέλθῃ, φησίν, ἐρεῖς παραγεγενῆσθαί με."},{"dawe":"71","n":72,"A":"72","wit":"A","app":[{"editors":["Dawe"],"lemma":"ἀκρόπτυχα","unit":179,"id":"179","query":false,"dirty":false,"span":[54,63],"reading":"§SIG:A§ : ἀβρόπτυχα §SIG:Dawe§","sigla":["A","Dawe"]},{"id":"180","unit":180,"editors":["Dawe"],"lemma":"εἰσκομίσαι","reading":"§SIG:A§ : ἴσα κομίσασθαι §SIG:Dawe§","sigla":["A","Dawe"],"query":false,"span":[64,74],"dirty":false},{"sigla":["Minas","Thierfelder"],"reading":"del. §SIG:Thierfelder§ : ζητήσας §SIG:Minas§","dirty":false,"span":[76,83],"query":false,"unit":181,"id":"181","lemma":"ζητῆσαι","editors":["Minas","Thierfelder"]},{"editors":["Eberhard"],"lemma":"ποῖόν … ποῖον","id":"182","unit":182,"query":false,"span":[97,126],"dirty":false,"reading":"§SIG:A§ : πότερον utrubique §SIG:Eberhard§","sigla":["A","Eberhard"]},{"reading":"§SIG:Minas§ : Ἀρτέμην §SIG:A§","sigla":["A","Minas"],"query":false,"dirty":false,"span":[19,23],"unit":183,"id":"183","editors":["Minas"],"lemma":"μάλ"},{"lemma":"ἡδέως","editors":[],"unit":184,"id":"184","span":null,"dirty":false,"query":false,"sigla":["A"],"reading":": μάλα §SIG:A§"}],"label":"71","type":"joke","tr":"Uno §I§scholastikos, §/I§pur avendo preso un modello di lunghezza e larghezza per comprare tessuti, continuava a chiedere quale fosse la lunghezza e quale la larghezza.","text":"Σχολαστικὸς ὑπόδειγμα λαβὼν μήκους καὶ πλάτους ἐπὶ τῷ ἀκρόπτυχα εἰσκομίσαι [ζητῆσαι] ἐπυνθάνετο, ποῖόν ἐστι τὸ μῆκος καὶ ποῖον τὸ πλάτος.","num":"71"},{"app":[],"label":"72","dawe":"72","n":73,"A":"73","wit":"A","tr":"Uno §I§scholastikos§/I§ mangiò ad un banchetto nuziale e, quando se ne stava andando, disse: «Vi auguro di celebrare questi banchetti con felicità e ripetutamente!».","type":"joke","text":"Σχολαστικὸς ἐν γάμοις ἑστιαθεὶς εἶτα ἀναχωρῶν· Εὔχομαι, εἶπεν, εὐτυχῶς καὶ ἀεὶ ταῦτα ὑμᾶς ποιεῖν.","num":"72"},{"app":[{"query":false,"dirty":false,"span":[11,21],"reading":"§SIG:Thierfelder§ : Σκριβονίας","sigla":["Thierfelder"],"editors":["Thierfelder"],"lemma":"Σκρηβωνίας","unit":185,"id":"185"},{"id":"186","unit":186,"editors":["Boissonade"],"lemma":"ἀλλὰ ἐπινόσῳ","reading":"§SIG:A§ : ἀλλ’ ἐν ἐπινόσῳ §SIG:Boissonade§ dub.","sigla":["A","Boissonade"],"query":false,"dirty":false,"span":[59,71]},{"reading":": οἰκοδομεῖσθαι §SIG:A§pc : ῳκοδομεῖσθαι §SIG:Eberhard§","sigla":["A","Eberhard"],"query":false,"dirty":false,"span":[77,89],"unit":187,"id":"187","editors":["Eberhard"],"lemma":"οἰκοδομῆσθαι"}],"label":"73","dawe":"73","n":74,"A":"74","wit":"A","tr":"Ancora lui disse che la tomba di Scribonia era bella e sontuosa, ma che era stata costruita in un luogo malsano.","type":"joke","text":"Ὁ αὐτὸς τὸ Σκρηβωνίας μνῆμα καλὸν ἔφη καὶ πολυτελὲς εἶναι, ἀλλὰ ἐπινόσῳ τόπῳ οἰκοδομῆσθαι.","num":"73"},{"label":"74","app":[{"sigla":["A","Dawe","Thierfelder"],"reading":"§SIG:A§ : ὁρῶ vid. opus esse §SIG:Thierfelder§ : βλέπει … βλέπω §SIG:Dawe§","dirty":false,"span":[104,109],"query":false,"id":"188","unit":188,"lemma":"βλέπω","editors":["Dawe","Thierfelder"]},{"editors":[],"lemma":"τὸν … Οὐκοῦν","unit":189,"id":"189","query":false,"dirty":false,"span":[14,4384],"reading":"§SIG:A§ : εἶπε πρὸς τὸν κάπηλον §SIG:C§","sigla":["A","C"]}],"A":"75","n":75,"dawe":"74","wit":"A","text":"Σχολαστικῷ λεπτὸν ἵππον ἔχοντι προσελθών τις· Ὁ ἵππος σου, ἔφη, εἰς Ἅιδου ὁρᾷ. καὶ ὁ σχολαστικός· Κἀγὼ †βλέπω†.","tr":"Un tale si avvicinò ad uno §I§scholastikos§/I§ che aveva un cavallo gracilino, disse: «Il tuo cavallo vede già l’Ade». E lo §I§scholastikos§/I§ disse: «Anch’io lo vedo».","type":"joke","num":"74"},{"num":"75","tr":"Uno §I§scholastikos§/I§, che era malato e peraltro affamato, quando gli fu detto che non era ancora l’ora quarta, non credendoci ordinò che gli fosse portato l’orologio.","type":"joke","text":"Σχολαστικὸς νοσῶν, εἶτα πεινῶν, ὡς οὐδέπω τετάρτην ὥραν ἀπηγγέλη, ἀπιστῶν πρὸς ἑαυτὸν τὸ ὡρολόγιον ἐκέλευσε κομισθῆναι.","app":[{"dirty":false,"span":[56,64],"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ἀπηγγέλει §SIG:M§","lemma":"ἀπηγγέλη","editors":[],"id":"190","unit":190}],"label":"75","wit":"AM","dawe":"75","A":"76","n":76},{"wit":"A","A":"77","n":77,"dawe":"76","label":"76","app":[{"reading":"§SIG:Minas§ : σαραπίον §SIG:A§","sigla":["A","Minas"],"query":false,"span":[18,27],"dirty":false,"unit":191,"id":"191","editors":["Minas"],"lemma":"Σαραπεῖον"},{"sigla":["A","Thierfelder"],"reading":"§SIG:Thierfelder§ : θαλὸν §SIG:A§","span":[38,44],"dirty":false,"query":false,"id":"192","unit":192,"lemma":"θαλλὸν","editors":["Thierfelder"]}],"num":"76","text":"Σχολαστικῷ εἰς τὸ Σαραπεῖον ἀνελθόντι θαλλὸν ὁ ἱερεὺς διδούς· Ἵλεώς σοι, εἶπεν, ὁ κύριος. καὶ ὁ σχολαστικός· Ἵλεως, ἔφη, ὁ κύριος τῷ † παρίω μου· ἐγὼ γὰρ ἐλεύθερός εἰμι.","tr":"Un sacerdote consegnò un ramoscello ad uno §I§scholastikos§/I§ che entrava nel §I§Serapeion§/I§ e disse: «Il Signore ti sia benevolo!» e lo §I§scholastikos §/I§fece: «Il Signore sia benevolo al mio…cane! Io, infatti, sono un libero!».","type":"joke"},{"A":"78","n":78,"dawe":"77","wit":"AM","label":"77","app":[],"text":"Σχολαστικὸς ἐκκομίσας τὸν υἱόν, ἀπαντήσας τῷ διδασκάλῳ αὐτοῦ· Σύγγνωθι, ἔφη, ὅτι οὐκ ἦλθεν ὁ υἱός μου εἰς τὴν σχολήν· ἀπέθανε γάρ.","type":"joke","tr":"Uno §I§scholastikos§/I§, dopo aver celebrato il funerale del figlio, incontrò il suo maestro e disse: «Perdona che mio figlio non sia venuto a scuola: è morto».","num":"77"},{"num":"78","type":"joke","tr":"Uno §I§scholastikos§/I§, prese da Corinto dei quadri che avevano dipinti antichi e disse ai capitani: «Se li perderete, ve ne chiederò di nuovi».","text":"Σχολαστικὸς εἰκόνας ἀρχαῖα ζωγραφήματα ἐχούσας ἀπὸ Κορίνθου λαβὼν καὶ εἰς ναῦς ἐμβαλὼν τοῖς ναυκλήροις εἶπεν· Ἐὰν ταύτας ἀπολέσητε, καινὰς ὑμᾶς ἀπαιτήσω.","wit":"A","dawe":"78","n":79,"A":"79","app":[{"reading":"§SIG:Minas§ : ἀπολέσηται §SIG:A§","sigla":["A","Minas"],"query":false,"dirty":false,"span":[121,130],"id":"193","unit":193,"editors":["Minas"],"lemma":"ἀπολέσητε"}],"label":"78"},{"num":"79","text":"Σχολαστικῷ ὑπερζέουσαν κύλικα ὁ οἰνοχόος ὤρεξεν. ὁ δὲ ἐπὶ τῆς τραπέζης αὐτὴν θείς· Οὕτω μενέ‹τω›, ἔφη, μέχρι ὁ παιδαγωγός σου ἐλθὼν εὕρῃ αὐτὴν ζέουσαν.","type":"joke","tr":"Il coppiere porse ad uno §I§scholastikos§/I§ una coppa rovente. Questi la poggiò sul tavolo e disse: «Stia così, finché non venga il tuo pedagogo e la trovi bollente».","label":"79","app":[{"editors":["Eberhard","Thierfelder"],"lemma":"μενέτω","unit":194,"id":"194","query":false,"span":[88,95],"dirty":false,"reading":"§SIG:Thierfelder§ : μένῃ §SIG:Eberhard§ : μένε §SIG:A§","sigla":["A","Eberhard","Thierfelder"]}],"wit":"A","A":"80","n":80,"dawe":"79"},{"wit":"A","dawe":"79 bis","A":"81","n":81,"app":[{"sigla":["A","Dawe"],"reading":"§SIG:Dawe§ : θεραπεύει §SIG:A§","dirty":false,"span":[42,53],"query":false,"id":"195","unit":195,"lemma":"θεραπευθείη","editors":["Dawe"]},{"sigla":["A","Dawe"],"reading":"§SIG:Dawe§ : ἐκτίσαι §SIG:A§","dirty":false,"span":[193,200],"query":false,"unit":196,"id":"196","lemma":"ἐκτῖσαι","editors":["Dawe"]}],"label":"79 bis; 27 α","num":"79 bis","type":"joke","tr":"Uno §I§scholastikos§/I§ malato si accordò col medico che, se fosse guarito, gli avrebbe dato un compenso. Quando dunque la moglie lo rimproverava perché beveva vino con la febbre, disse: «E tu vuoi che io, sano, sia costretto a pagare il medico?».","text":"Σχολαστικὸς νοσῶν συνετάξατο τῷ ἰατρῷ, εἰ θεραπευθείη, μισθὸν δώσειν. ὡς οὖν οἶνον ἐν τῷ πυρέττειν πίνοντι αὐτῷ ἐπετίμα ἡ γυνή· Σὺ δὲ βούλει με ὑγιάναντα, ἔφη, ἀναγκασθῆναι τῷ ἰατρῷ τὸν μισθὸν ἐκτῖσαι;"},{"wit":"AM","A":"82","n":82,"dawe":"80","label":"80","app":[{"lemma":"ἀπορριπτούντων","editors":[],"unit":197,"id":"197","span":[76,90],"dirty":false,"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ἀποριπτούντων §SIG:M§"},{"edi i? Io ho pagato dieci dracme ateniesi in più e navigo a rischio del timoniere».","label":"81","app":[{"reading":"§SIG:A§§SIG:M§ : χειμαζομένῳ §SIG:Dawe§","sigla":["A","Dawe","M"],"query":false,"dirty":false,"span":[21,33],"unit":202,"id":"202","editors":["Dawe"],"lemma":"χειμαζομένων"},{"reading":"§SIG:M§ : κλεόντων §SIG:A§","sigla":["A","M"],"query":false,"dirty":false,"span":[38,47],"unit":203,"id":"203","editors":[],"lemma":"κλαιόντων"},{"reading":"§SIG:A§ : ἐν τῷ πλοίῳ §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[52,63],"id":"204","unit":204,"editors":[],"lemma":"συμπλεόντων"},{"query":false,"dirty":false,"span":[89,93],"reading":"§SIG:A§ : ἐσταί §SIG:M§","sigla":["A","M"],"editors":[],"lemma":"ἐστέ","unit":205,"id":"205"},{"editors":["Dawe","Thierfelder"],"lemma":"δοὺς","id":"206","unit":206,"query":false,"span":[124,128],"dirty":false,"reading":"§SIG:A§§SIG:M§ (in textu §SIG:Dawe§) : διδοὺς §SIG:Thierfelder§","sigla":["A","Dawe","M","Thierfelder"]},{"query":false,"span":[141,151],"dirty":false,"reading":"§SIG:Minas§ : κυβερνίτου §SIG:A§§SIG:M§","sigla":["A","M","Minas"],"editors":["Minas"],"lemma":"κυβερνήτου","id":"207","unit":207}],"wit":"AM","A":"83","n":83,"dawe":"81"},{"wit":"A","dawe":"82","n":84,"A":"84","app":[{"unit":208,"id":"208","lemma":"εἶπε","editors":[],"sigla":["A"],"reading":": εἶπε* §SIG:A§","span":[100,104],"dirty":false,"query":false},{"sigla":["Eberhard"],"reading":"notam interrogationis add. §SIG:Eberhard§","span":[114,123],"dirty":false,"query":false,"id":"209","unit":209,"lemma":"πυκτεῦσαι","editors":["Eberhard"]}],"label":"82","num":"82","tr":"Un tale scagliò un pentolone pieno di escrementi addosso ad uno §I§scholastikos§/I§ che scalava un muro in battaglia. Quello disse gridando: «Non vuoi batterti in modo pulito?».","type":"joke","text":"Σχολαστικῷ ἀναβαίνοντι ἐπὶ τεῖχος ἐν μάχῃ χύτραν τις μεστὴν κοπρίων ἐπέβαλεν. ὁ δὲ βοῶν· Οὐ θέλεις, εἶπε, καθαρῶς πυκτεῦσαι;"},{"dawe":"83","A":"85","n":85,"wit":"AM","app":[{"id": ,"app":[{"reading":"§SIG:A§ : καθέσθηται §SIG:M§","sigla":["A","M"],"query":false,"span":[97,106],"dirty":false,"id":"218","unit":218,"editors":[],"lemma":"καθέσθητε"}],"n":86,"A":"86","dawe":"84","wit":"AM","text":"Ὁ αὐτὸς τοῖς στρατιώταις· Αὔριον, εἶπε, μακρὰν ὁδὸν ὁδοιπορῆσαι ἀναγκαῖον· σήμερον οὖν πλεονάκις καθέσθητε.","tr":"Quello stesso tale disse ai soldati: «Domani bisogna percorrere una lunga strada: oggi dunque restate seduti più spesso del solito».","type":"joke","num":"84"},{"n":87,"A":"87","dawe":"85","wit":"AM","label":"85","app":[{"editors":[],"lemma":"καινὴν","id":"219","unit":219,"query":false,"span":[23,29],"dirty":false,"reading":"§SIG:A§ : κενὴν §SIG:M§","sigla":["A","M"]},{"id":"220","unit":220,"lemma":"καθήρας","editors":["Cobet"],"sigla":["A","Cobet","M"],"reading":"§SIG:Cobet§ : καβῆρας §SIG:A§§SIG:M§","dirty":false,"span":[65,72],"query":false},{"id":"221","unit":221,"lemma":"Ὃς","editors":[],"sigla":["A","M"],"reading":"§SIG:A§ : ὡς §SIG:M§","span":[84,86],"dirty":false,"query":false},{"id":"222","unit":222,"editors":[],"lemma":"βάλῃ","reading":"§SIG:A§ : βάλλει §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[101,105]}],"text":"Σχολαστικὸς εἰς οἰκίαν καινὴν μετοικισθεὶς καὶ τὰ πρὸτοῦ πυλῶνος καθήρας ἐπέγραψεν· Ὃς ἂν ὦδε κόπρια βάλῃ, ἀπόλλυσιν αὐτά.","tr":"Uno §I§scholastikos§/I§, trasferitosi in una casa nuova, e dopo aver ripulito l’ingresso davanti al portone, vi affisse un’iscrizione: «Chiunque getti escrementi qui, non avrà diritto al reso».s:88","type":"joke","num":"85"},{"num":"86","text":"Σχολαστικὸν ὁ πατὴρ ἀπολέσαντα δηνάριον ἐβούλετο τυπτῆσαι. ὁ δέ·Μὴ ὀργίζου, ἔφη, κἀγὼ ἐκ τῶν ἐμῶν ἀγοράζω τὸ δηνάριον.","tr":"Il padre voleva picchiare uno §I§scholastikos §/I§che aveva perso un denaro. Ma quello disse: «Non arrabbiarti, ti ricompro io il denaro coi miei soldi».","type":"joke","label":"86","app":[{"dirty":false,"span":[20,30],"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ἀπωλέσαντα §SIG:M§","lemma":"ἀπολέσαντα","editors":[],"unit":223,"id":"223"},{"reading":"§SIG:A§ : τυπῆσαι §SIG:M§DFW0","sigla":["A","M"],"query":false,"span":[49,57],"dirty":false,"unit":224,"id":"224","editors":[],"lemma":"τυπτῆσαι"},{"sigla":["A","Eberhard","M"],"reading":"§SIG:A§§SIG:M§ : καὶ γὰρ §SIG:Eberhard§, fort. recte","dirty":false,"span":[81,85],"query":false,"unit":225,"id":"225","lemma":"κἀγὼ","editors":["Eberhard"]},{"editors":[],"lemma":"δηνάριον","id":"226","unit":226,"query":false,"dirty":false,"span":[109,117],"reading":"§SIG:M§ : δινάριον §SIG:A§ac","sigla":["A","M"]}],"wit":"AM","n":88,"A":"88","dawe":"86"},{"text":"Σχολαστικὸς ἐπὶ τῆς οἰκίας σεκούτορος σχῆμα λαβὼν ἔπαιζεν. ἄφνω δέ τινος ἀπαγγείλαντος αὐτῷ παρουσίαν τοῦ πατρός, ῥίψας τὸ ὅπλον ἔλυε τὴν κνημῖδα. φθάσαντος δὲ τοῦ πατρὸς αὐτοῦ ἐπιστῆναι, ἔχων τὴν περικεφαλαίαν βιβλίον ἀνεγίνωσκεν.","tr":"Uno §I§scholastikos§/I§si mise l’armatura da gladiatore e giocava in casa. All’improvviso però, dopo che qualcuno l’aveva avvisato dell’arrivo del padre, gettò l’arma e si stava togliendo lo schiniere. Ma siccome il padre era già arrivato, leggeva un libro tenendo l’elmo in testa.","type":"joke","num":"87","label":"87","app":[{"reading":"§SIG:A§ : ἀπὸ §SIG:Boissonade§ : πρὸ §SIG:Eberhard§","sigla":["A","Boissonade","Eberhard"],"query":false,"dirty":false,"span":[12,15],"id":"227","unit":227,"editors":["Boissonade","Eberhard"],"lemma":"ἐπὶ"},{"query":false,"span":[27,37],"dirty":false,"reading":"§SIG:Thierfelder§ : σεκούτερος §SIG:A§","sigla":["A","Thierfelder"],"editors":["Thierfelder"],"lemma":"σεκούτορος","id":"228","unit":228},{"reading":": αὐτοῦ §SIG:A§ : αὐτῷ §SIG:Eberhard§ (prob. §SIG:Minas§)","sigla":["A","Eberhard","Minas"],"query":false,"dirty":false,"span":[171,176],"id":"229","unit":229,"editors":["Eberhard","Minas"],"lemma":"αὐτοῦ"}],"n":89,"A":"89","dawe":"87","wit":"A"},{"dawe":"88","A":"90","n":90,"wit":"AM","app":[{"id":"230","unit":230,"editors":["Boissonade"],"lemma":"ὡς","reading":"om. §SIG:Boissonade§","sigla":["Boisso
