:root{--bg:#f6f1e7;--paper:#fbf8f1;--ink:#241f18;--muted:#7a6f5d;--line:#e3d9c6;--accent:#7a2e1d;--accent2:#1d4e6b;--lem:#9a3412;--lembg:#f3e2cf;--sig:#1d4e6b;--ed:#5b4a2f;--warn:#b45309;--warnbg:#fbe8cf;--alpha:#7a2e1d;--beta:#1d4e6b;--gamma:#3f6212;
--greek:"Gentium Plus Web","New Athena Unicode","Gentium Plus","Calibri","Segoe UI",sans-serif;--sans:"Aptos","Segoe UI","Calibri",system-ui,sans-serif;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--greek);line-height:1.62}
header.top{position:sticky;top:0;z-index:30;background:rgba(40,28,20,.96);color:#f3ece0;padding:.5rem 1rem;display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.18)}
header.top h1{font-size:1.12rem;margin:0;font-weight:600;white-space:nowrap}
header.top .sub{color:#cdbfa6;font-size:.78rem;font-family:var(--sans);margin-left:-.3rem;max-width:24vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recsw{display:flex;border:1px solid #5a4a39;border-radius:8px;overflow:hidden}
.recsw button{font-family:var(--sans);font-size:.85rem;border:none;background:#efe6d4;color:#241f18;padding:.34rem .7rem;cursor:pointer;font-weight:700}
.recsw button.on[data-rec="alpha"]{background:var(--alpha);color:#fff}.recsw button.on[data-rec="beta"]{background:var(--beta);color:#fff}.recsw button.on[data-rec="gamma"]{background:var(--gamma);color:#fff}
#tSync,#tTr{font-family:var(--sans);font-size:.85rem;border:1px solid #5a4a39;background:#efe6d4;color:#241f18;border-radius:8px;padding:.34rem .6rem;cursor:pointer;font-weight:600}
#tSync:hover,#tTr:hover{background:#fff}#tSync.on{background:#5b3a8a;border-color:#5b3a8a;color:#fff}#tTr.on{background:#256;border-color:#256;color:#fff}
.controls{display:flex;gap:.4rem;align-items:center;margin-left:auto;flex-wrap:wrap}
.controls input,.controls button{font-family:var(--sans);font-size:.82rem;border:1px solid #5a4a39;background:#fffdf8;color:#241f18;border-radius:6px;padding:.32rem .5rem}
.controls input{width:120px}.controls input.num{width:70px}.controls button{cursor:pointer;background:#efe6d4}.controls button:hover{background:#fff}
.wrap{display:flex;max-width:1320px;margin:0 auto}
nav.toc{width:240px;flex:0 0 240px;padding:1rem .7rem 3rem;position:sticky;top:52px;height:calc(100vh - 52px);overflow:auto;font-family:var(--sans);font-size:.83rem;border-right:1px solid var(--line)}
#resizer{flex:0 0 7px;cursor:col-resize;position:sticky;top:52px;height:calc(100vh - 52px);background:transparent;transition:background .15s}#resizer:hover,#resizer.drag{background:#cdbf9e}
nav.toc h2{font-size:.7rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin:.4rem .3rem}
nav.toc a{display:flex;justify-content:space-between;gap:.4rem;padding:.26rem .45rem;border-radius:6px;color:var(--ink);text-decoration:none;cursor:pointer}
nav.toc a:hover{background:#ece2cf}nav.toc a.drow{display:grid;grid-template-columns:3.4em 2.4em 3.2em 2.4em;align-items:baseline;gap:0 .15rem;font-variant-numeric:tabular-nums}nav.toc a.drow .da{color:var(--alpha)}nav.toc a.drow .db{color:var(--beta)}nav.toc a.drow .ddw{color:var(--muted);font-size:.74rem}nav.toc a.drow .dg{color:var(--gamma);font-size:.74rem;opacity:.85}nav.toc a .c{color:var(--muted);font-size:.76rem}
nav.toc .qbtn{margin:.6rem .3rem;display:block;width:calc(100% - .6rem);text-align:left;cursor:pointer;background:var(--warnbg);border:1px solid #e7cd9a;color:#7c4a06;border-radius:8px;padding:.5rem .6rem;font-family:var(--sans);font-size:.82rem}
main{flex:1 1 auto;min-width:0;padding:1.1rem 1.5rem 6rem;background:var(--paper)}
.meta{font-family:var(--sans);font-size:.8rem;color:var(--muted);border:1px solid var(--line);background:#fffdf8;border-radius:10px;padding:.7rem .9rem;margin-bottom:1.3rem}
.meta b{color:var(--ink)}.meta .wit{color:var(--sig);font-weight:600}.meta .gk{font-family:var(--greek);color:var(--ink)}
.stats{display:flex;gap:1rem;flex-wrap:wrap;margin-top:.5rem}.stats span{background:#f0e7d5;border-radius:20px;padding:.15rem .7rem;font-size:.76rem}
section.sec{margin:1.6rem 0}section.sec>h2{font-size:1.12rem;color:var(--accent);border-bottom:2px solid var(--line);padding-bottom:.25rem;margin:0 0 .8rem;letter-spacing:.04em}
.beta section.sec>h2{color:var(--beta)}.gamma section.sec>h2{color:var(--gamma)}
.fac{margin:0 0 1.1rem;padding:.1rem 0 .5rem;border-bottom:1px dotted var(--line)}
.fac .num{font-family:var(--sans);font-size:.74rem;color:var(--muted);font-weight:600;display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:.12rem}
.fac .num .big{font-size:.92rem;color:var(--ink)}.fac .num .conc{color:var(--muted);font-weight:400}
.fac .num .w b{background:#e7ddc9;color:#5b4a2f;border-radius:4px;padding:0 .28rem;font-size:.7rem;font-weight:700;margin-left:.15rem}
.xref{cursor:pointer;border:1px solid #b9a7d6;background:#efe7fb;color:#5b3a8a;border-radius:10px;padding:0 .45rem;font-size:.7rem;font-weight:700}.xref:hover{background:#e2d6f6}
.xref.b{border-color:#9ec3d6;background:#e7f1fb;color:#1d4e6b}.xref.g{border-color:#bcd69e;background:#eef7e2;color:#3f6212}
.fac .txt{font-size:1.16rem;text-align:justify}
.fac .txt.missing{color:#a08b6a;font-style:italic;font-family:var(--sans);font-size:.95rem}
.fac .tr{display:none;font-family:var(--sans);font-size:1rem;color:#43617a;margin:.35rem 0 0;padding:.2rem .6rem;border-left:3px solid #cdd9e3;background:#f3f6f9;border-radius:0 6px 6px 0}
.showtr .fac .tr{display:block}
.lem{cursor:pointer;border-bottom:1.5px solid var(--lem);padding:0 .02em}.lem:hover,.lem.hot{background:var(--lembg)}
.app{font-family:var(--greek);font-size:.85rem;color:#4a4234;margin:.4rem 0 0;padding:.4rem .6rem;background:#f4ede0;border-left:3px solid var(--line);border-radius:0 8px 8px 0;display:none}
.app.show{display:block}.app .ln{padding:.12rem 0;border-radius:5px;cursor:pointer}.app .ln:hover,.app .ln.hot{background:#eadfc8}

"},{"label":"4; cf. α 4","n":3,"A":"3","dawe":"4","type":"joke","text":"Σχολαστικοῦ ἵππον πιπράσκοντος ἠρώτησέ τις, εἰ πρωτοβόλος ἐστίν. Τοῦ δὲ φήσαντος δευτεροβόλον εἶναι, ἔφη· «Πῶς οἶδας;» Ὁ δὲ εἶπεν· «Ὅτι ἅπαξ ἐδούλευσεν ἐμὲ καὶ τὸν πατέρα μου».","wit":"FT","tr":"Uno §I§scholastikos§/I§ vendeva un cavallo, e un tale gli domandò se fosse di primo dente. Quando quello disse che era di secondo dente, fece: «Come lo sai?». E quello rispose: «Perché una volta ha disarcionato me e mio padre».","app":[{"unit":616,"span":[124,129],"sigla":["F","T"],"lemma":"εἶπεν","editors":[],"dirty":false,"reading":"§SIG:T§(cf. α) : ἔφη §SIG:F§","query":false,"id":"616"},{"reading":"§SIG:F§§SIG:T§ : ἐβόλευσεν editio princeps","query":false,"dirty":false,"id":"617","span":[141,151],"unit":617,"editors":[],"lemma":"ἐδούλευσεν","sigla":["F","T"]},{"sigla":["F","T"],"lemma":"ἐμὲ … μου","editors":[],"unit":618,"span":[152,174],"id":"618","dirty":false,"query":false,"reading":"§SIG:T§ καὶ ἐμὲ καὶ τὸν πατέρα μου §SIG:F§"}],"num":"4"},{"A":"4","n":4,"label":"5; cf. α 5","type":"joke","dawe":"5","wit":"FT","text":"Σχολαστικὸς φίλον συναντήσας εἶπε· «Καθ’ ὕπνους σε ἰδών, προσηγόρευσα». Ὁ δέ· «Σύγγνωθί μοι, ὅτι οὐ προσέσχον».","num":"5","app":[{"dirty":false,"query":false,"reading":"§SIG:T§ : φίλῳ §SIG:F§","id":"619","unit":619,"span":[12,17],"lemma":"φίλον","sigla":["F","T"],"editors":[]},{"lemma":"ἰδών","sigla":["F","T"],"editors":[],"unit":620,"span":[51,55],"id":"620","dirty":false,"query":false,"reading":"§SIG:F§ : εἶδον §SIG:T§a.c"}],"tr":"Uno §I§scholastikos§/I§ incontrò un amico e disse: «Ti ho visto in sogno e ti ho salutato». E quello: «Scusami, ché non ci ho fatto caso»."},{"wit":"FT","text":"Σχολαστικὸς νοσοῦντα ἐπισκεπτόμενος ἠρώτα περὶ τῆς ὑγείας. Ὁ δὲ οὐκ ἠδύνατο ἀποκριθῆναι. Ὀργισθεὶς οὖν ἐξήει λέγων· «Ἐλπίζω κἀγὼ νοσῆσαι καὶ ἐλθόντι σοι μὴ ἀποκριθῆναι».","num":"34","app":[{"id":"621","reading":"§SIG:F§(cf. G) : ἐξήλεγχεν §SIG:T§","query":false,"dirty":false,"editors":[],"lemma":"ἐξήει","sigla":["F","T"],"unit":621,"span":[103,108]}],"tr":"Uno §I§scholastikos§/I§ visitava un malato e gli faceva domande sulla salute. Ma quello non era in grado di rispondere. Allora si adirò e se ne usciva dicendo: «Spero di ammalarmi anch’io, e di non risponderti quando verrai a trovarmi».","A":"5","n":5,"label":"34; cf. α 34","type":"joke","dawe":"34"},{"tr":"Uno §I§scholastikos§/I§ vendeva un cavallo. Poiché era giunto un tale e ne esaminava la dentatura, disse: «Perché ne osservi i denti? Magari camminasse quanto mangia!».","num":"37","app":[],"text":"Σχολαστικὸς ἵππον ἐπίπρασκεν. Ἐλθόντος δέ τινος καὶ μανθάνοντος τὸν βόλον, εἶπε· «Τί τοὺς ὀδόντας αὐτοῦ τηρεῖς; Εἴθε ὡς τρώγει, καὶ περιεπάτει».","wit":"FT","dawe":"37","type":"joke","label":"37; cf. α 37","A":"6","n":6},{"dawe":"253","type":"joke","label":"253; esclusiva di β","n":7,"A":"7","tr":"Uno §I§scholastikos§/I§ incontrò un medico e gli disse: «Perdonami, e non volermene, se non mi sono ammalato».","app":[{"editors":[],"lemma":"ἐνόσησα","sigla":["F","T"],"unit":622,"span":[79,86],"id":"622","query":false,"reading":"§SIG:T§ : ἐνόησα §SIG:F§","dirty":false}],"num":"253","text":"Σχολαστικὸς ἰατρῷ συναντήσας· «Συγχώρησόν μοι, εἶπε, καὶ μή μοι μέμψῃ, ὅτι οὐκ ἐνόσησα».","wit":"FT"},{"dawe":"8","type":"joke","label":"8; cf. α 8","A":"8","n":8,"tr":"Uno §I§scholastikos§/I§, volendo prendere un topo che gli rosicchiava di continuo i libri, addentò della carne e si sedette al buio.","num":"8","app":[],"text":"Σχολαστικὸς μῦν θέλων πιάσαι συνεχῶς τὰ βιβλία αὐτοῦ τρώγοντα, κρέας δακών, ἐν σκοτίᾳ ἐκάθισεν.","wit":"FT"},{"text":"Σχολαστικὸς θέλων τὸν ἵππον αὐτοῦ διδάξαι μὴ τρώγειν πολλά, οὐ παρέβαλεν αὐτῷ τροφάς. Ἀποθανόντος δὲ τοῦ ἵππου τῷ λιμῷ, ἔλεγε· «Μεγάλως ἐζημιώθην· ὅτε γὰρ καλῶς ἔμαθε μὴ τρώγειν, τότε ἀπέθανεν».","wit":"FT","tr":"Uno §I§scholastikos§/I§, volendo insegnare al proprio cavallo a non mangiare troppo, non gli diede da mangiare. E quando il cavallo morì di fame, diceva: «Che grave perdita! Proprio quando aveva imparato bene a non mangiare, allora è morto».","app":[{"editors":[],"lemma":"παρέβαλεν","sigla":["F","T"],"unit":623,"span":[63,72],"id":"623","reading":"§SIG:F§ : παρέβαλλεν §SIG:T§p.c.","query":false,"dirty":false},{"id":"624","reading":"§SIG:T§(cf. α) : ἐζημίωμαι §SIG:F§","query":false,"dirty":false,"editors":[],"sigla":["F","T"],"lemma":"ἐζημιώθην","unit":624,"span":[136,145]}],"num":"9","label":"9; cf. α 9","n":9,"A":"9","dawe":"9","type":"joke"},{"label":"41; cf. α 41","n":10,"A":"10","dawe":"41","type":"joke","text":"Σχολαστικὸς οἰκίαν πωλῶν, λίθον ἀπ’ αὐτῆς εἰς δεῖγμα περιέφερεν.","wit":"FT","tr":"Uno §I§scholastikos§/I§ che vendeva una casa ne portava in giro una pietra a mo’ di dimostrazione.","app":[],"num":"41"},{"text":"Σχολαστικὸς θέλων ἰδεῖν, εἰ πρέπει αὐτῷ κοιμᾶσθαι, καμμύσας ἐσωπτρίζετο.","wit":"FT","tr":"Uno §I§scholastikos§/I§, volendo vedere se gli stesse bene dormire, chiuse gli occhi e si guardò allo specchio.","app":[{"id":"625","dirty":false,"reading":"(olim §SIG:Needham§) καμύσας §SIG:T§","query":false,"sigla":["Needham","T"],"lemma":"καμμύσας","editors":["Needham"],"unit":625,"span":[51,59]},{"unit":626,"span":[60,71],"editors":["Braccini"],"sigla":["Braccini","F","T"],"lemma":"ἐσωπτρίζετο","reading":"§SIG:Braccini§ : ἐσοπτρίζετο §SIG:F§§SIG:T§","query":false,"dirty":false,"id":"626"}],"num":"11","label":"11; cf. α 11","n":11,"A":"11","dawe":"11","type":"joke"},{"dawe":"14","type":"joke","label":"14; cf. α 14","n":12,"A":"12","tr":"Uno §I§scholastikos§/I§ comprò una casa, si affacciò alla finestra e chiedeva ai passanti se gli si addicesse.","app":[],"num":"14","text":"Σχολαστικὸς οἰκίαν πριάμενος, καὶ διὰ τῆς θυρίδος προκύψας, ἠρώτα τοὺς παριόντας εἰ πρέπει αὐτῷ ἡ οἰκία.","wit":"FT"},{"A":"13","n":13,"label":"15; cf. α 15","type":"joke","dawe":"15","wit":"FT","text":"Σχολαστικὸς κατ’ ὄναρ ἰδὼν ἧλον πεπατηκέναι καὶ δόξας ἀλγεῖν, τὸν πόδα περιεδήσατο. Ἕτερος δὲ μαθὼν τὴν αἰτίαν, ἔφη· «Διὰ τί γὰρ ἀνυπόδητος κοιμᾶσαι;»","num":"15","app":[{"editors":[],"lemma":"ἀλγεῖν … περιεδήσατο","sigla":["F","T"],"unit":627,"span":[54,82],"id":"627","query":false,"reading":"§SIG:T§(cf. α) : ἀλγεῖν τὸν πόδα, περιεδήσατο §SIG:F§","dirty":false}],"tr":"Uno §I§scholastikos§/I§ vide in sogno di aver calpestato un chiodo, credette di provare dolore e si fasciò il piede. Un altro ne apprese la ragione e disse: «E perché dormi scalzo?»."},{"label":"45; cf. α 45","A":"14","n":14,"dawe":"45","type":"joke","text":"Σχολαστικὸς νυκτὶ ἐπανέστη τῇ μάμμῃ αὐτοῦ. Πληγὰς δὲ διὰ τοῦτο ὑπὸ τοῦ πατρὸς λαβών, εἶπε· «Σὺ τοσοῦτον χρόνον τὴν μητέρα μου ὀχεύεις, μηδὲν ὑπ’ ἐμοῦ παθών, καὶ σὺ ὀργίζῃ ἐπὶ τῇ μητρί σου ἅπαξ με εὑρών;»","wit":"FT","tr":"Uno §I§scholastikos§/I§ di notte saltò addosso a sua nonna. Prese le botte dal padre per questo motivo e disse: «Tu è tanto tempo che monti mia madre, e non ti sei buscato nulla da me; e ora ti arrabbi per avermi sorpreso una volta sola con tua madre?».","num":"45","app":[{"editors":[],"sigla":["F","T"],"lemma":"μάμμῃ","span":[30,35],"unit":628,"id":"628","query":false,"reading":"§SIG:F§ : μάμῃ §SIG:T§","dirty":false}]},{"text":"Σχολαστικὸς ἰατρὸν συναντήσας ὑπὸ τοῖχον ἐκρύβη. Τινὸς δὲ πυθομένου τὴν αἰτίαν, ἔφη· «Καιρὸν ἔχω μὴ ἀσθενήσας, καὶ αἰσχύνομαι εἰς ὄψιν ἐλθεῖν τοῦ ἰατροῦ».","wit":"FT","tr":"Uno §I§scholastikos§/I§ incontrò un medico e si nascose dietro un muro. E poiché qualcuno gli chiedeva la ragione, disse: «È da un pezzo che non mi ammalo, e mi vergogno di venire al cospetto del medico».","num":"6","app":[{"span":[12,18],"unit":629,"editors":[],"sigla":["F","T"],"lemma":"ἰατρὸν","query":false,"reading":"§SIG:T§ : ἰατρῷ §SIG:F§","dirty":false,"id":"629"},{"id":"630","reading":"§SIG:T§ : τινὶ §SIG:F§","query":false,"dirty":false,"editors":[],"lemma":"Τινὸς","sigla":["F","T"],"span":[49,54],"unit":630},{"dirty":false,"reading":"§SIG:T§(cf. α) : ὁ σχολαστικὸς ἔφη §SIG:F§","query":false,"id":"631","unit":631,"span":[80,83],"lemma":"ἔφη","sigla":["F","T"],"editors":[]},{"dirty":false,"query":false,"reading":"§SIG:T§ : τῷ ἰατρῷ §SIG:F§","id":"632","unit":632,"span":[142,152],"sigla":["F","T"],"lemma":"τοῦ ἰατροῦ","editors":[]}],"label":"6; cf. α 6","A":"15","n":15,"dawe":"6","type":"joke"},{"tr":"A uno §I§scholastikos§/I§ un agente d’affari disse che il fiume gli aveva preso il campo. E quello rispose: «E io che dico?».","app":[{"id":"633","dirty":false,"reading":"§SIG:F§(cf. α) : ποταμὸς §SIG:T§","query":false,"sigla":["F","T"],"lemma":"Ὁ ποταμὸς","editors":[],"unit":633,"span":[35,44]},{"span":[89,93],"unit":634,"editors":["Dawe"],"sigla":["Dawe","F","T"],"lemma":"λέγω","reading":"§SIG:F§§SIG:T§ : λέγει coniecerit §SIG:Dawe§ : λέγων coniecerim","query":false,"dirty":false,"id":"634"}],"num":"46","text":"Σχολαστικῷ πραγματευτὴς εἶπεν ὅτι «Ὁ ποταμὸς ἔλαβε τὸν ἀγρόν σου». Κἀκεῖνος ἔφη· «Καὶ τί λέγω;»","wit":"FT","dawe":"46","type":"joke","label":"46; cf. α 46","n":16,"A":"16"},{"num":"254","app":[{"span":[26,36],"unit":635,"editors":[],"lemma":"ἐσφράγισεν","sigla":["F","T"],"query":false,"reading":"§SIG:F§ : ἐσφράγισεν αὐτήν §SIG:T§","dirty":false,"id":"635"},{"id":"636","dirty":false,"query":false,"reading":"§SIG:T§ : ἑτέρου δὲ εἰπόντος §SIG:F§","lemma":"Ἕτερος εἶπεν","sigla":["F","T"],"editors":[],"unit":636,"span":[153,165]},{"unit":637,"span":[220,262],"editors":[],"sigla":["F","T"],"lemma":"οὐ … μέρος","query":false,"reading":": οὐ τὸ κάτωθεν λείπει, ἀλλὰ τὸ ἄνωθεν μέρος §SIG:T§οὐ τὸ κάτωθεν μέρος, ἀλλὰ τὸ ἄνωθεν λείπει §SIG:F§","dirty":false,"id":"637"}],"tr":"Uno §I§scholastikos§/I§, avendo un’anfora di vino Aminèo, la sigillò. Ma poiché lo schiavo, forandola di sotto, ne sottraeva il vino, si stupiva che, pur restando intatti i sigilli, il vino calasse. Un tale gli disse: «Bada che non te l’abbiano portato via di sotto». E lui: «Ignorantissimo, disse, non manca la parte di sotto, ma quella di sopra».","wit":"FT","text":"Σχολαστικὸς Ἀμιναίαν ἔχων ἐσφράγισεν. Τοῦ δὲ δούλου κάτωθεν τρήσαντος καὶ τὸν οἶνον αἴροντος ἐθαύμαζεν, ὅτι τῶν σημάντρων σώων ὄντων ὁ οἶνος ἐλαττοῦται. Ἕτερος εἶπεν· «Ὅρα, μὴ κάτωθεν ἀφῃρέθη». Ὁ δέ· «Ἀμαθέστατε, εἶπεν, οὐ τὸ κάτωθεν λείπει, ἀλλὰ τὸ ἄνωθεν μέρος».","type":"joke","dawe":"254","A":"17","n":17,"label":"254; esclusiva di β"},{"wit":"FT","text":"Σχολαστικὸς ἐν τῇ πόλει ὤν, καὶ τὴν σελήνην ἰδών, ἐπυνθάνετο τοῦ πατρός, εἰ καὶ αἱ λοιπαὶ πόλεις ἔχουσι τοιαύτην σελήνην.","num":"49","app":[{"unit":638,"span":[0,189],"lemma":"Σχολαστικὸς … ὑφαπλώσας","sigla":["F","T"],"editors":[],"dirty":false,"reading":"§SIG:T§ : Σχολαστικὸς ὑπὸ δένδρον λάθρα ἐλθὼν καὶ ὑφαπλώσας §SIG:F§","query":false,"id":"638"}],"tr":"Uno §I§scholastikos§/I§ era in città, vide la luna e chiedeva al padre se anche le altre città avessero una luna così.","A":"18","n":18,"label":"49; cf. α 49","type":"joke","dawe":"49"},{"A":"19","n":19,"label":"19; cf. α 19","type":"joke","dawe":"19","wit":"FT","text":"Σχολαστικὸς ἰδὼν στρουθοὺς ἐπὶ δένδρου, λάθρα ὑπεισελθών, ὑφαπλώσας τὸν κόλπον ἔσειε τὸ δένδρον ὡς ὑποδεξόμενος τὰ στρουθία.","num":"19","app":[{"dirty":false,"reading":"§SIG:F§§SIG:T§ : ὑπελθών dub. §SIG:Thierfelder§","query":false,"id":"639","unit":639,"span":[46,56],"sigla":["F","T","Thierfelder"],"lemma":"ὑπεισελθών","editors":["Thierfelder"]},{"span":[99,111],"unit":640,"sigla":["F","T"],"lemma":"ὑποδεξόμενος","editors":[],"dirty":false,"reading":"§SIG:T§(cf. α) : ὑποδεξάμενος §SIG:F§","query":false,"id":"640"}],"tr":"Uno §I§scholastikos§/I§ vide dei passeri su un albero, si avvicinò di nascosto, distese la piega dell’abito e scuoteva l’albero per raccogliere i passeri."},{"n":20,"A":"20","label":"51; cf. α 50","type":"joke","dawe":"51","wit":"FT","text":"Σχολαστικὸς ἐν τῷ ἰδίῳ ἀγρῷ ἐξιὼν ἠρώτα πιεῖν ὕδωρ εἰ καλὸν ἐν τῷ αὐτόθι φρέατι. Τῶν δὲ φησάντων ὅτι «Καλόν· καὶ γὰρ καὶ οἱ γονεῖς σου ἐξ αὐτοῦ ἔπινον», «Καὶ πηλίκους, ἔφη, εἶχον τραχήλους, ὅτι εἰς τοσοῦτον βάθος πίνειν ἐδύναντο;»","app":[{"id":"641","dirty":false,"reading":"§SIG:T§(cf. α) : εἰ πιεῖν ὕδωρ καλὸν §SIG:F§","query":false,"sigla":["F","T"],"lemma":"πιεῖν … καλὸν","editors":[],"unit":641,"span":[40,59]},{"dirty":false,"reading":"§SIG:F§§SIG:T§ : καλὸν ἦν §SIG:Dawe§","query":false,"id":"642","unit":642,"span":[102,107],"lemma":"καλὸν","sigla":["Dawe","F","T"],"editors":["Dawe"]},{"editors":["Thierfelder"],"lemma":"","sigla":["Thierfelder"],"span":null,"unit":643,"id":"643","reading":"post Τῶν δὲ γεωργῶν dub. add. §SIG:Thierfelder§","query":false,"dirty":false},{"lemma":"ἔπινον … εἶχον","sigla":["F","T"],"editors":[],"unit":644,"span":[144,178],"id":"644","dirty":false,"reading":"§SIG:T§(cf. α) : ἔπινον, φησὶ· Καὶ πηκίλους εἶχον §SIG:F§","query":false}],"num":"51","tr":"Uno §I§scholastikos§/I§, uscendo nel proprio campo, chiedeva se l’acqua del pozzo che si trovava lì fosse buona da bere. E poiché quelli dicevano: «È buona, e infatti anche i tuoi genitori bevevano da lì», disse: «E di che taglia avevano i colli, da poter bere a una profondità tanto grande?»."},{"n":21,"A":"21","label":"52; cf. α 52","type":"joke","dawe":"52","wit":"FT","text":"Σχολαστικὸς εἰς λάκκον ἐμπεσὼν συνεχῶς ἔκραζε βοήθειαν ζητῶν. Ὡς δὲ οὐδεὶς ὑπήκουεν, ἔφη· «Μωρός εἰμι, ἐὰν μὴ ἀνελθὼν πάντας τύψω, ἵνα κἂν οὕτως δραμόντες κλίμακά μοι κομίσωσιν».","app":[{"id":"645","query":false,"reading":"§SIG:F§ : λάκον §SIG:T§","dirty":false,"editors":[],"sigla":["F","T"],"lemma":"λάκκον","span":[16,22],"unit":645},{"editors":[],"sigla":["F","T"],"lemma":"συνεχῶς … ζητῶν","unit":646,"span":[31,60],"id":"646","reading":"§SIG:T§(cf. α) : συνεχῶς κράζων βοήθειαν ἐζήτει §SIG:F§","query":false,"dirty":false},{"dirty":false,"reading":"et α ὑπήκουσεν §SIG:F§ : ἐπήκουεν §SIG:T§","query":false,"id":"647","unit":647,"span":[75,83],"lemma":"ὑπήκουεν","sigla":["F","T"],"editors":[]},{"id":"648","reading":"§SIG:T§(cf. α) : εἰ §SIG:F§","query":false,"dirty":false,"editors":[],"lemma":"ἐὰν","sigla":["F","T"],"unit":648,"span":[103,106]}],"num":"52","tr":"Uno §I§scholastikos§/I§ cadde in una cisterna e gridava di continuo cercando aiuto. E poiché nessuno gli dava ascolto, disse: «Sono un fesso, se non risalgo e li frusto tutti, perché almeno così corrano a portarmi una scala!»."},{"n":22,"A":"22","label":"22; cf. α 22","type":"joke","dawe":"22","wit":"FT","text":"Σχολαστικὸς σχολαστικῷ συναντήσας, εἶπεν· «Ἔμαθον, ὅτι ἀπέθανες». Κἀκεῖνος· «Ἀλλ’ ὁρᾷς με, ἔφη, ζῶντα». Καὶ ὁ σχολαστικός· «Καὶ μὴν ὁ εἰπών μοι πολλῷ σοῦ ἀξιοπιστότερος ὑπάρχει».","app":[],"num":"22","tr":"Uno §I§scholastikos§/I§ incontrò un altro §I§scholastikos§/I§ e disse: «Ho saputo che sei morto». E quello: «Ma mi vedi vivo!». E lo §I§scholastikos§/I§: «Eppure chi me l’ha detto è molto più degno di fede di te»."},{"dawe":"56","type":"joke","label":"56; cf. α 56","n":23,"A":"23","tr":"Uno §I§scholastikos§/I§, un pelato e un barbiere, viaggiando insieme, si accordarono per fare la guardia a turno di quattro ore. Toccò dunque per primo al barbiere. E questi, per passare il tempo, rase lo §I§scholastikos§/I§ mentre dormiva e, passate le ore, lo svegliò. Ma quello, grattandosi la testa al risveglio, se la trovò liscia e disse: «Gran canaglia di un barbiere! Per sbaglio, invece di me, ha svegliato il pelato!».","app":[{"unit":649,"span":[79,88],"editors":[],"lemma":"βιγλεῦσαι","sigla":["F","T"],"query":false,"reading":"§SIG:T§ : βιγλίσαι §SIG:F§","dirty":false,"id":"649"},{"dirty":false,"reading":"§SIG:T§(cf. α) : παρελθουσῶν §SIG:F§","query":false,"id":"650","span":[187,198],"unit":650,"lemma":"πληρωθεισῶν","sigla":["F","T"],"editors":[]},{"reading":"§SIG:F§ : κνιθόμενος §SIG:T§","query":false,"dirty":false,"id":"651","span":[216,226],"unit":651,"editors":[],"lemma":"κνηθόμενος","sigla":["F","T"]},{"reading":"§SIG:T§(cf. α) : ἐψιλωμένην §SIG:F§","query":false,"dirty":false,"id":"652","unit":652,"span":[266,271],"editors":[],"sigla":["F","T"],"lemma":"ψιλήν"},{"id":"653","dirty":false,"reading":"§SIG:T§ : φαρακλὸν §SIG:F§","query":false,"lemma":"φαλακρὸν","sigla":["F","T"],"editors":[],"span":[331,339],"unit":653}],"num":"56","text":"Σχολαστικὸς καὶ φαλακρὸς καὶ κουρεὺς συνοδεύοντες συνέθεντο πρὸς τέσσαρας ὥρας βιγλεῦσαι. Ἔλαχεν οὖν πρῶτον τῷ κουρεῖ. Ὁ δὲ μετεωριζόμενος τὸν σχολαστικὸν κοιμώμενον ἐξύρισε καὶ τῶν ὡρῶν πληρωθεισῶν διύπνισεν. Ὁ δέ, κνηθόμενος ἀπὸ ὕπνου τὴν κεφαλήν, καὶ εὑρὼν αὐτὴν ψιλήν, ἔφη· «Μέγα κάθαρμα ὁ κουρεύς· πλανηθεὶς γὰρ ἀντὶ ἐμοῦ τὸν φαλακρὸν διύπνισεν».","wit":"FT"},{"tr":"Uno §I§scholastikos§/I§ apprese che il corvo vive più di duecento anni, ne comprò uno e lo allevava per farne la prova.","num":"255","app":[],"text":"Σχολαστικὸς μαθών, ὅτι ὁ κόραξ ὑπὲρ τὰ διακόσια ἔτη ζῇ, ἀγοράσας κόρακα, εἰς ἀπόπειραν ἔτρεφεν.","wit":"FT","dawe":"255","type":"joke","label":"255; esclusiva di β","A":"24","n":24},{"n":25,"A":"25","label":"64; cf. α 64","type":"joke","dawe":"64","wit":"F","text":"Σχολαστικὸς βράκας ὠνήσατο· στενῶν οὖν οὐσῶν, ἐδρωπάκιζεν αὐτάς.","app":[],"num":"64","tr":"Uno §I§scholastikos§/I§ comprò delle brache; e poiché erano strette, vi applicava la pasta depilatoria."},{"type":"joke","dawe":"256","n":26,"A":"26","label":"256; esclusiva di β","app":[{"reading":"§SIG:T§ : ἐν χειμῶνι §SIG:F§","query":false,"dirty":false,"id":"654","unit":654,"span":[12,23],"editors":[],"lemma":"εἰς χειμῶνα","sigla":["F","T"]},{"reading":"§SIG:F§ : περιπλεκομένων §SIG:T§","query":false,"dirty":false,"id":"655","span":[61,75],"unit":655,"editors":[],"sigla":["F","T"],"lemma":"περιπλεκομένου"},{"sigla":["F","T"],"lemma":"σκεῦος","editors":[],"unit":656,"span":[76,82],"id":"656","dirty":false,"reading":"editio princeps σκεύους §SIG:F§§SIG:T§","query":false},{"dirty":false,"query":false,"reading":"§SIG:F§ : ἐκεῖνος μίαν τῶν ἀγκυρῶν §SIG:T§","id":"657","unit":657,"span":[100,124],"lemma":"μίαν … ἀγκυρῶν","sigla":["F","T"],"editors":[]}],"num":"256","tr":"Uno §I§scholastikos§/I§, naufragando durante una tempesta, mentre ciascuno dei compagni di viaggio si avvinghiava a un qualche oggetto per mettersi in salvo, lui si abbracciò a una delle àncore.","wit":"FT","text":"Σχολαστικὸς εἰς χειμῶνα ναυαγῶν, καὶ τῶν συμπλεόντων ἑκάστου περιπλεκομένου σκεῦος πρὸς τὸ σωθῆναι, μίαν ἐκεῖνος τῶν ἀγκυρῶν περιεπλέξατο."},{"text":"Σχολαστικὸς υἱὸν θάψας καὶ συναντήσας τῷ διδασκάλῳ αὐτοῦ, εἶπε· «Προῆλθεν ὁ παῖς;» Ὁ δέ φησιν· «Οὔ». Καὶ ὁ σχολαστικός· «Λοιπὸν οὖν, καθηγητά, τέθνηκεν».","wit":"FT","tr":"Uno §I§scholastikos§/I§ seppellì il figlio, incontrò il suo maestro e disse: «È venuto il ragazzo?». E quello dice: «No». E lo §I§scholastikos§/I§: «E allora, professore, è morto».","num":"257","app":[{"id":"658","dirty":false,"query":false,"reading":"§SIG:F§ : om. §SIG:T§","sigla":["F","T"],"lemma":"αὐτοῦ","editors":[],"span":[51,56],"unit":658},{"unit":659,"span":[12,16],"sigla":["F","T"],"lemma":"υἱὸν","editors":[],"dirty":false,"query":false,"reading":"§SIG:T§ : τὸν υἱὸν §SIG:F§","id":"659"},{"editors":[],"sigla":["F"],"lemma":"εἶπε","span":[58,62],"unit":660,"id":"660","query":false,"reading":"(εἶπεν scrib.) ἔφη §SIG:F§","dirty":false},{"id":"661","query":false,"reading":"§SIG:F§§SIG:T§ : Προσῆλθεν §SIG:Boissonade§","dirty":false,"editors":["Boissonade"],"sigla":["Boissonade","F","T"],"lemma":"Προῆλθεν","span":[65,73],"unit":661},{"unit":662,"span":[74,98],"lemma":"Ὁ … Οὔ","sigla":["F","T"],"editors":[],"dirty":false,"query":false,"reading":"§SIG:T§ : ὁ δέ, οὔ φησιν §SIG:F§","id":"662"}],"label":"257; cf. α 77","A":"27","n":27,"dawe":"257","type":"joke"},{"dawe":"29","type":"joke","label":"29; cf. α 29","n":28,"A":"28","tr":"Di due fratelli gemelli, uno morì. Uno §I§scholastikos§/I§ dunque incontrò quello vivo e gli chiedeva: «Sei morto tu, o tuo fratello?».","app":[],"num":"29","text":"Διδύμων ἀδελφῶν εἷς ἐτελεύτησεν. Σχολαστικὸς οὖν ἀπαντήσας τῷ ζῶντι, ἠρώτα· «Σὺ ἀπέθανες ἢ ὁ ἀδελφός σου;»","wit":"FT"},{"text":"Σχολαστικὸς ναυαγεῖν μέλλων πινακίδας ᾔτει, ἵνα διαθήκας γράψῃ. Τοὺς δὲ οἰκέτας ὁρῶν ἀλγοῦντας διὰ τὸν κίνδυνον, ἔφη· «Μὴ λυπεῖσθε· ἐλευθερῶ γὰρ ὑμᾶς».","wit":"FT","tr":"Uno §I§scholastikos§/I§, in procinto di naufragare, chiedeva delle tavolette per scrivere il testamento. E vedendo i servi che si addoloravano per il pericolo, disse: «Non affliggetevi: vi rendo liberi!».","app":[],"num":"30","label":"30; cf. α 29","n":29,"A":"29","dawe":"30","type":"joke"},{"type":"joke","dawe":"31","n":30,"A":"30","label":"31; cf. α 31","app":[{"editors":[],"sigla":["F","T"],"lemma":"ἀνῆλθεν","unit":663,"span":[39,46],"id":"663","query":false,"reading":"§SIG:T§(cf. α) : εἰσῆλθεν §SIG:F§","dirty":false},{"reading":"§SIG:F§ : ἔφιππος §SIG:T§","query":false,"dirty":false,"id":"664","unit":664,"span":[61,72],"editors":[],"sigla":["F","T"],"lemma":"καβαλλάριος"}],"num":"31","tr":"Uno §I§scholastikos§/I§, volendo attraversare un fiume, salì sull’imbarcazione a cavallo. E poiché qualcuno gli chiese perché non scendesse, rispose che aveva fretta.","wit":"FT","text":"Σχολαστικὸς ποταμὸν βουλόμενος περᾶσαι ἀνῆλθεν εἰς τὸ πλοῖον καβαλλάριος. Πυθομένου δέ τινος· «Διὰ τί οὐ κατέβης;» ἔφη σπουδάζειν."},{"text":"Σχολαστικὸς ἀμαθής, ἀπορῶν δαπανημάτων, τὰ βιβλία αὐτοῦ ἐπίπρασκε καὶ γράφων πρὸς τὸν πατέρα ἔλεγε· «Σύγχαιρε ἡμῖν, πάτερ, ἤδη γὰρ ἡμᾶς τὰ βιβλία τρέφει».","wit":"FT","tr":"Uno §I§scholastikos§/I§ ignorante, a corto di denaro, vendeva i propri libri e, scrivendo al padre, diceva: «Congratulati con noi, padre, ché ormai i libri ci sfamano!».","num":"55","app":[],"label":"55; cf. α 55","A":"31","n":31,"dawe":"55","type":"joke"},{"A":"32","n":32,"label":"258; esclusiva di β","type":"joke","dawe":"258","wit":"FT","text":"Σχολαστικὸς παιδοτρίβης περὶ μαθητοῦ ἀκούσας ὅτι νοσεῖ, τῇ δὲ ἑξῆς ὅτι πυρέττει, ὕστερον δὲ παρὰ τοῦ πατρὸς ἀκούσας ὅτι ἀπέθανεν, ἔφη· «Οὕτω προφασιζόμενοι οὐκ ἐᾶτε τοὺς παῖδας μανθάνειν».","num":"258","app":[{"editors":[],"lemma":"παιδοτρίβης","sigla":["F","T"],"unit":665,"span":[12,23],"id":"665","query":false,"reading":"§SIG:F§ : παιδοτρίβεις §SIG:T§a.c","dirty":false}],"tr":"Uno §I§scholastikos§/I§ maestro di ginnastica sentì dire di un allievo che era malato, il giorno seguente che aveva la febbre, e più tardi seppe dal padre che era morto, e disse: «Con tutte queste scuse non lasciate imparare i ragazzi»."},{"text":"Σχολαστικοῦ παιδίον ἀπέθανεν. Ἰδὼν οὖν πλῆθος λαοῦ συνελθόν, ἔλεγεν· «Αἰσχύνομαι εἰς τοσοῦτον ὄχλον μικρὸν παιδίον προφέρειν».","wit":"FT","tr":"A uno §I§scholastikos§/I§ morì il bambino. Vide radunata una gran folla di gente e diceva: «Mi vergogno di portare un bimbo così piccolo in una folla tanto grande».","app":[{"id":"666","dirty":false,"query":false,"reading":"§SIG:T§ : δὲ §SIG:F§","lemma":"οὖν","sigla":["F","T"],"editors":[],"unit":666,"span":[35,38]},{"id":"667","query":false,"reading":"§SIG:T§(cf. α) : πλῆθος §SIG:F§","dirty":false,"editors":[],"lemma":"ὄχλον","sigla":["F","T"],"unit":667,"span":[94,99]}],"num":"40","label":"40; cf. α 40","n":33,"A":"33","dawe":"40","type":"joke"},{"wit":"FT","text":"Σχολαστικὸς ἀγοράσας κρέας, βαστάζων αὐτὸ ἀπήρχετο εἰς τὸν οἶκον αὐτοῦ. Λούπης δὲ ῥήξας ἥρπασεν αὐτὸ ἐκ τῆς χειρὸς αὐτοῦ. Ὁ δὲ ἔφη· «Ὡς σὺ γένωμαι, ἂν μὴ κἀγὼ ποιήσω αὐτὸ ἄλλῳ».","num":"259","app":[{"editors":[],"lemma":"αὐτὸ ἀπήρχετο","sigla":["F","T"],"unit":668,"span":[37,50],"id":"668","query":false,"reading":"§SIG:T§ : αὐτὸς ἀπῆγεν §SIG:F§","dirty":false},{"query":false,"reading":"§SIG:T§ : ἑαυτοῦ οἶκον §SIG:F§","dirty":false,"id":"669","unit":669,"span":[59,70],"editors":[],"lemma":"οἶκον αὐτοῦ","sigla":["F","T"]},{"reading":"§SIG:F§ : γένομαι §SIG:T§","query":false,"dirty":false,"id":"670","unit":670,"span":[139,146],"editors":[],"sigla":["F","T"],"lemma":"γένωμαι"}],"tr":"Uno §I§scholastikos§/I§ comprò della carne e la portava a casa sua reggendola in mano. Ma un lupo balzò fuori e gliela strappò di mano. E lui disse: «Possa diventare come te, se anch’io non farò lo stesso a un altro!».","A":"34","n":34,"label":"259; esclusiva di β","type":"joke","dawe":"259"},{"label":"65; cf. α 65","A":"35","n":35,"dawe":"65","type":"joke","text":"Σχολαστικοῦ υἱός, ὑπὸ τοῦ πατρὸς εἰς πόλεμον ἐκπεμπόμενος, ὑπέσχετο ἑνὸς τῶν ἐχθρῶν κεφαλὴν ἀγαγεῖν. Ὁ δὲ ἔφη· «Εὔχομαι καὶ χωρὶς κεφαλῆς σε ἐλθόντα, μόνον ὑγιαίνοντα ἰδεῖν καὶ εὐφρανθῆναι».","wit":"FT","tr":"Il figlio di uno §I§scholastikos§/I§, mandato in guerra dal padre, promise che avrebbe riportato la testa di un nemico. E quello disse: «Mi auguro di vederti tornare anche senza testa, purché sano e salvo, e di rallegrarmene!».","num":"65","app":[{"id":"671","reading":"§SIG:T§(cf. α) : ἐκπεμπόμενος ὑπὸ τοῦ πατρὸς εἰς πόλεμον §SIG:F§","query":false,"dirty":false,"editors":[],"sigla":["F","T"],"lemma":"ὑπὸ … ἐκπεμπόμενος","unit":671,"span":[18,57]},{"span":[156,166],"unit":672,"lemma":"ὑγιαίνοντα","sigla":["F","T"],"editors":[],"dirty":false,"reading":": ὑγιαίνοντα §SIG:F§ὑγειᾶ ὄντα §SIG:T§","query":false,"id":"672"}]},{"type":"joke","dawe":"17","A":"36","n":36,"label":"17; cf. α 17","num":"17","app":[{"id":"673","query":false,"reading":"§SIG:T§ : συνοψίσθη §SIG:F§","dirty":false,"editors":[],"sigla":["F","T"],"lemma":"συνωψίσθη","span":[107,116],"unit":673},{"span":[160,170],"unit":674,"editors":[],"lemma":"ἀπέστειλας","sigla":["F","T"],"reading":"§SIG:F§ : ἀπέστειλάς μοι §SIG:T§","query":false,"dirty":false,"id":"674"},{"sigla":["F","T"],"lemma":"ὁ1 … αὐτῶν","editors":[],"span":[172,234],"unit":675,"id":"675","dirty":false,"query":false,"reading":"§SIG:F§(cf. α) : αὐτῶν ὁ εἷς §SIG:T§"}],"tr":"A uno §I§scholastikos§/I§ che si trovava in Grecia un amico scrisse di comprargli dei libri. Ma quello non se ne curò e, quando dopo un po’ si incontrò con l’amico, disse: «La lettera che mi avevi mandato a proposito dei libri non l’ho ricevuta».","wit":"FT","text":"Σχολαστικῷ φίλος ἔγραψεν εἰς Ἑλλάδα ὄντι, βιβλία αὐτῷ ἀγοράσαι. Τοῦ δὲ ἀμελήσαντος, ὡς μετὰ χρόνον τῷ φίλῳ συνωψίσθη, εἶπε· «Τὴν ἐπιστολήν, ἣν περὶ τῶν βιβλίων ἀπέστειλας, οὐκ ἐκομισάμην»."},{"wit":"FT","text":"Σχολαστικοὶ δύο ἐβάδιζον. Ἰδὼν δὲ ὁ εἷς αὐτῶν μέλαιναν ὄρνιν, εἶπεν· «Ἀδελφέ, ἴσως ταύτης ὁ ἀλέκτωρ ἀπέθανε, καὶ διὰ τοῦτο μέλαινα ἐνεδύσατο».","app":[{"sigla":["F","T"],"lemma":"μέλαιναν ὄρνιν","editors":[],"unit":676,"span":[46,60],"id":"676","dirty":false,"query":false,"reading":"§SIG:F§(cf. α) : μέλαινα ὄρνιν §SIG:T§"},{"sigla":["F","T"],"lemma":"ταύτης … ἀλέκτωρ","editors":[],"span":[83,99],"unit":677,"id":"677","dirty":false,"reading":"§SIG:T§(cf. α) : ὁ ἀλέκτωρ ταύτης §SIG:F§","query":false}],"num":"39","tr":"Due §I§scholastikoi§/I§ camminavano. E uno dei due vide una gallina nera e disse: «Fratello, forse le è morto il gallo, e per questo si è vestita di nero!».","n":37,"A":"37","label":"39; cf. α 39","type":"joke","dawe":"39"},{"wit":"FT","text":"Σχολαστικὸς μετὰ τοῦ πατρὸς κοιμώμενος, τῇ νυκτὶ ἀπὸ τῆς κλίνης ἀνιστάμενος, σταφυλὰς ἔτρωγεν ἐπάνω κρεμαμένας. Τοῦ δὲ πατρὸς σκανδαλισθέντος καὶ ὑπὸ χύτραν λαμπάδα κρύψαντος, ἐν τῷ ἐκεῖνον νυκτὶ ἀναστῆναι πρὸς τὸ ἔθος, ὁ πατὴρ ἄφνω τὸ φῶς ἔδειξεν. Κἀκεῖνος ἑστὼς καμμύων ἔρρεγχε, κοιμᾶσθαι προσποιούμενος.","num":"44","app":[{"id":"678","query":false,"reading":"§SIG:T§(cf. α) : τὸ κοιμᾶσθαι §SIG:F§","dirty":false,"editors":[],"lemma":"κοιμᾶσθαι","sigla":["F","T"],"span":[281,290],"unit":678},{"editors":[],"sigla":["F","T"],"lemma":"σταφυλὰς","span":[77,85],"unit":679,"id":"679","query":false,"reading":"§SIG:F§(cf. α) : τὰς σταφυλὰς §SIG:T§","dirty":false},{"span":[190,195],"unit":680,"editors":[],"lemma":"νυκτὶ","sigla":["F","T"],"query":false,"reading":"§SIG:F§ : τῇ νυκτὶ §SIG:T§","dirty":false,"id":"680"},{"query":false,"reading":"§SIG:F§(cf. α) : ἔτρεχε §SIG:T§","dirty":false,"id":"681","span":[272,279],"unit":681,"editors":[],"lemma":"ἔρρεγχε","sigla":["F","T"]},{"unit":682,"span":[291,305],"sigla":["F","T"],"lemma":"προσποιούμενος","editors":[],"dirty":false,"query":false,"reading":"§SIG:T§(cf. α) : ποιούμενος §SIG:F§","id":"682"}],"tr":"Uno §I§scholastikos§/I§ che dormiva col padre, alzandosi di notte dal letto, mangiava dei grappoli d’uva appesi in alto. E poiché il padre, contrariato, aveva nascosto una lucerna sotto una pentola e, quando quello di notte si alzò come al solito, mostrò all’improvviso la luce, lui, rimasto in piedi a occhi chiusi, russava fingendo di dormire.","A":"38","n":38,"label":"44; cf. α 44","type":"joke","dawe":"44"},{"text":"Σχολαστικῷ ἐν καπηλείῳ πίνοντι ἐπιστάς τις εἶπεν· «Ἡ γυνή σου ἀπέθανεν». Ὁ δὲ ἔφη· «Οὐκοῦν, πραγματευτά, μέλανα οἶνόν μοι κέρνα».","wit":"FT","tr":"Mentre uno §I§scholastikos§/I§ beveva in un’osteria, un tale gli si avvicinò e disse: «Tua moglie è morta». E quello rispose: «E allora, oste, versami del vino nero!».","app":[{"reading":"§SIG:F§ : καπελίῳ §SIG:T§","query":false,"dirty":false,"id":"683","span":[14,22],"unit":683,"editors":[],"sigla":["F","T"],"lemma":"καπηλείῳ"},{"editors":[],"lemma":"μέλανα","sigla":["F","T"],"unit":684,"span":[105,111],"id":"684","query":false,"reading":"§SIG:F§ : μέλαινα §SIG:T§","dirty":false},{"dirty":false,"reading":"§SIG:T§ : κίρνα §SIG:F§","query":false,"id":"685","span":[122,127],"unit":685,"lemma":"κέρνα","sigla":["F","T"],"editors":[]}],"num":"227","label":"227; cf. α 227","n":39,"A":"39","dawe":"227","type":"joke"},{"text":"Περὶ δυσκόλων","app":[],"type":"section"},{"tr":"Un tale dice a un medico burbero: «Come mai evacuo sangue e bile?». E quello rispose: «Anche se cachi via le tue budella, io non mi prendo bile!».","num":"184","app":[],"text":"Δυσκόλῳ ἰατρῷ λέγει τις· «Τί ἐστιν, ὅτι αἷμα χέζω καὶ χολάς;» Κἀκεῖνος ἔφη· «Ἐὰν καὶ τὰ ἔντερά σου χέσῃς, ἐγὼ οὐ χολῶ».","wit":"FT","dawe":"184","type":"joke","label":"184; cf. α 184","A":"40","n":40},{"dawe":"187","type":"joke","label":"187; cf. α 187","A":"41","n":41,"tr":"Un astrologo burbero fece l’oroscopo di un bambino malaticcio, garantì che sarebbe vissuto a lungo e ne chiedeva il compenso. E poiché la madre disse: «Te lo darò domani», ribatté: «E che, se muore stanotte, perdo il mio compenso?».","num":"187","app":[{"query":false,"reading":"§SIG:F§(cf. α) : γέννησιν §SIG:T§","dirty":false,"id":"686","span":[35,42],"unit":686,"editors":[],"sigla":["F","T"],"lemma":"γένησιν"}],"text":"Δύσκολος ἀστρονόμος παιδὸς νοσεροῦ γένησιν εἰπών, πολυχρόνιον ἔσεσθαι ἐπαγγειλάμενος, ᾔτει τὸν μισθόν. Τῆς δὲ μητρὸς εἰπούσης· «Αὔριον δώσω» — «Τί οὖν, ἔφη, ἐὰν τῇ νυκτὶ ἀποθάνῃ, ἐγὼ τὸν μισθὸν ἀπολέσω;»","wit":"FT"},{"A":"42","n":42,"label":"188; cf. α 188","type":"joke","dawe":"188","wit":"FT","text":"Δύσκολος κεράμιον μέλιτος ἀγοράσας συνεχῶς ἠρωτᾶτο, πόσου ἠγόρασεν. Καταστρέφων οὖν τὸ κεράμιον ἔφη· «Οὕτω χυθήτω μου τὸ αἷμα, ἐὰν εἴπω ὑμῖν».","num":"188","app":[{"editors":[],"lemma":"κεράμιον μέλιτος","sigla":["F","T"],"span":[9,25],"unit":687,"id":"687","query":false,"reading":"§SIG:F§(cf. α) : μέλιτος κεράμιον §SIG:T§","dirty":false},{"id":"688","reading":"§SIG:F§(cf. α) : Οὕτως §SIG:T§","query":false,"dirty":false,"editors":[],"sigla":["F","T"],"lemma":"Οὕτω","span":[102,106],"unit":688}],"tr":"Un burbero comprò un orcio di miele e si sentiva chiedere di continuo quanto l’avesse pagato. E allora, capovolgendo l’orcio, disse: «Così mi si versi il sangue, se ve lo dico!»."},{"type":"joke","dawe":"190","A":"43","n":43,"label":"190; cf. α 190","num":"190","app":[{"id":"689","reading":"§SIG:F§ : Τοῦ δὲ φήσαντος· καὶ διὰ τί ἀργεῖ §SIG:T§a.c","query":false,"dirty":false,"editors":[],"lemma":"Τοῦ … Ῥάπτειν","sigla":["F","T"],"span":[94,119],"unit":689}],"tr":"Mentre un burbero giocava a dadi, un tale gli saltò addosso. E quello si irritò e gli chiese se conoscesse un mestiere e perché stesse in ozio. Quando il tale rispose: «So cucire, ma non ho lavoro», stracciò il proprio mantello e disse: «Prendi, lavora e taci!».","wit":"FT","text":"Δυσκόλου ταυλίζοντος κατεπήδησε τις. Ὁ δὲ θυμωθεὶς ἠρώτησεν, εἰ τέχνην οἶδε καὶ διὰ τί ἀργεῖ. Τοῦ δὲ φήσαντος· «Ῥάπτειν οἶδα, ἔργον δὲ οὐκ ἔχω», διαρρήξας τὸ ἱμάτιον αὐτοῦ εἶπε· «Λάβε καὶ ἐργάζου καὶ σιώπα»."},{"n":44,"A":"44","label":"193; cf. α 193","type":"joke","dawe":"193","wit":"FT","text":"Δυσκόλῳ τις ἐφώνει· ὁ δὲ ἀπεκρίνατο· «Οὐκ εἰμὶ ἔσω». Τοῦ δὲ εἰπόντος ὅτι «Ψεύδῃ· τῆς φωνῆς σου γὰρ ἀκούω», ἔφη· «Ὦ κάθαρμα, εἰ μὲν ὁ παῖς μου εἶπεν, ἐπείσθης ἄν· ἐγὼ δέ σοι οὐ φαίνομαι ἀξιοπιστότερος εἶναι;»","app":[{"span":[47,50],"unit":690,"sigla":["F","T"],"lemma":"ἔσω","editors":[],"dirty":false,"reading":"§SIG:F§(cf. α) : ἐγὼ §SIG:T§","query":false,"id":"690"},{"span":[74,79],"unit":691,"sigla":["F","T"],"lemma":"Ψεύδῃ","editors":[],"dirty":false,"query":false,"reading":"§SIG:F§(cf. α) : ψεῦδος §SIG:T§","id":"691"},{"span":[113,122],"unit":692,"editors":[],"lemma":"Ὦ κάθαρμα","sigla":["F","T"],"reading":"§SIG:T§ : Τ (cf. α) κάθαρμα §SIG:F§","query":false,"dirty":false,"id":"692"},{"dirty":false,"reading":"§SIG:F§(cf. α) : οὐ φαίνομαί σοι §SIG:T§","query":false,"id":"693","span":[169,184],"unit":693,"lemma":"σοι … φαίνομαι","sigla":["F","T"],"editors":[]}],"num":"193","tr":"Un tale chiamava un burbero, e quello rispose: «Non sono in casa». E quando il primo disse: «Menti, perché sento la tua voce!», ribatté: «Canaglia, se te l’avesse detto il mio servo, gli avresti creduto; e io non ti sembro più degno di fede di lui?»."},{"label":"191; cf. α 191","n":45,"A":"45","dawe":"191","type":"joke","text":"Δύσκολόν τις ἠρώτα· «Ποῦ μένεις;» Ὁ δὲ ἔφη· «Κἀκεῖθεν μεταβαίνω».","wit":"FT","tr":"Un tale chiese a un burbero: «Dove abiti?». E quello disse: «Mi sto traslocando proprio da lì!».","app":[],"num":"191"},{"text":"Δύσκολος ἀπὸ σκάλας καταβαίνων ἔπεσεν. Τοῦ δὲ αὐθέντου εἰπόντος· «Ἐκεῖ τίς ἔπεσεν;» Ἔφη· «Ἐγὼ τοῦ ἐνοικίου μου. Τί πρὸς σέ;»","wit":"FT","tr":"Un burbero, mentre scendeva una scala, cadde. E poiché il padrone di casa disse: «Chi è caduto, là?», rispose: «Io, a prezzo del mio affitto! E a te che importa?».","num":"194","app":[{"span":[13,19],"unit":694,"editors":[],"lemma":"σκάλας","sigla":["F","T"],"reading":"§SIG:T§(cf. α) : κλίμακος §SIG:F§","query":false,"dirty":false,"id":"694"},{"span":[46,54],"unit":695,"sigla":["F","T"],"lemma":"αὐθέντου","editors":[],"dirty":false,"reading":"§SIG:T§ : δεσπότου §SIG:F§","query":false,"id":"695"},{"sigla":["Dawe","F","T"],"lemma":"Ἐγὼ","editors":["Dawe"],"span":[90,93],"unit":696,"id":"696","dirty":false,"reading":"§SIG:F§§SIG:T§ : Ἐγὼ ἔσω §SIG:Dawe§","query":fals ἐρωτηθείς· «Διὰ τί οὐδὲν ἄλλο ἐσθίεις εἰ μὴ ἐλαίας;» Εἶπεν· «Ἵνα τὸ μὲν ἔξωθεν ὄψον ἔχω, τὸ δὲ ὀστοῦν ἀντὶ ξύλου· καὶ ἵνα φαγών, μὴ ἀπονίψωμαι, ἀλλὰ τὴν κεφαλήν μου ἐκμαξάμενος, ἠλειμμένος ὦ».","wit":"FT"},{"app":[{"span":[5,14],"unit":53,"editors":[],"lemma":"λιμοξήρων","sigla":["T"],"query":false,"reading":"(cf. α) λιμοξήρου §SIG:T§","dirty":false,"id":"1427"}],"type":"section","text":"Περὶ λιμοξήρων"},{"type":"joke","dawe":"261","A":"50","n":50,"label":"261; esclusiva di β","num":"261","app":[],"tr":"Un prefetto morto di fame ordinò che il suo tribunale fosse collocato accanto a un panificio.","wit":"FT","text":"Λιμόξηρος ὕπαρχος τὸ βῆμα αὐτοῦ ἐκέλευσε πρὸς ἀρτοκοπεῖον γενέσθαι."},{"type":"joke","dawe":"220","A":"51","n":51,"label":"220; cf. α 228","num":"220","app":[{"dirty":false,"query":false,"reading":"§SIG:Thierfelder§ (cf. α) ἐπαγγέλλεις §SIG:F§ : ἀπαγγέλεις §SIG:T§","id":"703","unit":703,"span":[81,92],"sigla":["F","T","Thierfelder"],"lemma":"ἀπαγγέλλεις","editors":["Thierfelder"]},{"id":"704","dirty":false,"query":false,"reading":"(iam §SIG:Eberhard§) ἀναβαίνω §SIG:T§","sigla":["Eberhard","T"],"lemma":"ἀναβαίνων","editors":["Eberhard"],"span":[96,105],"unit":704}],"tr":"Un precettore morto di fame vide un pane appeso in alto e disse: «Scendi a ripetere la lezione, o devo salire io a sistemarti?».","wit":"FT","text":"Λιμόξηρος παιδαγωγός, ἰδὼν ἄρτον ἔν τινι ὕψει κρεμάμενον, εἶπε· «Καταβαίνεις καὶ ἀπαγγέλλεις, ἢ ἀναβαίνων ἀπαρτίζω σε;»"},{"type":"joke","dawe":"221","n":52,"A":"52","label":"221; cf. α 221","app":[{"unit":705,"span":[0,9],"editors":[],"sigla":["F","T"],"lemma":"Λιμόξηρος","reading":"§SIG:T§ : Τ (cf. α) λιμόξηρος σχολαστικὸς §SIG:F§","query":false,"dirty":false,"id":"705"}],"num":"221","tr":"Un medico morto di fame vide un pane attraverso un buco e vi applicava un impiastro estrattivo.","wit":"FT","text":"Λιμόξηρος ἰατρός, ἰδὼν ἄρτον διά τινος τρύπης, ἐκσυρτικὸν ἔμπλαστρον ἐτίθει."},{"text":"Λιμόξηρος, ἰδὼν ἄρτον ἐν ὑπερθύρῳ κείμενον, ἔφη· «Κύριε, ἢ ἐκεῖνον ταπείνωσον, ἢ ἐμὲ ὕψωσον».","wit":"FT","tr":"Un morto di fame vide un pane posato su un architrave e disse: «Signore, o abbassi quello, o innalzi me!».","num":"223","app":[{"span":[25,33],"unit":706,"editors":["Thierfelder"],"sigla":["F","T","Thierfelder"],"lemma":"ὑπερθύρῳ","query":false,"reading":"§SIG:Thierfelder§ (cf. α) ὑπαίθρῳ §SIG:F§ : γράφεται ἐν ὑπερώῳ §SIG:F§i.m. : ὑπέρθρῳ §SIG:T§","dirty":false,"id":"706"},{"unit":707,"span":[85,91],"sigla":["F","T"],"lemma":"ὕψωσον","editors":[],"dirty":false,"query":false,"reading":"§SIG:F§(cf. α) : ἐξάλειψον §SIG:T§","id":"707"}],"label":"223; cf. α 223","A":"53","n":53,"dawe":"223","type":"joke"},{"app":[],"type":"section","text":"Περὶ ὀκνηρῶν"},{"type":"joke","dawe":"211","A":"54","n":54,"label":"211; cf. α 211","num":"211","app":[{"reading":"§SIG:F§ : σαγεῖον §SIG:T§","query":false,"dirty":false,"id":"708","unit":708,"span":[48,54],"editors":[],"lemma":"σαγίον","sigla":["F","T"]},{"id":"709","dirty":false,"reading":"(ἔλαβεν scrib.) ἥρπασε §SIG:F§","query":false,"sigla":["F"],"lemma":"ἔλαβεν","editors":[],"span":[61,67],"unit":709},{"span":[104,119],"unit":710,"lemma":"πρὸς … ἕτερον","sigla":["F","T"],"editors":[],"dirty":false,"query":false,"reading":"§SIG:T§(cf. α) : τῷ ἑτέρῳ §SIG:F§","id":"710"},{"unit":711,"span":[157,161],"lemma":"ὅταν","sigla":["F","T"],"editors":[],"dirty":false,"query":false,"reading":"§SIG:T§(cf. α) : ἐὰν §SIG:F§","id":"711"},{"span":[178,183],"unit":712,"editors":[],"sigla":["F","T"],"lemma":"τύλην","query":false,"reading":"§SIG:T§(cf. α) : πύλην §SIG:F§","dirty":false,"id":"712"}],"tr":"Mentre due pigri dormivano insieme, un ladro entrò e portò via il loro mantello. E quando uno dei due se ne accorse e disse all’altro: «Alzati, inseguilo!», quello rispose: «Lascia stare: quando verrà a prendere il cuscino, lo acchiapperemo in due».","wit":"FT","text":"Ὀκνηρῶν δύο κοιμωμένων, εἰσελθών τις κλέπτης τὸ σαγίον αὐτῶν ἔλαβεν. Τοῦ δὲ ἑνὸς νοήσαντος καὶ εἰπόντος πρὸς τὸν ἕτερον· «Ἀνάστα, δίωξον αὐτόν», ἔφη· «Ἄφες· ὅταν ἔλθῃ λαβεῖν τὴν τύλην, κρατοῦμεν αὐτὸν οἱ δύο»."},{"dawe":"212","type":"joke","label":"212; cf. α 212","A":"55","n":55,"tr":"Un padre ordinò al figlio pigro di andare dal vicino a farsi prestare un’accetta. E quello disse: «Sono io il vicino: di accetta non ne ho!».","num":"212","app":[{"editors":["Thierfelder"],"lemma":"ἔφη","sigla":["Thierfelder"],"span":[80,83],"unit":713,"id":"713","reading":"Lacunam post ἔφη· ex α statuit §SIG:Thierfelder§","query":false,"dirty":false}],"text":"Ὀκνηρῷ υἱῷ ἐπέταξεν ὁ πατὴρ ἀπελθεῖν εἰς τὸν γείτονα καὶ χρήσασθαι ἀξίνην. Ὁ δὲ ἔφη· «Ἐγώ εἰμι ὁ γείτων· ἀξίνην οὐκ ἔχω».","wit":"FT"},{"app":[{"id":"714","dirty":false,"query":false,"reading":"§SIG:Braccini§ (cf. α) δηνάριον ὤφειλε δοῦναι §SIG:F§ : ὤφειλε δηνάριον (δεινάριον scrib.) §SIG:T§","lemma":"δηνάριον ὤφειλεν","sigla":["Braccini","F","T"],"editors":["Braccini"],"span":[15,31],"unit":714},{"dirty":false,"query":false,"reading":"§SIG:F§ : ὑπαντηκὸς §SIG:T§","id":"715","span":[33,42],"unit":715,"sigla":["F","T"],"lemma":"Ὑπηντηκὼς","editors":[]},{"id":"716","dirty":false,"query":false,"reading":"§SIG:F§(cf. α) : αὐτὸν §SIG:T§","lemma":"αὐτῷ","sigla":["F","T"],"editors":[],"unit":716,"span":[46,50]},{"id":"717","dirty":false,"reading":"§SIG:F§ : δεινάριον §SIG:T§","query":false,"sigla":["F","T"],"lemma":"δηνάριον","editors":[],"unit":717,"span":[60,68]},{"id":"718","dirty":false,"query":false,"reading":"§SIG:T§ : τὸν μάπουλον §SIG:F§","sigla":["F","T"],"lemma":"τὸ μάπουλόν","editors":[],"span":[87,98],"unit":718}],"num":"213","tr":"Un pigro doveva un denaro a un altro pigro. Lo incontrò e gli chiedeva il denaro. E quello disse: «È legato nel mio fagotto: slegalo e prendilo». E l’altro: «Lascia perdere, sono già stato pagato».","wit":"FT","text":"Ὀκνηρὸς ὀκνηρῷ δηνάριον ὤφειλεν. Ὑπηντηκὼς δὲ αὐτῷ, ᾔτει τὸ δηνάριον. Ὁ δέ φησιν· «Εἰς τὸ μάπουλόν μου δέδεται· λύσας ἆρον». Ὁ δέ· «Ἄπελθε, φησίν, ἐπληρώθην».","type":"joke","dawe":"213","n":56,"A":"56","label":"213; cf. α 213"},{"A":"57","n":57,"label":"229; cf. α 237","type":"joke","dawe":"229","wit":"FT","text":"Ἀτυχὴς μέθυσος, ἀμπελῶνα κληρονομήσας, ἐν καιρῷ τοῦ τρυγητοῦ ἀπέθανεν.","num":"229","app":[],"tr":"Uno sbevazzone sfortunato ereditò una vigna e morì proprio al tempo della vendemmia."},{"wit":"FT","text":"Νεανίσκος πρὸς τὴν ἑαυτοῦ γυναῖκα ἀσελγῆ οὖσαν εἶπε· «Κυρία, τί ποιοῦμεν; Ἀριστοῦμεν ἢ ἀφροδισιάζομεν;» Κἀκείνη ἔφη· «Ὡς θέλεις· ψωμὶν οὐκ ἔχομεν».","num":"244","app":[{"dirty":false,"reading":"Ante hoc dictum, titulum Περὶ λάγνων γυναικῶν praebet §SIG:T§§SIG:F§et α nihil habent.","query":false,"id":"719","unit":719,"span":[0,9],"lemma":"Νεανίσκος","sigla":["F","T"],"editors":[]},{"dirty":false,"reading":"(ἀσελγὴν οὖσαν εἶπε (εἶπεν scrib.) scrib.) (cf. α) τὴν γυναῖκα εἶπεν οὖσαν ἀσελγῆ §SIG:F§","query":false,"id":"720","unit":720,"span":[15,40],"sigla":["F"],"lemma":"τὴν … ἀσελγῆ","editors":[]},{"unit":721,"span":[87,101],"sigla":["F","T"],"lemma":"ἀφροδισιάζομεν","editors":[],"dirty":false,"reading":"(cf. α) : ἀφροδιάζομεν §SIG:T§ : ἀφροδιάσομεν §SIG:F§","query":false,"id":"721"}],"tr":"Un giovane disse alla propria moglie, che era lasciva: «Signora, che facciamo? Pranziamo o facciamo l’amore?». E quella rispose: «Come vuoi: ma di pane non ne abbiamo!».","A":"58","n":58,"label":"244; cf. α 244","type":"joke","dawe":"244"},{"label":"245; cf. α 245","n":59,"A":"59","dawe":"245","type":"joke","text":"Γραΐδας ἐρωτευομένας νεανίσκος ξενοδοχήσας, πρὸς τοὺς παῖδας αὐτοῦ ἔφη· «Τὴν θέλουσαν κεράσατε καὶ τὴν θέλουσαν ἀφροδισιάσατε». Κἀκεῖναι εἶπον· «Ἡμεῖς οὐ διψῶμεν».","wit":"FT","tr":"Un giovane ospitò delle vecchiette in amore e disse ai suoi servi: «A quella che vuole versate da bere, e con quella che vuole fate l’amore». E quelle dissero: «Noi non abbiamo sete!».","app":[{"editors":[],"lemma":"ἀφροδισιάσατε","sigla":["F","T"],"span":[112,125],"unit":722,"id":"722","reading":"(cf. α) : ἀφροδιάσατε §SIG:T§ : ἀφροδιάσετε §SIG:F§","query":false,"dirty":false},{" ὐτράπελος ἀποδημήσας καὶ κηλίτης γενόμενος, ἐπανελθὼν ἠρωτᾶτο παρὰ τῆς γυναικός, τί ἤγαγεν. Ὁ δέ· «Σοὶ μέν, εἶπεν, οὐδέν, τοῖς δὲ μηροῖς σου προσκε- φαλάδιν»."},{"tr":"Uno spiritoso vide un medico che applicava un collirio a una bella ragazza e disse: «Occhio, a non rovinare la pupa, mentre curi la pupilla!».","app":[{"id":"742","dirty":false,"query":false,"reading":"§SIG:F§§SIG:T§ : ὡραίαν νεάνιδα ὑπαλείφοντα §SIG:Dawe§","lemma":"νεάνιδα … ὡραίαν","sigla":["Dawe","F","T"],"editors":["Dawe"],"unit":742,"span":[24,50]}],"num":"151","text":"Εὐτράπελος, ἰδὼν ἰατρὸν νεάνιδα ὑπαλείφοντα ὡραίαν, ἔφη· «Μὴ τὴν ὄψιν θεραπεύων τὸ βάθος φθείρῃς».","wit":"FT","dawe":"151","type":"joke","label":"151b; cf. α 151 bis","n":66,"A":"66"},{"tr":"Un tale insultava uno spiritoso, dicendogli: «Ho avuto tua moglie gratis». E quello rispose: «Io sono costretto a sopportare un simile malanno; ma tu che bisogno ne avevi?».","num":"263","app":[{"query":false,"reading":"§SIG:F§§SIG:T§ : τοσούτου §SIG:Thierfelder§","dirty":false,"id":"743","span":[91,99],"unit":743,"editors":["Thierfelder"],"sigla":["F","T","Thierfelder"],"lemma":"τοιούτου"},{"dirty":false,"reading":"§SIG:F§§SIG:T§ : ἀνέχεσθαι §SIG:Eberhard§","query":false,"id":"744","unit":744,"span":[106,116],"lemma":"ἀντέχεσθαι","sigla":["Eberhard","F","T"],"editors":["Eberhard"]},{"id":"745","dirty":false,"query":false,"reading":"§SIG:deRhoer§ σοῦ δὲ §SIG:F§§SIG:T§","sigla":["F","T","deRhoer"],"lemma":"σοὶ δὲ","editors":["deRhoer"],"unit":745,"span":[118,124]}],"text":"Εὐτράπελόν τις ἐλοιδόρει, ὅτι «Σοῦ τὴν γυναῖκα δωρεὰν ἔσχον». Ὁ δὲ εἶπεν· «Ἐμοὶ μὲν ἀνάγκη τοιούτου κακοῦ ἀντέχεσθαι· σοὶ δὲ τίς ἀνάγκη;»","wit":"FT","dawe":"263","type":"joke","label":"263; esclusiva di β","A":"67","n":67},{"text":"Εὐτράπελος χοῖρον κλέψας ἔφευγεν. Ἐπεὶ δὲ κατελαμβάνετο, θεὶς αὐτόν, τύπτων ἔλεγεν· «Ἀλλαχοῦ ὄρυγε καὶ μὴ περὶ τὰ ἐμά».","wit":"FT","tr":"Uno spiritoso rubò un maiale e fuggiva. Ma quando stava per essere acciuffato, lo posò a terra e, percuotendo  faceva domande sulla salute. Ma quello, ridotto in fin di vita dalla febbre, non era in grado di parlare. Allora si adirò e se ne usciva dicendo: «Spero di ammalarmi anch’io, e di non risponderti quando verrai a trovarmi.»","wit":"G","A":"2","cf_a":["34"],"text":"Σχολαστικὸς νοσοῦντα ἕτερον ἐπισκεπτόμενος ἠρώτα περὶ τῆς ὑγίας. τοῦ δὲ ἐκ τοῦ πυρετοῦ καταχθονισθέντος καὶ λαλεῖν μὴ δυναμένου, ὀργισθεὶς ἐξιὼν ἔλεγεν· «Ἐλπίζω κἀγὼ νοσῆσαι καὶ ἐλθόντος σου μὴ ἀποκρίνασθαι.»","cf_b":["5"],"type":"joke","dawe":"34","n":2,"label":"cf. α 34 et β 5"},{"text":"Σχολαστικὸς ὑπαντήσας γνωρίμῳ εἶπεν ‹…› «Καὶ μὴν ὁ εἰπών †με† κατὰ πολὺ σοῦ ἀξιοπιστότερός ἐστιν.»","cf_b":["22"],"cf_a":["22"],"label":"cf. α 22 et β 22","n":3,"dawe":"22","type":"joke","wit":"G","greek_missing":false,"tr":"Uno §I§scholastikos§/I§ incontrò un conoscente e disse ‹…›: «Eppure chi me l’ha detto è molto più degno di fede di te.»","app":[{"unit":774,"span":[30,35],"lemma":"εἶπεν","sigla":[],"editors":[],"dirty":false,"query":false,"reading":"lacunam statui (cf. α β)","id":"774"},{"dirty":false,"reading":"fort. μοι (cf. α β)","query":false,"id":"775","unit":775,"span":[58,60],"lemma":"με","sigla":[],"editors":[]},{"id":"776","dirty":false,"query":false,"reading":": καταπολύ §SIG:G§","sigla":["G"],"lemma":"κατὰ πολὺ","editors":[],"unit":776,"span":[62,71]}],"num":"3","A":"3"},{"greek_missing":false,"tr":"Uno §I§scholastikos§/I§ litigando col padre diceva: «Non vedi come mi hai rovinato? Se tu non fossi nato, io avrei ereditato la fortuna di mio nonno!»","app":[{"id":"777","dirty":false,"reading":"vix legitur in §SIG:G§","query":false,"sigla":["G"],"lemma":"ἐζημίωσας","editors":[],"span":[56,65],"unit":777},{"editors":[],"lemma":"ἐγεννήθης","sigla":["G"],"unit":778,"span":[80,89],"id":"778","query":false,"reading":": ἐγεννήθεις §SIG:G§","dirty":false},{"reading":"vix legitur in §SIG:G§","query":false,"dirty":false,"id":"779","unit":779,"span":[91,94],"editors":[],"sigla":["G"],"lemma":"ἐγὼ"}],"num":"4","wit":"G d":"7284","span":null,"unit":null,"sigla":["A"],"lemma":"","editors":[]}],"stats":{"app_total":611,"dirty":[],"queries":["121","150","486","1562","4915"],"app_linked":587,"jokes":260,"sections":14},"units":[{"text":"Φιλόγελως ἐκ τῶν Ἱεροκλέους καὶ Φιλαγρίου γραμματικοῦ","type":"titulus","app":[{"unit":0,"span":[0,53],"editors":[],"sigla":["M"],"lemma":"Φιλόγελως … γραμματικοῦ","query":false,"reading":"εκ του Φιλογέλους: περί Σχολαστικών §SIG:M§","dirty":false,"id":"2-8"}]},{"text":"σχολαστικοί","app":[],"type":"section"},{"label":"1; 1 β","n":1,"A":"1","dawe":"1","type":"joke","text":"Σχολαστικὸς ἀργυροκόπῳ ἐπέταξε λύχνον ποιῆσαι. τοῦ δὲ ἐξετάσαντος, πηλίκον ποιήσει, ἀπεκρίνατο· Ὡς πρὸς ὀκτὼ ἀνθρώπους.","wit":"AM","tr":"Uno §I§scholastikos§/I§ commissionò ad un artigiano dell’argento di realizzare una lucerna. A quello che chiedeva quanto l’avrebbe dovuta fare grande, rispondeva: «tipo per otto persone».","app":[{"editors":[],"lemma":"Φιλόγελως … γραμματικοῦ","sigla":["A","M"],"span":null,"unit":1,"id":"1","reading":"§SIG:A§ : εκ του Φιλογέλους: περί Σχολαστικών §SIG:M§","query":false,"dirty":false}],"num":"1"},{"type":"joke","dawe":"2","n":2,"A":"2","label":"2; 2 β","app":[{"editors":[],"sigla":["A","M"],"lemma":"ἐπνίγη","span":[33,39],"unit":2,"id":"2","reading":"§SIG:A§ : ἐπνίγει §SIG:M§","query":false,"dirty":false}],"num":"2","tr":"Uno §I§scholastikos§/I§, tuffandosi, per poco non affogò: giurò che non sarebbe più entrato in acqua, se non avesse prima imparato bene a nuotare.","wit":"AM","text":"Σχολαστικὸς κολυμβῶν παρὰ μικρὸν ἐπνίγη· ὤμοσε δὲ εἰς ὕδωρ μὴ εἰσελθεῖν, ἐὰν μὴ μάθῃ πρῶτον καλῶς κολυμβᾶν."},{"wit":"AM","text":"Σχολαστικῷ τις ἰατρῷ προσελθὼν εἶπεν· Ἰατρέ, ὅταν ἀναστῶ ἐκ τοῦ ὕπνου, ἡμιώριον ἐσκότωμαι καὶ εἶθ’ οὕτως ἀποκαθίσταμαι. καὶ ὁ ἰατρός· Μετὰ τὸ ἡμιώριον ἐγείρου.","app":[{"dirty":false,"reading":"§SIG:M§ : ἰητρῷ §SIG:A§ cf. app. crit. 6, 7, 27","query":false,"id":"3","unit":3,"span":[15,20],"sigla":["A","M"],"lemma":"ἰατρῷ","editors":[]}],"num":"3","tr":"Un tale si recò da un medico §I§scholastikos§/I§ e disse «dottore, quando mi sveglio dal sonno sono annebbiato per mezz’ora, e poi mi riprendo» e il medico «svegliati mezz’ora dopo».","n":3,"A":"3","label":"3; 183 α","type":"joke","dawe":"3"},{"tr":"Uno §I§scholastikos§/I§ vendeva un cavallo, e un tale gli domandò se fosse di primo ricambio. Quando quello disse che era di secondo ricambio, fece: «Come lo sai?» e quello rispose «Perché una volta ha disarcionato me, e una volta ha fatto cadere mio padre».","num":"4","app":[{"sigla":["A","M"],"lemma":"ἵππον","editors":[],"span":[12,17],"unit":4,"id":"4","dirty":false,"reading":"§SIG:A§ : ἵππου §SIG:M§","query":false},{"query":false,"reading":"§SIG:Boissonade§ : πρωτόβολος §SIG:A§","dirty":false,"id":"5","unit":5,"span":[47,57],"editors":["Boissonade"],"sigla":["A","Boissonade"],"lemma":"πρωτοβόλος"}],"text":"Σχολαστικοῦ ἵππον πιπράσκοντος ἠρώτησέ τις, εἰ πρωτοβόλος ἐστίν. τοῦ δὲ εἰπόντος δευτεροβόλον εἶναι, εἶπε· Πῶς οἶδας; ὁ δὲ ἀπεκρίνατο· Ὅτι ἅπαξ ἐμὲ ἔβαλε κάτω καὶ ἅπαξ τὸν πατέρα μου.","wit":"AM","dawe":"4","type":"joke","label":"4; 3 β; cf. 161 α","A":"4","n":4},{"text":"Σχολαστικῷ τις ἀπαντήσας ἔφη· Κύριε σχολαστικέ, καθ’ ὕπνους σε εἶδον. ὁ δέ· Μὰ τοὺς θεούς, εἶπεν, ἀσχολῶν οὐ προσέσχον.","wit":"AM","tr":"Un tale si imbattè in uno §I§scholastikos §/I§e gli disse: «Signor§I§ scholastikos§/I§, ti ho visto in sogno!» e quello: «Per gli dèi! Siccome ero impegnato, non ci ho fatto caso».","app":[{"dirty":false,"reading":"§SIG:A§ : μα §SIG:M§","query":false,"id":"6","unit":6,"span":[76,78],"sigla":["A","M"],"lemma":"Μὰ","editors":[]},{"lemma":"προσέσχον","sigla":["A","M"],"editors":[],"span":[109,118],"unit":7,"id":"7","dirty":false,"query":false,"reading":"§SIG:A§ : προσέχων §SIG:M§"}],"num":"5","label":"5; 4 β","n":5,"A":"5","dawe":"5","type":"joke"},{"text":"Σχολαστικὸς ἰδὼν τὸν κατὰ συνήθειαν αὐτοῦ ἰατρὸν ἐρχόμενον περιεστέλλετο αὐτῷ ὀφθῆναι. ἐπερωτηθεὶς δὲ παρά τινος αὐτοῦ ἑταίρου, διὰ τί αὐτὸ ποιεῖ, ἀπεκρίθη· Πολὺς χρόνος ἐστὶν ἀφ’ οὗ οὐκ ἐνόσησα, καὶ ἐντρέπομαι αὐτόν.","wit":"AM","tr":"Uno §I§scholastikos§/I§ vedendo arrivare il proprio medico di fiducia si preoccupava di non farsi vedere da quello. Un suo amico gli domandò perché facesse ciò, e rispose: «È molto tempo che non mi ammalo più, e mi vergogno con lui».","app":[{"dirty":false,"query":false,"reading":"§SIG:M§ : ἰητρὸν §SIG:A§ cf. app. crit. 3","id":"8","unit":8,"span":[42,48],"sigla":["A","M"],"lemma":"ἰατρὸν","editors":[]},{"unit":9,"span":[113,117],"sigla":["A","M","Minas"],"lemma":"αὐτὸ","editors":["Minas"],"dirty":false,"query":false,"reading":"§SIG:A§§SIG:M§ : τοῦτο §SIG:Minas§","id":"9"}],"num":"6","label":"6; 15 β","n":6,"A":"6","dawe":"6","type":"joke"},{"label":"7","n":7,"A":"7","dawe":"7","type":"joke","text":"Σχολαστικῷ τὴν σταφυλὴν τμηθέντι παρήγγειλεν ὁ ἰατρὸς μὴ λαλεῖν. ὁ δὲ τῷ δούλῳ αὐτοῦ ἐπέταξεν ἀντασπάζεσθαι ἀντ’ αὐτοῦ τοὺς προσαγορεύοντας. εἶτα αὐτὸς πρὸς ἕκαστον ἔλεγε· Μὴ πρὸς ὕβριν αὐτὸ δέξῃ, εἰ ὁ δοῦλός μου ἀντ’ ἐμοῦ ἀσπάζεταί σε· ἐκέλευσε γάρ με ὁ ἰατρὸς μὴ λαλεῖν.","wit":"AM","tr":"Il medico ordinò ad uno §I§scholastikos§/I§ cui era stata amputata l’ugola, di non parlare. Questo allora diede disposizione al proprio servo di rispondere al suo posto a quelli che lo salutavano. Poi proprio lui diceva a ciascuno: «Non prenderlo come una mancanza di rispetto, se ti saluta il mio schiavo al posto mio: il dottore mi ha infatti comandato di non parlare».","app":[{"sigla":["A","M"],"lemma":"ἰατρὸς","editors":[],"span":[47,53],"unit":10,"id":"10","dirty":false,"reading":"§SIG:M§ : ἰητρὸς utroque loco §SIG:A§ cf. app. crit. 3","query":false},{"editors":[],"sigla":["A","M"],"lemma":"ἔταξεν","span":[87,93],"unit":11,"id":"11","reading":"§SIG:A§ : ἔταξε §SIG:M§","query":false,"dirty":false},{"query":false,"reading":"§SIG:A§ : εἰ μὴ §SIG:Minas§","dirty":false,"id":"12","span":[173,174],"unit":12,"editors":["Minas"],"lemma":"ἢ","sigla":["A","Minas"]},{"span":[108,118],"unit":13,"lemma":"ἀντ αὐ r":"A uno §I§scholastikos§/I§ che vendeva un cavallo fu chiesto se non fosse pauroso. Quello allora disse: «No, per la salvezza di mio padre: nella stalla, infatti, è stato da solo».","app":[{"reading":"§SIG:A§ : δηλὸς §SIG:M§","query":false,"dirty":false,"id":"19","unit":19,"span":[40,46],"editors":[],"lemma":"δειλὸς","sigla":["A","M"]},{"id":"20","query":false,"reading":"§SIG:Minas§ coll. 49 β","dirty":false,"editors":["Minas"],"sigla":["Minas"],"lemma":"τὴν","unit":20,"span":[70,73]}],"num":"10"},{"n":11,"A":"11","label":"11; 11 β","type":"joke","dawe":"11","wit":"AM","text":"Σχολαστικὸς θέλων ἰδεῖν, εἰ πρέποι αὐτῷ κοιμᾶσθαι, καμ‹μ›ύσας ἐνωπτρίζετο.","app":[{"unit":21,"span":[51,61],"sigla":["A","M","Needham"],"lemma":"καμμύσας","editors":["Needham"],"dirty":false,"query":false,"reading":"§SIG:Needham§ : καμύσας §SIG:A§§SIG:M§","id":"21"},{"editors":[],"lemma":"ἐνωπτρίζετο","sigla":["A","M"],"span":[62,73],"unit":22,"id":"22","query":false,"reading":"§SIG:A§ : ἐνοπτρίζετο §SIG:M§","dirty":false}],"num":"11","tr":"Uno §I§scholastikos§/I§ volendo vedere se per lui fosse decoroso dormire, chiuse gli occhi e si osservò allo specchio."},{"n":12,"A":"12","label":"12","type":"joke","dawe":"12","wit":"AM","text":"Σχολαστικῷ ἀποδημοῦντι φίλος αὐτοῦ ἔλεγεν· Ἀξιῶ σε δύο παῖδας ἀγοράσαι μοι, ‹ἑκάτερον› πεντεκαίδεκα ἐτῶν. ὁ δὲ εἶπεν· Ἐὰν τοιούτους μὴ εὕρω, ἀγοράσω σοι ἕνα τριάκοντα ἐτῶν.","app":[{"editors":[],"lemma":"ἀγοράσαι","sigla":["A","M"],"unit":23,"span":[62,70],"id":"23","reading":"§SIG:A§ : ἀγόρασαί §SIG:M§","query":false,"dirty":false},{"reading":"§SIG:Eberhard§ : ἐκ §SIG:A§§SIG:M§","query":false,"dirty":false,"id":"24","span":[77,85],"unit":24,"editors":["Eberhard"],"lemma":"ἑκάτερον","sigla":["A","Eberhard","M"]}],"num":"12","tr":"Ad uno §I§scholastikos§/I§ che partiva per un viaggio un suo amico disse: «Ti chiedo di comprarmi due schiavi, entrambi di quindici anni». Quello allora disse: «Se non li trovo così, te ne prenderò uno di trenta anni»."},{"wit":"AM","text":"Σχολαστικοὶ δύο [πατραλοῖαι] ἐδυσφόρουν πρὸς ἀλλήλους ἐπὶ τῷ τοὺς πατέρας αὐτῶν ζῆν. τοῦ δὲ ἑνὸς εἰπόντος· Θέλεις οὖν ἀποπνίξει ἕκαστος ἡμῶν τὸν ἴδιον; Μὴ γένοιτο, εἶπεν ὁ ἄλλος, ἵνα μὴ πατραλοῖαι ἀκούσωμεν. ἀλλ’ εἰ βούλει, σὺ τὸν ἐμὸν σφάξον, κἀγὼ τὸν σόν.","num":"13","app":[{"id":"25","dirty":false,"query":false,"reading":"del. §SIG:Eberhard§, πατροκτόνον prop. §SIG:Thierfelder§","sigla":["Eberhard","Thierfelder"],"lemma":"πατραλοῖαι","editors":["Eberhard","Thierfelder"],"span":[17,27],"unit":25},{"query":false,"reading":"§SIG:A§ : ἀποπνίξαι §SIG:M§","dirty":false,"id":"26","unit":26,"span":[118,127],"editors":[],"lemma":"ἀποπνίξει","sigla":["A","M"]}],"tr":"Due §I§scholastikoi §/I§si lamentavano l’un l’altro del fatto che i loro padri fossero in vita. Quando uno dei due disse: «Vuoi dunque che ciascuno ammazzi il proprio padre?», l’altro rispose: «Non sia mai, ché non abbiamo la reputazione di parricidi! Ma se vuoi, ammazza tu il mio, e io il tuo».","A":"13","n":13,"label":"13; cf. 158 α","type":"joke","dawe":"13"},{"text":"Σχολαστικὸς οἰκίας πριάμενος, εἶτα διὰ τῆς θυρίδος παρακύψας ἠρώτα τοὺς παρερχομένους, εἰ πρέπει αὐτῷ.","wit":"A","tr":"Uno §I§scholastikos §/I§che comprava una casa, sportosi allora alla finestra chiedeva ai passanti se gli si addicesse.","app":[],"num":"14","label":"14; 12 β","n":14,"A":"14","dawe":"14","type":"joke"},{"wit":"AM","text":"Σχολαστικὸς καθ’ ὕπνους ἧλον πεπατηκέναι δόξας τὸν πόδα περιέδησεν. ἑταῖρος δὲ αὐτοῦ πυθόμενος τὴν αἰτίαν καὶ γνούς· Δικαίως, ἔφη, μωροὶ καλούμεθα. διὰ τί γὰρ ἀνυπόδητος κοιμᾶσαι;","num":"15","app":[{"id":"27","dirty":false,"reading":"§SIG:A§ : om. §SIG:M§","query":false,"lemma":"καθ ὕπνους","sigla":["A","M"],"editors":[],"unit":27,"span":[12,23]},{"lemma":"δόξας τὸν","sigla":["A","M"],"editors":[],"unit":28,"span":[41,50],"id":"28","dirty":false,"query":false,"reading":": δόξας, τὸν §SIG:A§§SIG:M§"},{"reading":"§SIG:A§ : κοιμᾶσε §SIG:M§","query":false,"dirty":false,"id":"29","span":[170,178],"unit":29,"editors":[],"sigla":["A","M"],"lemma":"κοιμᾶσαι"},{"id":"30","dirty":false,"reading":": ἄκτον §SIG:A§ac","query":false,"sigla":["A"],"lemma":"ἔδησεν","editors":[],"unit":30,"span":[60,66]},{"dirty":false,"query":false,"reading":"§SIG:A§ : τὴν γυναῖκα αὐτοῦ συνεχῶς §SIG:C§","id":"31","unit":31,"span":[95,34530],"sigla":["A","C"],"lemma":"τὴν … καταφιλῶν","editors":[]}],"tr":"Uno §I§scholastikos§/I§, credendo di aver calpestato un chiodo in sogno, si fasciò il piede. Un suo amico, chiesta e saputane la ragione, disse: «Giustamente siamo chiamati scemi! Perché infatti dormi scalzo?!».","A":"15","n":15,"label":"15; 13 β","type":"joke","dawe":"15"},{"text":"Σχολαστικὸς βιβλίον αὐτοῦ ἐπιζητῶν ἐπὶ πολλὰς ἡμέρας καὶ μὴ εὑρίσκων, ὡς κατὰ τύχην μαρούλια ἤσθιεν, ἐπιστραφεὶς ἐπί τινος γωνίας εἶδε κείμενον τὸ βιβλίον. ὕστερον δὲ φίλῳ ἀπαντήσας ὀδυρομένῳ, ὡς τὴν στολὴν τῶν ἱματίων αὐτοῦ ἀπολέσαντι· Μὴ δυσφόρει, ἔφη, ἀλλὰ μαρούλια ἀγοράσας καὶ ἐσθίων αὐτὰ πρὸς τὴν γωνίαν ἐπιστραφεὶς πρόσσχες, καὶ εὑρήσεις αὐτά.","wit":"AM","tr":"Uno §I§scholastikos§/I§ che cercava un suo libro da molti giorni e non lo trovava, quando si era trovato a mangiare della lattuga, si voltò e vide il libro giacere in un angolo. Successivamente, incontrato un amico che si lamentava perché aveva perso la sua muta di vestiti, disse: «Non abbatterti, ma compra della lattuga, e mentre la mangi voltati e va’ nell’angolo, e la troverai».","num":"16","app":[{"unit":32,"span":[225,235],"editors":[],"sigla":["A","M"],"lemma":"ἀπολέσαντι","query":false,"reading":": ἀπολέσαντα §SIG:A§ : ἀπωλέσαντα §SIG:M§","dirty":false,"id":"32"},{"id":"33","dirty":false,"query":false,"reading":"§SIG:Thierfelder§ : πρόσχες §SIG:A§§SIG:M§","lemma":"πρόσσχες","sigla":["A","M","Thierfelder"],"editors":["Thierfelder"],"unit":33,"span":[322,330]}],"label":"16","A":"16","n":16,"dawe":"16","type":"joke"},{"dawe":"17","type":"joke","label":"17; 36 β","n":17,"A":"17","tr":"Un amico che era in un viaggio all’estero scrisse ad uno §I§scholastikos§/I§ di acquistargli dei libri. Quello non se ne diede cura e, incontrato l’amico rientrato, disse: «La lettera che mi hai mandato a proposito dei libri, non l’ho ricevuta».","app":[{"id":"34","dirty":false,"query":false,"reading":"§SIG:A§ : ἀγοράσει §SIG:M§","lemma":"ἀγοράσῃ","sigla":["A","M"],"editors":[],"span":[53,60],"unit":34},{"id":"35","reading":"§SIG:A§ : om. §SIG:M§","query":false,"dirty":false,"editors":[],"lemma":"ἀπαντήσας","sigla":["A","M"],"unit":35,"span":[94,103]},{"id":"36","dirty":false,"reading":"cf. 45α τὴν περί τῶν βιβλίων ἐπιστολήν, εἶπεν, ἣν οὐκ ἐδεξάμην ἀπέστειλας §SIG:A§§SIG:M§","query":false,"lemma":"ἣν … ἐδεξάμην","sigla":["A","M"],"editors":[],"unit":36,"span":[106,171]}],"num":"17","text":"Σχολαστικῷ ἑταῖρος ἀποδημῶν ἔγραψεν, ἵνα αὐτῷ βιβλία ἀγοράσῃ. ὁ δὲ ἀμελήσας, ἐπανελθόντι αὐτῷ ἀπαντήσας· Τὴν ἐπιστολήν, εἶπεν, ἣν περὶ τῶν βιβλίων ἀπέστειλας, οὐκ ἐδεξάμην.","wit":"AM"},{"n":18,"A":"18","label":"18","type":"joke","dawe":"18","wit":"AM","text":"Σχολαστικῷ τις ἀπαντήσας εἶπεν· Ὁ δοῦλος, ὃν ἐπώλησάς μοι, ἀπέθανε. Μὰ τοὺς θεούς, ἔφη, παρ’ ἐμοὶ ὅτε ἦν, τοιοῦτον οὐδὲν ἐποίησεν.","app":[{"dirty":false,"query":false,"reading":"§SIG:A§ : ἐποίησε §SIG:M§","id":"37","span":[121,129],"unit":37,"lemma":"ἐποίησεν","sigla":["A","M"],"editors":[]}],"num":"18","tr":"Un tale incontrò uno §I§scholastikos§/I§ e disse: «Lo schiavo che mi hai venduto è morto». «Per gli dèi!» disse lo §I§scholastikos§/I§, «quando era da me, non ha mai fatto niente del genere!»."},{"wit":"AM","text":"Σχολαστικὸς ἰδὼν πολλοὺς στρουθοὺς ἐπὶ δένδρου ἑστῶτας, ἁπλώσας τὸν κόλπον ἔσειε [καὶ] τὸ δένδρον ὡς ὑποδεξόμενος τοὺς στρουθούς.","app":[{"query":false,"reading":"§SIG:A§§SIG:M§ : ἔσειε §SIG:Minas§","dirty":false,"id":"38","unit":38,"span":[75,85],"editors":["Minas"],"sigla":["A","M","Minas"],"lemma":"ἔσειε καὶ"}],"num":"19","tr":"Uno §I§scholastikos§/I§ che aveva visto molti passeri appollaiati su un albero, distese la piega dell’abito e scuoteva l’albero per raccogliere i he sei morto». Quello rispose: «Ma mi vedi vivo!» e lo §I§scholastikos§/I§: «Ma quello che me l’ha detto è molto più credibile di te».","app":[{"id":"44","query":false,"reading":"§SIG:A§ : πολύ σου §SIG:M§","dirty":false,"editors":[],"sigla":["A","M"],"lemma":"πολὺ σοῦ","span":[148,156],"unit":44}],"num":"22","label":"22; 22 β [et 3 γ?]","n":22,"A":"22","dawe":"22","type":"joke"},{"label":"23; 135 α","A":"23","n":23,"dawe":"23","type":"joke","text":"Σχολαστικὸς κατὰ πρώτην ἄνοιξιν τοῦ βαλανείου εἰσελθὼν καὶ μηδένα εὑρὼν ἔσω λέγει πρὸς τὸν δοῦλον αὐτοῦ· Ἐξ ὧν βλέπω, [μὴ] οὐ λούει τὸ βαλανεῖον.","wit":"AM","tr":"Uno §I§scholastikos §/I§entra alla prima apertura delle terme e non trovando nessuno all’interno dice al proprio servo: «Da ciò che vedo, il bagno non lava».","num":"23","app":[{"dirty":false,"query":false,"reading":"§SIG:A§ : μὴδ’ ἕνα §SIG:M§","id":"45","unit":45,"span":[59,65],"sigla":["A","M"],"lemma":"μηδένα","editors":[]},{"id":"46","query":false,"reading":"del. §SIG:Thierfelder§ coll. 135α, sed cf. K.G. I 224 n.7","dirty":false,"editors":["Thierfelder"],"sigla":["Thierfelder"],"lemma":"μὴ","span":[119,121],"unit":46},{"id":"47","query":false,"reading":"fort. delendum cf. 135α. Post βαλανεῖον notam interrogationis §SIG:M§","dirty":false,"editors":[],"sigla":["M"],"lemma":"τὸ βαλανεῖον","span":[132,144],"unit":47}]},{"text":"Σχολαστικὸς μαχόμενος τῷ πατρὶ λέγει πρὸς αὐτόν· Κακὲ δοῦλε, οὐχ ὁρᾷς, οἶά με ἐζημίωσας; εἰ γὰρ σὺ μὴ ἐγεννήθης, ἐγὼ ἂν τὸν πάππον μου ἐκληρονόμησα.","wit":"AM","tr":"Uno §I§scholastikos §/I§litigando col padre gli dice: «Brutto schiavo, non vedi come mi hai rovinato? Se tu non fossi nato, io erditerei la fortuna di mio nonno!».","app":[{"lemma":"οἶά","sigla":["A","M"],"editors":[],"span":[71,74],"unit":48,"id":"48","dirty":false,"query":false,"reading":"§SIG:A§ : οἵα §SIG:M§"},{"reading":"§SIG:A§ : ἐγενήθης §SIG:M§ac","query":false,"dirty":false,"id":"49","span":[102,111],"unit":49,"editors":[],"lemma":"ἐγεννήθης","sigla":["A","M"]}], παρεῖναι.","type":"joke","dawe":"32","n":32,"A":"32","label":"32"},{"label":"33","A":"33","n":33,"dawe":"33","type":"joke","text":"Σχολαστικοῦ υἱὸς ἐσφαίριζε. πεσούσης οὖν εἰς φρέα τῆς σφαίρας, παρακύψας καὶ ἰδὼν τὴν ἑαυτοῦ σκιὰν ᾔτει τὴν σφαῖραν. εἶτα πρὸς τὸν πατέρα κατηγόρει ὡς μὴ ἀπολαβὼν αὐτήν. ὁ δὲ προκύψας εἰς τὸ φρέαρ καὶ ἰδὼν τὴν ἑαυτοῦ σκιὰν [ᾔτει τὴν σφαῖραν]· Οἰκοδέσποτα, φησίν, ἀπόδος τῷ παιδὶ τὴν σφαῖραν.","wit":"AM","tr":"Il figlio di uno §I§scholastikos§/I§ giocava a palla. Poiché la palla era caduta nel pozzo, si chinò e, vista la propria ombra, le chiedeva la palla. Successivamente disse al padre che non l’aveva recuperata. Questi si sporse sul pozzo, vide la propria ombra e disse: «Padrone di casa, rendi la palla a mio figlio».","num":"33","app":[{"editors":[],"lemma":"ᾔτει","sigla":["A","M"],"span":[99,103],"unit":67,"id":"67","query":false,"reading":"§SIG:A§ : ἤτοι utroque loco §SIG:M§","dirty":false},{"dirty":false,"reading":"§SIG:A§ : παρακύψας §SIG:M§","query":false,"id":"68","span":[175,183],"unit":68,"sigla":["A","M"],"lemma":"προκύψας","editors":[]},{"id":"69","reading":"del. §SIG:Thierfelder§","query":false,"dirty":false,"editors":["Thierfelder"],"sigla":["Thierfelder"],"lemma":"ᾔτει2 … σφαῖραν","unit":69,"span":[224,240]},{"id":"70","query":false,"reading":": ἰκοδεσπότα §SIG:A§§SIG:M§","dirty":false,"editors":[],"sigla":["A","M"],"lemma":"Οἰκοδέσποτα","unit":70,"span":[243,254]},{"id":"71","dirty":false,"query":false,"reading":"§SIG:A§ : τὶ seu τὲ seu τὸ §SIG:M§","sigla":["A","M"],"lemma":"τῷ","editors":[],"unit":71,"span":[270,272]}]},{"type":"joke","dawe":"34","n":34,"A":"34","label":"34; 5 β [et 2 γ?]","app":[{"editors":[],"lemma":"ἐπισκεπτόμενος","sigla":["A","M"],"unit":72,"span":[29,43],"id":"72","reading":"§SIG:A§ : ἐπισκεπτόμενον §SIG:M§","query":false,"dirty":false},{"editors":[],"sigla":["A","M"],"lemma":"εἶπε","unit":73,"span":[109,113],"id":"73","query":false,"reading":"§SIG:M§ : εἶπεν §SIG:A§ac","dirty":false}],"num":"34","t
