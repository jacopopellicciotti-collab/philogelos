 rispose: «Signore, hai dei carbonchi?».","n":140,"A":"140","label":"135","type":"joke","dawe":"135"},{"A":"141","n":141,"label":"136; 96 α et 1 γ","type":"joke","dawe":"136","wit":"A","text":"Σιδόνιος γραμματικὸς ἠρώτα τὸν †διδάσκαλον· Ἡ πεντακότυλος λήκυθος πόσον χωρεῖ; ὁ δὲ εἶπεν· Οἶνον λέγεις ἢ ἔλαιον;","num":"136","app":[],"tr":"Un segretario Sidonio chiedeva al †maestro†: « La boccetta da cinque cotili quanto è capace?». E quello disse: «Di vino dici, o di olio?»."},{"text":"Σιδονίῳ μαγείρῳ λέγει τις· Δάνεισόν μοι μάχαιραν ἕως Σμύρνης. ὁ δὲ ἔφη· Οὐκ ἔχω μάχαιραν ἕως ἐκεῖ φθάζουσαν.","wit":"AM","tr":"Un tale dice a un cuoco Sidonio: «Prestami un coltello fino a Smirne». Questo allora dice: «Non ho un coltello che arrivi fin lì».","app":[{"sigla":["A","M"],"lemma":"μαγείρῳ","editors":[],"unit":333,"span":[8,15],"id":"333","dirty":false,"reading":"§SIG:A§ : μάγειρος §SIG:M§","query":false}],"num":"137","label":"137; cf. 104 α","n":142,"A":"142","dawe":"137","type":"joke"},{"app":[{"id":"334","query":false,"reading":"§SIG:Minas§ : ζευγελάτην §SIG:A§","dirty":false,"editors":["Minas"],"lemma":"ζευγηλάτην","sigla":["A","Minas"],"unit":334,"span":[25,35]},{"dirty":false,"reading":"§SIG:M§ : ἀρώστου §SIG:A§","query":false,"id":"335","unit":335,"span":null,"sigla":["A","M"],"lemma":"ἀρρώστου","editors":[]},{"reading":"§SIG:M§ : ἐκφερουμένου §SIG:A§","query":false,"dirty":false,"id":"336","span":null,"unit":336,"editors":[],"lemma":"ἐκφερομένου","sigla":["A","M"]},{"dirty":false,"query":false,"reading":"§SIG:A§ : κηδία §SIG:M§","id":"337","unit":337,"span":null,"lemma":"κηδείᾳ","sigla":["A","M"],"editors":[]},{"unit":338,"span":null,"editors":[],"lemma":"ἀκολουθῶν","sigla":["A","M"],"reading":"§SIG:A§ : ἀκολουθὼν §SIG:M§","query":false,"dirty":false,"id":"338"}],"num":"138","tr":"Un centurione Sidonio vide un carrettiere che portava il carro attraverso la piazza e ordinò che venisse percosso. Quando allora questi disse: «Sono un cittadino romano, per legge non posso essere percosso!», il centurione ordinò che fossero fustigati i buoi.","wit":"A","text":"Σιδόνιος κεντουρίων ἰδὼν ζευγηλάτην διὰ τῆς ἀγορᾶς ἅμαξαν φέροντα ἐκέλευσεν αὐτὸν τυφθῆναι. τοῦ δὲ εἰπόντος ὅτι Ῥωμαῖός εἰμι, καὶ οὐ χρὴ τύπτεσθαί με διὰ τὸν νόμον τοὺς βόας ἐκέλευσεν ὁ κεντουρίων μαστιγωθῆναι.","type":"joke","dawe":"138","n":143,"A":"143","label":"138"},{"wit":"AM","text":"","num":"139","app":[],"tr":"Un medico Sidonio ottenne in testamento da un suo ammalato mille dracme dopo la morte, e mentre quello veniva portato a sepoltura, lui seguiva il corteo e si lamentava del fatto che gli avesse lasciato poco in legato testamentario. Quando poi anche il figlio del defunto era incappato in una malattia e lo pregava di visitarlo e affrontare il morbo, il medico disse: «Se mi lascerai nel testamento cinquemila dracme, io ti curerò come ho fatto con tuo padre!».","A":"144","n":144,"label":"139","type":"joke","dawe":"139"},{"app":[],"type":"section","text":"εὐτράπελοι"},{"tr":"Uno spiritoso vide un maestro elementare inetto insegnare, andò da lui e gli chiese perché non insegnasse a suonare la cetra. Quando quello allora rispose: «Perché non sono in grado», disse: «E perché dunque insegni le lettere, pur non essendone in grado?».","app":[],"num":"140","text":"Εὐτράπελος ἰδὼν γραμματοδιδάσκαλον ἀφυῆ διδάσκοντα προσελθὼν ἠρώτα, διὰ τί κιθαρίζειν οὐ διδάσκει. Τοῦ δὲ εἰπόντος· Ὅτι οὐκ ἐπίσταμαι, εἶπε· Πῶς οὖν γράμματα διδάσκεις οὐκ ἐπιστάμενος;","wit":"AM","dawe":"140","type":"joke","label":"140","n":145,"A":"145"},{"type":"joke","dawe":"141","n":146,"A":"146","label":"141; 62 β, cf. 125 α","app":[{"unit":339,"span":[11,21],"sigla":["A"],"lemma":"κυβερνήτης","editors":[],"dirty":false,"query":false,"reading":": κυβερνίτης §SIG:A§","id":"339"},{"span":[57,64],"unit":340,"editors":["Minas"],"sigla":["A","Minas"],"lemma":"κρόμμυα","query":false,"reading":"§SIG:Minas§ : κρόμυα §SIG:A§","dirty":false,"id":"340"}],"num":"141","tr":"A un timoniere spiritoso fu domandato che aria tirasse e rispose: «Di fave e cipolle!».","wit":"A","text":"Εὐτράπελος κυβερνήτης ἐρωτηθείς, τί φυσᾷ, εἶπε· Φάβα καὶ κρόμμυα."},{"type":"joke","dawe":"142","n":147,"A":"147","label":"142","app":[{"query":false,"reading":": μοι ἐδάνεισας §SIG:A§ ut supra §SIG:Cataudella§ : με ἔχρισας ut supra §SIG:Thierfelder§","dirty":false,"id":"341","span":[141,152],"unit":341,"editors":["Cataudella","Thierfelder"],"lemma":"μοι ἤλειψας","sigla":["A","Cataudella","Thierfelder"]},{"unit":342,"span":[154,179],"editors":["Dawe"],"lemma":"τὸν … αὐτόν","sigla":["A","Dawe"],"query":false,"reading":"§SIG:A§ : τοῦ λύχνου οὐ βλέπω αὐγήν dub. §SIG:Dawe§","dirty":false,"id":"342"}],"num":"142","tr":"Un medico dalle mani lunghe guarì uno spiritoso che aveva un problema agli occhi e non ci vedeva, e gli rubò una lampada. Una volta poi gli chiedeva: «Come vanno gli occhi?» e lo spiritoso: «Da quando me li hai curati, non vedo proprio la lampada!».","wit":"A","text":"Εὐτράπελον ὀφθαλμιῶντα ἰατρὸς κλέπτης λύχνον ἔκλεψε. μιᾷ οὖν ταῦτα ἠρώτα αὐτόν· Πῶς ἔχεις εἰς τοὺς ὀφθαλμούς; καὶ ὁ εὐτράπελός φησιν· Ἀφ’ οὗ μοι ἤλειψας, τὸν λύχνον οὐ βλέπω αὐτόν."},{"label":"143; 64 β","A":"148","n":148,"dawe":"143","type":"joke","text":"Εὐτραπέλῳ ἰατρῷ λέγει τις·‹...› Ἐὰν κτήσῃ [θερμὸν] ἀγγεῖον, θερμόν σε οὐ λείψει.","wit":"A","tr":"Il testo è lacunoso proprio nel momento in cui viene presentata la parola che sarà ripresa come §I§pointe §/I§del gioco di parole, ma il senso è perfettamente recuperabile dalla 64","num":"143","app":[]},{"tr":"Uno spiritoso vide un corridore svogliato e disse: «So cosa vuole il signore qui». Quando il giudice chiese: «Cosa? disse: «Ha bisogno di un cavallo! Perché non può riprendere in altro modo gli avversari!».","app":[{"reading":"§SIG:A§ : τὶνος χρῄζει §SIG:Minas§","query":false,"dirty":false,"id":"343","unit":343,"span":[42,51],"editors":["Minas"],"sigla":["A","Minas"],"lemma":"τί χρῄζει"},{"lemma":"ὁ κύριός","sigla":["A","Eberhard"],"editors":["Eberhard"],"unit":344,"span":[52,60],"id":"344","dirty":false,"reading":"§SIG:A§ : ὦ κῦρί (κύριέ) §SIG:Eberhard§","query":false},{"id":"345","dirty":false,"reading":"§SIG:Minas§ : καταβαλεῖν §SIG:A§","query":false,"lemma":"καταλαβεῖν","sigla":["A","Minas"],"editors":["Minas"],"span":[162,172],"unit":345}],"num":"144","text":"Εὐτράπελος ἀργὸν δρομέα ἰδὼν εἶπεν· Οἶδα, τί χρῄζει ὁ κύριός μου οὗτος. τοῦ δὲ ἀγωνοθέτου ἐρωτήσαντος· Τί ἐστιν; εἶπεν· Ἵππου χρῄζει· ἄλλως γὰρ τοὺς ἀνταγωνιστὰς καταλαβεῖν οὐ δύναται.","wit":"A","dawe":"144","type":"joke","label":"144","n":149,"A":"149"},{"wit":"A","text":"Εὐτράπελος κάπηλος εὑρὼν ταξεώτην ἐπὶ τῇ γυναικὶ αὐτοῦ εἶπεν· Εὗρον, ὃ οὐκ ἐζήτουν.","app":[],"num":"145","tr":"Un oste spiritoso trovò un soldato sopra sua moglie e disse: «Ho trovato quello che non cercavo!».","n":150,"A":"150","label":"145","type":"joke","dawe":"145"},{"dawe":"146","type":"joke","label":"146; 68 β","A":"151","n":151,"tr":"Uno spiritoso rubò un maiale e fuggiva. Quando però fu acciuffato, lo poggiò per terra e mentre lo percuoteva diceva: «Scava lì, e non vicino alle mie cose!».","num":"146","app":[{"editors":["Mehler"],"sigla":["Mehler"],"lemma":"αὐτόν","span":[62,67],"unit":346,"id":"346","query":false,"reading":"del. §SIG:Mehler§","dirty":false},{"editors":["Dawe"],"lemma":"κλέψας","sigla":["A","Dawe"],"span":[18,24],"unit":347,"id":"347","query":false,"reading":"§SIG:Dawe§ : κρύψας §SIG:A§ ex 68 β","dirty":false}],"text":"Εὐτράπελος χοῖρον κλέψας ἔφευγεν. ἐπεὶ δὲ κατελαμβάνετο, θεὶς αὐτὸν χαμαὶ καὶ δέρων ἔλεγεν· Ἐκεῖ ὄρυττε καὶ μὴ παρὰ τὰ ἐμά.","wit":"A"},{"dawe":"147","type":"joke","label":"147","A":"152","n":152,"tr":"Uno spiritoso vide un citarodo dalla voce bruta e stonata e lo salutò dicendo: «Salve, gallo!». Quando quello chiese perché lo avesse salutato così, disse: «Perché quando canti, si svegliano tutti!».","num":"147","app":[{"span":[153,161],"unit":348,"lemma":"κοκκύσῃς","sigla":["A","M"],"editors":[],"dirty":false,"reading":": κοκκύσῃς edd. : κοκύσης §SIG:A§ : κοκίσης §SIG:M§","query":false,"id":"348"}],"text":"Εὐτράπελος ἰδὼν κακόηχον καὶ κακόφωνον κιθαρῳδὸν ἠσπάσατο λέγων· Χαῖρε, ἀλεκτρυών. τοῦ δὲ πυθομένου, διὰ τί αὐτὸν οὕτως προσηγόρευσεν, ἔφη· Ὅτι, ὅταν σὺ κοκκύσῃς, πάντες ἐγείρονται.","wit":"AM"},{"dawe":"148","type":"joke","label":"148","n":153,"A":"153","tr":"Uno spiritoso, quando un barbiere chiacchierone gli chiese: «Come te li taglio?» disse: «Stando in silenzio».","app":[{"editors":["Minas"],"sigla":["A","Minas"],"lemma":"Πῶς … κείρω","unit":349,"span":[40,52],"id":"349","reading":"§SIG:Minas§ : Πῶς ἐκείρω §SIG:A§","query":false,"dirty":false}],"num":"148","text":"Εὐτράπελος φλυάρου κουρέως ἐρωτήσαντος· Πῶς σε κείρω; Σιωπῶν, ἔφη.","wit":"A"},{"type":"joke","dawe":"149","n":154,"A":"154","label":"149; 71 β","app":[{"editors":["Minas"],"sigla":["A","Minas"],"lemma":"ὑβρισθεὶς","span":[33,42],"unit":350,"id":"350","query":false,"reading":"§SIG:Minas§ : ὀριγισθεὶς §SIG:A§","dirty":false},{"query":false,"reading":"§SIG:Boissonade§","dirty":false,"id":"351","span":[104,106],"unit":351,"editors":["Boissonade"],"lemma":"ἐν","sigla":["Boissonade"]}],"num":"149","tr":"Uno spiritoso fu maltrattato in un bagno da un tale e portava come testimoni gli inservienti. Quando l’imputato obiettava che non erano degni di fede, disse: «Se fossi stato maltrattato nel cavallo di legno, avrei portato come testimoni Menelao, Odisseo e Diomede, ché erano lì; siccome invece la violenza è avvenuta nel bagno, avranno per forza visto meglio il fatto gli inservienti!».","wit":"A","text":"Εὐτράπελος ἐν βαλανείῳ ὑπό τινος ὑβρισθεὶς μάρτυρας προσέφερε τοὺς παραχύτας. τοῦ δὲ ἀντιδίκου ἀποβαλλομένου ὡς μὴ ὄντας ἀξιοπίστους ἔφη· Εἰ μὲν ‹ἐν› τῷ δουρείῳ ἵππῳ ὑβρίσθην, προήγαγον ἂν μάρτυρας τοὺς περὶ Μενέλαον καὶ Ὀδυσσέα καὶ Διομήδην· ἐν δὲ τῷ βαλανείῳ τῆς ὕβρεως γενομένης ἀνάγκη τοὺς παραχύτας τὸ πραχθὲν μᾶλλον εἰδέναι."},{"app":[{"id":"352","reading":"del. §SIG:Dawe§","query":false,"dirty":false,"editors":["Dawe"],"lemma":"δύο","sigla":["Dawe"],"unit":352,"span":[12,15]},{"span":[37,44],"unit":353,"lemma":"ὑπὸ δύο","sigla":["Dawe"],"editors":["Dawe"],"dirty":false,"reading":"add. §SIG:Dawe§","query":false,"id":"353"},{"dirty":false,"query":false,"reading":"add. §SIG:Dawe§","id":"354","unit":354,"span":[165,167],"lemma":"μὴ","sigla":["Dawe"],"editors":["Dawe"]},{"id":"355","dirty":false,"query":false,"reading":"del. §SIG:Dawe§","sigla":["Dawe"],"lemma":"μὴ","editors":["Dawe"],"span":[194,196],"unit":355}],"num":"150","tr":"Uno spiritoso, quando in un bagno gli venivano richiesti in prestito dei raschietti da due tali, e uno era uno sconosciuto, l’altro invece noto ma era un ladro, disse: «A te, siccome non ti conosco, non lo do; a te invece, siccome ti conosco, non lo do».","wit":"A","text":"Εὐτράπελος, δύο] ξύστρων παρ’ αὐτοῦ ‹ὑπὸ δύο› ἐν βαλανείῳ ἐπιζητουμένων, ὑπὸ ἑνὸς μὲν ἀγνωρίστου, ὑπὸ δὲ ἑτέρου γνωρίμου μὲν ἀλλὰ κλέπτου, ὁ εὐτράπελος ἔφη· Σὲ μὲν ‹μὴ› γνωρίζων οὐ δώσω· σὲ δὲ [μὴ] γνωρίζων οὐ δώσω.","type":"joke","dawe":"150","n":155,"A":"155","label":"150"},{"n":156,"A":"156","label":"151; 69 β","type":"joke","dawe":"151","wit":"A","text":"Εὐτράπελος ἰδὼν πορνοβοσκὸν μισθοῦντα μέλαιναν ἑταιρίδα εἶπε· Πόσου τὴν νύκτα μισθοῖς;","app":[],"num":"151","tr":"Uno spiritoso vide un lenone che vendeva una prostituta nera e disse: «A quanto vendi la notte{ N1|I4|Z1\\4\\ }?»."},{"text":"Εὐτράπελος ἰδὼν ἰατρὸν κόρην ὑπαλείφοντα ἔφη· Ὅρα, νεανίσκε, μὴ τὴν ὄψιν θεραπεύων τὴν κόρην διαφθείρῃς.","wit":"A","tr":"Uno spiritoso vide un medico che applicava un collirio a una ragazza e disse «Occhio, giovanotto, non sciupare la pupa/pulzella{ N1|I5|Z1\\5\\ } curando quella pupilla».","app":[{"query":false,"reading":"§SIG:A§ : κόρην ὀφθαλμιῶσαν §SIG:Thierfelder§","dirty":false,"id":"356","unit":356,"span":[23,28],"editors":["Thierfelder"],"sigla":["A","Thierfelder"],"lemma":"κόρην"}],"num":"151 bis","label":"151 bis; 66 β","n":157,"A":"157","dawe":"151 bis","type":"joke"},{"text":"Εὐτράπελοι δύο πατραλοῖαι πρὸς ἀλλήλους ἐδυσφόρουν πρὸς τὸ φονεῦσαι τοὺς ἑαυτῶν γονεῖς. ὁ δὲ ἕτερος πρὸς τὸν ἄλλον ἔφη· Ἵνα μὴ πατροκτόνοι παρά τισι λογισθῶμεν, σὺ φόνευσον τὸν ἐμὸν πατέρα, κἀγὼ τὸν σόν· καὶ κακῆς φεύξομεν φήμης.","wit":"A","tr":"Due spiritosi parricidi si lamentavano l’un l’altro dell’uccidere i propri genitori. Uno allora disse all’altro: «Affinché certa gente non ci consideri parricidi, tu ammazza mio padre, e io il tuo: e ci evitiamo una brutta fama!».","num":"152","app":[{"unit":357,"span":[74,78],"lemma":"αὐτῷ","sigla":["A","M"],"editors":[],"dirty":false,"query":false,"reading":"§SIG:A§ : αὐτὸ §SIG:M§","id":"357"},{"dirty":false,"query":false,"reading":"§SIG:A§§SIG:M§ : ἐμπλακεὶς §SIG:Hertlein§","id":"358","span":null,"unit":358,"sigla":["A","Hertlein","M"],"lemma":"ἐμπαρεὶς","editors":["Hertlein"]},{"unit":359,"span":null,"editors":[],"lemma":"καταλείψῃς","sigla":["A","M"],"query":false,"reading":"§SIG:A§ : καταλείψεις §SIG:M§","dirty":false,"id":"359"},{"reading":"§SIG:A§ : ὡς τὸν πατέρα σου ἰατρεύσω §SIG:M§","query":false,"dirty":false,"id":"360","unit":360,"span":null,"editors":[],"lemma":"ἰατρεύσω … σου","sigla":["A","M"]},{"editors":[],"lemma":"","sigla":["A","M"],"span":null,"unit":361,"id":"361","reading":"ἐυτράπελοι (sic) §SIG:A§ : titulum om. §SIG:M§","query":false,"dirty":false},{"id":"362","reading":"§SIG:A§ : ἐπὶ τῷ ζῆν dub. §SIG:Thierfelder§, rec. §SIG:Dawe§","query":false,"dirty":false,"editors":["Dawe","Thierfelder"],"sigla":["A","Dawe","Thierfelder"],"lemma":"πρὸς2 … φονεῦσαι","unit":362,"span":[26,67]},{"editors":["Minas"],"lemma":"φεύξομεν","sigla":["A","M","Minas"],"unit":363,"span":[214,222],"id":"363","query":false,"reading":"§SIG:Minas§ : φεύγομεν §SIG:A§§SIG:M§","dirty":false},{"span":null,"unit":364,"editors":[],"sigla":["A","M"],"lemma":"δοκῇ","query":false,"reading":"§SIG:A§ : δοκεῖ §SIG:M§","dirty":false,"id":"364"},{"lemma":"ἀπάλαιστρος","sigla":["A","Dawe","M","Thierfelder"],"editors":["Dawe","Thierfelder"],"unit":365,"span":null,"id":"365","dirty":false,"reading":"dub. §SIG:Thierfelder§, rec. §SIG:Dawe§ : ἀπάλαιστος §SIG:A§ : ἀπάλαιστον §SIG:M§","query":false},{"editors":[],"sigla":["A","M"],"lemma":"δι ὅλου","unit":366,"span":null,"id":"366","reading":"§SIG:A§ : διόλου §SIG:M§","query":false,"dirty":false}],"label":"152; 72 β; cf. 13 α","A":"158","n":158,"dawe":"152","type":"joke"},{"A":"159","n":159,"label":"153","type":"joke","dawe":"153","wit":"AM","text":"","num":"153","app":[],"tr":"Uno spiritoso cadde nel fango mentre lottava, e perché non sembrasse essere goffo, si rigirò, si infangò tutto e si sollevò vantandosi."},{"app":[],"type":"section","text":"κυμαῖοι"},{"type":"joke","dawe":"154","n":160,"A":"160","label":"154","app":[],"num":"154","tr":"A Cuma mentre qualcuno di insigne veniva seppellito, arrivò un tale e chiedeva ai presenti: «Chi è il morto?». Allora un Cumano si voltò e indicava dicendo: «Quello lì che giace sul letto funebre».","wit":"A","text":"Ἐν Κύμῃ ἐπισήμου τινὸς κηδευομένου προσελθών τις ἠρώτα τοὺς ὀψικεύοντας· Τίς ὁ τεθνηκώς; εἷς δὲ Κυμαῖος στραφεὶς ὑπεδείκνυε λέγων· Ἐκεῖνος ὁ ἐπὶ τῆς κλίνης ἀνακείμενος."},{"dawe":"155","type":"joke","label":"155; cf. 4 α et 3 β","n":161,"A":"161","tr":"Un tale si avvicinò a un Cumano che vendeva un cavallo e gli domandava se il cavallo fosse di primo ricambio. Quando quello disse che era di secondo ricambio, disse: «Come lo sai?» e quello rispose «Perché una volta ha disarcionato me, e una volta ha fatto cadere mio padre».","app":[],"num":"155","text":"Κυμαίῳ ἵππον πιπράσκοντι προσελθών τις ἠρώτα, εἰ πρωτοβόλος ὁ ἵππος. τοῦ δὲ εἰπόντος, ὅτι δευτεροβολεῖ, ἔφη· Πῶς οἶδας; ὁ δὲ εἶπεν· Ὅτι ἅπαξ ἐμὲ κάτω ἔβαλε καὶ ἅπαξ τὸν πατέρα μου.","wit":"A"},{"text":"Κυμαῖος οἰκίαν πωλῶν λίθον ἐξ αὐτῆς ἐκβαλὼν εἰς δεῖγμα περιέφερεν.","wit":"A","tr":"Un Cumano che vendeva una casa strappò via una pietra da essa e la portava in giro come campione dimostrativo.","app":[],"num":"156","label":"156; cf. 41 α et 10 β","n":162,"A":"162","dawe":"156","type":"joke"},{"type":"joke","dawe":"157","A":"163","n":163,"label":"157; cf. 10 α","num":"157","app":[{"reading":": εἱστία §SIG:A§","query":false,"dirty":false,"id":"367","span":[111,119],"unit":367,"editors":[],"lemma":"εἱστήκει","sigla":["A"]}],"tr":"A un Cumano che vendeva un cavallo fu chiesto se quello fosse pauroso. Egli rispose: «No, per l’anima mia! Nella stalla, infatti, stava da solo!».","wit":"A","text":"Κυμαῖος ἵππον πιπράσκων ἠρωτήθη, μὴ δειλὸς εἴη. ὁ δὲ ἀπεκρίνατο· Οὐ μὰ τὴν σωτηρίαν μου· ἐν τῇ φάτνῃ γὰρ μόνος εἱστήκει."},{"text":"Κυμαῖος κλεψιμαῖα ἱμάτια ἀγοράσας διὰ τὸ μὴ γνωρισθῆναι ἐπίσσωσεν αὐτά.","wit":"A","tr":"Un Cumano si mise a vendere mantelli rubati e perché non fossero riconosciuti come tali, li ricoprì di pece.","num":"158","app":[],"label":"158; cf. 35 α","A":"164","n":164,"dawe":"158","type":"joke"},{"num":"158 bis","app":[],"tr":"Un Cumano vendeva un cavallo. Poiché era giunto un tale e ne esaminava la dentatura, disse: «Perché osservi i suoi denti? Oh, se trottasse tanto quanto mangia!».","wit":"A","text":"Κυμαῖος ἵππον ἐπίπρασκεν. ἐλθόντος δέ τινος καὶ καταμανθάνοντος αὐτοῦ τὸν βόλον εἶπε· Τί τοὺς ὀδόντας αὐτοῦ καταμανθάνεις; εἴθε ὡς τρώγει, οὕτως καὶ περιεπάτει.","type":"joke","dawe":"158 bis","A":"165","n":165,"label":"158 bis; cf. 37 α et 6 β"},{"wit":"AM","text":"Κυμαῖος ἅλωνα μεγάλην ποιήσας ἔστησεν ἄντικρυς τὴν γυναῖκα αὐτοῦ καὶ ἠρώτα, εἰ βλέπει αὐτόν. τῆς δὲ εἰπούσης, ὅτι μόλις αὐτὸν βλέπει, ἔφη ἐκεῖνος· Ἀλλ’ ἐγὼ εἰς καιρὸν τηλικαύτην ποιήσω ἅλωνα, ἵνα μήτε ἐγὼ σὲ μήτε σὺ ἐμὲ ἴδῃς.","app":[{"editors":[],"lemma":"ἔστησεν ἄντικρυς","sigla":["A","M"],"unit":368,"span":[30,46],"id":"368","reading":"§SIG:A§ : ἕστησεν ἄντικρυ §SIG:M§","query":false,"dirty":false},{"id":"369","query":false,"reading":"§SIG:A§ : ἠρῶτα §SIG:M§","dirty":false,"editors":[],"sigla":["A","M"],"lemma":"ἠρώτα","unit":369,"span":[69,74]},{"dirty":false,"reading":"§SIG:A§ : ποιήσας §SIG:M§ac","query":false,"id":"370","span":[178,184],"unit":370,"sigla":["A","M"],"lemma":"ποιήσω","editors":[]}],"num":"159","tr":"Un Cumano realizzò una grande aia, piazzò sua moglie dalla parte opposta e le chiedeva se lo vedesse. Quando questa rispose che lo guardava a fatica, quello disse: «Ma io in un tempo abbastanza ampio realizzerò un’aia che farà sì che né io guarderò te, né tu me».","n":166,"A":"166","label":"159","type":"joke","dawe":"159"},{"label":"160","A":"167","n":167,"dawe":"160","type":"joke","text":"Κυμαῖος ἐπιζητῶν φίλον ἐκάλει αὐτὸν πρὸ τῆς οἰκίας ὀνομαστί. ἑτέρου δὲ εἰπόντος· Ὑψηλότερον φώνησον, ἵνα ἀκούσῃ ἀφεὶς τὸ ὄνομα, ὃ ᾔδει, ἐβόα· Ὑψηλότερε.","wit":"AM","tr":"Un Cumano che cercava un amico lo chiamava per nome davanti casa. Quando un tale gli disse: «Chiamalo più forte, cosicché ti senta!» quello tralasciò il nome che conosceva, e gridava: «Oh, Più forte!».","num":"160","app":[{"unit":371,"span":[105,111],"lemma":"ἀκούσῃ","sigla":["A","M"],"editors":[],"dirty":false,"query":false,"reading":"§SIG:A§ : ἀκούσει §SIG:M§","id":"371"}]},{"app":[],"num":"161","tr":"Un Cumano che faceva progetti sulla casa di un debitore e che voleva prendersi un credito ancor più grande, scelse documenti piuttosto pesanti.","wit":"AM","text":"Κυμαῖος δανειστοῦ οἰκίᾳ ἐπιβουλεύων καὶ θέλων τὰ μείζονα δάνεια κλέψαι τὰ βαρύτερα χαρτία ἐπελέγετο.","type":"joke","dawe":"161","n":168,"A":"168","label":"161"},{"type":"joke","dawe":"162","n":169,"A":"169","label":"162","app":[{"sigla":["Eberhard"],"lemma":"τὴν","editors":["Eberhard"],"unit":372,"span":[9,12],"id":"372","dirty":false,"reading":"dubitanter §SIG:Eberhard§","query":false},{"span":[48,57],"unit":373,"editors":[],"sigla":["A","M"],"lemma":"Λολλιανὸς","reading":"§SIG:A§ : Λολιανὸς §SIG:M§","query":false,"dirty":false,"id":"373"},{"span":[133,144],"unit":374,"editors":["Dawe"],"sigla":["Dawe"],"lemma":"ὀργισθέντες","query":false,"reading":"post ὀργισθέντες lacunam indicavit §SIG:Dawe§: irae causa desideretur","dirty":false,"id":"374"}],"num":"162","tr":"Quando i Cumani cingevano di mura la città, uno dei cittadini, di nome Lolliano, edificò due cortine a spese proprie. Quando allora si presentarono i nemici i Cumani si adirarono e stabilirono che nessuno avrebbe sorvegliato il muro di Lolliano, se non quello, da solo.","wit":"AM","text":"Κυμαίων ‹τὴν› πόλιν τειχιζόντων εἷς τῶν πολιτῶν Λολλιανὸς καλούμενος δύο κορτίνας ἰδίοις ἐτείχισεν ἀναλώμασι. πολεμίων δὲ ἐπιστάντων ὀργισθέντες οἱ Κυμαῖοι συνεφώνησαν, ἵνα τὸ Λολλιανοῦ τεῖχος μηδεὶς φυλάξῃ ἀλλ’ ἐκεῖνος μόνος."},{"tr":"I Cumani attendevano al rientro da un viaggio un loro spettabile amico, e poiché desideravano onorarlo con acqua pura alle terme, avendo loro una sola vasca, riempirono questa di acqua calda e pura e misero in mezzo ad essa una grata, in modo che una metà dell’acqua sia conservata pura per l’amico atteso.","num":"163","app":[{"id":"375","dirty":false,"query":false,"reading":"§SIG:Minas§ : τρίτον §SIG:A§ : susp §SIG:Thierfelder§","lemma":"τρητὸν","sigla":["A","Minas","Thierfelder"],"editors":["Minas","Thierfelder"],"span":[209,215],"unit":375}],"text":"Κυμαῖοι προσδοκῶντες ἐξ ἀποδημίας φίλον αὐτῶν ἀξιότιμον καὶ βουλόμενοι αὐτὸν ἐν τῷ βαλανείῳ διὰ καθαροῦ ὕδατος τιμῆσαι, μίαν ἔχοντες κολυμβήθραν, ταύτην ὕδατος θερμοῦ καθαροῦ πλήσαντες ἐν μέσῳ αὐτῆς κάγκελλον τρητὸν ἔβαλον, ὅπως τὸ ἥμισυ τοῦ ὕδατος καθαρὸν τῷ προσδοκωμένῳ τηρῆται φίλῳ.","wit":"A","dawe":"163","type":"joke","label":"163","A":"170","n":170},{"type":"joke","dawe":"164","n":171,"A":"171","label":"164","app":[{"editors":[],"lemma":"κατέδυ","sigla":["A","M"],"span":[72,78],"unit":376,"id":"376","reading":"§SIG:A§ : κατέβη §SIG:M§","query":false,"dirty":false}],"num":"164","tr":"Siccome scoppiò un acquazzone, un Cumano, in piscina, per non inzupparsi s’immerse sott’acqua.","wit":"AM","text":"Κυμαῖος ἐν τῷ κολυμβᾶν βροχῆς γενομένης διὰ τὸ μὴ βραχῆναι εἰς τὸ βάθος κατέδυ."},{"A":"172","n":172,"label":"165","type":"joke","dawe":"165","wit":"AM","text":"Κυμαῖος θυρίδας ἀγοράζων ἠρώτα, εἰ δύνανται πρὸς μεσημβρίαν βλέπειν.","num":"165","app":[{"id":"377","query":false,"reading":"§SIG:Boissonade§ : δύνωνται §SIG:A§§SIG:M§","dirty":false,"editors":["Boissonade"],"lemma":"δύνανται","sigla":["A","Boissonade","M"],"span":[35,43],"unit":377}],"tr":"Un Cumano che acquistava finestre domandava se esse potessero guardare a mezzogiorno."},{"wit":"AM","text":"Κυμαῖος ὄνῳ καθήμενος παρὰ κῆπον ὥδευεν. ἰδὼν οὖν κλάδον συκῆς ὑπερέχοντα σύκων ὡρίμων πεπληρωμένον ἐπελάβετο τοῦ κλάδου. τοῦ δὲ ὄνου ὑπεκδραμόντος ἀπεκρεμάσθη, καὶ τοῦ κηπουροῦ ἐρωτήσαντος, τί ἐκεῖ ποιεῖ κρεμάμενος, ἔλεγεν· Ἐκ τοῦ ὄνου ἔπεσα.","num":"166","app":[{"editors":["Eberhard"],"sigla":["A","C","Eberhard","M"],"lemma":"καθήμενος","unit":378,"span":[12,21],"id":"378","reading":"§SIG:A§§SIG:C§ : παρακαθήμενος §SIG:M§ : ἐπικαθήμενος §SIG:Eberhard§","query":false,"dirty":false},{"id":"379","dirty":false,"reading":"§SIG:Eberhard§ : ὑπέχοντα §SIG:A§ : ἐπέχοντα §SIG:M§","query":false,"sigla":["A","Eberhard","M"],"lemma":"ὑπερέχοντα","editors":["Eberhard"],"unit":379,"span":[63,73]},{"span":[80,86],"unit":380,"lemma":"ὡρίμων","sigla":["A","C","M"],"editors":[],"dirty":false,"reading":"§SIG:A§§SIG:C§ : ὁρίμων §SIG:M§","query":false,"id":"380"},{"unit":381,"span":[148,159],"editors":[],"lemma":"ἀπεκρεμάσθη","sigla":["A","C","M"],"query":false,"reading":"§SIG:C§§SIG:M§ : ἀπεκρεμμάσθη §SIG:A§","dirty":false,"id":"381"},{"sigla":["A","C","M"],"lemma":"κηπουροῦ","editors":[],"unit":382,"span":[169,177],"id":"382","dirty":false,"query":false,"reading":"§SIG:A§ : κηπωροῦ §SIG:M§§SIG:C§ hinc C incipit"},{"reading":"§SIG:A§§SIG:M§ : αἰτήσαντος §SIG:C§","query":false,"dirty":false,"id":"383","span":[178,189],"unit":383,"editors":[],"sigla":["A","C","M"],"lemma":"ἐρωτήσαντος"},{"unit":384,"span":[194,204],"editors":[],"sigla":["A","C","M"],"lemma":"ἐκεῖ ποιεῖ","query":false,"reading":"§SIG:A§ : ποιεῖ ἐκεῖ §SIG:C§ : ἐκ σοῦ ποιεῖ §SIG:M§","dirty":false,"id":"384"},{"dirty":false,"query":false,"reading":"§SIG:M§ : κρεμμάμενος §SIG:A§§SIG:C§","id":"385","span":[205,215],"unit":385,"sigla":["A","C","M"],"lemma":"κρεμάμενος","editors":[]},{"reading":"§SIG:A§§SIG:C§§SIG:M§ : ἔκ του dub. §SIG:Dawe§","query":false,"dirty":false,"id":"386","span":[225,231],"unit":386,"editors":["Dawe"],"sigla":["A","C","Dawe","M"],"lemma":"Ἐκ τοῦ"}],"tr":"Un Cumano costeggiava un orto seduto su di un asino. Vide, dunque, un ramo carico di fichi maturi e ci si aggrappò. Quando però l’asino gli sfuggì via da sotto, rimase appeso, e quando l’ortolano gli domandò cosa facesse lì appeso, diceva: «Sono caduto dall’asino!». Capire se la preposizione può avere anche valore verso l’alto","A":"173","n":173,"label":"166","type":"joke","dawe":"166"},{"tr":"Un Cumano vide una pecora legata e che veniva così tosata, e disse: «Ringrazio il mio barbiere, perché non mi ha mai rasato dopo avermi legato».","app":[{"dirty":false,"query":false,"reading":"§SIG:A§§SIG:M§ : συμπεποδηγμένον §SIG:C§","id":"387","span":[22,37],"unit":387,"lemma":"συμπεποδισμένον","sigla":["A","C","M"],"editors":[]},{"reading":"§SIG:A§§SIG:C§ : κηρόμενον §SIG:M§","query":false,"dirty":false,"id":"388","unit":388,"span":[47,57],"editors":[],"lemma":"κειρόμενον","sigla":["A","C","M"]},{"dirty":false,"query":false,"reading":"§SIG:Bursian§ et §SIG:Haupt§ : κυρίω §SIG:A§§SIG:M§§SIG:C§","id":"389","unit":389,"span":[78,84],"lemma":"κουρεῖ","sigla":["A","Bursian","C","Haupt","M"],"editors":["Bursian","Haupt"]},{"unit":390,"span":[111,118],"editors":[],"sigla":["A","C","M"],"lemma":"ἔκειρεν","query":false,"reading":"§SIG:A§2pc : ἔκειρε §SIG:A§ac§SIG:C§ : ἔκηρε §SIG:M§","dirty":false,"id":"390"}],"num":"167","text":"Κυμαῖος ἰδὼν πρόβατον συμπεποδισμένον καὶ οὕτω κειρόμενον εἶπεν· Εὐχαριστῶ τῷ κουρεῖ μου, ὅτι οὐδέποτέ μεδήσας ἔκειρεν.","wit":"AMC","dawe":"167","type":"joke","label":"167","n":174,"A":"174"},{"dawe":"168","type":"joke","label":"168","n":175,"A":"175","tr":"Un Cumano, mentre il padre era fuori per affari, cadde in una pesante accusa e fu condannato a morte. Allora mentre usciva pregava tutti che il padre non venisse a saperlo, dal momento che lo avrebbe ucciso di botte.","app":[{"dirty":false,"query":false,"reading":"§SIG:A§ : εἰσφέρειν §SIG:C§","id":"391","unit":391,"span":[164,173],"sigla":["A","C"],"lemma":"ἐπιφέρειν","editors":[]}],"num":"168","text":"Κυμαῖος τοῦ πατρὸς αὐτοῦ ἀποδημήσαντος εἰς βαρὺ ἔγκλημα πεσὼν θανάτῳ κατεδικάσθη. ἀπιὼν δὲ παρεκάλει πάντας, ἵνα ὁ πατὴρ μὴ γνῷ, ἐπεὶ μέλλει αὐτῷ θανασίμους πληγὰς ἐπιφέρειν.","wit":"AC"},{"text":"Ὁ αὐτός, τινὸς αὐτῷ εἰπόντος ὅτι Ἐσύλησάς με Μὴ ὑποστρέψω, ‹ἔφη›, ἔνθεν ἄπειμι, εἰ ἐσύλησά ‹σε›.","wit":"A","tr":"Sempre questo, quando un tale gli disse: «Mi hai derubato!», fece: «Che io non faccia ritorno lì da dove me ne vado, se ti ho derubato».","app":[{"id":"392","dirty":false,"reading":"vel εἶπεν dub. add. §SIG:Boissonade§","query":false,"lemma":"ἔφη","sigla":["Boissonade"],"editors":["Boissonade"],"span":[60,63],"unit":392},{"id":"393","dirty":false,"reading":"add. §SIG:Dawe§","query":false,"sigla":["Dawe"],"lemma":"σε","editors":["Dawe"],"span":[92,94],"unit":393}],"num":"169","label":"169","n":176,"A":"176","dawe":"169","type":"joke"},{"type":"joke","dawe":"170","A":"177","n":177,"label":"170","num":"170","app":[{"query":false,"reading":"§SIG:Minas§ : Κυμαίω §SIG:A§ : Κυμαῖος §SIG:M§§SIG:C§","dirty":false,"id":"394","unit":394,"span":[0,7],"editors":["Minas"],"sigla":["A","C","M","Minas"],"lemma":"Κυμαίου"},{"unit":395,"span":[31,42],"editors":[],"sigla":["A","C","M"],"lemma":"Δρακοντίδης","query":false,"reading":"§SIG:A§§SIG:C§ : δρακοντίδος §SIG:M§","dirty":false,"id":"395"},{"lemma":"ὁ δέ","sigla":["A","C","M"],"editors":[],"span":[52,56],"unit":396,"id":"396","dirty":false,"query":false,"reading":"§SIG:C§ : om. §SIG:A§§SIG:M§"},{"unit":397,"span":[91,96],"editors":[],"lemma":"τήρει","sigla":["A","C","M"],"query":false,"reading":"§SIG:A§§SIG:C§ : τήρη §SIG:M§","dirty":false,"id":"397"}],"tr":"Un tale chiese a un Cumano dove vivesse il retore Dracontide. Quello disse: «Sono da solo, ma se vuoi, tienimi la bottega, ed io uscirò fuori e ti farò vedere».","wit":"AMC","text":"Κυμαίου τὶς ἐπύθετο, ποῦ μένει Δρακοντίδης ὁ ῥήτωρ. ὁ δέ· Μόνος εἰμί, εἶπεν· εἰ δὲ θέλεις, τήρει τὸ ἐργαστήριον, κἀγὼ ἀπελθὼν δείξω σοι."},{"app":[{"id":"398","dirty":false,"reading":"§SIG:A§§SIG:C§ : ἐν §SIG:Minas§","query":false,"lemma":"ἐπ","sigla":["A","C","Minas"],"editors":["Minas"],"unit":398,"span":[8,10]},{"span":[66,77],"unit":399,"sigla":["A","C"],"lemma":"ταριχευταῖς","editors":[],"dirty":false,"reading":"§SIG:A§§SIG:C§ : ταρυχεύταις","query":false,"id":"399"},{"id":"400","query":false,"reading":": δέδωκεν §SIG:A§ac : ἔδωκε §SIG:C§ fort. recte","dirty":false,"editors":[],"lemma":"δέδωκε","sigla":["A","C"],"span":[78,84],"unit":400},{"span":[132,142],"unit":401,"lemma":"ταριχευτοῦ","sigla":["Boissonade"],"editors":["Boissonade"],"dirty":false,"query":false,"reading":"dub. §SIG:Boissonade§","id":"401"},{"unit":402,"span":[187,225],"sigla":["Braccini","C","Dawe","Thierfelder"],"lemma":"ἡ … θήκη","editors":["Braccini","Dawe","Thierfelder"],"dirty":false,"query":false,"reading":"dub. §SIG:Braccini§: τοῦ πατρὸς αὐτοῦ ἡ θήκη §SIG:C§ : ὁ πατήρ αὐτοῦ §SIG:Dawe§ monente §SIG:Thierfelder§","id":"402"},{"dirty":false,"query":false,"reading":"§SIG:Eberhard§ : ἔβισσεν §SIG:A§ : ἔβισση vel ἔβισσονον §SIG:C§","id":"403","span":[238,245],"unit":403,"lemma":"Ἔβησσεν","sigla":["A","C","Eberhard"],"editors":["Eberhard"]}],"num":"171","tr":"Un Cumano quando suo padre morì in Alessandria, diede il corpo agli imbalsamatori. Tempo dopo, voleva riprenderselo. Siccome l’imbalsamatore aveva anche altri corpi e domandava che segno avesse di suo padre, il Cumano rispose: «Aveva la tosse».","wit":"AC","text":"Κυμαῖος ἐπ’ Ἀλεξανδρείᾳ τοῦ πατρὸς αὐτοῦ ἀποθανόντος τὸ σῶμα τοῖς ταριχευταῖς δέδωκε. μετὰ δὲ χρόνον ἐζήτει αὐτὸ ἀπολαβεῖν. τοῦ δὲ ‹ταριχευτοῦ› ἔχοντος καὶ ἄλλα σώματα καὶ ἐρωτῶντος, τί σημεῖον ἔχει [ἡ] τοῦ πατρὸς αὐτοῦ [θήκη], ἀπεκρίθη· Ἔβησσεν.","type":"joke","dawe":"171","n":178,"A":"178","label":"171"},{"label":"172; cf. 218 α","n":179,"A":"179","dawe":"172","type":"joke","text":"Κυμαῖος πύκτην ἰδὼν πολλὰ τραύματα ἔχοντα ἠρώτα, πόθεν ἔχει ταῦτα. τοῦ δὲ εἰπόντος· Ἐκ τοῦ μύρμηκος ἔφη· Διὰ τί γὰρ χαμαὶ κοιμᾷ;","wit":"AM","tr":"Un Cumano vide un pugile che aveva molte ferite e gli domandava da dove le avesse riportate. Quando questi disse: «Dalla formica» il Cumano fece: «Ma allora perché dormi per terra?».","app":[],"num":"172"},{"tr":"Un Cumano vendeva del miele. Quando un tale giunse, lo gustò e disse che era buono, fece: «Se infatti non ci fosse caduto dentro un topo, non lo venderei mica!».","app":[{"reading":"§SIG:A§§SIG:C§ : γευσάμενος §SIG:M§","query":false,"dirty":false,"id":"404","span":[47,57],"unit":404,"editors":[],"lemma":"γευσαμένου","sigla":["A","C","M"]},{"editors":[],"sigla":["A","C","M"],"lemma":"μὴ","unit":405,"span":[96,98],"id":"405","query":false,"reading":"§SIG:A§§SIG:C§ : om. §SIG:M§","dirty":false},{"unit":406,"span":[116,124],"sigla":["A","C","M"],"lemma":"εἰς αὐτό","editors":[],"dirty":false,"query":false,"reading":"§SIG:A§§SIG:M§ : αυτῷ §SIG:C§","id":"406"}],"num":"173","text":"Κυμαῖος μέλι ἐπίπρασκεν. ἐλθόντος δέ τινος καὶ γευσαμένου καὶ εἰπόντος, ὅτι πάνυ καλόν, ἔφη· Εἰ μὴ γὰρ μῦς ἐνέπεσεν εἰς αὐτό, οὐκ ἂν ἐπώλουν.","wit":"AMC","dawe":"173","type":"joke","label":"173","n":180,"A":"180"},{"text":"Κυμαῖον νοσοῦντα ἀπήλπισεν ἰατρός. ὁ δὲ ὑγιάνας περιέκαμπτε τὸν ἰατρόν. ἐρωτηθεὶς οὖν τὴν αἰτίαν ἀπεκρίνατο· Εἰπόντος σου, ‹ὅτι› ἀποθνῄσκω, αἰσχύνομαι ζήσας.","wit":"AMC","tr":"Un medico aveva perso le speranze per un Cumano ammalato. Ma questi si era ristabilito, ed evitava il medico. Quando gliene fu domandato il motivo rispose «Siccome tu hai detto che sarei morto, vivo e quindi mi vergogno».","num":"174","app":[{"span":[0,33],"unit":407,"lemma":"Κυμαῖον … ἰατρός","sigla":["A","C","M"],"editors":[],"dirty":false,"query":false,"reading":"§SIG:A§§SIG:C§ : Κυμαῖον ἀπήντισεν ὁ ἰατρὸς νοσοῦντα §SIG:M§","id":"407"},{"lemma":"ὅτι","sigla":["Eberhard","Thierfelder"],"editors":["Eberhard","Thierfelder"],"unit":408,"span":[124,127],"id":"408","dirty":false,"query":false,"reading":"add. §SIG:Thierfelder§ monente §SIG:Eberhard§"},{"id":"409","reading":"§SIG:C§ : δὲ ζήσας §SIG:A§§SIG:M§","query":false,"dirty":false,"editors":[],"lemma":"ζήσας","sigla":["A","C","M"],"unit":409,"span":[151,156]}],"label":"174","A":"181","n":181,"dawe":"174","type":"joke"},{"tr":"Un medico cumano rese semiterzano un malato di febbre terzana e gli domandava la metà del compenso.","num":"175","app":[],"text":"Κυμαῖος ἰατρὸς ἄρρωστον τριταΐζοντα εἰς ἡμιτριταῖον περιστήσας τὸ ἥμισυ τοῦ μισθοῦ ἀπῄτει.","wit":"A","dawe":"175","type":"joke","label":"175","A":"182","n":182},{"num":"175 bis","app":[{"dirty":false,"query":false,"reading":"§SIG:Minas§ et fort. §SIG:A§2 : Κυμαί §SIG:A§ac","id":"410","span":[0,6],"unit":410,"lemma":"Κυμαίῳ","sigla":["A","Minas"],"editors":["Minas"]},{"unit":411,"span":[25,34],"editors":["Minas"],"sigla":["A","Minas"],"lemma":"προσελθὼν","reading":"§SIG:Minas§ : προσελθὸν §SIG:A§","query":false,"dirty":false,"id":"411"},{"id":"412","dirty":false,"reading":"facile supplendum est ex 3 α","query":false,"lemma":"ἐπὶ … διύπνισον","sigla":[],"editors":[],"unit":412,"span":[76,104]}],"tr":"Il testo è lacunoso, ma facilmente ricostruibile attraverso il confronto con la facezia 3","wit":"A","text":"Κυμαίῳ ἰατρῷ σχολαστικὸς προσελθὼν εἶπε· Σοφιστά, ὅταν ἐκ τοῦ ὕπνου ἀναστῶ, ἐπὶ ἡμιώριον ‹...› διύπνισον.","type":"joke","dawe":"175 bis","A":"183","n":183,"label":"175 bis; 3 α"},{"type":"joke","dawe":"176","n":184,"A":"184","label":"176","app":[{"unit":413,"span":[37,47],"editors":["Boissonade","Minas"],"sigla":["A","Boissonade","Minas"],"lemma":"ἐνημάτισεν","query":false,"reading":"§SIG:Boissonade§ : ἐνευμάτισεν §SIG:A§ : ἐνεμμάτισεν §SIG:Minas§","dirty":false,"id":"413"},{"dirty":false,"reading":"aliquid excidisse putant edd. pl.","query":false,"id":"414","unit":414,"span":[49,94],"sigla":[],"lemma":"ἐκέλευσε … ἰδεῖν","editors":[]},{"sigla":["Dawe"],"lemma":"θεράποντα","editors":["Dawe"],"unit":415,"span":[62,71],"id":"415","dirty":false,"reading":"add. §SIG:Dawe§","query":false},{"dirty":false,"query":false,"reading":"§SIG:A§ : ἐκκεχωρισμένα §SIG:Eberhard§","id":"416","span":[76,88],"unit":416,"lemma":"ἐκκεχωρημένα","sigla":["A","Eberhard"],"editors":["Eberhard"]},{"dirty":false,"reading":"§SIG:A§ : οὗτος §SIG:Kurtz§","query":false,"id":"417","unit":417,"span":[173,178],"lemma":"Οὗτως","sigla":["A","Kurtz"],"editors":["Kurtz"]},{"dirty":false,"reading":"§SIG:Boissonade§ : ἐλάκισεν §SIG:A§","query":false,"id":"418","unit":418,"span":[194,202],"sigla":["A","Boissonade"],"lemma":"ἐλάκησεν","editors":["Boissonade"]},{"id":"419","dirty":false,"reading":"In initio §SIG:C§ vix legitur","query":false,"sigla":["C"],"lemma":"","editors":[],"span":null,"unit":419}],"num":"176","tr":"Un medico cumano fece un clistere ad un malato in condizioni disperate; quindi, ordinò al servo di vedere le evacuazioni. Quando questo le mostrò e disse che il paziente era morto, il medico disse giurandoci: «Se non fosse stato così purgato, sarebbe crepato!».","wit":"A","text":"Κυμαῖος ἰατρὸς ἀπεγνωσμένον ἄρρωστον ἐνημάτισεν, ἐκέλευσε δὲ ‹θεράποντα› τὰ ἐκκεχωρημένα ἰδεῖν. τοῦ δὲ δείξαντος καὶ εἰπόντος, ὅτι ἀπέθανεν, ὁ ἰατρὸς μεθ’ ὅρκου ἀπεκρίνατο· Οὗτως εἰ μὴ ἐκλύσθη, ἐλάκησεν ἄν."},{"label":"177","A":"185","n":185,"dawe":"177","type":"joke","text":"Κυμαῖος ἰατρὸς τέμνων τινὰ δεινῶς ἀλγοῦντα καὶ βοῶντα ἀμβλυτέραν σμίλην μετέλαβεν.","wit":"A","tr":"Un medico cumano che operava un tale che soffriva e urlava tremendamente, prese un bisturi piuttosto smussato.","num":"177","app":[]},{"n":186,"A":"186","label":"178","type":"joke","dawe":"178","wit":"AC","text":"Κυμαῖοι δύο ἰσχάδων κεράμια δύο ἐπρίαντο. τούτων δὲ ὁ ἕτερος τὸν ἕτερον λανθάνων οὐκ ἐκ τοῦ ἰδίου, ἀλλ’ ἐκ τοῦ ἑτέρου κατήσθιεν. ὡς δὲ τοῖς ἀλλήλων κατεχρήσαντο, ἕκαστος ἐπὶ τὸ ἴδιον ἐπιστρέψας εὗρεν αὐτὸ κενόν. ἀλλήλων οὖν ἐπιλαβόμενοι ἤγοντο ἐπὶ τὸν ἄρχοντα. διαγνοὺς δὲ ὁ ἄρχων ἐκέλευσε τὰ κενώματα ἀλλάξαι καὶ τὰς τιμὰς ἀλλήλοις ἀποδοῦναι.","app":[{"unit":420,"span":[85,127],"sigla":["A","C","Dawe"],"lemma":"ἐκ2 … κατήσθιεν","editors":["Dawe"],"dirty":false,"query":false,"reading":"§SIG:A§§SIG:C§ : ἐκ τοῦ τοῦ ἑτέρου κατήσθιεν dub. §SIG:Dawe§","id":"420"},{"unit":421,"span":[135,139],"lemma":"τοῖς","sigla":["A","C"],"editors":[],"dirty":false,"reading":"§SIG:A§ : τῆς §SIG:C§","query":false,"id":"421"},{"editors":[],"lemma":"κατεχρήσαντο","sigla":["A","C"],"unit":422,"span":[148,160],"id":"422","reading":"§SIG:A§ : κατεχρήσατο §SIG:C§","query":false,"dirty":false},{"span":[324,332],"unit":423,"editors":[],"lemma":"ἀλλήλοις","sigla":["A","C"],"query":false,"reading":"§SIG:A§ : ἀλλήλους §SIG:C§","dirty":false,"id":"423"}],"num":"178","tr":"Due Cumani acquistarono due recipienti di fichi secchi. Entrambi, ingannando l’altro, mangiavano non dal proprio recipiente, ma da quello dell’altro. Quando se li ebbero consumati l’un l’altro, ciascuno si recò al proprio recipiente e lo trovò vuoto. Si azzuffarono dunque tra loro e furono portati dal magistrato. Allora il magistrato rifletté e comandò che si scambiassero i recipienti vuoti e che si rimborsassero le spese vicendevolmente."},{"tr":"A Cuma un demagogo sotto accusa in assemblea disse: «Uomini, cittadini, se questi mi hanno calunniato con queste accuse, che siano condannati da voi; se io ho invece commesso alcuna di queste azioni, mentre voi tutti siete seduti, crolli il teatro su me solo! ».","num":"179","app":[{"editors":[],"lemma":"κατεψευσμένοι","sigla":["A"],"span":[73,86],"unit":424,"id":"424","query":false,"reading":": κατεψευμένοι §SIG:A§ac corr. §SIG:A§2","dirty":false},{"id":"425","dirty":false,"query":false,"reading":"dub. §SIG:Eberhard§ : υμῖν §SIG:A§","lemma":"ὑμῶν","sigla":["A","Eberhard"],"editors":["Eberhard"],"unit":425,"span":[137,141]},{"reading":"§SIG:Thierfelder§ : τούτοις §SIG:A§","query":false,"dirty":false,"id":"426","unit":426,"span":[170,176],"editors":["Thierfelder"],"lemma":"τούτων","sigla":["A","Thierfelder"]},{"id":"427","dirty":false,"reading":"§SIG:Minas§ : μόνον","query":false,"sigla":["Minas"],"lemma":"μόνῳ","editors":["Minas"],"span":[214,218],"unit":427}],"text":"Ἐν Κύμῃ δημαγωγὸς ἐν ἐκκλησίᾳ κατηγορηθείς· Ἄνδρες, ἔφη, πολῖται, εἰ μὲν κατεψευσμένοι μου τὰς διαβολάς εἰσιν οὗτοι, γένοιτο αὐτοῖς παρ’ ὑμῶν καταγνωσθῆναι· εἰ δέ τι ἐγὼ τούτων πεποίηκα, πάντων ὑμῶν καθημένων ἐμοὶ μόνῳ τὸ θέατρον ἐπιπέσοι.","wit":"A","dawe":"179","type":"joke","label":"179","A":"187","n":187},{"num":"180","app":[],"tr":"Un magistrato Cumano annunciò tali disposizioni: “Gli efori, dopo il sacrificio, riportino all’istante le loro pelli al sacerdote. Voi, i buleuti, venite al §I§bouleuterion§/I§ se non tenete consiglio. I cuochi, poi, gettino le proprie ossa oltre la cinta muraria. I calzolai, poi, non abbiano forme da scarpe di taglia piccola”.","wit":"A","text":"Κυμαῖος ἄρχων τοιαῦτα κηρύγματα ἐκήρυξεν· Οἱ ἔφοροι μετὰ τὴν θυσίαν παραχρῆμα τὰς ἑαυτῶν βύρσας ἀναφερέτωσαν πρὸς τὸν ἱερέα. Οἱ δὲ βουλευταί, ἔλθετε εἰς τὸ βουλευτήριον καὶ μὴ βουλεύεσθε. Οἱ δὲ μάγειροι τὰ ἴδια ὀστέα ὑπὲρ τὸ τεῖχος βαλλέτωσαν. Οἱ δὲ σκυτεῖς μικροὺς καλάποδας μὴ ἐχέτωσαν.","type":"joke","dawe":"180","A":"188","n":188,"label":"180"},{"n":189,"A":"189","label":"181","type":"joke","dawe":"181","wit":"A","text":"Κυμαῖοι εἰς ψηφοφορίαν ἀπαντήσαντες καὶ γνόντες πολλοὺς ἐκ τῶν ἄλλων πόλεων ἀπολειφθέντας, αἰτιωμένους τὴν ἀτραπόν· Μὴ μωροί, ἔφασαν, ἐὰν καὶ ἡμεῖς εἰς τὸ μέλλον οὐκ ἐρχόμεθα;","app":[{"id":"428","query":false,"reading":"§SIG:Thierfelder§ : αἰτιώμενοι §SIG:A§","dirty":false,"editors":["Thierfelder"],"lemma":"αἰτιωμένους","sigla":["A","Thierfelder"],"span":[91,102],"unit":428},{"sigla":["A","Dawe","Eberhard"],"lemma":"ἔφασαν","editors":["Dawe","Eberhard"],"span":[126,132],"unit":429,"id":"429","dirty":false,"reading":"§SIG:Eberhard§ : ἔφη §SIG:A§ | post ἔφασαν, φανεῖσθε §SIG:Dawe§","query":false}],"num":"181","tr":"Dei Cumani si recarono ad una votazione, vennero a sapere che molti dalle altre città erano rimasti indietro incolpando la difficoltà del sentiero, e dissero: «Siamo pazzi, se non arriviamo in ritardo anche noi?»."},{"tr":"Un medico cumano mentre operava una ferita in testa pose il paziente supino e gli versò dell’acqua nella bocca, per vedere se mai (l’acqua) sarebbe colata fuori dalla parte operata.","app":[],"num":"182","text":"","wit":"AC","dawe":"182","type":"joke","label":"182","n":190,"A":"190"},{"app":[],"type":"section","text":"δύσκολοι"},{"label":"183","A":"191","n":191,"dawe":"183","type":"joke","text":"Δυσκόλῳ ἰατρῷ προσελθών τις εἶπε· Σοφιστά, ἀνακεῖσθαι οὐ δύναμαι οὔτε ἑστάναι, ἀλλ’ οὐδὲ καθῆσθαι. καὶ ὁ ἰατρὸς εἶπεν· Οὐδέν σοι λείπει ἢ κρεμασθῆναι.","wit":"AM","tr":"Un tale venne da un medico burbero e disse: «Dottore, non riesco a stare allungato, né in piedi, ma nemmeno seduto! E il medico disse: «Non ti rimane che essere impiccato».","num":"183","app":[{"unit":430,"span":[105,111],"lemma":"ἰατρὸς","sigla":["Thierfelder"],"editors":["Thierfelder"],"dirty":false,"reading":"§SIG:Thierfelder§","query":false,"id":"430"},{"unit":431,"span":null,"editors":[],"lemma":"τετρωμένην","sigla":["A","C"],"reading":"§SIG:A§ : τετριμμένην §SIG:C§","query":false,"dirty":false,"id":"431"},{"lemma":"ἐνέβαλεν","sigla":["A","C"],"editors":[],"unit":432,"span":null,"id":"432","dirty":false,"reading":"§SIG:A§ : ἔβαλεν §SIG:C§","query":false},{"dirty":false,"reading":"§SIG:A§§SIG:C§ : ἵνα ἴδῃ, [τὸ] πότε διὰ τοῦ χειρουργηθέντος ἐκρεύσε transp. §SIG:Thierfelder§ : ἵνα ἴδῃ, εἰ διὰ τοῦ χειρουργηθέντος τόπου ἐκρεύσε §SIG:Dawe§","query":false,"id":"433","unit":433,"span":null,"lemma":"ἵνα … ἐκρεύσει","sigla":["A","C","Dawe","Thierfelder"],"editors":["Dawe","Thierfelder"]},{"span":null,"unit":434,"lemma":"εἴποτε","sigla":["A","Braccini","C","Cataudella"],"editors":["Braccini","Cataudella"],"dirty":false,"query":false,"reading":"§SIG:Cataudella§ : πότερον dub. §SIG:Braccini§ : τὸ πότε §SIG:A§ : ὅποτε §SIG:C§","id":"434"},{"id":"435","dirty":false,"reading":"§  «Se tu sai scottare meglio, ecco un letto: buttatici sopra e scotta!»."},{"text":"Δύσκολος ἀστρολόγος παιδὸς νοσεροῦ γένεσιν λέγων, πολυχρόνιον αὐτὸν τῇ μητρὶ ὡς ἐπαγγειλάμενος ᾔτει τὸν μισθόν. τῆς δὲ εἰπούσης· Ἐλθόντι σοι αὔριον δώσω ἔφη· Τί οὖν, ἐὰν τὴν νύκτα ἀποθάνῃ καὶ ἐγὼ τὸν μισθὸν ἀπόλλω;","wit":"A","tr":"Un astrologo burbero che faceva l’oroscopo a un bambino malato annunciò alla madre che quello sarebbe stato longevo e chiedeva il compenso. Quando quella disse: «Vieni domani e te lo darò», fece: «E che faccio, se stanotte muore e io mi gioco il compenso?».","num":"187","app":[{"span":[35,42],"unit":451,"editors":["DeRhoer"],"lemma":"γένεσιν","sigla":["A","DeRhoer"],"reading":"§SIG:DeRhoer§ : γέννησιν §SIG:A§","query":false,"dirty":false,"id":"451"},{"id":"452","reading":"§SIG:Minas§ : πολλυχρόνιον §SIG:A§","query":false,"dirty":false,"editors":["Minas"],"lemma":"πολυχρόνιον","sigla":["A","Minas"],"span":[50,61],"unit":452},{"id":"453","reading":"§SIG:Boissonade§ : αὐτὸ §SIG:A§","query":false,"dirty":false,"editors":["Boissonade"],"lemma":"αὐτὸν","sigla":["A","Boissonade"],"span":[62,67],"unit":453}],"label":"187; 41 β","A":"195","n":195,"dawe":"187","type":"joke"},{"n":196,"A":"196","label":"188; 42 β","type":"joke","dawe":"188","wit":"AM","text":"Δυσκόλου κεράμιον μέλιτος ἀγοράσαντος καὶ ὑπό τινος ἐρωτηθέντος, πόσου ἠγόρασεν, καταστρέφων τὸ κεράμιον ἔλεγεν· Οὕτω μου ἐκχυθῇ τὸ αἷμα, ἐὰν εἴπω ὑμῖν.","app":[{"query":false,"reading":"§SIG:A§§SIG:M§ : ἐκχυθήτω dub. §SIG:Eberhard§ : ἐκχυθείη §SIG:Minas§","dirty":false,"id":"454","unit":454,"span":[122,128],"editors":["Eberhard","Minas"],"lemma":"ἐκχυθῇ","sigla":["A","Eberhard","M","Minas"]}],"num":"188","tr":"Quando un burbero comprò un vaso di miele e gli fu chiesto a quanto lo avesse comprato, capovolse il vaso e diceva: «Così coli il mio sangue, se ve lo dovessi dire!»."},{"type":"joke","dawe":"189","n":197,"A":"197","label":"189","app":[{"dirty":false,"reading":"§SIG:A§ : ψιχίαν §SIG:C§ : ψυχια §SIG:M§","qu :["A","Minas"],"lemma":"τὸν χιτῶνα","editors":["Minas"]}],"num":"190","tr":"Mentre un burbero giocava a dadi, un fannullone che stava lì seduto gli dava consigli. Il burbero allora, irritandosi gli chiese: «Qual è il tuo lavoro? E perché stai senza far nulla?». Quando quello disse: «Sono un rammendatore, ma non ho lavoro», il burbero si strappò il chitone, glielo diede e disse: «Prendi, lavora e taci!»."},{"text":"Δύσκολόν τις ἠρώτα· Ποῦ μένεις; ὁ δὲ εἶπεν· Ἐκεῖθεν μεταβαίνω.","wit":"A","tr":"Un tale chiese ad un burbero: «Dove abiti?» e quello disse: «Trasloco da lì!».","num":"191","app":[],"label":"191; 45 β","A":"199","n":199,"dawe":"191","type":"joke"},{"n":200,"A":"200","label":"192","type":"joke","dawe":"192","wit":"A","text":"Δυσκόλῳ τις ναυκλήρῳ ἀπαντήσας εἶπε· Τὸν ἐπίπλουν σου εἶδον ἐν Ῥόδῳ. κἀκεῖνος ἀπεκρίνατο· Κἀγώ σου εἶδον τὸ ἧπαρ ἐν Σικελίᾳ.","app":[{"span":[116,123],"unit":463,"editors":["Minas"],"sigla":["A","Minas"],"lemma":"Σικελίᾳ","reading":"§SIG:Minas§ : Σικελλία §SIG:A§","query":false,"dirty":false,"id":"463"}],"num":"192","tr":"Un tale incontrò un armatore burbero e disse: «Ho visto il tuo bacino a Rodi!», e quello rispose: «E io ho visto il tuo fegato in Sicilia»."},{"text":"Δύσκολόν τις ἐζήτει. ὁ δὲ ἀπεκρίνατο· Οὐκ εἰμὶ ὧδε. τοῦ δὲ γελάσαντος καὶ εἰπόντος· Ψεύδῃ· τῆς γὰρ φωνῆς σου ἀκούω εἶπεν· Ὦ κάθαρμα, εἰ μὲν ὁ δοῦλός μου εἶπεν, εἶχες ἂν αὐτῷ πιστεῦσαι· ἐγὼ δέ σοι οὐ φαίνομαι ἀξιοπιστότερος ἐκείνου εἶναι;","wit":"AMC","tr":"Un tale cercava un burbero. Questi rispose: «Non sono qui». Quando l’altro allora scoppiò a ridere e disse: «Menti: sento infatti la tua voce!», il burbero disse: «Disgraziato, se te lo avesse detto il mio servo, gli avresti creduto, io invece a te non sembro essere degno di maggior fede di quello?».","num":"193","app":[{"span":[13,19],"unit":464,"editors":[],"lemma":"ἐζήτει","sigla":["A","C","M"],"reading":"§SIG:A§§SIG:M§ : προσεζήτει §SIG:C§","query":false,"dirty":false,"id":"464"},{"span":[84,89],"unit":465,"editors":[],"sigla":["A","C","M"],"lemma":"Ψεύδῃ","reading":"§SIG:A§ : ψεύση §SIG:C§ : ψεύδει §SIG:M§","query":false,"dirty":false,"id":"465"},{"dirty":false,"reading":"§SIG:A§§SIG:M§ : αὐτὸ §SIG:C§","query":false,"id":"466","unit":466,"span":[169,173],"sigla":["A","C","M"],"lemma":"αὐτῷ","editors":[]},{"query":false,"reading":"§SIG:A§§SIG:M§ : ἀξιόπιστος §SIG:C§","dirty":false,"id":"467","unit":467,"span":[208,222],"editors":[],"sigla":["A","C","M"],"lemma":"ἀξιοπιστότερος"}],"label":"193; 44 β","A":"201","n":201,"dawe":"193","type":"joke"},{"text":"Δύσκολος σκάλαν καταβαίνων σφαλεὶς κατέπεσε. τοῦ δὲ οἰκοκυροῦ εἰπόντος· Τίς ἔνι ἐκεῖ; ἀπεκρίνατο· Ἐγὼ τοῦ ἐνοικίου μου ἐλάκησα. τί πρὸς σέ;","wit":"A","tr":"Un burbero mentre scendeva una scala inciampò e cadde. Quando il padrone di casa disse: «Chi c’è lì?», rispose: «Io, mi sono ammazzato a costo del mio affitto. Tu che vuoi?».","app":[{"id":"468","reading":"§SIG:Boissonade§ : εἰπόντος οἰκοκυροῦ §SIG:A§","query":false,"dirty":false,"editors":["Boissonade"],"sigla":["A","Boissonade"],"lemma":"οἰκοκυροῦ εἰπόντος","span":[52,70],"unit":468},{"lemma":"Ἐγὼ","sigla":["A","Dawe"],"editors":["Dawe"],"span":[98,101],"unit":469,"id":"469","dirty":false,"reading":"§SIG:A§ : Ἐγὼ ἔσω §SIG:Dawe§","query":false},{"unit":470,"span":null,"lemma":"Ἐγὼ … ἐλάκησα","sigla":["A","Cataudella"],"editors":["Cataudella"],"dirty":false,"reading":"§SIG:A§ : ἐγώ σου ἔνοικος ἐλάκησα §SIG:Cataudella§","query":false,"id":"470"},{"editors":["Dawe"],"sigla":["Dawe"],"lemma":"καὶ συντυχεῖν","span":null,"unit":471,"id":"471","reading":"del. §SIG:Dawe§","query":false,"dirty":false},{"sigla":["A","M"],"lemma":"","editors":[],"unit":472,"span":null,"id":"472","dirty":false,"query":false,"reading":"§SIG:A§ : περὶ ἀφυῶν §SIG:M§"}],"num":"194","label":"194; 46 β","n":202,"A":"202","dawe":"194","type":"joke"},{"app":[],"num":"195","tr":"Un tale diceva ad un burbero di rango senatorio: «Desidero vederti e incontrarti un po’». E quello rispose: «Anche io desidero vederti cieco e zoppo».","wit":"AM","text":"","type":"joke","dawe":"195","n":203,"A":"203","label":"195"},{"type":"section","app":[],"text":"ἀφυεῖς"},{"A":"204","n":204,"label":"196","type":"joke","dawe":"196","wit":"A","text":"Ἀφυὴς γραμματικὸς ἐρωτηθείς· Πῶς δεῖ λέγειν, τοῖς δύο ἢ τοῖς δυσί; ὁ δὲ τὴν χεῖρα προτείνας τοὺς δύο ὑπεδείκνυε δακτύλους.","num":"196","app":[],"tr":"Ad un grammatico incapace fu domandato: «Come bisogna dire, “ai due” o “ai dui”?», e questi protese la mano e indicava due dita."},{"n":205,"A":"205","label":"197","type":"joke","dawe":"197","wit":"AM","text":"Ἀφυὴς γραμματικὸς ἐρωτηθείς· Ἡ μήτηρ Πριάμου τίς ἐκαλεῖτο; ἀπορῶν ἔφη· Ἡμεῖς κατὰ τιμὴν κυρίαν αὐτὴν καλοῦμεν.","app":[],"num":"197","tr":"Ad un grammatico incapace fu domandato: «Come si chiamava la madre di Priamo?». Non sapendo rispondere, disse: «Noi, per rispetto, la chiamiamo signora»."},{"type":"joke","dawe":"198","A":"206","n":206,"label":"198","num":"198","app":[{"id":"473","reading":"§SIG:A§ : ἐτίθει §SIG:M§","query":false,"dirty":false,"editors":[],"sigla":["A","M"],"lemma":"προσετίθει","unit":473,"span":[52,62]},{"span":[133,141],"unit":474,"editors":[],"lemma":"δηναρίου","sigla":["A","M"],"query":false,"reading":": διναρίου §SIG:A§ac§SIG:M§, corr. §SIG:A§2","dirty":false,"id":"474"},{"editors":[],"lemma":"ξυράμενος","sigla":["A","M"],"span":[142,151],"unit":475,"id":"475","reading":"§SIG:A§ : ξηρὰμενος §SIG:M§","query":false,"dirty":false},{"editors":[],"lemma":"δηναρίων","sigla":["A","M"],"unit":476,"span":[161,169],"id":"476","reading":": διναρίων §SIG:A§ac§SIG:M§, corr. §SIG:A§2","query":false,"dirty":false},{"id":"477","reading":"§SIG:A§ : ἔβαλας §SIG:M§","query":false,"dirty":false,"editors":[],"lemma":"ἔλαβες","sigla":["A","M"],"unit":477,"span":[180,186]}],"tr":"Un barbiere incapace applicava impiastri lenitivi a quelli che venivano rasati da lui. Quando uno gliene aveva chieste le ragioni, disse: «Ingrato, ti arrabbi invano: rasato infatti al costo di un denaro, hai ricevuto impiastri per una valore di quattro denari!».","wit":"AM","text":"Ἀφυὴς κουρεὺς τοῖς ὑπ’ αὐτοῦ πληττομένοις ἔμπλαστρα προσετίθει. ἑνὸς δὲ αἰτιασαμένου αὐτὸν ἔφη· Ἀχάριστε, μάτην ἀγανακτεῖς· ἑνὸς γὰρ δηναρίου ξυράμενος τεσσάρων δηναρίων ἔμπλαστρα ἔλαβες."},{"type":"joke","dawe":"199","A":"207","n":207,"label":"199","num":"199","app":[{"editors":["Minas"],"lemma":"παρωνυχίδας","sigla":["A","Minas"],"unit":478,"span":[36,47],"id":"478","query":false,"reading":"§SIG:Minas§ : παρονυχίδας §SIG:A§","dirty":false},{"query":false,"reading":"§SIG:Kurtz§ : ἀφίης §SIG:A§","dirty":false,"id":"479","unit":479,"span":[128,134],"editors":["Kurtz"],"lemma":"ἀφίησί","sigla":["A","Kurtz"]}],"tr":"Un apprendista incapace tagliò male le unghie ad un tale, gli fece venire dei paterecci e dopo essere stato perciò scacciato da quel tale, si lamentò: «Capo, perché non mi lasci imparare?».","wit":"A","text":"Ἀφυὴς μαθητὴς κακῶς τινα κείρας καὶ παρωνυχίδας ποιήσας καὶ διὰ τοῦτο ὑπὸ τοῦ ὀνυχιζομένου ἀπωσθεὶς ἀνεβόησεν· Ἐπιστάτα, τί οὐκ ἀφίησί με μαθεῖν;"},{"dawe":"200","type":"joke","label":"200","A":"208","n":208,"tr":"Un apprendista incapace venne incaricato dal capo di tagliare le unghie ad un signore rispettabile e scoppiò a piangere. Quando questi gliene chiese il motivo, disse: «Ho paura e piango: sto infatti per ferirti, e ti verranno dei paterecci, e il capo mi picchierà!».","num":"200","app":[{"id":"480","dirty":false,"reading":"","query":false,"sigla":[],"lemma":"καὶ κλαίω","editors":[],"unit":480,"span":[119,128]},{"query":false,"reading":"§SIG:Minas§ : παρονυχίδας §SIG:A§","dirty":false,"id":"481","unit":481,"span":[160,171],"editors":["Minas"],"sigla":["A","Minas"],"lemma":"παρωνυχίδας"}],"text":"Ἀφυὴς μαθητὴς ὑπὸ τοῦ ἐπιστάτου κελευσθεὶς ὀνυχίσαι οἰκοδεσπότην ἐδάκρυσε. τοῦ δὲ τὴν αἰτίαν ἐρωτήσαντος ἔφη· Φοβοῦμαι καὶ κλαίω· μέλλω γὰρ τραυματίσαι σε, καὶ παρωνυχίδας ποιήσεις, καὶ τύψει με ὁ ἐπιστάτης.","wit":"A"},{"app":[{"query":false,"reading":"§SIG:A§ : ουδὲ §SIG:Minas§ : οὐ dub. §SIG:Thierfelder§","dirty":false,"id":"482","unit":482,"span":[196,201],"editors":["Minas","Thierfelder"],"sigla":["A","Minas","Thierfelder"],"lemma":"Οὐδὲν"},{"editors":["Dawe"],"sigla":["A","Dawe"],"lemma":"γὰρ … κατὰ","span":[202,220],"unit":483,"id":"483","query":false,"reading":"§SIG:A§ : ἄρ’ οἶδας κατὰ τὸν κατὰ dub. §SIG:Dawe§","dirty":false}],"num":"201","tr":"Un tale si recò da un indovino incapace mentre ritornava da un viaggio all’estero e gli faceva domande riguardo i familiari. Questi disse: «Sono tutti in salute, anche tuo padre». Siccome quello allora aveva detto: «mio padre è dieci anni che è morto!», l’indovino rispose: «Infatti non conosci affatto il tuo vero padre».","wit":"A","text":"Ἀφυεῖ μάντει προσελθών τις ἐξ ἀποδημίας ἀνιὼν ἠρώτα περὶ τῶν οἰκείων. ὁ δὲ εἶπεν· Ὑγιαίνουσι πάντες, καὶ ὁ πατήρ σου. τοῦ δὲ εἰπόντος ὅτι Ὁ πατήρ μου δέκατον ἔτος ἔχει ἀφ’ οὗ ἀπέθανεν ἀπεκρίνατο· Οὐδὲν γὰρ οἶδας τὸν κατὰ ἀλήθειάν σου πατέρα.","type":"joke","dawe":"201","n":209,"A":"209","label":"201"},{"A":"210","n":210,"label":"202","type":"joke","dawe":"202","wit":"AC","text":"Ἀφυὴς μαθηματικὸς παιδίου γένεσιν λέγων εἶπεν· Οὗτος ἔσται ῥήτωρ, εἶτα ἔπαρχος, εἶτα ἡγεμών. τεθνηκότος οὖν τοῦ παιδὸς τούτου ἡ μήτηρ ἀπαντήσασα εἶπεν· Ὃν ἔλεγες ῥήτορα ἔσεσθαι καὶ ἄρχοντα καὶ ἡγεμόνα, ἀπέθανεν. ὁ δὲ ἔφη· Μὰ τὴν αὐτοῦ μνήμην, ἐὰν ἔζησε, πάντα ταῦτα ἂν ἐγένετο.","num":"202","app":[{"editors":[],"sigla":["A","C"],"lemma":"μαθηματικὸς","span":[6,17],"unit":484,"id":"484","reading":": μαθητικὸς §SIG:A§ : μάθη §SIG:C§","query":false,"dirty":false},{"dirty":false,"reading":"§SIG:A§ : ῥήτωρ ἔσται §SIG:C§","query":false,"id":"485","span":[53,64],"unit":485,"sigla":["A","C"],"lemma":"ἔσται ῥήτωρ","editors":[]},{"editors":[],"lemma":"εἶπεν·","sigla":["A","C"],"span":[145,150],"unit":486,"id":"486","query":false,"reading":"§SIG:A§ : ἔφη §SIG:C§","dirty":false},{"editors":[],"sigla":["A","C"],"lemma":"πάντα ταῦτα","span":[254,265],"unit":487,"id":"487","query":false,"reading":"§SIG:A§ : ταῦτα πάντα §SIG:C§","dirty":false}],"tr":"Un astrologo incapace mentre esponeva il destino di un bambino, disse: «Costui sarà retore, poi prefetto, poi governatore di provincia!». Quindi, quando proprio questo bambino era ormai morto, la madre incontrò l’indovino e gli disse: «Quello che dicevi sarebbe stato retore, e magistrato, e governatore, è morto». Questi allora fece: «Oh, per la sua memoria, se fosse vissuto, sarebbe diventato tutte queste cose»."},{"tr":"Un tale si recò da un indovino incapace e gli domandava se un suo rivale avrebbe fatto ritorno da un viaggio all’estero. L’indovino rispose che non sarebbe tornato. Come il tale apprese giorni dopo che quello era rientrato, disse: «Nessuno è più inetto di lui!».","num":"203","app":[],"text":"Ἀφυεῖ μάντει προσελθών τις ἠρώτα, εἰ ὁ ἐχθρὸς αὐτοῦ ἐξ ἀποδημίας ἥξει. ὁ δὲ εἶπεν, ὅτι οὐκ ἔρχεται. ὡς δὲ ἔμαθε μεθ’ἡμέρας παραγενόμενον αὐτόν, ἔφη· Οὐδὲν αὐτοῦ ἀχρωμότερον.","wit":"A","dawe":"203","type":"joke","label":"203","A":"211","n":211},{"type":"joke","dawe":"204","A":"212","n":212,"label":"204","num":"204","app":[{"unit":488,"span":[6,17],"sigla":["A","Minas"],"lemma":"μαθηματικὸς","editors":["Minas"],"dirty":false,"query":false,"reading":"§SIG:Minas§ : μαθητικὸς §SIG:A§","id":"488"},{"editors":["Haupt"],"sigla":["Haupt"],"lemma":"μοιρολογῶν","unit":489,"span":[18,28],"id":"489","query":false,"reading":"§SIG:Haupt§ : μακρολογῶν","dirty":false},{"query":false,"reading":"lacunam indicavit §SIG:Eberhard§","dirty":false,"id":"490","unit":490,"span":null,"editors":["Eberhard"],"lemma":"","sigla":["Eberhard"]},{"query":false,"reading":"§SIG:Boissonade§ : νικήσεσθε §SIG:A§","dirty":false,"id":"491","span":null,"unit":491,"editors":["Boissonade"],"lemma":"Νικήσετε","sigla":["A","Boissonade"]},{"editors":["Dawe","Haupt"],"sigla":["A","Dawe","Haupt"],"lemma":"τοὺς πολεμίους","span":null,"unit":492,"id":"492","query":false,"reading":"§SIG:Haupt§ : τοὺς πολεμίους §SIG:Dawe§ : τὸν πὸλεμον §SIG:A§","dirty":false},{"unit": o, versami quello bello forte!».","wit":"AC","text":"Μεθύσῳ ἐν καπηλείῳ πίνοντι ἐπιστάς τις ἔφη· Ἡ γυνή σου ἀπέθανεν. ὁ δὲ ἀκούσας πρὸς τὸν κάπηλον ἔφη· Οὐκοῦν, αὐθέντα, ἐκ τοῦ μελανοῦ κέρασον.","type":"joke","dawe":"227","n":235,"A":"235","label":"227; 39 β"},{"app":[],"num":"228","tr":"Uno sbevazzone veniva rimproverato da un tale perché, dato che stava bevendo troppo, sragionava, e allora questo, che a causa del vino non riusciva a vedere bene, rispose: «Sono io ubriaco, o tu hai due facce?»","wit":"A","text":"Μέθυσος ὀνειδιζόμενος ὑπό τινος, ὅτι πολλὰ πίνων οὐ φρονεῖ, ὁ δὲ ἀπὸ τοῦ οἴνου καλῶς βλέπειν μὴ δυνάμενος ἀπεκρίνατο· Ἐγὼ μεθύω ἢ σὺ ὁ δύο ἔχων ὄψεις;","type":"joke","dawe":"228","n":236,"A":"236","label":"228"},{"text":"Μέθυσος ἀτυχὴς ἀμπελῶνα κτησάμενος τῷ τρυγητῷ ἀπέθανεν.","wit":"A","tr":"Uno sbevazzone disgraziato acquistò una vigna ma morì durante la vendemmia.","num":"229","app":[],"label":"229; 57 β","A":"237","n":237,"dawe":"229","type":"joke"},{"label":"230","A":"238","n":238,"dawe":"230","type":"joke","text":"","wit":"A","tr":"Uno sbevazzone aprì una taverna e legò un orso alla porta.","num":"230","app":[]},{"type":"section","app":[],"text":"ὀζόστομοι"},{"n":239,"A":"239","label":"231","type":"joke","dawe":"231","wit":"A","text":"Ὀζόστομος θέλων ἰδίῳ θανάτῳ ἀποθανεῖν περικαλυψάμενος ἐχασμᾶτο.","app":[],"num":"231","tr":"Uno con l’alito cattivo che voleva suicidarsi si incappucciò e se ne stette a bocca aperta."},{"num":"232","app":[{"editors":["Dawe"],"lemma":"μου","sigla":["A","C","Dawe"],"span":[62,65],"unit":552,"id":"552","query":false,"reading":"§SIG:Dawe§ : λῦσον §SIG:C§ : λύσον §SIG:A§","dirty":false},{"id":"553","dirty":false,"reading":"§SIG:A§ : ἀπαντήσας §SIG:C§","query":false,"lemma":"ἔλεγε","sigla":["A","C"],"editors":[],"unit":553,"span":[46,51]}],"tr":"Uno con l’alito cattivo che baciava di continuo la propria moglie diceva: «La mia signora, la mia Era, la mia Afrodite!» e quella, voltandosi dall’altro lato, diceva: «Il mio puzzone, il mio puzzone!».3","wit":"AC","text":"Ὀζόστομος συνεχῶς τὴν γυναῖκα αὐτοῦ καταφιλῶν ἔλεγεν· Ἡ κυρία μου, ἡ Ἥρα μου, ἡ Ἀφροδίτη μου. κἀκείνη ἀποστρεφομένη ἔλεγεν· Ὀζεύς μου, ὀζεύς μου.","type":"joke","dawe":"232","A":"240","n":240,"label":"232"},{"wit":"AC","text":"Ὀζόστομος κωφῷ ὑπαντήσας ἔλεγε· Χαῖρε κἀκεῖνος εἶπε· Φῦ. τοῦ δὲ εἰρηκότος· Τί γὰρ εἶπον; ἔφη· Ἔβδεσας.","num":"233","app":[{"dirty":false,"reading":"§SIG:A§ : τοῦ δὲ κακεῖνος §SIG:C§","query":false,"id":"554","span":[47,51],"unit":554,"lemma":"εἶπε","sigla":["A","C"],"editors":[]},{"editors":[],"sigla":["A","C"],"lemma":"τοῦ","unit":555,"span":[57,60],"id":"555","reading":"§SIG:A§ : φυ γε §SIG:C§","query":false,"dirty":false}],"tr":"Uno con l’alito cattivo incontrò un sordo e diceva: «Salve!» e quello disse: «Puah!». Siccome l’altro aveva chiesto «Che ho detto mai?!», il sordo fece «Hai scorreggiato!».","A":"241","n":241,"label":"233","type":"joke","dawe":"233"},{"tr":"Uno con l’alito cattivo chiedeva alla moglie: «Mia signora, perché mi odi?» e quella rispose: «Perché tu mi baci!».","num":"234","app":[{"span":[87,89],"unit":556,"lemma":"σύ","sigla":["A","C"],"editors":[],"dirty":false,"query":false,"reading":"§SIG:A§ : διότι §SIG:C§","id":"556"}],"text":"Ὀζόστομος τὴν γυναῖκα ἠρώτα λέγων· Κυρία, τί μεμισεῖς; κἀκείνη ἀπεκρίνατο λέγουσα· Ὅτι σύ με φιλεῖς.","wit":"AC","dawe":"234","type":"joke","label":"234","A":"242","n":242},{"text":"Ὀζόστομος ἰατρῷ ὑπαντήσας λέγει· Κύριέ μου, ἴδε· ἡ σταφυλή μου κατέβη. καὶ χανόντος ὁ ἰατρὸς ἀποστρεφόμενος ἔλεγεν· Οὐχὶ ἡ σταφυλή σου κατέβη, ἀλλ’ ὁ κῶλός σου ἀνέβη.","wit":"AC","tr":"Uno con l’alito cattivo incontrò un medico e disse: «Signore mio, guarda: la mia ugola è scesa giù!» e quando quello spalancò la bocca, il medico, voltandosi dall’altra parte, diceva: «Non è scesa la tua ugola, ma è salito il tuo culo!».","app":[{"editors":[],"sigla":["A","C"],"lemma":"καὶ","unit":557,"span":[71,74],"id":"557","reading":"§SIG:A§ : μανδύλ §SIG:C§","query":false,"dirty":false},{ dawe":"239","A":"247","n":247,"label":"239; 63 β"},{"wit":"A","text":"Ὀζόστομος καὶ ὀζόχρωτος, ὁμοῦ ἐν θεάτρῳ καθεζομένων, συνέβη μέσον αὐτῶν κατὰ τύχην νεανίσκον καθεσθῆναι. αἰσθομένου δὲ αὐτοῦ τῆς δυσωδίας, στραφεὶς πρὸς τὸν ὀζόστομον ἠρώτα· Τίς ἔβδεσεν; εὑρηκὼς δὲ ἐκ τοῦ στόματος αὐτοῦ τὴν αἰτίαν, στραφεὶς τῷ ἑτέρῳ εἰς τὸ οὖς διελέγετο. γνοὺς δὲ κἀκείνου τὴν δυσωδίαν ἀναστὰς ἔφυγεν.","num":"240","app":[{"lemma":"συνέβη","sigla":["A","Eberhard"],"editors":["Eberhard"],"span":[53,59],"unit":572,"id":"572","dirty":false,"query":false,"reading":"§SIG:A§ : καθεζόμενοι §SIG:Eberhard§"}],"tr":"Mentre uno dall'alito fetido e uno dal corpo maleodorante sedevano insieme a teatro, capitò per caso che un giovane si sedesse in mezzo a loro. Accortosi del fetore, si voltava verso quello dall'alito cattivo e domandava: «Chi ha scoreggiato?». Ma dopo aver scoperto che la causa proveniva dalla sua bocca, si voltava verso l’altro e gli parlava all’orecchio; resosi conto però che anche costui appestava, si alzò e scappò via.","A":"248","n":248,"label":"240","type":"joke","dawe":"240"},{"type":"joke","dawe":"241","A":"249","n":249,"label":"241","num":"241","app":[{"editors":["Eberhard"],"sigla":["A","Eberhard"],"lemma":"ἀκούεις","span":[94,101],"unit":573,"id":"573","query":false,"reading":"§SIG:A§ : ὡς §SIG:Eberhard§","dirty":false}],"tr":"Un matto, mentre dormiva insieme a un sordo, scorreggiò. Quando quello se ne accorse e prese ad urlare, disse: «Guarda un po’ come si senti… ma allora mi prendi in giro!».","wit":"A","text":"Μωρὸς κωφῷ συγκαθεύδων ἔβδεσε. τοῦ δὲ τὴν δυσωδίαν αἰσθομένου καὶ κατακράξαντος ἔφη· Ἴδε, πῶς ἀκούεις· ἀλλ’ἐμπαίζεις μοι."},{"dawe":"242","type":"joke","label":"242","n":250,"A":"250","tr":"Uno con l’alito cattivo, guardando continuamente verso il cielo, rivolgeva molte preghiere. Zeus allora si sporge e dice: «†Hai degli dei anche giù!».","app":[{"id":"574","dirty":false,"query":false,"reading":"§SIG:A§ : πολλὰ βλέπων §SIG:Eberhard§","lemma":"πολλὰ ηὔχετο","sigla":["A","Eberhard"],"editors":["Eberhard"],"span":[37,49],"unit":574},{"sigla":["Eberhard"],"lemma":"","editors":["Eberhard"],"span":null,"unit":575,"id":"575","dirty":false,"query":false,"reading":"post Ζεὺς δ᾿ add. §SIG:Eberhard§"},{"sigla":["A","C"],"lemma":"εἰς","editors":[],"span":[87,90],"unit":576,"id":"576","dirty":false,"reading":"§SIG:C§ : λίξουρος §SIG:A§","query":false}],"num":"242","text":"Ὀζόστομος συνεχῶς εἰς οὐρανὸν βλέπων πολλὰ ηὔχετο. παρακύψας ὁ Ζεὺς λέγει· †μία μία χαρεῖς·† καὶ κάτω θεοὺς ἔχεις.","wit":"A"},{"label":"243","n":251,"A":"251","dawe":"243","type":"joke","text":"Λείξουρος εἰς τρύγην ὑπὸ φίλου κληθεὶς καὶ ἀπλήστως φαγὼν σῦκα καὶ σταφυλάς, ‹τῇ νυκτὶ› ὑπὸ τῆς γαστρὸς αὐτοῦ νυχθεὶς ἔδοξεν ὁρᾶν ἐπὶ συκὴν τὸν φίλον αὐτοῦ καθήμενον καὶ τοῦτον προσκαλεῖσθαι, ἵνα φάγῃ σῦκα. ἀναστάντος δὲ ἤρεσεν αὐτοὺς ἀπὸ τῆς συκῆς χέσαι ἄνωθεν. βιαζόμενος οὖν τὰ στρώματα κατέχεσεν. ὡς δὲ ἐξυπνίσας ἐπέγνω, τὰ στρώματα πλύνας πάλιν [ἀπλήστως φαγὼν] ἐκοιμήθη. καὶ θεωρεῖ πάλιν καθ’ ὕπνους τὸν φίλον ἐπὶ τῆς συκῆς καθήμενον καὶ τοῦτον ὁμοίως ἀνελθεῖν προτρεπόμενον. ὁ δὲ πρὸς αὐτὸν ἀναβλέψας εἶπε· Πάλιν μοι θέλεις ἐμπαῖξαι, ἵνα ἀπὸ τῆς συκῆς ἄνωθεν δόξας χέζειν τὰ στρώματα ῥυπώσω. ἀλλ’ ἐγὼ ἀπάρτι οὐ μὴ ἐμπαιχθῶ· πρῶτον γὰρ χέσω καὶ οὕτως ἀνέλθω. βιαζόμενος οὖν πάλιν τὰ στρώματα κατετίλησεν.","wit":"AC","tr":"Un goloso fu invitato alla vendemmia da un amico, mangiò insaziabilmente fichi e uva, di notte fu tormentato dal suo ventre e gli parve di vedere il suo amico seduto su un fico e che costui lo chiamasse a sé affinché mangiasse fichi Allora il goloso si arrampicò, e a loro piacque cacare dall'alto del fico. Dunque, sforzandosi, smerdò le coperte. Quando poi si svegliò e se ne accorse, lavò le coperte e si addormentò di nuovo. E vede di nuovo in sogno l'amico seduto sul fico, che lo esorta allo stesso modo a salire. Egli allora alzò gli occhi verso di lui e disse: «Di nuovo vuoi burlarti di me, affinché, sognando di cacare dall'alto del fico, io insozzi le coperte! Ma io d'ora in poi non sarò affatto beffato: prima, infatti, cacherò, e così salirò». Dunque, sforzandosi di nuovo, insozzò le coperte.","app":[{"editors":["Minas","Thierfelder"],"sigla":["Minas","Thierfelder"],"lemma":"νυκτὶ ὑπὸ","span":[81,91],"unit":577,"id":"577","reading":"add. §SIG:Thierfelder§ : κατέδαρθεv §SIG:Minas§","query":false,"dirty":false},{"id":"578","dirty":false,"reading":"§SIG:A§ : ὑπὸ τὴν συκὴν ut. vid. §SIG:C§ : ἐπὶ τῆς συκῆς §SIG:Eberhard§","query":false,"sigla":["A","C","Eberhard"],"lemma":"συκὴν τὸν","editors":["Eberhard"],"unit":578,"span":[134,143]},{"query":false,"reading":"§SIG:A§§SIG:C§ : αὐτοῦ τὸν φίλον","dirty":false,"id":"579","unit":579,"span":[144,165],"editors":[],"sigla":["A","C"],"lemma":"φίλον1 … καθήμενον"},{"id":"580","query":false,"reading":"§SIG:A§§SIG:C§ : σύκα","dirty":false,"editors":[],"lemma":"ἀναστάντος","sigla":["A","C"],"unit":580,"span":[207,217]},{"reading":"§SIG:A§ : ἀπὸ τῆς συκῆς αὐτῆς χέσαι ἄνωθεν οὖν βιαζόμενος §SIG:C§","query":false,"dirty":false,"id":"581","span":[235,280],"unit":581,"editors":[],"sigla":["A","C"],"lemma":"ἀπὸ1 … τὰ"},{"span":[317,323],"unit":582,"lemma":"ἐπέγνω","sigla":["A","C"],"editors":[],"dirty":false,"query":false,"reading":"§SIG:A§ : ἐξυπνήσας §SIG:C§","id":"582"},{"editors":["Thierfelder"],"lemma":"φαγὼν ἐκοιμήθη","sigla":["Thierfelder"],"span":[360,375],"unit":583,"id":"583","reading":"del. §SIG:Thierfelder§","query":false,"dirty":false},{"editors":[],"lemma":"τῆς","sigla":["A","C"],"span":[420,423],"unit":584,"id":"584","reading":"§SIG:A§ : ἐπὶ πῒ §SIG:C§","query":false,"dirty":false},{"id":"585","dirty":false,"reading":"§SIG:A§ : ἀνελθεῖν ὁμοίως §SIG:C§","query":false,"sigla":["A","C"],"lemma":"ἀνελθεῖν προτρεπόμενον","editors":[],"unit":585,"span":[458,480]},{"unit":586,"span":[514,519],"editors":["Boissonade"],"lemma":"Πάλιν","sigla":["A","Boissonade","C"],"query":false,"reading":"§SIG:A§§SIG:C§ : κυνίαν §SIG:Boissonade§","dirty":false,"id":"586"},{"lemma":"δόξας … τὰ","si ":"joke","dawe":"244"},{"num":"245","app":[{"id":"596","dirty":false,"query":false,"reading":"§SIG:A§ : δύο γραίας γαυριώσας §SIG:C§","lemma":"δύο … ἐκάλεσε","sigla":["A","C"],"editors":[],"span":[17,38],"unit":596},{"id":"597","reading":"§SIG:A§ : τὴν μὲν μίαν κυράσατε §SIG:C§","query":false,"dirty":false,"editors":[],"lemma":"μίαν … τὴν","sigla":["A","C"],"unit":597,"span":[81,99]}],"tr":"Un giovinetto invitò due vecchie in calore, e disse ai propri servitori: «Mescete da bere singolarmente, e fate l’amore con chi ne ha voglia». E quelle all’unisono dissero: «Noi non abbiamo sete!».","wit":"AC","text":"Νεανίσκος γραίας δύο καπριώσας ἐκάλεσε, πρὸς δὲ τοὺς οἰκείους διακόνους ἔφη· Τὴν μίαν κεράσατε, τὴν δὲ θέλουσαν ἀφροδισιάσατε. αἱ δὲ ὑφ’ ἓν εἶπον· Ἡμεῖς οὐ διψῶμεν.","type":"joke","dawe":"245","A":"253","n":253,"label":"245"},{"text":"Μισογύναιος στὰς ἐν τῇ ἀγορᾷ ἔλεγε· Πωλῶ μου τὴν γυναῖκα ἀτελώνητον. τινῶν δὲ εἰπόντων· Διὰ τί; εἶπεν· Ἵνα στερέσιμος γένηται.","wit":"A","tr":"Un misogino si fermava in piazza e diceva: «Vendo mia moglie senza pagarci le tasse!». Quando allora alcuni gli dissero: «Perché?», disse: «Affinché diventi merce confiscata».","num":"246","app":[{"unit":598,"span":[96,100],"lemma":"εἶπε","sigla":["A","Minas"],"editors":["Minas"],"dirty":false,"query":false,"reading":"§SIG:Minas§ : αυτὸν §SIG:A§","id":"598"}],"label":"246","A":"254","n":254,"dawe":"246","type":"joke"},{"tr":"Un misogino, dato che era morta sua moglie, celebrava le esequie per la sepoltura. Quando uno gli chiese: «Chi ha iniziato il suo riposo?», rispose: «Io, che sono stato privato di costei!».","num":"247","app":[],"text":"Μισογύναιος, τῆς γυναικὸς αὐτοῦ ἀποθανούσης, ἐπὶ τῷ θάψαι ἐκήδευε. τινὸς δὲ ἐρωτήσαντος· Τίς ἀνεπαύσατο; ἔφη· Ἐγὼ ὁ ταύτης στερηθείς.","wit":"A","dawe":"247","type":"joke","label":"247; 60 β","A":"255","n":255},{"wit":"A","text":"Μισογύναιος νοσήσας ἐν ἀπογνώσει, τῆς δὲ γυναικὸς αὐτῷ εἰπούσης· Ἐάν τι πάθῃς, ἀπάγξομαι ἀναβλέψας πρὸς αὐτὴν εἶπε· Ζῶντί μοι τοῦτο χάρισαι.","app":[],"num":"248","tr":"Un misogino si ammalò senza speranza, e poiché sua moglie gli disse: «Se ti succede qualcosa, mi impiccherò», alzò lo sguardo verso di lei e disse: «Fammi questo favore finché sono ancora vivo!».","n":256,"A":"256","label":"248; 61 β","type":"joke","dawe":"248"},{"tr":"Un misogino aveva una moglie linguacciuta e insolente, e quando lei morì lui le fece il funerale su uno scudo. Quando un tale lo vide e chiese il motivo, rispose: «Perché era da combattimento».","app":[{"dirty":false,"reading":"§SIG:Boissonade§ : μαχήμη §SIG:A§","query":false,"id":"599","span":[154,157],"unit":599,"sigla":["A","Boissonade"],"lemma":"γὰρ","editors":["Boissonade"]}],"num":"249","text":"Μισογύναιος γυναῖκα ἔχων γλωσσώδη καὶ λοίδορον, τελευτησάσης δὲ αὐτῆς, ἐπὶ θυρεοῦ ἐξέφερε. τινὸς δὲ ἰδόντος καὶ τὴν αἰτίαν ἐρωτήσαντος ἀπεκρίνατο· Μαχίμη γὰρ ἦν.","wit":"A","dawe":"249","type":"joke","label":"249","n":257,"A":"257"},{"dawe":"250","type":"joke","label":"250","A":"258","n":258,"tr":"A un giovinetto fu chiesto se fosse comandato da sua moglie o se lei gli ubbidisse in tutto, e disse, facendosi vanto: «Quando apro la bocca, si caca addosso!».","num":"250","app":[{"span":[89,102],"unit":600,"editors":[],"lemma":"ἐναβρυνόμενος","sigla":["A","M"],"reading":"§SIG:A§ : ἐν ἀβρυνόμενος §SIG:M§","query":false,"dirty":false,"id":"600"},{"dirty":false,"reading":"add. §SIG:Eberhard§","query":false,"id":"601","unit":601,"span":[26,29],"sigla":["Eberhard"],"lemma":"ὑπὸ","editors":["Eberhard"]}],"text":"Νεανίσκος ἐρωτηθείς, ‹εἰ› ὑπὸ τῆς γυναικὸς αὐτοῦ κελεύεται ἢ πείθεται αὐτῷ ἐκείνη πάντα, ἐναβρυνόμενος ἔφη· Οὕτως με φοβεῖται ἡ γυνή μου· ἐὰν χάνω, χέζει.","wit":"A"},{"type":"joke","dawe":"251","n":259,"A":"259","label":"251","app":[{"span":[99,102],"unit":602,"sigla":["A","Eberhard"],"lemma":"εἷς","editors":["Eberhard"],"dirty":false,"reading":"§SIG:Eberhard§ : ὁ §SIG:A§","query":false,"id":"602"},{"editors":["Dawe"],"sigla":["A","C","Dawe"],"lemma":"ἐμφανῆ ἰδοῦσα","  let html=metaHTML(rec),secN=0,open=false;const secIdx=[];
 for(const u of RECS[rec].units){if(u.type==='titulus')continue;
   if(u.type==='section'){if(open)html+='</section>';secN++;const sid=rec+'_sec'+secN;secIdx.push({id:sid,name:u.text,n:0});html+='<section class="sec" id="'+sid+'"><h2>'+esc(greekCaps(u.text))+'</h2>';open=true;}
   else if(u.type==='joke'){if(secIdx.length)secIdx[secIdx.length-1].n++;html+=facHTML(u,rec);}}
 if(open)html+='</section>';elMain.className=rec;elMain.innerHTML=html;
 let t='<h2>Sections · '+{alpha:'α',beta:'β',gamma:'γ'}[rec]+'</h2>';secIdx.forEach(s=>{t+='<a data-go="'+s.id+'">'+esc(greekCaps(s.name))+'<span class="c">'+s.n+'</span></a>';});
 elToc.innerHTML=t;syncBtns();}
function locLinks(s){return esc(s).replace(/([αβγ])(\d+)/g,function(m,r,n){var rec={'α':'alpha','β':'beta','γ':'gamma'}[r];return '<span class="xref" data-go="'+rec+'_fac'+n+'">'+m+'</span>';});}
function renderIdx(){state.mode='idx';elSub.textContent='indices';
 elToc.innerHTML='<h2>Indices</h2><a data-go="ix_verb">Index verborum <span class="c">'+IDX.verborum.length+'</span></a><a data-go="ix_nomi">Index nominum et locorum <span class="c">'+IDX.nomina.length+'</span></a>';
 var h='<section class="idxsec" id="ix_verb"><h2>Index verborum</h2>';
 for(var i=0;i<IDX.verborum.length;i++){var e=IDX.verborum[i];h+='<div class="ie"><span class="ih">'+esc(e.h)+'</span> <span class="il">'+locLinks(e.l)+'</span></div>';}
 h+='</section><section class="idxsec" id="ix_nomi"><h2>Index nominum et locorum</h2>';
 for(var i=0;i<IDX.nomina.length;i++){var e=IDX.nomina[i];h+='<div class="ie"><span class="ih">'+esc(e.h)+'</span> <span class="il">'+locLinks(e.l)+'</span></div>';}
 h+='</section>';
 elMain.className='';elMain.innerHTML=h;syncBtns();window.scrollTo(0,0);}
function renderTrad(){state.mode='trad';elSub.textContent='stemma · codices';
 elToc.innerHTML='<h2>Tradition</h2><a data-go="tr_stemma">Stemma codicum</a><a data-go="tr_tab">Facetiae by codex</a>';
 var h='<section class="tradsec" id="tr_stemma"><h2>Stemma codicum</h2><img class="stemma" src="'+TRAD.stemma+'" alt="stemma codicum"></section>';
 h+='<section class="tradsec" id="tr_tab"><h2>Facetiae in each codex</h2>'+TRAD.tables+'</section>';
 elMain.className='';elMain.innerHTML=h;syncBtns();if(window.scrollTo)window.scrollTo(0,0);}
function renderCmt(){state.mode='cmt';elSub.textContent='commentary';
 elToc.innerHTML='<h2>Commentary</h2><a data-go="cmt_alpha">Redaction α</a><a data-go="cmt_beta">Redaction β</a><a data-go="cmt_gamma">Redaction γ</a>';
 var lab={alpha:'α',beta:'β',gamma:'γ'};var h='';
 ['alpha','beta','gamma'].forEach(function(r){
  h+='<section class="cmtsec" id="cmt_'+r+'"><h2>Redaction '+lab[r]+'</h2>';
  RECS[r].units.forEach(function(u){ if(u.type!=='joke')return; var c=CMT[r]&&CMT[r][u.A]; if(!c)return;
   h+='<div class="cmt-entry"><div class="cmt-h">'+lab[r]+' '+esc(u.A)+'</div><div class="cmt-body">'+c+'</div></div>'; });
  h+='</section>';
 });
 elMain.className='';elMain.innerHTML=h;syncBtns();if(window.scrollTo)window.scrollTo(0,0);}
function renderSync(){state.mode='sync';elSub.textContent='synoptic · α ⇄ β doublets';
 let html='<div class="dhead"><b>'+DB.doublets.length+' doublets</b> aligned: redaction α (codex A numbering, left) and redaction β · Braccini (right). Multiple α parallels: closer on top.</div>';
 DB.doublets.forEach(d=>{const ub=byA.beta[d.b];if(!ub)return;const prim=byA.alpha[d.a[0]];if(!prim)return;
   let sec='';d.a.slice(1).forEach(a2=>{const u2=byA.alpha[a2];if(u2)sec+='<div class="second"><div class="stag">also α '+esc(a2)+'</div>'+facHTML(u2,'alpha')+'</div>';});
   html+='<div class="dpair" id="pair_'+d.a[0]+'_'+d.b+'"><div class="dcol da"><div class="tag">α '+esc(d.a[0])+'</div>'+facHTML(prim,'alpha')+sec+'</div><div class="dcol db"><div class="tag">β '+esc(d.b)+'</div>'+facHTML(ub,'beta')+'</div></div>';});
 elMain.className='';elMain.innerHTML=html;
 let t='<h2>Doublets (α · β · γ)</h2>';const bToG={},aToG={};RECS.gamma.units.forEach(u=>{if(u.type!=='joke')return;(u.cf_b||[]).forEach(b=>{bToG[b]=u.num;});(u.cf_a||[]).forEach(a=>{aToG[a]=u.num;});});DB.doublets.forEach(d=>{const dw=(byA.beta[d.b]&&byA.beta[d.b].dawe)||'';let g=bToG[d.b]||'';if(!g){for(const a of d.a){if(aToG[a]){g=aToG[a];break;}}}t+='<a class="drow" data-go="pair_'+d.a[0]+'_'+d.b+'"><span class="da">α '+esc(d.a[0])+'</span><span class="ddw">'+(dw?'('+esc(dw)+')':'')+'</span><span class="db">β '+esc(d.b)+'</span><span class="dg">'+(g?'γ '+esc(g):'')+'</span></a>';});elToc.innerHTML=t;syncBtns();}
function syncBtns(){document.querySelectorAll('.recsw button').forEach(b=>b.classList.toggle('on',state.mode==='read'&&b.dataset.rec===state.rec));document.getElementById('tSync').classList.toggle('on',state.mode==='sync');document.getElementById('tIdx').classList.toggle('on',state.mode==='idx');document.getElementById('tTrad').classList.toggle('on',state.mode==='trad');document.getElementById('tCmt').classList.toggle('on',state.mode==='cmt');}
function flash(el){if(!el)return;document.querySelectorAll('.hot').forEach(x=>x.classList.remove('hot'));el.classList.add('hot');el.scrollIntoView({behavior:'smooth',block:'center'});setTimeout(()=>el.classList.remove('hot'),1600);}
function goto(id){let el=document.getElementById(id);if(!el){const rec=id.split('_')[0];if(['alpha','beta','gamma'].includes(rec)){renderRead(rec);el=document.getElementById(id);}}if(el)flash(el.querySelector('.num')||el);}
elMain.addEventListener('click',e=>{const fb=e.target.closest('.fbtn');if(fb){var fc=fb.closest('.fac');if(fc)fc.classList.toggle(fb.classList.contains('ftr')?'tr-on':'cm-on');return;}const xr=e.target.closest('[data-go]');if(xr&&xr.classList.contains('xref')){goto(xr.dataset.go);return;}
 if(xr&&xr.closest('.dpair')===null&&!xr.classList.contains('lem')){}
 const lem=e.target.closest('.lem');if(lem){const fac=lem.closest('.fac');const ln=fac.querySelector('.app .ln[data-app="'+lem.dataset.app+'"]');if(ln){fac.querySelector('.app').classList.add('show');flash(ln);}return;}
 const ln=e.target.closest('.app .ln');if(ln){const fac=ln.closest('.fac');const sp=fac.querySelector('.lem[data-app="'+ln.dataset.app+'"]');if(sp)flash(sp);}});
elToc.addEventListener('click',e=>{const a=e.target.closest('[data-go]');if(a){const el=document.getElementById(a.dataset.go);if(el)el.scrollIntoView({behavior:'smooth'});}});
document.querySelectorAll('.recsw button').forEach(b=>b.addEventListener('click',()=>renderRead(b.dataset.rec)));
document.getElementById('tSync').addEventListener('click',()=>{if(state.mode==='sync')renderRead(state.rec);else renderSync();});
document.getElementById('tTr').addEventListener('click',()=>{document.body.classList.toggle('showtr');document.getElementById('tTr').classList.toggle('on',document.body.classList.contains('showtr'));});
document.getElementById('tIdx').addEventListener('click',()=>{if(state.mode==='idx')renderRead(state.rec);else renderIdx();});
document.getElementById('tTrad').addEventListener('click',()=>{if(state.mode==='trad')renderRead(state.rec);else renderTrad();});
document.getElementById('tCmt').addEventListener('click',()=>{if(state.mode==='cmt')renderRead(state.rec);else renderCmt();});
const bApp=document.getElementById('tApp'),bLem=document.getElementById('tLem');
bApp.onclick=()=>{bApp.classList.toggle('on');document.querySelectorAll('.app').forEach(a=>a.classList.toggle('show',bApp.classList.contains('on')));};
bLem.onclick=()=>{bLem.classList.toggle('on');document.querySelectorAll('.lem').forEach(l=>l.style.borderBottom=bLem.classList.contains('on')?'':'none');};
let fs=1.16;document.getElementById('aPlus').onclick=()=>{fs+=.06;document.querySelectorAll('.txt').forEach(t=>t.style.fontSize=fs+'rem');};
document.getElementById('aMinus').onclick=()=>{fs=Math.max(.9,fs-.06);document.querySelectorAll('.txt').forEach(t=>t.style.fontSize=fs+'rem');};
const q=document.getElementById('q');q.addEventListener('input',()=>{const v=deacc(q.value.trim());document.querySelectorAll('.fac').forEach(f=>{const hit=!v||f.dataset.s.includes(v)||(f.dataset.n||'').includes(v);f.classList.toggle('hide',!hit);});document.querySelectorAll('section.sec').forEach(s=>{const any=[...s.querySelectorAll('.fac')].some(f=>!f.classList.contains('hide'));s.classList.toggle('hide',!any);});});
function goFac(v){v=(v||'').toString().toLowerCase().replace(/\s+/g,'').replace(/[^0-9a-z]/g,'');if(!v)return;if(state.mode!=='read')renderRead(state.rec);let target=null;document.querySelectorAll('.fac').forEach(f=>{if(!target&&(f.dataset.n||'').toLowerCase().replace(/\s+/g,'')===v)target=f;});if(!target)target=document.getElementById(state.rec+'_fac'+v);if(target){target.classList.remove('hide');flash(target.querySelector('.num'));}else alert('Facetia "'+v+'" not found in '+state.rec+'.');}
document.getElementById('jump').addEventListener('keydown',e=>{if(e.key==='Enter')goFac(e.target.value);});
(function(){const rz=document.getElementById('resizer'),nav=document.querySelector('nav.toc'),wrap=document.querySelector('.wrap');if(rz){rz.addEventListener('mousedown',e=>{rz._d=true;rz.classList.add('drag');document.body.style.userSelect='none';e.preventDefault();});window.addEventListener('mousemove',e=>{if(!rz._d)return;let w=e.clientX-wrap.getBoundingClientRect().left;w=Math.max(150,Math.min(520,w));nav.style.flex='0 0 '+w+'px';nav.style.width=w+'px';});window.addEventListener('mouseup',()=>{if(rz._d){rz._d=false;rz.classList.remove('drag');document.body.style.userSelect='';}});}})();
renderRead('alpha');
</script></body></html>
