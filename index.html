["Dawe"], "editors": ["Dawe"], "query": false, "unit": 179, "span": [225, 231]}], "A": "173", "dawe": "166", "tr": "Un Cumano costeggiava un orto seduto su di un asino. Vide, dunque, un ramo carico di fichi maturi e ci si aggrappò. Quando però l’asino gli sfuggì via da sotto, rimase appeso, e quando l’ortolano gli domandò cosa facesse lì appeso, diceva: «Sono caduto dall’asino!». Capire se la preposizione ἐκ può avere anche valore verso l’alto"}, {"type": "joke", "n": 174, "num": "167", "label": "167", "wit": "AMC", "text": "Κυμαῖος ἰδὼν πρόβατον συμπεποδισμένον καὶ οὕτω κειρόμενον εἶπεν· Εὐχαριστῶ τῷ κουρεῖ μου, ὅτι οὐδέποτέ μεδήσας ἔκειρεν.", "app": [{"id": "5000", "dirty": false, "lemma": "συμπεποδισμένον]", "reading": "συμπεποδηγμένον §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 180, "span": [22, 37]}, {"id": "5003", "dirty": false, "lemma": "κειρόμενον]", "reading": "κηρόμενον §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 180, "span": [47, 57]}, {"id": "5007", "dirty": false, "lemma": "κουρεῖ]", "reading": "§SIG:Bursian§ et §SIG:Haupt§ : κυρίω §SIG:A§ §SIG:M§ §SIG:C§", "sigla": ["A", "Bursian", "C", "Haupt", "M"], "editors": [], "query": false, "unit": 180, "span": [78, 84]}, {"id": "5012", "dirty": false, "lemma": "ἔκειρεν]", "reading": "§SIG:A§ 2pc : ἔκειρε §SIG:A§ ac §SIG:C§ : ἔκηρε §SIG:M§", "sigla": ["A", "C", "M"], "editors": [], "query": false, "unit": 180, "span": [111, 118]}], "A": "174", "dawe": "167", "tr": "Un Cumano vide una pecora legata e che veniva così tosata, e disse: «Ringrazio il mio barbiere, perché non mi ha mai rasato dopo avermi μεδήσας."}, {"type": "joke", "n": 175, "num": "168", "label": "168", "wit": "AC", "text": "Κυμαῖος τοῦ πατρὸς αὐτοῦ ἀποδημήσαντος εἰς βαρὺ ἔγκλημα πεσὼν θανάτῳ κατεδικάσθη. ἀπιὼν δὲ παρεκάλει πάντας, ἵνα ὁ πατὴρ μὴ γνῷ, ἐπεὶ μέλλει αὐτῷ θανασίμους πληγὰς ἐπιφέρειν.", "app": [{"id": "5041", "dirty": false, "lemma": "ἐπιφέρειν]", "reading": "εἰσφέρειν §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 181, "span": [164, 173]}], "A": "175", "dawe": "168", "tr": "Un Cumano, mentre il padre era fuori per affari, cadde in una pesante accusa e fu condannato a morte. Allora mentre usciva pregava tutti che il padre non venisse a saperlo, dal momento che lo avrebbe ucciso di botte."}, {"type": "joke", "n": 176, "num": "169", "label": "169", "wit": "A", "text": "Ὁ αὐτός, τινὸς αὐτῷ εἰπόντος ὅτι Ἐσύλησάς με Μὴ ὑποστρέψω, ‹ἔφη›, ἔνθεν ἄπειμι, εἰ ἐσύλησά ‹σε›.", "app": [{"id": "5056", "dirty": false, "lemma": "ἔφη]", "reading": "vel εἶπεν dub. add. §SIG:Boissonade§", "sigla": ["Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 182, "span": [60, 63]}, {"id": "5061", "dirty": false, "lemma": "σε]", "reading": "add. §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 182, "span": [92, 94]}], "A": "176", "dawe": "169", "tr": "Sempre questo, quando un tale gli disse: «Mi hai derubato!», fece: «Che io non faccia ritorno lì da dove me ne vado, se ti ho derubato»."}, {"type": "joke", "n": 177, "num": "170", "label": "170", "wit": "AMC", "text": "Κυμαίου τὶς ἐπύθετο, ποῦ μένει Δρακοντίδης ὁ ῥήτωρ. ὁ δέ· Μόνος εἰμί, εἶπεν· εἰ δὲ θέλεις, τήρει τὸ ἐργαστήριον, κἀγὼ ἀπελθὼν δείξω σοι.", "app": [{"id": "5065", "dirty": false, "lemma": "Κυμαίου]", "reading": "§SIG:Minas§ : Κυμαίω §SIG:A§ : Κυμαῖος §SIG:M§ §SIG:C§", "sigla": ["A", "C", "M", "Minas"], "editors": ["Minas"], "query": false, "unit": 183, "span": [0, 7]}, {"id": "5070", "dirty": false, "lemma": "Δρακοντίδης]", "reading": "δρακοντίδος §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 183, "span": [31, 42]}, {"id": "5073-5074", "dirty": false, "lemma": "ὁ δέ]", "reading": "om. §SIG:A§ §SIG:M§", "sigla": ["A", "M"], "editors": [], "query": false, "unit": 183, "span": [43, 82]}, {"id": "5081", "dirty": false, "lemma": "τήρει]", "reading": "τήρη §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 183, "span": [91, 96]}], "A": "177", "dawe": "170", "tr": "Un tale chiese a un Cumano dove vivesse il retore Dracontide. Quello disse: «Sono da solo, ma se vuoi, tienimi la bottega, ed io uscirò fuori e ti farò vedere»."}, {"type": "joke", "n": 178, "num": "171", "label": "171", "wit": "AC", "text": "Κυμαῖος ἐπ’ Ἀλεξανδρείᾳ τοῦ πατρὸς αὐτοῦ ἀποθανόντος τὸ σῶμα τοῖς ταριχευταῖς δέδωκε. μετὰ δὲ χρόνον ἐζήτει αὐτὸ ἀπολαβεῖν. τοῦ δὲ ‹ταριχευτοῦ› ἔχοντος καὶ ἄλλα σώματα καὶ ἐρωτῶντος, τί σημεῖον ἔχει [ἡ] τοῦ πατρὸς αὐτοῦ [θήκη], ἀπεκρίθη· Ἔβησσεν.", "app": [{"id": "5092", "dirty": false, "lemma": "ἐπ]", "reading": "ἐν §SIG:Minas§", "sigla": ["Minas"], "editors": ["Minas"], "query": false, "unit": 184, "span": [8, 10]}, {"id": "5101", "dirty": false, "lemma": "ταριχευταῖς]", "reading": "ταρυχεύταις", "sigla": [], "editors": [], "query": false, "unit": 184, "span": [66, 77]}, {"id": "5102", "dirty": false, "lemma": "δέδωκε]", "reading": "δέδωκεν §SIG:A§ ac : ἔδωκε §SIG:C§ fort. recte", "sigla": ["A", "C"], "editors": [], "query": false, "unit": 184, "span": [78, 84]}, {"id": "5111", "dirty": false, "lemma": "ταριχευτοῦ]", "reading": "dub. §SIG:Boissonade§", "sigla": ["Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 184, "span": [132, 142]}, {"id": "5121-5125", "dirty": false, "lemma": "ἡ … θήκη]", "reading": "dub. §SIG:Braccini§ : τοῦ πατρὸς αὐτοῦ ἡ θήκη §SIG:C§ : ὁ πατήρ αὐτοῦ §SIG:Dawe§ monente §SIG:Thierfelder§", "sigla": ["Braccini", "C", "Dawe", "Thierfelder"], "editors": ["Thierfelder", "Dawe"], "query": false, "unit": 184, "span": [200, 225]}, {"id": "5127", "dirty": false, "lemma": "Ἔβησσεν]", "reading": "§SIG:Eberhard§ : ἔβισσεν §SIG:A§ : ἔβισση vel ἔβισσονον §SIG:C§", "sigla": ["A", "C", "Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 184, "span": [238, 245]}], "A": "178", "dawe": "171", "tr": "Un Cumano quando suo padre morì in Alessandria, diede il corpo agli imbalsamatori. Tempo dopo, voleva riprenderselo. Siccome l’imbalsamatore aveva anche altri corpi e domandava che segno avesse di suo padre, il Cumano rispose: «Aveva la tosse»."}, {"type": "joke", "n": 179, "num": "172", "label": "172; cf. 218 α", "wit": "AM", "text": "Κυμαῖος πύκτην ἰδὼν πολλὰ τραύματα ἔχοντα ἠρώτα, πόθεν ἔχει ταῦτα. τοῦ δὲ εἰπόντος· Ἐκ τοῦ μύρμηκος ἔφη· Διὰ τί γὰρ χαμαὶ κοιμᾷ;", "app": [], "A": "179", "dawe": "172", "tr": "Un Cumano vide un pugile che aveva molte ferite e gli domandava da dove le avesse riportate. Quando questi disse: «Dalla formica»{ N1|I6|Z1\\6\\ } il Cumano fece: «Ma allora perché dormi per terra?»."}, {"type": "joke", "n": 180, "num": "173", "label": "173", "wit": "AMC", "text": "Κυμαῖος μέλι ἐπίπρασκεν. ἐλθόντος δέ τινος καὶ γευσαμένου καὶ εἰπόντος, ὅτι πάνυ καλόν, ἔφη· Εἰ μὴ γὰρ μῦς ἐνέπεσεν εἰς αὐτό, οὐκ ἂν ἐπώλουν.", "app": [{"id": "5167", "dirty": false, "lemma": "γευσαμένου]", "reading": "γευσάμενος §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 186, "span": [47, 57]}, {"id": "5175", "dirty": false, "lemma": "μὴ]", "reading": "om. §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 186, "span": [96, 98]}, {"id": "5179-5180", "dirty": false, "lemma": "εἰς αὐτό]", "reading": "αυτῷ §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 186, "span": [116, 124]}], "A": "180", "dawe": "173", "tr": "Un Cumano vendeva del miele. Quando un tale giunse, lo gustò e disse che era buono, fece: «Se infatti non ci fosse caduto dentro un topo, non lo venderei mica!»."}, {"type": "joke", "n": 181, "num": "174", "label": "174", "wit": "AMC", "text": "Κυμαῖον νοσοῦντα ἀπήλπισεν ἰατρός. ὁ δὲ ὑγιάνας περιέκαμπτε τὸν ἰατρόν. ἐρωτηθεὶς οὖν τὴν αἰτίαν ἀπεκρίνατο· Εἰπόντος σου, ‹ὅτι› ἀποθνῄσκω, αἰσχύνομαι ζήσας.", "app": [{"id": "5187-5190", "dirty": false, "lemma": "Κυμαῖον … ἰατρός]", "reading": "Κυμαῖον ἀπήντισεν ὁ ἰατρὸς νοσοῦντα §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 187, "span": [0, 33]}, {"id": "5204", "dirty": false, "lemma": "ὅτι]", "reading": "add. §SIG:Thierfelder§ monente §SIG:Eberhard§", "sigla": ["Eberhard", "Thierfelder"], "editors": ["Eberhard", "Thierfelder"], "query": false, "unit": 187, "span": [124, 127]}, {"id": "5207", "dirty": false, "lemma": "ζήσας]", "reading": "δὲ ζήσας §SIG:A§ §SIG:M§", "sigla": ["A", "M"], "editors": [], "query": false, "unit": 187, "span": [151, 156]}], "A": "181", "dawe": "174", "tr": "Un medico aveva perso le speranze per un Cumano ammalato. Ma questi si era ristabilito, ed evitava il medico. Quando gliene fu domandato il motivo rispose «Siccome tu hai detto che sarei morto, vivo e quindi mi vergogno»."}, {"type": "joke", "n": 182, "num": "175", "label": "175", "wit": "A", "text": "Κυμαῖος ἰατρὸς ἄρρωστον τριταΐζοντα εἰς ἡμιτριταῖον περιστήσας τὸ ἥμισυ τοῦ μισθοῦ ἀπῄτει.", "app": [], "A": "182", "dawe": "175", "tr": "Un medico cumano rese semiterzano un malato di febbre terzana e gli domandava la metà del compenso."}, {"type": "joke", "n": 183, "num": "175 bis", "label": "175 bis; 3 α", "wit": "A", "text": "Κυμαίῳ ἰατρῷ σχολαστικὸς προσελθὼν εἶπε· Σοφιστά, ὅταν ἐκ τοῦ ὕπνου ἀναστῶ, ἐπὶ ἡμιώριον ‹...› διύπνισον.", "app": [{"id": "5229", "dirty": false, "lemma": "Κυμαίῳ]", "reading": "§SIG:Minas§ et fort. §SIG:A§ 2 : Κυμαί §SIG:A§ ac", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 189, "span": [0, 6]}, {"id": "5232", "dirty": false, "lemma": "προσελθὼν]", "reading": "§SIG:Minas§ : προσελθὸν §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 189, "span": [25, 34]}, {"id": "5240-5243", "dirty": false, "lemma": "ἐπὶ … διύπνισον]", "reading": "facile supplendum est ex 3 α", "sigla": [], "editors": [], "query": false, "unit": 189, "span": [76, 104]}], "A": "183", "dawe": "175 bis", "tr": "Il testo è lacunoso, ma facilmente ricostruibile attraverso il confronto con la facezia 3 α."}, {"type": "joke", "n": 184, "num": "176", "label": "176", "wit": "A", "text": "Κυμαῖος ἰατρὸς ἀπεγνωσμένον ἄρρωστον ἐνημάτισεν, ἐκέλευσε δὲ ‹θεράποντα› τὰ ἐκκεχωρημένα ἰδεῖν. τοῦ δὲ δείξαντος καὶ εἰπόντος, ὅτι ἀπέθανεν, ὁ ἰατρὸς μεθ’ ὅρκου ἀπεκρίνατο· Οὗτως εἰ μὴ ἐκλύσθη, ἐλάκησεν ἄν.", "app": [{"id": "5251", "dirty": false, "lemma": "ἐνημάτισεν]", "reading": "§SIG:Boissonade§ : ἐνευμάτισεν §SIG:A§ : ἐνεμμάτισεν §SIG:Minas§ ἐκέλευσε … ἰδεῖν] aliquid excidisse putant edd. pl. θεράποντα] add. §SIG:Dawe§", "sigla": ["A", "Boissonade", "Dawe", "Minas"], "editors": ["Boissonade", "Minas", "Dawe"], "query": false, "unit": 190, "span": [37, 47]}, {"id": "5256", "dirty": false, "lemma": "ἐκκεχωρημένα]", "reading": "ἐκκεχωρισμένα §SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 190, "span": [76, 88]}, {"id": "5270", "dirty": false, "lemma": "Οὗτως]", "reading": "οὗτος §SIG:Kurtz§", "sigla": ["Kurtz"], "editors": [], "query": false, "unit": 190, "span": [173, 178]}, {"id": "5274", "dirty": false, "lemma": "ἐλάκησεν]", "reading": "§SIG:Boissonade§ : ἐλάκισεν §SIG:A§", "sigla": ["A", "Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 190, "span": [194, 202]}], "A": "184", "dawe": "176", "tr": "Un medico cumano fece un clistere ad un malato in condizioni disperate; quindi, ordinò al servo di vedere le evacuazioni. Quando questo le mostrò e disse che il paziente era morto, il medico disse giurandoci: «Se non fosse stato così purgato, sarebbe crepato!»."}, {"type": "joke", "n": 185, "num": "177", "label": "177", "wit": "A", "text": "Κυμαῖος ἰατρὸς τέμνων τινὰ δεινῶς ἀλγοῦντα καὶ βοῶντα ἀμβλυτέραν σμίλην μετέλαβεν.", "app": [], "A": "185", "dawe": "177", "tr": "Un medico cumano che operava un tale che soffriva e urlava tremendamente, prese un bisturi piuttosto smussato."}, {"type": "joke", "n": 186, "num": "178", "label": "178", "wit": "AC", "text": "Κυμαῖοι δύο ἰσχάδων κεράμια δύο ἐπρίαντο. τούτων δὲ ὁ ἕτερος τὸν ἕτερον λανθάνων οὐκ ἐκ τοῦ ἰδίου, ἀλλ’ ἐκ τοῦ ἑτέρου κατήσθιεν. ὡς δὲ τοῖς ἀλλήλων κατεχρήσαντο, ἕκαστος ἐπὶ τὸ ἴδιον ἐπιστρέψας εὗρεν αὐτὸ κενόν. ἀλλήλων οὖν ἐπιλαβόμενοι ἤγοντο ἐπὶ τὸν ἄρχοντα. διαγνοὺς δὲ ὁ ἄρχων ἐκέλευσε τὰ κενώματα ἀλλάξαι καὶ τὰς τιμὰς ἀλλήλοις ἀποδοῦναι.", "app": [{"id": "5311-5314", "dirty": false, "lemma": "ἐκ 2 … κατήσθιεν]", "reading": "ἐκ ‹τοῦ› τοῦ ἑτέρου κατήσθιεν dub. §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 192, "span": [85, 127]}, {"id": "5317", "dirty": false, "lemma": "τοῖς]", "reading": "τῆς §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 192, "span": [135, 139]}, {"id": "5319", "dirty": false, "lemma": "κατεχρήσαντο]", "reading": "κατεχρήσατο §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 192, "span": [148, 160]}, {"id": "5346", "dirty": false, "lemma": "ἀλλήλοις]", "reading": "ἀλλήλους §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 192, "span": [324, 332]}], "A": "186", "dawe": "178", "tr": "Due Cumani acquistarono due recipienti di fichi secchi. Entrambi, ingannando l’altro, mangiavano non dal proprio recipiente, ma da quello dell’altro. Quando se li ebbero consumati l’un l’altro, ciascuno si recò al proprio recipiente e lo trovò vuoto. Si azzuffarono dunque tra loro e furono portati dal magistrato. Allora il magistrato rifletté e comandò che si scambiassero i recipienti vuoti e che si rimborsassero le spese vicendevolmente."}, {"type": "joke", "n": 187, "num": "179", "label": "179", "wit": "A", "text": "Ἐν Κύμῃ δημαγωγὸς ἐν ἐκκλησίᾳ κατηγορηθείς· Ἄνδρες, ἔφη, πολῖται, εἰ μὲν κατεψευσμένοι μου τὰς διαβολάς εἰσιν οὗτοι, γένοιτο αὐτοῖς παρ’ ὑμῶν καταγνωσθῆναι· εἰ δέ τι ἐγὼ τούτων πεποίηκα, πάντων ὑμῶν καθημένων ἐμοὶ μόνῳ τὸ θέατρον ἐπιπέσοι.", "app": [{"id": "5362", "dirty": false, "lemma": "κατεψευσμένοι]", "reading": "κατεψευμένοι §SIG:A§ ac corr. §SIG:A§ 2", "sigla": ["A"], "editors": [], "query": false, "unit": 193, "span": [73, 86]}, {"id": "5371", "dirty": false, "lemma": "ὑμῶν 1]", "reading": "dub. §SIG:Eberhard§ : υμῖν §SIG:A§", "sigla": ["A", "Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 193, "span": [137, 141]}, {"id": "5377", "dirty": false, "lemma": "τούτων]", "reading": "§SIG:Thierfelder§ : τούτοις §SIG:A§", "sigla": ["A", "Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 193, "span": [170, 176]}, {"id": "5383", "dirty": false, "lemma": "μόνῳ]", "reading": "§SIG:Minas§ : μόνον", "sigla": ["Minas"], "editors": ["Minas"], "query": false, "unit": 193, "span": [214, 218]}], "A": "187", "dawe": "179", "tr": "A Cuma un demagogo sotto accusa in assemblea disse: «Uomini, cittadini, se questi mi hanno calunniato con queste accuse, che siano condannati da voi; se io ho invece commesso alcuna di queste azioni, mentre voi tutti siete seduti, crolli il teatro su me solo! »."}, {"type": "joke", "n": 188, "num": "180", "label": "180", "wit": "A", "text": "Κυμαῖος ἄρχων τοιαῦτα κηρύγματα ἐκήρυξεν· Οἱ ἔφοροι μετὰ τὴν θυσίαν παραχρῆμα τὰς ἑαυτῶν βύρσας ἀναφερέτωσαν πρὸς τὸν ἱερέα. Οἱ δὲ βουλευταί, ἔλθετε εἰς τὸ βουλευτήριον καὶ μὴ βουλεύεσθε. Οἱ δὲ μάγειροι τὰ ἴδια ὀστέα ὑπὲρ τὸ τεῖχος βαλλέτωσαν. Οἱ δὲ σκυτεῖς μικροὺς καλάποδας μὴ ἐχέτωσαν.", "app": [], "A": "188", "dawe": "180", "tr": "Un magistrato Cumano annunciò tali disposizioni: “Gli efori, dopo il sacrificio, riportino all’istante le loro pelli al sacerdote. Voi, i buleuti, venite al bouleuterion se non tenete consiglio. I cuochi, poi, gettino le proprie ossa oltre la cinta muraria. I calzolai, poi, non abbiano forme da scarpe di taglia piccola”."}, {"type": "joke", "n": 189, "num": "181", "label": "181", "wit": "A", "text": "Κυμαῖοι εἰς ψηφοφορίαν ἀπαντήσαντες καὶ γνόντες πολλοὺς ἐκ τῶν ἄλλων πόλεων ἀπολειφθέντας, αἰτιωμένους τὴν ἀτραπόν· Μὴ μωροί, ἔφασαν, ἐὰν καὶ ἡμεῖς εἰς τὸ μέλλον οὐκ ἐρχόμεθα;", "app": [{"id": "5450", "dirty": false, "lemma": "αἰτιωμένους]", "reading": "§SIG:Thierfelder§ : αἰτιώμενοι §SIG:A§", "sigla": ["A", "Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 195, "span": [91, 102]}, {"id": "5455", "dirty": false, "lemma": "ἔφασαν]", "reading": "§SIG:Eberhard§ : ἔφη §SIG:A§ | post ἔφασαν, ‹φανεῖσθε› §SIG:Dawe§", "sigla": ["A", "Dawe", "Eberhard"], "editors": ["Eberhard", "Dawe"], "query": false, "unit": 195, "span": [126, 132]}], "A": "189", "dawe": "181", "tr": "Dei Cumani si recarono ad una votazione, vennero a sapere che molti dalle altre città erano rimasti indietro incolpando la difficoltà del sentiero, e dissero: «Siamo pazzi, se non arriviamo in ritardo anche noi?»."}, {"type": "joke", "n": 190, "num": "182", "label": "182", "wit": "AC", "text": "Κυμαῖος ‹ἰατρὸς› τετρωμένην κεφαλὴν τέμνων ὕπτιον θεὶς τὸν πάσχοντα ὕδωρ εἰς τὸ στόμα ἐνέβαλεν, ἵνα ἴδῃ, διὰ τοῦ χειρουργηθέντος εἴποτε ἐκρεύσει. AM", "app": [{"id": "5468", "dirty": false, "lemma": "ἰατρὸς]", "reading": "§SIG:Thierfelder§", "sigla": ["Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 196, "span": [9, 15]}, {"id": "5469", "dirty": false, "lemma": "τετρωμένην]", "reading": "τετριμμένην §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 196, "span": [17, 27]}, {"id": "5480", "dirty": false, "lemma": "ἐνέβαλεν]", "reading": "ἔβαλεν §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 196, "span": [86, 94]}, {"id": "5481-5487", "dirty": false, "lemma": "ἵνα … ἐκρεύσει]", "reading": "ἵνα ἴδῃ, [τὸ] πότε διὰ τοῦ χειρουργηθέντος ἐκρεύσε transp. §SIG:Thierfelder§ : ἵνα ἴδῃ, ‹εἰ› διὰ τοῦ χειρουργηθέντος τόπου ἐκρεύσε §SIG:Dawe§", "sigla": ["Dawe", "Thierfelder"], "editors": ["Thierfelder", "Dawe"], "query": false, "unit": 196, "span": [96, 144]}, {"id": "5486", "dirty": false, "lemma": "εἴποτε]", "reading": "§SIG:Cataudella§ : πότερον dub. §SIG:Braccini§ : τὸ πότε §SIG:A§ : ὅποτε §SIG:C§", "sigla": ["A", "Braccini", "C", "Cataudella"], "editors": [], "query": false, "unit": 196, "span": [129, 135]}], "A": "190", "dawe": "182", "tr": "Un medico cumano mentre operava una ferita in testa pose il paziente supino e gli versò dell’acqua nella bocca, per vedere se uscisse dalla parte operata."}, {"type": "section", "text": "δύσκολοι", "app": []}, {"type": "joke", "n": 191, "num": "183", "label": "183", "wit": "AM", "text": "Δυσκόλῳ ἰατρῷ προσελθών τις εἶπε· Σοφιστά, ἀνακεῖσθαι οὐ δύναμαι οὔτε ἑστάναι, ἀλλ’ οὐδὲ καθῆσθαι. καὶ ὁ ἰατρὸς εἶπεν· Οὐδέν σοι λείπει ἢ κρεμασθῆναι.", "app": [{"id": "5506-5507", "dirty": false, "lemma": "ἀλλ οὐδὲ]", "reading": "ἀλ’λ’ ουδὲ §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 198, "span": [79, 88]}, {"id": "5508", "dirty": false, "lemma": "καθῆσθαι]", "reading": "§SIG:Pontanus§ : καθεῖσθαι §SIG:A§ §SIG:M§", "sigla": ["A", "M", "Pontanus"], "editors": [], "query": false, "unit": 198, "span": [89, 97]}, {"id": "5517", "dirty": false, "lemma": "κρεμασθῆναι]", "reading": "κρεμμασθῆναι §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 198, "span": [138, 149]}], "A": "191", "dawe": "183", "tr": "Un tale venne da un medico burbero e disse: «Dottore, non riesco a stare allungato, né in piedi, ma nemmeno seduto! E il medico disse: «Non ti rimane che essere impiccato»."}, {"type": "joke", "n": 192, "num": "184", "label": "184; 40 β", "wit": "A", "text": "Δυσκόλῳ ἰατρῷ τις λέγει· Τί ποιήσω, ὅτι αἷμα κάθημαι καὶ χολάς; κἀκεῖνος πρὸς αὐτὸν εἶπεν· Ἐὰν καὶ τὰ ἔντερά σου ἐκβάλῃς, ἐγὼ οὐ χολῶ.", "app": [{"id": "5530-5531", "dirty": false, "lemma": "αἷμα κάθημαι]", "reading": "αἷμα ‹ἐκβάλλω ὅτε› κάθημαι dub. §SIG:Boissonade§", "sigla": ["Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 199, "span": [40, 52]}], "A": "192", "dawe": "184", "tr": "Un tale dice a un medico burbero: «Cosa posso fare per il fatto che evacuo sangue e bili?» e quello gli dice «Se anche rimettessi le tue interiora, io non mi prenderei bile»."}, {"type": "joke", "n": 193, "num": "185", "label": "185; 47 β", "wit": "AMC", "text": "Δύσκολος ἰατρὸς ἑτερόφθαλμος ἠρώτα νοσοῦντα· Πῶς ἔχεις; ὁ δὲ εἶπεν· Ὡς βλέπεις. ὁ δὲ ἰατρὸς ἔφη· Ἐὰν ὡς ἐγὼ βλέπω ἔχῃς, τὸ ἥμισύ σου ἀπέθανεν.", "app": [{"id": "5552-5556", "dirty": false, "lemma": "Δύσκολος … νοσοῦντα]", "reading": "Δύσκολον νοσοῦντα ἰατρὸς ἑτερόφθαλμος ἠρώτα §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 200, "span": [0, 43]}, {"id": "5559-5561", "dirty": false, "lemma": "ὁ 1 … εἶπεν]", "reading": "εἶπεν §SIG:A§ §SIG:M§", "sigla": ["A", "M"], "editors": [], "query": false, "unit": 200, "span": [56, 66]}, {"id": "5564-5566", "dirty": false, "lemma": "ὁ 2 … ἰατρὸς 2]", "reading": "ὁ δὲ §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 200, "span": [56, 91]}, {"id": "5574", "dirty": false, "lemma": "ἥμισύ]", "reading": "ἥμυσί §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 200, "span": [123, 128]}, {"id": "5576", "dirty": false, "lemma": "ἀπέθανεν]", "reading": "ἀπέθανε §SIG:C§ §SIG:M§", "sigla": ["C", "M"], "editors": [], "query": false, "unit": 200, "span": [133, 141]}], "A": "193", "dawe": "185", "tr": "Un medico burbero che vedeva solo da un occhio domandava ad un paziente: «Come stai?», e quello disse: «Come vedi». Il medico fece: «Se stai come vedo, la metà di te è morta»."}, {"type": "joke", "n": 194, "num": "186", "label": "186", "wit": "AMC", "text": "Πρὸς δύσκολον ἰατρὸς προσελθὼν καὶ ἁψάμενος αὐτοῦ εἶπε· Κακὰ πυρέττεις. ὁ δὲ ἀποκριθεὶς εἶπεν· Εἰ δύνασαι σὺ κρείττω πυρέττειν, ἰδοὺ κλίνη· ἀναπεσὼν πύρεττε.", "app": [{"id": "5580", "dirty": false, "lemma": "Πρὸς]", "reading": "ρὸς §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 201, "span": [0, 4]}, {"id": "5588", "dirty": false, "lemma": "Κακὰ]", "reading": "Πολλὰ §SIG:C§ : Κάκιστα dub. §SIG:Thierfelder§", "sigla": ["C", "Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 201, "span": [56, 60]}, {"id": "5589", "dirty": false, "lemma": "πυρέττεις]", "reading": "πυρ ἔττεις §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 201, "span": [61, 70]}, {"id": "5592", "dirty": false, "lemma": "ἀποκριθεὶς]", "reading": "om. §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 201, "span": [77, 87]}, {"id": "5597", "dirty": false, "lemma": "κρείττω]", "reading": "κρειττόνως §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 201, "span": [109, 116]}, {"id": "5601", "dirty": false, "lemma": "ἀναπεσὼν]", "reading": "καὶ ἀναπεσὼν §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 201, "span": [140, 148]}], "A": "194", "dawe": "186", "tr": "Un medico andò da un malato burbero, e dopo averlo toccato disse: «Scotti malamente!». L’altro allora rispose: «Se tu sai scottare meglio, ecco un letto: buttatici sopra e scotta!»."}, {"type": "joke", "n": 195, "num": "187", "label": "187; 41 β", "wit": "A", "text": "Δύσκολος ἀστρολόγος παιδὸς νοσεροῦ γένεσιν λέγων, πολυχρόνιον αὐτὸν τῇ μητρὶ ὡς ἐπαγγειλάμενος ᾔτει τὸν μισθόν. τῆς δὲ εἰπούσης· Ἐλθόντι σοι αὔριον δώσω ἔφη· Τί οὖν, ἐὰν τὴν νύκτα ἀποθάνῃ καὶ ἐγὼ τὸν μισθὸν ἀπόλλω;", "app": [{"id": "5612", "dirty": false, "lemma": "γένεσιν]", "reading": "§SIG:DeRhoer§ : γέννησιν §SIG:A§", "sigla": ["A", "DeRhoer"], "editors": [], "query": false, "unit": 202, "span": [35, 42]}, {"id": "5614", "dirty": false, "lemma": "πολυχρόνιον]", "reading": "§SIG:Minas§ : πολλυχρόνιον §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 202, "span": [50, 61]}, {"id": "5615", "dirty": false, "lemma": "αὐτὸν]", "reading": "§SIG:Boissonade§ : αὐτὸ §SIG:A§", "sigla": ["A", "Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 202, "span": [62, 67]}], "A": "195", "dawe": "187", "tr": "Un astrologo burbero che faceva l’oroscopo a un bambino malato annunciò alla madre che quello sarebbe stato longevo e chiedeva il compenso. Quando quella disse: «Vieni domani e te lo darò», fece: «E che faccio, se stanotte muore e io mi gioco il compenso?»."}, {"type": "joke", "n": 196, "num": "188", "label": "188; 42 β", "wit": "AM", "text": "Δυσκόλου κεράμιον μέλιτος ἀγοράσαντος καὶ ὑπό τινος ἐρωτηθέντος, πόσου ἠγόρασεν, καταστρέφων τὸ κεράμιον ἔλεγεν· Οὕτω μου ἐκχυθῇ τὸ αἷμα, ἐὰν εἴπω ὑμῖν.", "app": [{"id": "5664", "dirty": false, "lemma": "ἐκχυθῇ]", "reading": "ἐκχυθήτω dub. §SIG:Eberhard§ : ἐκχυθείη §SIG:Minas§", "sigla": ["Eberhard", "Minas"], "editors": ["Eberhard", "Minas"], "query": false, "unit": 203, "span": [122, 128]}], "A": "196", "dawe": "188", "tr": "Quando un burbero comprò un vaso di mele e gli fu chiesto a quanto lo avesse comprato, capovolse il vaso e diceva: «Così coli il mio sangue, se ve lo dovessi dire!»."}, {"type": "joke", "n": 197, "num": "189", "label": "189", "wit": "AMC", "text": "Πρὸς δύσκολον ἄρρωστον ἰατρὸς προσελθὼν προσέταξε ψιχία μετὰ στρουθίου φαγεῖν. καὶ ὁ δύσκολος εἶπε· Πῶς δύναμαι εἰς τὸ κλουβίον εἰσελθεῖν, ἵνα φάγω μετὰ τοῦ στρουθίου τὰ ψιχίδια;", "app": [{"id": "5679", "dirty": false, "lemma": "ψιχία]", "reading": "ψιχίαν §SIG:C§ : ψυχια §SIG:M§", "sigla": ["C", "M"], "editors": [], "query": false, "unit": 204, "span": [50, 55]}, {"id": "5680", "dirty": false, "lemma": "μετὰ 1]", "reading": "μετὰ τοῦ §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 204, "span": [56, 60]}, {"id": "5690", "dirty": false, "lemma": "τὸ]", "reading": "om. §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 204, "span": [116, 118]}, {"id": "5691", "dirty": false, "lemma": "κλουβίον]", "reading": "κλουβίν §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 204, "span": [119, 127]}, {"id": "5699", "dirty": false, "lemma": "ψιχίδια]", "reading": "ψυχιδία §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 204, "span": [170, 177]}], "A": "197", "dawe": "189", "tr": "Un medico si recò da un ammalato burbero e gli prescrisse di mangiare mollichine con un uccellino. Allora il burbero disse: «Come posso entrare nella gabbia per mangiare le mollichine con l’uccellino?»."}, {"type": "joke", "n": 198, "num": "190", "label": "190; 43 β", "wit": "A", "text": "Δυσκόλου ταυλίζοντος κατεπέτασσέ τις ἀργὸς καθήμενος. ὁ δὲ θυμούμενος ἠρώτησεν αὐτόν· Ποίας τέχνης; καὶ διὰ τί ἀργεῖς; ἐκείνου δὲ εἰπόντος ὅτι Ῥάπτης εἰμί, ἔργον δὲ οὐκ ἔχω διαρρήξας αὐτοῦ τὸν χιτῶνα καὶ ἐπιδοὺς εἶπε· Λαβὼν ἐργάζου καὶ σιώπα.", "app": [{"id": "5707", "dirty": false, "lemma": "κατεπέτασσέ]", "reading": "§SIG:Minas§ : κατεπέτασε §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 205, "span": [21, 32]}, {"id": "5716-5717", "dirty": false, "lemma": "Ποίας τέχνης]", "reading": "Ποὶαν ‹οἶδας› τέχνην §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 205, "span": [86, 98]}, {"id": "5735-5736", "dirty": false, "lemma": "τὸν χιτῶνα]", "reading": "τὸν ἑαυτοῦ χιτῶνα §SIG:Minas§", "sigla": ["Minas"], "editors": ["Minas"], "query": false, "unit": 205, "span": [189, 199]}], "A": "198", "dawe": "190", "tr": "Mentre un burbero giocava a dadi, un fannullone che stava lì seduto gli dava consigli. Il burbero allora, irritandosi gli chiese: «Qual è il tuo lavoro? E perché stai senza far nulla?». Quando quello disse: «Sono un rammendatore, ma non ho lavoro», il burbero si strappò il chitone, glielo diede e disse: «Prendi, lavora e taci!»."}, {"type": "joke", "n": 199, "num": "191", "label": "191; 45 β", "wit": "A", "text": "Δύσκολόν τις ἠρώτα· Ποῦ μένεις; ὁ δὲ εἶπεν· Ἐκεῖθεν μεταβαίνω.", "app": [], "A": "199", "dawe": "191", "tr": "Un tale chiese ad un burbero: «Dove abiti?» e quello disse: «Trasloco da lì!»."}, {"type": "joke", "n": 200, "num": "192", "label": "192", "wit": "A", "text": "Δυσκόλῳ τις ναυκλήρῳ ἀπαντήσας εἶπε· Τὸν ἐπίπλουν σου εἶδον ἐν Ῥόδῳ. κἀκεῖνος ἀπεκρίνατο· Κἀγώ σου εἶδον τὸ ἧπαρ ἐν Σικελίᾳ.", "app": [{"id": "5782", "dirty": false, "lemma": "Σικελίᾳ]", "reading": "§SIG:Minas§ : Σικελλία §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 207, "span": [116, 123]}], "A": "200", "dawe": "192", "tr": "Un tale incontrò un armatore burbero e disse: «Ho visto il tuo bacino a Rodi!», e quello rispose: «E io ho visto il tuo fegato in Sicilia»."}, {"type": "joke", "n": 201, "num": "193", "label": "193; 44 β", "wit": "AMC", "text": "Δύσκολόν τις ἐζήτει. ὁ δὲ ἀπεκρίνατο· Οὐκ εἰμὶ ὧδε. τοῦ δὲ γελάσαντος καὶ εἰπόντος· Ψεύδῃ· τῆς γὰρ φωνῆς σου ἀκούω εἶπεν· Ὦ κάθαρμα, εἰ μὲν ὁ δοῦλός μου εἶπεν, εἶχες ἂν αὐτῷ πιστεῦσαι· ἐγὼ δέ σοι οὐ φαίνομαι ἀξιοπιστότερος ἐκείνου εἶναι;", "app": [{"id": "5790", "dirty": false, "lemma": "ἐζήτει]", "reading": "προσεζήτει §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 208, "span": [13, 19]}, {"id": "5802", "dirty": false, "lemma": "Ψεύδῃ]", "reading": "ψεύση §SIG:C§ : ψεύδει §SIG:M§", "sigla": ["C", "M"], "editors": [], "query": false, "unit": 208, "span": [84, 89]}, {"id": "5820", "dirty": false, "lemma": "αὐτῷ]", "reading": "αὐτὸ §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 208, "span": [169, 173]}, {"id": "5827", "dirty": false, "lemma": "ἀξιοπιστότερος]", "reading": "ἀξιόπιστος §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 208, "span": [208, 222]}], "A": "201", "dawe": "193", "tr": "Un tale cercava un burbero. Questi rispose: «Non sono qui». Quando l’altro allora scoppiò a ridere e disse: «Menti: sento infatti la tua voce!», il burbero disse: «Disgraziato, se te lo avesse detto il mio servo, gli avresti creduto, io invece a te non sembro essere degno di maggior fede di quello?»."}, {"type": "joke", "n": 202, "num": "194", "label": "194; 46 β", "wit": "A", "text": "Δύσκολος σκάλαν καταβαίνων σφαλεὶς κατέπεσε. τοῦ δὲ οἰκοκυροῦ εἰπόντος· Τίς ἔνι ἐκεῖ; ἀπεκρίνατο· Ἐγὼ τοῦ ἐνοικίου μου ἐλάκησα. τί πρὸς σέ;", "app": [{"id": "5842-5843", "dirty": false, "lemma": "οἰκοκυροῦ εἰπόντος]", "reading": "§SIG:Boissonade§ : εἰπόντος οἰκοκυροῦ §SIG:A§", "sigla": ["A", "Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 209, "span": [52, 70]}, {"id": "5848", "dirty": false, "lemma": "Ἐγὼ]", "reading": "Ἐγὼ ‹ἔσω› §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 209, "span": [98, 101]}, {"id": "5848-5852", "dirty": false, "lemma": "Ἐγὼ … ἐλάκησα]", "reading": "ἐγώ σου ἔνοικος ἐλάκησα §SIG:Cataudella§", "sigla": ["Cataudella"], "editors": [], "query": false, "unit": 209, "span": [98, 126]}], "A": "202", "dawe": "194", "tr": "Un burbero mentre scendeva una scala inciampò e cadde. Quando il padrone di casa disse: «Chi c’è lì?», rispose: «Io, mi sono ammazzato a costo del mio affitto. Tu che vuoi?»."}, {"type": "joke", "n": 203, "num": "195", "label": "195", "wit": "AM", "text": "Δυσκόλῳ τις συγκλητικῷ ἔλεγε· Μικρόν σε ποθῶ ἰδεῖν καὶ συντυχεῖν. ὁ δὲ ἀπεκρίνατο· Κἀγὼ σὲ ἰδεῖν θέλω τυφλὸν καὶ χωλόν. AM", "app": [{"id": "5867-5868", "dirty": false, "lemma": "καὶ συντυχεῖν]", "reading": "del. §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 210, "span": [51, 64]}], "A": "203", "dawe": "195", "tr": "Un tale diceva ad un burbero di rango senatorio: «Desidero vederti e incontrarti un po’». E quello rispose: «Anche io desidero vederti cieco e scontrato»."}, {"type": "section", "text": "ἀφυεῖς", "app": []}, {"type": "joke", "n": 204, "num": "196", "label": "196", "wit": "A", "text": "Ἀφυὴς γραμματικὸς ἐρωτηθείς· Πῶς δεῖ λέγειν, τοῖς δύο ἢ τοῖς δυσί; ὁ δὲ τὴν χεῖρα προτείνας τοὺς δύο ὑπεδείκνυε δακτύλους.", "app": [], "A": "204", "dawe": "196", "tr": "Ad un grammatico incapace fu domandato: «Come bisogna dire, “ai due” o “ai dui”?», e questi protese la mano e indicava due dita."}, {"type": "joke", "n": 205, "num": "197", "label": "197", "wit": "AM", "text": "Ἀφυὴς γραμματικὸς ἐρωτηθείς· Ἡ μήτηρ Πριάμου τίς ἐκαλεῖτο; ἀπορῶν ἔφη· Ἡμεῖς κατὰ τιμὴν κυρίαν αὐτὴν καλοῦμεν.", "app": [], "A": "205", "dawe": "197", "tr": "Ad un grammatico incapace fu domandato: «Come si chiamava la madre di Priamo?». Non sapendo rispondere, disse: «Noi, per rispetto, la chiamiamo signora»."}, {"type": "joke", "n": 206, "num": "198", "label": "198", "wit": "AM", "text": "Ἀφυὴς κουρεὺς τοῖς ὑπ’ αὐτοῦ πληττομένοις ἔμπλαστρα προσετίθει. ἑνὸς δὲ αἰτιασαμένου αὐτὸν ἔφη· Ἀχάριστε, μάτην ἀγανακτεῖς· ἑνὸς γὰρ δηναρίου ξυράμενος τεσσάρων δηναρίων ἔμπλαστρα ἔλαβες.", "app": [{"id": "5935", "dirty": false, "lemma": "προσετίθει]", "reading": "ἐτίθει §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 214, "span": [52, 62]}, {"id": "5946", "dirty": false, "lemma": "δηναρίου]", "reading": "διναρίου §SIG:A§ ac §SIG:M§ , corr. §SIG:A§ 2", "sigla": ["A", "M"], "editors": [], "query": false, "unit": 214, "span": [133, 141]}, {"id": "5947", "dirty": false, "lemma": "ξυράμενος]", "reading": "ξηρὰμενος §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 214, "span": [142, 151]}, {"id": "5949", "dirty": false, "lemma": "δηναρίων]", "reading": "διναρίων §SIG:A§ ac §SIG:M§ , corr. §SIG:A§ 2", "sigla": ["A", "M"], "editors": [], "query": false, "unit": 214, "span": [161, 169]}, {"id": "5951", "dirty": false, "lemma": "ἔλαβες]", "reading": "ἔβαλας §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 214, "span": [180, 186]}], "A": "206", "dawe": "198", "tr": "Un barbiere incapace applicava impiastri lenitivi a quelli che venivano rasati da lui. Quando uno gliene aveva chieste le ragioni, disse: «Ingrato, ti arrabbi invano: rasato infatti al costo di un denaro, hai ricevuto impiastri per una valore di quattro denari!»."}, {"type": "joke", "n": 207, "num": "199", "label": "199", "wit": "A", "text": "Ἀφυὴς μαθητὴς κακῶς τινα κείρας καὶ παρωνυχίδας ποιήσας καὶ διὰ τοῦτο ὑπὸ τοῦ ὀνυχιζομένου ἀπωσθεὶς ἀνεβόησεν· Ἐπιστάτα, τί οὐκ ἀφίησί με μαθεῖν;", "app": [{"id": "5961", "dirty": false, "lemma": "παρωνυχίδας]", "reading": "§SIG:Minas§ : παρονυχίδας §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 215, "span": [36, 47]}, {"id": "5974", "dirty": false, "lemma": "ἀφίησί]", "reading": "§SIG:Kurtz§ : ἀφίης §SIG:A§", "sigla": ["A", "Kurtz"], "editors": [], "query": false, "unit": 215, "span": [128, 134]}, {"id": "5996-5997", "dirty": false, "lemma": "καὶ κλαίω]", "reading": "", "sigla": [], "editors": [], "query": false, "unit": 215, "span": [32, 35]}, {"id": "6003", "dirty": false, "lemma": "παρωνυχίδας]", "reading": "§SIG:Minas§ : παρονυχίδας §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 215, "span": [36, 47]}], "A": "207", "dawe": "199", "tr": "Un apprendista incapace tagliò male le unghie ad un tale, gli fece venire dei paterecci e dopo essere stato perciò scacciato da quel tale, si lamentò: «Capo, perché non mi lasci imparare?»."}, {"type": "joke", "n": 208, "num": "200", "label": "200", "wit": "A", "text": "Ἀφυὴς μαθητὴς ὑπὸ τοῦ ἐπιστάτου κελευσθεὶς ὀνυχίσαι οἰκοδεσπότην ἐδάκρυσε. τοῦ δὲ τὴν αἰτίαν ἐρωτήσαντος ἔφη· Φοβοῦμαι καὶ κλαίω· μέλλω γὰρ τραυματίσαι σε, καὶ παρωνυχίδας ποιήσεις, καὶ τύψει με ὁ ἐπιστάτης.", "app": [], "A": "208", "dawe": "200", "tr": "Un apprendista incapace venne incaricato dal capo di tagliare le unghie ad un signore rispettabile e scoppiò a piangere. Quando questi gliene chiese il motivo, disse: «Ho paura e piango: sto infatti per ferirti, e ti verranno dei paterecci, e il capo mi picchierà!»."}, {"type": "joke", "n": 209, "num": "201", "label": "201", "wit": "A", "text": "Ἀφυεῖ μάντει προσελθών τις ἐξ ἀποδημίας ἀνιὼν ἠρώτα περὶ τῶν οἰκείων. ὁ δὲ εἶπεν· Ὑγιαίνουσι πάντες, καὶ ὁ πατήρ σου. τοῦ δὲ εἰπόντος ὅτι Ὁ πατήρ μου δέκατον ἔτος ἔχει ἀφ’ οὗ ἀπέθανεν ἀπεκρίνατο· Οὐδὲν γὰρ οἶδας τὸν κατὰ ἀλήθειάν σου πατέρα.", "app": [{"id": "6048", "dirty": false, "lemma": "Οὐδὲν]", "reading": "ουδὲ §SIG:Minas§ : οὐ dub. §SIG:Thierfelder§", "sigla": ["Minas", "Thierfelder"], "editors": ["Minas", "Thierfelder"], "query": false, "unit": 217, "span": [196, 201]}, {"id": "6049-6052", "dirty": false, "lemma": "γὰρ … κατὰ]", "reading": "ἄρ’ οἶδας κατὰ τὸν κατὰ dub. §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 217, "span": [202, 220]}], "A": "209", "dawe": "201", "tr": "Un tale si recò da un indovino incapace mentre ritornava da un viaggio all’estero e gli faceva domande riguardo i familiari. Questi disse: «Sono tutti in salute, anche tuo padre». Siccome quello allora aveva detto: «mio padre è dieci anni che è morto!», l’indovino rispose: «Infatti non conosci affatto il tuo vero padre»."}, {"type": "joke", "n": 210, "num": "202", "label": "202", "wit": "AC", "text": "Ἀφυὴς μαθηματικὸς παιδίου γένεσιν λέγων εἶπεν· Οὗτος ἔσται ῥήτωρ, εἶτα ἔπαρχος, εἶτα ἡγεμών. τεθνηκότος οὖν τοῦ παιδὸς τούτου ἡ μήτηρ ἀπαντήσασα εἶπεν· Ὃν ἔλεγες ῥήτορα ἔσεσθαι καὶ ἄρχοντα καὶ ἡγεμόνα, ἀπέθανεν. ὁ δὲ ἔφη· Μὰ τὴν αὐτοῦ μνήμην, ἐὰν ἔζησε, πάντα ταῦτα ἂν ἐγένετο.", "app": [{"id": "6060", "dirty": false, "lemma": "μαθηματικὸς]", "reading": "μαθητικὸς §SIG:A§ : μάθη §SIG:C§", "sigla": ["A", "C"], "editors": [], "query": false, "unit": 218, "span": [6, 17]}, {"id": "6066-6067", "dirty": false, "lemma": "ἔσται ῥήτωρ]", "reading": "ῥήτωρ ἔσται §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 218, "span": [53, 64]}, {"id": "6080", "dirty": false, "lemma": "εἶπεν· 2]", "reading": "ἔφη §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 218, "span": [40, 45]}, {"id": "6099-6100", "dirty": false, "lemma": "πάντα ταῦτα]", "reading": "ταῦτα πάντα §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 218, "span": [254, 265]}, {"id": "6138", "dirty": false, "lemma": "μαθηματικὸς]", "reading": "§SIG:Minas§ : μαθητικὸς §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 218, "span": [6, 17]}], "A": "210", "dawe": "202", "tr": "Un astrologo incapace mentre esponeva il destino di un bambino, disse: «Costui sarà retore, poi prefetto, poi governatore di provincia!». Quindi, quando proprio questo bambino era ormai morto, la madre incontrò l’indovino e gli disse: «Quello che dicevi sarebbe stato retore, e magistrato, e governatore, è morto». Questi allora fece: «Oh, per la sua memoria, se ora vivesse, sarebbe diventato tutte queste cose»."}, {"type": "joke", "n": 211, "num": "203", "label": "203", "wit": "A", "text": "Ἀφυεῖ μάντει προσελθών τις ἠρώτα, εἰ ὁ ἐχθρὸς αὐτοῦ ἐξ ἀποδημίας ἥξει. ὁ δὲ εἶπεν, ὅτι οὐκ ἔρχεται. ὡς δὲ ἔμαθε μεθ’ἡμέρας παραγενόμενον αὐτόν, ἔφη· Οὐδὲν αὐτοῦ ἀχρωμότερον.", "app": [], "A": "211", "dawe": "203", "tr": "Un tale si recò da un indovino incapace e gli domandava se un suo rivale avrebbe fatto ritorno da un viaggio all’estero. L’indovino rispose che non sarebbe tornato. Come il tale apprese giorni dopo che quello era rientrato, disse: «Nessuno è più spudorato di lui!»."}, {"type": "joke", "n": 212, "num": "204", "label": "204", "wit": "A", "text": "Ἀφυὴς μαθηματικὸς μοιρολογῶν τινα ἔφη· Οὐκ ἦν σοι κατὰ γένος τεκνῶσαι. τοῦ δὲ εἰπόντος ὅτι Ἑπτὰ παῖδας ἔχω εἶπεν· Οὐκοῦν πρόσεχε αὐτοῖς.", "app": [{"id": "6139", "dirty": false, "lemma": "μοιρολογῶν]", "reading": "§SIG:Haupt§ : μακρολογῶν", "sigla": ["Haupt"], "editors": [], "query": false, "unit": 220, "span": [18, 28]}], "A": "212", "dawe": "204", "tr": "Un astrologo incapace mentre prediceva il fato ad un tale disse: «Per nascita non ti era possibile procreare…». Quando però quello fece: «Ho sette figli!», disse: «Allora devi starci attento»."}, {"type": "joke", "n": 213, "num": "205", "label": "205", "wit": "A", "text": "Ἀφυὴς μάντις ἐμπεσὼν εἰς πολεμίους καὶ εἰπὼν ὅτι Μάντις εἰμί μελλούσης πρὸς ἀντιπάλους μάχης συνάπτεσθαι· Νικήσετε, εἶπε, τοὺς πολεμίους, ἐὰν τὰς ἐξόπισθεν τρίχας τῶν κεφαλῶν ὑμῶν ἐν τῇ παρατάξει τῆς μάχης μὴ βλέψωσιν. A", "app": [{"id": "6179", "dirty": false, "lemma": "Νικήσετε]", "reading": "§SIG:Boissonade§ : νικήσεσθε §SIG:A§", "sigla": ["A", "Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 221, "span": [106, 114]}, {"id": "6181-6182", "dirty": false, "lemma": "τοὺς πολεμίους]", "reading": "§SIG:Haupt§ : τοὺς πολεμίους §SIG:Dawe§ : τὸν πὸλεμον §SIG:A§", "sigla": ["A", "Dawe", "Haupt"], "editors": ["Dawe"], "query": false, "unit": 221, "span": [122, 136]}, {"id": "6185", "dirty": false, "lemma": "ἐξόπισθεν]", "reading": "§SIG:Minas§ : ἐξώπισθεν §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 221, "span": [146, 155]}, {"id": "6189", "dirty": false, "lemma": "ὑμῶν]", "reading": "§SIG:Minas§ : ἡμῶν §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 221, "span": [175, 179]}, {"id": "6196", "dirty": false, "lemma": "βλέψωσιν]", "reading": "§SIG:Boissonade§ : κλέψωσιν §SIG:A§", "sigla": ["A", "Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 221, "span": [209, 217]}], "A": "213", "dawe": "205", "tr": "Un indovino incapace che si era imbattuto in alcuni nemici e che aveva detto: «Sono un indovino!», siccome stava per iniziare una battaglia contro gli avversari disse: «Vincerete i nemici, se in battaglia essi non vedranno i capelli delle vostre teste da dietro». Δειλοί/Fifoni"}, {"type": "section", "text": "δειλοί", "app": []}, {"type": "joke", "n": 214, "num": "206", "label": "206", "wit": "A", "text": "Δειλὸς ἐρωτηθείς· Ποῖα τῶν πλοίων ἀσφαλέστερα, τὰ μακρὰ ἢ τὰ στρογγύλα; ἔφη· Τὰ νενεωλκημένα.", "app": [], "A": "214", "dawe": "206", "tr": "A un fifone fu chiesto: «Quali sono le navi più sicure? Quelle da guerra o quelle mercantili?», e disse: «Quelle tirate in secco!»."}, {"type": "joke", "n": 215, "num": "207", "label": "207", "wit": "AM", "text": "Δειλὸς κυνηγὸς συνεχῶς τὴν νύκτα ὑπὸ ἄρκτου διωκόμενος ἐν ὕπνῳ, κύνας μισθωσάμενος μετ’ αὐτοῦ ἐκοίμιζεν.", "app": [{"id": "6232-6233", "dirty": false, "lemma": "αὐτοῦ ἐκοίμιζεν]", "reading": "μεθ’ ἑαυτοῦ §SIG:Minas§", "sigla": ["Minas"], "editors": ["Minas"], "query": false, "unit": 224, "span": [88, 103]}], "A": "215", "dawe": "207", "tr": "Un cacciatore fifone che la notte veniva continuamente inseguito nel sonno da un orso comprò dei cani e li mise a dormire con sé."}, {"type": "joke", "n": 216, "num": "208", "label": "208", "wit": "A", "text": "Δειλῷ πύκτῃ λέγει τις· Μετὰ τίνος ἔχεις πυκτεῦσαι; κἀκεῖνος τὸν ἀντίπαλον ὑποδείξας ἔφη· Μετὰ τοῦ κυρίου μου τοῦδε.", "app": [{"id": "6246", "dirty": false, "lemma": "τὸν]", "reading": "§SIG:Minas§ : κἀκεῖ §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 225, "span": [60, 63]}], "A": "216", "dawe": "208", "tr": "Un tale dice ad un pugile fifone: «Con chi devi combattere?», e quello: «Con questo mio spettabile signore»."}, {"type": "joke", "n": 217, "num": "209", "label": "209; cf. 226 α", "wit": "A", "text": "Δειλὸς πύκτης συνεχῶς ὑπὸ ἀντιδίκου κοσκινιζόμενος ἀνεβόησε· Δέομαι ὑμῖν ἅμα πᾶσιν.", "app": [{"id": "6270-6272", "dirty": false, "lemma": "ἅμα … ]", "reading": "ὑμῶν μὴ ἅμα παίσειν §SIG:Dawe§ : ὑμῶν μὴ πάντες ὁμοῦ §SIG:Minas§", "sigla": ["Dawe", "Minas"], "editors": ["Minas", "Dawe"], "query": false, "unit": 226, "span": [73, 76]}], "A": "217", "dawe": "209", "tr": "Un pugile fifone che veniva senza sosta sarchiato di botte da un avversario gridò: «Chiedo pietà a voi tutti!»."}, {"type": "joke", "n": 218, "num": "210", "label": "210; cf. 179 α", "wit": "AM", "text": "Δειλὸς πύκτης χωρίον ἀγοράζων κατηρώτα τοὺς ἐντοπίους, μὴ ἔχει μύρμηκας. A", "app": [{"id": "6287", "dirty": false, "lemma": "μύρμηκας]", "reading": "ἔχειν §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 227, "span": [63, 71]}], "A": "218", "dawe": "210", "tr": "Un pugile fifone che stava acquistando un terreno chiedeva per bene ai locali se non ci fossero formiche{ N1|I7|Z1\\7\\ }."}, {"type": "section", "text": "ὀκνηροί", "app": []}, {"type": "joke", "n": 219, "num": "211", "label": "211; 54 β", "wit": "AC", "text": "Ὀκνηρῶν δύο ὁμοῦ κοιμωμένων εἰσελθών τις κλέπτης τὸν σάγον ὑποσύρας ἔκλεψε. τοῦ δὲ ἑνὸς αἰσθομένου καὶ πρὸς τὸν ἕτερον εἰπόντος· Ἀναστὰς φθάσον τὸν κλέψαντα τὸν σάγον εἶπεν· Ἄφες·ὅταν ἔλθῃ ἐπᾶραι τὴν τύλην, κρατοῦμεν αὐτόν.", "app": [{"id": "6301-6302", "dirty": false, "lemma": "κλέπτης τὸν]", "reading": "κλέπτης τις §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 229, "span": [41, 52]}, {"id": "6310", "dirty": false, "lemma": "καὶ]", "reading": "ἑσθωμένου", "sigla": [], "editors": [], "query": false, "unit": 229, "span": [99, 102]}, {"id": "6323", "dirty": false, "lemma": "Ἄφες·ὅταν]", "reading": "ἔφη §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 229, "span": [174, 183]}, {"id": "6326", "dirty": false, "lemma": "τὴν]", "reading": "ἐπαρεῖν §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 229, "span": [196, 199]}, {"id": "6328", "dirty": false, "lemma": "κρατοῦμεν]", "reading": "§SIG:Boissonade§ cl. 54 β : στήλην §SIG:A§ §SIG:C§ : στέγην §SIG:Cataudella§", "sigla": ["A", "Boissonade", "C", "Cataudella"], "editors": ["Boissonade"], "query": false, "unit": 229, "span": [207, 216]}, {"id": "6329", "dirty": false, "lemma": "αὐτόν]", "reading": "πιάσωμεν §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 229, "span": [217, 222]}], "A": "219", "dawe": "211", "tr": "Mentre due pigroni stavano dormendo, entrò un ladro, sfilò loro il lenzuolo e lo rubò. Quando uno dei due se ne accorse e disse all’altro: «Alzati e raggiungi chi ha rubato il lenzuolo», questi disse: «Lascialo andare… quando tornerà a prendere il materasso, lo avremo in pugno»."}, {"type": "joke", "n": 220, "num": "212", "label": "212; 55 β", "wit": "A", "text": "Ὀκνηρῷ υἱῷ ἐκέλευσεν ὁ πατὴρ εἰς τὸν γείτονα ἀπελθεῖν καὶ χρήσασθαι ἀξίνην. ὁ δὲ ἔφη· Οὐ δίδει. τοῦ δὲ πατρὸς ἐπιμένοντος ἀπεκρίνατο· Ἐγώ εἰμι ὁ γείτων καὶ ἀξίνην οὐκ ἔχω.", "app": [{"id": "6356", "dirty": false, "lemma": "ἀπεκρίνατο]", "reading": "lacunam post ἐπιμένοντος statuit §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 230, "span": [122, 132]}], "A": "220", "dawe": "212", "tr": "Il padre ordinò al figlio pigrone di recarsi dal vicino e prendere in prestito un’accetta. Questi allora disse: «Tanto non la dà…». Poiché però il padre insisteva, rispose: «Io sono il vicino, e non ho un’accetta!»."}, {"type": "joke", "n": 221, "num": "213", "label": "213; 56 β", "wit": "AC", "text": "Ὀκνηρὸς ὀκνηρῷ δηνάριον ἐχρεώστει. ὑπαντήσας δὲ αὐτῷ ᾔτει τὸ δηνάριον. τοῦ δὲ εἰπόντος· Ἔκτεινόν σου τὴν χεῖρα καὶ λῦσόν μου τὸ μάπουλον καὶ ἆρον τὸ δηνάριον ἐκεῖνος ἔφη· Πορεύου ἔνθεν·οὐδέν μοι χρεωστεῖς. A", "app": [{"id": "6373", "dirty": false, "lemma": "ἐχρεώστει]", "reading": "δινάριον ubique §SIG:A§ ac corr. §SIG:A§ 2", "sigla": ["A"], "editors": [], "query": false, "unit": 231, "span": [24, 33]}, {"id": "6375", "dirty": false, "lemma": "δὲ 1]", "reading": "ἀπαντήσας §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 231, "span": [45, 47]}, {"id": "6389", "dirty": false, "lemma": "μου]", "reading": "§SIG:Dawe§ : λῦσον §SIG:C§ : λύσον §SIG:A§", "sigla": ["A", "C", "Dawe"], "editors": ["Dawe"], "query": false, "unit": 231, "span": [121, 124]}, {"id": "6392", "dirty": false, "lemma": "καὶ 2]", "reading": "μανδύ λ §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 231, "span": [111, 114]}, {"id": "6394", "dirty": false, "lemma": "τὸ 3]", "reading": "ἆρον μου §SIG:C§ ac corr. §SIG:C§ 1 : ἄρον §SIG:A§", "sigla": ["A", "C"], "editors": [], "query": false, "unit": 231, "span": [58, 60]}], "A": "221", "dawe": "213", "tr": "Un pigrone aveva un credito di un denaro con un altro pigrone. Dopo averlo incontrato, gli chiedeva il denaro. Quando il secondo allora disse: «Allunga la tua mano, aprimi il borsellino e prendi il denaro», quello fece: «Va’ pure per la tua strada, non mi devi nulla…»."}, {"type": "section", "text": "φθονεροί", "app": []}, {"type": "joke", "n": 222, "num": "214", "label": "214", "wit": "A", "text": "Φθονερὸς εἰς γναφεῖον εἰσελθὼν καὶ μὴ θέλων οὐρῆσαι ἀπέθανεν.", "app": [], "A": "222", "dawe": "214", "tr": "Un invidioso entrò in una conceria e siccome non voleva far pipì morì."}, {"type": "joke", "n": 223, "num": "215", "label": "215", "wit": "A", "text": "Φθονερὸς οἰκοδεσπότης τοὺς ἐνοίκους ἰδὼν εὐτυχοῦντας ἐκ τοῦ οἴκου αὐτοῦ ἐξεδίωξεν.", "app": [{"id": "6430", "dirty": false, "lemma": "ἐξεδίωξεν]", "reading": "αὐτοὺς dub. §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 234, "span": [72, 81]}], "A": "223", "dawe": "215", "tr": "Un padrone di casa invidioso vide che gli inquilini se la passavano bene e li scacciò dalla sua casa."}, {"type": "joke", "n": 224, "num": "216", "label": "216", "wit": "A", "text": "Φθονερὸς ἰδὼν τὸν γείτονα θηριομαχοῦντα λέγει τῷ κυβερνήτῃ· ‹...› Ἄρκος.", "app": [], "A": "224", "dawe": "216", "tr": "Un invidioso vede il suo vicino di casa combattere contro le fiere e dice al direttore dell’arena: «‹Mandagli› un orso!». ‹δειλοί rursus›"}, {"type": "joke", "n": 225, "num": "217", "label": "217", "wit": "A", "text": "Ἄλλος διὰ δειλίαν ἐπέγραψεν ἐπὶ τοῦ μετώπου· Ὁ τόπος τῶν καιρίων. παιόμενος οὖν συνεχῶς εἶπε πρὸς τοὺς παρόντας· Μή τι οὗτος γράμματα οὐκ οἶδεν καὶ ἀναιρεῖ με;", "app": [{"id": "6454", "dirty": false, "lemma": "Ὁ]", "reading": "μετόπου §SIG:A§ ac", "sigla": ["A"], "editors": [], "query": false, "unit": 236, "span": [45, 46]}, {"id": "6458", "dirty": false, "lemma": "παιόμενος]", "reading": "§SIG:Boissonade§ : κυρίων §SIG:A§", "sigla": ["A", "Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 236, "span": [66, 75]}, {"id": "6464-6465", "dirty": false, "lemma": "παρόντας· Μή]", "reading": "§SIG:Thierfelder§ : τὸν παίοντα §SIG:A§ : τὸν πάυοντα §SIG:Dawe§", "sigla": ["A", "Dawe", "Thierfelder"], "editors": ["Thierfelder", "Dawe"], "query": false, "unit": 236, "span": [103, 115]}], "A": "225", "dawe": "217", "tr": "Un altro ‹pugile fifone› per la paura si scrisse sulla fronte: Il luogo dei colpi mortali. Mentre veniva colpito disse dunque al pubblico: «Forse che questo qui non sa leggere e mi ammazza?»."}, {"type": "joke", "n": 226, "num": "218", "label": "218, cf. 217 α", "wit": "A", "text": "Δειλὸς πύκτης συνεχῶς παιόμενος ὑπὸ τοῦ ἀντιδίκου ἀνεβόησε· Δέομαι ὑμῶν, μὴ πάντες ὁμοῦ. A", "app": [], "A": "226", "dawe": "218", "tr": "Un pugile fifone che veniva colpito senza tregua dall’avversario disse: «Vi prego, non tutti insieme!»."}, {"type": "section", "text": "λιμόξηροι", "app": []}, {"type": "joke", "n": 227, "num": "219", "label": "219", "wit": "AC", "text": "Λιμόξηρος λιμοξήρῳ θυγατέρα ἐκδιδοὺς καὶ ἐρωτώμενος, τί αὐτῇ δίδωσιν εἰς προῖκα· Οἰκίαν, ἔφη, δίδωμι, ἧς αἱ θυρίδες εἰς τὸ ἀρτοκοπεῖον βλέπουσιν.", "app": [{"id": "6499", "dirty": false, "lemma": "λιμοξήρῳ]", "reading": "om. §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 239, "span": [10, 18]}, {"id": "6502", "dirty": false, "lemma": "καὶ]", "reading": "ἐνδιδοὺς §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 239, "span": [37, 40]}, {"id": "6509", "dirty": false, "lemma": "Οἰκίαν]", "reading": "πρό ϊκα §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 239, "span": [81, 87]}, {"id": "6510-6511", "dirty": false, "lemma": "ἔφη δίδωμι]", "reading": "ἔφη· οἰκίαν §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 239, "span": [89, 100]}, {"id": "6518", "dirty": false, "lemma": "βλέπουσιν]", "reading": "ἀρτοκόπιον §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 239, "span": [135, 144]}], "A": "227", "dawe": "219", "tr": "Un morto di fame{ N1|I8|Z1\\8\\ } diede in matrimonio la figlia e, quando gli fu chiesto cosa le desse come dote, disse: «Le do una casa, le cui finestre si affacciano su un panificio»."}, {"type": "joke", "n": 228, "num": "220", "label": "220; 51 β", "wit": "AC", "text": "Λιμόξηρος παιδοτρίβης ἰδὼν ἄρτον κρεμάμενον εἶπε· Καταβαίνεις; ἀπαγγέλλεις; ἢ ἀναβαίνω καὶ ἀπαρτίζω σε.", "app": [{"id": "6529", "dirty": false, "lemma": "εἶπε]", "reading": "κρεμμάμενον §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 240, "span": [44, 48]}, {"id": "6532", "dirty": false, "lemma": "ἢ]", "reading": "ἀπαγγέλεις", "sigla": [], "editors": [], "query": false, "unit": 240, "span": [76, 77]}, {"id": "6535", "dirty": false, "lemma": "ἀπαρτίζω]", "reading": "καὶ καὶ §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 240, "span": [91, 99]}, {"id": "6545-6546", "dirty": false, "lemma": "ἄρτον εἰς]", "reading": "ἄρτον ἰδὼν §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 240, "span": [27, 32]}], "A": "228", "dawe": "220", "tr": "Un maestro morto di fame vide un pane appeso e disse: «Scendi? Rispondi all’interrogazione? Oppure vengo su e ti sistemo io?»."}, {"type": "joke", "n": 229, "num": "221", "label": "221; 52 β", "wit": "AC", "text": "Λιμόξηρος ἰατρὸς ἰδὼν ἄρτον εἰς τρύπην κείμενον ἐκσυρτικὸν ἔμπλαστρον ἐπέθηκεν.", "app": [{"id": "6551", "dirty": false, "lemma": "ἐπέθηκεν]", "reading": "ἔμπλαστον §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 241, "span": [70, 78]}, {"id": "6557", "dirty": false, "lemma": "ἰατρὸς]", "reading": "§SIG:Minas§ : ἄρρωστος §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 241, "span": [10, 16]}], "A": "229", "dawe": "221", "tr": "Un medico morto di fame vide un pane posto in un buco e vi applicò un impiastro estraente."}, {"type": "joke", "n": 230, "num": "222", "label": "222", "wit": "A", "text": "Λιμόξηρον ἄρρωστον ἰατρὸς ἐπισκεψάμενος ἐκέλευσεν ἅληκα αὐτῷ εἰς πόμα γενέσθαι. εἰ δὲ μὴ εὕροι ἅληκα, ποιῆσαι αὐτῷ ὁμοίως τράγον. ὁ δὲ λιμόξηρος ἔφη· Ἐὰν μὴ εὕρω τράγον, φάγω δύο ἐρίφια;", "app": [{"id": "6572", "dirty": false, "lemma": "ὁμοίως]", "reading": "§SIG:Dawe§ : αὑτῷ §SIG:A§", "sigla": ["A", "Dawe"], "editors": ["Dawe"], "query": false, "unit": 242, "span": [115, 121]}], "A": "230", "dawe": "222", "tr": "Un medico visitò un malato morto di fame e gli prescrisse di assumere come liquido un’orzata. Se non l’avesse trovata, in alternativa della cervogia. Il morto di fame disse allora: «Se non dovessi trovare la cervogia, potrei mangiare due cerbiatti?»."}, {"type": "joke", "n": 231, "num": "223", "label": "223; 53 β", "wit": "AC", "text": "Λιμόξηρος ἰδὼν ἄρτον ἐν ὑπερθύρῳ κείμενον εἶπε· Θεέ, ἢ ἐμὲ ὕψωσον ἢ ἐκεῖνον ταπείνωσον.", "app": [{"id": "6603", "dirty": false, "lemma": "ταπείνωσον]", "reading": "τοῦτον §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 243, "span": [76, 86]}], "A": "231", "dawe": "223", "tr": "Un morto di fame un pane posto su un architrave e disse: «Dio, o innalzi me, o abbatti quello»."}, {"type": "joke", "n": 232, "num": "224", "label": "224", "wit": "AC", "text": "Λιμόξηρος ἀπελθὼν εἰς κηπουρὸν ἔδωκε τέσσαρα δηνάρια, ἵνα σῦκα, ὅσα θέλει, φάγῃ. τοῦ δὲ καταφρονήσαντος καὶ εἰπόντος· Ἀπὸ τῶν παρακειμένων δένδρων φάγε, ὅσα δύνασαι ἀνελθὼν εἰς μεγάλας συκᾶς καὶ ἀπὸ κορυφῆς ἀρξάμενος πάντα κατήσθιε. μετὰ δὲ πολλὴν ὥραν ἀναμνησθεὶς ὁ κηπουρὸς ἐπεζήτει αὐτόν. ὡς δὲ εἶδεν εἰς ὕψος σαλεύοντα τοὺς κλάδους καὶ ἐσθίοντα, ἀγανακτήσας εἶπε· Κάτω ἑστὼς οὐκ ἠδύνω ἐκ τῶν ἐπικειμένων κλάδων φαγεῖν; ὁ δὲ ἀπεκρίνατο· Ἐκεῖνα, ὡς καταβαίνω, τρώγω.", "app": [{"id": "6611", "dirty": false, "lemma": "ἔδωκε]", "reading": "κηπωρὸν §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 244, "span": [31, 36]}, {"id": "6614", "dirty": false, "lemma": "ἵνα]", "reading": "δινάρια §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 244, "span": [54, 57]}, {"id": "6616", "dirty": false, "lemma": "ὅσα 1]", "reading": "σύκα §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 244, "span": [64, 67]}, {"id": "6635-6636", "dirty": false, "lemma": "συκᾶς καὶ]", "reading": "§SIG:Thierfelder§ : μεγάλα σύκα §SIG:A§ : μεγάλα σῦκα §SIG:C§ : μεγάλας συκέας §SIG:Minas§", "sigla": ["A", "C", "Minas", "Thierfelder"], "editors": ["Minas", "Thierfelder"], "query": false, "unit": 244, "span": [185, 194]}, {"id": "6649", "dirty": false, "lemma": "ἐπεζήτει]", "reading": "κηπωρὸς §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 244, "span": [276, 284]}, {"id": "6650", "dirty": false, "lemma": "αὐτόν]", "reading": "ἐπιζητεῖ §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 244, "span": [285, 290]}, {"id": "6667-6670", "dirty": false, "lemma": "ἐκ … κλάδων]", "reading": "ἠδύνου ἐκ τῶν ἄνω ἐπικειμένων §SIG:C§ : ἠδύνω ἐκ τῶν ὑποκειμένων §SIG:Dawe§", "sigla": ["C", "Dawe"], "editors": ["Dawe"], "query": false, "unit": 244, "span": [389, 414]}, {"id": "6675", "dirty": false, "lemma": "Ἐκεῖνα]", "reading": "εἶπεν §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 244, "span": [440, 446]}], "A": "232", "dawe": "224", "tr": "Un morto di fame andò da un giardiniere e gli diede quattro denari per mangiare quanti fichi volesse. Quando l’altro sottovalutandolo gli disse: «Mangia quanto riesci dagli alberi che stanno qui», questi salì su dei grossi fichi, iniziò dalla cima e mangiava tutto. Diverso tempo dopo il giardiniere se ne ricordò e se ne mise alla ricerca. Quando lo vide in alto che scuoteva i rami e mangiava, si arrabbiò e disse: «Non potevi startene giù e mangiare dai rami che erano lì?» Quello rispose: «Quelli li mangio ora che scendo!»."}, {"type": "joke", "n": 233, "num": "225", "label": "225", "wit": "AC", "text": "Λιμόξηρος ἀρτοπράτῃ προσελθὼν ᾔτει δοῦναι δηνάρια δύο, ἵνα ἄρτου χορτάσῃ. τοῦ δὲ λογισαμένου ἕνα ἄρτον τούτῳ ἀρκέσειν ‹καὶ› λαβόντος τὰ δηνάρια ἤρξατο τρώγειν. ὁ δὲ τοῦ κοφίνου ἀρξάμενος ἑστὼς τὸ ἥμισυ ἔφαγε. τοῦ δὲ ἀρτοπράτου θαμβηθέντος καὶ εἰπόντος ὅτι Κάθισον καὶ οὕτως φάγε ἀπεκρίνατο· Τοὺς ἐν τῷ κοφίνῳ ἄρτους βούλομαι ἑστὼς φαγεῖν, τοὺς δὲ ἐν τῇ προβολῇ καθήμενος.", "app": [{"id": "6684-6685", "dirty": false, "lemma": "προσελθὼν ᾔτει]", "reading": "ἀρτοπράτη (η ex corr.) περιπεθὼν §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 245, "span": [20, 34]}, {"id": "6687", "dirty": false, "lemma": "δηνάρια 1]", "reading": "εἶπεν §SIG:C§ ac", "sigla": ["C"], "editors": [], "query": false, "unit": 245, "span": [42, 49]}, {"id": "6688", "dirty": false, "lemma": "δύο]", "reading": "δινάρια §SIG:A§ ac", "sigla": ["A"], "editors": [], "query": false, "unit": 245, "span": [50, 53]}, {"id": "6691", "dirty": false, "lemma": "χορτάσῃ]", "reading": "ἄρτον §SIG:A§ : ἄρτων §SIG:Minas§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 245, "span": [65, 72]}, {"id": "6692", "dirty": false, "lemma": "τοῦ 1]", "reading": "χορτασθῇ §SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 245, "span": [74, 77]}, {"id": "6698-6699", "dirty": false, "lemma": "ἀρκέσειν καὶ]", "reading": "τοῦτον χορτάσειν §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 245, "span": [109, 122]}, {"id": "6700", "dirty": false, "lemma": "λαβόντος]", "reading": "add. §SIG:Thierfelder§", "sigla": ["Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 245, "span": [124, 132]}, {"id": "6701", "dirty": false, "lemma": "τὰ]", "reading": "§SIG:Eberhard§ : λαβὼν §SIG:A§ §SIG:C§", "sigla": ["A", "C", "Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 245, "span": [133, 135]}, {"id": "6702-6703", "dirty": false, "lemma": "δηνάρια ἤρξατο]", "reading": "τὰ δηνάρια· ‹ἐπέτρεψε · ὁ δὲ› §SIG:Minas§", "sigla": ["Minas"], "editors": ["Minas"], "query": false, "unit": 245, "span": [42, 150]}, {"id": "6703", "dirty": false, "lemma": "ἤρξατο]", "reading": "δινάρια §SIG:A§ ac", "sigla": ["A"], "editors": [], "query": false, "unit": 245, "span": [144, 150]}, {"id": "6704-6705", "dirty": false, "lemma": "τρώγειν ὁ]", "reading": "vid. del. §SIG:Thierfelder§", "sigla": ["Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 245, "span": [151, 161]}, {"id": "6706-6713", "dirty": false, "lemma": "δὲ 2 … ἔφαγε]", "reading": "ὡς οὖν ἀρξάμενος τὸ ἥμισυ τοῦ κοφίνου §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 245, "span": [78, 207]}, {"id": "6721", "dirty": false, "lemma": "Κάθισον]", "reading": "om. §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 245, "span": [256, 263]}, {"id": "6722", "dirty": false, "lemma": "καὶ 3]", "reading": "κάθησον §SIG:C§ ac", "sigla": ["C"], "editors": [], "query": false, "unit": 245, "span": [119, 122]}], "A": "233", "dawe": "225", "tr": "Un morto di fame andò da un panetterie e gli propose di dargli due denari perché potesse rimpinzarsi di pane. Siccome questi riteneva che un pane sarebbe bastato all’avventore e aveva accettato i soldi, il morto di fame iniziò a mangiare. Questi iniziò dal cesto, si piazzò in piedi e si mise a mangiare. Quando il panettiere sbigottì e disse: «Siediti e mangia così», rispose: «I pani nel cesto voglio mangiarli stando in piedi, quelli sulla mensola seduto!»."}, {"type": "joke", "n": 234, "num": "226", "label": "226", "wit": "A", "text": "Λιμόξηρος κωμῳδίας ὑποκριτὴς τὸν ἀγωνοθέτην πρὸ τοῦ εἰσελθεῖν ἄριστον ᾔτει. τοῦ δὲ ἐπιζητοῦντος, διὰ τί προαριστῆσαι θέλει· Ἵνα, ἔφη, μὴ ἐπιορκήσω λέγω‹ν· ἐγὼ› μὲν ἠρίστησα νὴ τὴν Ἄρτεμιν μάλ’ ἡδέως. A", "app": [{"id": "6767-6769", "dirty": false, "lemma": "ἐγὼ … ἠρίστησα]", "reading": "§SIG:Thierfelder§ : λέγωμεν §SIG:A§", "sigla": ["A", "Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 246, "span": [155, 172]}, {"id": "6773", "dirty": false, "lemma": "μάλ]", "reading": "§SIG:Minas§ : Ἀρτέμην §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 246, "span": [188, 191]}, {"id": "6774", "dirty": false, "lemma": "ἡδέως]", "reading": "μάλα §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 246, "span": [193, 198]}, {"id": "6796-6799", "dirty": false, "lemma": "τὸν … Οὐκοῦν]", "reading": "εἶπε πρὸς τὸν κάπηλον §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 246, "span": [29, 32]}], "A": "234", "dawe": "226", "tr": "Un morto di fame attore di commedia chiedeva all’organizzatore il pranzo prima dell’ingresso in scena. Quando quello chiedeva perché volesse mangiare prima, disse: «Perché io non spergiuri quando dirò: «Ho pranzato, per Artemide, molto bene!»."}, {"type": "section", "text": "μέθυσοι", "app": []}, {"type": "joke", "n": 235, "num": "227", "label": "227; 39 β", "wit": "AC", "text": "Μεθύσῳ ἐν καπηλείῳ πίνοντι ἐπιστάς τις ἔφη· Ἡ γυνή σου ἀπέθανεν. ὁ δὲ ἀκούσας πρὸς τὸν κάπηλον ἔφη· Οὐκοῦν, αὐθέντα, ἐκ τοῦ μελανοῦ κέρασον.", "app": [], "A": "235", "dawe": "227", "tr": "Ad uno sbevazzone che beveva in una taverna si avvicinò un tale e disse: «Tua moglie è morta!». E quello, dopo aver ascoltato disse all’oste: «Dunque, capo, versami quello bello forte!»."}, {"type": "joke", "n": 236, "num": "228", "label": "228", "wit": "A", "text": "Μέθυσος ὀνειδιζόμενος ὑπό τινος, ὅτι πολλὰ πίνων οὐ φρονεῖ, ὁ δὲ ἀπὸ τοῦ οἴνου καλῶς βλέπειν μὴ δυνάμενος ἀπεκρίνατο· Ἐγὼ μεθύω ἢ σὺ ὁ δύο ἔχων ὄψεις;", "app": [], "A": "236", "dawe": "228", "tr": "Uno sbevazzone veniva rimproverato da un tale perché, dato che stava bevendo troppo, sragionava, e allora questo, che a causa del vino non riusciva a vedere bene, rispose: «Sono io ubriaco, o tu hai due facce?»"}, {"type": "joke", "n": 237, "num": "229", "label": "229; 57 β", "wit": "A", "text": "Μέθυσος ἀτυχὴς ἀμπελῶνα κτησάμενος τῷ τρυγητῷ ἀπέθανεν.", "app": [], "A": "237", "dawe": "229", "tr": "Uno sbevazzone disgraziato acquistò una vigna ma morì durante la vendemmia."}, {"type": "joke", "n": 238, "num": "230", "label": "230", "wit": "A", "text": "Μέθυσος καπηλεῖον ἀνοίξας εἰς τὸ πρόθυρον ἄρκτον ἔδησεν. A", "app": [{"id": "6854", "dirty": false, "lemma": "ἔδησεν]", "reading": "ἄκτον §SIG:A§ ac", "sigla": ["A"], "editors": [], "query": false, "unit": 251, "span": [49, 55]}], "A": "238", "dawe": "230", "tr": "Uno sbevazzone aprì una taverna e legò un orso alla porta."}, {"type": "section", "text": "ὀζόστομοι", "app": []}, {"type": "joke", "n": 239, "num": "231", "label": "231", "wit": "A", "text": "Ὀζόστομος θέλων ἰδίῳ θανάτῳ ἀποθανεῖν περικαλυψάμενος ἐχασμᾶτο.", "app": [], "A": "239", "dawe": "231", "tr": "Uno con l’alito cattivo che voleva suicidarsi si incappucciò e se ne stette a bocca aperta."}, {"type": "joke", "n": 240, "num": "232", "label": "232", "wit": "AC", "text": "Ὀζόστομος συνεχῶς τὴν γυναῖκα αὐτοῦ καταφιλῶν ἔλεγεν· Ἡ κυρία μου, ἡ Ἥρα μου, ἡ Ἀφροδίτη μου. κἀκείνη ἀποστρεφομένη ἔλεγεν· Ὀζεύς μου, ὀζεύς μου.", "app": [{"id": "6870-6873", "dirty": false, "lemma": "τὴν … καταφιλῶν]", "reading": "τὴν γυναῖκα αὐτοῦ συνεχῶς §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 254, "span": [18, 45]}], "A": "240", "dawe": "232", "tr": "Uno con l’alito cattivo che baciava di continuo la propria moglie diceva: «La mia signora, la mia Era, la mia Afrodite!» e quella, voltandosi dall’altro lato, diceva: «Il mio puzzone, il mio puzzone!».{ N1|I9|Z1\\9\\ }"}, {"type": "joke", "n": 241, "num": "233", "label": "233", "wit": "AC", "text": "Ὀζόστομος κωφῷ ὑπαντήσας ἔλεγε· Χαῖρε κἀκεῖνος εἶπε· Φῦ. τοῦ δὲ εἰρηκότος· Τί γὰρ εἶπον; ἔφη· Ἔβδεσας.", "app": [{"id": "6896", "dirty": false, "lemma": "ἔλεγε]", "reading": "ἀπαντήσας §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 255, "span": [25, 30]}, {"id": "6900", "dirty": false, "lemma": "εἶπε]", "reading": "τοῦ δὲ κακεῖνος §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 255, "span": [47, 51]}, {"id": "6902", "dirty": false, "lemma": "τοῦ]", "reading": "φυ γε §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 255, "span": [57, 60]}], "A": "241", "dawe": "233", "tr": "Uno con l’alito cattivo incontrò un sordo e diceva: «Salve!» e quello disse: «Puah!». Siccome l’altro aveva chiesto «Che ho detto mai?!», il sordo fece «Hai scorreggiato!»."}, {"type": "joke", "n": 242, "num": "234", "label": "234", "wit": "AC", "text": "Ὀζόστομος τὴν γυναῖκα ἠρώτα λέγων· Κυρία, τί μεμισεῖς; κἀκείνη ἀπεκρίνατο λέγουσα· Ὅτι σύ με φιλεῖς.", "app": [{"id": "6925", "dirty": false, "lemma": "σύ]", "reading": "διότι §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 256, "span": [87, 89]}], "A": "242", "dawe": "234", "tr": "Uno con l’alito cattivo chiedeva alla moglie: «Mia signora, perché mi odi?» e quella rispose: «Perché tu mi baci!»."}, {"type": "joke", "n": 243, "num": "235", "label": "235", "wit": "AC", "text": "Ὀζόστομος ἰατρῷ ὑπαντήσας λέγει· Κύριέ μου, ἴδε· ἡ σταφυλή μου κατέβη. καὶ χανόντος ὁ ἰατρὸς ἀποστρεφόμενος ἔλεγεν· Οὐχὶ ἡ σταφυλή σου κατέβη, ἀλλ’ ὁ κῶλός σου ἀνέβη.", "app": [{"id": "6934", "dirty": false, "lemma": "λέγει]", "reading": "ἀπαντήσας §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 257, "span": [26, 31]}, {"id": "6937", "dirty": false, "lemma": "ἴδε]", "reading": "om. §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 257, "span": [44, 47]}, {"id": "6938", "dirty": false, "lemma": "ἡ 1]", "reading": "ἴδε ὅτι §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 257, "span": [49, 50]}, {"id": "6944", "dirty": false, "lemma": "ὁ 1]", "reading": "χανῶντος §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 257, "span": [84, 85]}, {"id": "6949", "dirty": false, "lemma": "ἡ 2]", "reading": "οὐχ §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 257, "span": [49, 50]}, {"id": "6953", "dirty": false, "lemma": "ἀλλ]", "reading": "κατέβην §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 257, "span": [143, 146]}, {"id": "6956", "dirty": false, "lemma": "σου 2]", "reading": "κόλος §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 257, "span": [131, 134]}], "A": "243", "dawe": "235", "tr": "Uno con l’alito cattivo incontrò un medico e disse: «Signore mio, guarda: la mia ugola è scesa giù!» e quando quello spalancò la bocca, il medico, voltandosi dall’altra parte, diceva: «Non è scesa la tua ugola, ma è salito il tuo culo!»."}, {"type": "joke", "n": 244, "num": "236", "label": "236", "wit": "AC", "text": "Ὀζόστομος τὸ τέκνον αὐτοῦ κολακεύων, μασώμενος ἐνεβρωμάτισεν αὐτό. τὸ δὲ ἀποστρεφόμενον ἔλεγεν· Οὐ θέλω· τατὰ κακά.", "app": [{"id": "6967", "dirty": false, "lemma": "ἐνεβρωμάτισεν]", "reading": "μασσώμενος §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 258, "span": [47, 60]}, {"id": "6969", "dirty": false, "lemma": "τὸ 2]", "reading": "αυτῶ §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 258, "span": [10, 12]}], "A": "244", "dawe": "236", "tr": "Uno con l’alito cattivo che viziava il figlio, masticava il cibo e lo imboccava. Questi si voltò dall’altra parte e disse: «Non voglio; papà cacca!»."}, {"type": "joke", "n": 245, "num": "237", "label": "237", "wit": "A", "text": "Ὀζόστομος λουκάνικον ὀπτῶν καὶ ἐπὶ πολὺ προσφυσῶν, κυνέαν αὐτὸ ἀπειργάσατο, αὐτὸς συνεχῶς βδέων οὐκ ἐπιστεύετο.", "app": [{"id": "6982-6983", "dirty": false, "lemma": "ὀπτῶν καὶ]", "reading": "§SIG:Boissonade§ : λοκάνικον ὄπτων §SIG:A§", "sigla": ["A", "Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 259, "span": [21, 30]}, {"id": "6988", "dirty": false, "lemma": "αὐτὸ]", "reading": "§SIG:vanThiel§ : κϋνέαν A : κυνίαν dub. §SIG:Boissonade§ et §SIG:Thierfelder§", "sigla": ["Boissonade", "Thierfelder", "vanThiel"], "editors": ["Boissonade", "Thierfelder"], "query": false, "unit": 259, "span": [58, 62]}], "A": "245", "dawe": "237", "tr": "Uno con l’alito cattivo cuoceva una salsiccia e poiché ci soffiava molto sopra, la trasformò in un escremento canino."}, {"type": "joke", "n": 246, "num": "238", "label": "238", "wit": "A", "text": "Ὀζόστομος ἀπελθὼν εἰς ὀπωροπώλην ἠρώτα·Ἔχεις, κῦρι, σχάδας; ὁ δὲ ἀποστραφείς· Οὐδὲ φοινίκια ἔχω.", "app": [{"id": "7005", "dirty": false, "lemma": "ὁ]", "reading": "ἰσχάδας §SIG:Minas§", "sigla": ["Minas"], "editors": ["Minas"], "query": false, "unit": 260, "span": [60, 61]}], "A": "246", "dawe": "238", "tr": "Uno con l’alito cattivo andò da un fruttivendolo e chiese: «Signore, hai fichi secchi?» e quello si voltò con disgusto: «Non ho neppure i datteri!»."}, {"type": "joke", "n": 247, "num": "239", "label": "239; 63 β", "wit": "A", "text": "Νεανίσκος τραγῳδὸς ἠγαπήθη ὑπὸ γυναικῶν δύο, ὀζοστόμου καὶ ὀζοχρώτου. καὶ τῆς μιᾶς λεγούσης· Δός μοι, κῦρι, φιλήματα τῆς δὲ ἄλλης· Δός μοι, κῦρι, περιπλοκάς ἐκεῖνος ἀνεβόησεν· Οἴμοι, τί δράσω; δυσὶ κακοῖς μερίζομαι.", "app": [{"id": "7025", "dirty": false, "lemma": "καὶ 2]", "reading": "§SIG:Minas§ : ὀζοχρώστου §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 261, "span": [55, 58]}], "A": "247", "dawe": "239", "tr": "Un giovane attore tragico venne amato da due donne, una dall’alito cattivo e l’altra tutta puzzolente. E mentre una diceva: «Signore, dammi dei baci!» e l’altra invece: «Signore, dammi degli abbracci!», quello gridò: «Ahimè, che fare? Sono diviso tra due mali!»."}, {"type": "joke", "n": 248, "num": "240", "label": "240", "wit": "A", "text": "Ὀζόστομος καὶ ὀζόχρωτος, ὁμοῦ ἐν θεάτρῳ καθεζομένων, συνέβη μέσον αὐτῶν κατὰ τύχην νεανίσκον καθεσθῆναι. αἰσθομένου δὲ αὐτοῦ τῆς δυσωδίας, στραφεὶς πρὸς τὸν ὀζόστομον ἠρώτα· Τίς ἔβδεσεν; εὑρηκὼς δὲ ἐκ τοῦ στόματος αὐτοῦ τὴν αἰτίαν, στραφεὶς τῷ ἑτέρῳ εἰς τὸ οὖς διελέγετο. γνοὺς δὲ κἀκείνου τὴν δυσωδίαν ἀναστὰς ἔφυγεν.", "app": [{"id": "7060", "dirty": false, "lemma": "συνέβη]", "reading": "καθεζόμενοι §SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 262, "span": [53, 59]}], "A": "248", "dawe": "240", "tr": "Mentre uno dall'alito fetido e uno dal corpo maleodorante sedevano insieme a teatro, capitò per caso che un giovane si sedesse in mezzo a loro. Accortosi del fetore, si voltava verso quello dall'alito cattivo e domandava: «Chi ha scoreggiato?». Ma dopo aver scoperto che la causa proveniva dalla sua bocca, si voltava verso l’altro e gli parlava all’orecchio; resosi conto però che anche costui appestava, si alzò e scappò via."}, {"type": "joke", "n": 249, "num": "241", "label": "241", "wit": "A", "text": "Μωρὸς κωφῷ συγκαθεύδων ἔβδεσε. τοῦ δὲ τὴν δυσωδίαν αἰσθομένου καὶ κατακράξαντος ἔφη· Ἴδε, πῶς ἀκούεις· ἀλλ’ἐμπαίζεις μοι.", "app": [{"id": "7118", "dirty": false, "lemma": "ἀκούεις]", "reading": "ὡς §SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 263, "span": [94, 101]}], "A": "249", "dawe": "241", "tr": "Un matto, mentre dormiva insieme a un sordo, scorreggiò. Quando quello se ne accorse e prese ad urlare, disse: «Guarda un po’ come si senti… ma allora mi prendi in giro!»."}, {"type": "joke", "n": 250, "num": "242", "label": "242", "wit": "A", "text": "Ὀζόστομος συνεχῶς εἰς οὐρανὸν βλέπων πολλὰ ηὔχετο. παρακύψας ὁ Ζεὺς λέγει· †μία μία χαρεῖς·† καὶ κάτω θεοὺς ἔχεις.", "app": [{"id": "7129-7130", "dirty": false, "lemma": "πολλὰ ηὔχετο]", "reading": "πολλὰ βλέπων §SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 264, "span": [37, 49]}, {"id": "7133", "dirty": false, "lemma": "Ζεὺς]", "reading": "‹δ᾿› ὁ §SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 264, "span": [63, 67]}, {"id": "7146", "dirty": false, "lemma": "εἰς]", "reading": "λίξουρος §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 264, "span": [18, 21]}], "A": "250", "dawe": "242", "tr": "Uno con l’alito cattivo, guardando continuamente verso il cielo, rivolgeva molte preghiere. Zeus allora si sporge e dice: «†μία μία χαρεῖς†? Hai degli dei anche giù!»."}, {"type": "joke", "n": 251, "num": "243", "label": "243", "wit": "AC", "text": "Λείξουρος εἰς τρύγην ὑπὸ φίλου κληθεὶς καὶ ἀπλήστως φαγὼν σῦκα καὶ σταφυλάς, ‹τῇ νυκτὶ› ὑπὸ τῆς γαστρὸς αὐτοῦ νυχθεὶς ἔδοξεν ὁρᾶν ἐπὶ συκὴν τὸν φίλον αὐτοῦ καθήμενον καὶ τοῦτον προσκαλεῖσθαι, ἵνα φάγῃ σῦκα. ἀναστάντος δὲ ἤρεσεν αὐτοὺς ἀπὸ τῆς συκῆς χέσαι ἄνωθεν. βιαζόμενος οὖν τὰ στρώματα κατέχεσεν. ὡς δὲ ἐξυπνίσας ἐπέγνω, τὰ στρώματα πλύνας πάλιν [ἀπλήστως φαγὼν] ἐκοιμήθη. καὶ θεωρεῖ πάλιν καθ’ ὕπνους τὸν φίλον ἐπὶ τῆς συκῆς καθήμενον καὶ τοῦτον ὁμοίως ἀνελθεῖν προτρεπόμενον. ὁ δὲ πρὸς αὐτὸν ἀναβλέψας εἶπε· Πάλιν μοι θέλεις ἐμπαῖξαι, ἵνα ἀπὸ τῆς συκῆς ἄνωθεν δόξας χέζειν τὰ στρώματα ῥυπώσω. ἀλλ’ ἐγὼ ἀπάρτι οὐ μὴ ἐμπαιχθῶ· πρῶτον γὰρ χέσω καὶ οὕτως ἀνέλθω. βιαζόμενος οὖν πάλιν τὰ στρώματα κατετίλησεν.", "app": [{"id": "7158-7159", "dirty": false, "lemma": "νυκτὶ ὑπὸ]", "reading": "add. §SIG:Thierfelder§ : κατέδαρθε v §SIG:Minas§", "sigla": ["Minas", "Thierfelder"], "editors": ["Minas", "Thierfelder"], "query": false, "unit": 265, "span": [81, 91]}, {"id": "7167-7168", "dirty": false, "lemma": "συκὴν τὸν]", "reading": "ὑπὸ τὴν συκὴν ut. vid. §SIG:C§ : ἐπὶ τῆς συκῆς §SIG:Eberhard§", "sigla": ["C", "Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 265, "span": [134, 143]}, {"id": "7169-7171", "dirty": false, "lemma": "φίλον 1 … καθήμενον 1]", "reading": "αὐτοῦ τὸν φίλον", "sigla": [], "editors": [], "query": false, "unit": 265, "span": [144, 165]}, {"id": "7178", "dirty": false, "lemma": "ἀναστάντος]", "reading": "σύκα", "sigla": [], "editors": [], "query": false, "unit": 265, "span": [207, 217]}, {"id": "7182-7189", "dirty": false, "lemma": "ἀπὸ 1 … τὰ 1]", "reading": "ἀπὸ τῆς συκῆς αὐτῆς χέσαι ἄνωθεν οὖν βιαζόμενος §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 265, "span": [235, 280]}, {"id": "7195", "dirty": false, "lemma": "ἐπέγνω]", "reading": "ἐξυπνήσας §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 265, "span": [317, 323]}, {"id": "7201-7202", "dirty": false, "lemma": "φαγὼν ἐκοιμήθη]", "reading": "del. §SIG:Thierfelder§", "sigla": ["Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 265, "span": [52, 375]}, {"id": "7211", "dirty": false, "lemma": "τῆς 3]", "reading": "ἐπὶ πῒ §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 265, "span": [92, 95]}, {"id": "7217-7218", "dirty": false, "lemma": "ἀνελθεῖν προτρεπόμενον]", "reading": "ἀνελθεῖν ὁμοίως §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 265, "span": [458, 480]}, {"id": "7225", "dirty": false, "lemma": "Πάλιν]", "reading": "κυνίαν §SIG:Boissonade§", "sigla": ["Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 265, "span": [514, 519]}, {"id": "7234-7236", "dirty": false, "lemma": "δόξας … τὰ 3]", "reading": "δόξας χέζειν ἄνωθεν §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 265, "span": [566, 581]}, {"id": "7239", "dirty": false, "lemma": "ἀλλ]", "reading": "§SIG:Eberhard§ : ἐρημώσω §SIG:A§ §SIG:C§", "sigla": ["A", "C", "Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 265, "span": [599, 602]}], "A": "251", "dawe": "243", "tr": "Un goloso fu invitato alla vendemmia da un amico, mangiò insaziabilmente fichi e uva, di notte fu tormentato dal suo ventre e gli parve di vedere il suo amico seduto su un fico e che costui lo chiamasse a sé affinché mangiasse fichi Allora il goloso si arrampicò, e a loro piacque cacare dall'alto del fico. Dunque, sforzandosi, smerdò le coperte. Quando poi si svegliò e se ne accorse, lavò le coperte e si addormentò di nuovo. E vede di nuovo in sogno l'amico seduto sul fico, che lo esorta allo stesso modo a salire. Egli allora alzò gli occhi verso di lui e disse: «Di nuovo vuoi burlarti di me, affinché, sognando di cacare dall'alto del fico, io insozzi le coperte! Ma io d'ora in poi non sarò affatto beffato: prima, infatti, cacherò, e così salirò». Dunque, sforzandosi di nuovo, insozzò le coperte."}, {"type": "joke", "n": 252, "num": "244", "label": "244; 58 β", "wit": "AC", "text": "Νεανίσκος πρὸς τὴν γυναῖκα οὖσαν ἀσελγῆ εἶπε· Κυρία, τί ποιοῦμεν; ἀριστοῦμεν ἢ ἀφροδισιάζομεν; κἀκείνη πρὸς αὐτὸν ἔφη· Ὡς θέλεις· ψωμὶν οὐκ ἔστιν.", "app": [{"id": "7266-7268", "dirty": false, "lemma": "οὖσαν … εἶπε]", "reading": "γυναῖκα αὐτοῦ ἀσελγῆ οὖσαν", "sigla": [], "editors": [], "query": false, "unit": 266, "span": [27, 44]}, {"id": "7273-7275", "dirty": false, "lemma": "ἢ … κἀκείνη]", "reading": "ἀριστῶμεν ἢ ἀφροδισιάζωμεν §SIG:Minas§", "sigla": ["Minas"], "editors": ["Minas"], "query": false, "unit": 266, "span": [77, 102]}, {"id": "7277-7279", "dirty": false, "lemma": "αὐτὸν … Ὡς]", "reading": "λέγει §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 266, "span": [108, 121]}, {"id": "7281", "dirty": false, "lemma": "ψωμὶν]", "reading": "in aliud nescioquid mut. §SIG:A§ 2pc", "sigla": ["A"], "editors": [], "query": false, "unit": 266, "span": [130, 135]}, {"id": "7282", "dirty": false, "lemma": "οὐκ]", "reading": "ψωμὴν potius quam ψωμὶν §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 266, "span": [136, 139]}], "A": "252", "dawe": "244", "tr": "Un giovinetto si rivolse alla moglie che era lasciva e disse: «Cara, che facciamo? Ceniamo o facciamo l’amore?», e quella disse a lui: «Come vuoi; non c'è un boccone»."}, {"type": "joke", "n": 253, "num": "245", "label": "245", "wit": "AC", "text": "Νεανίσκος γραίας δύο καπριώσας ἐκάλεσε, πρὸς δὲ τοὺς οἰκείους διακόνους ἔφη· Τὴν μίαν κεράσατε, τὴν δὲ θέλουσαν ἀφροδισιάσατε. αἱ δὲ ὑφ’ ἓν εἶπον· Ἡμεῖς οὐ διψῶμεν.", "app": [{"id": "7289-7291", "dirty": false, "lemma": "δύο … ἐκάλεσε]", "reading": "δύο γραίας γαυριώσας §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 267, "span": [17, 38]}, {"id": "7299-7301", "dirty": false, "lemma": "μίαν … τὴν]", "reading": "τὴν μὲν μίαν κυράσατε §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 267, "span": [81, 99]}], "A": "253", "dawe": "245", "tr": "Un giovinetto invitò due vecchie in calore, e disse ai propri servitori: «Mescete da bere singolarmente, e fate l’amore con chi ne ha voglia». E quelle all’unisono dissero: «Noi non abbiamo sete!»."}, {"type": "joke", "n": 254, "num": "246", "label": "246", "wit": "A", "text": "Μισογύναιος στὰς ἐν τῇ ἀγορᾷ ἔλεγε· Πωλῶ μου τὴν γυναῖκα ἀτελώνητον. τινῶν δὲ εἰπόντων· Διὰ τί; εἶπεν· Ἵνα στερέσιμος γένηται.", "app": [], "A": "254", "dawe": "246", "tr": "Un misogino si fermava in piazza e diceva: «Vendo mia moglie senza pagarci le tasse!». Quando allora alcuni gli dissero: «Perché?», disse: «Affinché diventi merce confiscata»."}, {"type": "joke", "n": 255, "num": "247", "label": "247; 60 β", "wit": "A", "text": "Μισογύναιος, τῆς γυναικὸς αὐτοῦ ἀποθανούσης, ἐπὶ τῷ θάψαι ἐκήδευε. τινὸς δὲ ἐρωτήσαντος· Τίς ἀνεπαύσατο; ἔφη· Ἐγὼ ὁ ταύτης στερηθείς.", "app": [], "A": "255", "dawe": "247", "tr": "Un misogino, dato che era morta sua moglie, celebrava le esequie per la sepoltura. Quando uno gli chiese: «Chi ha iniziato il suo riposo?», rispose: «Io, che sono stato privato di costei!»."}, {"type": "joke", "n": 256, "num": "248", "label": "248; 61 β", "wit": "A", "text
