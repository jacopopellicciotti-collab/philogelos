"text":"Κυμαῖος ἰατρὸς ἀπεγνωσμένον ἄρρωστον ἐνημάτισεν, ἐκέλευσε δὲ ‹θεράποντα› τὰ ἐκκεχωρημένα ἰδεῖν. τοῦ δὲ δείξαντος καὶ εἰπόντος, ὅτι ἀπέθανεν, ὁ ἰατρὸς μεθ’ ὅρκου ἀπεκρίνατο· Οὗτως εἰ μὴ ἐκλύσθη, ἐλάκησεν ἄν.","dawe":"176"},{"app":[],"n":185,"tr":"Un medico cumano che operava un tale che soffriva e urlava tremendamente, prese un bisturi piuttosto smussato.","label":"177","wit":"A","type":"joke","text":"Κυμαῖος ἰατρὸς τέμνων τινὰ δεινῶς ἀλγοῦντα καὶ βοῶντα ἀμβλυτέραν σμίλην μετέλαβεν.","dawe":"177","A":"185","num":"177"},{"app":[{"reading":"τῆς §SIG:C§","lemma":"τοῖς]]","dirty":false,"sigla":["C"],"id":"402","query":false,"editors":[],"span":[135,139],"unit":402},{"sigla":["C"],"id":"403","dirty":false,"unit":403,"query":false,"span":[148,160],"editors":[],"reading":"κατεχρήσατο §SIG:C§","lemma":"κατεχρήσαντο]]"},{"reading":"ἀλλήλους §SIG:C§","lemma":"ἀλλήλοις]]","unit":404,"query":false,"span":[324,332],"editors":[],"sigla":["C"],"id":"404","dirty":false}],"wit":"AC","type":"joke","num":"178","text":"Κυμαῖοι δύο ἰσχάδων κεράμια δύο ἐπρίαντο. τούτων δὲ ὁ ἕτερος τὸν ἕτερον λανθάνων οὐκ ἐκ τοῦ ἰδίου, ἀλλ’ ἐκ τοῦ ἑτέρου κατήσθιεν. ὡς δὲ τοῖς ἀλλήλων κατεχρήσαντο, ἕκαστος ἐπὶ τὸ ἴδιον ἐπιστρέψας εὗρεν αὐτὸ κενόν. ἀλλήλων οὖν ἐπιλαβόμενοι ἤγοντο ἐπὶ τὸν ἄρχοντα. διαγνοὺς δὲ ὁ ἄρχων ἐκέλευσε τὰ κενώματα ἀλλάξαι καὶ τὰς τιμὰς ἀλλήλοις ἀποδοῦναι.","dawe":"178","A":"186","n":186,"label":"178","tr":"Due Cumani acquistarono due recipienti di fichi secchi. Entrambi, ingannando l’altro, mangiavano non dal proprio recipiente, ma da quello dell’altro. Quando se li ebbero consumati l’un l’altro, ciascuno si recò al proprio recipiente e lo trovò vuoto. Si azzuffarono dunque tra loro e furono portati dal magistrato. Allora il magistrato rifletté e comandò che si scambiassero i recipienti vuoti e che si rimborsassero le spese vicendevolmente."},{"app":[{"dirty":false,"sigla":["A"],"id":"405","query":false,"editors":[],"span":[73,86],"unit":405,"lemma":"κατεψευσμένοι]]","reading":"κατεψευμένοι §SIG:A§ac corr. §SIG:A§2"},{"dirty":false,"sigla":["A","Eberhard"],"id":"406","query":false,"span":[137,141],"editors":["Eberhard"],"unit":406,"lemma":"ὑμῶν1]]","reading":"dub. §SIG:Eberhard§ : υμῖν §SIG:A§"},{"lemma":"τούτων]]","reading":"§SIG:Thierfelder§ : τούτοις §SIG:A§","unit":407,"query":false,"editors":["Thierfelder"],"span":[170,176],"sigla":["A","Thierfelder"],"id":"407","dirty":false},{"lemma":"μόνῳ]]","reading":"§SIG:Minas§ : μόνον","id":"408","sigla":["Minas"],"dirty":false,"unit":408,"span":[214,218],"editors":["Minas"],"query":false}],"A":"187","text":"Ἐν Κύμῃ δημαγωγὸς ἐν ἐκκλησίᾳ κατηγορηθείς· Ἄνδρες, ἔφη, πολῖται, εἰ μὲν κατεψευσμένοι μου τὰς διαβολάς εἰσιν οὗτοι, γένοιτο αὐτοῖς παρ’ ὑμῶν καταγνωσθῆναι· εἰ δέ τι ἐγὼ τούτων πεποίηκα, πάντων ὑμῶν καθημένων ἐμοὶ μόνῳ τὸ θέατρον ἐπιπέσοι.","dawe":"179","num":"179","type":"joke","wit":"A","label":"179","tr":"A Cuma un demagogo sotto accusa in assemblea disse: «Uomini, cittadini, se questi mi hanno calunniato con queste accuse, che siano condannati da voi; se io ho invece commesso alcuna di queste azioni, mentre voi tutti siete seduti, crolli il teatro su me solo! ».","n":187},{"app":[],"A":"188","text":"Κυμαῖος ἄρχων τοιαῦτα κηρύγματα ἐκήρυξεν· Οἱ ἔφοροι μετὰ τὴν θυσίαν παραχρῆμα τὰς ἑαυτῶν βύρσας ἀναφερέτωσαν πρὸς τὸν ἱερέα. Οἱ δὲ βουλευταί, ἔλθετε εἰς τὸ βουλευτήριον καὶ μὴ βουλεύεσθε. Οἱ δὲ μάγειροι τὰ ἴδια ὀστέα ὑπὲρ τὸ τεῖχος βαλλέτωσαν. Οἱ δὲ σκυτεῖς μικροὺς καλάποδας μὴ ἐχέτωσαν.","dawe":"180","num":"180","wit":"A","type":"joke","tr":"Un magistrato Cumano annunciò tali disposizioni: “Gli efori, dopo il sacrificio, riportino all’istante le loro pelli al sacerdote. Voi, i buleuti, venite al §I§bouleuterion§/I§ se non tenete consiglio. I cuochi, poi, gettino le proprie ossa oltre la cinta muraria. I calzolai, poi, non abbiano forme da scarpe di taglia piccola”.","label":"180","n":188},{"app":[{"reading":"§SIG:Thierfelder§ : αἰτιώμενοι §SIG:A§","lemma":"αἰτιωμένους]]","dirty":false,"sig !».","n":194},{"app":[{"reading":"§SIG:DeRhoer§ : γέννησιν §SIG:A§","lemma":"γένεσιν]]","editors":["DeRhoer"],"span":[35,42],"query":false,"unit":428,"dirty":false,"id":"428","sigla":["A","DeRhoer"]},{"lemma":"πολυχρόνιον]]","reading":"§SIG:Minas§ : πολλυχρόνιον §SIG:A§","id":"429","sigla":["A","Minas"],"dirty":false,"unit":429,"editors":["Minas"],"span":[50,61],"query":false},{"id":"430","sigla":["A","Boissonade"],"dirty":false,"unit":430,"span":[62,67],"editors":["Boissonade"],"query":false,"reading":"§SIG:Boissonade§ : αὐτὸ §SIG:A§","lemma":"αὐτὸν]]"}],"num":"187","A":"195","text":"Δύσκολος ἀστρολόγος παιδὸς νοσεροῦ γένεσιν λέγων, πολυχρόνιον αὐτὸν τῇ μητρὶ ὡς ἐπαγγειλάμενος ᾔτει τὸν μισθόν. τῆς δὲ εἰπούσης· Ἐλθόντι σοι αὔριον δώσω ἔφη· Τί οὖν, ἐὰν τὴν νύκτα ἀποθάνῃ καὶ ἐγὼ τὸν μισθὸν ἀπόλλω;","dawe":"187","wit":"A","type":"joke","label":"187; 41 β","tr":"Un astrologo burbero che faceva l’oroscopo a un bambino malato annunciò alla madre che quello sarebbe stato longevo e chiedeva il compenso. Quando quella disse: «Vieni domani e te lo darò», fece: «E che faccio, se stanotte muore e io mi gioco il compenso?».","n":195},{"app":[{"dirty":false,"sigla":["Eberhard","Minas"],"id":"431","query":false,"span":[122,128],"editors":["Eberhard","Minas"],"unit":431,"lemma":"ἐκχυθῇ]]","reading":"ἐκχυθήτω dub. §SIG:Eberhard§ : ἐκχυθείη §SIG:Minas§"}],"tr":"Quando un burbero comprò un vaso di miele e gli fu chiesto a quanto lo avesse comprato, capovolse il vaso e diceva: «Così coli il mio sangue, se ve lo dovessi dire!».","label":"188; 42 β","n":196,"num":"188","dawe":"188","text":"Δυσκόλου κεράμιον μέλιτος ἀγοράσαντος καὶ ὑπό τινος ἐρωτηθέντος, πόσου ἠγόρασεν, καταστρέφων τὸ κεράμιον ἔλεγεν· Οὕτω μου ἐκχυθῇ τὸ αἷμα, ἐὰν εἴπω ὑμῖν.","A":"196","wit":"AM","type":"joke"},{"type":"joke","wit":"AMC","text":"Πρὸς δύσκολον ἄρρωστον ἰατρὸς προσελθὼν προσέταξε ψιχία μετὰ στρουθίου φαγεῖν. καὶ ὁ δύσκολος εἶπε· Πῶς δύναμαι εἰς τὸ κλουβίον εἰσελθεῖν, ἵνα φάγω μετὰ τοῦ στρουθίου τὰ ψιχίδια;","A":"197","dawe":"189","num":"189","n":197,"label":"189","tr":"Un medico si recò da un ammalato burbero e gli prescrisse di mangiare mollichine con un uccellino. Allora il burbero disse: «Come posso entrare nella gabbia per mangiare le mollichine con l’uccellino?».","app":[{"sigla":["C","M"],"id":"432","dirty":false,"unit":432,"query":false,"editors":[],"span":[50,55],"lemma":"ψιχία]]","reading":"ψιχίαν §SIG:C§ : ψυχια §SIG:M§"},{"query":false,"span":[56,60],"editors":[],"unit":433,"dirty":false,"sigla":["C"],"id":"433","lemma":"μετὰ1]]","reading":"μετὰ τοῦ §SIG:C§"},{"dirty":false,"id":"434","sigla":["M"],"editors":[],"span":[116,118],"query":false,"unit":434,"reading":"om. §SIG:M§","lemma":"τὸ]]"},{"sigla":["C"],"id":"435","dirty":false,"unit":435,"query":false,"span":[119,127],"editors":[],"lemma":"κλουβίον]]","reading":"κλουβίν §SIG:C§"},{"dirty":false,"id":"436","sigla":["M"],"editors":[],"span":[170,177],"query":false,"unit":436,"lemma":"ψιχίδια]]","reading":"ψυχιδία §SIG:M§"}]},{"wit":"A","type":"joke","num":"190","A":"198","dawe":"190","text":"Δυσκόλου ταυλίζοντος κατεπέτασσέ τις ἀργὸς καθήμενος. ὁ δὲ θυμούμενος ἠρώτησεν αὐτόν· Ποίας τέχνης; καὶ διὰ τί ἀργεῖς; ἐκείνου δὲ εἰπόντος ὅτι Ῥάπτης εἰμί, ἔργον δὲ οὐκ ἔχω διαρρήξας αὐτοῦ τὸν χιτῶνα καὶ ἐπιδοὺς εἶπε· Λαβὼν ἐργάζου καὶ σιώπα.","n":198,"label":"190; 43 β","tr":"Mentre un burbero giocava a dadi, un fannullone che stava lì seduto gli dava consigli. Il burbero allora, irritandosi gli chiese: «Qual è il tuo lavoro? E perché stai senza far nulla?». Quando quello disse: «Sono un rammendatore, ma non ho lavoro», il burbero si strappò il chitone, glielo diede e disse: «Prendi, lavora e taci!».","app":[{"editors":["Minas"],"span":[21,32],"query":false,"unit":437,"dirty":false,"id":"437","sigla":["A","Minas"],"reading":"§SIG:Minas§ : κατεπέτασε §SIG:A§","lemma":"κατεπέτασσέ]]"},{"id":"438","sigla":["Dawe"],"dirty":false,"unit":438,"span":[86,98],"editors":["Dawe"],"query":false,"lemma":"Ποίας τέχνης]]","reading":"Ποὶαν ‹οἶδας› τέχνην §SIG:Dawe§"},{"query":false,"editors":["Minas"],"span":[189,199],"unit":439,"dirty":false,"sigla":["Minas"],"id":"439","lemma":"τὸν χιτῶνα]]","reading":"τὸν ἑαυτοῦ χιτῶνα §SIG:Minas§"}]},{"num":"191","A":"199","dawe":"191","text":"Δύσκολόν τις ἠρώτα· Ποῦ μένεις; ὁ δὲ εἶπεν· Ἐκεῖθεν μεταβαίνω.","wit":"A","type":"joke","label":"191; 45 β","tr":"Un tale chiese ad un burbero: «Dove abiti?» e quello disse: «Trasloco da lì!».","n":199,"app":[]},{"n":200,"label":"192","tr":"Un tale incontrò un armatore burbero e disse: «Ho visto il tuo bacino a Rodi!», e quello rispose: «E io ho visto il tuo fegato in Sicilia».","wit":"A","type":"joke","A":"200","dawe":"192","text":"Δυσκόλῳ τις ναυκλήρῳ ἀπαντήσας εἶπε· Τὸν ἐπίπλουν σου εἶδον ἐν Ῥόδῳ. κἀκεῖνος ἀπεκρίνατο· Κἀγώ σου εἶδον τὸ ἧπαρ ἐν Σικελίᾳ.","num":"192","app":[{"dirty":false,"id":"440","sigla":["A","Minas"],"editors":["Minas"],"span":[116,123],"query":false,"unit":440,"lemma":"Σικελίᾳ]]","reading":"§SIG:Minas§ : Σικελλία §SIG:A§"}]},{"app":[{"lemma":"ἐζήτει]]","reading":"προσεζήτει §SIG:C§","sigla":["C"],"id":"441","dirty":false,"unit":441,"query":false,"span":[13,19],"editors":[]},{"id":"442","sigla":["C","M"],"dirty":false,"unit":442,"span":[84,89],"editors":[],"query":false,"reading":"ψεύση §SIG:C§ : ψεύδει §SIG:M§","lemma":"Ψεύδῃ·]]"},{"lemma":"αὐτῷ]]","reading":"αὐτὸ §SIG:C§","dirty":false,"id":"443","sigla":["C"],"editors":[],"span":[169,173],"query":false,"unit":443},{"reading":"ἀξιόπιστος §SIG:C§","lemma":"ἀξιοπιστότερος]]","query":false,"span":[208,222],"editors":[],"unit":444,"dirty":false,"sigla":["C"],"id":"444"}],"label":"193; 44 β","tr":"Un tale cercava un burbero. Questi rispose: «Non sono qui». Quando l’altro allora scoppiò a ridere e disse: «Menti: sento infatti la tua voce!», il burbero disse: «Disgraziato, se te lo avesse detto il mio servo, gli avresti creduto, io invece a te non sembro essere degno di maggior fede di quello?».","n":201,"num":"193","dawe":"193","A":"201","text":"Δύσκολόν τις ἐζήτει. ὁ δὲ ἀπεκρίνατο· Οὐκ εἰμὶ ὧδε. τοῦ δὲ γελάσαντος καὶ εἰπόντος· Ψεύδῃ· τῆς γὰρ φωνῆς σου ἀκούω εἶπεν· Ὦ κάθαρμα, εἰ μὲν ὁ δοῦλός μου εἶπεν, εἶχες ἂν αὐτῷ πιστεῦσαι· ἐγὼ δέ σοι οὐ φαίνομαι ἀξιοπιστότερος ἐκείνου εἶναι;","wit":"AMC","type":"joke"},{"type":"joke","wit":"A","dawe":"194","text":"Δύσκολος σκάλαν καταβαίνων σφαλεὶς κατέπεσε. τοῦ δὲ οἰκοκυροῦ εἰπόντος· Τίς ἔνι ἐκεῖ; ἀπεκρίνατο· Ἐγὼ τοῦ ἐνοικίου μου ἐλάκησα. τί πρὸς σέ;","A":"202","num":"194","n":202,"tr":"Un burbero mentre scendeva una scala inciampò e cadde. Quando il padrone di casa disse: «Chi c’è lì?», rispose: «Io, mi sono ammazzato a costo del mio affitto. Tu che vuoi?».","label":"194; 46 β","app":[{"unit":445,"span":[52,70],"editors":["Boissonade"],"query":false,"id":"445","sigla":["A","Boissonade"],"dirty":false,"lemma":"οἰκοκυροῦ εἰπόντος·]]","reading":"§SIG:Boissonade§ : εἰπόντος οἰκοκυροῦ §SIG:A§"},{"lemma":"Ἐγὼ]]","reading":"Ἐγὼ ‹ἔσω› §SIG:Dawe§ Ἐγὼ … ^!ἐλάκησα] ἐγώ σου ἔνοικος ἐλάκησα §SIG:Cataudella§","sigla":["Cataudella","Dawe"],"id":"446","dirty":false,"unit":446,"query":false,"editors":["Cataudella","Dawe"],"span":[98,101]},{"editors":["Dawe"],"span":null,"query":false,"unit":447,"dirty":false,"id":"447","sigla":["Dawe"],"reading":"del. §SIG:Dawe§","lemma":"καὶ συντυχεῖν]]"},{"dirty":false,"sigla":["A","M"],"id":"448","query":false,"span":null,"editors":[],"unit":448,"reading":"§SIG:A§ : περὶ ἀφυῶν §SIG:M§","lemma":"]]"}]},{"wit":"AM","type":"joke","text":"","dawe":"195","A":"203","num":"195","n":203,"label":"195","tr":"Un tale diceva ad un burbero di rango senatorio: «Desidero vederti e incontrarti un po’». E quello rispose: «Anche io desidero vederti cieco e zoppo».","app":[]},{"type":"section","text":"ἀφυεῖς","app":[]},{"app":[],"n":204,"label":"196","tr":"Ad un grammatico incapace fu domandato: «Come bisogna dire, “ai due” o “ai dui”?», e questi protese la mano e indicava due dita.","type":"joke","wit":"A","num":"196","dawe":"196","A":"204","text":"Ἀφυὴς γραμματικὸς ἐρωτηθείς· Πῶς δεῖ λέγειν, τοῖς δύο ἢ τοῖς δυσί; ὁ δὲ τὴν χεῖρα προτείνας τοὺς δύο ὑπεδείκνυε δακτύλους."},{"tr":"Ad un grammatico incapace fu domandato: «Come si chiamava la madre di Priamo?». Non sapendo rispondere, disse: «Noi, per rispetto, la chiamiamo signora».","label":"197","n":205,"text":"Ἀφυὴς γραμματικὸς ἐρωτηθείς· Ἡ μήτηρ Πριάμου τίς ἐκαλεῖτο; ἀπορῶν ἔφη· Ἡμεῖς κατὰ τιμὴν κυρίαν αὐτὴν καλοῦμεν.","dawe":"197","A":"205","num":"197","type":"joke","wit":"AM","app":[]},{"type":"joke","wit":"AM","num":"198","dawe":"198","A":"206","text":"Ἀφυὴς κουρεὺς τοῖς ὑπ’ αὐτοῦ πληττομένοις ἔμπλαστρα προσετίθει. ἑνὸς δὲ αἰτιασαμένου αὐτὸν ἔφη· Ἀχάριστε, μάτην ἀγανακτεῖς· ἑνὸς γὰρ δηναρίου ξυράμενος τεσσάρων δηναρίων ἔμπλαστρα ἔλαβες.","n":206,"tr":"Un barbiere incapace applicava impiastri lenitivi a quelli che venivano rasati da lui. Quando uno gliene aveva chieste le ragioni, disse: «Ingrato, ti arrabbi invano: rasato infatti al costo di un denaro, hai ricevuto impiastri per una valore di quattro denari!».","label":"198","app":[{"reading":"ἐτίθει §SIG:M§","lemma":"προσετίθει]]","dirty":false,"sigla":["M"],"id":"449","query":false,"span":[52,62],"editors":[],"unit":449},{"dirty":false,"id":"450","sigla":["A","M"],"span":[133,141],"editors":[],"query":false,"unit":450,"lemma":"δηναρίου]]","reading":"διναρίου §SIG:A§ac§SIG:M§, corr. §SIG:A§2"},{"sigla":["M"],"id":"451","dirty":false,"unit":451,"query":false,"editors":[],"span":[142,151],"lemma":"ξυράμενος]]","reading":"ξηρὰμενος §SIG:M§"},{"sigla":["A","M"],"id":"452","dirty":false,"unit":452,"query":false,"editors":[],"span":[161,169],"reading":"διναρίων §SIG:A§ac§SIG:M§, corr. §SIG:A§2","lemma":"δηναρίων]]"},{"lemma":"ἔλαβες]]","reading":"ἔβαλας §SIG:M§","dirty":false,"sigla":["M"],"id":"453","query":false,"span":[180,186],"editors":[],"unit":453}]},{"app":[{"sigla":["A","Minas"],"id":"454","dirty":false,"unit":454,"query":false,"span":[36,47],"editors":["Minas"],"reading":"§SIG:Minas§ : παρονυχίδας §SIG:A§","lemma":"παρωνυχίδας]]"},{"lemma":"ἀφίησί]]","reading":"§SIG:Kurtz§ : ἀφίης §SIG:A§","unit":455,"editors":["Kurtz"],"span":[128,134],"query":false,"id":"455","sigla":["A","Kurtz"],"dirty":false}],"num":"199","A":"207","text":"Ἀφυὴς μαθητὴς κακῶς τινα κείρας καὶ παρωνυχίδας ποιήσας καὶ διὰ τοῦτο ὑπὸ τοῦ ὀνυχιζομένου ἀπωσθεὶς ἀνεβόησεν· Ἐπιστάτα, τί οὐκ ἀφίησί με μαθεῖν;","dawe":"199","type":"joke","wit":"A","label":"199","tr":"Un apprendista incapace tagliò male le unghie ad un tale, gli fece venire dei paterecci e dopo essere stato perciò scacciato da quel tale, si lamentò: «Capo, perché non mi lasci imparare?».","n":207},{"tr":"Un apprendista incapace venne incaricato dal capo di tagliare le unghie ad un signore rispettabile e scoppiò a piangere. Quando questi gliene chiese il motivo, disse: «Ho paura e piango: sto infatti per ferirti, e ti verranno dei paterecci, e il capo mi picchierà!».","label":"200","n":208,"num":"200","A":"208","text":"Ἀφυὴς μαθητὴς ὑπὸ τοῦ ἐπιστάτου κελευσθεὶς ὀνυχίσαι οἰκοδεσπότην ἐδάκρυσε. τοῦ δὲ τὴν αἰτίαν ἐρωτήσαντος ἔφη· Φοβοῦμαι καὶ κλαίω· μέλλω γὰρ τραυματίσαι σε, καὶ παρωνυχίδας ποιήσεις, καὶ τύψει με ὁ ἐπιστάτης.","dawe":"200","type":"joke","wit":"A","app":[{"lemma":"καὶ κλαίω·]]","reading":"","dirty":false,"id":"456","sigla":[],"editors":[],"span":[119,128],"query":false,"unit":456},{"lemma":"παρωνυχίδας]]","reading":"§SIG:Minas§ : παρονυχίδας §SIG:A§","sigla":["A","Minas"],"id":"457","dirty":false,"unit":457,"query":false,"span":[160,171],"editors":["Minas"]}]},{"type":"joke","wit":"A","num":"201","text":"Ἀφυεῖ μάντει προσελθών τις ἐξ ἀποδημίας ἀνιὼν ἠρώτα περὶ τῶν οἰκείων. ὁ δὲ εἶπεν· Ὑγιαίνουσι πάντες, καὶ ὁ πατήρ σου. τοῦ δὲ εἰπόντος ὅτι Ὁ πατήρ μου δέκατον ἔτος ἔχει ἀφ’ οὗ ἀπέθανεν ἀπεκρίνατο· Οὐδὲν γὰρ οἶδας τὸν κατὰ ἀλήθειάν σου πατέρα.","dawe":"201","A":"209","n":209,"label":"201","tr":"Un tale si recò da un indovino incapace mentre ritornava da un viaggio all’estero e gli faceva domande riguardo i familiari. Questi disse: «Sono tutti in salute, anche tuo padre». Siccome quello allora aveva detto: «mio padre è dieci anni che è morto!», l’indovino rispose: «Infatti non conosci affatto il tuo vero padre».","app":[{"lemma":"Οὐδὲν]]","reading":"ουδὲ §SIG:Minas§ : οὐ dub. §SIG:Thierfelder§ γὰρ … ^!κατὰ] ἄρ’ οἶδας κατὰ τὸν κατὰ dub. §SIG:Dawe§","dirty":false,"id":"458","sigla":["Dawe","Minas","Thierfelder"],"editors":["Dawe","Minas","Thierfelder"],"span":[196,201],"query":false,"unit":458}]},{"type":"joke","wit":"AC","A":"210","text":"Ἀφυὴς μαθηματικὸς παιδίου γένεσιν λέγων εἶπεν· Οὗτος ἔσται ῥήτωρ, εἶτα ἔπαρχος, εἶτα ἡγεμών. τεθνηκότος οὖν τοῦ παιδὸς τούτου ἡ μήτηρ ἀπαντήσασα εἶπεν· Ὃν ἔλεγες ῥήτορα ἔσεσθαι καὶ ἄρχοντα καὶ ἡγεμόνα, ἀπέθανεν. ὁ δὲ ἔφη· Μὰ τὴν αὐτοῦ μνήμην, ἐὰν ἔζησε, πάντα ταῦτα ἂν ἐγένετο.","dawe":"202","num":"202","n":210,"tr":"Un astrologo incapace mentre esponeva il destino di un bambino, disse: «Costui sarà retore, poi prefetto, poi governatore di provincia!». Quindi, quando proprio questo bambino era ormai morto, la madre incontrò l’indovino e gli disse: «Quello che dicevi sarebbe stato retore, e magistrato, e governatore, è morto». Questi allora fece: «Oh, per la sua memoria, se fosse vissuto, sarebbe diventato tutte queste cose».","label":"202","app":[{"span":[6,17],"editors":[],"query":false,"unit":459,"dirty":false,"id":"459","sigla":["A","C"],"reading":"μαθητικὸς §SIG:A§ : μάθη §SIG:C§","lemma":"μαθηματικὸς]]"},{"reading":"ῥήτωρ ἔσται §SIG:C§","lemma":"ἔσται ῥήτωρ]]","sigla":["C"],"id":"460","dirty":false,"unit":460,"query":false,"span":[53,64],"editors":[]},{"lemma":"εἶπεν·2]]","reading":"ἔφη §SIG:C§","unit":461,"query":false,"span":[145,150],"editors":[],"sigla":["C"],"id":"461","dirty":false},{"reading":"ταῦτα πάντα §SIG:C§","lemma":"πάντα ταῦτα]]","sigla":["C"],"id":"462","dirty":false,"unit":462,"query":false,"editors":[],"span":[254,265]}]},{"tr":"Un tale si recò da un indovino incapace e gli domandava se un suo rivale avrebbe fatto ritorno da un viaggio all’estero. L’indovino rispose che non sarebbe tornato. Come il tale apprese giorni dopo che quello era rientrato, disse: «Nessuno è più inetto di lui!».","label":"203","n":211,"dawe":"203","text":"Ἀφυεῖ μάντει προσελθών τις ἠρώτα, εἰ ὁ ἐχθρὸς αὐτοῦ ἐξ ἀποδημίας ἥξει. ὁ δὲ εἶπεν, ὅτι οὐκ ἔρχεται. ὡς δὲ ἔμαθε μεθ’ἡμέρας παραγενόμενον αὐτόν, ἔφη· Οὐδὲν αὐτοῦ ἀχρωμότερον.","A":"211","num":"203","wit":"A","type":"joke","app":[]},{"label":"204","tr":"Un astrologo incapace mentre prediceva il fato ad un tale disse: «Per nascita non ti era possibile procreare». Quando però quello fece: «Ho sette figli!», disse: «Allora devi starci attento».","n":212,"num":"204","text":"Ἀφυὴς μαθηματικὸς μοιρολογῶν τινα ἔφη· Οὐκ ἦν σοι κατὰ γένος τεκνῶσαι. τοῦ δὲ εἰπόντος ὅτι Ἑπτὰ παῖδας ἔχω εἶπεν· Οὐκοῦν πρόσεχε αὐτοῖς.","A":"212","dawe":"204","wit":"A","type":"joke","app":[{"reading":"§SIG:Minas§ : μαθητικὸς §SIG:A§","lemma":"μαθηματικὸς]]","span":[6,17],"editors":["Minas"],"query":false,"unit":463,"dirty":false,"id":"463","sigla":["A","Minas"]},{"reading":"§SIG:Haupt§ : μακρολογῶν","lemma":"μοιρολογῶν]]","span":[18,28],"editors":["Haupt"],"query":false,"unit":464,"dirty":false,"id":"464","sigla":["Haupt"]},{"query":false,"editors":["Eberhard"],"span":null,"unit":465,"dirty":false,"sigla":["Eberhard"],"id":"465","lemma":"]]","reading":"lacunam indicavit §SIG:Eberhard§"},{"lemma":"Νικήσετε]]","reading":"§SIG:Boissonade§ : νικήσεσθε §SIG:A§","unit":466,"span":null,"editors":["Boissonade"],"query":false,"id":"466","sigla":["A","Boissonade"],"dirty":false},{"reading":"§SIG:Haupt§ : τοὺς πολεμίους §SIG:Dawe§ : τὸν πὸλεμον §SIG:A§","lemma":"τοὺς πολεμίους]]","dirty":false,"id":"467","sigla":["A","Dawe","Haupt"],"editors":["Dawe","Haupt"],"span":null,"query":false,"unit":467},{"id":"468","sigla":["A","Minas"],"dirty":false,"unit":468,"editors":["Minas"],"span":null,"query":false,"reading":"§SIG:Minas§ : ἐξώπισθεν §SIG:A§","lemma":"ἐξόπισθεν]]"}]},{"n":213,"label":"205","tr":"Un indovino incapace che si era imbattuto in alcuni nemici e che aveva detto: «Sono un indovino!» ‹…›, siccome stava per iniziare una battaglia contro gli avversari disse: «Vincerete i nemici, se in battaglia essi non vedranno i capelli delle vostre teste da dietro».","type":"joke","wit":"A","text":"","dawe":"205","A":"213","num":"205","app":[]},{"text":"δειλοί","type":"section","app":[]},{"num":"206","dawe":"206","text":"Δειλὸς ἐρωτηθείς· Ποῖα τῶν πλοίων ἀσφαλέστερα, τὰ μακρὰ ἢ τὰ στρογγύλα; ἔφη· Τὰ νενεωλκημένα.","A":"214","type":"joke","wit":"A","tr":"A un fifone fu chiesto: «Quali sono le navi più sicure? Quelle da guerra o quelle mercantili?», e disse: «Quelle tirate in secco!».","label":"206","n":214,"app":[]},{"n":215,"tr":"Un cacciatore fifone che la notte veniva continuamente inseguito nel sonno da un orso comprò dei cani e li mise a dormire con sé.","label":"207","wit":"AM","type":"joke","num":"207","A":"215","dawe":"207","text":"Δειλὸς κυνηγὸς συνεχῶς τὴν νύκτα ὑπὸ ἄρκτου διωκόμενος ἐν ὕπνῳ, κύνας μισθωσάμενος μετ’ αὐτοῦ ἐκοίμιζεν.","app":[{"reading":"μεθ’ ἑαυτοῦ §SIG:Minas§","lemma":"αὐτοῦ ἐκοίμιζεν]]","span":[88,103],"editors":["Minas"],"query":false,"unit":469,"dirty":false,"id":"469","sigla":["Minas"]},{"dirty":false,"id":"470","sigla":["A"],"editors":[],"span":null,"query":false,"unit":470,"reading":"ἐκόμιζεν §SIG:A§","lemma":"]]"}]},{"n":216,"label":"208","tr":"Un tale dice ad un pugile fifone: «Con chi devi combattere?», e quello: «Con questo mio spettabile signore».","wit":"A","type":"joke","num":"208","A":"216","text":"Δειλῷ πύκτῃ λέγει τις· Μετὰ τίνος ἔχεις πυκτεῦσαι; κἀκεῖνος τὸν ἀντίπαλον ὑποδείξας ἔφη· Μετὰ τοῦ κυρίου μου τοῦδε.","dawe":"208","app":[{"unit":471,"editors":["Dawe","Minas"],"span":[60,63],"query":false,"id":"471","sigla":["A","Dawe","Minas"],"dirty":false,"reading":"§SIG:Minas§ : κἀκεῖ §SIG:A§ ἅμα … ^!] ὑμῶν μὴ ἅμα παίσειν §SIG:Dawe§ : ὑμῶν μὴ πάντες ὁμοῦ §SIG:Minas§","lemma":"τὸν]]"},{"editors":[],"span":null,"query":false,"unit":472,"dirty":false,"id":"472","sigla ditors":[],"query":false,"unit":502,"dirty":false,"id":"502","sigla":["C"]}],"label":"223; 53 β","tr":"Un morto di fame un pane posto su un architrave e disse: «Dio, o innalzi me, o abbatti quello».","n":231,"num":"223","A":"231","dawe":"223","text":"Λιμόξηρος ἰδὼν ἄρτον ἐν ὑπερθύρῳ κείμενον εἶπε· Θεέ, ἢ ἐμὲ ὕψωσον ἢ ἐκεῖνον ταπείνωσον.","type":"joke","wit":"AC"},{"tr":"Un morto di fame andò da un giardiniere e gli diede quattro denari per mangiare quanti fichi volesse. Quando l’altro sottovalutandolo gli disse: «Mangia quanto riesci dagli alberi che stanno qui», questi salì su dei grossi fichi, iniziò dalla cima e mangiava tutto. Diverso tempo dopo il giardiniere se ne ricordò e se ne mise alla ricerca. Quando lo vide in alto che scuoteva i rami e mangiava, si arrabbiò e disse: «Non potevi startene giù e mangiare dai rami che erano lì?» Quello rispose: «Quelli li mangio ora che scendo!».","label":"224","n":232,"A":"232","dawe":"224","text":"Λιμόξηρος ἀπελθὼν εἰς κηπουρὸν ἔδωκε τέσσαρα δηνάρια, ἵνα σῦκα, ὅσα θέλει, φάγῃ. τοῦ δὲ καταφρονήσαντος καὶ εἰπόντος· Ἀπὸ τῶν παρακειμένων δένδρων φάγε, ὅσα δύνασαι ἀνελθὼν εἰς μεγάλας συκᾶς καὶ ἀπὸ κορυφῆς ἀρξάμενος πάντα κατήσθιε. μετὰ δὲ πολλὴν ὥραν ἀναμνησθεὶς ὁ κηπουρὸς ἐπεζήτει αὐτόν. ὡς δὲ εἶδεν εἰς ὕψος σαλεύοντα τοὺς κλάδους καὶ ἐσθίοντα, ἀγανακτήσας εἶπε· Κάτω ἑστὼς οὐκ ἠδύνω ἐκ τῶν ἐπικειμένων κλάδων φαγεῖν; ὁ δὲ ἀπεκρίνατο· Ἐκεῖνα, ὡς καταβαίνω, τρώγω.","num":"224","wit":"AC","type":"joke","app":[{"unit":503,"editors":[],"span":[31,36],"query":false,"id":"503","sigla":["C"],"dirty":false,"lemma":"ἔδωκε]]","reading":"κηπωρὸν §SIG:C§"},{"lemma":"ἵνα]]","reading":"δινάρια §SIG:A§","unit":504,"editors":[],"span":[54,57],"query":false,"id":"504","sigla":["A"],"dirty":false},{"reading":"σύκα §SIG:C§","lemma":"ὅσα1]]","query":false,"editors":[],"span":[64,67],"unit":505,"dirty":false,"sigla":["C"],"id":"505"},{"unit":506,"query":false,"span":[185,194],"editors":["Minas","Thierfelder"],"sigla":["A","C","Minas","Thierfelder"] so in scena. Quando quello chiedeva perché volesse mangiare prima, disse: «Perché io non spergiuri quando dirò:§I§«Ho pranzato, per Artemide, molto bene!».§/I§","label":"226","n":234,"text":"","A":"234","dawe":"226","num":"226","wit":"A","type":"joke"},{"text":"μέθυσοι","type":"section","app":[]},{"app":[],"dawe":"227","text":"Μεθύσῳ ἐν καπηλείῳ πίνοντι ἐπιστάς τις ἔφη· Ἡ γυνή σου ἀπέθανεν. ὁ δὲ ἀκούσας πρὸς τὸν κάπηλον ἔφη· Οὐκοῦν, αὐθέντα, ἐκ τοῦ μελανοῦ κέρασον.","A":"235","num":"227","type":"joke","wit":"AC","label":"227; 39 β","tr":"Ad uno sbevazzone che beveva in una taverna si avvicinò un tale e disse: «Tua moglie è morta!». E quello, dopo aver ascoltato disse all’oste: «Dunque, capo, versami quello bello forte!».","n":235},{"app":[],"type":"joke","wit":"A","num":"228","A":"236","dawe":"228","text":"Μέθυσος ὀνειδιζόμενος ὑπό τινος, ὅτι πολλὰ πίνων οὐ φρονεῖ, ὁ δὲ ἀπὸ τοῦ οἴνου καλῶς βλέπειν μὴ δυνάμενος ἀπεκρίνατο· Ἐγὼ μεθύω ἢ σὺ ὁ δύο ἔχων ὄψεις;","n":236,"label":"228","tr":"Uno sbevazzone veniva rimproverato da un tale perché, dato che stava bevendo troppo, sragionava, e allora questo, che a causa del vino non riusciva a vedere bene, rispose: «Sono io ubriaco, o tu hai due facce?»"},{"n":237,"label":"229; 57 β","tr":"Uno sbevazzone disgraziato acquistò una vigna ma morì durante la vendemmia.","wit":"A","type":"joke","num":"229","dawe":"229","text":"Μέθυσος ἀτυχὴς ἀμπελῶνα κτησάμενος τῷ τρυγητῷ ἀπέθανεν.","A":"237","app":[]},{"tr":"Uno sbevazzone aprì una taverna e legò un orso alla porta.","label":"230","n":238,"dawe":"230","A":"238","text":"","num":"230","wit":"A","type":"joke","app":[]},{"app":[],"type":"section","text":"ὀζόστομοι"},{"type":"joke","wit":"A","text":"Ὀζόστομος θέλων ἰδίῳ θανάτῳ ἀποθανεῖν περικαλυψάμενος ἐχασμᾶτο.","A":"239","dawe":"231","num":"231","n":239,"label":"231","tr":"Uno con l’alito cattivo che voleva suicidarsi si incappucciò e se ne stette a bocca aperta.","app":[]},{"app":[{"id":"523","sigla":["A","C","Dawe"],"dirty":false,"unit":523,"editors":["Dawe"],"span":[62,65],"query":false,"lemma":"μου]]","reading":"§SIG:Dawe§ : λῦσον §SIG:C§ : λύσον §SIG:A§"}],"num":"232","A":"240","text":"Ὀζόστομος συνεχῶς τὴν γυναῖκα αὐτοῦ καταφιλῶν ἔλεγεν· Ἡ κυρία μου, ἡ Ἥρα μου, ἡ Ἀφροδίτη μου. κἀκείνη ἀποστρεφομένη ἔλεγεν· Ὀζεύς μου, ὀζεύς μου.","dawe":"232","wit":"AC","type":"joke","tr":"Uno con l’alito cattivo che baciava di continuo la propria moglie diceva: «La mia signora, la mia Era, la mia Afrodite!» e quella, voltandosi dall’altro lato, diceva: «Il mio puzzone, il mio puzzone!».3","label":"232","n":240},{"app":[],"num":"233","text":"Ὀζόστομος κωφῷ ὑπαντήσας ἔλεγε· Χαῖρε κἀκεῖνος εἶπε· Φῦ. τοῦ δὲ εἰρηκότος· Τί γὰρ εἶπον; ἔφη· Ἔβδεσας.","A":"241","dawe":"233","wit":"AC","type":"joke","label":"233","tr":"Uno con l’alito cattivo incontrò un sordo e diceva: «Salve!» e quello disse: «Puah!». Siccome l’altro aveva chiesto «Che ho detto mai?!», il sordo fece «Hai scorreggiato!».","n":241},{"type":"joke","wit":"AC","A":"242","dawe":"234","text":"Ὀζόστομος τὴν γυναῖκα ἠρώτα λέγων· Κυρία, τί μεμισεῖς; κἀκείνη ἀπεκρίνατο λέγουσα· Ὅτι σύ με φιλεῖς.","num":"234","n":242,"label":"234","tr":"Uno con l’alito cattivo chiedeva alla moglie: «Mia signora, perché mi odi?» e quella rispose: «Perché tu mi baci!».","app":[]},{"tr":"Uno con l’alito cattivo incontrò un medico e disse: «Signore mio, guarda: la mia ugola è scesa giù!» e quando quello spalancò la bocca, il medico, voltandosi dall’altra parte, diceva: «Non è scesa la tua ugola, ma è salito il tuo culo!».","label":"235","n":243,"A":"243","dawe":"235","text":"Ὀζόστομος ἰατρῷ ὑπαντήσας λέγει· Κύριέ μου, ἴδε· ἡ σταφυλή μου κατέβη. καὶ χανόντος ὁ ἰατρὸς ἀποστρεφόμενος ἔλεγεν· Οὐχὶ ἡ σταφυλή σου κατέβη, ἀλλ’ ὁ κῶλός σου ἀνέβη.","num":"235","wit":"AC","type":"joke","app":[{"lemma":"καὶ2]]","reading":"μανδύλ §SIG:C§","id":"524","sigla":["C"],"dirty":false,"unit":524,"span":[71,74],"editors":[],"query":false},{"reading":"ἆρον μου §SIG:C§ac corr. §SIG:C§1 : ἄρον §SIG:A§","lemma":"τὸ3]]","span":[80,82],"editors":[],"query":false,"unit":525,"dirty":false,"id":"525","sigla":["A","C"]}]},{"app":[{"lemma":"ἐνεβρωμάτισεν]]","reading":"μασσώμενος §SIG:C§","query":false,"span":[47,60],"editors":[],"unit":526,"dirty":false,"sigla":["C"],"id":"526"},{"editors":[],"span":[63,65],"query":false,"unit":527,"dirty":false,"id":"527","sigla":["C"],"reading":"αυτῶ §SIG:C§","lemma":"τὸ2]]"}],"n":244,"tr":"Uno con l’alito cattivo che viziava il figlio, masticava il cibo e lo imboccava. Questi si voltò dall’altra parte e disse: «Non voglio; papà cacca!».","label":"236","type":"joke","wit":"AC","text":"Ὀζόστομος τὸ τέκνον αὐτοῦ κολακεύων, μασώμενος ἐνεβρωμάτισεν αὐτό. τὸ δὲ ἀποστρεφόμενον ἔλεγεν· Οὐ θέλω· τατὰ κακά.","A":"244","dawe":"236","num":"236"},{"n":245,"label":"237","tr":"Uno con l’alito cattivo cuoceva una salsiccia e poiché ci soffiava molto sopra, la trasformò in un escremento canino.","type":"joke","wit":"A","text":"Ὀζόστομος λουκάνικον ὀπτῶν καὶ ἐπὶ πολὺ προσφυσῶν, κυνέαν αὐτὸ ἀπειργάσατο, αὐτὸς συνεχῶς βδέων οὐκ ἐπιστεύετο.","dawe":"237","A":"245","num":"237","app":[{"editors":["Boissonade"],"span":[21,30],"query":false,"unit":528,"dirty":false,"id":"528","sigla":["A","Boissonade"],"reading":"§SIG:Boissonade§ : λοκάνικον ὄπτων §SIG:A§","lemma":"ὀπτῶν καὶ]]"},{"lemma":"αὐτὸ]]","reading":"§SIG:vanThiel§ : κϋνέαν A : κυνίαν dub. §SIG:Boissonade§ et §SIG:Thierfelder§","sigla":["Boissonade","Thierfelder","vanThiel"],"id":"529","dirty":false,"unit":529,"query":false,"span":[58,62],"editors":["Boissonade","Thierfelder","vanThiel"]},{"sigla":["Minas"],"id":"530","dirty":false,"unit":530,"query":false,"span":[73,74],"editors":["Minas"],"reading":"ἰσχάδας §SIG:Minas§","lemma":"ὁ]]"}]},{"app":[],"label":"238","tr":"Uno con l’alito cattivo andò da un fruttivendolo e chiese: «Signore, hai fichi secchi?» e quello si voltò con disgusto: «Non ho neppure i datteri!».","n":246,"num":"238","text":"Ὀζόστομος ἀπελθὼν εἰς ὀπωροπώλην ἠρώτα·Ἔχεις, κῦρι, σχάδας; ὁ δὲ ἀποστραφείς· Οὐδὲ φοινίκια ἔχω.","A":"246","dawe":"238","type":"joke","wit":"A"},{"num":"239","dawe":"239","text":"Νεανίσκος τραγῳδὸς ἠγαπήθη ὑπὸ γυναικῶν δύο, ὀζοστόμου καὶ ὀζοχρώτου. καὶ τῆς μιᾶς λεγούσης· Δός μοι, κῦρι, φιλήματα τῆς δὲ ἄλλης· Δός μοι, κῦρι, περιπλοκάς ἐκεῖνος ἀνεβόησεν· Οἴμοι, τί δράσω; δυσὶ κακοῖς μερίζομαι.","A":"247","type":"joke","wit":"A","label":"239; 63 β","tr":"Un giovane attore tragico venne amato da due donne, una dall’alito cattivo e l’altra tutta puzzolente. E mentre una diceva: «Signore, dammi dei baci!» e l’altra invece: «Signore, dammi degli abbracci!», quello gridò: «Ahimè, che fare? Sono diviso tra due mali!».","n":247,"app":[{"lemma":"καὶ2]]","reading":"§SIG:Minas§ : ὀζοχρώστου §SIG:A§","sigla":["A","Minas"],"id":"531","dirty":false,"unit":531,"query":false,"editors":["Minas"],"span":[55,58]}]},{"type":"joke","wit":"A","A":"248","text":"Ὀζόστομος καὶ ὀζόχρωτος, ὁμοῦ ἐν θεάτρῳ καθεζομένων, συνέβη μέσον αὐτῶν κατὰ τύχην νεανίσκον καθεσθῆναι. αἰσθομένου δὲ αὐτοῦ τῆς δυσωδίας, στραφεὶς πρὸς τὸν ὀζόστομον ἠρώτα· Τίς ἔβδεσεν; εὑρηκὼς δὲ ἐκ τοῦ στόματος αὐτοῦ τὴν αἰτίαν, στραφεὶς τῷ ἑτέρῳ εἰς τὸ οὖς διελέγετο. γνοὺς δὲ κἀκείνου τὴν δυσωδίαν ἀναστὰς ἔφυγεν.","dawe":"240","num":"240","n":248,"tr":"Mentre uno dall'alito fetido e uno dal corpo maleodorante sedevano insieme a teatro, capitò per caso che un giovane si sedesse in mezzo a loro. Accortosi del fetore, si voltava verso quello dall'alito cattivo e domandava: «Chi ha scoreggiato?». Ma dopo aver scoperto che la causa proveniva dalla sua bocca, si voltava verso l’altro e gli parlava all’orecchio; resosi conto però che anche costui appestava, si alzò e scappò via.","label":"240","app":[{"lemma":"συνέβη]]","reading":"καθεζόμενοι §SIG:Eberhard§","dirty":false,"id":"532","sigla":["Eberhard"],"span":[53,59],"editors":["Eberhard"],"query":false,"unit":532}]},{"app":[{"lemma":"ἀκούεις·]]","reading":"ὡς §SIG:Eberhard§","editors":["Eberhard"],"span":[94,101],"query":false,"unit":533,"dirty":false,"id":"533","sigla":["Eberhard"]}],"tr":"Un matto, mentre dormiva insieme a un sordo, scorreggiò. Quando quello se ne accorse e prese ad urlare, disse: «Guarda un po’ come si senti… ma allora mi prendi in giro!».","label":"241","n":249,"A":"249","dawe":"241","text":"Μωρὸς κωφῷ συγκαθεύδων ἔβδεσε. τοῦ δὲ τὴν δυσωδίαν αἰσθομένου καὶ κατακράξαντος ἔφη· Ἴδε, πῶς ἀκούεις· ἀλλ’ἐμπαίζεις μοι.","num":"241","wit":"A","type":"joke"},{"app":[{"dirty":false,"id":"534","sigla":["Eberhard"],"editors":["Eberhard"],"span":[37,49],"query":false,"unit":534,"lemma":"πολλὰ ηὔχετο]]","reading":"πολλὰ βλέπων §SIG:Eberhard§"},{"reading":"‹δ᾿› ὁ §SIG:Eberhard§","lemma":"Ζεὺς]]","unit":535,"query":false,"span":[63,67],"editors":["Eberhard"],"sigla":["Eberhard"],"id":"535","dirty":false},{"lemma":"εἰς]]","reading":"λίξουρος §SIG:A§","span":[87,90],"editors":[],"query":false,"unit":536,"dirty":false,"id":"536","sigla":["A"]}],"n":250,"tr":"Uno con l’alito cattivo, guardando continuamente verso il cielo, rivolgeva molte preghiere. Zeus allora si sporge e dice: «†Hai degli dei anche giù!».","label":"242","wit":"A","type":"joke","num":"242","A":"250","text":"Ὀζόστομος συνεχῶς εἰς οὐρανὸν βλέπων πολλὰ ηὔχετο. παρακύψας ὁ Ζεὺς λέγει· †μία μία χαρεῖς·† καὶ κάτω θεοὺς ἔχεις.","dawe":"242"},{"app":[{"unit":537,"query":false,"editors":["Minas","Thierfelder"],"span":[81,91],"sigla":["Minas","Thierfelder"],"id":"537","dirty":false,"lemma":"νυκτὶ ὑπὸ]]","reading":"add. §SIG:Thierfelder§ : κατέδαρθεv §SIG:Minas§"},{"reading":"ὑπὸ τὴν συκὴν ut. vid. §SIG:C§ : ἐπὶ τῆς συκῆς §SIG:Eberhard§ φίλον1 … ^!καθήμενον1] αὐτοῦ τὸν φίλον","lemma":"συκὴν τὸν]]","id":"538","sigla":["C","Eberhard"],"dirty":false,"unit":538,"span":[134,143],"editors":["Eberhard"],"query":false},{"reading":"σύκα ἀπὸ1 … ^!τὰ1] ἀπὸ τῆς συκῆς αὐτῆς χέσαι ἄνωθεν οὖν βιαζόμενος §SIG:C§","lemma":"ἀναστάντος]]","id":"539","sigla":["C"],"dirty":false,"unit":539,"editors":[],"span":[207,217],"query":false},{"lemma":"ἐπέγνω]]","reading":"ἐξυπνή l'alto del fico, io insozzi le coperte! Ma io d'ora in poi non sarò affatto beffato: prima, infatti, cacherò, e così salirò». Dunque, sforzandosi di nuovo, insozzò le coperte.","label":"243","type":"joke","wit":"AC","A":"251","dawe":"243","text":"Λείξουρος εἰς τρύγην ὑπὸ φίλου κληθεὶς καὶ ἀπλήστως φαγὼν σῦκα καὶ σταφυλάς, ‹τῇ νυκτὶ› ὑπὸ τῆς γαστρὸς αὐτοῦ νυχθεὶς ἔδοξεν ὁρᾶν ἐπὶ συκὴν τὸν φίλον αὐτοῦ καθήμενον καὶ τοῦτον προσκαλεῖσθαι, ἵνα φάγῃ σῦκα. ἀναστάντος δὲ ἤρεσεν αὐτοὺς ἀπὸ τῆς συκῆς χέσαι ἄνωθεν. βιαζόμενος οὖν τὰ στρώματα κατέχεσεν. ὡς δὲ ἐξυπνίσας ἐπέγνω, τὰ στρώματα πλύνας πάλιν [ἀπλήστως φαγὼν] ἐκοιμήθη. καὶ θεωρεῖ πάλιν καθ’ ὕπνους τὸν φίλον ἐπὶ τῆς συκῆς καθήμενον καὶ τοῦτον ὁμοίως ἀνελθεῖν προτρεπόμενον. ὁ δὲ πρὸς αὐτὸν ἀναβλέψας εἶπε· Πάλιν μοι θέλεις ἐμπαῖξαι, ἵνα ἀπὸ τῆς συκῆς ἄνωθεν δόξας χέζειν τὰ στρώματα ῥυπώσω. ἀλλ’ ἐγὼ ἀπάρτι οὐ μὴ ἐμπαιχθῶ· πρῶτον γὰρ χέσω καὶ οὕτως ἀνέλθω. βιαζόμενος οὖν πάλιν τὰ στρώματα κατετίλησεν.","num":"243"},{"wit":"AC","type":"joke","A":"252","dawe":"244","text":"Νεανίσκος πρὸς τὴν γυναῖκα οὖσαν ἀσελγῆ εἶπε· Κυρία, τί ποιοῦμεν; ἀριστοῦμεν ἢ ἀφροδισιάζομεν; κἀκείνη πρὸς αὐτὸν ἔφη· Ὡς θέλεις· ψωμὶν οὐκ ἔστιν.","num":"244","n":252,"tr":"Un giovinetto si rivolse alla moglie che era lasciva e disse: «Cara, che facciamo? Ceniamo o facciamo l’amore?», e quella disse a lui: «Come vuoi; non c'è un boccone».","label":"244; 58 β","app":[{"dirty":false,"id":"547","sigla":["A"],"span":[130,135],"editors":[],"query":false,"unit":547,"reading":"in aliud nescioquid mut. §SIG:A§2pc","lemma":"ψωμὶν]]"},{"lemma":"οὐκ]]","reading":"ψωμὴν potius quam ψωμὶν §SIG:A§","query":false,"editors":[],"span":[136,139],"unit":548,"dirty":false,"sigla":["A"],"id":"548"},{"editors":[],"span":null,"query":false,"unit":549,"dirty":false,"id":"549","sigla":["A","C"],"lemma":"]]","reading":"ἐστὶν per siglum fort. vitio chartae attritum voluit §SIG:A§ δύο … ^!ἐκάλεσε] δύο γραίας γαυριώσας §SIG:C§ μίαν … ^!τὴν] τὴν μὲν μίαν κυράσατε §SIG:C§"}]},{"wit":"AC","type":"joke","num":"245","A":"253","dawe":"245","text":"Νεανίσκος γραίας δύο καπριώσας ἐκάλεσε, πρὸς δὲ τοὺς οἰκείους διακόνους ἔφη· Τὴν μίαν κεράσατε, τὴν δὲ θέλουσαν ἀφροδισιάσατε. αἱ δὲ ὑφ’ ἓν εἶπον· Ἡμεῖς οὐ διψῶμεν.","n":253,"label":"245","tr":"Un giovinetto invitò due vecchie in calore, e disse ai propri servitori: «Mescete da bere singolarmente, e fate l’amore con chi ne ha voglia». E quelle all’unisono dissero: «Noi non abbiamo sete!».","app":[]},{"n":254,"label":"246","tr":"Un misogino si fermava in piazza e diceva: «Vendo mia moglie senza pagarci le tasse!». Quando allora alcuni gli dissero: «Perché?», disse: «Affinché diventi merce confiscata».","type":"joke","wit":"A","A":"254","text":"Μισογύναιος στὰς ἐν τῇ ἀγορᾷ ἔλεγε· Πωλῶ μου τὴν γυναῖκα ἀτελώνητον. τινῶν δὲ εἰπόντων· Διὰ τί; εἶπεν· Ἵνα στερέσιμος γένηται.","dawe":"246","num":"246","app":[{"unit":550,"editors":["Minas"],"span":[96,100],"query":false,"id":"550","sigla":["A","Minas"],"dirty":false,"reading":"§SIG:Minas§ : αυτὸν §SIG:A§","lemma":"εἶπε·]]"}]},{"n":255,"label":"247; 60 β","tr":"Un misogino, dato che era morta sua moglie, celebrava le esequie per la sepoltura. Quando uno gli chiese: «Chi ha iniziato il suo riposo?», rispose: «Io, che sono stato privato di costei!».","type":"joke","wit":"A","num":"247","text":"Μισογύναιος, τῆς γυναικὸς αὐτοῦ ἀποθανούσης, ἐπὶ τῷ θάψαι ἐκήδευε. τινὸς δὲ ἐρωτήσαντος· Τίς ἀνεπαύσατο; ἔφη· Ἐγὼ ὁ ταύτης στερηθείς.","dawe":"247","A":"255","app":[]},{"app":[],"wit":"A","type":"joke","num":"248","A":"256","text":"Μισογύναιος νοσήσας ἐν ἀπογνώσει, τῆς δὲ γυναικὸς αὐτῷ εἰπούσης· Ἐάν τι πάθῃς, ἀπάγξομαι ἀναβλέψας πρὸς αὐτὴν εἶπε· Ζῶντί μοι τοῦτο χάρισαι.","dawe":"248","n":256,"label":"248; 61 β","tr":"Un misogino si ammalò senza speranza, e poiché sua moglie gli disse: «Se ti succede qualcosa, mi impiccherò», alzò lo sguardo verso di lei e disse: «Fammi questo favore finché sono ancora vivo!»."},{"app":[{"dirty":false,"sigla":["A","Boissonade"],"id":"551","query":fa :[],"span":[35,44],"query":false,"unit":582,"dirty":false,"id":"582","sigla":["T"]},{"reading":"λέγει coniecerit §SIG:Dawe§ : λέγων coniecerim","lemma":"λέγω]","unit":583,"editors":["Dawe"],"span":[89,93],"query":false,"id":"583","sigla":["Dawe"],"dirty":false}]},{"wit":"FT","type":"joke","text":"Σχολαστικὸς Ἀμιναίαν ἔχων ἐσφράγισεν. Tοῦ δὲ δούλου κάτωθεν τρήσαντος καὶ τὸν οἶνον αἴροντος ἐθαύμαζεν, ὅτι τῶν σημάντρων σώων ὄντων ὁ οἶνος ἐλαττοῦται. Ἕτερος εἶπεν· «Ὅρα, μὴ κάτωθεν ἀφῃρέθη». Ὁ δέ· «Ἀμαθέστατε, εἶπεν, οὐ τὸ κάτωθεν λείπει, ἀλλὰ τὸ ἄνωθεν μέρος».","A":"17","dawe":"254","num":"254","n":17,"tr":"Uno §I§scholastikos§/I§, avendo un’anfora di vino Aminèo, la sigillò. Ma poiché lo schiavo, forandola di sotto, ne sottraeva il vino, si stupiva che, pur restando intatti i sigilli, il vino calasse. Un tale gli disse: «Bada che non te l’abbiano portato via di sotto». E lui: «Ignorantissimo, disse, non manca la parte di sotto, ma quella di sopra».","label":"254; esclusiva di β","app":[{"lemma":"ἐσφράγισεν]","reading":"ἐσφράγισεν αὐτήν §SIG:T§","id":"584","sigla":["T"],"dirty":false,"unit":584,"span":[26,36],"editors":[],"query":false},{"reading":"ἑτέρου δὲ εἰπόντος §SIG:F§ οὐ … ^!μέρος : οὐ τὸ κάτωθεν λείπει, ἀλλὰ τὸ ἄνωθεν μέρος §SIG:T§οὐ τὸ κάτωθεν μέρος, ἀλλὰ τὸ ἄνωθεν λείπει §SIG:F§ Σχολαστικὸς … ^!ὑφαπλώσας : Σχολαστικὸς ὑπὸ δένδρον λάθρα ἐλθὼν καὶ ὑφαπλώσας §SIG:F§","lemma":"Ἕτερος εἶπεν]","query":false,"span":[153,165],"editors":[],"unit":585,"dirty":false,"sigla":["F","T"],"id":"585"}]},{"app":[],"wit":"FT","type":"joke","num":"49","dawe":"49","text":"Σχολαστικὸς ἐν τῇ πόλει ὤν, καὶ τὴν σελήνην ἰδών, ἐπυνθάνετο τοῦ πατρός, εἰ καὶ αἱ λοιπαὶ πόλεις ἔχουσι τοιαύτην σελήνην.","A":"18","n":18,"tr":"Uno §I§scholastikos§/I§ era in città, vide la luna e chiedeva al padre se anche le altre città avessero una luna così.","label":"49; cf. α 49"},{"dawe":"19","text":"Σχολαστικὸς ἰδὼν στρουθοὺς ἐπὶ δένδρου, λάθρα ὑπεισελθών, ὑφαπλώσας τὸν κόλπον ἔσειε τὸ δένδρον ὡς ὑποδεξόμενος τὰ στρουθία.","A":"19","num":"19","type":"joke","wit":"FT","tr":"Uno §I§scholastikos§/I§ vide dei passeri su un albero, si avvicinò di nascosto, distese la piega dell’abito e scuoteva l’albero per raccogliere i passeri.","label":"19; cf. α 19","n":19,"app":[{"reading":"ὑπελθών dub. §SIG:Thierfelder§","lemma":"ὑπεισελθών]","unit":586,"span":[46,56],"editors":["Thierfelder"],"query":false,"id":"586","sigla":["Thierfelder"],"dirty":false},{"lemma":"ὑποδεξόμενος]","reading":"(cf. α) ὑποδεξάμενος §SIG:F§ πιεῖν … ^!καλὸν (cf. α) εἰ πιεῖν ὕδωρ καλὸν §SIG:F§","id":"587","sigla":["F"],"dirty":false,"unit":587,"span":[99,111],"editors":[],"query":false}]},{"dawe":"51","A":"20","text":"Σχολαστικὸς ἐν τῷ ἰδίῳ ἀγρῷ ἐξιὼν ἠρώτα πιεῖν ὕδωρ εἰ καλὸν ἐν τῷ αὐτόθι φρέατι. Tῶν δὲ φησάντων ὅτι «Καλόν· καὶ γὰρ καὶ οἱ γονεῖς σου ἐξ αὐτοῦ ἔπινον», «Καὶ πηλίκους, ἔφη, εἶχον τραχήλους, ὅτι εἰς τοσοῦτον βάθος πίνειν ἐδύναντο;»","num":"51","wit":"FT","type":"joke","tr":"Uno §I§scholastikos§/I§, uscendo nel proprio campo, chiedeva se l’acqua del pozzo che si trovava lì fosse buona da bere. E poiché quelli dicevano: «È buona, e infatti anche i tuoi genitori bevevano da lì», disse: «E di che taglia avevano i colli, da poter bere a una profondità tanto grande?».","label":"51; cf. α 50","n":20,"app":[{"query":false,"span":[54,59],"editors":["Dawe"],"unit":588,"dirty":false,"sigla":["Dawe"],"id":"588","reading":"καλὸν ‹ἦν› §SIG:Dawe§","lemma":"καλὸν]"},{"id":"589","sigla":["F","Thierfelder"],"dirty":false,"unit":589,"span":[81,87],"editors":["Thierfelder"],"query":false,"lemma":"Tῶν δὲ]","reading":"Tῶν δὲ ‹γεωργῶν› dub. §SIG:Thierfelder§ ἔπινον … ^!εἶχον (cf. α) ἔπινον, φησὶ· Καὶ πηκίλους εἶχον §SIG:F§"}]},{"num":"52","A":"21","text":"Σχολαστικὸς εἰς λάκκον ἐμπεσὼν συνεχῶς ἔκραζε βοήθειαν ζητῶν. Ὡς δὲ οὐδεὶς ὑπήκουεν, ἔφη· «Μωρός εἰμι, ἐὰν μὴ ἀνελθὼν πάντας τύψω, ἵνα κἂν οὕτως δραμόντες κλίμακά μοι κομίσωσιν».","dawe":"52","wit":"FT","type":"joke","label":"52; cf. α 52","tr":"Uno §I§scholastikos§/I§ cadde in una cisterna e gridava di continuo cercando aiuto. E poiché nessuno gli dava ascolto, disse: «Sono un fesso, se non risalgo e li frusto tutti, perché almeno così corrano a portarmi una scala!».","n":21,"app":[{"dirty":false,"id":"590","sigla":["F","T"],"span":[16,22],"editors":[],"query":false,"unit":590,"reading":"λάκον §SIG:T§ συνεχῶς … ^!ζητῶν (cf. α) συνεχῶς κράζων βοήθειαν ἐζήτει §SIG:F§","lemma":"λάκκον]"},{"query":false,"span":[75,83],"editors":[],"unit":591,"dirty":false,"sigla":["F","T"],"id":"591","reading":"et α ὑπήκουσεν §SIG:F§ : ἐπήκουεν §SIG:T§","lemma":"ὑπήκουεν]"},{"dirty":false,"id":"592","sigla":["F"],"span":[103,106],"editors":[],"query":false,"unit":592,"reading":"(cf. α) εἰ §SIG:F§","lemma":"ἐὰν]"}]},{"type":"joke","wit":"FT","num":"22","text":"Σχολαστικὸς σχολαστικῷ συναντήσας, εἶπεν· «Ἔμαθον, ὅτι ἀπέθανες». Kἀκεῖνος· «Ἀλλ’ ὁρᾷς με, ἔφη, ζῶντα». Kαὶ ὁ σχολαστικός· «Καὶ μὴν ὁ εἰπών μοι πολλῷ σοῦ ἀξιοπιστότερος ὑπάρχει».","dawe":"22","A":"22","n":22,"label":"22; cf. α 22","tr":"Uno §I§scholastikos§/I§ incontrò un altro §I§scholastikos§/I§ e disse: «Ho saputo che sei morto». E quello: «Ma mi vedi vivo!». E lo §I§scholastikos§/I§: «Eppure chi me l’ha detto è molto più degno di fede di te».","app":[]},{"type":"joke","wit":"FT","dawe":"56","text":"Σχολαστικὸς καὶ φαλακρὸς καὶ κουρεὺς συνοδεύοντες συνέθεντο πρὸς τέσσαρας ὥρας βιγλεῦσαι. Ἔλαχεν οὖν πρῶτον τῷ κουρεῖ. Ὁ δὲ μετεωριζόμενος τὸν σχολαστικὸν κοιμώμενον ἐξύρισε καὶ τῶν ὡρῶν πληρωθεισῶν διύπνισεν. Ὁ δέ, κνηθόμενος ἀπὸ ὕπνου τὴν κεφαλήν, καὶ εὑρὼν αὐτὴν ψιλήν, ἔφη· «Μέγα κάθαρμα ὁ κουρεύς· πλανηθεὶς γὰρ ἀντὶ ἐμοῦ τὸν φαλακρὸν διύπνισεν».","A":"23","num":"56","n":23,"label":"56; cf. α 56","tr":"Uno §I§scholastikos§/I§, un pelato e un barbiere, viaggiando insieme, si accordarono per fare la guardia a turno di quattro ore. Toccò dunque per primo al barbiere. E questi, per passare il tempo, rase lo §I§scholastikos§/I§ mentre dormiva e, passate le ore, lo svegliò. Ma quello, grattandosi la testa al risveglio, se la trovò liscia e disse: «Gran canaglia di un barbiere! Per sbaglio, invece di me, ha svegliato il pelato!».","app":[{"sigla":["F"],"id":"593","dirty":false,"unit":593,"query":false,"span":[79,88],"editors":[],"lemma":"βιγλεῦσαι]","reading":"βιγλίσαι §SIG:F§"},{"lemma":"πληρωθεισῶν]","reading":"(cf. α) παρελθουσῶν §SIG:F§","unit":594,"query":false,"span":[187,198],"editors":[],"sigla":["F"],"id":"594","dirty":false},{"sigla":["T"],"id":"595","dirty":false,"unit":595,"query":false,"editors":[],"span":[216,226],"lemma":"κνηθόμενος]","reading":"κνιθόμενος §SIG:T§"},{"query":false,"editors":[],"span":[266,271],"unit":596,"dirty":false,"sigla":["F"],"id":"596","lemma":"ψιλήν]","reading":"(cf. α) ἐψιλωμένην §SIG:F§"},{"id":"597","sigla":["F"],"dirty":false,"unit":597,"editors":[],"span":[331,339],"query":false,"lemma":"φαλακρὸν]","reading":"φαρακλὸν §SIG:F§"}]},{"app":[],"tr":"Uno §I§scholastikos§/I§ apprese che il corvo vive più di duecento anni, ne comprò uno e lo allevava per farne la prova.","label":"255; esclusiva di β","n":24,"A":"24","text":"Σχολαστικὸς μαθών, ὅτι ὁ κόραξ ὑπὲρ τὰ διακόσια ἔτη ζῇ, ἀγοράσας κόρακα, εἰς ἀπόπειραν ἔτρεφεν.","dawe":"255","num":"255","wit":"FT","type":"joke"},{"app":[],"wit":"F","type":"joke","A":"25","dawe":"64","text":"Σχολαστικὸς βράκας ὠνήσατο· στενῶν οὖν οὐσῶν, ἐδρωπάκιζεν αὐτάς.","num":"64","n":25,"tr":"Uno §I§scholastikos§/I§ comprò delle brache; e poiché erano strette, vi applicava la pasta depilatoria.","label":"64; cf. α 64"},{"app":[{"unit":598,"span":[12,23],"editors":[],"query":false,"id":"598","sigla":["F"],"dirty":false,"reading":"ἐν χειμῶνι §SIG:F§","lemma":"εἰς χειμῶνα]"},{"lemma":"περιπλεκομένου]","reading":"περιπλεκομένων §SIG:T§","query":false,"span":[61,75],"editors":[],"unit":599,"dirty":false,"sigla":["T"],"id":"599"},{"dirty":false,"id":"600","sigla":["F","T"],"editors":[],"span":[76,82],"query":false,"unit":600,"lemma":"σκεῦος]","reading":"editio princeps σκεύους §SIG:F§§SIG:T§ μίαν … ^!ἀγκυρῶν : ἐκεῖνος μίαν τῶν ἀγκυρῶν §SIG:T§"}],"type":"joke","wit":"FT","text":"Σχολαστικὸς εἰς χειμῶνα ναυαγῶν, καὶ τῶν συμπλεόντων ἑκάστου περιπλεκομένου σκεῦος πρὸς τὸ σωθῆναι, μίαν ἐκεῖνος τῶν ἀγκυρῶν περιεπλέξατο.","A":"26","dawe":"256","num":"256","n":26,"tr":"Uno §I§scholastikos§/I§, naufragando durante una tempesta, mentre ciascuno dei compagni di viaggio si avvinghiava a un qualche oggetto per mettersi in salvo, lui si abbracciò a una delle àncore.","label":"256; esclusiva di β"},{"num":"257","A":"27","dawe":"257","text":"Σχολαστικὸς υἱὸν θάψας καὶ συναντήσας τῷ διδασκάλῳ αὐτοῦ, εἶπε· «Προῆλθεν ὁ παῖς;» Ὁ δέ φησιν· «Οὔ». Kαὶ ὁ σχολαστικός· «Λοιπὸν οὖν, καθηγητά, τέθνηκεν».","type":"joke","wit":"FT","tr":"Uno §I§scholastikos§/I§ seppellì il figlio, incontrò il suo maestro e disse: «È venuto il ragazzo?». E quello dice: «No». E lo §I§scholastikos§/I§: «E allora, professore, è morto».","label":"257; cf. α 77","n":27,"app":[{"unit":601,"span":[51,56],"editors":[],"query":false,"id":"601","sigla":["T"],"dirty":false,"reading":"om. §SIG:T§","lemma":"αὐτοῦ]"},{"lemma":"υἱὸν]","reading":"τὸν υἱὸν §SIG:F§","dirty":false,"sigla":["F"],"id":"602","query":false,"editors":[],"span":[12,16],"unit":602},{"lemma":"εἶπε]","reading":"(εἶπεν scrib.) ἔφη §SIG:F§","unit":603,"editors":[],"span":[58,62],"query":false,"id":"603","sigla":["F"],"dirty":false},{"sigla":["Boissonade","F"],"id":"604","dirty":false,"unit":604,"query":false,"editors":["Boissonade"],"span":[65,73],"reading":"Προσῆλθεν §SIG:Boissonade§ Ὁ … ^!Οὔ : ὁ δέ, οὔ φησιν §SIG:F§","lemma":"Προῆλθεν]"}]},{"dawe":"29","text":"Διδύμων ἀδελφῶν εἷς ἐτελεύτησεν. Σχολαστικὸς οὖν ἀπαντήσας τῷ ζῶντι, ἠρώτα· «Σὺ ἀπέθανες ἢ ὁ ἀδελφός σου;»","A":"28","num":"29","type":"joke","wit":"FT","label":"29; cf. α 29","tr":"Di due fratelli gemelli, uno morì. Uno §I§scholastikos§/I§ dunque incontrò quello vivo e gli chiedeva: «Sei morto tu, o tuo fratello?».","n":28,"app":[]},{"wit":"FT","type":"joke","num":"30","A":"29","dawe":"30","text":"Σχολαστικὸς ναυαγεῖν μέλλων πινακίδας ᾔτει, ἵνα διαθήκας γράψῃ. Tοὺς δὲ οἰκέτας ὁρῶν ἀλγοῦντας διὰ τὸν κίνδυνον, ἔφη· «Μὴ λυπεῖσθε· ἐλευθερῶ γὰρ ὑμᾶς».","n":29,"label":"30; cf. α 29","tr":"Uno §I§scholastikos§/I§, in procinto di naufragare, chiedeva delle tavolette per scrivere il testamento. E vedendo i servi che si addoloravano per il pericolo, disse: «Non affliggetevi: vi rendo liberi!».","app":[]},{"dawe":"31","A":"30","text":"Σχολαστικὸς ποταμὸν βουλόμενος περᾶσαι ἀνῆλθεν εἰς τὸ πλοῖον καβαλλάριος. Πυθομένου δέ τινος· «Διὰ τί οὐ κατέβης;» ἔφη σπουδάζειν.","num":"31","wit":"FT","type":"joke","label":"31; cf. α 31","tr":"Uno §I§scholastikos§/I§, volendo attraversare un fiume, salì sull’imbarcazione a cavallo. E poiché qualcuno gli chiese perché non scendesse, rispose che aveva fretta.","n":30,"app":[{"reading":"(cf. α) εἰσῆλθεν §SIG:F§","lemma":"ἀνῆλθεν]","dirty":false,"id":"605","sigla":["F"],"span":[39,46],"editors":[],"query":false,"unit":605},{"lemma":"καβαλλάριος]","reading":"ἔφιππος §SIG:T§","unit":606,"query":false,"span":[61,72],"editors":[],"sigla":["T"],"id":"606","dirty":false}]},{"A":"31","dawe":"55","text":"Σχολαστικὸς ἀμαθής, ἀπορῶν δαπανημάτων, τὰ βιβλία αὐτοῦ ἐπίπρασκε καὶ γράφων πρὸς τὸν πατέρα ἔλεγε· «Σύγχαιρε ἡμῖν, πάτερ, ἤδη γὰρ ἡμᾶς τὰ βιβλία τρέφει».","num":"55","type":"joke","wit":"FT","tr":"Uno §I§scholastikos§/I§ ignorante, a corto di denaro, vendeva i propri libri e, scrivendo al padre, diceva: «Congratulati con noi, padre, ché ormai i libri ci sfamano!».","label":"55; cf. α 55","n":31,"app":[]},{"type":"joke","wit":"FT","num":"258","A":"32","dawe":"258","text":"Σχολαστικὸς παιδοτρίβης περὶ μαθητοῦ ἀκούσας ὅτι νοσεῖ, τῇ δὲ ἑξῆς ὅτι πυρέττει, ὕστερον δὲ παρὰ τοῦ πατρὸς ἀκούσας ὅτι ἀπέθανεν, ἔφη· «Οὕτω προφασιζόμενοι οὐκ ἐᾶτε τοὺς παῖδας μανθάνειν».","n":32,"label":"258; esclusiva di β","tr":"Uno §I§scholastikos§/I§ maestro di ginnastica sentì dire di un allievo che era malato, il giorno seguente che aveva la febbre, e più tardi seppe dal padre che era morto, e disse: «Con tutte queste scuse non lasciate imparare i ragazzi».","app":[{"lemma":"παιδοτρίβης]","reading":"παιδοτρίβεις §SIG:T§a.c","dirty":false,"sigla":["T"],"id":"607","query":false,"span":[12,23],"editors":[],"unit":607}]},{"app":[{"query":false,"editors":[],"span":[35,38],"unit":608,"dirty":false,"sigla":["F"],"id":"608","lemma":"οὖν]","reading":"δὲ §SIG:F§"},{"reading":"(cf. α) πλῆθος §SIG:F§","lemma":"ὄχλον]","unit":609,"query":false,"editors":[],"span":[94,99],"sigla":["F"],"id":"609","dirty":false}],"n":33,"tr":"A uno §I§scholastikos§/I§ morì il bambino. Vide radunata una gran folla di gente e diceva: «Mi vergogno di portare un bimbo così piccolo in una folla tanto grande».","label":"40; cf. α 40","wit":"FT","type":"joke","num":"40","dawe":"40","text":"Σχολαστικοῦ παιδίον ἀπέθανεν. Ἰδὼν οὖν πλῆθος λαοῦ συνελθόν, ἔλεγεν· «Αἰσχύνομαι εἰς τοσοῦτον ὄχλον μικρὸν παιδίον προφέρειν».","A":"33"},{"app":[{"dirty":false,"sigla":["F"],"id":"610","query":false,"span":[37,50],"editors":[],"unit":610,"lemma":"αὐτὸ ἀπήρχετο]","reading":"αὐτὸς ἀπῆγεν §SIG:F§"},{"reading":"ἑαυτοῦ οἶκον §SIG:F§","lemma":"οἶκον αὐτοῦ]","sigla":["F"],"id":"611","dirty":false,"unit":611,"query":false,"editors":[],"span":[59,70]},{"dirty":false,"sigla":["F","T"],"id":"612","query":false,"editors":[],"span":[139,146],"unit":612,"lemma":"γένωμαι]","reading":"γένομαι §SIG:T§ ὑπὸ … ^!ἐκπεμπόμενος (cf. α) ἐκπεμπόμενος ὑπὸ τοῦ πατρὸς εἰς πόλεμον §SIG:F§"}],"n":34,"label":"259; esclusiva di β","tr":"Uno §I§scholastikos§/I§ comprò della carne e la portava a casa sua reggendola in mano. Ma un lupo balzò fuori e gliela strappò di mano. E lui disse: «Possa diventare come te, se anch’io non farò lo stesso a un altro!».","wit":"FT","type":"joke","num":"259","dawe":"259","A":"34","text":"Σχολαστικὸς ἀγοράσας κρέας, βαστάζων αὐτὸ ἀπήρχετο εἰς τὸν οἶκον αὐτοῦ. Λούπης δὲ ῥήξας ἥρπασεν αὐτὸ ἐκ τῆς χειρὸς αὐτοῦ. Ὁ δὲ ἔφη· «Ὡς σὺ γένωμαι, ἂν μὴ κἀγὼ ποιήσω αὐτὸ ἄλλῳ»."},{"type":"joke","wit":"FT","A":"35","text":"Σχολαστικοῦ υἱός, ὑπὸ τοῦ πατρὸς εἰς πόλεμον ἐκπεμπόμενος, ὑπέσχετο ἑνὸς τῶν ἐχθρῶν κεφαλὴν ἀγαγεῖν. Ὁ δὲ ἔφη· «Εὔχομαι καὶ χωρὶς κεφαλῆς σε ἐλθόντα, μόνον ὑγιαίνοντα ἰδεῖν καὶ εὐφρανθῆναι».","dawe":"65","num":"65","n":35,"tr":"Il figlio di uno §I§scholastikos§/I§, mandato in guerra dal padre, promise che avrebbe riportato la testa di un nemico. E quello disse: «Mi auguro di vederti tornare anche senza testa, purché sano e salvo, e di rallegrarmene!».","label":"65; cf. α 65","app":[{"reading":"ὑγιαίνοντα §SIG:F§ὑγειᾶ ὄντα §SIG:T§","lemma":"ὑγιαίνοντα]","editors":[],"span":[156,166],"query":false,"unit":613,"dirty":false,"id":"613","sigla":["F","T"]}]},{"tr":"A uno §I§scholastikos§/I§ che si trovava in Grecia un amico scrisse di comprargli dei libri. Ma quello non se ne curò e, quando dopo un po’ si incontrò con l’amico, disse: «La lettera che mi avevi mandato a proposito dei libri non l’ho ricevuta».","label":"17; cf. α 17","n":36,"num":"17","A":"36","text":"Σχολαστικῷ φίλος ἔγραψεν εἰς Ἑλλάδα ὄντι, βιβλία αὐτῷ ἀγοράσαι. Tοῦ δὲ ἀμελήσαντος, ὡς μετὰ χρόνον τῷ φίλῳ συνωψίσθη, εἶπε· «Τὴν ἐπιστολήν, ἣν περὶ τῶν βιβλίων ἀπέστειλας, οὐκ ἐκομισάμην».","dawe":"17","type":"joke","wit":"FT","app":[{"editors":[],"span":[107,116],"query":false,"unit":614,"dirty":false,"id":"614","sigla":["F"],"lemma":"συνωψίσθη]","reading":"συνοψίσθη §SIG:F§"},{"reading":"ἀπέστειλάς μοι §SIG:T§ ὁ1 … ^!αὐτῶν (cf. α) αὐτῶν ὁ εἷς §SIG:T§","lemma":"ἀπέστειλας]","dirty":false,"id":"615","sigla":["T"],"span":[160,170],"editors":[],"query":false,"unit":615}]},{"app":[{"lemma":"μέλαιναν ὄρνιν]","reading":"(cf. α) μέλαινα ὄρνιν §SIG:T§ ταύτης … ^!ἀλέκτωρ (cf. α) ὁ ἀλέκτωρ ταύτης §SIG:F§","sigla":["F","T"],"id":"616","dirty":false,"unit":616,"query":false,"span":[46,60],"editors":[]}],"text":"Σχολαστικοὶ δύο ἐβάδιζον. Ἰδὼν δὲ ὁ εἷς αὐτῶν μέλαιναν ὄρνιν, εἶπεν· «Ἀδελφέ, ἴσως ταύτης ὁ ἀλέκτωρ ἀπέθανε, καὶ διὰ τοῦτο μέλαινα ἐνεδύσατο».","dawe":"39","A":"37","num":"39","type":"jo un tale gli si avvicinò e disse: «Tua moglie è morta». E quello rispose: «E allora, oste, versami del vino nero!».","label":"227; cf. α 227","n":39,"app":[{"lemma":"καπηλείῳ]","reading":"καπελίῳ §SIG:T§","sigla":["T"],"id":"622","dirty":false,"unit":622,"query":false,"editors":[],"span":[14,22]},{"id":"623","sigla":["T"],"dirty":false,"unit":623,"editors":[],"span":[105,111],"query":false,"lemma":"μέλανα]","reading":"μέλαινα §SIG:T§"},{"reading":"κίρνα §SIG:F§","lemma":"κέρνα]","id":"624","sigla":["F"],"dirty":false,"unit":624,"span":[122,127],"editors":[],"query":false}]},{"app":[],"text":"Περὶ δυσκόλων","type":"section"},{"app":[],"text":"Δυσκόλῳ ἰατρῷ λέγει τις· «Τί ἐστιν, ὅτι αἷμα χέζω καὶ χολάς;» Kἀκεῖνος ἔφη· «Ἐὰν καὶ τὰ ἔντερά σου χέσῃς, ἐγὼ οὐ χολῶ».","dawe":"184","A":"40","num":"184","wit":"FT","type":"joke","label":"184; cf. α 184","tr":"Un tale dice a un medico burbero: «Come mai evacuo sangue e bile?». E quello rispose: «Anche se cachi via le tue budella, io non mi prendo bile!».","n":40},{"app":[{"lemma":"γένησιν]","reading":"(cf. α) γέννησιν §SIG:T§","dirty":false,"sigla":["T"],"id":"625","query":false,"span":[35,42],"editors":[],"unit":625}],"type":"joke","wit":"FT","num":"187","dawe":"187","text":"Δύσκολος ἀστρονόμος παιδὸς νοσεροῦ γένησιν εἰπών, πολυχρόνιον ἔσεσθαι ἐπαγγειλάμενος, ᾔτει τὸν μισθόν. Tῆς δὲ μητρὸς εἰπούσης· «Αὔριον δώσω» — «Τί οὖν, ἔφη, ἐὰν τῇ νυκτὶ ἀποθάνῃ, ἐγὼ τὸν μισθὸν ἀπολέσω;»","A":"41","n":41,"label":"187; cf. α 187","tr":"Un astrologo burbero fece l’oroscopo di un bambino malaticcio, garantì che sarebbe vissuto a lungo e ne chiedeva il compenso. E poiché la madre disse: «Te lo darò domani», ribatté: «E che, se muore stanotte, perdo il mio compenso?»."},{"app":[{"reading":"(cf. α) μέλιτος κεράμιον §SIG:T§","lemma":"κεράμιον μέλιτος]","dirty":false,"sigla":["T"],"id":"626","query":false,"editors":[],"span":[9,25],"unit":626},{"reading":"(cf. α) Οὕτως §SIG:T§ Τοῦ … ^!Ῥάπτειν : Τοῦ δὲ φήσαντος· καὶ διὰ τί ἀργεῖ §SIG:T§a.c","lemma":"Οὕτω]","unit":627,"query":false,"span":[102,106],"editors":[],"sigla":["T"],"id":"627","dirty":false}],"A":"42","dawe":"188","text":"Δύσκολος κεράμιον μέλιτος ἀγοράσας συνεχῶς ἠρωτᾶτο, πόσου ἠγόρασεν. Kαταστρέφων οὖν τὸ κεράμιον ἔφη· «Οὕτω χυθήτω μου τὸ αἷμα, ἐὰν εἴπω ὑμῖν».","num":"188","wit":"FT","type":"joke","tr":"Un burbero comprò un orcio di miele e si sentiva chiedere di continuo quanto l’avesse pagato. E allora, capovolgendo l’orcio, disse: «Così mi si versi il sangue, se ve lo dico!».","label":"188; cf. α 188","n":42},{"app":[],"num":"190","text":"Δυσκόλου ταυλίζοντος κατεπήδησε τις. Ὁ δὲ θυμωθεὶς ἠρώτησεν, εἰ τέχνην οἶδε καὶ διὰ τί ἀργεῖ. Τοῦ δὲ φήσαντος· «Ῥάπτειν οἶδα, ἔργον δὲ οὐκ ἔχω», διαρρήξας τὸ ἱμάτιον αὐτοῦ εἶπε· «Λάβε καὶ ἐργάζου καὶ σιώπα».","dawe":"190","A":"43","wit":"FT","type":"joke","tr":"Mentre un burbero giocava a dadi, un tale gli saltò addosso. E quello si irritò e gli chiese se conoscesse un mestiere e perché stesse in ozio. Quando il tale rispose: «So cucire, ma non ho lavoro», stracciò il proprio mantello e disse: «Prendi, lavora e taci!».","label":"190; cf. α 190","n":43},{"app":[{"lemma":"ἔσω]","reading":"(cf. α) ἐγὼ §SIG:T§","id":"628","sigla":["T"],"dirty":false,"unit":628,"editors":[],"span":[47,50],"query":false},{"reading":"(cf. α) ψεῦδος §SIG:T§","lemma":"Ψεύδῃ]","id":"629","sigla":["T"],"dirty":false,"unit":629,"editors":[],"span":[74,79],"query":false},{"lemma":"Ὦ κάθαρμα]","reading":"Τ (cf. α) κάθαρμα §SIG:F§ σοι … ^!φαίνομαι (cf. α) οὐ φαίνομαί σοι §SIG:T§","sigla":["F","T"],"id":"630","dirty":false,"unit":630,"query":false,"editors":[],"span":[113,122]}],"n":44,"tr":"Un tale chiamava un burbero, e quello rispose: «Non sono in casa». E quando il primo disse: «Menti, perché sento la tua voce!», ribatté: «Canaglia, se te l’avesse detto il mio servo, gli avresti creduto; e io non ti sembro più degno di fede di lui?».","label":"193; cf. α 193","wit":"FT","type":"joke","text":"Δυσκόλῳ τις ἐφώνει· ὁ δὲ ἀπεκρίνατο· «Οὐκ εἰμὶ ἔσω». Tοῦ δὲ εἰπόντος ὅτι «Ψεύδῃ· τῆς φωνῆς σου γὰρ ἀκούω», ἔφη· «Ὦ κάθαρμα, εἰ μὲν ὁ παῖς μου εἶπεν, ἐπείσθης ἄν· ἐγὼ δέ σοι οὐ φαίνομαι ἀξιοπιστότερος εἶναι;»","A":"44","dawe":"193","num":"193"},{"tr":"Un tale chiese a un burbero: «Dove abiti?». E quello disse: «Mi sto traslocando proprio da lì!».","label":"191; cf. α 191","n":45,"num":"191","text":"Δύσκολόν τις ἠρώτα· «Ποῦ μένεις;» Ὁ δὲ ἔφη· «Kἀκεῖθεν μεταβαίνω».","dawe":"191","A":"45","type":"joke","wit":"FT","app":[]},{"app":[{"dirty":false,"sigla":["F"],"id":"631","query":false,"span":[13,19],"editors":[],"unit":631,"reading":"(cf. α) κλίμακος §SIG:F§","lemma":"σκάλας]"},{"query":false,"editors":[],"span":[46,54],"unit":632,"dirty":false,"sigla":["F"],"id":"632","reading":"δεσπότου §SIG:F§","lemma":"αὐθέντου]"},{"unit":633,"editors":["Dawe"],"span":[90,93],"query":false,"id":"633","sigla":["Dawe"],"dirty":false,"lemma":"Ἐγὼ]","reading":"Ἐγὼ ‹ἔσω› §SIG:Dawe§"},{"lemma":"]","reading":"om. §SIG:F§","span":null,"editors":[],"query":false,"unit":634,"dirty":false,"id":"634","sigla":["F"]}],"type":"joke","wit":"FT","num":"194","dawe":"194","A":"46","text":"Δύσκολος ἀπὸ σκάλας καταβαίνων ἔπεσεν. Tοῦ δὲ αὐθέντου εἰπόντος· «Ἐκεῖ τίς ἔπεσεν;» Ἔφη· «Ἐγὼ τοῦ ἐνοικίου μου. Τί πρὸς σέ;»","n":46,"label":"194; cf. α 194","tr":"Un burbero, mentre scendeva una scala, cadde. E poiché il padrone di casa disse: «Chi è caduto, là?», rispose: «Io, a prezzo del mio affitto! E a te che importa?»."},{"text":"Δύσκολος ἰατρὸς ἑτερόφθαλμος ἀρρώστῳ ἔφη· «Πῶς ἔχεις;» Ὁ δέ· «Ὡς βλέπεις». Εἶπε δέ· «Ἐάν ‹...›».","dawe":"185","A":"47","num":"185","type":"joke","wit":"T","label":"185; cf. α 185","tr":"Un medico burbero, cieco da un occhio, disse a un malato: «Come stai?». E quello: «Come vedi». E il medico disse: «Se ‹…›».","n":47,"app":[]},{"app":[],"text":"Περὶ φιλαργύρων","type":"section"},{"app":[{"unit":635,"query":false,"editors":[],"span":[11,19],"sigla":["T"],"id":"635","dirty":false,"lemma":"διαθήκας]","reading":"(cf. α) διαθήκην §SIG:T§"}],"text":"Φιλάργυρος διαθήκας γράφων, ἑαυτὸν κληρονόμον ἔταξεν.","A":"48","dawe":"104","num":"104","type":"joke","wit":"FT","label":"104; cf. α 104","tr":"Un avaro, redigendo il testamento, nominò erede sé stesso.","n":48},{"app":[{"dirty":false,"id":"636","sigla":["Thierfelder"],"span":[155,159],"editors":["Thierfelder"],"query":false,"unit":636,"lemma":"ἀλλὰ]","reading":"ἀλλὰ ‹εἰς› §SIG:Thierfelder§"},{"reading":"(cf. α) κεφαλὴν §SIG:F§","lemma":"κεφαλήν μου]","editors":[],"span":[164,175],"query":false,"unit":637,"dirty":false,"id":"637","sigla":["F"]},{"unit":638,"query":false,"span":[189,201],"editors":[],"sigla":["T"],"id":"638","dirty":false,"lemma":"ἠλειμμένος ὦ]","reading":"ἄλλα §SIG:T§"},{"lemma":"]","reading":"(cf. α) λιμοξήρου §SIG:T§","sigla":["T"],"id":"639","dirty":false,"unit":639,"query":false,"span":null,"editors":[]}],"wit":"FT","type":"joke","num":"105","dawe":"105","text":"Φιλάργυρος ἐρωτηθείς· «Διὰ τί οὐδὲν ἄλλο ἐσθίεις εἰ μὴ ἐλαίας;» Eἶπεν· «Ἵνα τὸ μὲν ἔξωθεν ὄψον ἔχω, τὸ δὲ ὀστοῦν ἀντὶ ξύλου· καὶ ἵνα φαγών, μὴ ἀπονίψωμαι, ἀλλὰ τὴν κεφαλήν μου ἐκμαξάμενος, ἠλειμμένος ὦ».","A":"49","n":49,"tr":"A un avaro fu chiesto perché non mangiasse nient’altro che olive, e disse: «Perché l’esterno mi faccia da companatico, il nocciolo da legna; e perché, dopo aver mangiato, invece di lavarmi le mani me le strofini sulla testa e resti unto».","label":"105; cf. α 105"},{"text":"Περὶ λιμοξήρων","type":"section","app":[{"dirty":false,"sigla":["T"],"id":"1427","query":false,"editors":[],"span":[5,14],"unit":53,"reading":"(cf. α) λιμοξήρου §SIG:T§","lemma":"λιμοξήρων]"}]},{"wit":"FT","type":"joke","num":"261","text":"Λιμόξηρος ὕπαρχος τὸ βῆμα αὐτοῦ ἐκέλευσε πρὸς ἀρτοκοπεῖον γενέσθαι.","A":"50","dawe":"261","n":50,"label":"261; esclusiva di β","tr":"Un prefetto morto di fame ordinò che il suo tribunale fosse collocato accanto a un panificio.","app":[]},{"dawe":"220","text":"Λιμόξηρος παιδαγωγός, ἰδὼν ἄρτον ἔν τινι ὕψει κρεμάμενον, εἶπε· «Καταβαίνεις καὶ ἀπαγγέλλεις, ἢ ἀναβαίνων ἀπαρτίζω σε;»","A":"51","num":"220","type":"joke","wit":"FT","tr":"Un precettore morto di fame vide un pane appeso in alto e disse: «Scendi a ripetere la lezione, o devo salire io a sistemarti?».","label":"220; cf. α 228","n":51,"app":[{"dirty":false,"id":"640","sigla":["F","T","Thierfelder"],"editors":["Thierfelder"],"span":[81,92],"query":false,"unit":640,"reading":"§SIG:Thierfelder§ (cf. α) ἐπαγγέλλεις §SIG:F§ : ἀπαγγέλεις §SIG:T§","lemma":"ἀπαγγέλλεις]"},{"lemma":"ἀναβαίνων]","reading":"(iam §SIG:Eberhard§) ἀναβαίνω §SIG:T§","dirty":false,"sigla":["Eberhard","T"],"id":"641","query":false,"editors":["Eberhard"],"span":[96,105],"unit":641}]},{"num":"221","text":"Λιμόξηρος ἰατρός, ἰδὼν ἄρτον διά τινος τρύπης, ἐκσυρτικὸν ἔμπλαστρον ἐτίθει.","dawe":"221","A":"52","type":"joke","wit":"FT","tr":"Un medico morto di fame vide un pane attraverso un buco e vi applicava un impiastro estrattivo.","label":"221; cf. α 221","n":52,"app":[{"reading":"Τ (cf. α) λιμόξηρος σχολαστικὸς §SIG:F§","lemma":"Λιμόξηρος]","dirty":false,"id":"642","sigla":["F"],"editors":[],"span":[0,9],"query":false,"unit":642}]},{"num":"223","A":"53","dawe":"223","text":"Λιμόξηρος, ἰδὼν ἄρτον ἐν ὑπερθύρῳ κείμενον, ἔφη· «Κύριε, ἢ ἐκεῖνον ταπείνωσον, ἢ ἐμὲ ὕψωσον».","wit":"FT","type":"joke","label":"223; cf. α 223","tr":"Un morto di fame vide un pane posato su un architrave e disse: «Signore, o abbassi quello, o innalzi me!».","n":53,"app":[{"lemma":"ὑπερθύρῳ]","reading":"§SIG:Thierfelder§ (cf. α) ὑπαίθρῳ §SIG:F§ : γράφεται ἐν ὑπερώῳ §SIG:F§i.m. : ὑπέρθρῳ §SIG:T§","query":false,"editors":["Thierfelder"],"span":[25,33],"unit":643,"dirty":false,"sigla":["F","T","Thierfelder"],"id":"643"},{"dirty":false,"id":"644","sigla":["T"],"editors":[],"span":[85,91],"query":false,"unit":644,"reading":"(cf. α) ἐξάλειψον §SIG:T§","lemma":"ὕψωσον]"}]},{"text":"Περὶ ὀκνηρῶν","type":"section","app":[]},{"label":"211; cf. α 211","tr":"Mentre due pigri dormivano insieme, un ladro entrò e portò via il loro mantello. E quando uno dei due se ne accorse e disse all’altro: «Alzati, inseguilo!», quello rispose: «Lascia stare: quando verrà a prendere il cuscino, lo acchiapperemo in due».","n":54,"num":"211","text":"Ὀκνηρῶν δύο κοιμωμένων, εἰσελθών τις κλέπτης τὸ σαγίον αὐτῶν ἔλαβεν. Tοῦ δὲ ἑνὸς νοήσαντος καὶ εἰπόντος πρὸς τὸν ἕτερον· «Ἀνάστα, δίωξον αὐτόν», ἔφη· «Ἄφες· ὅταν ἔλθῃ λαβεῖν τὴν τύλην, κρατοῦμεν αὐτὸν οἱ δύο».","A":"54","dawe":"211","wit":"FT","type":"joke","app":[{"editors":[],"span":[48,54],"query":false,"unit":645,"dirty":false,"id":"645","sigla":["T"],"lemma":"σαγίον]","reading":"σαγεῖον §SIG:T§"},{"span":[61,67],"editors":[],"query":false,"unit":646,"dirty":false,"id":"646","sigla":["F"],"reading":"(ἔλαβεν scrib.) ἥρπασε §SIG:F§ πρὸς … ^!ἕτερον (cf. α) τῷ ἑτέρῳ §SIG:F§","lemma":"ἔλαβεν]"},{"unit":647,"query":false,"span":[157,161],"editors":[],"sigla":["F"],"id":"647","dirty":false,"lemma":"ὅταν]","reading":"(cf. α) ἐὰν §SIG:F§"},{"dirty":false,"sigla":["F"],"id":"648","query":false,"editors":[],"span":[178,183],"unit":648,"lemma":"τύλην]","reading":"(cf. α) πύλην §SIG:F§"}]},{"wit":"FT","type":"joke","text":"Ὀκνηρῷ υἱῷ ἐπέταξεν ὁ πατὴρ ἀπελθεῖν εἰς τὸν γείτονα καὶ χρήσασθαι ἀξίνην. Ὁ δὲ ἔφη· «Ἐγώ εἰμι ὁ γείτων· ἀξίνην οὐκ ἔχω».","dawe":"212","A":"55","num":"212","n":55,"tr":"Un padre ordinò al figlio pigro di andare dal vicino a farsi prestare un’accetta. E quello disse: «Sono io il vicino: di accetta non ne ho!».","label":"212; cf. α 212","app":[{"reading":"Lacunam post ἔφη· ex α statuit §SIG:Thierfelder§","lemma":"ἔφη]","id":"649","sigla":["Thierfelder"],"dirty":false,"unit":649,"span":[80,83],"editors":["Thierfelder"],"query":false}]},{"dawe":"213","A":"56","text":"Ὀκνηρὸς ὀκνηρῷ δηνάριον ὤφειλεν. Ὑπηντηκὼς δὲ αὐτῷ, ᾔτει τὸ δηνάριον. Ὁ δέ φησιν· «Εἰς τὸ μάπουλόν μου δέδεται· λύσας ἆρον». Ὁ δέ· «Ἄπελθε, φησίν, ἐπληρώθην».","num":"213","type":"joke","wit":"FT","tr":"Un pigro doveva un denaro a un altro pigro. Lo incontrò e gli chiedeva il denaro. E quello disse: «È legato nel mio fagotto: slegalo e prendilo». E l’altro: «Lascia perdere, sono già stato pagato».","label":"213; cf. α 213","n":56,"app":[{"lemma":"δηνάριον ὤφειλεν]","reading":"§SIG:Braccini§ (cf. α) δηνάριον ὤφειλε δοῦναι §SIG:F§ : ὤφειλε δηνάριον (δεινάριον scrib.) §SIG:T§","sigla":["Braccini","F","T"],"id":"650","dirty":false,"unit":650,"query":false,"editors":["Braccini"],"span":[15,31]},{"reading":"ὑπαντηκὸς §SIG:T§","lemma":"Ὑπηντηκὼς]","dirty":false,"id":"651","sigla":["T"],"span":[33,42],"editors":[],"query":false,"unit":651},{"id":"652","sigla":["T"],"dirty":false,"unit":652,"span":[46,50],"editors":[],"query":false,"reading":"(cf. α) αὐτὸν §SIG:T§","lemma":"αὐτῷ]"},{"query":false,"span":[60,68],"editors":[],"unit":653,"dirty":false,"sigla":["T"],"id":"653","reading":"δεινάριον §SIG:T§","lemma":"δηνάριον]"},{"dirty":false,"sigla":["F"],"id":"654","query":false,"span":[87,98],"editors":[],"unit":654,"reading":"τὸν μάπουλον §SIG:F§","lemma":"τὸ μάπουλόν]"}]},{"tr":"Uno sbevazzone sfortunato ereditò una vigna e morì proprio al tempo della vendemmia.","label":"229; cf. α 237","n":57,"dawe":"229","text":"Ἀτυχὴς μέθυσος, ἀμπελῶνα κληρονομήσας, ἐν καιρῷ τοῦ τρυγητοῦ ἀπέθανεν.","A":"57","num":"229","type":"joke","wit":"FT","app":[]},{"app":[{"reading":"Ante hoc dictum, titulum Περὶ λάγνων γυναικῶν praebet §SIG:T§§SIG:F§et α nihil habent. τὴν … ^!ἀσελγῆ (ἀσελγὴν οὖσαν εἶπε (εἶπεν scrib.) scrib.) (cf. α) τὴν γυναῖκα εἶπεν οὖσαν ἀσελγῆ §SIG:F§","lemma":"Νεανίσκος]","unit":655,"query":false,"span":[0,9],"editors":[],"sigla":["F","T"],"id":"655","dirty":false},{"editors":[],"span":[87,101],"query":false,"unit":656,"dirty":false,"id":"656","sigla":["F","T"],"reading":"(cf. α) ἀφροδιάζομεν §SIG:T§ : ἀφροδιάσομεν §SIG:F§","lemma":"ἀφροδισιάζομεν]"}],"wit":"FT","type":"joke","num":"244","A":"58","text":"Νεανίσκος πρὸς τὴν ἑαυτοῦ γυναῖκα ἀσελγῆ οὖσαν εἶπε· «Κυρία, τί ποιοῦμεν; Ἀριστοῦμεν ἢ ἀφροδισιάζομεν;» Κἀκείνη ἔφη· «Ὡς θέλεις· ψωμὶν οὐκ ἔχομεν».","dawe":"244","n":58,"label":"244; cf. α 244","tr":"Un giovane disse alla propria moglie, che era lasciva: «Signora, che facciamo? Pranziamo o facciamo l’amore?». E quella rispose: «Come vuoi: ma di pane non ne abbiamo!»."},{"tr":"Un giovane ospitò delle vecchiette in amore e disse ai suoi servi: «A quella che vuole versate da bere, e con quella che vuole fate l’amore». E quelle dissero: «Noi non abbiamo sete!».","label":"245; cf. α 245","n":59,"dawe":"245","text":"Γραΐδας ἐρωτευομένας νεανίσκος ξενοδοχήσας, πρὸς τοὺς παῖδας αὐτοῦ ἔφη· «Τὴν θέλουσαν κεράσατε καὶ τὴν θέλουσαν ἀφροδισιάσατε». Kἀκεῖναι εἶπον· «Ἡμεῖς οὐ διψῶμεν».","A":"59","num":"245","wit":"FT","type":"joke","app":[{"unit":657,"span":[112,125],"editors":["Braccini"],"query":false,"id":"657","sigla":["Braccini","F","T"],"dirty":false,"reading":"(cf. α) ἀφροδιάσατε §SIG:T§ : ἀφροδιάσετε §SIG:F§ … ^! §SIG:Braccini§ Περὶ μιγυναικῶν ἀνδρῶν §SIG:T§ : Περὶ μισογυναίου §SIG:F§","lemma":"ἀφροδισιάσατε]"}]},{"text":"Περὶ μισογυναίων ἀνδρῶν","type":"section","app":[{"unit":65,"query":false,"editors":["Braccini"],"span":[0,23],"sigla":["Braccini","F","T"],"id":"1670-1672","dirty":false,"reading":"§SIG:Braccini§ Περὶ μιγυναικῶν ἀνδρῶν §SIG:T§ : Περὶ μισογυναίου §SIG:F§","lemma":"Περὶ μισογυναίων ἀνδρῶν]"}]},{"type":"joke","wit":"FT","dawe":"247","A":"60","text":"Μισογυναίου τὴν γυναῖκα κηδεύοντος, ἠρώτησέ τις· «Τίς ἀνεπαύσατο;» Ὁ δὲ ἔφη· «Ἐγὼ ὁ ταύτης στερηθείς».","num":"247","n":60,"label":"247; cf. α 247","tr":"Mentre un misogino seppelliva la moglie, un tale chiese: «Chi se n’è andato?». E quello rispose: «Io, che mi sono liberato di questa!».","app":[{"id":"658","sigla":["T"],"dirty":false,"unit":658,"editors":[],"span":[0,11],"query":false,"reading":"(cf. α) μισογυναίκου §SIG:T§","lemma":"Μισογυναίου]"},{"lemma":"τις]","reading":"(cf. α) τις, λέγων §SIG:F§","dirty":false,"id":"659","sigla":["F"],"span":[44,47],"editors":[],"query":false,"unit":659}]},{"n":61,"label":"248; cf. α 248","tr":"Un misogino era malato, e poiché la moglie gli disse: «Se muori, mi impiccherò», alzò lo sguardo e disse: «Fammi questo favore mentre sono ancora vivo!».","type":"joke","wit":"FT","num":"248","A":"61","dawe":"248","text":"Μισογύναιος ἀρρωστῶν καὶ τῆς γυναικὸς εἰπούσης αὐτῷ· «Ἐὰν ἀποθάνῃς, ἀπάγξομαι», ἀναβλέψας εἶπε· «Ζῶντί μοι τοῦτο χάρισαι».","app":[{"dirty":false,"sigla":["T"],"id":"660","query":false,"editors":[],"span":[0,11],"unit":660,"lemma":"Μισογύναιος]","reading":"(cf. α) Μισογύναικος §SIG:T§"},{"sigla":["T"],"id":"661","dirty":false,"unit":661,"query":false,"span":null,"editors":[],"lemma":"cf]","reading":"om. §SIG:T§"}]},{"app":[],"type":"section","text":"Περὶ εὐτραπέλων"},{"app":[],"n":62,"label":"141; cf. α 120","tr":"A un timoniere spiritoso fu chiesto che vento tirasse, e rispose: «Fave e cipolle!».","type":"joke","wit":"F","num":"141","A":"62","dawe":"141","text":"Εὐτράπελος κυβερνήτης ἐρωτηθείς, τί φυσᾷ, εἶπε· «Φάβα, καὶ κρόμμυα»."},{"num":"239","text":"Εὐτράπελος τραγῳδὸς ὑπὸ δύο ἠγαπᾶτο γυναικῶν, ὀζοστόμου καὶ ὀζοχνώτου. Kαὶ τῆς μὲν εἰπούσης· «Δός μοι φίλημα», τῆς δὲ εἰπούσης· «Δός μοι περιπλοκάς», ἀνεβόησεν· «Οἴμοι, τί δράσω; Δυσὶ κακοῖς μερίζομαι».","A":"63","dawe":"239","type":"joke","wit":"FT","tr":"Uno spiritoso attore tragico era amato da due donne, una dall’alito cattivo e l’altra tutta puzzolente. E mentre una diceva: «Dammi dei baci!» e l’altra: «Dammi degli abbracci!», quello gridò: «Ahimè, che fare? Sono diviso tra due mali!».","label":"239; cf. α 239","n":63,"app":[{"editors":[],"span":[60,69],"query":false,"unit":662,"dirty":false,"id":"662","sigla":["T"],"reading":"εὐοχνώτου §SIG:T§","lemma":"ὀζοχνώτου]"},{"query":false,"span":[137,147],"editors":[],"unit":663,"dirty":false,"sigla":["T"],"id":"663","lemma":"περιπλοκάς]","reading":"(cf. α) περιπλοκήν §SIG:T§"},{"reading":"φιλήματα §SIG:Dawe§","lemma":"φίλημα]","query":false,"span":[102,108],"editors":["Dawe"],"unit":664,"dirty":false,"sigla":["Dawe"],"id":"664"}]},{"app":[{"reading":"§SIG:Eberhard§ : Εὐτράπελός §SIG:F§§SIG:T y":false,"unit":671,"reading":"ἐπανελθὼν om. §SIG:F§ παρὰ … ^!γυναικός (iam §SIG:Thierfelder§ coniecit) om. §SIG:T§","lemma":"ἐπανελθὼν]"},{"id":"672","sigla":["F"],"dirty":false,"unit":672,"editors":[],"span":[85,91],"query":false,"lemma":"ἤγαγεν]","reading":"αὐτῇ ἔφερεν §SIG:F§"},{"reading":"om. §SIG:F§","lemma":"Ὁ]","dirty":false,"sigla":["F"],"id":"673","query":false,"span":[93,94],"editors":[],"unit":673},{"query":false,"span":[142,148],"editors":["Dawe","Eberhard"],"unit":674,"dirty":false,"sigla":["Dawe","Eberhard"],"id":"674","reading":"προσκεφαλάδιον §SIG:Eberhard§ νεάνιδα … ^!ὡραίαν : ὡραίαν νεάνιδα ὑπαλείφοντα §SIG:Dawe§","lemma":"προσκε-]"}]},{"num":"151","A":"66","text":"Εὐτράπελος, ἰδὼν ἰατρὸν νεάνιδα ὑπαλείφοντα ὡραίαν, ἔφη· «Μὴ τὴν ὄψιν θεραπεύων τὸ βάθος φθείρῃς».","dawe":"151","type":"joke","wit":"FT","label":"151b; cf. α 151 bis","tr":"Uno spiritoso vide un medico che applicava un collirio a una bella ragazza e disse: «Occhio, a non rovinare la pupa, mentre curi la pupilla!».","n":66,"app":[]},{"label":"263; esclusiva di β","tr":"Un tale insultava uno spiritoso, dicendogli: «Ho avuto tua moglie gratis». E quello rispose: «Io sono costretto a sopportare un simile malanno; ma tu che bisogno ne avevi?».","n":67,"num":"263","dawe":"263","A":"67","text":"Εὐτράπελόν τις ἐλοιδόρει, ὅτι «Σοῦ τὴν γυναῖκα δωρεὰν ἔσχον». Ὁ δὲ εἶπεν· «Ἐμοὶ μὲν ἀνάγκη τοιούτου κακοῦ ἀντέχεσθαι· σοὶ δὲ τίς ἀνάγκη;»","wit":"FT","type":"joke","app":[{"lemma":"τοιούτου]","reading":"τοσούτου §SIG:Thierfelder§","id":"675","sigla":["Thierfelder"],"dirty":false,"unit":675,"span":[91,99],"editors":["Thierfelder"],"query":false},{"unit":676,"query":false,"editors":["Eberhard"],"span":[106,116],"sigla":["Eberhard"],"id":"676","dirty":false,"reading":"ἀνέχεσθαι §SIG:Eberhard§","lemma":"ἀντέχεσθαι]"},{"unit":677,"query":false,"span":[118,124],"editors":["deRhoer"],"sigla":["F","T","deRhoer"],"id":"677","dirty":false,"reading":"§SIG:deRhoer§ σοῦ δὲ §SIG:F§§SIG:T§","lemma":"σοὶ δὲ]"}]},{"lab
