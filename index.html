:root{--bg:#f6f1e7;--paper:#fbf8f1;--ink:#241f18;--muted:#7a6f5d;--line:#e3d9c6;--accent:#7a2e1d;--accent2:#1d4e6b;--lem:#9a3412;--lembg:#f3e2cf;--sig:#1d4e6b;--ed:#5b4a2f;--warn:#b45309;--warnbg:#fbe8cf;--alpha:#7a2e1d;--beta:#1d4e6b;--gamma:#3f6212;
--greek:"Gentium Plus Web","New Athena Unicode","Gentium Plus","Calibri","Segoe UI",sans-serif;--sans:"Aptos","Segoe UI","Calibri",system-ui,sans-serif;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--greek);line-height:1.62}
header.top{position:sticky;top:0;z-index:30;background:rgba(40,28,20,.96);color:#f3ece0;padding:.5rem 1rem;display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.18)}
header.top h1{font-size:1.12rem;margin:0;font-weight:600;white-space:nowrap}
header.top .sub{color:#cdbfa6;font-size:.78rem;font-family:var(--sans);margin-left:-.3rem;max-width:24vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recsw{display:flex;border:1px solid #5a4a39;border-radius:8px;overflow:hidden}
.recsw button{font-family:var(--sans);font-size:.85rem;border:none;background:#efe6d4;color:#241f18;padding:.34rem .7rem;cursor:pointer;font-weight:700}
.recsw button.on[data-rec="alpha"]{background:var(--alpha);color:#fff}.recsw button.on[data-rec="beta"]{background:var(--beta);color:#fff}.recsw button.on[data-rec="gamma"]{background:var(--gamma);color:#fff}
#tSync,#tTr{font-family:var(--sans);font-size:.85rem;border:1px solid #5a4a39;background:#efe6d4;color:#241f18;border-radius:8px;padding:.34rem .6rem;cursor:pointer;font-weight:600}
#tSync:hover,#tTr:hover{background:#fff}#tSync.on{background:#5b3a8a;border-color:#5b3a8a;color:#fff}#tTr.on{background:#256;border-color:#256;color:#fff}
.controls{display:flex;gap:.4rem;align-items:center;margin-left:auto;flex-wrap:wrap}
.controls input,.controls button{font-family:var(--sans);font-size:.82rem;border:1px solid #5a4a39;background:#fffdf8;color:#241f18;border-radius:6px;padding:.32rem .5rem}
.controls input{width:120px}.controls input.num{width:70px}.controls button{cursor:pointer;background:#efe6d4}.controls button:hover{background:#fff}
.wrap{display:flex;max-width:1320px;margin:0 auto}
nav.toc{width:240px;flex:0 0 240px;padding:1rem .7rem 3rem;position:sticky;top:52px;height:calc(100vh - 52px);overflow:auto;font-family:var(--sans);font-size:.83rem;border-right:1px solid var(--line)}
#resizer{flex:0 0 7px;cursor:col-resize;position:sticky;top:52px;height:calc(100vh - 52px);background:transparent;transition:background .15s}#resizer:hover,#resizer.drag{background:#cdbf9e}
nav.toc h2{font-size:.7rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin:.4rem .3rem}
nav.toc a{display:flex;justify-content:space-between;gap:.4rem;padding:.26rem .45rem;border-radius:6px;color:var(--ink);text-decoration:none;cursor:pointer}
nav.toc a:hover{background:#ece2cf}nav.toc a .c{color:var(--muted);font-size:.76rem}
nav.toc .qbtn{margin:.6rem .3rem;display:block;width:calc(100% - .6rem);text-align:left;cursor:pointer;background:var(--warnbg);border:1px solid #e7cd9a;color:#7c4a06;border-radius:8px;padding:.5rem .6rem;font-family:var(--sans);font-size:.82rem}
main{flex:1 1 auto;min-width:0;padding:1.1rem 1.5rem 6rem;background:var(--paper)}
.meta{font-family:var(--sans);font-size:.8rem;color:var(--muted);border:1px solid var(--line);background:#fffdf8;border-radius:10px;padding:.7rem .9rem;margin-bottom:1.3rem}
.meta b{color:var(--ink)}.meta .wit{color:var(--sig);font-weight:600}.meta .gk{font-family:var(--greek);color:var(--ink)}
.stats{display:flex;gap:1rem;flex-wrap:wrap;margin-top:.5rem}.stats span{background:#f0e7d5;border-radius:20px;padding:.15rem .7rem;font-size:.76rem}
section.sec{margin:1.6rem 0}section.sec>h2{font-size:1.12rem;color:var(--accent);border-bottom:2px solid var(--line);padding-bottom:.25rem;margin:0 0 .8rem;letter-spacing:.04em}
.beta section.sec>h2{color:var(--beta)}.gamma section.sec>h2{color:var(--gamma)}
.fac{margin:0 0 1.1rem;padding:.1rem 0 .5rem;border-bottom:1px dotted var(--line)}
.fac .num{font-family:var(--sans);font-size:.74rem;color:var(--muted);font-weight:600;display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:.12rem}
.fac .num .big{font-size:.92rem;color:var(--ink)}.fac .num .conc{color:var(--muted);font-weight:400}
.fac .num .w b{background:#e7ddc9;color:#5b4a2f;border-radius:4px;padding:0 .28rem;font-size:.7rem;font-weight:700;margin-left:.15rem}
.xref{cursor:pointer;border:1px solid #b9a7d6;background:#efe7fb;color:#5b3a8a;border-radius:10px;padding:0 .45rem;font-size:.7rem;font-weight:700}.xref:hover{background:#e2d6f6}
.xref.b{border-color:#9ec3d6;background:#e7f1fb;color:#1d4e6b}.xref.g{border-color:#bcd69e;background:#eef7e2;color:#3f6212}
.fac .txt{font-size:1.16rem;text-align:justify}
.fac .txt.missing{color:#a08b6a;font-style:italic;font-family:var(--sans);font-size:.95rem}
.fac .tr{display:none;font-family:var(--sans);font-size:1rem;color:#43617a;margin:.35rem 0 0;padding:.2rem .6rem;border-left:3px solid #cdd9e3;background:#f3f6f9;border-radius:0 6px 6px 0}
.showtr .fac .tr{display:block}
.lem{cursor:pointer;border-bottom:1.5px solid var(--lem);padding:0 .02em}.lem:hover,.lem.hot{background:var(--lembg)}
.app{font-family:var(--greek);font-size:.85rem;color:#4a4234;margin:.4rem 0 0;padding:.4rem .6rem;background:#f4ede0;border-left:3px solid var(--line);border-radius:0 8px 8px 0;display:none}
.app.show{display:block}.app .ln{padding:.12rem 0;border-radius:5px;cursor:pointer}.app .ln:hover,.app .ln.hot{background:#eadfc8}
.app .lm{font-weight:600;color:#3a3225}.app .sig{font-style:italic;color:var(--sig);font-weight:600}.app .ed{font-variant:small-caps;color:var(--ed)}
.app .q{background:var(--warnbg);border-left:3px solid var(--warn);padding:.18rem .4rem;border-radius:5px}

<script>
const DB={"recs": {"alpha": {"title": "Φιλόγελως ἐκ τῶν Ἱεροκλέους καὶ Φιλαγρίου γραμματικοῦ", "units": [{"type": "titulus", "text": "Φιλόγελως ἐκ τῶν Ἱεροκλέους καὶ Φιλαγρίου γραμματικοῦ", "app": [{"id": "2-8", "dirty": false, "lemma": "Φιλόγελως … γραμματικοῦ]", "reading": "εκ του Φιλογέλους: περί Σχολαστικών §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 0, "span": [0, 53]}]}, {"type": "section", "text": "σχολαστικοί", "app": []}, {"type": "joke", "n": 1, "num": "1", "label": "1; 1 β", "wit": "AM", "text": "Σχολαστικὸς ἀργυροκόπῳ ἐπέταξε λύχνον ποιῆσαι. τοῦ δὲ ἐξετάσαντος, πηλίκον ποιήσει, ἀπεκρίνατο· Ὡς πρὸς ὀκτὼ ἀνθρώπους.", "app": [], "A": "1", "dawe": "1", "tr": "Uno scholastikos commissionò ad un artigiano dell’argento di realizzare una lucerna. A quello che chiedeva quanto l’avrebbe dovuta fare grande, rispondeva: «tipo per otto persone»."}, {"type": "joke", "n": 2, "num": "2", "label": "2; 2 β", "wit": "AM", "text": "Σχολαστικὸς κολυμβῶν παρὰ μικρὸν ἐπνίγη· ὤμοσε δὲ εἰς ὕδωρ μὴ εἰσελθεῖν, ἐὰν μὴ μάθῃ πρῶτον καλῶς κολυμβᾶν.", "app": [{"id": "37", "dirty": false, "lemma": "ἐπνίγη]", "reading": "ἐπνίγει §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 3, "span": [33, 39]}], "A": "2", "dawe": "2", "tr": "Uno scholastikos, tuffandosi, per poco non affogò: giurò che non sarebbe più entrato in acqua, se non avesse prima imparato bene a nuotare."}, {"type": "joke", "n": 3, "num": "3", "label": "3; 183 α", "wit": "AM", "text": "Σχολαστικῷ τις ἰατρῷ προσελθὼν εἶπεν· Ἰατρέ, ὅταν ἀναστῶ ἐκ τοῦ ὕπνου, ἡμιώριον ἐσκότωμαι καὶ εἶθ’ οὕτως ἀποκαθίσταμαι. καὶ ὁ ἰατρός· Μετὰ τὸ ἡμιώριον ἐγείρου.", "app": [{"id": "57", "dirty": false, "lemma": "ἰατρῷ]", "reading": "ἰητρῷ §SIG:A§ cf. app. crit. 6, 7, 27", "sigla": ["A"], "editors": [], "query": false, "unit": 4, "span": [15, 20]}], "A": "3", "dawe": "3", "tr": "Un tale si recò da un medico scholastikos e disse «dottore, quando mi sveglio dal sonno sono annebbiato per mezz’ora, e poi mi riprendo» e il medico «svegliati mezz’ora dopo»."}, {"type": "joke", "n": 4, "num": "4", "label": "4; 3 β; cf. 161 α", "wit": "AM", "text": "Σχολαστικοῦ ἵππον πιπράσκοντος ἠρώτησέ τις, εἰ πρωτοβόλος ἐστίν. τοῦ δὲ εἰπόντος δευτεροβόλον εἶναι, εἶπε· Πῶς οἶδας; ὁ δὲ ἀπεκρίνατο· Ὅτι ἅπαξ ἐμὲ ἔβαλε κάτω καὶ ἅπαξ τὸν πατέρα μου.", "app": [{"id": "87", "dirty": false, "lemma": "ἵππον]", "reading": "ἵππου §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 5, "span": [12, 17]}], "A": "4", "dawe": "4", "tr": "Uno scholastikos vendeva un cavallo, e un tale gli domandò se fosse giovane e e gli fosse caduto il primo dente. Quando quello disse che gli era caduto anche il secondo, fece: «Come lo sai?» e quello rispose «Perché una volta ha disarcionato me, e una volta ha fatto cadere mio padre».»."}, {"type": "joke", "n": 5, "num": "5", "label": "5; 4 β", "wit": "AM", "text": "Σχολαστικῷ τις ἀπαντήσας ἔφη· Κύριε σχολαστικέ, καθ’ ὕπνους σε εἶδον. ὁ δέ· Μὰ τοὺς θεούς, εἶπεν, ἀσχολῶν οὐ προσέσχον.", "app": [{"id": "121", "dirty": false, "lemma": "ἀπαντήσας]", "reading": "§SIG:M§ hic et ubique (scrive Dawe ma che vo di?)", "sigla": ["M"], "editors": ["Dawe"], "query": true, "unit": 6, "span": [15, 24]}, {"id": "131", "dirty": false, "lemma": "Μὰ]", "reading": "μα §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 6, "span": [76, 78]}, {"id": "137", "dirty": false, "lemma": "προσέσχον]", "reading": "προσέχων §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 6, "span": [109, 118]}], "A": "5", "dawe": "5", "tr": "Un tale si imbattè in uno scholastikos e gli disse: «Signor scholastikos, ti ho visto in sogno!» e quello: «Per gli dèi! Siccome ero impegnato, non ci ho fatto caso»."}, {"type": "joke", "n": 6, "num": "6", "label": "6; 15 β", "wit": "AM", "text": "Σχολαστικὸς ἰδὼν τὸν κατὰ συνήθειαν αὐτοῦ ἰατρὸν ἐρχόμενον περιεστέλλετο αὐτῷ ὀφθῆναι. ἐπερωτηθεὶς δὲ παρά τινος αὐτοῦ ἑταίρου, διὰ τί αὐτὸ ποιεῖ, ἀπεκρίθη· Πολὺς χρόνος ἐστὶν ἀφ’ οὗ οὐκ ἐνόσησα, καὶ ἐντρέπομαι αὐτόν.", "app": [{"id": "148", "dirty": false, "lemma": "ἰατρὸν]", "reading": "ἰητρὸν §SIG:A§ cf. app. crit. 3", "sigla": ["A"], "editors": [], "query": false, "unit": 7, "span": [42, 48]}, {"id": "150", "dirty": false, "lemma": "περιεστέλλετο]", "reading": "qui Dawe inserisce un το per l’infinito: devo riportarlo in apparato?", "sigla": [], "editors": ["Dawe"], "query": true, "unit": 7, "span": [59, 72]}, {"id": "161", "dirty": false, "lemma": "αὐτὸ]", "reading": "τοῦτο §SIG:Minas§", "sigla": ["Minas"], "editors": ["Minas"], "query": false, "unit": 7, "span": [135, 139]}], "A": "6", "dawe": "6", "tr": "Uno scholastikos vedendo arrivare il proprio medico di fiducia si preoccupava di non farsi vedere da quello. Un suo amico gli domandò perché facesse ciò, e rispose: «È molto tempo che non mi ammalo più, e mi vergogno con lui»."}, {"type": "joke", "n": 7, "num": "7", "label": "7", "wit": "AM", "text": "Σχολαστικῷ τὴν σταφυλὴν τμηθέντι παρήγγειλεν ὁ ἰατρὸς μὴ λαλεῖν. ὁ δὲ τῷ δούλῳ αὐτοῦ ἐπέταξεν ἀντασπάζεσθαι ἀντ’ αὐτοῦ τοὺς προσαγορεύοντας. εἶτα αὐτὸς πρὸς ἕκαστον ἔλεγε· Μὴ πρὸς ὕβριν αὐτὸ δέξῃ, εἰ ὁ δοῦλός μου ἀντ’ ἐμοῦ ἀσπάζεταί σε· ἐκέλευσε γάρ με ὁ ἰατρὸς μὴ λαλεῖν.", "app": [{"id": "218", "dirty": false, "lemma": "ἰατρὸς]", "reading": "ἰητρὸς utroque loco §SIG:A§ cf. app. crit. 3", "sigla": ["A"], "editors": [], "query": false, "unit": 8, "span": [47, 53]}], "A": "7", "dawe": "7", "tr": "Il medico ordinò ad uno scholastikos cui era stata amputata l’ugola, di non parlare. Questo allora diede disposizione al proprio servo di rispondere al suo posto a quelli che lo salutavano. Poi proprio lui diceva a ciascuno: «Non prenderlo come una mancanza di rispetto, se ti saluta il mio schiavo al posto mio: il dottore mi ha infatti comandato di non parlare»."}, {"type": "joke", "n": 8, "num": "8", "label": "8; 8 β", "wit": "AM", "text": "Σχολαστικὸς θέλων πιάσαι μῦν τὸν τὰ βιβλία αὐτοῦ τρώγοντα κρέας δακὼν ἐν τῇ σκοτίᾳ ἐκάθετο.", "app": [{"id": "226-228", "dirty": false, "lemma": "θέλων … μῦν]", "reading": "θέλων μῦν πιάσαι §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 9, "span": [12, 28]}, {"id": "235", "dirty": false, "lemma": "δακὼν]", "reading": "δακεῖν §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 9, "span": [64, 69]}, {"id": "237-238", "dirty": false, "lemma": "τῇ σκοτίᾳ]", "reading": "σκοτία §SIG:A§ : σκοτεία §SIG:M§", "sigla": ["A", "M"], "editors": [], "query": false, "unit": 9, "span": [73, 82]}], "A": "8", "dawe": "8", "tr": "Uno scholastikos volendo prendere il topo che mangiava i suoi libri, addentò della carne e si sedette al buio."}, {"type": "joke", "n": 9, "num": "9", "label": "9; 9 β", "wit": "AM", "text": "Σχολαστικὸς θέλων αὐτοῦ τὸν ὄνον διδάξαι μὴ τρώγειν οὐ παρέβαλεν αὐτῷ τροφάς. ἀποθανόντος δὲ τοῦ ὄνου ἀπὸ λιμοῦ ἔλεγε· Μεγάλα ἐζημιώθην· ὅτε γὰρ ἔμαθε μὴ τρώγειν, τότε ἀπέθανεν.", "app": [{"id": "271", "dirty": false, "lemma": "ἀπέθανεν]", "reading": "ἀπέθανε §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 10, "span": [168, 176]}], "A": "9", "dawe": "9", "tr": "Uno scholastikos voleva insegnare al proprio asino a non mangiare e non gli diede cibo. Quando l’asino morì, diceva: «Sono proprio rovinato! Quando aveva appena imparato a non mangiare, allora è morto»!"}, {"type": "joke", "n": 10, "num": "10", "label": "10; cf. 163 α", "wit": "AM", "text": "Σχολαστικὸς ἵππον πιπράσκων ἠρωτήθη, μὴ δειλὸς εἴη. ὁ δὲ εἶπεν· Οὐ μὰ τὴν τοῦ πατρός μου σωτηρίαν· ἐν τῷ σταύλῳ γὰρ μόνος ἔστηκεν.", "app": [{"id": "282", "dirty": false, "lemma": "δειλὸς]", "reading": "δηλὸς §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 11, "span": [40, 46]}], "A": "10", "dawe": "10", "tr": "A uno scholastikos che vendeva un cavallo fu chiesto se non fosse pauroso. Quello allora disse: «No, per la salvezza di mio padre: nella stalla, infatti, è stato da solo»."}, {"type": "joke", "n": 11, "num": "11", "label": "11; 11 β", "wit": "AM", "text": "Σχολαστικὸς θέλων ἰδεῖν, εἰ πρέποι αὐτῷ κοιμᾶσθαι, καμ‹μ›ύσας ἐνωπτρίζετο.", "app": [{"id": "312", "dirty": false, "lemma": "ἐνωπτρίζετο]", "reading": "ἐνοπτρίζετο §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 12, "span": [62, 73]}], "A": "11", "dawe": "11", "tr": "Uno scholastikos volendo vedere se per lui fosse decoroso dormire, chiuse gli occhi e si osservò allo specchio."}, {"type": "joke", "n": 12, "num": "12", "label": "12", "wit": "AM", "text": "Σχολαστικῷ ἀποδημοῦντι φίλος αὐτοῦ ἔλεγεν· Ἀξιῶ σε δύο παῖδας ἀγοράσαι μοι, ‹ἑκάτερον› πεντεκαίδεκα ἐτῶν. ὁ δὲ εἶπεν· Ἐὰν τοιούτους μὴ εὕρω, ἀγοράσω σοι ἕνα τριάκοντα ἐτῶν.", "app": [{"id": "324", "dirty": false, "lemma": "ἀγοράσαι]", "reading": "ἀγόρασαί §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 13, "span": [62, 70]}, {"id": "326", "dirty": false, "lemma": "ἑκάτερον]", "reading": "§SIG:Eberhard§ ἐκ §SIG:A§ §SIG:M§", "sigla": ["A", "Eberhard", "M"], "editors": ["Eberhard"], "query": false, "unit": 13, "span": [77, 85]}], "A": "12", "dawe": "12", "tr": "Ad uno scholastikos che partiva per un viaggio un suo amico disse: «Ti chiedo di comprarmi due schiavi, entrambi di quindici anni». Quello allora disse: «Se non li trovo così, te ne prenderò uno di trenta anni»."}, {"type": "joke", "n": 13, "num": "13", "label": "13; cf. 158 α", "wit": "AM", "text": "Σχολαστικοὶ δύο [πατραλοῖαι] ἐδυσφόρουν πρὸς ἀλλήλους ἐπὶ τῷ τοὺς πατέρας αὐτῶν ζῆν. τοῦ δὲ ἑνὸς εἰπόντος· Θέλεις οὖν ἀποπνίξει ἕκαστος ἡμῶν τὸν ἴδιον; Μὴ γένοιτο, εἶπεν ὁ ἄλλος, ἵνα μὴ πατραλοῖαι ἀκούσωμεν. ἀλλ’ εἰ βούλει, σὺ τὸν ἐμὸν σφάξον, κἀγὼ τὸν σόν.", "app": [{"id": "348", "dirty": false, "lemma": "πατραλοῖαι]", "reading": "del. §SIG:Eberhard§ , πατροκτόνον prop. §SIG:Thierfelder§", "sigla": ["Eberhard", "Thierfelder"], "editors": ["Eberhard", "Thierfelder"], "query": false, "unit": 14, "span": [17, 27]}, {"id": "364", "dirty": false, "lemma": "ἀποπνίξει]", "reading": "ἀποπνίξαι §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 14, "span": [118, 127]}], "A": "13", "dawe": "13", "tr": "Due scholastikoi si lamentavano l’un l’altro del fatto che i loro padri fossero in vita. Quando uno dei due disse: «Vuoi dunque che ciascuno ammazzi il proprio padre?», l’altro rispose: «Non sia mai, ché non abbiamo la reputazione di parricidi! Ma se vuoi, ammazza tu il mio, e io il tuo»."}, {"type": "joke", "n": 14, "num": "14", "label": "14; 12 β", "wit": "A", "text": "Σχολαστικὸς οἰκίας πριάμενος, εἶτα διὰ τῆς θυρίδος παρακύψας ἠρώτα τοὺς παρερχομένους, εἰ πρέπει αὐτῷ.", "app": [], "A": "14", "dawe": "14", "tr": "Uno scholastikos che comprava una casa, sportosi allora alla finestra chiedeva ai passanti se gli si addicesse."}, {"type": "joke", "n": 15, "num": "15", "label": "15; 13 β", "wit": "AM", "text": "Σχολαστικὸς καθ’ ὕπνους ἧλον πεπατηκέναι δόξας τὸν πόδα περιέδησεν. ἑταῖρος δὲ αὐτοῦ πυθόμενος τὴν αἰτίαν καὶ γνούς· Δικαίως, ἔφη, μωροὶ καλούμεθα. διὰ τί γὰρ ἀνυπόδητος κοιμᾶσαι;", "app": [{"id": "411-412", "dirty": false, "lemma": "καθ ὕπνους]", "reading": "om. §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 16, "span": [12, 23]}, {"id": "415-416", "dirty": false, "lemma": "δόξας τὸν]", "reading": "δόξας, τὸν §SIG:A§ §SIG:M§", "sigla": ["A", "M"], "editors": [], "query": false, "unit": 16, "span": [41, 50]}, {"id": "435", "dirty": false, "lemma": "κοιμᾶσαι]", "reading": "κοιμᾶσε §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 16, "span": [170, 178]}], "A": "15", "dawe": "15", "tr": "Uno scholastikos, credendo di _______________ un chiodo in sogno, si fasciò il piede. Un suo amico, chiesta e saputane la ragione, disse: «Giustamente siamo chiamati scemi! Perché infatti dormi scalzo?!»."}, {"type": "joke", "n": 16, "num": "16", "label": "16", "wit": "AM", "text": "Σχολαστικὸς βιβλίον αὐτοῦ ἐπιζητῶν ἐπὶ πολλὰς ἡμέρας καὶ μὴ εὑρίσκων, ὡς κατὰ τύχην μαρούλια ἤσθιεν, ἐπιστραφεὶς ἐπί τινος γωνίας εἶδε κείμενον τὸ βιβλίον. ὕστερον δὲ φίλῳ ἀπαντήσας ὀδυρομένῳ, ὡς τὴν στολὴν τῶν ἱματίων αὐτοῦ ἀπολέσαντι· Μὴ δυσφόρει, ἔφη, ἀλλὰ μαρούλια ἀγοράσας καὶ ἐσθίων αὐτὰ πρὸς τὴν γωνίαν ἐπιστραφεὶς πρόσσχες, καὶ εὑρήσεις αὐτά.", "app": [{"id": "472", "dirty": false, "lemma": "ἀπολέσαντι]", "reading": "ἀπολέσαντα §SIG:A§ : ἀπωλέσαντα §SIG:M§", "sigla": ["A", "M"], "editors": [], "query": false, "unit": 17, "span": [225, 235]}, {"id": "486", "dirty": false, "lemma": "πρόσσχες]", "reading": "(qui forse ha senso specificarlo) §SIG:Thierfelder§ πρόσχες §SIG:A§ §SIG:M§", "sigla": ["A", "M", "Thierfelder"], "editors": ["Thierfelder"], "query": true, "unit": 17, "span": [322, 330]}], "A": "16", "dawe": "16", "tr": "Uno scholastikos che cercava un suo libro da molti giorni e non lo trovava, quando si era trovato a mangiare della lattuga, si voltò e vide il libro giacere in un angolo. Successivamente, incontrato un amico che si lamentava perché aveva perso la sua____________, disse: «Non abbatterti, ma compra della lattuga, e mentre la mangi voltati e va’ nell’angolo, e la troverai»."}, {"type": "joke", "n": 17, "num": "17", "label": "17; 36 β", "wit": "AM", "text": "Σχολαστικῷ ἑταῖρος ἀποδημῶν ἔγραψεν, ἵνα αὐτῷ βιβλία ἀγοράσῃ. ὁ δὲ ἀμελήσας, ἐπανελθόντι αὐτῷ ἀπαντήσας· Τὴν ἐπιστολήν, εἶπεν, ἣν περὶ τῶν βιβλίων ἀπέστειλας, οὐκ ἐδεξάμην.", "app": [{"id": "501", "dirty": false, "lemma": "ἀγοράσῃ]", "reading": "ἀγοράσει §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 18, "span": [53, 60]}, {"id": "507", "dirty": false, "lemma": "ἀπαντήσας]", "reading": "om. §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 18, "span": [94, 103]}, {"id": "511-517", "dirty": false, "lemma": "ἣν … ἐδεξάμην]", "reading": "cf. 45 α τὴν περί τῶν βιβλίων ἐπιστολήν, εἶπεν, ἣν οὐκ ἐδεξάμην ἀπέστειλας §SIG:A§ §SIG:M§", "sigla": ["A", "M"], "editors": [], "query": false, "unit": 18, "span": [127, 171]}], "A": "17", "dawe": "17", "tr": "Un amico che era in un viaggio all’estero scrisse ad uno scholastikos di acquistargli dei libri. Quello non se ne diede cura e, incontrato l’amico rientrato, disse: «La lettera che mi hai mandato a proposito dei libri, non l’ho ricevuta»."}, {"type": "joke", "n": 18, "num": "18", "label": "18", "wit": "AM", "text": "Σχολαστικῷ τις ἀπαντήσας εἶπεν·Ὁ δοῦλος, ὃν ἐπώλησάς μοι, ἀπέθανε. Μὰ τοὺς θεούς, ἔφη, παρ’ ἐμοὶ ὅτε ἦν, τοιοῦτον οὐδὲν ἐποίησεν.", "app": [{"id": "540", "dirty": false, "lemma": "ἐποίησεν]", "reading": "ἐποίησε §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 19, "span": [120, 128]}], "A": "18", "dawe": "18", "tr": "Un tale incontrò uno scholastikos e disse: «Lo schiavo che mi hai venduto è morto». «Per gli dèi!» disse lo scholastikos, «quando era da me, non ha mai fatto niente del genere!»."}, {"type": "joke", "n": 19, "num": "19", "label": "19; 19 β", "wit": "AM", "text": "Σχολαστικὸς ἰδὼν πολλοὺς στρουθοὺς ἐπὶ δένδρου ἑστῶτας, ἁπλώσας τὸν κόλπον ἔσειε [καὶ] τὸ δένδρον ὡς ὑποδεξόμενος τοὺς στρουθούς.", "app": [{"id": "555-556", "dirty": false, "lemma": "ἔσειε καὶ]", "reading": "ἔσειε §SIG:Minas§", "sigla": ["Minas"], "editors": ["Minas"], "query": false, "unit": 20, "span": [75, 85]}], "A": "19", "dawe": "19", "tr": "Uno scholastikos che aveva visto molti passeri appollaiati su un albero, distese la piega dell’abito e scuoteva l’albero per raccogliere i passeri."}, {"type": "joke", "n": 20, "num": "20", "label": "20", "wit": "AM", "text": "Σχολαστικοὶ δύο ἀπὸ δείπνου ἀλλήλους ἀποκαθιστῶντες κατὰ τιμὴν οὐκ ἐκοιμήθησαν.", "app": [{"id": "569-570", "dirty": false, "lemma": "ἀλλήλους ἀποκαθιστῶντες]", "reading": "ἀλλήλως ἀποκαθιστῶντας §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 21, "span": [28, 51]}], "A": "20", "dawe": "20", "tr": "Due scholastikoi che si erano accompagnati a vicenda di ritorno da una cena, per ossequio/riverenza/cortesia non si coricarono/andarono a dormire."}, {"type": "joke", "n": 21, "num": "21", "label": "21", "wit": "AM", "text": "Σχολαστικὸς καθευδῆσαι βουλόμενος, μὴ ἔχων προσκεφάλαιον ἐκέλευσε τῷ δούλῳ κεράμιον ὑποθεῖναι. τοῦ δὲ εἰπόντος, ὅτι σκληρόν ἐστι, πτερῶν αὐτὸ γεμισθῆναι ἐκέλευσεν.", "app": [{"id": "587", "dirty": false, "lemma": "ὑποθεῖναι]", "reading": "ὑποθῆναι §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 22, "span": [84, 93]}, {"id": "594", "dirty": false, "lemma": "πτερῶν]", "reading": "πτερὸν §SIG:A§ §SIG:M§", "sigla": ["A", "M"], "editors": [], "query": false, "unit": 22, "span": [130, 136]}, {"id": "595", "dirty": false, "lemma": "αὐτὸ]", "reading": "§SIG:Eberhard§ αὐτῷ §SIG:A§ §SIG:M§ : om. §SIG:Minas§", "sigla": ["A", "Eberhard", "M", "Minas"], "editors": ["Eberhard", "Minas"], "query": false, "unit": 22, "span": [137, 141]}, {"id": "597", "dirty": false, "lemma": "ἐκέλευσεν]", "reading": "ἐκέλευσε §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 22, "span": [153, 162]}], "A": "21", "dawe": "21", "tr": "Uno scholastikos che voleva dormire, poiché non aveva un cuscino ordinò allo schiavo di mettergli sotto un vaso. Quando quello diceva che era duro, gli ordinò di riempirlo di piume."}, {"type": "joke", "n": 22, "num": "22", "label": "22; 22 β [et 3 γ?]", "wit": "AM", "text": "Σχολαστικὸς ἀπαντήσας τινὶ φίλῳ αὐτοῦ εἶπεν· Ἤκουσα, ὅτι ἀπέθανες. ὁ δὲ ἀπεκρίνατο· Ἀλλ’ ὁρᾷς με ζῶντα. καὶ ὁ σχολαστικός· Καὶ μὴν ὁ εἰπών μοι κατὰ πολὺ σοῦ ἀξιοπιστότερος ἦν.", "app": [{"id": "630-631", "dirty": false, "lemma": "πολὺ σοῦ]", "reading": "πολύ σου §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 23, "span": [148, 156]}], "A": "22", "dawe": "22", "tr": "Uno scholastikos incontrò un suo amico e disse: «Ho sentito che sei morto». Quello rispose: «Ma mi vedi vivo!» e lo scholastikos: «Ma quello che me l’ha detto è molto più credibile di te»."}, {"type": "joke", "n": 23, "num": "23", "label": "23; 135 α", "wit": "AM", "text": "Σχολαστικὸς κατὰ πρώτην ἄνοιξιν τοῦ βαλανείου εἰσελθὼν καὶ μηδένα εὑρὼν ἔσω λέγει πρὸς τὸν δοῦλον αὐτοῦ· Ἐξ ὧν βλέπω, μὴ οὐ λούει τὸ βαλανεῖον.", "app": [{"id": "646", "dirty": false, "lemma": "μηδένα]", "reading": "μὴδ’ ἕνα §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 24, "span": [59, 65]}, {"id": "657", "dirty": false, "lemma": "μὴ]", "reading": "del. §SIG:Thierfelder§ coll. 135 α, sed cf. K.G. I 224 n.7", "sigla": ["Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 24, "span": [118, 120]}, {"id": "660-661", "dirty": false, "lemma": "τὸ βαλανεῖον]", "reading": "fort. delendum cf. 135 α. Post βαλανεῖον notam interrogationis §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 24, "span": [130, 142]}], "A": "23", "dawe": "23", "tr": "Uno scholastikos entra alla prima apertura delle terme e non trovando nessuno all’interno dice al proprio servo: «Da ciò che vedo, il bagno non lava»."}, {"type": "joke", "n": 24, "num": "24", "label": "24 [cf. 4 γ?]", "wit": "AM", "text": "Σχολαστικὸς μαχόμενος τῷ πατρὶ λέγει πρὸς αὐτόν· Κακὲ δοῦλε, οὐχ ὁρᾷς, οἶά με ἐζημίωσας; εἰ γὰρ σὺ μὴ ἐγεννήθης, ἐγὼ ἂν τὸν πάππον μου ἐκληρονόμησα.", "app": [{"id": "678", "dirty": false, "lemma": "οἶά]", "reading": "οἵα §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 25, "span": [71, 74]}, {"id": "685", "dirty": false, "lemma": "ἐγεννήθης]", "reading": "ἐγενήθης §SIG:M§ ac", "sigla": ["M"], "editors": [], "query": false, "unit": 25, "span": [102, 111]}], "A": "24", "dawe": "24", "tr": "Uno scholastikos litigando col padre gli dice: «Brutto schiavo, non vedi come mi hai rovinato? Se tu non fossi nato, io erditerei la fortuna di mio nonno!»."}, {"type": "joke", "n": 25, "num": "25", "label": "25", "wit": "AM", "text": "Σχολαστικὸς ἐν τῷ πλέειν χειμῶνος ὄντος σφοδροῦ καὶτῶν οἰκετῶν κλαιόντων· Μὴ κλαίετε, ἔφη· πάντας γὰρ ὑμᾶς ἐν διαθήκαις ἐλευθέρους ἀφῆκα.", "app": [{"id": "703", "dirty": false, "lemma": "οἰκετῶν]", "reading": "ἱκετῶν §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 26, "span": [55, 62]}, {"id": "710", "dirty": false, "lemma": "ὑμᾶς]", "reading": "§SIG:Boissonade§ ἡμᾶς §SIG:A§ §SIG:M§", "sigla": ["A", "Boissonade", "M"], "editors": ["Boissonade"], "query": false, "unit": 26, "span": [102, 106]}], "A": "25", "dawe": "25", "tr": "Uno scholastikos in una navigazione, poiché c’era una violenta tempesta e i servi si lamentavano, disse: «Non piangete: infatti vi ho reso tutti liberi nel testamento»."}, {"type": "joke", "n": 26, "num": "26", "label": "26", "wit": "AM", "text": "Σχολαστικὸς ἐρευνῶν, ποῦ ὀφείλει κτίσαι ἑαυτῷ οἴκημα [ἤγουν μνῆμα], εἰπόντων δὲ τινῶν, ὅτι καλὸν εἴη ὧδέ που, ἔφη· Ἀλλὰ νοσώδης ὁ τόπος.", "app": [{"id": "722", "dirty": false, "lemma": "κτίσαι]", "reading": "κτῆσαι §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 27, "span": [33, 39]}, {"id": "725-726", "dirty": false, "lemma": "ἤγουν μνῆμα]", "reading": "glossam agnovit §SIG:Boissonade§", "sigla": ["Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 27, "span": [54, 65]}, {"id": "732", "dirty": false, "lemma": "εἴη]", "reading": "ἀν εἴη prop. §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 27, "span": [97, 100]}], "A": "26", "dawe": "26", "tr": "Uno scholastikos cercava dove, e quando certi gli dicevano che lì era bello, disse: «Ma il luogo è malsano»."}, {"type": "joke", "n": 27, "num": "27", "label": "27; 81 α", "wit": "AM", "text": "Σχολαστικὸς νοσῶν συνετάξατο τῷ ἰατρῷ, εἰ θεραπευθείη, μισθὸν δώσειν. ὡς οὖν οἶνον ἐν τῷ πυρέσσειν πίνοντι αὐτῷ ἐπετίμα ἡ γυνή· Σὺ δὲ ὑγιάναντα βούλει με, ἔφη, ἀναγκασθῆναι τῷ ἰατρῷ τὸν μισθὸν δώσειν;", "app": [{"id": "753", "dirty": false, "lemma": "δώσειν]", "reading": "δόσειν §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 28, "span": [62, 68]}, {"id": "759", "dirty": false, "lemma": "πυρέσσειν]", "reading": "πυρέσειν §SIG:M§ : πυρέττειν §SIG:Thierfelder§ cf. 81 α, 194 α, 30 β", "sigla": ["M", "Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 28, "span": [89, 98]}, {"id": "770", "dirty": false, "lemma": "ἔφη]", "reading": "έχειν §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 28, "span": [155, 158]}, {"id": "775", "dirty": false, "lemma": "μισθὸν 2]", "reading": "μιστὸν §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 28, "span": [55, 61]}], "A": "27", "dawe": "27", "tr": "Uno scholastikos che stava male stabilì col medico che, se fosse guarito, avrebbe dato una ricompensa. Quando dunque la moglie lo biasimava perché beveva vino con la febbre, disse: «Tu vuoi che io, guarito, sia costretto a dare la ricompensa al medico?!»."}, {"type": "joke", "n": 28, "num": "28", "label": "28", "wit": "AM", "text": "Σχολαστικοῦ τὸν ἀντίχειρον κύων ἔδακεν. ὁ δὲ εἶπεν· Εἰ τὸ ἱμάτιον ἐπίασεν, ἐσχισμένον ἂν εἴη.", "app": [{"id": "793-794", "dirty": false, "lemma": "ἂν εἴη]", "reading": "ἂν ἦν §SIG:Minas§", "sigla": ["Minas"], "editors": ["Minas"], "query": false, "unit": 29, "span": [86, 92]}], "A": "28", "dawe": "28", "tr": "Un cane morse il pollice di uno scholastikos. Questo disse: «Se avesse preso il mantello, si sarebbe lacerato!»."}, {"type": "joke", "n": 29, "num": "29", "label": "29; 29 β [et 5 γ?]", "wit": "AM", "text": "Διδύμων ἀδελφῶν ὁ ἕτερος ἐτελεύτησε. σχολαστικὸς οὖν προσελθὼν τῷ ζῶντι εἶπε· Σὺ ἀπέθανες ἢ ὁ ἀδελφός σου;", "app": [], "A": "29", "dawe": "29", "tr": "Di due gemelli, uno morì. Uno scholastikos si imbatté dunque in quello vivo e disse: «Sei morto tu, o tuo fratello?»."}, {"type": "joke", "n": 30, "num": "30", "label": "30; 93 α et 29 β", "wit": "AM", "text": "Σχολαστικὸς ναυαγεῖν μέλλων ᾔτει πινακίδας, ἵνα διαθήκας γράψῃ.", "app": [{"id": "831", "dirty": false, "lemma": "ᾔτει]", "reading": "ἤτοι §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 31, "span": [28, 32]}], "A": "30", "dawe": "30", "tr": "Uno scholastikos stando per naufragare chiedeva le tavolette per scrivere il testamento."}, {"type": "joke", "n": 31, "num": "31", "label": "31; 95 α et 30 β", "wit": "AM", "text": "Σχολαστικὸς διαπερᾶσαι ‹ποταμὸν› βουλόμενος ἀνέβη εἰς τὸ πλοῖον μετὰ τοῦ ἵππου ἐποχούμενος. Πυθομένου δέ τινος, διὰ τί οὐ κάτεισι· Σπουδάζω, ἔφη.", "app": [{"id": "846", "dirty": false, "lemma": "ποταμὸν]", "reading": "§SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 32, "span": [24, 31]}, {"id": "875-876", "dirty": false, "lemma": "δέ τινος]", "reading": "om. §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 32, "span": [102, 110]}], "A": "31", "dawe": "31", "tr": "Uno scholastikos che voleva attraversare un fiume, salì sull’imbarcazione sul cavallo (manca traduzione di ἐποχούμενος, io uso preposizione “sul” per dare idea del “Montare”). Quando uno gli chiese perché non scendesse, disse: «Ho fretta!»."}, {"type": "joke", "n": 32, "num": "32", "label": "32", "wit": "AM", "text": "Σχολαστικὸς ἐπὶ δεῖπνον κληθεὶς οὐκ ἤσθιεν. ἐρωτήσαντος δέ τινος τῶν κεκλημένων· Διὰ τί οὐκ ἐσθίεις; ἔφη· Ἵνα μὴ τοῦ φαγεῖν ἕνεκα δόξω παρεῖναι.", "app": [], "A": "32", "dawe": "32", "tr": "Uno scholastikos fu invitato a una cena e non mangiava. Qualcuno degli invitati gli chiese: «Perché non mangi?» e disse: «Perché io non sembri essere venuto qui per il cibo»."}, {"type": "joke", "n": 33, "num": "33", "label": "33", "wit": "AM", "text": "Σχολαστικοῦ υἱὸς ἐσφαίριζε. πεσούσης οὖν εἰς φρέα τῆς σφαίρας, παρακύψας καὶ ἰδὼν τὴν ἑαυτοῦ σκιὰν ᾔτει τὴν σφαῖραν. εἶτα πρὸς τὸν πατέρα κατηγόρει ὡς μὴ ἀπολαβὼν αὐτήν. ὁ δὲ προκύψας εἰς τὸ φρέαρ καὶ ἰδὼν τὴν ἑαυτοῦ σκιὰν [ᾔτει τὴν σφαῖραν]· Οἰκοδέσποτα, φησίν, ἀπόδος τῷ παιδὶ τὴν σφαῖραν.", "app": [{"id": "909", "dirty": false, "lemma": "ᾔτει 1]", "reading": "ἤτοι utroque loco §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 34, "span": [99, 103]}, {"id": "923", "dirty": false, "lemma": "προκύψας]", "reading": "παρακύψας §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 34, "span": [175, 183]}, {"id": "932-934", "dirty": false, "lemma": "ᾔτει 2 … σφαῖραν]", "reading": "del. §SIG:Thierfelder§", "sigla": ["Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 34, "span": [99, 115]}, {"id": "935", "dirty": false, "lemma": "Οἰκοδέσποτα]", "reading": "ἰκοδεσπότα §SIG:A§ §SIG:M§", "sigla": ["A", "M"], "editors": [], "query": false, "unit": 34, "span": [243, 254]}, {"id": "938", "dirty": false, "lemma": "τῷ]", "reading": "τὶ seu τὲ seu τὸ §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 34, "span": [270, 272]}], "A": "33", "dawe": "33", "tr": "Il figlio di uno scholastikos giocava a palla. Poiché la palla era caduta nel pozzo, si chinò e, vista la propria ombra, le chiedeva la palla. Successivamente disse al padre che non l’aveva recuperata. Questi si gettò nel pozzo, vide la propria ombra e disse: «Signore, rendi la palla a mio figlio»."}, {"type": "joke", "n": 34, "num": "34", "label": "34; 5 β [et 2 γ?]", "wit": "AM", "text": "Σχολαστικὸς νοσοῦντα ἑταῖρον ἐπισκεπτόμενος ἠρώτα περὶ τῆς νόσου. τοῦ δὲ μὴ ἀποκρινομένου ὀργισθείς· Ἐλπίζω, εἶπε, κἀγὼ νοσῆσαι, καὶ οὐκ ἀποκρινοῦμαί σοι.", "app": [{"id": "953", "dirty": false, "lemma": "ἐπισκεπτόμενος]", "reading": "ἐπισκεπτόμενον §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 35, "span": [29, 43]}, {"id": "964", "dirty": false, "lemma": "εἶπε]", "reading": "εἶπεν §SIG:A§ ac", "sigla": ["A"], "editors": [], "query": false, "unit": 35, "span": [109, 113]}, {"id": "977", "dirty": false, "lemma": "Σχολαστικὸς]", "reading": "χολαστικὸς §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 35, "span": [0, 11]}], "A": "34", "dawe": "34", "tr": "Uno scholastikos che visitava un amico malato faceva domande sulla malattia. Poiché questi non rispondeva, si arrabbiò e disse: «Spero di ammalarmi anche io, e non ti risponderò»."}, {"type": "joke", "n": 35, "num": "35", "label": "35; cf. 164 α", "wit": "AM", "text": "Σχολαστικὸς κλεψιμαῖα ἀμφῶτα πριάμενος, ἵνα μὴ γνωσθῶσιν, ἐπίσσωσεν αὐτά.", "app": [{"id": "979", "dirty": false, "lemma": "ἀμφῶτα]", "reading": "ἐμφῶτα §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 36, "span": [22, 28]}, {"id": "984", "dirty": false, "lemma": "ἐπίσσωσεν]", "reading": "ἐπίσωσεν §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 36, "span": [58, 67]}], "A": "35", "dawe": "35", "tr": "Uno scholastikos comprò dei vestiti rubati e, perché non fossero riconosciuti, li nascose (chatgpt) spalmò di pece (Braccini)"}, {"type": "joke", "n": 36, "num": "36", "label": "36", "wit": "AM", "text": "Σχολαστικὸς τῶν ἀπαντώντων τὰ ἱμάτια ἐτιμᾶτο. τούτου δὲ τοῦ πατρὸς παρά τινων τοῦτο ἀκούσαντος καὶ ἐπιτιμῶνος αὐτῷ· Πάτερ, εἶπεν, ὑπὸ διαβολῆς πέπεισαι τοῦτο, καὶ ἴσως οὐδ’ ὑπὸ ἀνθρώπου. τοῦ δὲ εἰπόντος· Ὁ δεῖνά μοι εἴρηκε Καὶ σύ, ἔφη, ἐκείνῳ προσέχεις, ὃς οὐδὲ πεντήκοντα δραχμῶν ἱμάτιον ἔχει;", "app": [{"id": "1000", "dirty": false, "lemma": "τινων]", "reading": "τινος §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 37, "span": [72, 77]}, {"id": "1006-1007", "dirty": false, "lemma": "Πάτερ εἶπεν]", "reading": "εἶπε πάτερ §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 37, "span": [116, 128]}, {"id": "1016", "dirty": false, "lemma": "ἀνθρώπου]", "reading": "ἔννου §SIG:Dawe§ ἄνου exarat §SIG:M§", "sigla": ["Dawe", "M"], "editors": ["Dawe"], "query": false, "unit": 37, "span": [177, 185]}, {"id": "1023", "dirty": false, "lemma": "εἴρηκε]", "reading": "εἴρηκεν §SIG:A§ ac", "sigla": ["A"], "editors": [], "query": false, "unit": 37, "span": [216, 222]}, {"id": "1027", "dirty": false, "lemma": "ἔφη]", "reading": "§SIG:Minas§ : ἔφησεν §SIG:A§ §SIG:M§ PUR AVENDO APPARATO NEGATIVO, SPIEGO QUANDO Minas HA LA LEZIONE CORRETTA PER FARE MEGLIO POTREI FARE COME THIERFELDER, SENZA USARE z COME CODICE: riporto la lezione errata degli altri codici (qui AM), e poi scrivo “, corr. Minas” o “, corr. z”", "sigla": ["A", "M", "Minas"], "editors": ["Minas"], "query": false, "unit": 37, "span": [231, 234]}, {"id": "1028", "dirty": false, "lemma": "ἐκείνῳ]", "reading": "ἐκεῖνο §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 37, "span": [236, 242]}], "A": "36", "dawe": "36", "tr": "Uno scholastikos valutava il vestiario di quelli che incontrava. Quando suo padre, dopo aver sentito da alcuni ciò, lo rimproverava, disse: «Padre, sei stato convinto di ciò da calunnie, e forse nemmeno di persona”. Quello rispose: «Me l’ha detto il tale, e tu ascolti quello, che ha un mantello da nemmeno cinquanta dracme?!»."}, {"type": "joke", "n": 37, "num": "37", "label": "37; 6 β", "wit": "AM", "text": "Σχολαστικὸς ἵππον ἐπίπρασκεν. ἐλθόντος δέ τινος καὶ καταμανθάνοντος αὐτοῦ τὸν βόλον εἶπεν πρὸς αὐτόν· Τί τοὺς ὀδόντας αὐτοῦ καταμανθάνεις; εἴθε ὡς τρώγει, οὕτως καὶ περιεπάτει.", "app": [{"id": "1049", "dirty": false, "lemma": "καταμανθάνοντος]", "reading": "§SIG:Thierfelder§ coll. 165 α καταμαθόντος §SIG:A§ §SIG:M§", "sigla": ["A", "M", "Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 38, "span": [52, 67]}, {"id": "1053", "dirty": false, "lemma": "εἶπεν]", "reading": "εἶπε §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 38, "span": [84, 89]}], "A": "37", "dawe": "37", "tr": "Uno scholastikos vendeva un cavallo. Poiché era giunto un tale e ne esaminava la dentatura, disse: «Perché osservi i suoi denti? Oh, se trottasse tanto quanto mangia!»."}, {"type": "joke", "n": 38, "num": "38", "label": "38", "wit": "A", "text": "Σχολαστικὸς πρεσβύτου πατρὸς σφόδρα νοσοῦντος τοὺς ἑταίρους ἠξίωσε στεφάνους φέρειν ἐπ’ ἐκφορᾷ. τῇ δὲ ἐπιούσῃ ἡμέρᾳ βέλτιον αὐτοῦ σχόντος, ὡς ἠγανάκτουν οἱ ἑταῖροι· Κἀγώ, ἔφη, αἰσχύνομαι ζημιουμένων ὑμῶν. αὔριον οὖν φέρετε τοὺς στεφάνους· τοῦτον γὰρ ὡς ἂν ἔχῃ ἐξοίσω.", "app": [], "A": "38", "dawe": "38", "tr": "Uno scholastikos, essendo il padre molto malato, chiese agli amici di portare corone di fiori per il funerale. Ma poiché l’indomani quello stava meglio, e gli amici si erano arrabbiati, disse: «Anche io mi vergogno che voi ci abbiate rimesso. Domani dunque portate le corone: comunque starà, gli farò il funerale»."}, {"type": "joke", "n": 39, "num": "39", "label": "39; 37 β", "wit": "AM", "text": "Σχολαστικοὶ δύο ὁμοῦ ἐβάδιζον. ἰδὼν οὖν ὁ ἕτερος αὐτῶν μέλαιναν ὄρνιν· Ἀδελφέ, φησίν, ἴσως ταύτης ὁ ἀλεκτρυὼν ἀπέθανεν.", "app": [{"id": "1116", "dirty": false, "lemma": "ὁμοῦ]", "reading": "om §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 40, "span": [16, 20]}, {"id": "1121", "dirty": false, "lemma": "ἕτερος]", "reading": "§SIG:Minas§ : ἑταῖρος §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 40, "span": [42, 48]}, {"id": "1125", "dirty": false, "lemma": "Ἀδελφέ]", "reading": "ἀδελφε §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 40, "span": [71, 77]}, {"id": "1130", "dirty": false, "lemma": "ἀλεκτρυὼν]", "reading": "ἀλεκτρὼν §SIG:M§ ac", "sigla": ["M"], "editors": [], "query": false, "unit": 40, "span": [100, 109]}], "A": "39", "dawe": "39", "tr": "Due scholastikoi camminavano insieme. Quando uno dei due, avendo visto una gallina nera, dice: «Fratello, forse il gallo di questa è morto!»."}, {"type": "joke", "n": 40, "num": "40", "label": "40; 33 β", "wit": "AM", "text": "Σχολαστικὸς μικρὸν υἱὸν ἀπολέσας, θεασάμενος πολλοὺς ἐπὶ τὸ κῆδος ἀπαντήσαντας διὰ τὴν ἐξουσίαν αὐτοῦ ἔλεγεν· Αἰδοῦμαι μικρὸν παιδίον εἰς τοσοῦτον ὄχλον ἐκφέρων.", "app": [{"id": "1149", "dirty": false, "lemma": "ἐξουσίαν]", "reading": "§SIG:Minas§ §SIG:Eberhard§ ἀπουσίαν §SIG:A§ §SIG:M§ περιουσίαν §SIG:Boissonade§ πλουσίαν ‹...› §SIG:Dawe§", "sigla": ["A", "Boissonade", "Dawe", "Eberhard", "M", "Minas"], "editors": ["Eberhard", "Boissonade", "Minas", "Dawe"], "query": false, "unit": 41, "span": [87, 95]}], "A": "40", "dawe": "40", "tr": "Uno scholastikos che aveva perso un figlio piccolo, dopo che ebbe visto che molti erano giunti al rito funebre per la sepoltura di quello, disse: «Mi vergogno di portare un bimbo piccolo in una folla tanto grande»."}, {"type": "joke", "n": 41, "num": "41", "label": "41; 10 β", "wit": "AM", "text": "Σχολαστικὸς οἰκίαν πωλῶν λίθον ἀπ’ αὐτῆς εἰς δεῖγμα περιέφερεν.", "app": [{"id": "1172", "dirty": false, "lemma": "περιέφερεν]", "reading": "περιέφερε §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 42, "span": [52, 62]}], "A": "41", "dawe": "41", "tr": "Uno scholastikos che vendeva una casa portava in giro una pietra di questa a mo’ di dimostrazione."}, {"type": "joke", "n": 42, "num": "42", "label": "42; 137 α", "wit": "A", "text": "Σχολαστικῶν δύο ὁδευόντων ὁ ἕτερος τῆς γαστρὸς ἀναγκαζούσης μικρὸν ἀπελείφθη. εὑρὼν δὲ ἐν τῷ μιλίῳ ἐπιγεγραμμένον παρὰ τοῦ ἑτέρου· Κατάλαβέ με ‹....›", "app": [{"id": "1220-1224", "dirty": false, "lemma": "ἕτερος … ἐρωτήσας]", "reading": "ἑτέρου...ἐρωτήσοντος §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 43, "span": [28, 34]}], "A": "42", "dawe": "42", "tr": "Quando due scholastikoi erano in viaggio, uno, poiché la pancia incalzava, rimase un po’ indietro. Ma avendo trovato scritto dal compagno sul cippo miliario: «Raggiungimi‹…›»"}, {"type": "joke", "n": 43, "num": "43", "label": "43", "wit": "AM", "text": "Σχολαστικὸς ἀκούσας παρά τινων ὅτι Ὁ πώγων σου ἤδη ἔρχεται ἀπελθὼν εἰς τὴν πύλην ἐξεδέχετο αὐτόν. ἕτερος δὲ τὴν πρόφασιν ἐρωτήσας καὶ γνούς· Εἰκότως, εἶπε, μωροὶ νομιζόμεθα· πόθεν γὰρ οἶδας, εἰ διὰ τῆς ἑτέρας πύλης ἔρχεται;", "app": [{"id": "1228", "dirty": false, "lemma": "εἶπε]", "reading": "εἶπεν §SIG:A§ ac", "sigla": ["A"], "editors": [], "query": false, "unit": 44, "span": [150, 154]}, {"id": "1238-1239", "dirty": false, "lemma": "πύλης ἔρχεται]", "reading": "‹αὐτός ἐπέγραψε· Καὶ σὺ μεῖνόν με› §SIG:Eberhard§ coll. 137 α", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 44, "span": [209, 222]}], "A": "43", "dawe": "43", "tr": "Uno scholastikos, poiché aveva sentito da alcuni che gli stava venendo la barba, giunse alla porta e rimase lì ad aspettarla. Un altro, dopo aver chiesto e appreso la ragione, disse: «Giustamente siamo considerati fessi! Come sai se non arriva dall’atra porta?»."}, {"type": "joke", "n": 44, "num": "44", "label": "44; 38 β", "wit": "AM", "text": "Σχολαστικὸς μετὰ τοῦ πατρὸς καθεύδων, ἀνιστάμενος ἐπὶ τῆς κλίνης νυκτὸς ἔτρωγε σταφυλὰς ὑπεράνω κρεμαμένας. τοῦ δὲ πατρὸς αὐτοῦ ὑπὸ χύτραν λύχνον κρύψαντος, εἶτα, ὅτε ἀνέστη, τὸ φῶς ἄφνω δείξαντος, ὁ δὲ ὀρθὸς ἑστὼς ἔρεγχε καθεύδειν προσποιούμενος.", "app": [{"id": "1276", "dirty": false, "lemma": "ὀρθὸς]", "reading": "§SIG:Minas§ : ὀρθῶς §SIG:A§ §SIG:M§", "sigla": ["A", "M", "Minas"], "editors": ["Minas"], "query": false, "unit": 45, "span": [203, 208]}], "A": "44", "dawe": "44", "tr": "Di notte, uno scholastikos che dormiva col padre, dopo essersi alzato dal letto mangiucchiava grappoli d’uva appesi in alto. Dal momento che suo padre aveva nascosta una lucerna sotto una pentola, e aveva poi rivelato improvvisamente la luce, quando lo scholastikos si era alzato, questi, rimasto immobile in piedi, russava fingendo di dormire."}, {"type": "joke", "n": 45, "num": "44", "label": "44b", "wit": "AM", "text": "Σχολαστικῷ ἑταῖρος ἀποδημῶν ἔγραψεν, ἵν’ αὐτῶν βιβλία πρίηται. ὁ δὲ ὀλιγωρήσας, ἐπανελθόντι αὐτῷ ἀπαντήσας· Τὴν ἐπιστολήν, εἶπεν, ἣν περὶ τῶν βιβλίων ἀπέστειλας, οὐκ ἐδεξάμην.", "app": [{"id": "1285", "dirty": false, "lemma": "ἑταῖρος]", "reading": "§SIG:Minas§ : ἕτερος §SIG:A§ §SIG:M§", "sigla": ["A", "M", "Minas"], "editors": ["Minas"], "query": false, "unit": 46, "span": [11, 18]}], "A": "45", "dawe": "44b", "tr": "Un amico che era in un viaggio all’estero scrisse ad uno scholastikos di acquistargli dei libri. Quello non se ne diede cura e, incontrato l’amico rientrato, disse: «La lettera che mi hai mandato a proposito dei libri, non l’ho ricevuta»."}, {"type": "joke", "n": 46, "num": "45", "label": "45; 14 β", "wit": "AM", "text": "Σχολαστικὸς νυκτὸς ἐπανέστη τῇ μάμμῃ ἑαυτοῦ. πληγὰς δὲ διὰ τοῦτο ὑπὸ τοῦ πατρὸς λαβών· Σύ, εἶπεν, τοσοῦτος χρόνος ἐστὶν ἐξ οὗ τὴν μητέρα μου ὀχεύεις, μηδὲν ὑπ’ ἐμοῦ παθών, καὶ νῦν ὀργίζῃ ἐπὶ τῇ μητρί σου ἅπαξ με εὑρών;", "app": [{"id": "1329", "dirty": false, "lemma": "τοσοῦτος]", "reading": "τοσούτους §SIG:A§ ac", "sigla": ["A"], "editors": [], "query": false, "unit": 47, "span": [98, 106]}], "A": "46", "dawe": "45", "tr": "Uno scholastikos di notte si era messo sopra la propria nonna. Dopo aver preso botte dal padre per questo motivo, disse: «Tu, è tanto tempo che monti mia madre, e non ti sei buscato nulla da me, e ora ti arrabbi per avermi trovato una volta con tua mamma?»."}, {"type": "joke", "n": 47, "num": "46", "label": "46; 16 β", "wit": "AM", "text": "Σχολαστικῷ πραγματευτὴς ἀπήγγειλεν, ὅτι τὸ χωρίον αὐτοῦ ὁ ποταμὸς ἔλαβεν. ὁ δὲ ἀνακραγὼν ἀπεκρίνατο λέγων· Βιάζεται ἡμᾶς.", "app": [{"id": "1360", "dirty": false, "lemma": "ὅτι]", "reading": "ὅτου §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 48, "span": [36, 39]}, {"id": "1369", "dirty": false, "lemma": "ἀνακραγὼν]", "reading": "ἀνακραγῶν §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 48, "span": [79, 88]}], "A": "47", "dawe": "46", "tr": "Un amministratore disse ad uno scholastikos che il fiume aveva preso il suo podere. Quello allora gridò e rispose: «Ci hanno sabotato!»."}, {"type": "joke", "n": 48, "num": "47", "label": "47", "wit": "AM", "text": "Σχολαστικὸς διὰ χρόνου εἰς τὸν ἀγρὸν παραγενόμενος ἐθεάσατο τὰ θρέμματα ἐξιόντα ἐπὶ βόσκησιν. καὶ ὡς εἴωθε βληχώμενα ἰδὼν ἠρώτα τὴν αἰτίαν. τοῦ δὲ οἰκονόμου προσπαίξαντος καὶ εἰπόντος· Ἀσπάζονταί σε Τὴν ἐμήν σοι σωτηρίαν, φησίν, ἐμοῦ ἕνεκα ἀργίαν αὐτοῖς δὸς καὶ τρεῖς ἡμέρας μὴ ἐξαγάγῃς αὐτὰ εἰς νομήν.", "app": [{"id": "1380", "dirty": false, "lemma": "χρόνου]", "reading": "χρόνον §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 49, "span": [16, 22]}, {"id": "1394", "dirty": false, "lemma": "βληχώμενα]", "reading": "§SIG:Thierfelder§ βληχόμενα §SIG:A§ : γλυκόμενα §SIG:M§ : γλυκυνόμενα §SIG:Dawe§", "sigla": ["A", "Dawe", "M", "Thierfelder"], "editors": ["Thierfelder", "Dawe"], "query": false, "unit": 49, "span": [107, 116]}, {"id": "1402", "dirty": false, "lemma": "προσπαίξαντος]", "reading": "§SIG:A§ §SIG:M§ : προσπαίζοντος §SIG:Dawe§", "sigla": ["A", "Dawe", "M"], "editors": ["Dawe"], "query": false, "unit": 49, "span": [157, 170]}, {"id": "1410", "dirty": false, "lemma": "σοι]", "reading": "om. §SIG:M§ ac add. §SIG:M§ 1", "sigla": ["M"], "editors": [], "query": false, "unit": 49, "span": [208, 211]}, {"id": "1415", "dirty": false, "lemma": "ἀργίαν]", "reading": "ἀργί αν in ras. scr. §SIG:M§ 1", "sigla": ["M"], "editors": [], "query": false, "unit": 49, "span": [240, 246]}, {"id": "1416", "dirty": false, "lemma": "αὐτοῖς]", "reading": "αὐτῆ §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 49, "span": [247, 253]}, {"id": "1422", "dirty": false, "lemma": "ἐξαγάγῃς]", "reading": "ἐξαγάγεις §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 49, "span": [278, 286]}], "A": "48", "dawe": "47", "tr": "Uno scholastikos, trovandosi una volta nel podere, vide le greggi uscire al pascolo. E quando le vide come al solito belare, ne chiedeva la ragione. Quando l’amministratore gli disse per scherzo: «Ti salutano!», fece: «Per la mia salvezza! Per me, da’ loro le ferie e per tre giorni non portarle fuori al pascolo»."}, {"type": "joke", "n": 49, "num": "48", "label": "48", "wit": "AM", "text": "Σχολαστικὸς καινὰ ὑποδήματα ὑπεδήσατο. Τριζόντων οὖν αὐτῶν ἐπισχών· Μὴ τρίζετε, εἶπεν, ἐπεὶ τὰ σκέλη ὑμῶν κλάσετε.", "app": [{"id": "1430", "dirty": false, "lemma": "καινὰ]", "reading": "κενᾶ §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 50, "span": [12, 17]}, {"id": "1432", "dirty": false, "lemma": "ὑπεδήσατο]", "reading": "ὑποδήσατο §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 50, "span": [28, 37]}, {"id": "1434-1435", "dirty": false, "lemma": "οὖν αὐτῶν]", "reading": "in ras. scr. §SIG:M§ 1", "sigla": ["M"], "editors": [], "query": false, "unit": 50, "span": [49, 58]}, {"id": "1438", "dirty": false, "lemma": "τρίζετε]", "reading": "§SIG:Minas§ : τρίζεται §SIG:A§ §SIG:M§", "sigla": ["A", "M", "Minas"], "editors": ["Minas"], "query": false, "unit": 50, "span": [71, 78]}, {"id": "1443", "dirty": false, "lemma": "ὑμῶν]", "reading": "ἡμῶν §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 50, "span": [101, 105]}, {"id": "1444", "dirty": false, "lemma": "κλάσετε]", "reading": "§SIG:Minas§ (sec. §SIG:Thierfelder§ ) : κλάσητε §SIG:A§ §SIG:M§ : ὀκλάζεται (cum ἡμῶν §SIG:M§ ) §SIG:Dawe§", "sigla": ["A", "Dawe", "M", "Minas", "Thierfelder"], "editors": ["Minas", "Thierfelder", "Dawe"], "query": false, "unit": 50, "span": [106, 113]}], "A": "49", "dawe": "48", "tr": "Uno scholastikos indossò delle scarpe nuove. Siccome dunque stridevano, si fermò e disse: «Non cigolate, poiché vi romperete le gambe»."}, {"type": "joke", "n": 50, "num": "49", "label": "49; 18 β", "wit": "AM", "text": "Σχολαστικὸς τὴν σελήνην ἰδὼν ἐπυνθάνετο τοῦ πατρός, εἰ καὶ ἐν ταῖς ἄλλαις πόλεσιν τοιαῦται σελῆναί εἰσιν.", "app": [{"id": "1459", "dirty": false, "lemma": "ἐν]", "reading": "om. §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 51, "span": [59, 61]}, {"id": "1462", "dirty": false, "lemma": "πόλεσιν]", "reading": "πολέσι §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 51, "span": [74, 81]}, {"id": "1464", "dirty": false, "lemma": "σελῆναί]", "reading": "attenzione all’app. di Dawe", "sigla": [], "editors": ["Dawe"], "query": false, "unit": 51, "span": [91, 98]}, {"id": "1465", "dirty": false, "lemma": "εἰσιν]", "reading": "εἰσί §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 51, "span": [99, 104]}], "A": "50", "dawe": "49", "tr": "Uno scholastikos vedendo la luna chiedeva al padre se anche nelle altre città ci fossero lune tali."}, {"type": "joke", "n": 51, "num": "50", "label": "50; 20 β", "wit": "AM", "text": "Σχολαστικὸς δανειστὴς ναυκλήρῳ χρεώστῃ ἐνετέλλετο σορὸν αὐτῷ κομίσαι καὶ δύο παιδικὰς τοῖς ὀκταέτεσι παιδίοις αὐτοῦ, δικαίου μέτρου ὡς εἰς αὔξησιν.", "app": [{"id": "1475", "dirty": false, "lemma": "χρεώστῃ]", "reading": "χρεώστης §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 52, "span": [31, 38]}, {"id": "1478", "dirty": false, "lemma": "αὐτῷ]", "reading": "σωρὸν αὐτὸ §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 52, "span": [56, 60]}, {"id": "1482", "dirty": false, "lemma": "παιδικὰς]", "reading": "§SIG:Kurtz§ : παιδίσκας §SIG:A§ §SIG:M§", "sigla": ["A", "Kurtz", "M"], "editors": [], "query": false, "unit": 52, "span": [77, 85]}, {"id": "1488", "dirty": false, "lemma": "μέτρου]", "reading": "μέτρον §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 52, "span": [125, 131]}], "A": "51", "dawe": "50", "tr": "Un prestasoldi scholastikos prescriveva ad un armatore con lui indebitato di portare un sarcofago per lui, e due da bambini per i suoi figlioletti di otto anni, della misura giusta adatta alla loro crescita."}, {"type": "joke", "n": 52, "num": "51", "label": "51", "wit": "AM", "text": "Σχολαστικὸς ἰδὼν ἐν τῷ ἀγρῷ αὐτοῦ φρέαρ ἠρώτα, εἰ καλὸν ἦν τὸ ὕδωρ. τῶν δὲ γεωργῶν εἰπόντων, ὅτι Καλόν· καὶ γὰρ οἱ γονεῖς σου ἐντεῦθεν ἔπινον Καὶ πηλίκους, φησίν, εἶχον τραχήλους, ἵνα ἀπὸ τοσούτου βάθους πίνειν ἐδύναντο;", "app": [{"id": "1505", "dirty": false, "lemma": "ἦν]", "reading": "del. §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 53, "span": [56, 58]}, {"id": "1519", "dirty": false, "lemma": "ἐντεῦθεν]", "reading": "ἐνταῦθα §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 53, "span": [126, 134]}, {"id": "1529", "dirty": false, "lemma": "τοσούτου]", "reading": "τοσ ο ύτου §SIG:M§ pc", "sigla": ["M"], "editors": [], "query": false, "unit": 53, "span": [188, 196]}], "A": "52", "dawe": "51", "tr": "Uno scholastikos vide un pozzo nel proprio campo e chiedeva se l’acqua fosse buona. I contadini dissero che era buona, «E infatti i tuoi genitori bevevano da lì», e disse: «E avevano colli di quale taglia, perché potessero bere da una profondità tanto grande?»."}, {"type": "joke", "n": 53, "num": "52", "label": "52; 21 β", "wit": "AM", "text": "Σχολαστικὸς εἰς λάκκον πεσὼν συνεχῶς ἐβόα ἀνακαλῶν ἑαυτῷ βοηθούς. ὡς δ’ οὐδεὶς ὑπήκουε, λέγει πρὸς ἑαυτόν· Μωρός εἰμι, ἐὰν μὴ ἀνελθὼν πάντας μαστιγώσω, ἵνα †αὐτῶ γοῦν μοι ὑπακούσωσι καὶ κλίμακα κομίσωσιν.", "app": [{"id": "1540", "dirty": false, "lemma": "λάκκον]", "reading": "βάθος §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 54, "span": [16, 22]}, {"id": "1554-1555", "dirty": false, "lemma": "Μωρός εἰμι]", "reading": "μωρὸς εἰμὶ §SIG:A§ §SIG:M§", "sigla": ["A", "M"], "editors": [], "query": false, "unit": 54, "span": [107, 117]}, {"id": "1562", "dirty": false, "lemma": "αὐτῶ]", "reading": "οὕτῳ Boissonade o Eberhard?", "sigla": [], "editors": ["Eberhard", "Boissonade"], "query": true, "unit": 54, "span": [157, 161]}], "A": "53", "dawe": "52", "tr": "Uno scholastikos caduto in una cisterna, gridava di continuo chiamando per sé dei soccorritori. Ma poiché nessuno lo ascoltava, disse a sé stesso: «Sono un fesso, se non risalgo e li frusto tutti, perché almeno mi ascoltino e mi portino una scala!»."}, {"type": "joke", "n": 54, "num": "53", "label": "53", "wit": "AM", "text": "Σχολαστικὸς συνδειπνῶν τῷ πατρὶ παρακειμένης θριδακίνης μεγάλης καὶ ἐχούσης πολλοὺς θύρσους καλούς· Σύ, πάτερ, ἔφη, φάγε τὰ τέκνα, καὶ ἡμεῖς τὴν μητέρα.)", "app": [{"id": "1584", "dirty": false, "lemma": "Σύ]", "reading": "§SIG:Eberhard§ εὖ §SIG:A§ §SIG:M§", "sigla": ["A", "Eberhard", "M"], "editors": ["Eberhard"], "query": false, "unit": 55, "span": [100, 102]}, {"id": "1593", "dirty": false, "lemma": "μητέρα]", "reading": "μητέραν §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 55, "span": [145, 151]}], "A": "54", "dawe": "53", "tr": "Uno scholastikos che pranzava col padre, visto che c’era un grαde cespo di lattuga che aveva molte belle puntarelle, disse: «Tu, padre, mangia i figli, e noi mangiamo la madre»."}, {"type": "joke", "n": 55, "num": "54", "label": "54", "wit": "AM", "text": "Σχολαστικὸς γράφων πρὸς τὸν πατέρα ἀπὸ τῶν Ἀθηνῶν καὶ ἐναβρυνόμενος, ὅτι πεπαίδευται, προσέθηκεν· Εὔχομαι δέ σε εὑρεῖν κεφαλικὴν ἔχοντα δίκην, ἵνα σοι δείξω τὸν ῥήτορα.", "app": [{"id": "1606", "dirty": false, "lemma": "ἐναβρυνόμενος]", "reading": "ἐν ἀμβρυνόμενος §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 56, "span": [54, 67]}, {"id": "1614", "dirty": false, "lemma": "κεφαλικὴν]", "reading": "§SIG:Minas§ κεφαληκὴν §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 56, "span": [119, 128]}, {"id": "1615", "dirty": false, "lemma": "ἔχοντα]", "reading": "φεύγοντα §SIG:Minas§", "sigla": ["Minas"], "editors": ["Minas"], "query": false, "unit": 56, "span": [129, 135]}], "A": "55", "dawe": "54", "tr": "Uno scholastikos che scriveva al padre da Atene vantandosi del fatto che era stato istruito/aveva compiuto gli studi, aggiunse: «Prego di trovarti con un processo capitale, affinché io ti mostri l’avvocato che sono!»."}, {"type": "joke", "n": 56, "num": "55", "label": "55; 31 β", "wit": "AM", "text": "Σχολαστικὸς εὐτράπελος ἀπορῶν δαπανημάτων τὰ βιβλία ἑαυτοῦ ἐπίπρασκε· καὶ γράφων πρὸς τὸν πατέρα ἔλεγε· Σύγχαιρε ἡμῖν, ἤδη γὰρ ἡμᾶς τὰ βιβλία τρέφει.", "app": [], "A": "56", "dawe": "55", "tr": "Uno scholastikos buontempone essendo privo di denaro vendeva i propri libri, e scrivendo al padre diceva: «Rallegrati per noi, infatti già ci sfamano i libri/già viviamo dei nostri libri»."}, {"type": "joke", "n": 57, "num": "56", "label": "56; 23 β", "wit": "AM", "text": "Σχολαστικὸς καὶ φαλακρὸς καὶ κουρεὺς συνοδεύοντες καὶ ἔν τινι ἐρημίᾳ μείναντες συνέθεντο πρὸς τέσσαρας ὥρας ἀγρυπνῆσαι καὶ τὰ σκεύη ἕκαστος τηρῆσαι. ὡς δὲ ἔλαχε τῷ κουρεῖ πρώτῳ φυλάξαι, μετεωρισθῆναι θέλων τὸν σχολαστικὸν καθεύδοντα ἔξυρεν καὶ τῶν ὡρῶν πληρωθεισῶν διύπνισεν. ὁ δὲ σχολαστικὸς ψήχων ὡς ἀπὸ ὕπνου τὴν κεφαλὴν καὶ εὑρὼν ἑαυτὸν ψιλόν· Μέγα κάθαρμα, φησίν, ὁ κουρεύς· πλανηθεὶς γὰρ ἀντ’ ἐμοῦ τὸν φαλακρὸν ἐξύπνισεν.", "app": [{"id": "1690", "dirty": false, "lemma": "ὡρῶν]", "reading": "ὁρῶν §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 58, "span": [248, 252]}, {"id": "1691", "dirty": false, "lemma": "πληρωθεισῶν]", "reading": "πληρωθησῶν §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 58, "span": [253, 264]}, {"id": "1692", "dirty": false, "lemma": "διύπνισεν]", "reading": "δι’ ὕπνησεν §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 58, "span": [265, 274]}, {"id": "1696", "dirty": false, "lemma": "ψήχων]", "reading": "ψύχων §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 58, "span": [293, 298]}, {"id": "1705", "dirty": false, "lemma": "ψιλόν]", "reading": "ψηλὸν §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 58, "span": [341, 346]}, {"id": "1709-1710", "dirty": false, "lemma": "ὁ κουρεύς]", "reading": "κουρεύς §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 58, "span": [276, 378]}], "A": "57", "dawe": "56", "tr": "Uno scholastikos, un pelato e un barbiere che viaggiavano insieme e che si erano fermati in un posto isolato, stabilirono fare dei turni di veglia per quattro ore e di sorvegliare i bagagli di ciascuno. Poiché al barbiere toccò per primo di vigilare, volendo distrarsi rasò per primo lo scholastikos mentre dormiva, e dopo che furono passate le ore, lo svegliò. Lo scholastikos però, accarezzandosi la testa (come si fa) dopo il sonno, si trovò calvo e disse: «Gran canaglia il barbiere! Si è sbagliato e invece di me ha svegliato il pelato!»."}, {"type": "joke", "n": 58, "num": "57", "label": "57", "wit": "A", "text": "Σχολαστικῷ ἐκ δούλης τεκνώσαντι ὁ πατὴρ συνεβούλευε τὸ παιδίον ἀποκτεῖναι. ὁ δέ· Πρῶτον, ἔφη, σὺ τὰ τέκνα σου κατόρυξον, καὶ οὕτως ἐμοὶ συμβούλευε τὸν ἐμὸν ἀνελεῖν.", "app": [{"id": "1743", "dirty": false, "lemma": "συμβούλευε]", "reading": "§SIG:Minas§ : συνεβούλευε §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 59, "span": [136, 146]}, {"id": "1744-1745", "dirty": false, "lemma": "τὸν ἐμὸν]", "reading": "τὸ ἐμὸν §SIG:Boissonade§ τοὐμὸν §SIG:Eberhard§ io accetterei (preferibilmente) Eberhard, ton è maschile!", "sigla": ["Boissonade", "Eberhard"], "editors": ["Eberhard", "Boissonade"], "query": false, "unit": 59, "span": [147, 155]}], "A": "58", "dawe": "57", "tr": "Il padre consigliava ad uno scholastikos che stava per avere un figlio da una schiava, di uccidere il bambino. Quello allora disse: «Per prima cosa sotterra i tuoi figli, e solo allora consigliami di ammazzare il mio»."}, {"type": "joke", "n": 59, "num": "58", "label": "58", "wit": "AM", "text": "Σχολαστικοῦ εἰς βαλανεῖον εἰσελθόντος παραχύτης θερμὸν τοῖς ποσὶ προσέχεεν. ὁ δέ· Κάθαρμα, εἶπε, ψυχρῷ ἀνθρώπῳ θερμὸν προσχεῖς;", "app": [{"id": "1750-1754", "dirty": false, "lemma": "Σχολαστικοῦ … παραχύτης]", "reading": "Σχολαστικὸς ... εἰσελθὼν, ὁ παραχύτης", "sigla": [], "editors": [], "query": false, "unit": 60, "span": [0, 47]}, {"id": "1763-1766", "dirty": false, "lemma": "ψυχρῷ … προσχεῖς]", "reading": "leggi bene cosa c’è in §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 60, "span": [97, 126]}], "A": "59", "dawe": "58", "tr": "Un inserviente dei bagni versava acqua calda sui piedi di uno scholastikos che era entrato alle terme. Quello allora disse: «Canaglia, versi acqua calda su un uomo freddo?!»."}, {"type": "joke", "n": 60, "num": "59", "label": "59", "wit": "AM", "text": "Σχολαστικὸς ἀκούσας τινός, ὅτι καλὴν ὄρνιν ἕωλον σιτευτὴν ἐδείπνησε, προσελθὼν τῷ σιτευταρίῳ ἔλεγεν· Ἕωλον μοι ὄρνιν θῦσον.", "app": [{"id": "1776-1777", "dirty": false, "lemma": "ἕωλον σιτευτὴν]", "reading": "ἕαλον σιτευτὴν §SIG:M§ : σιτευτὴν ἕωλον §SIG:Dawe§", "sigla": ["Dawe", "M"], "editors": ["Dawe"], "query": false, "unit": 61, "span": [43, 57]}, {"id": "1786", "dirty": false, "lemma": "θῦσον]", "reading": "θῦσον §SIG:A§ §SIG:M§", "sigla": ["A", "M"], "editors": [], "query": false, "unit": 61, "span": [117, 122]}], "A": "60", "dawe": "59", "tr": "Uno scholastikos sentì un tale che aveva pranzato con una gallina allevata avanzata dal giorno prima e, giunto dall’allevatore diceva: «Cuocimi una gallina di ieri»."}, {"type": "joke", "n": 61, "num": "60", "label": "60", "wit": "AM", "text": "Σχολαστικὸς ἀπὸ πολλῶν μιλίων χωρίον ἔχων, ἵν’ αὐτὸ ἐγγύτερον ποιήσῃ, ἑπτὰ μίλια κατέβαλεν.", "app": [{"id": "1797", "dirty": false, "lemma": "αὐτὸ]", "reading": "αὐτὸς §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 62, "span": [47, 51]}, {"id": "1799", "dirty": false, "lemma": "ποιήσῃ]", "reading": "ποιήσει §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 62, "span": [62, 68]}, {"id": "1801", "dirty": false, "lemma": "μίλια]", "reading": "μιλιάρια fort. §SIG:Thierfelder§", "sigla": ["Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 62, "span": [75, 80]}], "A": "61", "dawe": "60", "tr": "Uno scholastikos che aveva un terreno a molte miglia, per renderlo più vicino abbatté sette cippi miliari."}, {"type": "joke", "n": 62, "num": "61", "label": "61", "wit": "AM", "text": "Σχολαστικὸς χαμαιδιδάσκαλος ἄφνω ἀποβλέψας εἰς τὴν γωνίαν ἐβόησε· Διονύσιος ἐν τῇ γωνίᾳ ἀτακτεῖ. εἰπόντος δέ τινος, ὅτι οὔπω πάρεστιν, ὁ δὲ ἔφη· Ὅταν ἔλθῃ.", "app": [{"id": "1807", "dirty": false, "lemma": "χαμαιδιδάσκαλος]", "reading": "§SIG:Minas§ χαμαὶ διδάσκαλος §SIG:A§ §SIG:M§", "sigla": ["A", "M", "Minas"], "editors": ["Minas"], "query": false, "unit": 63, "span": [12, 27]}, {"id": "1813-1817", "dirty": false, "lemma": "ἐβόησε· … γωνίᾳ]", "reading": "om. §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 63, "span": [58, 87]}, {"id": "1829", "dirty": false, "lemma": "ἔλθῃ]", "reading": "ἔλθοι §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 63, "span": [150, 154]}], "A": "62", "dawe": "61", "tr": "Un maestro elementare scholastikos alzò improvvisamente lo sguardo in un angolo e gridò: «Dionisio è indisciplinato nell’angolo!». Ma uno gli disse che non c’era ancora, e allora quello fece: «Quando arriverà»."}, {"type": "joke", "n": 63, "num": "62", "label": "62", "wit": "A", "text": "Σχολαστικὸς τῇ ἐτηρίδι, ἣ διὰ χιλίων ἐτῶν ἄγεται ἐν Ῥώμῃ, ἡττηθέντα ἀθλητὴν καὶ δακρύοντα ἰδών, παραμυθούμενος· Μὴ λυποῦ, ἔφη, τὴν γὰρ ἄλλην χιλιετηρίδα σὺ νικήσεις.", "app": [{"id": "1835", "dirty": false, "lemma": "ἐτηρίδι]", "reading": "§SIG:Minas§ ἐταιρίδι §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 64, "span": [15, 22]}, {"id": "1845", "dirty": false, "lemma": "καὶ]", "reading": "del. §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 64, "span": [76, 79]}], "A": "63", "dawe": "62", "tr": "Uno scholastikos alla festa che ogni mille anni si tiene a Roma vide un atleta che era stato sconfitto e che piangeva, e consolandolo disse: «Non abbatterti, tu vincerai alla celebrazione del prossimo millenario»."}, {"type": "joke", "n": 64, "num": "63", "label": "63", "wit": "AM", "text": "Σχολαστικὸς συνεκάθητο ἡγεμόνι δεξιοπήρῳ. εἰς ἐώραν οὖν ἐξελθόντος αὐτοῦ καὶ ἐπαινοῦντος ‹τὰς› ἐν τοῖς ἀριστεροῖς μέρεσιν ἀμπέλους· Ὅταν ἐπανερχώμεθα, φησί, καὶ τὰ ἄλλα μέρη ἀρέσει σοι.", "app": [{"id": "1863", "dirty": false, "lemma": "ἡγεμόνι]", "reading": "ἡγεμῶνι §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 65, "span": [23, 30]}, {"id": "1866", "dirty": false, "lemma": "ἐώραν]", "reading": "ἑώραν §SIG:Minas§ : εώραν §SIG:A§ : ὥραν §SIG:M§", "sigla": ["A", "M", "Minas"], "editors": ["Minas"], "query": false, "unit": 65, "span": [46, 51]}, {"id": "1867", "dirty": false, "lemma": "οὖν]", "reading": "οὖν οὖν §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 65, "span": [52, 55]}, {"id": "1872", "dirty": false, "lemma": "τὰς]", "reading": "(o add.: scegli omogeneo!) §SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 65, "span": [90, 93]}, {"id": "1879", "dirty": false, "lemma": "ἐπανερχώμεθα]", "reading": "ἐπανερχόμεθα §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 65, "span": [137, 149]}, {"id": "1882-1883", "dirty": false, "lemma": "τὰ ἄλλα]", "reading": "τἄλλα §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 65, "span": [161, 168]}], "A": "64", "dawe": "63", "tr": "Uno scholastikos era con un governatore cieco all’occhio destro. Quando questi era uscito per una passeggiata e lodava le viti negli appezzamenti a sinistra, disse: «Quando torneremo indietro ti piacerà anche l’altra parte»."}, {"type": "joke", "n": 65, "num": "64", "label": "64; 25 β", "wit": "A", "text": "Σχολαστικὸς βράκας ἀγοράσας, ἐπεὶ δὲ στενὰς οὔσας μόγις ὑπεδύσατο, ἐδρωπακίσατο.", "app": [{"id": "1895-1896", "dirty": false, "lemma": "ἐπεὶ δὲ]", "reading": "ἐπειδὴ §SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 66, "span": [29, 36]}, {"id": "1901", "dirty": false, "lemma": "ἐδρωπακίσατο]", "reading": "§SIG:Boissonade§ : ἐδροπακίσατο §SIG:A§", "sigla": ["A", "Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 66, "span": [67, 79]}], "A": "65", "dawe": "64", "tr": "Uno scholastikos comprò delle brache e, siccome le indossò a fatica dato che erano strette, si depilò."}, {"type": "joke", "n": 66, "num": "65", "label": "65; 35 β", "wit": "AM", "text": "Σχολαστικοῦ υἱὸς ὑπὸ τοῦ πατρὸς εἰς τὸν πόλεμον ἐκπεμπόμενος ὑπέσχετο κεφαλὴν ἑνὸς τῶν ἐχθρῶν ἔχων ἐλεύσεσθαι. ὁ δὲ ἔφη· Κἂν χωρίς σε κεφαλῆς ἐλθόντα ἴδω, εὐφρανθήσομαι.", "app": [{"id": "1922", "dirty": false, "lemma": "ἐλεύσεσθαι]", "reading": "ὀλέσθαι §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 67, "span": [99, 109]}], "A": "66", "dawe": "65", "tr": "Il figlio di uno scholastikos, inviato dal padre in guerra, promise che avrebbe fatto ritorno avendo la testa di un nemico. L’altro disse: «Anche se dovessi vedere te fare ritorno senza testa, mi rallegrerò»."}, {"type": "joke", "n": 67, "num": "66", "label": "66", "wit": "AM", "text": "Σχολαστικὸς ἐν ποταμῷ θεασάμενος ἁλιάδα σίτου μεστὴν καὶ βεβαρημένην· Ἐὰν μικρόν, εἶπεν, ὁ ποταμὸς αὐξήσῃ, βυθισθήσεται.", "app": [{"id": "1940", "dirty": false, "lemma": "ἁλιάδα]", "reading": "ἁλιᾶ §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 68, "span": [33, 39]}, {"id": "1944", "dirty": false, "lemma": "βεβαρημένην]", "reading": "βεβαρυμένην §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 68, "span": [57, 68]}, {"id": "1950", "dirty": false, "lemma": "αὐξήσῃ]", "reading": "αὐξήσει §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 68, "span": [99, 105]}], "A": "67", "dawe": "66", "tr": "Uno scholastikos vide un battello in un fiume pieno di provviste e appesantito e disse: «Se il fiume dovesse crescere un po’, sarà sommersa!»."}, {"type": "joke", "n": 68, "num": "67", "label": "67", "wit": "AM", "text": "Σχολαστικὸς ἐξ ἀποδημίας ἐπανερχομένῳ τῷ πενθερῷ ἀπαντήσας, πυνθανομένου ἐκείνου, πῶς πράττοι αὐτοῦ ὁ συμφοιτητής, ὁ δέ· Πάνυ, ἔφη, αὐτῷ καλῶς ἐστι νῦν καὶ εὐθυμεῖ· τὸν γὰρ πενθερὸν αὐτοῦ κατώρυξεν.", "app": [{"id": "1958", "dirty": false, "lemma": "ἐπανερχομένῳ]", "reading": "ἐπανερχόμενος §SIG:Eberhard§ : ἀνερχόμενος §SIG:Boissonade§ : ἐξερχομένῳ §SIG:A§ : ἐξερχόμενος §SIG:M§", "sigla": ["A", "Boissonade", "Eberhard", "M"], "editors": ["Eberhard", "Boissonade"], "query": false, "unit": 69, "span": [25, 37]}, {"id": "1965", "dirty": false, "lemma": "πράττοι]", "reading": "πράττει §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 69, "span": [86, 93]}, {"id": "1982", "dirty": false, "lemma": "αὐτοῦ 2]", "reading": "§SIG:Minas§ : ἑαυτοῦ §SIG:A§ §SIG:M§", "sigla": ["A", "M", "Minas"], "editors": ["Minas"], "query": false, "unit": 69, "span": [94, 99]}, {"id": "1983", "dirty": false, "lemma": "κατώρυξεν]", "reading": "κατώρυξε §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 69, "span": [188, 197]}], "A": "68", "dawe": "67", "tr": "Uno scholastikos incontrò il suocero che tornava da un viaggio, e quando quello gli chiese come stesse un suo compagno di scuola, disse: «Le cose gli vanno davvero bene, ed è sereno: ha infatti seppellito suo suocero!»."}, {"type": "joke", "n": 69, "num": "68", "label": "68", "wit": "AM", "text": "Σχολαστικὸς γράψας δίκην ὑπέρ τινος, δημοσίᾳ προανεγίνωσκε. τοῦ δὲ συνηγορουμένου εἰπόντος, ὅτι ἄτοπον ποιεῖ τὰ ἀπόρρητα τῆς δίκης τοῖς ἀντιδίκοις φανερὰ ποιῶν· Κάθαρμα, εἶπε, μὴ γάρ τι τῶν συνεκτικῶν λέγω;", "app": [{"id": "1989-1990", "dirty": false, "lemma": "δίκην ὑπέρ]", "reading": "δίκην ὑπέρ §SIG:Minas§ : διαθήκην ὑπό §SIG:A§ §SIG:M§", "sigla": ["A", "M", "Minas"], "editors": ["Minas"], "query": false, "unit": 70, "span": [19, 29]}, {"id": "1999", "dirty": false, "lemma": "ἄτοπον]", "reading": "ἄτοπόν ‹τι› §SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 70, "span": [96, 102]}], "A": "69", "dawe": "68", "tr": "Uno scholastikos compose un’orazione per un tale e ne diede una lettura pubblica in anteprima. Quando un suo assistito disse che faceva una cosa insensata a rendere manifesti gli aspetti segreti del processo agli avversari, disse: «Disgraziato, forse che non dovrei leggerne gli elementi essenziali?»."}, {"type": "joke", "n": 70, "num": "69", "label": "69", "wit": "AM", "text": "Σχολαστικὸς ἀποθανόντος συμφοιτητοῦ ἐπεσκέπτετο τοὺς γονέας. τοῦ δὲ πατρὸς αὐτοῦ ὀδυρομένου καὶ λέγοντος· Τέκνον, ἠπόρησάς με τῆς δὲ μητρὸς λεγούσης· Τέκνον, ἐτύφλωσάς με ὁ σχολαστικὸς πρὸς τοὺς ἑταίρους εἶπεν· Εἰ ταῦτα αὐτῷ πέπρακται, ἐχρῆν αὐτὸν καὶ ζῶντα καυθῆναι.", "app": [{"id": "2030", "dirty": false, "lemma": "ὀδυρομένου]", "reading": "ὀδυρωμένου §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 71, "span": [81, 91]}, {"id": "2034", "dirty": false, "lemma": "ἠπόρησάς]", "reading": "ἐπήρωσάς §SIG:Boissonade§ , fort. recte : ἐταλαιπώρησάς §SIG:Eberhard§", "sigla": ["Boissonade", "Eberhard"], "editors": ["Eberhard", "Boissonade"], "query": false, "unit": 71, "span": [114, 122]}, {"id": "2049", "dirty": false, "lemma": "ἑταίρους]", "reading": "ἑτέρους §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 71, "span": [195, 203]}, {"id": "2059", "dirty": false, "lemma": "καυθῆναι]", "reading": "§SIG:Boissonade§ : κλαυθῆναι §SIG:A§ §SIG:M§", "sigla": ["A", "Boissonade", "M"], "editors": ["Boissonade"], "query": false, "unit": 71, "span": [258, 266]}], "A": "70", "dawe": "69", "tr": "Uno scholastikos, dal momento che era morto un suo compagno di scuola, era andato a far visita ai suoi genitori. Poiché il padre di quello si doleva e diceva: «Figlio, mi hai rovinato!» e la madre diceva: «Figlio, mi hai accecata!», lo scholastikos disse ai compagni: «Se da lui sono state compiute questi misfatti, bisognava bruciarlo addirittura vivo!»."}, {"type": "joke", "n": 71, "num": "70", "label": "70", "wit": "AM", "text": "Σχολαστικὸς νοσοῦντα φίλον ἀπῆλθεν ἐπισκέψασθαι. τῆς γυναικὸς δ’ αὐτοῦ εἰπούσης, ὅτι ἐκεῖνος ἤδη ἔξω ἐστίν· Ἐὰν οὖν ἐπανέλθῃ, φησίν, ἐρεῖς παραγεγενῆσθαί με.", "app": [{"id": "2067", "dirty": false, "lemma": "ἀπῆλθεν]", "reading": "ἐπῆλθεν §SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 72, "span": [27, 34]}, {"id": "2072", "dirty": false, "lemma": "αὐτοῦ]", "reading": "αὐτῷ §SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 72, "span": [65, 70]}, {"id": "2085", "dirty": false, "lemma": "με]", "reading": "με; §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 72, "span": [154, 156]}], "A": "71", "dawe": "70", "tr": "Uno scholastikos andò a trovare un amico malato. Quando la moglie di questi gli disse che era ormai di là, lo scholastikos, rispose: «Bene, se ritorna, gli dirai che sono venuto»."}, {"type": "joke", "n": 72, "num": "71", "label": "71", "wit": "A", "text": "Σχολαστικὸς ὑπόδειγμα λαβὼν μήκους καὶ πλάτους ἐπὶ τῷ ἀκρόπτυχα εἰσκομίσαι [ζητῆσαι] ἐπυνθάνετο, ποῖόν ἐστι τὸ μῆκος καὶ ποῖον τὸ πλάτος.", "app": [{"id": "2097", "dirty": false, "lemma": "ἀκρόπτυχα]", "reading": "ἀβρόπτυχα §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 73, "span": [54, 63]}, {"id": "2098", "dirty": false, "lemma": "εἰσκομίσαι]", "reading": "ἴσα κομίσασθαι §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 73, "span": [64, 74]}, {"id": "2099", "dirty": false, "lemma": "ζητῆσαι]", "reading": "del. §SIG:Thierfelder§ : ζητήσας §SIG:Minas§", "sigla": ["Minas", "Thierfelder"], "editors": ["Minas", "Thierfelder"], "query": false, "unit": 73, "span": [76, 83]}, {"id": "2101-2106", "dirty": false, "lemma": "ποῖόν … ποῖον]", "reading": "πότερον utrubique §SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 73, "span": [97, 102]}], "A": "72", "dawe": "71", "tr": "Uno scholastikos, pur avendo preso un modello di lunghezza e larghezza per comprare tessuti, continuava a chiedere quale fosse la lunghezza e quale la larghezza."}, {"type": "joke", "n": 73, "num": "72", "label": "72", "wit": "A", "text": "Σχολαστικὸς ἐν γάμοις ἑστιαθεὶς εἶτα ἀναχωρῶν· Εὔχομαι, εἶπεν, εὐτυχῶς καὶ ἀεὶ ταῦτα ὑμᾶς ποιεῖν.", "app": [], "A": "73", "dawe": "72", "tr": "Uno scholastikos mangiò ad un banchetto nuziale e, quando se ne stava andando, disse: «Vi auguro di celebrare questi banchetti con felicità e ripetutamente!»."}, {"type": "joke", "n": 74, "num": "73", "label": "73", "wit": "A", "text": "Ὁ αὐτὸς τὸ Σκρηβωνίας μνῆμα καλὸν ἔφη καὶ πολυτελὲς εἶναι, ἀλλὰ ἐπινόσῳ τόπῳ οἰκοδομῆσθαι.", "app": [{"id": "2132", "dirty": false, "lemma": "Σκρηβωνίας]", "reading": "§SIG:Thierfelder§ : Σκριβονίας", "sigla": ["Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 75, "span": [11, 21]}, {"id": "2139-2140", "dirty": false, "lemma": "ἀλλὰ ἐπινόσῳ]", "reading": "ἀλλ’ ἐν ἐπινόσῳ §SIG:Boissonade§ dub.", "sigla": ["Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 75, "span": [59, 71]}, {"id": "2142", "dirty": false, "lemma": "οἰκοδομῆσθαι]", "reading": "οἰκοδομεῖσθαι §SIG:A§ pc : ῳκοδομεῖσθαι §SIG:Eberhard§", "sigla": ["A", "Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 75, "span": [77, 89]}], "A": "74", "dawe": "73", "tr": "Ancora lui disse che la tomba di Scribonia era bella e sontuosa, ma che era stata costruita in un luogo malsano."}, {"type": "joke", "n": 75, "num": "74", "label": "74", "wit": "A", "text": "Σχολαστικῷ λεπτὸν ἵππον ἔχοντι προσελθών τις· Ὁ ἵππος σου, ἔφη, εἰς Ἅιδου ὁρᾷ. καὶ ὁ σχολαστικός· Κἀγὼ †βλέπω†.", "app": [{"id": "2163", "dirty": false, "lemma": "βλέπω]", "reading": "§SIG:A§ : ὁρῶ vid. opus esse §SIG:Thierfelder§ : βλέπει … βλέπω §SIG:Dawe§", "sigla": ["A", "Dawe", "Thierfelder"], "editors": ["Thierfelder", "Dawe"], "query": false, "unit": 76, "span": [104, 109]}], "A": "75", "dawe": "74", "tr": "Un tale si avvicinò ad uno scholastikos che aveva un cavallo gracilino, disse: «Il tuo cavallo vede già l’Ade». E lo scholastikos disse: «Anch’io lo vedo»."}, {"type": "joke", "n": 76, "num": "75", "label": "75", "wit": "AM", "text": "Σχολαστικὸς νοσῶν, εἶτα πεινῶν, ὡς οὐδέπω τετάρτην ὥραν ἀπηγγέλη, ἀπιστῶν πρὸς ἑαυτὸν τὸ ὡρολόγιον ἐκέλευσε κομισθῆναι.", "app": [{"id": "2175", "dirty": false, "lemma": "ἀπηγγέλη]", "reading": "ἀπηγγέλει §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 77, "span": [56, 64]}], "A": "76", "dawe": "75", "tr": "Uno scholastikos, che era malato e peraltro affamato, quando gli fu detto che non era ancora l’ora quarta, non credendoci ordinò che gli fosse portato l’orologio."}, {"type": "joke", "n": 77, "num": "76", "label": "76", "wit": "A", "text": "Σχολαστικῷ εἰς τὸ Σαραπεῖον ἀνελθόντι θαλλὸν ὁ ἱερεὺς διδούς· Ἵλεώς σοι, εἶπεν, ὁ κύριος. καὶ ὁ σχολαστικός· Ἵλεως, ἔφη, ὁ κύριος τῷ † παρίω μου· ἐγὼ γὰρ ἐλεύθερός εἰμι.", "app": [{"id": "2189", "dirty": false, "lemma": "Σαραπεῖον]", "reading": "§SIG:Minas§ : σαραπίον §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 78, "span": [18, 27]}, {"id": "2191", "dirty": false, "lemma": "θαλλὸν]", "reading": "§SIG:Thierfelder§ : θαλὸν §SIG:A§", "sigla": ["A", "Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 78, "span": [38, 44]}], "A": "77", "dawe": "76", "tr": "Un sacerdote consegnò un ramoscello ad uno scholastikos che entrava nel Serapeion e disse: «Il Signore ti sia benevolo!» e lo scholastikos fece: «Il Signore sia benevolo al mio…cane! Io, infatti, sono un libero!»."}, {"type": "joke", "n": 78, "num": "77", "label": "77", "wit": "AM", "text": "Σχολαστικὸς ἐκκομίσας τὸν υἱόν, ἀπαντήσας τῷ διδασκάλῳ αὐτοῦ· Σύγγνωθι, ἔφη, ὅτι οὐκ ἦλθεν ὁ υἱός μου εἰς τὴν σχολήν· ἀπέθανε γάρ.", "app": [], "A": "78", "dawe": "77", "tr": "Uno scholastikos, dopo aver celebrato il funerale del figlio, incontrò il suo maestro e disse: «Perdona che mio figlio non sia venuto a scuola: è morto»."}, {"type": "joke", "n": 79, "num": "78", "label": "78", "wit": "A", "text": "Σχολαστικὸς εἰκόνας ἀρχαῖα ζωγραφήματα ἐχούσας ἀπὸ Κορίνθου λαβὼν καὶ εἰς ναῦς ἐμβαλὼν τοῖς ναυκλήροις εἶπεν· Ἐὰν ταύτας ἀπολέσητε, καινὰς ὑμᾶς ἀπαιτήσω.", "app": [{"id": "2259", "dirty": false, "lemma": "ἀπολέσητε]", "reading": "§SIG:Minas§ : ἀπολέσηται §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 80, "span": [121, 130]}], "A": "79", "dawe": "78", "tr": "Uno scholastikos, prese da Corinto dei quadri che avevano dipinti antichi e disse ai capitani: «Se li perderete, ve ne chiederò di nuovi»."}, {"type": "joke", "n": 80, "num": "79", "label": "79", "wit": "A", "text": "Σχολαστικῷ ὑπερζέουσαν κύλικα ὁ οἰνοχόος ὤρεξεν. ὁ δὲ ἐπὶ τῆς τραπέζης αὐτὴν θείς· Οὕτω μενέ‹τω›, ἔφη, μέχρι ὁ παιδαγωγός σου ἐλθὼν εὕρῃ αὐτὴν ζέουσαν.", "app": [], "A": "80", "dawe": "79", "tr": "Il coppiere porse ad uno scholastikos una coppa rovente. Questi la poggiò sul tavolo e disse: «Stia così, finché non venga il tuo pedagogo e la trovi bollente»."}, {"type": "joke", "n": 81, "num": "79 bis", "label": "79 bis; 27 α", "wit": "A", "text": "Σχολαστικὸς νοσῶν συνετάξατο τῷ ἰατρῷ, εἰ θεραπευθείη, μισθὸν δώσειν. ὡς οὖν οἶνον ἐν τῷ πυρέττειν πίνοντι αὐτῷ ἐπετίμα ἡ γυνή· Σὺ δὲ βούλει με ὑγιάναντα, ἔφη, ἀναγκασθῆναι τῷ ἰατρῷ τὸν μισθὸν ἐκτῖσαι;", "app": [{"id": "2302", "dirty": false, "lemma": "θεραπευθείη]", "reading": "§SIG:Dawe§ : θεραπεύει §SIG:A§", "sigla": ["A", "Dawe"], "editors": ["Dawe"], "query": false, "unit": 82, "span": [42, 53]}, {"id": "2327", "dirty": false, "lemma": "ἐκτῖσαι]", "reading": "§SIG:Dawe§ : ἐκτίσαι §SIG:A§", "sigla": ["A", "Dawe"], "editors": ["Dawe"], "query": false, "unit": 82, "span": [193, 200]}], "A": "81", "dawe": "79 bis", "tr": "Uno scholastikos malato si accordò col medico che, se fosse guarito, gli avrebbe dato un compenso. Quando dunque la moglie lo rimproverava perché beveva vino con la febbre, disse: «E tu vuoi che io, sano, sia costretto a pagare il medico?»."}, {"type": "joke", "n": 82, "num": "80", "label": "80", "wit": "AM", "text": "Σχολαστικοῦ πλέοντος ἐκινδύνευεν ὑπὸ χειμῶνος τὸ πλοῖον. τῶν δὲ συμπλεόντων ἀπορριπτούντων ἐκ τῶν σκευῶν, ἵνα κουφισθῇ τὸ πλοῖον, κἀκείνῳ τὸ αὐτὸ ποιεῖν παραινούντων, ὁ δὲ ἔχων χειρόγραφον ἑκατὸν πεντήκοντα μυριάδων, τὰς πεντήκοντα ἀπαλείψας· Ἴδε, φησίν, ὅσοις κύμασιν ἐπεκούφισα τὴν ναῦν.", "app": [{"id": "2341", "dirty": false, "lemma": "ἀπορριπτούντων]", "reading": "ἀποριπτούντων §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 83, "span": [76, 90]}, {"id": "2350-2351", "dirty": false, "lemma": "τὸ αὐτὸ]", "reading": "§SIG:Minas§ : τῷ αὐτῷ §SIG:A§ §SIG:M§", "sigla": ["A", "M", "Minas"], "editors": ["Minas"], "query": false, "unit": 83, "span": [46, 145]}, {"id": "2363", "dirty": false, "lemma": "ἀπαλείψας]", "reading": "ὑπαλείψας §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 83, "span": [232, 241]}, {"id": "2367", "dirty": false, "lemma": "κύμασιν]", "reading": "§SIG:A§ §SIG:M§ (def. §SIG:Boissonade§ , §SIG:Eberhard§ ) : χρήμασιν dub. edd.", "sigla": ["A", "Boissonade", "Eberhard", "M"], "editors": ["Eberhard", "Boissonade"], "query": false, "unit": 83, "span": [261, 268]}], "A": "82", "dawe": "80", "tr": "Quando uno sch
