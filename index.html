": "Μισογύναιος νοσήσας ἐν ἀπογνώσει, τῆς δὲ γυναικὸς αὐτῷ εἰπούσης· Ἐάν τι πάθῃς, ἀπάγξομαι ἀναβλέψας πρὸς αὐτὴν εἶπε· Ζῶντί μοι τοῦτο χάρισαι.", "app": [{"id": "7382", "dirty": false, "lemma": "εἶπε]", "reading": "§SIG:Minas§ : αυτὸν §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 270, "span": [110, 114]}], "A": "256", "dawe": "248", "tr": "Un misogino si ammalò senza speranza, e poiché sua moglie gli disse: «Se ti succede qualcosa, mi impiccherò», alzò lo sguardo verso di lei e disse: «Fammi questo favore finché sono ancora vivo!»."}, {"type": "joke", "n": 257, "num": "249", "label": "249", "wit": "A", "text": "Μισογύναιος γυναῖκα ἔχων γλωσσώδη καὶ λοίδορον, τελευτησάσης δὲ αὐτῆς, ἐπὶ θυρεοῦ ἐξέφερε. τινὸς δὲ ἰδόντος καὶ τὴν αἰτίαν ἐρωτήσαντος ἀπεκρίνατο· Μαχίμη γὰρ ἦν.", "app": [{"id": "7411", "dirty": false, "lemma": "γὰρ]", "reading": "§SIG:Boissonade§ : μαχήμη §SIG:A§", "sigla": ["A", "Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 271, "span": [154, 157]}], "A": "257", "dawe": "249", "tr": "Un misogino aveva una moglie linguacciuta e insolente, e quando lei morì lui le fece il funerale su uno scudo. Quando un tale lo vide e chiese il motivo, rispose: «Perché era da combattimento»."}, {"type": "joke", "n": 258, "num": "250", "label": "250", "wit": "A", "text": "Νεανίσκος ἐρωτηθείς, ‹εἰ› ὑπὸ τῆς γυναικὸς αὐτοῦ κελεύεται ἢ πείθεται αὐτῷ ἐκείνη πάντα, ἐναβρυνόμενος ἔφη· Οὕτως με φοβεῖται ἡ γυνή μου· ἐὰν χάνω, χέζει.", "app": [{"id": "7419", "dirty": false, "lemma": "ὑπὸ]", "reading": "add. §SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 272, "span": [26, 29]}], "A": "258", "dawe": "250", "tr": "A un giovinetto fu chiesto se fosse comandato da sua moglie o se lei gli ubbidisse in tutto, e disse, facendosi vanto: «Quando apro la bocca, si caca addosso!»."}, {"type": "joke", "n": 259, "num": "251", "label": "251", "wit": "AC", "text": "Οἰκοδέσποινα μωρὸν οἰκέτην ἔχουσα καὶ ἐμφανῆ ἰδοῦσα αὐτὸν ἁδροκέφαλον, ἐπιθυμήσασα αὐτοῦ, φιμάριον εἰς τὸ πρόσωπον βαλοῦσα, ἵνα μὴ ἐπιγνωσθῇ, συνέπαιζεν αὐτῷ. ὁ δὲ ἐν τῷ παίζειν συνεὶς ‹συν›ῆλθεν συνεισῆλθεν αὐτῇ. καὶ τῷ δεσπότῃ συνήθως προσγελῶν εἶπε· Κῦρι, κῦρι, τὸν ὀρχηστὴν ἐβίνησα, καὶ ἡ κυρὰ ἦν ἔσωθεν.", "app": [{"id": "7448-7449", "dirty": false, "lemma": "ἐμφανῆ ἰδοῦσα]", "reading": "§SIG:Dawe§ : ἐμφανῆ καὶ §SIG:A§ §SIG:C§", "sigla": ["A", "C", "Dawe"], "editors": ["Dawe"], "query": false, "unit": 273, "span": [38, 51]}, {"id": "7452", "dirty": false, "lemma": "ἐπιθυμήσασα]", "reading": "ἀδροκέφαλον §SIG:A§ §SIG:C§", "sigla": ["A", "C"], "editors": [], "query": false, "unit": 273, "span": [71, 82]}, {"id": "7455", "dirty": false, "lemma": "εἰς]", "reading": "§SIG:Hase§ : φημάριον §SIG:A§ §SIG:C§", "sigla": ["A", "C", "Hase"], "editors": [], "query": false, "unit": 273, "span": [99, 102]}, {"id": "7456", "dirty": false, "lemma": "τὸ]", "reading": "περὶ §SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 273, "span": [103, 105]}, {"id": "7472", "dirty": false, "lemma": "αὐτῇ]", "reading": "συνεὶς ‹συν›ῆλθεν §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 273, "span": [208, 212]}, {"id": "7473", "dirty": false, "lemma": "καὶ 2]", "reading": "post αὐτῇ lacunam indicavit §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 273, "span": [34, 37]}, {"id": "7483", "dirty": false, "lemma": "ἐβίνησα]", "reading": "ὀρχιστὴν §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 273, "span": [278, 285]}, {"id": "7484", "dirty": false, "lemma": "καὶ 3]", "reading": "§SIG:Boissonade§ : ἐβήνησα §SIG:A§ ἐβίνισα §SIG:C§", "sigla": ["A", "Boissonade", "C"], "editors": ["Boissonade"], "query": false, "unit": 273, "span": [34, 37]}], "A": "259", "dawe": "251", "tr": "Una padrona aveva un servo tonto e aitante, vide che era nerboruto, prese a desiderarlo, si pose sul volto una piccola maschera per non essere riconosciuta e ci si trastullava insieme. E quello, mentre ci si trastullava, comprese ci fece l’amore. E scherzando come al solito col padrone, disse: «Padrone, padrone, ho scopato il pantomimo e dentro c’era la padrona!»."}, {"type": "joke", "n": 260, "num": "252", "label": "252; 121 α", "wit": "A", "text": "Ἀτυχὴς εὐνοῦχος κήλην ἐποίησεν.", "app": [], "A": "260", "dawe": "252", "tr": "Un eunuco disgraziato sviluppò un tumore."}], "unlinked": [{"id": "311", "dirty": false, "lemma": "καμμύσας]", "reading": "§SIG:Needham§ καμύσας §SIG:A§ §SIG:M§", "sigla": ["A", "M", "Needham"], "editors": [], "query": false, "unit": null, "span": null}, {"id": "995-998", "dirty": false, "lemma": "#", "reading": "τοῦ δὲ πατρὸς αὐτοῦ §SIG:Minas§", "sigla": ["Minas"], "editors": ["Minas"], "query": false, "unit": null, "span": null}, {"id": "2280", "dirty": false, "lemma": "μενέτω]", "reading": "§SIG:Thierfelder§ : μένῃ §SIG:Eberhard§ : μένε §SIG:A§", "sigla": ["A", "Eberhard", "Thierfelder"], "editors": ["Eberhard", "Thierfelder"], "query": false, "unit": null, "span": null}, {"id": "2670", "dirty": false, "lemma": "λέγων]", "reading": "corr. §SIG:Minas§ : contra §SIG:Dawe§ cf. Ritter p. 63 n. 147", "sigla": ["Dawe", "Minas"], "editors": ["Minas", "Dawe"], "query": false, "unit": null, "span": null}, {"id": "3171", "dirty": false, "lemma": "]", "reading": "Φιλογέλω §SIG:Boissonade§", "sigla": ["Boissonade"], "editors": ["Boissonade"], "query": false, "unit": null, "span": null}, {"id": "3337", "dirty": false, "lemma": "]", "reading": "§SIG:A§ : ΑΒΔΗΡΙΤΑΙ §SIG:Minas§ : nullum rell.", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": null, "span": null}, {"id": "3495", "dirty": false, "lemma": "]", "reading": "‹ἔφη· Πολλοὺς οὖν (γοῦν §SIG:Eberhard§ ) ἀναγκη υἱωνοὺς ἔχειν› §SIG:Minas§", "sigla": ["Eberhard", "Minas"], "editors": ["Eberhard", "Minas"], "query": false, "unit": null, "span": null}, {"id": "3523", "dirty": false, "lemma": "ἐστιν]", "reading": "notam interrogation e§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": null, "span": null}, {"id": "6519", "dirty": false, "lemma": "]", "reading": "βλέπουσι §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": null, "span": null}, {"id": "6552", "dirty": false, "lemma": "]", "reading": "ἐπέθηκε §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": null, "span": null}, {"id": "6585", "dirty": false, "lemma": "]", "reading": "post ἐρίφια notam interrogationis add. §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": null, "span": null}, {"id": "7257", "dirty": false, "lemma": "]", "reading": "§SIG:Boissonade§ : κατετύλησσεν §SIG:A§ : κατετζήλλησε §SIG:C§", "sigla": ["A", "Boissonade", "C"], "editors": ["Boissonade"], "query": false, "unit": null, "span": null}, {"id": "7284", "dirty": false, "lemma": "]", "reading": "ἐστὶν per siglum (ni fallimur) vitio chartae attritum voluit §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": null, "span": null}], "witnesses": ["M", "A", "C"], "stats": {"jokes": 260, "sections": 14, "app_total": 611, "app_linked": 587, "dirty": [], "queries": ["121", "150", "486", "1562", "4915"]}, "editors": ["Boissonade", "Dawe", "Eberhard", "Minas", "Perry", "Thierfelder"]}, "beta": {"title": "Ἐκ τοῦ Ἰεροκλέους συντάγματα· οἷσπερ ἐντυχών τις σωφρόνως μειδιάσει.", "units": [{"type": "titulus", "text": "Ἐκ τοῦ Ἰεροκλέους συντάγματα· οἷσπερ ἐντυχών τις σωφρόνως μειδιάσει.", "app": [{"id": "1-9", "dirty": false, "lemma": "Ἐκ τοῦ Ἰεροκλέους συντάγματα· οἷσπερ ἐντυχὼν τις σωφρόνως μειδιάσει]", "reading": "Ἐκ τοῦ Ἱεροκλέους συντάγματος Φιλόγελως ὧπερ ἐντυχὼν σωφρώνως μειδιάσῃς §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 0, "span": [0, 67]}]}, {"type": "section", "text": "Περὶ σχολαστικῶν", "app": []}, {"type": "joke", "n": 1, "num": "1", "label": "1; cf. α 1", "wit": "F", "text": "Σχολαστικὸς ἀργυροκόπῳ ἐπέταξε λύχνον ποιῆσαι. Tοῦ δὲ ἐρωτήσαντος πηλίκου μεγέθους, εἶπεν αὐτῷ· «Πρὸς ὀκτὼ ἀνθρώπους».", "app": [{"id": "26", "dirty": false, "lemma": "πηλίκου]", "reading": "πηκίλου §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 2, "span": [66, 73]}], "A": "1", "dawe": "1", "tr": "Uno scholastikos commissionò ad un artigiano dell’argento di realizzare una lucerna. A quello che chiedeva di che grandezza, disse: «Per otto persone»."}, {"type": "joke", "n": 2, "num": "2", "label": "2; cf. α 2", "wit": "FT", "text": "Σχολαστικὸς κολυμβᾶν βουλόμενος παρὰ μικρὸν ἐπνίγη· ὤμοσεν οὖν μὴ ἅψασθαι ὕδατος, ἐὰν μὴ πρῶτον μάθῃ κολυμβᾶν.", "app": [{"id": "44", "dirty": false, "lemma": "ἐπνίγη]", "reading": "ἐπνίγει §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 3, "span": [44, 50]}, {"id": "48", "dirty": false, "lemma": "ἅψασθαι]", "reading": "ἅψεσθαι §SIG:Koraes§", "sigla": ["Koraes"], "editors": [], "query": false, "unit": 3, "span": [66, 73]}, {"id": "52", "dirty": false, "lemma": "πρῶτον]", "reading": "(cf. α) πρότερον §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 3, "span": [89, 95]}], "A": "2", "dawe": "2", "tr": "Uno scholastikos, volendo nuotare, per poco non affogò; giurò allora di non toccare più l’acqua, se non avesse prima imparato a nuotare."}, {"type": "joke", "n": 3, "num": "4", "label": "4; cf. α 4", "wit": "FT", "text": "Σχολαστικοῦ ἵππον πιπράσκοντος ἠρώτησέ τις, εἰ πρωτοβόλος ἐστίν. Tοῦ δὲ φήσαντος δευτεροβόλον εἶναι, ἔφη· «Πῶς οἶδας;» Ὁ δὲ εἶπεν· «Ὅτι ἅπαξ ἐδούλευσεν ἐμὲ καὶ τὸν πατέρα μου».", "app": [{"id": "79", "dirty": false, "lemma": "εἶπεν]", "reading": "(cf. α) ἔφη §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 4, "span": [124, 129]}, {"id": "82", "dirty": false, "lemma": "ἐδούλευσεν]", "reading": "ἐβόλευσεν editio princeps", "sigla": [], "editors": [], "query": false, "unit": 4, "span": [141, 151]}, {"id": "83-87", "dirty": false, "lemma": "ἐμὲ καὶ τὸν πατέρα μου]", "reading": "§SIG:T§ καὶ ἐμὲ καὶ τὸν πατέρα μου §SIG:F§", "sigla": ["F", "T"], "editors": [], "query": false, "unit": 4, "span": [152, 174]}], "A": "3", "dawe": "4", "tr": "Uno scholastikos vendeva un cavallo, e un tale gli domandò se fosse di primo dente. Quando quello disse che era di secondo dente, fece: «Come lo sai?». E quello rispose: «Perché una volta ha disarcionato me e mio padre»."}, {"type": "joke", "n": 4, "num": "5", "label": "5; cf. α 5", "wit": "FT", "text": "Σχολαστικὸς φίλον συναντήσας εἶπε· «Καθ’ ὕπνους σε ἰδών, προσηγόρευσα». Ὁ δέ· «Σύγγνωθί μοι, ὅτι οὐ προσέσχον».", "app": [{"id": "95", "dirty": false, "lemma": "φίλον]", "reading": "φίλῳ §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 5, "span": [12, 17]}, {"id": "101", "dirty": false, "lemma": "ἰδών]", "reading": "εἶδον §SIG:T§ a.c", "sigla": ["T"], "editors": [], "query": false, "unit": 5, "span": [51, 55]}], "A": "4", "dawe": "5", "tr": "Uno scholastikos incontrò un amico e disse: «Ti ho visto in sogno e ti ho salutato». E quello: «Scusami, ché non ci ho fatto caso»."}, {"type": "joke", "n": 5, "num": "34", "label": "34; cf. α 34", "wit": "FT", "text": "Σχολαστικὸς νοσοῦντα ἐπισκεπτόμενος ἠρώτα περὶ τῆς ὑγείας. Ὁ δὲ οὐκ ἠδύνατο ἀποκριθῆναι. Ὀργισθεὶς οὖν ἐξήει λέγων· «Ἐλπίζω κἀγὼ νοσῆσαι καὶ ἐλθόντι σοι μὴ ἀποκριθῆναι».", "app": [{"id": "130", "dirty": false, "lemma": "ἐξήει]", "reading": "(cf. G) ἐξήλεγχεν §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 6, "span": [103, 108]}], "A": "5", "dawe": "34", "tr": "Uno scholastikos visitava un malato e gli faceva domande sulla salute. Ma quello non era in grado di rispondere. Allora si adirò e se ne usciva dicendo: «Spero di ammalarmi anch’io, e di non risponderti quando verrai a trovarmi»."}, {"type": "joke", "n": 6, "num": "37", "label": "37; cf. α 37", "wit": "FT", "text": "Σχολαστικὸς ἵππον ἐπίπρασκεν. Ἐλθόντος δέ τινος καὶ μανθάνοντος τὸν βόλον, εἶπε· «Τί τοὺς ὀδόντας αὐτοῦ τηρεῖς; Eἴθε ὡς τρώγει, καὶ περιεπάτει».", "app": [], "A": "6", "dawe": "37", "tr": "Uno scholastikos vendeva un cavallo. Poiché era giunto un tale e ne esaminava la dentatura, disse: «Perché ne osservi i denti? Magari camminasse quanto mangia!»."}, {"type": "joke", "n": 7, "num": "253", "label": "253; esclusiva di β", "wit": "FT", "text": "Σχολαστικὸς ἰατρῷ συναντήσας· «Συγχώρησόν μοι, εἶπε, καὶ μή μοι μέμψῃ, ὅτι οὐκ ἐνόσησα».", "app": [{"id": "185", "dirty": false, "lemma": "ἐνόσησα]", "reading": "ἐνόησα §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 8, "span": [79, 86]}], "A": "7", "dawe": "253", "tr": "Uno scholastikos incontrò un medico e gli disse: «Perdonami, e non volermene, se non mi sono ammalato»."}, {"type": "joke", "n": 8, "num": "8", "label": "8; cf. α 8", "wit": "FT", "text": "Σχολαστικὸς μῦν θέλων πιάσαι συνεχῶς τὰ βιβλία αὐτοῦ τρώγοντα, κρέας δακών, ἐν σκοτίᾳ ἐκάθισεν.", "app": [], "A": "8", "dawe": "8", "tr": "Uno scholastikos, volendo prendere un topo che gli rosicchiava di continuo i libri, addentò della carne e si sedette al buio."}, {"type": "joke", "n": 9, "num": "9", "label": "9; cf. α 9", "wit": "FT", "text": "Σχολαστικὸς θέλων τὸν ἵππον αὐτοῦ διδάξαι μὴ τρώγειν πολλά, οὐ παρέβαλεν αὐτῷ τροφάς. Ἀποθανόντος δὲ τοῦ ἵππου τῷ λιμῷ, ἔλεγε· «Μεγάλως ἐζημιώθην· ὅτε γὰρ καλῶς ἔμαθε μὴ τρώγειν, τότε ἀπέθανεν».", "app": [{"id": "222", "dirty": false, "lemma": "παρέβαλεν]", "reading": "παρέβαλλεν §SIG:T§ p.c.", "sigla": ["T"], "editors": [], "query": false, "unit": 10, "span": [63, 72]}, {"id": "233", "dirty": false, "lemma": "ἐζημιώθην]", "reading": "(cf. α) ἐζημίωμαι §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 10, "span": [136, 145]}], "A": "9", "dawe": "9", "tr": "Uno scholastikos, volendo insegnare al proprio cavallo a non mangiare troppo, non gli diede da mangiare. E quando il cavallo morì di fame, diceva: «Che grave perdita! Proprio quando aveva imparato bene a non mangiare, allora è morto»."}, {"type": "joke", "n": 10, "num": "41", "label": "41; cf. α 41", "wit": "FT", "text": "Σχολαστικὸς οἰκίαν πωλῶν, λίθον ἀπ’ αὐτῆς εἰς δεῖγμα περιέφερεν.", "app": [], "A": "10", "dawe": "41", "tr": "Uno scholastikos che vendeva una casa ne portava in giro una pietra a mo’ di dimostrazione."}, {"type": "joke", "n": 11, "num": "11", "label": "11; cf. α 11", "wit": "FT", "text": "Σχολαστικὸς θέλων ἰδεῖν, εἰ πρέπει αὐτῷ κοιμᾶσθαι, καμμύσας ἐσωπτρίζετο.", "app": [{"id": "270", "dirty": false, "lemma": "καμμύσας]", "reading": "(olim §SIG:Needham§ ) καμύσας §SIG:T§", "sigla": ["Needham", "T"], "editors": [], "query": false, "unit": 12, "span": [51, 59]}, {"id": "269", "dirty": false, "lemma": "κοιμᾶσθαι]", "reading": "(cf. α) τὸ κοιμᾶσθαι §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 12, "span": [40, 49]}, {"id": "271", "dirty": false, "lemma": "ἐσωπτρίζετο]", "reading": "§SIG:Braccini§ ἐσοπτρίζετο §SIG:F§ §SIG:T§", "sigla": ["Braccini", "F", "T"], "editors": ["Braccini"], "query": false, "unit": 12, "span": [60, 71]}], "A": "11", "dawe": "11", "tr": "Uno scholastikos, volendo vedere se gli stesse bene dormire, chiuse gli occhi e si guardò allo specchio."}, {"type": "joke", "n": 12, "num": "14", "label": "14; cf. α 14", "wit": "FT", "text": "Σχολαστικὸς οἰκίαν πριάμενος, καὶ διὰ τῆς θυρίδος προκύψας, ἠρώτα τοὺς παριόντας εἰ πρέπει αὐτῷ ἡ οἰκία.", "app": [], "A": "12", "dawe": "14", "tr": "Uno scholastikos comprò una casa, si affacciò alla finestra e chiedeva ai passanti se gli si addicesse."}, {"type": "joke", "n": 13, "num": "15", "label": "15; cf. α 15", "wit": "FT", "text": "Σχολαστικὸς κατ’ ὄναρ ἰδὼν ἧλον πεπατηκέναι καὶ δόξας ἀλγεῖν, τὸν πόδα περιεδήσατο. Ἕτερος δὲ μαθὼν τὴν αἰτίαν, ἔφη· «Διὰ τί γὰρ ἀνυπόδητος κοιμᾶσαι;»", "app": [{"id": "308-311", "dirty": false, "lemma": "ἀλγεῖν, τὸν πόδα περιεδήσατο]", "reading": "(cf. α) ἀλγεῖν τὸν πόδα, περιεδήσατο §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 14, "span": [54, 82]}, {"id": "308-311", "dirty": false, "lemma": "ἀλγεῖν, τὸν πόδα περιεδήσατο]", "reading": "(cf. α) ἀλγεῖν τὸν πόδα, περιεδήσατο §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 14, "span": [54, 82]}], "A": "13", "dawe": "15", "tr": "Uno scholastikos vide in sogno di aver calpestato un chiodo, credette di provare dolore e si fasciò il piede. Un altro ne apprese la ragione e disse: «E perché dormi scalzo?»."}, {"type": "joke", "n": 14, "num": "45", "label": "45; cf. α 45", "wit": "FT", "text": "Σχολαστικὸς νυκτὶ ἐπανέστη τῇ μάμμῃ αὐτοῦ. Πληγὰς δὲ διὰ τοῦτο ὑπὸ τοῦ πατρὸς λαβών, εἶπε· «Σὺ τοσοῦτον χρόνον τὴν μητέρα μου ὀχεύεις, μηδὲν ὑπ’ ἐμοῦ παθών, καὶ σὺ ὀργίζῃ ἐπὶ τῇ μητρί σου ἅπαξ με εὑρών;»", "app": [{"id": "333", "dirty": false, "lemma": "μάμμῃ]", "reading": "μάμῃ §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 15, "span": [30, 35]}], "A": "14", "dawe": "45", "tr": "Uno scholastikos di notte saltò addosso a sua nonna. Prese le botte dal padre per questo motivo e disse: «Tu è tanto tempo che monti mia madre, e non ti sei buscato nulla da me; e ora ti arrabbi per avermi sorpreso una volta sola con tua madre?»."}, {"type": "joke", "n": 15, "num": "6", "label": "6; cf. α 6", "wit": "FT", "text": "Σχολαστικὸς ἰατρὸν συναντήσας ὑπὸ τοῖχον ἐκρύβη. Τινὸς δὲ πυθομένου τὴν αἰτίαν, ἔφη· «Καιρὸν ἔχω μὴ ἀσθενήσας, καὶ αἰσχύνομαι εἰς ὄψιν ἐλθεῖν τοῦ ἰατροῦ».", "app": [{"id": "372", "dirty": false, "lemma": "ἰατρὸν]", "reading": "ἰατρῷ §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 16, "span": [12, 18]}, {"id": "377", "dirty": false, "lemma": "τινὸς]", "reading": "τινὶ §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 16, "span": [49, 54]}, {"id": "382", "dirty": false, "lemma": "ἔφη]", "reading": "(cf. α) ὁ σχολαστικὸς ἔφη §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 16, "span": [80, 83]}, {"id": "392-393", "dirty": false, "lemma": "τοῦ ἰατροῦ]", "reading": "τῷ ἰατρῷ §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 16, "span": [142, 152]}], "A": "15", "dawe": "6", "tr": "Uno scholastikos incontrò un medico e si nascose dietro un muro. E poiché qualcuno gli chiedeva la ragione, disse: «È da un pezzo che non mi ammalo, e mi vergogno di venire al cospetto del medico»."}, {"type": "joke", "n": 16, "num": "46", "label": "46; cf. α 46", "wit": "FT", "text": "Σχολαστικῷ πραγματευτὴς εἶπεν ὅτι «Ὁ ποταμὸς ἔλαβε τὸν ἀγρόν σου». Kἀκεῖνος ἔφη· «Καὶ τί λέγω;»", "app": [{"id": "404-405", "dirty": false, "lemma": "ὁ ποταμὸς]", "reading": "(cf. α) ποταμὸς §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 17, "span": [35, 44]}, {"id": "414", "dirty": false, "lemma": "λέγω]", "reading": "λέγει coniecerit §SIG:Dawe§ : λέγων coniecerim", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 17, "span": [89, 93]}], "A": "16", "dawe": "46", "tr": "A uno scholastikos un amministratore disse che il fiume gli aveva preso il campo. E quello rispose: «E io che dico?»."}, {"type": "joke", "n": 17, "num": "254", "label": "254; esclusiva di β", "wit": "FT", "text": "Σχολαστικὸς Ἀμιναίαν ἔχων ἐσφράγισεν. Tοῦ δὲ δούλου κάτωθεν τρήσαντος καὶ τὸν οἶνον αἴροντος ἐθαύμαζεν, ὅτι τῶν σημάντρων σώων ὄντων ὁ οἶνος ἐλαττοῦται. Ἕτερος εἶπεν· «Ὅρα, μὴ κάτωθεν ἀφῃρέθη». Ὁ δέ· «Ἀμαθέστατε, εἶπεν, οὐ τὸ κάτωθεν λείπει, ἀλλὰ τὸ ἄνωθεν μέρος».", "app": [{"id": "424", "dirty": false, "lemma": "ἐσφράγισεν]", "reading": "ἐσφράγισεν αὐτήν §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 18, "span": [26, 36]}, {"id": "443-444", "dirty": false, "lemma": "ἕτερος εἶπεν]", "reading": "ἑτέρου δὲ εἰπόντος §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 18, "span": [153, 165]}, {"id": "493-500", "dirty": false, "lemma": "Σχολαστικὸς ἰδὼν στρουθοὺς ἐπὶ δένδρου, λάθρα ὑπεισελθών, ὑφαπλώσας]", "reading": "Σχολαστικὸς ὑπὸ δένδρον λάθρα ἐλθὼν καὶ ὑφαπλώσας §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 18, "span": [0, 11]}], "A": "17", "dawe": "254", "tr": "Uno scholastikos, avendo un’anfora di vino Aminèo, la sigillò. Ma poiché lo schiavo, forandola di sotto, ne sottraeva il vino, si stupiva che, pur restando intatti i sigilli, il vino calasse. Un tale gli disse: «Bada che non te l’abbiano portato via di sotto». E lui: «Ignorantissimo, disse, non manca la parte di sotto, ma quella di sopra»."}, {"type": "joke", "n": 18, "num": "49", "label": "49; cf. α 49", "wit": "FT", "text": "Σχολαστικὸς ἐν τῇ πόλει ὤν, καὶ τὴν σελήνην ἰδών, ἐπυνθάνετο τοῦ πατρός, εἰ καὶ αἱ λοιπαὶ πόλεις ἔχουσι τοιαύτην σελήνην.", "app": [], "A": "18", "dawe": "49", "tr": "Uno scholastikos era in città, vide la luna e chiedeva al padre se anche le altre città avessero una luna così."}, {"type": "joke", "n": 19, "num": "19", "label": "19; cf. α 19", "wit": "FT", "text": "Σχολαστικὸς ἰδὼν στρουθοὺς ἐπὶ δένδρου, λάθρα ὑπεισελθών, ὑφαπλώσας τὸν κόλπον ἔσειε τὸ δένδρον ὡς ὑποδεξόμενος τὰ στρουθία.", "app": [{"id": "499", "dirty": false, "lemma": "ὑπεισελθών]", "reading": "ὑπελθών dub. §SIG:Thierfelder§", "sigla": ["Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 20, "span": [46, 56]}], "A": "19", "dawe": "19", "tr": "Uno scholastikos vide dei passeri su un albero, si avvicinò di nascosto, distese la piega dell’abito e scuoteva l’albero per raccogliere i passeri."}, {"type": "joke", "n": 20, "num": "51", "label": "51; cf. α 50", "wit": "FT", "text": "Σχολαστικὸς ἐν τῷ ἰδίῳ ἀγρῷ ἐξιὼν ἠρώτα πιεῖν ὕδωρ εἰ καλὸν ἐν τῷ αὐτόθι φρέατι. Tῶν δὲ φησάντων ὅτι «Καλόν· καὶ γὰρ καὶ οἱ γονεῖς σου ἐξ αὐτοῦ ἔπινον», «Καὶ πηλίκους, ἔφη, εἶχον τραχήλους, ὅτι εἰς τοσοῦτον βάθος πίνειν ἐδύναντο;»", "app": [{"id": "523-526", "dirty": false, "lemma": "ἐπιεῖν ὕδωρ εἰ καλὸν]", "reading": "(cf. α) εἰ πιεῖν ὕδωρ καλὸν §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 21, "span": null}, {"id": "544-548", "dirty": false, "lemma": "ἔπινον», «Καὶ πηλίκους, ἔφη, εἶχον]", "reading": "(cf. α) ἔπινον, φησὶ· Καὶ πηκίλους εἶχον §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 21, "span": [144, 178]}], "A": "20", "dawe": "51", "tr": "Uno scholastikos, uscendo nel proprio campo, chiedeva se l’acqua del pozzo che si trovava lì fosse buona da bere. E poiché quelli dicevano: «È buona, e infatti anche i tuoi genitori bevevano da lì», disse: «E di che taglia avevano i colli, da poter bere a una profondità tanto grande?»."}, {"type": "joke", "n": 21, "num": "52", "label": "52; cf. α 52", "wit": "FT", "text": "Σχολαστικὸς εἰς λάκκον ἐμπεσὼν συνεχῶς ἔκραζε βοήθειαν ζητῶν. Ὡς δὲ οὐδεὶς ὑπήκουεν, ἔφη· «Μωρός εἰμι, ἐὰν μὴ ἀνελθὼν πάντας τύψω, ἵνα κἂν οὕτως δραμόντες κλίμακά μοι κομίσωσιν».", "app": [{"id": "564", "dirty": false, "lemma": "λάκκον]", "reading": "λάκον §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 22, "span": [16, 22]}, {"id": "566-569", "dirty": false, "lemma": "συνεχῶς ἔκραζε βοήθειαν ζητῶν]", "reading": "(cf. α) συνεχῶς κράζων βοήθειαν ἐζήτει §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 22, "span": [31, 60]}, {"id": "573", "dirty": false, "lemma": "ὑπήκουεν]", "reading": "et α ὑπήκουσεν §SIG:F§ : ἐπήκουεν §SIG:T§", "sigla": ["F", "T"], "editors": [], "query": false, "unit": 22, "span": [75, 83]}, {"id": "577", "dirty": false, "lemma": "ἐὰν]", "reading": "(cf. α) εἰ §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 22, "span": [103, 106]}], "A": "21", "dawe": "52", "tr": "Uno scholastikos cadde in una cisterna e gridava di continuo cercando aiuto. E poiché nessuno gli dava ascolto, disse: «Sono un fesso, se non risalgo e li frusto tutti, perché almeno così corrano a portarmi una scala!»."}, {"type": "joke", "n": 22, "num": "22", "label": "22; cf. α 22", "wit": "FT", "text": "Σχολαστικὸς σχολαστικῷ συναντήσας, εἶπεν· «Ἔμαθον, ὅτι ἀπέθανες». Kἀκεῖνος· «Ἀλλ’ ὁρᾷς με, ἔφη, ζῶντα». Kαὶ ὁ σχολαστικός· «Καὶ μὴν ὁ εἰπών μοι πολλῷ σοῦ ἀξιοπιστότερος ὑπάρχει».", "app": [], "A": "22", "dawe": "22", "tr": "Uno scholastikos incontrò un altro scholastikos e disse: «Ho saputo che sei morto». E quello: «Ma mi vedi vivo!». E lo scholastikos: «Eppure chi me l’ha detto è molto più degno di fede di te»."}, {"type": "joke", "n": 23, "num": "56", "label": "56; cf. α 56", "wit": "FT", "text": "Σχολαστικὸς καὶ φαλακρὸς καὶ κουρεὺς συνοδεύοντες συνέθεντο πρὸς τέσσαρας ὥρας βιγλεῦσαι. Ἔλαχεν οὖν πρῶτον τῷ κουρεῖ. Ὁ δὲ μετεωριζόμενος τὸν σχολαστικὸν κοιμώμενον ἐξύρισε καὶ τῶν ὡρῶν πληρωθεισῶν διύπνισεν. Ὁ δέ, κνηθόμενος ἀπὸ ὕπνου τὴν κεφαλήν, καὶ εὑρὼν αὐτὴν ψιλήν, ἔφη· «Μέγα κάθαρμα ὁ κουρεύς· πλανηθεὶς γὰρ ἀντὶ ἐμοῦ τὸν φαλακρὸν διύπνισεν».", "app": [{"id": "636", "dirty": false, "lemma": "βιγλεῦσαι]", "reading": "βιγλίσαι §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 24, "span": [79, 88]}, {"id": "652", "dirty": false, "lemma": "πληρωθεισῶν]", "reading": "(cf. α) παρελθουσῶν §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 24, "span": [187, 198]}, {"id": "656", "dirty": false, "lemma": "κνηθόμενος]", "reading": "κνιθόμενος §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 24, "span": [216, 226]}, {"id": "664", "dirty": false, "lemma": "ψιλὴν]", "reading": "(cf. α) ἐψιλωμένην §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 24, "span": [266, 271]}, {"id": "675", "dirty": false, "lemma": "φαλακρὸν]", "reading": "φαρακλὸν §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 24, "span": [331, 339]}], "A": "23", "dawe": "56", "tr": "Uno scholastikos, un pelato e un barbiere, viaggiando insieme, si accordarono per fare la guardia a turno di quattro ore. Toccò dunque per primo al barbiere. E questi, per passare il tempo, rase lo scholastikos mentre dormiva e, passate le ore, lo svegliò. Ma quello, grattandosi la testa al risveglio, se la trovò liscia e disse: «Gran canaglia di un barbiere! Per sbaglio, invece di me, ha svegliato il pelato!»."}, {"type": "joke", "n": 24, "num": "255", "label": "255; esclusiva di β", "wit": "FT", "text": "Σχολαστικὸς μαθών, ὅτι ὁ κόραξ ὑπὲρ τὰ διακόσια ἔτη ζῇ, ἀγοράσας κόρακα, εἰς ἀπόπειραν ἔτρεφεν.", "app": [{"id": "719-720", "dirty": false, "lemma": "εἰς χειμῶνα]", "reading": "ἐν χειμῶνι §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 25, "span": [73, 76]}], "A": "24", "dawe": "255", "tr": "Uno scholastikos apprese che il corvo vive più di duecento anni, ne comprò uno e lo allevava per farne la prova."}, {"type": "joke", "n": 25, "num": "64", "label": "64; cf. α 64", "wit": "F", "text": "Σχολαστικὸς βράκας ὠνήσατο· στενῶν οὖν οὐσῶν, ἐδρωπάκιζεν αὐτάς.", "app": [], "A": "25", "dawe": "64", "tr": "Uno scholastikos comprò delle brache; e poiché erano strette, vi applicava la pasta depilatoria."}, {"type": "joke", "n": 26, "num": "256", "label": "256; esclusiva di β", "wit": "FT", "text": "Σχολαστικὸς εἰς χειμῶνα ναυαγῶν, καὶ τῶν συμπλεόντων ἑκάστου περιπλεκομένου σκεῦος πρὸς τὸ σωθῆναι, μίαν ἐκεῖνος τῶν ἀγκυρῶν περιεπλέξατο.", "app": [{"id": "726", "dirty": false, "lemma": "περιπλεκομένου]", "reading": "περιπλεκομένων §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 27, "span": [61, 75]}, {"id": "727", "dirty": false, "lemma": "σκεῦος]", "reading": "editio princeps σκεύους §SIG:F§ §SIG:T§", "sigla": ["F", "T"], "editors": [], "query": false, "unit": 27, "span": [76, 82]}, {"id": "731-734", "dirty": false, "lemma": "μίαν ἐκεῖνος τῶν ἀγκυρῶν]", "reading": "ἐκεῖνος μίαν τῶν ἀγκυρῶν §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 27, "span": [100, 124]}], "A": "26", "dawe": "256", "tr": "Uno scholastikos, naufragando durante una tempesta, mentre ciascuno dei compagni di viaggio si avvinghiava a un qualche oggetto per mettersi in salvo, lui si abbracciò a una delle àncore."}, {"type": "joke", "n": 27, "num": "257", "label": "257; cf. α 77", "wit": "FT", "text": "Σχολαστικὸς υἱὸν θάψας καὶ συναντήσας τῷ διδασκάλῳ αὐτοῦ, εἶπε· «Προῆλθεν ὁ παῖς;» Ὁ δέ φησιν· «Οὔ». Kαὶ ὁ σχολαστικός· «Λοιπὸν οὖν, καθηγητά, τέθνηκεν».", "app": [{"id": "743", "dirty": false, "lemma": "υἱὸν]", "reading": "τὸν υἱὸν §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 28, "span": [12, 16]}, {"id": "750", "dirty": false, "lemma": "εἶπε]", "reading": "(εἶπεν scrib.) ἔφη §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 28, "span": [58, 62]}, {"id": "751", "dirty": false, "lemma": "Προῆλθεν]", "reading": "Προσῆλθεν §SIG:Boissonade§", "sigla": ["Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 28, "span": [65, 73]}, {"id": "754-757", "dirty": false, "lemma": "ὁ δέ φησιν· «Οὔ»]", "reading": "ὁ δέ, οὔ φησιν §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 28, "span": [74, 98]}], "A": "27", "dawe": "257", "tr": "Uno scholastikos seppellì il figlio, incontrò il suo maestro e disse: «È venuto il ragazzo?». E quello dice: «No». E lo scholastikos: «E allora, professore, è morto»."}, {"type": "joke", "n": 28, "num": "29", "label": "29; cf. α 29", "wit": "FT", "text": "Διδύμων ἀδελφῶν εἷς ἐτελεύτησεν. Σχολαστικὸς οὖν ἀπαντήσας τῷ ζῶντι, ἠρώτα· «Σὺ ἀπέθανες ἢ ὁ ἀδελφός σου;»", "app": [], "A": "28", "dawe": "29", "tr": "Di due fratelli gemelli, uno morì. Uno scholastikos dunque incontrò quello vivo e gli chiedeva: «Sei morto tu, o tuo fratello?»."}, {"type": "joke", "n": 29, "num": "30", "label": "30; cf. α 29", "wit": "FT", "text": "Σχολαστικὸς ναυαγεῖν μέλλων πινακίδας ᾔτει, ἵνα διαθήκας γράψῃ. Tοὺς δὲ οἰκέτας ὁρῶν ἀλγοῦντας διὰ τὸν κίνδυνον, ἔφη· «Μὴ λυπεῖσθε· ἐλευθερῶ γὰρ ὑμᾶς».", "app": [], "A": "29", "dawe": "30", "tr": "Uno scholastikos, in procinto di naufragare, chiedeva delle tavolette per scrivere il testamento. E vedendo i servi che si addoloravano per il pericolo, disse: «Non affliggetevi: vi rendo liberi!»."}, {"type": "joke", "n": 30, "num": "31", "label": "31; cf. α 31", "wit": "FT", "text": "Σχολαστικὸς ποταμὸν βουλόμενος περᾶσαι ἀνῆλθεν εἰς τὸ πλοῖον καβαλλάριος. Πυθομένου δέ τινος· «Διὰ τί οὐ κατέβης;» ἔφη σπουδάζειν.", "app": [{"id": "825", "dirty": false, "lemma": "ἀνῆλθεν]", "reading": "(cf. α) εἰσῆλθεν §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 31, "span": [39, 46]}, {"id": "829", "dirty": false, "lemma": "καβαλλάριος]", "reading": "ἔφιππος §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 31, "span": [61, 72]}], "A": "30", "dawe": "31", "tr": "Uno scholastikos, volendo attraversare un fiume, salì sull’imbarcazione a cavallo. E poiché qualcuno gli chiese perché non scendesse, rispose che aveva fretta."}, {"type": "joke", "n": 31, "num": "55", "label": "55; cf. α 55", "wit": "FT", "text": "Σχολαστικὸς ἀμαθής, ἀπορῶν δαπανημάτων, τὰ βιβλία αὐτοῦ ἐπίπρασκε καὶ γράφων πρὸς τὸν πατέρα ἔλεγε· «Σύγχαιρε ἡμῖν, πάτερ, ἤδη γὰρ ἡμᾶς τὰ βιβλία τρέφει».", "app": [], "A": "31", "dawe": "55", "tr": "Uno scholastikos ignorante, a corto di denaro, vendeva i propri libri e, scrivendo al padre, diceva: «Congratulati con noi, padre, ché ormai i libri ci sfamano!»."}, {"type": "joke", "n": 32, "num": "258", "label": "258; esclusiva di β", "wit": "FT", "text": "Σχολαστικὸς παιδοτρίβης περὶ μαθητοῦ ἀκούσας ὅτι νοσεῖ, τῇ δὲ ἑξῆς ὅτι πυρέττει, ὕστερον δὲ παρὰ τοῦ πατρὸς ἀκούσας ὅτι ἀπέθανεν, ἔφη· «Οὕτω προφασιζόμενοι οὐκ ἐᾶτε τοὺς παῖδας μανθάνειν».", "app": [{"id": "875", "dirty": false, "lemma": "παιδοτρίβης]", "reading": "παιδοτρίβεις §SIG:T§ a.c", "sigla": ["T"], "editors": [], "query": false, "unit": 33, "span": [12, 23]}], "A": "32", "dawe": "258", "tr": "Uno scholastikos maestro di ginnastica sentì dire di un allievo che era malato, il giorno seguente che aveva la febbre, e più tardi seppe dal padre che era morto, e disse: «Con tutte queste scuse non lasciate imparare i ragazzi»."}, {"type": "joke", "n": 33, "num": "40", "label": "40; cf. α 40", "wit": "FT", "text": "Σχολαστικοῦ παιδίον ἀπέθανεν. Ἰδὼν οὖν πλῆθος λαοῦ συνελθόν, ἔλεγεν· «Αἰσχύνομαι εἰς τοσοῦτον ὄχλον μικρὸν παιδίον προφέρειν».", "app": [{"id": "912", "dirty": false, "lemma": "οὖν]", "reading": "δὲ §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 34, "span": [35, 38]}, {"id": "920", "dirty": false, "lemma": "ὄχλον]", "reading": "(cf. α) πλῆθος §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 34, "span": [94, 99]}], "A": "33", "dawe": "40", "tr": "A uno scholastikos morì il bambino. Vide radunata una gran folla di gente e diceva: «Mi vergogno di portare un bimbo così piccolo in una folla tanto grande»."}, {"type": "joke", "n": 34, "num": "259", "label": "259; esclusiva di β", "wit": "FT", "text": "Σχολαστικὸς ἀγοράσας κρέας, βαστάζων αὐτὸ ἀπήρχετο εἰς τὸν οἶκον αὐτοῦ. Λούπης δὲ ῥήξας ἥρπασεν αὐτὸ ἐκ τῆς χειρὸς αὐτοῦ. Ὁ δὲ ἔφη· «Ὡς σὺ γένωμαι, ἂν μὴ κἀγὼ ποιήσω αὐτὸ ἄλλῳ».", "app": [{"id": "934-935", "dirty": false, "lemma": "αὐτὸ ἀπήρχετο]", "reading": "αὐτὸς ἀπῆγεν §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 35, "span": [37, 50]}, {"id": "938-939", "dirty": false, "lemma": "οἶκον αὐτοῦ]", "reading": "ἑαυτοῦ οἶκον §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 35, "span": [59, 70]}, {"id": "954", "dirty": false, "lemma": "γένωμαι]", "reading": "γένομαι §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 35, "span": [139, 146]}], "A": "34", "dawe": "259", "tr": "Uno scholastikos comprò della carne e la portava a casa sua reggendola in mano. Ma un lupo balzò fuori e gliela strappò di mano. E lui disse: «Possa diventare come te, se anch’io non farò lo stesso a un altro!»."}, {"type": "joke", "n": 35, "num": "65", "label": "65; cf. α 65", "wit": "FT", "text": "Σχολαστικοῦ υἱός, ὑπὸ τοῦ πατρὸς εἰς πόλεμον ἐκπεμπόμενος, ὑπέσχετο ἑνὸς τῶν ἐχθρῶν κεφαλὴν ἀγαγεῖν. Ὁ δὲ ἔφη· «Εὔχομαι καὶ χωρὶς κεφαλῆς σε ἐλθόντα, μόνον ὑγιαίνοντα ἰδεῖν καὶ εὐφρανθῆναι».", "app": [{"id": "969-974", "dirty": false, "lemma": "ὑπὸ τοῦ πατρὸς εἰς πόλεμον ἐκπεμπόμενος]", "reading": "(cf. α) ἐκπεμπόμενος ὑπὸ τοῦ πατρὸς εἰς πόλεμον §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 36, "span": [18, 57]}], "A": "35", "dawe": "65", "tr": "Il figlio di uno scholastikos, mandato in guerra dal padre, promise che avrebbe riportato la testa di un nemico. E quello disse: «Mi auguro di vederti tornare anche senza testa, purché sano e salvo, e di rallegrarmene!»."}, {"type": "joke", "n": 36, "num": "17", "label": "17; cf. α 17", "wit": "FT", "text": "Σχολαστικῷ φίλος ἔγραψεν εἰς Ἑλλάδα ὄντι, βιβλία αὐτῷ ἀγοράσαι. Tοῦ δὲ ἀμελήσαντος, ὡς μετὰ χρόνον τῷ φίλῳ συνωψίσθη, εἶπε· «Τὴν ἐπιστολήν, ἣν περὶ τῶν βιβλίων ἀπέστειλας, οὐκ ἐκομισάμην».", "app": [{"id": "1018", "dirty": false, "lemma": "συνωψίσθη]", "reading": "συνοψίσθη §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 37, "span": [107, 116]}], "A": "36", "dawe": "17", "tr": "A uno scholastikos che si trovava in Grecia un amico scrisse di comprargli dei libri. Ma quello non se ne curò e, quando dopo un po’ si incontrò con l’amico, disse: «La lettera che mi avevi mandato a proposito dei libri non l’ho ricevuta»."}, {"type": "joke", "n": 37, "num": "39", "label": "39; cf. α 39", "wit": "FT", "text": "Σχολαστικοὶ δύο ἐβάδιζον. Ἰδὼν δὲ ὁ εἷς αὐτῶν μέλαιναν ὄρνιν, εἶπεν· «Ἀδελφέ, ἴσως ταύτης ὁ ἀλέκτωρ ἀπέθανε, καὶ διὰ τοῦτο μέλαινα ἐνεδύσατο».", "app": [], "A": "37", "dawe": "39", "tr": "Due scholastikoi camminavano. E uno dei due vide una gallina nera e disse: «Fratello, forse le è morto il gallo, e per questo si è vestita di nero!»."}, {"type": "joke", "n": 38, "num": "44", "label": "44; cf. α 44", "wit": "FT", "text": "Σχολαστικὸς μετὰ τοῦ πατρὸς κοιμώμενος, τῇ νυκτὶ ἀπὸ τῆς κλίνης ἀνιστάμενος, σταφυλὰς ἔτρωγεν ἐπάνω κρεμαμένας. Tοῦ δὲ πατρὸς σκανδαλισθέντος καὶ ὑπὸ χύτραν λαμπάδα κρύψαντος, ἐν τῷ ἐκεῖνον νυκτὶ ἀναστῆναι πρὸς τὸ ἔθος, ὁ πατὴρ ἄφνω τὸ φῶς ἔδειξεν. Kἀκεῖνος ἑστὼς καμμύων ἔρρεγχε, κοιμᾶσθαι προσποιούμενος.", "app": [{"id": "1074", "dirty": false, "lemma": "σταφυλὰς]", "reading": "(cf. α) τὰς σταφυλὰς §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 39, "span": [77, 85]}], "A": "38", "dawe": "44", "tr": "Uno scholastikos che dormiva col padre, alzandosi di notte dal letto, mangiava dei grappoli d’uva appesi in alto. E poiché il padre, contrariato, aveva nascosto una lucerna sotto una pentola e, quando quello di notte si alzò come al solito, mostrò all’improvviso la luce, lui, rimasto in piedi a occhi chiusi, russava fingendo di dormire."}, {"type": "joke", "n": 39, "num": "227", "label": "227; cf. α 227", "wit": "FT", "text": "Σχολαστικῷ ἐν καπηλείῳ πίνοντι ἐπιστάς τις εἶπεν· «Ἡ γυνή σου ἀπέθανεν». Ὁ δὲ ἔφη· «Οὐκοῦν, πραγματευτά, μέλανα οἶνόν μοι κέρνα».", "app": [{"id": "1026", "dirty": false, "lemma": "μοι ἀπέστειλας]", "reading": "ἀπέστειλάς μοι §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 40, "span": [118, 121]}, {"id": "1040-1042", "dirty": false, "lemma": "ὁ εἷς αὐτῶν]", "reading": "(cf. α) αὐτῶν ὁ εἷς §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 40, "span": [73, 74]}], "A": "39", "dawe": "227", "tr": "Mentre uno scholastikos beveva in un’osteria, un tale gli si avvicinò e disse: «Tua moglie è morta». E quello rispose: «E allora, oste, versami del vino nero!»."}, {"type": "section", "text": "Περὶ δυσκόλων", "app": []}, {"type": "joke", "n": 40, "num": "184", "label": "184; cf. α 184", "wit": "FT", "text": "Δυσκόλῳ ἰατρῷ λέγει τις· «Τί ἐστιν, ὅτι αἷμα χέζω καὶ χολάς;» Kἀκεῖνος ἔφη· «Ἐὰν καὶ τὰ ἔντερά σου χέσῃς, ἐγὼ οὐ χολῶ».", "app": [], "A": "40", "dawe": "184", "tr": "Un tale dice a un medico burbero: «Come mai evacuo sangue e bile?». E quello rispose: «Anche se cachi via le tue budella, io non mi prendo bile!»."}, {"type": "joke", "n": 41, "num": "187", "label": "187; cf. α 187", "wit": "FT", "text": "Δύσκολος ἀστρονόμος παιδὸς νοσεροῦ γένησιν εἰπών, πολυχρόνιον ἔσεσθαι ἐπαγγειλάμενος, ᾔτει τὸν μισθόν. Tῆς δὲ μητρὸς εἰπούσης· «Αὔριον δώσω» — «Τί οὖν, ἔφη, ἐὰν τῇ νυκτὶ ἀποθάνῃ, ἐγὼ τὸν μισθὸν ἀπολέσω;»", "app": [{"id": "1090", "dirty": false, "lemma": "νυκτὶ]", "reading": "τῇ νυκτὶ §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 43, "span": [164, 169]}, {"id": "1173", "dirty": false, "lemma": "γένησιν]", "reading": "(cf. α) γέννησιν §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 43, "span": [35, 42]}], "A": "41", "dawe": "187", "tr": "Un astrologo burbero fece l’oroscopo di un bambino malaticcio, garantì che sarebbe vissuto a lungo e ne chiedeva il compenso. E poiché la madre disse: «Te lo darò domani», ribatté: «E che, se muore stanotte, perdo il mio compenso?»."}, {"type": "joke", "n": 42, "num": "188", "label": "188; cf. α 188", "wit": "FT", "text": "Δύσκολος κεράμιον μέλιτος ἀγοράσας συνεχῶς ἠρωτᾶτο, πόσου ἠγόρασεν. Kαταστρέφων οὖν τὸ κεράμιον ἔφη· «Οὕτω χυθήτω μου τὸ αἷμα, ἐὰν εἴπω ὑμῖν».", "app": [{"id": "1206-1207", "dirty": false, "lemma": "κεράμιον μέλιτος]", "reading": "(cf. α) μέλιτος κεράμιον §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 44, "span": [9, 25]}, {"id": "1218", "dirty": false, "lemma": "Οὕτω]", "reading": "(cf. α) Οὕτως §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 44, "span": [102, 106]}], "A": "42", "dawe": "188", "tr": "Un burbero comprò un orcio di miele e si sentiva chiedere di continuo quanto l’avesse pagato. E allora, capovolgendo l’orcio, disse: «Così mi si versi il sangue, se ve lo dico!»."}, {"type": "joke", "n": 43, "num": "190", "label": "190; cf. α 190", "wit": "FT", "text": "Δυσκόλου ταυλίζοντος κατεπήδησε τις. Ὁ δὲ θυμωθεὶς ἠρώτησεν, εἰ τέχνην οἶδε καὶ διὰ τί ἀργεῖ. Τοῦ δὲ φήσαντος· «Ῥάπτειν οἶδα, ἔργον δὲ οὐκ ἔχω», διαρρήξας τὸ ἱμάτιον αὐτοῦ εἶπε· «Λάβε καὶ ἐργάζου καὶ σιώπα».", "app": [{"id": "1247-1250", "dirty": false, "lemma": "Τοῦ δὲ φήσαντος· «Ῥάπτειν]", "reading": "Τοῦ δὲ φήσαντος· καὶ διὰ τί ἀργεῖ §SIG:T§ a.c", "sigla": ["T"], "editors": [], "query": false, "unit": 45, "span": [94, 119]}], "A": "43", "dawe": "190", "tr": "Mentre un burbero giocava a dadi, un tale gli saltò addosso. E quello si irritò e gli chiese se conoscesse un mestiere e perché stesse in ozio. Quando il tale rispose: «So cucire, ma non ho lavoro», stracciò il proprio mantello e disse: «Prendi, lavora e taci!»."}, {"type": "joke", "n": 44, "num": "193", "label": "193; cf. α 193", "wit": "FT", "text": "Δυσκόλῳ τις ἐφώνει· ὁ δὲ ἀπεκρίνατο· «Οὐκ εἰμὶ ἔσω». Tοῦ δὲ εἰπόντος ὅτι «Ψεύδῃ· τῆς φωνῆς σου γὰρ ἀκούω», ἔφη· «Ὦ κάθαρμα, εἰ μὲν ὁ παῖς μου εἶπεν, ἐπείσθης ἄν· ἐγὼ δέ σοι οὐ φαίνομαι ἀξιοπιστότερος εἶναι;»", "app": [{"id": "1280", "dirty": false, "lemma": "ἔσω]", "reading": "(cf. α) ἐγὼ §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 46, "span": [47, 50]}, {"id": "1285", "dirty": false, "lemma": "ψεύδῃ]", "reading": "(cf. α) ψεῦδος §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 46, "span": [74, 79]}, {"id": "1292-1293", "dirty": false, "lemma": "ὦ κάθαρμα]", "reading": "Τ (cf. α) κάθαρμα §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 46, "span": [113, 122]}, {"id": "1304-1306", "dirty": false, "lemma": "σοι οὐ φαίνομαι]", "reading": "(cf. α) οὐ φαίνομαί σοι §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 46, "span": [169, 184]}], "A": "44", "dawe": "193", "tr": "Un tale chiamava un burbero, e quello rispose: «Non sono in casa». E quando il primo disse: «Menti, perché sento la tua voce!», ribatté: «Canaglia, se te l’avesse detto il mio servo, gli avresti creduto; e io non ti sembro più degno di fede di lui?»."}, {"type": "joke", "n": 45, "num": "191", "label": "191; cf. α 191", "wit": "FT", "text": "Δύσκολόν τις ἠρώτα· «Ποῦ μένεις;» Ὁ δὲ ἔφη· «Kἀκεῖθεν μεταβαίνω».", "app": [], "A": "45", "dawe": "191", "tr": "Un tale chiese a un burbero: «Dove abiti?». E quello disse: «Mi sto traslocando proprio da lì!»."}, {"type": "joke", "n": 46, "num": "194", "label": "194; cf. α 194", "wit": "FT", "text": "Δύσκολος ἀπὸ σκάλας καταβαίνων ἔπεσεν. Tοῦ δὲ αὐθέντου εἰπόντος· «Ἐκεῖ τίς ἔπεσεν;» Ἔφη· «Ἐγὼ τοῦ ἐνοικίου μου. Τί πρὸς σέ;»", "app": [{"id": "1333", "dirty": false, "lemma": "σκάλας]", "reading": "(cf. α) κλίμακος §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 48, "span": [13, 19]}, {"id": "1338", "dirty": false, "lemma": "αὐθέντου]", "reading": "δεσπότου §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 48, "span": [46, 54]}, {"id": "1344", "dirty": false, "lemma": "Ἐγὼ]", "reading": "Ἐγὼ ‹ἔσω› §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 48, "span": [90, 93]}], "A": "46", "dawe": "194", "tr": "Un burbero, mentre scendeva una scala, cadde. E poiché il padrone di casa disse: «Chi è caduto, là?», rispose: «Io, a prezzo del mio affitto! E a te che importa?»."}, {"type": "joke", "n": 47, "num": "185", "label": "185; cf. α 185", "wit": "T", "text": "Δύσκολος ἰατρὸς ἑτερόφθαλμος ἀρρώστῳ ἔφη· «Πῶς ἔχεις;» Ὁ δέ· «Ὡς βλέπεις». Εἶπε δέ· «Ἐάν ‹...›».", "app": [], "A": "47", "dawe": "185", "tr": "Un medico burbero, cieco da un occhio, disse a un malato: «Come stai?». E quello: «Come vedi». E il medico disse: «Se…»."}, {"type": "section", "text": "Περὶ φιλαργύρων", "app": []}, {"type": "joke", "n": 48, "num": "104", "label": "104; cf. α 104", "wit": "FT", "text": "Φιλάργυρος διαθήκας γράφων, ἑαυτὸν κληρονόμον ἔταξεν.", "app": [{"id": "1381", "dirty": false, "lemma": "διαθήκας]", "reading": "(cf. α) διαθήκην §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 51, "span": [11, 19]}], "A": "48", "dawe": "104", "tr": "Un avaro, redigendo il testamento, nominò erede sé stesso."}, {"type": "joke", "n": 49, "num": "105", "label": "105; cf. α 105", "wit": "FT", "text": "Φιλάργυρος ἐρωτηθείς· «Διὰ τί οὐδὲν ἄλλο ἐσθίεις εἰ μὴ ἐλαίας;» Eἶπεν· «Ἵνα τὸ μὲν ἔξωθεν ὄψον ἔχω, τὸ δὲ ὀστοῦν ἀντὶ ξύλου· καὶ ἵνα φαγών, μὴ ἀπονίψωμαι, ἀλλὰ τὴν κεφαλήν μου ἐκμαξάμενος, ἠλειμμένος ὦ».", "app": [{"id": "1419", "dirty": false, "lemma": "ἀλλὰ]", "reading": "ἀλλὰ ‹εἰς› §SIG:Thierfelder§", "sigla": ["Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 52, "span": [155, 159]}, {"id": "1421-1422", "dirty": false, "lemma": "κεφαλήν μου]", "reading": "(cf. α) κεφαλὴν §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 52, "span": [164, 175]}, {"id": "1424-1425", "dirty": false, "lemma": "ἠλειμμένος ὦ]", "reading": "ἄλλα §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 52, "span": [189, 201]}], "A": "49", "dawe": "105", "tr": "A un avaro fu chiesto perché non mangiasse nient’altro che olive, e disse: «Perché l’esterno mi faccia da companatico, il nocciolo da legna; e perché, dopo aver mangiato, invece di lavarmi le mani me le strofini sulla testa e resti unto»."}, {"type": "section", "text": "Περὶ λιμοξήρων", "app": [{"id": "1427", "dirty": false, "lemma": "λιμοξήρων]", "reading": "(cf. α) λιμοξήρου §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 53, "span": [5, 14]}]}, {"type": "joke", "n": 50, "num": "261", "label": "261; esclusiva di β", "wit": "FT", "text": "Λιμόξηρος ὕπαρχος τὸ βῆμα αὐτοῦ ἐκέλευσε πρὸς ἀρτοκοπεῖον γενέσθαι.", "app": [], "A": "50", "dawe": "261", "tr": "Un prefetto morto di fame ordinò che il suo tribunale fosse collocato accanto a un panificio."}, {"type": "joke", "n": 51, "num": "220", "label": "220; cf. α 228", "wit": "FT", "text": "Λιμόξηρος παιδαγωγός, ἰδὼν ἄρτον ἔν τινι ὕψει κρεμάμενον, εἶπε· «Καταβαίνεις καὶ ἀπαγγέλλεις, ἢ ἀναβαίνων ἀπαρτίζω σε;»", "app": [{"id": "1460", "dirty": false, "lemma": "ἀπαγγέλλεις]", "reading": "§SIG:Thierfelder§ (cf. α) ἐπαγγέλλεις §SIG:F§ : ἀπαγγέλεις §SIG:T§", "sigla": ["F", "T", "Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 55, "span": [81, 92]}, {"id": "1462", "dirty": false, "lemma": "ἀναβαίνων]", "reading": "(iam §SIG:Eberhard§ ) ἀναβαίνω §SIG:T§", "sigla": ["Eberhard", "T"], "editors": ["Eberhard"], "query": false, "unit": 55, "span": [96, 105]}, {"id": "1471", "dirty": false, "lemma": "λιμόξηρος]", "reading": "Τ (cf. α) λιμόξηρος σχολαστικὸς §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 55, "span": [0, 9]}], "A": "51", "dawe": "220", "tr": "Un precettore morto di fame vide un pane appeso in alto e disse: «Scendi a ripetere la lezione, o devo salire io a sistemarti?»."}, {"type": "joke", "n": 52, "num": "221", "label": "221; cf. α 221", "wit": "FT", "text": "Λιμόξηρος ἰατρός, ἰδὼν ἄρτον διά τινος τρύπης, ἐκσυρτικὸν ἔμπλαστρον ἐτίθει.", "app": [], "A": "52", "dawe": "221", "tr": "Un medico morto di fame vide un pane attraverso un buco e vi applicava un impiastro estrattivo."}, {"type": "joke", "n": 53, "num": "223", "label": "223; cf. α 223", "wit": "FT", "text": "Λιμόξηρος, ἰδὼν ἄρτον ἐν ὑπερθύρῳ κείμενον, ἔφη· «Κύριε, ἢ ἐκεῖνον ταπείνωσον, ἢ ἐμὲ ὕψωσον».", "app": [{"id": "1491", "dirty": false, "lemma": "ὑπερθύρῳ]", "reading": "§SIG:Thierfelder§ (cf. α) ὑπαίθρῳ §SIG:F§ : γράφεται ἐν ὑπερώῳ §SIG:F§ i.m. : ὑπέρθρῳ §SIG:T§", "sigla": ["F", "T", "Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 57, "span": [25, 33]}, {"id": "1500", "dirty": false, "lemma": "ὕψωσον]", "reading": "(cf. α) ἐξάλειψον §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 57, "span": [85, 91]}], "A": "53", "dawe": "223", "tr": "Un morto di fame vide un pane posato su un architrave e disse: «Signore, o abbassi quello, o innalzi me!»."}, {"type": "section", "text": "Περὶ ὀκνηρῶν", "app": []}, {"type": "joke", "n": 54, "num": "211", "label": "211; cf. α 211", "wit": "FT", "text": "Ὀκνηρῶν δύο κοιμωμένων, εἰσελθών τις κλέπτης τὸ σαγίον αὐτῶν ἔλαβεν. Tοῦ δὲ ἑνὸς νοήσαντος καὶ εἰπόντος πρὸς τὸν ἕτερον· «Ἀνάστα, δίωξον αὐτόν», ἔφη· «Ἄφες· ὅταν ἔλθῃ λαβεῖν τὴν τύλην, κρατοῦμεν αὐτὸν οἱ δύο».", "app": [{"id": "1516", "dirty": false, "lemma": "σαγίον]", "reading": "σαγεῖον §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 59, "span": [48, 54]}, {"id": "1525-1527", "dirty": false, "lemma": "πρὸς τὸν ἕτερον]", "reading": "(cf. α) τῷ ἑτέρῳ §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 59, "span": [104, 119]}, {"id": "1533", "dirty": false, "lemma": "ὅταν]", "reading": "(cf. α) ἐὰν §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 59, "span": [157, 161]}, {"id": "1537", "dirty": false, "lemma": "τύλην]", "reading": "(cf. α) πύλην §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 59, "span": [178, 183]}], "A": "54", "dawe": "211", "tr": "Mentre due pigri dormivano insieme, un ladro entrò e portò via il loro mantello. E quando uno dei due se ne accorse e disse all’altro: «Alzati, inseguilo!», quello rispose: «Lascia stare: quando verrà a prendere il cuscino, lo acchiapperemo in due»."}, {"type": "joke", "n": 55, "num": "212", "label": "212; cf. α 212", "wit": "FT", "text": "Ὀκνηρῷ υἱῷ ἐπέταξεν ὁ πατὴρ ἀπελθεῖν εἰς τὸν γείτονα καὶ χρήσασθαι ἀξίνην. Ὁ δὲ ἔφη· «Ἐγώ εἰμι ὁ γείτων· ἀξίνην οὐκ ἔχω».", "app": [], "A": "55", "dawe": "212", "tr": "Un padre ordinò al figlio pigro di andare dal vicino a farsi prestare un’accetta. E quello disse: «Sono io il vicino: di accetta non ne ho!»."}, {"type": "joke", "n": 56, "num": "213", "label": "213; cf. α 213", "wit": "FT", "text": "Ὀκνηρὸς ὀκνηρῷ δηνάριον ὤφειλεν. Ὑπηντηκὼς δὲ αὐτῷ, ᾔτει τὸ δηνάριον. Ὁ δέ φησιν· «Εἰς τὸ μάπουλόν μου δέδεται· λύσας ἆρον». Ὁ δέ· «Ἄπελθε, φησίν, ἐπληρώθην».", "app": [{"id": "1578-1579", "dirty": false, "lemma": "δηνάριον ὤφειλεν]", "reading": "§SIG:Braccini§ (cf. α) δηνάριον ὤφειλε δοῦναι §SIG:F§ : ὤφειλε δηνάριον (δεινάριον scrib.) §SIG:T§", "sigla": ["Braccini", "F", "T"], "editors": ["Braccini"], "query": false, "unit": 61, "span": [15, 31]}, {"id": "1580", "dirty": false, "lemma": "ὑπηντηκὼς]", "reading": "ὑπαντηκὸς §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 61, "span": [33, 42]}, {"id": "1582", "dirty": false, "lemma": "αὐτῷ]", "reading": "(cf. α) αὐτὸν §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 61, "span": [46, 50]}, {"id": "1585", "dirty": false, "lemma": "δηνάριον]", "reading": "δεινάριον §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 61, "span": [15, 23]}, {"id": "1590-1591", "dirty": false, "lemma": "τὸ μάπουλον]", "reading": "τὸν μάπουλον §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 61, "span": [57, 98]}], "A": "56", "dawe": "213", "tr": "Un pigro doveva un denaro a un altro pigro. Lo incontrò e gli chiedeva il denaro. E quello disse: «È legato nel mio fagotto: slegalo e prendilo». E l’altro: «Lascia perdere, sono già stato pagato»."}, {"type": "joke", "n": 57, "num": "229", "label": "229; cf. α 237", "wit": "FT", "text": "Ἀτυχὴς μέθυσος, ἀμπελῶνα κληρονομήσας, ἐν καιρῷ τοῦ τρυγητοῦ ἀπέθανεν.", "app": [], "A": "57", "dawe": "229", "tr": "Uno sbevazzone sfortunato ereditò una vigna e morì proprio al tempo della vendemmia."}, {"type": "joke", "n": 58, "num": "244", "label": "244; cf. α 244", "wit": "FT", "text": "Νεανίσκος πρὸς τὴν ἑαυτοῦ γυναῖκα ἀσελγῆ οὖσαν εἶπε· «Κυρία, τί ποιοῦμεν; Ἀριστοῦμεν ἢ ἀφροδισιάζομεν;» Κἀκείνη ἔφη· «Ὡς θέλεις· ψωμὶν οὐκ ἔχομεν».", "app": [{"id": "1624-1627", "dirty": false, "lemma": "τὴν ἑαυτοῦ γυναῖκα ἀσελγῆ]", "reading": "(ἀσελγὴν οὖσαν εἶπε (εἶπεν scrib.) scrib.) (cf. α) τὴν γυναῖκα εἶπεν οὖσαν ἀσελγῆ §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 63, "span": [15, 40]}, {"id": "1635", "dirty": false, "lemma": "ἀφροδισιάζομεν]", "reading": "(cf. α) ἀφροδιάζομεν §SIG:T§ : ἀφροδιάσομεν §SIG:F§", "sigla": ["F", "T"], "editors": [], "query": false, "unit": 63, "span": [87, 101]}], "A": "58", "dawe": "244", "tr": "Un giovane disse alla propria moglie, che era lasciva: «Signora, che facciamo? Pranziamo o facciamo l’amore?». E quella rispose: «Come vuoi: ma di pane non ne abbiamo!»."}, {"type": "joke", "n": 59, "num": "245", "label": "245; cf. α 245", "wit": "FT", "text": "Γραΐδας ἐρωτευομένας νεανίσκος ξενοδοχήσας, πρὸς τοὺς παῖδας αὐτοῦ ἔφη· «Τὴν θέλουσαν κεράσατε καὶ τὴν θέλουσαν ἀφροδισιάσατε». Kἀκεῖναι εἶπον· «Ἡμεῖς οὐ διψῶμεν».", "app": [{"id": "1664", "dirty": false, "lemma": "ἀφροδισιάσατε]", "reading": "(cf. α) ἀφροδιάσατε §SIG:T§ : ἀφροδιάσετε §SIG:F§", "sigla": ["F", "T"], "editors": [], "query": false, "unit": 64, "span": [112, 125]}], "A": "59", "dawe": "245", "tr": "Un giovane ospitò due vecchiette in calore e disse ai suoi servi: «A quella che vuole versate da bere, e con quella che vuole fate l’amore». E quelle dissero: «Noi non abbiamo sete!»."}, {"type": "section", "text": "Περὶ μισογυναίων ἀνδρῶν", "app": [{"id": "1670-1672", "dirty": false, "lemma": "Περὶ μισογυναίων ἀνδρῶν]", "reading": "§SIG:Braccini§ Περὶ μιγυναικῶν ἀνδρῶν §SIG:T§ : Περὶ μισογυναίου §SIG:F§", "sigla": ["Braccini", "F", "T"], "editors": ["Braccini"], "query": false, "unit": 65, "span": [0, 23]}]}, {"type": "joke", "n": 60, "num": "247", "label": "247; cf. α 247", "wit": "FT", "text": "Μισογυναίου τὴν γυναῖκα κηδεύοντος, ἠρώτησέ τις· «Τίς ἀνεπαύσατο;» Ὁ δὲ ἔφη· «Ἐγὼ ὁ ταύτης στερηθείς».", "app": [{"id": "1679", "dirty": false, "lemma": "μισογυναίου]", "reading": "(cf. α) μισογυναίκου §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 66, "span": [0, 11]}, {"id": "1684", "dirty": false, "lemma": "τις]", "reading": "(cf. α) τις, λέγων §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 66, "span": [44, 47]}], "A": "60", "dawe": "247", "tr": "Mentre un misogino seppelliva la moglie, un tale chiese: «Chi se n’è andato?». E quello rispose: «Io, che mi sono liberato di questa!»."}, {"type": "joke", "n": 61, "num": "248", "label": "248; cf. α 248", "wit": "FT", "text": "Μισογύναιος ἀρρωστῶν καὶ τῆς γυναικὸς εἰπούσης αὐτῷ· «Ἐὰν ἀποθάνῃς, ἀπάγξομαι», ἀναβλέψας εἶπε· «Ζῶντί μοι τοῦτο χάρισαι».", "app": [{"id": "1700", "dirty": false, "lemma": "Μισογύναιος]", "reading": "(cf. α) Μισογύναικος §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 67, "span": [0, 11]}], "A": "61", "dawe": "248", "tr": "Un misogino era malato, e poiché la moglie gli disse: «Se muori, mi impiccherò», alzò lo sguardo e disse: «Fammi questo favore mentre sono ancora vivo!»."}, {"type": "section", "text": "Περὶ εὐτραπέλων", "app": []}, {"type": "joke", "n": 62, "num": "141", "label": "141; cf. α 120", "wit": "F", "text": "Εὐτράπελος κυβερνήτης ἐρωτηθείς, τί φυσᾷ, εἶπε· «Φάβα, καὶ κρόμμυα».", "app": [], "A": "62", "dawe": "141", "tr": "A un timoniere spiritoso fu chiesto che vento tirasse, e rispose: «Fave e cipolle!»."}, {"type": "joke", "n": 63, "num": "239", "label": "239; cf. α 239", "wit": "FT", "text": "Εὐτράπελος τραγῳδὸς ὑπὸ δύο ἠγαπᾶτο γυναικῶν, ὀζοστόμου καὶ ὀζοχνώτου. Kαὶ τῆς μὲν εἰπούσης· «Δός μοι φίλημα», τῆς δὲ εἰπούσης· «Δός μοι περιπλοκάς», ἀνεβόησεν· «Οἴμοι, τί δράσω; Δυσὶ κακοῖς μερίζομαι».", "app": [{"id": "1747", "dirty": false, "lemma": "ὀζοχνώτου]", "reading": "εὐοχνώτου §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 70, "span": [60, 69]}, {"id": "1760", "dirty": false, "lemma": "περιπλοκάς]", "reading": "(cf. α) περιπλοκήν §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 70, "span": [137, 147]}, {"id": "1754", "dirty": false, "lemma": "φίλημα]", "reading": "φιλήματα §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 70, "span": [102, 108]}], "A": "63", "dawe": "239", "tr": "Uno spiritoso attore tragico era amato da due donne, una dall’alito cattivo e l’altra tutta puzzolente. E mentre una diceva: «Dammi dei baci!» e l’altra: «Dammi degli abbracci!», quello gridò: «Ahimè, che fare? Sono diviso tra due mali!»."}, {"type": "joke", "n": 64, "num": "143", "label": "143; cf. α 143", "wit": "FT", "text": "Εὐτραπέλῳ τις ἰατρῷ λέγει· «Πολλοὺς ἄνθρακας ἔχω». Κἀκεῖνος ἔφη· «Ἐὰν χαλκεῖον ἔχῃς, θερμόν σοί ποτὲ οὐ λείψει».", "app": [{"id": "1774", "dirty": false, "lemma": "Εὐτραπέλῳ]", "reading": "§SIG:Eberhard§ Εὐτράπελός §SIG:F§ §SIG:T§", "sigla": ["Eberhard", "F", "T"], "editors": ["Eberhard"], "query": false, "unit": 71, "span": [0, 9]}, {"id": "1777", "dirty": false, "lemma": "λέγει]", "reading": "(cf. α) ἔφη §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 71, "span": [20, 25]}, {"id": "1788-1789", "dirty": false, "lemma": "ποτὲ οὐ]", "reading": "οὔποτε §SIG:Eberhard§ , fortasse recte (οὐδέποτε malle videtur §SIG:Thierfelder§ ) : ποτε inter cruces ponunt §SIG:Thierfelder§ §SIG:Dawe§", "sigla": ["Dawe", "Eberhard", "Thierfelder"], "editors": ["Eberhard", "Thierfelder", "Dawe"], "query": false, "unit": 71, "span": [96, 103]}, {"id": "1790", "dirty": false, "lemma": "λείψει]", "reading": "(cf. α) λείψῃ §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 71, "span": [104, 110]}], "A": "64", "dawe": "143", "tr": "A un medico spiritoso un tale dice: «Ho molti carbonchi!». E quello rispose: «Se hai uno scaldino, non ti mancherà mai il caldo!»."}, {"type": "joke", "n": 65, "num": "262", "label": "262; esclusiva di β", "wit": "FT", "text": "Εὐτράπελος ἀποδημήσας καὶ κηλίτης γενόμενος, ἐπανελθὼν ἠρωτᾶτο παρὰ τῆς γυναικός, τί ἤγαγεν. Ὁ δέ· «Σοὶ μέν, εἶπεν, οὐδέν, τοῖς δὲ μηροῖς σου προσκε- φαλάδιν».", "app": [{"id": "1798", "dirty": false, "lemma": "ἀποδημήσας]", "reading": "ἀποπηδήσας §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 72, "span": [11, 21]}, {"id": "1800", "dirty": false, "lemma": "κηλίτης]", "reading": "edd. κηλήτης §SIG:F§ : κυλίτης §SIG:T§", "sigla": ["F", "T"], "editors": [], "query": false, "unit": 72, "span": [26, 33]}, {"id": "1804-1806", "dirty": false, "lemma": "παρὰ τῆς γυναικός ‹ὑπὸ τῆς γυναικός›]", "reading": "(iam §SIG:Thierfelder§ coniecit) om. §SIG:T§", "sigla": ["T", "Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 72, "span": [63, 80]}, {"id": "1808", "dirty": false, "lemma": "ἤγαγεν]", "reading": "αὐτῇ ἔφερεν §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 72, "span": [85, 91]}, {"id": "1809", "dirty": false, "lemma": "Ὁ]", "reading": "om. §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 72, "span": [93, 94]}], "A": "65", "dawe": "262", "tr": "Uno spiritoso partì per un viaggio, si ammalò d’ernia e al ritorno veniva interrogato dalla moglie su che cosa avesse portato. E lui disse: «Per te nulla; ma per le tue cosce un bel cuscinetto»."}, {"type": "joke", "n": 66, "num": "151", "label": "151b; cf. α 151 bis", "wit": "FT", "text": "Εὐτράπελος, ἰδὼν ἰατρὸν νεάνιδα ὑπαλείφοντα ὡραίαν, ἔφη· «Μὴ τὴν ὄψιν θεραπεύων τὸ βάθος φθείρῃς».", "app": [{"id": "1831-1833", "dirty": false, "lemma": "νεάνιδα ὑπαλείφοντα ὡραίαν]", "reading": "ὡραίαν νεάνιδα ὑπαλείφοντα §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 73, "span": [24, 50]}], "A": "66", "dawe": "151", "tr": "Uno spiritoso vide un medico che applicava un collirio a una bella ragazza e disse: «Occhio, a non rovinare la pupa, mentre curi la pupilla!»."}, {"type": "joke", "n": 67, "num": "263", "label": "263; esclusiva di β", "wit": "FT", "text": "Εὐτράπελόν τις ἐλοιδόρει, ὅτι «Σοῦ τὴν γυναῖκα δωρεὰν ἔσχον». Ὁ δὲ εἶπεν· «Ἐμοὶ μὲν ἀνάγκη τοιούτου κακοῦ ἀντέχεσθαι· σοὶ δὲ τίς ἀνάγκη;»", "app": [{"id": "1863", "dirty": false, "lemma": "τοιούτου]", "reading": "τοσούτου §SIG:Thierfelder§", "sigla": ["Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 74, "span": [91, 99]}, {"id": "1865", "dirty": false, "lemma": "ἀντέχεσθαι]", "reading": "ἀνέχεσθαι §SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 74, "span": [106, 116]}, {"id": "1866-1867", "dirty": false, "lemma": "σοὶ δὲ]", "reading": "§SIG:de Rhoer§ σοῦ δὲ §SIG:F§ §SIG:T§", "sigla": ["F", "T", "de Rhoer"], "editors": [], "query": false, "unit": 74, "span": [118, 124]}], "A": "67", "dawe": "263", "tr": "Un tale insultava uno spiritoso, dicendogli: «Ho avuto tua moglie gratis». E quello rispose: «Io sono costretto a sopportare un simile malanno; ma tu che bisogno ne avevi?»."}, {"type": "joke", "n": 68, "num": "146", "label": "146; cf. α 146", "wit": "FT", "text": "Εὐτράπελος χοῖρον κλέψας ἔφευγεν. Ἐπεὶ δὲ κατελαμβάνετο, θεὶς αὐτόν, τύπτων ἔλεγεν· «Ἀλλαχοῦ ὄρυγε καὶ μὴ περὶ τὰ ἐμά».", "app": [{"id": "1880", "dirty": false, "lemma": "Ἐπεὶ]", "reading": "Τ (cf. α) ὡς §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 75, "span": [34, 38]}, {"id": "1884", "dirty": false, "lemma": "αὐτόν]", "reading": "αὐτὸν ‹χαμαί› §SIG:Dawe§ ex α", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 75, "span": [62, 67]}, {"id": "1885-1887", "dirty": false, "lemma": "τύπτων ἔλεγεν· «Ἀλλαχοῦ]", "reading": "(cf. α) ἔτυπτε λέγων· «Ἄλλων §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 75, "span": [69, 92]}, {"id": "1888", "dirty": false, "lemma": "ὄρυγε]", "reading": "§SIG:Thierfelder§ ὤρυγε §SIG:F§ §SIG:T§", "sigla": ["F", "T", "Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 75, "span": [93, 98]}, {"id": "1891", "dirty": false, "lemma": "περὶ]", "reading": "(cf. α) om. §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 75, "span": [106, 110]}], "A": "68", "dawe": "146", "tr": "Uno spiritoso rubò un maiale e fuggiva. Ma quando stava per essere acciuffato, lo posò a terra e, percuotendolo, diceva: «Scava da un’altra parte, e non attorno alla mia roba!»."}, {"type": "joke", "n": 69, "num": "151", "label": "151; cf. α 151", "wit": "FT", "text": "Εὐτράπελος ἰδὼν πορνοβοσκὸν μισθοῦντα μέλαιναν ἑταιρίδα εἶπε· «Πόσου τὴν νύκτα μισθοῖς;»", "app": [{"id": "1902", "dirty": false, "lemma": "πορνοβοσκὸν]", "reading": "πορνοβωσκὸν §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 76, "span": [16, 27]}, {"id": "1908-1909", "dirty": false, "lemma": "τὴν νύκτα]", "reading": "(cf. α) τὴν γυναῖκα §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 76, "span": [69, 78]}], "A": "69", "dawe": "151", "tr": "Uno spiritoso vide un lenone che dava a nolo una prostituta nera e disse: «A quanto affitti la notte?»."}, {"type": "joke", "n": 70, "num": "264", "label": "264; esclusiva di β", "wit": "FT", "text": "Εὐτράπελος ἐπὶ ἡγεμόνος ἐδικάζετο. Tοῦ δὲ νυστάζοντος, ἐβόησεν· «Ἐκκαλοῦμαι». Ὁ δὲ ἔφη· «Ἐπὶ τίνα;» Κἀκεῖνος· «Ἐπὶ σὲ γρηγοροῦντα».", "app": [{"id": "1925", "dirty": false, "lemma": "ἐκκαλοῦμαι]", "reading": "§SIG:de Rhoer§ ἐγκαλοῦμεν §SIG:F§ §SIG:T§", "sigla": ["F", "T", "de Rhoer"], "editors": [], "query": false, "unit": 77, "span": [65, 75]}, {"id": "1932-1934", "dirty": false, "lemma": "ἐπὶ σὲ γρηγοροῦντα]", "reading": "§SIG:de Rhoer§ ἐπὶ σοῦ γρηγοροῦντος §SIG:F§ : ἐπὶ σοί γρηγοροῦντι §SIG:T§", "sigla": ["F", "T", "de Rhoer"], "editors": [], "query": false, "unit": 77, "span": [11, 129]}, {"id": "1945", "dirty": false, "lemma": "εὐτράπελος]", "reading": "εὐτράπελον §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 77, "span": [0, 10]}], "A": "70", "dawe": "264", "tr": "Uno spiritoso era sotto processo davanti al governatore. E poiché questi sonnecchiava, gridò: «Mi appello!». E quello disse: «A chi?». E lui: «A te, da sveglio!»."}, {"type": "joke", "n": 71, "num": "149", "label": "149; cf. α 149", "wit": "FT", "text": "Ὕβρεως ἐν βαλανείῳ γενομένης, εὐτράπελος ῥήτωρ κατηγόρει καὶ μάρτυρας ἐκάλει τοὺς περιχύτας. Tῶν δὲ ἀποβαλλομένων ὡς μὴ ὄντων ἀξιοπίστων, ἔφη· «Εἰ μὲν ἐν τῷ δουρείῳ ἵππῳ ὑβρίσθην, παρέσχον ἂν μάρτυρας τοὺς περὶ Μενέλαον καὶ Ὀδυσσέα καὶ Διομήδην· εἰ δὲ ἐν βαλανείῳ, ἀνάγκη τοὺς περιχύτας τὸ πραχθὲν μᾶλλον εἰδέναι».", "app": [{"id": "1953-1955", "dirty": false, "lemma": "τῶν δὲ ἀποβαλλομένων]", "reading": "τοῦ δέ, αὐτοὺς ἀποβαλλομένου §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 78, "span": null}, {"id": "1965", "dirty": false, "lemma": "δουρείῳ]", "reading": "(cf. α) δουρίῳ §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 78, "span": [157, 164]}, {"id": "1967", "dirty": false, "lemma": "ὑβρίσθην]", "reading": "(cf. α) ἦν §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 78, "span": [170, 178]}, {"id": "1971-1972", "dirty": false, "lemma": "τοὺς περὶ]", "reading": "(cf. α) om. §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 78, "span": [77, 210]}, {"id": "1974-1977", "dirty": false, "lemma": "καὶ Ὀδυσσέα καὶ Διομήδην]", "reading": "(cf. α) καὶ Διομήδην καὶ Ὀδυσσέα §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 78, "span": [57, 244]}, {"id": "1985-1987", "dirty": false, "lemma": "τὸ πραχθὲν μᾶλλον]", "reading": "(cf. α) μᾶλλον τὸ πραχθὲν §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 78, "span": [287, 304]}], "A": "71", "dawe": "149", "tr": "Essendoci stato un oltraggio in un bagno, uno spiritoso retore accusava e chiamava a testimoni gli inservienti. E poiché venivano respinti come non attendibili, disse: «Se l’oltraggio l’avessi subìto nel cavallo di legno, avrei prodotto come testimoni Menelao, Odisseo e Diomede coi loro compagni; ma poiché è avvenuto in un bagno, per forza sono gli inservienti a sapere meglio l’accaduto»."}, {"type": "joke", "n": 72, "num": "152", "label": "152; cf. α 152", "wit": "FT", "text": "Δύο εὐτραπέλων πρὸς ἀλλήλους δυσφορούντων ἐπὶ τὸ φονεῦσαι τοὺς ἑαυτῶν γονεῖς, ἔφη ὁ εἷς πρὸς τὸν ἕτερον· «Ἐὰν αὐτοχείρως τοῦτο πράξωμεν, πατραλοῖαι λογισθῆναι μέλλομεν. Ἀλλὰ σὺ μᾶλλον διαχείρισαι τὸν ἐμόν, κἀγὼ τὸν σόν· καὶ κακῆς φήμης ἐκφύγωμεν».", "app": [{"id": "2000-2002", "dirty": false, "lemma": "ἐπὶ τὸ φονεῦσαι]", "reading": "(cf. α) ἐπὶ τῷ φονεῦσαι §SIG:F§ : ἐπὶ τῷ ζῆν §SIG:Thierfelder§", "sigla": ["F", "Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 79, "span": [42, 57]}, {"id": "2016", "dirty": false, "lemma": "πατραλοῖαι]", "reading": "πατραλοῖαι μᾶλλον §SIG:F§", "sigla": ["F"], "editors": [], "query": false, "unit": 79, "span": [137, 147]}, {"id": "2017-2018", "dirty": false, "lemma": "λογισθῆναι μέλλομεν]", "reading": "λογισθῆναι ἔχομεν §SIG:T§", "sigla": ["T"], "editors": [], "query": false, "unit": 79, "span": [148, 167]}, {"id": "2031", "dirty": false, "lemma": "ἐκφύγωμεν]", "reading": "(olim §SIG:de Rhoer§ ) ἐκφύγομεν §SIG:T§ : ἐκφεύγομεν §SIG:Dawe§ .", "sigla": ["Dawe", "T", "de Rhoer"], "editors": ["Dawe"], "query": false, "unit": 79, "span": [236, 245]}], "A": "72", "dawe": "152", "tr": "Due spiritosi, mal sopportando l’un l’altro di dover uccidere i propri genitori, uno disse all’altro: «Se lo facciamo di nostra mano, rischiamo di esser    if(u.type==='section'){if(open)html+='</section>';secN++;const sid=rec+'_sec'+secN;secIdx.push({id:sid,name:u.text,n:0});html+='<section class="sec" id="'+sid+'"><h2>'+esc(greekCaps(u.text))+'</h2>';open=true;}
   else if(u.type==='joke'){if(secIdx.length)secIdx[secIdx.length-1].n++;html+=facHTML(u,rec);}}
 if(open)html+='</section>';elMain.className=rec;elMain.innerHTML=html;
 let t='<h2>Sections · '+{alpha:'α',beta:'β',gamma:'γ'}[rec]+'</h2>';secIdx.forEach(s=>{t+='<a data-go="'+s.id+'">'+esc(greekCaps(s.name))+'<span class="c">'+s.n+'</span></a>';});
 elToc.innerHTML=t;syncBtns();}
function renderSync(){state.mode='sync';elSub.textContent='synoptic · α ⇄ β doublets';
 let html='<div class="dhead"><b>'+DB.doublets.length+' doublets</b> aligned: recension α (codex A numbering, left) and recension β · Braccini (right). Multiple α parallels: closer on top.</div>';
 DB.doublets.forEach(d=>{const ub=byA.beta[d.b];if(!ub)return;const prim=byA.alpha[d.a[0]];if(!prim)return;
   let sec='';d.a.slice(1).forEach(a2=>{const u2=byA.alpha[a2];if(u2)sec+='<div class="second"><div class="stag">also α '+esc(a2)+'</div>'+facHTML(u2,'alpha')+'</div>';});
   html+='<div class="dpair" id="pair_'+d.a[0]+'_'+d.b+'"><div class="dcol da"><div class="tag">α '+esc(d.a[0])+'</div>'+facHTML(prim,'alpha')+sec+'</div><div class="dcol db"><div class="tag">β '+esc(d.b)+'</div>'+facHTML(ub,'beta')+'</div></div>';});
 elMain.className='';elMain.innerHTML=html;
 let t='<h2>Doublets (α · Dawe · β)</h2>';DB.doublets.forEach(d=>{const dw=(byA.beta[d.b]&&byA.beta[d.b].dawe)||'';t+='<a data-go="pair_'+d.a[0]+'_'+d.b+'"><span>α '+esc(d.a[0])+'</span><span class="c">Dawe '+esc(dw)+'</span><span class="c">β '+esc(d.b)+'</span></a>';});
 elToc.innerHTML=t;syncBtns();}
function syncBtns(){document.querySelectorAll('.recsw button').forEach(b=>b.classList.toggle('on',state.mode==='read'&&b.dataset.rec===state.rec));document.getElementById('tSync').classList.toggle('on',state.mode==='sync');}
function flash(el){if(!el)return;document.querySelectorAll('.hot').forEach(x=>x.classList.remove('hot'));el.classList.add('hot');el.scrollIntoView({behavior:'smooth',block:'center'});setTimeout(()=>el.classList.remove('hot'),1600);}
function goto(id){let el=document.getElementById(id);if(!el){const rec=id.split('_')[0];if(['alpha','beta','gamma'].includes(rec)){renderRead(rec);el=document.getElementById(id);}}if(el)flash(el.querySelector('.num')||el);}
elMain.addEventListener('click',e=>{const xr=e.target.closest('[data-go]');if(xr&&xr.classList.contains('xref')){goto(xr.dataset.go);return;}
 if(xr&&xr.closest('.dpair')===null&&!xr.classList.contains('lem')){}
 const lem=e.target.closest('.lem');if(lem){const fac=lem.closest('.fac');const ln=fac.querySelector('.app .ln[data-app="'+lem.dataset.app+'"]');if(ln){fac.querySelector('.app').classList.add('show');flash(ln);}return;}
 const ln=e.target.closest('.app .ln');if(ln){const fac=ln.closest('.fac');const sp=fac.querySelector('.lem[data-app="'+ln.dataset.app+'"]');if(sp)flash(sp);}});
elToc.addEventListener('click',e=>{const a=e.target.closest('[data-go]');if(a){const el=document.getElementById(a.dataset.go);if(el)el.scrollIntoView({behavior:'smooth'});}});
document.querySelectorAll('.recsw button').forEach(b=>b.addEventListener('click',()=>renderRead(b.dataset.rec)));
document.getElementById('tSync').addEventListener('click',()=>{if(state.mode==='sync')renderRead(state.rec);else renderSync();});
document.getElementById('tTr').addEventListener('click',()=>{document.body.classList.toggle('showtr');document.getElementById('tTr').classList.toggle('on',document.body.classList.contains('showtr'));});
const bApp=document.getElementById('tApp'),bLem=document.getElementById('tLem');
bApp.onclick=()=>{bApp.classList.toggle('on');document.querySelectorAll('.app').forEach(a=>a.classList.toggle('show',bApp.classList.contains('on')));};
bLem.onclick=()=>{bLem.classList.toggle('on');document.querySelectorAll('.lem').forEach(l=>l.style.borderBottom=bLem.classList.contains('on')?'':'none');};
let fs=1.16;document.getElementById('aPlus').onclick=()=>{fs+=.06;document.querySelectorAll('.txt').forEach(t=>t.style.fontSize=fs+'rem');};
document.getElementById('aMinus').onclick=()=>{fs=Math.max(.9,fs-.06);document.querySelectorAll('.txt').forEach(t=>t.style.fontSize=fs+'rem');};
const q=document.getElementById('q');q.addEventListener('input',()=>{const v=deacc(q.value.trim());document.querySelectorAll('.fac').forEach(f=>{const hit=!v||f.dataset.s.includes(v)||(f.dataset.n||'').includes(v);f.classList.toggle('hide',!hit);});document.querySelectorAll('section.sec').forEach(s=>{const any=[...s.querySelectorAll('.fac')].some(f=>!f.classList.contains('hide'));s.classList.toggle('hide',!any);});});
function goFac(v){v=(v||'').toString().toLowerCase().replace(/\s+/g,'').replace(/[^0-9a-z]/g,'');if(!v)return;if(state.mode!=='read')renderRead(state.rec);let target=null;document.querySelectorAll('.fac').forEach(f=>{if(!target&&(f.dataset.n||'').toLowerCase().replace(/\s+/g,'')===v)target=f;});if(!target)target=document.getElementById(state.rec+'_fac'+v);if(target){target.classList.remove('hide');flash(target.querySelector('.num'));}else alert('Facetia "'+v+'" not found in '+state.rec+'.');}
document.getElementById('jump').addEventListener('keydown',e=>{if(e.key==='Enter')goFac(e.target.value);});
(function(){const rz=document.getElementById('resizer'),nav=document.querySelector('nav.toc'),wrap=document.querySelector('.wrap');if(rz){rz.addEventListener('mousedown',e=>{rz._d=true;rz.classList.add('drag');document.body.style.userSelect='none';e.preventDefault();});window.addEventListener('mousemove',e=>{if(!rz._d)return;let w=e.clientX-wrap.getBoundingClientRect().left;w=Math.max(150,Math.min(520,w));nav.style.flex='0 0 '+w+'px';nav.style.width=w+'px';});window.addEventListener('mouseup',()=>{if(rz._d){rz._d=false;rz.classList.remove('drag');document.body.style.userSelect='';}});}})();
renderRead('alpha');
</script></body></html>
