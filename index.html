e","tr":"Un magistrato Cumano annunciò tali disposizioni: “Gli efori, dopo il sacrificio, riportino all’istante le loro pelli al sacerdote. Voi, i buleuti, venite al §I§bouleuterion§/I§ se non tenete consiglio. I cuochi, poi, gettino le proprie ossa oltre la cinta muraria. I calzolai, poi, non abbiano forme da scarpe di taglia piccola”.","label":"180","app":[],"wit":"A","n":188,"A":"188","dawe":"180"},{"A":"189","n":189,"dawe":"181","wit":"A","label":"181","app":[{"reading":"§SIG:Thierfelder§ : αἰτιώμενοι §SIG:A§","sigla":["A","Thierfelder"],"query":false,"dirty":false,"span":[91,102],"unit":428,"id":"428","editors":["Thierfelder"],"lemma":"αἰτιωμένους"},{"sigla":["A","Dawe","Eberhard"],"reading":"§SIG:Eberhard§ : ἔφη §SIG:A§ | post ἔφασαν, ‹φανεῖσθε› §SIG:Dawe§","dirty":false,"span":[126,132],"query":false,"unit":429,"id":"429","lemma":"ἔφασαν","editors":["Dawe","Eberhard"]}],"text":"Κυμαῖοι εἰς ψηφοφορίαν ἀπαντήσαντες καὶ γνόντες πολλοὺς ἐκ τῶν ἄλλων πόλεων ἀπολειφθέντας, αἰτιωμένους τὴν ἀτραπόν· Μὴ μωροί, ἔφασαν, ἐὰν καὶ ἡμεῖς εἰς τὸ μέλλον οὐκ ἐρχόμεθα;","type":"joke","tr":"Dei Cumani si recarono ad una votazione, vennero a sapere che molti dalle altre città erano rimasti indietro incolpando la difficoltà del sentiero, e dissero: «Siamo pazzi, se non arriviamo in ritardo anche noi?».","num":"181"},{"dawe":"182","n":190,"A":"190","wit":"AC","app":[],"label":"182","type":"joke","tr":"Un medico cumano mentre operava una ferita in testa pose il paziente supino e gli versò dell’acqua nella bocca, per vedere se mai (l’acqua) sarebbe colata fuori dalla parte operata.","text":"","num":"182"},{"app":[],"type":"section","text":"δύσκολοι"},{"text":"Δυσκόλῳ ἰατρῷ προσελθών τις εἶπε· Σοφιστά, ἀνακεῖσθαι οὐ δύναμαι οὔτε ἑστάναι, ἀλλ’ οὐδὲ καθῆσθαι. καὶ ὁ ἰατρὸς εἶπεν· Οὐδέν σοι λείπει ἢ κρεμασθῆναι.","tr":"Un tale venne da un medico burbero e disse: «Dottore, non riesco a stare allungato, né in piedi, ma nemmeno seduto! E il medico disse: «Non ti rimane che essere impiccato».","type":"joke","num":"183","n":191,"A":"191","dawe":"183","wit":"AM","label":"183","app":[{"lemma":"ἰατρὸς","editors":["Thierfelder"],"id":"430","unit":430,"dirty":false,"span":[105,111],"query":false,"sigla":["Thierfelder"],"reading":"§SIG:Thierfelder§"},{"unit":431,"id":"431","lemma":"τετρωμένην","editors":[],"sigla":["A","C"],"reading":"§SIG:A§ : τετριμμένην §SIG:C§","span":null,"dirty":false,"query":false},{"query":false,"span":null,"dirty":false,"reading":"§SIG:A§ : ἔβαλεν §SIG:C§","sigla":["A","C"],"editors":[],"lemma":"ἐνέβαλεν","unit":432,"id":"432"},{"sigla":["A","C","Dawe","Thierfelder"],"reading":"§SIG:A§§SIG:C§ : ἵνα ἴδῃ, [τὸ] πότε διὰ τοῦ χειρουργηθέντος ἐκρεύσε transp. §SIG:Thierfelder§ : ἵνα ἴδῃ, ‹εἰ› διὰ τοῦ χειρουργηθέντος τόπου ἐκρεύσε §SIG:Dawe§","dirty":false,"span":null,"query":false,"id":"433","unit":433,"lemma":"ἵνα … ἐκρεύσει","editors":["Dawe","Thierfelder"]},{"dirty":false,"span":null,"query":false,"sigla":["A","Braccini","C","Cataudella"],"reading":"§SIG:Cataudella§ : πότερον dub. §SIG:Braccini§ : τὸ πότε §SIG:A§ : ὅποτε §SIG:C§","lemma":"εἴποτε","editors":["Braccini","Cataudella"],"id":"434","unit":434},{"id":"435","unit":435,"lemma":"","editors":[],"sigla":["A","M"],"reading":"§SIG:A§ : περὶ δυσκόλων §SIG:M§","span":null,"dirty":false,"query":false},{"id":"436","unit":436,"editors":[],"lemma":"ἀλλ οὐδὲ","reading":"§SIG:A§ : ἀλ’λ’ ουδὲ §SIG:M§","sigla":["A","M"],"query":false,"span":[79,88],"dirty":false},{"sigla":["A","M","Pontanus"],"reading":"§SIG:Pontanus§ : καθεῖσθαι §SIG:A§§SIG:M§","dirty":false,"span":[89,97],"query":false,"id":"437","unit":437,"lemma":"καθῆσθαι","editors":["Pontanus"]},{"dirty":false,"span":[138,149],"query":false,"sigla":["A","M"],"reading":"§SIG:M§ : κρεμμασθῆναι §SIG:A§","lemma":"κρεμασθῆναι","editors":[],"unit":438,"id":"438"}]},{"label":"184; 40 β","app":[{"sigla":["A","Boissonade"],"reading":"§SIG:A§ : αἷμα ‹ἐκβάλλω ὅτε› κάθημαι dub. §SIG:Boissonade§","dirty":false,"span":[40,52],"query":false,"id":"439","unit":439,"lemma":"αἷμα κάθημαι","editors":["Boissonade"]}],"n":192,"A":"192","dawe":"184","wit":"A","text":"Δυσκόλῳ ἰατρῷ τις λέγει· Τί ποιήσω, ὅτι αἷμα κάθημαι καὶ χολάς; κἀκεῖνος πρὸς αὐτὸν εἶπεν· Ἐὰν καὶ τὰ ἔντερά σου ἐκβάλῃς, ἐγὼ οὐ χολῶ.","type":"joke","tr":"Un tale dice a un medico burbero: «Cosa posso fare per il fatto che evacuo sangue e bili?» e quello gli dice «Se anche rimettessi le tue interiora, io non mi prenderei bile».","num":"184"},{"app":[{"lemma":"Δύσκολος … νοσοῦντα","editors":[],"id":"440","unit":440,"dirty":false,"span":[0,43],"query":false,"sigla":["A","C","M"],"reading":"§SIG:A§§SIG:M§ : Δύσκολον νοσοῦντα ἰατρὸς ἑτερόφθαλμος ἠρώτα §SIG:C§"},{"unit":441,"id":"441","lemma":"ὁ1 … εἶπεν","editors":[],"sigla":["A","C","M"],"reading":"§SIG:C§ : εἶπεν §SIG:A§§SIG:M§","dirty":false,"span":[56,66],"query":false},{"reading":"§SIG:A§§SIG:M§ : ὁ δὲ §SIG:C§","sigla":["A","C","M"],"query":false,"dirty":false,"span":[80,91],"unit":442,"id":"442","editors":[],"lemma":"ὁ2 … ἰατρὸς"},{"query":false,"span":[123,128],"dirty":false,"reading":"§SIG:A§§SIG:C§ : ἥμυσί §SIG:M§","sigla":["A","C","M"],"editors":[],"lemma":"ἥμισύ","unit":443,"id":"443"},{"unit":444,"id":"444","lemma":"ἀπέθανεν","editors":[],"sigla":["A","C","M"],"reading":"§SIG:A§ : ἀπέθανε §SIG:C§§SIG:M§","dirty":false,"span":[133,141],"query":false}],"label":"185; 47 β","wit":"AMC","dawe":"185","A":"193","n":193,"num":"185","tr":"Un medico burbero che vedeva solo da un occhio domandava ad un paziente: «Come stai?», e quello disse: «Come vedi». Il medico fece: «Se stai come vedo, la metà di te è morta».","type":"joke","text":"Δύσκολος ἰατρὸς ἑτερόφθαλμος ἠρώτα νοσοῦντα· Πῶς ἔχεις; ὁ δὲ εἶπεν· Ὡς βλέπεις. ὁ δὲ ἰατρὸς ἔφη· Ἐὰν ὡς ἐγὼ βλέπω ἔχῃς, τὸ ἥμισύ σου ἀπέθανεν."},{"dawe":"186","n":194,"A":"194","wit":"AMC","app":[{"lemma":"Πρὸς","editors":[],"unit":445,"id":"445","dirty":false,"span":[0,4],"query":false,"sigla":["A","C","M"],"reading":"§SIG:A§§SIG:C§ : ρὸς §SIG:M§"},{"reading":"§SIG:A§§SIG:M§ : Πολλὰ §SIG:C§ : Κάκιστα dub. §SIG:Thierfelder§","sigla":["A","C","M","Thierfelder"],"query":false,"span":[56,60],"dirty":false,"id":"446","unit":446,"editors":["Thierfelder"],"lemma":"Κακὰ"},{"lemma":"πυρέττεις","editors":[],"unit":447,"id":"447","span":[61,70],"dirty":false,"query":false,"sigla":["A","C","M"],"reading":"§SIG:A§§SIG:C§ : πυρ ἔττεις §SIG:M§"},{"id":"448","unit":448,"editors":[],"lemma":"ἀποκριθεὶς","reading":"§SIG:A§§SIG:M§ : om. §SIG:C§","sigla":["A","C","M"],"query":false,"dirty":false,"span":[77,87]},{"reading":"§SIG:A§§SIG:M§ : κρειττόνως §SIG:C§","sigla":["A","C","M"],"query":false,"dirty":false,"span":[109,116],"unit":449,"id":"449","editors":[],"lemma":"κρείττω"},{"unit":450,"id":"450","lemma":"ἀναπεσὼν","editors":[],"sigla":["A","C","M"],"reading":"§SIG:A§§SIG:M§ : καὶ ἀναπεσὼν §SIG:C§","dirty":false,"span":[140,148],"query":false}],"label":"186","type":"joke","tr":"Un medico andò da un malato burbero, e dopo averlo toccato disse: «Scotti malamente!». L’altro allora rispose: «Se tu sai scottare meglio, ecco un letto: buttatici sopra e scotta!».","text":"Πρὸς δύσκολον ἰατρὸς προσελθὼν καὶ ἁψάμενος αὐτοῦ εἶπε· Κακὰ πυρέττεις. ὁ δὲ ἀποκριθεὶς εἶπεν· Εἰ δύνασαι σὺ κρείττω πυρέττειν, ἰδοὺ κλίνη· ἀναπεσὼν πύρεττε.","num":"186"},{"label":"187; 41 β","app":[{"id":"451","unit":451,"lemma":"γένεσιν","editors":["DeRhoer"],"sigla":["A","DeRhoer"],"reading":"§SIG:DeRhoer§ : γέννησιν §SIG:A§","dirty":false,"span":[35,42],"query":false},{"id":"452","unit":452,"lemma":"πολυχρόνιον","editors":["Minas"],"sigla":["A","Minas"],"reading":"§SIG:Minas§ : πολλυχρόνιον §SIG:A§","dirty":false,"span":[50,61],"query":false},{"dirty":false,"span":[62,67],"query":false,"sigla":["A","Boissonade"],"reading":"§SIG:Boissonade§ : αὐτὸ §SIG:A§","lemma":"αὐτὸν","editors":["Boissonade"],"id":"453","unit":453}],"n":195,"A":"195","dawe":"187","wit":"A","text":"Δύσκολος ἀστρολόγος παιδὸς νοσεροῦ γένεσιν λέγων, πολυχρόνιον αὐτὸν τῇ μητρὶ ὡς ἐπαγγειλάμενος ᾔτει τὸν μισθόν. τῆς δὲ εἰπούσης· Ἐλθόντι σοι αὔριον δώσω ἔφη· Τί οὖν, ἐὰν τὴν νύκτα ἀποθάνῃ καὶ ἐγὼ τὸν μισθὸν ἀπόλλω;","type":"joke","tr":"Un astrologo burbero che faceva l’oroscopo a un bambino malato annunciò alla madre che quello sarebbe stato longevo e chiedeva il compenso. Quando quella disse: «Vieni domani e te lo darò», fece: «E che faccio, se stanotte muore e io mi gioco il compenso?».","num":"187"},{"label":"188; 42 β","app":[{"id":"454","unit":454,"lemma":"ἐκχυθῇ","editors":["Eberhard","Minas"],"sigla":["A","Eberhard","M","Minas"],"reading":"§SIG:A§§SIG:M§ : ἐκχυθήτω dub. §SIG:Eberhard§ : ἐκχυθείη §SIG:Minas§","span":[122,128],"dirty":false,"query":false}],"wit":"AM","A":"196","n":196,"dawe":"188","num":"188","text":"Δυσκόλου κεράμιον μέλιτος ἀγοράσαντος καὶ ὑπό τινος ἐρωτηθέντος, πόσου ἠγόρασεν, καταστρέφων τὸ κεράμιον ἔλεγεν· Οὕτω μου ἐκχυθῇ τὸ αἷμα, ἐὰν εἴπω ὑμῖν.","type":"joke","tr":"Quando un burbero comprò un vaso di miele e gli fu chiesto a quanto lo avesse comprato, capovolse il vaso e diceva: «Così coli il mio sangue, se ve lo dovessi dire!»."},{"label":"189","app":[{"lemma":"ψιχία","editors":[],"id":"455","unit":455,"span":[50,55],"dirty":false,"query":false,"sigla":["A","C","M"],"reading":"§SIG:A§ : ψιχίαν §SIG:C§ : ψυχια §SIG:M§"},{"id":"456","unit":456,"editors":[],"lemma":"μετὰ","reading":"§SIG:A§§SIG:M§ : μετὰ τοῦ §SIG:C§","sigla":["A","C","M"],"query":false,"dirty":false,"span":[56,60]},{"id":"457","unit":457,"editors":[],"lemma":"τὸ","reading":"§SIG:A§§SIG:C§ : om. §SIG:M§","sigla":["A","C","M"],"query":false,"span":[116,118],"dirty":false},{"sigla":["A","C","M"],"reading":"§SIG:A§§SIG:M§ : κλουβίν §SIG:C§","dirty":false,"span":[119,127],"query":false,"unit":458,"id":"458","lemma":"κλουβίον","editors":[]},{"editors":[],"lemma":"ψιχίδια","id":"459","unit":459,"query":false,"dirty":false,"span":[170,177],"reading":"§SIG:A§§SIG:C§ : ψυχιδία §SIG:M§","sigla":["A","C","M"]}],"A":"197","n":197,"dawe":"189","wit":"AMC","text":"Πρὸς δύσκολον ἄρρωστον ἰατρὸς προσελθὼν προσέταξε ψιχία μετὰ στρουθίου φαγεῖν. καὶ ὁ δύσκολος εἶπε· Πῶς δύναμαι εἰς τὸ κλουβίον εἰσελθεῖν, ἵνα φάγω μετὰ τοῦ στρουθίου τὰ ψιχίδια;","tr":"Un medico si recò da un ammalato burbero e gli prescrisse di mangiare mollichine con un uccellino. Allora il burbero disse: «Come posso entrare nella gabbia per mangiare le mollichine con l’uccellino?».","type":"joke","num":"189"},{"num":"190","text":"Δυσκόλου ταυλίζοντος κατεπέτασσέ τις ἀργὸς καθήμενος. ὁ δὲ θυμούμενος ἠρώτησεν αὐτόν· Ποίας τέχνης; καὶ διὰ τί ἀργεῖς; ἐκείνου δὲ εἰπόντος ὅτι Ῥάπτης εἰμί, ἔργον δὲ οὐκ ἔχω διαρρήξας αὐτοῦ τὸν χιτῶνα καὶ ἐπιδοὺς εἶπε· Λαβὼν ἐργάζου καὶ σιώπα.","type":"joke","tr":"Mentre un burbero giocava a dadi, un fannullone che stava lì seduto gli dava consigli. Il burbero allora, irritandosi gli chiese: «Qual è il tuo lavoro? E perché stai senza far nulla?». Quando quello disse: «Sono un rammendatore, ma non ho lavoro», il burbero si strappò il chitone, glielo diede e disse: «Prendi, lavora e taci!».","wit":"A","n":198,"A":"198","dawe":"190","label":"190; 43 β","app":[{"id":"460","unit":460,"lemma":"κατεπέτασσέ","editors":["Minas"],"sigla":["A","Minas"],"reading":"§SIG:Minas§ : κατεπέτασε §SIG:A§","span":[21,32],"dirty":false,"query":false},{"id":"461","unit":461,"lemma":"Ποίας τέχνης","editors":["Dawe"],"sigla":["A","Dawe"],"reading":"§SIG:A§ : Ποὶαν ‹οἶδας› τέχνην §SIG:Dawe§","span":[86,98],"dirty":false,"query":false},{"query":false,"span":[189,199],"dirty":false,"reading":"§SIG:A§ : τὸν ἑαυτοῦ χιτῶνα §SIG:Minas§","sigla":["A","Minas"],"editors":["Minas"],"lemma":"τὸν χιτῶνα","id":"462","unit":462}]},{"A":"199","n":199,"dawe":"191","wit":"A","label":"191; 45 β","app":[],"text":"Δύσκολόν τις ἠρώτα· Ποῦ μένεις; ὁ δὲ εἶπεν· Ἐκεῖθεν μεταβαίνω.","tr":"Un tale chiese ad un burbero: «Dove abiti?» e quello disse: «Trasloco da lì!».","type":"joke","num":"191"},{"app":[{"span":[116,123],"dirty":false,"query":false,"sigla":["A","Minas"],"reading":"§SIG:Minas§ : Σικελλία §SIG:A§","lemma":"Σικελίᾳ","editors":["Minas"],"id":"463","unit":463}],"label":"192","dawe":"192","n":200,"A":"200","wit":"A","tr":"Un tale incontrò un armatore burbero e disse: «Ho visto il tuo bacino a Rodi!», e quello rispose: «E io ho visto il tuo fegato in Sicilia».","type":"joke","text":"Δυσκόλῳ τις ναυκλήρῳ ἀπαντήσας εἶπε· Τὸν ἐπίπλουν σου εἶδον ἐν Ῥόδῳ. κἀκεῖνος ἀπεκρίνατο· Κἀγώ σου εἶδον τὸ ἧπαρ ἐν Σικελίᾳ.","num":"192"},{"num":"193","text":"Δύσκολόν τις ἐζήτει. ὁ δὲ ἀπεκρίνατο· Οὐκ εἰμὶ ὧδε. τοῦ δὲ γελάσαντος καὶ εἰπόντος· Ψεύδῃ· τῆς γὰρ φωνῆς σου ἀκούω εἶπεν· Ὦ κάθαρμα, εἰ μὲν ὁ δοῦλός μου εἶπεν, εἶχες ἂν αὐτῷ πιστεῦσαι· ἐγὼ δέ σοι οὐ φαίνομαι ἀξιοπιστότερος ἐκείνου εἶναι;","tr":"Un tale cercava un burbero. Questi rispose: «Non sono qui». Quando l’altro allora scoppiò a ridere e disse: «Menti: sento infatti la tua voce!», il burbero disse: «Disgraziato, se te lo avesse detto il mio servo, gli avresti creduto, io invece a te non sembro essere degno di maggior fede di quello?».","type":"joke","wit":"AMC","n":201,"A":"201","dawe":"193","label":"193; 44 β","app":[{"span":[13,19],"dirty":false,"query":false,"sigla":["A","C","M"],"reading":"§SIG:A§§SIG:M§ : προσεζήτει §SIG:C§","lemma":"ἐζήτει","editors":[],"id":"464","unit":464},{"editors":[],"lemma":"Ψεύδῃ","id":"465","unit":465,"query":false,"span":[84,89],"dirty":false,"reading":"§SIG:A§ : ψεύση §SIG:C§ : ψεύδει §SIG:M§","sigla":["A","C","M"]},{"id":"466","unit":466,"lemma":"αὐτῷ","editors":[],"sigla":["A","C","M"],"reading":"§SIG:A§§SIG:M§ : αὐτὸ §SIG:C§","span":[169,173],"dirty":false,"query":false},{"lemma":"ἀξιοπιστότερος","editors":[],"unit":467,"id":"467","dirty":false,"span":[208,222],"query":false,"sigla":["A","C","M"],"reading":"§SIG:A§§SIG:M§ : ἀξιόπιστος §SIG:C§"}]},{"app":[{"dirty":false,"span":[52,70],"query":false,"sigla":["A","Boissonade"],"reading":"§SIG:Boissonade§ : εἰπόντος οἰκοκυροῦ §SIG:A§","lemma":"οἰκοκυροῦ εἰπόντος","editors":["Boissonade"],"unit":468,"id":"468"},{"query":false,"dirty":false,"span":[98,101],"reading":"§SIG:A§ : Ἐγὼ ‹ἔσω› §SIG:Dawe§","sigla":["A","Dawe"],"editors":["Dawe"],"lemma":"Ἐγὼ","unit":469,"id":"469"},{"unit":470,"id":"470","editors":["Cataudella"],"lemma":"Ἐγὼ … ἐλάκησα","reading":"§SIG:A§ : ἐγώ σου ἔνοικος ἐλάκησα §SIG:Cataudella§","sigla":["A","Cataudella"],"query":false,"dirty":false,"span":null},{"lemma":"καὶ συντυχεῖν","editors":["Dawe"],"id":"471","unit":471,"span":null,"dirty":false,"query":false,"sigla":["Dawe"],"reading":"del. §SIG:Dawe§"},{"lemma":"","editors":[],"id":"472","unit":472,"dirty":false,"span":null,"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : περὶ ἀφυῶν §SIG:M§"}],"label":"194; 46 β","dawe":"194","n":202,"A":"202","wit":"A","tr":"Un burbero mentre scendeva una scala inciampò e cadde. Quando il padrone di casa disse: «Chi c’è lì?», rispose: «Io, mi sono ammazzato a costo del mio affitto. Tu che vuoi?».","type":"joke","text":"Δύσκολος σκάλαν καταβαίνων σφαλεὶς κατέπεσε. τοῦ δὲ οἰκοκυροῦ εἰπόντος· Τίς ἔνι ἐκεῖ; ἀπεκρίνατο· Ἐγὼ τοῦ ἐνοικίου μου ἐλάκησα. τί πρὸς σέ;","num":"194"},{"dawe":"195","n":203,"A":"203","wit":"AM","app":[],"label":"195","tr":"Un tale diceva ad un burbero di rango senatorio: «Desidero vederti e incontrarti un po’». E quello rispose: «Anche io desidero vederti cieco e zoppo».","type":"joke","text":"","num":"195"},{"app":[],"text":"ἀφυεῖς","type":"section"},{"app":[],"label":"196","dawe":"196","A":"204","n":204,"wit":"A","tr":"Ad un grammatico incapace fu domandato: «Come bisogna dire, “ai due” o “ai dui”?», e questi protese la mano e indicava due dita.","type":"joke","text":"Ἀφυὴς γραμματικὸς ἐρωτηθείς· Πῶς δεῖ λέγειν, τοῖς δύο ἢ τοῖς δυσί; ὁ δὲ τὴν χεῖρα προτείνας τοὺς δύο ὑπεδείκνυε δακτύλους.","num":"196"},{"app":[],"label":"197","dawe":"197","A":"205","n":205,"wit":"AM","tr":"Ad un grammatico incapace fu domandato: «Come si chiamava la madre di Priamo?». Non sapendo rispondere, disse: «Noi, per rispetto, la chiamiamo signora».","type":"joke","text":"Ἀφυὴς γραμματικὸς ἐρωτηθείς· Ἡ μήτηρ Πριάμου τίς ἐκαλεῖτο; ἀπορῶν ἔφη· Ἡμεῖς κατὰ τιμὴν κυρίαν αὐτὴν καλοῦμεν.","num":"197"},{"label":"198","app":[{"editors":[],"lemma":"προσετίθει","unit":473,"id":"473","query":false,"span":[52,62],"dirty":false,"reading":"§SIG:A§ : ἐτίθει §SIG:M§","sigla":["A","M"]},{"unit":474,"id":"474","editors":[],"lemma":"δηναρίου","reading":": διναρίου §SIG:A§ac§SIG:M§, corr. §SIG:A§2","sigla":["A","M"],"query":false,"dirty":false,"span":[133,141]},{"query":false,"dirty":false,"span":[142,151],"reading":"§SIG:A§ : ξηρὰμενος §SIG:M§","sigla":["A","M"],"editors":[],"lemma":"ξυράμενος","unit":475,"id":"475"},{"dirty":false,"span":[161,169],"query":false,"sigla":["A","M"],"reading":": διναρίων §SIG:A§ac§SIG:M§, corr. §SIG:A§2","lemma":"δηναρίων","editors":[],"id":"476","unit":476},{"id":"477","unit":477,"editors":[],"lemma":"ἔλαβες","reading":"§SIG:A§ : ἔβαλας §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[180,186]}],"wit":"AM","n":206,"A":"206","dawe":"198","num":"198","text":"Ἀφυὴς κουρεὺς τοῖς ὑπ’ αὐτοῦ πληττομένοις ἔμπλαστρα προσετίθει. ἑνὸς δὲ αἰτιασαμένου αὐτὸν ἔφη· Ἀχάριστε, μάτην ἀγανακτεῖς· ἑνὸς γὰρ δηναρίου ξυράμενος τεσσάρων δηναρίων ἔμπλαστρα ἔλαβες.","type":"joke","tr":"Un barbiere incapace applicava impiastri lenitivi a quelli che venivano rasati da lui. Quando uno gliene aveva chieste le ragioni, disse: «Ingrato, ti arrabbi invano: rasato infatti al costo di un denaro, hai ricevuto impiastri per una valore di quattro denari!»."},{"num":"199","text":"Ἀφυὴς μαθητὴς κακῶς τινα κείρας καὶ παρωνυχίδας ποιήσας καὶ διὰ τοῦτο ὑπὸ τοῦ ὀνυχιζομένου ἀπωσθεὶς ἀνεβόησεν· Ἐπιστάτα, τί οὐκ ἀφίησί με μαθεῖν;","tr":"Un apprendista incapace tagliò male le unghie ad un tale, gli fece venire dei paterecci e dopo essere stato perciò scacciato da quel tale, si lamentò: «Capo, perché non mi lasci imparare?».","type":"joke","label":"199","app":[{"dirty":false,"span":[36,47],"query":false,"sigla":["A","Minas"],"reading":"§SIG:Minas§ : παρονυχίδας §SIG:A§","lemma":"παρωνυχίδας","editors":["Minas"],"id":"478","unit":478},{"span":[128,134],"dirty":false,"query":false,"sigla":["A","Kurtz"],"reading":"§SIG:Kurtz§ : ἀφίης §SIG:A§","lemma":"ἀφίησί","editors":["Kurtz"],"unit":479,"id":"479"}],"wit":"A","A":"207","n":207,"dawe":"199"},{"app":[{"editors":[],"lemma":"καὶ κλαίω","id":"480","unit":480,"query":false,"dirty":false,"span":[119,128],"reading":"","sigla":[]},{"lemma":"παρωνυχίδας","editors":["Minas"],"id":"481","unit":481,"dirty":false,"span":[160,171],"query":false,"sigla":["A","Minas"],"reading":"§SIG:Minas§ : παρονυχίδας §SIG:A§"}],"label":"200","wit":"A","dawe":"200","A":"208","n":208,"num":"200","tr":"Un apprendista incapace venne incaricato dal capo di tagliare le unghie ad un signore rispettabile e scoppiò a piangere. Quando questi gliene chiese il motivo, disse: «Ho paura e piango: sto infatti per ferirti, e ti verranno dei paterecci, e il capo mi picchierà!».","type":"joke","text":"Ἀφυὴς μαθητὴς ὑπὸ τοῦ ἐπιστάτου κελευσθεὶς ὀνυχίσαι οἰκοδεσπότην ἐδάκρυσε. τοῦ δὲ τὴν αἰτίαν ἐρωτήσαντος ἔφη· Φοβοῦμαι καὶ κλαίω· μέλλω γὰρ τραυματίσαι σε, καὶ παρωνυχίδας ποιήσεις, καὶ τύψει με ὁ ἐπιστάτης."},{"app":[{"dirty":false,"span":[196,201],"query":false,"sigla":["A","Minas","Thierfelder"],"reading":"§SIG:A§ : ουδὲ §SIG:Minas§ : οὐ dub. §SIG:Thierfelder§","lemma":"Οὐδὲν","editors":["Minas","Thierfelder"],"id":"482","unit":482},{"unit":483,"id":"483","editors":["Dawe"],"lemma":"γὰρ … κατὰ","reading":"§SIG:A§ : ἄρ’ οἶδας κατὰ τὸν κατὰ dub. §SIG:Dawe§","sigla":["A","Dawe"],"query":false,"span":[202,220],"dirty":false}],"label":"201","dawe":"201","A":"209","n":209,"wit":"A","type":"joke","tr":"Un tale si recò da un indovino incapace mentre ritornava da un viaggio all’estero e gli faceva domande riguardo i familiari. Questi disse: «Sono tutti in salute, anche tuo padre». Siccome quello allora aveva detto: «mio padre è dieci anni che è morto!», l’indovino rispose: «Infatti non conosci affatto il tuo vero padre».","text":"Ἀφυεῖ μάντει προσελθών τις ἐξ ἀποδημίας ἀνιὼν ἠρώτα περὶ τῶν οἰκείων. ὁ δὲ εἶπεν· Ὑγιαίνουσι πάντες, καὶ ὁ πατήρ σου. τοῦ δὲ εἰπόντος ὅτι Ὁ πατήρ μου δέκατον ἔτος ἔχει ἀφ’ οὗ ἀπέθανεν ἀπεκρίνατο· Οὐδὲν γὰρ οἶδας τὸν κατὰ ἀλήθειάν σου πατέρα.","num":"201"},{"dawe":"202","n":210,"A":"210","wit":"AC","app":[{"sigla":["A","C"],"reading":": μαθητικὸς §SIG:A§ : μάθη §SIG:C§","span":[6,17],"dirty":false,"query":false,"id":"484","unit":484,"lemma":"μαθηματικὸς","editors":[]},{"id":"485","unit":485,"editors":[],"lemma":"ἔσται ῥήτωρ","reading":"§SIG:A§ : ῥήτωρ ἔσται §SIG:C§","sigla":["A","C"],"query":false,"span":[53,64],"dirty":false},{"id":"486","unit":486,"lemma":"εἶπεν·","editors":[],"sigla":["A","C"],"reading":"§SIG:A§ : ἔφη §SIG:C§","dirty":false,"span":[145,150],"query":false},{"sigla":["A","C"],"reading":"§SIG:A§ : ταῦτα πάντα §SIG:C§","dirty":false,"span":[254,265],"query":false,"unit":487,"id":"487","lemma":"πάντα ταῦτα","editors":[]}],"label":"202","tr":"Un astrologo incapace mentre esponeva il destino di un bambino, disse: «Costui sarà retore, poi prefetto, poi governatore di provincia!». Quindi, quando proprio questo bambino era ormai morto, la madre incontrò l’indovino e gli disse: «Quello che dicevi sarebbe stato retore, e magistrato, e governatore, è morto». Questi allora fece: «Oh, per la sua memoria, se fosse vissuto, sarebbe diventato tutte queste cose».","type":"joke","text":"Ἀφυὴς μαθηματικὸς παιδίου γένεσιν λέγων εἶπεν· Οὗτος ἔσται ῥήτωρ, εἶτα ἔπαρχος, εἶτα ἡγεμών. τεθνηκότος οὖν τοῦ παιδὸς τούτου ἡ μήτηρ ἀπαντήσασα εἶπεν· Ὃν ἔλεγες ῥήτορα ἔσεσθαι καὶ ἄρχοντα καὶ ἡγεμόνα, ἀπέθανεν. ὁ δὲ ἔφη· Μὰ τὴν αὐτοῦ μνήμην, ἐὰν ἔζησε, πάντα ταῦτα ἂν ἐγένετο.","num":"202"},{"wit":"A","dawe":"203","n":211,"A":"211","app":[],"label":"203","num":"203","type":"joke","tr":"Un tale si recò da un indovino incapace e gli domandava se un suo rivale avrebbe fatto ritorno da un viaggio all’estero. L’indovino rispose che non sarebbe tornato. Come il tale apprese giorni dopo che quello era rientrato, disse: «Nessuno è più inetto di lui!».","text":"Ἀφυεῖ μάντει προσελθών τις ἠρώτα, εἰ ὁ ἐχθρὸς αὐτοῦ ἐξ ἀποδημίας ἥξει. ὁ δὲ εἶπεν, ὅτι οὐκ ἔρχεται. ὡς δὲ ἔμαθε μεθ’ἡμέρας παραγενόμενον αὐτόν, ἔφη· Οὐδὲν αὐτοῦ ἀχρωμότερον."},{"num":"204","text":"Ἀφυὴς μαθηματικὸς μοιρολογῶν τινα ἔφη· Οὐκ ἦν σοι κατὰ γένος τεκνῶσαι. τοῦ δὲ εἰπόντος ὅτι Ἑπτὰ παῖδας ἔχω εἶπεν· Οὐκοῦν πρόσεχε αὐτοῖς.","type":"joke","tr":"Un astrologo incapace mentre prediceva il fato ad un tale disse: «Per nascita non ti era possibile procreare». Quando però quello fece: «Ho sette figli!», disse: «Allora devi starci attento».","wit":"A","n":212,"A":"212","dawe":"204","label":"204","app":[{"reading":"§SIG:Minas§ : μαθητικὸς §SIG:A§","sigla":["A","Minas"],"query":false,"dirty":false,"span":[6,17],"id":"488","unit":488,"editors":["Minas"],"lemma":"μαθηματικὸς"},{"query":false,"dirty":false,"span":[18,28],"reading":"§SIG:Haupt§ : μακρολογῶν","sigla":["Haupt"],"editors":["Haupt"],"lemma":"μοιρολογῶν","unit":489,"id":"489"},{"id":"490","unit":490,"lemma":"","editors":["Eberhard"],"sigla":["Eberhard"],"reading":"lacunam indicavit §SIG:Eberhard§","dirty":false,"span":null,"query":false},{"id":"491","unit":491,"editors":["Boissonade"],"lemma":"Νικήσετε","reading":"§SIG:Boissonade§ : νικήσεσθε §SIG:A§","sigla":["A","Boissonade"],"query":false,"dirty":false,"span":null},{"sigla":["A","Dawe","Haupt"],"reading":"§SIG:Haupt§ : τοὺς πολεμίους §SIG:Dawe§ : τὸν πὸλεμον §SIG:A§","span":null,"dirty":false,"query":false,"id":"492","unit":492,"lemma":"τοὺς πολεμίους","editors":["Dawe","Haupt"]},{"lemma":"ἐξόπισθεν","editors":["Minas"],"unit":493,"id":"493","span":null,"dirty":false,"query":false,"sigla":["A","Minas"],"reading":"§SIG:Minas§ : ἐξώπισθεν §SIG:A§"}]},{"label":"205","app":[],"wit":"A","A":"213","n":213,"dawe":"205","num":"205","text":"","tr":"Un indovino incapace che si era imbattuto in alcuni nemici e che aveva detto: «Sono un indovino!» ‹…›, siccome stava per iniziare una battaglia contro gli avversari disse: «Vincerete i nemici, se in battaglia essi non vedranno i capelli delle vostre teste da dietro».","type":"joke"},{"text":"δειλοί","type":"section","app":[]},{"dawe":"206","A":"214","n":214,"wit":"A","app":[],"label":"206","type":"joke","tr":"A un fifone fu chiesto: «Quali sono le navi più sicure? Quelle da guerra o quelle mercantili?», e disse: «Quelle tirate in secco!».","text":"Δειλὸς ἐρωτηθείς· Ποῖα τῶν πλοίων ἀσφαλέστερα, τὰ μακρὰ ἢ τὰ στρογγύλα; ἔφη· Τὰ νενεωλκημένα.","num":"206"},{"num":"207","text":"Δειλὸς κυνηγὸς συνεχῶς τὴν νύκτα ὑπὸ ἄρκτου διωκόμενος ἐν ὕπνῳ, κύνας μισθωσάμενος μετ’ αὐτοῦ ἐκοίμιζεν.","tr":"Un cacciatore fifone che la notte veniva continuamente inseguito nel sonno da un orso comprò dei cani e li mise a dormire con sé.","type":"joke","wit":"AM","n":215,"A":"215","dawe":"207","label":"207","app":[{"id":"494","unit":494,"editors":["Minas"],"lemma":"αὐτοῦ ἐκοίμιζεν","reading":"§SIG:A§§SIG:M§ : μεθ’ ἑαυτοῦ §SIG:Minas§","sigla":["A","M","Minas"],"query":false,"span":[88,103],"dirty":false},{"id":"495","unit":495,"editors":[],"lemma":"","reading":"ἐκόμιζεν §SIG:A§","sigla":["A"],"query":false,"span":null,"dirty":false}]},{"wit":"A","A":"216","n":216,"dawe":"208","label":"208","app":[{"lemma":"τὸν","editors":["Minas"],"unit":496,"id":"496","dirty":false,"span":[60,63],"query":false,"sigla":["A","Minas"],"reading":"§SIG:Minas§ : κἀκεῖ §SIG:A§"}],"num":"208","text":"Δειλῷ πύκτῃ λέγει τις· Μετὰ τίνος ἔχεις πυκτεῦσαι; κἀκεῖνος τὸν ἀντίπαλον ὑποδείξας ἔφη· Μετὰ τοῦ κυρίου μου τοῦδε.","tr":"Un tale dice ad un pugile fifone: «Con chi devi combattere?», e quello: «Con questo mio spettabile signore».","type":"joke"},{"num":"209","text":"Δειλὸς πύκτης συνεχῶς ὑπὸ ἀντιδίκου κοσκινιζόμενος ἀνεβόησε· Δέομαι ὑμῖν ἅμα πᾶσιν.","tr":"Un pugile fifone che veniva senza sosta sarchiato di botte da un avversario gridò: «Chiedo pietà a voi tutti!».","type":"joke","label":"209; cf. 226 α","app":[{"unit":497,"id":"497","lemma":"ἅμα …","editors":["Dawe","Minas"],"sigla":["A","Dawe","Minas"],"reading":"§SIG:A§ : ὑμῶν μὴ ἅμα παίσειν §SIG:Dawe§ : ὑμῶν μὴ πάντες ὁμοῦ §SIG:Minas§","span":[73,76],"dirty":false,"query":false},{"reading":"§SIG:A§ : ἔχειν §SIG:M§","sigla":["A","M"],"query":false,"span":null,"dirty":false,"id":"498","unit":498,"editors":[],"lemma":"μύρμηκας"}],"wit":"A","A":"217","n":217,"dawe":"209"},{"text":"","type":"joke","tr":"Un pugile fifone che stava acquistando un terreno chiedeva per bene ai locali se non ci fossero formiche2.§I§ §/I§","num":"210","A":"218","n":218,"dawe":"210","wit":"AM","label":"210; cf. 179 α","app":[]},{"text":"ὀκνηροί","type":"section","app":[]},{"wit":"AC","dawe":"211","A":"219","n":219,"app":[{"sigla":["A","C"],"reading":"§SIG:A§ : κλέπτης τις §SIG:C§","dirty":false,"span":[41,52],"query":false,"unit":499,"id":"499","lemma":"κλέπτης τὸν","editors":[]},{"reading":"§SIG:A§§SIG:C§ : ἑσθωμένου","sigla":["A","C"],"query":false,"span":[99,102],"dirty":false,"id":"500","unit":500,"editors":[],"lemma":"καὶ"},{"id":"501","unit":501,"lemma":"Ἄφες·ὅταν","editors":[],"sigla":["A","C"],"reading":"§SIG:A§ : ἔφη §SIG:C§","dirty":false,"span":[174,183],"query":false},{"editors":[],"lemma":"τὴν","id":"502","unit":502,"query":false,"dirty":false,"span":[196,199],"reading":"§SIG:A§ : ἐπαρεῖν §SIG:C§","sigla":["A","C"]},{"sigla":["A","Boissonade","C","Cataudella"],"reading":"§SIG:Boissonade§ cl. 54 β : στήλην §SIG:A§§SIG:C§ : στέγην §SIG:Cataudella§","span":[207,216],"dirty":false,"query":false,"unit":503,"id":"503","lemma":"κρατοῦμεν","editors":["Boissonade","Cataudella"]},{"dirty":false,"span":[217,222],"query":false,"sigla":["A","C"],"reading":"§SIG:A§ : πιάσωμεν §SIG:C§","lemma":"αὐτόν","editors":[],"unit":504,"id":"504"}],"label":"211; 54 β","num":"211","type":"joke","tr":"Mentre due pigroni stavano dormendo, entrò un ladro, sfilò loro il lenzuolo e lo rubò. Quando uno dei due se ne accorse e disse all’altro: «Alzati e raggiungi chi ha rubato il lenzuolo», questi disse: «Lascialo andare… quando tornerà a prendere il materasso, lo avremo in pugno».","text":"Ὀκνηρῶν δύο ὁμοῦ κοιμωμένων εἰσελθών τις κλέπτης τὸν σάγον ὑποσύρας ἔκλεψε. τοῦ δὲ ἑνὸς αἰσθομένου καὶ πρὸς τὸν ἕτερον εἰπόντος· Ἀναστὰς φθάσον τὸν κλέψαντα τὸν σάγον εἶπεν· Ἄφες·ὅταν ἔλθῃ ἐπᾶραι τὴν τύλην, κρατοῦμεν αὐτόν."},{"num":"212","tr":"Il padre ordinò al figlio pigrone di recarsi dal vicino e prendere in prestito un’accetta. Questi allora disse: «Tanto non la dà…». Poiché però il padre insisteva, rispose: «Io sono il vicino, e non ho un’accetta!».","type":"joke","text":"Ὀκνηρῷ υἱῷ ἐκέλευσεν ὁ πατὴρ εἰς τὸν γείτονα ἀπελθεῖν καὶ χρήσασθαι ἀξίνην. ὁ δὲ ἔφη· Οὐ δίδει. τοῦ δὲ πατρὸς ἐπιμένοντος ἀπεκρίνατο· Ἐγώ εἰμι ὁ γείτων καὶ ἀξίνην οὐκ ἔχω.","wit":"A","dawe":"212","A":"220","n":220,"app":[{"unit":505,"id":"505","lemma":"ἀπεκρίνατο","editors":["Dawe"],"sigla":["Dawe"],"reading":"lacunam post ἐπιμένοντος statuit §SIG:Dawe§","span":[122,132],"dirty":false,"query":false},{"id":"506","unit":506,"lemma":"ἐχρεώστει","editors":[],"sigla":["A","C"],"reading":"§SIG:C§ : δινάριον ubique §SIG:A§ac corr. §SIG:A§2","dirty":false,"span":null,"query":false}],"label":"212; 55 β"},{"wit":"AC","dawe":"213","n":221,"A":"221","app":[],"label":"213; 56 β","num":"213","type":"joke","tr":"Un pigrone aveva un credito di un denaro con un altro pigrone. Dopo averlo incontrato, gli chiedeva il denaro. Quando il secondo allora disse: «Allunga la tua mano, aprimi il borsellino e prendi il denaro», quello fece: «Va’ pure per la tua strada, non mi devi nulla…».","text":""},{"app":[],"type":"section","text":"φθονεροί"},{"tr":"Un invidioso entrò in una conceria e siccome non voleva far pipì morì.","type":"joke","text":"Φθονερὸς εἰς γναφεῖον εἰσελθὼν καὶ μὴ θέλων οὐρῆσαι ἀπέθανεν.","num":"214","app":[],"label":"214","dawe":"214","n":222,"A":"222","wit":"A"},{"num":"215","type":"joke","tr":"Un padrone di casa invidioso vide che gli inquilini se la passavano bene e li scacciò dalla sua casa.","text":"Φθονερὸς οἰκοδεσπότης τοὺς ἐνοίκους ἰδὼν εὐτυχοῦντας ἐκ τοῦ οἴκου αὐτοῦ ἐξεδίωξεν.","wit":"A","dawe":"215","A":"223","n":223,"app":[{"lemma":"δὲ","editors":[],"id":"507","unit":507,"dirty":false,"span":[13,15],"query":false,"sigla":["A","C"],"reading":"§SIG:A§ : ἀπαντήσας §SIG:C§"},{"span":[72,81],"dirty":false,"query":false,"sigla":["A","Dawe"],"reading":"§SIG:A§ : αὐτοὺς dub. §SIG:Dawe§","lemma":"ἐξεδίωξεν","editors":["Dawe"],"id":"508","unit":508},{"editors":["Dawe"],"lemma":"","id":"509","unit":509,"query":false,"dirty":false,"span":null,"reading":"ἄρκυς §SIG:Dawe§","sigla":["Dawe"]}],"label":"215"},{"num":"216","text":"Φθονερὸς ἰδὼν τὸν γείτονα θηριομαχοῦντα λέγει τῷ κυβερνήτῃ· ‹...› Ἄρκος.","type":"joke","tr":"Un invidioso vede il suo vicino di casa combattere contro le fiere e dice al direttore dell’arena: «‹Mandagli› un orso!». §I§rursus§/I§›","label":"216","app":[{"sigla":["A"],"reading":": μετόπου §SIG:A§ac","dirty":false,"span":[2,3],"query":false,"unit":510,"id":"510","lemma":"Ὁ","editors":[]}],"wit":"A","n":224,"A":"224","dawe":"216"},{"num":"217","text":"Ἄλλος διὰ δειλίαν ἐπέγραψεν ἐπὶ τοῦ μετώπου· Ὁ τόπος τῶν καιρίων. παιόμενος οὖν συνεχῶς εἶπε πρὸς τοὺς παρόντας· Μή τι οὗτος γράμματα οὐκ οἶδεν καὶ ἀναιρεῖ με;","type":"joke","tr":"Un altro ‹pugile fifone› per la paura si scrisse sulla fronte: §I§Il luogo dei colpi mortali§/I§. Mentre veniva colpito disse dunque al pubblico: «Forse che questo qui non sa leggere e mi ammazza?».","wit":"A","n":225,"A":"225","dawe":"217","label":"217","app":[{"sigla":["A","Boissonade"],"reading":"§SIG:Boissonade§ : κυρίων §SIG:A§","dirty":false,"span":[66,75],"query":false,"unit":511,"id":"511","lemma":"παιόμενος","editors":["Boissonade"]},{"lemma":"παρόντας· Μή","editors":["Dawe","Thierfelder"],"unit":512,"id":"512","span":[103,115],"dirty":false,"query":false,"sigla":["A","Dawe","Thierfelder"],"reading":"§SIG:Thierfelder§ : τὸν παίοντα §SIG:A§ : τὸν πάυοντα §SIG:Dawe§"}]},{"app":[],"label":"218, cf. 217 α","wit":"A","dawe":"218","A":"226","n":226,"num":"218","tr":"Un pugile fifone che veniva colpito senza tregua dall’avversario disse: «Vi prego, non tutti insieme!».","type":"joke","text":""},{"app":[],"type":"section","text":"λιμόξηροι"},{"num":"219","text":"Λιμόξηρος λιμοξήρῳ θυγατέρα ἐκδιδοὺς καὶ ἐρωτώμενος, τί αὐτῇ δίδωσιν εἰς προῖκα· Οἰκίαν, ἔφη, δίδωμι, ἧς αἱ θυρίδες εἰς τὸ ἀρτοκοπεῖον βλέπουσιν.","type":"joke","tr":"Un morto di fame diede in matrimonio la figlia e, quando gli fu chiesto cosa le desse come dote, disse: «Le do una casa, le cui finestre si affacciano su un panificio».","wit":"AC","A":"227","n":227,"dawe":"219","label":"219","app":[{"unit":513,"id":"513","editors":[],"lemma":"λιμοξήρῳ","reading":"§SIG:A§ : om. §SIG:C§","sigla":["A","C"],"query":false,"dirty":false,"span":[10,18]},{"span":[37,40],"dirty":false,"query":false,"sigla":["A","C"],"reading":"§SIG:A§ : ἐνδιδοὺς §SIG:C§","lemma":"καὶ","editors":[],"unit":514,"id":"514"},{"lemma":"Οἰκίαν","editors":["Dawe"],"unit":515,"id":"515","dirty":false,"span":[81,87],"query":false,"sigla":["A","C","Dawe"],"reading":"§SIG:A§§SIG:C§ : πρόϊκα §SIG:Dawe§"},{"reading":"§SIG:A§ : ἔφη· οἰκίαν §SIG:C§","sigla":["A","C"],"query":false,"dirty":false,"span":[89,100],"id":"516","unit":516,"editors":[],"lemma":"ἔφη δίδωμι"},{"sigla":["A","C"],"reading":"§SIG:A§ : ἀρτοκόπιον §SIG:C§","span":[135,144],"dirty":false,"query":false,"unit":517,"id":"517","lemma":"βλέπουσιν","editors":[]},{"sigla":["C"],"reading":"βλέπουσι §SIG:C§","dirty":false,"span":null,"query":false,"unit":518,"id":"518","lemma":"","editors":[]}]},{"app":[{"unit":519,"id":"519","lemma":"εἶπε","editors":[],"sigla":["A","C"],"reading":"§SIG:A§ : κρεμμάμενον §SIG:C§","span":[44,48],"dirty":false,"query":false},{"span":[76,77],"dirty":false,"query":false,"sigla":["A","C"],"reading":"§SIG:A§§SIG:C§ : ἀπαγγέλεις","lemma":"ἢ","editors":[],"id":"520","unit":520},{"span":[91,99],"dirty":false,"query":false,"sigla":["A","C"],"reading":"§SIG:A§ : καὶ καὶ §SIG:C§","lemma":"ἀπαρτίζω","editors":[],"id":"521","unit":521}],"label":"220; 51 β","wit":"AC","dawe":"220","A":"228","n":228,"num":"220","type":"joke","tr":"Un maestro morto di fame vide un pane appeso e disse: «Scendi? Rispondi all’interrogazione? Oppure vengo su e ti sistemo io?».","text":"Λιμόξηρος παιδοτρίβης ἰδὼν ἄρτον κρεμάμενον εἶπε· Καταβαίνεις; ἀπαγγέλλεις; ἢ ἀναβαίνω καὶ ἀπαρτίζω σε."},{"app":[{"span":[22,31],"dirty":false,"query":false,"sigla":["A","C"],"reading":"§SIG:A§ : ἄρτον ἰδὼν §SIG:C§","lemma":"ἄρτον εἰς","editors":[],"unit":522,"id":"522"},{"span":[70,78],"dirty":false,"query":false,"sigla":["A","C"],"reading":"§SIG:A§ : ἔμπλαστον §SIG:C§","lemma":"ἐπέθηκεν","editors":[],"unit":523,"id":"523"},{"editors":[],"lemma":"","unit":524,"id":"524","query":false,"dirty":false,"span":null,"reading":"ἐπέθηκε §SIG:C§","sigla":["C"]}],"label":"221; 52 β","wit":"AC","dawe":"221","A":"229","n":229,"num":"221","type":"joke","tr":"Un medico morto di fame vide un pane posto in un buco e vi applicò un impiastro estraente.","text":"Λιμόξηρος ἰατρὸς ἰδὼν ἄρτον εἰς τρύπην κείμενον ἐκσυρτικὸν ἔμπλαστρον ἐπέθηκεν."},{"num":"222","tr":"Un medico visitò un malato morto di fame e gli prescrisse di assumere come liquido un’orzata. Se non l’avesse trovata, in alternativa della cervogia. Il morto di fame disse allora: «Se non dovessi trovare la cervogia, potrei mangiare due cerbiatti?».","type":"joke","text":"Λιμόξηρον ἄρρωστον ἰατρὸς ἐπισκεψάμενος ἐκέλευσεν ἅληκα αὐτῷ εἰς πόμα γενέσθαι. εἰ δὲ μὴ εὕροι ἅληκα, ποιῆσαι αὐτῷ ὁμοίως τράγον. ὁ δὲ λιμόξηρος ἔφη· Ἐὰν μὴ εὕρω τράγον, φάγω δύο ἐρίφια;","app":[{"dirty":false,"span":[19,25],"query":false,"sigla":["A","Minas"],"reading":"§SIG:Minas§ : ἄρρωστος §SIG:A§","lemma":"ἰατρὸς","editors":["Minas"],"id":"525","unit":525},{"id":"526","unit":526,"editors":["Dawe"],"lemma":"ὁμοίως","reading":"§SIG:Dawe§ : αὑτῷ §SIG:A§","sigla":["A","Dawe"],"query":false,"dirty":false,"span":[115,121]},{"lemma":"","editors":["Dawe"],"unit":527,"id":"527","span":null,"dirty":false,"query":false,"sigla":["Dawe"],"reading":"post ἐρίφια notam interrogationis add. §SIG:Dawe§"}],"label":"222","wit":"A","dawe":"222","A":"230","n":230},{"label":"223; 53 β","app":[{"dirty":false,"span":[76,86],"query":false,"sigla":["A","C"],"reading":"§SIG:A§ : τοῦτον §SIG:C§","lemma":"ταπείνωσον","editors":[],"id":"528","unit":528}],"wit":"AC","n":231,"A":"231","dawe":"223","num":"223","text":"Λιμόξηρος ἰδὼν ἄρτον ἐν ὑπερθύρῳ κείμενον εἶπε· Θεέ, ἢ ἐμὲ ὕψωσον ἢ ἐκεῖνον ταπείνωσον.","type":"joke","tr":"Un morto di fame un pane posto su un architrave e disse: «Dio, o innalzi me, o abbatti quello»."},{"n":232,"A":"232","dawe":"224","wit":"AC","label":"224","app":[{"reading":"§SIG:A§ : κηπωρὸν §SIG:C§","sigla":["A","C"],"query":false,"dirty":false,"span":[31,36],"unit":529,"id":"529","editors":[],"lemma":"ἔδωκε"},{"reading":"§SIG:C§ : δινάρια §SIG:A§","sigla":["A","C"],"query":false,"span":[54,57],"dirty":false,"unit":530,"id":"530","editors":[],"lemma":"ἵνα"},{"unit":531,"id":"531","lemma":"ὅσα","editors":[],"sigla":["A","C"],"reading":"§SIG:A§ : σύκα §SIG:C§","dirty":false,"span":[64,67],"query":false},{"query":false,"dirty":false,"span":[185,194],"reading":"§SIG:Thierfelder§ : μεγάλα σύκα §SIG:A§ : μεγάλα σῦκα §SIG:C§ : μεγάλας συκέας §SIG:Minas§","sigla":["A","C","Minas","Thierfelder"],"editors":["Minas","Thierfelder"],"lemma":"συκᾶς καὶ","id":"532","unit":532},{"id":"533","unit":533,"editors":[],"lemma":"ἐπεζήτει","reading":"§SIG:A§ : κηπωρὸς §SIG:C§","sigla":["A","C"],"query":false,"span":[276,284],"dirty":false},{"reading":"§SIG:C§ : ἐπιζητεῖ §SIG:A§","sigla":["A","C"],"query":false,"dirty":false,"span":[285,290],"unit":534,"id":"534","editors":[],"lemma":"αὐτόν"},{"lemma":"ἐκ … κλάδων","editors":["Dawe"],"unit":535,"id":"535","dirty":false,"span":[365,414],"query":false,"sigla":["A","C","Dawe"],"reading":"§SIG:A§ : ἠδύνου ἐκ τῶν ἄνω ἐπικειμένων §SIG:C§ : ἠδύνω ἐκ τῶν ὑποκειμένων §SIG:Dawe§"},{"query":false,"dirty":false,"span":[440,446],"reading":"§SIG:A§ : εἶπεν §SIG:C§","sigla":["A","C"],"editors":[],"lemma":"Ἐκεῖνα","unit":536,"id":"536"}],"text":"Λιμόξηρος ἀπελθὼν εἰς κηπουρὸν ἔδωκε τέσσαρα δηνάρια, ἵνα σῦκα, ὅσα θέλει, φάγῃ. τοῦ δὲ καταφρονήσαντος καὶ εἰπόντος· Ἀπὸ τῶν παρακειμένων δένδρων φάγε, ὅσα δύνασαι ἀνελθὼν εἰς μεγάλας συκᾶς καὶ ἀπὸ κορυφῆς ἀρξάμενος πάντα κατήσθιε. μετὰ δὲ πολλὴν ὥραν ἀναμνησθεὶς ὁ κηπουρὸς ἐπεζήτει αὐτόν. ὡς δὲ εἶδεν εἰς ὕψος σαλεύοντα τοὺς κλάδους καὶ ἐσθίοντα, ἀγανακτήσας εἶπε· Κάτω ἑστὼς οὐκ ἠδύνω ἐκ τῶν ἐπικειμένων κλάδων φαγεῖν; ὁ δὲ ἀπεκρίνατο· Ἐκεῖνα, ὡς καταβαίνω, τρώγω.","type":"joke","tr":"Un morto di fame andò da un giardiniere e gli diede quattro denari per mangiare quanti fichi volesse. Quando l’altro sottovalutandolo gli disse: «Mangia quanto riesci dagli alberi che stanno qui», questi salì su dei grossi fichi, iniziò dalla cima e mangiava tutto. Diverso tempo dopo il giardiniere se ne ricordò e se ne mise alla ricerca. Quando lo vide in alto che scuoteva i rami e mangiava, si arrabbiò e disse: «Non potevi startene giù e mangiare dai rami che erano lì?» Quello rispose: «Quelli li mangio ora che scendo!».","num":"224"},{"num":"225","type":"joke","tr":"Un morto di fame andò da un panetterie e gli propose di dargli due denari perché potesse rimpinzarsi di pane. Siccome questi riteneva che un pane sarebbe bastato all’avventore e aveva accettato i soldi, il morto di fame iniziò a mangiare. Questi iniziò dal cesto, si piazzò in piedi e si mise a mangiare. Quando il panettiere sbigottì e disse: «Siediti e mangia così», rispose: «I pani nel cesto voglio mangiarli stando in piedi, quelli sulla mensola seduto!».","text":"Λιμόξηρος ἀρτοπράτῃ προσελθὼν ᾔτει δοῦναι δηνάρια δύο, ἵνα ἄρτου χορτάσῃ. τοῦ δὲ λογισαμένου ἕνα ἄρτον τούτῳ ἀρκέσειν ‹καὶ› λαβόντος τὰ δηνάρια ἤρξατο τρώγειν. ὁ δὲ τοῦ κοφίνου ἀρξάμενος ἑστὼς τὸ ἥμισυ ἔφαγε. τοῦ δὲ ἀρτοπράτου θαμβηθέντος καὶ εἰπόντος ὅτι Κάθισον καὶ οὕτως φάγε ἀπεκρίνατο· Τοὺς ἐν τῷ κοφίνῳ ἄρτους βούλομαι ἑστὼς φαγεῖν, τοὺς δὲ ἐν τῇ προβολῇ καθήμενος.","wit":"AC","dawe":"225","A":"233","n":233,"app":[{"span" ῦ κοφίνου §SIG:C§","dirty":false,"span":[162,207],"query":false,"id":"548","unit":548,"lemma":"δὲ2 … ἔφαγε","editors":[]},{"reading":"§SIG:A§ : om. §SIG:C§","sigla":["A","C"],"query":false,"span":[256,263],"dirty":false,"unit":549,"id":"549","editors":[],"lemma":"Κάθισον"},{"editors":[],"lemma":"καὶ","id":"550","unit":550,"query":false,"dirty":false,"span":[264,267],"reading":"§SIG:A§ : κάθησον §SIG:C§ac","sigla":["A","C"]},{"unit":551,"id":"551","editors":["Thierfelder"],"lemma":"ἐγὼ … ἠρίστησα","reading":"§SIG:Thierfelder§ : λέγωμεν §SIG:A§","sigla":["A","Thierfelder"],"query":false,"span":null,"dirty":false}],"label":"225"},{"tr":"Un morto di fame attore di commedia chiedeva all’organizzatore il pranzo prima dell’ingresso in scena. Quando quello chiedeva perché volesse mangiare prima, disse: «Perché io non spergiuri quando dirò:§I§«Ho pranzato, per Artemide, molto bene!».§/I§","type":"joke","text":"","num":"226","dawe":"226","n":234,"A":"234","wit":"A","app":[],"label":"226"},{"app":[],"type":"section","text":"μέθυσοι"},{"label":"227; 39 β","app":[],"n":235,"A":"235","dawe":"227","wit":"AC","text":"Μεθύσῳ ἐν καπηλείῳ πίνοντι ἐπιστάς τις ἔφη· Ἡ γυνή σου ἀπέθανεν. ὁ δὲ ἀκούσας πρὸς τὸν κάπηλον ἔφη· Οὐκοῦν, αὐθέντα, ἐκ τοῦ μελανοῦ κέρασον.","type":"joke","tr":"Ad uno sbevazzone che beveva in una taverna si avvicinò un tale e disse: «Tua moglie è morta!». E quello, dopo aver ascoltato disse all’oste: «Dunque, capo, versami quello bello forte!».","num":"227"},{"dawe":"228","A":"236","n":236,"wit":"A","app":[],"label":"228","tr":"Uno sbevazzone veniva rimproverato da un tale perché, dato che stava bevendo troppo, sragionava, e allora questo, che a causa del vino non riusciva a vedere bene, rispose: «Sono io ubriaco, o tu hai due facce?»","type":"joke","text":"Μέθυσος ὀνειδιζόμενος ὑπό τινος, ὅτι πολλὰ πίνων οὐ φρονεῖ, ὁ δὲ ἀπὸ τοῦ οἴνου καλῶς βλέπειν μὴ δυνάμενος ἀπεκρίνατο· Ἐγὼ μεθύω ἢ σὺ ὁ δύο ἔχων ὄψεις;","num":"228"},{"app":[],"label":"229; 57 β","wit":"A","dawe":"229","n":237,"A":"237","num":"229","type":"joke","tr":"Uno sbevazzone disgraziato acquistò una vigna ma morì durante la vendemmia.","text":"Μέθυσος ἀτυχὴς ἀμπελῶνα κτησάμενος τῷ τρυγητῷ ἀπέθανεν."},{"num":"230","tr":"Uno sbevazzone aprì una taverna e legò un orso alla porta.","type":"joke","text":"","app":[],"label":"230","wit":"A","dawe":"230","n":238,"A":"238"},{"app":[],"text":"ὀζόστομοι","type":"section"},{"tr":"Uno con l’alito cattivo che voleva suicidarsi si incappucciò e se ne stette a bocca aperta.","type":"joke","text":"Ὀζόστομος θέλων ἰδίῳ θανάτῳ ἀποθανεῖν περικαλυψάμενος ἐχασμᾶτο.","num":"231","app":[],"label":"231","dawe":"231","n":239,"A":"239","wit":"A"},{"text":"Ὀζόστομος συνεχῶς τὴν γυναῖκα αὐτοῦ καταφιλῶν ἔλεγεν· Ἡ κυρία μου, ἡ Ἥρα μου, ἡ Ἀφροδίτη μου. κἀκείνη ἀποστρεφομένη ἔλεγεν· Ὀζεύς μου, ὀζεύς μου.","tr":"Uno con l’alito cattivo che baciava di continuo la propria moglie diceva: «La mia signora, la mia Era, la mia Afrodite!» e quella, voltandosi dall’altro lato, diceva: «Il mio puzzone, il mio puzzone!».3","type":"joke","num":"232","A":"240","n":240,"dawe":"232","wit":"AC","label":"232","app":[{"query":false,"dirty":false,"span":[62,65],"reading":"§SIG:Dawe§ : λῦσον §SIG:C§ : λύσον §SIG:A§","sigla":["A","C","Dawe"],"editors":["Dawe"],"lemma":"μου","id":"552","unit":552},{"id":"553","unit":553,"lemma":"ἔλεγε","editors":[],"sigla":["A","C"],"reading":"§SIG:A§ : ἀπαντήσας §SIG:C§","span":[46,51],"dirty":false,"query":false}]},{"num":"233","tr":"Uno con l’alito cattivo incontrò un sordo e diceva: «Salve!» e quello disse: «Puah!». Siccome l’altro aveva chiesto «Che ho detto mai?!», il sordo fece «Hai scorreggiato!».","type":"joke","text":"Ὀζόστομος κωφῷ ὑπαντήσας ἔλεγε· Χαῖρε κἀκεῖνος εἶπε· Φῦ. τοῦ δὲ εἰρηκότος· Τί γὰρ εἶπον; ἔφη· Ἔβδεσας.","wit":"AC","dawe":"233","n":241,"A":"241","app":[{"unit":554,"id":"554","lemma":"εἶπε","editors":[],"sigla":["A","C"],"reading":"§SIG:A§ : τοῦ δὲ κακεῖνος §SIG:C§","dirty":false,"span":[47,51],"query":false},{"reading":"§SIG:A§ : φυ γε §SIG:C§","sigla":["A","C"],"query":false,"span":[57,60],"dirty":false,"id":"555","unit":555,"editors":[],"lemma":"τοῦ"}],"label":"233"},{"dawe":"234","A":"242","n":242,"wit":"AC","app":[{"sigla":["A","C"],"reading":"§SIG:A§ : διότι §SIG:C§","dirty":false,"span":[87,89],"query":false,"unit":556,"id":"556","lemma":"σύ","editors":[]}],"label":"234","tr":"Uno con l’alito cattivo chiedeva alla moglie: «Mia signora, perché mi odi?» e quella rispose: «Perché tu mi baci!».","type":"joke","text":"Ὀζόστομος τὴν γυναῖκα ἠρώτα λέγων· Κυρία, τί μεμισεῖς; κἀκείνη ἀπεκρίνατο λέγουσα· Ὅτι σύ με φιλεῖς.","num":"234"},{"tr":"Uno con l’alito cattivo incontrò un medico e disse: «Signore mio, guarda: la mia ugola è scesa giù!» e quando quello spalancò la bocca, il medico, voltandosi dall’altra parte, diceva: «Non è scesa la tua ugola, ma è salito il tuo culo!».","type":"joke","text":"Ὀζόστομος ἰατρῷ ὑπαντήσας λέγει· Κύριέ μου, ἴδε· ἡ σταφυλή μου κατέβη. καὶ χανόντος ὁ ἰατρὸς ἀποστρεφόμενος ἔλεγεν· Οὐχὶ ἡ σταφυλή σου κατέβη, ἀλλ’ ὁ κῶλός σου ἀνέβη.","num":"235","dawe":"235","A":"243","n":243,"wit":"AC","app":[{"lemma":"καὶ","editors":[],"id":"557","unit":557,"dirty":false,"span":[71,74],"query":false,"sigla":["A","C"],"reading":"§SIG:A§ : μανδύλ §SIG:C§"},{"unit":558,"id":"558","lemma":"τὸ","editors":[],"sigla":["A","C"],"reading":": ἆρον μου §SIG:C§ac corr. §SIG:C§1 : ἄρον §SIG:A§","span":[80,82],"dirty":false,"query":false},{"reading":"§SIG:A§ : ἀπαντήσας §SIG:C§","sigla":["A","C"],"query":false,"dirty":false,"span":[26,31],"unit":559,"id":"559","editors":[],"lemma":"λέγει"},{"sigla":["A","C"],"reading":"§SIG:A§ : om. §SIG:C§","span":[44,47],"dirty":false,"query":false,"id":"560","unit":560,"lemma":"ἴδε","editors":[]},{"sigla":["A","C"],"reading":"§SIG:A§ : ἴδε ὅτι §SIG:C§","dirty":false,"span":[49,50],"query":false,"unit":561,"id":"561","lemma":"ἡ","editors":[]},{"query":false,"dirty":false,"span":[60,61],"reading":"§SIG:C§ : χανῶντος §SIG:A§","sigla":["A","C"],"editors":[],"lemma":"ὁ","unit":562,"id":"562"},{"unit":563,"id":"563","editors":[],"lemma":"ἡ","reading":"§SIG:A§ : οὐχ §SIG:C§","sigla":["A","C"],"query":false,"span":[68,69],"dirty":false},{"dirty":false,"span":[143,146],"query":false,"sigla":["A","C"],"reading":"§SIG:A§ : κατέβην §SIG:C§","lemma":"ἀλλ","editors":[],"unit":564,"id":"564"},{"sigla":["A","C"],"reading":"§SIG:A§ : κόλος §SIG:C§","span":[156,159],"dirty":false,"query":false,"id":"565","unit":565,"lemma":"σου","editors":[]}],"label":"235"},{"app":[{"sigla":["A","C"],"reading":"§SIG:A§ : μασσώμενος §SIG:C§","span":[47,60],"dirty":false,"query":false,"unit":566,"id":"566","lemma":"ἐνεβρωμάτισεν","editors":[]},{"unit":567,"id":"567","lemma":"τὸ","editors":[],"sigla":["A","C"],"reading":"§SIG:A§ : αυτῶ §SIG:C§","span":[63,65],"dirty":false,"query":false}],"label":"236","dawe":"236","A":"244","n":244,"wit":"AC","type":"joke","tr":"Uno con l’alito cattivo che viziava il figlio, masticava il cibo e lo imboccava. Questi si voltò dall’altra parte e disse: «Non voglio; papà cacca!».","text":"Ὀζόστομος τὸ τέκνον αὐτοῦ κολακεύων, μασώμενος ἐνεβρωμάτισεν αὐτό. τὸ δὲ ἀποστρεφόμενον ἔλεγεν· Οὐ θέλω· τατὰ κακά.","num":"236"},{"num":"237","text":"Ὀζόστομος λουκάνικον ὀπτῶν καὶ ἐπὶ πολὺ προσφυσῶν, κυνέαν αὐτὸ ἀπειργάσατο, αὐτὸς συνεχῶς βδέων οὐκ ἐπιστεύετο.","type":"joke","tr":"Uno con l’alito cattivo cuoceva una salsiccia e poiché ci soffiava molto sopra, la trasformò in un escremento canino.","wit":"A","A":"245","n":245,"dawe":"237","label":"237","app":[{"sigla":["A","Boissonade"],"reading":"§SIG:Boissonade§ : λοκάνικον ὄπτων §SIG:A§","dirty":false,"span":[21,30],"query":false,"id":"568","unit":568,"lemma":"ὀπτῶν καὶ","editors":["Boissonade"]},{"sigla":["Boissonade","Thierfelder","vanThiel"],"reading":"§SIG:vanThiel§ : κϋνέαν A : κυνίαν dub. §SIG:Boissonade§ et §SIG:Thierfelder§","span":[58,62],"dirty":false,"query":false,"unit":569,"id":"569","lemma":"αὐτὸ","editors":["Boissonade","Thierfelder","vanThiel"]},{"id":"570","unit":570,"lemma":"ὁ","editors":["Minas"],"sigla":["A","Minas"],"reading":"§SIG:A§ : ἰσχάδας §SIG:Minas§","dirty":false,"span":[73,74],"query":false}]},{"dawe":"238","A":"246","n":246,"wit":"A","app":[],"label":"238","type":"joke","tr":"Uno con l’alito cattivo andò da un fruttivendolo e chiese: «Signore, hai fichi secchi?» e quello si voltò con disgusto: «Non ho neppure i datteri!».","text":"Ὀζόστομος ἀπελθὼν εἰς ὀπωροπώλην ἠρώτα·Ἔχεις, κῦρι, σχάδας; ὁ δὲ ἀποστραφείς· Οὐδὲ φοινίκια ἔχω.","num":"238"},{"num":"239","tr":"Un giovane attore tragico venne amato da due donne, una dall’alito cattivo e l’altra tutta puzzolente. E mentre una diceva: «Signore, dammi dei baci!» e l’altra invece: «Signore, dammi degli abbracci!», quello gridò: «Ahimè, che fare? Sono diviso tra due mali!».","type":"joke","text":"Νεανίσκος τραγῳδὸς ἠγαπήθη ὑπὸ γυναικῶν δύο, ὀζοστόμου καὶ ὀζοχρώτου. καὶ τῆς μιᾶς λεγούσης· Δός μοι, κῦρι, φιλήματα τῆς δὲ ἄλλης· Δός μοι, κῦρι, περιπλοκάς ἐκεῖνος ἀνεβόησεν· Οἴμοι, τί δράσω; δυσὶ κακοῖς μερίζομαι.","app":[{"query":false,"dirty":false,"span":[55,58],"reading":"§SIG:Minas§ : ὀζοχρώστου §SIG:A§","sigla":["A","Minas"],"editors":["Minas"],"lemma":"καὶ","id":"571","unit":571}],"label":"239; 63 β","wit":"A","dawe":"239","n":247,"A":"247"},{"type":"joke","tr":"Mentre uno dall'alito fetido e uno dal corpo maleodorante sedevano insieme a teatro, capitò per caso che un giovane si sedesse in mezzo a loro. Accortosi del fetore, si voltava verso quello dall'alito cattivo e domandava: «Chi ha scoreggiato?». Ma dopo aver scoperto che la causa proveniva dalla sua bocca, si voltava verso l’altro e gli parlava all’orecchio; resosi conto però che anche costui appestava, si alzò e scappò via.","text":"Ὀζόστομος καὶ ὀζόχρωτος, ὁμοῦ ἐν θεάτρῳ καθεζομένων, συνέβη μέσον αὐτῶν κατὰ τύχην νεανίσκον καθεσθῆναι. αἰσθομένου δὲ αὐτοῦ τῆς δυσωδίας, στραφεὶς πρὸς τὸν ὀζόστομον ἠρώτα· Τίς ἔβδεσεν; εὑρηκὼς δὲ ἐκ τοῦ στόματος αὐτοῦ τὴν αἰτίαν, στραφεὶς τῷ ἑτέρῳ εἰς τὸ οὖς διελέγετο. γνοὺς δὲ κἀκείνου τὴν δυσωδίαν ἀναστὰς ἔφυγεν.","num":"240","app":[{"dirty":false,"span":[53,59],"query":false,"sigla":["A","Eberhard"],"reading":"§SIG:A§ : καθεζόμενοι §SIG:Eberhard§","lemma":"συνέβη","editors":["Eberhard"],"unit":572,"id":"572"}],"label":"240","dawe":"240","n":248,"A":"248","wit":"A"},{"tr":"Un matto, mentre dormiva insieme a un sordo, scorreggiò. Quando quello se ne accorse e prese ad urlare, disse: «Guarda un po’ come si senti… ma allora mi prendi in giro!».","type":"joke","text":"Μωρὸς κωφῷ συγκαθεύδων ἔβδεσε. τοῦ δὲ τὴν δυσωδίαν αἰσθομένου καὶ κατακράξαντος ἔφη· Ἴδε, πῶς ἀκούεις· ἀλλ’ἐμπαίζεις μοι.","num":"241","dawe":"241","A":"249","n":249,"wit":"A","app":[{"query":false,"span":[94,101],"dirty":false,"reading":"§SIG:A§ : ὡς §SIG:Eberhard§","sigla":["A","Eberhard"],"editors":["Eberhard"],"lemma":"ἀκούεις","unit":573,"id":"573"}],"label":"241"},{"text":"Ὀζόστομος συνεχῶς εἰς οὐρανὸν βλέπων πολλὰ ηὔχετο. παρακύψας ὁ Ζεὺς λέγει· †μία μία χαρεῖς·† καὶ κάτω θεοὺς ἔχεις.","tr":"Uno con l’alito cattivo, guardando continuamente verso il cielo, rivolgeva molte preghiere. Zeus allora si sporge e dice: «†Hai degli dei anche giù!».","type":"joke","num":"242","A":"250","n":250,"dawe":"242","wit":"A","label":"242","app":[{"reading":"§SIG:A§ : πολλὰ βλέπων §SIG:Eberhard§","sigla":["A","Eberhard"],"query":false,"span":[37,49],"dirty":false,"id":"574","unit":574,"editors":["Eberhard"],"lemma":"πολλὰ ηὔχετο"},{"unit":575,"id":"575","editors":["Eberhard"],"lemma":"Ζεὺς","reading":"‹δ᾿› ὁ §SIG:Eberhard§","sigla":["Eberhard"],"query":false,"dirty":false,"span":[63,67]},{"editors":[],"lemma":"εἰς","id":"576","unit":576,"query":false,"dirty":false,"span":[87,90],"reading":"§SIG:C§ : λίξουρος §SIG:A§","sigla":["A","C"]}]},{"num":"243","tr":"Un goloso fu invitato alla vendemmia da un amico, mangiò insaziabilmente fichi e uva, di notte fu tormentato dal suo ventre e gli parve di vedere il suo amico seduto su un fico e che costui lo chiamasse a sé affinché mangiasse fichi Allora il goloso si arrampicò, e a loro piacque cacare dall'alto del fico. Dunque, sforzandosi, smerdò le coperte. Quando poi si svegliò e se ne accorse, lavò le coperte e si addormentò di nuovo. E vede di nuovo in sogno l'amico seduto sul fico, che lo esorta allo stesso modo a salire. Egli allora alzò gli occhi verso di lui e disse: «Di nuovo vuoi burlarti di me, affinché, sognando di cacare dall'alto del fico, io insozzi le coperte! Ma io d'ora in poi non sarò affatto beffato: prima, infatti, cacherò, e così salirò». Dunque, sforzandosi di nuovo, insozzò le coperte.","type":"joke","text":"Λείξουρος εἰς τρύγην ὑπὸ φίλου κληθεὶς καὶ ἀπλήστως φαγὼν σῦκα καὶ σταφυλάς, ‹τῇ νυκτὶ› ὑπὸ τῆς γαστρὸς αὐτοῦ νυχθεὶς ἔδοξεν ὁρᾶν ἐπὶ συκὴν τὸν φίλον αὐτοῦ καθήμενον καὶ τοῦτον προσκαλεῖσθαι, ἵνα φάγῃ σῦκα. ἀναστάντος δὲ ἤρεσεν αὐτοὺς ἀπὸ τῆς συκῆς χέσαι ἄνωθεν. βιαζόμενος οὖν τὰ στρώματα κατέχεσεν. ὡς δὲ ἐξυπνίσας ἐπέγνω, τὰ στρώματα πλύνας πάλιν [ἀπλήστως φαγὼν] ἐκοιμήθη. καὶ θεωρεῖ πάλιν καθ’ ὕπνους τὸν φίλον ἐπὶ τῆς συκῆς καθήμενον καὶ τοῦτον ὁμοίως ἀνελθεῖν προτρεπόμενον. ὁ δὲ πρὸς αὐτὸν ἀναβλέψας εἶπε· Πάλιν μοι θέλεις ἐμπαῖξαι, ἵνα ἀπὸ τῆς συκῆς ἄνωθεν δόξας χέζειν τὰ στρώματα ῥυπώσω. ἀλλ’ ἐγὼ ἀπάρτι οὐ μὴ ἐμπαιχθῶ· πρῶτον γὰρ χέσω καὶ οὕτως ἀνέλθω. βιαζόμενος οὖν πάλιν τὰ στρώματα κατετίλησεν.","app":[{"sigla":["Minas","Thierfelder"],"reading":"add. §SIG:Thierfelder§ : κατέδαρθεv §SIG:Minas§","span":[81,91],"dirty":false,"query":false,"unit":577,"id":"577","lemma":"νυκτὶ ὑπὸ","editors":["Minas","Thierfelder"]},{"unit":578,"id":"578","editors":["Eberhard"],"lemma":"συκὴν τὸν","reading":"§SIG:A§ : ὑπὸ τὴν συκὴν ut. vid. §SIG:C§ : ἐπὶ τῆς συκῆς §SIG:Eberhard§","sigla":["A","C","Eberhard"],"query":false,"dirty":false,"span":[134,143]},{"unit":579,"id":"579","lemma":"φίλον1 … καθήμενον","editors":[],"sigla":["A","C"],"reading":"§SIG:A§§SIG:C§ : αὐτοῦ τὸν φίλον","dirty":false,"span":[144,165],"query":false},{"unit":580,"id":"580","editors":[],"lemma":"ἀναστάντος","reading" : τὴν μὲν μίαν κυράσατε §SIG:C§","sigla":["A","C"]}]},{"app":[{"reading":"§SIG:Minas§ : αυτὸν §SIG:A§","sigla":["A","Minas"],"query":false,"dirty":false,"span":[96,100],"id":"598","unit":598,"editors":["Minas"],"lemma":"εἶπε"}],"label":"246","dawe":"246","n":254,"A":"254","wit":"A","type":"joke","tr":"Un misogino si fermava in piazza e diceva: «Vendo mia moglie senza pagarci le tasse!». Quando allora alcuni gli dissero: «Perché?», disse: «Affinché diventi merce confiscata».","text":"Μισογύναιος στὰς ἐν τῇ ἀγορᾷ ἔλεγε· Πωλῶ μου τὴν γυναῖκα ἀτελώνητον. τινῶν δὲ εἰπόντων· Διὰ τί; εἶπεν· Ἵνα στερέσιμος γένηται.","num":"246"},{"num":"247","text":"Μισογύναιος, τῆς γυναικὸς αὐτοῦ ἀποθανούσης, ἐπὶ τῷ θάψαι ἐκήδευε. τινὸς δὲ ἐρωτήσαντος· Τίς ἀνεπαύσατο; ἔφη· Ἐγὼ ὁ ταύτης στερηθείς.","tr":"Un misogino, dato che era morta sua moglie, celebrava le esequie per la sepoltura. Quando uno gli chiese: «Chi ha iniziato il suo riposo?», rispose: «Io, che sono stato privato di costei!».","type":"joke","wit":"A","n":255,"A":"255","dawe":"247","label":"247; 60 β","app":[]},{"app":[],"label":"248; 61 β","dawe":"248","n":256,"A":"256","wit":"A","type":"joke","tr":"Un misogino si ammalò senza speranza, e poiché sua moglie gli disse: «Se ti succede qualcosa, mi impiccherò», alzò lo sguardo verso di lei e disse: «Fammi questo favore finché sono ancora vivo!».","text":"Μισογύναιος νοσήσας ἐν ἀπογνώσει, τῆς δὲ γυναικὸς αὐτῷ εἰπούσης· Ἐάν τι πάθῃς, ἀπάγξομαι ἀναβλέψας πρὸς αὐτὴν εἶπε· Ζῶντί μοι τοῦτο χάρισαι.","num":"248"},{"type":"joke","tr":"Un misogino aveva una moglie linguacciuta e insolente, e quando lei morì lui le fece il funerale su uno scudo. Quando un tale lo vide e chiese il motivo, rispose: «Perché era da combattimento». Donne §I§rursus§/I§","text":"Μισογύναιος γυναῖκα ἔχων γλωσσώδη καὶ λοίδορον, τελευτησάσης δὲ αὐτῆς, ἐπὶ θυρεοῦ ἐξέφερε. τινὸς δὲ ἰδόντος καὶ τὴν αἰτίαν ἐρωτήσαντος ἀπεκρίνατο· Μαχίμη γὰρ ἦν.","num":"249","app":[{"lemma":"γὰρ","editors":["Boissonade"],"id":"599","unit":599,"span":[154,157],"dirty":false,"query":false,"sigla":["A","Boissonade"],"reading":"§SIG:Boissonade§ : μαχήμη §SIG:A§"}],"label":"249","dawe":"249","n":257,"A":"257","wit":"A"},{"app":[{"editors":[],"lemma":"ἐναβρυνόμενος","unit":600,"id":"600","query":false,"span":[89,102],"dirty":false,"reading":"§SIG:A§ : ἐν ἀβρυνόμενος §SIG:M§","sigla":["A","M"]},{"editors":["Eberhard"],"lemma":"ὑπὸ","unit":601,"id":"601","query":false,"dirty":false,"span":[26,29],"reading":"add. §SIG:Eberhard§","sigla":["Eberhard"]}],"label":"250","dawe":"250","n":258,"A":"258","wit":"A","type":"joke","tr":"A un giovinetto fu chiesto se fosse comandato da sua moglie o se lei gli ubbidisse in tutto, e disse, facendosi vanto: «Quando apro la bocca, si caca addosso!».","text":"Νεανίσκος ἐρωτηθείς, ‹εἰ› ὑπὸ τῆς γυναικὸς αὐτοῦ κελεύεται ἢ πείθεται αὐτῷ ἐκείνη πάντα, ἐναβρυνόμενος ἔφη· Οὕτως με φοβεῖται ἡ γυνή μου· ἐὰν χάνω, χέζει.","num":"250"},{"wit":"AC","n":259,"A":"259","dawe":"251","label":"251","app":[{"unit":602,"id":"602","editors":["Eberhard"],"lemma":"εἷς","reading":"§SIG:Eberhard§ : ὁ §SIG:A§","sigla":["A","Eberhard"],"query":false,"dirty":false,"span":[99,102]},{"sigla":["A","C","Dawe"],"reading":"§SIG:Dawe§ : ἐμφανῆ καὶ §SIG:A§§SIG:C§","span":[38,51],"dirty":false,"query":false,"unit":603,"id":"603","lemma":"ἐμφανῆ ἰδοῦσα","editors":["Dawe"]},{"unit":604,"id":"604","lemma":"ἐπιθυμήσασα","editors":[],"sigla":["A","C"],"reading":": ἀδροκέφαλον §SIG:A§§SIG:C§","dirty":false,"span":[71,82],"query":false},{"id":"605","unit":605,"lemma":"εἰς","editors":["Hase"],"sigla":["A","C","Hase"],"reading":"§SIG:Hase§ : φημάριον §SIG:A§§SIG:C§","dirty":false,"span":[99,102],"query":false},{"sigla":["A","C","Eberhard"],"reading":"§SIG:A§§SIG:C§ : περὶ §SIG:Eberhard§","dirty":false,"span":[103,105],"query":false,"id":"606","unit":606,"lemma":"τὸ","editors":["Eberhard"]},{"unit":607,"id":"607","editors":["Dawe"],"lemma":"αὐτῇ","reading":"§SIG:A§§SIG:C§ : συνεὶς ‹συν›ῆλθεν §SIG:Dawe§","sigla":["A","C",
