:root{--bg:#f6f1e7;--paper:#fbf8f1;--ink:#241f18;--muted:#7a6f5d;--line:#e3d9c6;--accent:#7a2e1d;--accent2:#1d4e6b;--lem:#9a3412;--lembg:#f3e2cf;--sig:#1d4e6b;--ed:#5b4a2f;--warn:#b45309;--warnbg:#fbe8cf;--alpha:#7a2e1d;--beta:#1d4e6b;--gamma:#3f6212;
--greek:"Gentium Plus Web","New Athena Unicode","Gentium Plus","Calibri","Segoe UI",sans-serif;--sans:"Aptos","Segoe UI","Calibri",system-ui,sans-serif;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--greek);line-height:1.62}
header.top{position:sticky;top:0;z-index:30;background:rgba(40,28,20,.96);color:#f3ece0;padding:.5rem 1rem;display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.18)}
header.top h1{font-size:1.12rem;margin:0;font-weight:600;white-space:nowrap}
header.top .sub{color:#cdbfa6;font-size:.78rem;font-family:var(--sans);margin-left:-.3rem;max-width:24vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recsw{display:flex;border:1px solid #5a4a39;border-radius:8px;overflow:hidden}
.recsw button{font-family:var(--sans);font-size:.85rem;border:none;background:#efe6d4;color:#241f18;padding:.34rem .7rem;cursor:pointer;font-weight:700}
.recsw button.on[data-rec="alpha"]{background:var(--alpha);color:#fff}.recsw button.on[data-rec="beta"]{background:var(--beta);color:#fff}.recsw button.on[data-rec="gamma"]{background:var(--gamma);color:#fff}
#tSync,#tTr{font-family:var(--sans);font-size:.85rem;border:1px solid #5a4a39;background:#efe6d4;color:#241f18;border-radius:8px;padding:.34rem .6rem;cursor:pointer;font-weight:600}
#tSync:hover,#tTr:hover{background:#fff}#tSync.on{background:#5b3a8a;border-color:#5b3a8a;color:#fff}#tTr.on{background:#256;border-color:#256;color:#fff}
.controls{display:flex;gap:.4rem;align-items:center;margin-left:auto;flex-wrap:wrap}
.controls input,.controls button{font-family:var(--sans);font-size:.82rem;border:1px solid #5a4a39;background:#fffdf8;color:#241f18;border-radius:6px;padding:.32rem .5rem}
.controls input{width:120px}.controls input.num{width:70px}.controls button{cursor:pointer;background:#efe6d4}.controls button:hover{background:#fff}
.wrap{display:flex;max-width:1320px;margin:0 auto}
nav.toc{width:240px;flex:0 0 240px;padding:1rem .7rem 3rem;position:sticky;top:52px;height:calc(100vh - 52px);overflow:auto;font-family:var(--sans);font-size:.83rem;border-right:1px solid var(--line)}
#resizer{flex:0 0 7px;cursor:col-resize;position:sticky;top:52px;height:calc(100vh - 52px);background:transparent;transition:background .15s}#resizer:hover,#resizer.drag{background:#cdbf9e}
nav.toc h2{font-size:.7rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin:.4rem .3rem}
nav.toc a{display:flex;justify-content:space-between;gap:.4rem;padding:.26rem .45rem;border-radius:6px;color:var(--ink);text-decoration:none;cursor:pointer}
nav.toc a:hover{background:#ece2cf}nav.toc a.drow{display:grid;grid-template-columns:3.4em 2.4em 3.2em 2.4em;align-items:baseline;gap:0 .15rem;font-variant-numeric:tabular-nums}nav.toc a.drow .da{color:var(--alpha)}nav.toc a.drow .db{color:var(--beta)}nav.toc a.drow .ddw{color:var(--muted);font-size:.74rem}nav.toc a.drow .dg{color:var(--gamma);font-size:.74rem;opacity:.85}nav.toc a .c{color:var(--muted);font-size:.76rem}
nav.toc .qbtn{margin:.6rem .3rem;display:block;width:calc(100% - .6rem);text-align:left;cursor:pointer;background:var(--warnbg);border:1px solid #e7cd9a;color:#7c4a06;border-radius:8px;padding:.5rem .6rem;font-family:var(--sans);font-size:.82rem}
main{flex:1 1 auto;min-width:0;padding:1.1rem 1.5rem 6rem;background:var(--paper)}
.meta{font-family:var(--sans);font-size:.8rem;color:var(--muted);border:1px solid var(--line);background:#fffdf8;border-radius:10px;padding:.7rem .9rem;margin-bottom:1.3rem}
.meta b{color:var(--ink)}.meta .wit{color:var(--sig);font-weight:600}.meta .gk{font-family:var(--greek);color:var(--ink)}
.stats{display:flex;gap:1rem;flex-wrap:wrap;margin-top:.5rem}.stats span{background:#f0e7d5;border-radius:20px;padding:.15rem .7rem;font-size:.76rem}
section.sec{margin:1.6rem 0}section.sec>h2{font-size:1.12rem;color:var(--accent);border-bottom:2px solid var(--line);padding-bottom:.25rem;margin:0 0 .8rem;letter-spacing:.04em}
.beta section.sec>h2{color:var(--beta)}.gamma section.sec>h2{color:var(--gamma)}
.fac{margin:0 0 1.1rem;padding:.1rem 0 .5rem;border-bottom:1px dotted var(--line)}
.fac .num{font-family:var(--sans);font-size:.74rem;color:var(--muted);font-weight:600;display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:.12rem}
.fac .num .big{font-size:.92rem;color:var(--ink)}.fac .num .conc{color:var(--muted);font-weight:400}
.fac .num .w b{background:#e7ddc9;color:#5b4a2f;border-radius:4px;padding:0 .28rem;font-size:.7rem;font-weight:700;margin-left:.15rem}
.xref{cursor:pointer;border:1px solid #b9a7d6;background:#efe7fb;color:#5b3a8a;border-radius:10px;padding:0 .45rem;font-size:.7rem;font-weight:700}.xref:hover{background:#e2d6f6}
.xref.b{border-color:#9ec3d6;background:#e7f1fb;color:#1d4e6b}.xref.g{border-color:#bcd69e;background:#eef7e2;color:#3f6212}
.fac .txt{font-size:1.16rem;text-align:justify}
.fac .txt.missing{color:#a08b6a;font-style:italic;font-family:var(--sans);font-size:.95rem}
.fac .tr{display:none;font-family:var(--sans);font-size:1rem;color:#43617a;margin:.35rem 0 0;padding:.2rem .6rem;border-left:3px solid #cdd9e3;background:#f3f6f9;border-radius:0 6px 6px 0}
.showtr .fac .tr{display:block}
.lem{cursor:pointer;border-bottom:1.5px solid var(--lem);padding:0 .02em}.lem:hover,.lem.hot{background:var(--lembg)}
.app{font-family:var(--greek);font-size:.85rem;color:#4a4234;margin:.4rem 0 0;padding:.4rem .6rem;background:#f4ede0;border-left:3px solid var(--line);border-radius:0 8px 8px 0;display:none}
.app.show{display:block}.app .ln{padding:.12rem 0;border-radius:5px;cursor:pointer}.app .ln:hover,.app .ln.hot{background:#eadfc8}

 Σχολαστικών §SIG:M§"}],"type":"titulus","text":"Φιλόγελως ἐκ τῶν Ἱεροκλέους καὶ Φιλαγρίου γραμματικοῦ"},{"type":"section","text":"σχολαστικοί","app":[]},{"type":"joke","wit":"AM","text":"Σχολαστικὸς ἀργυροκόπῳ ἐπέταξε λύχνον ποιῆσαι. τοῦ δὲ ἐξετάσαντος, πηλίκον ποιήσει, ἀπεκρίνατο· Ὡς πρὸς ὀκτὼ ἀνθρώπους.","A":"1","dawe":"1","num":"1","n":1,"label":"1; 1 β","tr":"Uno §I§scholastikos§/I§ commissionò ad un artigiano dell’argento di realizzare una lucerna. A quello che chiedeva quanto l’avrebbe dovuta fare grande, rispondeva: «tipo per otto persone».","app":[]},{"app":[{"reading":"ἐπνίγει §SIG:M§","lemma":"ἐπνίγη·]]","query":false,"editors":[],"span":[33,39],"unit":1,"dirty":false,"sigla":["M"],"id":"1"}],"n":2,"tr":"Uno §I§scholastikos§/I§, tuffandosi, per poco non affogò: giurò che non sarebbe più entrato in acqua, se non avesse prima imparato bene a nuotare.","label":"2; 2 β","wit":"AM","type":"joke","num":"2","dawe":"2","A":"2","text":"Σχολαστικὸς κολυμβῶν παρὰ μικρὸν ἐπνίγη· ὤμοσε δὲ εἰς ὕδωρ μὴ εἰσελθεῖν, ἐὰν μὴ μάθῃ πρῶτον καλῶς κολυμβᾶν."},{"wit":"AM","type":"joke","num":"3","A":"3","dawe":"3","text":"Σχολαστικῷ τις ἰατρῷ προσελθὼν εἶπεν· Ἰατρέ, ὅταν ἀναστῶ ἐκ τοῦ ὕπνου, ἡμιώριον ἐσκότωμαι καὶ εἶθ’ οὕτως ἀποκαθίσταμαι. καὶ ὁ ἰατρός· Μετὰ τὸ ἡμιώριον ἐγείρου.","n":3,"label":"3; 183 α","tr":"Un tale si recò da un medico §I§scholastikos§/I§ e disse «dottore, quando mi sveglio dal sonno sono annebbiato per mezz’ora, e poi mi riprendo» e il medico «svegliati mezz’ora dopo».","app":[{"unit":2,"editors":[],"span":[15,20],"query":false,"id":"2","sigla":["A"],"dirty":false,"reading":"ἰητρῷ §SIG:A§ cf. app. crit. 6, 7, 27","lemma":"ἰατρῷ]]"}]},{"tr":"Uno §I§scholastikos§/I§ vendeva un cavallo, e un tale gli domandò se fosse di primo ricambio. Quando quello disse che era di secondo ricambio, fece: «Come lo sai?» e quello rispose «Perché una volta ha disarcionato me, e una volta ha fatto cadere mio padre».","label":"4; 3 β; cf. 161 α","n":4,"A":"4","text":"Σχολαστικοῦ ἵππον πιπράσκοντος ἠρώτησέ τις, εἰ πρωτοβόλος ἐστίν. τοῦ δὲ εἰπόντος δευτεροβόλον εἶναι, εἶπε· Πῶς οἶδας; ὁ δὲ ἀπεκρίνατο· Ὅτι ἅπαξ ἐμὲ ἔβαλε κάτω καὶ ἅπαξ τὸν πατέρα μου.","dawe":"4","num":"4","type":"joke","wit":"AM","app":[{"lemma":"ἵππον]]","reading":"ἵππου §SIG:M§","dirty":false,"sigla":["M"],"id":"3","query":false,"span":[12,17],"editors":[],"unit":3},{"dirty":false,"sigla":["A","Boissonade"],"id":"4","query":false,"editors":["Boissonade"],"span":[47,57],"unit":4,"reading":"§SIG:Boissonade§ : πρωτόβολος §SIG:A§","lemma":"πρωτοβόλος]]"}]},{"app":[{"reading":"μα §SIG:M§","lemma":"Μὰ]]","editors":[],"span":[76,78],"query":false,"unit":5,"dirty":false,"id":"5","sigla":["M"]},{"reading":"προσέχων §SIG:M§","lemma":"προσέσχον]]","editors":[],"span":[109,118],"query":false,"unit":6,"dirty":false,"id":"6","sigla":["M"]}],"type":"joke","wit":"AM","A":"5","text":"Σχολαστικῷ τις ἀπαντήσας ἔφη· Κύριε σχολαστικέ, καθ’ ὕπνους σε εἶδον. ὁ δέ· Μὰ τοὺς θεούς, εἶπεν, ἀσχολῶν οὐ προσέσχον.","dawe":"5","num":"5","n":5,"tr":"Un tale si imbattè in uno §I§scholastikos §/I§e gli disse: «Signor§I§ scholastikos§/I§, ti ho visto in sogno!» e quello: «Per gli dèi! Siccome ero impegnato, non ci ho fatto caso».","label":"5; 4 β"},{"app":[{"sigla":["A"],"id":"7","dirty":false,"unit":7,"query":false,"editors":[],"span":[42,48],"lemma":"ἰατρὸν]]","reading":"ἰητρὸν §SIG:A§ cf. app. crit. 3"},{"lemma":"αὐτὸ]]","reading":"τοῦτο §SIG:Minas§","dirty":false,"id":"8","sigla":["Minas"],"editors":["Minas"],"span":[113,117],"query":false,"unit":8}],"wit":"AM","type":"joke","num":"6","A":"6","dawe":"6","text":"Σχολαστικὸς ἰδὼν τὸν κατὰ συνήθειαν αὐτοῦ ἰατρὸν ἐρχόμενον περιεστέλλετο αὐτῷ ὀφθῆναι. ἐπερωτηθεὶς δὲ παρά τινος αὐτοῦ ἑταίρου, διὰ τί αὐτὸ ποιεῖ, ἀπεκρίθη· Πολὺς χρόνος ἐστὶν ἀφ’ οὗ οὐκ ἐνόσησα, καὶ ἐντρέπομαι αὐτόν.","n":6,"label":"6; 15 β","tr":"Uno §I§scholastikos§/I§ vedendo arrivare il proprio medico di fiducia si preoccupava di non farsi vedere da quello. Un suo amico gli domandò perché facesse ","lemma":"δέ τινος]]","unit":61,"editors":[],"span":[102,110],"query":false,"id":"61","sigla":["M"],"dirty":false}]},{"app":[],"num":"32","A":"32","text":"Σχολαστικὸς ἐπὶ δεῖπνον κληθεὶς οὐκ ἤσθιεν. ἐρωτήσαντος δέ τινος τῶν κεκλημένων· Διὰ τί οὐκ ἐσθίεις; ἔφη· Ἵνα μὴ τοῦ φαγεῖν ἕνεκα δόξω παρεῖναι.","dawe":"32","type":"joke","wit":"AM","tr":"Uno §I§scholastikos §/I§fu invitato a una cena e non mangiava. Qualcuno degli invitati gli chiese: «Perché non mangi?» e disse: «Perché io non sembri essere venuto qui per il cibo».","label":"32","n":32},{"n":33,"label":"33","tr":"Il figlio di uno §I§scholastikos§/I§ giocava a palla. Poiché la palla era caduta nel pozzo, si chinò e, vista la propria ombra, le chiedeva la palla. Successivamente disse al padre che non l’aveva recuperata. Questi si sporse sul pozzo, vide la propria ombra e disse: «Padrone di casa, rendi la palla a mio figlio».","type":"joke","wit":"AM","num":"33","dawe":"33","A":"33","text":"Σχολαστικοῦ υἱὸς ἐσφαίριζε. πεσούσης οὖν εἰς φρέα τῆς σφαίρας, παρακύψας καὶ ἰδὼν τὴν ἑαυτοῦ σκιὰν ᾔτει τὴν σφαῖραν. εἶτα πρὸς τὸν πατέρα κατηγόρει ὡς μὴ ἀπολαβὼν αὐτήν. ὁ δὲ προκύψας εἰς τὸ φρέαρ καὶ ἰδὼν τὴν ἑαυτοῦ σκιὰν [ᾔτει τὴν σφαῖραν]· Οἰκοδέσποτα, φησίν, ἀπόδος τῷ παιδὶ τὴν σφαῖραν.","app":[{"id":"62","sigla":["M"],"dirty":false,"unit":62,"span":[99,103],"editors":[],"query":false,"reading":"ἤτοι utroque loco §SIG:M§","lemma":"ᾔτει1]]"},{"dirty":false,"sigla":["M","Thierfelder"],"id":"63","query":false,"editors":["Thierfelder"],"span":[175,183],"unit":63,"lemma":"προκύψας]]","reading":"παρακύψας §SIG:M§ ᾔτει2 … ^!σφαῖραν·] del. §SIG:Thierfelder§"},{"unit":64,"query":false,"editors":[],"span":[243,254],"sigla":["A","M"],"id":"64","dirty":false,"reading":"ἰκοδεσπότα §SIG:A§§SIG:M§","lemma":"Οἰκοδέσποτα]]"},{"span":[270,272],"editors":[],"query":false,"unit":65,"dirty":false,"id":"65","sigla":["M"],"lemma":"τῷ]]","reading":"τὶ seu τὲ seu τὸ §SIG:M§"}]},{"type":"joke","wit":"AM","num":"34","text":"Σχολαστικὸς νοσοῦντα ἑταῖ itors":[],"reading":"εἴρηκεν §SIG:A§ac","lemma":"εἴρηκε]]"},{"dirty":false,"sigla":["A","M","Minas"],"id":"75","query":false,"editors":["Minas"],"span":[231,234],"unit":75,"reading":"§SIG:Minas§ : ἔφησεν §SIG:A§§SIG:M§","lemma":"ἔφη]]"},{"lemma":"ἐκείνῳ]]","reading":"ἐκεῖνο §SIG:M§","id":"76","sigla":["M"],"dirty":false,"unit":76,"span":[236,242],"editors":[],"query":false}],"label":"36","tr":"Uno §I§scholastikos§/I§ valutava il vestiario di quelli che incontrava. Quando suo padre, dopo aver sentito da alcuni ciò, lo rimproverava, disse: «Padre, sei stato convinto di ciò da calunnie, e forse nemmeno di persona”. Quello rispose: «Me l’ha detto il tale, e tu ascolti quello, che ha un mantello da nemmeno cinquanta dracme?!».","n":36,"num":"36","dawe":"36","A":"36","text":"Σχολαστικὸς τῶν ἀπαντώντων τὰ ἱμάτια ἐτιμᾶτο. τούτου δὲ τοῦ πατρὸς παρά τινων τοῦτο ἀκούσαντος καὶ ἐπιτιμῶνος αὐτῷ· Πάτερ, εἶπεν, ὑπὸ διαβολῆς πέπεισαι τοῦτο, καὶ ἴσως οὐδ’ ὑπὸ ἀνθρώπου. τοῦ δὲ εἰπόντος· Ὁ δεῖνά μοι εἴρηκε Καὶ σύ, ἔφη, ἐκείνῳ προσέχεις, ὃς οὐδὲ πεντήκοντα δραχμῶν ἱμάτιον ἔχει;","type":"joke","wit":"AM"},{"app":[{"lemma":"καταμανθάνοντος]]","reading":"§SIG:Thierfelder§ coll. 165α καταμαθόντος §SIG:A§§SIG:M§","id":"77","sigla":["A","M","Thierfelder"],"dirty":false,"unit":77,"editors":["Thierfelder"],"span":[52,67],"query":false},{"sigla":["M"],"id":"78","dirty":false,"unit":78,"query":false,"span":[84,89],"editors":[],"lemma":"εἶπεν]]","reading":"εἶπε §SIG:M§"}],"tr":"Uno §I§scholastikos§/I§ vendeva un cavallo. Poiché era giunto un tale e ne esaminava la dentatura, disse: «Perché osservi i suoi denti? Oh, se trottasse tanto quanto mangia!».","label":"37; 6 β","n":37,"text":"Σχολαστικὸς ἵππον ἐπίπρασκεν. ἐλθόντος δέ τινος καὶ καταμανθάνοντος αὐτοῦ τὸν βόλον εἶπεν πρὸς αὐτόν· Τί τοὺς ὀδόντας αὐτοῦ καταμανθάνεις; εἴθε ὡς τρώγει, οὕτως καὶ περιεπάτει.","A":"37","dawe":"37","num":"37","type":"joke","wit":"AM"},{"app":[],"wit":"A","type":"joke","num":"38","dawe":"38","A":"38","text":"Σχολαστικὸς πρεσβύτου πατρὸς σφόδρα νοσοῦντος τοὺς ἑταίρους ἠξίωσε στεφάνους φέρειν ἐπ’ ἐκφορᾷ. τῇ δὲ ἐπιούσῃ ἡμέρᾳ βέλτιον αὐτοῦ σχόντος, ὡς ἠγανάκτουν οἱ ἑταῖροι· Κἀγώ, ἔφη, αἰσχύνομαι ζημιουμένων ὑμῶν. αὔριον οὖν φέρετε τοὺς στεφάνους· τοῦτον γὰρ ὡς ἂν ἔχῃ ἐξοίσω.","n":38,"label":"38","tr":"Uno §I§scholastikos§/I§, essendo il padre molto malato, chiese agli amici di portare corone di fiori per il funerale. Ma poiché l’indomani quello stava meglio, e gli amici si erano arrabbiati, disse: «Anche io mi vergogno che voi ci abbiate rimesso. Domani dunque portate le corone: comunque starà, gli farò il funerale»."},{"A":"39","dawe":"39","text":"Σχολαστικοὶ δύο ὁμοῦ ἐβάδιζον. ἰδὼν οὖν ὁ ἕτερος αὐτῶν μέλαιναν ὄρνιν· Ἀδελφέ, φησίν, ἴσως ταύτης ὁ ἀλεκτρυὼν ἀπέθανεν.","num":"39","wit":"AM","type":"joke","tr":"Due §I§scholastikoi§/I§ camminavano insieme. Quando uno dei due, avendo visto una gallina nera, dice: «Fratello, forse il gallo di questa è morto!».","label":"39; 37 β","n":39,"app":[{"sigla":["M"],"id":"79","dirty":false,"unit":79,"query":false,"editors":[],"span":[16,20],"reading":"om §SIG:M§","lemma":"ὁμοῦ]]"},{"lemma":"ἕτερος]]","reading":"§SIG:Minas§ : ἑταῖρος §SIG:A§","dirty":false,"sigla":["A","Minas"],"id":"80","query":false,"editors":["Minas"],"span":[42,48],"unit":80},{"reading":"ἀδελφε §SIG:A§","lemma":"Ἀδελφέ]]","dirty":false,"id":"81","sigla":["A"],"editors":[],"span":[71,77],"query":false,"unit":81},{"dirty":false,"id":"82","sigla":["M"],"span":[100,109],"editors":[],"query":false,"unit":82,"reading":"ἀλεκτρὼν §SIG:M§ac","lemma":"ἀλεκτρυὼν]]"}]},{"dawe":"40","A":"40","text":"Σχολαστικὸς μικρὸν υἱὸν ἀπολέσας, θεασάμενος πολλοὺς ἐπὶ τὸ κῆδος ἀπαντήσαντας διὰ τὴν ἐξουσίαν αὐτοῦ ἔλεγεν· Αἰδοῦμαι μικρὸν παιδίον εἰς τοσοῦτον ὄχλον ἐκφέρων.","num":"40","type":"joke","wit":"AM","label":"40; 33 β","tr":"Uno §I§scholastikos§/I§ che aveva perso un figlio piccolo, dopo che ebbe visto che molti erano giunti al rito funebre per la sua autorità, disse: «Mi vergogno di portare un l’atra porta?».","n":43,"app":[{"unit":86,"span":[150,154],"editors":[],"query":false,"id":"86","sigla":["A"],"dirty":false,"reading":"εἶπεν §SIG:A§ac","lemma":"εἶπε]]"},{"id":"87","sigla":["Eberhard"],"dirty":false,"unit":87,"span":[209,222],"editors":["Eberhard"],"query":false,"lemma":"πύλης ἔρχεται]]","reading":"‹αὐτός ἐπέγραψε· Καὶ σὺ μεῖνόν με› §SIG:Eberhard§ coll. 137α"},{"lemma":"εἶπε·]]","reading":"τοῦ δὲ κακεῖνος §SIG:C§","dirty":false,"sigla":["C"],"id":"88","query":false,"span":[150,154],"editors":[],"unit":88}]},{"n":44,"label":"44; 38 β","tr":"Di notte, uno §I§scholastikos§/I§ che dormiva col padre, dopo essersi alzato dal letto mangiucchiava grappoli d’uva appesi in alto. Dal momento che suo padre aveva nascosta una lucerna sotto una pentola, e aveva poi rivelato improvvisamente la luce, quando lo §I§scholastikos§/I§ si era alzato, questi, rimasto immobile in piedi, russava fingendo di dormire.","wit":"AM","type":"joke","dawe":"44","A":"44","text":"Σχολαστικὸς μετὰ τοῦ πατρὸς καθεύδων, ἀνιστάμενος ἐπὶ τῆς κλίνης νυκτὸς ἔτρωγε σταφυλὰς ὑπεράνω κρεμαμένας. τοῦ δὲ πατρὸς αὐτοῦ ὑπὸ χύτραν λύχνον κρύψαντος, εἶτα, ὅτε ἀνέστη, τὸ φῶς ἄφνω δείξαντος, ὁ δὲ ὀρθὸς ἑστὼς ἔρεγχε καθεύδειν προσποιούμενος.","num":"44","app":[{"reading":"§SIG:Minas§ : ὀρθῶς §SIG:A§§SIG:M§","lemma":"ὀρθὸς]]","sigla":["A","M","Minas"],"id":"89","dirty":false,"unit":89,"query":false,"editors":["Minas"],"span":[203,208]},{"reading":"φυ γε §SIG:C§","lemma":"τοῦ]]","query":false,"editors":[],"span":[17,20],"unit":90,"dirty":false,"sigla":["C"],"id":"90"}]},{"label":"44b","tr":"Un amico che era in un viaggio all’estero scrisse ad uno §I§scholastikos§/I§ di acquistargli dei libri. Quello non se ne diede cura e, incontrato l’amico rientrato, disse: «La lettera che mi hai mandato a proposito dei libri, non l’ho ricevuta».","n":45,"text":"Σχολαστικῷ ἑταῖρος ἀποδημῶν ἔγραψεν, ἵν’ αὐτῶν βιβλία πρίηται. ὁ δὲ ὀλιγωρήσας, ἐπανελθόντι αὐτῷ ἀπαντήσας· Τὴν ἐπιστολήν, εἶπεν, ἣν περὶ τῶν βιβλίων ἀπέστειλας, οὐκ ἐδεξάμην.","A":"45","dawe":"44b","num":"44","type":"joke","wit":"AM","app":[{"dirty":false,"sigla":["A","M","Minas"],"id":"91","query":false,"span":[11,18],"editors":["Minas"],"unit":91,"reading":"§SIG:Minas§ : ἕτερος §SIG:A§§SIG:M§","lemma":"ἑταῖρος]]"}]},{"app":[{"lemma":"τοσοῦτος]]","reading":"τοσούτους §SIG:A§ac","unit":92,"editors":[],"span":[98,106],"query":false,"id":"92","sigla":["A"],"dirty":false},{"unit":93,"span":[87,89],"editors":[],"query":false,"id":"93","sigla":["C"],"dirty":false,"reading":"διότι §SIG:C§","lemma":"σύ]]"}],"text":"Σχολαστικὸς νυκτὸς ἐπανέστη τῇ μάμμῃ ἑαυτοῦ. πληγὰς δὲ διὰ τοῦτο ὑπὸ τοῦ πατρὸς λαβών· Σύ, εἶπεν, τοσοῦτος χρόνος ἐστὶν ἐξ οὗ τὴν μητέρα μου ὀχεύεις, μηδὲν ὑπ’ ἐμοῦ παθών, καὶ νῦν ὀργίζῃ ἐπὶ τῇ μητρί σου ἅπαξ με εὑρών;","dawe":"45","A":"46","num":"45","type":"joke","wit":"AM","label":"45; 14 β","tr":"Uno §I§scholastikos§/I§ di notte si era messo sopra la propria nonna. Dopo aver preso botte dal padre per questo motivo, disse: «Tu, è tanto tempo che monti mia madre, e non ti sei buscato nulla da me, e ora ti arrabbi per avermi trovato una volta con tua mamma?».","n":46},{"app":[{"unit":94,"query":false,"span":[36,39],"editors":[],"sigla":["M"],"id":"94","dirty":false,"lemma":"ὅτι]]","reading":"ὅτου §SIG:M§"},{"reading":"ἀνακραγῶν §SIG:M§","lemma":"ἀνακραγὼν]]","dirty":false,"sigla":["M"],"id":"95","query":false,"editors":[],"span":[79,88],"unit":95}],"wit":"AM","type":"joke","text":"Σχολαστικῷ πραγματευτὴς ἀπήγγειλεν, ὅτι τὸ χωρίον αὐτοῦ ὁ ποταμὸς ἔλαβεν. ὁ δὲ ἀνακραγὼν ἀπεκρίνατο λέγων· Βιάζεται ἡμᾶς.","dawe":"46","A":"47","num":"46","n":47,"label":"46; 16 β","tr":"Un amministratore disse ad uno §I§scholastikos§/I§ che il fiume aveva preso il suo podere. Quello allora gridò e rispose: «Ci hanno sabotato!»."},{"n":48,"tr":"Uno §I§scholastikos§/I§, trovandosi una volta nel podere, vide le greggi uscire al pascolo. E quando le vide come al solito belare, ne chiedeva la ragione. Quando l’amministratore gli disse per sche αλαίαν βιβλίον ἀνεγίνωσκεν.","dawe":"87","A":"89","n":89,"tr":"Uno §I§scholastikos§/I§si mise l’armatura da gladiatore e giocava in casa. All’improvviso però, dopo che qualcuno l’aveva avvisato dell’arrivo del padre, gettò l’arma e si stava togliendo lo schiniere. Ma siccome il padre era già arrivato, leggeva un libro tenendo l’elmo in testa.","label":"87"},{"label":"88","tr":"Uno §I§scholastikos §/I§tornava nel luogo dal quale era partito, e salendo una salita ripida si meravigliava e disse: «Qui quando passai per la prima volta in cammino, c’era una discesa: e com’è che ora è cambiato velocemente e c’è una salita?».","n":90,"text":"Σχολαστικὸς ἐπανερχόμενος, ὅθεν ἀπεδήμησεν, καὶ ἀναβαίνων ὑψηλὴν ἀνάβασιν ἐθαύμαζε λέγων· Ἐνταῦθα ὅτε πρῶτον [ὡς] παρῄειν ὁδεύων, κατάβασις ἦν·καὶ πῶς νῦν ταχέως ἠλλάγηκαὶ ἀνάβασις γέγονε;","A":"90","dawe":"88","num":"88","type":"joke","wit":"AM","app":[{"unit":226,"query":false,"editors":["Boissonade"],"span":[110,112],"sigla":["Boissonade"],"id":"226","dirty":false,"lemma":"ὡς]]","reading":"om. §SIG:Boissonade§"},{"dirty":false,"id":"227","sigla":["A","Boissonade","M"],"span":[114,121],"editors":["Boissonade"],"query":false,"unit":227,"lemma":"παρῄειν]]","reading":"παρκεῖν §SIG:A§ : ἐπαρκεῖν §SIG:M§ : παρεκεῖ §SIG:Boissonade§"},{"lemma":"ὁδεύων]]","reading":"ὠδεύον §SIG:Boissonade§","dirty":false,"id":"228","sigla":["Boissonade"],"editors":["Boissonade"],"span":[122,128],"query":false,"unit":228}]},{"label":"89","tr":"Uno §I§scholastikos §/I§mentre navigava chiese al timoniere che ora fosse. Dal momento che quello disse che non lo sapeva, gli domandò da quanto tempo pilotasse la nave. Quando quello disse: «Tre anni», fece: «Com’è allora che io, che ho acquistato casa sei mesi fa, quando il sole scende in cortile indovino l’ora, ma tu invece non sai calcolarla dalla nave che pur governi da un tempo così ampio?».","n":91,"num":"89","dawe":"89","text":"Σχολαστικὸς πλέων ἐπύθετο τοῦ κυβερνήτου, πόστη εἴη ὥρα. τοῦ δὲ μὴ γινώσκειν φήσαντος ke","wit":"AM","tr":"Un sofista §I§scholastikos§/I§, incaricato di pronunciare gli epitaffi dei defunti, scrisse un discorso per uno ancora vivo, che lo rimproverava per questo. Allora quello disse: «Se dunque voi non mi dite per tempo quando dovete morire, volete che io parlando a braccio faccia brutta figura?».","label":"90","n":92,"app":[{"reading":"§SIG:Minas§ : ἄνουν §SIG:A§ : ἂνους §SIG:M§","lemma":"Ἂν οὖν]]","id":"238","sigla":["A","M","Minas"],"dirty":false,"unit":238,"span":[136,142],"editors":["Minas"],"query":false},{"reading":"ἀποθνήσκετε §SIG:M§","lemma":"ἀποθνῄσκητε]]","dirty":false,"id":"239","sigla":["M"],"span":[175,186],"editors":[],"query":false,"unit":239},{"sigla":["Dawe","Minas"],"id":"240","dirty":false,"unit":240,"query":false,"editors":["Dawe","Minas"],"span":[207,213],"reading":"corr. §SIG:Minas§ : contra §SIG:Dawe§ cf. Ritter p. 63 n. 147","lemma":"λέγων]]"},{"span":[215,223],"editors":[],"query":false,"unit":241,"dirty":false,"id":"241","sigla":["A"],"reading":"βούλεσθαι §SIG:A§","lemma":"βούλεσθε]]"}]},{"n":93,"tr":"Cf. 30 94. Uno §I§scholastikos§/I§ avevano a cena dei compagni di studi, e siccome questi avevano lodato la testa di maiale e gli avevano richiesto di pranzare da lui anche l’indomani, andò dal cuoco e disse: «Dammi un’altra testa proveniente dallo stesso porco: quella di ieri ci è proprio piaciuta!».","label":"90 bis; 30 α et 29 β","type":"joke","wit":"A","text":"Σχολαστικὸς ναυαγεῖν μέλλων ᾔτει πινακίδας, ἵνα διαθήκας γράψῃ.","A":"93","dawe":"90 bis","num":"90 bis","app":[]},{"wit":"AM","type":"joke","num":"91","A":"94","text":"Σχολαστικὸς συμφοιτητὰς ἐπὶ δεῖπνον καλέσας, ἐπαινεσάντων αὐτῶν ὑὸς κεφαλὴν καὶ ἀξιωσάντων καὶ τῇ ὑστεραίᾳ παρ’αὐτῷ ἑστιαθῆναι, ἀπελθὼν πρὸς τὸν μάγειρον· Δός μοι, ἔφη, ἀπὸ τοῦ αὐτοῦ χοίρου κεφαλὴν ἑτέραν· ἡ γὰρ χθὲς ἡμῖν πάνυ ἤρεσεν.","dawe":"91","n":94,"label":"91","tr":"","app":[{"lemma":"αὐτῶν]]","reading":"αὐτῶ §SIG:A§ §SIG:M§ac: αὐτῶν §SIG:M§pc","editors":[],"span":[58,63],"query":false,"unit": νων δέ τινωναὐτοῦ, ποῖον ὄνομα αὐτῷ θήσεται·Τὸ ἐμὸν ἕξει, ἔφη, ὄνομα,κἀγὼ τέως οὕτω μενῶ.","num":"95","wit":"A","type":"joke","tr":"Ad uno §I§scholastikos§/I§ nacque un figlio. Quando alcuni gli chiesero quale nome gli avrebbe dato, rispose: «Avrà il mio, di nome, e io rimarrò così per un po’… (cioè privo di nome)».","label":"95","n":99},{"app":[{"reading":"§SIG:Minas§ : Δύο σχολαστικοί §SIG:A§ : δύο om. §SIG:M§","lemma":"Σχολαστικοὶ δύο]]","editors":["Minas"],"span":[0,15],"query":false,"unit":246,"dirty":false,"id":"246","sigla":["A","M","Minas"]},{"lemma":"δειλοί]]","reading":"‹έδιώκοντο υπό πολεμίων και› §SIG:Dawe§","sigla":["Dawe"],"id":"247","dirty":false,"unit":247,"query":false,"editors":["Dawe"],"span":[16,22]},{"lemma":"αὑτόν]]","reading":"ἑαυτὸν §SIG:M§ ό … ^!έτερος] §SIG:Dawe§","dirty":false,"id":"248","sigla":["Dawe","M"],"span":[48,53],"editors":["Dawe"],"query":false,"unit":248},{"lemma":"εἰ]]","reading":"om. §SIG:M§","sigla":["M"],"id":"249","dirty":false,"unit":249,"query":false,"editors":[],"span":[60,62]},{"reading":"ὁ δὲ ἐν §SIG:M§","lemma":"ὁ ἐν]]","id":"250","sigla":["M"],"dirty":false,"unit":250,"editors":[],"span":[258,262],"query":false}],"num":"96","dawe":"96","text":"Σχολαστικοὶ δύο δειλοί, ὁ μὲν ἔκρυψεν εἰς φρέαρ αὑτόν, ὁ δὲ εἰς καλαμῶνα. χαλασάντων οὖν κράνος τῶν στρατιωτῶν ἐπὶ τὸ ὕδωρ ἀρύσασθαι, ‹ό μεν έτερος› νομίσας στρατιώτην κατιέναι, ἱκετεύων ἐλήφθη. ὡς δὲ ἔφασαν οἱ στρατιῶται ὅτι εἰ ἐσιώπησε, παρῆλθον ἂν αὐτόν, ὁ ἐν τῷ καλαμῶνι κρυβόμενος· Οὐκοῦν, εἶπεν, ἐμὲ παρέλθατε· σιωπῶ γάρ.","A":"100","wit":"AM","type":"joke","label":"96","tr":"C’erano due §I§scholastikoi§/I§ codardi: uno si nascose in un pozzo, l’altro invece in un canneto. Quando i soldati calarono un elmo per attingere l’acqua, ‹il primo› credette che stesse scendendo un soldato e poiché si era messo a supplicare, fu catturato. Ma quando i soldati dissero che, se fosse stato zitto, sarebbero passati oltre, quello nascosto nel canneto disse: «E allora passate oltre me: infatti sto zitto!».","n":100},{"tr":"Cf. 32","label":"96 bis; 32 α","n":101,"A":"101","dawe":"96 bis","text":"Σχολαστικὸς ἐπὶ δεῖπνον κληθεὶς οὐκ ἤσθιεν. ἐρομένου οὖν τινος τῶν κεκλημένων διὰ τί οὐκ ἐσθίοι, ὁ δὲἽνα μὴ, ‹ἔφη›, τοῦ φαγεῖν ἕνεκα δόξω παρεῖναι.","num":"96 bis","type":"joke","wit":"A","app":[{"reading":"§SIG:Dawe§","lemma":"ἔφη]]","unit":251,"query":false,"span":[110,113],"editors":["Dawe"],"sigla":["Dawe"],"id":"251","dirty":false}]},{"tr":"Uno§I§ scholastikos§/I§, dopo che gli era morta la moglie, stava comprando un sarcofago e bisticciava sul prezzo. Quando il venditore giurò che non l’avrebbe venduto a meno di cinquantamila, egli disse: «Poiché ti sei legato col giuramento, prendi pure le cinquantamila, però in aggiunta, dammi un piccolo sarcofaghino, così, se mai ne avessi bisogno per un mio figlioletto, sarà già pronto».","label":"97","n":102,"num":"97","A":"102","dawe":"97","text":"Σχολαστικὸς ‹τῆς› γυναικὸς αὐτοῦ ἀποθανούσης σορὸν ἠγόραζε καὶ περὶ τῆς τιμῆς ἐζυγομάχει. τοῦ δὲ πωλοῦντος ὀμόσαντος μὴ ἔλαττον πέντε μυριάδων πωλήσειν, ὁ δέ· Ἐπειδή, ἔφη,προσείληψαι τῷ ὅρκῳ, λάβε μὲν τὰς πέντε μυριάδας, εἰς προσθήκην δέ μοι μικρὸν σορίδιον δός, ἵνα, ἐάν μου χρεία παιδίῳ γένηται, ἕτοιμον ᾖ.","wit":"A","type":"joke","app":[{"reading":"§SIG:Eberhard§","lemma":"τῆς1]]","dirty":false,"sigla":["Eberhard"],"id":"252","query":false,"span":[13,16],"editors":["Eberhard"],"unit":252},{"reading":"πολοῦντος §SIG:A§ : §SIG:Eberhard§","lemma":"πωλοῦντος]]","span":[97,106],"editors":["Eberhard"],"query":false,"unit":253,"dirty":false,"id":"253","sigla":["A","Eberhard"]},{"unit":254,"query":false,"editors":["Eberhard"],"span":[107,116],"sigla":["A","Eberhard"],"id":"254","dirty":false,"lemma":"ὀμόσαντος]]","reading":"ὁμόσαντος §SIG:A§ : §SIG:Eberhard§"},{"unit":255,"query":false,"span":[272,275],"editors":["Eberhard"],"sigla":["Eberhard"],"id":"255","dirty":false,"reading":"που §SIG:Eberhard§","lemma":"μου]]"}]},{"app":[{"lemma":"Σχολαστικῷ]]","reading":"Σχολαστικὸς §SIG:M§","editors":[],"span":[0,10],"query":false,"unit":256,"dirty":false,"id":"256","sigla":["M"]}],"dawe":"98","text":"Σχολαστικῷ ἑταῖρος ἀπαντήσας· Συγχαίρω σοι, εἶπεν, ὅτι σοι παιδίον ἐγεννήθη. ὁ δὲ ἀπεκρίνατο· Τοῦτο ὑμεῖς οἱ φίλοι ποιεῖτε.","A":"103","num":"98","type":"joke","wit":"A","label":"98","tr":"Un amico incontrò uno §I§scholastikos§/I§ e disse: «Ti faccio le congratulazioni perché ti è nato un figlio!». Ma quello rispose: «Questo è ciò che fate voi, o amici!».","n":103},{"n":104,"tr":"Uno dice a uno §I§scholastikos§/I§: «Prestami una casacca, fino al campo». E questo fa: «Fino alla caviglia ce l’ho, ma fino al campo no!»","label":"99; 142 α","wit":"AM","type":"joke","num":"99","text":"Σχολαστικῷ τις λέγει· Χρῆσόν μοι βίρρον μέχρις ἀγροῦ. ὁ δέ· Μέχρι σφυροῦ, εἶπεν, ἔχω· μέχρι δὲ ἀγροῦ οὐκ ἔχω.","A":"104","dawe":"99","app":[{"unit":257,"editors":[],"span":[33,39],"query":false,"id":"257","sigla":[],"dirty":false,"lemma":"βίρρον]]","reading":"μῦρον"}]},{"app":[{"lemma":"ὥδευεν]]","reading":"ὤδευεν §SIG:M§","sigla":["M"],"id":"258","dirty":false,"unit":258,"query":false,"span":[25,31],"editors":[]},{"dirty":false,"id":"259","sigla":["Eberhard"],"editors":["Eberhard"],"span":[63,66],"query":false,"unit":259,"lemma":"οὐκ]]","reading":"οὐκέτι §SIG:Eberhard§"},{"lemma":"λυθεῖσαι]]","reading":"λυθῆσαι §SIG:M§","dirty":false,"id":"260","sigla":["M"],"editors":[],"span":[135,143],"query":false,"unit":260},{"lemma":"τὸ δραμεῖν]]","reading":"[τὸ] δραμεῖν §SIG:Eberhard§. coll. 133 α","sigla":["Eberhard"],"id":"261","dirty":false,"unit":261,"query":false,"editors":["Eberhard"],"span":[267,277]}],"n":105,"label":"100; 133 α","tr":"Uno §I§scholastikos§/I§ era in viaggio su un carro. Siccome le mule spossate non riuscivano a camminare, il cocchiere le sciolse perché si rimettessero un po’ in sesto. Ebbene, quando furono sciolte, fuggirono. Allora lo §I§scholastikos§/I§ disse al cocchiere: «Disgraziato, le mule corrono, mentre la colpa è del carro, che non è capace di correre?».","wit":"AM","type":"joke","A":"105","dawe":"100","text":"Σχολαστικὸς ἐπ’ ὀχήματος ὥδευεν. ἐπεὶ δὲ ἀτονήσασαι αἱ ἡμίονοι οὐκ ἠδύναντο βαδίζειν, ὑπέλυσεν αὐτὰς ὁ ἡνίοχος, ἵνα μικρὸν ἀναλάβωσιν. λυθεῖσαι οὖν ἔφυγον. καὶ ὁ σχολαστικὸς πρὸς τὸν ἡνίοχον· Κάθαρμα, εἶπεν, ὁρᾷς, ὅτι αἱ μὲν ἡμίονοιτρέχουσι, τὸ δὲ ὄχημά ἐστιν αἴτιον τὸ δραμεῖν μὴ δυνάμενον;","num":"100"},{"app":[{"lemma":"οὕτως]]","reading":"§SIG:Eberhard§","dirty":false,"id":"262","sigla":["Eberhard"],"span":[78,83],"editors":["Eberhard"],"query":false,"unit":262},{"lemma":"τούτῳ]]","reading":"§SIG:Boissonade§","query":false,"span":[132,137],"editors":["Boissonade"],"unit":263,"dirty":false,"sigla":["Boissonade"],"id":"263"}],"n":106,"label":"101","tr":"Un tale vede due fratelli gemelli e, siccome alcuni si meravigliano della somiglianza di questi, dice: «Non è tanto questo che assomiglia così a quello, quanto quello che è uguale a questo».","wit":"A","type":"joke","num":"101","A":"106","text":"Σχολαστικὸς ἀδελφοὺς διδύμους ἰδὼν θαυμαζόντων τινῶν τὴν ὁμοιότητα αὐτῶν· Οὐχ οὕτως, φησίν, ὅμοιός ἐστιν ‹οὗτος› ἐκείνῳ, ὡς ἐκεῖνος τούτῳ.","dawe":"101"},{"n":107,"tr":"Un tale dice ad uno §I§scholastikos§/I§: «Demea, l’altro ieri ti ho visto qui in sogno». E questo: «Ti sbagli, perché ero in campagna».","label":"102","wit":"AM","type":"joke","text":"Σχολαστικῷ τις λέγει· Δημέα, τρίτην ἡμέραν σε ἐνθάδε ἐν ὕπνοις εἶδον. ὁ δέ· Ψεύδῃ, εἶπεν, ἐν ἀγρῷ γὰρ ἤμην.","dawe":"102","A":"107","num":"102","app":[{"lemma":"ἐνθάδε]]","reading":"dub. delendum putat §SIG:Thierfelder§","dirty":false,"id":"264","sigla":["Thierfelder"],"editors":["Thierfelder"],"span":[46,52],"query":false,"unit":264},{"sigla":["M"],"id":"265","dirty":false,"unit":265,"query":false,"span":[76,81],"editors":[],"lemma":"Ψεύδῃ]]","reading":"ψεύδει §SIG:M§"},{"lemma":"ἔριον φέρει·]]","reading":"ἔριον ἀφέρει §SIG:A§ : ἔριον ἀ‹φθόνως› φέρει §SIG:Minas§ : ἔρια φέρει §SIG:Perry§","dirty":false,"sigla":["A","Minas","Perry"],"id":"266","query":false,"editors":["Minas","Perry"],"span":null,"unit":266}]},{"num":"103","A":"108","dawe":"103","text":"","wit":"A","type":"joke","tr":"Uno §I§scholastikos §/I§chiacchierava con due amici. Quando uno ebbe detto che non è giusto uccidere una pecora poiché offre latte e lana, e l’altro che non conviene uccidere nemmeno una mucca, ché procura latte e ara, lo §I§scholastikos§/I§ disse che non è giusto nemmeno ammazzare la scrofa, ché offre fegato, carne di mammella e di vulva.","label":"103; 134 α","n":108,"app":[]},{"type":"section","text":"ἐκ τοῦ Φιλογέλου","app":[]},{"wit":"AM","type":"joke","dawe":"104","text":"Φιλάργυρος διαθήκας γράφων ἑαυτὸν κληρονόμον ἔταξεν.","A":"109","num":"104","n":109,"tr":"Un avaro che scriveva le proprie volontà testamentarie dispose come erede sé stesso.","label":"104; 48 β","app":[]},{"n":110,"label":"105; 49 β","tr":"Un avaro a cui veniva domandato perché non mangiasse altro che olive soltanto, diceva: «Intanto per avere l’esterno come cibo, poi per avere il nocciolo come cibo; e dopo aver mangiato, per sfregarmi la testa e non aver bisogno di un lavaggio/bacinella».","wit":"A","type":"joke","num":"105","dawe":"105","A":"110","text":"Φιλάργυρος ἐρωτώμενος, διὰ τί ἄλλο οὐθὲν ἢ μόνον ἐλαίας ἐσθίει, ἔφη· Ἵνα τὸ μὲν ἔξωθεν ἀντὶ ὄψου ἔχω, τὸ δὲ ὀστοῦν ἀντὶ ξύλου· φαγὼν δέ, εἰς ‹τὴν› ἑαυτοῦ κεφαλὴν σφογγισάμενος λουτροῦ οὐκ ἐπιδέομαι.","app":[]},{"app":[{"dirty":false,"sigla":["Boissonade"],"id":"267","query":false,"editors":["Boissonade"],"span":[13,19],"unit":267,"lemma":"εἰωθὼς]]","reading":"§SIG:Boissonade§ : εἰωθὸς cf. 7 G"},{"span":[36,44],"editors":[],"query":false,"unit":268,"dirty":false,"id":"268","sigla":["M"],"reading":"ἐξαπατῶν §SIG:M§ac","lemma":"ἐξαπατᾶν]]"},{"id":"269","sigla":["A","M","Minas"],"dirty":false,"unit":269,"span":[117,126],"editors":["Minas"],"query":false,"lemma":"τὴν φίλην2]]","reading":"§SIG:Minas§ : τὰς φίλας §SIG:A§ : τοὺς φίλους §SIG:M§ δὲ §SIG:M§"}],"n":111,"label":"106; 7 G","tr":"Un pitocco professionista, solito convincere la propria compagna di essere nobile e ricco, quando mentre si abboffava dai vicini vide all’improvviso la compagna, si voltò e ordinava: «E mandami anche la veste da ricevimento!»","type":"joke","wit":"AM","num":"106","dawe":"106","text":"Πεπανόπτωχος εἰωθὼς τὴν φίλην αὐτοῦ ἐξαπατᾶν ὡς εὐγενὴς ὢν καὶ πλούσιος, εἰς τοὺς γείτονας σιτευόμενος ὡς εἶδεν ἄφνω τὴν φίλην, στραφεὶς ἐφώνει· Πέμψον δέ μοι καὶ τὸ φιβλατώριον.","A":"111"},{"n":112,"label":"107","tr":"Un altro che similmente si insuperbiva e che era assolutamente in miseria, per disgrazia si ammalò e, dal momento che la sua amante era entrata all’improvviso e lo aveva trovato che giaceva su una stuoia, provò vergogna e disse, dando la responsabilità ai medici: «I bravi e stimati dottori della città mi hanno prescritto di giacere su una stuoia!».","type":"joke","wit":"AM","dawe":"107","text":"Ἄλλος ὁμοίως μεγαλαυχούμενος, τελείως τε πενητεύων [καὶ] κατὰ τύχην νοσήσας, τῆς δὲ φίλης αὐτοῦ αἰφνίδιον ἐπεισελθούσης καὶ εὑρούσης αὐτὸν ἐπὶ ψιάθου κείμενον, ἐντραπεὶς ᾐτιᾶτο τοὺς ἰατροὺς λέγων· Οἱ καλοὶ ἰατροὶ καὶ δόκιμοι τῆς πόλεως ἐκέλευσάν με ψιαθισθῆναι.","A":"112","num":"107","app":[{"dirty":false,"sigla":["A"],"id":"270","query":false,"editors":[],"span":[30,32],"unit":270,"lemma":"τε]]","reading":"δὲ §SIG:A§"},{"lemma":"καὶ1]]","reading":"del. §SIG:Eberhard§","dirty":false,"id":"271","sigla":["Eberhard"],"span":[52,55],"editors":["Eberhard"],"query":false,"unit":271},{"dirty":false,"id":"272","sigla":["M"],"span":[96,105],"editors":[],"query":false,"unit":272,"lemma":"αἰφνίδιον]]","reading":"αἰφνήδιον §SIG:M§"},{"unit":273,"query":false,"span":[217,224],"editors":["Dawe"],"sigla":["Dawe","M"],"id":"273","dirty":false,"reading":"‹οἱ› δόκιμοι §SIG:Dawe§ Τὸ … ^!δὲ2] Τὰ μὲν... τὰ δὲ §SIG:M§","lemma":"δόκιμοι]]"}]},{"text":"Ἀλαζὼν ἐν ἀγορᾷ παῖδα ἑαυτοῦ θεασάμενος ἐκ τοῦ ἀγροῦ νεωστὶ ἐληλυθότα εἶπε· Τί ποιοῦσι τὰ πρόβατα; ὁ δὲ εἶπε· Τὸ μὲν καθεύδει, τὸ δὲ ἵσταται.","A":"113","dawe":"108","num":"108","wit":"AM","type":"joke","label":"108","tr":"Un ciarlatano vide in piazza un suo schiavo che era appena ritornato dalla campagna e disse: «Che fanno le pecore?». Quello rispose: «Una dorme, l’altra sta in piedi».s:114","n":113,"app":[{"lemma":"ἵσταται]]","reading":"ἐφίσταται §SIG:Dawe§","editors":["Dawe"],"span":[133,140],"query":false,"unit":274,"dirty":false,"id":"274","sigla":["Dawe"]},{"lemma":"κριτήρια]]","reading":"τὰ κριτήρια §SIG:Minas§","sigla":["Minas"],"id":"275","dirty":false,"unit":275,"query":false,"span":null,"editors":["Minas"]},{"lemma":"]]","reading":"§SIG:A§ : ΑΒΔΗΡΙΤΑΙ §SIG:Minas§ : nullum rell.","id":"276","sigla":["A","Minas"],"dirty":false,"unit":276,"span":null,"editors":["Minas"],"query":false}]},{"app":[],"n":114,"label":"109","tr":"Uno scemo udì che nell’Ade i tribunali sono giusti e, dato che era coinvolto in un processo, si impiccò.","wit":"AM","type":"joke","text":"","A":"114","dawe":"109","num":"109"},{"app":[],"text":"ἀβδηρίτης","type":"section"},{"text":"Ἐν Ἀβδήροις διῃρεῖτο ἡ πόλις εἰς δύο μέρη, οἵ τε πρὸς ἀνατολὰς οἰκοῦντες καὶ οἱ πρὸς δύσιν. πολεμίων οὖν ἄφνω τὴν πόλιν ἐφορμησάντων καὶ πάντων θορυβουμένων οἱ πρὸς τὸ ἀνατολικὸν οἰκοῦντες μέρος πρὸς ἀλλήλους ἔλεγον· Ἡμεῖς μὴ θορυβηθῶμεν· οἱ γὰρ πολέμιοι ἐπὶ τὰς δυσικὰς εἰσέρχονται πύλας.","A":"115","dawe":"110","num":"110","wit":"A","type":"joke","label":"110","tr":"In Abdera la città era divisa in due distretti: quelli che abitano nella zona est, e quelli della zona ovest. Quando dunque i nemici attaccarono all’improvviso la città e tutti erano in preda al caos, quelli che abitavano nella zona est si dicevano l’un l’altro: «Non agitiamoci! I nemici si presentano infatti alle porte occidentali!».","n":115,"app":[{"reading":"ἐφορμισάντων §SIG:M§","lemma":"ἐφορμησάντων]]","id":"277","sigla":["M"],"dirty":false,"unit":277,"editors":[],"span":[120,132],"query":false},{"lemma":"οἰκοῦντες μέρος]]","reading":"μέρος οἰκοῦντες §SIG:M§","dirty":false,"sigla":["M"],"id":"278","query":false,"editors":[],"span":[179,194],"unit":278},{"reading":"om. §SIG:M§","lemma":"μὴ]]","unit":279,"query":false,"editors":[],"span":[223,225],"sigla":["M"],"id":"279","dirty":false}]},{"type":"joke","wit":"AM","text":"Ἐν Ἀβδήροις ὄνος λαθὼν εἰς τὸ γυμνάσιον εἰσῆλθε καὶ τὸ ἔλαιον ἐξέχεεν. οἱ δὲ συνελθόντες καὶ μεταπεμψάμενοι πάντας τοὺς ὄνους τοὺς ἐν τῇ πόλει καὶ εἰς ἕνα συναγαγόντες τόπον πρὸς τὸ ἀσφαλίσασθαι ἐνώπιον αὐτῶν τὸν ὄνον ἐμαστίγωσαν.","dawe":"111","A":"116","num":"111","n":116,"tr":"Ad Abdera un asino entrò inavvertitamente nel ginnasio e rovesciò l’olio. I cittadini accorsero, convocarono tutti gli asini della città, li raccolsero in un unico luogo e frustarono l’asino di fronte ai suoi simili, come punizione esemplare.","label":"111","app":[{"id":"280","sigla":["Dawe"],"dirty":false,"unit":280,"span":[77,88],"editors":["Dawe"],"query":false,"lemma":"συνελθόντες]]","reading":"συναθλοῦντες §SIG:Dawe§"},{"unit":281,"span":[89,92],"editors":["Dawe"],"query":false,"id":"281","sigla":["Dawe"],"dirty":false,"reading":"del. §SIG:Dawe§","lemma":"καὶ2]]"},{"unit":282,"editors":[],"span":[93,107],"query":false,"id":"282","sigla":["A","M"],"dirty":false,"reading":"μεταμεμψάμενοι §SIG:A§ τοὺς1 … ^!πόλει] τοὺς ὄνους τοὺς ἐν τῇ πόλει §SIG:M§","lemma":"μεταπεμψάμενοι]]"}]},{"app":[{"lemma":"ἀπάγξασθαι]]","reading":"ἀπήξασθαι §SIG:M§","sigla":["M"],"id":"283","dirty":false,"unit":283,"query":false,"editors":[],"span":[10,20]},{"query":false,"editors":[],"span":[49,61],"unit":284,"dirty":false,"sigla":["M"],"id":"284","lemma":"διαρραγέντος]]","reading":"διαραγέντος §SIG:M§"}],"n":117,"label":"112","tr":"Un Abderita che voleva impiccarsi si ferì alla testa poiché si era spezzata la corda. Prese dunque un impiastro dal dottore e lo pose sulla ferita, se ne andò e di nuovo si impiccò.","type":"joke","wit":"AM","text":"Ἀβδηρίτης ἀπάγξασθαι βουλόμενος καὶ τοῦ σχοινίου διαρραγέντος τὴν κεφαλὴν ἐπλήγη. λαβὼν οὖν ἔμπλαστρον παρὰ τοῦ ἰατροῦ καὶ θεὶς κατὰ τοῦ τραύματος, ἀπελθὼν πάλιν ἀπήγξατο.","A":"117","dawe":"112","num":"112"},{"app":[{"unit":285,"query":false,"span":[11,19],"editors":["Thierfelder"],"sigla":["Thierfelder"],"id":"285","dirty":false,"reading":"del. §SIG:Thierfelder§","lemma":"εὐνοῦχον]]"},{"id":"286","sigla":["A","Minas"],"dirty":false,"unit":286,"span":[38,46],"editors":["Minas"],"query":false,"lemma":"ἐμβάσεως]]","reading":"§SIG:Minas§ : ἐμβάστως §SIG:A§"},{"reading":"§SIG:Hertlein§ : επὶ §SIG:A§","lemma":"ἐπεὶ]]","editors":["Hertlein"],"span":[74,78],"query":false,"unit":287,"dirty":false,"id":"287","sigla":["A","Hertlein"]}],"n":118,"label":"113; 124 α","tr":"Un Abderita vide uno con un vistoso tumore che usciva da una vasca da bagno e disse: «Svuota la sacca, perché lo dico all’inserviente dei bagni!».","type":"joke","wit":"A","num":"113","A":"118","text":"Ἀβδηρίτης [εὐνοῦχον] ἰδὼν κηλίτην ἀπὸ ἐμβάσεως ἐξιόντα εἶπεν· Ἀποκένωσον, ἐπεὶ τῷ παραχύτῃ λέγω.","dawe":"113"},{"n":119,"label":"114","tr":"Un Abderita vide un eunuco e gli domandò quanti figli avesse. Quando l’altro disse che chi non ha testicoli non può generare figli, egli rispose ‹…«ma devi avere molti nipoti!» Minas…›","wit":"A","type":"joke","num":"114","dawe":"114","A":"119","text":"Ἀβδηρίτης εὐνοῦχον ἰδὼν ἐπύθετο αὐτοῦ, πόσα παιδία ἔχει. ἑτέρου δὲ εἰπόντος τὸν ὄρχεις μὴ ἔχοντα μὴ δύνασθαι τέκνα γεννῆσαι, ὑπολαβὼν ‹....›","app":[{"reading":"§SIG:Eberhard§ : αὐτῷ §SIG:A§","lemma":"αὐτοῦ]]","span":[32,37],"editors":["Eberhard"],"query":false,"unit":288,"dirty":false,"id":"288","sigla":["A","Eberhard"]},{"lemma":"τέκνα γεννῆσαι]]","reading":"τεκνογοννῆσαι §SIG:Minas§","id":"289","sigla":["Minas"],"dirty":false,"unit":289,"span":[109,123],"editors":["Minas"],"query":false},{"lemma":"]]","reading":"‹ἔφη· Πολλοὺς οὖν (γοῦν §SIG:Eberhard§) ἀναγκη υἱωνοὺς ἔχειν› §SIG:Minas§","unit":290,"query":false,"span":null,"editors":["Eberhard","Minas"],"sigla":["Eberhard","Minas"],"id":"290","dirty":false}]},{"app":[{"reading":"προσομιλοῦντα §SIG:M§","lemma":"ὁμιλοῦντα]]","query":false,"span":[32,41],"editors":[],"unit":291,"dirty":false,"sigla":["M"],"id":"291"},{"unit":292,"editors":["Minas"],"span":[130,141],"query":false,"id":"292","sigla":["Minas"],"dirty":false,"reading":"οὐκοῦν ἔφη §SIG:Minas§","lemma":"ἔφη· Οὐκοῦν]]"},{"reading":"om. §SIG:M§","lemma":"θυγάτηρ]]","dirty":false,"id":"293","sigla":["M"],"span":[142,149],"editors":[],"query":false,"unit":293},{"sigla":["Dawe"],"id":"294","dirty":false,"unit":294,"query":false,"span":[156,161],"editors":["Dawe"],"lemma":"ἐστιν]]","reading":"notam interrogationis add. §SIG:Dawe§"}],"num":"115","text":"Ἀβδηρίτης εὐνοῦχον ἰδὼν γυναικὶ ὁμιλοῦντα ἠρώτα ἄλλον, εἰ ἄρα γυνὴ αὐτοῦ ἐστι. τοῦ δὲ εἰπόντος εὐνοῦχον γυναῖκα ἔχειν μὴ δύνασθαι ἔφη· Οὐκοῦν θυγάτηρ αὐτοῦ ἐστιν;","dawe":"115","A":"120","type":"joke","wit":"AM","label":"115","tr":"Un Abderita vide un eunuco che accompagnava una donna e chiedeva ad un altro se lei fosse la moglie di quello. Quando l’altro rispose che un eunuco non può avere moglie, disse: «E non è allora sua figlia?».","n":120},{"wit":"A","type":"joke","num":"116","text":"Ἀβδηρίτης εὐνοῦχος δυστυχήσας κήλην ἐποίησεν.","A":"121","dawe":"116","n":121,"tr":"Un Abderita eunuco per sventura sviluppò un tumore.","label":"116; 260 α","app":[]},{"n":122,"tr":"Quando un Abderita dormiva con un tale con un tumore, di notte si alzò e tornando poi sui suoi passi, poiché era buio, senza volerlo schiacciò il rigonfiamento del tumore. Dal momento che il malato strepitò fragorosamente, gli disse: «E però perché dormi con la testa al posto dei piedi?».","label":"117","wit":"A","type":"joke","dawe":"117","text":"Ἀβδηρίτης μετὰ κηλίτου κοιμώμενος καὶ τῇ νυκτὶ πρὸς ἑαυτὸν ἀναστὰς ἐν τῷ ἐπαναστρέφειν σκοτίας οὔσης ἄκων τὴν κήλην ἐπάτησε. τοῦ δὲ κηλίτου κατακράξαντος, αὐτῷ ἔφη· Διὰ τί γὰρ κατακέφαλα κοιμᾶσαι;","A":"122","num":"117","app":[]},{"app":[],"label":"118","tr":"Un Abderita a passeggio vide uno con un grosso tumore che orinava e disse: «Questo fino a sera non si sarà svuotato!»","n":123,"A":"123","text":"Ἀβδηρίτης περιπατῶν εἶδε κηλίτην οὐροῦντα καὶ εἶπεν· Οὗτος ἕως ἑσπέρας οὐ μὴ ἐξουρήσῃ.","dawe":"118","num":"118","type":"joke","wit":"A"},{"type":"joke","wit":"A","dawe":"119","text":"Ἀβδηρίτης ἰδὼν κηλίτην ἀπὸ κολύμβου ἐξιόντα, μόλις δὲ περιπατοῦντα, πρὸς αὐτὸν εἶπε· Τί γὰρ ἀπλήστως ἐγόμωσας, μὴ δυνάμενος γενναίως βαστάσαι;","A":"124","num":"119","n":124,"tr":"Un Abderita vide uno con un grosso tumore che usciva da una piscina, e che camminava a stento, e disse a quello: «Ma perché ti sei caricato smisuratamente, pur non sapendola sollevare come si deve?».","label":"119; 118 α","app":[{"id":"295","sigla":[],"dirty":false,"unit":295,"span":[101,109],"editors":[],"query":false,"reading":"","lemma":"ἐγόμωσας]]"}]},{"type":"joke","wit":"A","num":"120","text":"Ἀβδηρίτης ἀκούσας, ὅτι κρόμμυα καὶ βολβοὶ φυσῶσιν, ἐν τῷ πλέειν αὐτὸν γαλήνης οὔσης πολλῆς, σάκκον πλήσας ἀπὸ τῆς πρύμνης ἐκρέμασεν.","dawe":"120","A":"125","n":125,"label":"120; 146 α et 62 β","tr":"Un Abderita che aveva sentito che cipolle e bulbi gonfiano, quando durante una navigazione c’era molta bonaccia ne riempì un sacco e lo appese alla prua.","app":[{"id":"296","sigla":["A","M","Minas"],"dirty":false,"unit":296,"editors":["Minas"],"span":[23,30],"query":false,"reading":"§SIG:Minas§ : κρόμυα §SIG:A§ τινὸς … ^!ὠτία2] om. §SIG:M§","lemma":"κρόμμυα]]"}]},{"tr":"Un Abderita vide un corridore crocifisso e disse: «Per gli dèi! Questo non corre più, ma vola!».","label":"121","n":126,"num":"121","dawe":"121","text":"Ἀβδηρίτης ἰδὼν δρομέα ἐσταυρωμένον εἶπε· Μὰ τοὺς θεοὺς οὗτος οὐκέτι τρέχει, ἀλλὰ πέτεται.","A":"126","wit":"AM","type":"joke","app":[]},{"n":127,"label":"122","tr":"Un Abderita vendeva un tegame che non aveva orecchi. Ma quando uno chiese perché avesse tolto i suoi orecchi, rispose: «Perché non senta che è in vendita e scappi».","type":"joke","wit":"AM","text":"Ἀβδηρίτης λεκάνην ἐπώλει μὴ ἔχουσαν ὠτία. τινὸς δὲ ἐρωτήσαντος, διὰ τί ἦρεν αὐτῆς τὰ ὠτία, ἀπεκρίνατο· Ἵνα μὴ ἀκούσασα, ὅτι πωλεῖται, φύγῃ.","dawe":"122","A":"127","num":"122","app":[]},{"label":"123","tr":"Un Abderita cremò com’era uso il padre defunto, corse a casa dalla madre che stava male e disse: «Avanza ancora un po’ di legna: se dunque vuoi e riesci, fatti cremare con quella».","n":128,"num":"123","dawe":"123","A":"128","text":"Ἀβδηρίτης τὸν πατέρα τελευτήσαντα κατὰ τὸν νόμον καύσας, δραμὼν εἰς τὴν οἰκίαν πρὸς τὴν μητέρα αὐτοῦ νοσοῦσαν εἶπεν· Ὀλίγα ἔτι περιττεύει ξύλα· ἐὰν οὖν βούλῃ καὶ δύνασαι, τοῖς αὐτοῖς κατακαύθητι.","type":"joke","wit":"A","app":[{"sigla":["A","Boissonade","Minas"],"id":"297","dirty":false,"unit":297,"query":false,"editors":["Boissonade","Minas"],"span":[43,48],"lemma":"νόμον]]","reading":"§SIG:Minas§ : ὦμον §SIG:A§ ἐὰν … ^!βούλῃ] εἰ οὖν βούλει §SIG:Boissonade§"},{"lemma":"καὶ δύνασαι]]","reading":"μὴ (seu μηκέτι) ὀδυνᾶσθαι §SIG:Dawe§","query":false,"editors":["Dawe"],"span":[158,169],"unit":298,"dirty":false,"sigla":["Dawe"],"id":"298"}]},{"app":[{"reading":"κατόναρ §SIG:M§","lemma":"κατ ὄναρ]]","query":false,"span":[10,19],"editors":[],"unit":299,"dirty":false,"sigla":["M"],"id":"299"},{"editors":[],"span":[48,55],"query":false,"unit":300,"dirty":false,"id":"300","sigla":["A"],"lemma":"δηνάρια]]","reading":"δινάρια §SIG:A§"},{"reading":"δι’ ὕπνησε §SIG:M§","lemma":"διύπνισε]]","span":[114,122],"editors":[],"query":false,"unit":301,"dirty":false,"id":"301","sigla":["M"]},{"span":[124,134],"editors":["Minas"],"query":false,"unit":302,"dirty":false,"id":"302","sigla":["A","M","Minas"],"reading":"§SIG:Minas§ : καμύσας §SIG:A§§SIG:M§","lemma":"καμμύσας]]"}],"wit":"AM","type":"joke","dawe":"124","text":"Ἀβδηρίτης κατ’ ὄναρ χοιρίδιον ἐπώλει καὶ ἐζήτει δηνάρια ἑκατόν. διδόντος δέ τινος πεντήκοντα μὴ βουλόμενος λαβεῖν διύπνισε. καμ‹μ›ύσας οὖν καὶ τὴν χεῖρα προτείνας εἶπε· Δὸς κἂν τὰ πεντήκοντα.","A":"129","num":"124","n":129,"label":"124","tr":"Un Abderita in sogno vendeva un maialino e chiedeva cento denari. Allora siccome uno gliene dava cinquanta, non volendo accettarli si svegliò. Allora richiuse gli occhi, tese la mano in avanti e disse: «E va bene, dammi pure i cinquanta!»"},{"app":[{"reading":"ὑπῆρχε","lemma":"ὑπῆρχεν]]","dirty":false,"id":"303","sigla":[],"span":[116,123],"editors":[],"query":false,"unit":303}],"wit":"AM","type":"joke","num":"125","text":"Ἀβδηρίτου στρουθίον ἀπέθανε. μετὰ οὖν χρόνον ἰδὼν στρουθοκάμηλον εἶπεν· Ἐὰν ἔζη τὸ στρουθίον μου, ἤδη ἂν τηλικοῦτον ὑπῆρχεν.","dawe":"125","A":"130","n":130,"tr":"Il passerotto di un Abderita morì. Tempo dopo questi vide uno struzzo e disse: «Se il mio passerotto fosse vivo, ora sarebbe proprio di questa taglia!».","label":"125"},{"dawe":"126","text":"Ἀβδηρίτης εἰς Ῥόδον ἀποδημήσας ὡς ἐκ τοῦ ὀνόματος τοὺς τοίχους ὠσμᾶτο.","A":"131","num":"126","type":"joke","wit":"AM","tr":"Un Abderita si recò in viaggio a Rodi{ N1|I2|Z1\\2\\ } e per via del nome annusava i muri.","label":"126","n":131,"app":[{"lemma":"τοίχους]]","reading":"τείχους §SIG:M§","editors":[],"span":[55,62],"query":false,"unit":304,"dirty":false,"id":"304","sigla":["M"]},{"lemma":"ὠσμᾶτο]]","reading":"ὀσμᾶτο §SIG:M§","unit":305,"query":false,"editors":[],"span":[63,69],"sigla":["M"],"id":"305","dirty":false}]},{"n":132,"label":"127","tr":"Un Abderita che doveva ad un tale un asino ma non lo aveva, lo invitava ad accettare al posto di quello due muli.","wit":"A","type":"joke","num":"127","text":"","A":"132","dawe":"127","app":[]},{"text":"σιδόνιοι","type":"section","app":[]},{"app":[{"unit":306,"span":[140,151],"editors":["Minas"],"query":false,"id":"306","sigla":["A","Minas"],"dirty":false,"lemma":"ἀναλάβωνται]]","reading":"§SIG:Minas§ : ἀναλάηται §SIG:A§ (cf. ἀναλάβωσιν 105 α)"},{"reading":"ἐστι §SIG:Dawe§","lemma":"ἦν]]","sigla":["Dawe"],"id":"307","dirty":false,"unit":307,"query":false,"editors":["Dawe"],"span":[197,199]}],"wit":"A","type":"joke","text":"Σιδόνιος ἔπαρχος ἐπὶ ὀχήματος ὥδευεν. ἐπεὶ δὲ ἀτονήσασαι αἱ ἡμίονοι οὐκ ἠδύναντο βαδίζειν, ἀπέλυσεν αὐτὰς ὁ ἡνίοχος, ἵνα μικρὸν βοσκηθεῖσαι ἀναλάβωνται. λυθεῖσαι οὖν ἔφυγον. καὶ ὁ ἔπαρχος πρὸς τὸν ἡνίοχον ἔφη· Ὁρᾷς, κάθαρμα, ὅτι αἱ μὲν ἡμίονοι τρέχουσι, τὸ δὲ ὄχημα δραμεῖν μὴ δυνάμενον ἵσταται.","A":"133","dawe":"128","num":"128","n":133,"tr":"Un governatore Sidonio viaggiava su di un carro. Siccome le mule erano stanche e non riuscivano a camminare, il cocchiere le sciolse perché pascolassero un po’ e si riprendessero. Vennero slegate ma fuggirono. E il governatore disse al cocchiere: «Vedi, disgraziato, che le mule corrono, è il carro che non riuscendo a correre sta fermo!».","label":"128; 105 α"},{"app":[{"lemma":"ἀροτριῶσαν·]]","reading":"ἀρωτριῶσαν","unit":308,"query":false,"editors":[],"span":[213,223],"sigla":[],"id":"308","dirty":false},{"lemma":"παρέχοντα]]","reading":"παρέχουσαν §SIG:Boissonade§","unit":309,"span":[278,287],"editors":["Boissonade"],"query":false,"id":"309","sigla":["Boissonade"],"dirty":false},{"editors":["Boissonade"],"span":null,"query":false,"unit":310,"dirty":false,"id":"310","sigla":["Boissonade"],"reading":"βούλβαν §SIG:Boissonade§","lemma":"βουλβάν]]"},{"sigla":["Boissonade"],"id":"311","dirty":false,"unit":311,"query":false,"span":null,"editors":["Boissonade"],"lemma":"]]","reading":"Φιλογέλω §SIG:Boissonade§"},{"sigla":["A","Boissonade","Eberhard","Thierfelder"],"id":"312","dirty":false,"unit":312,"query":false,"editors":["Boissonade","Eberhard","Thierfelder"],"span":[171,179],"reading":"§SIG:Eberhard§ ex 108 α : προσῆκεν dub. §SIG:Thierfelder§ : δεῖ dub. §SIG:Eberhard§ παρέχουσαν … ^!ἀροτριῶσαν] §SIG:Boissonade§ : παρέχοντα καὶ ἀροτριοῦντα §SIG:A§ ex 108 α","lemma":"προσήκει]]"},{"id":"313","sigla":["A","Boissonade"],"dirty":false,"unit":313,"editors":["Boissonade"],"span":[273,277],"query":false,"reading":"§SIG:Boissonade§ : ἥπαρ §SIG:A§","lemma":"ἧπαρ]]"},{"lemma":"παρέχοντα]]","reading":"§SIG:A§ : παρέχουσαν §SIG:Boissonade§","dirty":false,"id":"314","sigla":["A","Boissonade"],"editors":["Boissonade"],"span":[278,287],"query":false,"unit":314}],"label":"129 cf. 108 α","tr":"Un retore di Sidone chiacchierava con due amici. Quando uno diceva che non era giusto uccidere le pecore poiché forniscono latte e lana, e l’altro disse che non è giusto nemmeno uccidere il bue ché offre latte e ara, il retore disse che non era giusto nemmeno uccidere il maiale, dato che offre fegato, carne di mammella e rognoni.","n":134,"dawe":"129","A":"134","text":"Σιδόνιος ῥήτωρ μετὰ δύο ἑταίρων διελέγετο. τοῦ δὲ ἑνὸς λέγοντος, ὅτι οὐκ ἦν δίκαιον πρόβατα σφάζεσθαι διὰ τὸ φέρειν γάλα καὶ ἔριον, καὶ τοῦ ἄλλου εἰπόντος, ὅτι μηδὲ βοῦν ‹προσήκει› ἀναιρεῖσθαι γάλα παρέχουσαν καὶ ἀροτριῶσαν, ὁ ῥήτωρ ἔφη μηδὲ χοῖρον εἶναι δίκαιον σφάζεσθαι ἧπαρ παρέχοντα καὶ οὖθαρ καὶ νεφρία.","num":"129","wit":"A","type":"joke"},{"text":"Σιδόνιος σοφιστὴς κατὰ πρώτην ἄνοιξιν τοῦ βαλανείου λουόμενος καὶ μηδένα ἔσωθεν εὑρὼν λέγει πρὸς τοὺς ἰδίους οἰκέτας· Καθὼς βλέπω, οὐ λούει.","A":"135","dawe":"130","num":"130","type":"joke","wit":"A","label":"130; 23 α","tr":"Un sofista di Sidone che si lava alla prima apertura del bagno, siccome non vi trova nessuno dice ai suoi servitori: «A quanto vedo, è chiuso».","n":135,"app":[{"reading":"§SIG:A§ : λουσόμενος §SIG:Eberhard§","lemma":"λουόμενος]]","sigla":["A","Eberhard"],"id":"315","dirty":false,"unit":315,"query":false,"editors":["Eberhard"],"span":[52,61]}]},{"tr":"Uno §I§scholastikos§/I§ di Sidone che aveva un terreno a molte miglia di distanza e che voleva renderlo più vicino, abbatté sette cippi miliari.","label":"131; 61 α","n":136,"A":"136","text":"Σιδόνιος σχολαστικὸς ἀπὸ πολλῶν μιλίων χωρίον ἔχων καὶ θέλων αὐτὸ ἐγγύτερον ποιῆσαι ἑπτὰ κίονας μιλίων κατέστρεψεν.","dawe":"131","num":"131","type":"joke","wit":"A","app":[]},{"num":"132","A":"137","text":"Σιδόνιος πραγματευτὴς μετὰ ἑτέρου ὥδευε. τῆς δὲ γαστρὸς ἀναγκαζούσης μικρὸν ἀπολειφθῆναι προσαπέμεινεν. ὁδὲ συνοδοιπόρος ἀφῆκεν αὐτὸν γράψας ἔν τινι κίονι τῶν μιλίων· Τάχυνον, φθάσον με. ὁ δὲ ὡς ἀνέγνω, ἐπέγραψε κάτωθεν· Καὶ αὐτὸς μεῖνόν με.","dawe":"132","wit":"AM","type":"joke","label":"132; 42 α","tr":"Un affarista di Sidone viaggiava insieme ad un altro. Siccome lo stomaco lo aveva costretto a trattenersi, rimase indietro. Il compagno di viaggio lo lasciò dopo avergli scritto su un cippo miliario: «Affrettati, raggiungimi». Quando lo lesse, scrisse sul retro: «E tu aspettami».","n":137,"app":[{"lemma":"ἑτέρου]]","reading":"§SIG:A§§SIG:M§ :ἑταίρου §SIG:Dawe§","id":"316","sigla":["A","Dawe","M"],"dirty":false,"unit":316,"span":[27,33],"editors":["Dawe"],"query":false},{"query":false,"editors":[],"span":[34,39],"unit":317,"dirty":false,"sigla":["M"],"id":"317","lemma":"ὥδευε]]","reading":"ὥδευε §SIG:M§"},{"lemma":"προσαπέμεινεν]]","reading":"§SIG:A§§SIG:M§ : πρόσω ἀπέμεινεν §SIG:Dawe§","id":"318","sigla":["A","Dawe","M"],"dirty":false,"unit":318,"span":[89,102],"editors":["Dawe"],"query":false},{"lemma":"τινι]]","reading":"τῆ §SIG:M§","unit":319,"span":[144,148],"editors":[],"query":false,"id":"319","sigla":["M"],"dirty":false},{"lemma":"κίονι]]","reading":"delendum esse censit §SIG:Eberhard§","dirty":false,"id":"320","sigla":["Eberhard"],"span":[149,154],"editors":["Eberhard"],"query":false,"unit":320}]},{"app":[],"tr":"Un tale dice ad un pescatore di Sidone: «La tua nassa1 ha paguri?» e quello si infuriò e rispose: «Il tuo petto ha granchi?».","label":"133","n":138,"dawe":"133","text":"Σιδονίῳ ἁλιεῖ λέγει τις· Ἔχει τὸ κυρτίν σου παγούρους; ὁ δὲ μανεὶς ἀπεκρίνατο· Ἔχει τὸ στῆθός σου καρκίνους;","A":"138","num":"133","wit":"A","type":"joke"},{"app":[{"sigla":["A","Boissonade"],"id":"321","dirty":false,"unit":321,"query":false,"span":[61,69],"editors":["Boissonade"],"lemma":"καθίσατε·]]","reading":"§SIG:Boissonade§ : καθήσατε §SIG:A§"}],"label":"134; 86 α","tr":"Un centurione di Sidone diceva ai soldati: «Oggi state tanto seduti: domani, infatti, dovrete fare molta strada!».","n":139,"A":"139","dawe":"134","text":"Σιδόνιος ἑκατόνταρχος τοῖς στρατιώταις ἔλεγεν· Σήμερον πολλὰ καθίσατε· αὔριον γὰρ πολλὰ μέλλετε ὁδοιπορεῖν.","num":"134","wit":"A","type":"joke"},{"n":140,"tr":"Un tale dice ad un candelaio di Sidone: «Signore, hai dei moccoli?» Quello allora si arrabbiò e rispose: «Signore, hai dei carbonchi?».","label":"135","wit":"A","type":"joke","dawe":"135","text":"Σιδονίῳ κηρουλαρίῳ λέγει τις· Ἔχεις, κῦρι, ἀποκαύματα; ὁ δὲ ὀργισθεὶς ἀπεκρίνατο· Ἔχεις, κῦρι, ἀνθρακώματα;","A":"140","num":"135","app":[]},{"type":"joke","wit":"A","text":"Σιδόνιος γραμματικὸς ἠρώτα τὸν †διδάσκαλον· Ἡ πεντακότυλος λήκυθος πόσον χωρεῖ; ὁ δὲ εἶπεν· Οἶνον λέγεις ἢ ἔλαιον;","A":"141","dawe":"136","num":"136","n":141,"label":"136; 96 α et 1 γ","tr":"Un segretario Sidonio chiedeva al †maestro†: « La boccetta da cinque cotili quanto è capace?». E quello disse: «Di vino dici, o di olio?».","app":[]},{"num":"137","A":"142","text":"Σιδονίῳ μαγείρῳ λέγει τις· Δάνεισόν μοι μάχαιραν ἕως Σμύρνης. ὁ δὲ ἔφη·Οὐκ ἔχω μάχαιραν ἕως ἐκεῖ φθάζουσαν.","dawe":"137","type":"joke","wit":"AM","label":"137; cf. 104 α","tr":"Un tale dice a un cuoco Sidonio: «Prestami un coltello fino a Smirne». Questo allora dice: «Non ho un coltello che arrivi fin lì».","n":142,"app":[{"reading":"μάγειρος §SIG:M§","lemma":"μαγείρῳ]]","span":[8,15],"editors":[],"query":false,"unit":322,"dirty":false,"id":"322","sigla":["M"]}]},{"label":"138","tr":"Un centurione Sidonio vide un carrettiere che portava il carro attraverso la piazza e ordinò che venisse percosso. Quando allora questi disse: «Sono un cittadino romano, per legge non posso essere percosso!», il centurione ordinò che fossero fustigati i buoi.","n":143,"num":"138","text":"Σιδόνιος κεντουρίων ἰδὼν ζευγηλάτην διὰ τῆς ἀγορᾶς ἅμαξαν φέροντα ἐκέλευσεν αὐτὸν τυφθῆναι. τοῦ δὲ εἰπόντος ὅτι Ῥωμαῖός εἰμι, καὶ οὐ χρὴ τύπτεσθαί με διὰ τὸν νόμον τοὺς βόας ἐκέλευσεν ὁ κεντουρίων μαστιγωθῆναι.","A":"143","dawe":"138","type":"joke","wit":"A","app":[{"span":[25,35],"editors":["Minas"],"query":false,"unit":323,"dirty":false,"id":"323","sigla":["A","Minas"],"reading":"§SIG:Minas§ : ζευγελάτην §SIG:A§","lemma":"ζευγηλάτην]]"},{"lemma":"ἀρρώστου]]","reading":"ἀρώστου §SIG:A§","id":"324","sigla":["A"],"dirty":false,"unit":324,"span":null,"editors":[],"query":false},{"lemma":"ἐκφερομένου]]","reading":"ἐκφερουμένου §SIG:A§","id":"325","sigla":["A"],"dirty":false,"unit":325,"editors":[],"span":null,"query":false},{"lemma":"κηδείᾳ]]","reading":"κηδία §SIG:M§","dirty":false,"sigla":["M"],"id":"326","query":false,"span":null,"editors":[],"unit":326},{"lemma":"ἀκολουθῶν]]","reading":"ἀκολουθὼν §SIG:M§","unit":327,"editors":[],"span":null,"query":false,"id":"327","sigla":["M"],"dirty":false}]},{"app":[],"n":144,"label":"139","tr":"Un medico Sidonio ottenne in testamento da un suo ammalato mille dracme dopo la morte, e mentre quello veniva portato a sepoltura, lui seguiva il corteo e si lamentava del fatto che gli avesse lasciato poco in legato testamentario. Quando poi anche il figlio del defunto era incappato in una malattia e lo pregava di visitarlo e affrontare il morbo, il medico disse: «Se mi lascerai nel testamento cinquemila dracme, io ti curerò come ho fatto con tuo padre!».","type":"joke","wit":"AM","dawe":"139","A":"144","text":"","num":"139"},{"app":[],"type":"section","text":"εὐτράπελοι"},{"app":[],"num":"140","dawe":"140","text":"Εὐτράπελος ἰδὼν γραμματοδιδάσκαλον ἀφυῆ διδάσκοντα προσελθὼν ἠρώτα, διὰ τί κιθαρίζειν οὐ διδάσκει. Τοῦ δὲ εἰπόντος· Ὅτι οὐκ ἐπίσταμαι, εἶπε· Πῶς οὖν γράμματα διδάσκεις οὐκ ἐπιστάμενος;","A":"145","type":"joke","wit":"AM","tr":"Uno spiritoso vide un maestro elementare inetto insegnare, andò da lui e gli chiese perché non insegnasse a suonare la cetra. Quando quello allora rispose: «Perché non sono in grado», disse: «E perché dunque insegni le lettere, pur non essendone in grado?».","label":"140","n":145},{"app":[{"unit":328,"editors":[],"span":[11,21],"query":false,"id":"328","sigla":["A"],"dirty":false,"lemma":"κυβερνήτης]]","reading":"κυβερνίτης §SIG:A§"},{"query":false,"span":[57,64],"editors":["Minas"],"unit":329,"dirty":false,"sigla":["A","Minas"],"id":"329","lemma":"κρόμμυα]]","reading":"§SIG:Minas§ : κρόμυα §SIG:A§"}],"n":146,"tr":"A un timoniere spiritoso fu domandato che aria tirasse e rispose: «Di fave e cipolle!».","label":"141; 62 β, cf. 125 α","type":"joke","wit":"A","dawe":"141","A":"146","text":"Εὐτράπελος κυβερνήτης ἐρωτηθείς, τί φυσᾷ, εἶπε· Φάβα καὶ κρόμμυα.","num":"141"},{"app":[{"lemma":"μοι ἤλειψας]]","reading":"μοι ἐδάνεισας §SIG:A§ ut supra §SIG:Cataudella§ : με ἔχρισας ut supra §SIG:Thierfelder§ τὸν … ^!αὐτόν] τοῦ λύχνου οὐ βλέπω αὐγήν dub. §SIG:Dawe§","query":false,"editors":["Cataudella","Dawe","Thierfelder"],"span":[141,152],"unit":330,"dirty":false,"sigla":["A","Cataudella","Dawe","Thierfelder"],"id":"330"},{"span":[174,179],"editors":["Mehler"],"query":false,"unit":331,"dirty":false,"id":"331","sigla":["Mehler"],"reading":"del. §SIG:Mehler§","lemma":"αὐτόν]]"}],"num":"142","dawe":"142","text":"Εὐτράπελον ὀφθαλμιῶντα ἰατρὸς κλέπτης λύχνον ἔκλεψε. μιᾷ οὖν ταῦτα ἠρώτα αὐτόν· Πῶς ἔχεις εἰς τοὺς ὀφθαλμούς; καὶ ὁ εὐτράπελός φησιν· Ἀφ’ οὗ μοι ἤλειψας, τὸν λύχνον οὐ βλέπω αὐτόν.","A":"147","wit":"A","type":"joke","tr":"Un medico dalle mani lunghe guarì uno spiritoso che aveva un problema agli occhi e non ci vedeva, e gli rubò una lampada. Una volta poi gli chiedeva: «Come vanno gli occhi?» e lo spiritoso: «Da quando me li hai curati, non vedo proprio la lampada!».","label":"142","n":147},{"type":"joke","wit":"A","num":"143","dawe":"143","A":"148","text":"Εὐτραπέλῳ ἰατρῷ λέγει τις·‹...› Ἐὰν κτήσῃ [θερμὸν] ἀγγεῖον, θερμόν σε οὐ λείψει.","n":148,"tr":"Il testo è lacunoso proprio nel momento in cui viene presentata la parola che sarà ripresa come §I§pointe §/I§del gioco di parole, ma il senso è perfettamente recuperabile dalla 64","label":"143; 64 β","app":[{"reading":"del. §SIG:Thierfelder§","lemma":"θερμὸν]]","id":"332","sigla":["Thierfelder"],"dirty":false,"unit":332,"span":[43,49],"editors":["Thierfelder"],"query":false}]},{"app":[{"dirty":false,"sigla":["Minas"],"id":"333","query":false,"editors":["Minas"],"span":[42,51],"unit":333,"lemma":"τί χρῄζει]]","reading":"τὶνος χρῄζει §SIG:Minas§"},{"sigla":["Eberhard"],"id":"334","dirty":false,"unit":334,"query":false,"editors":["Eberhard"],"span":[52,60],"lemma":"ὁ κύριός]]","reading":"ὦ κῦρί (κύριέ) §SIG:Eberhard§"},{"reading":"§SIG:Minas§ : καταβαλεῖν §SIG:A§","lemma":"καταλαβεῖν]]","unit":335,"query":false,"editors":["Minas"],"span":[162,172],"sigla":["A","Minas"],"id":"335","dirty":false}],"num":"144","A":"149","dawe":"144","text":"Εὐτράπελος ἀργὸν δρομέα ἰδὼν εἶπεν· Οἶδα, τί χρῄζει ὁ κύριός μου οὗτος. τοῦ δὲ ἀγωνοθέτου ἐρωτήσαντος· Τί ἐστιν; εἶπεν· Ἵππου χρῄζει· ἄλλως γὰρ τοὺς ἀνταγωνιστὰς καταλαβεῖν οὐ δύναται.","wit":"A","type":"joke","label":"144","tr":"Uno spiritoso vide un corridore svogliato e disse: «So cosa vuole il signore qui». Quando il giudice chiese: «Cosa? disse: «Ha bisogno di un cavallo! Perché non può riprendere in altro modo gli avversari!».","n":149},{"type":"joke","wit":"A","A":"150","text":"Εὐτράπελος κάπηλος εὑρὼν ταξεώτην ἐπὶ τῇ γυναικὶ αὐτοῦ εἶπεν· Εὗρον, ὃ οὐκ ἐζήτουν.","dawe":"145","num":"145","n":150,"tr":"Un oste spiritoso trovò un soldato sopra sua moglie e disse: «Ho trovato quello che non cercavo!».","label":"145","app":[]},{"dawe":"146","text":"Εὐτράπελος χοῖρον κλέψας ἔφευγεν. ἐπεὶ δὲ κατελαμβάνετο, θεὶς αὐτὸν χαμαὶ καὶ δέρων ἔλεγεν· Ἐκεῖ ὄρυττε καὶ μὴ παρὰ τὰ ἐμά.","A":"151","num":"146","wit":"A","type":"joke","tr":"Uno spiritoso rubò un maiale e fuggiva. Quando però fu acciuffato, lo poggiò per terra e mentre lo percuoteva diceva: «Scava lì, e non vicino alle mie cose!».","label":"146; 68 β","n":151,"app":[{"lemma":"κλέψας]]","reading":"§SIG:Dawe§ : κρύψας §SIG:A§ ex 68 β","sigla":["A","Dawe"],"id":"336","dirty":false,"unit":336,"query":false,"span":[18,24],"editors":["Dawe"]}]},{"app":[{"dirty":false,"sigla":["A","M","Minas"],"id":"337","query":false,"editors":["Minas"],"span":[153,161],"unit":337,"reading":"κοκκύσῃς edd. : κοκύσης §SIG:A§ : κοκίσης §SIG:M§ Πῶς … ^!κείρω] §SIG:Minas§ : Πῶς ἐκείρω §SIG:A§","lemma":"κοκκύσῃς]]"}],"n":152,"label":"147","tr":"Uno spiritoso vide un citarodo dalla voce bruta e stonata e lo salutò dicendo: «Salve, gallo!». Quando quello chiese perché lo avesse salutato così, disse: «Perché quando canti, si svegliano tutti!».","wit":"AM","type":"joke","num":"147","dawe":"147","A":"152","text":"Εὐτράπελος ἰδὼν κακόηχον καὶ κακόφωνον κιθαρῳδὸν ἠσπάσατο λέγων· Χαῖρε, ἀλεκτρυών. τοῦ δὲ πυθομένου, διὰ τί αὐτὸν οὕτως προσηγόρευσεν, ἔφη· Ὅτι, ὅταν σὺ κοκκύσῃς, πάντες ἐγείρονται."},{"tr":"Uno spiritoso, quando un barbiere chiacchierone gli chiese: «Come te li taglio?» disse: «Stando in silenzio».","label":"148","n":153,"A":"153","text":"Εὐτράπελος φλυάρου κουρέως ἐρωτήσαντος· Πῶς σε κείρω; Σιωπῶν, ἔφη.","dawe":"148","num":"148","type":"joke","wit":"A","app":[]},{"type":"joke","wit":"A","num":"149","A":"154","dawe":"149","text":"Εὐτράπελος ἐν βαλανείῳ ὑπό τινος ὑβρισθεὶς μάρτυρας προσέφερε τοὺς παραχύτας. τοῦ δὲ ἀντιδίκου ἀποβαλλομένου ὡς μὴ ὄντας ἀξιοπίστους ἔφη· Εἰ μὲν ‹ἐν› τῷ δουρείῳ ἵππῳ ὑβρίσθην, προήγαγον ἂν μάρτυρας τοὺς περὶ Μενέλαον καὶ Ὀδυσσέα καὶ Διομήδην· ἐν δὲ τῷ βαλανείῳ τῆς ὕβρεως γενομένης ἀνάγκη τοὺς παραχύτας τὸ πραχθὲν μᾶλλον εἰδέναι.","n":154,"label":"149; 71 β","tr":"Uno spiritoso fu maltrattato in un bagno da un tale e portava come testimoni gli inservienti. Quando l’imputato obiettava che non erano degni di fede, disse: «Se fossi stato maltrattato nel cavallo di legno, avrei portato come testimoni Menelao, Odisseo e Diomede, ché erano lì; siccome invece la violenza è avvenuta nel bagno, avranno per forza visto meglio il fatto gli inservienti!».","app":[{"reading":"§SIG:Minas§ : ὀριγισθεὶς §SIG:A§","lemma":"ὑβρισθεὶς]]","span":[33,42],"editors":["Minas"],"query":false,"unit":338,"dirty":false,"id":"338","sigla":["A","Minas"]},{"query":false,"span":[104,106],"editors":["Boissonade"],"unit":339,"dirty":false,"sigla":["Boissonade"],"id":"339","reading":"§SIG:Boissonade§","lemma":"ἐν2]]"}]},{"app":[{"unit":340,"query":false,"editors":["Dawe"],"span":[12,15],"sigla":["Dawe"],"id":"340","dirty":false,"lemma":"δύο1]]","reading":"del. §SIG:Dawe§"},{"unit":341,"query":false,"span":[37,44],"editors":["Dawe"],"sigla":["Dawe"],"id":"341","dirty":false,"lemma":"ὑπὸ δύο]]","reading":"add. §SIG:Dawe§"},{"id":"342","sigla":["Dawe"],"dirty":false,"unit":342,"editors":["Dawe"],"span":[165,167],"query":false,"lemma":"μὴ1]]","reading":"add. §SIG:Dawe§"},{"lemma":"μὴ2]]","reading":"del. §SIG:Dawe§","dirty":false,"id":"343","sigla":["Dawe"],"span":[194,196],"editors":["Dawe"],"query":false,"unit":343}],"label":"150","tr":"Uno spiritoso, quando in un bagno gli venivano richiesti in prestito dei raschietti da due tali, e uno era uno sconosciuto, l’altro invece noto ma era un ladro, disse: «A te, siccome non ti conosco, non lo do; a te invece, siccome ti conosco, non lo do».","n":155,"A":"155","text":"Εὐτράπελος, δύο] ξύστρων παρ’ αὐτοῦ ‹ὑπὸ δύο› ἐν βαλανείῳ ἐπιζητουμένων, ὑπὸ ἑνὸς μὲν ἀγνωρίστου, ὑπὸ δὲ ἑτέρου γνωρίμου μὲν ἀλλὰ κλέπτου, ὁ εὐτράπελος ἔφη· Σὲ μὲν ‹μὴ› γνωρίζων οὐ δώσω· σὲ δὲ [μὴ] γνωρίζων οὐ δώσω.","dawe":"150","num":"150","wit":"A","type":"joke"},{"app":[],"n":156,"tr":"Uno spiritoso vide un lenone che vendeva una prostituta nera e disse: «A quanto vendi la notte{ N1|I4|Z1\\4\\ }?».","label":"151; 69 β","type":"joke","wit":"A","num":"151","A":"156","text":"Εὐτράπελος ἰδὼν πορνοβοσκὸν μισθοῦντα μέλαιναν ἑταιρίδα εἶπε· Πόσου τὴν νύκτα μισθοῖς;","dawe":"151"},{"type":"joke","wit":"A","dawe":"151 bis","A":"157","text":"Εὐτράπελος ἰδὼν ἰατρὸν κόρην ὑπαλείφοντα ἔφη· Ὅρα, νεανίσκε, μὴ τὴν ὄψιν θεραπεύων τὴν κόρην διαφθείρῃς.","num":"151 bis","n":157,"tr":"Uno spiritoso vide un medico che applicava un collirio a una ragazza e disse «Occhio, giovanotto, non sciupare la pupa/pulzella{ N1|I5|Z1\\5\\ } curando quella pupilla».","label":"151 bis; 66 β","app":[{"lemma":"κόρην1]]","reading":"κόρην ‹ὀφθαλμιῶσαν› §SIG:Thierfelder§ πρὸς2 … ^!φονεῦσαι] ἐπὶ τῷ ζῆν dub. §SIG:Thierfelder§, rec. §SIG:Dawe§","query":false,"span":[23,28],"editors":["Dawe","Thierfelder"],"unit":344,"dirty":false,"sigla":["Dawe","Thierfelder"],"id":"344"}]},{"app":[{"dirty":false,"id":"345","sigla":["M"],"span":[74,78],"editors":[],"query":false,"unit":345,"reading":"αὐτὸ §SIG:M§","lemma":"αὐτῷ]]"},{"lemma":"ἐμπαρεὶς]]","reading":"ἐμπλακεὶς §SIG:Hertlein§","id":"346","sigla":["Hertlein"],"dirty":false,"unit":346,"editors":["Hertlein"],"span":null,"query":false},{"reading":"καταλείψεις §SIG:M§ ἰατρεύσω … ^!σου] ὡς τὸν πατέρα σου ἰατρεύσω §SIG:M§","lemma":"καταλείψῃς]]","query":false,"span":null,"editors":[],"unit":347,"dirty":false,"sigla":["M"],"id":"347"},{"sigla":["A","M"],"id":"348","dirty":false,"unit":348,"query":false,"span":null,"editors":[],"reading":"ἐυτράπελοι (sic) §SIG:A§ : titulum om. §SIG:M§","lemma":"]]"},{"dirty":false,"id":"349","sigla":["A","M","Minas"],"span":[214,222],"editors":["Minas"],"query":false,"unit":349,"lemma":"φεύξομεν]]","reading":"§SIG:Minas§ : φεύγομεν §SIG:A§§SIG:M§"},{"reading":"δοκεῖ §SIG:M§","lemma":"δοκῇ]]","query":false,"span":null,"editors":[],"unit":350,"dirty":false,"sigla":["M"],"id":"350"},{"span":null,"editors":["Dawe","Thierfelder"],"query":false,"unit":351,"dirty":false,"id":"351","sigla":["A","Dawe","M","Thierfelder"],"lemma":"ἀπάλαιστρος]]","reading":"dub. §SIG:Thierfelder§, rec. §SIG:Dawe§ : ἀπάλαιστος §SIG:A§ : ἀπάλαιστον §SIG:M§"},{"reading":"διόλου §SIG:M§","lemma":"δι ὅλου]]","unit":352,"query":false,"span":null,"editors":[],"sigla":["M"],"id":"352","dirty":false}],"type":"joke","wit":"A","text":"Εὐτράπελοι δύο πατραλοῖαι πρὸς ἀλλήλους ἐδυσφόρουν πρὸς τὸ φονεῦσαι τοὺς ἑαυτῶν γονεῖς. ὁ δὲ ἕτερος πρὸς τὸν ἄλλον ἔφη· Ἵνα μὴ πατροκτόνοι παρά τισι λογισθῶμεν, σὺ φόνευσον τὸν ἐμὸν πατέρα, κἀγὼ τὸν σόν· καὶ κακῆς φεύξομεν φήμης.","A":"158","dawe":"152","num":"152","n":158,"label":"152; 72 β; cf. 13 α","tr":"Due spiritosi parricidi si lamentavano l’un l’altro dell’uccidere i propri genitori. Uno allora disse all’altro: «Affinché certa gente non ci consideri parricidi, tu ammazza mio padre, e io il tuo: e ci evitiamo una brutta fama!»."},{"n":159,"label":"153","tr":"Uno spiritoso cadde nel fango mentre lottava, e perché non sembrasse essere goffo, si rigirò, si infangò tutto e si sollevò vantandosi.","wit":"AM","type":"joke","num":"153","dawe":"153","A":"159","text":"","app":[]},{"text":"κυμαῖοι","type":"section","app":[]},{"app":[],"tr":"A Cuma mentre qualcuno di insigne veniva seppellito, arrivò un tale e chiedeva ai presenti: «Chi è il morto?». Allora un Cumano si voltò e indicava dicendo: «Quello lì che giace sul letto funebre».","label":"154","n":160,"num":"154","text":"Ἐν Κύμῃ ἐπισήμου τινὸς κηδευομένου προσελθών τις ἠρώτα τοὺς ὀψικεύοντας· Τίς ὁ τεθνηκώς; εἷς δὲ Κυμαῖος στραφεὶς ὑπεδείκνυε λέγων· Ἐκεῖνος ὁ ἐπὶ τῆς κλίνης ἀνακείμενος.","A":"160","dawe":"154","type":"joke","wit":"A"},{"app":[],"n":161,"label":"155; cf. 4 α et 3 β","tr":"Un tale si avvicinò a un Cumano che vendeva un cavallo e gli domandava se il cavallo fosse di primo ricambio. Quando quello disse che era di secondo ricambio, disse: «Come lo sai?» e quello rispose «Perché una volta ha disarcionato me, e una volta ha fatto cadere mio padre».","wit":"A","type":"joke","A":"161","dawe":"155","text":"Κυμαίῳ ἵππον πιπράσκοντι προσελθών τις ἠρώτα, εἰ πρωτοβόλος ὁ ἵππος. τοῦ δὲ εἰπόντος, ὅτι δευτεροβολεῖ, ἔφη· Πῶς οἶδας; ὁ δὲ εἶπεν· Ὅτι ἅπαξ ἐμὲ κάτω ἔβαλε καὶ ἅπαξ τὸν πατέρα μου.","num":"155"},{"app":[],"wit":"A","type":"joke","dawe":"156","text":"Κυμαῖος οἰκίαν πωλῶν λίθον ἐξ αὐτῆς ἐκβαλὼν εἰς δεῖγμα περιέφερεν.","A":"162","num":"156","n":162,"label":"156; cf. 41 α et 10 β","tr":"Un Cumano che vendeva una casa strappò via una pietra da essa e la portava in giro come campione dimostrativo."},{"app":[{"lemma":"εἱστήκει]]","reading":"εἱστία §SIG:A§","dirty":false,"id":"353","sigla":["A"],"editors":[],"span":[111,119],"query":false,"unit":353}],"num":"157","text":"Κυμαῖος ἵππον πιπράσκων ἠρωτήθη, μὴ δειλὸς εἴη. ὁ δὲ ἀπεκρίνατο· Οὐ μὰ τὴν σωτηρίαν μου· ἐν τῇ φάτνῃ γὰρ μόνος εἱστήκει.","A":"163","dawe":"157","wit":"A","type":"joke","label":"157; cf. 10 α","tr":"A un Cumano che vendeva un cavallo fu chiesto se quello fosse pauroso. Egli rispose: «No, per l’anima mia! Nella stalla, infatti, stava da solo!».","n":163},{"num":"158","dawe":"158","text":"Κυμαῖος κλεψιμαῖα ἱμάτια ἀγοράσας διὰ τὸ μὴ γνωρισθῆναι ἐπίσσωσεν αὐτά.","A":"164","type":"joke","wit":"A","label":"158; cf. 35 α","tr":"Un Cumano si mise a vendere mantelli rubati e perché non fossero riconosciuti come tali, li ricoprì di pece.","n":164,"app":[]},{"app":[],"n":165,"tr":"Un Cumano vendeva un cavallo. Poiché era giunto un tale e ne esaminava la dentatura, disse: «Perché osservi i suoi denti? Oh, se trottasse tanto quanto mangia!».","label":"158 bis; cf. 37 α et 6 β","wit":"A","type":"joke","num":"158 bis","text":"Κυμαῖος ἵππον ἐπίπρασκεν. ἐλθόντος δέ τινος καὶ καταμανθάνοντος αὐτοῦ τὸν βόλον εἶπε· Τί τοὺς ὀδόντας αὐτοῦ καταμανθάνεις; εἴθε ὡς τρώγει, οὕτως καὶ περιεπάτει.","dawe":"158 bis","A":"165"},{"app":[{"editors":[],"span":[30,46],"query":false,"unit":354,"dirty":false,"id":"354","sigla":["M"],"reading":"ἕστησεν ἄντικρυ §SIG:M§","lemma":"ἔστησεν ἄντικρυς]]"},{"reading":"ἠρῶτα §SIG:M§","lemma":"ἠρώτα]]","id":"355","sigla":["M"],"dirty":false,"unit":355,"editors":[],"span":[69,74],"query":false},{"sigla":["M"],"id":"356","dirty":false,"unit":356,"query":false,"editors":[],"span":[178,184],"reading":"ποιήσας §SIG:M§ac","lemma":"ποιήσω]]"}],"n":166,"tr":"Un Cumano realizzò una grande aia, piazzò sua moglie dalla parte opposta e le chiedeva se lo vedesse. Quando questa rispose che lo guardava a fatica, quello disse: «Ma io in un tempo abbastanza ampio realizzerò un’aia che farà sì che né io guarderò te, né tu me».","label":"159","type":"joke","wit":"AM","num":"159","dawe":"159","text":"Κυμαῖος ἅλωνα μεγάλην ποιήσας ἔστησεν ἄντικρυς τὴν γυναῖκα αὐτοῦ καὶ ἠρώτα, εἰ βλέπει αὐτόν. τῆς δὲ εἰπούσης, ὅτι μόλις αὐτὸν βλέπει, ἔφη ἐκεῖνος· Ἀλλ’ ἐγὼ εἰς καιρὸν τηλικαύτην ποιήσω ἅλωνα, ἵνα μήτε ἐγὼ σὲ μήτε σὺ ἐμὲ ἴδῃς.","A":"166"},{"dawe":"160","A":"167","text":"Κυμαῖος ἐπιζητῶν φίλον ἐκάλει αὐτὸν πρὸ τῆς οἰκίας ὀνομαστί. ἑτέρου δὲ εἰπόντος· Ὑψηλότερον φώνησον, ἵνα ἀκούσῃ ἀφεὶς τὸ ὄνομα, ὃ ᾔδει, ἐβόα· Ὑψηλότερε.","num":"160","type":"joke","wit":"AM","label":"160","tr":"Un Cumano che cercava un amico lo chiamava per nome davanti casa. Quando un tale gli disse: «Chiamalo più forte, cosicché ti senta!» quello tralasciò il nome che conosceva, e gridava: «Oh, Più forte!».","n":167,"app":[{"lemma":"ἀκούσῃ]]","reading":"ἀκούσει §SIG:M§","dirty":false,"id":"357","sigla":["M"],"editors":[],"span":[105,111],"query":false,"unit":357}]},{"tr":"Un Cumano che faceva progetti sulla casa di un debitore e che voleva prendersi un credito ancor più grande, scelse documenti piuttosto pesanti.","label":"161","n":168,"num":"161","A":"168","dawe":"161","text":"Κυμαῖος δανειστοῦ οἰκίᾳ ἐπιβουλεύων καὶ θέλων τὰ μείζονα δάνεια κλέψαι τὰ βαρύτερα χαρτία ἐπελέγετο.","type":"joke","wit":"AM","app":[]},{"app":[{"id":"358","sigla":["Eberhard"],"dirty":false,"unit":358,"span":[9,12],"editors":["Eberhard"],"query":false,"lemma":"τὴν]]","reading":"dubitanter §SIG:Eberhard§"},{"id":"359","sigla":["M"],"dirty":false,"unit":359,"editors":[],"span":[48,57],"query":false,"lemma":"Λολλιανὸς]]","reading":"Λολιανὸς §SIG:M§"},{"unit":360,"span":[133,144],"editors":["Dawe"],"query":false,"id":"360","sigla":["Dawe"],"dirty":false,"lemma":"ὀργισθέντες]]","reading":"post ὀργισθέντες lacunam indicavit §SIG:Dawe§: irae causa desideretur"}],"wit":"AM","type":"joke","dawe":"162","text":"Κυμαίων ‹τὴν› πόλιν τειχιζόντων εἷς τῶν πολιτῶν Λολλιανὸς καλούμενος δύο κορτίνας ἰδίοις ἐτείχισεν ἀναλώμασι. πολεμίων δὲ ἐπιστάντων ὀργισθέντες οἱ Κυμαῖοι συνεφώνησαν, ἵνα τὸ Λολλιανοῦ τεῖχος μηδεὶς φυλάξῃ ἀλλ’ ἐκεῖνος μόνος.","A":"169","num":"162","n":169,"label":"162","tr":"Quando i Cumani cingevano di mura la città, uno dei cittadini, di nome Lolliano, edificò due cortine a spese proprie. Quando allora si presentarono i nemici i Cumani si adirarono e stabilirono che nessuno avrebbe sorvegliato il muro di Lolliano, se non quello, da solo."},{"app":[{"reading":"§SIG:Minas§ : τρίτον §SIG:A§ : susp §SIG:Thierfelder§","lemma":"τρητὸν]]","dirty":false,"id":"361","sigla":["A","Minas","Thierfelder"],"span":[209,215],"editors":["Minas","Thierfelder"],"query":false,"unit":361}],"wit":"A","type":"joke","num":"163","dawe":"163","text":"Κυμαῖοι προσδοκῶντες ἐξ ἀποδημίας φίλον αὐτῶν ἀξιότιμον καὶ βουλόμενοι αὐτὸν ἐν τῷ βαλανείῳ διὰ καθαροῦ ὕδατος τιμῆσαι, μίαν ἔχοντες κολυμβήθραν, ταύτην ὕδατος θερμοῦ καθαροῦ πλήσαντες ἐν μέσῳ αὐτῆς κάγκελλον τρητὸν ἔβαλον, ὅπως τὸ ἥμισυ τοῦ ὕδατος καθαρὸν τῷ προσδοκωμένῳ τηρῆται φίλῳ.","A":"170","n":170,"label":"163","tr":"I Cumani attendevano al rientro da un viaggio un loro spettabile amico, e poiché desideravano onorarlo con acqua pura alle terme, avendo loro una sola vasca, riempirono questa di acqua calda e pura e misero in mezzo ad essa una grata, in modo che una metà dell’acqua sia conservata pura per l’amico atteso."},{"type":"joke","wit":"AM","num":"164","text":"Κυμαῖος ἐν τῷ κολυμβᾶν βροχῆς γενομένης διὰ τὸ μὴ βραχῆναι εἰς τὸ βάθος κατέδυ.","dawe":"164","A":"171","n":171,"tr":"Siccome scoppiò un acquazzone, un Cumano, in piscina, per non inzupparsi s’immerse sott’acqua.","label":"164","app":[{"query":false,"span":[72,78],"editors":[],"unit":362,"dirty":false,"sigla":["M"],"id":"362","reading":"κατέβη §SIG:M§","lemma":"κατέδυ]]"}]},{"dawe":"165","A":"172","text":"Κυμαῖος θυρίδας ἀγοράζων ἠρώτα, εἰ δύνανται πρὸς μεσημβρίαν βλέπειν.","num":"165","type":"joke","wit":"AM","tr":"Un Cumano che acquistava finestre domandava se esse potessero guardare a mezzogiorno.","label":"165","n":172,"app":[{"reading":"§SIG:Boissonade§ : δύνωνται §SIG:A§§SIG:M§","lemma":"δύνανται]]","query":false,"span":[35,43],"editors":["Boissonade"],"unit":363,"dirty":false,"sigla":["A","Boissonade","M"],"id":"363"}]},{"tr":"Un Cumano costeggiava un orto seduto su
