olastikos navigava, la barca era in pericolo per una tempesta. Mentre i compagni di viaggio gettavano giù il loro carico perché la nave fosse alleggerita, ed esortavano quello a fare lo stesso, egli, con un contratto da un milione e mezzo, tolse mezzo milione e disse: «Ecco di quante ricchezze ho alleggerito la nave!»."}, {"type": "joke", "n": 83, "num": "81", "label": "81", "wit": "AM", "text": "Σχολαστικὸς ἐν πλοίῳ χειμαζομένων καὶ κλαιόντων τῶν συμπλεόντων· Τί γάρ, ἔφη, μικρολόγοι ἐστέ; ἐγὼ δὲ δέκα Ἀττικὰς πλείονας δοὺς κινδύνῳ τοῦ κυβερνήτου πλέω.", "app": [{"id": "2377", "dirty": false, "lemma": "χειμαζομένων]", "reading": "χειμαζομένῳ §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 84, "span": [21, 33]}, {"id": "2379", "dirty": false, "lemma": "κλαιόντων]", "reading": "κλεόντων §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 84, "span": [38, 47]}, {"id": "2381", "dirty": false, "lemma": "συμπλεόντων]", "reading": "ἐν τῷ πλοίῳ §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 84, "span": [52, 63]}, {"id": "2386", "dirty": false, "lemma": "ἐστέ]", "reading": "ἐσταί §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 84, "span": [89, 93]}, {"id": "2392", "dirty": false, "lemma": "δοὺς]", "reading": "§SIG:A§ §SIG:M§ (in textu §SIG:Dawe§ ) : διδοὺς §SIG:Thierfelder§", "sigla": ["A", "Dawe", "M", "Thierfelder"], "editors": ["Thierfelder", "Dawe"], "query": false, "unit": 84, "span": [124, 128]}, {"id": "2395", "dirty": false, "lemma": "κυβερνήτου]", "reading": "§SIG:Minas§ : κυβερνίτου §SIG:A§ §SIG:M§", "sigla": ["A", "M", "Minas"], "editors": ["Minas"], "query": false, "unit": 84, "span": [141, 151]}], "A": "83", "dawe": "81", "tr": "Uno scholastikos in una nave, mentre i compagni di viaggio erano sballottati da una tempesta e gridavano, «Perché siete spilorci? Io ho pagato dieci dracme ateniesi in più e navigo a rischio del timoniere»."}, {"type": "joke", "n": 84, "num": "82", "label": "82", "wit": "A", "text": "Σχολαστικῷ ἀναβαίνοντι ἐπὶ τεῖχος ἐν μάχῃ χύτραν τις μεστὴν κοπρίων ἐπέβαλεν. ὁ δὲ βοῶν· Οὐ θέλεις, εἶπε, καθαρῶς πυκτεῦσαι;", "app": [{"id": "2416", "dirty": false, "lemma": "εἶπε]", "reading": "εἶπε* §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 85, "span": [100, 104]}, {"id": "2418", "dirty": false, "lemma": "πυκτεῦσαι]", "reading": "notam interrogationis add. §SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 85, "span": [114, 123]}], "A": "84", "dawe": "82", "tr": "Un tale scagliò un pentolone pieno di escrementi addosso ad uno scholastikos che scalava un muro in battaglia. Quello disse gridando: «Non vuoi batterti in modo pulito?»."}, {"type": "joke", "n": 85, "num": "83", "label": "83", "wit": "AM", "text": "Σχολαστικός, ὡς ἐν τῷ Ῥήνῳ ποταμῷ ναῦς ἐπώκειλεν, ὑπὸ τὸ κατάστρωμα τῆς νεὼς ὑποβὰς ἀνωθεῖσθαι ἐνόμιζεν αὐτὴν εἰς τὸ ἄνω † οὐ συνείς, ὅτι τοῖς ποσὶν αὐτὴν ὑπερείδων μᾶλλονεἰς τὸ βάθος κατῆγεν. †", "app": [{"id": "2423", "dirty": false, "lemma": "ὡς]", "reading": "om. §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 86, "span": [13, 15]}, {"id": "2426", "dirty": false, "lemma": "Ῥήνῳ]", "reading": "§SIG:Minas§ : Ῥηνῶ §SIG:A§ §SIG:M§", "sigla": ["A", "M", "Minas"], "editors": ["Minas"], "query": false, "unit": 86, "span": [22, 26]}, {"id": "2429", "dirty": false, "lemma": "ἐπώκειλεν]", "reading": "§SIG:Minas§ : ἐπώκιλεν §SIG:A§ §SIG:M§", "sigla": ["A", "M", "Minas"], "editors": ["Minas"], "query": false, "unit": 86, "span": [39, 48]}, {"id": "2430", "dirty": false, "lemma": "ὑπὸ]", "reading": "§SIG:Minas§ : ἐπί §SIG:A§ §SIG:M§", "sigla": ["A", "M", "Minas"], "editors": ["Minas"], "query": false, "unit": 86, "span": [50, 53]}, {"id": "2431", "dirty": false, "lemma": "τὸ 1]", "reading": "τῶ §SIG:A§ ac", "sigla": ["A"], "editors": [], "query": false, "unit": 86, "span": [54, 56]}, {"id": "2435-2436", "dirty": false, "lemma": "ὑποβὰς ἀνωθεῖσθαι]", "reading": "§SIG:Minas§ : ὑποβᾶσαν ὠθεῖσθαι §SIG:A§ : ὑπὸ βασῶν ὠθεῖσθαι §SIG:M§", "sigla": ["A", "M", "Minas"], "editors": ["Minas"], "query": false, "unit": 86, "span": [77, 94]}, {"id": "2443-2453", "dirty": false, "lemma": "οὐ … κατῆγεν]", "reading": "integ. §SIG:Dawe§ post ἄνω ‹ἕτερος δὲ ἰδὼν εἶπε πρὸς αὐτόν› : † §SIG:Thierfelder§ : del. §SIG:Eberhard§", "sigla": ["Dawe", "Eberhard", "Thierfelder"], "editors": ["Eberhard", "Thierfelder", "Dawe"], "query": false, "unit": 86, "span": [123, 191]}, {"id": "2449", "dirty": false, "lemma": "ὑπερείδων]", "reading": "ὑπερεῖδον §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 86, "span": [155, 164]}], "A": "85", "dawe": "83", "tr": "Uno scholastikos, quando una nave si era incagliata nel fiume Reno, scese sotto il ponte dell’imbarcazione e pensava di poterla spingere verso l’alto † senza rendersi conto che, facendo forza con i piedi, la stava in realtà spingendo ancor più a fondo. †"}, {"type": "joke", "n": 86, "num": "84", "label": "84", "wit": "AM", "text": "Ὁ αὐτὸς τοῖς στρατιώταις· Αὔριον, εἶπε, μακρὰν ὁδὸν ὁδοιπορῆσαι ἀναγκαῖον· σήμερον οὖν πλεονάκις καθέσθητε.", "app": [{"id": "2471", "dirty": false, "lemma": "καθέσθητε]", "reading": "καθέσθηται §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 87, "span": [97, 106]}], "A": "86", "dawe": "84", "tr": "Quello stesso tale disse ai soldati: «Domani bisogna percorrere una lunga strada: oggi dunque restate seduti più spesso del solito»."}, {"type": "joke", "n": 87, "num": "85", "label": "85", "wit": "AM", "text": "Σχολαστικὸς εἰς οἰκίαν καινὴν μετοικισθεὶς καὶ τὰ πρὸτοῦ πυλῶνος καθήρας ἐπέγραψεν· Ὃς ἂν ὦδε κόπρια βάλῃ, ἀπόλλυσιν αὐτά.", "app": [{"id": "2478", "dirty": false, "lemma": "καινὴν]", "reading": "κενὴν §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 88, "span": [23, 29]}, {"id": "2484", "dirty": false, "lemma": "καθήρας]", "reading": "§SIG:Cobet§ : καβῆρας §SIG:A§ §SIG:M§", "sigla": ["A", "Cobet", "M"], "editors": [], "query": false, "unit": 88, "span": [65, 72]}, {"id": "2486", "dirty": false, "lemma": "Ὃς]", "reading": "ὡς §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 88, "span": [84, 86]}, {"id": "2490", "dirty": false, "lemma": "βάλῃ]", "reading": "βάλλει §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 88, "span": [101, 105]}], "A": "87", "dawe": "85", "tr": "Uno scholastikos, trasferitosi in una casa nuova, e dopo aver ripulito l’ingresso davanti al portone, vi affisse un’iscrizione: «Chiunque getti escrementi qui, non avrà diritto al reso»."}, {"type": "joke", "n": 88, "num": "86", "label": "86", "wit": "AM", "text": "Σχολαστικὸν ὁ πατὴρ ἀπολέσαντα δηνάριον ἐβούλετο τυπτῆσαι. ὁ δέ·Μὴ ὀργίζου, ἔφη, κἀγὼ ἐκ τῶν ἐμῶν ἀγοράζω τὸ δηνάριον.", "app": [{"id": "2499", "dirty": false, "lemma": "ἀπολέσαντα]", "reading": "ἀπωλέσαντα §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 89, "span": [20, 30]}, {"id": "2502", "dirty": false, "lemma": "τυπτῆσαι]", "reading": "τυπῆσαι §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 89, "span": [49, 57]}, {"id": "2507", "dirty": false, "lemma": "κἀγὼ]", "reading": "§SIG:A§ §SIG:M§ : καὶ γὰρ §SIG:Eberhard§ , fort. recte", "sigla": ["A", "Eberhard", "M"], "editors": ["Eberhard"], "query": false, "unit": 89, "span": [81, 85]}, {"id": "2513", "dirty": false, "lemma": "δηνάριον 2]", "reading": "δινάριον §SIG:A§ ac", "sigla": ["A"], "editors": [], "query": false, "unit": 89, "span": [31, 39]}], "A": "88", "dawe": "86", "tr": "Il padre voleva picchiare uno scholastikos che aveva perso un denaro. Ma quello disse: «Non arrabbiarti, ti ricompro io il denaro coi miei soldi»."}, {"type": "joke", "n": 89, "num": "87", "label": "87", "wit": "A", "text": "Σχολαστικὸς ἐπὶ τῆς οἰκίας σεκούτορος σχῆμα λαβὼν ἔπαιζεν. ἄφνω δέ τινος ἀπαγγείλαντος αὐτῷ παρουσίαν τοῦ πατρός, ῥίψας τὸ ὅπλον ἔλυε τὴν κνημῖδα. φθάσαντος δὲ τοῦ πατρὸς αὐτοῦ ἐπιστῆναι, ἔχων τὴν περικεφαλαίαν βιβλίον ἀνεγίνωσκεν.", "app": [{"id": "2518", "dirty": false, "lemma": "ἐπὶ]", "reading": "ἀπὸ §SIG:Boissonade§ : πρὸ §SIG:Eberhard§", "sigla": ["Boissonade", "Eberhard"], "editors": ["Eberhard", "Boissonade"], "query": false, "unit": 90, "span": [12, 15]}, {"id": "2521", "dirty": false, "lemma": "σεκούτορος]", "reading": "§SIG:Thierfelder§ : σεκούτερος §SIG:A§", "sigla": ["A", "Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 90, "span": [27, 37]}, {"id": "2543", "dirty": false, "lemma": "αὐτοῦ]", "reading": "αὐτοῦ §SIG:A§ : αὐτῷ §SIG:Eberhard§ (prob. §SIG:Minas§ )", "sigla": ["A", "Eberhard", "Minas"], "editors": ["Eberhard", "Minas"], "query": false, "unit": 90, "span": [171, 176]}], "A": "89", "dawe": "87", "tr": "Uno scholastikossi mise l’armatura da gladiatore e giocava in casa. All’improvviso però, dopo che qualcuno l’aveva avvisato dell’arrivo del padre, gettò l’arma e si stava togliendo lo schiniere. Ma siccome il padre era già arrivato, leggeva un libro tenendo l’elmo in testa."}, {"type": "joke", "n": 90, "num": "88", "label": "88", "wit": "AM", "text": "Σχολαστικὸς ἐπανερχόμενος, ὅθεν ἀπεδήμησεν, καὶ ἀναβαίνων ὑψηλὴν ἀνάβασιν ἐθαύμαζε λέγων· Ἐνταῦθα ὅτε πρῶτον [ὡς] παρῄειν ὁδεύων, κατάβασις ἦν·καὶ πῶς νῦν ταχέως ἠλλάγηκαὶ ἀνάβασις γέγονε;", "app": [{"id": "2566", "dirty": false, "lemma": "ὡς]", "reading": "om. §SIG:Boissonade§", "sigla": ["Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 91, "span": [110, 112]}, {"id": "2567", "dirty": false, "lemma": "παρῄειν]", "reading": "παρκεῖν §SIG:A§ : ἐπαρκεῖν §SIG:M§ : παρεκεῖ §SIG:Boissonade§", "sigla": ["A", "Boissonade", "M"], "editors": ["Boissonade"], "query": false, "unit": 91, "span": [114, 121]}, {"id": "2568", "dirty": false, "lemma": "ὁδεύων]", "reading": "ὠδεύον §SIG:Boissonade§", "sigla": ["Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 91, "span": [122, 128]}], "A": "90", "dawe": "88", "tr": "Uno scholastikos tornava nel luogo dal quale era partito, e salendo una salita ripida si meravigliava e disse: «Qui quando passai per la prima volta in cammino, c’era una discesa: e com’è che ora è cambiato velocemente e c’è una salita?»."}, {"type": "joke", "n": 91, "num": "89", "label": "89", "wit": "AM", "text": "Σχολαστικὸς πλέων ἐπύθετο τοῦ κυβερνήτου, πόστη εἴη ὥρα. τοῦ δὲ μὴ γινώσκειν φήσαντος ἠρώτησε, πόσος εἴη χρόνος, ἀφ’ οὗ τὴν ναῦν κυβερνᾷ. τοῦ δὲ τρία ἔτη φήσαντος· Πῶς οὖν ἐγώ, ἔφη, πρὸ ἓξ μηνῶν οἰκίαν πριάμενος, ὅταν εἰς τὴν αὐλὴν κατέλθῃ ὁ ἥλιος, τὴν ὥραν στοχάζομαι, σὺ δὲ ἀπὸ τοῦ πλοίου τεκμήρασθαι οὐ δύνασαι τοσούτῳ χρόνῳ αὐτὸ κυβερνῶν;", "app": [{"id": "2582", "dirty": false, "lemma": "ἐπύθετο]", "reading": "ἐπείθετο §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 92, "span": [18, 25]}, {"id": "2584", "dirty": false, "lemma": "κυβερνήτου]", "reading": "κυβερνίτου §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 92, "span": [30, 40]}, {"id": "2585-2587", "dirty": false, "lemma": "πόστη … ὥρα]", "reading": "§SIG:Minas§ : πῶς τῆ εἴ βωρα §SIG:A§ : πῶς, τῆ ὥρα §SIG:M§", "sigla": ["A", "M", "Minas"], "editors": ["Minas"], "query": false, "unit": 92, "span": [42, 55]}, {"id": "2593", "dirty": false, "lemma": "ἠρώτησε]", "reading": "ἠρώτισε §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 92, "span": [86, 93]}, {"id": "2595", "dirty": false, "lemma": "εἴη 2]", "reading": "om. §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 92, "span": [48, 51]}, {"id": "2600", "dirty": false, "lemma": "ναῦν]", "reading": "ναῦ §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 92, "span": [124, 128]}, {"id": "2606", "dirty": false, "lemma": "φήσαντος]", "reading": "φωνήσαντος §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 92, "span": [77, 85]}, {"id": "2620", "dirty": false, "lemma": "κατέλθῃ]", "reading": "κατέλθοι §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 92, "span": [232, 239]}, {"id": "2636", "dirty": false, "lemma": "αὐτὸ]", "reading": "αὐτῷ §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 92, "span": [328, 332]}, {"id": "2637", "dirty": false, "lemma": "κυβερνῶν]", "reading": "§SIG:Minas§ : κυβερνᾶν §SIG:M§", "sigla": ["M", "Minas"], "editors": ["Minas"], "query": false, "unit": 92, "span": [333, 341]}], "A": "91", "dawe": "89", "tr": "Uno scholastikos mentre navigava chiese al timoniere che ora fosse. Dal momento che quello disse che non lo sapeva, gli domandò da quanto tempo pilotasse la nave. Quando quello disse: «Tre anni», fece: «Com’è allora che io, che ho acquistato casa sei mesi fa, quando il sole scende in cortile indovino l’ora, ma tu invece non sai calcolarla dalla nave che pur governi da un tempo così ampio?»."}, {"type": "joke", "n": 92, "num": "90", "label": "90", "wit": "AM", "text": "Σχολαστικὸς σοφιστὴς ἀξιούμενος τῶν ἀποθνῃσκόντων ἐπιταφίους λέγειν ἑνὸς ἔτι ζῶντος ἔγραψεν ἐπιτάφιον·ὃς ἐνεκάλει αὐτῷ ἐπὶ τούτῳ. ὁ δέ· Ἂν οὖν ὑμεῖς, φησί, μὴ προλέγητε, ὅταν ἀποθνῄσκητε, ἐγὼ ἐξ αὐτοσχεδίου λέγω‹ν› βούλεσθε ἵν’ ἀσχημονήσω;", "app": [{"id": "2659-2660", "dirty": false, "lemma": "Ἂν οὖν]", "reading": "§SIG:Minas§ : ἄνουν §SIG:A§ : ἂνους §SIG:M§", "sigla": ["A", "M", "Minas"], "editors": ["Minas"], "query": false, "unit": 93, "span": [136, 142]}, {"id": "2666", "dirty": false, "lemma": "ἀποθνῄσκητε]", "reading": "ἀποθνήσκετε §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 93, "span": [175, 186]}, {"id": "2671", "dirty": false, "lemma": "βούλεσθε]", "reading": "βούλεσθαι §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 93, "span": [215, 223]}], "A": "92", "dawe": "90", "tr": "Un sofista scholastikos, incaricato di pronunciare gli epitaffi dei defunti, scrisse un discorso per uno ancora vivo, che lo rimproverava per questo. Allora quello disse: «Se dunque voi non mi dite per tempo quando dovete morire, volete che io parlando a braccio faccia brutta figura?»."}, {"type": "joke", "n": 93, "num": "90 bis", "label": "90 bis; 30 α et 29 β", "wit": "A", "text": "Σχολαστικὸς ναυαγεῖν μέλλων ᾔτει πινακίδας, ἵνα διαθήκας γράψῃ.", "app": [], "A": "93", "dawe": "90 bis", "tr": "Cf. 30 α. 94. Uno scholastikos avevano a cena dei compagni di studi, e siccome questi avevano lodato la testa di maiale e gli avevano richiesto di pranzare da lui anche l’indomani, andò dal cuoco e disse: «Dammi un’altra testa proveniente dallo stesso porco: quella di ieri ci è proprio piaciuta!»."}, {"type": "joke", "n": 94, "num": "91", "label": "91", "wit": "AM", "text": "Σχολαστικὸς συμφοιτητὰς ἐπὶ δεῖπνον καλέσας, ἐπαινεσάντων αὐτῶν ὑὸς κεφαλὴν καὶ ἀξιωσάντων καὶ τῇ ὑστεραίᾳ παρ’αὐτῷ ἑστιαθῆναι, ἀπελθὼν πρὸς τὸν μάγειρον· Δός μοι, ἔφη, ἀπὸ τοῦ αὐτοῦ χοίρου κεφαλὴν ἑτέραν· ἡ γὰρ χθὲς ἡμῖν πάνυ ἤρεσεν.", "app": [{"id": "2700", "dirty": false, "lemma": "αὐτῶν]", "reading": "αὐτῶ §SIG:A§ §SIG:M§ ac : αὐτῶ ν §SIG:M§ pc", "sigla": ["A", "M"], "editors": [], "query": false, "unit": 95, "span": [58, 63]}, {"id": "2713", "dirty": false, "lemma": "μάγειρον]", "reading": "μάγηρον §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 95, "span": [145, 153]}, {"id": "2771-2772", "dirty": false, "lemma": "τὸν πατέρα]", "reading": "τὸν πατέρα αὐτοῦ §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 95, "span": [141, 144]}], "A": "94", "dawe": "91", "tr": ""}, {"type": "joke", "n": 95, "num": "91 bis", "label": "91 bis; 31 α et 30 β", "wit": "A", "text": "Σχολαστικὸς διαπερᾶσαι ‹ποταμὸν› βουλόμενος ἀνέβη εἰς τὸ πλοῖον μετὰ τοῦ ἵππου ἐποχούμενος. Πυθομένου δέ τινος, διὰ τί οὐ κάτεισι· σπεύδειν ἔφη.", "app": [], "A": "95", "dawe": "91 bis", "tr": "Cf. 31 β"}, {"type": "joke", "n": 96, "num": "92", "label": "92; 141 α et 1 γ/261 α/72 β", "wit": "AM", "text": "Σχολαστικὸς ἠρώτα τὸν πατέρα· Ἡ πεντακότυλος λήκυθος πόσον χωρεῖ;", "app": [], "A": "96", "dawe": "92", "tr": "Uno scholastikos chiedeva al padre: «La boccetta da cinque cotili quanto è capace?»."}, {"type": "joke", "n": 97, "num": "93", "label": "93", "wit": "AM", "text": "Σχολαστικὸς μαθὼν περὶ κλίμακός τινος, ὅτι ἀναβαινόντων ἔχει βαθμοὺς εἴκοσιν, ἐπύθετο, εἰ καὶ καταβαινόντων τοσοῦτοίεἰσιν.", "app": [{"id": "2790", "dirty": false, "lemma": "εἴκοσιν]", "reading": "εἴκοσι §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 98, "span": [69, 76]}], "A": "97", "dawe": "93", "tr": "Uno scholastikos venne a sapere che una certa scala ha venti gradini quando si sale, e chiese se fossero tanti anche quando si scende."}, {"type": "joke", "n": 98, "num": "94", "label": "94", "wit": "A", "text": "Σχολαστικὸς διαλεγομένων τινῶν περὶ ἀπεψίας, ἔλεγε μηδεπώποτε ἠπεπτηκέναι. τῶν δὲ πυνθανομένων, εἰ μηδέποτε ἠρεύξατο πικρὸν ἢ ἀηδές· Τοῦτο, εἶπε, ποιῶ καθ’ ἑκάστην ἡμέραν.", "app": [], "A": "98", "dawe": "94", "tr": "Uno scholastikos, mentre alcuni parlavano di problemi di digestione, diceva che non ne aveva mai avuti. Ma quando gli chiesero se avesse mai fatto rutti in modo acido o fetido, disse: «Questo lo faccio ogni giorno!»."}, {"type": "joke", "n": 99, "num": "95", "label": "95", "wit": "A", "text": "Σχολαστικῷ υἱὸς ἐγεννήθη. πυνθανομένων δέ τινωναὐτοῦ, ποῖον ὄνομα αὐτῷ θήσεται·Τὸ ἐμὸν ἕξει, ἔφη, ὄνομα,κἀγὼ τέως οὕτω μενῶ.", "app": [], "A": "99", "dawe": "95", "tr": "Ad uno scholastikos nacque un figlio. Quando alcuni gli chiesero quale nome gli avrebbe dato, rispose: «Avrà il mio, di nome, e io rimarrò così per un po’… (cioè privo di nome)»."}, {"type": "joke", "n": 100, "num": "96", "label": "96", "wit": "AM", "text": "Σχολαστικοὶ δύο δειλοί, ὁ μὲν ἔκρυψεν εἰς φρέαρ αὑτόν, ὁ δὲ εἰς καλαμῶνα. χαλασάντων οὖν κράνος τῶν στρατιωτῶν ἐπὶ τὸ ὕδωρ ἀρύσασθαι, ‹ό μεν έτερος› νομίσας στρατιώτην κατιέναι, ἱκετεύων ἐλήφθη. ὡς δὲ ἔφασαν οἱ στρατιῶται ὅτι εἰ ἐσιώπησε, παρῆλθον ἂν αὐτόν, ὁ ἐν τῷ καλαμῶνι κρυβόμενος· Οὐκοῦν, εἶπεν, ἐμὲ παρέλθατε· σιωπῶ γάρ.", "app": [{"id": "2845-2846", "dirty": false, "lemma": "Σχολαστικοὶ δύο]", "reading": "§SIG:Minas§ : Δύο σχολαστικοί §SIG:A§ : δύο om. §SIG:M§", "sigla": ["A", "M", "Minas"], "editors": ["Minas"], "query": false, "unit": 101, "span": [0, 15]}, {"id": "2847", "dirty": false, "lemma": "δειλοί]", "reading": "‹έδιώκοντο υπό πολεμίων και› §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 101, "span": [16, 22]}, {"id": "2853", "dirty": false, "lemma": "αὑτόν]", "reading": "ἑαυτὸν §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 101, "span": [48, 53]}, {"id": "2867-2869", "dirty": false, "lemma": "ό … έτερος]", "reading": "§SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 101, "span": [135, 147]}, {"id": "2881", "dirty": false, "lemma": "εἰ]", "reading": "om. §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 101, "span": [226, 228]}, {"id": "2886-2887", "dirty": false, "lemma": "ὁ ἐν]", "reading": "ὁ δὲ ἐν §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 101, "span": [24, 262]}], "A": "100", "dawe": "96", "tr": "C’erano due scholastikoi codardi: uno si nascose in un pozzo, l’altro invece in un canneto. Quando i soldati calarono un elmo per attingere l’acqua, ‹il primo› credette che stesse scendendo un soldato e poiché si era messo a supplicare, fu catturato. Ma quando i soldati dissero che, se fosse stato zitto, sarebbero passati oltre, quello nascosto nel canneto disse: «E allora passate oltre me: infatti sto zitto!»."}, {"type": "joke", "n": 101, "num": "96 bis", "label": "96 bis; 32 α", "wit": "A", "text": "Σχολαστικὸς ἐπὶ δεῖπνον κληθεὶς οὐκ ἤσθιεν. ἐρομένου οὖν τινος τῶν κεκλημένων διὰ τί οὐκ ἐσθίοι, ὁ δὲἽνα μὴ, ‹ἔφη›, τοῦ φαγεῖν ἕνεκα δόξω παρεῖναι.", "app": [{"id": "2921", "dirty": false, "lemma": "ἔφη]", "reading": "§SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 102, "span": [110, 113]}], "A": "101", "dawe": "96 bis", "tr": "Cf. 32 α."}, {"type": "joke", "n": 102, "num": "97", "label": "97", "wit": "A", "text": "Σχολαστικὸς ‹τῆς› γυναικὸς αὐτοῦ ἀποθανούσης σορὸν ἠγόραζε καὶ περὶ τῆς τιμῆς ἐζυγομάχει. τοῦ δὲ πωλοῦντος ὀμόσαντος μὴ ἔλαττον πέντε μυριάδων πωλήσειν, ὁ δέ· Ἐπειδή, ἔφη,προσείληψαι τῷ ὅρκῳ, λάβε μὲν τὰς πέντε μυριάδας, εἰς προσθήκην δέ μοι μικρὸν σορίδιον δός, ἵνα, ἐάν μου χρεία παιδίῳ γένηται, ἕτοιμον ᾖ.", "app": [{"id": "2931", "dirty": false, "lemma": "τῆς 1]", "reading": "§SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 103, "span": [13, 16]}, {"id": "2944", "dirty": false, "lemma": "πωλοῦντος]", "reading": "πολοῦντος §SIG:A§ : §SIG:Eberhard§", "sigla": ["A", "Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 103, "span": [97, 106]}, {"id": "2945", "dirty": false, "lemma": "ὀμόσαντος]", "reading": "ὁμόσαντος §SIG:A§ : §SIG:Eberhard§", "sigla": ["A", "Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 103, "span": [107, 116]}, {"id": "2971", "dirty": false, "lemma": "μου]", "reading": "που §SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 103, "span": [272, 275]}], "A": "102", "dawe": "97", "tr": "Uno scholastikos, dopo che gli era morta la moglie, stava comprando un sarcofago e bisticciava sul prezzo. Quando il venditore giurò che non l’avrebbe venduto a meno di cinquantamila, egli disse: «Poiché ti sei legato col giuramento, prendi pure le cinquantamila, però in aggiunta, dammi un piccolo sarcofaghino, così, se mai ne avessi bisogno per un mio figlioletto, sarà già pronto»."}, {"type": "joke", "n": 103, "num": "98", "label": "98", "wit": "A", "text": "Σχολαστικῷ ἑταῖρος ἀπαντήσας· Συγχαίρω σοι, εἶπεν, ὅτι σοι παιδίον ἐγεννήθη. ὁ δὲ ἀπεκρίνατο· Τοῦτο ὑμεῖς οἱ φίλοι ποιεῖτε.", "app": [{"id": "3003", "dirty": false, "lemma": "Σχολαστικῷ]", "reading": "Σχολαστικὸς §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 104, "span": [0, 10]}], "A": "103", "dawe": "98", "tr": "Un amico incontrò uno scholastikos e disse: «Ti faccio le congratulazioni perché ti è nato un figlio!». Ma quello rispose: «Questo è ciò che fate voi, o amici!»."}, {"type": "joke", "n": 104, "num": "99", "label": "99; 142 α", "wit": "AM", "text": "Σχολαστικῷ τις λέγει· Χρῆσόν μοι βίρρον μέχρις ἀγροῦ. ὁ δέ· Μέχρι σφυροῦ, εἶπεν, ἔχω· μέχρι δὲ ἀγροῦ οὐκ ἔχω.", "app": [{"id": "3008", "dirty": false, "lemma": "βίρρον]", "reading": "μῦρον", "sigla": [], "editors": [], "query": false, "unit": 105, "span": [33, 39]}], "A": "104", "dawe": "99", "tr": "Uno dice a uno scholastikos: «Prestami una casacca, fino al campo». E questo fa: «Fino alla caviglia ce l’ho, ma fino al campo no!»"}, {"type": "joke", "n": 105, "num": "100", "label": "100; 133 α", "wit": "AM", "text": "Σχολαστικὸς ἐπ’ ὀχήματος ὥδευεν. ἐπεὶ δὲ ἀτονήσασαι αἱ ἡμίονοι οὐκ ἠδύναντο βαδίζειν, ὑπέλυσεν αὐτὰς ὁ ἡνίοχος, ἵνα μικρὸν ἀναλάβωσιν. λυθεῖσαι οὖν ἔφυγον. καὶ ὁ σχολαστικὸς πρὸς τὸν ἡνίοχον· Κάθαρμα, εἶπεν, ὁρᾷς, ὅτι αἱ μὲν ἡμίονοιτρέχουσι, τὸ δὲ ὄχημά ἐστιν αἴτιον τὸ δραμεῖν μὴ δυνάμενον;", "app": [{"id": "3030", "dirty": false, "lemma": "ὥδευεν]", "reading": "ὤδευεν §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 106, "span": [25, 31]}, {"id": "3036", "dirty": false, "lemma": "οὐκ]", "reading": "οὐκέτι §SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 106, "span": [63, 66]}, {"id": "3046", "dirty": false, "lemma": "λυθεῖσαι]", "reading": "λυθῆσαι §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 106, "span": [135, 143]}, {"id": "3067-3068", "dirty": false, "lemma": "τὸ δραμεῖν]", "reading": "[τὸ] δραμεῖν §SIG:Eberhard§ . coll. 133 α", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 106, "span": [242, 277]}], "A": "105", "dawe": "100", "tr": "Uno scholastikos era in viaggio su un carro. Siccome le mule spossate non riuscivano a camminare, il cocchiere le sciolse perché si rimettessero un po’ in sesto. Ebbene, quando furono sciolte, fuggirono. Allora lo scholastikos disse al cocchiere: «Disgraziato, le mule corrono, e che invece è il carro che non ci fa muovere?»."}, {"type": "joke", "n": 106, "num": "101", "label": "101", "wit": "A", "text": "Σχολαστικὸς ἀδελφοὺς διδύμους ἰδὼν θαυμαζόντων τινῶν τὴν ὁμοιότητα αὐτῶν· Οὐχ οὕτως, φησίν, ὅμοιός ἐστιν ‹οὗτος› ἐκείνῳ, ὡς ἐκεῖνος τούτῳ.", "app": [{"id": "3085", "dirty": false, "lemma": "οὕτως]", "reading": "§SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 107, "span": [78, 83]}, {"id": "3093", "dirty": false, "lemma": "τούτῳ]", "reading": "§SIG:Boissonade§", "sigla": ["Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 107, "span": [132, 137]}], "A": "106", "dawe": "101", "tr": "Un tale vede due fratelli gemelli e, siccome alcuni si meravigliano della somiglianza di questi, dice: «Non è tanto questo che assomiglia così a quello, quanto quello che è uguale a questo»."}, {"type": "joke", "n": 107, "num": "102", "label": "102", "wit": "AM", "text": "Σχολαστικῷ τις λέγει· Δημέα, τρίτην ἡμέραν σε ἐνθάδε ἐν ὕπνοις εἶδον. ὁ δέ· Ψεύδῃ, εἶπεν, ἐν ἀγρῷ γὰρ ἤμην.", "app": [{"id": "3104", "dirty": false, "lemma": "ἐνθάδε]", "reading": "dub. delendum putat §SIG:Thierfelder§", "sigla": ["Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 108, "span": [46, 52]}, {"id": "3110", "dirty": false, "lemma": "Ψεύδῃ]", "reading": "ψεύδει §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 108, "span": [76, 81]}], "A": "107", "dawe": "102", "tr": "Un tale dice ad uno scholastikos: «Demea, l’altro ieri ti ho visto qui in sogno». E questo: «Ti sbagli, perché ero in campagna»."}, {"type": "joke", "n": 108, "num": "103", "label": "103; 134 α", "wit": "A", "text": "Σχολαστικὸς μετὰ δύο ἑταίρων διελέγετο. τοῦ ἑνὸς οὖν εἰπόντος ὅτι μὴ δίκαιόν ἐστι πρόβατον σφάζεσθαι· γάλα γὰρ καὶ ἔριον φέρει· καὶ τοῦ ἄλλου εἰπόντος ὅτι μηδὲ βοῦν προσήκει ἀναιρεῖσθαι γάλα παρέχουσαν καὶ ἀροτριῶσαν· ὁ σχολαστικὸς ἔφη μηδὲ χοῖρον δίκαιον εἶναι ἀναιρεῖσθαι ἧπαρ παρέχοντα καὶ οὖθαρ καὶ βουλβάν. AM", "app": [{"id": "3139-3140", "dirty": false, "lemma": "ἔριον φέρει]", "reading": "ἔριον ἀφέρει §SIG:A§ : ἔριον ἀ‹φθόνως› φέρει §SIG:Minas§ : ἔρια φέρει §SIG:Perry§", "sigla": ["A", "Minas", "Perry"], "editors": ["Perry", "Minas"], "query": false, "unit": 109, "span": [115, 126]}, {"id": "3153", "dirty": false, "lemma": "ἀροτριῶσαν]", "reading": "ἀρωτριῶσαν", "sigla": [], "editors": [], "query": false, "unit": 109, "span": [206, 216]}, {"id": "3163", "dirty": false, "lemma": "παρέχοντα]", "reading": "παρέχουσαν §SIG:Boissonade§", "sigla": ["Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 109, "span": [279, 288]}, {"id": "3167", "dirty": false, "lemma": "βουλβάν]", "reading": "βούλβαν §SIG:Boissonade§", "sigla": ["Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 109, "span": [303, 310]}], "A": "108", "dawe": "103", "tr": "Uno scholastikos chiacchierava con due amici. Quando uno ebbe detto che non è giusto uccidere una pecora poiché offre latte e lana, e l’altro che non conviene uccidere nemmeno una mucca, ché procura latte e ara, lo scholastikos disse che non è giusto nemmeno ammazzare la scrofa, ché offre fegato, carne di mammella e di vulva."}, {"type": "section", "text": "ἐκ τοῦ Φιλογέλου", "app": []}, {"type": "joke", "n": 109, "num": "104", "label": "104; 48 β", "wit": "AM", "text": "Φιλάργυρος διαθήκας γράφων ἑαυτὸν κληρονόμον ἔταξεν.", "app": [{"id": "3182", "dirty": false, "lemma": "ἔταξεν]", "reading": "ἔταξε §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 111, "span": [45, 51]}], "A": "109", "dawe": "104", "tr": "Un avaro che scriveva le proprie volontà testamentarie dispose come erede sé stesso."}, {"type": "joke", "n": 110, "num": "105", "label": "105; 49 β", "wit": "A", "text": "Φιλάργυρος ἐρωτώμενος, διὰ τί ἄλλο οὐθὲν ἢ μόνον ἐλαίας ἐσθίει, ἔφη· Ἵνα τὸ μὲν ἔξωθεν ἀντὶ ὄψου ἔχω, τὸ δὲ ὀστοῦν ἀντὶ ξύλου· φαγὼν δέ, εἰς ‹τὴν› ἑαυτοῦ κεφαλὴν σφογγισάμενος λουτροῦ οὐκ ἐπιδέομαι.", "app": [{"id": "3194", "dirty": false, "lemma": "ἢ]", "reading": "εἰ μὴ §SIG:Minas§", "sigla": ["Minas"], "editors": ["Minas"], "query": false, "unit": 112, "span": [41, 42]}, {"id": "3214", "dirty": false, "lemma": "τὴν]", "reading": "§SIG:Minas§ coll. 49 β", "sigla": ["Minas"], "editors": ["Minas"], "query": false, "unit": 112, "span": [142, 145]}], "A": "110", "dawe": "105", "tr": "Un avaro a cui veniva domandato perché non mangiasse altro che olive soltanto, diceva: «Intanto per avere l’esterno come cibo, poi per avere il nocciolo come cibo; e dopo aver mangiato, per sfregarmi la testa e non aver bisogno di un lavaggio/bacinella»."}, {"type": "joke", "n": 111, "num": "106", "label": "106; 7 G", "wit": "AM", "text": "Πεπανόπτωχος εἰωθὼς τὴν φίλην αὐτοῦ ἐξαπατᾶν ὡς εὐγενὴς ὢν καὶ πλούσιος, εἰς τοὺς γείτονας σιτευόμενος ὡς εἶδεν ἄφνω τὴν φίλην, στραφεὶς ἐφώνει· Πέμψον δέ μοι καὶ τὸ φιβλατώριον.", "app": [{"id": "3227", "dirty": false, "lemma": "εἰωθὼς]", "reading": "§SIG:Boissonade§ : εἰωθὸς cf. 7 G", "sigla": ["Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 113, "span": [13, 19]}, {"id": "3231", "dirty": false, "lemma": "ἐξαπατᾶν]", "reading": "ἐξαπατῶν §SIG:M§ ac", "sigla": ["M"], "editors": [], "query": false, "unit": 113, "span": [36, 44]}, {"id": "3244-3245", "dirty": false, "lemma": "τὴν φίλην 2]", "reading": "§SIG:Minas§ : τὰς φίλας §SIG:A§ : τοὺς φίλους §SIG:M§ δὲ §SIG:M§", "sigla": ["A", "M", "Minas"], "editors": ["Minas"], "query": false, "unit": 113, "span": [20, 29]}], "A": "111", "dawe": "106", "tr": "Un pitocco professionita, solito convincere la propria compagna di essere nobile e ricco, quando mentre si abboffava dai vicini vide all’improvviso la compagna, si voltò e ordinava: «E mandami anche la veste da ricevimento!»"}, {"type": "joke", "n": 112, "num": "107", "label": "107", "wit": "AM", "text": "Ἄλλος ὁμοίως μεγαλαυχούμενος, τελείως τε πενητεύων [καὶ] κατὰ τύχην νοσήσας, τῆς δὲ φίλης αὐτοῦ αἰφνίδιον ἐπεισελθούσης καὶ εὑρούσης αὐτὸν ἐπὶ ψιάθου κείμενον, ἐντραπεὶς ᾐτιᾶτο τοὺς ἰατροὺς λέγων· Οἱ καλοὶ ἰατροὶ καὶ δόκιμοι τῆς πόλεως ἐκέλευσάν με ψιαθισθῆναι.", "app": [{"id": "3262", "dirty": false, "lemma": "τε]", "reading": "δὲ §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 114, "span": [38, 40]}, {"id": "3264", "dirty": false, "lemma": "καὶ 1]", "reading": "del. §SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 114, "span": [52, 55]}, {"id": "3272", "dirty": false, "lemma": "αἰφνίδιον]", "reading": "αἰφνήδιον §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 114, "span": [96, 105]}, {"id": "3289", "dirty": false, "lemma": "δόκιμοι]", "reading": "‹οἱ› δόκιμοι §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 114, "span": [217, 224]}], "A": "112", "dawe": "107", "tr": "Un altro che similmente si insuperbiva e che era assolutamente in miseria, per disgrazia si ammalò e, dal momento che la sua amante era entrata all’improvviso e lo aveva trovato che giaceva su una stuoia, provò vergogna e disse, dando la responsabilità ai medici: «I bravi e stimati dottori della città mi hanno prescritto di giacere su una stuoia!»."}, {"type": "joke", "n": 113, "num": "108", "label": "108", "wit": "AM", "text": "Ἀλαζὼν ἐν ἀγορᾷ παῖδα ἑαυτοῦ θεασάμενος ἐκ τοῦ ἀγροῦ νεωστὶ ἐληλυθότα εἶπε· Τί ποιοῦσι τὰ πρόβατα; ὁ δὲ εἶπε· Τὸ μὲν καθεύδει, τὸ δὲ ἵσταται.", "app": [{"id": "3317-3321", "dirty": false, "lemma": "Τὸ … δὲ 2]", "reading": "Τὰ μὲν... τὰ δὲ §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 115, "span": [110, 132]}, {"id": "3322", "dirty": false, "lemma": "ἵσταται]", "reading": "ἐφίσταται §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 115, "span": [133, 140]}], "A": "113", "dawe": "108", "tr": "Un ciarlatano vide in piazza un suo schiavo che era appena ritornato dalla campagna e disse: «Che fanno le pecore?». Quello rispose: «Una dorme, l’altra sta in piedi»."}, {"type": "joke", "n": 114, "num": "109", "label": "109", "wit": "AM", "text": "Μωρὸς ἀκούσας, ὅτι ἐν Ἅιδου δίκαια κριτήρια, πρᾶγμα ἔχων ἀπήγξατο. A", "app": [{"id": "3332", "dirty": false, "lemma": "κριτήρια]", "reading": "τὰ κριτήρια §SIG:Minas§", "sigla": ["Minas"], "editors": ["Minas"], "query": false, "unit": 116, "span": [35, 43]}], "A": "114", "dawe": "109", "tr": "Uno scemo udì che nell’Ade i tribunali sono giusti e, dato che era coinvolto in un processo, si impiccò."}, {"type": "section", "text": "ἀβδηρίτης", "app": []}, {"type": "joke", "n": 115, "num": "110", "label": "110", "wit": "A", "text": "Ἐν Ἀβδήροις διῃρεῖτο ἡ πόλις εἰς δύο μέρη, οἵ τε πρὸς ἀνατολὰς οἰκοῦντες καὶ οἱ πρὸς δύσιν. πολεμίων οὖν ἄφνω τὴν πόλιν ἐφορμησάντων καὶ πάντων θορυβουμένων οἱ πρὸς τὸ ἀνατολικὸν οἰκοῦντες μέρος πρὸς ἀλλήλους ἔλεγον· Ἡμεῖς μὴ θορυβηθῶμεν· οἱ γὰρ πολέμιοι ἐπὶ τὰς δυσικὰς εἰσέρχονται πύλας.", "app": [{"id": "3363", "dirty": false, "lemma": "ἐφορμησάντων]", "reading": "ἐφορμισάντων §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 118, "span": [120, 132]}, {"id": "3371-3372", "dirty": false, "lemma": "οἰκοῦντες μέρος]", "reading": "μέρος οἰκοῦντες §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 118, "span": [63, 194]}, {"id": "3377", "dirty": false, "lemma": "μὴ]", "reading": "om. §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 118, "span": [223, 225]}], "A": "115", "dawe": "110", "tr": "In Abdera la città era divisa in due distretti: quelli che abitano nella zona est, e quelli della zona ovest. Quando dunque i nemici attaccarono all’improvviso la città e tutti erano in preda al caos, quelli che abitavano nella zona est si dicevano l’un l’altro: «Non agitiamoci! I nemici si presentano infatti alle porte occidentali!»."}, {"type": "joke", "n": 116, "num": "111", "label": "111", "wit": "AM", "text": "Ἐν Ἀβδήροις ὄνος λαθὼν εἰς τὸ γυμνάσιον εἰσῆλθε καὶ τὸ ἔλαιον ἐξέχεεν. οἱ δὲ συνελθόντες καὶ μεταπεμψάμενοι πάντας τοὺς ὄνους τοὺς ἐν τῇ πόλει καὶ εἰς ἕνα συναγαγόντες τόπον πρὸς τὸ ἀσφαλίσασθαι ἐνώπιον αὐτῶν τὸν ὄνον ἐμαστίγωσαν.", "app": [{"id": "3404", "dirty": false, "lemma": "συνελθόντες]", "reading": "συναθλοῦντες §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 119, "span": [77, 88]}, {"id": "3405", "dirty": false, "lemma": "καὶ 2]", "reading": "del. §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 119, "span": [48, 51]}, {"id": "3406", "dirty": false, "lemma": "μεταπεμψάμενοι]", "reading": "μεταμεμψάμενοι §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 119, "span": [93, 107]}, {"id": "3408-3413", "dirty": false, "lemma": "τοὺς 1 … πόλει]", "reading": "τοὺς ὄνους τοὺς ἐν τῇ πόλει §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 119, "span": [115, 142]}], "A": "116", "dawe": "111", "tr": "Ad Abdera un asino entrò inavvertitamente nel ginnasio e rovesciò l’olio. I cittadini accorsero, convocarono tutti gli asini della città, li raccolsero in un unico luogo e frustarono l’asino di fronte ai suoi simili, come punizione esemplare."}, {"type": "joke", "n": 117, "num": "112", "label": "112", "wit": "AM", "text": "Ἀβδηρίτης ἀπάγξασθαι βουλόμενος καὶ τοῦ σχοινίου διαρραγέντος τὴν κεφαλὴν ἐπλήγη. λαβὼν οὖν ἔμπλαστρον παρὰ τοῦ ἰατροῦ καὶ θεὶς κατὰ τοῦ τραύματος, ἀπελθὼν πάλιν ἀπήγξατο.", "app": [{"id": "3431", "dirty": false, "lemma": "ἀπάγξασθαι]", "reading": "ἀπήξασθαι §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 120, "span": [10, 20]}, {"id": "3436", "dirty": false, "lemma": "διαρραγέντος]", "reading": "διαραγέντος §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 120, "span": [49, 61]}], "A": "117", "dawe": "112", "tr": "Un Abderita che voleva impiccarsi si ferì alla testa poiché si era spezzata la corda. Prese dunque un impiastro dal dottore e lo pose sulla ferita, se ne andò e di nuovo si impiccò."}, {"type": "joke", "n": 118, "num": "113", "label": "113; 124 α", "wit": "A", "text": "Ἀβδηρίτης [εὐνοῦχον] ἰδὼν κηλίτην ἀπὸ ἐμβάσεως ἐξιόντα εἶπεν· Ἀποκένωσον, ἐπεὶ τῷ παραχύτῃ λέγω.", "app": [{"id": "3460", "dirty": false, "lemma": "εὐνοῦχον]", "reading": "del. §SIG:Thierfelder§", "sigla": ["Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 121, "span": [11, 19]}, {"id": "3464", "dirty": false, "lemma": "ἐμβάσεως]", "reading": "§SIG:Minas§ : ἐμβάστως §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 121, "span": [38, 46]}, {"id": "3468", "dirty": false, "lemma": "ἐπεὶ]", "reading": "§SIG:Hertlein§ : επὶ §SIG:A§", "sigla": ["A", "Hertlein"], "editors": [], "query": false, "unit": 121, "span": [74, 78]}], "A": "118", "dawe": "113", "tr": "Un Abderita vide uno con un vistoso tumore che usciva da una vasca da bagno e disse: «Svuota la sacca, perché lo dico all’inserviente dei bagni!»."}, {"type": "joke", "n": 119, "num": "114", "label": "114", "wit": "A", "text": "Ἀβδηρίτης εὐνοῦχον ἰδὼν ἐπύθετο αὐτοῦ, πόσα παιδία ἔχει. ἑτέρου δὲ εἰπόντος τὸν ὄρχεις μὴ ἔχοντα μὴ δύνασθαι τέκνα γεννῆσαι, ὑπολαβὼν ‹....›", "app": [{"id": "3479", "dirty": false, "lemma": "αὐτοῦ]", "reading": "§SIG:Eberhard§ : αὐτῷ §SIG:A§", "sigla": ["A", "Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 122, "span": [32, 37]}, {"id": "3492-3493", "dirty": false, "lemma": "τέκνα γεννῆσαι]", "reading": "τεκνογοννῆσαι §SIG:Minas§", "sigla": ["Minas"], "editors": ["Minas"], "query": false, "unit": 122, "span": [109, 123]}], "A": "119", "dawe": "114", "tr": "Un Abderita vide un eunuco e gli domandò quanti figli avesse. Quando l’altro disse che chi non ha testicoli non può generare figli, egli rispose ‹…«ma devi avere molti nipoti!» Minas…›"}, {"type": "joke", "n": 120, "num": "115", "label": "115", "wit": "AM", "text": "Ἀβδηρίτης εὐνοῦχον ἰδὼν γυναικὶ ὁμιλοῦντα ἠρώτα ἄλλον, εἰ ἄρα γυνὴ αὐτοῦ ἐστι. τοῦ δὲ εἰπόντος εὐνοῦχον γυναῖκα ἔχειν μὴ δύνασθαι ἔφη· Οὐκοῦν θυγάτηρ αὐτοῦ ἐστιν;", "app": [{"id": "3503", "dirty": false, "lemma": "ὁμιλοῦντα]", "reading": "προσομιλοῦντα §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 123, "span": [32, 41]}, {"id": "3519-3520", "dirty": false, "lemma": "ἔφη· Οὐκοῦν]", "reading": "οὐκοῦν ἔφη §SIG:Minas§", "sigla": ["Minas"], "editors": ["Minas"], "query": false, "unit": 123, "span": [130, 141]}, {"id": "3521", "dirty": false, "lemma": "θυγάτηρ]", "reading": "om. §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 123, "span": [142, 149]}], "A": "120", "dawe": "115", "tr": "Un Abderita vide un eunuco che accompagnava una donna e chiedeva ad un altro se lei fosse la moglie di quello. Quando l’altro rispose che un eunuco non può avere moglie, disse: «E non è allora sua figlia?»."}, {"type": "joke", "n": 121, "num": "116", "label": "116; 260 α", "wit": "A", "text": "Ἀβδηρίτης εὐνοῦχος δυστυχήσας κήλην ἐποίησεν.", "app": [], "A": "121", "dawe": "116", "tr": "Un Abderita eunuco per sventura sviluppò un tumore."}, {"type": "joke", "n": 122, "num": "117", "label": "117", "wit": "A", "text": "Ἀβδηρίτης μετὰ κηλίτου κοιμώμενος καὶ τῇ νυκτὶ πρὸς ἑαυτὸν ἀναστὰς ἐν τῷ ἐπαναστρέφειν σκοτίας οὔσης ἄκων τὴν κήλην ἐπάτησε. τοῦ δὲ κηλίτου κατακράξαντος, αὐτῷ ἔφη· Διὰ τί γὰρ κατακέφαλα κοιμᾶσαι;", "app": [], "A": "122", "dawe": "117", "tr": "Quando un Abderita dormiva con un tale con un tumore, di notte si alzò e tornando poi sui suoi passi, poiché era buio, senza volerlo schiacciò il rigonfiamento del tumore. Dal momento che il malato strepitò fragorosamente, gli disse: «E però perché dormi con la testa al posto dei piedi?»."}, {"type": "joke", "n": 123, "num": "118", "label": "118", "wit": "A", "text": "Ἀβδηρίτης περιπατῶν εἶδε κηλίτην οὐροῦντα καὶ εἶπεν· Οὗτος ἕως ἑσπέρας οὐ μὴ ἐξουρήσῃ.", "app": [], "A": "123", "dawe": "118", "tr": "Un Abderita a passeggio vide uno con un grosso tumore che orinava e disse: «Questo fino a sera non si sarà svuotato!»"}, {"type": "joke", "n": 124, "num": "119", "label": "119; 118 α", "wit": "A", "text": "Ἀβδηρίτης ἰδὼν κηλίτην ἀπὸ κολύμβου ἐξιόντα, μόλις δὲ περιπατοῦντα, πρὸς αὐτὸν εἶπε· Τί γὰρ ἀπλήστως ἐγόμωσας, μὴ δυνάμενος γενναίως βαστάσαι;", "app": [{"id": "3603", "dirty": false, "lemma": "ἐγόμωσας]", "reading": "", "sigla": [], "editors": [], "query": false, "unit": 127, "span": [101, 109]}], "A": "124", "dawe": "119", "tr": "Un Abderita vide uno con un grosso tumore che usciva da una piscina, e che camminava a stento, e disse a quello: «Ma perché ti sei caricato smisuratamente, pur non sapendola sollevare come si deve?»."}, {"type": "joke", "n": 125, "num": "120", "label": "120; 146 α et 62 β", "wit": "A", "text": "Ἀβδηρίτης ἀκούσας, ὅτι κρόμμυα καὶ βολβοὶ φυσῶσιν, ἐν τῷ πλέειν αὐτὸν γαλήνης οὔσης πολλῆς, σάκκον πλήσας ἀπὸ τῆς πρύμνης ἐκρέμασεν.", "app": [{"id": "3619", "dirty": false, "lemma": "κρόμμυα]", "reading": "§SIG:Minas§ : κρόμυα §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 128, "span": [23, 30]}], "A": "125", "dawe": "120", "tr": "Un Abderita che aveva sentito che cipolle e bulbi gonfiano, quando durante una navigazione c’era molta bonaccia ne riempì un sacco e lo appese alla prua."}, {"type": "joke", "n": 126, "num": "121", "label": "121", "wit": "AM", "text": "Ἀβδηρίτης ἰδὼν δρομέα ἐσταυρωμένον εἶπε· Μὰ τοὺς θεοὺς οὗτος οὐκέτι τρέχει, ἀλλὰ πέτεται.", "app": [], "A": "126", "dawe": "121", "tr": "Un Abderita vide un corridore crocifisso e disse: «Per gli dèi! Questo non corre più, ma vola!»."}, {"type": "joke", "n": 127, "num": "122", "label": "122", "wit": "AM", "text": "Ἀβδηρίτης λεκάνην ἐπώλει μὴ ἔχουσαν ὠτία. τινὸς δὲ ἐρωτήσαντος, διὰ τί ἦρεν αὐτῆς τὰ ὠτία, ἀπεκρίνατο· Ἵνα μὴ ἀκούσασα, ὅτι πωλεῖται, φύγῃ.", "app": [{"id": "3661-3669", "dirty": false, "lemma": "τινὸς … ὠτία 2]", "reading": "om. §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 130, "span": [42, 89]}], "A": "127", "dawe": "122", "tr": "Un Abderita vendeva un tegame che non aveva orecchi.{ N1|I-1|Z1\\1\\ } Ma quando uno chiese perché avesse tolto i suoi orecchi, rispose: «Perché non senta che è in vendita e scappi»."}, {"type": "joke", "n": 128, "num": "123", "label": "123", "wit": "A", "text": "Ἀβδηρίτης τὸν πατέρα τελευτήσαντα κατὰ τὸν νόμον καύσας, δραμὼν εἰς τὴν οἰκίαν πρὸς τὴν μητέρα αὐτοῦ νοσοῦσαν εἶπεν· Ὀλίγα ἔτι περιττεύει ξύλα· ἐὰν οὖν βούλῃ καὶ δύνασαι, τοῖς αὐτοῖς κατακαύθητι.", "app": [{"id": "3686", "dirty": false, "lemma": "νόμον]", "reading": "§SIG:Minas§ : ὦμον §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 131, "span": [43, 48]}, {"id": "3702-3704", "dirty": false, "lemma": "ἐὰν … βούλῃ]", "reading": "εἰ οὖν βούλει §SIG:Boissonade§", "sigla": ["Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 131, "span": [144, 157]}, {"id": "3705-3706", "dirty": false, "lemma": "καὶ δύνασαι]", "reading": "μὴ ( seu μηκέτι) ὀδυνᾶσθαι §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 131, "span": [158, 169]}], "A": "128", "dawe": "123", "tr": "Un Abderita cremò com’era uso il padre defunto, corse a casa dalla nonna che stava male e disse: «Avanza ancora un po’ di legna: se dunque vuoi e riesci, fatti cremare con quella»."}, {"type": "joke", "n": 129, "num": "124", "label": "124", "wit": "AM", "text": "Ἀβδηρίτης κατ’ ὄναρ χοιρίδιον ἐπώλει καὶ ἐζήτει δηνάρια ἑκατόν. διδόντος δέ τινος πεντήκοντα μὴ βουλόμενος λαβεῖν διύπνισε. καμ‹μ›ύσας οὖν καὶ τὴν χεῖρα προτείνας εἶπε· Δὸς κἂν τὰ πεντήκοντα.", "app": [{"id": "3714-3715", "dirty": false, "lemma": "κατ ὄναρ]", "reading": "κατόναρ §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 132, "span": [10, 19]}, {"id": "3720", "dirty": false, "lemma": "δηνάρια]", "reading": "δινάρια §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 132, "span": [48, 55]}, {"id": "3729", "dirty": false, "lemma": "διύπνισε]", "reading": "δι’ ὕπνησε §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 132, "span": [114, 122]}], "A": "129", "dawe": "124", "tr": "Un Abderita in sogno vendeva un maialino e chiedeva cento denari. Allora siccome uno gliene dava cinquanta, non volendo accettarli di svegliò. Allora si addormentò, tese la mano in avanti e disse: «E va bene, dammi pure i cinquanta!»"}, {"type": "joke", "n": 130, "num": "125", "label": "125", "wit": "AM", "text": "Ἀβδηρίτου στρουθίον ἀπέθανε. μετὰ οὖν χρόνον ἰδὼν στρουθοκάμηλον εἶπεν· Ἐὰν ἔζη τὸ στρουθίον μου, ἤδη ἂν τηλικοῦτον ὑπῆρχεν.", "app": [{"id": "3761", "dirty": false, "lemma": "ὑπῆρχεν]", "reading": "ὑπῆρχε", "sigla": [], "editors": [], "query": false, "unit": 133, "span": [116, 123]}], "A": "130", "dawe": "125", "tr": "Il passerotto di un Abderita morì. Tempo dopo questi vide uno struzzo e disse: «Se il mio passerotto fosse vivo, ora sarebbe proprio di questa taglia!»."}, {"type": "joke", "n": 131, "num": "126", "label": "126", "wit": "AM", "text": "Ἀβδηρίτης εἰς Ῥόδον ἀποδημήσας ὡς ἐκ τοῦ ὀνόματος τοὺς τοίχους ὠσμᾶτο.", "app": [{"id": "3775", "dirty": false, "lemma": "τοίχους]", "reading": "τείχους §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 134, "span": [55, 62]}, {"id": "3776", "dirty": false, "lemma": "ὠσμᾶτο]", "reading": "ὀσμᾶτο §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 134, "span": [63, 69]}], "A": "131", "dawe": "126", "tr": "Un Abderita si recò in viaggio a Rodi{ N1|I2|Z1\\2\\ } e per via del nome annusava i muri."}, {"type": "joke", "n": 132, "num": "127", "label": "127", "wit": "A", "text": "Ἀβδηρίτης ὀνάριόν τινι χρεωστῶν καὶ μὴ ἔχων παρεκάλει, ἵνα ἀντ’ αὐτοῦ δύο ἡμιόνους παράσχῃ. AM", "app": [{"id": "3789-3790", "dirty": false, "lemma": "ἀντ αὐτοῦ]", "reading": "ἀνταυτοῦ §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 135, "span": [59, 69]}], "A": "132", "dawe": "127", "tr": "Un Abderita che doveva ad un tale un asino ma non lo aveva, lo invitava ad accettare al posto di quello due muli."}, {"type": "section", "text": "σιδόνιοι", "app": []}, {"type": "joke", "n": 133, "num": "128", "label": "128; 105 α", "wit": "A", "text": "Σιδόνιος ἔπαρχος ἐπὶ ὀχήματος ὥδευεν. ἐπεὶ δὲ ἀτονήσασαι αἱ ἡμίονοι οὐκ ἠδύναντο βαδίζειν, ἀπέλυσεν αὐτὰς ὁ ἡνίοχος, ἵνα μικρὸν βοσκηθεῖσαι ἀναλάβωνται. λυθεῖσαι οὖν ἔφυγον. καὶ ὁ ἔπαρχος πρὸς τὸν ἡνίοχον ἔφη· Ὁρᾷς, κάθαρμα, ὅτι αἱ μὲν ἡμίονοι τρέχουσι, τὸ δὲ ὄχημα δραμεῖν μὴ δυνάμενον ἵσταται.", "app": [{"id": "3807-3808", "dirty": false, "lemma": "ἐπεὶ δὲ]", "reading": "§SIG:Eberhard§ : ἐπειδή §SIG:A§", "sigla": ["A", "Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 137, "span": [38, 45]}, {"id": "3812", "dirty": false, "lemma": "οὐκ]", "reading": "οὐκέτι dub. §SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 137, "span": [68, 71]}, {"id": "3822", "dirty": false, "lemma": "ἀναλάβωνται]", "reading": "§SIG:Minas§ : ἀναλάηται §SIG:A§ (cf. ἀναλάβωσιν 105 α)", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 137, "span": [140, 151]}], "A": "133", "dawe": "128", "tr": "Un governatore Sidonio viaggiava su di un carro. Siccome le mule erano stanche e non riuscivano a camminare, il cocchiere le sciolse perché pascolassero un po’ e si riprendessero. Vennero slegate ma fuggirono. E il governatore disse al cocchiere: «Vedi, disgraziato, che le mule corrono, è il carro che non riuscendo a correre sta fermo!»."}, {"type": "joke", "n": 134, "num": "129", "label": "129 cf. 108 α", "wit": "A", "text": "Σιδόνιος ῥήτωρ μετὰ δύο ἑταίρων διελέγετο. τοῦ δὲ ἑνὸς λέγοντος, ὅτι οὐκ ἦν δίκαιον πρόβατα σφάζεσθαι διὰ τὸ φέρειν γάλα καὶ ἔριον, καὶ τοῦ ἄλλου εἰπόντος, ὅτι μηδὲ βοῦν ‹προσήκει› ἀναιρεῖσθαι γάλα παρέχουσαν καὶ ἀροτριῶσαν, ὁ ῥήτωρ ἔφη μηδὲ χοῖρον εἶναι δίκαιον σφάζεσθαι ἧπαρ παρέχοντα καὶ οὖθαρ καὶ νεφρία.", "app": [{"id": "3865", "dirty": false, "lemma": "ἦν]", "reading": "ἐστι §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 138, "span": [73, 75]}, {"id": "3882", "dirty": false, "lemma": "προσήκει]", "reading": "§SIG:Eberhard§ ex 108 α : προσῆκεν dub. §SIG:Thierfelder§ : δεῖ dub. §SIG:Eberhard§", "sigla": ["Eberhard", "Thierfelder"], "editors": ["Eberhard", "Thierfelder"], "query": false, "unit": 138, "span": [171, 179]}, {"id": "3885-3887", "dirty": false, "lemma": "παρέχουσαν … ἀροτριῶσαν]", "reading": "§SIG:Boissonade§ : παρέχοντα καὶ ἀροτριοῦντα §SIG:A§ ex 108 α", "sigla": ["A", "Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 138, "span": [198, 223]}, {"id": "3896", "dirty": false, "lemma": "ἧπαρ]", "reading": "§SIG:Boissonade§ : ἥπαρ §SIG:A§", "sigla": ["A", "Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 138, "span": [273, 277]}, {"id": "3897", "dirty": false, "lemma": "παρέχοντα]", "reading": "§SIG:A§ : παρέχουσαν §SIG:Boissonade§", "sigla": ["A", "Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 138, "span": [278, 287]}], "A": "134", "dawe": "129", "tr": "Un retore di Sidone chiacchierava con due amici. Quando uno diceva che non era giusto uccidere le pecore poiché forniscono latte e lana, e l’altro disse che non è giusto nemmeno uccidere il bue ché offre latte e ara, il retore disse che non era giusto nemmeno uccidere il maiale, dato che offre fegato, carne di mammella e rognoni."}, {"type": "joke", "n": 135, "num": "130", "label": "130; 23 α", "wit": "A", "text": "Σιδόνιος σοφιστὴς κατὰ πρώτην ἄνοιξιν τοῦ βαλανείου λουόμενος καὶ μηδένα ἔσωθεν εὑρὼν λέγει πρὸς τοὺς ἰδίους οἰκέτας· Καθὼς βλέπω, οὐ λούει.", "app": [{"id": "3914", "dirty": false, "lemma": "λουόμενος]", "reading": "§SIG:A§ : λουσόμενος §SIG:Eberhard§", "sigla": ["A", "Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 139, "span": [52, 61]}], "A": "135", "dawe": "130", "tr": "Un sofista di Sidone che si lava alla prima apertura del bagno, siccome non vi trova nessuno dice ai suoi servitori: «A quanto vedo, è chiuso»."}, {"type": "joke", "n": 136, "num": "131", "label": "131; 61 α", "wit": "A", "text": "Σιδόνιος σχολαστικὸς ἀπὸ πολλῶν μιλίων χωρίον ἔχων καὶ θέλων αὐτὸ ἐγγύτερον ποιῆσαι ἑπτὰ κίονας μιλίων κατέστρεψεν.", "app": [], "A": "136", "dawe": "131", "tr": "Uno scholastikos di Sidone che aveva un terreno a molte miglia di distanza e che voleva renderlo più vicino, abbatté sette cippi miliari."}, {"type": "joke", "n": 137, "num": "132", "label": "132; 42 α", "wit": "AM", "text": "Σιδόνιος πραγματευτὴς μετὰ ἑτέρου ὥδευε. τῆς δὲ γαστρὸς ἀναγκαζούσης μικρὸν ἀπολειφθῆναι προσαπέμεινεν. ὁδὲ συνοδοιπόρος ἀφῆκεν αὐτὸν γράψας ἔν τινι κίονι τῶν μιλίων· Τάχυνον, φθάσον με. ὁ δὲ ὡς ἀνέγνω, ἐπέγραψε κάτωθεν· Καὶ αὐτὸς μεῖνόν με.", "app": [{"id": "3957", "dirty": false, "lemma": "ἑτέρου]", "reading": "§SIG:A§ §SIG:M§ :ἑταίρου §SIG:Dawe§", "sigla": ["A", "Dawe", "M"], "editors": ["Dawe"], "query": false, "unit": 141, "span": [27, 33]}, {"id": "3958", "dirty": false, "lemma": "ὥδευε]", "reading": "ὥδευε §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 141, "span": [34, 39]}, {"id": "3965", "dirty": false, "lemma": "προσαπέμεινεν]", "reading": "§SIG:A§ §SIG:M§ : πρόσω ἀπέμεινεν §SIG:Dawe§", "sigla": ["A", "Dawe", "M"], "editors": ["Dawe"], "query": false, "unit": 141, "span": [89, 102]}, {"id": "3972", "dirty": false, "lemma": "τινι]", "reading": "τῆ §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 141, "span": [144, 148]}, {"id": "3973", "dirty": false, "lemma": "κίονι]", "reading": "delendum esse censit §SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 141, "span": [149, 154]}], "A": "137", "dawe": "132", "tr": "Un affarista di Sidone viaggiava insieme ad un altro. Siccome lo stomaco lo aveva costretto a trattenersi, rimase indietro. Il compagno di viaggio lo lasciò dopo avergli scritto su un cippo miliario: «Affrettati, raggiungimi». Quando lo lesse, scrisse sul retro: «E tu aspettami»."}, {"type": "joke", "n": 138, "num": "133", "label": "133", "wit": "A", "text": "Σιδονίῳ ἁλιεῖ λέγει τις· Ἔχει τὸ κυρτίν σου παγούρους; ὁ δὲ μανεὶς ἀπεκρίνατο· Ἔχει τὸ στῆθός σου καρκίνους;", "app": [], "A": "138", "dawe": "133", "tr": "Un tale dice ad un pescatore di Sidone: «La tua nassa{ N1|I3|Z1\\3\\ } ha paguri?» e quello si infuriò e rispose: «Il tuo petto ha granchi?»."}, {"type": "joke", "n": 139, "num": "134", "label": "134; 86 α", "wit": "A", "text": "Σιδόνιος ἑκατόνταρχος τοῖς στρατιώταις ἔλεγεν· Σήμερον πολλὰ καθίσατε· αὔριον γὰρ πολλὰ μέλλετε ὁδοιπορεῖν.", "app": [{"id": "4022", "dirty": false, "lemma": "καθίσατε]", "reading": "§SIG:Boissonade§ : καθήσατε §SIG:A§", "sigla": ["A", "Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 143, "span": [61, 69]}], "A": "139", "dawe": "134", "tr": "Un centurione di Sidone diceva ai soldati: «Oggi state tanto seduti: domani, infatti, dovrete fare molta strada!»."}, {"type": "joke", "n": 140, "num": "135", "label": "135", "wit": "A", "text": "Σιδονίῳ κηρουλαρίῳ λέγει τις· Ἔχεις, κῦρι, ἀποκαύματα; ὁ δὲ ὀργισθεὶς ἀπεκρίνατο· Ἔχεις, κῦρι, ἀνθρακώματα;", "app": [], "A": "140", "dawe": "135", "tr": "Un tale dice ad un candelaio di Sidone: «Signore, hai dei moccoli? Quello allora si arrabbiò e rispose: allora si arrabbiò e rispose: «Signore, hai dei carbonchi?»."}, {"type": "joke", "n": 141, "num": "136", "label": "136; 96 α et 1 γ", "wit": "A", "text": "Σιδόνιος γραμματικὸς ἠρώτα τὸν †διδάσκαλον· Ἡ πεντακότυλος λήκυθος πόσον χωρεῖ; ὁ δὲ εἶπεν· Οἶνον λέγεις ἢ ἔλαιον;", "app": [], "A": "141", "dawe": "136", "tr": "Un segretario Sidonio chiedeva al maestro: « La boccetta da cinque cotili quanto è capace?». E quello disse: «Di vino dici, o di olio?»."}, {"type": "joke", "n": 142, "num": "137", "label": "137; cf. 104 α", "wit": "AM", "text": "Σιδονίῳ μαγείρῳ λέγει τις· Δάνεισόν μοι μάχαιραν ἕως Σμύρνης. ὁ δὲ ἔφη·Οὐκ ἔχω μάχαιραν ἕως ἐκεῖ φθάζουσαν.", "app": [{"id": "4077", "dirty": false, "lemma": "μαγείρῳ]", "reading": "μάγειρος §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 146, "span": [8, 15]}], "A": "142", "dawe": "137", "tr": "Un tale dice a un cuoco Sidonio: «Prestami un coltello fino a Smirne». Questo allora dice: «Non ho un coltello che arrivi fin lì»."}, {"type": "joke", "n": 143, "num": "138", "label": "138", "wit": "A", "text": "Σιδόνιος κεντουρίων ἰδὼν ζευγηλάτην διὰ τῆς ἀγορᾶς ἅμαξαν φέροντα ἐκέλευσεν αὐτὸν τυφθῆναι. τοῦ δὲ εἰπόντος ὅτι Ῥωμαῖός εἰμι, καὶ οὐ χρὴ τύπτεσθαί με διὰ τὸν νόμον τοὺς βόας ἐκέλευσεν ὁ κεντουρίων μαστιγωθῆναι.", "app": [{"id": "4099", "dirty": false, "lemma": "ζευγηλάτην]", "reading": "§SIG:Minas§ : ζευγελάτην §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 147, "span": [25, 35]}], "A": "143", "dawe": "138", "tr": "Un centurione Sidonio vide un carrettiere che portava il carro attraverso la piazza e ordinò che venisse percosso. Quando allora questi disse: «Sono un cittadino romano, per legge non posso essere percosso!», il centurione ordinò che fossero fustigati i buoi."}, {"type": "joke", "n": 144, "num": "139", "label": "139", "wit": "AM", "text": "Σιδόνιος ἰατρὸς λεγάτον ὑπὸ ἀρρώστου αὐτοῦ χιλίας δραχμὰς μετὰ τὸ ἀποθανεῖν αὐτὸν κομισάμενος, ἐκφερομένου δὲ αὐτοῦ τῇ κηδείᾳ ἀκολουθῶν ἐνεκάλει, ὡς ὀλίγον αὐτῷ λεγάτον κατέλιπεν. ἐπεὶ οὖν καὶ ὁ υἱὸς τοῦ τελευτήσαντος εἰς νόσον ἐμπαρεὶς παρεκάλει αὐτὸν ἐπισκεπτόμενον ἀνταγωνίσασθαι τῇ νόσῳ, ὁ ἰατρὸς ἔφη· Ἐὰν πεντακισχιλίας δραχμὰς εἰς λεγάτον καταλείψῃς, ἐγώ σε ἰατρεύσω ὡς τὸν πατέρα σου. A", "app": [{"id": "4136", "dirty": false, "lemma": "ἀρρώστου]", "reading": "ἀρώστου §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 148, "span": [28, 36]}, {"id": "4145", "dirty": false, "lemma": "ἐκφερομένου]", "reading": "ἐκφερουμένου §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 148, "span": [95, 106]}, {"id": "4149", "dirty": false, "lemma": "κηδείᾳ]", "reading": "κηδία §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 148, "span": [119, 125]}, {"id": "4150", "dirty": false, "lemma": "ἀκολουθῶν]", "reading": "ἀκολουθὼν §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 148, "span": [126, 135]}, {"id": "4154", "dirty": false, "lemma": "αὐτῷ]", "reading": "αὐτὸ §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 148, "span": [156, 160]}, {"id": "4166", "dirty": false, "lemma": "ἐμπαρεὶς]", "reading": "ἐμπλακεὶς §SIG:Hertlein§", "sigla": ["Hertlein"], "editors": [], "query": false, "unit": 148, "span": [228, 236]}, {"id": "4181", "dirty": false, "lemma": "καταλείψῃς]", "reading": "καταλείψεις §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 148, "span": [345, 355]}, {"id": "4184-4188", "dirty": false, "lemma": "ἰατρεύσω … σου]", "reading": "ὡς τὸν πατέρα σου ἰατρεύσω §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 148, "span": [364, 390]}], "A": "144", "dawe": "139", "tr": "Un medico Sidonio ottenne in testamento da un suo ammalato mille dracme dopo la morte, e mentre quello veniva portato a sepoltura, lui seguiva il corteo e si lamentava del fatto che gli avesse lasciato poco in legato testamentario. Quando poi anche il figlio del defunto era incappato in una malattia e lo pregava di visitarlo e affrontare il morbo, il medico disse: «Se mi lascerai nel testamento cinquemila dracme, io ti curerò come ho fatto con tuo padre!»."}, {"type": "section", "text": "εὐτράπελοι", "app": []}, {"type": "joke", "n": 145, "num": "140", "label": "140", "wit": "AM", "text": "Εὐτράπελος ἰδὼν γραμματοδιδάσκαλον ἀφυῆ διδάσκοντα προσελθὼν ἠρώτα, διὰ τί κιθαρίζειν οὐ διδάσκει. Τοῦ δὲ εἰπόντος· Ὅτι οὐκ ἐπίσταμαι, εἶπε· Πῶς οὖν γράμματα διδάσκεις οὐκ ἐπιστάμενος;", "app": [], "A": "145", "dawe": "140", "tr": "Uno spiritoso vide un maestro elementare inetto insegnare, andò da lui e gli chiese perché non insegnasse a suonare la cetra. Quando quello allora rispose: «Perché non sono in grado», disse: «E perché dunque insegni le lettere, pur non essendone in grado?»."}, {"type": "joke", "n": 146, "num": "141", "label": "141; 62 β, cf. 125 α", "wit": "A", "text": "Εὐτράπελος κυβερνήτης ἐρωτηθείς, τί φυσᾷ, εἶπε· Φάβα καὶ κρόμμυα.", "app": [{"id": "4229", "dirty": false, "lemma": "κυβερνήτης]", "reading": "κυβερνίτης §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 151, "span": [11, 21]}, {"id": "4236", "dirty": false, "lemma": "κρόμμυα]", "reading": "§SIG:Minas§ : κρόμυα §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 151, "span": [57, 64]}], "A": "146", "dawe": "141", "tr": "A un timoniere spiritoso fu domandato che aria tirasse e rispose: «Di fave e cipolle!»."}, {"type": "joke", "n": 147, "num": "142", "label": "142", "wit": "A", "text": "Εὐτράπελον ὀφθαλμιῶντα ἰατρὸς κλέπτης ἀλείψας λύχνον ἔκλεψε. μιᾷ οὖν ταῦτα ἠρώτα αὐτόν· Πῶς ἔχεις εἰς τοὺς ὀφθαλμούς; καὶ ὁ εὐτράπελός φησιν· Ἀφ’ οὗ μοι ἤλειψας, τὸν λύχνον οὐ βλέπω αὐτόν.", "app": [{"id": "4244", "dirty": false, "lemma": "ἀλείψας]", "reading": "δανείσας §SIG:A§ corr. dub. §SIG:Cataudella§ cf. 157 α : χρίσας dub. §SIG:Thierfelder§ ex Aesop. fab. 57 Hausrath", "sigla": ["A", "Cataudella", "Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 152, "span": [38, 45]}, {"id": "4263-4264", "dirty": false, "lemma": "μοι ἤλειψας]", "reading": "μοι ἐδάνεισας §SIG:A§ ut supra §SIG:Cataudella§ : με ἔχρισας ut supra §SIG:Thierfelder§", "sigla": ["A", "Cataudella", "Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 152, "span": [149, 160]}, {"id": "4265-4269", "dirty": false, "lemma": "τὸν … αὐτόν]", "reading": "τοῦ λύχνου οὐ βλέπω αὐγήν dub. §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 152, "span": [162, 187]}, {"id": "4269", "dirty": false, "lemma": "αὐτόν]", "reading": "del. §SIG:Mehler§", "sigla": ["Mehler"], "editors": [], "query": false, "unit": 152, "span": [81, 86]}], "A": "147", "dawe": "142", "tr": "Un medico dalle mani lunghe guarì uno spiritoso che aveva un problema agli occhi e non ci vedeva, e gli rubò una lampada. Una volta poi gli chiedeva: «Come vanno gli occhi?» e lo spiritoso: «Da quando me li hai curati, non vedo proprio la lampada!»."}, {"type": "joke", "n": 148, "num": "143", "label": "143; 64 β", "wit": "A", "text": "Εὐτραπέλῳ ἰατρῷ λέγει τις·‹...› Ἐὰν κτήσῃ [θερμὸν] ἀγγεῖον, θερμόν σε οὐ λείψει.", "app": [{"id": "4281", "dirty": false, "lemma": "θερμὸν]", "reading": "del. §SIG:Thierfelder§", "sigla": ["Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 153, "span": [43, 49]}], "A": "148", "dawe": "143", "tr": "Il testo è lacunoso proprio nel momento in cui viene presentata la parola che sarà ripresa come pointe del gioco di parole, ma il senso è perfettamente recuperabile dalla 64 β."}, {"type": "joke", "n": 149, "num": "144", "label": "144", "wit": "A", "text": "Εὐτράπελος ἀργὸν δρομέα ἰδὼν εἶπεν· Οἶδα, τί χρῄζει ὁ κύριός μου οὗτος. τοῦ δὲ ἀγωνοθέτου ἐρωτήσαντος· Τί ἐστιν; εἶπεν· Ἵππου χρῄζει· ἄλλως γὰρ τοὺς ἀνταγωνιστὰς καταλαβεῖν οὐ δύναται.", "app": [{"id": "4296-4297", "dirty": false, "lemma": "τί χρῄζει]", "reading": "τὶνος χρῄζει §SIG:Minas§", "sigla": ["Minas"], "editors": ["Minas"], "query": false, "unit": 154, "span": [42, 51]}, {"id": "4298-4299", "dirty": false, "lemma": "ὁ κύριός]", "reading": "ὦ κῦρί (κύριέ) §SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 154, "span": [52, 60]}, {"id": "4315", "dirty": false, "lemma": "καταλαβεῖν]", "reading": "§SIG:Minas§ : καταβαλεῖν §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 154, "span": [162, 172]}], "A": "149", "dawe": "144", "tr": "Uno spiritoso vide un corridore svogliato e disse: «So cosa vuole il signore qui». Quando il giudice chiese: «Cosa? disse: «Ha bisogno di un cavallo! Perché non può riprendere in altro modo gli avversari!»."}, {"type": "joke", "n": 150, "num": "145", "label": "145", "wit": "A", "text": "Εὐτράπελος κάπηλος εὑρὼν ταξεώτην ἐπὶ τῇ γυναικὶ αὐτοῦ εἶπεν· Εὗρον, ὃ οὐκ ἐζήτουν.", "app": [], "A": "150", "dawe": "145", "tr": "Un oste spiritoso trovò un soldato sopra sua moglie e disse: «Ho trovato quello che non cercavo!»."}, {"type": "joke", "n": 151, "num": "146", "label": "146; 68 β", "wit": "A", "text": "Εὐτράπελος χοῖρον κλέψας ἔφευγεν. ἐπεὶ δὲ κατελαμβάνετο, θεὶς αὐτὸν χαμαὶ καὶ δέρων ἔλεγεν· Ἐκεῖ ὄρυττε καὶ μὴ παρὰ τὰ ἐμά.", "app": [{"id": "4341", "dirty": false, "lemma": "κλέψας]", "reading": "§SIG:Dawe§ : κρύψας §SIG:A§ ex 68 β", "sigla": ["A", "Dawe"], "editors": ["Dawe"], "query": false, "unit": 156, "span": [18, 24]}], "A": "151", "dawe": "146", "tr": "Uno spiritoso rubò un maiale e fuggiva. Quando però fu acciuffato, lo poggiò per terra e mentre lo percuoteva diceva: «Scava lì, e non vicino alle mie cose!»."}, {"type": "joke", "n": 152, "num": "147", "label": "147", "wit": "AM", "text": "Εὐτράπελος ἰδὼν κακόηχον καὶ κακόφωνον κιθαρῳδὸν ἠσπάσατο λέγων· Χαῖρε, ἀλεκτρυών. τοῦ δὲ πυθομένου, διὰ τί αὐτὸν οὕτως προσηγόρευσεν, ἔφη· Ὅτι, ὅταν σὺ κοκκύσῃς, πάντες ἐγείρονται.", "app": [{"id": "4384", "dirty": false, "lemma": "κοκκύσῃς]", "reading": "κοκκύσῃς edd. : κοκύσης §SIG:A§ : κοκίσης §SIG:M§", "sigla": ["A", "M"], "editors": [], "query": false, "unit": 157, "span": [153, 161]}], "A": "152", "dawe": "147", "tr": "Uno spiritoso vide un citarodo dalla voce bruta e stonata e lo salutò dicendo: «Salve, gallo!». Quando quello chiese perché lo avesse salutato così, disse: «Perché quando canti, si svegliano tutti!»."}, {"type": "joke", "n": 153, "num": "148", "label": "148", "wit": "A", "text": "Εὐτράπελος φλυάρου κουρέως ἐρωτήσαντος· Πῶς σε κείρω; Σιωπῶν, ἔφη.", "app": [{"id": "4394-4396", "dirty": false, "lemma": "Πῶς … κείρω]", "reading": "§SIG:Minas§ : Πῶς ἐκείρω §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 158, "span": [40, 52]}], "A": "153", "dawe": "148", "tr": "Uno spiritoso, quando un barbiere chiacchierone gli chiese: «Come te li taglio?» disse: «Stando in silenzio»."}, {"type": "joke", "n": 154, "num": "149", "label": "149; 71 β", "wit": "A", "text": "Εὐτράπελος ἐν βαλανείῳ ὑπό τινος ὑβρισθεὶς μάρτυρας προσέφερε τοὺς παραχύτας. τοῦ δὲ ἀντιδίκου ἀποβαλλομένου ὡς μὴ ὄντας ἀξιοπίστους ἔφη· Εἰ μὲν ‹ἐν› τῷ δουρείῳ ἵππῳ ὑβρίσθην, προήγαγον ἂν μάρτυρας τοὺς περὶ Μενέλαον καὶ Ὀδυσσέα καὶ Διομήδην· ἐν δὲ τῷ βαλανείῳ τῆς ὕβρεως γενομένης ἀνάγκη τοὺς παραχύτας τὸ πραχθὲν μᾶλλον εἰδέναι.", "app": [{"id": "4411", "dirty": false, "lemma": "ὑβρισθεὶς]", "reading": "§SIG:Minas§ : ὀριγισθεὶς §SIG:A§", "sigla": ["A", "Minas"], "editors": ["Minas"], "query": false, "unit": 159, "span": [33, 42]}, {"id": "4427", "dirty": false, "lemma": "ἐν 2]", "reading": "§SIG:Boissonade§", "sigla": ["Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 159, "span": [11, 13]}], "A": "154", "dawe": "149", "tr": "Uno spiritoso fu maltrattato in un bagno da un tale e portava come testimoni gli inservienti. Quando l’imputato obiettava che non erano degni di fede, disse: «Se fossi stato maltrattato nel cavallo di legno, avrei portato come testimoni Menelao, Odisseo e Diomede, ché erano lì; siccome invece la violenza è avvenuta nel bagno, avranno per forza visto meglio il fatto gli inservienti!»."}, {"type": "joke", "n": 155, "num": "150", "label": "150", "wit": "A", "text": "Εὐτράπελος, [δύο] ξύστρων παρ’ αὐτοῦ ‹ὑπὸ δύο› ἐν βαλανείῳ ἐπιζητουμένων, ὑπὸ ἑνὸς μὲν ἀγνωρίστου, ὑπὸ δὲ ἑτέρου γνωρίμου μὲν ἀλλὰ κλέπτου, ὁ εὐτράπελος ἔφη· Σὲ μὲν ‹μὴ› γνωρίζων οὐ δώσω· σὲ δὲ [μὴ] γνωρίζων οὐ δώσω.", "app": [{"id": "4460", "dirty": false, "lemma": "δύο 1]", "reading": "del. §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 160, "span": [13, 16]}, {"id": "4464-4465", "dirty": false, "lemma": "ὑπὸ δύο]", "reading": "add. §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 160, "span": [38, 45]}, {"id": "4485", "dirty": false, "lemma": "μὴ 1]", "reading": "add. §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 160, "span": [166, 168]}, {"id": "4491", "dirty": false, "lemma": "μὴ 2]", "reading": "del. §SIG:Dawe§", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 160, "span": [166, 168]}], "A": "155", "dawe": "150", "tr": "Uno spiritoso, quando in un bagno gli venivano richiesti in prestito dei raschietti da due tali, e uno era uno sconosciuto, l’altro invece noto ma era un ladro, disse: «A te, siccome non ti conosco, non lo do; a te invece, siccome ti conosco, non lo do»."}, {"type": "joke", "n": 156, "num": "151", "label": "151; 69 β", "wit": "A", "text": "Εὐτράπελος ἰδὼν πορνοβοσκὸν μισθοῦντα μέλαιναν ἑταιρίδα εἶπε· Πόσου τὴν νύκτα μισθοῖς;", "app": [], "A": "156", "dawe": "151", "tr": "Uno spiritoso vide un lenone che vendeva una prostituta nera e disse: «A quanto vendi la notte{ N1|I4|Z1\\4\\ }?»."}, {"type": "joke", "n": 157, "num": "151 bis", "label": "151 bis; 66 β", "wit": "A", "text": "Εὐτράπελος ἰδὼν ἰατρὸν κόρην ὑπαλείφοντα ἔφη· Ὅρα, νεανίσκε, μὴ τὴν ὄψιν θεραπεύων τὴν κόρην διαφθείρῃς.", "app": [{"id": "4520", "dirty": false, "lemma": "κόρην 1]", "reading": "κόρην ‹ὀφθαλμιῶσαν› §SIG:Thierfelder§", "sigla": ["Thierfelder"], "editors": ["Thierfelder"], "query": false, "unit": 162, "span": [23, 28]}], "A": "157", "dawe": "151 bis", "tr": "Uno spiritoso vide un medico che applicava un collirio a una ragazza e disse «Occhio, giovanotto, non sciupare la pupa/pulzella{ N1|I5|Z1\\5\\ } curando quella pupilla»."}, {"type": "joke", "n": 158, "num": "152", "label": "152; 72 β; cf. 13 α", "wit": "A", "text": "Εὐτράπελοι δύο πατραλοῖαι πρὸς ἀλλήλους ἐδυσφόρουν πρὸς τὸ φονεῦσαι τοὺς ἑαυτῶν γονεῖς. ὁ δὲ ἕτερος πρὸς τὸν ἄλλον ἔφη· Ἵνα μὴ πατροκτόνοι παρά τισι λογισθῶμεν, σὺ φόνευσον τὸν ἐμὸν πατέρα, κἀγὼ τὸν σόν· καὶ κακῆς φεύξομεν φήμης.", "app": [{"id": "4546-4548", "dirty": false, "lemma": "πρὸς 2 … φονεῦσαι]", "reading": "ἐπὶ τῷ ζῆν dub. §SIG:Thierfelder§ , rec. §SIG:Dawe§", "sigla": ["Dawe", "Thierfelder"], "editors": ["Thierfelder", "Dawe"], "query": false, "unit": 163, "span": [26, 67]}, {"id": "4575", "dirty": false, "lemma": "φεύξομεν]", "reading": "scripsi : φεύγομεν §SIG:A§ §SIG:M§", "sigla": ["A", "M"], "editors": [], "query": false, "unit": 163, "span": [214, 222]}], "A": "158", "dawe": "152", "tr": "Due spiritosi parricidi si lamentavano l’un l’altro dell’uccidere i propri genitori. Uno allora disse all’altro: «Affinché certa gente non ci consideri parricidi, tu ammazza mio padre, e io il tuo: e ci evitiamo una brutta fama!»."}, {"type": "joke", "n": 159, "num": "153", "label": "153", "wit": "AM", "text": "Εὐτράπελος παλαίων εἰς πηλὰ ἐνέπεσε καὶ ἵνα μὴ δοκῇ ἀπάλαιστρος εἶναι, περιστραφεὶς καὶ δι’ ὅλου πηλωθεὶς ἀνέστη ἐναβρυνόμενος. A", "app": [{"id": "4588", "dirty": false, "lemma": "δοκῇ]", "reading": "δοκεῖ §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 164, "span": [47, 51]}, {"id": "4589", "dirty": false, "lemma": "ἀπάλαιστρος]", "reading": "dub. §SIG:Thierfelder§ , rec. §SIG:Dawe§ : ἀπάλαιστος §SIG:A§ : ἀπάλαιστον §SIG:M§", "sigla": ["A", "Dawe", "M", "Thierfelder"], "editors": ["Thierfelder", "Dawe"], "query": false, "unit": 164, "span": [52, 63]}, {"id": "4593-4594", "dirty": false, "lemma": "δι ὅλου]", "reading": "διόλου §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 164, "span": [88, 96]}, {"id": "4597", "dirty": false, "lemma": "ἐναβρυνόμενος]", "reading": "ἐν ἀβρυνόμενος §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 164, "span": [113, 126]}, {"id": "4617", "dirty": false, "lemma": "εἷς]", "reading": "§SIG:Eberhard§ : ὁ §SIG:A§", "sigla": ["A", "Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 164, "span": [19, 22]}], "A": "159", "dawe": "153", "tr": "Uno spiritoso cadde nel fango mentre lottava, e perché non sembrasse essere goffo, si rigirò, si infangò tutto e si sollevò vantandosi."}, {"type": "section", "text": "κυμαῖοι", "app": []}, {"type": "joke", "n": 160, "num": "154", "label": "154", "wit": "A", "text": "Ἐν Κύμῃ ἐπισήμου τινὸς κηδευομένου προσελθών τις ἠρώτα τοὺς ὀψικεύοντας· Τίς ὁ τεθνηκώς; εἷς δὲ Κυμαῖος στραφεὶς ὑπεδείκνυε λέγων· Ἐκεῖνος ὁ ἐπὶ τῆς κλίνης ἀνακείμενος.", "app": [], "A": "160", "dawe": "154", "tr": "A Cuma mentre qualcuno di insigne veniva seppellito, arrivò un tale e chiedeva ai presenti: «Chi è il morto?». Allora un Cumano si voltò e indicava dicendo: «Quello lì che giace sul letto funebre»."}, {"type": "joke", "n": 161, "num": "155", "label": "155; cf. 4 α et 3 β", "wit": "A", "text": "Κυμαίῳ ἵππον πιπράσκοντι προσελθών τις ἠρώτα, εἰ πρωτοβόλος ὁ ἵππος. τοῦ δὲ εἰπόντος, ὅτι δευτεροβολεῖ, ἔφη· Πῶς οἶδας; ὁ δὲ εἶπεν· Ὅτι ἅπαξ ἐμὲ κάτω ἔβαλε καὶ ἅπαξ τὸν πατέρα μου.", "app": [{"id": "4645", "dirty": false, "lemma": "πρωτοβόλος]", "reading": "§SIG:Boissonade§ : πρωτόβολος §SIG:A§", "sigla": ["A", "Boissonade"], "editors": ["Boissonade"], "query": false, "unit": 167, "span": [49, 59]}], "A": "161", "dawe": "155", "tr": "Un tale si avvicinò a un Cumano che vendeva un cavallo e gli domandava se il cavallo fosse giovane e gli fosse caduto il primo dente. Quando quello disse che gli era caduto anche il secondo, disse: «Come lo sai?» e quello rispose «Perché una volta ha disarcionato me, e una volta ha fatto cadere mio padre»."}, {"type": "joke", "n": 162, "num": "156", "label": "156; cf. 41 α et 10 β", "wit": "A", "text": "Κυμαῖος οἰκίαν πωλῶν λίθον ἐξ αὐτῆς ἐκβαλὼν εἰς δεῖγμα περιέφερεν.", "app": [], "A": "162", "dawe": "156", "tr": "Un Cumano che vendeva una casa strappò via una pietra da essa e la portava in giro come campione dimostrativo."}, {"type": "joke", "n": 163, "num": "157", "label": "157; cf. 10 α", "wit": "A", "text": "Κυμαῖος ἵππον πιπράσκων ἠρωτήθη, μὴ δειλὸς εἴη. ὁ δὲ ἀπεκρίνατο· Οὐ μὰ τὴν σωτηρίαν μου· ἐν τῇ φάτνῃ γὰρ μόνος εἱστήκει.", "app": [{"id": "4715", "dirty": false, "lemma": "εἱστήκει]", "reading": "εἱστία §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 169, "span": [111, 119]}], "A": "163", "dawe": "157", "tr": "A un Cumano che vendeva un cavallo fu chiesto se quello fosse pauroso. Egli rispose: «No, per l’anima mia! Nella stalla, infatti, stava da solo!»."}, {"type": "joke", "n": 164, "num": "158", "label": "158; cf. 35 α", "wit": "A", "text": "Κυμαῖος κλεψιμαῖα ἱμάτια ἀγοράσας διὰ τὸ μὴ γνωρισθῆναι ἐπίσσωσεν αὐτά.", "app": [], "A": "164", "dawe": "158", "tr": "Un Cumano si mise a vendere mantelli rubati e perché non fossero riconosciuti come tali, li ricoprì di pece."}, {"type": "joke", "n": 165, "num": "158 bis", "label": "158 bis; cf. 37 α et 6 β", "wit": "A", "text": "Κυμαῖος ἵππον ἐπίπρασκεν. ἐλθόντος δέ τινος καὶ καταμανθάνοντος αὐτοῦ τὸν βόλον εἶπε· Τί τοὺς ὀδόντας αὐτοῦ καταμανθάνεις; εἴθε ὡς τρώγει, οὕτως καὶ περιεπάτει.", "app": [], "A": "165", "dawe": "158 bis", "tr": "Un Cumano vendeva un cavallo. Poiché era giunto un tale e ne esaminava la dentatura, disse: «Perché osservi i suoi denti? Oh, se trottasse tanto quanto mangia!»."}, {"type": "joke", "n": 166, "num": "159", "label": "159", "wit": "AM", "text": "Κυμαῖος ἅλωνα μεγάλην ποιήσας ἔστησεν ἄντικρυς τὴν γυναῖκα αὐτοῦ καὶ ἠρώτα, εἰ βλέπει αὐτόν. τῆς δὲ εἰπούσης, ὅτι μόλις αὐτὸν βλέπει, ἔφη ἐκεῖνος· Ἀλλ’ ἐγὼ εἰς καιρὸν τηλικαύτην ποιήσω ἅλωνα, ἵνα μήτε ἐγὼ σὲ μήτε σὺ ἐμὲ ἴδῃς.", "app": [{"id": "4772-4773", "dirty": false, "lemma": "ἔστησεν ἄντικρυς]", "reading": "ἕστησεν ἄντικρυ §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 172, "span": [30, 46]}, {"id": "4778", "dirty": false, "lemma": "ἠρώτα]", "reading": "ἠρῶτα §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 172, "span": [69, 74]}, {"id": "4796", "dirty": false, "lemma": "ποιήσω]", "reading": "ποιήσας §SIG:M§ ac", "sigla": ["M"], "editors": [], "query": false, "unit": 172, "span": [178, 184]}], "A": "166", "dawe": "159", "tr": "Un Cumano realizzò una grande aia, piazzò sua moglie dalla parte opposta e le chiedeva se lo vedesse. Quando questa rispose che lo guardava a fatica, quello disse: «Ma io in un tempo abbastanza ampio realizzerò un’aia che farà sì che né io guarderò te, né tu me»."}, {"type": "joke", "n": 167, "num": "160", "label": "160", "wit": "AM", "text": "Κυμαῖος ἐπιζητῶν φίλον ἐκάλει αὐτὸν πρὸ τῆς οἰκίας ὀνομαστί. ἑτέρου δὲ εἰπόντος· Ὑψηλότερον φώνησον, ἵνα ἀκούσῃ ἀφεὶς τὸ ὄνομα, ὃ ᾔδει, ἐβόα· Ὑψηλότερε.", "app": [{"id": "4824", "dirty": false, "lemma": "ἀκούσῃ]", "reading": "ἀκούσει §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 173, "span": [105, 111]}], "A": "167", "dawe": "160", "tr": "Un Cumano che cercava un amico lo chiamava per nome davanti casa. Quando un tale gli disse: «Chiamalo più forte, cosicché ti senta!» quello tralasciò il nome che conosceva, e gridava: «Oh, Più forte!»."}, {"type": "joke", "n": 168, "num": "161", "label": "161", "wit": "AM", "text": "Κυμαῖος δανειστοῦ οἰκίᾳ ἐπιβουλεύων καὶ θέλων τὰ μείζονα δάνεια κλέψαι τὰ βαρύτερα χαρτία ἐπελέγετο.", "app": [], "A": "168", "dawe": "161", "tr": "Un Cumano che faceva progetti sulla casa di un debitore e che voleva prendersi un credito ancor più grande, scelse documenti piuttosto pesanti."}, {"type": "joke", "n": 169, "num": "162", "label": "162", "wit": "AM", "text": "Κυμαίων ‹τὴν› πόλιν τειχιζόντων εἷς τῶν πολιτῶν Λολλιανὸς καλούμενος δύο κορτίνας ἰδίοις ἐτείχισεν ἀναλώμασι. πολεμίων δὲ ἐπιστάντων ὀργισθέντες οἱ Κυμαῖοι συνεφώνησαν, ἵνα τὸ Λολλιανοῦ τεῖχος μηδεὶς φυλάξῃ ἀλλ’ ἐκεῖνος μόνος.", "app": [{"id": "4854", "dirty": false, "lemma": "τὴν]", "reading": "dubitanter §SIG:Eberhard§", "sigla": ["Eberhard"], "editors": ["Eberhard"], "query": false, "unit": 175, "span": [9, 12]}, {"id": "4860", "dirty": false, "lemma": "Λολλιανὸς]", "reading": "Λολιανὸς §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 175, "span": [48, 57]}, {"id": "4870", "dirty": false, "lemma": "ὀργισθέντες]", "reading": "post ὀργισθέντες lacunam indicavit §SIG:Dawe§ : irae causa desideretur", "sigla": ["Dawe"], "editors": ["Dawe"], "query": false, "unit": 175, "span": [133, 144]}], "A": "169", "dawe": "162", "tr": "Quando i Cumani cingevano di mura la città, uno dei cittadini, di nome Lolliano, edificò due cortine a spese proprie. Quando allora si presentarono i nemici i Cumani si adirarono e stabilirono che nessuno avrebbe sorvegliato il muro di Lolliano, se non quello, da solo."}, {"type": "joke", "n": 170, "num": "163", "label": "163", "wit": "A", "text": "Κυμαῖοι προσδοκῶντες ἐξ ἀποδημίας φίλον αὐτῶν ἀξιότιμον καὶ βουλόμενοι αὐτὸν ἐν τῷ βαλανείῳ διὰ καθαροῦ ὕδατος τιμῆσαι, μίαν ἔχοντες κολυμβήθραν, ταύτην ὕδατος θερμοῦ καθαροῦ πλήσαντες ἐν μέσῳ αὐτῆς κάγκελλον τρητὸν ἔβαλον, ὅπως τὸ ἥμισυ τοῦ ὕδατος καθαρὸν τῷ προσδοκωμένῳ τηρῆται φίλῳ.", "app": [{"id": "4915", "dirty": false, "lemma": "τρητὸν]", "reading": "§SIG:Minas§ : τρίτον §SIG:A§ : susp §SIG:Thierfelder§ (ricorda di eliminare A in queste voci di apparato, e capire se mettere i due punti prima di corr.)", "sigla": ["A", "Minas", "Thierfelder"], "editors": ["Minas", "Thierfelder"], "query": true, "unit": 176, "span": [209, 215]}], "A": "170", "dawe": "163", "tr": "I Cumani attendevano al rientro da un viaggio un loro spettabile amico, e poiché desideravano onorarlo con acqua pura alle terme, avendo loro una sola vasca, riempirono questa di acqua calda e pura e misero in mezzo ad essa una grata, in modo che una metà dell’acqua sia conservata pura per l’amico atteso."}, {"type": "joke", "n": 171, "num": "164", "label": "164", "wit": "AM", "text": "Κυμαῖος ἐν τῷ κολυμβᾶν βροχῆς γενομένης διὰ τὸ μὴ βραχῆναι εἰς τὸ βάθος κατέδυ.", "app": [{"id": "4943", "dirty": false, "lemma": "κατέδυ]", "reading": "κατέβη §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 177, "span": [72, 78]}], "A": "171", "dawe": "164", "tr": "Siccome scoppiò un acquazzone, un Cumano, in piscina, per non inzupparsi s’immerse sott’acqua."}, {"type": "joke", "n": 172, "num": "165", "label": "165", "wit": "AM", "text": "Κυμαῖος θυρίδας ἀγοράζων ἠρώτα, εἰ δύνανται πρὸς μεσημβρίαν βλέπειν.", "app": [{"id": "4952", "dirty": false, "lemma": "δύνανται]", "reading": "§SIG:Boissonade§ : δύνωνται §SIG:A§ §SIG:M§", "sigla": ["A", "Boissonade", "M"], "editors": ["Boissonade"], "query": false, "unit": 178, "span": [35, 43]}], "A": "172", "dawe": "165", "tr": "Un Cumano che acquistava finestre domandava se esse potessero guardare a mezzogiorno."}, {"type": "joke", "n": 173, "num": "166", "label": "166", "wit": "AM", "text": "Κυμαῖος ὄνῳ καθήμενος παρὰ κῆπον ὥδευεν. ἰδὼν οὖν κλάδον συκῆς ὑπερέχοντα σύκων ὡρίμων πεπληρωμένον ἐπελάβετο τοῦ κλάδου. τοῦ δὲ ὄνου ὑπεκδραμόντος ἀπεκρεμάσθη, καὶ τοῦ κηπουροῦ ἐρωτήσαντος, τί ἐκεῖ ποιεῖ κρεμάμενος, ἔλεγεν· Ἐκ τοῦ ὄνου ἔπεσα.", "app": [{"id": "4961", "dirty": false, "lemma": "καθήμενος]", "reading": "παρακαθήμενος §SIG:M§ : ἐπικαθήμενος §SIG:Eberhard§", "sigla": ["Eberhard", "M"], "editors": ["Eberhard"], "query": false, "unit": 179, "span": [12, 21]}, {"id": "4969", "dirty": false, "lemma": "ὑπερέχοντα]", "reading": "§SIG:Eberhard§ : ὑπέχοντα §SIG:A§ : ἐπέχοντα §SIG:M§", "sigla": ["A", "Eberhard", "M"], "editors": ["Eberhard"], "query": false, "unit": 179, "span": [63, 73]}, {"id": "4971", "dirty": false, "lemma": "ὡρίμων]", "reading": "ὁρίμων §SIG:M§", "sigla": ["M"], "editors": [], "query": false, "unit": 179, "span": [80, 86]}, {"id": "4980", "dirty": false, "lemma": "ἀπεκρεμάσθη]", "reading": "ἀπεκρεμμάσθη §SIG:A§", "sigla": ["A"], "editors": [], "query": false, "unit": 179, "span": [148, 159]}, {"id": "4983", "dirty": false, "lemma": "κηπουροῦ]", "reading": "κηπωροῦ §SIG:M§ §SIG:C§ hinc C incipit", "sigla": ["C", "M"], "editors": [], "query": false, "unit": 179, "span": [169, 177]}, {"id": "4984", "dirty": false, "lemma": "ἐρωτήσαντος]", "reading": "αἰτήσαντος §SIG:C§", "sigla": ["C"], "editors": [], "query": false, "unit": 179, "span": [178, 189]}, {"id": "4986-4987", "dirty": false, "lemma": "ἐκεῖ ποιεῖ]", "reading": "ποιεῖ ἐκεῖ §SIG:C§ : ἐκ σοῦ ποιεῖ §SIG:M§", "sigla": ["C", "M"], "editors": [], "query": false, "unit": 179, "span": [194, 204]}, {"id": "4988", "dirty": false, "lemma": "κρεμάμενος]", "reading": "κρεμμάμενος §SIG:A§ §SIG:C§", "sigla": ["A", "C"], "editors": [], "query": false, "unit": 179, "span": [205, 215]}, {"id": "4990-4991", "dirty": false, "lemma": "Ἐκ τοῦ]", "reading": "ἔκ του dub. §SIG:Dawe§", "sigla":
