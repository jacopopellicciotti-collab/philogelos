":false,"id":"444"}],"A":"193","tr":"Un medico burbero che vedeva solo da un occhio domandava ad un paziente: «Come stai?», e quello disse: «Come vedi». Il medico fece: «Se stai come vedo, la metà di te è morta».","type":"joke"},{"text":"Πρὸς δύσκολον ἰατρὸς προσελθὼν καὶ ἁψάμενος αὐτοῦ εἶπε· Κακὰ πυρέττεις. ὁ δὲ ἀποκριθεὶς εἶπεν· Εἰ δύνασαι σὺ κρείττω πυρέττειν, ἰδοὺ κλίνη· ἀναπεσὼν πύρεττε.","n":194,"dawe":"186","num":"186","wit":"AMC","app":[{"lemma":"Πρὸς","id":"445","dirty":false,"editors":[],"span":[0,4],"reading":"§SIG:A§§SIG:C§ : ρὸς §SIG:M§","unit":445,"sigla":["A","C","M"],"query":false},{"lemma":"Κακὰ","dirty":false,"id":"446","span":[56,60],"unit":446,"reading":"§SIG:A§§SIG:M§ : Πολλὰ §SIG:C§ : Κάκιστα dub. §SIG:Thierfelder§","editors":["Thierfelder"],"sigla":["A","C","M","Thierfelder"],"query":false},{"id":"447","dirty":false,"lemma":"πυρέττεις","query":false,"sigla":["A","C","M"],"editors":[],"reading":"§SIG:A§§SIG:C§ : πυρ ἔττεις §SIG:M§","unit":447,"span":[61,70]},{"dirty":false,"id":"448","lemma":"ἀποκριθεὶς","sigla":["A","C","M"],"query":false,"span":[77,87],"unit":448,"reading":"§SIG:A§§SIG:M§ : om. §SIG:C§","editors":[]},{"lemma":"κρείττω","id":"449","dirty":false,"editors":[],"unit":449,"reading":"§SIG:A§§SIG:M§ : κρειττόνως §SIG:C§","span":[109,116],"query":false,"sigla":["A","C","M"]},{"editors":[],"span":[140,148],"unit":450,"reading":"§SIG:A§§SIG:M§ : καὶ ἀναπεσὼν §SIG:C§","sigla":["A","C","M"],"query":false,"lemma":"ἀναπεσὼν","id":"450","dirty":false}],"label":"186","tr":"Un medico andò da un malato burbero, e dopo averlo toccato disse: «Scotti malamente!». L’altro allora rispose: «Se tu sai scottare meglio, ecco un letto: buttatici sopra e scotta!».","A":"194","type":"joke"},{"type":"joke","A":"195","tr":"Un astrologo burbero che faceva l’oroscopo a un bambino malato annunciò alla madre che quello sarebbe stato longevo e chiedeva il compenso. Quando quella disse: «Vieni domani e te lo darò», fece: «E che faccio, se stanotte muore e io mi gioco il compenso?».","label":"187; 41 β","app":[{"id":"451","dirty":false,"lemma":"γένεσιν","query":false,"sigla":["A","DeRhoer"],"editors":["DeRhoer"],"unit":451,"reading":"§SIG:DeRhoer§ : γέννησιν §SIG:A§","span":[35,42]},{"editors":["Minas"],"reading":"§SIG:Minas§ : πολλυχρόνιον §SIG:A§","unit":452,"span":[50,61],"query":false,"sigla":["A","Minas"],"lemma":"πολυχρόνιον","id":"452","dirty":false},{"sigla":["A","Boissonade"],"query":false,"span":[62,67],"unit":453,"reading":"§SIG:Boissonade§ : αὐτὸ §SIG:A§","editors":["Boissonade"],"dirty":false,"id":"453","lemma":"αὐτὸν"}],"wit":"A","num":"187","dawe":"187","n":195,"text":"Δύσκολος ἀστρολόγος παιδὸς νοσεροῦ γένεσιν λέγων, πολυχρόνιον αὐτὸν τῇ μητρὶ ὡς ἐπαγγειλάμενος ᾔτει τὸν μισθόν. τῆς δὲ εἰπούσης· Ἐλθόντι σοι αὔριον δώσω ἔφη· Τί οὖν, ἐὰν τὴν νύκτα ἀποθάνῃ καὶ ἐγὼ τὸν μισθὸν ἀπόλλω;"},{"wit":"AM","text":"Δυσκόλου κεράμιον μέλιτος ἀγοράσαντος καὶ ὑπό τινος ἐρωτηθέντος, πόσου ἠγόρασεν, καταστρέφων τὸ κεράμιον ἔλεγεν· Οὕτω μου ἐκχυθῇ τὸ αἷμα, ἐὰν εἴπω ὑμῖν.","n":196,"num":"188","dawe":"188","type":"joke","app":[{"lemma":"ἐκχυθῇ","dirty":false,"id":"454","unit":454,"reading":"§SIG:A§§SIG:M§ : ἐκχυθήτω dub. §SIG:Eberhard§ : ἐκχυθείη §SIG:Minas§","span":[122,128],"editors":["Eberhard","Minas"],"query":false,"sigla":["A","Eberhard","M","Minas"]}],"label":"188; 42 β","tr":"Quando un burbero comprò un vaso di miele e gli fu chiesto a quanto lo avesse comprato, capovolse il vaso e diceva: «Così coli il mio sangue, se ve lo dovessi dire!».","A":"196"},{"wit":"AMC","num":"189","dawe":"189","n":197,"text":"Πρὸς δύσκολον ἄρρωστον ἰατρὸς προσελθὼν προσέταξε ψιχία μετὰ στρουθίου φαγεῖν. καὶ ὁ δύσκολος εἶπε· Πῶς δύναμαι εἰς τὸ κλουβίον εἰσελθεῖν, ἵνα φάγω μετὰ τοῦ στρουθίου τὰ ψιχίδια;","type":"joke","A":"197","tr":"Un medico si recò da un ammalato burbero e gli prescrisse di mangiare mollichine con un uccellino. Allora il burbero disse: «Come posso entrare nella gabbia per mangiare le mollichine con l’uccellino?».","label":"189","app":[{"query":false,"sigla":["A","C","M"],"editors":[],"reading":"§SIG:A§ : ψιχίαν §SIG:C§ : ψυχια §SIG:M§","unit":455,"span":[50,55],"id":"455","dirty":false,"lemma":"ψιχία"},{"query":false,"sigla":["A","C","M"],"editors":[],"unit":456,"reading":"§SIG:A§§SIG:M§ : μετὰ τοῦ §SIG:C§","span":[56,60],"id":"456","dirty":false,"lemma":"μετὰ"},{"query":false,"sigla":["A","C","M"],"unit":457,"reading":"§SIG:A§§SIG:C§ : om. §SIG:M§","span":[116,118],"editors":[],"dirty":false,"id":"457","lemma":"τὸ"},{"lemma":"κλουβίον","dirty":false,"id":"458","unit":458,"reading":"§SIG:A§§SIG:M§ : κλουβίν §SIG:C§","span":[119,127],"editors":[],"query":false,"sigla":["A","C","M"]},{"sigla":["A","C","M"],"query":false,"span":[170,177],"reading":"§SIG:A§§SIG:C§ : ψυχιδία §SIG:M§","unit":459,"editors":[],"dirty":false,"id":"459","lemma":"ψιχίδια"}]},{"type":"joke","tr":"Mentre un burbero giocava a dadi, un fannullone che stava lì seduto gli dava consigli. Il burbero allora, irritandosi gli chiese: «Qual è il tuo lavoro? E perché stai senza far nulla?». Quando quello disse: «Sono un rammendatore, ma non ho lavoro», il burbero si strappò il chitone, glielo diede e disse: «Prendi, lavora e taci!».","A":"198","app":[{"editors":["Minas"],"span":[21,32],"unit":460,"reading":"§SIG:Minas§ : κατεπέτασε §SIG:A§","sigla":["A","Minas"],"query":false,"lemma":"κατεπέτασσέ","id":"460","dirty":false},{"sigla":["A","Dawe"],"query":false,"editors":["Dawe"],"span":[86,98],"unit":461,"reading":"§SIG:A§ : Ποὶαν οἶδας τέχνην §SIG:Dawe§","id":"461","dirty":false,"lemma":"Ποίας τέχνης"},{"id":"462","dirty":false,"lemma":"τὸν χιτῶνα","sigla":["A","Minas"],"query":false,"editors":["Minas"],"span":[189,199],"reading":"§SIG:A§ : τὸν ἑαυτοῦ χιτῶνα §SIG:Minas§","unit":462}],"label":"190; 43 β","wit":"A","n":198,"dawe":"190","num":"190","text":"Δυσκόλου ταυλίζοντος κατεπέτασσέ τις ἀργὸς καθήμενος. ὁ δὲ θυμούμενος ἠρώτησεν αὐτόν· Ποίας τέχνης; καὶ διὰ τί ἀργεῖς; ἐκείνου δὲ εἰπόντος ὅτι Ῥάπτης εἰμί, ἔργον δὲ οὐκ ἔχω διαρρήξας αὐτοῦ τὸν χιτῶνα καὶ ἐπιδοὺς εἶπε· Λαβὼν ἐργάζου καὶ σιώπα."},{"type":"joke","label":"191; 45 β","app":[],"A":"199","tr":"Un tale chiese ad un burbero: «Dove abiti?» e quello disse: «Trasloco da lì!».","wit":"A","text":"Δύσκολόν τις ἠρώτα· Ποῦ μένεις; ὁ δὲ εἶπεν· Ἐκεῖθεν μεταβαίνω.","dawe":"191","num":"191","n":199},{"label":"192","app":[{"id":"463","dirty":false,"lemma":"Σικελίᾳ","query":false,"sigla":["A","Minas"],"editors":["Minas"],"reading":"§SIG:Minas§ : Σικελλία §SIG:A§","unit":463,"span":[116,123]}],"A":"200","tr":"Un tale incontrò un armatore burbero e disse: «Ho visto il tuo bacino a Rodi!», e quello rispose: «E io ho visto il tuo fegato in Sicilia».","type":"joke","text":"Δυσκόλῳ τις ναυκλήρῳ ἀπαντήσας εἶπε· Τὸν ἐπίπλουν σου εἶδον ἐν Ῥόδῳ. κἀκεῖνος ἀπεκρίνατο· Κἀγώ σου εἶδον τὸ ἧπαρ ἐν Σικελίᾳ.","dawe":"192","num":"192","n":200,"wit":"A"},{"wit":"AMC","text":"Δύσκολόν τις ἐζήτει. ὁ δὲ ἀπεκρίνατο· Οὐκ εἰμὶ ὧδε. τοῦ δὲ γελάσαντος καὶ εἰπόντος· Ψεύδῃ· τῆς γὰρ φωνῆς σου ἀκούω εἶπεν· Ὦ κάθαρμα, εἰ μὲν ὁ δοῦλός μου εἶπεν, εἶχες ἂν αὐτῷ πιστεῦσαι· ἐγὼ δέ σοι οὐ φαίνομαι ἀξιοπιστότερος ἐκείνου εἶναι;","n":201,"dawe":"193","num":"193","type":"joke","app":[{"lemma":"ἐζήτει","dirty":false,"id":"464","unit":464,"reading":"§SIG:A§§SIG:M§ : προσεζήτει §SIG:C§","span":[13,19],"editors":[],"query":false,"sigla":["A","C","M"]},{"editors":[],"span":[84,89],"reading":"§SIG:A§ : ψεύση §SIG:C§ : ψεύδει §SIG:M§","unit":465,"sigla":["A","C","M"],"query":false,"lemma":"Ψεύδῃ","id":"465","dirty":false},{"span":[169,173],"reading":"§SIG:A§§SIG:M§ : αὐτὸ §SIG:C§","unit":466,"editors":[],"sigla":["A","C","M"],"query":false,"lemma":"αὐτῷ","dirty":false,"id":"466"},{"dirty":false,"id":"467","lemma":"ἀξιοπιστότερος","query":false,"sigla":["A","C","M"],"reading":"§SIG:A§§SIG:M§ : ἀξιόπιστος §SIG:C§","unit":467,"span":[208,222],"editors":[]}],"label":"193; 44 β","tr":"Un tale cercava un burbero. Questi rispose: «Non sono qui». Quando l’altro allora scoppiò a ridere e disse: «Menti: sento infatti la tua voce!», il burbero disse: «Disgraziato, se te lo avesse detto il mio servo, gli avresti creduto, io invece a te non sembro essere degno di maggior fede di quello?».","A":"201"},{"type":"joke","tr":"Un burbero mentre scendeva una scala inciampò e cadde. Quando il padrone di casa disse: «Chi c’è lì?», rispose: «Io, mi sono ammazzato a costo del mio affitto. Tu che vuoi?».","A":"202","app":[{"reading":"§SIG:Boissonade§ : εἰπόντος οἰκοκυροῦ §SIG:A§","unit":468,"span":[52,70],"editors":["Boissonade"],"query":false,"sigla":["A","Boissonade"],"lemma":"οἰκοκυροῦ εἰπόντος","dirty":false,"id":"468"},{"id":"469","dirty":false,"lemma":"Ἐγὼ","sigla":["A","Dawe"],"query":false,"editors":["Dawe"],"span":[98,101],"reading":"§SIG:A§ : Ἐγὼ ἔσω §SIG:Dawe§","unit":469},{"span":null,"reading":"§SIG:A§ : ἐγώ σου ἔνοικος ἐλάκησα §SIG:Cataudella§","unit":470,"editors":["Cataudella"],"sigla":["A","Cataudella"],"query":false,"lemma":"Ἐγὼ … ἐλάκησα","dirty":false,"id":"470"},{"sigla":["Dawe"],"query":false,"editors":["Dawe"],"span":null,"unit":471,"reading":"del. §SIG:Dawe§","id":"471","dirty":false,"lemma":"καὶ συντυχεῖν"},{"query":false,"sigla":["A","M"],"editors":[],"unit":472,"reading":"§SIG:A§ : περὶ ἀφυῶν §SIG:M§","span":null,"id":"472","dirty":false,"lemma":""}],"label":"194; 46 β","wit":"A","n":202,"dawe":"194","num":"194","text":"Δύσκολος σκάλαν καταβαίνων σφαλεὶς κατέπεσε. τοῦ δὲ οἰκοκυροῦ εἰπόντος· Τίς ἔνι ἐκεῖ; ἀπεκρίνατο· Ἐγὼ τοῦ ἐνοικίου μου ἐλάκησα. τί πρὸς σέ;"},{"app":[],"label":"195","tr":"Un tale diceva ad un burbero di rango senatorio: «Desidero vederti e incontrarti un po’». E quello rispose: «Anche io desidero vederti cieco e zoppo».","A":"203","type":"joke","text":"","n":203,"dawe":"195","num":"195","wit":"AM"},{"text":"ἀφυεῖς","app":[],"type":"section"},{"app":[],"label":"196","tr":"Ad un grammatico incapace fu domandato: «Come bisogna dire, “ai due” o “ai dui”?», e questi protese la mano e indicava due dita.","A":"204","type":"joke","text":"Ἀφυὴς γραμματικὸς ἐρωτηθείς· Πῶς δεῖ λέγειν, τοῖς δύο ἢ τοῖς δυσί; ὁ δὲ τὴν χεῖρα προτείνας τοὺς δύο ὑπεδείκνυε δακτύλους.","n":204,"dawe":"196","num":"196","wit":"A"},{"n":205,"num":"197","dawe":"197","text":"Ἀφυὴς γραμματικὸς ἐρωτηθείς· Ἡ μήτηρ Πριάμου τίς ἐκαλεῖτο; ἀπορῶν ἔφη· Ἡμεῖς κατὰ τιμὴν κυρίαν αὐτὴν καλοῦμεν.","wit":"AM","tr":"Ad un grammatico incapace fu domandato: «Come si chiamava la madre di Priamo?». Non sapendo rispondere, disse: «Noi, per rispetto, la chiamiamo signora».","A":"205","app":[],"label":"197","type":"joke"},{"dawe":"198","num":"198","n":206,"text":"Ἀφυὴς κουρεὺς τοῖς ὑπ’ αὐτοῦ πληττομένοις ἔμπλαστρα προσετίθει. ἑνὸς δὲ αἰτιασαμένου αὐτὸν ἔφη· Ἀχάριστε, μάτην ἀγανακτεῖς· ἑνὸς γὰρ δηναρίου ξυράμενος τεσσάρων δηναρίων ἔμπλαστρα ἔλαβες.","wit":"AM","A":"206","tr":"Un barbiere incapace applicava impiastri lenitivi a quelli che venivano rasati da lui. Quando uno gliene aveva chieste le ragioni, disse: «Ingrato, ti arrabbi invano: rasato infatti al costo di un denaro, hai ricevuto impiastri per una valore di quattro denari!».","label":"198","app":[{"id":"473","dirty":false,"lemma":"προσετίθει","query":false,"sigla":["A","M"],"editors":[],"unit":473,"reading":"§SIG:A§ : ἐτίθει §SIG:M§","span":[52,62]},{"lemma":"δηναρίου","id":"474","dirty":false,"editors":[],"unit":474,"reading":": διναρίου §SIG:A§ac§SIG:M§, corr. §SIG:A§2","span":[133,141],"query":false,"sigla":["A","M"]},{"lemma":"ξυράμενος","id":"475","dirty":false,"editors":[],"unit":475,"reading":"§SIG:A§ : ξηρὰμενος §SIG:M§","span":[142,151],"query":false,"sigla":["A","M"]},{"lemma":"δηναρίων","dirty":false,"id":"476","span":[161,169],"reading":": διναρίων §SIG:A§ac§SIG:M§, corr. §SIG:A§2","unit":476,"editors":[],"sigla":["A","M"],"query":false},{"sigla":["A","M"],"query":false,"editors":[],"span":[180,186],"reading":"§SIG:A§ : ἔβαλας §SIG:M§","unit":477,"id":"477","dirty":false,"lemma":"ἔλαβες"}],"type":"joke"},{"type":"joke","label":"199","app":[{"dirty":false,"id":"478","lemma":"παρωνυχίδας","query":false,"sigla":["A","Minas"],"unit":478,"reading":"§SIG:Minas§ : παρονυχίδας §SIG:A§","span":[36,47],"editors":["Minas"]},{"id":"479","dirty":false,"lemma":"ἀφίησί","sigla":["A","Kurtz"],"query":false,"editors":["Kurtz"],"span":[128,134],"unit":479,"reading":"§SIG:Kurtz§ : ἀφίης §SIG:A§"}],"A":"207","tr":"Un apprendista incapace tagliò male le unghie ad un tale, gli fece venire dei paterecci e dopo essere stato perciò scacciato da quel tale, si lamentò: «Capo, perché non mi lasci imparare?».","wit":"A","text":"Ἀφυὴς μαθητὴς κακῶς τινα κείρας καὶ παρωνυχίδας ποιήσας καὶ διὰ τοῦτο ὑπὸ τοῦ ὀνυχιζομένου ἀπωσθεὶς ἀνεβόησεν· Ἐπιστάτα, τί οὐκ ἀφίησί με μαθεῖν;","dawe":"199","num":"199","n":207},{"tr":"Un apprendista incapace venne incaricato dal capo di tagliare le unghie ad un signore rispettabile e scoppiò a piangere. Quando questi gliene chiese il motivo, disse: «Ho paura e piango: sto infatti per ferirti, e ti verranno dei paterecci, e il capo mi picchierà!».","A":"208","app":[{"query":false,"sigla":[],"editors":[],"unit":480,"reading":"","span":[119,128],"id":"480","dirty":false,"lemma":"καὶ κλαίω"},{"query":false,"sigla":["A","Minas"],"editors":["Minas"],"reading":"§SIG:Minas§ : παρονυχίδας §SIG:A§","unit":481,"span":[160,171],"id":"481","dirty":false,"lemma":"παρωνυχίδας"}],"label":"200","type":"joke","n":208,"dawe":"200","num":"200","text":"Ἀφυὴς μαθητὴς ὑπὸ τοῦ ἐπιστάτου κελευσθεὶς ὀνυχίσαι οἰκοδεσπότην ἐδάκρυσε. τοῦ δὲ τὴν αἰτίαν ἐρωτήσαντος ἔφη· Φοβοῦμαι καὶ κλαίω· μέλλω γὰρ τραυματίσαι σε, καὶ παρωνυχίδας ποιήσεις, καὶ τύψει με ὁ ἐπιστάτης.","wit":"A"},{"num":"201","dawe":"201","n":209,"text":"Ἀφυεῖ μάντει προσελθών τις ἐξ ἀποδημίας ἀνιὼν ἠρώτα περὶ τῶν οἰκείων. ὁ δὲ εἶπεν· Ὑγιαίνουσι πάντες, καὶ ὁ πατήρ σου. τοῦ δὲ εἰπόντος ὅτι Ὁ πατήρ μου δέκατον ἔτος ἔχει ἀφ’ οὗ ἀπέθανεν ἀπεκρίνατο· Οὐδὲν γὰρ οἶδας τὸν κατὰ ἀλήθειάν σου πατέρα.","wit":"A","A":"209","tr":"Un tale si recò da un indovino incapace mentre ritornava da un viaggio all’estero e gli faceva domande riguardo i familiari. Questi disse: «Sono tutti in salute, anche tuo padre». Siccome quello allora aveva detto: «mio padre è dieci anni che è morto!», l’indovino rispose: «Infatti non conosci affatto il tuo vero padre».","label":"201","app":[{"sigla":["A","Minas","Thierfelder"],"query":false,"span":[196,201],"unit":482,"reading":"§SIG:A§ : ουδὲ §SIG:Minas§ : οὐ dub. §SIG:Thierfelder§","editors":["Minas","Thierfelder"],"dirty":false,"id":"482","lemma":"Οὐδὲν"},{"lemma":"γὰρ … κατὰ","dirty":false,"id":"483","span":[202,220],"unit":483,"reading":"§SIG:A§ : ἄρ’ οἶδας κατὰ τὸν κατὰ dub. §SIG:Dawe§","editors":["Dawe"],"sigla":["A","Dawe"],"query":false}],"type":"joke"},{"wit":"AC","n":210,"dawe":"202","num":"202","text":"Ἀφυὴς μαθηματικὸς παιδίου γένεσιν λέγων εἶπεν· Οὗτος ἔσται ῥήτωρ, εἶτα ἔπαρχος, εἶτα ἡγεμών. τεθνηκότος οὖν τοῦ παιδὸς τούτου ἡ μήτηρ ἀπαντήσασα εἶπεν· Ὃν ἔλεγες ῥήτορα ἔσεσθαι καὶ ἄρχοντα καὶ ἡγεμόνα, ἀπέθανεν. ὁ δὲ ἔφη· Μὰ τὴν αὐτοῦ μνήμην, ἐὰν ἔζησε, πάντα ταῦτα ἂν ἐγένετο.","type":"joke","tr":"Un astrologo incapace mentre esponeva il destino di un bambino, disse: «Costui sarà retore, poi prefetto, poi governatore di provincia!». Quindi, quando proprio questo bambino era ormai morto, la madre incontrò l’indovino e gli disse: «Quello che dicevi sarebbe stato retore, e magistrato, e governatore, è morto». Questi allora fece: «Oh, per la sua memoria, se fosse vissuto, sarebbe diventato tutte queste cose».","A":"210","app":[{"dirty":false,"id":"484","lemma":"μαθηματικὸς","sigla":["A","C"],"query":false,"span":[6,17],"unit":484,"reading":": μαθητικὸς §SIG:A§ : μάθη §SIG:C§","editors":[]},{"query":false,"sigla":["A","C"],"editors":[],"unit":485,"reading":"§SIG:A§ : ῥήτωρ ἔσται §SIG:C§","span":[53,64],"id":"485","dirty":false,"lemma":"ἔσται ῥήτωρ"},{"lemma":"εἶπεν·","dirty":false,"id":"486","span":[145,150],"unit":486,"reading":"§SIG:A§ : ἔφη §SIG:C§","editors":[],"sigla":["A","C"],"query":false},{"lemma":"πάντα ταῦτα","dirty":false,"id":"487","reading":"§SIG:A§ : ταῦτα πάντα §SIG:C§","unit":487,"span":[254,265],"editors":[],"query":false,"sigla":["A","C"]}],"label":"202"},{"type":"joke","app":[],"label":"203","tr":"Un tale si recò da un indovino incapace e gli domandava se un suo rivale avrebbe fatto ritorno da un viaggio all’estero. L’indovino rispose che non sarebbe tornato. Come il tale apprese giorni dopo che quello era rientrato, disse: «Nessuno è più inetto di lui!».","A":"211","wit":"A","text":"Ἀφυεῖ μάντει προσελθών τις ἠρώτα, εἰ ὁ ἐχθρὸς αὐτοῦ ἐξ ἀποδημίας ἥξει. ὁ δὲ εἶπεν, ὅτι οὐκ ἔρχεται. ὡς δὲ ἔμαθε μεθ’ἡμέρας παραγενόμενον αὐτόν, ἔφη· Οὐδὲν αὐτοῦ ἀχρωμότερον.","n":211,"num":"203","dawe":"203"},{"wit":"A","n":212,"num":"204","dawe":"204","text":"Ἀφυὴς μαθηματικὸς μοιρολογῶν τινα ἔφη· Οὐκ ἦν σοι κατὰ γένος τεκνῶσαι. τοῦ δὲ εἰπόντος ὅτι Ἑπτὰ παῖδας ἔχω εἶπεν· Οὐκοῦν πρόσεχε αὐτοῖς.","type":"joke","tr":"Un astrologo incapace mentre prediceva il fato ad un tale disse: «Per nascita non ti era possibile procreare». Quando però quello fece: «Ho sette figli!», disse: «Allora devi starci attento».","A":"212","app":[{"editors":["Minas"],"unit":488,"reading":"§SIG:Minas§ : μαθητικὸς §SIG:A§","span":[6,17],"query":false,"sigla":["A","Minas"],"lemma":"μαθηματικὸς","id":"488","dirty":false},{"lemma":"μοιρολογῶν","dirty":false,"id":"489","reading":"§SIG:Haupt§ : μακρολογῶν","unit":489,"span":[18,28],"editors":["Haupt"],"query":false,"sigla":["Haupt"]},{"lemma":"","id":"490","dirty":false,"editors":["Eberhard"],"unit":490,"reading":"lacunam indicavit §SIG:Eberhard§","span":null,"query":false,"sigla":["Eberhard"]},{"sigla":["A","Boissonade"],"query":false,"editors":["Boissonade"],"span":null,"reading":"§SIG:Boissonade§ : νικήσεσθε §SIG:A§","unit":491,"id":"491","dirty":false,"lemma":"Νικήσετε"},{"id":"492","dirty":false,"lemma":"τοὺς πολεμίους","sigla":["A","Dawe","Haupt"],"query":false,"editors":["Dawe","Haupt"],"span":null,"reading":"§SIG:Haupt§ : τοὺς πολεμίους §SIG:Dawe§ : τὸν πὸλεμον §SIG:A§","unit":492},{"query":false,"sigla":["A","Minas"],"unit":493,"reading":"§SIG:Minas§ : ἐξώπισθεν §SIG:A§","span":null,"editors":["Minas"],"dirty":false,"id":"493","lemma":"ἐξόπισθεν"}],"label":"204"},{"wit":"A","n":213,"dawe":"205","num":"205","text":"","type":"joke","tr":"Un indovino incapace che si era imbattuto in alcuni nemici e che aveva detto: «Sono un indovino!» ‹…›, siccome stava per iniziare una battaglia contro gli avversari disse: «Vincerete i nemici, se in battaglia essi non vedranno i capelli delle vostre teste da dietro».","A":"213","app":[],"label":"205"},{"type":"section","text":"δειλοί","app":[]},{"tr":"A un fifone fu chiesto: «Quali sono le navi più sicure? Quelle da guerra o quelle mercantili?», e disse: «Quelle tirate in secco!».","A":"214","app":[],"label":"206","type":"joke","n":214,"dawe":"206","num":"206","text":"Δειλὸς ἐρωτηθείς· Ποῖα τῶν πλοίων ἀσφαλέστερα, τὰ μακρὰ ἢ τὰ στρογγύλα; ἔφη· Τὰ νενεωλκημένα.","wit":"A"},{"tr":"Un cacciatore fifone che la notte veniva continuamente inseguito nel sonno da un orso comprò dei cani e li mise a dormire con sé.","A":"215","app":[{"sigla":["A","M","Minas"],"query":false,"editors":["Minas"],"span":[88,103],"reading":"§SIG:A§§SIG:M§ : μεθ’ ἑαυτοῦ §SIG:Minas§","unit":494,"id":"494","dirty":false,"lemma":"αὐτοῦ ἐκοίμιζεν"},{"lemma":"","dirty":false,"id":"495","unit":495,"reading":"ἐκόμιζεν §SIG:A§","span":null,"editors":[],"query":false,"sigla":["A"]}],"label":"207","type":"joke","n":215,"num":"207","dawe":"207","text":"Δειλὸς κυνηγὸς συνεχῶς τὴν νύκτα ὑπὸ ἄρκτου διωκόμενος ἐν ὕπνῳ, κύνας μισθωσάμενος μετ’ αὐτοῦ ἐκοίμιζεν.","wit":"AM"},{"A":"216","tr":"Un tale dice ad un pugile fifone: «Con chi devi combattere?», e quello: «Con questo mio spettabile signore».","label":"208","app":[{"lemma":"τὸν","id":"496","dirty":false,"editors":["Minas"],"span":[60,63],"unit":496,"reading":"§SIG:Minas§ : κἀκεῖ §SIG:A§","sigla":["A","Minas"],"query":false}],"type":"joke","num":"208","dawe":"208","n":216,"text":"Δειλῷ πύκτῃ λέγει τις· Μετὰ τίνος ἔχεις πυκτεῦσαι; κἀκεῖνος τὸν ἀντίπαλον ὑποδείξας ἔφη· Μετὰ τοῦ κυρίου μου τοῦδε.","wit":"A"},{"app":[{"lemma":"ἅμα …","id":"497","dirty":false,"editors":["Dawe","Minas"],"reading":"§SIG:A§ : ὑμῶν μὴ ἅμα παίσειν §SIG:Dawe§ : ὑμῶν μὴ πάντες ὁμοῦ §SIG:Minas§","unit":497,"span":[73,76],"query":false,"sigla":["A","Dawe","Minas"]},{"id":"498","dirty":false,"lemma":"μύρμηκας","query":false,"sigla":["A","M"],"editors":[],"unit":498,"reading":"§SIG:A§ : ἔχειν §SIG:M§","span":null}],"label":"209; cf. 226 α","tr":"Un pugile fifone che veniva senza sosta sarchiato di botte da un avversario gridò: «Chiedo pietà a voi tutti!».","A":"217","type":"joke","text":"Δειλὸς πύκτης συνεχῶς ὑπὸ ἀντιδίκου κοσκινιζόμενος ἀνεβόησε· Δέομαι ὑμῖν ἅμα πᾶσιν.","n":217,"num":"209","dawe":"209","wit":"A"},{"text":"","num":"210","dawe":"210","n":218,"wit":"AM","label":"210; cf. 179 α","app":[],"A":"218","tr":"Un pugile fifone che stava acquistando un terreno chiedeva per bene ai locali se non ci fossero formiche2.§I§ §/I§","type":"joke"},{"app":[],"text":"ὀκνηροί","type":"section"},{"text":"Ὀκνηρῶν δύο ὁμοῦ κοιμωμένων εἰσελθών τις κλέπτης τὸν σάγον ὑποσύρας ἔκλεψε. τοῦ δὲ ἑνὸς αἰσθομένου καὶ πρὸς τὸν ἕτερον εἰπόντος· Ἀναστὰς φθάσον τὸν κλέψαντα τὸν σάγον εἶπεν· Ἄφες· ὅταν ἔλθῃ ἐπᾶραι τὴν τύλην, κρατοῦμεν αὐτόν.","dawe":"211","num":"211","n":219,"wit":"AC","label":"211; 54 β","app":[{"reading":"§SIG:A§ : κλέπτης τις §SIG:C§","unit":499,"span":[41,52],"editors":[],"query":false,"sigla":["A","C"],"lemma":"κλέπτης τὸν","dirty":false,"id":"499"},{"editors":[],"unit":500,"reading":"§SIG:A§§SIG:C§ : ἑσθωμένου","span":[99,102],"query":false,"sigla":["A","C"],"lemma":"καὶ","id":"500","dirty":false},{"query":false,"sigla":["A","C"],"reading":"§SIG:A§ : ἔφη §SIG:C§","unit":501,"span":[174,184],"editors":[],"dirty":false,"id":"501","lemma":"Ἄφες·ὅταν"},{"id":"502","dirty":false,"lemma":"τὴν","sigla":["A","C"],"query":false,"editors":[],"span":[197,200],"unit":502,"reading":"§SIG:A§ : ἐπαρεῖν §SIG:C§"},{"lemma":"κρατοῦμεν","dirty":false,"id":"503","unit":503,"reading":"§SIG:Boissonade§ cl. 54 β : στήλην §SIG:A§§SIG:C§ : στέγην §SIG:Cataudella§","span":[208,217],"editors":["Boissonade","Cataudella"],"query":false,"sigla":["A","Boissonade","C","Cataudella"]},{"sigla":["A","C"],"query":false,"span":[218,223],"reading":"§SIG:A§ : πιάσωμεν §SIG:C§","unit":504,"editors":[],"dirty":false,"id":"504","lemma":"αὐτόν"}],"A":"219","tr":"Mentre due pigroni stavano dormendo, entrò un ladro, sfilò loro il lenzuolo e lo rubò. Quando uno dei due se ne accorse e disse all’altro: «Alzati e raggiungi chi ha rubato il lenzuolo», questi disse: «Lascialo andare… quando tornerà a prendere il materasso, lo avremo in pugno».","type":"joke"},{"text":"Ὀκνηρῷ υἱῷ ἐκέλευσεν ὁ πατὴρ εἰς τὸν γείτονα ἀπελθεῖν καὶ χρήσασθαι ἀξίνην. ὁ δὲ ἔφη· Οὐ δίδει. τοῦ δὲ πατρὸς ἐπιμένοντος ἀπεκρίνατο· Ἐγώ εἰμι ὁ γείτων καὶ ἀξίνην οὐκ ἔχω.","n":220,"dawe":"212","num":"212","wit":"A","app":[{"span":[122,132],"unit":505,"reading":"lacunam post ἐπιμένοντος statuit §SIG:Dawe§","editors":["Dawe"],"sigla":["Dawe"],"query":false,"lemma":"ἀπεκρίνατο","dirty":false,"id":"505"},{"id":"506","dirty":false,"lemma":"ἐχρεώστει","query":false,"sigla":["A","C"],"editors":[],"reading":"§SIG:C§ : δινάριον ubique §SIG:A§ac corr. §SIG:A§2","unit":506,"span":null}],"label":"212; 55 β","tr":"Il padre ordinò al figlio pigrone di recarsi dal vicino e prendere in prestito un’accetta. Questi allora disse: «Tanto non la dà…». Poiché però il padre insisteva, rispose: «Io sono il vicino, e non ho un’accetta!».","A":"220","type":"joke"},{"wit":"AC","text":"","n":221,"dawe":"213","num":"213","type":"joke","app":[],"label":"213; 56 β","tr":"Un pigrone aveva un credito di un denaro con un altro pigrone. Dopo averlo incontrato, gli chiedeva il denaro. Quando il secondo allora disse: «Allunga la tua mano, aprimi il borsellino e prendi il denaro», quello fece: «Va’ pure per la tua strada, non mi devi nulla…».","A":"221"},{"app":[],"text":"φθονεροί","type":" §SIG:A§","span":[115,121],"query":false,"sigla":["A","Dawe"]},{"lemma":"","id":"527","dirty":false,"editors":["Dawe"],"reading":"post ἐρίφια notam interrogationis add. §SIG:Dawe§","unit":527,"span":null,"query":false,"sigla":["Dawe"]}],"label":"222","tr":"Un medico visitò un malato morto di fame e gli prescrisse di assumere come liquido un’orzata. Se non l’avesse trovata, in alternativa della cervogia. Il morto di fame disse allora: «Se non dovessi trovare la cervogia, potrei mangiare due cerbiatti?».","A":"230","type":"joke"},{"dawe":"223","num":"223","n":231,"text":"Λιμόξηρος ἰδὼν ἄρτον ἐν ὑπερθύρῳ κείμενον εἶπε· Θεέ, ἢ ἐμὲ ὕψωσον ἢ ἐκεῖνον ταπείνωσον.","wit":"AC","A":"231","tr":"Un morto di fame un pane posto su un architrave e disse: «Dio, o innalzi me, o abbatti quello».","label":"223; 53 β","app":[{"reading":"§SIG:A§ : τοῦτον §SIG:C§","unit":528,"span":[76,86],"editors":[],"query":false,"sigla":["A","C"],"lemma":"ταπείνωσον","dirty":false,"id":"528"}],"type":"joke"},{"wit":"AC","text":"Λιμόξηρος ἀπελθὼν εἰς κηπουρὸν ἔδωκε τέσσαρα δηνάρια, ἵνα σῦκα, ὅσα θέλει, φάγῃ. τοῦ δὲ καταφρονήσαντος καὶ εἰπόντος· Ἀπὸ τῶν παρακειμένων δένδρων φάγε, ὅσα δύνασαι ἀνελθὼν εἰς μεγάλας συκᾶς καὶ ἀπὸ κορυφῆς ἀρξάμενος πάντα κατήσθιε. μετὰ δὲ πολλὴν ὥραν ἀναμνησθεὶς ὁ κηπουρὸς ἐπεζήτει αὐτόν. ὡς δὲ εἶδεν εἰς ὕψος σαλεύοντα τοὺς κλάδους καὶ ἐσθίοντα, ἀγανακτήσας εἶπε· Κάτω ἑστὼς οὐκ ἠδύνω ἐκ τῶν ἐπικειμένων κλάδων φαγεῖν; ὁ δὲ ἀπεκρίνατο· Ἐκεῖνα, ὡς καταβαίνω, τρώγω.","num":"224","dawe":"224","n":232,"type":"joke","label":"224","app":[{"dirty":false,"id":"529","lemma":"ἔδωκε","sigla":["A","C"],"query":false,"span":[31,36],"reading":"§SIG:A§ : κηπωρὸν §SIG:C§","unit":529,"editors":[]},{"query":false,"sigla":["A","C"],"editors":[],"unit":530,"reading":"§SIG:C§ : δινάρια §SIG:A§","span":[54,57],"id":"530","dirty":false,"lemma":"ἵνα"},{"query":false,"sigla":["A","C"],"unit":531,"reading":"§SIG:A§ : σύκα §SIG:C§","span":[64,67],"editors":[],"dirty":false,"id":"531","lemma":"ὅσα"},{"dirt  di dargli due denari perché potesse rimpinzarsi di pane. Siccome questi riteneva che un pane sarebbe bastato all’avventore e aveva accettato i soldi, il morto di fame iniziò a mangiare. Questi iniziò dal cesto, si piazzò in piedi e si mise a mangiare. Quando il panettiere sbigottì e disse: «Siediti e mangia così», rispose: «I pani nel cesto voglio mangiarli stando in piedi, quelli sulla mensola seduto!».","label":"225","app":[{"dirty":false,"id":"537","lemma":"προσελθὼν ᾔτει","sigla":["A","C"],"query":false,"span":[20,34],"unit":537,"reading":"§SIG:A§ : ἀρτοπράτη (η ex corr.) περιπεθὼν §SIG:C§","editors":[]},{"unit":538,"reading":"§SIG:A§ : εἶπεν §SIG:C§ac","span":[42,49],"editors":[],"query":false,"sigla":["A","C"],"lemma":"δηνάρια","dirty":false,"id":"538"},{"reading":"§SIG:C§ : δινάρια §SIG:A§ac","unit":539,"span":[50,53],"editors":[],"query":false,"sigla":["A","C"],"lemma":"δύο","dirty":false,"id":"539"},{"lemma":"χορτάσῃ","dirty":false,"id":"540","unit":540,"reading":"§SIG:C§ : ἄρτον §SIG:A§ : ἄρτων §SIG:Minas§","span":[65,72],"editors":["Minas"],"query":false,"sigla":["A","C","Minas"]},{"unit":541,"reading":"§SIG:A§§SIG:C§ : χορτασθῇ §SIG:Eberhard§","span":[74,77],"editors":["Eberhard"],"query":false,"sigla":["A","C","Eberhard"],"lemma":"τοῦ","dirty":false,"id":"541"},{"span":[109,122],"unit":542,"reading":"§SIG:A§ : τοῦτον χορτάσειν §SIG:C§","editors":[],"sigla":["A","C"],"query":false,"lemma":"ἀρκέσειν καὶ","dirty":false,"id":"542"},{"lemma":"λαβόντος","dirty":false,"id":"543","unit":543,"reading":"add. §SIG:Thierfelder§","span":[124,132],"editors":["Thierfelder"],"query":false,"sigla":["Thierfelder"]},{"sigla":["A","C","Eberhard"],"query":false,"span":[133,135],"unit":544,"reading":"§SIG:Eberhard§ : λαβὼν §SIG:A§§SIG:C§","editors":["Eberhard"],"dirty":false,"id":"544","lemma":"τὰ"},{"sigla":["A","C","Minas"],"query":false,"span":[136,150],"reading":"§SIG:A§§SIG:C§ : τὰ δηνάρια· ἐπέτρεψε · ὁ δὲ §SIG:Minas§","unit":545,"editors":["Minas"],"dirty":false,"id": verato da un tale perché, dato che stava bevendo troppo, sragionava, e allora questo, che a causa del vino non riusciva a vedere bene, rispose: «Sono io ubriaco, o tu hai due facce?»","wit":"A","text":"Μέθυσος ὀνειδιζόμενος ὑπό τινος, ὅτι πολλὰ πίνων οὐ φρονεῖ, ὁ δὲ ἀπὸ τοῦ οἴνου καλῶς βλέπειν μὴ δυνάμενος ἀπεκρίνατο· Ἐγὼ μεθύω ἢ σὺ ὁ δύο ἔχων ὄψεις;","num":"228","dawe":"228","n":236},{"dawe":"229","num":"229","n":237,"text":"Μέθυσος ἀτυχὴς ἀμπελῶνα κτησάμενος τῷ τρυγητῷ ἀπέθανεν.","wit":"A","A":"237","tr":"Uno sbevazzone disgraziato acquistò una vigna ma morì durante la vendemmia.","label":"229; 57 β","app":[],"type":"joke"},{"type":"joke","label":"230","app":[],"A":"238","tr":"Uno sbevazzone aprì una taverna e legò un orso alla porta.","wit":"A","text":"","num":"230","dawe":"230","n":238},{"text":"ὀζόστομοι","app":[],"type":"section"},{"wit":"A","dawe":"231","num":"231","n":239,"text":"Ὀζόστομος θέλων ἰδίῳ θανάτῳ ἀποθανεῖν περικαλυψάμενος ἐχασμᾶτο.","type":"joke","A":"239","tr":"Uno con l’alito cattivo che voleva suicidarsi si incappucciò e se ne stette a bocca aperta.","label":"231","app":[]},{"label":"232","app":[{"lemma":"μου","id":"552","dirty":false,"editors":["Dawe"],"unit":552,"reading":"§SIG:Dawe§ : λῦσον §SIG:C§ : λύσον §SIG:A§","span":[62,65],"query":false,"sigla":["A","C","Dawe"]},{"query":false,"sigla":["A","C"],"reading":"§SIG:A§ : ἀπαντήσας §SIG:C§","unit":553,"span":[46,51],"editors":[],"dirty":false,"id":"553","lemma":"ἔλεγε"}],"A":"240","tr":"Uno con l’alito cattivo che baciava di continuo la propria moglie diceva: «La mia signora, la mia Era, la mia Afrodite!» e quella, voltandosi dall’altro lato, diceva: «Il mio puzzone, il mio puzzone!».3","type":"joke","text":"Ὀζόστομος συνεχῶς τὴν γυναῖκα αὐτοῦ καταφιλῶν ἔλεγεν· Ἡ κυρία μου, ἡ Ἥρα μου, ἡ Ἀφροδίτη μου. κἀκείνη ἀποστρεφομένη ἔλεγεν· Ὀζεύς μου, ὀζεύς μου.","num":"232","dawe":"232","n":240,"wit":"AC"},{"text":"Ὀζόστομος κωφῷ ὑπαντήσας ἔλεγε· Χαῖρε κἀκεῖνος εἶπε· Φῦ. τοῦ δὲ εἰρηκότος· Τί γὰρ εἶπον; ἔφη· Ἔβδεσας.","n":241,"num":"233","dawe":"233","wit":"AC","app":[{"id":"554","dirty":false,"lemma":"εἶπε","query":false,"sigla":["A","C"],"editors":[],"unit":554,"reading":"§SIG:A§ : τοῦ δὲ κακεῖνος §SIG:C§","span":[47,51]},{"id":"555","dirty":false,"lemma":"τοῦ","sigla":["A","C"],"query":false,"editors":[],"span":[57,60],"reading":"§SIG:A§ : φυ γε §SIG:C§","unit":555}],"label":"233","tr":"Uno con l’alito cattivo incontrò un sordo e diceva: «Salve!» e quello disse: «Puah!». Siccome l’altro aveva chiesto «Che ho detto mai?!», il sordo fece «Hai scorreggiato!».","A":"241","type":"joke"},{"wit":"AC","n":242,"dawe":"234","num":"234","text":"Ὀζόστομος τὴν γυναῖκα ἠρώτα λέγων· Κυρία, τί μεμισεῖς; κἀκείνη ἀπεκρίνατο λέγουσα· Ὅτι σύ με φιλεῖς.","type":"joke","tr":"Uno con l’alito cattivo chiedeva alla moglie: «Mia signora, perché mi odi?» e quella rispose: «Perché tu mi baci!».","A":"242","app":[{"lemma":"σύ","dirty":false,"id":"556","span":[87,89],"reading":"§SIG:A§ : διότι §SIG:C§","unit":556,"editors":[],"sigla":["A","C"],"query":false}],"label":"234"},{"label":"235","app":[{"lemma":"καὶ","id":"557","dirty":false,"editors":[],"span":[71,74],"unit":557,"reading":"§SIG:A§ : μανδύλ §SIG:C§","sigla":["A","C"],"query":false},{"editors":[],"span":[80,82],"unit":558,"reading":": ἆρον μου §SIG:C§ac corr. §SIG:C§1 : ἄρον §SIG:A§","sigla":["A","C"],"query":false,"lemma":"τὸ","id":"558","dirty":false},{"query":false,"sigla":["A","C"],"editors":[],"unit":559,"reading":"§SIG:A§ : ἀπαντήσας §SIG:C§","span":[26,31],"id":"559","dirty":false,"lemma":"λέγει"},{"query":false,"sigla":["A","C"],"editors":[],"reading":"§SIG:A§ : om. §SIG:C§","unit":560,"span":[44,47],"id":"560","dirty":false,"lemma":"ἴδε"},{"editors":[],"unit":561,"reading":"§SIG:A§ : ἴδε ὅτι §SIG:C§","span":[49,50],"query":false,"sigla":["A","C"],"lemma":"ἡ","id":"561","dirty":false},{"lemma":"ὁ","id":"562","dirty":false,"editors":[],"span":[60,61],"reading":"§SIG:C§ : χανῶντος §SIG:A§","unit":562,"sigla":["A","C"],"query":false},{"lemma":"ἡ","id":"563","dirty":false,"editors":[],"unit":563,"reading":"§SIG:A§ : οὐχ §SIG:C§","span":[68,69],"query":false,"sigla":["A","C"]},{"query":false,"sigla":["A","C"],"editors":[],"reading":"§SIG:A§ : κατέβην §SIG:C§","unit":564,"span":[143,146],"id":"564","dirty":false,"lemma":"ἀλλ"},{"id":"565","dirty":false,"lemma":"σου","sigla":["A","C"],"query":false,"editors":[],"span":[156,159],"reading":"§SIG:A§ : κόλος §SIG:C§","unit":565}],"A":"243","tr":"Uno con l’alito cattivo incontrò un medico e disse: «Signore mio, guarda: la mia ugola è scesa giù!» e quando quello spalancò la bocca, il medico, voltandosi dall’altra parte, diceva: «Non è scesa la tua ugola, ma è salito il tuo culo!».","type":"joke","text":"Ὀζόστομος ἰατρῷ ὑπαντήσας λέγει· Κύριέ μου, ἴδε· ἡ σταφυλή μου κατέβη. καὶ χανόντος ὁ ἰατρὸς ἀποστρεφόμενος ἔλεγεν· Οὐχὶ ἡ σταφυλή σου κατέβη, ἀλλ’ ὁ κῶλός σου ἀνέβη.","num":"235","dawe":"235","n":243,"wit":"AC"},{"label":"236","app":[{"query":false,"sigla":["A","C"],"unit":566,"reading":"§SIG:A§ : μασσώμενος §SIG:C§","span":[47,60],"editors":[],"dirty":false,"id":"566","lemma":"ἐνεβρωμάτισεν"},{"sigla":["A","C"],"query":false,"span":[63,65],"reading":"§SIG:A§ : αυτῶ §SIG:C§","unit":567,"editors":[],"dirty":false,"id":"567","lemma":"τὸ"}],"A":"244","tr":"Uno con l’alito cattivo che viziava il figlio, masticava il cibo e lo imboccava. Questi si voltò dall’altra parte e disse: «Non voglio; papà cacca!».","type":"joke","text":"Ὀζόστομος τὸ τέκνον αὐτοῦ κολακεύων, μασώμενος ἐνεβρωμάτισεν αὐτό. τὸ δὲ ἀποστρεφόμενον ἔλεγεν· Οὐ θέλω· τατὰ κακά.","num":"236","dawe":"236","n":244,"wit":"AC"},{"label":"237","app":[{"id":"568","dirty":false,"lemma":"ὀπτῶν καὶ","query":false,"sigla":["A","Boissonade"],"editors":["Boissonade"],"unit":568,"reading":"§SIG:Boissonade§ : λοκάνικον ὄπτων §SIG:A§","span":[21,30]},{"sigla":["Boissonade","Thierfelder","vanThiel"],"query":false,"span":[58,62],"unit":569,"reading":"§SIG:vanThiel§ : κϋνέαν A : κυνίαν dub. §SIG:Boissonade§ et §SIG:Thierfelder§","editors":["Boissonade","Thierfelder","vanThiel"],"dirty":false,"id":"569","lemma":"αὐτὸ"},{"editors":["Minas"],"span":[73,74],"reading":"§SIG:A§ : ἰσχάδας §SIG:Minas§","unit":570,"sigla":["A","Minas"],"query":false,"lemma":"ὁ","id":"570","dirty":false}],"A":"245","tr":"Uno con l’alito cattivo cuoceva una salsiccia e poiché ci soffiava molto sopra, la trasformò in un escremento canino.","type":"joke","text":"Ὀζόστομος λουκάνικον ὀπτῶν καὶ ἐπὶ πολὺ προσφυσῶν, κυνέαν αὐτὸ ἀπειργάσατο, αὐτὸς συνεχῶς βδέων οὐκ ἐπιστεύετο.","num":"237","dawe":"237","n":245,"wit":"A"},{"type":"joke","A":"246","tr":"Uno con l’alito cattivo andò da un fruttivendolo e chiese: «Signore, hai fichi secchi?» e quello si voltò con disgusto: «Non ho neppure i datteri!».","label":"238","app":[],"wit":"A","num":"238","dawe":"238","n":246,"text":"Ὀζόστομος ἀπελθὼν εἰς ὀπωροπώλην ἠρώτα· Ἔχεις, κῦρι, σχάδας; ὁ δὲ ἀποστραφείς· Οὐδὲ φοινίκια ἔχω."},{"wit":"A","text":"Νεανίσκος τραγῳδὸς ἠγαπήθη ὑπὸ γυναικῶν δύο, ὀζοστόμου καὶ ὀζοχρώτου. καὶ τῆς μιᾶς λεγούσης· Δός μοι, κῦρι, φιλήματα τῆς δὲ ἄλλης· Δός μοι, κῦρι, περιπλοκάς ἐκεῖνος ἀνεβόησεν· Οἴμοι, τί δράσω; δυσὶ κακοῖς μερίζομαι.","n":247,"num":"239","dawe":"239","type":"joke","app":[{"lemma":"καὶ","dirty":false,"id":"571","unit":571,"reading":"§SIG:Minas§ : ὀζοχρώστου §SIG:A§","span":[55,58],"editors":["Minas"],"query":false,"sigla":["A","Minas"]}],"label":"239; 63 β","tr":"Un giovane attore tragico venne amato da due donne, una dall’alito cattivo e l’altra tutta puzzolente. E mentre una diceva: «Signore, dammi dei baci!» e l’altra invece: «Signore, dammi degli abbracci!», quello gridò: «Ahimè, che fare? Sono diviso tra due mali!».","A":"247"},{"tr":"Mentre uno dall'alito fetido e uno dal corpo maleodorante sedevano insieme a teatro, capitò per caso che un giovane si sedesse in mezzo a loro. Accortosi del fetore, si voltava verso quello dall'alito cattivo e domandava: «Chi ha scoreggiato?». Ma dopo aver scoperto che la causa proveniva dalla sua bocca, si voltava verso l’altro e gli parlava all’orecchio; resosi conto però che anche costui appestava, si alzò e scappò via.","A":"248","app":[{"sigla":["A","Eberhard"],"query":false,"editors":["Eberhard"],"span":[53,59],"unit":572,"reading":"§SIG:A§ : καθεζόμενοι §SIG:Eberhard§","id":"572","dirty":false,"lemma":"συνέβη"}],"label":"240","type":"joke","n":248,"dawe":"240","num":"240","text":"Ὀζόστομος καὶ ὀζόχρωτος, ὁμοῦ ἐν θεάτρῳ καθεζομένων, συνέβη μέσον αὐτῶν κατὰ τύχην νεανίσκον καθεσθῆναι. αἰσθομένου δὲ αὐτοῦ τῆς δυσωδίας, στραφεὶς πρὸς τὸν ὀζόστομον ἠρώτα· Τίς ἔβδεσεν; εὑρηκὼς δὲ ἐκ τοῦ στόματος αὐτοῦ τὴν αἰτίαν, στραφεὶς τῷ ἑτέρῳ εἰς τὸ οὖς διελέγετο. γνοὺς δὲ κἀκείνου τὴν δυσωδίαν ἀναστὰς ἔφυγεν.","wit":"A"},{"num":"241","dawe":"241","n":249,"text":"Μωρὸς κωφῷ συγκαθεύδων ἔβδεσε. τοῦ δὲ τὴν δυσωδίαν αἰσθομένου καὶ κατακράξαντος ἔφη· Ἴδε, πῶς ἀκούεις· ἀλλ’ἐμπαίζεις μοι.","wit":"A","A":"249","tr":"Un matto, mentre dormiva insieme a un sordo, scorreggiò. Quando quello se ne accorse e prese ad urlare, disse: «Guarda un po’ come si senti… ma allora mi prendi in giro!».","label":"241","app":[{"editors":["Eberhard"],"span":[94,101],"unit":573,"reading":"§SIG:A§ : ὡς §SIG:Eberhard§","sigla":["A","Eberhard"],"query":false,"lemma":"ἀκούεις","id":"573","dirty":false}],"type":"joke"},{"text":"Ὀζόστομος συνεχῶς εἰς οὐρανὸν βλέπων πολλὰ ηὔχετο. παρακύψας ὁ Ζεὺς λέγει· †μία μία χαρεῖς·† καὶ κάτω θεοὺς ἔχεις.","n":250,"num":"242","dawe":"242","wit":"A","app":[{"editors":["Eberhard"],"span":[37,49],"reading":"§SIG:A§ : πολλὰ βλέπων §SIG:Eberhard§","unit":574,"sigla":["A","Eberhard"],"query":false,"lemma":"πολλὰ ηὔχετο","id":"574","dirty":false},{"editors":["Eberhard"],"span":null,"reading":"post Ζεὺς δ᾿ add. §SIG:Eberhard§","unit":575,"sigla":["Eberhard"],"query":false,"lemma":"","id":"575","dirty":false},{"id":"576","dirty":false,"lemma":"εἰς","sigla":["A","C"],"query":false,"editors":[],"span":[87,90],"unit":576,"reading":"§SIG:C§ : λίξουρος §SIG:A§"}],"label":"242","tr":"Uno con l’alito cattivo, guardando continuamente verso il cielo, rivolgeva molte preghiere. Zeus allora si sporge e dice: «†Hai degli dei anche giù!».","A":"250","type":"joke"},{"app":[{"lemma":"νυκτὶ ὑπὸ","dirty":false,"id":"577","span":[81,91],"reading":"add. §SIG:Thierfelder§ : κατέδαρθεv §SIG:Minas§","unit":577,"editors":["Minas","Thierfelder"],"sigla":["Minas","Thierfelder"],"query":false},{"lemma":"συκὴν τὸν","dirty":false,"id":"578","span":[134,143],"unit":578,"reading":"§SIG:A§ : ὑπὸ τὴν συκὴν ut. vid. §SIG:C§ : ἐπὶ τῆς συκῆς §SIG:Eberhard§","editors":["Eberhard"],"sigla":["A","C","Eberhard"],"query":false},{"id":"579","dirty":false,"lemma":"φίλον1 … καθήμενον","query":false,"sigla":["A","C"],"editors":[],"unit":579,"reading":"§SIG:A§§SIG:C§ : αὐτοῦ τὸν φίλον","span":[144,165]},{"id":"580","dirty":false,"lemma":"ἀναστάντος","query":false,"sigla":["A","C"],"editors":[],"unit":580,"reading":"§SIG:A§§SIG:C§ : σύκα","span":[207,217]},{"editors":[],"unit":581,"reading":"§SIG:A§ : ἀπὸ τῆς συκῆς αὐτῆς χέσαι ἄνωθεν οὖν βιαζόμενος §SIG:C§","span":[235,280],"query":false,"sigla":["A","C"],"lemma":"ἀπὸ1 … τὰ","id":"581","dirty":false},{"id":"582","dirty":false,"lemma":"ἐπέγνω","query":false,"sigla":["A","C"],"editors":[],"unit":582,"reading":"§SIG:A§ : ἐξυπνήσας §SIG:C§","span":[317,323]},{"sigla":["Thierfelder"],"query":false,"span":[360,375],"reading":"del. §SIG:Thierfelder§","unit":583,"editors":["Thierfelder"],"dirty":false,"id":"583","lemma":"φαγὼν ἐκοιμήθη"},{"dirty":false,"id":"584","lemma":"τῆς","query":false,"sigla":["A","C"],"unit":584,"reading":"§SIG:A§ : ἐπὶ πῒ §SIG:C§","span":[420,423],"editors":[]},{"dirty":false,"id":"585","lemma":"ἀνελθεῖν προτρεπόμενον","query":false,"sigla":["A","C"],"unit":585,"reading":"§SIG:A§ : ἀνελθεῖν ὁμοίως §SIG:C§","span":[458,480],"editors":[]},{"editors":["Boissonade"],"reading":"§SIG:A§§SIG:C§ : κυνίαν §SIG:Boissonade§","unit":586,"span":[514,519],"query":false,"sigla":["A","Boissonade","C"],"lemma":"Πάλιν","id":"586","dirty":false},{"lemma":"δόξας … τὰ","id":"587","dirty":false,"editors":[],"reading":"§SIG:A§ : δόξας χέζειν ἄνωθεν §SIG:C§","unit":587,"span":[566,581],"query":false,"sigla":["A","C"]},{"editors":["Eberhard"],"span":[599,602],"reading":"§SIG:Eberhard§ : ἐρημώσω §SIG:A§§SIG:C§","unit":588,"sigla":["A","C","Eberhard"],"query":false,"lemma":"ἀλλ","id":"588","dirty":false},{"editors":["Boissonade"],"reading":"§SIG:Boissonade§ : κατετύλησσεν §SIG:A§ : κατετζήλλησε §SIG:C§","unit":589,"span":null,"query":false,"sigla":["A","Boissonade","C"],"lemma":"","id":"589","dirty":false}],"label":"243","tr":"Un goloso fu invitato alla vendemmia da un amico, mangiò insaziabilmente fichi e uva, di notte fu tormentato dal suo ventre e gli parve di vedere il suo amico seduto su un fico e che costui lo chiamasse a sé affinché mangiasse fichi Allora il goloso si arrampicò, e a loro piacque cacare dall'alto del fico. Dunque, sforzandosi, smerdò le coperte. Quando poi si svegliò e se ne accorse, lavò le coperte e si addormentò di nuovo. E vede di nuovo in sogno l'amico seduto sul fico, che lo esorta allo stesso modo a salire. Egli allora alzò gli occhi verso di lui e disse: «Di nuovo vuoi burlarti di me, affinché, sognando di cacare dall'alto del fico, io insozzi le coperte! Ma io d'ora in poi non sarò affatto beffato: prima, infatti, cacherò, e così salirò». Dunque, sforzandosi di nuovo, insozzò le coperte.","A":"251","type":"joke","text":"Λείξουρος εἰς τρύγην ὑπὸ φίλου κληθεὶς καὶ ἀπλήστως φαγὼν σῦκα καὶ σταφυλάς, ‹τῇ νυκτὶ› ὑπὸ τῆς γαστρὸς αὐτοῦ νυχθεὶς ἔδοξεν ὁρᾶν ἐπὶ συκὴν τὸν φίλον αὐτοῦ καθήμενον καὶ τοῦτον προσκαλεῖσθαι, ἵνα φάγῃ σῦκα. ἀναστάντος δὲ ἤρεσεν αὐτοὺς ἀπὸ τῆς συκῆς χέσαι ἄνωθεν. βιαζόμενος οὖν τὰ στρώματα κατέχεσεν. ὡς δὲ ἐξυπνίσας ἐπέγνω, τὰ στρώματα πλύνας πάλιν [ἀπλήστως φαγὼν] ἐκοιμήθη. καὶ θεωρεῖ πάλιν καθ’ ὕπνους τὸν φίλον ἐπὶ τῆς συκῆς καθήμενον καὶ τοῦτον ὁμοίως ἀνελθεῖν προτρεπόμενον. ὁ δὲ πρὸς αὐτὸν ἀναβλέψας εἶπε· Πάλιν μοι θέλεις ἐμπαῖξαι, ἵνα ἀπὸ τῆς συκῆς ἄνωθεν δόξας χέζειν τὰ στρώματα ῥυπώσω. ἀλλ’ ἐγὼ ἀπάρτι οὐ μὴ ἐμπαιχθῶ· πρῶτον γὰρ χέσω καὶ οὕτως ἀνέλθω. βιαζόμενος οὖν πάλιν τὰ στρώματα κατετίλησεν.","n":251,"dawe":"243","num":"243","wit":"AC"},{"type":"joke","tr":"Un giovinetto si rivolse alla moglie che era lasciva e disse: «Cara, che facciamo? Ceniamo o facciamo l’amore?», e quella disse a lui: «Come vuoi; non c'è un boccone».","A":"252","app":[{"lemma":"οὖσαν … εἶπε","dirty":false,"id":"590","span":[27,44],"reading":"§SIG:A§§SIG:C§ : γυναῖκα αὐτοῦ ἀσελγῆ οὖσαν","unit":590,"editors":[],"sigla":["A","C"],"query":false},{"sigla":["A","C","Minas"],"query":false,"span":[77,102],"unit":591,"reading":"§SIG:A§§SIG:C§ : ἀριστῶμεν ἢ ἀφροδισιάζωμεν §SIG:Minas§","editors":["Minas"],"dirty":false,"id":"591","lemma":"ἢ … κἀκείνη"},{"query":false,"sigla":["A","C"],"unit":592,"reading":"§SIG:A§ : λέγει §SIG:C§","span":[108,121],"editors":[],"dirty":false,"id":"592","lemma":"αὐτὸν … Ὡς"},{"dirty":false,"id":"593","lemma":"ψωμὶν","sigla":["A"],"query":false,"span":[130,135],"reading":"in aliud nescioquid mut. §SIG:A§2pc","unit":593,"editors":[]},{"query":false,"sigla":["A","C"],"unit":594,"reading":"§SIG:C§ : ψωμὴν potius quam ψωμὶν §SIG:A§","span":[136,139],"editors":[],"dirty":false,"id":"594","lemma":"οὐκ"},{"lemma":"","id":"595","dirty":false,"editors":[],"span":null,"unit":595,"reading":"ἐστὶν per siglum fort. vitio chartae attritum voluit §SIG:A§","sigla":["A"],"query":false}],"label":"244; 58 β","wit":"AC","n":252,"num":"244","dawe":"244","text":"Νεανίσκος πρὸς τὴν γυναῖκα οὖσαν ἀσελγῆ εἶπε· Κυρία, τί ποιοῦμεν; ἀριστοῦμεν ἢ ἀφροδισιάζομεν; κἀκείνη πρὸς αὐτὸν ἔφη· Ὡς θέλεις· ψωμὶν οὐκ ἔστιν."},{"wit":"AC","n":253,"dawe":"245","num":"245","text":"Νεανίσκος γραίας δύο καπριώσας ἐκάλεσε, πρὸς δὲ τοὺς οἰκείους διακόνους ἔφη· Τὴν μίαν κεράσατε, τὴν δὲ θέλουσαν ἀφροδισιάσατε. αἱ δὲ ὑφ’ ἓν εἶπον· Ἡμεῖς οὐ διψῶμεν.","type":"joke","tr":"Un giovinetto invitò due vecchie in calore, e disse ai propri servitori: «Mescete da bere singolarmente, e fate l’amore con chi ne ha voglia». E quelle all’unisono dissero: «Noi non abbiamo sete!».","A":"253","app":[{"dirty":false,"id":"596","lemma":"δύο … ἐκάλεσε","query":false,"sigla":["A","C"],"unit":596,"reading":"§SIG:A§ : δύο γραίας γαυριώσας §SIG:C§","span":[17,38],"editors":[]},{"query":false,"sigla":["A","C"],"editors":[],"reading":"§SIG:A§ : τὴν μὲν μίαν κυράσατε §SIG:C§","unit":597,"span":[81,99],"id":"597","dirty":false,"lemma":"μίαν … τὴν"}],"label":"245"},{"wit":"A","n":254,"num":"246","dawe":"246","text":"Μισογύναιος στὰς ἐν τῇ ἀγορᾷ ἔλεγε· Πωλῶ μου τὴν γυναῖκα ἀτελώνητον. τινῶν δὲ εἰπόντων· Διὰ τί; εἶπεν· Ἵνα στερέσιμος γένηται.","type":"joke","tr":"Un misogino si fermava in piazza e diceva: «Vendo mia moglie senza pagarci le tasse!». Quando allora alcuni gli dissero: «Perché?», disse: «Affinché diventi merce confiscata».","A":"254","app":[{"editors":["Minas"],"unit":598,"reading":"§SIG:Minas§ : αυτὸν §SIG:A§","span":[96,100],"query":false,"sigla":["A","Minas"],"lemma":"εἶπε","id":"598","dirty":false}],"label":"246"},{"wit":"A","text":"Μισογύναιος, τῆς γυναικὸς αὐτοῦ ἀποθανούσης, ἐπὶ τῷ θάψαι ἐκήδευε. τινὸς δὲ ἐρωτήσαντος· Τίς ἀνεπαύσατο; ἔφη· Ἐγὼ ὁ ταύτης στερηθείς.","n":255,"dawe":"247","num":"247","type":"joke","app":[],"label":"247; 60 β","tr":"Un misogino, dato che era morta sua moglie, celebrava le esequie per la sepoltura. Quando uno gli chiese: «Chi ha iniziato il suo riposo?», rispose: «Io, che sono stato privato di costei!».","A":"255"},{"wit":"A","text":"Μισογύναιος νοσήσας ἐν ἀπογνώσει, τῆς δὲ γυναικὸς αὐτῷ εἰπούσης· Ἐάν τι πάθῃς, ἀπάγξομαι ἀναβλέψας πρὸς αὐτὴν εἶπε· Ζῶντί μοι τοῦτο χάρισαι.","dawe":"248","num":"248","n":256,"type":"joke","label":"248; 61 β","app":[],"A":"256","tr":"Un misogino si ammalò senza speranza, e poiché sua moglie gli disse: «Se ti succede qualcosa, mi impiccherò», alzò lo sguardo verso di lei e disse: «Fammi questo favore finché sono ancora vivo!»."},{"n":257,"dawe":"249","num":"249","text":"Μισογύναιος γυναῖκα ἔχων γλωσσώδη καὶ λοίδορον, τελευτησάσης δὲ αὐτῆς, ἐπὶ θυρεοῦ ἐξέφερε. τινὸς δὲ ἰδόντος καὶ τὴν αἰτίαν ἐρωτήσαντος ἀπεκρίνατο· Μαχίμη γὰρ ἦν.","wit":"A","tr":"Un misogino aveva una moglie linguacciuta e insolente, e quando lei morì lui le fece il funerale su uno scudo. Quando un tale lo vide e chiese il motivo, rispose: «Perché era da combattimento».","A":"257","app":[{"lemma":"γὰρ","dirty":false,"id":"599","span":[154,157],"reading":"§SIG:Boissonade§ : μαχήμη §SIG:A§","unit":599,"editors":["Boissonade"],"sigla":["A","Boissonade"],"query":false}],"label":"249","type":"joke"},{"text":"Νεανίσκος ἐρωτηθείς, ‹εἰ› ὑπὸ τῆς γυναικὸς αὐτοῦ κελεύεται ἢ πείθεται αὐτῷ ἐκείνη πάντα, ἐναβρυνόμενος ἔφη· Οὕτως με φοβεῖται ἡ γυνή μου· ἐὰν χάνω, χέζει.","n":258,"num":"250","dawe":"250","wit":"A","app":[{"dirty":false,"id":"600","lemma":"ἐναβρυνόμενος","query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ἐν ἀβρυνόμενος §SIG:M§","unit":600,"span":[89,102],"editors":[]},{"editors":["Eberhard"],"span":[26,29],"reading":"add. §SIG:Eberhard§","unit":601,"sigla":["Eberhard"],"query":false,"lemma":"ὑπὸ","id":"601","dirty":false}],"label":"250","tr":"A un giovinetto fu chiesto se fosse comandato da sua moglie o se lei gli ubbidisse in tutto, e disse, facendosi vanto: «Quando apro la bocca, si caca addosso!».","A":"258","type":"joke"},{"wit":"AC","text":"Οἰκοδέσποινα μωρὸν οἰκέτην ἔχουσα καὶ ἐμφανῆ ἰδοῦσα αὐτὸν ἁδροκέφαλον, ἐπιθυμήσασα αὐτοῦ, φιμάριον εἰς τὸ πρόσωπον βαλοῦσα, ἵνα μὴ ἐπιγνωσθῇ, συνέπαιζεν αὐτῷ. ὁ δὲ ἐν τῷ παίζειν συνεὶς ‹συν›ῆλθεν συνεισῆλθεν αὐτῇ. καὶ τῷ δεσπότῃ συνήθως προσγελῶν εἶπε· Κῦρι, κῦρι, τὸν ὀρχηστὴν ἐβίνησα, καὶ ἡ κυρὰ ἦν ἔσωθεν.","n":259,"num":"251","dawe":"251","type":"joke","app":[{"query":false,"sigla":["A","Eberhard"],"editors":["Eberhard"],"unit":602,"reading":"§SIG:Eberhard§ : ὁ §SIG:A§","span":[99,102],"id":"602","dirty":false,"lemma":"εἷς"},{"editors":["Dawe"],"span":[38,51],"reading":"§SIG:Dawe§ : ἐμφανῆ καὶ §SIG:A§§SIG:C§","unit":603,"sigla":["A","C","Dawe"],"query":false,"lemma":"ἐμφανῆ ἰδοῦσα","id":"603","dirty":false},{"editors":[],"reading":": ἀδροκέφαλον §SIG:A§§SIG:C§","unit":604,"span":[71,82],"query":false,"sigla":["A","C"],"lemma":"ἐπιθυμήσασα","id":"604","dirty":false},{"reading":"§SIG:Hase§ : φημάριον §SIG:A§§SIG:C§","unit":605,"span":[99,102],"editors":["Hase"],"query":false,"sigla":["A","C","Hase"],"lemma":"εἰς","dirty":false,"id":"605"},{"lemma":"τὸ","dirty":false,"id":"606","reading":"§SIG:A§§SIG:C§ : περὶ §SIG:Eberhard§","unit":606,"span":[103,105],"editors":["Eberhard"],"query":false,"sigla":["A","C","Eberhard"]},{"lemma":"αὐτῇ","id":"607","dirty":false,"editors":["Dawe"],"span":[208,212],"reading":"§SIG:A§§SIG:C§ : συνεὶς συνῆλθεν §SIG:Dawe§","unit":607,"sigla":["A","C","Dawe"],"query":false},{"lemma":"καὶ","id":"608","dirty":false,"editors":["Dawe"],"span":[214,217],"unit":608,"reading":"post αὐτῇ lacunam indicavit §SIG:Dawe§","sigla":["Dawe"],"query":false},{"dirty":false,"id":"609","lemma":"ὀρχηστὴν","sigla":["A","C"],"query":false,"span":[269,277],"unit":609,"reading":"§SIG:C§ : ὀρχιστὴν §SIG:A§","editors":[]},{"lemma":"ἐβίνησα","id":"610","dirty":false,"editors":["Boissonade"],"unit":610,"reading":"§SIG:Boissonade§ : ἐβήνησα §SIG:A§ ἐβίνισα §SIG:C§","span":[278,285],"query":false,"sigla":["A","Boissonade","C"]}],"label":"251","tr":"Una padrona aveva un servo tonto e aitante, vide che era nerboruto, prese a desiderarlo, si pose sul volto una piccola maschera per non essere riconosciuta e ci si trastullava insieme. E quello, mentre ci si trastullava, comprese e ci fece l’amore. E scherzando come al solito col padrone, disse: «Padrone, padrone, ho scopato il pantomimo e dentro c’era la padrona!».","A":"259"},{"A":"260","tr":"Un eunuco disgraziato sviluppò un tumore.","label":"252; 121 α","app":[],"type":"joke","dawe":"252","num":"252","n":260,"text":"Ἀτυχὴς εὐνοῦχος κήλην ἐποίησεν.","wit":"A"}],"witnesses":["M","A","C"],"editors":["Boissonade","Dawe","Eberhard","Minas","Perr  let t='<h2>Doublets (α · β · γ)</h2>';const bToG={},aToG={};RECS.gamma.units.forEach(u=>{if(u.type!=='joke')return;(u.cf_b||[]).forEach(b=>{bToG[b]=u.num;});(u.cf_a||[]).forEach(a=>{aToG[a]=u.num;});});DB.doublets.forEach(d=>{const dw=(byA.beta[d.b]&&byA.beta[d.b].dawe)||'';let g=bToG[d.b]||'';if(!g){for(const a of d.a){if(aToG[a]){g=aToG[a];break;}}}t+='<a class="drow" data-go="pair_'+d.a[0]+'_'+d.b+'"><span class="da">α '+esc(d.a[0])+'</span><span class="ddw">'+(dw?'('+esc(dw)+')':'')+'</span><span class="db">β '+esc(d.b)+'</span><span class="dg">'+(g?'γ '+esc(g):'')+'</span></a>';});elToc.innerHTML=t;syncBtns();}

function flash(el){if(!el)return;document.querySelectorAll('.hot').forEach(x=>x.classList.remove('hot'));el.classList.add('hot');el.scrollIntoView({behavior:'smooth',block:'center'});setTimeout(()=>el.classList.remove('hot'),1600);}
function goto(id){let el=document.getElementById(id);if(!el){const rec=id.split('_')[0];if(['alpha','beta','gamma'].includes(rec)){renderRead(rec);el=document.getElementById(id);}}if(el)flash(el.querySelector('.num')||el);}
elMain.addEventListener('click',e=>{const xr=e.target.closest('[data-go]');if(xr&&xr.classList.contains('xref')){goto(xr.dataset.go);return;}
 if(xr&&xr.closest('.dpair')===null&&!xr.classList.contains('lem')){}
 const lem=e.target.closest('.lem');if(lem){const fac=lem.closest('.fac');const ln=fac.querySelector('.app .ln[data-app="'+lem.dataset.app+'"]');if(ln){fac.querySelector('.app').classList.add('show');flash(ln);}return;}
 const ln=e.target.closest('.app .ln');if(ln){const fac=ln.closest('.fac');const sp=fac.querySelector('.lem[data-app="'+ln.dataset.app+'"]');if(sp)flash(sp);}});
elToc.addEventListener('click',e=>{const a=e.target.closest('[data-go]');if(a){const el=document.getElementById(a.dataset.go);if(el)el.scrollIntoView({behavior:'smooth'});}});
document.querySelectorAll('.recsw button').forEach(b=>b.addEventListener('click',()=>renderRead(b.dataset.rec)));
document.getElementById('tSync').addEventListener('click',()=>{if(state.mode==='sync')renderRead(state.rec);else renderSync();});
document.getElementById('tTr').addEventListener('click',()=>{document.body.classList.toggle('showtr');document.getElementById('tTr').classList.toggle('on',document.body.classList.contains('showtr'));});
document.getElementById('tIdx').addEventListener('click',()=>{if(state.mode==='idx')renderRead(state.rec);else renderIdx();});
document.getElementById('tTrad').addEventListener('click',()=>{if(state.mode==='trad')renderRead(state.rec);else renderTrad();});
const bApp=document.getElementById('tApp'),bLem=document.getElementById('tLem');
bApp.onclick=()=>{bApp.classList.toggle('on');document.querySelectorAll('.app').forEach(a=>a.classList.toggle('show',bApp.classList.contains('on')));};
bLem.onclick=()=>{bLem.classList.toggle('on');document.querySelectorAll('.lem').forEach(l=>l.style.borderBottom=bLem.classList.contains('on')?'':'none');};
let fs=1.16;document.getElementById('aPlus').onclick=()=>{fs+=.06;document.querySelectorAll('.txt').forEach(t=>t.style.fontSize=fs+'rem');};
document.getElementById('aMinus').onclick=()=>{fs=Math.max(.9,fs-.06);document.querySelectorAll('.txt').forEach(t=>t.style.fontSize=fs+'rem');};
const q=document.getElementById('q');q.addEventListener('input',()=>{const v=deacc(q.value.trim());document.querySelectorAll('.fac').forEach(f=>{const hit=!v||f.dataset.s.includes(v)||(f.dataset.n||'').includes(v);f.classList.toggle('hide',!hit);});document.querySelectorAll('section.sec').forEach(s=>{const any=[...s.querySelectorAll('.fac')].some(f=>!f.classList.contains('hide'));s.classList.toggle('hide',!any);});});
function goFac(v){v=(v||'').toString().toLowerCase().replace(/\s+/g,'').replace(/[^0-9a-z]/g,'');if(!v)return;if(state.mode!=='read')renderRead(state.rec);let target=null;document.querySelectorAll('.fac').forEach(f=>{if(!target&&(f.dataset.n||'').toLowerCase().replace(/\s+/g,'')===v)target=f;});if(!target)target=document.getElementById(state.rec+'_fac'+v);if(target){target.classList.remove('hide');flash(target.querySelector('.num'));}else alert('Facetia "'+v+'" not found in '+state.rec+'.');}
document.getElementById('jump').addEventListener('keydown',e=>{if(e.key==='Enter')goFac(e.target.value);});
(function(){const rz=document.getElementById('resizer'),nav=document.querySelector('nav.toc'),wrap=document.querySelector('.wrap');if(rz){rz.addEventListener('mousedown',e=>{rz._d=true;rz.classList.add('drag');document.body.style.userSelect='none';e.preventDefault();});window.addEventListener('mousemove',e=>{if(!rz._d)return;let w=e.clientX-wrap.getBoundingClientRect().left;w=Math.max(150,Math.min(520,w));nav.style.flex='0 0 '+w+'px';nav.style.width=w+'px';});window.addEventListener('mouseup',()=>{if(rz._d){rz._d=false;rz.classList.remove('drag');document.body.style.userSelect='';}});}})();
renderRead('alpha');
