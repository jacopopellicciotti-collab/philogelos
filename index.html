ς ἔγραψεν ἐπιτάφιον· ὃς ἐνεκάλει αὐτῷ ἐπὶ τούτῳ. ὁ δέ· Ἂν οὖν ὑμεῖς, φησί, μὴ προλέγητε, ὅταν ἀποθνῄσκητε, ἐγὼ ἐξ αὐτοσχεδίου λέγω‹ν› βούλεσθε ἵν’ ἀσχημονήσω;","wit":"AM","tr":"Un sofista §I§scholastikos§/I§, incaricato di pronunciare gli epitaffi dei defunti, scrisse un discorso per uno ancora vivo, che lo rimproverava per questo. Allora quello disse: «Se dunque voi non mi dite per tempo quando dovete morire, volete che io parlando a braccio faccia brutta figura?».","A":"92","app":[{"sigla":["A","M","Minas"],"query":false,"span":[137,143],"unit":243,"reading":"§SIG:Minas§ : ἄνουν §SIG:A§ : ἂνους §SIG:M§","editors":["Minas"],"dirty":false,"id":"243","lemma":"Ἂν οὖν"},{"lemma":"ἀποθνῄσκητε","dirty":false,"id":"244","reading":"§SIG:A§ : ἀποθνήσκετε §SIG:M§","unit":244,"span":[176,187],"editors":[],"query":false,"sigla":["A","M"]},{"sigla":["Dawe","Minas"],"query":false,"editors":["Dawe","Minas"],"span":[208,214],"unit":245,"reading":"corr. §SIG:Minas§ : contra §SIG:Dawe§ cf. Ritter p. 63 n. 147","id":"245","dirty":false,"lemma":"λέγων"},{"sigla":["A","M"],"query":false,"span":[216,224],"unit":246,"reading":"§SIG:M§ : βούλεσθαι §SIG:A§","editors":[],"dirty":false,"id":"246","lemma":"βούλεσθε"}],"label":"90","type":"joke"},{"wit":"A","n":93,"num":"90 bis","dawe":"90 bis","text":"Σχολαστικὸς ναυαγεῖν μέλλων ᾔτει πινακίδας, ἵνα διαθήκας γράψῃ.","type":"joke","tr":"Cf. 30 94. Uno §I§scholastikos§/I§ avevano a cena dei compagni di studi, e siccome questi avevano lodato la testa di maiale e gli avevano richiesto di pranzare da lui anche l’indomani, andò dal cuoco e disse: «Dammi un’altra testa proveniente dallo stesso porco: quella di ieri ci è proprio piaciuta!».","A":"93","app":[],"label":"90 bis; 30 α et 29 β"},{"type":"joke","tr":"","A":"94","app":[{"reading":": αὐτῶ §SIG:A§ §SIG:M§ac: αὐτῶν §SIG:M§pc","unit":247,"span":[58,63],"editors":[],"query":false,"sigla":["A","M"],"lemma":"αὐτῶν","dirty":false,"id":"247"},{"lemma":"μάγειρον","id":"248","dirty":false,"editors":[],"span":[145,153],"unit":248,"reading":"§SIG:M§ : μάγηρον §SIG:A§","sigla":["A","M"],"query":false}],"label":"91","wit":"AM","n":94,"dawe":"91","num":"91","text":"Σχολαστικὸς συμφοιτητὰς ἐπὶ δεῖπνον καλέσας, ἐπαινεσάντων αὐτῶν ὑὸς κεφαλὴν καὶ ἀξιωσάντων καὶ τῇ ὑστεραίᾳ παρ’αὐτῷ ἑστιαθῆναι, ἀπελθὼν πρὸς τὸν μάγειρον· Δός μοι, ἔφη, ἀπὸ τοῦ αὐτοῦ χοίρου κεφαλὴν ἑτέραν· ἡ γὰρ χθὲς ἡμῖν πάνυ ἤρεσεν."},{"type":"joke","tr":"Cf. 31","A":"95","app":[],"label":"91 bis; 31 α et 30 β","wit":"A","n":95,"dawe":"91 bis","num":"91 bis","text":"Σχολαστικὸς διαπερᾶσαι ‹ποταμὸν› βουλόμενος ἀνέβη εἰς τὸ πλοῖον μετὰ τοῦ ἵππου ἐποχούμενος. Πυθομένου δέ τινος, διὰ τί οὐ κάτεισι· σπεύδειν ἔφη."},{"wit":"AM","dawe":"92","num":"92","n":96,"text":"Σχολαστικὸς ἠρώτα τὸν πατέρα· Ἡ πεντακότυλος λήκυθος πόσον χωρεῖ;","type":"joke","A":"96","tr":"Uno §I§scholastikos§/I§ chiedeva al padre: «La boccetta da cinque cotili quanto è capace?».","label":"92; 141 α et 1 γ/261 α/72 β","app":[{"span":[18,28],"unit":249,"reading":"§SIG:A§ : τὸν πατέρα αὐτοῦ §SIG:M§","editors":[],"sigla":["A","M"],"query":false,"lemma":"τὸν πατέρα","dirty":false,"id":"249"}]},{"n":97,"dawe":"93","num":"93","text":"Σχολαστικὸς μαθὼν περὶ κλίμακός τινος, ὅτι ἀναβαινόντων ἔχει βαθμοὺς εἴκοσιν, ἐπύθετο, εἰ καὶ καταβαινόντων τοσοῦτοί εἰσιν.","wit":"AM","tr":"Uno §I§scholastikos§/I§ venne a sapere che una certa scala ha venti gradini quando si sale, e chiese se fossero tanti anche quando si scende.","A":"97","app":[{"dirty":false,"id":"250","lemma":"εἴκοσιν","sigla":["A","M"],"query":false,"span":[69,76],"unit":250,"reading":"§SIG:A§ : εἴκοσι §SIG:M§","editors":[]}],"label":"93","type":"joke"},{"type":"joke","label":"94","app":[],"A":"98","tr":"Uno §I§scholastikos§/I§, mentre alcuni parlavano di problemi di digestione, diceva che non ne aveva mai avuti. Ma quando gli chiesero se avesse mai fatto rutti in modo acido o fetido, disse: «Questo lo faccio ogni giorno!».","wit":"A","text":"Σχολαστικὸς διαλεγομένων τινῶν περὶ ἀπεψίας, ἔλεγε μηδεπώποτε ἠπεπτηκέναι. τῶν δὲ πυνθανομένων, εἰ μηδέποτε ἠρεύξατο πικρὸν ἢ ἀηδές· Τοῦτο, εἶπε, ποιῶ καθ’ ἑκάστην ἡμέραν.","num":"94","dawe":"94","n":98},{"tr":"Ad uno §I§scholastikos§/I§ nacque un figlio. Quando alcuni gli chiesero quale nome gli avrebbe dato, rispose: «Avrà il mio, di nome, e io rimarrò così per un po’… (cioè privo di nome)».","A":"99","app":[],"label":"95","type":"joke","n":99,"num":"95","dawe":"95","text":"Σχολαστικῷ υἱὸς ἐγεννήθη. πυνθανομένων δέ τινῶν αὐτοῦ, ποῖον ὄνομα αὐτῷ θήσεται· Τὸ ἐμὸν ἕξει, ἔφη, ὄνομα, κἀγὼ τέως οὕτω μενῶ.","wit":"A"},{"n":100,"dawe":"96","num":"96","text":"Σχολαστικοὶ δύο δειλοί, ὁ μὲν ἔκρυψεν εἰς φρέαρ αὑτόν, ὁ δὲ εἰς καλαμῶνα. χαλασάντων οὖν κράνος τῶν στρατιωτῶν ἐπὶ τὸ ὕδωρ ἀρύσασθαι, νομίσας στρατιώτην κατιέναι, ἱκετεύων ἐλήφθη. ὡς δὲ ἔφασαν οἱ στρατιῶται ὅτι εἰ ἐσιώπησε, παρῆλθον ἂν αὐτόν, ὁ ἐν τῷ καλαμῶνι κρυβόμενος· Οὐκοῦν, εἶπεν, ἐμὲ παρέλθατε· σιωπῶ γάρ.","wit":"AM","tr":"C’erano due §I§scholastikoi§/I§ codardi: uno si nascose in un pozzo, l’altro invece in un canneto. Quando i soldati calarono un elmo per attingere l’acqua, credette che stesse scendendo un soldato e poiché si era messo a supplicare, fu catturato. Ma quando i soldati dissero che, se fosse stato zitto, sarebbero passati oltre, quello nascosto nel canneto disse: «E allora passate oltre me: infatti sto zitto!».","A":"100","app":[{"dirty":false,"id":"251","lemma":"Σχολαστικοὶ δύο","query":false,"sigla":["A","M","Minas"],"reading":"§SIG:Minas§ : Δύο σχολαστικοί §SIG:A§ : δύο om. §SIG:M§","unit":251,"span":[0,15],"editors":["Minas"]},{"lemma":"","dirty":false,"id":"252","span":null,"unit":252,"reading":"post δειλοί έδιώκοντο ὑπό πολεμίων καὶ add. §SIG:Dawe§","editors":["Dawe"],"sigla":["Dawe"],"query":false},{"query":false,"sigla":["A","M"],"editors":[],"unit":253,"reading":"§SIG:A§ : ἑαυτὸν §SIG:M§","span":[48,53],"id":"253","dirty":false,"lemma":"αὑτόν"},{"lemma":"","dirty":false,"id":"254","reading":"ante νομίσας ὁ μὲν ἕτερος add. §SIG:Dawe§","unit":254,"span":null,"editors":["Dawe"],"query":false,"sigla":["Dawe"]},{"dirty":false,"id":"255","lemma":"εἰ","sigla":["A","M"],"query":false,"span":[60,62],"reading":"§SIG:A§ : om. §SIG:M§","unit":255,"editors":[]},{"lemma":"ὁ ἐν","id":"256","dirty":false,"editors":[],"span":[243,247],"reading":"§SIG:A§ : ὁ δὲ ἐν §SIG:M§","unit":256,"sigla":["A","M"],"query":false}],"label":"96","type":"joke"},{"dawe":"96 bis","num":"96 bis","n":101,"text":"Σχολαστικὸς ἐπὶ δεῖπνον κληθεὶς οὐκ ἤσθιεν. ἐρομένου οὖν τινος τῶν κεκλημένων διὰ τί οὐκ ἐσθίοι, ὁ δὲ Ἵνα μὴ, ‹ἔφη›, τοῦ φαγεῖν ἕνεκα δόξω παρεῖναι.","wit":"A","A":"101","tr":"Cf. 32","label":"96 bis; 32 α","app":[{"sigla":["Dawe"],"query":false,"editors":["Dawe"],"span":[111,114],"reading":"§SIG:Dawe§","unit":257,"id":"257","dirty":false,"lemma":"ἔφη"}],"type":"joke"},{"wit":"A","text":"Σχολαστικὸς ‹τῆς› γυναικὸς αὐτοῦ ἀποθανούσης σορὸν ἠγόραζε καὶ περὶ τῆς τιμῆς ἐζυγομάχει. τοῦ δὲ πωλοῦντος ὀμόσαντος μὴ ἔλαττον πέντε μυριάδων πωλήσειν, ὁ δέ· Ἐπειδή, ἔφη, προσείληψαι τῷ ὅρκῳ, λάβε μὲν τὰς πέντε μυριάδας, εἰς προσθήκην δέ μοι μικρὸν σορίδιον δός, ἵνα, ἐάν μου χρεία παιδίῳ γένηται, ἕτοιμον ᾖ.","dawe":"97","num":"97","n":102,"type":"joke","label":"97","app":[{"query":false,"sigla":["Eberhard"],"reading":"§SIG:Eberhard§","unit":258,"span":[13,16],"editors":["Eberhard"],"dirty":false,"id":"258","lemma":"τῆς"},{"dirty":false,"id":"259","lemma":"πωλοῦντος","query":false,"sigla":["A","Eberhard"],"reading":": πολοῦντος §SIG:A§ : §SIG:Eberhard§","unit":259,"span":[97,106],"editors":["Eberhard"]},{"sigla":["A","Eberhard"],"query":false,"span":[107,116],"unit":260,"reading":": ὁμόσαντος §SIG:A§ : §SIG:Eberhard§","editors":["Eberhard"],"dirty":false,"id":"260","lemma":"ὀμόσαντος"},{"editors":["Eberhard"],"span":[273,276],"unit":261,"reading":"§SIG:A§ : που §SIG:Eberhard§","sigla":["A","Eberhard"],"query":false,"lemma":"μου","id":"261","dirty":false}],"A":"102","tr":"Uno§I§ scholastikos§/I§, dopo che gli era morta la moglie, stava comprando un sarcofago e bisticciava sul prezzo. Quando il venditore giurò che non l’avrebbe venduto a meno di cinquantamila, egli disse: «Poiché ti sei legato col giuramento, prendi pure le cinquantamila, però in aggiunta, dammi un piccolo sarcofaghino, così, se mai ne avessi bisogno per un mio figlioletto, sarà già pronto»."},{"A":"103","tr":"Un amico incontrò uno §I§scholastikos§/I§ e disse: «Ti faccio le congratulazioni perché ti è nato un figlio!». Ma quello rispose: «Questo è ciò che fate voi, o amici!».","label":"98","app":[{"sigla":["A","M"],"query":false,"span":[0,10],"reading":"§SIG:A§ : Σχολαστικὸς §SIG:M§","unit":262,"editors":[],"dirty":false,"id":"262","lemma":"Σχολαστικῷ"}],"type":"joke","dawe":"98","num":"98","n":103,"text":"Σχολαστικῷ ἑταῖρος ἀπαντήσας· Συγχαίρω σοι, εἶπεν, ὅτι σοι παιδίον ἐγεννήθη. ὁ δὲ ἀπεκρίνατο· Τοῦτο ὑμεῖς οἱ φίλοι ποιεῖτε.","wit":"A"},{"type":"joke","label":"99; 142 α","app":[{"lemma":"βίρρον","dirty":false,"id":"263","unit":263,"reading":"§SIG:A§§SIG:M§ : μῦρον","span":[33,39],"editors":[],"query":false,"sigla":["A","M"]}],"A":"104","tr":"Uno dice a uno §I§scholastikos§/I§: «Prestami una casacca, fino al campo». E questo fa: «Fino alla caviglia ce l’ho, ma fino al campo no!»","wit":"AM","text":"Σχολαστικῷ τις λέγει· Χρῆσόν μοι βίρρον μέχρις ἀγροῦ. ὁ δέ· Μέχρι σφυροῦ, εἶπεν, ἔχω· μέχρι δὲ ἀγροῦ οὐκ ἔχω.","dawe":"99","num":"99","n":104},{"type":"joke","label":"100; 133 α","app":[{"id":"264","dirty":false,"lemma":"ὥδευεν","sigla":["A","M"],"query":false,"editors":[],"span":[25,31],"unit":264,"reading":"§SIG:A§ : ὤδευεν §SIG:M§"},{"dirty":false,"id":"265","lemma":"οὐκ","query":false,"sigla":["A","Eberhard","M"],"unit":265,"reading":"§SIG:A§§SIG:M§ : οὐκέτι §SIG:Eberhard§","span":[63,66],"editors":["Eberhard"]},{"span":[135,143],"unit":266,"reading":"§SIG:A§ : λυθῆσαι §SIG:M§","editors":[],"sigla":["A","M"],"query":false,"lemma":"λυθεῖσαι","dirty":false,"id":"266"},{"id":"267","dirty":false,"lemma":"τὸ δραμεῖν","sigla":["Eberhard"],"query":false,"editors":["Eberhard"],"span":[268,278],"reading":"[τὸ] δραμεῖν §SIG:Eberhard§. coll. 133 α","unit":267}],"A":"105","tr":"Uno §I§scholastikos§/I§ era in viaggio su un carro. Siccome le mule spossate non riuscivano a camminare, il cocchiere le sciolse perché si rimettessero un po’ in sesto. Ebbene, quando furono sciolte, fuggirono. Allora lo §I§scholastikos§/I§ disse al cocchiere: «Disgraziato, le mule corrono, mentre la colpa è del carro, che non è capace di correre?».","wit":"AM","text":"Σχολαστικὸς ἐπ’ ὀχήματος ὥδευεν. ἐπεὶ δὲ ἀτονήσασαι αἱ ἡμίονοι οὐκ ἠδύναντο βαδίζειν, ὑπέλυσεν αὐτὰς ὁ ἡνίοχος, ἵνα μικρὸν ἀναλάβωσιν. λυθεῖσαι οὖν ἔφυγον. καὶ ὁ σχολαστικὸς πρὸς τὸν ἡνίοχον· Κάθαρμα, εἶπεν, ὁρᾷς, ὅτι αἱ μὲν ἡμίονοι τρέχουσι, τὸ δὲ ὄχημά ἐστιν αἴτιον τὸ δραμεῖν μὴ δυνάμενον;","dawe":"100","num":"100","n":105},{"type":"joke","tr":"Un tale vede due fratelli gemelli e, siccome alcuni si meravigliano della somiglianza di questi, dice: «Non è tanto questo che assomiglia così a quello, quanto quello che è uguale a questo».","A":"106","app":[{"editors":["Eberhard"],"reading":"§SIG:Eberhard§","unit":268,"span":[78,83],"query":false,"sigla":["Eberhard"],"lemma":"οὕτως","id":"268","dirty":false},{"lemma":"τούτῳ","dirty":false,"id":"269","span":[132,137],"reading":"§SIG:Boissonade§","unit":269,"editors":["Boissonade"],"sigla":["Boissonade"],"query":false}],"label":"101","wit":"A","n":106,"dawe":"101","num":"101","text":"Σχολαστικὸς ἀδελφοὺς διδύμους ἰδὼν θαυμαζόντων τινῶν τὴν ὁμοιότητα αὐτῶν· Οὐχ οὕτως, φησίν, ὅμοιός ἐστιν ‹οὗτος› ἐκείνῳ, ὡς ἐκεῖνος τούτῳ."},{"text":"Σχολαστικῷ τις λέγει· Δημέα, τρίτην ἡμέραν σε ἐνθάδε ἐν ὕπνοις εἶδον. ὁ δέ· Ψεύδῃ, εἶπεν, ἐν ἀγρῷ γὰρ ἤμην.","n":107,"dawe":"102","num":"102","wit":"AM","app":[{"sigla":["Thierfelder"],"query":false,"editors":["Thierfelder"],"span":[46,52],"reading":"dub. delendum putat §SIG:Thierfelder§","unit":270,"id":"270","dirty":false,"lemma":"ἐνθάδε"},{"query":false,"sigla":["A","M"],"unit":271,"reading":"§SIG:A§ : ψεύδει §SIG:M§","span":[76,81],"editors":[],"dirty":false,"id":"271","lemma":"Ψεύδῃ"},{"span":null,"reading":": ἔριον ἀφέρει §SIG:A§ : ἔριον ἀφθόνως φέρει §SIG:Minas§ : ἔρια φέρει §SIG:Perry§","unit":272,"editors":["Minas","Perry"],"sigla":["A","Minas","Perry"],"query":false,"lemma":"ἔριον φέρει","dirty":false,"id":"272"}],"label":"102","tr":"Un tale dice ad uno §I§scholastikos§/I§: «Demea, l’altro ieri ti ho visto qui in sogno». E questo: «Ti sbagli, perché ero in campagna».","A":"107","type":"joke"},{"n":108,"dawe":"103","num":"103","text":"","wit":"A","tr":"Uno §I§scholastikos §/I§chiacchierava con due amici. Quando uno ebbe detto che non è giusto uccidere una pecora poiché offre latte e lana, e l’altro che non conviene uccidere nemmeno una mucca, ché procura latte e ara, lo §I§scholastikos§/I§ disse che non è giusto nemmeno ammazzare la scrofa, ché offre fegato, carne di mammella e di vulva.","A":"108","app":[],"label":"103; 134 α","type":"joke"},{"type":"section","app":[],"text":"ἐκ τοῦ Φιλογέλου"},{"wit":"AM","n":109,"dawe":"104","num":"104","text":"Φιλάργυρος διαθήκας γράφων ἑαυτὸν κληρονόμον ἔταξεν.","type":"joke","tr":"Un avaro che scriveva le proprie volontà testamentarie dispose come erede sé stesso.","A":"109","app":[],"label":"104; 48 β"},{"type":"joke","app":[],"label":"105; 49 β","tr":"Un avaro a cui veniva domandato perché non mangiasse altro che olive soltanto, diceva: «Intanto per avere l’esterno come cibo, poi per avere il nocciolo come cibo; e dopo aver mangiato, per sfregarmi la testa e non aver bisogno di un lavaggio/bacinella».","A":"110","wit":"A","text":"Φιλάργυρος ἐρωτώμενος, διὰ τί ἄλλο οὐθὲν ἢ μόνον ἐλαίας ἐσθίει, ἔφη· Ἵνα τὸ μὲν ἔξωθεν ἀντὶ ὄψου ἔχω, τὸ δὲ ὀστοῦν ἀντὶ ξύλου· φαγὼν δέ, εἰς ‹τὴν› ἑαυτοῦ κεφαλὴν σφογγισάμενος λουτροῦ οὐκ ἐπιδέομαι.","n":110,"num":"105","dawe":"105"},{"wit":"AM","text":"Πεπανόπτωχος εἰωθὼς τὴν φίλην αὐτοῦ ἐξαπατᾶν ὡς εὐγενὴς ὢν καὶ πλούσιος, εἰς τοὺς γείτονας σιτευόμενος ὡς εἶδεν ἄφνω τὴν φίλην, στραφεὶς ἐφώνει· Πέμψον δέ μοι καὶ τὸ φιβλατώριον.","n":111,"dawe":"106","num":"106","type":"joke","app":[{"id":"273","dirty":false,"lemma":"εἰωθὼς","query":false,"sigla":["Boissonade"],"editors":["Boissonade"],"reading":"§SIG:Boissonade§ : εἰωθὸς cf. 7 G","unit":273,"span":[13,19]},{"lemma":"ἐξαπατᾶν","id":"274","dirty":false,"editors":[],"span":[36,44],"reading":"§SIG:A§ : ἐξαπατῶν §SIG:M§ac","unit":274,"sigla":["A","M"],"query":false},{"sigla":["A","M","Minas"],"query":false,"span":[117,126],"unit":275,"reading":"§SIG:Minas§ : τὰς φίλας §SIG:A§ : τοὺς φίλους §SIG:M§ δὲ §SIG:M§","editors":["Minas"],"dirty":false,"id":"275","lemma":"τὴν φίλην"}],"label":"106; 7 G","tr":"Un pitocco professionista, solito convincere la propria compagna di essere nobile e ricco, quando mentre si abboffava dai vicini vide all’improvviso la compagna, si voltò e ordinava: «E mandami anche la veste da ricevimento!»","A":"111"},{"label":"107","app":[{"sigla":["A","M"],"query":false,"editors":[],"span":[30,32],"reading":"§SIG:M§ : δὲ §SIG:A§","unit":276,"id":"276","dirty":false,"lemma":"τε"},{"span":[52,55],"unit":277,"reading":"del. §SIG:Eberhard§","editors":["Eberhard"],"sigla":["Eberhard"],"query":false,"lemma":"καὶ","dirty":false,"id":"277"},{"lemma":"αἰφνίδιον","dirty":false,"id":"278","span":[96,105],"unit":278,"reading":"§SIG:A§ : αἰφνήδιον §SIG:M§","editors":[],"sigla":["A","M"],"query":false},{"id":"279","dirty":false,"lemma":"","query":false,"sigla":["Dawe"],"editors":["Dawe"],"unit":279,"reading":"ante δόκιμοι οἱ add. §SIG:Dawe§","span":null},{"editors":[],"reading":"§SIG:A§ : Τὰ μὲν... τὰ δὲ §SIG:M§","unit":280,"span":[135,365],"query":false,"sigla":["A","M"],"lemma":"Τὸ … δὲ","id":"280","dirty":false}],"A":"112","tr":"Un altro che similmente si insuperbiva e che era assolutamente in miseria, per disgrazia si ammalò e, dal momento che la sua amante era entrata all’improvviso e lo aveva trovato che giaceva su una stuoia, provò vergogna e disse, dando la responsabilità ai medici: «I bravi e stimati dottori della città mi hanno prescritto di giacere su una stuoia!».","type":"joke","text":"Ἄλλος ὁμοίως μεγαλαυχούμενος, τελείως τε πενητεύων [καὶ] κατὰ τύχην νοσήσας, τῆς δὲ φίλης αὐτοῦ αἰφνίδιον ἐπεισελθούσης καὶ εὑρούσης αὐτὸν ἐπὶ ψιάθου κείμενον, ἐντραπεὶς ᾐτιᾶτο τοὺς ἰατροὺς λέγων· Οἱ καλοὶ ἰατροὶ καὶ δόκιμοι τῆς πόλεως ἐκέλευσάν με ψιαθισθῆναι.","dawe":"107","num":"107","n":112,"wit":"AM"},{"type":"joke","label":"108","app":[{"editors":["Dawe"],"unit":281,"reading":"§SIG:A§§SIG:M§ : ἐφίσταται §SIG:Dawe§","span":[133,140],"query":false,"sigla":["A","Dawe","M"],"lemma":"ἵσταται","id":"281","dirty":false},{"editors":["Minas"],"reading":"§SIG:A§§SIG:M§ : τὰ κριτήρια §SIG:Minas§","unit":282,"span":null,"query":false,"sigla":["A","M","Minas"],"lemma":"κριτήρια","id":"282","dirty":false},{"query":false,"sigla":["A","Minas"],"editors":["Minas"],"reading":"§SIG:A§ : ΑΒΔΗΡΙΤΑΙ §SIG:Minas§ : nullum rell.","unit":283,"span":null,"id":"283","dirty":false,"lemma":""}],"A":"113","tr":"Un ciarlatano vide in piazza un suo schiavo che era appena ritornato dalla campagna e disse: «Che fanno le pecore?». Quello rispose: «Una dorme, l’altra sta in piedi».s:114","wit":"AM","text":"Ἀλαζὼν ἐν ἀγορᾷ παῖδα ἑαυτοῦ θεασάμενος ἐκ τοῦ ἀγροῦ νεωστὶ ἐληλυθότα εἶπε· Τί ποιοῦσι τὰ πρόβατα; ὁ δὲ εἶπε· Τὸ μὲν καθεύδει, τὸ δὲ ἵσταται.","num":"108","dawe":"108","n":113},{"n":114,"dawe":"109","num":"109","text":"","wit":"AM","tr":"Uno scemo udì che nell’Ade i tribunali sono giusti e, dato che era coinvolto in un processo, si impiccò.","A":"114","app":[],"label":"109","type":"joke"},{"type":"section","text":"ἀβδηρίτης","app":[]},{"n":115,"num":"110","dawe":"110","text":"Ἐν Ἀβδήροις διῃρεῖτο ἡ πόλις εἰς δύο μέρη, οἵ τε πρὸς ἀνατολὰς οἰκοῦντες καὶ οἱ πρὸς δύσιν. πολεμίων οὖν ἄφνω τὴν πόλιν ἐφορμησάντων καὶ πάντων θορυβουμένων οἱ πρὸς τὸ ἀνατολικὸν οἰκοῦντες μέρος πρὸς ἀλλήλους ἔλεγον· Ἡμεῖς μὴ θορυβηθῶμεν· οἱ γὰρ πολέμιοι ἐπὶ τὰς δυσικὰς εἰσέρχονται πύλας.","wit":"A","tr":"In Abdera la città era divisa in due distretti: quelli che abitano nella zona est, e quelli della zona ovest. Quando dunque i nemici attaccarono all’improvviso la città e tutti erano in preda al caos, quelli che abitavano nella zona est si dicevano l’un l’altro: «Non agitiamoci! I nemici si presentano infatti alle porte occidentali!».","A":"115","app":[{"lemma":"ἐφορμησάντων","dirty":false,"id":"284","unit":284,"reading":"§SIG:A§ : ἐφορμισάντων §SIG:M§","span":[120,132],"editors":[],"query":false,"sigla":["A","M"]},{"lemma":"οἰκοῦντες μέρος","id":"285","dirty":false,"editors":[],"span":[179,194],"reading":"§SIG:A§ : μέρος οἰκοῦντες §SIG:M§","unit":285,"sigla":["A","M"],"query":false},{"sigla":["A","M"],"query":false,"editors":[],"span":[223,225],"reading":"§SIG:A§ : om. §SIG:M§","unit":286,"id":"286","dirty":false,"lemma":"μὴ"}],"label":"110","type":"joke"},{"n":116,"num":"111","dawe":"111","text":"Ἐν Ἀβδήροις ὄνος λαθὼν εἰς τὸ γυμνάσιον εἰσῆλθε καὶ τὸ ἔλαιον ἐξέχεεν. οἱ δὲ συνελθόντες καὶ μεταπεμψάμενοι πάντας τοὺς ὄνους τοὺς ἐν τῇ πόλει καὶ εἰς ἕνα συναγαγόντες τόπον πρὸς τὸ ἀσφαλίσασθαι ἐνώπιον αὐτῶν τὸν ὄνον ἐμαστίγωσαν.","wit":"AM","tr":"Ad Abdera un asino entrò inavvertitamente nel ginnasio e rovesciò l’olio. I cittadini accorsero, convocarono tutti gli asini della città, li raccolsero in un unico luogo e frustarono l’asino di fronte ai suoi simili, come punizione esemplare.","A":"116","app":[{"lemma":"συνελθόντες","dirty":false,"id":"287","span":[77,88],"reading":"§SIG:A§§SIG:M§ : συναθλοῦντες §SIG:Dawe§","unit":287,"editors":["Dawe"],"sigla":["A","Dawe","M"],"query":false},{"dirty":false,"id":"288","lemma":"καὶ","sigla":["Dawe"],"query":false,"span":[89,92],"unit":288,"reading":"del. §SIG:Dawe§","editors":["Dawe"]},{"lemma":"μεταπεμψάμενοι","dirty":false,"id":"289","span":[93,107],"reading":"§SIG:M§ : μεταμεμψάμενοι §SIG:A§","unit":289,"editors":[],"sigla":["A","M"],"query":false},{"lemma":"τοὺς1 … πόλει","id":"290","dirty":false,"editors":[],"unit":290,"reading":"§SIG:A§ : τοὺς ὄνους τοὺς ἐν τῇ πόλει §SIG:M§","span":[115,142],"query":false,"sigla":["A","M"]}],"label":"111","type":"joke"},{"wit":"AM","n":117,"num":"112","dawe":"112","text":"Ἀβδηρίτης ἀπάγξασθαι βουλόμενος καὶ τοῦ σχοινίου διαρραγέντος τὴν κεφαλὴν ἐπλήγη. λαβὼν οὖν ἔμπλαστρον παρὰ τοῦ ἰατροῦ καὶ θεὶς κατὰ τοῦ τραύματος, ἀπελθὼν πάλιν ἀπήγξατο.","type":"joke","tr":"Un Abderita che voleva impiccarsi si ferì alla testa poiché si era spezzata la corda. Prese dunque un impiastro dal dottore e lo pose sulla ferita, se ne andò e di nuovo si impiccò.","A":"117","app":[{"span":[10,20],"unit":291,"reading":"§SIG:A§ : ἀπήξασθαι §SIG:M§","editors":[],"sigla":["A","M"],"query":false,"lemma":"ἀπάγξασθαι","dirty":false,"id":"291"},{"query":false,"sigla":["A","M"],"editors":[],"reading":"§SIG:A§ : διαραγέντος §SIG:M§","unit":292,"span":[49,61],"id":"292","dirty":false,"lemma":"διαρραγέντος"}],"label":"112"},{"type":"joke","app":[{"dirty":false,"id":"293","lemma":"εὐνοῦχον","query":false,"sigla":["Thierfelder"],"reading":"del. §SIG:Thierfelder§","unit":293,"span":[11,19],"editors":["Thierfelder"]},{"id":"294","dirty":false,"lemma":"ἐμβάσεως","sigla":["A","Minas"],"query":false,"editors":["Minas"],"span":[38,46],"unit":294,"reading":"§SIG:Minas§ : ἐμβάστως §SIG:A§"},{"sigla":["A","Hertlein"],"query":false,"editors":["Hertlein"],"span":[74,78],"reading":"§SIG:Hertlein§ : επὶ §SIG:A§","unit":295,"id":"295","dirty":false,"lemma":"ἐπεὶ"}],"label":"113; 124 α","tr":"Un Abderita vide uno con un vistoso tumore che usciva da una vasca da bagno e disse: «Svuota la sacca, perché lo dico all’inserviente dei bagni!».","A":"118","wit":"A","text":"Ἀβδηρίτης [εὐνοῦχον] ἰδὼν κηλίτην ἀπὸ ἐμβάσεως ἐξιόντα εἶπεν· Ἀποκένωσον, ἐπεὶ τῷ παραχύτῃ λέγω.","n":118,"num":"113","dawe":"113"},{"n":119,"dawe":"114","num":"114","text":"Ἀβδηρίτης εὐνοῦχον ἰδὼν ἐπύθετο αὐτοῦ, πόσα παιδία ἔχει. ἑτέρου δὲ εἰπόντος τὸν ὄρχεις μὴ ἔχοντα μὴ δύνασθαι τέκνα γεννῆσαι, ὑπολαβὼν ‹....›","wit":"A","tr":"Un Abderita vide un eunuco e gli domandò quanti figli avesse. Quando l’altro disse che chi non ha testicoli non può generare figli, egli rispose ‹…«ma devi avere molti nipoti!» Minas…›","A":"119","app":[{"dirty":false,"id":"296","lemma":"αὐτοῦ","sigla":["A","Eberhard"],"query":false,"span":[32,37],"reading":"§SIG:Eberhard§ : αὐτῷ §SIG:A§","unit":296,"editors":["Eberhard"]},{"sigla":["A","Minas"],"query":false,"editors":["Minas"],"span":[109,123],"reading":"§SIG:A§ : τεκνογοννῆσαι §SIG:Minas§","unit":297,"id":"297","dirty":false,"lemma":"τέκνα γεννῆσαι"},{"query":false,"sigla":["Eberhard","Minas"],"unit":298,"reading":"post ὑπολαβὼν ἔφη· Πολλοὺς οὖν (γοῦν §SIG:Eberhard§) ἀνάγκη υἱωνοὺς ἔχειν suppl. §SIG:Minas§","span":null,"editors":["Eberhard","Minas"],"dirty":false,"id":"298","lemma":""}],"label":"114","type":"joke"},{"tr":"Un Abderita vide un eunuco che accompagnava una donna e chiedeva ad un altro se lei fosse la moglie di quello. Quando l’altro rispose che un eunuco non può avere moglie, disse: «E non è allora sua figlia?».","A":"120","app":[{"sigla":["A","M"],"query":false,"span":[32,41],"unit":299,"reading":"§SIG:A§ : προσομιλοῦντα §SIG:M§","editors":[],"dirty":false,"id":"299","lemma":"ὁμιλοῦντα"},{"dirty":false,"id":"300","lemma":"ἔφη· Οὐκοῦν","query":false,"sigla":["A","M","Minas"],"unit":300,"reading":"§SIG:A§§SIG:M§ : οὐκοῦν ἔφη §SIG:Minas§","span":[130,141],"editors":["Minas"]},{"unit":301,"reading":"§SIG:A§ : om. §SIG:M§","span":[142,149],"editors":[],"query":false,"sigla":["A","M"],"lemma":"θυγάτηρ","dirty":false,"id":"301"},{"query":false,"sigla":["Dawe"],"unit":302,"reading":"notam interrogationis add. §SIG:Dawe§","span":[156,161],"editors":["Dawe"],"dirty":false,"id":"302","lemma":"ἐστιν"}],"label":"115","type":"joke","n":120,"dawe":"115","num":"115","text":"Ἀβδηρίτης εὐνοῦχον ἰδὼν γυναικὶ ὁμιλοῦντα ἠρώτα ἄλλον, εἰ ἄρα γυνὴ αὐτοῦ ἐστι. τοῦ δὲ εἰπόντος εὐνοῦχον γυναῖκα ἔχειν μὴ δύνασθαι ἔφη· Οὐκοῦν θυγάτηρ αὐτοῦ ἐστιν;","wit":"AM"},{"tr":"Un Abderita eunuco per sventura sviluppò un tumore.","A":"121","app":[],"label":"116; 260 α","type":"joke","n":121,"dawe":"116","num":"116","text":"Ἀβδηρίτης εὐνοῦχος δυστυχήσας κήλην ἐποίησεν.","wit":"A"},{"text":"Ἀβδηρίτης μετὰ κηλίτου κοιμώμενος καὶ τῇ νυκτὶ πρὸς ἑαυτὸν ἀναστὰς ἐν τῷ ἐπαναστρέφειν σκοτίας οὔσης ἄκων τὴν κήλην ἐπάτησε. τοῦ δὲ κηλίτου κατακράξαντος, αὐτῷ ἔφη· Διὰ τί γὰρ κατακέφαλα κοιμᾶσαι;","dawe":"117","num":"117","n":122,"wit":"A","label":"117","app":[],"A":"122","tr":"Quando un Abderita dormiva con un tale con un tumore, di notte si alzò e tornando poi sui suoi passi, poiché era buio, senza volerlo schiacciò il rigonfiamento del tumore. Dal momento che il malato strepitò fragorosamente, gli disse: «E però perché dormi con la testa al posto dei piedi?».","type":"joke"},{"app":[],"label":"118","tr":"Un Abderita a passeggio vide uno con un grosso tumore che orinava e disse: «Questo fino a sera non si sarà svuotato!»","A":"123","type":"joke","text":"Ἀβδηρίτης περιπατῶν εἶδε κηλίτην οὐροῦντα καὶ εἶπεν· Οὗτος ἕως ἑσπέρας οὐ μὴ ἐξουρήσῃ.","n":123,"num":"118","dawe":"118","wit":"A"},{"app":[{"editors":[],"span":[101,109],"unit":303,"reading":"","sigla":[],"query":false,"lemma":"ἐγόμωσας","id":"303","dirty":false}],"label":"119; 118 α","tr":"Un Abderita vide uno con un grosso tumore che usciva da una piscina, e che camminava a stento, e disse a quello: «Ma perché ti sei caricato smisuratamente, pur non sapendola sollevare come si deve?».","A":"124","type":"joke","text":"Ἀβδηρίτης ἰδὼν κηλίτην ἀπὸ κολύμβου ἐξιόντα, μόλις δὲ περιπατοῦντα, πρὸς αὐτὸν εἶπε· Τί γὰρ ἀπλήστως ἐγόμωσας, μὴ δυνάμενος γενναίως βαστάσαι;","n":124,"dawe":"119","num":"119","wit":"A"},{"type":"joke","tr":"Un Abderita che aveva sentito che cipolle e bulbi gonfiano, quando durante una navigazione c’era molta bonaccia ne riempì un sacco e lo appese alla prua.","A":"125","app":[{"unit":304,"reading":"§SIG:Minas§ : κρόμυα §SIG:A§","span":[23,30],"editors":["Minas"],"query":false,"sigla":["A","Minas"],"lemma":"κρόμμυα","dirty":false,"id":"304"}],"label":"120; 146 α et 62 β","wit":"A","n":125,"dawe":"120","num":"120","text":"Ἀβδηρίτης ἀκούσας, ὅτι κρόμμυα καὶ βολβοὶ φυσῶσιν, ἐν τῷ πλέειν αὐτὸν γαλήνης οὔσης πολλῆς, σάκκον πλήσας ἀπὸ τῆς πρύμνης ἐκρέμασεν."},{"wit":"AM","num":"121","dawe":"121","n":126,"text":"Ἀβδηρίτης ἰδὼν δρομέα ἐσταυρωμένον εἶπε· Μὰ τοὺς θεοὺς οὗτος οὐκέτι τρέχει, ἀλλὰ πέτεται.","type":"joke","A":"126","tr":"Un Abderita vide un corridore crocifisso e disse: «Per gli dèi! Questo non corre più, ma vola!».","label":"121","app":[]},{"tr":"Un Abderita vendeva un tegame che non aveva orecchi. Ma quando uno chiese perché avesse tolto i suoi orecchi, rispose: «Perché non senta che è in vendita e scappi».","A":"127","app":[{"dirty":false,"id":"305","lemma":"τινὸς … ὠτία","query":false,"sigla":["A","M"],"unit":305,"reading":"§SIG:A§ : om. §SIG:M§","span":[42,89],"editors":[]}],"label":"122","type":"joke","n":127,"dawe":"122","num":"122","text":"Ἀβδηρίτης λεκάνην ἐπώλει μὴ ἔχουσαν ὠτία. τινὸς δὲ ἐρωτήσαντος, διὰ τί ἦρεν αὐτῆς τὰ ὠτία, ἀπεκρίνατο· Ἵνα μὴ ἀκούσασα, ὅτι πωλεῖται, φύγῃ.","wit":"AM"},{"tr":"Un Abderita cremò com’era uso il padre defunto, corse a casa dalla madre che stava male e disse: «Avanza ancora un po’ di legna: se dunque vuoi non soffrire più, fatti cremare con quella».","A":"128","app":[{"query":false,"sigla":["A","Minas"],"unit":306,"reading":"§SIG:Minas§ : ὦμον §SIG:A§","span":[43,48],"editors":["Minas"],"dirty":false,"id":"306","lemma":"νόμον"},{"sigla":["A","Boissonade"],"query":false,"span":[144,157],"reading":"§SIG:A§ : εἰ οὖν βούλει §SIG:Boissonade§","unit":307,"editors":["Boissonade"],"dirty":false,"id":"307","lemma":"ἐὰν … βούλῃ"},{"query":false,"sigla":["A","Dawe"],"editors":["Dawe"],"reading":"§SIG:Dawe§ : καὶ δύνασαι §SIG:A§","unit":308,"span":[158,170],"id":"308","dirty":false,"lemma":"μὴ ὀδυνᾶσθαι"}],"label":"123","type":"joke","n":128,"num":"123","dawe":"123","text":"Ἀβδηρίτης τὸν πατέρα τελευτήσαντα κατὰ τὸν νόμον καύσας, δραμὼν εἰς τὴν οἰκίαν πρὸς τὴν μητέρα αὐτοῦ νοσοῦσαν εἶπεν· Ὀλίγα ἔτι περιττεύει ξύλα· ἐὰν οὖν βούλῃ μὴ ὀδυνᾶσθαι, τοῖς αὐτοῖς κατακαύθητι.","wit":"A"},{"label":"124","app":[{"lemma":"κατ ὄναρ","dirty":false,"id":"309","span":[10,19],"reading":"§SIG:A§ : κατόναρ §SIG:M§","unit":309,"editors":[],"sigla":["A","M"],"query":false},{"lemma":"δηνάρια","dirty":false,"id":"310","span":[48,55],"reading":"§SIG:M§ : δινάρια §SIG:A§","unit":310,"editors":[],"sigla":["A","M"],"query":false},{"dirty":false,"id":"311","lemma":"διύπνισε","query":false,"sigla":["A","M"],"unit":311,"reading":"§SIG:A§ : δι’ ὕπνησε §SIG:M§","span":[114,122],"editors":[]},{"lemma":"καμμύσας","id":"312","dirty":false,"editors":["Minas"],"span":[124,134],"reading":"§SIG:Minas§ : καμύσας §SIG:A§§SIG:M§","unit":312,"sigla":["A","M","Minas"],"query":false}],"A":"129","tr":"Un Abderita in sogno vendeva un maialino e chiedeva cento denari. Allora siccome uno gliene dava cinquanta, non volendo accettarli si svegliò. Allora richiuse gli occhi, tese la mano in avanti e disse: «E va bene, dammi pure i cinquanta!»","type":"joke","text":"Ἀβδηρίτης κατ’ ὄναρ χοιρίδιον ἐπώλει καὶ ἐζήτει δηνάρια ἑκατόν. διδόντος δέ τινος πεντήκοντα μὴ βουλόμενος λαβεῖν διύπνισε. καμ‹μ›ύσας οὖν καὶ τὴν χεῖρα προτείνας εἶπε· Δὸς κἂν τὰ πεντήκοντα.","dawe":"124","num":"124","n":129,"wit":"AM"},{"app":[{"lemma":"ὑπῆρχεν","id":"313","dirty":false,"editors":[],"span":[116,123],"unit":313,"reading":"§SIG:A§§SIG:M§ : ὑπῆρχε","sigla":["A","M"],"query":false}],"label":"125","tr":"Il passerotto di un Abderita morì. Tempo dopo questi vide uno struzzo e disse: «Se il mio passerotto fosse vivo, ora sarebbe proprio di questa taglia!».","A":"130","type":"joke","text":"Ἀβδηρίτου στρουθίον ἀπέθανε. μετὰ οὖν χρόνον ἰδὼν στρουθοκάμηλον εἶπεν· Ἐὰν ἔζη τὸ στρουθίον μου, ἤδη ἂν τηλικοῦτον ὑπῆρχεν.","n":130,"num":"125","dawe":"125","wit":"AM"},{"text":"Ἀβδηρίτης εἰς Ῥόδον ἀποδημήσας ὡς ἐκ τοῦ ὀνόματος τοὺς τοίχους ὠσμᾶτο.","dawe":"126","num":"126","n":131,"wit":"AM","label":"126","app":[{"query":false,"sigla":["A","M"],"editors":[],"unit":314,"reading":"§SIG:A§ : τείχους §SIG:M§","span":[55,62],"id":"314","dirty":false,"lemma":"τοίχους"},{"editors":[],"span":[63,69],"unit":315,"reading":"§SIG:A§ : ὀσμᾶτο §SIG:M§","sigla":["A","M"],"query":false,"lemma":"ὠσμᾶτο","id":"315","dirty":false}],"A":"131","tr":"Un Abderita si recò in viaggio a Rodi{ N1|I2|Z1\\2\\ } e per via del nome annusava i muri.","type":"joke"},{"text":"","n":132,"dawe":"127","num":"127","wit":"A","app":[],"label":"127","tr":"Un Abderita che doveva ad un tale un asino ma non lo aveva, lo invitava ad accettare al posto di quello due muli.","A":"132","type":"joke"},{"type":"section","text":"σιδόνιοι","app":[]},{"type":"joke","app":[{"span":[140,151],"unit":316,"reading":"§SIG:Minas§ : ἀναλάηται §SIG:A§ (cf. ἀναλάβωσιν 105 α)","editors":["Minas"],"sigla":["A","Minas"],"query":false,"lemma":"ἀναλάβωνται","dirty":false,"id":"316"},{"sigla":["A","Dawe"],"query":false,"editors":["Dawe"],"span":[197,199],"unit":317,"reading":"§SIG:A§ : ἐστι §SIG:Dawe§","id":"317","dirty":false,"lemma":"ἦν"}],"label":"128; 105 α","tr":"Un governatore Sidonio viaggiava su di un carro. Siccome le mule erano stanche e non riuscivano a camminare, il cocchiere le sciolse perché pascolassero un po’ e si riprendessero. Vennero slegate ma fuggirono. E il governatore disse al cocchiere: «Vedi, disgraziato, che le mule corrono, è il carro che non riuscendo a correre sta fermo!».","A":"133","wit":"A","text":"Σιδόνιος ἔπαρχος ἐπὶ ὀχήματος ὥδευεν. ἐπεὶ δὲ ἀτονήσασαι αἱ ἡμίονοι οὐκ ἠδύναντο βαδίζειν, ἀπέλυσεν αὐτὰς ὁ ἡνίοχος, ἵνα μικρὸν βοσκηθεῖσαι ἀναλάβωνται. λυθεῖσαι οὖν ἔφυγον. καὶ ὁ ἔπαρχος πρὸς τὸν ἡνίοχον ἔφη· Ὁρᾷς, κάθαρμα, ὅτι αἱ μὲν ἡμίονοι τρέχουσι, τὸ δὲ ὄχημα δραμεῖν μὴ δυνάμενον ἵσταται.","n":133,"num":"128","dawe":"128"},{"type":"joke","A":"134","tr":"Un retore di Sidone chiacchierava con due amici. Quando uno diceva che non era giusto uccidere le pecore poiché forniscono latte e lana, e l’altro disse che non è giusto nemmeno uccidere il bue ché offre latte e ara, il retore disse che non era giusto nemmeno uccidere il maiale, dato che offre fegato, carne di mammella e rognoni.","label":"129 cf. 108 α","app":[{"editors":[],"reading":"§SIG:A§ : ἀρωτριῶσαν","unit":318,"span":[213,223],"query":false,"sigla":["A"],"lemma":"ἀροτριῶσαν","id":"318","dirty":false},{"lemma":"παρέχοντα","dirty":false,"id":"319","span":[278,287],"reading":"§SIG:A§ : παρέχουσαν §SIG:Boissonade§","unit":319,"editors":["Boissonade"],"sigla":["A","Boissonade"],"query":false},{"unit":320,"reading":"§SIG:A§ : βούλβαν §SIG:Boissonade§","span":null,"editors":["Boissonade"],"query":false,"sigla":["A","Boissonade"],"lemma":"βουλβάν","dirty":false,"id":"320"},{"editors":["Boissonade"],"span":null,"reading":"Φιλογέλω §SIG:Boissonade§","unit":321,"sigla":["Boissonade"],"query":false,"lemma":"","id":"321","dirty":false},{"id":"322","dirty":false,"lemma":"προσήκει","sigla":["Eberhard","Thierfelder"],"query":false,"editors":["Eberhard","Thierfelder"],"span":[171,179],"unit":322,"reading":"§SIG:Eberhard§ ex 108 α : προσῆκεν dub. §SIG:Thierfelder§ : δεῖ dub. §SIG:Eberhard§"},{"sigla":["A","Boissonade"],"query":false,"span":[198,223],"reading":"§SIG:Boissonade§ : παρέχοντα καὶ ἀροτριοῦντα §SIG:A§ ex 108 α","unit":323,"editors":["Boissonade"],"dirty":false,"id":"323","lemma":"παρέχουσαν … ἀροτριῶσαν"},{"dirty":false,"id":"324","lemma":"ἧπαρ","query":false,"sigla":["A","Boissonade"],"unit":324,"reading":"§SIG:Boissonade§ : ἥπαρ §SIG:A§","span":[273,277],"editors":["Boissonade"]},{"query":false,"sigla":["A","Boissonade"],"reading":"§SIG:A§ : παρέχουσαν §SIG:Boissonade§","unit":325,"span":[278,287],"editors":["Boissonade"],"dirty":false,"id":"325","lemma":"παρέχοντα"}],"wit":"A","num":"129","dawe":"129","n":134,"text":"Σιδόνιος ῥήτωρ μετὰ δύο ἑταίρων διελέγετο. τοῦ δὲ ἑνὸς λέγοντος, ὅτι οὐκ ἦν δίκαιον πρόβατα σφάζεσθαι διὰ τὸ φέρειν γάλα καὶ ἔριον, καὶ τοῦ ἄλλου εἰπόντος, ὅτι μηδὲ βοῦν ‹προσήκει› ἀναιρεῖσθαι γάλα παρέχουσαν καὶ ἀροτριῶσαν, ὁ ῥήτωρ ἔφη μηδὲ χοῖρον εἶναι δίκαιον σφάζεσθαι ἧπαρ παρέχοντα καὶ οὖθαρ καὶ νεφρία."},{"tr":"Un sofista di Sidone che si lava alla prima apertura del bagno, siccome non vi trova nessuno dice ai suoi servitori: «A quanto vedo, è chiuso».","A":"135","app":[{"reading":"§SIG:A§ : λουσόμενος §SIG:Eberhard§","unit":326,"span":[52,61],"editors":["Eberhard"],"query":false,"sigla":["A","Eberhard"],"lemma":"λουόμενος","dirty":false,"id":"326"}],"label":"130; 23 α","type":"joke","n":135,"num":"130","dawe":"130","text":"Σιδόνιος σοφιστὴς κατὰ πρώτην ἄνοιξιν τοῦ βαλανείου λουόμενος καὶ μηδένα ἔσωθεν εὑρὼν λέγει πρὸς τοὺς ἰδίους οἰκέτας· Καθὼς βλέπω, οὐ λούει.","wit":"A"},{"type":"joke","app":[],"label":"131; 61 α","tr":"Uno §I§scholastikos§/I§ di Sidone che aveva un terreno a molte miglia di distanza e che voleva renderlo più vicino, abbatté sette cippi miliari.","A":"136","wit":"A","text":"Σιδόνιος σχολαστικὸς ἀπὸ πολλῶν μιλίων χωρίον ἔχων καὶ θέλων αὐτὸ ἐγγύτερον ποιῆσαι ἑπτὰ κίονας μιλίων κατέστρεψεν.","n":136,"dawe":"131","num":"131"},{"text":"Σιδόνιος πραγματευτὴς μετὰ ἑτέρου ὥδευε. τῆς δὲ γαστρὸς ἀναγκαζούσης μικρὸν ἀπολειφθῆναι προσαπέμεινεν. ὁ δὲ συνοδοιπόρος ἀφῆκεν αὐτὸν γράψας ἔν τινι κίονι τῶν μιλίων· Τάχυνον, φθάσον με. ὁ δὲ ὡς ἀνέγνω, ἐπέγραψε κάτωθεν· Καὶ αὐτὸς μεῖνόν με.","dawe":"132","num":"132","n":137,"wit":"AM","label":"132; 42 α","app":[{"query":false,"sigla":["A","Dawe","M"],"editors":["Dawe"],"unit":327,"reading":"§SIG:A§§SIG:M§ :ἑταίρου §SIG:Dawe§","span":[27,33],"id":"327","dirty":false,"lemma":"ἑτέρου"},{"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ὥδευε §SIG:M§","unit":328,"span":[34,39],"editors":[],"dirty":false,"id":"328","lemma":"ὥδευε"},{"dirty":false,"id":"329","lemma":"προσαπέμεινεν","query":false,"sigla":["A","Dawe","M"],"reading":"§SIG:A§§SIG:M§ : πρόσω ἀπέμεινεν §SIG:Dawe§","unit":329,"span":[89,102],"editors":["Dawe"]},{"span":[145,149],"unit":330,"reading":"§SIG:A§ : τῆ §SIG:M§","editors":[],"sigla":["A","M"],"query":false,"lemma":"τινι","dirty":false,"id":"330"},{"sigla":["Eberhard"],"query":false,"editors":["Eberhard"],"span":[150,155],"reading":"delendum esse censit §SIG:Eberhard§","unit":331,"id":"331","dirty":false,"lemma":"κίονι"}],"A":"137","tr":"Un affarista di Sidone viaggiava insieme ad un altro. Siccome lo stomaco lo aveva costretto a trattenersi, rimase indietro. Il compagno di viaggio lo lasciò dopo avergli scritto su un cippo miliario: «Affrettati, raggiungimi». Quando lo lesse, scrisse sul retro: «E tu aspettami».","type":"joke"},{"n":138,"num":"133","dawe":"133","text":"Σιδονίῳ ἁλιεῖ λέγει τις· Ἔχει τὸ κυρτίν σου παγούρους; ὁ δὲ μανεὶς ἀπεκρίνατο· Ἔχει τὸ στῆθός σου καρκίνους;","wit":"A","tr":"Un tale dice ad un pescatore di Sidone: «La tua nassa1 ha paguri?» e quello si infuriò e rispose: «Il tuo petto ha granchi?».","A":"138","app":[],"label":"133","type":"joke"},{"n":139,"dawe":"134","num":"134","text":"Σιδόνιος ἑκατόνταρχος τοῖς στρατιώταις ἔλεγεν· Σήμερον πολλὰ καθίσατε· αὔριον γὰρ πολλὰ μέλλετε ὁδοιπορεῖν.","wit":"A","tr":"Un centurione di Sidone diceva ai soldati: «Oggi state tanto seduti: domani, infatti, dovrete fare molta strada!».","A":"139","app":[{"id":"332","dirty":false,"lemma":"καθίσατε","sigla":["A","Boissonade"],"query":false,"editors":["Boissonade"],"span":[61,69],"unit":332,"reading":"§SIG:Boissonade§ : καθήσατε §SIG:A§"}],"label":"134; 86 α","type":"joke"},{"label":"135","app":[],"A":"140","tr":"Un tale dice ad un candelaio di Sidone: «Signore, hai dei moccoli?» Quello allora si arrabbiò e rispose: «Signore, hai dei carbonchi?».","type":"joke","text":"Σιδονίῳ κηρουλαρίῳ λέγει τις· Ἔχεις, κῦρι, ἀποκαύματα; ὁ δὲ ὀργισθεὶς ἀπεκρίνατο· Ἔχεις, κῦρι, ἀνθρακώματα;","dawe":"135","num":"135","n":140,"wit":"A"},{"text":"Σιδόνιος γραμματικὸς ἠρώτα τὸν †διδάσκαλον· Ἡ πεντακότυλος λήκυθος πόσον χωρεῖ; ὁ δὲ εἶπεν· Οἶνον λέγεις ἢ ἔλαιον;","num":"136","dawe":"136","n":141,"wit":"A","label":"136; 96 α et 1 γ","app":[],"A":"141","tr":"Un segretario Sidonio chiedeva al †maestro†: « La boccetta da cinque cotili quanto è capace?». E quello disse: «Di vino dici, o di olio?».","type":"joke"},{"text":"Σιδονίῳ μαγείρῳ λέγει τις· Δάνεισόν μοι μάχαιραν ἕως Σμύρνης. ὁ δὲ ἔφη· Οὐκ ἔχω μάχαιραν ἕως ἐκεῖ φθάζουσαν.","num":"137","dawe":"137","n":142,"wit":"AM","label":"137; cf. 104 α","app":[{"editors":[],"unit":333,"reading":"§SIG:A§ : μάγειρος §SIG:M§","span":[8,15],"query":false,"sigla":["A","M"],"lemma":"μαγείρῳ","id":"333","dirty":false}],"A":"142","tr":"Un tale dice a un cuoco Sidonio: «Prestami un coltello fino a Smirne». Questo allora dice: «Non ho un coltello che arrivi fin lì».","type":"joke"},{"wit":"A","text":"Σιδόνιος κεντουρίων ἰδὼν ζευγηλάτην διὰ τῆς ἀγορᾶς ἅμαξαν φέροντα ἐκέλευσεν αὐτὸν τυφθῆναι. τοῦ δὲ εἰπόντος ὅτι Ῥωμαῖός εἰμι, καὶ οὐ χρὴ τύπτεσθαί με διὰ τὸν νόμον τοὺς βόας ἐκέλευσεν ὁ κεντουρίων μαστιγωθῆναι.","n":143,"num":"138","dawe":"138","type":"joke","app":[{"span":[25,35],"reading":"§SIG:Minas§ : ζευγελάτην §SIG:A§","unit":334,"editors":["Minas"],"sigla":["A","Minas"],"query":false,"lemma":"ζευγηλάτην","dirty":false,"id":"334"},{"sigla":["A","M"],"query":false,"span":null,"unit":335,"reading":"§SIG:M§ : ἀρώστου §SIG:A§","editors":[],"dirty":false,"id":"335","lemma":"ἀρρώστου"},{"lemma":"ἐκφερομένου","id":"336","dirty":false,"editors":[],"span":null,"reading":"§SIG:M§ : ἐκφερουμένου §SIG:A§","unit":336,"sigla":["A","M"],"query":false},{"query":false,"sigla":["A","M"],"unit":337,"reading":"§SIG:A§ : κηδία §SIG:M§","span":null,"editors":[],"dirty":false,"id":"337","lemma":"κηδείᾳ"},{"sigla":["A","M"],"query":false,"editors":[],"span":null,"reading":"§SIG:A§ : ἀκολουθὼν §SIG:M§","unit":338,"id":"338","dirty":false,"lemma":"ἀκολουθῶν"}],"label":"138","tr":"Un centurione Sidonio vide un carrettiere che portava il carro attraverso la piazza e ordinò che venisse percosso. Quando allora questi disse: «Sono un cittadino romano, per legge non posso essere percosso!», il centurione ordinò che fossero fustigati i buoi.","A":"143"},{"wit":"AM","n":144,"dawe":"139","num":"139","text":"","type":"joke","tr":"Un medico Sidonio ottenne in testamento da un suo ammalato mille dracme dopo la morte, e mentre quello veniva portato a sepoltura, lui seguiva il corteo e si lamentava del fatto che gli avesse lasciato poco in legato testamentario. Quando poi anche il figlio del defunto era incappato in una malattia e lo pregava di visitarlo e affrontare il morbo, il medico disse: «Se mi lascerai nel testamento cinquemila dracme, io ti curerò come ho fatto con tuo padre!».","A":"144","app":[],"label":"139"},{"type":"section","text":"εὐτράπελοι","app":[]},{"type":"joke","label":"140","app":[],"A":"145","tr":"Uno spiritoso vide un maestro elementare inetto insegnare, andò da lui e gli chiese perché non insegnasse a suonare la cetra. Quando quello allora rispose: «Perché non sono in grado», disse: «E perché dunque insegni le lettere, pur non essendone in grado?».","wit":"AM","text":"Εὐτράπελος ἰδὼν γραμματοδιδάσκαλον ἀφυῆ διδάσκοντα προσελθὼν ἠρώτα, διὰ τί κιθαρίζειν οὐ διδάσκει. Τοῦ δὲ εἰπόντος· Ὅτι οὐκ ἐπίσταμαι, εἶπε· Πῶς οὖν γράμματα διδάσκεις οὐκ ἐπιστάμενος;","dawe":"140","num":"140","n":145},{"wit":"A","n":146,"dawe":"141","num":"141","text":"Εὐτράπελος κυβερνήτης ἐρωτηθείς, τί φυσᾷ, εἶπε· Φάβα καὶ κρόμμυα.","type":"joke","tr":"A un timoniere spiritoso fu domandato che aria tirasse e rispose: «Di fave e cipolle!».","A":"146","app":[{"query":false,"sigla":["A"],"reading":": κυβερνίτης §SIG:A§","unit":339,"span":[11,21],"editors":[],"dirty":false,"id":"339","lemma":"κυβερνήτης"},{"editors":["Minas"],"span":[57,64],"reading":"§SIG:Minas§ : κρόμυα §SIG:A§","unit":340,"sigla":["A","Minas"],"query":false,"lemma":"κρόμμυα","id":"340","dirty":false}],"label":"141; 62 β, cf. 125 α"},{"wit":"A","text":"Εὐτράπελον ὀφθαλμιῶντα ἰατρὸς κλέπτης λύχνον ἔκλεψε. μιᾷ οὖν ταῦτα ἠρώτα αὐτόν· Πῶς ἔχεις εἰς τοὺς ὀφθαλμούς; καὶ ὁ εὐτράπελός φησιν· Ἀφ’ οὗ μοι ἤλειψας, τὸν λύχνον οὐ βλέπω αὐτόν.","num":"142","dawe":"142","n":147,"type":"joke","label":"142","app":[{"editors":["Cataudella","Thierfelder"],"span":[141,152],"reading":": μοι ἐδάνεισας §SIG:A§ ut supra §SIG:Cataudella§ : με ἔχρισας ut supra §SIG:Thierfelder§","unit":341,"sigla":["A","Cataudella","Thierfelder"],"query":false,"lemma":"μοι ἤλειψας","id":"341","dirty":false},{"sigla":["A","Dawe"],"query":false,"span":[154,179],"unit":342,"reading":"§SIG:A§ : τοῦ λύχνου οὐ βλέπω αὐγήν dub. §SIG:Dawe§","editors":["Dawe"],"dirty":false,"id":"342","lemma":"τὸν … αὐτόν"}],"A":"147","tr":"Un medico dalle mani lunghe guarì uno spiritoso che aveva un problema agli occhi e non ci vedeva, e gli rubò una lampada. Una volta poi gli chiedeva: «Come vanno gli occhi?» e lo spiritoso: «Da quando me li hai curati, non vedo proprio la lampada!»."},{"wit":"A","n":148,"num":"143","dawe":"143","text":"Εὐτραπέλῳ ἰατρῷ λέγει τις·‹...› Ἐὰν κτήσῃ [θερμὸν] ἀγγεῖον, θερμόν σε οὐ λείψει.","type":"joke","tr":"Il testo è lacunoso proprio nel momento in cui viene presentata la parola che sarà ripresa come §I§pointe §/I§del gioco di parole, ma il senso è perfettamente recuperabile dalla 64","A":"148","app":[],"label":"143; 64 β"},{"label":"144","app":[{"lemma":"τί χρῄζει","dirty":false,"id":"343","span":[42,51],"reading":"§SIG:A§ : τὶνος χρῄζει §SIG:Minas§","unit":343,"editors":["Minas"],"sigla":["A","Minas"],"query":false},{"sigla":["A","Eberhard"],"query":false,"editors":["Eberhard"],"span":[52,60],"unit":344,"reading":"§SIG:A§ : ὦ κῦρί (κύριέ) §SIG:Eberhard§","id":"344","dirty":false,"lemma":"ὁ κύριός"},{"lemma":"καταλαβεῖν","dirty":false,"id":"345","unit":345,"reading":"§SIG:Minas§ : καταβαλεῖν §SIG:A§","span":[162,172],"editors":["Minas"],"query":false,"sigla":["A","Minas"]}],"A":"149","tr":"Uno spiritoso vide un corridore svogliato e disse: «So cosa vuole il signore qui». Quando il giudice chiese: «Cosa? disse: «Ha bisogno di un cavallo! Perché non può riprendere in altro modo gli avversari!».","type":"joke","text":"Εὐτράπελος ἀργὸν δρομέα ἰδὼν εἶπεν· Οἶδα, τί χρῄζει ὁ κύριός μου οὗτος. τοῦ δὲ ἀγωνοθέτου ἐρωτήσαντος· Τί ἐστιν; εἶπεν· Ἵππου χρῄζει· ἄλλως γὰρ τοὺς ἀνταγωνιστὰς καταλαβεῖν οὐ δύναται.","dawe":"144","num":"144","n":149,"wit":"A"},{"tr":"Un oste spiritoso trovò un soldato sopra sua moglie e disse: «Ho trovato quello che non cercavo!».","A":"150","app":[],"label":"145","type":"joke","n":150,"dawe":"145","num":"145","text":"Εὐτράπελος κάπηλος εὑρὼν ταξεώτην ἐπὶ τῇ γυναικὶ αὐτοῦ εἶπεν· Εὗρον, ὃ οὐκ ἐζήτουν.","wit":"A"},{"text":"Εὐτράπελος χοῖρον κλέψας ἔφευγεν. ἐπεὶ δὲ κατελαμβάνετο, θεὶς αὐτὸν χαμαὶ καὶ δέρων ἔλεγεν· Ἐκεῖ ὄρυττε καὶ μὴ παρὰ τὰ ἐμά.","n":151,"num":"146","dawe":"146","wit":"A","app":[{"editors":["Mehler"],"reading":"del. §SIG:Mehler§","unit":346,"span":[62,67],"query":false,"sigla":["Mehler"],"lemma":"αὐτόν","id":"346","dirty":false},{"lemma":"κλέψας","dirty":false,"id":"347","unit":347,"reading":"§SIG:Dawe§ : κρύψας §SIG:A§ ex 68 β","span":[18,24],"editors":["Dawe"],"query":false,"sigla":["A","Dawe"]}],"label":"146; 68 β","tr":"Uno spiritoso rubò un maiale e fuggiva. Quando però fu acciuffato, lo poggiò per terra e mentre lo percuoteva diceva: «Scava lì, e non vicino alle mie cose!».","A":"151","type":"joke"},{"A":"152","tr":"Uno spiritoso vide un citarodo dalla voce bruta e stonata e lo salutò dicendo: «Salve, gallo!». Quando quello chiese perché lo avesse salutato così, disse: «Perché quando canti, si svegliano tutti!».","label":"147","app":[{"reading":": κοκκύσῃς edd. : κοκύσης §SIG:A§ : κοκίσης §SIG:M§","unit":348,"span":[153,161],"editors":[],"query":false,"sigla":["A","M"],"lemma":"κοκκύσῃς","dirty":false,"id":"348"}],"type":"joke","num":"147","dawe":"147","n":152,"text":"Εὐτράπελος ἰδὼν κακόηχον καὶ κακόφωνον κιθαρῳδὸν ἠσπάσατο λέγων· Χαῖρε, ἀλεκτρυών. τοῦ δὲ πυθομένου, διὰ τί αὐτὸν οὕτως προσηγόρευσεν, ἔφη· Ὅτι, ὅταν σὺ κοκκύσῃς, πάντες ἐγείρονται.","wit":"AM"},{"tr":"Uno spiritoso, quando un barbiere chiacchierone gli chiese: «Come te li taglio?» disse: «Stando in silenzio».","A":"153","app":[{"dirty":false,"id":"349","lemma":"Πῶς … κείρω","sigla":["A","Minas"],"query":false,"span":[40,52],"reading":"§SIG:Minas§ : Πῶς ἐκείρω §SIG:A§","unit":349,"editors":["Minas"]}],"label":"148","type":"joke","n":153,"num":"148","dawe":"148","text":"Εὐτράπελος φλυάρου κουρέως ἐρωτήσαντος· Πῶς σε κείρω; Σιωπῶν, ἔφη.","wit":"A"},{"type":"joke","label":"149; 71 β","app":[{"editors":["Minas"],"reading":"§SIG:Minas§ : ὀριγισθεὶς §SIG:A§","unit":350,"span":[33,42],"query":false,"sigla":["A","Minas"],"lemma":"ὑβρισθεὶς","id":"350","dirty":false},{"dirty":false,"id":"351","lemma":"ἐν","query":false,"sigla":["Boissonade"],"unit":351,"reading":"§SIG:Boissonade§","span":[104,106],"editors":["Boissonade"]}],"A":"154","tr":"Uno spiritoso fu maltrattato in un bagno da un tale e portava come testimoni gli inservienti. Quando l’imputato obiettava che non erano degni di fede, disse: «Se fossi stato maltrattato nel cavallo di legno, avrei portato come testimoni Menelao, Odisseo e Diomede, ché erano lì; siccome invece la violenza è avvenuta nel bagno, avranno per forza visto meglio il fatto gli inservienti!».","wit":"A","text":"Εὐτράπελος ἐν βαλανείῳ ὑπό τινος ὑβρισθεὶς μάρτυρας προσέφερε τοὺς παραχύτας. τοῦ δὲ ἀντιδίκου ἀποβαλλομένου ὡς μὴ ὄντας ἀξιοπίστους ἔφη· Εἰ μὲν ‹ἐν› τῷ δουρείῳ ἵππῳ ὑβρίσθην, προήγαγον ἂν μάρτυρας τοὺς περὶ Μενέλαον καὶ Ὀδυσσέα καὶ Διομήδην· ἐν δὲ τῷ βαλανείῳ τῆς ὕβρεως γενομένης ἀνάγκη τοὺς παραχύτας τὸ πραχθὲν μᾶλλον εἰδέναι.","dawe":"149","num":"149","n":154},{"wit":"A","n":155,"dawe":"150","num":"150","text":"Εὐτράπελος, δύο] ξύστρων παρ’ αὐτοῦ ‹ὑπὸ δύο› ἐν βαλανείῳ ἐπιζητουμένων, ὑπὸ ἑνὸς μὲν ἀγνωρίστου, ὑπὸ δὲ ἑτέρου γνωρίμου μὲν ἀλλὰ κλέπτου, ὁ εὐτράπελος ἔφη· Σὲ μὲν ‹μὴ› γνωρίζων οὐ δώσω· σὲ δὲ [μὴ] γνωρίζων οὐ δώσω.","type":"joke","tr":"Uno spiritoso, quando in un bagno gli venivano richiesti in prestito dei raschietti da due tali, e uno era uno sconosciuto, l’altro invece noto ma era un ladro, disse: «A te, siccome non ti conosco, non lo do; a te invece, siccome ti conosco, non lo do».","A":"155","app":[{"id":"352","dirty":false,"lemma":"δύο","query":false,"sigla":["Dawe"],"editors":["Dawe"],"unit":352,"reading":"del. §SIG:Dawe§","span":[12,15]},{"editors":["Dawe"],"reading":"add. §SIG:Dawe§","unit":353,"span":[37,44],"query":false,"sigla":["Dawe"],"lemma":"ὑπὸ δύο","id":"353","dirty":false},{"lemma":"μὴ","id":"354","dirty":false,"editors":["Dawe"],"span":[165,167],"reading":"add. §SIG:Dawe§","unit":354,"sigla":["Dawe"],"query":false},{"editors":["Dawe"],"unit":355,"reading":"del. §SIG:Dawe§","span":[194,196],"query":false,"sigla":["Dawe"],"lemma":"μὴ","id":"355","dirty":false}],"label":"150"},{"A":"156","tr":"Uno spiritoso vide un lenone che vendeva una prostituta nera e disse: «A quanto vendi la notte{ N1|I4|Z1\\4\\ }?».","label":"151; 69 β","app":[],"type":"joke","dawe":"151","num":"151","n":156,"text":"Εὐτράπελος ἰδὼν πορνοβοσκὸν μισθοῦντα μέλαιναν ἑταιρίδα εἶπε· Πόσου τὴν νύκτα μισθοῖς;","wit":"A"},{"wit":"A","n":157,"num":"151 bis","dawe":"151 bis","text":"Εὐτράπελος ἰδὼν ἰατρὸν κόρην ὑπαλείφοντα ἔφη· Ὅρα, νεανίσκε, μὴ τὴν ὄψιν θεραπεύων τὴν κόρην διαφθείρῃς.","type":"joke","tr":"Uno spiritoso vide un medico che applicava un collirio a una ragazza e disse «Occhio, giovanotto, non sciupare la pupa/pulzella{ N1|I5|Z1\\5\\ } curando quella pupilla».","A":"157","app":[{"lemma":"κόρην","dirty":false,"id":"356","unit":356,"reading":"§SIG:A§ : κόρην ὀφθαλμιῶσαν §SIG:Thierfelder§","span":[23,28],"editors":["Thierfelder"],"query":false,"sigla":["A","Thierfelder"]}],"label":"151 bis; 66 β"},{"app":[{"span":[74,78],"reading":"§SIG:A§ : αὐτὸ §SIG:M§","unit":357,"editors":[],"sigla":["A","M"],"query":false,"lemma":"αὐτῷ","dirty":false,"id":"357"},{"lemma":"ἐμπαρεὶς","id":"358","dirty":false,"editors":["Hertlein"],"unit":358,"reading":"§SIG:A§§SIG:M§ : ἐμπλακεὶς §SIG:Hertlein§","span":null,"query":false,"sigla":["A","Hertlein","M"]},{"editors":[],"unit":359,"reading":"§SIG:A§ : καταλείψεις §SIG:M§","span":null,"query":false,"sigla":["A","M"],"lemma":"καταλείψῃς","id":"359","dirty":false},{"dirty":false,"id":"360","lemma":"ἰατρεύσω … σου","query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ὡς τὸν πατέρα σου ἰατρεύσω §SIG:M§","unit":360,"span":null,"editors":[]},{"editors":[],"span":null,"reading":"ἐυτράπελοι (sic) §SIG:A§ : titulum om. §SIG:M§","unit":361,"sigla":["A","M"],"query":false,"lemma":"","id":"361","dirty":false},{"lemma":"πρὸς2 … φονεῦσαι","dirty":false,"id":"362","span":[26,67],"reading":"§SIG:A§ : ἐπὶ τῷ ζῆν dub. §SIG:Thierfelder§, rec. §SIG:Dawe§","unit":362,"editors":["Dawe","Thierfelder"],"sigla":["A","Dawe","Thierfelder"],"query":false},{"id":"363","dirty":false,"lemma":"φεύξομεν","sigla":["A","M","Minas"],"query":false,"editors":["Minas"],"span":[214,222],"unit":363,"reading":"§SIG:Minas§ : φεύγομεν §SIG:A§§SIG:M§"},{"dirty":false,"id":"364","lemma":"δοκῇ","query":false,"sigla":["A","M"],"reading":"§SIG:A§ : δοκεῖ §SIG:M§","unit":364,"span":null,"editors":[]},{"unit":365,"reading":"dub. §SIG:Thierfelder§, rec. §SIG:Dawe§ : ἀπάλαιστος §SIG:A§ : ἀπάλαιστον §SIG:M§","span":null,"editors":["Dawe","Thierfelder"],"query":false,"sigla":["A","Dawe","M","Thierfelder"],"lemma":"ἀπάλαιστρος","dirty":false,"id":"365"},{"id":"366","dirty":false,"lemma":"δι ὅλου","query":false,"sigla":["A","M"],"editors":[],"reading":"§SIG:A§ : διόλου §SIG:M§","unit":366,"span":null}],"label":"152; 72 β; cf. 13 α","tr":"Due spiritosi parricidi si lamentavano l’un l’altro dell’uccidere i propri genitori. Uno allora disse all’altro: «Affinché certa gente non ci consideri parricidi, tu ammazza mio padre, e io il tuo: e ci evitiamo una brutta fama!».","A":"158","type":"joke","text":"Εὐτράπελοι δύο πατραλοῖαι πρὸς ἀλλήλους ἐδυσφόρουν πρὸς τὸ φονεῦσαι τοὺς ἑαυτῶν γονεῖς. ὁ δὲ ἕτερος πρὸς τὸν ἄλλον ἔφη· Ἵνα μὴ πατροκτόνοι παρά τισι λογισθῶμεν, σὺ φόνευσον τὸν ἐμὸν πατέρα, κἀγὼ τὸν σόν· καὶ κακῆς φεύξομεν φήμης.","n":158,"dawe":"152","num":"152","wit":"A"},{"label":"153","app":[],"A":"159","tr":"Uno spiritoso cadde nel fango mentre lottava, e perché non sembrasse essere goffo, si rigirò, si infangò tutto e si sollevò vantandosi.","type":"joke","text":"","dawe":"153","num":"153","n":159,"wit":"AM"},{"type":"section","app":[],"text":"κυμαῖοι"},{"text":"Ἐν Κύμῃ ἐπισήμου τινὸς κηδευομένου προσελθών τις ἠρώτα τοὺς ὀψικεύοντας· Τίς ὁ τεθνηκώς; εἷς δὲ Κυμαῖος στραφεὶς ὑπεδείκνυε λέγων· Ἐκεῖνος ὁ ἐπὶ τῆς κλίνης ἀνακείμενος.","dawe":"154","num":"154","n":160,"wit":"A","label":"154","app":[],"A":"160","tr":"A Cuma mentre qualcuno di insigne veniva seppellito, arrivò un tale e chiedeva ai presenti: «Chi è il morto?». Allora un Cumano si voltò e indicava dicendo: «Quello lì che giace sul letto funebre».","type":"joke"},{"wit":"A","num":"155","dawe":"155","n":161,"text":"Κυμαίῳ ἵππον πιπράσκοντι προσελθών τις ἠρώτα, εἰ πρωτοβόλος ὁ ἵππος. τοῦ δὲ εἰπόντος, ὅτι δευτεροβολεῖ, ἔφη· Πῶς οἶδας; ὁ δὲ εἶπεν· Ὅτι ἅπαξ ἐμὲ κάτω ἔβαλε καὶ ἅπαξ τὸν πατέρα μου.","type":"joke","A":"161","tr":"Un tale si avvicinò a un Cumano che vendeva un cavallo e gli domandava se il cavallo fosse di primo ricambio. Quando quello disse che era di secondo ricambio, disse: «Come lo sai?» e quello rispose «Perché una volta ha disarcionato me, e una volta ha fatto cadere mio padre».","label":"155; cf. 4 α et 3 β","app":[]},{"app":[],"label":"156; cf. 41 α et 10 β","tr":"Un Cumano che vendeva una casa strappò via una pietra da essa e la portava in giro come campione dimostrativo.","A":"162","type":"joke","text":"Κυμαῖος οἰκίαν πωλῶν λίθον ἐξ αὐτῆς ἐκβαλὼν εἰς δεῖγμα περιέφερεν.","n":162,"dawe":"156","num":"156","wit":"A"},{"wit":"A","text":"Κυμαῖος ἵππον πιπράσκων ἠρωτήθη, μὴ δειλὸς εἴη. ὁ δὲ ἀπεκρίνατο· Οὐ μὰ τὴν σωτηρίαν μου· ἐν τῇ φάτνῃ γὰρ μόνος εἱστήκει.","dawe":"157","num":"157","n":163,"type":"joke","label":"157; cf. 10 α","app":[{"id":"367","dirty":false,"lemma":"εἱστήκει","query":false,"sigla":["A"],"editors":[],"reading":": εἱστία §SIG:A§","unit":367,"span":[111,119]}],"A":"163","tr":"A un Cumano che vendeva un cavallo fu chiesto se quello fosse pauroso. Egli rispose: «No, per l’anima mia! Nella stalla, infatti, stava da solo!»."},{"wit":"A","text":"Κυμαῖος κλεψιμαῖα ἱμάτια ἀγοράσας διὰ τὸ μὴ γνωρισθῆναι ἐπίσσωσεν αὐτά.","n":164,"num":"158","dawe":"158","type":"joke","app":[],"label":"158; cf. 35 α","tr":"Un Cumano si mise a vendere mantelli rubati e perché non fossero riconosciuti come tali, li ricoprì di pece.","A":"164"},{"wit":"A","text":"Κυμαῖος ἵππον ἐπίπρασκεν. ἐλθόντος δέ τινος καὶ καταμανθάνοντος αὐτοῦ τὸν βόλον εἶπε· Τί τοὺς ὀδόντας αὐτοῦ καταμανθάνεις; εἴθε ὡς τρώγει, οὕτως καὶ περιεπάτει.","num":"158 bis","dawe":"158 bis","n":165,"type":"joke","label":"158 bis; cf. 37 α et 6 β","app":[],"A":"165","tr":"Un Cumano vendeva un cavallo. Poiché era giunto un tale e ne esaminava la dentatura, disse: «Perché osservi i suoi denti? Oh, se trottasse tanto quanto mangia!»."},{"wit":"AM","n":166,"dawe":"159","num":"159","text":"Κυμαῖος ἅλωνα μεγάλην ποιήσας ἔστησεν ἄντικρυς τὴν γυναῖκα αὐτοῦ καὶ ἠρώτα, εἰ βλέπει αὐτόν. τῆς δὲ εἰπούσης, ὅτι μόλις αὐτὸν βλέπει, ἔφη ἐκεῖνος· Ἀλλ’ ἐγὼ εἰς καιρὸν τηλικαύτην ποιήσω ἅλωνα, ἵνα μήτε ἐγὼ σὲ μήτε σὺ ἐμὲ ἴδῃς.","type":"joke","tr":"Un Cumano realizzò una grande aia, piazzò sua moglie dalla parte opposta e le chiedeva se lo vedesse. Quando questa rispose che lo guardava a fatica, quello disse: «Ma io in un tempo abbastanza ampio realizzerò un’aia che farà sì che né io guarderò te, né tu me».","A":"166","app":[{"dirty":false,"id":"368","lemma":"ἔστησεν ἄντικρυς","query":false,"sigla":["A","M"],"unit":368,"reading":"§SIG:A§ : ἕστησεν ἄντικρυ §SIG:M§","span":[30,46],"editors":[]},{"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ἠρῶτα §SIG:M§","unit":369,"span":[69,74],"editors":[],"dirty":false,"id":"369","lemma":"ἠρώτα"},{"lemma":"ποιήσω","dirty":false,"id":"370","span":[178,184],"unit":370,"reading":"§SIG:A§ : ποιήσας §SIG:M§ac","editors":[],"sigla":["A","M"],"query":false}],"label":"159"},{"wit":"AM","text":"Κυμαῖος ἐπιζητῶν φίλον ἐκάλει αὐτὸν πρὸ τῆς οἰκίας ὀνομαστί. ἑτέρου δὲ εἰπόντος· Ὑψηλότερον φώνησον, ἵνα ἀκούσῃ ἀφεὶς τὸ ὄνομα, ὃ ᾔδει, ἐβόα· Ὑψηλότερε.","n":167,"dawe":"160","num":"160","type":"joke","app":[{"id":"371","dirty":false,"lemma":"ἀκούσῃ","query":false,"sigla":["A","M"],"editors":[],"unit":371,"reading":"§SIG:A§ : ἀκούσει §SIG:M§","span":[105,111]}],"label":"160","tr":"Un Cumano che cercava un amico lo chiamava per nome davanti casa. Quando un tale gli disse: «Chiamalo più forte, cosicché ti senta!» quello tralasciò il nome che conosceva, e gridava: «Oh, Più forte!».","A":"167"},{"type":"joke","app":[],"label":"161","tr":"Un Cumano che faceva progetti sulla casa di un debitore e che voleva prendersi un credito ancor più grande, scelse documenti piuttosto pesanti.","A":"168","wit":"AM","text":"Κυμαῖος δανειστοῦ οἰκίᾳ ἐπιβουλεύων καὶ θέλων τὰ μείζονα δάνεια κλέψαι τὰ βαρύτερα χαρτία ἐπελέγετο.","n":168,"num":"161","dawe":"161"},{"type":"joke","app":[{"span":[9,12],"unit":372,"reading":"dubitanter §SIG:Eberhard§","editors":["Eberhard"],"sigla":["Eberhard"],"query":false,"lemma":"τὴν","dirty":false,"id":"372"},{"query":false,"sigla":["A","M"],"editors":[],"unit":373,"reading":"§SIG:A§ : Λολιανὸς §SIG:M§","span":[48,57],"id":"373","dirty":false,"lemma":"Λολλιανὸς"},{"lemma":"ὀργισθέντες","dirty":false,"id":"374","unit":374,"reading":"post ὀργισθέντες lacunam indicavit §SIG:Dawe§: irae causa desideretur","span":[133,144],"editors":["Dawe"],"query":false,"sigla":["Dawe"]}],"label":"162","tr":"Quando i Cumani cingevano di mura la città, uno dei cittadini, di nome Lolliano, edificò due cortine a spese proprie. Quando allora si presentarono i nemici i Cumani si adirarono e stabilirono che nessuno avrebbe sorvegliato il muro di Lolliano, se non quello, da solo.","A":"169","wit":"AM","text":"Κυμαίων ‹τὴν› πόλιν τειχιζόντων εἷς τῶν πολιτῶν Λολλιανὸς καλούμενος δύο κορτίνας ἰδίοις ἐτείχισεν ἀναλώμασι. πολεμίων δὲ ἐπιστάντων ὀργισθέντες οἱ Κυμαῖοι συνεφώνησαν, ἵνα τὸ Λολλιανοῦ τεῖχος μηδεὶς φυλάξῃ ἀλλ’ ἐκεῖνος μόνος.","n":169,"num":"162","dawe":"162"},{"wit":"A","n":170,"dawe":"163","num":"163","text":"Κυμαῖοι προσδοκῶντες ἐξ ἀποδημίας φίλον αὐτῶν ἀξιότιμον καὶ βουλόμενοι αὐτὸν ἐν τῷ βαλανείῳ διὰ καθαροῦ ὕδατος τιμῆσαι, μίαν ἔχοντες κολυμβήθραν, ταύτην ὕδατος θερμοῦ καθαροῦ πλήσαντες ἐν μέσῳ αὐτῆς κάγκελλον τρητὸν ἔβαλον, ὅπως τὸ ἥμισυ τοῦ ὕδατος καθαρὸν τῷ προσδοκωμένῳ τηρῆται φίλῳ.","type":"joke","tr":"I Cumani attendevano al rientro da un viaggio un loro spettabile amico, e poiché desideravano onorarlo con acqua pura alle terme, avendo loro una sola vasca, riempirono questa di acqua calda e pura e misero in mezzo ad essa una grata, in modo che una metà dell’acqua sia conservata pura per l’amico atteso.","A":"170","app":[{"query":false,"sigla":["A","Minas","Thierfelder"],"editors":["Minas","Thierfelder"],"unit":375,"reading":"§SIG:Minas§ : τρίτον §SIG:A§ : susp §SIG:Thierfelder§","span":[209,215],"id":"375","dirty":false,"lemma":"τρητὸν"}],"label":"163"},{"text":"Κυμαῖος ἐν τῷ κολυμβᾶν βροχῆς γενομένης διὰ τὸ μὴ βραχῆναι εἰς τὸ βάθος κατέδυ.","n":171,"dawe":"164","num":"164","wit":"AM","app":[{"span":[72,78],"reading":"§SIG:A§ : κατέβη §SIG:M§","unit":376,"editors":[],"sigla":["A","M"],"query":false,"lemma":"κατέδυ","dirty":false,"id":"376"}],"label":"164","tr":"Siccome scoppiò un acquazzone, un Cumano, in piscina, per non inzupparsi s’immerse sott’acqua.","A":"171","type":"joke"},{"wit":"AM","num":"165","dawe":"165","n":172,"text":"Κυμαῖος θυρίδας ἀγοράζων ἠρώτα, εἰ δύνανται πρὸς μεσημβρίαν βλέπειν.","type":"joke","A":"172","tr":"Un Cumano che acquistava finestre domandava se esse potessero guardare a mezzogiorno.","label":"165","app":[{"span":[35,43],"reading":"§SIG:Boissonade§ : δύνωνται §SIG:A§§SIG:M§","unit":377,"editors":["Boissonade"],"sigla":["A","Boissonade","M"],"query":false,"lemma":"δύνανται","dirty":false,"id":"377"}]},{"n":173,"dawe":"166","num":"166","text":"Κυμαῖος ὄνῳ καθήμενος παρὰ κῆπον ὥδευεν. ἰδὼν οὖν κλάδον συκῆς ὑπερέχοντα σύκων ὡρίμων πεπληρωμένον ἐπελάβετο τοῦ κλάδου. τοῦ δὲ ὄνου ὑπεκδραμόντος ἀπεκρεμάσθη, καὶ τοῦ κηπουροῦ ἐρωτήσαντος, τί ἐκεῖ ποιεῖ κρεμάμενος, ἔλεγεν· Ἐκ τοῦ ὄνου ἔπεσα.","wit":"AM","tr":"Un Cumano costeggiava un orto seduto su di un asino. Vide, dunque, un ramo carico di fichi maturi e ci si aggrappò. Quando però l’asino gli sfuggì via da sotto, rimase appeso, e quando l’ortolano gli domandò cosa facesse lì appeso, diceva: «Sono caduto dall’asino!». Capire se la preposizione può avere anche valore verso l’alto","A":"173","app":[{"editors":["Eberhard"],"span":[12,21],"reading":"§SIG:A§§SIG:C§ : παρακαθήμενος §SIG:M§ : ἐπικαθήμενος §SIG:Eberhard§","unit":378,"sigla":["A","C","Eberhard","M"],"query":false,"lemma":"καθήμενος","id":"378","dirty":false},{"dirty":false,"id":"379","lemma":"ὑπερέχοντα","sigla":["A","Eberhard","M"],"query":false,"span":[63,73],"unit":379,"reading":"§SIG:Eberhard§ : ὑπέχοντα §SIG:A§ : ἐπέχοντα §SIG:M§","editors":["Eberhard"]},{"query":false,"sigla":["A","C","M"],"editors":[],"reading":"§SIG:A§§SIG:C§ : ὁρίμων §SIG:M§","unit":380,"span":[80,86],"id":"380","dirty":false,"lemma":"ὡρίμων"},{"reading":"§SIG:C§§SIG:M§ : ἀπεκρεμμάσθη §SIG:A§","unit":381,"span":[148,159],"editors":[],"query":false,"sigla":["A","C","M"],"lemma":"ἀπεκρεμάσθη","dirty":false,"id":"381"},{"sigla":["A","C","M"],"query":false,"span":[169,177],"unit":382,"reading":"§SIG:A§ : κηπωροῦ §SIG:M§§SIG:C§ hinc C incipit","editors":[],"dirty":false,"id":"382","lemma":"κηπουροῦ"},{"reading":"§SIG:A§§SIG:M§ : αἰτήσαντος §SIG:C§","unit":383,"span":[178,189],"editors":[],"query":false,"sigla":["A","C","M"],"lemma":"ἐρωτήσαντος","dirty":false,"id":"383"},{"dirty":false,"id":"384","lemma":"ἐκεῖ ποιεῖ","sigla":["A","C","M"],"query":false,"span":[194,204],"unit":384,"reading":"§SIG:A§ : ποιεῖ ἐκεῖ §SIG:C§ : ἐκ σοῦ ποιεῖ §SIG:M§","editors":[]},{"query":false,"sigla":["A","C","M"],"editors":[],"unit":385,"reading":"§SIG:M§ : κρεμμάμενος §SIG:A§§SIG:C§","span":[205,215],"id":"385","dirty":false,"lemma":"κρεμάμενος"},{"span":[225,231],"reading":"§SIG:A§§SIG:C§§SIG:M§ : ἔκ του dub. §SIG:Dawe§","unit":386,"editors":["Dawe"],"sigla":["A","C","Dawe","M"],"query":false,"lemma":"Ἐκ τοῦ","dirty":false,"id":"386"}],"label":"166","type":"joke"},{"text":"Κυμαῖος ἰδὼν πρόβατον συμπεποδισμένον καὶ οὕτω κειρόμενον εἶπεν· Εὐχαριστῶ τῷ κουρεῖ μου, ὅτι οὐδέποτέ μεδήσας ἔκειρεν.","n":174,"num":"167","dawe":"167","wit":"AMC","app":[{"dirty":false,"id":"387","lemma":"συμπεποδισμένον","sigla":["A","C","M"],"query":false,"span":[22,37],"unit":387,"reading":"§SIG:A§§SIG:M§ : συμπεποδηγμένον §SIG:C§","editors":[]},{"span":[47,57],"reading":"§SIG:A§§SIG:C§ : κηρόμενον §SIG:M§","unit":388,"editors":[],"sigla":["A","C","M"],"query":false,"lemma":"κειρόμενον","dirty":false,"id":"388"},{"span":[78,84],"reading":"§SIG:Bursian§ et §SIG:Haupt§ : κυρίω §SIG:A§§SIG:M§§SIG:C§","unit":389,"editors":["Bursian","Haupt"],"sigla":["A","Bursian","C","Haupt","M"],"query":false,"lemma":"κουρεῖ","dirty":false,"id":"389"},{"span":[111,118],"unit":390,"reading":"§SIG:A§2pc : ἔκειρε §SIG:A§ac§SIG:C§ : ἔκηρε §SIG:M§","editors":[],"sigla":["A","C","M"],"query":false,"lemma":"ἔκειρεν","dirty":false,"id":"390"}],"label":"167","tr":"Un Cumano vide una pecora legata e che veniva così tosata, e disse: «Ringrazio il mio barbiere, perché non mi ha mai rasato dopo avermi legato».","A":"174","type":"joke"},{"tr":"Un Cumano, mentre il padre era fuori per affari, cadde in una pesante accusa e fu condannato a morte. Allora mentre usciva pregava tutti che il padre non venisse a saperlo, dal momento che lo avrebbe ucciso di botte.","A":"175","app":[{"editors":[],"span":[164,173],"unit":391,"reading":"§SIG:A§ : εἰσφέρειν §SIG:C§","sigla":["A","C"],"query":false,"lemma":"ἐπιφέρειν","id":"391","dirty":false}],"label":"168","type":"joke","n":175,"dawe":"168","num":"168","text":"Κυμαῖος τοῦ πατρὸς αὐτοῦ ἀποδημήσαντος εἰς βαρὺ ἔγκλημα πεσὼν θανάτῳ κατεδικάσθη. ἀπιὼν δὲ παρεκάλει πάντας, ἵνα ὁ πατὴρ μὴ γνῷ, ἐπεὶ μέλλει αὐτῷ θανασίμους πληγὰς ἐπιφέρειν.","wit":"AC"},{"text":"Ὁ αὐτός, τινὸς αὐτῷ εἰπόντος ὅτι Ἐσύλησάς με Μὴ ὑποστρέψω, ‹ἔφη›, ἔνθεν ἄπειμι, εἰ ἐσύλησά ‹σε›.","num":"169","dawe":"169","n":176,"wit":"A","label":"169","app":[{"sigla":["Boissonade"],"query":false,"span":[60,63],"reading":"vel εἶπεν dub. add. §SIG:Boissonade§","unit":392,"editors":["Boissonade"],"dirty":false,"id":"392","lemma":"ἔφη"},{"lemma":"σε","id":"393","dirty":false,"editors":["Dawe"],"unit":393,"reading":"add. §SIG:Dawe§","span":[92,94],"query":false,"sigla":["Dawe"]}],"A":"176","tr":"Sempre questo, quando un tale gli disse: «Mi hai derubato!», fece: «Che io non faccia ritorno lì da dove me ne vado, se ti ho derubato».","type":"joke"},{"text":"Κυμαίου τὶς ἐπύθετο, ποῦ μένει Δρακοντίδης ὁ ῥήτωρ. ὁ δέ· Μόνος εἰμί, εἶπεν· εἰ δὲ θέλεις, τήρει τὸ ἐργαστήριον, κἀγὼ ἀπελθὼν δείξω σοι.","num":"170","dawe":"170","n":177,"wit":"AMC","label":"170","app":[{"dirty":false,"id":"394","lemma":"Κυμαίου","sigla":["A","C","M","Minas"],"query":false,"span":[0,7],"unit":394,"reading":"§SIG:Minas§ : Κυμαίω §SIG:A§ : Κυμαῖος §SIG:M§§SIG:C§","editors":["Minas"]},{"span":[31,42],"reading":"§SIG:A§§SIG:C§ : δρακοντίδος §SIG:M§","unit":395,"editors":[],"sigla":["A","C","M"],"query":false,"lemma":"Δρακοντίδης","dirty":false,"id":"395"},{"sigla":["A","C","M"],"query":false,"span":[52,56],"reading":"§SIG:C§ : om. §SIG:A§§SIG:M§","unit":396,"editors":[],"dirty":false,"id":"396","lemma":"ὁ δέ"},{"id":"397","dirty":false,"lemma":"τήρει","query":false,"sigla":["A","C","M"],"editors":[],"reading":"§SIG:A§§SIG:C§ : τήρη §SIG:M§","unit":397,"span":[91,96]}],"A":"177","tr":"Un tale chiese a un Cumano dove vivesse il retore Dracontide. Quello disse: «Sono da solo, ma se vuoi, tienimi la bottega, ed io uscirò fuori e ti farò vedere».","type":"joke"},{"dawe":"171","num":"171","n":178,"text":"Κυμαῖος ἐπ’ Ἀλεξανδρείᾳ τοῦ πατρὸς αὐτοῦ ἀποθανόντος τὸ σῶμα τοῖς ταριχευταῖς δέδωκε. μετὰ δὲ χρόνον ἐζήτει αὐτὸ ἀπολαβεῖν. τοῦ δὲ ‹ταριχευτοῦ› ἔχοντος καὶ ἄλλα σώματα καὶ ἐρωτῶντος, τί σημεῖον ἔχει [ἡ] τοῦ πατρὸς αὐτοῦ [θήκη], ἀπεκρίθη· Ἔβησσεν.","wit":"AC","A":"178","tr":"Un Cumano quando suo padre morì in Alessandria, diede il corpo agli imbalsamatori. Tempo dopo, voleva riprenderselo. Siccome l’imbalsamatore aveva anche altri corpi e domandava che segno avesse di suo padre, il Cumano rispose: «Aveva la tosse».","label":"171","app":[{"lemma":"ἐπ","dirty":false,"id":"398","reading":"§SIG:A§§SIG:C§ : ἐν §SIG:Minas§","unit":398,"span":[8,10],"editors":["Minas"],"query":false,"sigla":["A","C","Minas"]},{"lemma":"ταριχευταῖς","id":"399","dirty":false,"editors":[],"span":[66,77],"reading":"§SIG:A§§SIG:C§ : ταρυχεύταις","unit":399,"sigla":["A","C"],"query":false},{"id":"400","dirty":false,"lemma":"δέδωκε","sigla":["A","C"],"query":false,"editors":[],"span":[78,84],"reading":": δέδωκεν §SIG:A§ac : ἔδωκε §SIG:C§ fort. recte","unit":400},{"dirty":false,"id":"401","lemma":"ταριχευτοῦ","sigla":["Boissonade"],"query":false,"span":[132,142],"reading":"dub. §SIG:Boissonade§","unit":401,"editors":["Boissonade"]},{"lemma":"ἡ … θήκη","id":"402","dirty":false,"editors":["Braccini","Dawe","Thierfelder"],"reading":"dub. §SIG:Braccini§: τοῦ πατρὸς αὐτοῦ ἡ θήκη §SIG:C§ : ὁ πατήρ αὐτοῦ §SIG:Dawe§ monente §SIG:Thierfelder§","unit":402,"span":[187,225],"query":false,"sigla":["Braccini","C","Dawe","Thierfelder"]},{"sigla":["A","C","Eberhard"],"query":false,"editors":["Eberhard"],"span":[238,245],"reading":"§SIG:Eberhard§ : ἔβισσεν §SIG:A§ : ἔβισση vel ἔβισσονον §SIG:C§","unit":403,"id":"403","dirty":false,"lemma":"Ἔβησσεν"}],"type":"joke"},{"wit":"AM","n":179,"dawe":"172","num":"172","text":"Κυμαῖος πύκτην ἰδὼν πολλὰ τραύματα ἔχοντα ἠρώτα, πόθεν ἔχει ταῦτα. τοῦ δὲ εἰπόντος· Ἐκ τοῦ μύρμηκος ἔφη· Διὰ τί γὰρ χαμαὶ κοιμᾷ;","type":"joke","tr":"Un Cumano vide un pugile che aveva molte ferite e gli domandava da dove le avesse riportate. Quando questi disse: «Dalla formica» il Cumano fece: «Ma allora perché dormi per terra?».","A":"179","app":[],"label":"172; cf. 218 α"},{"type":"joke","A":"180","tr":"Un Cumano vendeva del miele. Quando un tale giunse, lo gustò e disse che era buono, fece: «Se infatti non ci fosse caduto dentro un topo, non lo venderei mica!».","label":"173","app":[{"editors":[],"unit":404,"reading":"§SIG:A§§SIG:C§ : γευσάμενος §SIG:M§","span":[47,57],"query":false,"sigla":["A","C","M"],"lemma":"γευσαμένου","id":"404","dirty":false},{"sigla":["A","C","M"],"query":false,"editors":[],"span":[96,98],"unit":405,"reading":"§SIG:A§§SIG:C§ : om. §SIG:M§","id":"405","dirty":false,"lemma":"μὴ"},{"id":"406","dirty":false,"lemma":"εἰς αὐτό","sigla":["A","C","M"],"query":false,"editors":[],"span":[116,124],"unit":406,"reading":"§SIG:A§§SIG:M§ : αυτῷ §SIG:C§"}],"wit":"AMC","num":"173","dawe":"173","n":180,"text":"Κυμαῖος μέλι ἐπίπρασκεν. ἐλθόντος δέ τινος καὶ γευσαμένου καὶ εἰπόντος, ὅτι πάνυ καλόν, ἔφη· Εἰ μὴ γὰρ μῦς ἐνέπεσεν εἰς αὐτό, οὐκ ἂν ἐπώλουν."},{"wit":"AMC","text":"Κυμαῖον νοσοῦντα ἀπήλπισεν ἰατρός. ὁ δὲ ὑγιάνας περιέκαμπτε τὸν ἰατρόν. ἐρωτηθεὶς οὖν τὴν αἰτίαν ἀπεκρίνατο· Εἰπόντος σου, ‹ὅτι› ἀποθνῄσκω, αἰσχύνομαι ζήσας.","dawe":"174","num":"174","n":181,"type":"joke","label":"174","app":[{"lemma":"Κυμαῖον … ἰατρός","id":"407","dirty":false,"editors":[],"reading":"§SIG:A§§SIG:C§ : Κυμαῖον ἀπήντισεν ὁ ἰατρὸς νοσοῦντα §SIG:M§","unit":407,"span":[0,33],"query":false,"sigla":["A","C","M"]},{"reading":"add. §SIG:Thierfelder§ monente §SIG:Eberhard§","unit":408,"span":[124,127],"editors":["Eberhard","Thierfelder"],"query":false,"sigla":["Eberhard","Thierfelder"],"lemma":"ὅτι","dirty":false,"id":"408"},{"editors":[],"unit":409,"reading":"§SIG:C§ : δὲ ζήσας §SIG:A§§SIG:M§","span":[151,156],"query":false,"sigla":["A","C","M"],"lemma":"ζήσας","id":"409","dirty":false}],"A":"181","tr":"Un medico aveva perso le speranze per un Cumano ammalato. Ma questi si era ristabilito, ed evitava il medico. Quando gliene fu domandato il motivo rispose «Siccome tu hai detto che sarei morto, vivo e quindi mi vergogno»."},{"type":"joke","A":"182","tr":"Un medico cumano rese semiterzano un malato di febbre terzana e gli domandava la metà del compenso.","label":"175","app":[],"wit":"A","dawe":"175","num":"175","n":182,"text":"Κυμαῖος ἰατρὸς ἄρρωστον τριταΐζοντα εἰς ἡμιτριταῖον περιστήσας τὸ ἥμισυ τοῦ μισθοῦ ἀπῄτει."},{"label":"175 bis; 3 α","app":[{"lemma":"Κυμαίῳ","id":"410","dirty":false,"editors":["Minas"],"reading":"§SIG:Minas§ et fort. §SIG:A§2 : Κυμαί §SIG:A§ac","unit":410,"span":[0,6],"query":false,"sigla":["A","Minas"]},{"lemma":"προσελθὼν","dirty":false,"id":"411","span":[25,34],"unit":411,"reading":"§SIG:Minas§ : προσελθὸν §SIG:A§","editors":["Minas"],"sigla":["A","Minas"],"query":false},{"lemma":"ἐπὶ … διύπνισον","id":"412","dirty":false,"editors":[],"unit":412,"reading":"facile supplendum est ex 3 α","span":[76,104],"query":false,"sigla":[]}],"A":"183","tr":"Il testo è lacunoso, ma facilmente ricostruibile attraverso il confronto con la facezia 3","type":"joke","text":"Κυμαίῳ ἰατρῷ σχολαστικὸς προσελθὼν εἶπε· Σοφιστά, ὅταν ἐκ τοῦ ὕπνου ἀναστῶ, ἐπὶ ἡμιώριον ‹...› διύπνισον.","dawe":"175 bis","num":"175 bis","n":183,"wit":"A"},{"type":"joke","tr":"Un medico cumano fece un clistere ad un malato in condizioni disperate; quindi, ordinò al servo di vedere le evacuazioni. Quando questo le mostrò e disse che il paziente era morto, il medico disse giurandoci: «Se non fosse stato così purgato, sarebbe crepato!».","A":"184","app":[{"editors":["Boissonade","Minas"],"span":[37,47],"unit":413,"reading":"§SIG:Boissonade§ : ἐνευμάτισεν §SIG:A§ : ἐνεμμάτισεν §SIG:Minas§","sigla":["A","Boissonade","Minas"],"query":false,"lemma":"ἐνημάτισεν","id":"413","dirty":false},{"query":false,"sigla":[],"unit":414,"reading":"aliquid excidisse putant edd. pl.","span":[49,94],"editors":[],"dirty":false,"id":"414","lemma":"ἐκέλευσε … ἰδεῖν"},{"sigla":["Dawe"],"query":false,"editors":["Dawe"],"span":[62,71],"reading":"add. §SIG:Dawe§","unit":415,"id":"415","dirty":false,"lemma":"θεράποντα"},{"reading":"§SIG:A§ : ἐκκεχωρισμένα §SIG:Eberhard§","unit":416,"span":[76,88],"editors":["Eberhard"],"query":false,"sigla":["A","Eberhard"],"lemma":"ἐκκεχωρημένα","dirty":false,"id":"416"},{"span":[173,178],"unit":417,"reading":"§SIG:A§ : οὗτος §SIG:Kurtz§","editors":["Kurtz"],"sigla":["A","Kurtz"],"query":false,"lemma":"Οὗτως","dirty":false,"id":"417"},{"id":"418","dirty":false,"lemma":"ἐλάκησεν","query":false,"sigla":["A","Boissonade"],"editors":["Boissonade"],"reading":"§SIG:Boissonade§ : ἐλάκισεν §SIG:A§","unit":418,"span":[194,202]},{"unit":419,"reading":"In initio §SIG:C§ vix legitur","span":null,"editors":[],"query":false,"sigla":["C"],"lemma":"","dirty":false,"id":"419"}],"label":"176","wit":"A","n":184,"dawe":"176","num":"176","text":"Κυμαῖος ἰατρὸς ἀπεγνωσμένον ἄρρωστον ἐνημάτισεν, ἐκέλευσε δὲ ‹θεράποντα› τὰ ἐκκεχωρημένα ἰδεῖν. τοῦ δὲ δείξαντος καὶ εἰπόντος, ὅτι ἀπέθανεν, ὁ ἰατρὸς μεθ’ ὅρκου ἀπεκρίνατο· Οὗτως εἰ μὴ ἐκλύσθη, ἐλάκησεν ἄν."},{"type":"joke","tr":"Un medico cumano che operava un tale che soffriva e urlava tremendamente, prese un bisturi piuttosto smussato.","A":"185","app":[],"label":"177","wit":"A","n":185,"dawe":"177","num":"177","text":"Κυμαῖος ἰατρὸς τέμνων τινὰ δεινῶς ἀλγοῦντα καὶ βοῶντα ἀμβλυτέραν σμίλην μετέλαβεν."},{"wit":"AC","dawe":"178","num":"178","n":186,"text":"Κυμαῖοι δύο ἰσχάδων κεράμια δύο ἐπρίαντο. τούτων δὲ ὁ ἕτερος τὸν ἕτερον λανθάνων οὐκ ἐκ τοῦ ἰδίου, ἀλλ’ ἐκ τοῦ ἑτέρου κατήσθιεν. ὡς δὲ τοῖς ἀλλήλων κατεχρήσαντο, ἕκαστος ἐπὶ τὸ ἴδιον ἐπιστρέψας εὗρεν αὐτὸ κενόν. ἀλλήλων οὖν ἐπιλαβόμενοι ἤγοντο ἐπὶ τὸν ἄρχοντα. διαγνοὺς δὲ ὁ ἄρχων ἐκέλευσε τὰ κενώματα ἀλλάξαι καὶ τὰς τιμὰς ἀλλήλοις ἀποδοῦναι.","type":"joke","A":"186","tr":"Due Cumani acquistarono due recipienti di fichi secchi. Entrambi, ingannando l’altro, mangiavano non dal proprio recipiente, ma da quello dell’altro. Quando se li ebbero consumati l’un l’altro, ciascuno si recò al proprio recipiente e lo trovò vuoto. Si azzuffarono dunque tra loro e furono portati dal magistrato. Allora il magistrato rifletté e comandò che si scambiassero i recipienti vuoti e che si rimborsassero le spese vicendevolmente.","label":"178","app":[{"sigla":["A","C","Dawe"],"query":false,"span":[85,127],"reading":"§SIG:A§§SIG:C§ : ἐκ τοῦ τοῦ ἑτέρου κατήσθιεν dub. §SIG:Dawe§","unit":420,"editors":["Dawe"],"dirty":false,"id":"420","lemma":"ἐκ2 … κατήσθιεν"},{"reading":"§SIG:A§ : τῆς §SIG:C§","unit":421,"span":[135,139],"editors":[],"query":false,"sigla":["A","C"],"lemma":"τοῖς","dirty":false,"id":"421"},{"lemma":"κατεχρήσαντο","dirty":false,"id":"422","span":[148,160],"unit":422,"reading":"§SIG:A§ : κατεχρήσατο §SIG:C§","editors":[],"sigla":["A","C"],"query":false},{"query":false,"sigla":["A","C"],"unit":423,"reading":"§SIG:A§ : ἀλλήλους §SIG:C§","span":[324,332],"editors":[],"dirty":false,"id":"423","lemma":"ἀλλήλοις"}]},{"type":"joke","label":"179","app":[{"id":"424","dirty":false,"lemma":"κατεψευσμένοι","query":false,"sigla":["A"],"editors":[],"reading":": κατεψευμένοι §SIG:A§ac corr. §SIG:A§2","unit":424,"span":[73,86]},{"id":"425","dirty":false,"lemma":"ὑμῶν","query":false,"sigla":["A","Eberhard"],"editors":["Eberhard"],"reading":"dub. §SIG:Eberhard§ : υμῖν §SIG:A§","unit":425,"span":[137,141]},{"id":"426","dirty":false,"lemma":"τούτων","query":false,"sigla":["A","Thierfelder"],"editors":["Thierfelder"],"unit":426,"reading":"§SIG:Thierfelder§ : τούτοις §SIG:A§","span":[170,176]},{"editors":["Minas"],"span":[214,218],"reading":"§SIG:Minas§ : μόνον","unit":427,"sigla":["Minas"],"query":false,"lemma":"μόνῳ","id":"427","dirty":false}],"A":"187","tr":"A Cuma un demagogo sotto accusa in assemblea disse: «Uomini, cittadini, se questi mi hanno calunniato con queste accuse, che siano condannati da voi; se io ho invece commesso alcuna di queste azioni, mentre voi tutti siete seduti, crolli il teatro su me solo! ».","wit":"A","text":"Ἐν Κύμῃ δημαγωγὸς ἐν ἐκκλησίᾳ κατηγορηθείς· Ἄνδρες, ἔφη, πολῖται, εἰ μὲν κατεψευσμένοι μου τὰς διαβολάς εἰσιν οὗτοι, γένοιτο αὐτοῖς παρ’ ὑμῶν καταγνωσθῆναι· εἰ δέ τι ἐγὼ τούτων πεποίηκα, πάντων ὑμῶν καθημένων ἐμοὶ μόνῳ τὸ θέατρον ἐπιπέσοι.","num":"179","dawe":"179","n":187},{"A":"188","tr":"Un magistrato Cumano annunciò tali disposizioni: “Gli efori, dopo il sacrificio, riportino all’istante le loro pelli al sacerdote. Voi, i buleuti, venite al §I§bouleuterion§/I§ se non tenete consiglio. I cuochi, poi, gettino le proprie ossa oltre la cinta muraria. I calzolai, poi, non abbiano forme da scarpe di taglia piccola”.","label":"180","app":[],"type":"joke","dawe":"180","num":"180","n":188,"text":"Κυμαῖος ἄρχων τοιαῦτα κηρύγματα ἐκήρυξεν· Οἱ ἔφοροι μετὰ τὴν θυσίαν παραχρῆμα τὰς ἑαυτῶν βύρσας ἀναφερέτωσαν πρὸς τὸν ἱερέα. Οἱ δὲ βουλευταί, ἔλθετε εἰς τὸ βουλευτήριον καὶ μὴ βουλεύεσθε. Οἱ δὲ μάγειροι τὰ ἴδια ὀστέα ὑπὲρ τὸ τεῖχος βαλλέτωσαν. Οἱ δὲ σκυτεῖς μικροὺς καλάποδας μὴ ἐχέτωσαν.","wit":"A"},{"text":"Κυμαῖοι εἰς ψηφοφορίαν ἀπαντήσαντες καὶ γνόντες πολλοὺς ἐκ τῶν ἄλλων πόλεων ἀπολειφθέντας, αἰτιωμένους τὴν ἀτραπόν· Μὴ μωροί, ἔφασαν, ἐὰν καὶ ἡμεῖς εἰς τὸ μέλλον οὐκ ἐρχόμεθα;","num":"181","dawe":"181","n":189,"wit":"A","label":"181","app":[{"sigla":["A","Thierfelder"],"query":false,"span":[91,102],"unit":428,"reading":"§SIG:Thierfelder§ : αἰτιώμενοι §SIG:A§","editors":["Thierfelder"],"dirty":false,"id":"428","lemma":"αἰτιωμένους"},{"id":"429","dirty":false,"lemma":"ἔφασαν","query":false,"sigla":["A","Dawe","Eberhard"],"editors":["Dawe","Eberhard"],"unit":429,"reading":"§SIG:Eberhard§ : ἔφη §SIG:A§ | post ἔφασαν, φανεῖσθε §SIG:Dawe§","span":[126,132]}],"A":"189","tr":"Dei Cumani si recarono ad una votazione, vennero a sapere che molti dalle altre città erano rimasti indietro incolpando la difficoltà del sentiero, e dissero: «Siamo pazzi, se non arriviamo in ritardo anche noi?».","type":"joke"},{"label":"182","app":[],"A":"190","tr":"Un medico cumano mentre operava una ferita in testa pose il paziente supino e gli versò dell’acqua nella bocca, per vedere se mai (l’acqua) sarebbe colata fuori dalla parte operata.","type":"joke","text":"","dawe":"182","num":"182","n":190,"wit":"AC"},{"type":"section","text":"δύσκολοι","app":[]},{"wit":"AM","num":"183","dawe":"183","n":191,"text":"Δυσκόλῳ ἰατρῷ προσελθών τις εἶπε· Σοφιστά, ἀνακεῖσθαι οὐ δύναμαι οὔτε ἑστάναι, ἀλλ’ οὐδὲ καθῆσθαι. καὶ ὁ ἰατρὸς εἶπεν· Οὐδέν σοι λείπει ἢ κρεμασθῆναι.","type":"joke","A":"191","tr":"Un tale venne da un medico burbero e disse: «Dottore, non riesco a stare allungato, né in piedi, ma nemmeno seduto! E il medico disse: «Non ti rimane che essere impiccato».","label":"183","app":[{"span":[105,111],"reading":"§SIG:Thierfelder§","unit":430,"editors":["Thierfelder"],"sigla":["Thierfelder"],"query":false,"lemma":"ἰατρὸς","dirty":false,"id":"430"},{"lemma":"τετρωμένην","dirty":false,"id":"431","span":null,"reading":"§SIG:A§ : τετριμμένην §SIG:C§","unit":431,"editors":[],"sigla":["A","C"],"query":false},{"editors":[],"unit":432,"reading":"§SIG:A§ : ἔβαλεν §SIG:C§","span":null,"query":false,"sigla":["A","C"],"lemma":"ἐνέβαλεν","id":"432","dirty":false},{"span":null,"reading":"§SIG:A§§SIG:C§ : ἵνα ἴδῃ, [τὸ] πότε διὰ τοῦ χειρουργηθέντος ἐκρεύσε transp. §SIG:Thierfelder§ : ἵνα ἴδῃ, εἰ διὰ τοῦ χειρουργηθέντος τόπου ἐκρεύσε §SIG:Dawe§","unit":433,"editors":["Dawe","Thierfelder"],"sigla":["A","C","Dawe","Thierfelder"],"query":false,"lemma":"ἵνα … ἐκρεύσει","dirty":false,"id":"433"},{"reading":"§SIG:Cataudella§ : πότερον dub. §SIG:Braccini§ : τὸ πότε §SIG:A§ : ὅποτε §SIG:C§","unit":434,"span":null,"editors":["Braccini","Cataudella"],"query":false,"sigla":["A","Braccini","C","Cataudella"],"lemma":"εἴποτε","dirty":false,"id":"434"},{"id":"435","dirty":false,"lemma":"","sigla":["A","M"],"query":false,"editors":[],"span":null,"unit":435,"reading":"§SIG:A§ : περὶ δυσκόλων §SIG:M§"},{"sigla":["A","M"],"query":false,"editors":[],"span":[79,88],"unit":436,"reading":"§SIG:A§ : ἀλ’λ’ ουδὲ §SIG:M§","id":"436","dirty":false,"lemma":"ἀλλ οὐδὲ"},{"sigla":["A","M","Pontanus"],"query":false,"editors":["Pontanus"],"span"
