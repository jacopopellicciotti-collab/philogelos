ον αὐτοῦ σχόντος, ὡς ἠγανάκτουν οἱ ἑταῖροι· Κἀγώ, ἔφη, αἰσχύνομαι ζημιουμένων ὑμῶν. αὔριον οὖν φέρετε τοὺς στεφάνους· τοῦτον γὰρ ὡς ἂν ἔχῃ ἐξοίσω.","wit":"A","tr":"Uno §I§scholastikos§/I§, essendo il padre molto malato, chiese agli amici di portare corone di fiori per il funerale. Ma poiché l’indomani quello stava meglio, e gli amici si erano arrabbiati, disse: «Anche io mi vergogno che voi ci abbiate rimesso. Domani dunque portate le corone: comunque starà, gli farò il funerale».","app":[],"num":"38"},{"tr":"Due §I§scholastikoi§/I§ camminavano insieme. Quando uno dei due, avendo visto una gallina nera, dice: «Fratello, forse il gallo di questa è morto!».","app":[{"lemma":"ὁμοῦ","sigla":["M"],"editors":[],"unit":86,"span":[16,20],"id":"86","dirty":false,"reading":"om §SIG:M§","query":false},{"editors":["Minas"],"sigla":["A","Minas"],"lemma":"ἕτερος","span":[42,48],"unit":87,"id":"87","query":false,"reading":"§SIG:Minas§ : ἑταῖρος §SIG:A§","dirty":false},{"span":[71,77],"unit":88,"sigla":["A","M"],"lemma":"Ἀδελφέ","editors":[],"dirty":false,"query":false,"reading":"§SIG:M§ : ἀδελφε §SIG:A§","id":"88"},{"query":false,"reading":"§SIG:A§ : ἀλεκτρὼν §SIG:M§ac","dirty":false,"id":"89","span":[100,109],"unit":89,"editors":[],"sigla":["A","M"],"lemma":"ἀλεκτρυὼν"}],"num":"39","text":"Σχολαστικοὶ δύο ὁμοῦ ἐβάδιζον. ἰδὼν οὖν ὁ ἕτερος αὐτῶν μέλαιναν ὄρνιν· Ἀδελφέ, φησίν, ἴσως ταύτης ὁ ἀλεκτρυὼν ἀπέθανεν.","wit":"AM","dawe":"39","type":"joke","label":"39; 37 β","n":39,"A":"39"},{"text":"Σχολαστικὸς μικρὸν υἱὸν ἀπολέσας, θεασάμενος πολλοὺς ἐπὶ τὸ κῆδος ἀπαντήσαντας διὰ τὴν ἐξουσίαν αὐτοῦ ἔλεγεν· Αἰδοῦμαι μικρὸν παιδίον εἰς τοσοῦτον ὄχλον ἐκφέρων.","wit":"AM","tr":"Uno §I§scholastikos§/I§ che aveva perso un figlio piccolo, dopo che ebbe visto che molti erano giunti al rito funebre per la sua autorità, disse: «Mi vergogno di portare un bimbo piccolo in una folla tanto grande».","num":"40","app":[{"sigla":["A","Boissonade","Dawe","Eberhard","M","Minas"],"lemma":"ἐξουσίαν","editors":["Boissonade","Dawe","Eberhard","Minas"],"unit":90,"span":[87,95],"id":"90","dirty":false,"query":false,"reading":"§SIG:Minas§ §SIG:Eberhard§ : ἀπουσίαν §SIG:A§§SIG:M§ : περιουσίαν §SIG:Boissonade§ : πλουσίαν ‹...› §SIG:Dawe§"}],"label":"40; 33 β","A":"40","n":40,"dawe":"40","type":"joke"},{"wit":"AM","text":"Σχολαστικὸς οἰκίαν πωλῶν λίθον ἀπ’ αὐτῆς εἰς δεῖγμα περιέφερεν.","app":[{"span":[52,62],"unit":91,"sigla":["A","M"],"lemma":"περιέφερεν","editors":[],"dirty":false,"query":false,"reading":"§SIG:A§ : περιέφερε §SIG:M§","id":"91"}],"num":"41","tr":"Uno §I§scholastikos §/I§che vendeva una casa portava in giro una pietra di questa a mo’ di dimostrazione.","n":41,"A":"41","label":"41; 10 β","type":"joke","dawe":"41"},{"wit":"A","text":"Σχολαστικῶν δύο ὁδευόντων ὁ ἕτερος τῆς γαστρὸς ἀναγκαζούσης μικρὸν ἀπελείφθη. εὑρὼν δὲ ἐν τῷ μιλίῳ ἐπιγεγραμμένον παρὰ τοῦ ἑτέρου· Κατάλαβέ με ‹....›","app":[{"lemma":"Κατάλαβέ με","sigla":["Eberhard"],"editors":["Eberhard"],"unit":92,"span":[131,142],"id":"92","dirty":false,"query":false,"reading":"αὐτὸς ἐπέγραψε· Καὶ σὺ μεῖνόν με suppl. §SIG:Eberhard§ coll. 137α"}],"num":"42","tr":"Quando due §I§scholastikoi§/I§ erano in viaggio, uno, poiché la pancia incalzava, rimase un po’ indietro. Ma avendo trovato scritto dal compagno sul cippo miliario: «Raggiungimi‹…›»","n":42,"A":"42","label":"42; 137 α","type":"joke","dawe":"42"},{"type":"joke","dawe":"43","A":"43","n":43,"label":"43","num":"43","app":[{"id":"93","reading":"§SIG:A§ : ἑτέρου...ἐρωτήσοντος §SIG:M§","query":false,"dirty":false,"editors":[],"sigla":["A","M"],"lemma":"ἕτερος … ἐρωτήσας","unit":93,"span":[99,130]},{"lemma":"εἶπε","sigla":["A","M"],"editors":[],"unit":94,"span":[151,155],"id":"94","dirty":false,"reading":"§SIG:M§ : εἶπεν §SIG:A§ac","query":false}],"tr":"Uno §I§scholastikos§/I§, poiché aveva sentito da alcuni che gli stava venendo la barba, giunse alla porta e rimase lì ad aspettarla. Un altro, dopo aver chiesto e appreso la ragione, disse: «Giustamente siamo considerati fessi! Come sai se non arriva dall’atra porta?».","wit":"AM","text":"Σχολαστικὸς ἀκούσας παρά τινων ὅτι Ὁ πώγων σου ἤδη ἔρχεται, ἀπελθὼν εἰς τὴν πύλην ἐξεδέχετο αὐτόν. ἕτερος δὲ τὴν πρόφασιν ἐρωτήσας καὶ γνούς· Εἰκότως, εἶπε, μωροὶ νομιζόμεθα· πόθεν γὰρ οἶδας, εἰ διὰ τῆς ἑτέρας πύλης ἔρχεται;"},{"num":"44","app":[{"dirty":false,"reading":"§SIG:Minas§ : ὀρθῶς §SIG:A§§SIG:M§","query":false,"id":"95","unit":95,"span":[203,208],"sigla":["A","M","Minas"],"lemma":"ὀρθὸς","editors":["Minas"]}],"tr":"Di notte, uno §I§scholastikos§/I§ che dormiva col padre, dopo essersi alzato dal letto mangiucchiava grappoli d’uva appesi in alto. Dal momento che suo padre aveva nascosta una lucerna sotto una pentola, e aveva poi rivelato improvvisamente la luce, quando lo §I§scholastikos§/I§ si era alzato, questi, rimasto immobile in piedi, russava fingendo di dormire.","wit":"AM","text":"Σχολαστικὸς μετὰ τοῦ πατρὸς καθεύδων, ἀνιστάμενος ἐπὶ τῆς κλίνης νυκτὸς ἔτρωγε σταφυλὰς ὑπεράνω κρεμαμένας. τοῦ δὲ πατρὸς αὐτοῦ ὑπὸ χύτραν λύχνον κρύψαντος, εἶτα, ὅτε ἀνέστη, τὸ φῶς ἄφνω δείξαντος, ὁ δὲ ὀρθὸς ἑστὼς ἔρεγχε καθεύδειν προσποιούμενος.","type":"joke","dawe":"44","A":"44","n":44,"label":"44; 38 β"},{"label":"44b","n":45,"A":"45","dawe":"44b","type":"joke","text":"Σχολαστικῷ ἑταῖρος ἀποδημῶν ἔγραψεν, ἵν’ αὐτῶν βιβλία πρίηται. ὁ δὲ ὀλιγωρήσας, ἐπανελθόντι αὐτῷ ἀπαντήσας· Τὴν ἐπιστολήν, εἶπεν, ἣν περὶ τῶν βιβλίων ἀπέστειλας, οὐκ ἐδεξάμην.","wit":"AM","tr":"Un amico che era in un viaggio all’estero scrisse ad uno §I§scholastikos§/I§ di acquistargli dei libri. Quello non se ne diede cura e, incontrato l’amico rientrato, disse: «La lettera che mi hai mandato a proposito dei libri, non l’ho ricevuta».","app":[{"id":"96","dirty":false,"reading":"§SIG:Minas§ : ἕτερος §SIG:A§§SIG:M§","query":false,"lemma":"ἑταῖρος","sigla":["A","M","Minas"],"editors":["Minas"],"unit":96,"span":[11,18]}],"num":"44"},{"label":"45; 14 β","n":46,"A":"46","dawe":"45","type":"joke","text":"Σχολαστικὸς νυκτὸς ἐπανέστη τῇ μάμμῃ ἑαυτοῦ. πληγὰς δὲ διὰ τοῦτο ὑπὸ τοῦ πατρὸς λαβών· Σύ, εἶπεν, τοσοῦτος χρόνος ἐστὶν ἐξ οὗ τὴν μητέρα μου ὀχεύεις, μηδὲν ὑπ’ ἐμοῦ παθών, καὶ νῦν ὀργίζῃ ἐπὶ τῇ μητρί σου ἅπαξ με εὑρών;","wit":"AM","tr":"Uno §I§scholastikos§/I§ di notte si era messo sopra la propria nonna. Dopo aver preso botte dal padre per questo motivo, disse: «Tu, è tanto tempo che monti mia madre, e non ti sei buscato nulla da me, e ora ti arrabbi per avermi trovato una volta con tua mamma?».","app":[{"reading":"§SIG:M§ : τοσούτους §SIG:A§ac","query":false,"dirty":false,"id":"97","span":[98,106],"unit":97,"editors":[],"lemma":"τοσοῦτος","sigla":["A","M"]}],"num":"45"},{"type":"joke","dawe":"46","A":"47","n":47,"label":"46; 16 β","num":"46","app":[{"id":"98","query":false,"reading":"§SIG:A§ : ὅτου §SIG:M§","dirty":false,"editors":[],"sigla":["A","M"],"lemma":"ὅτι","unit":98,"span":[36,39]},{"id":"99","reading":"§SIG:A§ : ἀνακραγῶν §SIG:M§","query":false,"dirty":false,"editors":[],"sigla":["A","M"],"lemma":"ἀνακραγὼν","unit":99,"span":[79,88]}],"tr":"Un amministratore disse ad uno §I§scholastikos§/I§ che il fiume aveva preso il suo podere. Quello allora gridò e rispose: «Ci hanno sabotato!».","wit":"AM","text":"Σχολαστικῷ πραγματευτὴς ἀπήγγειλεν, ὅτι τὸ χωρίον αὐτοῦ ὁ ποταμὸς ἔλαβεν. ὁ δὲ ἀνακραγὼν ἀπεκρίνατο λέγων· Βιάζεται ἡμᾶς."},{"text":"Σχολαστικὸς διὰ χρόνου εἰς τὸν ἀγρὸν παραγενόμενος ἐθεάσατο τὰ θρέμματα ἐξιόντα ἐπὶ βόσκησιν. καὶ ὡς εἴωθε βληχώμενα ἰδὼν ἠρώτα τὴν αἰτίαν. τοῦ δὲ οἰκονόμου προσπαίξαντος καὶ εἰπόντος· Ἀσπάζονταί σε Τὴν ἐμήν σοι σωτηρίαν, φησίν, ἐμοῦ ἕνεκα ἀργίαν αὐτοῖς δὸς καὶ τρεῖς ἡμέρας μὴ ἐξαγάγῃς αὐτὰ εἰς νομήν.","wit":"AM","tr":"Uno §I§scholastikos§/I§, trovandosi una volta nel podere, vide le greggi uscire al pascolo. E quando le vide come al solito belare, ne chiedeva la ragione. Quando l’amministratore gli disse per scherzo: «Ti salutano!», fece: «Per la mia salvezza! Per me, da’ loro le ferie e per tre giorni non portarle fuori al pascolo».","app":[{"sigla":["A","M"],"lemma":"χρόνου","editors":[],"unit":100,"span":[16,22],"id":"100","dirty":false,"reading":"§SIG:A§ : χρόνον §SIG:M§","query":false},{"editors":["Dawe","Thierfelder"],"lemma":"βληχώμενα","sigla":["A","Dawe","M","Thierfelder"],"unit":101,"span":[107,116],"id":"101","reading":"§SIG:Thierfelder§ : βληχόμενα §SIG:A§ : γλυκόμενα §SIG:M§ : γλυκυνόμενα §SIG:Dawe§","query":false,"dirty":false},{"id":"102","query":false,"reading":"§SIG:A§§SIG:M§ : προσπαίζοντος §SIG:Dawe§","dirty":false,"editors":["Dawe"],"lemma":"προσπαίξαντος","sigla":["A","Dawe","M"],"unit":102,"span":[157,170]},{"unit":103,"span":[208,211],"sigla":["A","M"],"lemma":"σοι","editors":[],"dirty":false,"query":false,"reading":"§SIG:A§ : om. §SIG:M§ac add. §SIG:M§1","id":"103"},{"unit":104,"span":[240,246],"editors":[],"lemma":"ἀργίαν","sigla":["M"],"query":false,"reading":"ἀργίαν in ras. scr. §SIG:M§1","dirty":false,"id":"104"},{"span":[247,253],"unit":105,"sigla":["A","M"],"lemma":"αὐτοῖς","editors":[],"dirty":false,"query":false,"reading":"§SIG:A§ : αὐτῆ §SIG:M§","id":"105"},{"id":"106","query":false,"reading":"§SIG:A§ : ἐξαγάγεις §SIG:M§","dirty":false,"editors":[],"sigla":["A","M"],"lemma":"ἐξαγάγῃς","unit":106,"span":[278,286]}],"num":"47","label":"47","n":48,"A":"48","dawe":"47","type":"joke"},{"type":"joke","dawe":"48","A":"49","n":49,"label":"48","num":"48","app":[{"span":[12,17],"unit":107,"sigla":["A","M"],"lemma":"καινὰ","editors":[],"dirty":false,"query":false,"reading":"§SIG:A§ : κενᾶ §SIG:M§","id":"107"},{"editors":[],"sigla":["A","M"],"lemma":"ὑπεδήσατο","unit":108,"span":[28,37],"id":"108","reading":"§SIG:A§ : ὑποδήσατο §SIG:M§","query":false,"dirty":false},{"sigla":["M"],"lemma":"οὖν αὐτῶν","editors":[],"unit":109,"span":[49,58],"id":"109","dirty":false,"reading":"in ras. scr. §SIG:M§1","query":false},{"editors":["Minas"],"sigla":["A","M","Minas"],"lemma":"τρίζετε","span":[71,78],"unit":110,"id":"110","query":false,"reading":"§SIG:Minas§ : τρίζεται §SIG:A§§SIG:M§","dirty":false},{"id":"111","dirty":false,"query":false,"reading":"§SIG:A§ : ἡμῶν §SIG:M§","lemma":"ὑμῶν","sigla":["A","M"],"editors":[],"span":[101,105],"unit":111},{"id":"112","dirty":false,"reading":"§SIG:Minas§ (sec. §SIG:Thierfelder§) : κλάσητε §SIG:A§§SIG:M§ : ὀκλάζεται (cum ἡμῶν §SIG:M§) §SIG:Dawe§","query":false,"lemma":"κλάσετε","sigla":["A","Dawe","M","Minas","Thierfelder"],"editors":["Dawe","Minas","Thierfelder"],"unit":112,"span":[106,113]}],"tr":"Uno §I§scholastikos§/I§ indossò delle scarpe nuove. Siccome dunque stridevano, si fermò e disse: «Non cigolate, poiché vi romperete le gambe».","wit":"AM","text":"Σχολαστικὸς καινὰ ὑποδήματα ὑπεδήσατο. Τριζόντων οὖν αὐτῶν ἐπισχών· Μὴ τρίζετε, εἶπεν, ἐπεὶ τὰ σκέλη ὑμῶν κλάσετε."},{"app":[{"id":"113","query":false,"reading":"§SIG:A§ : om. §SIG:M§","dirty":false,"editors":[],"lemma":"ἐν","sigla":["A","M"],"span":[59,61],"unit":113},{"dirty":false,"reading":"§SIG:A§ : πολέσι §SIG:M§","query":false,"id":"114","span":[74,81],"unit":114,"sigla":["A","M"],"lemma":"πόλεσιν","editors":[]},{"unit":115,"span":[99,104],"lemma":"εἰσιν","sigla":["A","M"],"editors":[],"dirty":false,"reading":"§SIG:A§ : εἰσί §SIG:M§","query":false,"id":"115"}],"num":"49","tr":"Uno §I§scholastikos§/I§ vedendo la luna chiedeva al padre se anche nelle altre città ci fossero lune tali.","wit":"AM","text":"Σχολαστικὸς τὴν σελήνην ἰδὼν ἐπυνθάνετο τοῦ πατρός, εἰ καὶ ἐν ταῖς ἄλλαις πόλεσιν τοιαῦται σελῆναί εἰσιν.","type":"joke","dawe":"49","n":50,"A":"50","label":"49; 18 β"},{"type":"joke","dawe":"50","A":"51","n":51,"label":"50; 20 β","num":"50","app":[{"unit":116,"span":[31,38],"editors":[],"lemma":"χρεώστῃ","sigla":["A","M"],"reading":"§SIG:A§ : χρεώστης §SIG:M§","query":false,"dirty":false,"id":"116"},{"sigla":["A","M"],"lemma":"αὐτῷ","editors":[],"unit":117,"span":[56,60],"id":"117","dirty":false,"reading":"§SIG:A§ : σωρὸν αὐτὸ §SIG:M§","query":false},{"editors":["Kurtz"],"sigla":["A","Kurtz","M"],"lemma":"παιδικὰς","span":[77,85],"unit":118,"id":"118","query":false,"reading":"§SIG:Kurtz§ : παιδίσκας §SIG:A§§SIG:M§","dirty":false},{"reading":"§SIG:A§ : μέτρον §SIG:M§","query":false,"dirty":false,"id":"119","span":[125,131],"unit":119,"editors":[],"lemma":"μέτρου","sigla":["A","M"]}],"tr":"Un prestasoldi §I§scholastikos §/I§prescriveva ad un armatore con lui indebitato di portare un sarcofago per lui, e due da bambini per i suoi figlioletti di otto anni, della misura giusta adatta alla loro crescita.","wit":"AM","text":"Σχολαστικὸς δανειστὴς ναυκλήρῳ χρεώστῃ ἐνετέλλετο σορὸν αὐτῷ κομίσαι καὶ δύο παιδικὰς τοῖς ὀκταέτεσι παιδίοις αὐτοῦ, δικαίου μέτρου ὡς εἰς αὔξησιν."},{"dawe":"51","type":"joke","label":"51","n":52,"A":"52","tr":"Uno §I§scholastikos§/I§ vide un pozzo nel proprio campo e chiedeva se l’acqua fosse buona. I contadini dissero che era buona, «E infatti i tuoi genitori bevevano da lì», e disse: «E avevano colli di quale taglia, perché potessero bere da una profondità tanto grande?».","app":[{"id":"120","dirty":false,"reading":"del. §SIG:Dawe§","query":false,"sigla":["Dawe"],"lemma":"ἦν","editors":["Dawe"],"unit":120,"span":[56,58]},{"editors":[],"sigla":["A","M"],"lemma":"ἐντεῦθεν","unit":121,"span":[126,134],"id":"121","reading":"§SIG:A§ : ἐνταῦθα §SIG:M§","query":false,"dirty":false},{"dirty":false,"query":false,"reading":"§SIG:A§ : τοσούτου §SIG:M§pc","id":"122","unit":122,"span":[188,196],"lemma":"τοσούτου","sigla":["A","M"],"editors":[]}],"num":"51","text":"Σχολαστικὸς ἰδὼν ἐν τῷ ἀγρῷ αὐτοῦ φρέαρ ἠρώτα, εἰ καλὸν ἦν τὸ ὕδωρ. τῶν δὲ γεωργῶν εἰπόντων, ὅτι Καλόν· καὶ γὰρ οἱ γονεῖς σου ἐντεῦθεν ἔπινον Καὶ πηλίκους, φησίν, εἶχον τραχήλους, ἵνα ἀπὸ τοσούτου βάθους πίνειν ἐδύναντο;","wit":"AM"},{"label":"52; 21 β","n":53,"A":"53","dawe":"52","type":"joke","text":"Σχολαστικὸς εἰς λάκκον πεσὼν συνεχῶς ἐβόα ἀνακαλῶν ἑαυτῷ βοηθούς. ὡς δ’ οὐδεὶς ὑπήκουε, λέγει πρὸς ἑαυτόν· Μωρός εἰμι, ἐὰν μὴ ἀνελθὼν πάντας μαστιγώσω, ἵνα οὕτω γοῦν μοι ὑπακούσωσι καὶ κλίμακα κομίσωσιν.","wit":"AM","tr":"Uno §I§scholastikos§/I§ caduto in una cisterna, gridava di continuo chiamando per sé dei soccorritori. Ma poiché nessuno lo ascoltava, disse a sé stesso: «Sono un fesso, se non risalgo e li frusto tutti, perché almeno così mi ascoltino e mi portino una scala!».","app":[{"lemma":"λάκκον","sigla":["A","M"],"editors":[],"unit":123,"span":[16,22],"id":"123","dirty":false,"query":false,"reading":"§SIG:A§ : βάθος §SIG:M§"},{"editors":[],"lemma":"Μωρός εἰμι","sigla":["A","M"],"unit":124,"span":[107,117],"id":"124","query":false,"reading":": μωρὸς εἰμὶ §SIG:A§§SIG:M§","dirty":false},{"editors":[],"lemma":"οὕτω","sigla":["A","M"],"unit":125,"span":[156,160],"id":"125","reading":"coll. β 21 : αὐτῷ §SIG:M§ : αὐτό §SIG:A§","query":false,"dirty":false}],"num":"52"},{"n":54,"A":"54","label":"53","type":"joke","dawe":"53","wit":"AM","text":"Σχολαστικὸς συνδειπνῶν τῷ πατρὶ παρακειμένης θριδακίνης μεγάλης καὶ ἐχούσης πολλοὺς θύρσους καλούς· Σύ, πάτερ, ἔφη, φάγε τὰ τέκνα, καὶ ἡμεῖς τὴν μητέρα.)","app":[{"reading":"§SIG:Eberhard§ : εὖ §SIG:A§§SIG:M§","query":false,"dirty":false,"id":"126","span":[12,14],"unit":126,"editors":["Eberhard"],"sigla":["A","Eberhard","M"],"lemma":"Σύ"},{"query":false,"reading":"§SIG:A§ : μητέραν §SIG:M§","dirty":false,"id":"127","unit":127,"span":[145,151],"editors":[],"lemma":"μητέρα","sigla":["A","M"]}],"num":"53","tr":"Uno §I§scholastikos§/I§ che pranzava col padre, visto che c’era un grde cespo di lattuga che aveva molte belle puntarelle, disse: «Tu, padre, mangia i figli, e noi mangiamo la madre»."},{"type":"joke","dawe":"54","n":55,"A":"55","label":"54","app":[{"sigla":["A","M"],"lemma":"ἐναβρυνόμενος","editors":[],"span":[54,67],"unit":128,"id":"128","dirty":false,"reading":"§SIG:A§ : ἐν ἀμβρυνόμενος§SIG:M§","query":false},{"id":"129","query":false,"reading":"§SIG:Minas§ : κεφαληκὴν §SIG:A§","dirty":false,"editors":["Minas"],"sigla":["A","Minas"],"lemma":"κεφαλικὴν","span":[119,128],"unit":129},{"id":"130","dirty":false,"reading":"§SIG:A§§SIG:M§ : φεύγοντα §SIG:Minas§","query":false,"lemma":"ἔχοντα","sigla":["A","M","Minas"],"editors":["Minas"],"unit":130,"span":[129,135]}],"num":"54","tr":"Uno §I§scholastikos§/I§ che scriveva al padre da Atene vantandosi del fatto che era stato istruito/aveva compiuto gli studi, aggiunse: «Prego di trovarti con un processo capitale, affinché io ti mostri l’avvocato che sono!».","wit":"AM","text":"Σχολαστικὸς γράφων πρὸς τὸν πατέρα ἀπὸ τῶν Ἀθηνῶν καὶ ἐναβρυνόμενος, ὅτι πεπαίδευται, προσέθηκεν· Εὔχομαι δέ σε εὑρεῖν κεφαλικὴν ἔχοντα δίκην, ἵνα σοι δείξω τὸν ῥήτορα."},{"wit":"AM","text":"Σχολαστικὸς εὐτράπελος ἀπορῶν δαπανημάτων τὰ βιβλία ἑαυτοῦ ἐπίπρασκε· καὶ γράφων πρὸς τὸν πατέρα ἔλεγε· Σύγχαιρε ἡμῖν, ἤδη γὰρ ἡμᾶς τὰ βιβλία τρέφει.","app":[],"num":"55","tr":"Uno §I§scholastikos§/I§ buontempone essendo privo di denaro vendeva i propri libri, e scrivendo al padre diceva: «Rallegrati per noi, infatti già ci sfamano i libri/già viviamo dei nostri libri».","n":56,"A":"56","label":"55; 31 β","type":"joke","dawe":"55"},{"dawe":"56","type":"joke","label":"56; 23 β","A":"57","n":57,"tr":"Uno §I§scholastikos§/I§, un pelato e un barbiere che viaggiavano insieme e che si erano fermati in un posto isolato, stabilirono fare dei turni di veglia per quattro ore e di sorvegliare i bagagli di ciascuno. Poiché al barbiere toccò per primo di vigilare, volendo distrarsi rasò per primo lo §I§scholastikos§/I§ mentre dormiva, e dopo che furono passate le ore, lo svegliò. Lo §I§scholastikos§/I§ però, accarezzandosi la testa (come si fa) dopo il sonno, si trovò calvo e disse: «Gran canaglia il barbiere! Si è sbagliato e invece di me ha svegliato il pelato!».","num":"56","app":[{"span":[248,252],"unit":131,"editors":[],"sigla":["A","M"],"lemma":"ὡρῶν","reading":"§SIG:M§ : ὁρῶν §SIG:A§","query":false,"dirty":false,"id":"131"},{"unit":132,"span":[253,264],"editors":[],"lemma":"πληρωθεισῶν","sigla":["A","M"],"query":false,"reading":"§SIG:A§ : πληρωθησῶν §SIG:M§","dirty":false,"id":"132"},{"query":false,"reading":"§SIG:A§ : δι’ ὕπνησεν §SIG:M§","dirty":false,"id":"133","unit":133,"span":[265,274],"editors":[],"lemma":"διύπνισεν","sigla":["A","M"]},{"span":[293,298],"unit":134,"editors":[],"lemma":"ψήχων","sigla":["A","M"],"reading":"§SIG:A§ : ψύχων §SIG:M§","query":false,"dirty":false,"id":"134"},{"editors":[],"sigla":["A","M"],"lemma":"ψιλόν","unit":135,"span":[341,346],"id":"135","query":false,"reading":"§SIG:A§ : ψηλὸν §SIG:M§","dirty":false},{"dirty":false,"query":false,"reading":"§SIG:A§ : κουρεύς §SIG:M§","id":"136","unit":136,"span":[369,378],"lemma":"ὁ κουρεύς","sigla":["A","M"],"editors":[]}],"text":"Σχολαστικὸς καὶ φαλακρὸς καὶ κουρεὺς συνοδεύοντες καὶ ἔν τινι ἐρημίᾳ μείναντες συνέθεντο πρὸς τέσσαρας ὥρας ἀγρυπνῆσαι καὶ τὰ σκεύη ἕκαστος τηρῆσαι. ὡς δὲ ἔλαχε τῷ κουρεῖ πρώτῳ φυλάξαι, μετεωρισθῆναι θέλων τὸν σχολαστικὸν καθεύδοντα ἔξυρεν καὶ τῶν ὡρῶν πληρωθεισῶν διύπνισεν. ὁ δὲ σχολαστικὸς ψήχων ὡς ἀπὸ ὕπνου τὴν κεφαλὴν καὶ εὑρὼν ἑαυτὸν ψιλόν· Μέγα κάθαρμα, φησίν, ὁ κουρεύς· πλανηθεὶς γὰρ ἀντ’ ἐμοῦ τὸν φαλακρὸν ἐξύπνισεν.","wit":"AM"},{"tr":"Il padre consigliava ad uno §I§scholastikos§/I§ che stava per avere un figlio da una schiava, di uccidere il bambino. Quello allora disse: «Per prima cosa sotterra i tuoi figli, e solo allora consigliami di ammazzare il mio».","num":"57","app":[{"editors":["Minas"],"lemma":"συμβούλευε","sigla":["A","Minas"],"unit":137,"span":[136,146],"id":"137","reading":"§SIG:Minas§ : συνεβούλευε §SIG:A§","query":false,"dirty":false},{"unit":138,"span":[147,155],"sigla":["A","Boissonade","Eberhard"],"lemma":"τὸν ἐμὸν","editors":["Boissonade","Eberhard"],"dirty":false,"reading":"§SIG:A§ : τὸ ἐμὸν §SIG:Boissonade§ : τοὐμὸν §SIG:Eberhard§ io accetterei (preferibilmente) Eberhard, ton è maschile!","query":false,"id":"138"}],"text":"Σχολαστικῷ ἐκ δούλης τεκνώσαντι ὁ πατὴρ συνεβούλευε τὸ παιδίον ἀποκτεῖναι. ὁ δέ· Πρῶτον, ἔφη, σὺ τὰ τέκνα σου κατόρυξον, καὶ οὕτως ἐμοὶ συμβούλευε τὸν ἐμὸν ἀνελεῖν.","wit":"A","dawe":"57","type":"joke","label":"57","A":"58","n":58},{"tr":"Un inserviente dei bagni versava acqua calda sui piedi di uno §I§scholastikos §/I§che era entrato alle terme. Quello allora disse: «Canaglia, versi acqua calda su un uomo freddo?!».","num":"58","app":[{"id":"139","dirty":false,"query":false,"reading":"§SIG:A§§SIG:M§ : Σχολαστικὸς ... εἰσελθὼν, ὁ παραχύτης","sigla":["A","M"],"lemma":"Σχολαστικοῦ … παραχύτης","editors":[],"unit":139,"span":[0,47]},{"span":[97,126],"unit":140,"lemma":"ψυχρῷ … προσχεῖς","sigla":["M"],"editors":[],"dirty":false,"query":false,"reading":"leggi bene cosa c’è in §SIG:M§","id":"140"},{"editors":["Thierfelder"],"sigla":["Thierfelder"],"lemma":"θερμὸν","unit":141,"span":[48,54],"id":"141","query":false,"reading":"del. §SIG:Thierfelder§","dirty":false}],"text":"Σχολαστικοῦ εἰς βαλανεῖον εἰσελθόντος παραχύτης θερμὸν τοῖς ποσὶ προσέχεεν. ὁ δέ· Κάθαρμα, εἶπε, ψυχρῷ ἀνθρώπῳ θερμὸν προσχεῖς;","wit":"AM","dawe":"58","type":"joke","label":"58","A":"59","n":59},{"dawe":"59","type":"joke","label":"59","A":"60","n":60,"tr":"Uno §I§scholastikos§/I§ sentì un tale che aveva pranzato con una gallina allevata avanzata dal giorno prima e, giunto dall’allevatore diceva: «Cuocimi una gallina di ieri».","num":"59","app":[{"dirty":false,"query":false,"reading":"§SIG:A§ : ἕαλον σιτευτὴν §SIG:M§ : σιτευτὴν ἕωλον §SIG:Dawe§","id":"142","unit":142,"span":[43,57],"sigla":["A","Dawe","M"],"lemma":"ἕωλον σιτευτὴν","editors":["Dawe"]},{"dirty":false,"reading":": θῦσον §SIG:A§§SIG:M§","query":false,"id":"143","unit":143,"span":[117,122],"sigla":["A","M"],"lemma":"θῦσον","editors":[]}],"text":"Σχολαστικὸς ἀκούσας τινός, ὅτι καλὴν ὄρνιν ἕωλον σιτευτὴν ἐδείπνησε, προσελθὼν τῷ σιτευταρίῳ ἔλεγεν· Ἕωλον μοι ὄρνιν θῦσον.","wit":"AM"},{"app":[{"sigla":["A","M"],"lemma":"αὐτὸ","editors":[],"span":[47,51],"unit":144,"id":"144","dirty":false,"query":false,"reading":"§SIG:A§ : αὐτὸς §SIG:M§"},{"id":"145","query":false,"reading":"§SIG:A§ : ποιήσει §SIG:M§","dirty":false,"editors":[],"sigla":["A","M"],"lemma":"ποιήσῃ","span":[62,68],"unit":145},{"unit":146," ημένην· Ἐὰν μικρόν, εἶπεν, ὁ ποταμὸς αὐξήσῃ, βυθισθήσεται.","wit":"AM","dawe":"66","type":"joke","label":"66","n":67,"A":"67"},{"wit":"AM","text":"Σχολαστικὸς ἐξ ἀποδημίας ἐπανερχομένῳ τῷ πενθερῷ ἀπαντήσας, πυνθανομένου ἐκείνου, πῶς πράττοι αὐτοῦ ὁ συμφοιτητής, ὁ δέ· Πάνυ, ἔφη, αὐτῷ καλῶς ἐστι νῦν καὶ εὐθυμεῖ· τὸν γὰρ πενθερὸν αὐτοῦ κατώρυξεν.","app":[{"reading":": ἐπανερχόμενος §SIG:Eberhard§ : ἀνερχόμενος §SIG:Boissonade§ : ἐξερχομένῳ §SIG:A§ : ἐξερχόμενος §SIG:M§","query":false,"dirty":false,"id":"165","unit":165,"span":[25,37],"editors":["Boissonade","Eberhard"],"sigla":["A","Boissonade","Eberhard","M"],"lemma":"ἐπανερχομένῳ"},{"id":"166","dirty":false,"query":false,"reading":"§SIG:A§ : πράττει §SIG:M§","sigla":["A","M"],"lemma":"πράττοι","editors":[],"span":[86,93],"unit":166},{"editors":["Minas"],"sigla":["A","M","Minas"],"lemma":"αὐτοῦ","unit":167,"span":[94,99],"id":"167","reading":"§SIG:Minas§ : ἑαυτοῦ §SIG:A§§SIG:M§","query":false,"dirty":false},{"span":[188,197],"unit":168,"editors":[],"lemma":"κατώρυξεν","sigla":["A","M"],"query":false,"reading":"§SIG:A§ : κατώρυξε §SIG:M§","dirty":false,"id":"168"},{"id":"169","dirty":false,"reading":"§SIG:A§ : οὐκέτι dub. §SIG:Eberhard§","query":false,"lemma":"οὐκ","sigla":["A","Eberhard"],"editors":["Eberhard"],"unit":169,"span":[185,189]}],"num":"67","tr":"Uno §I§scholastikos§/I§ incontrò il suocero che tornava da un viaggio, e quando quello gli chiese come stesse un suo compagno di scuola, disse: «Le cose gli vanno davvero bene, ed è sereno: ha infatti seppellito suo suocero!».","n":68,"A":"68","label":"67","type":"joke","dawe":"67"},{"num":"68","app":[{"span":[19,29],"unit":170,"lemma":"δίκην ὑπέρ","sigla":["A","M","Minas"],"editors":["Minas"],"dirty":false,"reading":": δίκην ὑπέρ §SIG:Minas§ : διαθήκην ὑπό §SIG:A§§SIG:M§","query":false,"id":"170"},{"dirty":false,"query":false,"reading":"§SIG:A§§SIG:M§ : ἄτοπόν τι §SIG:Eberhard§","id":"171","unit":171,"span":[96,102],"lemma":"ἄτοπον","sigla":["A","Eberhard","M"],"editors":["Eberhard"]}],"tr":"Uno §I§scholastikos§/I§ compose un’orazione per un tale e ne diede una lettura pubblica in anteprima. Quando un suo assistito disse che faceva una cosa insensata a rendere manifesti gli aspetti segreti del processo agli avversari, disse: «Disgraziato, forse che non dovrei leggerne gli elementi essenziali?».","wit":"AM","text":"Σχολαστικὸς γράψας δίκην ὑπέρ τινος, δημοσίᾳ προανεγίνωσκε. τοῦ δὲ συνηγορουμένου εἰπόντος, ὅτι ἄτοπον ποιεῖ τὰ ἀπόρρητα τῆς δίκης τοῖς ἀντιδίκοις φανερὰ ποιῶν· Κάθαρμα, εἶπε, μὴ γάρ τι τῶν συνεκτικῶν λέγω;","type":"joke","dawe":"68","A":"69","n":69,"label":"68"},{"text":"Σχολαστικὸς ἀποθανόντος συμφοιτητοῦ ἐπεσκέπτετο τοὺς γονέας. τοῦ δὲ πατρὸς αὐτοῦ ὀδυρομένου καὶ λέγοντος· Τέκνον, ἐπήρωσάς με τῆς δὲ μητρὸς λεγούσης· Τέκνον, ἐτύφλωσάς με ὁ σχολαστικὸς πρὸς τοὺς ἑταίρους εἶπεν· Εἰ ταῦτα αὐτῷ πέπρακται, ἐχρῆν αὐτὸν καὶ ζῶντα καυθῆναι.","wit":"AM","tr":"Uno §I§scholastikos§/I§, dal momento che era morto un suo compagno di scuola, era andato a far visita ai suoi genitori. Poiché il padre di quello si doleva e diceva: «Figlio, mi hai storpiato!» e la madre diceva: «Figlio, mi hai accecata!», lo §I§scholastikos§/I§ disse ai compagni: «Se da lui sono stati compiuti questi misfatti, bisognava bruciarlo addirittura vivo!».","num":"69","app":[{"editors":[],"sigla":["A","M"],"lemma":"ὀδυρομένου","span":[81,91],"unit":172,"id":"172","reading":"§SIG:M§ : ὀδυρωμένου §SIG:A§","query":false,"dirty":false},{"lemma":"ἐπήρωσάς","sigla":["A","Boissonade","Eberhard","M"],"editors":["Boissonade","Eberhard"],"span":[114,122],"unit":173,"id":"173","dirty":false,"reading":"§SIG:Boissonade§ : ἠπόρησάς §SIG:A§§SIG:M§ : ἐταλαιπώρησάς §SIG:Eberhard§","query":false},{"dirty":false,"reading":"§SIG:A§ : ἑτέρους §SIG:M§","query":false,"id":"174","span":[195,203],"unit":174,"lemma":"ἑταίρους","sigla":["A","M"],"editors":[]},{"id":"175","query":false,"reading":"§SIG:Boissonade§ : κλαυθῆναι §SIG:A§§SIG:M§","dirty":false,"editors":["Boissonade"],"sigla":["A","Boissonade","M"],"lemma":"καυθῆναι","unit":175,"span":[258,266]}],"label":"69","A":"70","n":70,"dawe":"69","type":"joke"},{"type":"joke","dawe":"70","n":71,"A":"71","label":"70","app":[{"id":"176","reading":"§SIG:A§§SIG:M§ : ἐπῆλθεν §SIG:Eberhard§","query":false,"dirty":false,"editors":["Eberhard"],"sigla":["A","Eberhard","M"],"lemma":"ἀπῆλθεν","unit":176,"span":[27,34]},{"editors":["Eberhard"],"lemma":"αὐτοῦ","sigla":["A","Eberhard","M"],"unit":177,"span":[65,70],"id":"177","reading":"§SIG:A§§SIG:M§ : αὐτῷ §SIG:Eberhard§","query":false,"dirty":false},{"id":"178","reading":"§SIG:A§ : με; §SIG:M§","query":false,"dirty":false,"editors":[],"sigla":["A","M"],"lemma":"με","unit":178,"span":[154,156]}],"num":"70","tr":"Uno §I§scholastikos§/I§ andò a trovare un amico malato. Quando la moglie di questi gli disse che era ormai di là, lo §I§scholastikos§/I§, rispose: «Bene, se ritorna, gli dirai che sono venuto».","wit":"AM","text":"Σχολαστικὸς νοσοῦντα φίλον ἀπῆλθεν ἐπισκέψασθαι. τῆς γυναικὸς δ’ αὐτοῦ εἰπούσης, ὅτι ἐκεῖνος ἤδη ἔξω ἐστίν· Ἐὰν οὖν ἐπανέλθῃ, φησίν, ἐρεῖς παραγεγενῆσθαί με."},{"type":"joke","dawe":"71","n":72,"A":"72","label":"71","app":[{"editors":["Dawe"],"sigla":["A","Dawe"],"lemma":"ἀκρόπτυχα","span":[54,63],"unit":179,"id":"179","reading":"§SIG:A§ : ἀβρόπτυχα §SIG:Dawe§","query":false,"dirty":false},{"unit":180,"span":[64,74],"sigla":["A","Dawe"],"lemma":"εἰσκομίσαι","editors":["Dawe"],"dirty":false,"query":false,"reading":"§SIG:A§ : ἴσα κομίσασθαι §SIG:Dawe§","id":"180"},{"id":"181","dirty":false,"query":false,"reading":"del. §SIG:Thierfelder§ : ζητήσας §SIG:Minas§","sigla":["Minas","Thierfelder"],"lemma":"ζητῆσαι","editors":["Minas","Thierfelder"],"unit":181,"span":[76,83]},{"span":[97,126],"unit":182,"sigla":["A","Eberhard"],"lemma":"ποῖόν … ποῖον","editors":["Eberhard"],"dirty":false,"reading":"§SIG:A§ : πότερον utrubique §SIG:Eberhard§","query":false,"id":"182"},{"editors":["Minas"],"sigla":["A","Minas"],"lemma":"μάλ","span":[19,23],"unit":1 ἀγὼ †βλέπω†.","app":[{"id":"188","dirty":false,"query":false,"reading":"§SIG:A§ : ὁρῶ vid. opus esse §SIG:Thierfelder§ : βλέπει … βλέπω §SIG:Dawe§","lemma":"βλέπω","sigla":["A","Dawe","Thierfelder"],"editors":["Dawe","Thierfelder"],"span":[104,109],"unit":188},{"dirty":false,"query":false,"reading":"§SIG:A§ : εἶπε πρὸς τὸν κάπηλον §SIG:C§","id":"189","unit":189,"span":[14,4377],"lemma":"τὸν … Οὐκοῦν","sigla":["A","C"],"editors":[]}],"num":"74","tr":"Un tale si avvicinò ad uno §I§scholastikos§/I§ che aveva un cavallo gracilino, disse: «Il tuo cavallo vede già l’Ade». E lo §I§scholastikos§/I§ disse: «Anch’io lo vedo»."},{"wit":"AM","text":"Σχολαστικὸς νοσῶν, εἶτα πεινῶν, ὡς οὐδέπω τετάρτην ὥραν ἀπηγγέλη, ἀπιστῶν πρὸς ἑαυτὸν τὸ ὡρολόγιον ἐκέλευσε κομισθῆναι.","app":[{"id":"190","dirty":false,"query":false,"reading":"§SIG:A§ : ἀπηγγέλει §SIG:M§","sigla":["A","M"],"lemma":"ἀπηγγέλη","editors":[],"span":[56,64],"unit":190}],"num":"75","tr":"Uno §I§scholastikos§/I§, che era malato e peraltro affamato, quando gli fu detto che non era ancora l’ora quarta, non credendoci ordinò che gli fosse portato l’orologio.","n":76,"A":"76","label":"75","type":"joke","dawe":"75"},{"wit":"A","text":"Σχολαστικῷ εἰς τὸ Σαραπεῖον ἀνελθόντι θαλλὸν ὁ ἱερεὺς διδούς· Ἵλεώς σοι, εἶπεν, ὁ κύριος. καὶ ὁ σχολαστικός· Ἵλεως, ἔφη, ὁ κύριος τῷ † παρίω μου· ἐγὼ γὰρ ἐλεύθερός εἰμι.","app":[{"unit":191,"span":[18,27],"editors":["Minas"],"sigla":["A","Minas"],"lemma":"Σαραπεῖον","reading":"§SIG:Minas§ : σαραπίον §SIG:A§","query":false,"dirty":false,"id":"191"},{"reading":"§SIG:Thierfelder§ : θαλὸν §SIG:A§","query":false,"dirty":false,"id":"192","span":[38,44],"unit":192,"editors":["Thierfelder"],"lemma":"θαλλὸν","sigla":["A","Thierfelder"]}],"num":"76","tr":"Un sacerdote consegnò un ramoscello ad uno §I§scholastikos§/I§ che entrava nel §I§Serapeion§/I§ e disse: «Il Signore ti sia benevolo!» e lo §I§scholastikos §/I§fece: «Il Signore sia benevolo al mio…cane! Io, infatti, sono un libero!».","n":77,"A":"77","label":"76","type":"joke","dawe":"76"},{"text":"Σχολαστικὸς ἐκκομίσας τὸν υἱόν, ἀπαντήσας τῷ διδασκάλῳ αὐτοῦ· Σύγγνωθι, ἔφη, ὅτι οὐκ ἦλθεν ὁ υἱός μου εἰς τὴν σχολήν· ἀπέθανε γάρ.","wit":"AM","tr":"Uno §I§scholastikos§/I§, dopo aver celebrato il funerale del figlio, incontrò il suo maestro e disse: «Perdona che mio figlio non sia venuto a scuola: è morto».","app":[],"num":"77","label":"77","n":78,"A":"78","dawe":"77","type":"joke"},{"label":"78","n":79,"A":"79","dawe":"78","type":"joke","text":"Σχολαστικὸς εἰκόνας ἀρχαῖα ζωγραφήματα ἐχούσας ἀπὸ Κορίνθου λαβὼν καὶ εἰς ναῦς ἐμβαλὼν τοῖς ναυκλήροις εἶπεν· Ἐὰν ταύτας ἀπολέσητε, καινὰς ὑμᾶς ἀπαιτήσω.","wit":"A","tr":"Uno §I§scholastikos§/I§, prese da Corinto dei quadri che avevano dipinti antichi e disse ai capitani: «Se li perderete, ve ne chiederò di nuovi».","app":[{"editors":["Minas"],"lemma":"ἀπολέσητε","sigla":["A","Minas"],"unit":193,"span":[121,130],"id":"193","reading":"§SIG:Minas§ : ἀπολέσηται §SIG:A§","query":false,"dirty":false}],"num":"78"},{"dawe":"79","type":"joke","label":"79","A":"80","n":80,"tr":"Il coppiere porse ad uno §I§scholastikos§/I§ una coppa rovente. Questi la poggiò sul tavolo e disse: «Stia così, finché non venga il tuo pedagogo e la trovi bollente».","num":"79","app":[{"query":false,"reading":"§SIG:Thierfelder§ : μένῃ §SIG:Eberhard§ : μένε §SIG:A§","dirty":false,"id":"194","unit":194,"span":[88,95],"editors":["Eberhard","Thierfelder"],"lemma":"μενέτω","sigla":["A","Eberhard","Thierfelder"]}],"text":"Σχολαστικῷ ὑπερζέουσαν κύλικα ὁ οἰνοχόος ὤρεξεν. ὁ δὲ ἐπὶ τῆς τραπέζης αὐτὴν θείς· Οὕτω μενέ‹τω›, ἔφη, μέχρι ὁ παιδαγωγός σου ἐλθὼν εὕρῃ αὐτὴν ζέουσαν.","wit":"A"},{"label":"79 bis; 27 α","n":81,"A":"81","dawe":"79 bis","type":"joke","text":"Σχολαστικὸς νοσῶν συνετάξατο τῷ ἰατρῷ, εἰ θεραπευθείη, μισθὸν δώσειν. ὡς οὖν οἶνον ἐν τῷ πυρέττειν πίνοντι αὐτῷ ἐπετίμα ἡ γυνή· Σὺ δὲ βούλει με ὑγιάναντα, ἔφη, ἀναγκασθῆναι τῷ ἰατρῷ τὸν μισθὸν ἐκτῖσαι;","wit":"A","tr":"Uno §I§scholastikos§/I§ malato si accordò col medico che, se fosse guarito, gli avrebbe dato un compenso. Quando dunque la moglie lo rimproverava perché beveva vino con la febbre, disse: «E tu vuoi che io, sano, sia costretto a pagare il medico?».","app":[{"lemma":"θεραπευθείη","sigla":["A","Dawe"],"editors":["Dawe"],"span":[42,53],"unit":195,"id":"195","dirty":false,"query":false,"reading":"§SIG:Dawe§ : θεραπεύει §SIG:A§"},{"sigla":["A","Dawe"],"lemma":"ἐκτῖσαι","editors":["Dawe"],"unit":196,"span":[193,200],"id":"196","dirty":false,"query":false,"reading":"§SIG:Dawe§ : ἐκτίσαι §SIG:A§"}],"num":"79 bis"},{"text":"Σχολαστικοῦ πλέοντος ἐκινδύνευεν ὑπὸ χειμῶνος τὸ πλοῖον. τῶν δὲ συμπλεόντων ἀπορριπτούντων ἐκ τῶν σκευῶν, ἵνα κουφισθῇ τὸ πλοῖον, κἀκείνῳ τὸ αὐτὸ ποιεῖν παραινούντων, ὁ δὲ ἔχων χειρόγραφον ἑκατὸν πεντήκοντα μυριάδων, τὰς πεντήκοντα ἀπαλείψας· Ἴδε, φησίν, ὅσοις χρήμασιν ἐπεκούφισα τὴν ναῦν.","wit":"AM","tr":"Quando uno §I§scholastikos§/I§ navigava, la barca era in pericolo per una tempesta. Mentre i compagni di viaggio gettavano giù il loro carico perché la nave fosse alleggerita, ed esortavano quello a fare lo stesso, egli, con un contratto da un milione e mezzo, tolse mezzo milione e disse: «Ecco di quante ricchezze ho alleggerito la nave!».","app":[{"query":false,"reading":"§SIG:A§ : ἀποριπτούντων §SIG:M§","dirty":false,"id":"197","span":[76,90],"unit":197,"editors":[],"lemma":"ἀπορριπτούντων","sigla":["A","M"]},{"id":"198","query":false,"reading":"§SIG:Minas§ : τῷ αὐτῷ §SIG:A§§SIG:M§","dirty":false,"editors":["Minas"],"lemma":"τὸ αὐτὸ","sigla":["A","M","Minas"],"span":[138,145],"unit":198},{"span":[232,241],"unit":199,"sigla":["A","M"],"lemma":"ἀπαλείψας","editors":[],"dirty":false,"query":false,"reading":"§SIG:A§ : ὑπαλείψας §SIG:M§","id":"199"},{"editors":["Boissonade","Dawe","Eberhard","Pontanus","Thierfelder"],"lemma":"χρήμασιν","sigla":["A","Boissonade","Dawe","Eberhard","M","Pontanus","Thierfelder"],"unit":200,"span":[261,269],"id":"200","query":false,"reading":"§SIG:Pontanus§ (rec. §SIG:Thierfelder§, §SIG:Dawe§) : κύμασιν §SIG:A§§SIG:M§ (def. §SIG:Boissonade§, §SIG:Eberhard§)","dirty":false},{"reading":": δανείσας §SIG:A§ corr. dub. §SIG:Cataudella§ cf. 157 α : χρίσας dub. §SIG:Thierfelder§ ex Aesop. fab. 57 Hausrath","query":false,"dirty":false,"id":"201","span":[234,241],"unit":201,"editors":["Cataudella","Thierfelder"],"lemma":"ἀλείψας","sigla":["A","Cataudella","Thierfelder"]}],"num":"80","label":"80","n":82,"A":"82","dawe":"80","type":"joke"},{"text":"Σχολαστικὸς ἐν πλοίῳ χειμαζομένων καὶ κλαιόντων τῶν συμπλεόντων· Τί γάρ, ἔφη, μικρολόγοι ἐστέ; ἐγὼ δὲ δέκα Ἀττικὰς πλείονας δοὺς κινδύνῳ τοῦ κυβερνήτου πλέω.","wit":"AM","tr":"Uno §I§scholastikos§/I§ in una nave, mentre i compagni di viaggio erano sballottati da una tempesta e gridavano, «Perché siete spilorci? Io ho pagato dieci dracme ateniesi in più e navigo a rischio del timoniere».","app":[{"editors":["Dawe"],"sigla":["A","Dawe","M"],"lemma":"χειμαζομένων","span":[21,33],"unit":202,"id":"202","reading":"§SIG:A§§SIG:M§ : χειμαζομένῳ §SIG:Dawe§","query":false,"dirty":false},{"unit":203,"span":[38,47],"editors":[],"lemma":"κλαιόντων","sigla":["A","M"],"query":false,"reading":"§SIG:M§ : κλεόντων §SIG:A§","dirty":false,"id":"203"},{"lemma":"συμπλεόντων","sigla":["A","M"],"editors":[],"span":[52,63],"unit":204,"id":"204","dirty":false,"reading":"§SIG:A§ : ἐν τῷ πλοίῳ §SIG:M§","query":false},{"unit":205,"span":[89,93],"sigla":["A","M"],"lemma":"ἐστέ","editors":[],"dirty":false,"reading":"§SIG:A§ : ἐσταί §SIG:M§","query":false,"id":"205"},{"id":"206","dirty":false,"reading":"§SIG:A§§SIG:M§ (in textu §SIG:Dawe§) : διδοὺς §SIG:Thierfelder§","query":false,"lemma":"δοὺς","sigla":["A","Dawe","M","Thierfelder"],"editors":["Dawe","Thierfelder"],"span":[124,128],"unit":206},{"dirty":false,"reading":"§SIG:Minas§ : κυβερνίτου §SIG:A§§SIG:M§","query":false,"id":"207","unit":207,"span":[141,151],"lemma":"κυβερνήτου","sigla":["A","M","Minas"],"editors":["Minas"]}],"num":"81","label":"81","n":83,"A":"83","dawe": "sigla":["A","M"],"lemma":"βάλῃ","unit":222,"span":[102,106],"id":"222","query":false,"reading":"§SIG:A§ : βάλλει §SIG:M§","dirty":false}],"tr":"Uno §I§scholastikos§/I§, trasferitosi in una casa nuova, e dopo aver ripulito l’ingresso davanti al portone, vi affisse un’iscrizione: «Chiunque getti escrementi qui, non avrà diritto al reso».s:88"},{"text":"Σχολαστικὸν ὁ πατὴρ ἀπολέσαντα δηνάριον ἐβούλετο τυπτῆσαι. ὁ δέ· Μὴ ὀργίζου, ἔφη, κἀγὼ ἐκ τῶν ἐμῶν ἀγοράζω τὸ δηνάριον.","wit":"AM","tr":"Il padre voleva picchiare uno §I§scholastikos §/I§che aveva perso un denaro. Ma quello disse: «Non arrabbiarti, ti ricompro io il denaro coi miei soldi».","app":[{"unit":223,"span":[20,30],"editors":[],"sigla":["A","M"],"lemma":"ἀπολέσαντα","query":false,"reading":"§SIG:A§ : ἀπωλέσαντα §SIG:M§","dirty":false,"id":"223"},{"span":[49,57],"unit":224,"sigla":["A","M"],"lemma":"τυπτῆσαι","editors":[],"dirty":false,"query":false,"reading":"§SIG:A§ : τυπῆσαι §SIG:M§DFW0","id":"224"},{"reading":"§SIG:A§§SIG:M§ : καὶ γὰρ §SIG:Eberhard§, fort. recte","query":false,"dirty":false,"id":"225","span":[82,86],"unit":225,"editors":["Eberhard"],"sigla":["A","Eberhard","M"],"lemma":"κἀγὼ"},{"id":"226","reading":"§SIG:M§ : δινάριον §SIG:A§ac","query":false,"dirty":false,"editors":[],"sigla":["A","M"],"lemma":"δηνάριον","span":[110,118],"unit":226}],"num":"86","label":"86","n":88,"A":"88","dawe":"86","type":"joke"},{"dawe":"87","type":"joke","label":"87","n":89,"A":"89","tr":"Uno §I§scholastikos§/I§si mise l’armatura da gladiatore e giocava in casa. All’improvviso però, dopo che qualcuno l’aveva avvisato dell’arrivo del padre, gettò l’arma e si stava togliendo lo schiniere. Ma siccome il padre era già arrivato, leggeva un libro tenendo l’elmo in testa.","app":[{"dirty":false,"reading":"§SIG:A§ : ἀπὸ §SIG:Boissonade§ : πρὸ §SIG:Eberhard§","query":false,"id":"227","unit":227,"span":[12,15],"lemma":"ἐπὶ","sigla":["A","Boissonade","Eberhard"],"editors":["Boissonade","Eberhard"]},{"span":[27,37],"unit":228,"lemma":"σεκούτορος","sigla":["A","Thierfelder"],"editors":["Thierfelder"],"dirty":false,"query":false,"reading":"§SIG:Thierfelder§ : σεκούτερος §SIG:A§","id":"228"},{"unit":229,"span":[171,176],"sigla":["A","Eberhard","Minas"],"lemma":"αὐτοῦ","editors":["Eberhard","Minas"],"dirty":false,"reading":": αὐτοῦ §SIG:A§ : αὐτῷ §SIG:Eberhard§ (prob. §SIG:Minas§)","query":false,"id":"229"}],"num":"87","text":"Σχολαστικὸς ἐπὶ τῆς οἰκίας σεκούτορος σχῆμα λαβὼν ἔπαιζεν. ἄφνω δέ τινος ἀπαγγείλαντος αὐτῷ παρουσίαν τοῦ πατρός, ῥίψας τὸ ὅπλον ἔλυε τὴν κνημῖδα. φθάσαντος δὲ τοῦ πατρὸς αὐτοῦ ἐπιστῆναι, ἔχων τὴν περικεφαλαίαν βιβλίον ἀνεγίνωσκεν.","wit":"A"},{"text":"Σχολαστικὸς ἐπανερχόμενος, ὅθεν ἀπεδήμησεν, καὶ ἀναβαίνων ὑψηλὴν ἀνάβασιν ἐθαύμαζε λέγων· Ἐνταῦθα ὅτε πρῶτον [ὡς] παρῄειν ὁδεύων, κατάβασις ἦν· καὶ πῶς νῦν ταχέως ἠλλάγηκαὶ ἀνάβασις γέγονε;","wit":"AM","tr":"Uno §I§scholastikos §/I§tornava nel luogo dal quale era partito, e salendo una salita ripida si meravigliava e disse: «Qui quando passai per la prima volta in cammino, c’era una discesa: e com’è che ora è cambiato velocemente e c’è una salita?».","num":"88","app":[{"id":"230","dirty":false,"query":false,"reading":"om. §SIG:Boissonade§","lemma":"ὡς","sigla":["Boissonade"],"editors":["Boissonade"],"span":[110,112],"unit":230},{"query":false,"reading":": παρκεῖν §SIG:A§ : ἐπαρκεῖν §SIG:M§ : παρεκεῖ §SIG:Boissonade§","dirty":false,"id":"231","span":[114,121],"unit":231,"editors":["Boissonade"],"sigla":["A","Boissonade","M"],"lemma":"παρῄειν"},{"span":[122,128],"unit":232,"sigla":["A","Boissonade","M"],"lemma":"ὁδεύων","editors":["Boissonade"],"dirty":false,"query":false,"reading":"§SIG:A§§SIG:M§ : ὠδεύον §SIG:Boissonade§","id":"232"}],"label":"88","A":"90","n":90,"dawe":"88","type":"joke"},{"text":"Σχολαστικὸς πλέων ἐπύθετο τοῦ κυβερνήτου, πόστη εἴη ὥρα. τοῦ δὲ μὴ γινώσκειν φήσαντος ἠρώτησε, πόσος εἴη χρόνος, ἀφ’ οὗ τὴν ναῦν κυβερνᾷ. τοῦ δὲ τρία ἔτη φήσαντος· Πῶς οὖν ἐγώ, ἔφη, πρὸ ἓξ μηνῶν οἰκίαν πριάμενος, ὅταν εἰς τὴν αὐλὴν κατέλθῃ ὁ ἥλιος, τὴν ὥραν στοχάζομαι, σὺ δὲ ἀπὸ τοῦ πλοίου τεκμήρασθαι οὐ δύνασαι τοσούτῳ χρόνῳ αὐτὸ κυβερνῶν;","wit":"AM","tr":"Uno §I§scholastikos §/I§mentre navigava chiese al timoniere che ora fosse. Dal momento che quello disse che non lo sapeva, gli domandò da quanto tempo pilotasse la nave. Quando quello disse: «Tre anni», fece: «Com’è allora che io, che ho acquistato casa sei mesi fa, quando il sole scende in cortile indovino l’ora, ma tu invece non sai calcolarla dalla nave che pur governi da un tempo così ampio?».","app":[{"unit":233,"span":[18,25],"editors":[],"sigla":["A","M"],"lemma":"ἐπύθετο","reading":"§SIG:A§ : ἐπείθετο §SIG:M§","query":false,"dirty":false,"id":"233"},{"query":false,"reading":"§SIG:M§ : κυβερνίτου §SIG:A§","dirty":false,"id":"234","span":[30,40],"unit":234,"editors":[],"sigla":["A","M"],"lemma":"κυβερνήτου"},{"span":[42,55],"unit":235,"lemma":"πόστη … ὥρα","sigla":["A","M","Minas"],"editors":["Minas"],"dirty":false,"reading":"§SIG:Minas§ : πῶς τῆ εἴ βωρα §SIG:A§ : πῶς, τῆ ὥρα §SIG:M§","query":false,"id":"235"},{"editors":[],"sigla":["A","M"],"lemma":"ἠρώτησε","span":[86,93],"unit":236,"id":"236","query":false,"reading":"§SIG:A§ : ἠρώτισε §SIG:M§","dirty":false},{"span":[101,104],"unit":237,"editors":[],"lemma":"εἴη","sigla":["A","M"],"reading":"§SIG:A§ : om. §SIG:M§","query":false,"dirty":false,"id":"237"},{"dirty":false,"reading":"§SIG:A§ : ναῦ §SIG:M§","query":false,"id":"238","unit":238,"span":[124,128],"sigla":["A","M"],"lemma":"ναῦν","editors":[]},{"unit":239,"span":[154,162],"sigla":["A","M"],"lemma":"φήσαντος","editors":[],"dirty":false,"query":false,"reading":"§SIG:A§ : φωνήσαντος §SIG:M§","id":"239"},{"editors":[],"sigla":["A","M"],"lemma":"κατέλθῃ","span":[232,239],"unit":240,"id":"240","reading":"§SIG:A§ : κατέλθοι §SIG:M§","query":false,"dirty":false},{"span":[328,332],"unit":241,"sigla":["A","M"],"lemma":"αὐτὸ","editors":[],"dirty":false,"reading":"§SIG:A§ : αὐτῷ §SIG:M§","query":false,"id":"241"},{"sigla":["M","Minas"],"lemma":"κυβερνῶν","editors":["Minas"],"span":[333,341],"unit":242,"id":"242","dirty":false,"query":false,"reading":"§SIG:Minas§ : κυβερνᾶν §SIG:M§"}],"num":"89","label":"89","n":91,"A":"91","dawe":"89","type":"joke"},{"dawe":"90","type":"joke","label":"90","n":92,"A":"92","tr":"Un sofista §I§scholastikos§/I§, incaricato di pronunciare gli epitaffi dei defunti, scrisse un discorso per uno ancora vivo, che lo rimproverava per questo. Allora quello disse: «Se dunque voi non mi dite per tempo quando dovete morire, volete che io parlando a braccio faccia brutta figura?».","app":[{"id":"243","reading":"§SIG:Minas§ : ἄνουν §SIG:A§ : ἂνους §SIG:M§","query":false,"dirty":false,"editors":["Minas"],"lemma":"Ἂν οὖν","sigla":["A","M","Minas"],"unit":243,"span":[137,143]},{"reading":"§SIG:A§ : ἀποθνήσκετε §SIG:M§","query":false,"dirty":false,"id":"244","unit":244,"span":[176,187],"editors":[],"sigla":["A","M"],"lemma":"ἀποθνῄσκητε"},{"id":"245","dirty":false,"query":false,"reading":"corr. §SIG:Minas§ : contra §SIG:Dawe§ cf. Ritter p. 63 n. 147","lemma":"λέγων","sigla":["Dawe","Minas"],"editors":["Dawe","Minas"],"unit":245,"span":[208,214]},{"id":"246","dirty":false,"reading":"§SIG:M§ : βούλεσθαι §SIG:A§","query":false,"sigla":["A","M"],"lemma":"βούλεσθε","editors":[],"unit":246,"span":[216,224]}],"num":"90","text":"Σχολαστικὸς σοφιστὴς ἀξιούμενος τῶν ἀποθνῃσκόντων ἐπιταφίους λέγειν ἑνὸς ἔτι ζῶντος ἔγραψεν ἐπιτάφιον· ὃς ἐνεκάλει αὐτῷ ἐπὶ τούτῳ. ὁ δέ· Ἂν οὖν ὑμεῖς, φησί, μὴ προλέγητε, ὅταν ἀποθνῄσκητε, ἐγὼ ἐξ αὐτοσχεδίου λέγω‹ν› βούλεσθε ἵν’ ἀσχημονήσω;","wit":"AM"},{"A":"93","n":93,"label":"90 bis; 30 α et 29 β","type":"joke","dawe":"90 bis","wit":"A","text":"Σχολαστικὸς ναυαγεῖν μέλλων ᾔτει πινακίδας, ἵνα διαθήκας γράψῃ.","num":"90 bis","app":[],"tr":"Cf. 30 94. Uno §I§scholastikos§/I§ avevano a cena dei compagni di studi, e siccome questi avevano lodato la testa di maiale e gli avevano richiesto di pranzare da lui anche l’indomani, andò dal cuoco e disse: «Dammi un’altra testa proveniente dallo stesso porco: quella di ieri ci è proprio piaciuta!»."},{"text":"Σχολαστικὸς συμφοιτητὰς ἐπὶ δεῖπνον καλέσας, ἐπαινεσάντων αὐτῶν ὑὸς κεφαλὴν καὶ ἀξιωσάντων καὶ τῇ ὑστεραίᾳ παρ’αὐτῷ ἑστιαθῆναι, ἀπελθὼν πρὸς τὸν μάγειρον· Δός μοι, ἔφη, ἀπὸ τοῦ αὐτοῦ χοίρου κεφαλὴν ἑτέραν· ἡ γὰρ χθὲς ἡμῖν πάνυ ἤρεσεν.","wit":"AM","tr":"","app":[{"span":[58,63],"unit":247,"editors":[],"lemma":"αὐτῶν","sigla":["A","M"],"query":false,"reading":": αὐτῶ §SIG:A§ §SIG:M§ac: αὐτῶν §SIG:M§pc","dirty":false,"id":"247"},{"editors":[],"lemma":"μάγειρον","sigla":["A","M"],"span":[145,153],"unit":248,"id":"248","query":false,"reading":"§SIG:M§ : μάγηρον §SIG:A§","dirty":false}],"num":"91","label":"91","n":94,"A":"94","dawe":"91","type":"joke"},{"app":[],"num":"91 bis","tr":"Cf. 31","wit":"A","text":"Σχολαστικὸς διαπερᾶσαι ‹ποταμὸν› βουλόμενος ἀνέβη εἰς τὸ πλοῖον μετὰ τοῦ ἵππου ἐποχούμενος. Πυθομένου δέ τινος, διὰ τί οὐ κάτεισι· σπεύδειν ἔφη.","type":"joke","dawe":"91 bis","n":95,"A":"95","label":"91 bis; 31 α et 30 β"},{"wit":"AM","text":"Σχολαστικὸς ἠρώτα τὸν πατέρα· Ἡ πεντακότυλος λήκυθος πόσον χωρεῖ;","app":[{"editors":[],"sigla":["A","M"],"lemma":"τὸν πατέρα","unit":249,"span":[18,28],"id":"249","reading":"§SIG:A§ : τὸν πατέρα αὐτοῦ §SIG:M§","query":false,"dirty":false}],"num":"92","tr":"Uno §I§scholastikos§/I§ chiedeva al padre: «La boccetta da cinque cotili quanto è capace?».","n":96,"A":"96","label":"92; 141 α et 1 γ/261 α/72 β","type":"joke","dawe":"92"},{"app":[{"reading":"§SIG:A§ : εἴκοσι §SIG:M§","query":false,"dirty":false,"id":"250","span":[69,76],"unit":250,"editors":[],"sigla":["A","M"],"lemma":"εἴκοσιν"}],"num":"93","tr":"Uno §I§scholastikos§/I§ venne a sapere che una certa scala ha venti gradini quando si sale, e chiese se fossero tanti anche quando si scende.","wit":"AM","text":"Σχολαστικὸς μαθὼν περὶ κλίμακός τινος, ὅτι ἀναβαινόντων ἔχει βαθμοὺς εἴκοσιν, ἐπύθετο, εἰ καὶ καταβαινόντων τοσοῦτοί εἰσιν.","type":"joke","dawe":"93","n":97,"A":"97","label":"93"},{"tr":"Uno §I§scholastikos§/I§, mentre alcuni parlavano di problemi di digestione, diceva che non ne aveva mai avuti. Ma quando gli chiesero se avesse mai fatto rutti in modo acido o fetido, disse: «Questo lo faccio ogni giorno!».","num":"94","app":[],"text":"Σχολαστικὸς διαλεγομένων τινῶν περὶ ἀπεψίας, ἔλεγε μηδεπώποτε ἠπεπτηκέναι. τῶν δὲ πυνθανομένων, εἰ μηδέποτε ἠρεύξατο πικρὸν ἢ ἀηδές· Τοῦτο, εἶπε, ποιῶ καθ’ ἑκάστην ἡμέραν.","wit":"A","dawe":"94","type":"joke","label":"94","A":"98","n":98},{"text":"Σχολαστικῷ υἱὸς ἐγεννήθη. πυνθανομένων δέ τινῶν αὐτοῦ, ποῖον ὄνομα αὐτῷ θήσεται· Τὸ ἐμὸν ἕξει, ἔφη, ὄνομα, κἀγὼ τέως οὕτω μενῶ.","wit":"A","tr":"Ad uno §I§scholastikos§/I§ nacque un figlio. Quando alcuni gli chiesero quale nome gli avrebbe dato, rispose: «Avrà il mio, di nome, e io rimarrò così per un po’… (cioè privo di nome)».","app":[],"num":"95","label":"95","n":99,"A":"99","dawe":"95","type":"joke"},{"n":100,"A":"100","label":"96","type":"joke","dawe":"96","wit":"AM","text":"Σχολαστικοὶ δύο δειλοί, ὁ μὲν ἔκρυψεν εἰς φρέαρ αὑτόν, ὁ δὲ εἰς καλαμῶνα. χαλασάντων οὖν κράνος τῶν στρατιωτῶν ἐπὶ τὸ ὕδωρ ἀρύσασθαι, νομίσας στρατιώτην κατιέναι, ἱκετεύων ἐλήφθη. ὡς δὲ ἔφασαν οἱ στρατιῶται ὅτι εἰ ἐσιώπησε, παρῆλθον ἂν αὐτόν, ὁ ἐν τῷ καλαμῶνι κρυβόμενος· Οὐκοῦν, εἶπεν, ἐμὲ παρέλθατε· σιωπῶ γάρ.","app":[{"unit":251,"span":[0,15],"sigla":["A","M","Minas"],"lemma":"Σχολαστικοὶ δύο","editors":["Minas"],"dirty":false,"query":false,"reading":"§SIG:Minas§ : Δύο σχολαστικοί §SIG:A§ : δύο om. §SIG:M§","id":"251"},{"dirty":false,"query":false,"reading":"post δειλοί έδιώκοντο ὑπό πολεμίων καὶ add. §SIG:Dawe§","id":"252","unit":252,"span":null,"lemma":"","sigla":["Dawe"],"editors":["Dawe"]},{"editors":[],"lemma":"αὑτόν","sigla":["A","M"],"unit":253,"span":[48,53],"id":"253","query":false,"reading":"§SIG:A§ : ἑαυτὸν §SIG:M§","dirty":false},{"editors":["Dawe"],"sigla":["Dawe"],"lemma":"","span":null,"unit":254,"id":"254","query":false,"reading":"ante νομίσας ὁ μὲν ἕτερος add. §SIG:Dawe§","dirty":false},{"span":[60,62],"unit":255,"editors":[],"sigla":["A","M"],"lemma":"εἰ","query":false,"reading":"§SIG:A§ : om. §SIG:M§","dirty":false,"id":"255"},{"dirty":false,"reading":"§SIG:A§ : ὁ δὲ ἐν §SIG:M§","query":false,"id":"256","unit":256,"span":[243,247],"sigla":["A","M"],"lemma":"ὁ ἐν","editors":[]}],"num":"96","tr":"C’erano due §I§scholastikoi§/I§ codardi: uno si nascose in un pozzo, l’altro invece in un canneto. Quando i soldati calarono un elmo per attingere l’acqua, credette che stesse scendendo un soldato e poiché si era messo a supplicare, fu catturato. Ma quando i soldati dissero che, se fosse stato zitto, sarebbero passati oltre, quello nascosto nel canneto disse: «E allora passate oltre me: infatti sto zitto!»."},{"num":"96 bis","app":[{"dirty":false,"reading":"§SIG:Dawe§","query":false,"id":"257","unit":257,"span":[111,114],"lemma":"ἔφη","sigla":["Dawe"],"editors":["Dawe"]}],"tr":"Cf. 32","wit":"A","text":"Σχολαστικὸς ἐπὶ δεῖπνον κληθεὶς οὐκ ἤσθιεν. ἐρομένου οὖν τινος τῶν κεκλημένων διὰ τί οὐκ ἐσθίοι, ὁ δὲ Ἵνα μὴ, ‹ἔφη›, τοῦ φαγεῖν ἕνεκα δόξω παρεῖναι.","type":"joke","dawe":"96 bis","A":"101","n":101,"label":"96 bis; 32 α"},{"tr":"Uno§I§ scholastikos§/I§, dopo che gli era morta la moglie, stava comprando un sarcofago e bisticciava sul prezzo. Quando il venditore giurò che non l’avrebbe venduto a meno di cinquantamila, egli disse: «Poiché ti sei legato col giuramento, prendi pure le cinquantamila, però in aggiunta, dammi un piccolo sarcofaghino, così, se mai ne avessi bisogno per un mio figlioletto, sarà già pronto».","app":[{"unit":258,"span":[13,16],"editors":["Eberhard"],"lemma":"τῆς","sigla":["Eberhard"],"query":false,"reading":"§SIG:Eberhard§","dirty":false,"id":"258"},{"id":"259","dirty":false,"reading":": πολοῦντος §SIG:A§ : §SIG:Eberhard§","query":false,"lemma":"πωλοῦντος","sigla":["A","Eberhard"],"editors":["Eberhard"],"span":[97,106],"unit":259},{"editors":["Eberhard"],"sigla":["A","Eberhard"],"lemma":"ὀμόσαντος","unit":260,"span":[107,116],"id":"260","query":false,"reading":": ὁμόσαντος §SIG:A§ : §SIG:Eberhard§","dirty":false},{"query":false,"reading":"§SIG:A§ : που §SIG:Eberhard§","dirty":false,"id":"261","span":[273,276],"unit":261,"editors":["Eberhard"],"lemma":"μου","sigla":["A","Eberhard"]}],"num":"97","text":"Σχολαστικὸς ‹τῆς› γυναικὸς αὐτοῦ ἀποθανούσης σορὸν ἠγόραζε καὶ περὶ τῆς τιμῆς ἐζυγομάχει. τοῦ δὲ πωλοῦντος ὀμόσαντος μὴ ἔλαττον πέντε μυριάδων πωλήσειν, ὁ δέ· Ἐπειδή, ἔφη, προσείληψαι τῷ ὅρκῳ, λάβε μὲν τὰς πέντε μυριάδας, εἰς προσθήκην δέ μοι μικρὸν σορίδιον δός, ἵνα, ἐάν μου χρεία παιδίῳ γένηται, ἕτοιμον ᾖ.","wit":"A","dawe":"97","type":"joke","label":"97","n":102,"A":"102"},{"app":[{"id":"262","reading":"§SIG:A§ : Σχολαστικὸς §SIG:M§","query":false,"dirty":false,"editors":[],"sigla":["A","M"],"lemma":"Σχολαστικῷ","unit":262,"span":[0,10]}],"num":"98","tr":"Un amico incontrò uno §I§scholastikos§/I§ e disse: «Ti faccio le congratulazioni perché ti è nato un figlio!». Ma quello rispose: «Questo è ciò che fate voi, o amici!».","wit":"A","text":"Σχολαστικῷ ἑταῖρος ἀπαντήσας· Συγχαίρω σοι, εἶπεν, ὅτι σοι παιδίον ἐγεννήθη. ὁ δὲ ἀπεκρίνατο· Τοῦτο ὑμεῖς οἱ φίλοι ποιεῖτε.","type":"joke","dawe":"98","n":103,"A":"103","label":"98"},{"app":[{"id":"263","reading":"§SIG:A§§SIG:M§ : μῦρον","query":false,"dirty":false,"editors":[],"sigla":["A","M"],"lemma":"βίρρον","span":[33,39],"unit":263}],"num":"99","tr":"Uno dice a uno §I§scholastikos§/I§: «Prestami una casacca, fino al campo». E questo fa: «Fino alla caviglia ce l’ho, ma fino al campo no!»","wit":"AM","text":"Σχολαστικῷ τις λέγει· Χρῆσόν μοι βίρρον μέχρις ἀγροῦ. ὁ δέ· Μέχρι σφυροῦ, εἶπεν, ἔχω· μέχρι δὲ ἀγροῦ οὐκ ἔχω.","type":"joke","dawe":"99","n":104,"A":"104","label":"99; 142 α"},{"app":[{"id":"264","dirty":false,"reading":"§SIG:A§ : ὤδευεν §SIG:M§","query":false,"sigla":["A","M"],"lemma":"ὥδευεν","editors":[],"unit":264,"span":[25,31]},{"reading":"§SIG:A§§SIG:M§ : οὐκέτι §SIG:Eberhard§","query":false,"dirty":false,"id":"265","unit":265,"span":[63,66],"editors":["Eberhard"],"lemma":"οὐκ","sigla":["A","Eberhard","M"]},{"dirty":false,"reading":"§SIG:A§ : λυθῆσαι §SIG:M§","query":false,"id":"266","span":[135,143],"unit":266,"sigla":["A","M"],"lemma":"λυθεῖσαι","editors":[]},{"dirty":false,"query":false,"reading":"[τὸ] δραμεῖν §SIG:Eberhard§. coll. 133 α","id":"267","unit":267,"span":[268,278],"lemma":"τὸ δραμεῖν","sigla":["Eberhard"],"editors":["Eberhard"]}],"num":"100","tr":"Uno §I§scholastikos§/I§ era in viaggio su un carro. Siccome le mule spossate non riuscivano a camminare, il cocchiere le sciolse perché si rimettessero un po’ in sesto. Ebbene, quando furono sciolte, fuggirono. Allora lo §I§scholastikos§/I§ disse al cocchiere: «Disgraziato, le mule corrono, mentre la colpa è del carro, che non è capace di correre?».","wit":"AM","text":"Σχολαστικὸς ἐπ’ ὀχήματος ὥδευεν. ἐπεὶ δὲ ἀτονήσασαι αἱ ἡμίονοι οὐκ ἠδύναντο βαδίζειν, ὑπέλυσεν αὐτὰς ὁ ἡνίοχος, ἵνα μικρὸν ἀναλάβωσιν. λυθεῖσαι οὖν ἔφυγον. καὶ ὁ σχολαστικὸς πρὸς τὸν ἡνίοχον· Κάθαρμα, εἶπεν, ὁρᾷς, ὅτι αἱ μὲν ἡμίονοι τρέχουσι, τὸ δὲ ὄχημά ἐστιν αἴτιον τὸ δραμεῖν μὴ δυνάμενον;","type":"joke","dawe":"100","n":105,"A":"105","label":"100; 133 α"},{"dawe":"101","type":"joke","label":"101","A":"106","n":106,"tr":"Un tale vede due fratelli gemelli e, siccome alcuni si meravigliano della somiglianza di questi, dice: «Non è tanto questo che assomiglia così a quello, quanto quello che è uguale a questo».","num":"101","app":[{"unit":268,"span":[78,83],"editors":["Eberhard"],"lemma":"οὕτως","sigla":["Eberhard"],"reading":"§SIG:Eberhard§","query":false,"dirty":false,"id":"268"},{"id":"269","query":false,"reading":"§SIG:Boissonade§","dirty":false,"editors":["Boissonade"],"lemma":"τούτῳ","sigla":["Boissonade"],"span":[132,137],"unit":269}],"text":"Σχολαστικὸς ἀδελφοὺς διδύμους ἰδὼν θαυμαζόντων τινῶν τὴν ὁμοιότητα αὐτῶν· Οὐχ οὕτως, φησίν, ὅμοιός ἐστιν ‹οὗτος› ἐκείνῳ, ὡς ἐκεῖνος τούτῳ.","wit":"A"},{"wit":"AM","text":"Σχολαστικῷ τις λέγει· Δημέα, τρίτην ἡμέραν σε ἐνθάδε ἐν ὕπνοις εἶδον. ὁ δέ· Ψεύδῃ, εἶπεν, ἐν ἀγρῷ γὰρ ἤμην.","num":"102","app":[{"dirty":false,"reading":"dub. delendum putat §SIG:Thierfelder§","query":false,"id":"270","unit":270,"span":[46,52],"sigla":["Thierfelder"],"lemma":"ἐνθάδε","editors":["Thierfelder"]},{"id":"271","dirty":false,"query":false,"reading":"§SIG:A§ : ψεύδει §SIG:M§","lemma":"Ψεύδῃ","sigla":["A","M"],"editors":[],"span":[76,81],"unit":271},{"dirty":false,"query":false,"reading":": ἔριον ἀφέρει §SIG:A§ : ἔριον ἀφθόνως φέρει §SIG:Minas§ : ἔρια φέρει §SIG:Perry§","id":"272","unit":272,"span":null,"sigla":["A","Minas","Perry"],"lemma":"ἔριον φέρει","editors":["Minas","Perry"]}],"tr":"Un tale dice ad uno §I§scholastikos§/I§: «Demea, l’altro ieri ti ho visto qui in sogno». E questo: «Ti sbagli, perché ero in campagna».","A":"107","n":107,"label":"102","type":"joke","dawe":"102"},{"type":"joke","dawe":"103","n":108,"A":"108","label":"103; 134 α","app":[],"num":"103","tr":"Uno §I§scholastikos §/I§chiacchierava con due amici. Quando uno ebbe detto che non è giusto uccidere una pecora poiché offre latte e lana, e l’altro che non conviene uccidere nemmeno una mucca, ché procura latte e ara, lo §I§scholastikos§/I§ disse che non è giusto nemmeno ammazzare la scrofa, ché offre fegato, carne di mammella e di vulva.","wit":"A","text":""},{"app":[],"type":"section","text":"ἐκ τοῦ Φιλογέλου"},{"wit":"AM","text":"Φιλάργυρος διαθήκας γράφων ἑαυτὸν κληρονόμον ἔταξεν.","app":[],"num":"104","tr":"Un avaro che scriveva le proprie volontà testamentarie dispose come erede sé stesso.","n":109,"A":"109","label":"104; 48 β","type":"joke","dawe":"104"},{"wit":"A","text":"Φιλάργυρος ἐρωτώμενος, διὰ τί ἄλλο οὐθὲν ἢ μόνον ἐλαίας ἐσθίει, ἔφη· Ἵνα τὸ μὲν ἔξωθεν ἀντὶ ὄψου ἔχω, τὸ δὲ ὀστοῦν ἀντὶ ξύλου· φαγὼν δέ, εἰς ‹τὴν› ἑαυτοῦ κεφαλὴν σφογγισάμενος λουτροῦ οὐκ ἐπιδέομαι.","num":"105","app":[],"tr":"Un avaro a cui veniva domandato perché non mangiasse altro che olive soltanto, diceva: «Intanto per avere l’esterno come cibo, poi per avere il nocciolo come cibo; e dopo aver mangiato, per sfregarmi la testa e non aver bisogno di un lavaggio/bacinella».","A":"110","n":110,"label":"105; 49 β","type":"joke","dawe":"105"},{"tr":"Un pitocco professionista, solito convincere la propria compagna di essere nobile e ricco, quando mentre si abboffava dai vicini vide all’improvviso la compagna, si voltò e ordinava: «E mandami anche la veste da ricevimento!»","num":"106","app":[{"span":[13,19],"unit":273,"lemma":"εἰωθὼς","sigla":["Boissonade"],"editors":["Boissonade"],"dirty":false,"reading":"§SIG:Boissonade§ : εἰωθὸς cf. 7 G","query":false,"id":"273"},{"lemma":"ἐξαπατᾶν","sigla":["A","M"],"editors":[],"unit":274,"span":[36,44],"id":"274","dirty":false,"query":false,"reading":"§SIG:A§ : ἐξαπατῶν §SIG:M§ac"},{"id":"275","reading":"§SIG:Minas§ : τὰς φίλας §SIG:A§ : τοὺς φίλους §SIG:M§ δὲ §SIG:M§","query":false,"dirty":false,"editors":["Minas"],"lemma":"τὴν φίλην","sigla":["A","M","Minas"],"unit":275,"span":[117,126]}],"text":"Πεπανόπτωχος εἰωθὼς τὴν φίλην αὐτοῦ ἐξαπατᾶν ὡς εὐγενὴς ὢν καὶ πλούσιος, εἰς τοὺς γείτονας σιτευόμενος ὡς εἶδεν ἄφνω τὴν φίλην, στραφεὶς ἐφώνει· Πέμψον δέ μοι καὶ τὸ φιβλατώριον.","wit":"AM","dawe":"106","type":"joke","label":"106; 7 G","A":"111","n":111},{"n":112,"A":"112","label":"107","type":"joke","dawe":"107","wit":"AM","text":"Ἄλλος ὁμοίως μεγαλαυχούμενος, τελείως τε πενητεύων [καὶ] κατὰ τύχην νοσήσας, τῆς δὲ φίλης αὐτοῦ αἰφνίδιον ἐπεισελθούσης καὶ εὑρούσης αὐτὸν ἐπὶ ψιάθου κείμενον, ἐντραπεὶς ᾐτιᾶτο τοὺς ἰατροὺς λέγων· Οἱ καλοὶ ἰατροὶ καὶ δόκιμοι τῆς πόλεως ἐκέλευσάν με ψιαθισθῆναι.","app":[{"dirty":false,"reading":"§SIG:M§ : δὲ §SIG:A§","query":false,"id":"276","unit":276,"span":[30,32],"sigla":["A","M"],"lemma":"τε","editors":[]},{"id":"277","dirty":false,"reading":"del. §SIG:Eberhard§","query":false,"sigla":["Eberhard"],"lemma":"καὶ","editors":["Eberhard"],"span":[52,55],"unit":277},{"id":"278","reading":"§SIG:A§ : αἰφνήδιον §SIG:M§","query":false,"dirty":false,"editors":[],"sigla":["A","M"],"lemma":"αἰφνίδιον","unit":278,"span":[96,105]},{"dirty":false,"query":false,"reading":"ante δόκιμοι οἱ add. §SIG:Dawe§","id":"279","span":null,"unit":279,"lemma":"","sigla":["Dawe"],"editors":["Dawe"]},{"sigla":["A","M"],"lemma":"Τὸ … δὲ","editors":[],"span":[135,365],"unit":280,"id":"280","dirty":false,"query":false,"reading":"§SIG:A§ : Τὰ μὲν... τὰ δὲ §SIG:M§"}],"num":"107","tr":"Un altro che similmente si insuperbiva e che era assolutamente in miseria, per disgrazia si ammalò e, dal momento che la sua amante era entrata all’improvviso e lo aveva trovato che giaceva su una stuoia, provò vergogna e disse, dando la responsabilità ai medici: «I bravi e stimati dottori della città mi hanno prescritto di giacere su una stuoia!»."},{"tr":"Un ciarlatano vide in piazza un suo schiavo che era appena ritornato dalla campagna e disse: «Che fanno le pecore?». Quello rispose: «Una dorme, l’altra sta in piedi».s:114","num":"108","app":[{"dirty":false,"reading":"§SIG:A§§SIG:M§ : ἐφίσταται §SIG:Dawe§","query":false,"id":"281","span":[133,140],"unit":281,"lemma":"ἵσταται","sigla":["A","Dawe","M"],"editors":["Dawe"]},{"id":"282","dirty":false,"query":false,"reading":"§SIG:A§§SIG:M§ : τὰ κριτήρια §SIG:Minas§","sigla":["A","M","Minas"],"lemma":"κριτήρια","editors":["Minas"],"span":null,"unit":282},{"query":false,"reading":"§SIG:A§ : ΑΒΔΗΡΙΤΑΙ §SIG:Minas§ : nullum rell.","dirty":false,"id":"283","span":null,"unit":283,"editors":["Minas"],"lemma":"","sigla":["A","Minas"]}],"text":"Ἀλαζὼν ἐν ἀγορᾷ παῖδα ἑαυτοῦ θεασάμενος ἐκ τοῦ ἀγροῦ νεωστὶ ἐληλυθότα εἶπε· Τί ποιοῦσι τὰ πρόβατα; ὁ δὲ εἶπε· Τὸ μὲν καθεύδει, τὸ δὲ ἵσταται.","wit":"AM","dawe":"108","type":"joke","label":"108","A":"113","n":113},{"type":"joke","dawe":"109","n":114,"A":"114","label":"109","app":[],"num":"109","tr":"Uno scemo udì che nell’Ade i tribunali sono giusti e, dato che era coinvolto in un processo, si impiccò.","wit":"AM","text":""},{"app":[],"type":"section","text":"ἀβδηρίτης"},{"dawe":"110","type":"joke","label":"110","A":"115","n":115,"tr":"In Abdera la città era divisa in due distretti: quelli che abitano nella zona est, e quelli della zona ovest. Quando dunque i nemici attaccarono all’improvviso la città e tutti erano in preda al caos, quelli che abitavano nella zona est si dicevano l’un l’altro: «Non agitiamoci! I nemici si presentano infatti alle porte occidentali!».","num":"110","app":[{"editors":[],"sigla":["A","M"],"lemma":"ἐφορμησάντων","unit":284,"span":[120,132],"id":"284","query":false,"reading":"§SIG:A§ : ἐφορμισάντων §SIG:M§","dirty":false},{"id":"285","query":false,"reading":"§SIG:A§ : μέρος οἰκοῦντες §SIG:M§","dirty":false,"editors":[],"lemma":"οἰκοῦντες μέρος","sigla":["A","M"],"span":[179,194],"unit":285},{"dirty":false,"reading":"§SIG:A§ : om. §SIG:M§","query":false,"id":"286","unit":286,"span":[223,225],"lemma":"μὴ","sigla":["A","M"],"editors":[]}],"text":"Ἐν Ἀβδήροις διῃρεῖτο ἡ πόλις εἰς δύο μέρη, οἵ τε πρὸς ἀνατολὰς οἰκοῦντες καὶ οἱ πρὸς δύσιν. πολεμίων οὖν ἄφνω τὴν πόλιν ἐφορμησάντων καὶ πάντων θορυβουμένων οἱ πρὸς τὸ ἀνατολικὸν οἰκοῦντες μέρος πρὸς ἀλλήλους ἔλεγον· Ἡμεῖς μὴ θορυβηθῶμεν· οἱ γὰρ πολέμιοι ἐπὶ τὰς δυσικὰς εἰσέρχονται πύλας.","wit":"A"},{"wit":"AM","text":"Ἐν Ἀβδήροις ὄνος λαθὼν εἰς τὸ γυμνάσιον εἰσῆλθε καὶ τὸ ἔλαιον ἐξέχεεν. οἱ δὲ συνελθόντες καὶ μεταπεμψάμενοι πάντας τοὺς ὄνους τοὺς ἐν τῇ πόλει καὶ εἰς ἕνα συναγαγόντες τόπον πρὸς τὸ ἀσφαλίσασθαι ἐνώπιον αὐτῶν τὸν ὄνον ἐμαστίγωσαν.","app":[{"unit":287,"span":[77,88],"sigla":["A","Dawe","M"],"lemma":"συνελθόντες","editors":["Dawe"],"dirty":false,"reading":"§SIG:A§§SIG:M§ : συναθλοῦντες §SIG:Dawe§","query":false,"id":"287"},{"id":"288","dirty":false,"query":false,"reading":"del. §SIG:Dawe§","sigla":["Dawe"],"lemma":"καὶ","editors":["Dawe"],"span":[89,92],"unit":288},{"id":"289","query":false,"reading":"§SIG:M§ : μεταμεμψάμενοι §SIG:A§","dirty":false,"editors":[],"lemma":"μεταπεμψάμενοι","sigla":["A","M"],"unit":289,"span":[93,107]},{"lemma":"τοὺς1 … πόλει","sigla":["A","M"],"editors":[],"unit":290,"span":[115,142],"id":"290","dirty":false,"query":false,"reading":"§SIG:A§ : τοὺς ὄνους τοὺς ἐν τῇ πόλει §SIG:M§"}],"num":"111","tr":"Ad Abdera un asino entrò inavvertitamente nel ginnasio e rovesciò l’olio. I cittadini accorsero, convocarono tutti gli asini della città, li raccolsero in un unico luogo e frustarono l’asino di fronte ai suoi simili, come punizione esemplare.","n":116,"A":"116","label":"111","type":"joke","dawe":"111"},{"n":117,"A":"117","label":"112","type":"joke","dawe":"112","wit":"AM","text":"Ἀβδηρίτης ἀπάγξασθαι βουλόμενος καὶ τοῦ σχοινίου διαρραγέντος τὴν κεφαλὴν ἐπλήγη. λαβὼν οὖν ἔμπλαστρον παρὰ τοῦ ἰατροῦ καὶ θεὶς κατὰ τοῦ τραύματος, ἀπελθὼν πάλιν ἀπήγξατο.","app":[{"query":false,"reading":"§SIG:A§ : ἀπήξασθαι §SIG:M§","dirty":false,"id":"291","span":[10,20],"unit":291,"editors":[],"lemma":"ἀπάγξασθαι","sigla":["A","M"]},{"id":"292","dirty":false,"reading":"§SIG:A§ : διαραγέντος §SIG:M§","query":false,"lemma":"διαρραγέντος","sigla":["A","M"],"editors":[],"unit":292,"span":[49,61]}],"num":"112","tr":"Un Abderita che voleva impiccarsi si ferì alla testa poiché si era spezzata la corda. Prese dunque un impiastro dal dottore e lo pose sulla ferita, se ne andò e di nuovo si impiccò."},{"app":[{"reading":"del. §SIG:Thierfelder§","query":false,"dirty":false,"id":"293","span":[11,19],"unit":293,"editors":["Thierfelder"],"sigla":["Thierfelder"],"lemma":"εὐνοῦχον"},{"unit":294,"span":[38,46],"sigla":["A","Minas"],"lemma":"ἐμβάσεως","editors":["Minas"],"dirty":false,"query":false,"reading":"§SIG:Minas§ : ἐμβάστως §SIG:A§","id":"294"},{"id":"295","query":false,"reading":"§SIG:Hertlein§ : επὶ §SIG:A§","dirty":false,"editors":["Hertlein"],"sigla":["A","Hertlein"],"lemma":"ἐπεὶ","unit":295,"span":[74,78]}],"num":"113","tr":"Un Abderita vide uno con un vistoso tumore che usciva da una vasca da bagno e disse: «Svuota la sacca, perché lo dico all’inserviente dei bagni!».","wit":"A","text":"Ἀβδηρίτης [εὐνοῦχον] ἰδὼν κηλίτην ἀπὸ ἐμβάσεως ἐξιόντα εἶπεν· Ἀποκένωσον, ἐπεὶ τῷ παραχύτῃ λέγω.","type":"joke","dawe":"113","n":118,"A":"118","label":"113; 124 α"},{"A":"119","n":119,"label":"114","type":"joke","dawe":"114","wit":"A","text":"Ἀβδηρίτης εὐνοῦχον ἰδὼν ἐπύθετο αὐτοῦ, πόσα παιδία ἔχει. ἑτέρου δὲ εἰπόντος τὸν ὄρχεις μὴ ἔχοντα μὴ δύνασθαι τέκνα γεννῆσαι, ὑπολαβὼν ‹....›","num":"114","app":[{"unit":296,"span":[32,37],"sigla":["A","Eberhard"],"lemma":"αὐτοῦ","editors":["Eberhard"],"dirty":false,"reading":"§SIG:Eberhard§ : αὐτῷ §SIG:A§","query":false,"id":"296"},{"editors":["Minas"],"sigla":["A","Minas"],"lemma":"τέκνα γεννῆσαι","unit":297,"span":[109,123],"id":"297","reading":"§SIG:A§ : τεκνογοννῆσαι §SIG:Minas§","query":false,"dirty":false},{"id":"298","dirty":false,"reading":"post ὑπολαβὼν ἔφη· Πολλοὺς οὖν (γοῦν §SIG:Eberhard§) ἀνάγκη υἱωνοὺς ἔχειν suppl. §SIG:Minas§","query":false,"sigla":["Eberhard","Minas"],"lemma":"","editors":["Eberhard","Minas"],"unit":298,"span":null}],"tr":"Un Abderita vide un eunuco e gli domandò quanti figli avesse. Quando l’altro disse che chi non ha testicoli non può generare figli, egli rispose ‹…«ma devi avere molti nipoti!» Minas…›"},{"A":"120","n":120,"label":"115","type":"joke","dawe":"115","wit":"AM","text":"Ἀβδηρίτης εὐνοῦχον ἰδὼν γυναικὶ ὁμιλοῦντα ἠρώτα ἄλλον, εἰ ἄρα γυνὴ αὐτοῦ ἐστι. τοῦ δὲ εἰπόντος εὐνοῦχον γυναῖκα ἔχειν μὴ δύνασθαι ἔφη· Οὐκοῦν θυγάτηρ αὐτοῦ ἐστιν;","num":"115","app":[{"dirty":false,"query":false,"reading":"§SIG:A§ : προσομιλοῦντα §SIG:M§","id":"299","span":[32,41],"unit":299,"lemma":"ὁμιλοῦντα","sigla":["A","M"],"editors":[]},{"id":"300","dirty":false,"reading":"§SIG:A§§SIG:M§ : οὐκοῦν ἔφη §SIG:Minas§","query":false,"lemma":"ἔφη· Οὐκοῦν","sigla":["A","M","Minas"],"editors":["Minas"],"unit":300,"span":[130,141]},{"span":[142,149],"unit":301,"editors":[],"lemma":"θυγάτηρ","sigla":["A","M"],"reading":"§SIG:A§ : om. §SIG:M§","query":false,"dirty":false,"id":"301"},{"reading":"notam interrogationis add. §SIG:Dawe§","query":false,"dirty":false,"id":"302","unit":302,"span":[156,161],"editors":["Dawe"],"lemma":"ἐστιν","sigla":["Dawe"]}],"tr":"Un Abderita vide un eunuco che accompagnava una donna e chiedeva ad un altro se lei fosse la moglie di quello. Quando l’altro rispose che un eunuco non può avere moglie, disse: «E non è allora sua figlia?»."},{"text":"Ἀβδηρίτης εὐνοῦχος δυστυχήσας κήλην ἐποίησεν.","wit":"A","tr":"Un Abderita eunuco per sventura sviluppò un tumore.","num":"116","app":[],"label":"116; 260 α","A":"121","n":121,"dawe":"116","type":"joke"},{"wit":"A","text":"Ἀβδηρίτης μετὰ κηλίτου κοιμώμενος καὶ τῇ νυκτὶ πρὸς ἑαυτὸν ἀναστὰς ἐν τῷ ἐπαναστρέφειν σκοτίας οὔσης ἄκων τὴν κήλην ἐπάτησε. τοῦ δὲ κηλίτου κατακράξαντος, αὐτῷ ἔφη· Διὰ τί γὰρ κατακέφαλα κοιμᾶσαι;","num":"117","app":[],"tr":"Quando un Abderita dormiva con un tale con un tumore, di notte si alzò e tornando poi sui suoi passi, poiché era buio, senza volerlo schiacciò il rigonfiamento del tumore. Dal momento che il malato strepitò fragorosamente, gli disse: «E però perché dormi con la testa al posto dei piedi?».","A":"122","n":122,"label":"117","type":"joke","dawe":"117"},{"type":"joke","dawe":"118","n":123,"A":"123","label":"118","app":[],"num":"118","tr":"Un Abderita a passeggio vide uno con un grosso tumore che orinava e disse: «Questo fino a sera non si sarà svuotato!»","wit":"A","text":"Ἀβδηρίτης περιπατῶν εἶδε κηλίτην οὐροῦντα καὶ εἶπεν· Οὗτος ἕως ἑσπέρας οὐ μὴ ἐξουρήσῃ."},{"type":"joke","dawe":"119","A":"124","n":124,"label":"119; 118 α","num":"119","app":[{"query":false,"reading":"","dirty":false,"id":"303","span":[101,109],"unit":303,"editors":[],"sigla":[],"lemma":"ἐγόμωσας"}],"tr":"Un Abderita vide uno con un grosso tumore che usciva da una piscina, e che camminava a stento, e disse a quello: «Ma perché ti sei caricato smisuratamente, pur non sapendola sollevare come si deve?».","wit":"A","text":"Ἀβδηρίτης ἰδὼν κηλίτην ἀπὸ κολύμβου ἐξιόντα, μόλις δὲ περιπατοῦντα, πρὸς αὐτὸν εἶπε· Τί γὰρ ἀπλήστως ἐγόμωσας, μὴ δυνάμενος γενναίως βαστάσαι;"},{"tr":"Un Abderita che aveva sentito che cipolle e bulbi gonfiano, quando durante una navigazione c’era molta bonaccia ne riempì un sacco e lo appese alla prua.","app":[{"editors":["Minas"],"lemma":"κρόμμυα","sigla":["A","Minas"],"unit":304,"span":[23,30],"id":"304","reading":"§SIG:Minas§ : κρόμυα §SIG:A§","query":false,"dirty":false}],"num":"120","text":"Ἀβδηρίτης ἀκούσας, ὅτι κρόμμυα καὶ βολβοὶ φυσῶσιν, ἐν τῷ πλέειν αὐτὸν γαλήνης οὔσης πολλῆς, σάκκον πλήσας ἀπὸ τῆς πρύμνης ἐκρέμασεν.","wit":"A","dawe":"120","type":"joke","label":"120; 146 α et 62 β","n":125,"A":"125"},{"num":"121","app":[],"tr":"Un Abderita vide un corridore crocifisso e disse: «Per gli dèi! Questo non corre più, ma vola!».","wit":"AM","text":"Ἀβδηρίτης ἰδὼν δρομέα ἐσταυρωμένον εἶπε· Μὰ τοὺς θεοὺς οὗτος οὐκέτι τρέχει, ἀλλὰ πέτεται.","type":"joke","dawe":"121","A":"126","n":126,"label":"121"},{"text":"Ἀβδηρίτης λεκάνην ἐπώλει μὴ ἔχουσαν ὠτία. τινὸς δὲ ἐρωτήσαντος, διὰ τί ἦρεν αὐτῆς τὰ ὠτία, ἀπεκρίνατο· Ἵνα μὴ ἀκούσασα, ὅτι πωλεῖται, φύγῃ.","wit":"AM","tr":"Un Abderita vendeva un tegame che non aveva orecchi. Ma quando uno chiese perché avesse tolto i suoi orecchi, rispose: «Perché non senta che è in vendita e scappi».","num":"122","app":[{"editors":[],"lemma":"τινὸς … ὠτία","sigla":["A","M"],"unit":305,"span":[42,89],"id":"305","reading":"§SIG:A§ : om. §SIG:M§","query":false,"dirty":false}],"label":"122","A":"127","n":127,"dawe":"122","type":"joke"},{"app":[{"id":"306","dirty":false,"reading":"§SIG:Minas§ : ὦμον §SIG:A§","query":false,"lemma":"νόμον","sigla":["A","Minas"],"editors":["Minas"],"span":[43,48],"unit":306},{"unit":307,"span":[144,157],"lemma":"ἐὰν … βούλῃ","sigla":["A","Boissonade"],"editors":["Boissonade"],"dirty":false,"reading":"§SIG:A§ : εἰ οὖν βούλει §SIG:Boissonade§","query":false,"id":"307"},{"editors":["Dawe"],"lemma":"μὴ ὀδυνᾶσθαι","sigla":["A","Dawe"],"unit":308,"span":[158,170],"id":"308","query":false,"reading":"§SIG:Dawe§ : καὶ δύνασαι §SIG:A§","dirty":false}],"num":"123","tr":"Un Abderita cremò com’era uso il padre defunto, corse a casa dalla madre che stava male e disse: «Avanza ancora un po’ di legna: se dunque vuoi non soffrire più, fatti cremare con quella».","wit":"A","text":"Ἀβδηρίτης τὸν πατέρα τελευτήσαντα κατὰ τὸν νόμον καύσας, δραμὼν εἰς τὴν οἰκίαν πρὸς τὴν μητέρα αὐτοῦ νοσοῦσαν εἶπεν· Ὀλίγα ἔτι περιττεύει ξύλα· ἐὰν οὖν βούλῃ μὴ ὀδυνᾶσθαι, τοῖς αὐτοῖς κατακαύθητι.","type":"joke","dawe":"123","n":128,"A":"128","label":"123"},{"tr":"Un Abderita in sogno vendeva un maialino e chiedeva cento denari. Allora siccome uno gliene dava cinquanta, non volendo accettarli si svegliò. Allora richiuse gli occhi, tese la mano in avanti e disse: «E va bene, dammi pure i cinquanta!»","num":"124","app":[{"unit":309,"span":[10,19],"sigla":["A","M"],"lemma":"κατ ὄναρ","editors":[],"dirty":false,"reading":"§SIG:A§ : κατόναρ §SIG:M§","query":false,"id":"309"},{"span":[48,55],"unit":310,"editors":[],"sigla":["A","M"],"lemma":"δηνάρια","reading":"§SIG:M§ : δινάρια §SIG:A§","query":false,"dirty":false,"id":"310"},{"query":false,"reading":"§SIG:A§ : δι’ ὕπνησε §SIG:M§","dirty":false,"id":"311","span":[114,122],"unit":311,"editors":[],"lemma":"διύπνισε","sigla":["A","M"]},{"unit":312,"span":[124,134],"sigla":["A","M","Minas"],"lemma":"καμμύσας","editors":["Minas"],"dirty":false,"query":false,"reading":"§SIG:Minas§ : καμύσας §SIG:A§§SIG:M§","id":"312"}],"text":"Ἀβδηρίτης κατ’ ὄναρ χοιρίδιον ἐπώλει καὶ ἐζήτει δηνάρια ἑκατόν. διδόντος δέ τινος πεντήκοντα μὴ βουλόμενος λαβεῖν διύπνισε. καμ‹μ›ύσας οὖν καὶ τὴν χεῖρα προτείνας εἶπε· Δὸς κἂν τὰ πεντήκοντα.","wit":"AM","dawe":"124","type":"joke","label":"124","A":"129","n":129},{"label":"125","A":"130","n":130,"dawe":"125","type":"joke","text":"Ἀβδηρίτου στρουθίον ἀπέθανε. μετὰ οὖν χρόνον ἰδὼν στρουθοκάμηλον εἶπεν· Ἐὰν ἔζη τὸ στρουθίον μου, ἤδη ἂν τηλικοῦτον ὑπῆρχεν.","wit":"AM","tr":"Il passerotto di un Abderita morì. Tempo dopo questi vide uno struzzo e disse: «Se il mio passerotto fosse vivo, ora sarebbe proprio di questa taglia!».","num":"125","app":[{"id":"313","query":false,"reading":"§SIG:A§§SIG:M§ : ὑπῆρχε","dirty":false,"editors":[],"lemma":"ὑπῆρχεν","sigla":["A","M"],"unit":313,"span":[116,123]}]},{"dawe":"126","type":"joke","label":"126","A":"131","n":131,"tr":"Un Abderita si recò in viaggio a Rodi{ N1|I2|Z1\\2\\ } e per via del nome annusava i muri.","num":"126","app":[{"dirty":false,"reading":"§SIG:A§ : τείχους §SIG:M§","query":false,"id":"314","span":[55,62],"unit":314,"sigla":["A","M"],"lemma":"τοίχους","editors":[]},{"span":[63,69],"unit":315,"editors":[],"sigla":["A","M"],"lemma":"ὠσμᾶτο","query":false,"reading":"§SIG:A§ : ὀσμᾶτο §SIG:M§","dirty":false,"id":"315"}],"text":"Ἀβδηρίτης εἰς Ῥόδον ἀποδημήσας ὡς ἐκ τοῦ ὀνόματος τοὺς τοίχους ὠσμᾶτο.","wit":"AM"},{"dawe":"127","type":"joke","label":"127","A":"132","n":132,"tr":"Un Abderita che doveva ad un tale un asino ma non lo aveva, lo invitava ad accettare al posto di quello due muli.","num":"127","app":[],"text":"","wit":"A"},{"type":"section","app":[],"text":"σιδόνιοι"},{"text":"Σιδόνιος ἔπαρχος ἐπὶ ὀχήματος ὥδευεν. ἐπεὶ δὲ ἀτονήσασαι αἱ ἡμίονοι οὐκ ἠδύναντο βαδίζειν, ἀπέλυσεν αὐτὰς ὁ ἡνίοχος, ἵνα μικρὸν βοσκηθεῖσαι ἀναλάβωνται. λυθεῖσαι οὖν ἔφυγον. καὶ ὁ ἔπαρχος πρὸς τὸν ἡνίοχον ἔφη· Ὁρᾷς, κάθαρμα, ὅτι αἱ μὲν ἡμίονοι τρέχουσι, τὸ δὲ ὄχημα δραμεῖν μὴ δυνάμενον ἵσταται.","wit":"A","tr":"Un governatore Sidonio viaggiava su di un carro. Siccome le mule erano stanche e non riuscivano a camminare, il cocchiere le sciolse perché pascolassero un po’ e si riprendessero. Vennero slegate ma fuggirono. E il governatore disse al cocchiere: «Vedi, disgraziato, che le mule corrono, è il carro che non riuscendo a correre sta fermo!».","num":"128","app":[{"id":"316","dirty":false,"query":false,"reading":"§SIG:Minas§ : ἀναλάηται §SIG:A§ (cf. ἀναλάβωσιν 105 α)","lemma":"ἀναλάβωνται","sigla":["A","Minas"],"editors":["Minas"],"span":[140,151],"unit":316},{"unit":317,"span":[197,199],"editors":["Dawe"],"sigla":["A","Dawe"],"lemma":"ἦν","reading":"§SIG:A§ : ἐστι §SIG:Dawe§","query":false,"dirty":false,"id":"317"}],"label":"128; 105 α","A":"133","n":133,"dawe":"128","type":"joke"},{"text":"Σιδόνιος ῥήτωρ μετὰ δύο ἑταίρων διελέγετο. τοῦ δὲ ἑνὸς λέγοντος, ὅτι οὐκ ἦν δίκαιον πρόβατα σφάζεσθαι διὰ τὸ φέρειν γάλα καὶ ἔριον, καὶ τοῦ ἄλλου εἰπόντος, ὅτι μηδὲ βοῦν ‹προσήκει› ἀναιρεῖσθαι γάλα παρέχουσαν καὶ ἀροτριῶσαν, ὁ ῥήτωρ ἔφη μηδὲ χοῖρον εἶναι δίκαιον σφάζεσθαι ἧπαρ παρέχοντα καὶ οὖθαρ καὶ νεφρία.","wit":"A","tr":"Un retore di Sidone chiacchierava con due amici. Quando uno diceva che non era giusto uccidere le pecore poiché forniscono latte e lana, e l’altro disse che non è giusto nemmeno uccidere il bue ché offre latte e ara, il retore disse che non era giusto nemmeno uccidere il maiale, dato che offre fegato, carne di mammella e rognoni.","num":"129","app":[{"span":[213,223],"unit":318,"editors":[],"lemma":"ἀροτριῶσαν","sigla":["A"],"reading":"§SIG:A§ : ἀρωτριῶσαν","query":false,"dirty":false,"id":"318"},{"dirty":false,"reading":"§SIG:A§ : παρέχουσαν §SIG:Boissonade§","query":false,"id":"319","unit":319,"span":[278,287],"sigla":["A","Boissonade"],"lemma":"παρέχοντα","editors":["Boissonade"]},{"unit":320,"span":null,"lemma":"βουλβάν","sigla":["A","Boissonade"],"editors":["Boissonade"],"dirty":false,"reading":"§SIG:A§ : βούλβαν §SIG:Boissonade§","query":false,"id":"320"},{"span":null,"unit":321,"editors":["Boissonade"],"lemma":"","sigla":["Boissonade"],"reading":"Φιλογέλω §SIG:Boissonade§","query":false,"dirty":false,"id":"321"},{"editors":["Eberhard","Thierfelder"],"sigla":["Eberhard","Thierfelder"],"lemma":"προσήκει","span":[171,179],"unit":322,"id":"322","reading":"§SIG:Eberhard§ ex 108 α : προσῆκεν dub. §SIG:Thierfelder§ : δεῖ dub. §SIG:Eberhard§","query":false,"dirty":false},{"dirty":false,"reading":"§SIG:Boissonade§ : παρέχοντα καὶ ἀροτριοῦντα §SIG:A§ ex 108 α","query":false,"id":"323","unit":323,"span":[198,223],"sigla":["A","Boissonade"],"lemma":"παρέχουσαν … ἀροτριῶσαν","editors":["Boissonade"]},{"span":[273,277],"unit":324,"editors":["Boissonade"],"lemma":"ἧπαρ","sigla":["A","Boissonade"],"query":false,"reading":"§SIG:Boissonade§ : ἥπαρ §SIG:A§","dirty":false,"id":"324"},{"id":"325","dirty":false,"query":false,"reading":"§SIG:A§ : παρέχουσαν §SIG:Boissonade§","sigla":["A","Boissonade"],"lemma":"παρέχοντα","editors":["Boissonade"],"span":[278,287],"unit":325}],"label":"129 cf. 108 α","A":"134","n":134,"dawe":"129","type":"joke"},{"tr":"Un sofista di Sidone che si lava alla prima apertura del bagno, siccome non vi trova nessuno dice ai suoi servitori: «A quanto vedo, è chiuso».","app":[{"query":false,"reading":"§SIG:A§ : λουσόμενος §SIG:Eberhard§","dirty":false,"id":"326","unit":326,"span":[52,61],"editors":["Eberhard"],"lemma":"λουόμενος","sigla":["A","Eberhard"]}],"num":"130","text":"Σιδόνιος σοφιστὴς κατὰ πρώτην ἄνοιξιν τοῦ βαλανείου λουόμενος καὶ μηδένα ἔσωθεν εὑρὼν λέγει πρὸς τοὺς ἰδίους οἰκέτας· Καθὼς βλέπω, οὐ λούει.","wit":"A","dawe":"130","type":"joke","label":"130; 23 α","n":135,"A":"135"},{"label":"131; 61 α","n":136,"A":"136","dawe":"131","type":"joke","text":"Σιδόνιος σχολαστικὸς ἀπὸ πολλῶν μιλίων χωρίον ἔχων καὶ θέλων αὐτὸ ἐγγύτερον ποιῆσαι ἑπτὰ κίονας μιλίων κατέστρεψεν.","wit":"A","tr":"Uno §I§scholastikos§/I§ di Sidone che aveva un terreno a molte miglia di distanza e che voleva renderlo più vicino, abbatté sette cippi miliari.","app":[],"num":"131"},{"wit":"AM","text":"Σιδόνιος πραγματευτὴς μετὰ ἑτέρου ὥδευε. τῆς δὲ γαστρὸς ἀναγκαζούσης μικρὸν ἀπολειφθῆναι προσαπέμεινεν. ὁ δὲ συνοδοιπόρος ἀφῆκεν αὐτὸν γράψας ἔν τινι κίονι τῶν μιλίων· Τάχυνον, φθάσον με. ὁ δὲ ὡς ἀνέγνω, ἐπέγραψε κάτωθεν· Καὶ αὐτὸς μεῖνόν με.","num":"132","app":[{"sigla":["A","Dawe","M"],"lemma":"ἑτέρου","editors":["Dawe"],"span":[27,33],"unit":327,"id":"327","dirty":false,"query":false,"reading":"§SIG:A§§SIG:M§ :ἑταίρου §SIG:Dawe§"},{"id":"328","query":false,"reading":"§SIG:A§ : ὥδευε §SIG:M§","dirty":false,"editors":[],"sigla":["A","M"],"lemma":"ὥδευε","unit":328,"sp
