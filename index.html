nade"],"query":false,"dirty":false,"span":[110,112]},{"query":false,"span":[114,121],"dirty":false,"reading":": παρκεῖν §SIG:A§ : ἐπαρκεῖν §SIG:M§ : παρεκεῖ §SIG:Boissonade§","sigla":["A","Boissonade","M"],"editors":["Boissonade"],"lemma":"παρῄειν","unit":231,"id":"231"},{"span":[122,128],"dirty":false,"query":false,"sigla":["A","Boissonade","M"],"reading":"§SIG:A§§SIG:M§ : ὠδεύον §SIG:Boissonade§","lemma":"ὁδεύων","editors":["Boissonade"],"unit":232,"id":"232"}],"label":"88","tr":"Uno §I§scholastikos §/I§tornava nel luogo dal quale era partito, e salendo una salita ripida si meravigliava e disse: «Qui quando passai per la prima volta in cammino, c’era una discesa: e com’è che ora è cambiato velocemente e c’è una salita?».","type":"joke","text":"Σχολαστικὸς ἐπανερχόμενος, ὅθεν ἀπεδήμησεν, καὶ ἀναβαίνων ὑψηλὴν ἀνάβασιν ἐθαύμαζε λέγων· Ἐνταῦθα ὅτε πρῶτον [ὡς] παρῄειν ὁδεύων, κατάβασις ἦν·καὶ πῶς νῦν ταχέως ἠλλάγηκαὶ ἀνάβασις γέγονε;","num":"88"},{"text":"Σχολαστικὸς πλέων ἐπύθετο τοῦ κυβερνήτου, πόστη εἴη ὥρα. τοῦ δὲ μὴ γινώσκειν φήσαντος ἠρώτησε, πόσος εἴη χρόνος, ἀφ’ οὗ τὴν ναῦν κυβερνᾷ. τοῦ δὲ τρία ἔτη φήσαντος· Πῶς οὖν ἐγώ, ἔφη, πρὸ ἓξ μηνῶν οἰκίαν πριάμενος, ὅταν εἰς τὴν αὐλὴν κατέλθῃ ὁ ἥλιος, τὴν ὥραν στοχάζομαι, σὺ δὲ ἀπὸ τοῦ πλοίου τεκμήρασθαι οὐ δύνασαι τοσούτῳ χρόνῳ αὐτὸ κυβερνῶν;","tr":"Uno §I§scholastikos §/I§mentre navigava chiese al timoniere che ora fosse. Dal momento che quello disse che non lo sapeva, gli domandò da quanto tempo pilotasse la nave. Quando quello disse: «Tre anni», fece: «Com’è allora che io, che ho acquistato casa sei mesi fa, quando il sole scende in cortile indovino l’ora, ma tu invece non sai calcolarla dalla nave che pur governi da un tempo così ampio?».","type":"joke","num":"89","label":"89","app":[{"query":false,"span":[18,25],"dirty":false,"reading":"§SIG:A§ : ἐπείθετο §SIG:M§","sigla":["A","M"],"editors":[],"lemma":"ἐπύθετο","unit":233,"id":"233"},{"unit":234,"id":"234","lemma":"κυβερνήτου","editors":[],"sigla":["A","M"],"reading":"§SIG:M§ : κυβερνίτου §SIG:A§","span":[30,40],"dirty":false,"query":false},{"reading":"§SIG:Minas§ : πῶς τῆ εἴ βωρα §SIG:A§ : πῶς, τῆ ὥρα §SIG:M§","sigla":["A","M","Minas"],"query":false,"span":[42,55],"dirty":false,"id":"235","unit":235,"editors":["Minas"],"lemma":"πόστη … ὥρα"},{"reading":"§SIG:A§ : ἠρώτισε §SIG:M§","sigla":["A","M"],"query":false,"span":[86,93],"dirty":false,"unit":236,"id":"236","editors":[],"lemma":"ἠρώτησε"},{"query":false,"dirty":false,"span":[101,104],"reading":"§SIG:A§ : om. §SIG:M§","sigla":["A","M"],"editors":[],"lemma":"εἴη","id":"237","unit":237},{"reading":"§SIG:A§ : ναῦ §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[124,128],"id":"238","unit":238,"editors":[],"lemma":"ναῦν"},{"dirty":false,"span":[154,162],"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : φωνήσαντος §SIG:M§","lemma":"φήσαντος","editors":[],"unit":239,"id":"239"},{"unit":240,"id":"240","lemma":"κατέλθῃ","editors":[],"sigla":["A","M"],"reading":"§SIG:A§ : κατέλθοι §SIG:M§","span":[232,239],"dirty":false,"query":false},{"span":[328,332],"dirty":false,"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : αὐτῷ §SIG:M§","lemma":"αὐτὸ","editors":[],"unit":241,"id":"241"},{"editors":["Minas"],"lemma":"κυβερνῶν","id":"242","unit":242,"query":false,"dirty":false,"span":[333,341],"reading":"§SIG:Minas§ : κυβερνᾶν §SIG:M§","sigla":["M","Minas"]}],"A":"91","n":91,"dawe":"89","wit":"AM"},{"num":"90","type":"joke","tr":"Un sofista §I§scholastikos§/I§, incaricato di pronunciare gli epitaffi dei defunti, scrisse un discorso per uno ancora vivo, che lo rimproverava per questo. Allora quello disse: «Se dunque voi non mi dite per tempo quando dovete morire, volete che io parlando a braccio faccia brutta figura?».","text":"Σχολαστικὸς σοφιστὴς ἀξιούμενος τῶν ἀποθνῃσκόντων ἐπιταφίους λέγειν ἑνὸς ἔτι ζῶντος ἔγραψεν ἐπιτάφιον·ὃς ἐνεκάλει αὐτῷ ἐπὶ τούτῳ. ὁ δέ· Ἂν οὖν ὑμεῖς, φησί, μὴ προλέγητε, ὅταν ἀποθνῄσκητε, ἐγὼ ἐξ αὐτοσχεδίου λέγω‹ν› βούλεσθε ἵν’ ἀσχημονήσω;","wit":"AM","dawe":"90","n":92,"A":"92","app":[{"id":"243","unit":243,"lemma":"Ἂν οὖν","editors":["Minas"],"sigla":["A","M","Minas"],"reading":"§SIG:Minas§ : ἄνουν §SIG:A§ : ἂνους §SIG:M§","span":[136,142],"dirty":false,"query":false},{"unit":244,"id":"244","editors":[],"lemma":"ἀποθνῄσκητε","reading":"§SIG:A§ : ἀποθνήσκετε §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[175,186]},{"sigla":["Dawe","Minas"],"reading":"corr. §SIG:Minas§ : contra §SIG:Dawe§ cf. Ritter p. 63 n. 147","span":[207,213],"dirty":false,"query":false,"id":"245","unit":245,"lemma":"λέγων","editors":["Dawe","Minas"]},{"sigla":["A","M"],"reading":"§SIG:M§ : βούλεσθαι §SIG:A§","dirty":false,"span":[215,223],"query":false,"unit":246,"id":"246","lemma":"βούλεσθε","editors":[]}],"label":"90"},{"num":"90 bis","type":"joke","tr":"Cf. 30 94. Uno §I§scholastikos§/I§ avevano a cena dei compagni di studi, e siccome questi avevano lodato la testa di maiale e gli avevano richiesto di pranzare da lui anche l’indomani, andò dal cuoco e disse: «Dammi un’altra testa proveniente dallo stesso porco: quella di ieri ci è proprio piaciuta!».","text":"Σχολαστικὸς ναυαγεῖν μέλλων ᾔτει πινακίδας, ἵνα διαθήκας γράψῃ.","app":[],"label":"90 bis; 30 α et 29 β","wit":"A","dawe":"90 bis","A":"93","n":93},{"dawe":"91","A":"94","n":94,"wit":"AM","app":[{"reading":": αὐτῶ §SIG:A§ §SIG:M§ac: αὐτῶν §SIG:M§pc","sigla":["A","M"],"query":false,"dirty":false,"span":[58,63],"unit":247,"id":"247","editors":[],"lemma":"αὐτῶν"},{"query":false,"dirty":false,"span":[145,153],"reading":"§SIG:M§ : μάγηρον §SIG:A§","sigla":["A","M"],"editors":[],"lemma":"μάγειρον","unit":248,"id":"248"}],"label":"91","tr":"","type":"joke","text":"Σχολαστικὸς συμφοιτητὰς ἐπὶ δεῖπνον καλέσας, ἐπαινεσάντων αὐτῶν ὑὸς κεφαλὴν καὶ ἀξιωσάντων καὶ τῇ ὑστεραίᾳ παρ’αὐτῷ ἑστιαθῆναι, ἀπελθὼν πρὸς τὸν μάγειρον· Δός μοι, ἔφη, ἀπὸ τοῦ αὐτοῦ χοίρου κεφαλὴν ἑτέραν· ἡ γὰρ χθὲς ἡμῖν πάνυ ἤρεσεν.","num":"91"},{"wit":"A","A":"95","n":95,"dawe":"91 bis","label":"91 bis; 31 α et 30 β","app":[],"num":"91 bis","text":"Σχολαστικὸς διαπερᾶσαι ‹ποταμὸν› βουλόμενος ἀνέβη εἰς τὸ πλοῖον μετὰ τοῦ ἵππου ἐποχούμενος. Πυθομένου δέ τινος, διὰ τί οὐ κάτεισι· σπεύδειν ἔφη.","type":"joke","tr":"Cf. 31"},{"tr":"Uno §I§scholastikos§/I§ chiedeva al padre: «La boccetta da cinque cotili quanto è capace?».","type":"joke","text":"Σχολαστικὸς ἠρώτα τὸν πατέρα· Ἡ πεντακότυλος λήκυθος πόσον χωρεῖ;","num":"92","dawe":"92","A":"96","n":96,"wit":"AM","app":[{"lemma":"τὸν πατέρα","editors":[],"unit":249,"id":"249","span":[18,28],"dirty":false,"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : τὸν πατέρα αὐτοῦ §SIG:M§"}],"label":"92; 141 α et 1 γ/261 α/72 β"},{"num":"93","text":"Σχολαστικὸς μαθὼν περὶ κλίμακός τινος, ὅτι ἀναβαινόντων ἔχει βαθμοὺς εἴκοσιν, ἐπύθετο, εἰ καὶ καταβαινόντων τοσοῦτοίεἰσιν.","tr":"Uno §I§scholastikos§/I§ venne a sapere che una certa scala ha venti gradini quando si sale, e chiese se fossero tanti anche quando si scende.","type":"joke","wit":"AM","n":97,"A":"97","dawe":"93","label":"93","app":[{"editors":[],"lemma":"εἴκοσιν","id":"250","unit":250,"query":false,"dirty":false,"span":[69,76],"reading":"§SIG:A§ : εἴκοσι §SIG:M§","sigla":["A","M"]}]},{"app":[],"label":"94","wit":"A","dawe":"94","n":98,"A":"98","num":"94","tr":"Uno §I§scholastikos§/I§, mentre alcuni parlavano di problemi di digestione, diceva che non ne aveva mai avuti. Ma quando gli chiesero se avesse mai fatto rutti in modo acido o fetido, disse: «Questo lo faccio ogni giorno!».","type":"joke","text":"Σχολαστικὸς διαλεγομένων τινῶν περὶ ἀπεψίας, ἔλεγε μηδεπώποτε ἠπεπτηκέναι. τῶν δὲ πυνθανομένων, εἰ μηδέποτε ἠρεύξατο πικρὸν ἢ ἀηδές· Τοῦτο, εἶπε, ποιῶ καθ’ ἑκάστην ἡμέραν."},{"num":"95","text":"Σχολαστικῷ υἱὸς ἐγεννήθη. πυνθανομένων δέ τινωναὐτοῦ, ποῖον ὄνομα αὐτῷ θήσεται·Τὸ ἐμὸν ἕξει, ἔφη, ὄνομα,κἀγὼ τέως οὕτω μενῶ.","tr":"Ad uno §I§scholastikos§/I§ nacque un figlio. Quando alcuni gli chiesero quale nome gli avrebbe dato, rispose: «Avrà il mio, di nome, e io rimarrò così per un po’… (cioè privo di nome)».","type":"joke","label":"95","app":[],"wit":"A","n":99,"A":"99","dawe":"95"},{"tr":"C’erano due §I§scholastikoi§/I§ codardi: uno si nascose in un pozzo, l’altro invece in un canneto. Quando i soldati calarono un elmo per attingere l’acqua, ‹il primo› credette che stesse scendendo un soldato e poiché si era messo a supplicare, fu catturato. Ma quando i soldati dissero che, se fosse stato zitto, sarebbero passati oltre, quello nascosto nel canneto disse: «E allora passate oltre me: infatti sto zitto!».","type":"joke","text":"Σχολαστικοὶ δύο δειλοί, ὁ μὲν ἔκρυψεν εἰς φρέαρ αὑτόν, ὁ δὲ εἰς καλαμῶνα. χαλασάντων οὖν κράνος τῶν στρατιωτῶν ἐπὶ τὸ ὕδωρ ἀρύσασθαι, ‹ό μεν έτερος› νομίσας στρατιώτην κατιέναι, ἱκετεύων ἐλήφθη. ὡς δὲ ἔφασαν οἱ στρατιῶται ὅτι εἰ ἐσιώπησε, παρῆλθον ἂν αὐτόν, ὁ ἐν τῷ καλαμῶνι κρυβόμενος· Οὐκοῦν, εἶπεν, ἐμὲ παρέλθατε· σιωπῶ γάρ.","num":"96","dawe":"96","A":"100","n":100,"wit":"AM","app":[{"id":"251","unit":251,"editors":["Minas"],"lemma":"Σχολαστικοὶ δύο","reading":"§SIG:Minas§ : Δύο σχολαστικοί §SIG:A§ : δύο om. §SIG:M§","sigla":["A","M","Minas"],"query":false,"span":[0,15],"dirty":false},{"lemma":"δειλοί","editors":["Dawe"],"id":"252","unit":252,"dirty":false,"span":[16,22],"query":false,"sigla":["Dawe"],"reading":"‹έδιώκοντο υπό πολεμίων και› §SIG:Dawe§"},{"unit":253,"id":"253","editors":[],"lemma":"αὑτόν","reading":"§SIG:A§ : ἑαυτὸν §SIG:M§","sigla":["A","M"],"query":false,"span":[48,53],"dirty":false},{"editors":["Dawe"],"lemma":"ό … έτερος","id":"254","unit":254,"query":false,"dirty":false,"span":[55,147],"reading":"§SIG:Dawe§","sigla":["Dawe"]},{"editors":[],"lemma":"εἰ","unit":255,"id":"255","query":false,"dirty":false,"span":[226,228],"reading":"§SIG:A§ : om. §SIG:M§","sigla":["A","M"]},{"span":[258,262],"dirty":false,"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ὁ δὲ ἐν §SIG:M§","lemma":"ὁ ἐν","editors":[],"id":"256","unit":256}],"label":"96"},{"num":"96 bis","text":"Σχολαστικὸς ἐπὶ δεῖπνον κληθεὶς οὐκ ἤσθιεν. ἐρομένου οὖν τινος τῶν κεκλημένων διὰ τί οὐκ ἐσθίοι, ὁ δὲἽνα μὴ, ‹ἔφη›, τοῦ φαγεῖν ἕνεκα δόξω παρεῖναι.","tr":"Cf. 32","type":"joke","wit":"A","n":101,"A":"101","dawe":"96 bis","label":"96 bis; 32 α","app":[{"dirty":false,"span":[110,113],"query":false,"sigla":["Dawe"],"reading":"§SIG:Dawe§","lemma":"ἔφη","editors":["Dawe"],"unit":257,"id":"257"}]},{"label":"97","app":[{"span":[13,16],"dirty":false,"query":false,"sigla":["Eberhard"],"reading":"§SIG:Eberhard§","lemma":"τῆς","editors":["Eberhard"],"unit":258,"id":"258"},{"query":false,"span":[97,106],"dirty":false,"reading":": πολοῦντος §SIG:A§ : §SIG:Eberhard§","sigla":["A","Eberhard"],"editors":["Eberhard"],"lemma":"πωλοῦντος","id":"259","unit":259},{"lemma":"ὀμόσαντος","editors":["Eberhard"],"unit":260,"id":"260","span":[107,116],"dirty":false,"query":false,"sigla":["A","Eberhard"],"reading":": ὁμόσαντος §SIG:A§ : §SIG:Eberhard§"},{"span":[272,275],"dirty":false,"query":false,"sigla":["A","Eberhard"],"reading":"§SIG:A§ : που §SIG:Eberhard§","lemma":"μου","editors":["Eberhard"],"id":"261","unit":261}],"wit":"A","A":"102","n":102,"dawe":"97","num":"97","text":"Σχολαστικὸς ‹τῆς› γυναικὸς αὐτοῦ ἀποθανούσης σορὸν ἠγόραζε καὶ περὶ τῆς τιμῆς ἐζυγομάχει. τοῦ δὲ πωλοῦντος ὀμόσαντος μὴ ἔλαττον πέντε μυριάδων πωλήσειν, ὁ δέ· Ἐπειδή, ἔφη,προσείληψαι τῷ ὅρκῳ, λάβε μὲν τὰς πέντε μυριάδας, εἰς προσθήκην δέ μοι μικρὸν σορίδιον δός, ἵνα, ἐάν μου χρεία παιδίῳ γένηται, ἕτοιμον ᾖ.","type":"joke","tr":"Uno§I§ scholastikos§/I§, dopo che gli era morta la moglie, stava comprando un sarcofago e bisticciava sul prezzo. Quando il venditore giurò che non l’avrebbe venduto a meno di cinquantamila, egli disse: «Poiché ti sei legato col giuramento, prendi pure le cinquantamila, però in aggiunta, dammi un piccolo sarcofaghino, così, se mai ne avessi bisogno per un mio figlioletto, sarà già pronto»."},{"app":[{"editors":[],"lemma":"Σχολαστικῷ","unit":262,"id":"262","query":false,"span":[0,10],"dirty":false,"reading":"§SIG:A§ : Σχολαστικὸς §SIG:M§","sigla":["A","M"]}],"label":"98","dawe":"98","A":"103","n":103,"wit":"A","type":"joke","tr":"Un amico incontrò uno §I§scholastikos§/I§ e disse: «Ti faccio le congratulazioni perché ti è nato un figlio!». Ma quello rispose: «Questo è ciò che fate voi, o amici!».","text":"Σχολαστικῷ ἑταῖρος ἀπαντήσας· Συγχαίρω σοι, εἶπεν, ὅτι σοι παιδίον ἐγεννήθη. ὁ δὲ ἀπεκρίνατο· Τοῦτο ὑμεῖς οἱ φίλοι ποιεῖτε.","num":"98"},{"num":"99","text":"Σχολαστικῷ τις λέγει· Χρῆσόν μοι βίρρον μέχρις ἀγροῦ. ὁ δέ· Μέχρι σφυροῦ, εἶπεν, ἔχω· μέχρι δὲ ἀγροῦ οὐκ ἔχω.","type":"joke","tr":"Uno dice a uno §I§scholastikos§/I§: «Prestami una casacca, fino al campo». E questo fa: «Fino alla caviglia ce l’ho, ma fino al campo no!»","wit":"AM","n":104,"A":"104","dawe":"99","label":"99; 142 α","app":[{"query":false,"dirty":false,"span":[33,39],"reading":"§SIG:A§§SIG:M§ : μῦρον","sigla":["A","M"],"editors":[],"lemma":"βίρρον","unit":263,"id":"263"}]},{"num":"100","type":"joke","tr":"Uno §I§scholastikos§/I§ era in viaggio su un carro. Siccome le mule spossate non riuscivano a camminare, il cocchiere le sciolse perché si rimettessero un po’ in sesto. Ebbene, quando furono sciolte, fuggirono. Allora lo §I§scholastikos§/I§ disse al cocchiere: «Disgraziato, le mule corrono, mentre la colpa è del carro, che non è capace di correre?».","text":"Σχολαστικὸς ἐπ’ ὀχήματος ὥδευεν. ἐπεὶ δὲ ἀτονήσασαι αἱ ἡμίονοι οὐκ ἠδύναντο βαδίζειν, ὑπέλυσεν αὐτὰς ὁ ἡνίοχος, ἵνα μικρὸν ἀναλάβωσιν. λυθεῖσαι οὖν ἔφυγον. καὶ ὁ σχολαστικὸς πρὸς τὸν ἡνίοχον· Κάθαρμα, εἶπεν, ὁρᾷς, ὅτι αἱ μὲν ἡμίονοιτρέχουσι, τὸ δὲ ὄχημά ἐστιν αἴτιον τὸ δραμεῖν μὴ δυνάμενον;","app":[{"reading":"§SIG:A§ : ὤδευεν §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[25,31],"unit":264,"id":"264","editors":[],"lemma":"ὥδευεν"},{"id":"265","unit":265,"editors":["Eberhard"],"lemma":"οὐκ","reading":"§SIG:A§§SIG:M§ : οὐκέτι §SIG:Eberhard§","sigla":["A","Eberhard","M"],"query":false,"span":[63,66],"dirty":false},{"query":false,"span":[135,143],"dirty":false,"reading":"§SIG:A§ : λυθῆσαι §SIG:M§","sigla":["A","M"],"editors":[],"lemma":"λυθεῖσαι","id":"266","unit":266},{"id":"267","unit":267,"lemma":"τὸ δραμεῖν","editors":["Eberhard"],"sigla":["Eberhard"],"reading":"[τὸ] δραμεῖν §SIG:Eberhard§. coll. 133 α","span":[267,277],"dirty":false,"query":false}],"label":"100; 133 α","wit":"AM","dawe":"100","n":105,"A":"105"},{"text":"Σχολαστικὸς ἀδελφοὺς διδύμους ἰδὼν θαυμαζόντων τινῶν τὴν ὁμοιότητα αὐτῶν· Οὐχ οὕτως, φησίν, ὅμοιός ἐστιν ‹οὗτος› ἐκείνῳ, ὡς ἐκεῖνος τούτῳ.","tr":"Un tale vede due fratelli gemelli e, siccome alcuni si meravigliano della somiglianza di questi, dice: «Non è tanto questo che assomiglia così a quello, quanto quello che è uguale a questo».","type":"joke","num":"101","label":"101","app":[{"sigla":["Eberhard"],"reading":"§SIG:Eberhard§","dirty":false,"span":[78,83],"query":false,"id":"268","unit":268,"lemma":"οὕτως","editors":["Eberhard"]},{"dirty":false,"span":[132,137],"query":false,"sigla":["Boissonade"],"reading":"§SIG:Boissonade§","lemma":"τούτῳ","editors":["Boissonade"],"id":"269","unit":269}],"A":"106","n":106,"dawe":"101","wit":"A"},{"num":"102","type":"joke","tr":"Un tale dice ad uno §I§scholastikos§/I§: «Demea, l’altro ieri ti ho visto qui in sogno». E questo: «Ti sbagli, perché ero in campagna».","text":"Σχολαστικῷ τις λέγει· Δημέα, τρίτην ἡμέραν σε ἐνθάδε ἐν ὕπνοις εἶδον. ὁ δέ· Ψεύδῃ, εἶπεν, ἐν ἀγρῷ γὰρ ἤμην.","app":[{"sigla":["Thierfelder"],"reading":"dub. delendum putat §SIG:Thierfelder§","dirty":false,"span":[46,52],"query":false,"unit":270,"id":"270","lemma":"ἐνθάδε","editors":["Thierfelder"]},{"query":false,"span":[76,81],"dirty":false,"reading":"§SIG:A§ : ψεύδει §SIG:M§","sigla":["A","M"],"editors":[],"lemma":"Ψεύδῃ","id":"271","unit":271},{"sigla":["A","Minas","Perry"],"reading":": ἔριον ἀφέρει §SIG:A§ : ἔριον ἀ‹φθόνως› φέρει §SIG:Minas§ : ἔρια φέρει §SIG:Perry§","span":null,"dirty":false,"query":false,"id":"272","unit":272,"lemma":"ἔριον φέρει","editors":["Minas","Perry"]}],"label":"102","wit":"AM","dawe":"102","n":107,"A":"107"},{"label":"103; 134 α","app":[],"wit":"A","A":"108","n":108,"dawe":"103","num":"103","text":"","type":"joke","tr":"Uno §I§scholastikos §/I§chiacchierava con due amici. Quando uno ebbe detto che non è giusto uccidere una pecora poiché offre latte e lana, e l’altro che non conviene uccidere nemmeno una mucca, ché procura latte e ara, lo §I§scholastikos§/I§ disse che non è giusto nemmeno ammazzare la scrofa, ché offre fegato, carne di mammella e di vulva."},{"type":"section","text":"ἐκ τοῦ Φιλογέλου","app":[]},{"wit":"AM","dawe":"104","n":109,"A":"109","app":[],"label":"104; 48 β","num":"104","tr":"Un avaro che scriveva le proprie volontà testamentarie dispose come erede sé stesso.","type":"joke","text":"Φιλάργυρος διαθήκας γράφων ἑαυτὸν κληρονόμον ἔταξεν."},{"wit":"A","n":110,"A":"110","dawe":"105","label":"105; 49 β","app":[],"num":"105","text":"Φιλάργυρος ἐρωτώμενος, διὰ τί ἄλλο οὐθὲν ἢ μόνον ἐλαίας ἐσθίει, ἔφη· Ἵνα τὸ μὲν ἔξωθεν ἀντὶ ὄψου ἔχω, τὸ δὲ ὀστοῦν ἀντὶ ξύλου· φαγὼν δέ, εἰς ‹τὴν› ἑαυτοῦ κεφαλὴν σφογγισάμενος λουτροῦ οὐκ ἐπιδέομαι.","type":"joke","tr":"Un avaro a cui veniva domandato perché non mangiasse altro che olive soltanto, diceva: «Intanto per avere l’esterno come cibo, poi per avere il nocciolo come cibo; e dopo aver mangiato, per sfregarmi la testa e non aver bisogno di un lavaggio/bacinella»."},{"dawe":"106","n":111,"A":"111","wit":"AM","app":[{"reading":"§SIG:Boissonade§ : εἰωθὸς cf. 7 G","sigla":["Boissonade"],"query":false,"dirty":false,"span":[13,19],"unit":273,"id":"273","editors":["Boissonade"],"lemma":"εἰωθὼς"},{"dirty":false,"span":[36,44],"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ἐξαπατῶν §SIG:M§ac","lemma":"ἐξαπατᾶν","editors":[],"id":"274","unit":274},{"sigla":["A","M","Minas"],"reading":"§SIG:Minas§ : τὰς φίλας §SIG:A§ : τοὺς φίλους §SIG:M§ δὲ §SIG:M§","span":[117,126],"dirty":false,"query":false,"unit":275,"id":"275","lemma":"τὴν φίλην","editors":["Minas"]}],"label":"106; 7 G","tr":"Un pitocco professionista, solito convincere la propria compagna di essere nobile e ricco, quando mentre si abboffava dai vicini vide all’improvviso la compagna, si voltò e ordinava: «E mandami anche la veste da ricevimento!»","type":"joke","text":"Πεπανόπτωχος εἰωθὼς τὴν φίλην αὐτοῦ ἐξαπατᾶν ὡς εὐγενὴς ὢν καὶ πλούσιος, εἰς τοὺς γείτονας σιτευόμενος ὡς εἶδεν ἄφνω τὴν φίλην, στραφεὶς ἐφώνει· Πέμψον δέ μοι καὶ τὸ φιβλατώριον.","num":"106"},{"tr":"Un altro che similmente si insuperbiva e che era assolutamente in miseria, per disgrazia si ammalò e, dal momento che la sua amante era entrata all’improvviso e lo aveva trovato che giaceva su una stuoia, provò vergogna e disse, dando la responsabilità ai medici: «I bravi e stimati dottori della città mi hanno prescritto di giacere su una stuoia!».","type":"joke","text":"Ἄλλος ὁμοίως μεγαλαυχούμενος, τελείως τε πενητεύων [καὶ] κατὰ τύχην νοσήσας, τῆς δὲ φίλης αὐτοῦ αἰφνίδιον ἐπεισελθούσης καὶ εὑρούσης αὐτὸν ἐπὶ ψιάθου κείμενον, ἐντραπεὶς ᾐτιᾶτο τοὺς ἰατροὺς λέγων· Οἱ καλοὶ ἰατροὶ καὶ δόκιμοι τῆς πόλεως ἐκέλευσάν με ψιαθισθῆναι.","num":"107","dawe":"107","A":"112","n":112,"wit":"AM","app":[{"editors":[],"lemma":"τε","id":"276","unit":276,"query":false,"span":[30,32],"dirty":false,"reading":"§SIG:M§ : δὲ §SIG:A§","sigla":["A","M"]},{"dirty":false,"span":[52,55],"query":false,"sigla":["Eberhard"],"reading":"del. §SIG:Eberhard§","lemma":"καὶ","editors":["Eberhard"],"id":"277","unit":277},{"editors":[],"lemma":"αἰφνίδιον","unit":278,"id":"278","query":false,"dirty":false,"span":[96,105],"reading":"§SIG:A§ : αἰφνήδιον §SIG:M§","sigla":["A","M"]},{"id":"279","unit":279,"lemma":"δόκιμοι","editors":["Dawe"],"sigla":["Dawe"],"reading":"‹οἱ› δόκιμοι §SIG:Dawe§","dirty":false,"span":[217,224],"query":false}],"label":"107"},{"type":"joke","tr":"Un ciarlatano vide in piazza un suo schiavo che era appena ritornato dalla campagna e disse: «Che fanno le pecore?». Quello rispose: «Una dorme, l’altra sta in piedi».s:114","text":"Ἀλαζὼν ἐν ἀγορᾷ παῖδα ἑαυτοῦ θεασάμενος ἐκ τοῦ ἀγροῦ νεωστὶ ἐληλυθότα εἶπε· Τί ποιοῦσι τὰ πρόβατα; ὁ δὲ εἶπε· Τὸ μὲν καθεύδει, τὸ δὲ ἵσταται.","num":"108","dawe":"108","n":113,"A":"113","wit":"AM","app":[{"query":false,"dirty":false,"span":[25,103],"reading":"§SIG:A§ : Τὰ μὲν... τὰ δὲ §SIG:M§","sigla":["A","M"],"editors":[],"lemma":"Τὸ … δὲ","id":"280","unit":280},{"lemma":"ἵσταται","editors":["Dawe"],"unit":281,"id":"281","dirty":false,"span":[133,140],"query":false,"sigla":["A","Dawe","M"],"reading":"§SIG:A§§SIG:M§ : ἐφίσταται §SIG:Dawe§"},{"editors":["Minas"],"lemma":"κριτήρια","id":"282","unit":282,"query":false,"dirty":false,"span":null,"reading":"§SIG:A§§SIG:M§ : τὰ κριτήρια §SIG:Minas§","sigla":["A","M","Minas"]},{"unit":283,"id":"283","lemma":"","editors":["Minas"],"sigla":["A","Minas"],"reading":"§SIG:A§ : ΑΒΔΗΡΙΤΑΙ §SIG:Minas§ : nullum rell.","dirty":false,"span":null,"query":false}],"label":"108"},{"wit":"AM","dawe":"109","A":"114","n":114,"app":[],"label":"109","num":"109","type":"joke","tr":"Uno scemo udì che nell’Ade i tribunali sono giusti e, dato che era coinvolto in un processo, si impiccò.","text":""},{"app":[],"type":"section","text":"ἀβδηρίτης"},{"num":"110","text":"Ἐν Ἀβδήροις διῃρεῖτο ἡ πόλις εἰς δύο μέρη, οἵ τε πρὸς ἀνατολὰς οἰκοῦντες καὶ οἱ πρὸς δύσιν. πολεμίων οὖν ἄφνω τὴν πόλιν ἐφορμησάντων καὶ πάντων θορυβουμένων οἱ πρὸς τὸ ἀνατολικὸν οἰκοῦντες μέρος πρὸς ἀλλήλους ἔλεγον· Ἡμεῖς μὴ θορυβηθῶμεν· οἱ γὰρ πολέμιοι ἐπὶ τὰς δυσικὰς εἰσέρχονται πύλας.","type":"joke","tr":"In Abdera la città era divisa in due distretti: quelli che abitano nella zona est, e quelli della zona ovest. Quando dunque i nemici attaccarono all’improvviso la città e tutti erano in preda al caos, quelli che abitavano nella zona est si dicevano l’un l’altro: «Non agitiamoci! I nemici si presentano infatti alle porte occidentali!».","label":"110","app":[{"reading":"§SIG:A§ : ἐφορμισάντων §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[120,132],"unit":284,"id":"284","editors":[],"lemma":"ἐφορμησάντων"},{"lemma":"οἰκοῦντες μέρος","editors":[],"unit":285,"id":"285","dirty":false,"span":[179,194],"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : μέρος οἰκοῦντες §SIG:M§"},{"query":false,"dirty":false,"span":[223,225],"reading":"§SIG:A§ : om. §SIG:M§","sigla":["A","M"],"editors":[],"lemma":"μὴ","unit":286,"id":"286"}],"wit":"A","n":115,"A":"115","dawe":"110"},{"app":[{"sigla":["A","Dawe","M"],"reading":"§SIG:A§§SIG:M§ : συναθλοῦντες §SIG:Dawe§","span":[77,88],"dirty":false,"query":false,"unit":287,"id":"287","lemma":"συνελθόντες","editors":["Dawe"]},{"id":"288","unit":288,"lemma":"καὶ","editors":["Dawe"],"sigla":["Dawe"],"reading":"del. §SIG:Dawe§","dirty":false,"span":[89,92],"query":false},{"id":"289","unit":289,"lemma":"μεταπεμψάμενοι","editors":[],"sigla":["A","M"],"reading":"§SIG:M§ : μεταμεμψάμενοι §SIG:A§","dirty":false,"span":[93,107],"query":false},{"span":[115,142],"dirty":false,"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : τοὺς ὄνους τοὺς ἐν τῇ πόλει §SIG:M§","lemma":"τοὺς1 … πόλει","editors":[],"unit":290,"id":"290"}],"label":"111","dawe":"111","A":"116","n":116,"wit":"AM","tr":"Ad Abdera un asino entrò inavvertitamente nel ginnasio e rovesciò l’olio. I cittadini accorsero, convocarono tutti gli asini della città, li raccolsero in un unico luogo e frustarono l’asino di fronte ai suoi simili, come punizione esemplare.","type":"joke","text":"Ἐν Ἀβδήροις ὄνος λαθὼν εἰς τὸ γυμνάσιον εἰσῆλθε καὶ τὸ ἔλαιον ἐξέχεεν. οἱ δὲ συνελθόντες καὶ μεταπεμψάμενοι πάντας τοὺς ὄνους τοὺς ἐν τῇ πόλει καὶ εἰς ἕνα συναγαγόντες τόπον πρὸς τὸ ἀσφαλίσασθαι ἐνώπιον αὐτῶν τὸν ὄνον ἐμαστίγωσαν.","num":"111"},{"wit":"AM","A":"117","n":117,"dawe":"112","label":"112","app":[{"editors":[],"lemma":"ἀπάγξασθαι","id":"291","unit":291,"query":false,"span":[10,20],"dirty":false,"reading":"§SIG:A§ : ἀπήξασθαι §SIG:M§","sigla":["A","M"]},{"query":false,"span":[49,61],"dirty":false,"reading":"§SIG:A§ : διαραγέντος §SIG:M§","sigla":["A","M"],"editors":[],"lemma":"διαρραγέντος","unit":292,"id":"292"}],"num":"112","text":"Ἀβδηρίτης ἀπάγξασθαι βουλόμενος καὶ τοῦ σχοινίου διαρραγέντος τὴν κεφαλὴν ἐπλήγη. λαβὼν οὖν ἔμπλαστρον παρὰ τοῦ ἰατροῦ καὶ θεὶς κατὰ τοῦ τραύματος, ἀπελθὼν πάλιν ἀπήγξατο.","type":"joke","tr":"Un Abderita che voleva impiccarsi si ferì alla testa poiché si era spezzata la corda. Prese dunque un impiastro dal dottore e lo pose sulla ferita, se ne andò e di nuovo si impiccò."},{"label":"113; 124 α","app":[{"sigla":["Thierfelder"],"reading":"del. §SIG:Thierfelder§","dirty":false,"span":[11,19],"query":false,"id":"293","unit":293,"lemma":"εὐνοῦχον","editors":["Thierfelder"]},{"id":"294","unit":294,"editors":["Minas"],"lemma":"ἐμβάσεως","reading":"§SIG:Minas§ : ἐμβάστως §SIG:A§","sigla":["A","Minas"],"query":false,"span":[38,46],"dirty":false},{"editors":["Hertlein"],"lemma":"ἐπεὶ","id":"295","unit":295,"query":false,"dirty":false,"span":[74,78],"reading":"§SIG:Hertlein§ : επὶ §SIG:A§","sigla":["A","Hertlein"]}],"wit":"A","n":118,"A":"118","dawe":"113","num":"113","text":"Ἀβδηρίτης [εὐνοῦχον] ἰδὼν κηλίτην ἀπὸ ἐμβάσεως ἐξιόντα εἶπεν· Ἀποκένωσον, ἐπεὶ τῷ παραχύτῃ λέγω.","type":"joke","tr":"Un Abderita vide uno con un vistoso tumore che usciva da una vasca da bagno e disse: «Svuota la sacca, perché lo dico all’inserviente dei bagni!»."},{"label":"114","app":[{"editors":["Eberhard"],"lemma":"αὐτοῦ","id":"296","unit":296,"query":false,"dirty":false,"span":[32,37],"reading":"§SIG:Eberhard§ : αὐτῷ §SIG:A§","sigla":["A","Eberhard"]},{"unit":297,"id":"297","editors":["Minas"],"lemma":"τέκνα γεννῆσαι","reading":"§SIG:A§ : τεκνογοννῆσαι §SIG:Minas§","sigla":["A","Minas"],"query":false,"dirty":false,"span":[109,123]},{"id":"298","unit":298,"editors":["Eberhard","Minas"],"lemma":"","reading":"‹ἔφη· Πολλοὺς οὖν (γοῦν §SIG:Eberhard§) ἀναγκη υἱωνοὺς ἔχειν› §SIG:Minas§","sigla":["Eberhard","Minas"],"query":false,"span":null,"dirty":false}],"A":"119","n":119,"dawe":"114","wit":"A","text":"Ἀβδηρίτης εὐνοῦχον ἰδὼν ἐπύθετο αὐτοῦ, πόσα παιδία ἔχει. ἑτέρου δὲ εἰπόντος τὸν ὄρχεις μὴ ἔχοντα μὴ δύνασθαι τέκνα γεννῆσαι, ὑπολαβὼν ‹....›","tr":"Un Abderita vide un eunuco e gli domandò quanti figli avesse. Quando l’altro disse che chi non ha testicoli non può generare figli, egli rispose ‹…«ma devi avere molti nipoti!» Minas…›","type":"joke","num":"114"},{"type":"joke","tr":"Un Abderita vide un eunuco che accompagnava una donna e chiedeva ad un altro se lei fosse la moglie di quello. Quando l’altro rispose che un eunuco non può avere moglie, disse: «E non è allora sua figlia?».","text":"Ἀβδηρίτης εὐνοῦχον ἰδὼν γυναικὶ ὁμιλοῦντα ἠρώτα ἄλλον, εἰ ἄρα γυνὴ αὐτοῦ ἐστι. τοῦ δὲ εἰπόντος εὐνοῦχον γυναῖκα ἔχειν μὴ δύνασθαι ἔφη· Οὐκοῦν θυγάτηρ αὐτοῦ ἐστιν;","num":"115","app":[{"unit":299,"id":"299","lemma":"ὁμιλοῦντα","editors":[],"sigla":["A","M"],"reading":"§SIG:A§ : προσομιλοῦντα §SIG:M§","dirty":false,"span":[32,41],"query":false},{"lemma":"ἔφη· Οὐκοῦν","editors":["Minas"],"id":"300","unit":300,"dirty":false,"span":[130,141],"query":false,"sigla":["A","M","Minas"],"reading":"§SIG:A§§SIG:M§ : οὐκοῦν ἔφη §SIG:Minas§"},{"id":"301","unit":301,"editors":[],"lemma":"θυγάτηρ","reading":"§SIG:A§ : om. §SIG:M§","sigla":["A","M"],"query":false,"span":[142,149],"dirty":false},{"sigla":["Dawe"],"reading":"notam interrogationis add. §SIG:Dawe§","dirty":false,"span":[156,161],"query":false,"unit":302,"id":"302","lemma":"ἐστιν","editors":["Dawe"]}],"label":"115","dawe":"115","A":"120","n":120,"wit":"AM"},{"num":"116","type":"joke","tr":"Un Abderita eunuco per sventura sviluppò un tumore.","text":"Ἀβδηρίτης εὐνοῦχος δυστυχήσας κήλην ἐποίησεν.","app":[],"label":"116; 260 α","wit":"A","dawe":"116","A":"121","n":121},{"wit":"A","dawe":"117","n":122,"A":"122","app":[],"label":"117","num":"117","type":"joke","tr":"Quando un Abderita dormiva con un tale con un tumore, di notte si alzò e tornando poi sui suoi passi, poiché era buio, senza volerlo schiacciò il rigonfiamento del tumore. Dal momento che il malato strepitò fragorosamente, gli disse: «E però perché dormi con la testa al posto dei piedi?».","text":"Ἀβδηρίτης μετὰ κηλίτου κοιμώμενος καὶ τῇ νυκτὶ πρὸς ἑαυτὸν ἀναστὰς ἐν τῷ ἐπαναστρέφειν σκοτίας οὔσης ἄκων τὴν κήλην ἐπάτησε. τοῦ δὲ κηλίτου κατακράξαντος, αὐτῷ ἔφη· Διὰ τί γὰρ κατακέφαλα κοιμᾶσαι;"},{"app":[],"label":"118","dawe":"118","A":"123","n":123,"wit":"A","tr":"Un Abderita a passeggio vide uno con un grosso tumore che orinava e disse: «Questo fino a sera non si sarà svuotato!»","type":"joke","text":"Ἀβδηρίτης περιπατῶν εἶδε κηλίτην οὐροῦντα καὶ εἶπεν· Οὗτος ἕως ἑσπέρας οὐ μὴ ἐξουρήσῃ.","num":"118"},{"type":"joke","tr":"Un Abderita vide uno con un grosso tumore che usciva da una piscina, e che camminava a stento, e disse a quello: «Ma perché ti sei caricato smisuratamente, pur non sapendola sollevare come si deve?».","text":"Ἀβδηρίτης ἰδὼν κηλίτην ἀπὸ κολύμβου ἐξιόντα, μόλις δὲ περιπατοῦντα, πρὸς αὐτὸν εἶπε· Τί γὰρ ἀπλήστως ἐγόμωσας, μὴ δυνάμενος γενναίως βαστάσαι;","num":"119","dawe":"119","n":124,"A":"124","wit":"A","app":[{"sigla":[],"reading":"","dirty":false,"span":[101,109],"query":false,"id":"303","unit":303,"lemma":"ἐγόμωσας","editors":[]}],"label":"119; 118 α"},{"app":[{"editors":["Minas"],"lemma":"κρόμμυα","unit":304,"id":"304","query":false,"dirty":false,"span":[23,30],"reading":"§SIG:Minas§ : κρόμυα §SIG:A§","sigla":["A","Minas"]}],"label":"120; 146 α et 62 β","wit":"A","dawe":"120","n":125,"A":"125","num":"120","type":"joke","tr":"Un Abderita che aveva sentito che cipolle e bulbi gonfiano, quando durante una navigazione c’era molta bonaccia ne riempì un sacco e lo appese alla prua.","text":"Ἀβδηρίτης ἀκούσας, ὅτι κρόμμυα καὶ βολβοὶ φυσῶσιν, ἐν τῷ πλέειν αὐτὸν γαλήνης οὔσης πολλῆς, σάκκον πλήσας ἀπὸ τῆς πρύμνης ἐκρέμασεν."},{"num":"121","type":"joke","tr":"Un Abderita vide un corridore crocifisso e disse: «Per gli dèi! Questo non corre più, ma vola!».","text":"Ἀβδηρίτης ἰδὼν δρομέα ἐσταυρωμένον εἶπε· Μὰ τοὺς θεοὺς οὗτος οὐκέτι τρέχει, ἀλλὰ πέτεται.","app":[],"label":"121","wit":"AM","dawe":"121","n":126,"A":"126"},{"label":"122","app":[{"lemma":"τινὸς … ὠτία","editors":[],"unit":305,"id":"305","dirty":false,"span":[42,89],"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : om. §SIG:M§"}],"A":"127","n":127,"dawe":"122","wit":"AM","text":"Ἀβδηρίτης λεκάνην ἐπώλει μὴ ἔχουσαν ὠτία. τινὸς δὲ ἐρωτήσαντος, διὰ τί ἦρεν αὐτῆς τὰ ὠτία, ἀπεκρίνατο· Ἵνα μὴ ἀκούσασα, ὅτι πωλεῖται, φύγῃ.","type":"joke","tr":"Un Abderita vendeva un tegame che non aveva orecchi. Ma quando uno chiese perché avesse tolto i suoi orecchi, rispose: «Perché non senta che è in vendita e scappi».","num":"122"},{"num":"123","text":"Ἀβδηρίτης τὸν πατέρα τελευτήσαντα κατὰ τὸν νόμον καύσας, δραμὼν εἰς τὴν οἰκίαν πρὸς τὴν μητέρα αὐτοῦ νοσοῦσαν εἶπεν· Ὀλίγα ἔτι περιττεύει ξύλα· ἐὰν οὖν βούλῃ καὶ δύνασαι, τοῖς αὐτοῖς κατακαύθητι.","type":"joke","tr":"Un Abderita cremò com’era uso il padre defunto, corse a casa dalla madre che stava male e disse: «Avanza ancora un po’ di legna: se dunque vuoi e riesci, fatti cremare con quella».","label":"123","app":[{"span":[43,48],"dirty":false,"query":false,"sigla":["A","Minas"],"reading":"§SIG:Minas§ : ὦμον §SIG:A§","lemma":"νόμον","editors":["Minas"],"id":"306","unit":306},{"editors":["Boissonade"],"lemma":"ἐὰν … βούλῃ","unit":307,"id":"307","query":false,"dirty":false,"span":[144,157],"reading":"§SIG:A§ : εἰ οὖν βούλει §SIG:Boissonade§","sigla":["A","Boissonade"]},{"unit":308,"id":"308","editors":["Dawe"],"lemma":"καὶ δύνασαι","reading":"§SIG:A§ : μὴ (seu μηκέτι) ὀδυνᾶσθαι §SIG:Dawe§","sigla":["A","Dawe"],"query":false,"span":[158,169],"dirty":false}],"wit":"A","n":128,"A":"128","dawe":"123"},{"label":"124","app":[{"span":[10,19],"dirty":false,"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : κατόναρ §SIG:M§","lemma":"κατ ὄναρ","editors":[],"id":"309","unit":309},{"lemma":"δηνάρια","editors":[],"id":"310","unit":310,"span":[48,55],"dirty":false,"query":false,"sigla":["A","M"],"reading":"§SIG:M§ : δινάρια §SIG:A§"},{"reading":"§SIG:A§ : δι’ ὕπνησε §SIG:M§","sigla":["A","M"],"query":false,"span":[114,122],"dirty":false,"id":"311","unit":311,"editors":[],"lemma":"διύπνισε"},{"unit":312,"id":"312","editors":["Minas"],"lemma":"καμμύσας","reading":"§SIG:Minas§ : καμύσας §SIG:A§§SIG:M§","sigla":["A","M","Minas"],"query":false,"dirty":false,"span":[124,134]}],"A":"129","n":129,"dawe":"124","wit":"AM","text":"Ἀβδηρίτης κατ’ ὄναρ χοιρίδιον ἐπώλει καὶ ἐζήτει δηνάρια ἑκατόν. διδόντος δέ τινος πεντήκοντα μὴ βουλόμενος λαβεῖν διύπνισε. καμ‹μ›ύσας οὖν καὶ τὴν χεῖρα προτείνας εἶπε· Δὸς κἂν τὰ πεντήκοντα.","tr":"Un Abderita in sogno vendeva un maialino e chiedeva cento denari. Allora siccome uno gliene dava cinquanta, non volendo accettarli si svegliò. Allora richiuse gli occhi, tese la mano in avanti e disse: «E va bene, dammi pure i cinquanta!»","type":"joke","num":"124"},{"num":"125","tr":"Il passerotto di un Abderita morì. Tempo dopo questi vide uno struzzo e disse: «Se il mio passerotto fosse vivo, ora sarebbe proprio di questa taglia!».","type":"joke","text":"Ἀβδηρίτου στρουθίον ἀπέθανε. μετὰ οὖν χρόνον ἰδὼν στρουθοκάμηλον εἶπεν· Ἐὰν ἔζη τὸ στρουθίον μου, ἤδη ἂν τηλικοῦτον ὑπῆρχεν.","app":[{"lemma":"ὑπῆρχεν","editors":[],"unit":313,"id":"313","span":[116,123],"dirty":false,"query":false,"sigla":["A","M"],"reading":"§SIG:A§§SIG:M§ : ὑπῆρχε"}],"label":"125","wit":"AM","dawe":"125","A":"130","n":130},{"type":"joke","tr":"Un Abderita si recò in viaggio a Rodi{ N1|I2|Z1\\2\\ } e per via del nome annusava i muri.","text":"Ἀβδηρίτης εἰς Ῥόδον ἀποδημήσας ὡς ἐκ τοῦ ὀνόματος τοὺς τοίχους ὠσμᾶτο.","num":"126","app":[{"query":false,"span":[55,62],"dirty":false,"reading":"§SIG:A§ : τείχους §SIG:M§","sigla":["A","M"],"editors":[],"lemma":"τοίχους","id":"314","unit":314},{"unit":315,"id":"315","lemma":"ὠσμᾶτο","editors":[],"sigla":["A","M"],"reading":"§SIG:A§ : ὀσμᾶτο §SIG:M§","dirty":false,"span":[63,69],"query":false}],"label":"126","dawe":"126","n":131,"A":"131","wit":"AM"},{"wit":"A","dawe":"127","A":"132","n":132,"app":[],"label":"127","num":"127","type":"joke","tr":"Un Abderita che doveva ad un tale un asino ma non lo aveva, lo invitava ad accettare al posto di quello due muli.","text":""},{"text":"σιδόνιοι","type":"section","app":[]},{"num":"128","text":"Σιδόνιος ἔπαρχος ἐπὶ ὀχήματος ὥδευεν. ἐπεὶ δὲ ἀτονήσασαι αἱ ἡμίονοι οὐκ ἠδύναντο βαδίζειν, ἀπέλυσεν αὐτὰς ὁ ἡνίοχος, ἵνα μικρὸν βοσκηθεῖσαι ἀναλάβωνται. λυθεῖσαι οὖν ἔφυγον. καὶ ὁ ἔπαρχος πρὸς τὸν ἡνίοχον ἔφη· Ὁρᾷς, κάθαρμα, ὅτι αἱ μὲν ἡμίονοι τρέχουσι, τὸ δὲ ὄχημα δραμεῖν μὴ δυνάμενον ἵσταται.","tr":"Un governatore Sidonio viaggiava su di un carro. Siccome le mule erano stanche e non riuscivano a camminare, il cocchiere le sciolse perché pascolassero un po’ e si riprendessero. Vennero slegate ma fuggirono. E il governatore disse al cocchiere: «Vedi, disgraziato, che le mule corrono, è il carro che non riuscendo a correre sta fermo!».","type":"joke","label":"128; 105 α","app":[{"id":"316","unit":316,"lemma":"ἀναλάβωνται","editors":["Minas"],"sigla":["A","Minas"],"reading":"§SIG:Minas§ : ἀναλάηται §SIG:A§ (cf. ἀναλάβωσιν 105 α)","dirty":false,"span":[140,151],"query":false},{"dirty":false,"span":[197,199],"query":false,"sigla":["A","Dawe"],"reading":"§SIG:A§ : ἐστι §SIG:Dawe§","lemma":"ἦν","editors":["Dawe"],"unit":317,"id":"317"}],"wit":"A","n":133,"A":"133","dawe":"128"},{"A":"134","n":134,"dawe":"129","wit":"A","label":"129 cf. 108 α","app":[{"lemma":"ἀροτριῶσαν","editors":[],"id":"318","unit":318,"span":[213,223],"dirty":false,"query":false,"sigla":["A"],"reading":"§SIG:A§ : ἀρωτριῶσαν"},{"id":"319","unit":319,"editors":["Boissonade"],"lemma":"παρέχοντα","reading":"§SIG:A§ : παρέχουσαν §SIG:Boissonade§","sigla":["A","Boissonade"],"query":false,"span":[278,287],"dirty":false},{"sigla":["A","Boissonade"],"reading":"§SIG:A§ : βούλβαν §SIG:Boissonade§","span":null,"dirty":false,"query":false,"unit":320,"id":"320","lemma":"βουλβάν","editors":["Boissonade"]},{"span":null,"dirty":false,"query":false,"sigla":["Boissonade"],"reading":"Φιλογέλω §SIG:Boissonade§","lemma":"","editors":["Boissonade"],"unit":321,"id":"321"},{"sigla":["Eberhard","Thierfelder"],"reading":"§SIG:Eberhard§ ex 108 α : προσῆκεν dub. §SIG:Thierfelder§ : δεῖ dub. §SIG:Eberhard§","span":[171,179],"dirty":false,"query":false,"id":"322","unit":322,"lemma":"προσήκει","editors":["Eberhard","Thierfelder"]},{"query":false,"span":[198,223],"dirty":false,"reading":"§SIG:Boissonade§ : παρέχοντα καὶ ἀροτριοῦντα §SIG:A§ ex 108 α","sigla":["A","Boissonade"],"editors":["Boissonade"],"lemma":"παρέχουσαν … ἀροτριῶσαν","unit":323,"id":"323"},{"sigla":["A","Boissonade"],"reading":"§SIG:Boissonade§ : ἥπαρ §SIG:A§","dirty":false,"span":[273,277],"query":false,"id":"324","unit":324,"lemma":"ἧπαρ","editors":["Boissonade"]},{"sigla":["A","Boissonade"],"reading":"§SIG:A§ : παρέχουσαν §SIG:Boissonade§","dirty":false,"span":[278,287],"query":false,"unit":325,"id":"325","lemma":"παρέχοντα","editors":["Boissonade"]}],"text":"Σιδόνιος ῥήτωρ μετὰ δύο ἑταίρων διελέγετο. τοῦ δὲ ἑνὸς λέγοντος, ὅτι οὐκ ἦν δίκαιον πρόβατα σφάζεσθαι διὰ τὸ φέρειν γάλα καὶ ἔριον, καὶ τοῦ ἄλλου εἰπόντος, ὅτι μηδὲ βοῦν ‹προσήκει› ἀναιρεῖσθαι γάλα παρέχουσαν καὶ ἀροτριῶσαν, ὁ ῥήτωρ ἔφη μηδὲ χοῖρον εἶναι δίκαιον σφάζεσθαι ἧπαρ παρέχοντα καὶ οὖθαρ καὶ νεφρία.","type":"joke","tr":"Un retore di Sidone chiacchierava con due amici. Quando uno diceva che non era giusto uccidere le pecore poiché forniscono latte e lana, e l’altro disse che non è giusto nemmeno uccidere il bue ché offre latte e ara, il retore disse che non era giusto nemmeno uccidere il maiale, dato che offre fegato, carne di mammella e rognoni.","num":"129"},{"label":"130; 23 α","app":[{"span":[52,61],"dirty":false,"query":false,"sigla":["A","Eberhard"],"reading":"§SIG:A§ : λουσόμενος §SIG:Eberhard§","lemma":"λουόμενος","editors":["Eberhard"],"unit":326,"id":"326"}],"A":"135","n":135,"dawe":"130","wit":"A","text":"Σιδόνιος σοφιστὴς κατὰ πρώτην ἄνοιξιν τοῦ βαλανείου λουόμενος καὶ μηδένα ἔσωθεν εὑρὼν λέγει πρὸς τοὺς ἰδίους οἰκέτας· Καθὼς βλέπω, οὐ λούει.","tr":"Un sofista di Sidone che si lava alla prima apertura del bagno, siccome non vi trova nessuno dice ai suoi servitori: «A quanto vedo, è chiuso».","type":"joke","num":"130"},{"dawe":"131","n":136,"A":"136","wit":"A","app":[],"label":"131; 61 α","tr":"Uno §I§scholastikos§/I§ di Sidone che aveva un terreno a molte miglia di distanza e che voleva renderlo più vicino, abbatté sette cippi miliari.","type":"joke","text":"Σιδόνιος σχολαστικὸς ἀπὸ πολλῶν μιλίων χωρίον ἔχων καὶ θέλων αὐτὸ ἐγγύτερον ποιῆσαι ἑπτὰ κίονας μιλίων κατέστρεψεν.","num":"131"},{"num":"132","text":"Σιδόνιος πραγματευτὴς μετὰ ἑτέρου ὥδευε. τῆς δὲ γαστρὸς ἀναγκαζούσης μικρὸν ἀπολειφθῆναι προσαπέμεινεν. ὁδὲ συνοδοιπόρος ἀφῆκεν αὐτὸν γράψας ἔν τινι κίονι τῶν μιλίων· Τάχυνον, φθάσον με. ὁ δὲ ὡς ἀνέγνω, ἐπέγραψε κάτωθεν· Καὶ αὐτὸς μεῖνόν με.","type":"joke","tr":"Un affarista di Sidone viaggiava insieme ad un altro. Siccome lo stomaco lo aveva costretto a trattenersi, rimase indietro. Il compagno di viaggio lo lasciò dopo avergli scritto su un cippo miliario: «Affrettati, raggiungimi». Quando lo lesse, scrisse sul retro: «E tu aspettami».","label":"132; 42 α","app":[{"lemma":"ἑτέρου","editors":["Dawe"],"id":"327","unit":327,"span":[27,33],"dirty":false,"query":false,"sigla":["A","Dawe","M"],"reading":"§SIG:A§§SIG:M§ :ἑταίρου §SIG:Dawe§"},{"query":false,"dirty":false,"span":[34,39],"reading":"§SIG:A§ : ὥδευε §SIG:M§","sigla":["A","M"],"editors":[],"lemma":"ὥδευε","id":"328","unit":328},{"unit":329,"id":"329","editors":["Dawe"],"lemma":"προσαπέμεινεν","reading":"§SIG:A§§SIG:M§ : πρόσω ἀπέμεινεν §SIG:Dawe§","sigla":["A","Dawe","M"],"query":false,"span":[89,102],"dirty":false},{"sigla":["A","M"],"reading":"§SIG:A§ : τῆ §SIG:M§","span":[144,148],"dirty":false,"query":false,"unit":330,"id":"330","lemma":"τινι","editors":[]},{"query":false,"span":[149,154],"dirty":false,"reading":"delendum esse censit §SIG:Eberhard§","sigla":["Eberhard"],"editors":["Eberhard"],"lemma":"κίονι","unit":331,"id":"331"}],"wit":"AM","n":137,"A":"137","dawe":"132"},{"num":"133","text":"Σιδονίῳ ἁλιεῖ λέγει τις· Ἔχει τὸ κυρτίν σου παγούρους; ὁ δὲ μανεὶς ἀπεκρίνατο· Ἔχει τὸ στῆθός σου καρκίνους;","tr":"Un tale dice ad un pescatore di Sidone: «La tua nassa1 ha paguri?» e quello si infuriò e rispose: «Il tuo petto ha granchi?».","type":"joke","label":"133","app":[],"wit":"A","A":"138","n":138,"dawe":"133"},{"tr":"Un centurione di Sidone diceva ai soldati: «Oggi state tanto seduti: domani, infatti, dovrete fare molta strada!».","type":"joke","text":"Σιδόνιος ἑκατόνταρχος τοῖς στρατιώταις ἔλεγεν· Σήμερον πολλὰ καθίσατε· αὔριον γὰρ πολλὰ μέλλετε ὁδοιπορεῖν.","num":"134","app":[{"id":"332","unit":332,"editors":["Boissonade"],"lemma":"καθίσατε","reading":"§SIG:Boissonade§ : καθήσατε §SIG:A§","sigla":["A","Boissonade"],"query":false,"dirty":false,"span":[61,69]}],"label":"134; 86 α","dawe":"134","A":"139","n":139,"wit":"A"},{"num":"135","tr":"Un tale dice ad un candelaio di Sidone: «Signore, hai dei moccoli?» Quello allora si arrabbiò e rispose: «Signore, hai dei carbonchi?».","type":"joke","text":"Σιδονίῳ κηρουλαρίῳ λέγει τις· Ἔχεις, κῦρι, ἀποκαύματα; ὁ δὲ ὀργισθεὶς ἀπεκρίνατο· Ἔχεις, κῦρι, ἀνθρακώματα;","wit":"A","dawe":"135","n":140,"A":"140","app":[],"label":"135"},{"app":[],"label":"136; 96 α et 1 γ","wit":"A","dawe":"136","A":"141","n":141,"num":"136","type":"joke","tr":"Un segretario Sidonio chiedeva al †maestro†: « La boccetta da cinque cotili quanto è capace?». E quello disse: «Di vino dici, o di olio?».","text":"Σιδόνιος γραμματικὸς ἠρώτα τὸν †διδάσκαλον· Ἡ πεντακότυλος λήκυθος πόσον χωρεῖ; ὁ δὲ εἶπεν· Οἶνον λέγεις ἢ ἔλαιον;"},{"type":"joke","tr":"Un tale dice a un cuoco Sidonio: «Prestami un coltello fino a Smirne». Questo allora dice: «Non ho un coltello che arrivi fin lì».","text":"Σιδονίῳ μαγείρῳ λέγει τις· Δάνεισόν μοι μάχαιραν ἕως Σμύρνης. ὁ δὲ ἔφη·Οὐκ ἔχω μάχαιραν ἕως ἐκεῖ φθάζουσαν.","num":"137","dawe":"137","A":"142","n":142,"wit":"AM","app":[{"lemma":"μαγείρῳ","editors":[],"id":"333","unit":333,"dirty":false,"span":[8,15],"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : μάγειρος §SIG:M§"}],"label":"137; cf. 104 α"},{"num":"138","tr":"Un centurione Sidonio vide un carrettiere che portava il carro attraverso la piazza e ordinò che venisse percosso. Quando allora questi disse: «Sono un cittadino romano, per legge non posso essere percosso!», il centurione ordinò che fossero fustigati i buoi.","type":"joke","text":"Σιδόνιος κεντουρίων ἰδὼν ζευγηλάτην διὰ τῆς ἀγορᾶς ἅμαξαν φέροντα ἐκέλευσεν αὐτὸν τυφθῆναι. τοῦ δὲ εἰπόντος ὅτι Ῥωμαῖός εἰμι, καὶ οὐ χρὴ τύπτεσθαί με διὰ τὸν νόμον τοὺς βόας ἐκέλευσεν ὁ κεντουρίων μαστιγωθῆναι.","app":[{"span":[25,35],"dirty":false,"query":false,"sigla":["A","Minas"],"reading":"§SIG:Minas§ : ζευγελάτην §SIG:A§","lemma":"ζευγηλάτην","editors":["Minas"],"id":"334","unit":334},{"sigla":["A","M"],"reading":"§SIG:M§ : ἀρώστου §SIG:A§","dirty":false,"span":null,"query":false,"unit":335,"id":"335","lemma":"ἀρρώστου","editors":[]},{"span":null,"dirty":false,"query":false,"sigla":["A","M"],"reading":"§SIG:M§ : ἐκφερουμένου §SIG:A§","lemma":"ἐκφερομένου","editors":[],"id":"336","unit":336},{"unit":337,"id":"337","editors":[],"lemma":"κηδείᾳ","reading":"§SIG:A§ : κηδία §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":null},{"editors":[],"lemma":"ἀκολουθῶν","id":"338","unit":338,"query":false,"span":null,"dirty":false,"reading":"§SIG:A§ : ἀκολουθὼν §SIG:M§","sigla":["A","M"]}],"label":"138","wit":"A","dawe":"138","A":"143","n":143},{"num":"139","text":"","type":"joke","tr":"Un medico Sidonio ottenne in testamento da un suo ammalato mille dracme dopo la morte, e mentre quello veniva portato a sepoltura, lui seguiva il corteo e si lamentava del fatto che gli avesse lasciato poco in legato testamentario. Quando poi anche il figlio del defunto era incappato in una malattia e lo pregava di visitarlo e affrontare il morbo, il medico disse: «Se mi lascerai nel testamento cinquemila dracme, io ti curerò come ho fatto con tuo padre!».","label":"139","app":[],"wit":"AM","n":144,"A":"144","dawe":"139"},{"type":"section","text":"εὐτράπελοι","app":[]},{"dawe":"140","n":145,"A":"145","wit":"AM","app":[],"label":"140","tr":"Uno spiritoso vide un maestro elementare inetto insegnare, andò da lui e gli chiese perché non insegnasse a suonare la cetra. Quando quello allora rispose: «Perché non sono in grado», disse: «E perché dunque insegni le lettere, pur non essendone in grado?».","type":"joke","text":"Εὐτράπελος ἰδὼν γραμματοδιδάσκαλον ἀφυῆ διδάσκοντα προσελθὼν ἠρώτα, διὰ τί κιθαρίζειν οὐ διδάσκει. Τοῦ δὲ εἰπόντος· Ὅτι οὐκ ἐπίσταμαι, εἶπε· Πῶς οὖν γράμματα διδάσκεις οὐκ ἐπιστάμενος;","num":"140"},{"label":"141; 62 β, cf. 125 α","app":[{"sigla":["A"],"reading":": κυβερνίτης §SIG:A§","span":[11,21],"dirty":false,"query":false,"id":"339","unit":339,"lemma":"κυβερνήτης","editors":[]},{"sigla":["A","Minas"],"reading":"§SIG:Minas§ : κρόμυα §SIG:A§","dirty":false,"span":[57,64],"query":false,"unit":340,"id":"340","lemma":"κρόμμυα","editors":["Minas"]}],"wit":"A","n":146,"A":"146","dawe":"141","num":"141","text":"Εὐτράπελος κυβερνήτης ἐρωτηθείς, τί φυσᾷ, εἶπε· Φάβα καὶ κρόμμυα.","type":"joke","tr":"A un timoniere spiritoso fu domandato che aria tirasse e rispose: «Di fave e cipolle!»."},{"wit":"A","A":"147","n":147,"dawe":"142","label":"142","app":[{"query":false,"dirty":false,"span":[141,152],"reading":": μοι ἐδάνεισας §SIG:A§ ut supra §SIG:Cataudella§ : με ἔχρισας ut supra §SIG:Thierfelder§","sigla":["A","Cataudella","Thierfelder"],"editors":["Cataudella","Thierfelder"],"lemma":"μοι ἤλειψας","id":"341","unit":341},{"editors":["Dawe"],"lemma":"τὸν … αὐτόν","unit":342,"id":"342","query":false,"dirty":false,"span":[154,179],"reading":"§SIG:A§ : τοῦ λύχνου οὐ βλέπω αὐγήν dub. §SIG:Dawe§","sigla":["A","Dawe"]}],"num":"142","text":"Εὐτράπελον ὀφθαλμιῶντα ἰατρὸς κλέπτης λύχνον ἔκλεψε. μιᾷ οὖν ταῦτα ἠρώτα αὐτόν· Πῶς ἔχεις εἰς τοὺς ὀφθαλμούς; καὶ ὁ εὐτράπελός φησιν· Ἀφ’ οὗ μοι ἤλειψας, τὸν λύχνον οὐ βλέπω αὐτόν.","type":"joke","tr":"Un medico dalle mani lunghe guarì uno spiritoso che aveva un problema agli occhi e non ci vedeva, e gli rubò una lampada. Una volta poi gli chiedeva: «Come vanno gli occhi?» e lo spiritoso: «Da quando me li hai curati, non vedo proprio la lampada!»."},{"dawe":"143","A":"148","n":148,"wit":"A","app":[],"label":"143; 64 β","tr":"Il testo è lacunoso proprio nel momento in cui viene presentata la parola che sarà ripresa come §I§pointe §/I§del gioco di parole, ma il senso è perfettamente recuperabile dalla 64","type":"joke","text":"Εὐτραπέλῳ ἰατρῷ λέγει τις·‹...› Ἐὰν κτήσῃ [θερμὸν] ἀγγεῖον, θερμόν σε οὐ λείψει.","num":"143"},{"label":"144","app":[{"span":[42,51],"dirty":false,"query":false,"sigla":["A","Minas"],"reading":"§SIG:A§ : τὶνος χρῄζει §SIG:Minas§","lemma":"τί χρῄζει","editors":["Minas"],"id":"343","unit":343},{"unit":344,"id":"344","editors":["Eberhard"],"lemma":"ὁ κύριός","reading":"§SIG:A§ : ὦ κῦρί (κύριέ) §SIG:Eberhard§","sigla":["A","Eberhard"],"query":false,"span":[52,60],"dirty":false},{"sigla":["A","Minas"],"reading":"§SIG:Minas§ : καταβαλεῖν §SIG:A§","dirty":false,"span":[162,172],"query":false,"unit":345,"id":"345","lemma":"καταλαβεῖν","editors":["Minas"]}],"wit":"A","A":"149","n":149,"dawe":"144","num":"144","text":"Εὐτράπελος ἀργὸν δρομέα ἰδὼν εἶπεν· Οἶδα, τί χρῄζει ὁ κύριός μου οὗτος. τοῦ δὲ ἀγωνοθέτου ἐρωτήσαντος· Τί ἐστιν; εἶπεν· Ἵππου χρῄζει· ἄλλως γὰρ τοὺς ἀνταγωνιστὰς καταλαβεῖν οὐ δύναται.","tr":"Uno spiritoso vide un corridore svogliato e disse: «So cosa vuole il signore qui». Quando il giudice chiese: «Cosa? disse: «Ha bisogno di un cavallo! Perché non può riprendere in altro modo gli avversari!».","type":"joke"},{"num":"145","type":"joke","tr":"Un oste spiritoso trovò un soldato sopra sua moglie e disse: «Ho trovato quello che non cercavo!».","text":"Εὐτράπελος κάπηλος εὑρὼν ταξεώτην ἐπὶ τῇ γυναικὶ αὐτοῦ εἶπεν· Εὗρον, ὃ οὐκ ἐζήτουν.","app":[],"label":"145","wit":"A","dawe":"145","n":150,"A":"150"},{"num":"146","text":"Εὐτράπελος χοῖρον κλέψας ἔφευγεν. ἐπεὶ δὲ κατελαμβάνετο, θεὶς αὐτὸν χαμαὶ καὶ δέρων ἔλεγεν· Ἐκεῖ ὄρυττε καὶ μὴ παρὰ τὰ ἐμά.","tr":"Uno spiritoso rubò un maiale e fuggiva. Quando però fu acciuffato, lo poggiò per terra e mentre lo percuoteva diceva: «Scava lì, e non vicino alle mie cose!».","type":"joke","label":"146; 68 β","app":[{"reading":"del. §SIG:Mehler§","sigla":["Mehler"],"query":false,"dirty":false,"span":[62,67],"id":"346","unit":346,"editors":["Mehler"],"lemma":"αὐτόν"},{"lemma":"κλέψας","editors":["Dawe"],"unit":347,"id":"347","dirty":false,"span":[18,24],"query":false,"sigla":["A","Dawe"],"reading":"§SIG:Dawe§ : κρύψας §SIG:A§ ex 68 β"}],"wit":"A","n":151,"A":"151","dawe":"146"},{"n":152,"A":"152","dawe":"147","wit":"AM","label":"147","app":[{"unit":348,"id":"348","editors":[],"lemma":"κοκκύσῃς","reading":": κοκκύσῃς edd. : κοκύσης §SIG:A§ : κοκίσης §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[153,161]}],"text":"Εὐτράπελος ἰδὼν κακόηχον καὶ κακόφωνον κιθαρῳδὸν ἠσπάσατο λέγων· Χαῖρε, ἀλεκτρυών. τοῦ δὲ πυθομένου, διὰ τί αὐτὸν οὕτως προσηγόρευσεν, ἔφη· Ὅτι, ὅταν σὺ κοκκύσῃς, πάντες ἐγείρονται.","tr":"Uno spiritoso vide un citarodo dalla voce bruta e stonata e lo salutò dicendo: «Salve, gallo!». Quando quello chiese perché lo avesse salutato così, disse: «Perché quando canti, si svegliano tutti!».","type":"joke","num":"147"},{"text":"Εὐτράπελος φλυάρου κουρέως ἐρωτήσαντος· Πῶς σε κείρω; Σιωπῶν, ἔφη.","type":"joke","tr":"Uno spiritoso, quando un barbiere chiacchierone gli chiese: «Come te li taglio?» disse: «Stando in silenzio».","num":"148","n":153,"A":"153","dawe":"148","wit":"A","label":"148","app":[{"sigla":["A","Minas"],"reading":"§SIG:Minas§ : Πῶς ἐκείρω §SIG:A§","dirty":false,"span":[40,52],"query":false,"unit":349,"id":"349","lemma":"Πῶς … κείρω","editors":["Minas"]}]},{"num":"149","text":"Εὐτράπελος ἐν βαλανείῳ ὑπό τινος ὑβρισθεὶς μάρτυρας προσέφερε τοὺς παραχύτας. τοῦ δὲ ἀντιδίκου ἀποβαλλομένου ὡς μὴ ὄντας ἀξιοπίστους ἔφη· Εἰ μὲν ‹ἐν› τῷ δουρείῳ ἵππῳ ὑβρίσθην, προήγαγον ἂν μάρτυρας τοὺς περὶ Μενέλαον καὶ Ὀδυσσέα καὶ Διομήδην· ἐν δὲ τῷ βαλανείῳ τῆς ὕβρεως γενομένης ἀνάγκη τοὺς παραχύτας τὸ πραχθὲν μᾶλλον εἰδέναι.","tr":"Uno spiritoso fu maltrattato in un bagno da un tale e portava come testimoni gli inservienti. Quando l’imputato obiettava che non erano degni di fede, disse: «Se fossi stato maltrattato nel cavallo di legno, avrei portato come testimoni Menelao, Odisseo e Diomede, ché erano lì; siccome invece la violenza è avvenuta nel bagno, avranno per forza visto meglio il fatto gli inservienti!».","type":"joke","wit":"A","A":"154","n":154,"dawe":"149","label":"149; 71 β","app":[{"span":[33,42],"dirty":false,"query":false,"sigla":["A","Minas"],"reading":"§SIG:Minas§ : ὀριγισθεὶς §SIG:A§","lemma":"ὑβρισθεὶς","editors":["Minas"],"unit":350,"id":"350"},{"sigla":["Boissonade"],"reading":"§SIG:Boissonade§","dirty":false,"span":[104,106],"query":false,"id":"351","unit":351,"lemma":"ἐν","editors":["Boissonade"]}]},{"num":"150","tr":"Uno spiritoso, quando in un bagno gli venivano richiesti in prestito dei raschietti da due tali, e uno era uno sconosciuto, l’altro invece noto ma era un ladro, disse: «A te, siccome non ti conosco, non lo do; a te invece, siccome ti conosco, non lo do».","type":"joke","text":"Εὐτράπελος, δύο] ξύστρων παρ’ αὐτοῦ ‹ὑπὸ δύο› ἐν βαλανείῳ ἐπιζητουμένων, ὑπὸ ἑνὸς μὲν ἀγνωρίστου, ὑπὸ δὲ ἑτέρου γνωρίμου μὲν ἀλλὰ κλέπτου, ὁ εὐτράπελος ἔφη· Σὲ μὲν ‹μὴ› γνωρίζων οὐ δώσω· σὲ δὲ [μὴ] γνωρίζων οὐ δώσω.","wit":"A","dawe":"150","n":155,"A":"155","app":[{"query":false,"span":[12,15],"dirty":false,"reading":"del. §SIG:Dawe§","sigla":["Dawe"],"editors":["Dawe"],"lemma":"δύο","unit":352,"id":"352"},{"editors":["Dawe"],"lemma":"ὑπὸ δύο","id":"353","unit":353,"query":false,"dirty":false,"span":[37,44],"reading":"add. §SIG:Dawe§","sigla":["Dawe"]},{"reading":"add. §SIG:Dawe§","sigla":["Dawe"],"query":false,"span":[165,167],"dirty":false,"id":"354","unit":354,"editors":["Dawe"],"lemma":"μὴ"},{"editors":["Dawe"],"lemma":"μὴ","id":"355","unit":355,"query":false,"dirty":false,"span":[194,196],"reading":"del. §SIG:Dawe§","sigla":["Dawe"]}],"label":"150"},{"label":"151; 69 β","app":[],"wit":"A","A":"156","n":156,"dawe":"151","num":"151","text":"Εὐτράπελος ἰδὼν πορνοβοσκὸν μισθοῦντα μέλαιναν ἑταιρίδα εἶπε· Πόσου τὴν νύκτα μισθοῖς;","tr":"Uno spiritoso vide un lenone che vendeva una prostituta nera e disse: «A quanto vendi la notte{ N1|I4|Z1\\4\\ }?».","type":"joke"},{"dawe":"151 bis","n":157,"A":"157","wit":"A","app":[{"unit":356,"id":"356","lemma":"κόρην","editors":["Thierfelder"],"sigla":["A","Thierfelder"],"reading":"§SIG:A§ : κόρην ‹ὀφθαλμιῶσαν› §SIG:Thierfelder§","span":[23,28],"dirty":false,"query":false}],"label":"151 bis; 66 β","tr":"Uno spiritoso vide un medico che applicava un collirio a una ragazza e disse «Occhio, giovanotto, non sciupare la pupa/pulzella{ N1|I5|Z1\\5\\ } curando quella pupilla».","type":"joke","text":"Εὐτράπελος ἰδὼν ἰατρὸν κόρην ὑπαλείφοντα ἔφη· Ὅρα, νεανίσκε, μὴ τὴν ὄψιν θεραπεύων τὴν κόρην διαφθείρῃς.","num":"151 bis"},{"label":"152; 72 β; cf. 13 α","app":[{"editors":[],"lemma":"αὐτῷ","unit":357,"id":"357","query":false,"dirty":false,"span":[74,78],"reading":"§SIG:A§ : αὐτὸ §SIG:M§","sigla":["A","M"]},{"reading":"§SIG:A§§SIG:M§ : ἐμπλακεὶς §SIG:Hertlein§","sigla":["A","Hertlein","M"],"query":false,"span":null,"dirty":false,"unit":358,"id":"358","editors":["Hertlein"],"lemma":"ἐμπαρεὶς"},{"sigla":["A","M"],"reading":"§SIG:A§ : καταλείψεις §SIG:M§","dirty":false,"span":null,"query":false,"unit":359,"id":"359","lemma":"καταλείψῃς","editors":[]},{"reading":"§SIG:A§ : ὡς τὸν πατέρα σου ἰατρεύσω §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":null,"unit":360,"id":"360","editors":[],"lemma":"ἰατρεύσω … σου"},{"span":null,"dirty":false,"query":false,"sigla":["A","M"],"reading":"ἐυτράπελοι (sic) §SIG:A§ : titulum om. §SIG:M§","lemma":"","editors":[],"unit":361,"id":"361"},{"editors":["Dawe","Thierfelder"],"lemma":"πρὸς2 … φονεῦσαι","unit":362,"id":"362","query":false,"span":[26,67],"dirty":false,"reading":"§SIG:A§ : ἐπὶ τῷ ζῆν dub. §SIG:Thierfelder§, rec. §SIG:Dawe§","sigla":["A","Dawe","Thierfelder"]},{"dirty":false,"span":[214,222],"query":false,"sigla":["A","M","Minas"],"reading":"§SIG:Minas§ : φεύγομεν §SIG:A§§SIG:M§","lemma":"φεύξομεν","editors":["Minas"],"unit":363,"id":"363"},{"reading":"§SIG:A§ : δοκεῖ §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":null,"id":"364","unit":364,"editors":[],"lemma":"δοκῇ"},{"sigla":["A","Dawe","M","Thierfelder"],"reading":"dub. §SIG:Thierfelder§, rec. §SIG:Dawe§ : ἀπάλαιστος §SIG:A§ : ἀπάλαιστον §SIG:M§","dirty":false,"span":null,"query":false,"unit":365,"id":"365","lemma":"ἀπάλαιστρος","editors":["Dawe","Thierfelder"]},{"id":"366","unit":366,"editors":[],"lemma":"δι ὅλου","reading":"§SIG:A§ : διόλου §SIG:M§","sigla":["A","M"],"query":false,"span":null,"dirty":false}],"wit":"A","n":158,"A":"158","dawe":"152","num":"152","text":"Εὐτράπελοι δύο πατραλοῖαι πρὸς ἀλλήλους ἐδυσφόρουν πρὸς τὸ φονεῦσαι τοὺς ἑαυτῶν γονεῖς. ὁ δὲ ἕτερος πρὸς τὸν ἄλλον ἔφη· Ἵνα μὴ πατροκτόνοι παρά τισι λογισθῶμεν, σὺ φόνευσον τὸν ἐμὸν πατέρα, κἀγὼ τὸν σόν· καὶ κακῆς φεύξομεν φήμης.","type":"joke","tr":"Due spiritosi parricidi si lamentavano l’un l’altro dell’uccidere i propri genitori. Uno allora disse all’altro: «Affinché certa gente non ci consideri parricidi, tu ammazza mio padre, e io il tuo: e ci evitiamo una brutta fama!»."},{"num":"153","tr":"Uno spiritoso cadde nel fango mentre lottava, e perché non sembrasse essere goffo, si rigirò, si infangò tutto e si sollevò vantandosi.","type":"joke","text":"","wit":"AM","dawe":"153","A":"159","n":159,"app":[],"label":"153"},{"text":"κυμαῖοι","type":"section","app":[]},{"num":"154","text":"Ἐν Κύμῃ ἐπισήμου τινὸς κηδευομένου προσελθών τις ἠρώτα τοὺς ὀψικεύοντας· Τίς ὁ τεθνηκώς; εἷς δὲ Κυμαῖος στραφεὶς ὑπεδείκνυε λέγων· Ἐκεῖνος ὁ ἐπὶ τῆς κλίνης ἀνακείμενος.","type":"joke","tr":"A Cuma mentre qualcuno di insigne veniva seppellito, arrivò un tale e chiedeva ai presenti: «Chi è il morto?». Allora un Cumano si voltò e indicava dicendo: «Quello lì che giace sul letto funebre».","label":"154","app":[],"wit":"A","A":"160","n":160,"dawe":"154"},{"label":"155; cf. 4 α et 3 β","app":[],"wit":"A","A":"161","n":161,"dawe":"155","num":"155","text":"Κυμαίῳ ἵππον πιπράσκοντι προσελθών τις ἠρώτα, εἰ πρωτοβόλος ὁ ἵππος. τοῦ δὲ εἰπόντος, ὅτι δευτεροβολεῖ, ἔφη· Πῶς οἶδας; ὁ δὲ εἶπεν· Ὅτι ἅπαξ ἐμὲ κάτω ἔβαλε καὶ ἅπαξ τὸν πατέρα μου.","type":"joke","tr":"Un tale si avvicinò a un Cumano che vendeva un cavallo e gli domandava se il cavallo fosse di primo ricambio. Quando quello disse che era di secondo ricambio, disse: «Come lo sai?» e quello rispose «Perché una volta ha disarcionato me, e una volta ha fatto cadere mio padre»."},{"label":"156; cf. 41 α et 10 β","app":[],"n":162,"A":"162","dawe":"156","wit":"A","text":"Κυμαῖος οἰκίαν πωλῶν λίθον ἐξ αὐτῆς ἐκβαλὼν εἰς δεῖγμα περιέφερεν.","type":"joke","tr":"Un Cumano che vendeva una casa strappò via una pietra da essa e la portava in giro come campione dimostrativo.","num":"156"},{"wit":"A","dawe":"157","A":"163","n":163,"app":[{"reading":": εἱστία §SIG:A§","sigla":["A"],"query":false,"span":[111,119],"dirty":false,"unit":367,"id":"367","editors":[],"lemma":"εἱστήκει"}],"label":"157; cf. 10 α","num":"157","tr":"A un Cumano che vendeva un cavallo fu chiesto se quello fosse pauroso. Egli rispose: «No, per l’anima mia! Nella stalla, infatti, stava da solo!».","type":"joke","text":"Κυμαῖος ἵππον πιπράσκων ἠρωτήθη, μὴ δειλὸς εἴη. ὁ δὲ ἀπεκρίνατο· Οὐ μὰ τὴν σωτηρίαν μου· ἐν τῇ φάτνῃ γὰρ μόνος εἱστήκει."},{"label":"158; cf. 35 α","app":[],"wit":"A","n":164,"A":"164","dawe":"158","num":"158","text":"Κυμαῖος κλεψιμαῖα ἱμάτια ἀγοράσας διὰ τὸ μὴ γνωρισθῆναι ἐπίσσωσεν αὐτά.","type":"joke","tr":"Un Cumano si mise a vendere mantelli rubati e perché non fossero riconosciuti come tali, li ricoprì di pece."},{"app":[],"label":"158 bis; cf. 37 α et 6 β","dawe":"158 bis","A":"165","n":165,"wit":"A","tr":"Un Cumano vendeva un cavallo. Poiché era giunto un tale e ne esaminava la dentatura, disse: «Perché osservi i suoi denti? Oh, se trottasse tanto quanto mangia!».","type":"joke","text":"Κυμαῖος ἵππον ἐπίπρασκεν. ἐλθόντος δέ τινος καὶ καταμανθάνοντος αὐτοῦ τὸν βόλον εἶπε· Τί τοὺς ὀδόντας αὐτοῦ καταμανθάνεις; εἴθε ὡς τρώγει, οὕτως καὶ περιεπάτει.","num":"158 bis"},{"num":"159","type":"joke","tr":"Un Cumano realizzò una grande aia, piazzò sua moglie dalla parte opposta e le chiedeva se lo vedesse. Quando questa rispose che lo guardava a fatica, quello disse: «Ma io in un tempo abbastanza ampio realizzerò un’aia che farà sì che né io guarderò te, né tu me».","text":"Κυμαῖος ἅλωνα μεγάλην ποιήσας ἔστησεν ἄντικρυς τὴν γυναῖκα αὐτοῦ καὶ ἠρώτα, εἰ βλέπει αὐτόν. τῆς δὲ εἰπούσης, ὅτι μόλις αὐτὸν βλέπει, ἔφη ἐκεῖνος· Ἀλλ’ ἐγὼ εἰς καιρὸν τηλικαύτην ποιήσω ἅλωνα, ἵνα μήτε ἐγὼ σὲ μήτε σὺ ἐμὲ ἴδῃς.","wit":"AM","dawe":"159","n":166,"A":"166","app":[{"span":[30,46],"dirty":false,"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ἕστησεν ἄντικρυ §SIG:M§","lemma":"ἔστησεν ἄντικρυς","editors":[],"id":"368","unit":368},{"sigla":["A","M"],"reading":"§SIG:A§ : ἠρῶτα §SIG:M§","span":[69,74],"dirty":false,"query":false,"id":"369","unit":369,"lemma":"ἠρώτα","editors":[]},{"editors":[],"lemma":"ποιήσω","unit":370,"id":"370","query":false,"span":[178,184],"dirty":false,"reading":"§SIG:A§ : ποιήσας §SIG:M§ac","sigla":["A","M"]}],"label":"159"},{"wit":"AM","dawe":"160","A":"167","n":167,"app":[{"lemma":"ἀκούσῃ","editors":[],"id":"371","unit":371,"dirty":false,"span":[105,111],"query":false,"sigla":["A","M"],"reading":"§SIG:A§ : ἀκούσει §SIG:M§"}],"label":"160","num":"160","tr":"Un Cumano che cercava un amico lo chiamava per nome davanti casa. Quando un tale gli disse: «Chiamalo più forte, cosicché ti senta!» quello tralasciò il nome che conosceva, e gridava: «Oh, Più forte!».","type":"joke","text":"Κυμαῖος ἐπιζητῶν φίλον ἐκάλει αὐτὸν πρὸ τῆς οἰκίας ὀνομαστί. ἑτέρου δὲ εἰπόντος· Ὑψηλότερον φώνησον, ἵνα ἀκούσῃ ἀφεὶς τὸ ὄνομα, ὃ ᾔδει, ἐβόα· Ὑψηλότερε."},{"app":[],"label":"161","dawe":"161","n":168,"A":"168","wit":"AM","tr":"Un Cumano che faceva progetti sulla casa di un debitore e che voleva prendersi un credito ancor più grande, scelse documenti piuttosto pesanti.","type":"joke","text":"Κυμαῖος δανειστοῦ οἰκίᾳ ἐπιβουλεύων καὶ θέλων τὰ μείζονα δάνεια κλέψαι τὰ βαρύτερα χαρτία ἐπελέγετο.","num":"161"},{"text":"Κυμαίων ‹τὴν› πόλιν τειχιζόντων εἷς τῶν πολιτῶν Λολλιανὸς καλούμενος δύο κορτίνας ἰδίοις ἐτείχισεν ἀναλώμασι. πολεμίων δὲ ἐπιστάντων ὀργισθέντες οἱ Κυμαῖοι συνεφώνησαν, ἵνα τὸ Λολλιανοῦ τεῖχος μηδεὶς φυλάξῃ ἀλλ’ ἐκεῖνος μόνος.","tr":"Quando i Cumani cingevano di mura la città, uno dei cittadini, di nome Lolliano, edificò due cortine a spese proprie. Quando allora si presentarono i nemici i Cumani si adirarono e stabilirono che nessuno avrebbe sorvegliato il muro di Lolliano, se non quello, da solo.","type":"joke","num":"162","label":"162","app":[{"lemma":"τὴν","editors":["Eberhard"],"unit":372,"id":"372","dirty":false,"span":[9,12],"query":false,"sigla":["Eberhard"],"reading":"dubitanter §SIG:Eberhard§"},{"id":"373","unit":373,"editors":[],"lemma":"Λολλιανὸς","reading":"§SIG:A§ : Λολιανὸς §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[48,57]},{"unit":374,"id":"374","lemma":"ὀργισθέντες","editors":["Dawe"],"sigla":["Dawe"],"reading":"post ὀργισθέντες lacunam indicavit §SIG:Dawe§: irae causa desideretur","span":[133,144],"dirty":false,"query":false}],"n":169,"A":"169","dawe":"162","wit":"AM"},{"dawe":"163","A":"170","n":170,"wit":"A","app":[{"sigla":["A","Minas","Thierfelder"],"reading":"§SIG:Minas§ : τρίτον §SIG:A§ : susp §SIG:Thierfelder§","dirty":false,"span":[209,215],"query":false,"id":"375","unit":375,"lemma":"τρητὸν","editors":["Minas","Thierfelder"]}],"label":"163","tr":"I Cumani attendevano al rientro da un viaggio un loro spettabile amico, e poiché desideravano onorarlo con acqua pura alle terme, avendo loro una sola vasca, riempirono questa di acqua calda e pura e misero in mezzo ad essa una grata, in modo che una metà dell’acqua sia conservata pura per l’amico atteso.","type":"joke","text":"Κυμαῖοι προσδοκῶντες ἐξ ἀποδημίας φίλον αὐτῶν ἀξιότιμον καὶ βουλόμενοι αὐτὸν ἐν τῷ βαλανείῳ διὰ καθαροῦ ὕδατος τιμῆσαι, μίαν ἔχοντες κολυμβήθραν, ταύτην ὕδατος θερμοῦ καθαροῦ πλήσαντες ἐν μέσῳ αὐτῆς κάγκελλον τρητὸν ἔβαλον, ὅπως τὸ ἥμισυ τοῦ ὕδατος καθαρὸν τῷ προσδοκωμένῳ τηρῆται φίλῳ.","num":"163"},{"num":"164","tr":"Siccome scoppiò un acquazzone, un Cumano, in piscina, per non inzupparsi s’immerse sott’acqua.","type":"joke","text":"Κυμαῖος ἐν τῷ κολυμβᾶν βροχῆς γενομένης διὰ τὸ μὴ βραχῆναι εἰς τὸ βάθος κατέδυ.","app":[{"unit":376,"id":"376","editors":[],"lemma":"κατέδυ","reading":"§SIG:A§ : κατέβη §SIG:M§","sigla":["A","M"],"query":false,"dirty":false,"span":[72,78]}],"label":"164","wit":"AM","dawe":"164","n":171,"A":"171"},{"app":[{"reading":"§SIG:Boissonade§ : δύνωνται §SIG:A§§SIG:M§","sigla":["A","Boissonade","M"],"query":false,"dirty":false,"span":[35,43],"unit":377,"id":"377","editors":["Boissonade"],"lemma":"δύνανται"}],"label":"165","dawe":"165","n":172,"A":"172","wit":"AM","tr":"Un Cumano che acquistava finestre domandava se esse potessero guardare a mezzogiorno.","type":"joke","text":"Κυμαῖος θυρίδας ἀγοράζων ἠρώτα, εἰ δύνανται πρὸς μεσημβρίαν βλέπειν.","num":"165"},{"num":"166","text":"Κυμαῖος ὄνῳ καθήμενος παρὰ κῆπον ὥδευεν. ἰδὼν οὖν κλάδον συκῆς ὑπερέχοντα σύκων ὡρίμων πεπληρωμένον ἐπελάβετο τοῦ κλάδου. τοῦ δὲ ὄνου ὑπεκδραμόντος ἀπεκρεμάσθη, καὶ τοῦ κηπουροῦ ἐρωτήσαντος, τί ἐκεῖ ποιεῖ κρεμάμενος, ἔλεγεν· Ἐκ τοῦ ὄνου ἔπεσα.","tr":"Un Cumano costeggiava un orto seduto su di un asino. Vide, dunque, un ramo carico di fichi maturi e ci si aggrappò. Quando però l’asino gli sfuggì via da sotto, rimase appeso, e quando l’ortolano gli domandò cosa facesse lì appeso, diceva: «Sono caduto dall’asino!». Capire se la preposizione può avere anche valore verso l’alto","type":"joke","wit":"AM","n":173,"A":"173","dawe":"166","label":"166","app":[{"lemma":"καθήμενος","editors":["Eberhard"],"id":"378","unit":378,"dirty":false,"span":[12,21],"query":false,"sigla":["A","C","Eberhard","M"],"reading":"§SIG:A§§SIG:C§ : παρακαθήμενος §SIG:M§ : ἐπικαθήμενος §SIG:Eberhard§"},{"unit":379,"id":"379","lemma":"ὑπερέχοντα","editors":["Eberhard"],"sigla":["A","Eberhard","M"],"reading":"§SIG:Eberhard§ : ὑπέχοντα §SIG:A§ : ἐπέχοντα §SIG:M§","dirty":false,"span":[63,73],"query":false},{"editors":[],"lemma":"ὡρίμων","unit":380,"id":"380","query":false,"dirty":false,"span":[80,86],"reading":"§SIG:A§§SIG:C§ : ὁρίμων §SIG:M§","sigla":["A","C","M"]},{"id":"381","unit":381,"editors":[],"lemma":"ἀπεκρεμάσθη","reading":"§SIG:C§§SIG:M§ : ἀπεκρεμμάσθη §SIG:A§","sigla":["A","C","M"],"query":false,"dirty":false,"span":[148,159]},{"unit":382,"id":"382","lemma":"κηπουροῦ","editors":[],"sigla":["A","C","M"],"reading":"§SIG:A§ : κηπωροῦ §SIG:M§§SIG:C§ hinc C incipit","dirty":false,"span":[169,177],"query":false},{"sigla":["A","C","M"],"reading":"§SIG:A§§SIG:M§ : αἰτήσαντος §SIG:C§","dirty":false,"span":[178,189],"query":false,"id":"383","unit":383,"lemma":"ἐρωτήσαντος","editors":[]},{"unit":384,"id":"384","editors":[],"lemma":"ἐκεῖ ποιεῖ","reading":"§SIG:A§ : ποιεῖ ἐκεῖ §SIG:C§ : ἐκ σοῦ ποιεῖ §SIG:M§","sigla":["A","C","M"],"query":false,"dirty":false,"span":[194,204]},{"editors":[],"lemma":"κρεμάμενος","id":"385","unit":385,"query":false,"span":[205,215],"dirty":false,"reading":"§SIG:M§ : κρεμμάμενος §SIG:A§§SIG:C§","sigla":["A","C","M"]},{"query":false,"span":[225,231],"dirty":false,"reading":"§SIG:A§§SIG:C§§SIG:M§ : ἔκ του dub. §SIG:Dawe§","sigla":["A","C","Dawe","M"],"editors":["Dawe"],"lemma":"Ἐκ τοῦ","id":"386","unit":386}]},{"num":"167","tr":"Un Cumano vide una pecora legata e che veniva così tosata, e disse: «Ringrazio il mio barbiere, perché non mi ha mai rasato dopo avermi legato».","type":"joke","text":"Κυμαῖος ἰδὼν πρόβατον συμπεποδισμένον καὶ οὕτω κειρόμενον εἶπεν· Εὐχαριστῶ τῷ κουρεῖ μου, ὅτι οὐδέποτέ μεδήσας ἔκειρεν.","app":[{"lemma":"συμπεποδισμένον","editors":[],"id":"387","unit":387,"dirty":false,"span":[22,37],"query":false,"sigla":["A","C","M"],"reading":"§SIG:A§§SIG:M§ : συμπεποδηγμένον §SIG:C§"},{"reading":"§SIG:A§§SIG:C§ : κηρόμενον §SIG:M§","sigla":["A","C","M"],"query":false,"span":[47,57],"dirty":false,"unit":388,"id":"388","editors":[],"lemma":"κειρόμενον"},{"reading":"§SIG:Bursian§ et §SIG:Haupt§ : κυρίω §SIG:A§§SIG:M§§SIG:C§","sigla":["A","Bursian","C","Haupt","M"],"query":false,"span":[78,84],"dirty":false,"id":"389","unit":389,"editors":["Bursian","Haupt"],"lemma":"κουρεῖ"},{"query":false,"span":[111,118],"dirty":false,"reading":"§SIG:A§2pc : ἔκειρε §SIG:A§ac§SIG:C§ : ἔκηρε §SIG:M§","sigla":["A","C","M"],"editors":[],"lemma":"ἔκειρεν","id":"390","unit":390}],"label":"167","wit":"AMC","dawe":"167","A":"174","n":174},{"wit":"AC","n":175,"A":"175","dawe":"168","label":"168","app":[{"editors":[],"lemma":"ἐπιφέρειν","id":"391","unit":391,"query":false,"dirty":false,"span":[164,173],"reading":"§SIG:A§ : εἰσφέρειν §SIG:C§","sigla":["A","C"]}],"num":"168","text":"Κυμαῖος τοῦ πατρὸς αὐτοῦ ἀποδημήσαντος εἰς βαρὺ ἔγκλημα πεσὼν θανάτῳ κατεδικάσθη. ἀπιὼν δὲ παρεκάλει πάντας, ἵνα ὁ πατὴρ μὴ γνῷ, ἐπεὶ μέλλει αὐτῷ θανασίμους πληγὰς ἐπιφέρειν.","type":"joke","tr":"Un Cumano, mentre il padre era fuori per affari, cadde in una pesante accusa e fu condannato a morte. Allora mentre usciva pregava tutti che il padre non venisse a saperlo, dal momento che lo avrebbe ucciso di botte."},{"tr":"Sempre questo, quando un tale gli disse: «Mi hai derubato!», fece: «Che io non faccia ritorno lì da dove me ne vado, se ti ho derubato».","type":"joke","text":"Ὁ αὐτός, τινὸς αὐτῷ εἰπόντος ὅτι Ἐσύλησάς με Μὴ ὑποστρέψω, ‹ἔφη›, ἔνθεν ἄπειμι, εἰ ἐσύλησά ‹σε›.","num":"169","app":[{"editors":["Boissonade"],"lemma":"ἔφη","id":"392","unit":392,"query":false,"dirty":false,"span":[60,63],"reading":"vel εἶπεν dub. add. §SIG:Boissonade§","sigla":["Boissonade"]},{"sigla":["Dawe"],"reading":"add. §SIG:Dawe§","dirty":false,"span":[92,94],"query":false,"unit":393,"id":"393","lemma":"σε","editors":["Dawe"]}],"label":"169","dawe":"169","n":176,"A":"176","wit":"A"},{"num":"170","text":"Κυμαίου τὶς ἐπύθετο, ποῦ μένει Δρακοντίδης ὁ ῥήτωρ. ὁ δέ· Μόνος εἰμί, εἶπεν· εἰ δὲ θέλεις, τήρει τὸ ἐργαστήριον, κἀγὼ ἀπελθὼν δείξω σοι.","type":"joke","tr":"Un tale chiese a un Cumano dove vivesse il retore Dracontide. Quello disse: «Sono da solo, ma se vuoi, tienimi la bottega, ed io uscirò fuori e ti farò vedere».","wit":"AMC","A":"177","n":177,"dawe":"170","label":"170","app":[{"span":[0,7],"dirty":false,"query":false,"sigla":["A","C","M","Minas"],"reading":"§SIG:Minas§ : Κυμαίω §SIG:A§ : Κυμαῖος §SIG:M§§SIG:C§","lemma":"Κυμαίου","editors":["Minas"],"unit":394,"id":"394"},{"reading":"§SIG:A§§SIG:C§ : δρακοντίδος §SIG:M§","sigla":["A","C","M"],"query":false,"span":[31,42],"dirty":false,"id":"395","unit":395,"editors":[],"lemma":"Δρακοντίδης"},{"editors":[],"lemma":"ὁ δέ","unit":396,"id":"396","query":false,"dirty":false,"span":[52,56],"reading":"§SIG:C§ : om. §SIG:A§§SIG:M§","sigla":["A","C","M"]},{"reading":"§SIG:A§§SIG:C§ : τήρη §SIG:M§","sigla":["A","C","M"],"query":false,"dirty":false,"span":[91,96],"id":"397","unit":397,"editors":[],"lemma":"τήρει"}]},{"wit":"AC","dawe":"171","n":178,"A":"178","app":[{"id":"398","unit":398,"lemma":"ἐπ","editors":["Minas"],"sigla":["A","C","Minas"],"reading":"§SIG:A§§SIG:C§ : ἐν §SIG:Minas§","dirty":false,"span":[8,10],"query":false},{"lemma":"ταριχευταῖς","editors":[],"unit":399,"id":"399","dirty":false,"span":[66,77],"query":false,"sigla":["A","C"],"reading":"§SIG:A§§SIG:C§ : ταρυχεύταις"},{"query":false,"span":[78,84],"dirty":false,"reading":": δέδωκεν §SIG:A§ac : ἔδωκε §SIG:C§ fort. recte","sigla":["A","C"],"editors":[],"lemma":"δέδωκε","unit":400,"id":"400"},{"reading":"dub. §SIG:Boissonade§","sigla":["Boissonade"],"query":false,"dirty":false,"span":[132,142],"unit":401,"id":"401","editors":["Boissonade"],"lemma":"ταριχευτοῦ"},{"reading":"dub. §SIG:Braccini§: τοῦ πατρὸς αὐτοῦ ἡ θήκη §SIG:C§ : ὁ πατήρ αὐτοῦ §SIG:Dawe§ monente §SIG:Thierfelder§","sigla":["Braccini","C","Dawe","Thierfelder"],"query":false,"dirty":false,"span":[187,225],"unit":402,"id":"402","editors":["Braccini","Dawe","Thierfelder"],"lemma":"ἡ … θήκη"},{"span":[238,245],"dirty":false,"query":false,"sigla":["A","C","Eberhard"],"reading":"§SIG:Eberhard§ : ἔβισσεν §SIG:A§ : ἔβισση vel ἔβισσονον §SIG:C§","lemma":"Ἔβησσεν","editors":["Eberhard"],"unit":403,"id":"403"}],"label":"171","num":"171","tr":"Un Cumano quando suo padre morì in Alessandria, diede il corpo agli imbalsamatori. Tempo dopo, voleva riprenderselo. Siccome l’imbalsamatore aveva anche altri corpi e domandava che segno avesse di suo padre, il Cumano rispose: «Aveva la tosse».","type":"joke","text":"Κυμαῖος ἐπ’ Ἀλεξανδρείᾳ τοῦ πατρὸς αὐτοῦ ἀποθανόντος τὸ σῶμα τοῖς ταριχευταῖς δέδωκε. μετὰ δὲ χρόνον ἐζήτει αὐτὸ ἀπολαβεῖν. τοῦ δὲ ‹ταριχευτοῦ› ἔχοντος καὶ ἄλλα σώματα καὶ ἐρωτῶντος, τί σημεῖον ἔχει [ἡ] τοῦ πατρὸς αὐτοῦ [θήκη], ἀπεκρίθη· Ἔβησσεν."},{"num":"172","tr":"Un Cumano vide un pugile che aveva molte ferite e gli domandava da dove le avesse riportate. Quando questi disse: «Dalla formica» il Cumano fece: «Ma allora perché dormi per terra?».","type":"joke","text":"Κυμαῖος πύκτην ἰδὼν πολλὰ τραύματα ἔχοντα ἠρώτα, πόθεν ἔχει ταῦτα. τοῦ δὲ εἰπόντος· Ἐκ τοῦ μύρμηκος ἔφη· Διὰ τί γὰρ χαμαὶ κοιμᾷ;","app":[],"label":"172; cf. 218 α","wit":"AM","dawe":"172","A":"179","n":179},{"label":"173","app":[{"id":"404","unit":404,"lemma":"γευσαμένου","editors":[],"sigla":["A","C","M"],"reading":"§SIG:A§§SIG:C§ : γευσάμενος §SIG:M§","span":[47,57],"dirty":false,"query":false},{"unit":405,"id":"405","lemma":"μὴ","editors":[],"sigla":["A","C","M"],"reading":"§SIG:A§§SIG:C§ : om. §SIG:M§","span":[96,98],"dirty":false,"query":false},{"dirty":false,"span":[116,124],"query":false,"sigla":["A","C","M"],"reading":"§SIG:A§§SIG:M§ : αυτῷ §SIG:C§","lemma":"εἰς αὐτό","editors":[],"unit":406,"id":"406"}],"n":180,"A":"180","dawe":"173","wit":"AMC","text":"Κυμαῖος μέλι ἐπίπρασκεν. ἐλθόντος δέ τινος καὶ γευσαμένου καὶ εἰπόντος, ὅτι πάνυ καλόν, ἔφη· Εἰ μὴ γὰρ μῦς ἐνέπεσεν εἰς αὐτό, οὐκ ἂν ἐπώλουν.","tr":"Un Cumano vendeva del miele. Quando un tale giunse, lo gustò e disse che era buono, fece: «Se infatti non ci fosse caduto dentro un topo, non lo venderei mica!».","type":"joke","num":"173"},{"wit":"AMC","dawe":"174","A":"181","n":181,"app":[{"lemma":"Κυμαῖον … ἰατρός","editors":[],"unit":407,"id":"407","span":[0,33],"dirty":false,"query":false,"sigla":["A","C","M"],"reading":"§SIG:A§§SIG:C§ : Κυμαῖον ἀπήντισεν ὁ ἰατρὸς νοσοῦντα §SIG:M§"},{"query":false,"span":[124,127],"dirty":false,"reading":"add. §SIG:Thierfelder§ monente §SIG:Eberhard§","sigla":["Eberhard","Thierfelder"],"editors":["Eberhard","Thierfelder"],"lemma":"ὅτι","unit":408,"id":"408"},{"sigla":["A","C","M"],"reading":"§SIG:C§ : δὲ ζήσας §SIG:A§§SIG:M§","dirty":false,"span":[151,156],"query":false,"unit":409,"id":"409","lemma":"ζήσας","editors":[]}],"label":"174","num":"174","type":"joke","tr":"Un medico aveva perso le speranze per un Cumano ammalato. Ma questi si era ristabilito, ed evitava il medico. Quando gliene fu domandato il motivo rispose «Siccome tu hai detto che sarei morto, vivo e quindi mi vergogno».","text":"Κυμαῖον νοσοῦντα ἀπήλπισεν ἰατρός. ὁ δὲ ὑγιάνας περιέκαμπτε τὸν ἰατρόν. ἐρωτηθεὶς οὖν τὴν αἰτίαν ἀπεκρίνατο· Εἰπόντος σου, ‹ὅτι› ἀποθνῄσκω, αἰσχύνομαι ζήσας."},{"text":"Κυμαῖος ἰατρὸς ἄρρωστον τριταΐζοντα εἰς ἡμιτριταῖον περιστήσας τὸ ἥμισυ τοῦ μισθοῦ ἀπῄτει.","tr":"Un medico cumano rese semiterzano un malato di febbre terzana e gli domandava la metà del compenso.","type":"joke","num":"175","A":"182","n":182,"dawe":"175","wit":"A","label":"175","app":[]},{"n":183,"A":"183","dawe":"175 bis","wit":"A","label":"175 bis; 3 α","app":[{"dirty":false,"span":[0,6],"query":false,"sigla":["A","Minas"],"reading":"§SIG:Minas§ et fort. §SIG:A§2 : Κυμαί §SIG:A§ac","lemma":"Κυμαίῳ","editors":["Minas"],"id":"410","unit":410},{"lemma":"προσελθὼν","editors":["Minas"],"unit":411,"id":"411","dirty":false,"span":[25,34],"query":false,"sigla":["A","Minas"],"reading":"§SIG:Minas§ : προσελθὸν §SIG:A§"},{"unit":412,"id":"412","lemma":"ἐπὶ … διύπνισον","editors":[],"sigla":[],"reading":"facile supplendum est ex 3 α","span":[76,104],"dirty":false,"query":false}],"text":"Κυμαίῳ ἰατρῷ σχολαστικὸς προσελθὼν εἶπε· Σοφιστά, ὅταν ἐκ τοῦ ὕπνου ἀναστῶ, ἐπὶ ἡμιώριον ‹...› διύπνισον.","tr":"Il testo è lacunoso, ma facilmente ricostruibile attraverso il confronto con la facezia 3","type":"joke","num":"175 bis"},{"app":[{"unit":413,"id":"413","editors":["Boissonade","Minas"],"lemma":"ἐνημάτισεν","reading":"§SIG:Boissonade§ : ἐνευμάτισεν §SIG:A§ : ἐνεμμάτισεν §SIG:Minas§","sigla":["A","Boissonade","Minas"],"query":false,"dirty":false,"span":[37,47]},{"unit":414,"id":"414","lemma":"ἐκέλευσε … ἰδεῖν","editors":[],"sigla":[],"reading":"aliquid excidisse putant edd. pl.","span":[49,94],"dirty":false,"query":false},{"id":"415","unit":415,"lemma":"θεράποντα","editors":["Dawe"],"sigla":["Dawe"],"reading":"add. §SIG:Dawe§","dirty":false,"span":[62,71],"query":false},{"unit":416,"id":"416","lemma":"ἐκκεχωρημένα","editors":["Eberhard"],"sigla":["A","Eberhard"],"reading":"§SIG:A§ : ἐκκεχωρισμένα §SIG:Eberhard§","span":[76,88],"dirty":false,"query":false},{"dirty":false,"span":[173,178],"query":false,"sigla":["A","Kurtz"],"reading":"§SIG:A§ : οὗτος §SIG:Kurtz§","lemma":"Οὗτως","editors":["Kurtz"],"id":"417","unit":417},{"sigla":["A","Boissonade"],"reading":"§SIG:Boissonade§ : ἐλάκισεν §SIG:A§","dirty":false,"span":[194,202],"query":false,"id":"418","unit":418,"lemma":"ἐλάκησεν","editors":["Boissonade"]},{"query":false,"dirty":false,"span":null,"reading":"In initio §SIG:C§ vix legitur","sigla":["C"],"editors":[],"lemma":"","unit":419,"id":"419"}],"label":"176","wit":"A","dawe":"176","A":"184","n":184,"num":"176","type":"joke","tr":"Un medico cumano fece un clistere ad un malato in condizioni disperate; quindi, ordinò al servo di vedere le evacuazioni. Quando questo le mostrò e disse che il paziente era morto, il medico disse giurandoci: «Se non fosse stato così purgato, sarebbe crepato!».","text":"Κυμαῖος ἰατρὸς ἀπεγνωσμένον ἄρρωστον ἐνημάτισεν, ἐκέλευσε δὲ ‹θεράποντα› τὰ ἐκκεχωρημένα ἰδεῖν. τοῦ δὲ δείξαντος καὶ εἰπόντος, ὅτι ἀπέθανεν, ὁ ἰατρὸς μεθ’ ὅρκου ἀπεκρίνατο· Οὗτως εἰ μὴ ἐκλύσθη, ἐλάκησεν ἄν."},{"A":"185","n":185,"dawe":"177","wit":"A","label":"177","app":[],"text":"Κυμαῖος ἰατρὸς τέμνων τινὰ δεινῶς ἀλγοῦντα καὶ βοῶντα ἀμβλυτέραν σμίλην μετέλαβεν.","tr":"Un medico cumano che operava un tale che soffriva e urlava tremendamente, prese un bisturi piuttosto smussato.","type":"joke","num":"177"},{"text":"Κυμαῖοι δύο ἰσχάδων κεράμια δύο ἐπρίαντο. τούτων δὲ ὁ ἕτερος τὸν ἕτερον λανθάνων οὐκ ἐκ τοῦ ἰδίου, ἀλλ’ ἐκ τοῦ ἑτέρου κατήσθιεν. ὡς δὲ τοῖς ἀλλήλων κατεχρήσαντο, ἕκαστος ἐπὶ τὸ ἴδιον ἐπιστρέψας εὗρεν αὐτὸ κενόν. ἀλλήλων οὖν ἐπιλαβόμενοι ἤγοντο ἐπὶ τὸν ἄρχοντα. διαγνοὺς δὲ ὁ ἄρχων ἐκέλευσε τὰ κενώματα ἀλλάξαι καὶ τὰς τιμὰς ἀλλήλοις ἀποδοῦναι.","type":"joke","tr":"Due Cumani acquistarono due recipienti di fichi secchi. Entrambi, ingannando l’altro, mangiavano non dal proprio recipiente, ma da quello dell’altro. Quando se li ebbero consumati l’un l’altro, ciascuno si recò al proprio recipiente e lo trovò vuoto. Si azzuffarono dunque tra loro e furono portati dal magistrato. Allora il magistrato rifletté e comandò che si scambiassero i recipienti vuoti e che si rimborsassero le spese vicendevolmente.","num":"178","label":"178","app":[{"lemma":"ἐκ2 … κατήσθιεν","editors":["Dawe"],"id":"420","unit":420,"dirty":false,"span":[85,127],"query":false,"sigla":["A","C","Dawe"],"reading":"§SIG:A§§SIG:C§ : ἐκ ‹τοῦ› τοῦ ἑτέρου κατήσθιεν dub. §SIG:Dawe§"},{"id":"421","unit":421,"editors":[],"lemma":"τοῖς","reading":"§SIG:A§ : τῆς §SIG:C§","sigla":["A","C"],"query":false,"dirty":false,"span":[135,139]},{"dirty":false,"span":[148,160],"query":false,"sigla":["A","C"],"reading":"§SIG:A§ : κατεχρήσατο §SIG:C§","lemma":"κατεχρήσαντο","editors":[],"id":"422","unit":422},{"query":false,"dirty":false,"span":[324,332],"reading":"§SIG:A§ : ἀλλήλους §SIG:C§","sigla":["A","C"],"editors":[],"lemma":"ἀλλήλοις","id":"423","unit":423}],"A":"186","n":186,"dawe":"178","wit":"AC"},{"num":"179","type":"joke","tr":"A Cuma un demagogo sotto accusa in assemblea disse: «Uomini, cittadini, se questi mi hanno calunniato con queste accuse, che siano condannati da voi; se io ho invece commesso alcuna di queste azioni, mentre voi tutti siete seduti, crolli il teatro su me solo! ».","text":"Ἐν Κύμῃ δημαγωγὸς ἐν ἐκκλησίᾳ κατηγορηθείς· Ἄνδρες, ἔφη, πολῖται, εἰ μὲν κατεψευσμένοι μου τὰς διαβολάς εἰσιν οὗτοι, γένοιτο αὐτοῖς παρ’ ὑμῶν καταγνωσθῆναι· εἰ δέ τι ἐγὼ τούτων πεποίηκα, πάντων ὑμῶν καθημένων ἐμοὶ μόνῳ τὸ θέατρον ἐπιπέσοι.","app":[{"dirty":false,"span":[73,86],"query":false,"sigla":["A"],"reading":": κατεψευμένοι §SIG:A§ac corr. §SIG:A§2","lemma":"κατεψευσμένοι","editors":[],"id":"424","unit":424},{"dirty":false,"span":[137,141],"query":false,"sigla":["A","Eberhard"],"reading":"dub. §SIG:Eberhard§ : υμῖν §SIG:A§","lemma":"ὑμῶν","editors":["Eberhard"],"id":"425","unit":425},{"lemma":"τούτων","editors":["Thierfelder"],"id":"426","unit":426,"dirty":false,"span":[170,176],"query":false,"sigla":["A","Thierfelder"],"reading":"§SIG:Thierfelder§ : τούτοις §SIG:A§"},{"query":false,"dirty":false,"span":[214,218],"reading":"§SIG:Minas§ : μόνον","sigla":["Minas"],"editors":["Minas"],"lemma":"μόνῳ","unit":427,"id":"427"}],"label":"179","wit":"A","dawe":"179","A":"187","n":187},{"num":"180","text":"Κυμαῖος ἄρχων τοιαῦτα κηρύγματα ἐκήρυξεν· Οἱ ἔφοροι μετὰ τὴν θυσίαν παραχρῆμα τὰς ἑαυτῶν βύρσας ἀναφερέτωσαν πρὸς τὸν ἱερέα. Οἱ δὲ βουλευταί, ἔλθετε εἰς τὸ βουλευτήριον καὶ μὴ βουλεύεσθε. Οἱ δὲ μάγειροι τὰ ἴδια ὀστέα ὑπὲρ τὸ τεῖχος βαλλέτωσαν. Οἱ δὲ σκυτεῖς μικροὺς καλάποδας μὴ ἐχέτωσαν.","type":"jok
